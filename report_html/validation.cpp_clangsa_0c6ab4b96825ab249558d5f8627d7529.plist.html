rd::CheckStatusWrapper* status) override;\n\tvoid deprecatedDropDatabase(Firebird::CheckStatusWrapper* status) override;\n\n\tunsigned int getIdleTimeout(Firebird::CheckStatusWrapper* status) override;\n\tvoid setIdleTimeout(Firebird::CheckStatusWrapper* status, unsigned int timeOut) override;\n\tunsigned int getStatementTimeout(Firebird::CheckStatusWrapper* status) override;\n\tvoid setStatementTimeout(Firebird::CheckStatusWrapper* status, unsigned int timeOut) override;\n\tFirebird::IBatch* createBatch(Firebird::CheckStatusWrapper* status, Firebird::ITransaction* transaction,\n\t\tunsigned stmtLength, const char* sqlStmt, unsigned dialect,\n\t\tFirebird::IMessageMetadata* inMetadata, unsigned parLength, const unsigned char* par) override;\n\tFirebird::IReplicator* createReplicator(Firebird::CheckStatusWrapper* status) override;\n\n\tunsigned getMaxBlobCacheSize(Firebird::CheckStatusWrapper* status) override;\n\tvoid setMaxBlobCacheSize(Firebird::CheckStatusWrapper* status, unsigned size) override;\n\tunsigned getMaxInlineBlobSize(Firebird::CheckStatusWrapper* status) override;\n\tvoid setMaxInlineBlobSize(Firebird::CheckStatusWrapper* status, unsigned size) override;\npublic:\n\texplicit JAttachment(StableAttachmentPart* js);\n\n\tStableAttachmentPart* getStable() noexcept\n\t{\n\t\treturn att;\n\t}\n\n\tJrd::Attachment* getHandle() noexcept;\n\tconst Jrd::Attachment* getHandle() const noexcept;\n\n\tStableAttachmentPart* getAttachment() noexcept\n\t{\n\t\treturn att;\n\t}\n\n\tJTransaction* getTransactionInterface(Firebird::CheckStatusWrapper* status, Firebird::ITransaction* tra);\n\tjrd_tra* getEngineTransaction(Firebird::CheckStatusWrapper* status, Firebird::ITransaction* tra);\n\nprivate:\n\tfriend class StableAttachmentPart;\n\n\tStableAttachmentPart* att;\n\n\tvoid freeEngineData(Firebird::CheckStatusWrapper* status, bool forceFree);\n\n\tvoid detachEngine()\n\t{\n\t\tatt = NULL;\n\t}\n\n\tvoid internalDetach(Firebird::CheckStatusWrapper* status);\n\tvoid internalDropDatabase(Firebird::CheckStatusWrapper* status);\n};\n\nclass JService final :\n\tpublic Firebird::RefCntIface&lt;Firebird::IServiceImpl&lt;JService, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\t// IService implementation\n\tint release() override;\n\tvoid detach(Firebird::CheckStatusWrapper* status) override;\n\tvoid deprecatedDetach(Firebird::CheckStatusWrapper* status) override;\n\tvoid query(Firebird::CheckStatusWrapper* status,\n\t\tunsigned int sendLength, const unsigned char* sendItems,\n\t\tunsigned int receiveLength, const unsigned char* receiveItems,\n\t\tunsigned int bufferLength, unsigned char* buffer) override;\n\tvoid start(Firebird::CheckStatusWrapper* status,\n\t\tunsigned int spbLength, const unsigned char* spb) override;\n\tvoid cancel(Firebird::CheckStatusWrapper* status) override;\n\npublic:\n\texplicit JService(Jrd::Service* handle);\n\tJrd::Service* svc;\n\nprivate:\n\tvoid freeEngineData(Firebird::CheckStatusWrapper* status);\n};\n\nclass JProvider final :\n\tpublic Firebird::StdPlugin&lt;Firebird::IProviderImpl&lt;JProvider, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\texplicit JProvider(Firebird::IPluginConfig* pConf)\n\t\t: cryptCallback(NULL), pluginConfig(pConf)\n\t{ }\n\n\tstatic JProvider* getInstance()\n\t{\n\t\tJProvider* p = FB_NEW JProvider(NULL);\n\t\tp-&gt;addRef();\n\t\treturn p;\n\t}\n\n\tFirebird::ICryptKeyCallback* getCryptCallback()\n\t{\n\t\treturn cryptCallback;\n\t}\n\n\t// IProvider implementation\n\tJAttachment* attachDatabase(Firebird::CheckStatusWrapper* status, const char* fileName,\n\t\tunsigned int dpbLength, const unsigned char* dpb);\n\tJAttachment* createDatabase(Firebird::CheckStatusWrapper* status, const char* fileName,\n\t\tunsigned int dpbLength, const unsigned char* dpb);\n\tJService* attachServiceManager(Firebird::CheckStatusWrapper* status, const char* service,\n\t\tunsigned int spbLength, const unsigned char* spb);\n\tvoid shutdown(Firebird::CheckStatusWrapper* status, unsigned int timeout, const int reason);\n\tvoid setDbCryptCallback(Firebird::CheckStatusWrapper* status,\n\t\tFirebird::ICryptKeyCallback* cryptCb);\n\nprivate:\n\tJAttachment* internalAttach(Firebird::CheckStatusWrapper* status, const char* const fileName,\n\t\tunsigned int dpbLength, const unsigned char* dpb, const UserId* existingId);\n\tFirebird::ICryptKeyCallback* cryptCallback;\n\tFirebird::IPluginConfig* pluginConfig;\n};\n\n} // namespace Jrd\n\n#endif // JRD_ENGINE_INTERFACE_H\n"}, "/build/src/common/classes/alloc.h": {"id": "/build/src/common/classes/alloc.h", "filePath": "src/common/classes/alloc.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.h\n *\tDESCRIPTION:\tMemory Pool Manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  STL allocator is based on one by Mike Nordell and John Bellardo\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#ifndef CLASSES_ALLOC_H\n#define CLASSES_ALLOC_H\n\n#include &quot;firebird.h&quot;\n#include &quot;fb_types.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n\n#include &lt;stdio.h&gt;\n\n#if defined(MVS) || defined(DARWIN) || defined(__clang__)\n#include &lt;stdlib.h&gt;\n#else\n#include &lt;malloc.h&gt;\n#endif\n\n#include &lt;memory.h&gt;\n#include &lt;memory&gt;\n\n#ifdef DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool(), __FILE__, __LINE__)\n#define FB_NEW_POOL(pool) new(pool, __FILE__, __LINE__)\n#define FB_NEW_RPT(pool, count) new(pool, count, __FILE__, __LINE__)\n#else // DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool())\n#define FB_NEW_POOL(pool) new(pool)\n#define FB_NEW_RPT(pool, count) new(pool, count)\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird {\n\n// Alignment for all memory blocks\n#define ALLOC_ALIGNMENT 16\n\nstatic inline constexpr size_t MEM_ALIGN(size_t value)\n{\n\treturn FB_ALIGN(value, ALLOC_ALIGNMENT);\n}\n\n\nclass MemPool;\n\nclass MemoryStats\n{\npublic:\n\texplicit MemoryStats(MemoryStats* parent = NULL) noexcept\n\t\t: mst_parent(parent), mst_usage(0), mst_mapped(0), mst_max_usage(0), mst_max_mapped(0)\n\t{}\n\n\t~MemoryStats()\n\t{}\n\n\t// Forbid copying/assignment\n\tMemoryStats(const MemoryStats&amp;) = delete;\n\tMemoryStats&amp; operator=(const MemoryStats&amp;) = delete;\n\n\tsize_t getCurrentUsage() const noexcept { return mst_usage.value(); }\n\tsize_t getMaximumUsage() const noexcept { return mst_max_usage; }\n\tsize_t getCurrentMapping() const noexcept { return mst_mapped.value(); }\n\tsize_t getMaximumMapping() const noexcept { return mst_max_mapped; }\n\nprivate:\n\tMemoryStats* mst_parent;\n\n\t// Currently allocated memory (without allocator overhead)\n\t// Useful for monitoring engine memory leaks\n\tAtomicCounter mst_usage;\n\t// Amount of memory mapped (including all overheads)\n\t// Useful for monitoring OS memory consumption\n\tAtomicCounter mst_mapped;\n\n\t// We don&#x27;t particularily care about extreme precision of these max values,\n\t// this is why we don&#x27;t synchronize them\n\tsize_t mst_max_usage;\n\tsize_t mst_max_mapped;\n\n\t// These methods are thread-safe due to usage of atomic counters only\n\tvoid increment_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_usage.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_usage)\n\t\t\t\tstatistics-&gt;mst_max_usage = temp;\n\t\t}\n\t}\n\n\tvoid decrement_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_usage -= size;\n\t\t}\n\t}\n\n\tvoid increment_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_mapped.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_mapped)\n\t\t\t\tstatistics-&gt;mst_max_mapped = temp;\n\t\t}\n\t}\n\n\tvoid decrement_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_mapped -= size;\n\t\t}\n\t}\n\n\tfriend class MemPool;\n};\n\n\nclass MemoryPool\n{\nfriend class ExternalMemoryHandler;\n\nprivate:\n\tMemPool* pool;\n\n\tMemoryPool(MemPool* p) noexcept\n\t\t: pool(p)\n\t{ }\n\n\t// Default statistics group for process\n\tstatic MemoryStats* default_stats_group;\n\npublic:\n\t// This is maximum block size which is cached (not allocated directly from OS)\n\tenum RecommendedBufferSize { MAX_MEDIUM_BLOCK_SIZE = 64384 };\t// MediumLimits::TOP_LIMIT - 128\n\n\tstatic MemoryPool* defaultMemoryManager;\n\tstatic MemoryPool* externalMemoryManager;\n\npublic:\n\t// Create memory pool instance\n\tstatic MemoryPool* createPool(MemoryPool* parent = NULL, MemoryStats&amp; stats = *default_stats_group);\n\t// Delete memory pool instance\n\tstatic void deletePool(MemoryPool* pool);\n\n#ifdef DEBUG_GDS_ALLOC\n#define ALLOC_ARGS , __FILE__, __LINE__\n#define ALLOC_PARAMS , const char* file, int line\n#define ALLOC_PASS_ARGS , file, line\n#else\n#define ALLOC_ARGS\n#define ALLOC_PARAMS\n#define ALLOC_PASS_ARGS\n#endif // DEBUG_GDS_ALLOC\n\n\tvoid* calloc(size_t size ALLOC_PARAMS);\n\n\tstatic void* globalAlloc(size_t s ALLOC_PARAMS)\n\t{\n\t\treturn defaultMemoryManager-&gt;allocate(s ALLOC_PASS_ARGS);\n\t}\n\n\tvoid* allocate(size_t size ALLOC_PARAMS);\n\n\tstatic void globalFree(void* mem) noexcept;\n\tvoid deallocate(void* mem) noexcept;\n\n\t// Set context pool for current thread of execution\n\tstatic MemoryPool* setContextPool(MemoryPool* newPool);\n\n\t// Get context pool for current thread of execution\n\tstatic MemoryPool* getContextPool();\n\n\tMemoryStats&amp; getStatsGroup() noexcept;\n\n\t// Set statistics group for pool. Usage counters will be decremented from\n\t// previously set group and added to new\n\tvoid setStatsGroup(MemoryStats&amp; stats) noexcept;\n\n\t// Initialize and finalize global memory pool\n\tstatic void initDefaultPool();\n\tstatic void cleanupDefaultPool();\n\n\t// Initialize context pool\n\tstatic void contextPoolInit();\n\n\t// Print out pool contents. This is debugging routine\n\tstatic constexpr unsigned PRINT_USED_ONLY = 0x01;\n\tstatic constexpr unsigned PRINT_RECURSIVE = 0x02;\n\tvoid print_contents(FILE*, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\t// The same routine, but more easily callable from the debugger\n\tvoid print_contents(const char* filename, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\n\tinline bool operator==(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn pool == rhs.pool;\n\t}\n\n\tinline bool operator!=(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn !operator==(rhs);\n\t}\n\npublic:\n\tstruct Finalizer\n\t{\n\t\tvirtual ~Finalizer()\n\t\t{\n\t\t}\n\n\t\tvirtual void finalize() = 0;\n\n\t\tFinalizer* prev = nullptr;\n\t\tFinalizer* next = nullptr;\n\t};\n\n\ttemplate &lt;typename T&gt; Finalizer* registerFinalizer(void (*func)(T*), T* object)\n\t{\n\t\tstruct FinalizerImpl : Finalizer\n\t\t{\n\t\t\tFinalizerImpl(void (*aFunc)(T*), T* aObject)\n\t\t\t\t: func(aFunc),\n\t\t\t\t  object(aObject)\n\t\t\t{\n\t\t\t}\n\n\t\t\tvoid finalize() override\n\t\t\t{\n\t\t\t\tfunc(object);\n\t\t\t}\n\n\t\t\tvoid (*func)(T*);\n\t\t\tT* object;\n\t\t};\n\n\t\tfb_assert(func);\n\t\tFinalizerImpl* finalizer = FB_NEW_POOL(*this) FinalizerImpl(func, object);\n\n\t\tinternalRegisterFinalizer(finalizer);\n\n\t\treturn finalizer;\n\t}\n\n\tvoid unregisterFinalizer(Finalizer*&amp; finalizer);\n\nprivate:\n\tvoid internalRegisterFinalizer(Finalizer* entry);\n\nprivate:\n\tFinalizer* finalizers = nullptr;\n\n\tfriend class MemPool;\n};\n\nvoid initExternalMemoryPool();\n\n} // namespace Firebird\n\nstatic inline Firebird::MemoryPool* getDefaultMemoryPool() noexcept\n{\n\tfb_assert(Firebird::MemoryPool::defaultMemoryManager);\n\treturn Firebird::MemoryPool::defaultMemoryManager;\n}\n\nstatic inline Firebird::MemoryPool* getExternalMemoryPool() noexcept\n{\n\tusing namespace Firebird;\n\n\tif (!MemoryPool::externalMemoryManager)\n\t\tinitExternalMemoryPool();\n\n\treturn MemoryPool::externalMemoryManager;\n}\n\nnamespace Firebird {\n\n// Class intended to manage execution context pool stack\n// Declare instance of this class when you need to set new context pool and it\n// will be restored automatically as soon holder variable gets out of scope\nclass ContextPoolHolder\n{\npublic:\n\texplicit ContextPoolHolder(MemoryPool* newPool)\n\t{\n\t\tsavedPool = MemoryPool::setContextPool(newPool);\n\t}\n\t~ContextPoolHolder()\n\t{\n\t\tMemoryPool::setContextPool(savedPool);\n\t}\nprivate:\n\tMemoryPool* savedPool;\n};\n\n// template enabling common use of old and new pools control code\n// to be dropped when old-style code goes away\ntemplate &lt;typename SubsystemThreadData, typename SubsystemPool&gt;\nclass SubsystemContextPoolHolder : public ContextPoolHolder\n{\npublic:\n\tSubsystemContextPoolHolder\n\t(\n\t\tSubsystemThreadData* subThreadData,\n\t\tSubsystemPool* newPool\n\t)\n\t\t: ContextPoolHolder(newPool),\n\t\tsavedThreadData(subThreadData),\n\t\tsavedPool(savedThreadData-&gt;getDefaultPool())\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(newPool);\n\t}\n\n\t~SubsystemContextPoolHolder()\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(savedPool);\n\t}\n\nprivate:\n\tSubsystemThreadData* savedThreadData;\n\tSubsystemPool* savedPool;\n};\n\n} // namespace Firebird\n\nusing Firebird::MemoryPool;\n\n// operators new and delete\n\ninline void* operator new(size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void* operator new[](size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void operator delete(void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\ninline void operator delete[](void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#ifdef DEBUG_GDS_ALLOC\n\nextern void operator delete(void* mem) noexcept;\nextern void operator delete[](void* mem) noexcept;\n\n#if __cplusplus &gt;= 201402L\nextern void operator delete(void* mem, std::size_t s) noexcept;\nextern void operator delete[](void* mem, std::size_t s) noexcept;\n#endif\n\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird\n{\n\t// Global storage makes it possible to use new and delete for classes,\n\t// based on it, to behave traditionally, i.e. get memory from permanent pool.\n\tclass GlobalStorage\n\t{\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept\n\t\t{\n\t\t\treturn *getDefaultMemoryPool();\n\t\t}\n\t};\n\n\n\t// Permanent storage is used as base class for all objects,\n\t// performing memory allocation in methods other than\n\t// constructors of this objects. Permanent means that pool,\n\t// which will be later used for such allocations, must\n\t// be explicitly passed in all constructors of such object.\n\tclass PermanentStorage\n\t{\n\tprotected:\n\t\texplicit PermanentStorage(MemoryPool&amp; p) noexcept : pool(p) { }\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept { return pool; }\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n\n\t// Automatic storage is used as base class for objects,\n\t// that may have constructors without explicit MemoryPool\n\t// parameter. In this case AutoStorage sends AutoMemoryPool\n\t// to PermanentStorage. To ensure this operation to be safe\n\t// such trick possible only for local (on stack) variables.\n\tclass AutoStorage : public PermanentStorage\n\t{\n\tprivate:\n#if defined(DEV_BUILD)\n\t\tvoid ProbeStack() const noexcept;\n#endif\n\tpublic:\n\t\tstatic MemoryPool&amp; getAutoMemoryPool();\n\tprotected:\n\t\tAutoStorage()\n\t\t\t: PermanentStorage(getAutoMemoryPool())\n\t\t{\n#if defined(DEV_BUILD)\n\t\t\tProbeStack();\n#endif\n\t\t}\n\t\texplicit AutoStorage(MemoryPool&amp; p) noexcept : PermanentStorage(p) { }\n\t};\n\n\ttemplate &lt;&gt;\n\tinline void SimpleDelete&lt;MemoryPool&gt;::clear(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t\tMemoryPool::deletePool(pool);\n\t}\n\n\ttypedef AutoPtr&lt;MemoryPool&gt; AutoMemoryPool;\n\n\ttemplate &lt;typename T&gt;\n\tclass PoolAllocator\n\t{\n\ttemplate &lt;typename&gt; friend class PoolAllocator;\n\n\tpublic:\n\t\tusing value_type = T;\n\t\tusing size_type = size_t;\n\t\tusing pointer = T*;\n\t\tusing const_pointer = const T*;\n\t\tusing reference = T&amp;;\n\t\tusing const_reference = const T&amp;;\n\t\tusing void_pointer = void* ;\n\t\tusing const_void_pointer = const void*;\n\t\tusing difference_type = std::ptrdiff_t;\n\t\tusing is_always_equal = std::true_type;\n\n\t\ttemplate &lt;typename U&gt;\n\t\tstruct rebind\n\t\t{\n\t\t\ttypedef PoolAllocator&lt;U&gt; other;\n\t\t};\n\n\tpublic:\n\t\tPoolAllocator(MemoryPool&amp; aPool) noexcept\n\t\t\t: pool(aPool)\n\t\t{}\n\n\t\tPoolAllocator(const PoolAllocator&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\ttemplate &lt;class U&gt;\n\t\tPoolAllocator(const PoolAllocator&lt;U&gt;&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\t~PoolAllocator() noexcept\n\t\t{}\n\n\tpublic:\n\t\tconstexpr pointer allocate(size_type n, const void* hint = nullptr)\n\t\t{\n\t\t\treturn static_cast&lt;T*&gt;(pool.allocate(n * sizeof(T) ALLOC_ARGS));\n\t\t}\n\n\t\tconstexpr void deallocate(pointer p, size_type n)\n\t\t{\n\t\t\tpool.deallocate(p);\n\t\t}\n\n\t\tconstexpr size_type max_size() const noexcept\n\t\t{\n\t\t\treturn size_t(-1) / sizeof(T);\n\t\t}\n\n\t\ttemplate &lt;typename U, typename... Args&gt;\n\t\tconstexpr void construct(U* ptr, Args&amp;&amp;... args)\n\t\t{\n\t\t\tif constexpr (std::is_constructible&lt;U, MemoryPool&amp;, Args...&gt;::value)\n\t\t\t\tnew ((void*) ptr) U(pool, std::forward&lt;Args&gt;(args)...);\n\t\t\telse\n\t\t\t\tnew ((void*) ptr) U(std::forward&lt;Args&gt;(args)...);\n\t\t}\n\n\t\ttemplate &lt;typename U&gt;\n\t\tconstexpr void destroy(U* ptr)\n\t\t{\n\t\t\tptr-&gt;~U();\n\t\t}\n\n\t\tconstexpr bool operator==(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool == &amp;o.pool;\n\t\t}\n\n\t\tconstexpr bool operator!=(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool != &amp;o.pool;\n\t\t}\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n} // namespace Firebird\n\n\ntemplate &lt;typename TAlloc&gt;\nstruct std::allocator_traits&lt;Firebird::PoolAllocator&lt;TAlloc&gt;&gt;\n{\n\tusing Alloc = Firebird::PoolAllocator&lt;TAlloc&gt;;\n\n\tusing allocator_type = Alloc;\n\tusing value_type = typename Alloc::value_type;\n\tusing pointer = typename Alloc::pointer;\n\tusing const_pointer = typename Alloc::const_pointer;\n\tusing void_pointer = typename Alloc::void_pointer;\n\tusing const_void_pointer = typename Alloc::const_void_pointer;\n\tusing size_type = typename Alloc::size_type;\n\tusing difference_type = typename Alloc::difference_type;\n\tusing reference = value_type&amp;;\n\tusing const_reference = const value_type&amp;;\n\n\tusing is_always_equal = typename Alloc::is_always_equal;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_alloc = typename Alloc::template rebind&lt;T&gt;::other;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_traits = allocator_traits&lt;rebind_alloc&lt;T&gt;&gt;;\n\n\tstatic constexpr pointer allocate(Alloc&amp; alloc, size_type size)\n\t{\n\t\treturn alloc.allocate(size);\n\t}\n\n\tstatic constexpr void deallocate(Alloc&amp; alloc, pointer ptr, size_type size)\n\t{\n\t\talloc.deallocate(ptr, size);\n\t}\n\n\ttemplate &lt;typename T, typename... Args&gt;\n\tstatic constexpr void construct(Alloc&amp; alloc, T* ptr, Args&amp;&amp;... args)\n\t{\n\t\talloc.construct(ptr, std::forward&lt;Args&gt;(args)...);\n\t}\n\n\ttemplate &lt;typename T&gt;\n\tstatic constexpr void destroy(Alloc&amp; alloc, T* ptr)\n\t{\n\t\talloc.destroy(ptr);\n\t}\n\n\tstatic constexpr size_type max_size(const Alloc&amp; alloc) noexcept\n\t{\n\t\treturn alloc.max_size();\n\t}\n};\n\n\n#endif // CLASSES_ALLOC_H\n"}, "/build/src/jrd/jrd.h": {"id": "/build/src/jrd/jrd.h", "filePath": "src/jrd/jrd.h", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         jrd.h\n *      DESCRIPTION:    Common descriptions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed &lt;cds/threading/model.h&gt;\t// cds::threading::Manager\n#endif\n\n#define BUGCHECK(number)\t\tERR_bugcheck(number, __FILE__, __LINE__)\n#define SOFT_BUGCHECK(number)\tERR_soft_bugcheck(number, __FILE__, __LINE__)\n#define CORRUPT(number)\t\t\tERR_corrupt(number)\n#define IBERROR(number)\t\t\tERR_error(number)\n\n\n#define BLKCHK(blk, type)       if (!blk-&gt;checkHandle()) BUGCHECK(147)\n\n#define DEV_BLKCHK(blk, type)\tdo { } while (false)\t// nothing\n\n\n// Thread data block / IPC related data blocks\n#include &quot;../common/ThreadData.h&quot;\n\n// Definition of block types for data allocation in JRD\n#include &quot;../include/fb_blk.h&quot;\n\n#include &quot;../jrd/blb.h&quot;\n\n// Definition of DatabasePlugins\n#include &quot;../jrd/flu.h&quot;\n\n#include &quot;../jrd/pag.h&quot;\n\n#include &quot;../jrd/RuntimeStatistics.h&quot;\n#include &quot;../jrd/Database.h&quot;\n#include &quot;../jrd/lck.h&quot;\n\n// Error codes\n#include &quot;iberror.h&quot;\n\nstruct dsc;\n\nnamespace EDS {\n\tclass Connection;\n}\n\nnamespace Firebird {\n\tclass TextType;\n}\n\nnamespace Jrd {\n\ninline constexpr unsigned MAX_CALLBACKS = 50;\n\n// fwd. decl.\nclass thread_db;\nclass Attachment;\nclass jrd_tra;\nclass Request;\nclass Statement;\nclass jrd_file;\nclass Format;\nclass BufferDesc;\nclass SparseBitmap;\nclass jrd_rel;\nclass ExternalFile;\nclass ViewContext;\nclass IndexBlock;\nclass IndexLock;\nclass ArrayField;\nstruct sort_context;\nclass vcl;\nclass Parameter;\nclass jrd_fld;\nclass dsql_dbb;\nclass PreparedStatement;\nclass TraceManager;\nclass MessageNode;\n\n\n// Relation trigger definition\n\nclass Trigger\n{\npublic:\n\tFirebird::HalfStaticArray&lt;UCHAR, 128&gt; blr;\t\t\t// BLR code\n\tFirebird::HalfStaticArray&lt;UCHAR, 128&gt; debugInfo;\t// Debug info\n\tStatement* statement = nullptr;\t\t\t\t\t\t// Compiled statement\n\tbool releaseInProgress = false;\n\tSSHORT sysTrigger = 0;\t\t\t\t// See fb_sysflag in constants.h\n\tFB_UINT64 type = 0;\t\t\t\t\t// Trigger type\n\tUSHORT flags = 0;\t\t\t\t\t// Flags as they are in RDB$TRIGGERS table\n\tjrd_rel* relation = nullptr;\t\t// Trigger parent relation\n\tQualifiedName name;\t\t\t\t\t// Trigger name\n\tMetaName engine;\t\t\t\t\t// External engine name\n\tMetaName owner;\t\t\t\t\t\t// Owner for SQL SECURITY\n\tFirebird::string entryPoint;\t\t// External trigger entrypoint\n\tFirebird::string extBody;\t\t\t// External trigger body\n\tFirebird::TriState ssDefiner;\t\t// SQL SECURITY\n\tstd::unique_ptr&lt;ExtEngineManager::Trigger&gt; extTrigger;\t// External trigger\n\n\tbool isActive() const;\n\n\tvoid compile(thread_db*);\t\t\t\t// Ensure that trigger is compiled\n\tvoid release(thread_db*);\t\t\t\t// Try to free trigger request\n\n\texplicit Trigger(MemoryPool&amp; p)\n\t\t: blr(p), debugInfo(p), entryPoint(p), extBody(p)\n\t{}\n};\n\n\n// Array of triggers (suppose separate arrays for triggers of different types)\n\nclass TrigVector : public Firebird::ObjectsArray&lt;Trigger&gt;\n{\npublic:\n\texplicit TrigVector(Firebird::MemoryPool&amp; pool)\n\t\t: Firebird::ObjectsArray&lt;Trigger&gt;(pool),\n\t\t  useCount(0)\n\t{ }\n\n\tTrigVector()\n\t\t: Firebird::ObjectsArray&lt;Trigger&gt;(),\n\t\t  useCount(0)\n\t{ }\n\n\tvoid addRef()\n\t{\n\t\t++useCount;\n\t}\n\n\tbool hasActive() const;\n\n\tvoid decompile(thread_db* tdbb);\n\n\tvoid release();\n\tvoid release(thread_db* tdbb);\n\n\t~TrigVector()\n\t{\n\t\tfb_assert(useCount.value() == 0);\n\t}\n\nprivate:\n\tFirebird::AtomicCounter useCount;\n};\n\n\n//\n// Flags to indicate normal internal requests vs. dyn internal requests\n//\n// IRQ_REQUESTS and DYN_REQUESTS are deprecated\ninline constexpr int IRQ_REQUESTS\t\t= 1;\ninline constexpr int DYN_REQUESTS\t\t= 2;\ninline constexpr int CACHED_REQUESTS\t= 3;\n\n\n// Procedure block\n\nclass jrd_prc final : public Routine\n{\npublic:\n\tconst Format*\tprc_record_format = nullptr;\n\tprc_t\t\t\tprc_type = prc_legacy;\t\t\t// procedure type\n\n\tconst ExtEngineManager::Procedure* getExternal() const noexcept { return prc_external; }\n\tvoid setExternal(const ExtEngineManager::Procedure* value) noexcept { prc_external = value; }\n\nprivate:\n\tconst ExtEngineManager::Procedure* prc_external = nullptr;\n\npublic:\n\texplicit jrd_prc(MemoryPool&amp; p)\n\t\t: Routine(p)\n\t{\n\t}\n\npublic:\n\tint getObjectType() const override\n\t{\n\t\treturn obj_procedure;\n\t}\n\n\tSLONG getSclType() const override\n\t{\n\t\treturn obj_procedures;\n\t}\n\n\tvoid releaseFormat() override\n\t{\n\t\tdelete prc_record_format;\n\t\tprc_record_format = NULL;\n\t}\n\n\t~jrd_prc() override\n\t{\n\t\tdelete prc_external;\n\t}\n\n\tbool checkCache(thread_db* tdbb) const override;\n\tvoid clearCache(thread_db* tdbb) override;\n\n\tvoid releaseExternal() override\n\t{\n\t\tdelete prc_external;\n\t\tprc_external = NULL;\n\t}\n\nprotected:\n\tbool reload(thread_db* tdbb) override;\t// impl is in met.epp\n};\n\n\n// Parameter block\n\nclass Parameter final : public pool_alloc&lt;type_prm&gt;\n{\npublic:\n\tUSHORT\t\tprm_number;\n\tdsc\t\t\tprm_desc;\n\tNestConst&lt;ValueExprNode&gt;\tprm_default_value;\n\tbool\t\tprm_nullable;\n\tprm_mech_t\tprm_mechanism;\n\tMetaName prm_name;\n\tQualifiedName prm_field_source;\n\tMetaName prm_type_of_column;\n\tQualifiedName prm_type_of_table;\n\tstd::optional&lt;USHORT&gt; prm_text_type;\n\tFUN_T\t\tprm_fun_mechanism;\n\npublic:\n\texplicit Parameter(MemoryPool&amp; p)\n\t\t: prm_name(p),\n\t\t  prm_field_source(p),\n\t\t  prm_type_of_column(p),\n\t\t  prm_type_of_table(p)\n\t{\n\t}\n};\n\n// Index block to cache index information\n\nclass IndexBlock final : public pool_alloc&lt;type_idb&gt;\n{\npublic:\n\tIndexBlock*\tidb_next;\n\tValueExprNode* idb_expression;\t\t\t// node tree for index expression\n\tStatement* idb_expression_statement;\t// statement for index expression evaluation\n\tdsc\t\t\tidb_expression_desc;\t\t// descriptor for expression result\n\tBoolExprNode* idb_condition;\t\t\t// node tree for index condition\n\tStatement* idb_condition_statement;\t\t// statement for index condition evaluation\n\tLock*\t\tidb_lock;\t\t\t\t\t// lock to synchronize changes to index\n\tUSHORT\t\tidb_id;\n};\n\n\n//\n// Transaction element block\n//\nstruct teb\n{\n\tAttachment* teb_database;\n\tint teb_tpb_length;\n\tconst UCHAR* teb_tpb;\n};\n\ntypedef teb TEB;\n\n// Window block for loading cached pages into\n// CVC: Apparently, the only possible values are HEADER_PAGE==0 and LOG_PAGE==2\n// and reside in ods.h, although I watched a place with 1 and others with members\n// of a struct.\n\nstruct win\n{\n\tPageNumber win_page;\n\tOds::pag* win_buffer;\n\tclass BufferDesc* win_bdb;\n\tSSHORT win_scans;\n\tUSHORT win_flags;\n\texplicit win(const PageNumber&amp; wp) noexcept\n\t\t: win_page(wp), win_bdb(NULL), win_flags(0)\n\t{}\n\twin(const USHORT pageSpaceID, const ULONG pageNum) noexcept\n\t\t: win_page(pageSpaceID, pageNum), win_bdb(NULL), win_flags(0)\n\t{}\n};\n\ntypedef win WIN;\n\n// This is a compilation artifact: I wanted to be sure I would pick all old &quot;win&quot;\n// declarations at the top, so &quot;win&quot; was built with a mandatory argument in\n// the constructor. This struct satisfies a single place with an array. The\n// alternative would be to initialize 16 elements of the array with 16 calls\n// to the constructor: win my_array[n] = {win(-1), ... (win-1)};\n// When all places are changed, this class can disappear and win&#x27;s constructor\n// may get the default value of ~0 to &quot;wp&quot;.\nstruct win_for_array : public win\n{\n\twin_for_array() noexcept\n\t\t: win(DB_PAGE_SPACE, ~0)\n\t{}\n};\n\n// win_flags\n\ninline constexpr USHORT WIN_large_scan\t\t\t= 1;\t// large sequential scan\ninline constexpr USHORT WIN_secondary\t\t\t= 2;\t// secondary stream\ninline constexpr USHORT WIN_garbage_collector\t= 4;\t// garbage collector&#x27;s window\ninline constexpr USHORT WIN_garbage_collect\t\t= 8;\t// scan left a page for garbage collector\n\n\n#ifdef USE_ITIMER\nclass T n the attachment mutex.\n\t\t\t\t// This may cause a segfault due to lck_attachment == NULL stored in tdbb.\n\n\t\t\t\tif (!lck-&gt;lck_id)\n\t\t\t\t{\n\t\t\t\t\t// usually to be swallowed by the AST, but it allows to skip its execution\n\t\t\t\t\tFirebird::status_exception::raise(Firebird::Arg::Gds(isc_unavailable));\n\t\t\t\t}\n\n\t\t\t\tfb_assert((operator thread_db*())-&gt;getAttachment());\n\t\t\t}\n\n\t\t\t(*this)-&gt;tdbb_flags |= TDBB_async;\n\t\t}\n\n\t\t// copying is prohibited\n\t\tAsyncContextHolder(const AsyncContextHolder&amp;) = delete;\n\t\tAsyncContextHolder&amp; operator=(const AsyncContextHolder&amp;) = delete;\n\t};\n\n\tclass EngineCheckout\n\t{\n\tpublic:\n\t\tenum Type\n\t\t{\n\t\t\tREQUIRED,\n\t\t\tUNNECESSARY,\n\t\t\tAVOID\n\t\t};\n\n\t\tEngineCheckout(thread_db* tdbb, const char* from, Type type = REQUIRED)\n\t\t\t: m_tdbb(tdbb), m_from(from)\n\t\t{\n\t\t\tif (type != AVOID)\n\t\t\t{\n\t\t\t\tAttachment* const att = tdbb ? tdbb-&gt;getAttachment() : NULL;\n\n\t\t\t\tif (att)\n\t\t\t\t\tm_ref = att-&gt;getStable();\n\n\t\t\t\tfb_assert(type == UNNECESSARY || m_ref.hasData());\n\n\t\t\t\tif (m_ref.hasData())\n\t\t\t\t\tm_ref-&gt;getSync()-&gt;leave();\n\t\t\t}\n\t\t}\n\n\t\tEngineCheckout(Attachment* att, const char* from, Type type = REQUIRED)\n\t\t\t: m_tdbb(nullptr), m_from(from)\n\t\t{\n\t\t\tif (type != AVOID)\n\t\t\t{\n\t\t\t\tfb_assert(type == UNNECESSARY || att);\n\n\t\t\t\tif (att &amp;&amp; att-&gt;att_use_count)\n\t\t\t\t{\n\t\t\t\t\tm_ref = att-&gt;getStable();\n\t\t\t\t\tm_ref-&gt;getSync()-&gt;leave();\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\t~EngineCheckout()\n\t\t{\n\t\t\tif (m_ref.hasData())\n\t\t\t\tm_ref-&gt;getSync()-&gt;enter(m_from);\n\n\t\t\t// If we were signalled to cancel/shutdown, react as soon as possible.\n\t\t\t// We cannot throw immediately, but we can reschedule ourselves.\n\n\t\t\tif (m_tdbb &amp;&amp; m_tdbb-&gt;tdbb_quantum &gt; 0 &amp;&amp; m_tdbb-&gt;getCancelState() != FB_SUCCESS)\n\t\t\t\tm_tdbb-&gt;tdbb_quantum = 0;\n\t\t}\n\n\t\t// copying is prohibited\n\t\tEngineCheckout(const EngineCheckout&amp;) = delete;\n\t\tEngineCheckout&amp; operator=(const EngineCheckout&amp;) = delete;\n\n\tprivate:\n\t\tthread_db* const m_tdbb;\n\t\tFirebird::RefPtr&lt;StableAttachmentPart&gt; m_ref;\n\t\tconst char* m_from;\n\t};\n\n\tclass CheckoutLockGuard\n\t{\n\tpublic:\n\t\tCheckoutLockGuard(thread_db* tdbb, Firebird::Mutex&amp; mutex,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_mutex(mutex)\n\t\t{\n\t\t\tif (!m_mutex.tryEnter(from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_mutex.enter(from);\n\t\t\t}\n\t\t}\n\n\t\t~CheckoutLockGuard()\n\t\t{\n\t\t\tm_mutex.leave();\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutLockGuard(const CheckoutLockGuard&amp;) = delete;\n\t\tCheckoutLockGuard&amp; operator=(const CheckoutLockGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Mutex&amp; m_mutex;\n\t};\n\n\tclass CheckoutSyncGuard\n\t{\n\tpublic:\n\t\tCheckoutSyncGuard(thread_db* tdbb, Firebird::SyncObject&amp; sync,\n\t\t\t\t\t\t  Firebird::SyncType type,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_sync(&amp;sync, from)\n\t\t{\n\t\t\tif (!m_sync.lockConditional(type, from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_sync.lock(type);\n\t\t\t}\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutSyncGuard(const CheckoutSyncGuard&amp;) = delete;\n\t\tCheckoutSyncGuard&amp; operator=(const CheckoutSyncGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Sync m_sync;\n\t};\n}\n\n#endif // JRD_JRD_H\n"}, "/build/src/jrd/req.h": {"id": "/build/src/jrd/req.h", "filePath": "src/jrd/req.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\treq.h\n *\tDESCRIPTION:\tRequest block definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Ver record number in relation\n\tTraNumber\trpb_transaction_nr;\t// transaction number\n\tjrd_rel*\trpb_relation;\t\t// relation of record\n\tRecord*\t\trpb_record;\t\t\t// final record block\n\tRecord*\t\trpb_prior;\t\t\t// prior record block if this is a delta record\n\tRecord*\t\trpb_undo;\t\t\t// our first version of data if this is a second modification\n\tUSHORT rpb_format_number;\t\t// format number in relation\n\n\tULONG rpb_page;\t\t\t\t\t// page number\n\tUSHORT rpb_line;\t\t\t\t// line number on page\n\n\tULONG rpb_f_page;\t\t\t\t// fragment page number\n\tUSHORT rpb_f_line;\t\t\t\t// fragment line number on page\n\n\tULONG rpb_b_page;\t\t\t\t// back page\n\tUSHORT rpb_b_line;\t\t\t\t// back line\n\n\tUCHAR* rpb_address;\t\t\t\t// address of record sans header\n\tULONG rpb_length;\t\t\t\t// length of record\n\tUSHORT rpb_flags;\t\t\t\t// record ODS flags replica\n\tUSHORT rpb_stream_flags;\t\t// stream flags\n\tUSHORT rpb_runtime_flags;\t\t// runtime flags\n\tSSHORT rpb_org_scans;\t\t\t// relation scan count at stream open\n\n\tinline WIN&amp; getWindow(thread_db* tdbb)\n\t{\n\t\tif (rpb_relation) {\n\t\t\trpb_window.win_page.setPageSpaceID(rpb_relation-&gt;getPages(tdbb)-&gt;rel_pg_space_id);\n\t\t}\n\n\t\treturn rpb_window;\n\t}\n\nprivate:\n\tstruct win rpb_window;\n};\n\n// Record flags must be an exact replica of ODS record header flags\n\ninline constexpr USHORT rpb_deleted\t\t= 1;\ninline constexpr USHORT rpb_chained\t\t= 2;\ninline constexpr USHORT rpb_fragment\t= 4;\ninline constexpr USHORT rpb_incomplete\t= 8;\ninline constexpr USHORT rpb_blob\t\t= 16;\ninline constexpr USHORT rpb_delta\t\t= 32;\t\t// prior version is a differences record\ninline constexpr USHORT rpb_large\t\t= 64;\t\t// object is large\ninline constexpr USHORT rpb_damaged\t\t= 128;\t\t// record is busted\ninline constexpr USHORT rpb_gc_active\t= 256;\t\t// garbage collecting dead record version\ninline constexpr USHORT rpb_uk_modified\t= 512;\t\t// record key field values are changed\ninline constexpr USHORT rpb_long_tranum\t= 1024;\t\t// transaction number is 64-bit\ninline constexpr USHORT rpb_not_packed\t= 2048;\t\t// record (or delta) is stored &quot;as is&quot;\n\n// Stream flags\n\ninline constexpr USHORT RPB_s_update\t= 0x01;\t// input stream fetched for update\ninline constexpr USHORT RPB_s_no_data\t= 0x02;\t// nobody is going to access the data\ninline constexpr USHORT RPB_s_sweeper\t= 0x04;\t// garbage collector - skip swept pages\ninline constexpr USHORT RPB_s_unstable\t= 0x08;\t// don&#x27;t use undo log, used with unstable explicit cursors\ninline constexpr USHORT RPB_s_bulk\t\t= 0x10;\t// bulk operation (currently insert only)\ninline constexpr USHORT RPB_s_skipLocked = 0x20;\t// skip locked record\n\n// Runtime flags\n\ninline constexpr USHORT RPB_refetch\t\t\t= 0x01;\t// re-fetch is required\ninline constexpr USHORT RPB_undo_data\t\t= 0x02;\t// data got from undo log\ninline constexpr USHORT RPB_undo_read\t\t= 0x04;\t// read was performed using the undo log\ninline constexpr USHORT RPB_undo_deleted\t= 0x08;\t// read was performed using the undo log, primary version is deleted\ninline constexpr USHORT RPB_just_deleted\t= 0x10;\t// record was just deleted by us\ninline constexpr USHORT RPB_uk_updated\t\t= 0x20;\t// set by IDX_modify if it insert key into any primary or unique index\n\ninline constexpr USHORT RPB_UNDO_FLAGS\t= (RPB_undo_data | RPB_undo_read | RPB_undo_deleted);\ninline constexpr USHORT RPB_CLEAR_FLAGS\t= (RPB_UNDO_FLAGS | RPB_just_deleted | RPB_uk_updated);\n\n// List of active blobs controlled by request\n\ntypedef Firebird::BePlusTree&lt;ULONG, ULONG&gt; TempBlobIdTree;\n\n// Affected rows counter class\n\nclass AffectedRows\n{\npublic:\n\tAffectedRows() noexcept;\n\n\tvoid clear() noexcept;\n\tvoid bumpFetched() noexcept;\n\tvoid bumpModified(bool) noexcept;\n\n\tint getCount() const noexcept;\n\nprivate:\n\tbool writeFlag;\n\tint fetchedRows;\n\tint modifiedRows;\n};\n\n// Record key\n\nstruct RecordKey\n{\n\tRecordNumber::Packed recordNumber;\n\tTraNumber recordVersion;\n};\n\n// request block\n\nclass Request : public pool_alloc&lt;type_req&gt;\n{\nprivate:\n\tclass TimeStampCache\n\t{\n\tpublic:\n\t\tvoid invalidate()\n\t\t{\n\t\t\tgmtTimeStamp.invalidate();\n\t\t\tlocalTimeStampValid = localTimeValid = false;\n\t\t}\n\n\t\tISC_TIMESTAMP getLocalTimeStamp(USHORT currentTimeZone) const\n\t\t{\n\t\t\tfb_assert(!gmtTimeStamp.isEmpty());\n\n\t\t\tif (!localTimeStampValid || timeZone != currentTimeZone)\n\t\t\t\tupdate(currentTimeZone, true);\n\n\t\t\treturn localTimeStamp;\n\t\t}\n\n\t\tISC_TIMESTAMP getGmtTimeStamp() const\n\t\t{\n\t\t\tfb_assert(!gmtTimeStamp.isEmpty());\n\t\t\treturn gmtTimeStamp.value();\n\t\t}\n\n\t\tvoid setGmtTimeStamp(USHORT currentTimeZone, ISC_TIMESTAMP ts)\n\t\t{\n\t\t\tgmtTimeStamp = ts;\n\t\t\tupdate(currentTimeZone, false);\n\t\t}\n\n\t\tISC_TIMESTAMP_TZ getTimeStampTz(USHORT currentTimeZone) const\n\t\t{\n\t\t\tfb_assert(!gmtTimeStamp.isEmpty());\n\n\t\t\tISC_TIMESTAMP_TZ timeStampTz;\n\t\t\ttimeStampTz.utc_timestamp = gmtTimeStamp.value();\n\t\t\ttimeStampTz.time_zone = currentTimeZone;\n\t\t\treturn timeStampTz;\n\t\t}\n\n\t\tISC_TIME_TZ getTimeTz(USHORT currentTimeZone) const\n\t\t{\n\t\t\tfb_assert(!gmtTimeStamp.isEmpty());\n\n\t\t\tISC_TIME_TZ timeTz;\n\n\t\t\tif (timeZone != currentTimeZone)\n\t\t\t\tupdate(currentTimeZone, false);\n\n\t\t\tif (localTimeValid)\n\t\t\t{\n\t\t\t\ttimeTz.utc_time = localTime;\n\t\t\t\ttimeTz.time_zone = timeZone;\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tISC_TIMESTAMP_TZ timeStamp;\n\t\t\t\ttimeStamp.utc_timestamp = gmtTimeStamp.value();\n\t\t\t\ttimeStamp.time_zone = timeZone;\n\n\t\t\t\ttimeTz = Firebird::TimeZoneUtil::timeStampTzToTimeTz(timeStamp);\n\n\t\t\t\tlocalTime = timeTz.utc_time;\n\t\t\t\tlocalTimeValid = true;\n\t\t\t}\n\n\t\t\treturn timeTz;\n\t\t}\n\n\t\tvoid validate(USHORT currentTimeZone)\n\t\t{\n\t\t\tif (gmtTimeStamp.isEmpty())\n\t\t\t{\n\t\t\t\tFirebird::TimeZoneUtil::validateGmtTimeStamp(gmtTimeStamp);\n\t\t\t\tupdate(currentTimeZone, false);\n\t\t\t}\n\t\t}\n\n\tprivate:\n\t\tvoid update(USHORT currentTimeZone, bool updateLocalTimeStamp) const\n\t\t{\n\t\t\tif (updateLocalTimeStamp)\n\t\t\t{\n\t\t\t\tlocalTimeStamp = Firebird::TimeZoneUtil::timeStampTzToTimeStamp(\n\t\t\t\t\tgetTimeStampTz(currentTimeZone), currentTimeZone);\n\t\t\t}\n\n\t\t\tlocalTimeStampValid = updateLocalTimeStamp;\n\t\t\ttimeZone = currentTimeZone;\n\t\t\tlocalTimeValid = false;\n\t\t}\n\n\tprivate:\n\t\tFirebird::TimeStamp gmtTimeStamp;\t\t// Start time of request in GMT time zone\n\n\t\tmutable bool localTimeStampValid = false;\t// localTimeStamp calculation is expensive. So is it valid (calculated)?\n\t\tmutable bool localTimeValid = false;\t\t// localTime calculation is expensive. So is it valid (calculated)?\n\t\t// These are valid only when !gmtTimeStamp.isEmpty(), so no initialization is necessary.\n\t\tmutable ISC_TIMESTAMP localTimeStamp;\t// Timestamp in timeZone&#x27;s zone\n\t\tmutable ISC_USHORT timeZone;\t\t\t// Timezone borrowed from the attachment when updated\n\t\tmutable ISC_TIME localTime;\t\t\t\t// gmtTimeStamp converted to local time (WITH TZ)\n\t};\n\n\t// Fields to support read consistency in READ COMMITTED transactions\n\n\tstruct SnapshotData\n\t{\n\t\tRequest*\t\tm_owner;\n\t\tSnapshotHandle\tm_handle;\n\t\tCommitNumber\tm_number;\n\n\t\tvoid init() noexcept\n\t\t{\n\t\t\tm_owner = nullptr;\n\t\t\tm_handle = 0;\n\t\t\tm_number = 0;\n\t\t}\n\t};\n\n\t// Context data saved/restored with every new autonomous transaction\n\n\tstruct AutoTranCtx\n\t{\n\t\tAutoTranCtx() noexcept\n\t\t{\n\t\t\tm_snapshot.init();\n\t\t};\n\n\t\tAutoTranCtx(const Request* request) noexcept :\n\t\t\tm_transaction(request-&gt;req_transaction),\n\t\t\tm_savepoints(request-&gt;req_savepoints),\n\t\t\tm_proc_savepoints(request-&gt;req_proc_sav_point),\n\t\t\tm_snapshot(request-&gt;req_snapshot)\n\t\t{}\n\n\t\tjrd_tra*\t\tm_transaction = nullptr;\n\t\tSavepoint*\t\tm_savepoints = nullptr;\n\t\tSavepoint*\t\tm_proc_savepoints = nullptr;\n\t\tSnapshotData\tm_snapshot;\n\t};\n\npublic:\n\tRequest(Firebird::AutoMemoryPool&amp; pool, Attachment* attachment, /*const*/ Statement* aStatement)\n\t\t: statement(aStatement),\n\t\t  req_pool(pool),\n\t\t  req_memory_stats(&amp;aStatement-&gt;pool-&gt;getStatsGroup()),\n\t\t  req_blobs(*req_pool),\n\t\t  req_stats(*req_pool),\n\t\t  req_base_stats(*req_pool),\n\t\t  req_ext_stmt(NULL),\n\t\t  req_cursors(*req_pool),\n\t\t  req_ext_resultset(NULL),\n\t\t  req_timeout(0),\n\t\t  req_domain_validation(NULL),\n\t\t  req_auto_trans(*req_pool),\n\t\t  req_sorts(*req_pool, attachment-&gt;att_database),\n\t\t  req_rpb(*req_pool),\n\t\t  impureArea(*req_pool)\n\t{\n\t\tfb_assert(statement);\n\t\tsetAttachment(attachment);\n\t\treq_rpb = statement-&gt;rpbsSetup;\n\t\timpureArea.grow(statement-&gt;impureSize);\n\n\t\tpool-&gt;setStatsGroup(req_memory_stats);\n\t\tpool.release();\n\t}\n\n\tStatement* getStatement() noexcept\n\t{\n\t\treturn statement;\n\t}\n\n\tconst Statement* getStatement() const noexcept\n\t{\n\t\treturn statement;\n\t}\n\n\tbool hasInternalStatement() const noexcept\n\t{\n\t\treturn statement-&gt;flags &amp; Statement::FLAG_INTERNAL;\n\t}\n\n\tbool hasPowerfulStatement() const noexcept\n\t{\n\t\treturn statement-&gt;flags &amp; Statement::FLAG_POWERFUL;\n\t}\n\n\tvoid setAttachment(Attachment* newAttachment) noexcept\n\t{\n\t\treq_attachment = newAttachment;\n\t}\n\n\tbool isRoot() const\n\t{\n\t\treturn statement-&gt;requests.hasData() &amp;&amp; this == statement-&gt;requests[0];\n\t}\n\n\tbool isRequestIdUnassigned() const noexcept\n\t{\n\t\treturn req_id == 0;\n\t}\n\n\tStmtNumber getRequestId() const\n\t{\n\t\tif (!req_id)\n\t\t{\n\t\t\treq_id = isRoot() ?\n\t\t\t\tstatement-&gt;getStatementId() :\n\t\t\t\tJRD_get_thread_data()-&gt;getDatabase()-&gt;generateStatementId();\n\t\t}\n\n\t\treturn req_id;\n\t}\n\n\tvoid setRequestId(StmtNumber id) noexcept\n\t{\n\t\treq_id = id;\n\t}\n\nprivate:\n\tStatement* const statement;\n\tmutable StmtNumber\treq_id;\t\t\t// request identifier\n\tTimeStampCache req_timeStampCache;\t// time stamp cache\n\npublic:\n\tMemoryPool* req_pool;\n\tFirebird::MemoryStats req_memory_stats;\n\tAttachment*\treq_attachment;\t\t\t// database attachment\n\tUSHORT\t\treq_incarnation;\t\t// incarnation number\n\n\t// Transaction pointer and doubly linked list pointers for requests in this\n\t// transaction. Maintained by TRA_attach_request/TRA_detach_request.\n\tjrd_tra*\treq_transaction;\n\tRequest*\treq_tra_next;\n\tRequest*\treq_tra_prev;\n\n\tRequest*\treq_caller;\t\t\t\t// Caller of this request\n\t\t\t\t\t\t\t\t\t\t// This field may be used to reconstruct the whole call stack\n\tTempBlobIdTree req_blobs;\t\t\t// Temporary BLOBs owned by this request\n\tconst StmtNode*\treq_message;\t\t// Current message for send/receive\n\n\tULONG\t\treq_records_selected;\t// count of records selected by request (meeting selection criteria)\n\tULONG\t\treq_records_inserted;\t// count of records inserted by request\n\tULONG\t\treq_records_updated;\t// count of records updated by request\n\tULONG\t\treq_records_deleted;\t// count of records deleted by request\n\tRuntimeStatistics\treq_stats;\n\tRuntimeStatistics\treq_base_stats;\n\tAffectedRows req_records_affected;\t// records affected by the last statement\n\tFB_UINT64 req_profiler_ticks;\t\t// profiler ticks\n\n\tconst StmtNode*\treq_next;\t\t\t// next node for execution\n\tEDS::Statement*\treq_ext_stmt;\t\t// head of list of active dynamic statements\n\tFirebird::Array&lt;const Cursor*&gt;\treq_cursors;\t// named cursors\n\tExtEngineManager::ResultSet*\treq_ext_resultset;\t// external result set\n\tUSHORT\t\treq_label;\t\t\t\t// label for leave\n\tULONG\t\treq_flags;\t\t\t\t// misc request flags\n\tSavepoint*\treq_savepoints;\t\t\t// Looper savepoint list\n\tSavepoint*\treq_proc_sav_point;\t\t// procedure savepoint list\n\tunsigned int req_timeout;\t\t\t\t\t// query timeout in milliseconds, set by the DsqlRequest::setupTimer\n\tFirebird::RefPtr&lt;TimeoutTimer&gt; req_timer;\t// timeout timer, shared with DsqlRequest\n\n\tFirebird::AutoPtr&lt;Jrd::RuntimeStatistics&gt; req_fetch_baseline; // State of request performance counters when we reported it last time\n\tSINT64 req_fetch_elapsed;\t// Number of clock ticks spent while fetching rows for this request since we reported it last time\n\tSINT64 req_fetch_rowcount;\t// Total number of rows returned by this request\n\tRequest* req_proc_caller;\t// Procedure&#x27;s caller request\n\tconst ValueListNode* req_proc_inputs;\t// and its node with input parameters\n\tTraNumber req_conflict_txn;\t// Transaction number for update conflict in read consistency mode\n\n\tULONG req_src_line;\n\tULONG req_src_column;\n\n\tdsc*\t\t\treq_domain_validation;\t// Current VALUE for constraint validation\n\tFirebird::Stack&lt;AutoTranCtx&gt; req_auto_trans;\t// Autonomous transactions\n\tSortOwner req_sorts;\n\tFirebird::Array&lt;record_param&gt; req_rpb;\t// record parameter blocks\n\tFirebird::Array&lt;UCHAR&gt; impureArea;\t\t// impure area\n\tTriggerAction req_trigger_action;\t\t// action that caused trigger to fire\n\tSnapshotData req_snapshot;\n\tStatusXcp req_last_xcp;\t\t\t// last known exception\n\tbool req_batch_mode;\n\n\tenum req_s {\n\t\treq_evaluate,\n\t\treq_return,\n\t\treq_receive,\n\t\treq_send,\n\t\treq_proceed,\n\t\treq_sync,\n\t\treq_unwind\n\t} req_operation;\t\t\t\t// operation for next node\n\n\ttemplate &lt;typename T&gt; T* getImpure(unsigned offset)\n\t{\n\t\treturn reinterpret_cast&lt;T*&gt;(&amp;impureArea[offset]);\n\t}\n\ttemplate &lt;typename T&gt; const T* getImpure(unsigned offset) const\n\t{\n\t\treturn reinterpret_cast&lt;const T*&gt;(&amp;impureArea[offset]);\n\t}\n\n\tvoid adjustCallerStats()\n\t{\n\t\tif (req_caller) {\n\t\t\treq_caller-&gt;req_stats.adjust(req_base_stats, req_stats);\n\t\t}\n\t\treq_base_stats.assign(req_stats);\n\t}\n\n\t// Save context when switching to the autonomous transaction\n\tvoid pushTransaction()\n\t{\n\t\tfb_assert(req_transaction); // must be attached\n\n\t\treq_auto_trans.push(this);\n\t\treq_savepoints = nullptr;\n\t\treq_proc_sav_point = nullptr;\n\t\treq_snapshot.init();\n\t}\n\n\t// Restore context\n\tjrd_tra* popTransaction()\n\t{\n\t\tfb_assert(!req_transaction); // must be detached\n\n\t\tconst auto tmp = req_auto_trans.pop();\n\t\treq_savepoints = tmp.m_savepoints;\n\t\treq_proc_sav_point = tmp.m_proc_savepoints;\n\t\treq_snapshot = tmp.m_snapshot;\n\n\t\treturn tmp.m_transaction;\n\t}\n\n\tvoid invalidateTimeStamp()\n\t{\n\t\treq_timeStampCache.invalidate();\n\t}\n\n\tISC_TIMESTAMP getLocalTimeStamp() const\n\t{\n\t\treturn req_timeStampCache.getLocalTimeStamp(req_attachment-&gt;att_current_timezone);\n\t}\n\n\tISC_TIMESTAMP getGmtTimeStamp() const\n\t{\n\t\treturn req_timeStampCache.getGmtTimeStamp();\n\t}\n\n\tvoid setGmtTimeStamp(ISC_TIMESTAMP ts)\n\t{\n\t\treq_timeStampCache.setGmtTimeStamp(req_attachment-&gt;att_current_timezone, ts);\n\t}\n\n\tISC_TIMESTAMP_TZ getTimeStampTz() const\n\t{\n\t\treturn req_timeStampCache.getTimeStampTz(req_attachment-&gt;att_current_timezone);\n\t}\n\n\tISC_TIME_TZ getTimeTz() const\n\t{\n\t\treturn req_timeStampCache.getTimeTz(req_attachment-&gt;att_current_timezone);\n\t}\n\n\tvoid validateTimeStamp()\n\t{\n\t\treq_timeStampCache.validate(req_attachment-&gt;att_current_timezone);\n\t}\n};\n\n// Flags for req_flags\ninline constexpr ULONG req_active\t\t\t= 0x1L;\ninline constexpr ULONG req_stall\t\t\t= 0x2L;\ninline constexpr ULONG req_leave\t\t\t= 0x4L;\ninline constexpr ULONG req_null\t\t\t= 0x8L;\ninline constexpr ULONG req_abort\t\t\t= 0x10L;\ninline constexpr ULONG req_error_handler\t= 0x20L;\t\t// looper is called to handle error\ninline constexpr ULONG req_warning\t\t\t= 0x40L;\ninline constexpr ULONG req_in_use\t\t\t= 0x80L;\ninline constexpr ULONG req_continue_loop\t= 0x100L;\t\t// PSQL continue statement\ninline constexpr ULONG req_proc_fetch\t\t= 0x200L;\t\t// Fetch from procedure in progress\ninline constexpr ULONG req_proc_select\t\t= 0x400L;\t\t// Select from procedure in progress\ninline constexpr ULONG req_same_tx_upd\t\t= 0x800L;\t\t// record was updated by same transaction\ninline constexpr ULONG req_reserved\t\t= 0x1000L;\t\t// Request reserved for client\ninline constexpr ULONG req_update_conflict\t= 0x2000L;\t\t// We need to restart request due to update conflict\ninline constexpr ULONG req_restart_ready\t= 0x4000L;\t\t// Request is ready to restart in case of update conflict\n\n\n// Index lock block\n\nclass IndexLock : public pool_alloc&lt;type_idl&gt;\n{\npublic:\n\tIndexLock*\tidl_next;\t\t// Next index lock block for relation\n\tLock*\t\tidl_lock;\t\t// Lock block\n\tjrd_rel*\tidl_relation;\t// Parent relation\n\tUSHORT\t\tidl_id;\t\t\t// Index id\n\tUSHORT\t\tidl_count;\t\t// Use count\n};\n\n} //namespace Jrd\n\n#endif // JRD_REQ_H\n"}, "/build/src/jrd/ods.h": {"id": "/build/src/jrd/ods.h", "filePath": "src/jrd/ods.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tods.h\n *\tDESCRIPTION:\tOn disk structure definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2000.11.29 Patrick J. P. Griffin: fixed bug SF #116733\n *\tAdd typedef struct gpg to properly document the layout of the generator page\n * 2002.08.26 Dmitry Yemanov: minor ODS change (new indices on system tables)\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n * 2002.10.30 Sean Leyne - Removed support for obsolete &quot;PC_PLATFORM&quot; define\n *\n */\n\n#ifndef JRD_ODS_H\n#define JRD_ODS_H\n\n#include &quot;../jrd/RecordNumber.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/Uuid.h&quot;\n\n// This macro enables the ability of the engine to connect to databases\n// from ODS 8 up to the latest.  If this macro is undefined, the engine\n// only opens a database of the current ODS major version.\n\n//#define ODS_8_TO_CURRENT\n\n/**********************************************************************\n**\n** NOTE:\n**\n**   ODS 5 was shipped with version 3.3 but no longer supported\n**   ODS 6 and ODS 7 never went out the door\n**   ODS 8 was shipped with version 4.0\n**   ODS 9 was going to be shipped with version 4.5 but never was released,\n**         thus it became v5.0&#x27;s ODS.\n**   ODS 10 was shipped with IB version 6.0\n**   Here the Firebird history begins:\n**   ODS 10.0 is for FB1.0 and ODS 10.1 is for FB1.5.\n**   ODS 11.0 is for FB2.0, ODS 11.1 is for FB2.1 and ODS 11.2 is for FB2.5.\n**   ODS 12.0 is for FB3.\n**   ODS 13.0 is for FB4, ODS 13.1 is for FB5.\n**   ODS 14.0 is for FB6.\n**\n***********************************************************************/\n\n// ODS major version -- major versions are not compatible\n\n//const USHORT ODS_VERSION6\t= 6;\t\t// on-disk structure as of v3.0\n//const USHORT ODS_VERSION7\t= 7;\t\t// new on disk structure for fixing index bug\ninline constexpr USHORT ODS_VERSION8\t= 8;\t\t// new btree structure to support pc semantics\ninline constexpr USHORT ODS_VERSION9\t= 9;\t\t// btree leaf pages are always propagated up\ninline constexpr USHORT ODS_VERSION10\t= 10;\t\t// V6.0 features. SQL delimited idetifier,\n\t\t\t\t\t\t\t\t\t\t\t\t\t// SQLDATE, and 64-bit exact numeric type\ninline constexpr USHORT ODS_VERSION11\t= 11;\t\t// Firebird 2.x features\ninline constexpr USHORT ODS_VERSION12\t= 12;\t\t// Firebird 3.x features\ninline constexpr USHORT ODS_VERSION13\t= 13;\t\t// Firebird 4.x features\ninline constexpr USHORT ODS_VERSION14\t= 14;\t\t// Firebird 6.x features\n\n// ODS minor version -- minor versions ARE compatible, but may be\n// increasingly functional.  Add new minor versions, but leave previous\n// names intact\n\n// Minor versions for ODS 6\n\n//const USHORT ODS_GRANT6\t\t= 1;\t// adds fields for field level grant\n//const USHORT ODS_INTEGRITY6\t= 2;\t// adds fields for referential integrity\n//const USHORT ODS_FUNCTIONS6\t= 3;\t// modifies type of RDB$MODULE_NAME field\n//const USHORT ODS_SQLNAMES6\t= 4;\t// permits SQL security on &gt; 27 SCHAR names\n//const USHORT ODS_CURRENT6\t\t= 4;\n\n// Minor versions for ODS 7\n\n//const USHORT ODS_FUNCTIONS7\t= 1;\t// modifies type of RDB$MODULE_NAME field\n//const USHORT ODS_SQLNAMES7\t= 2;\t// permits SQL security on &gt; 27 SCHAR names\n//const USHORT ODS_CURRENT7\t\t= 2;\n\n// Minor versions for ODS 8\n\n//const USHORT ODS_CASCADE_RI8\t= 1;\t// permits cascading referential integrity\n\t\t\t\t\t\t\t\t\t\t// ODS 8.2 is the same as ODS 8.1\n//const USHORT ODS_CURRENT8\t\t= 2;\n\n// Minor versions for ODS 9\n\n//const USHORT ODS_CURRENT_9_0\t= 0;\t// SQL roles &amp; Index garbage collection\n//const USHORT ODS_SYSINDEX9\t= 1;\t// Index on RDB$CHECK_CONSTRAINTS (RDB$TRIGGER_NAME)\n//const USHORT ODS_CURRENT9\t\t= 1;\n\n// Minor versions for ODS 10\n\n//const USHORT ODS_CURRENT10_0\t= 0;\t// V6.0 features. SQL delimited identifier,\n\t\t\t\t\t\t\t\t\t\t// SQLDATE, and 64-bit exact numeric type\n//const USHORT ODS_SYSINDEX10\t= 1;\t// New system indices\n//const USHORT ODS_CURRENT10\t= 1;\n\n// Minor versions for ODS 11\n\n//const USHORT ODS_CURRENT11_0\t= 0;\t// Firebird 2.0 features\n//const USHORT ODS_CURRENT11_1\t= 1;\t// Firebird 2.1 features\n//const USHORT ODS_CURRENT11_2\t= 2;\t// Firebird 2.5 features\n//const USHORT ODS_CURRENT11\t= 2;\n\n// Minor versions for ODS 12\n\ninline constexpr USHORT ODS_CURRENT12_0\t= 0;\t// Firebird 3.0 features\ninline constexpr USHORT ODS_CURRENT12\t= 0;\n\n// Minor versions for ODS 13\n\ninline constexpr USHORT ODS_CURRENT13_0\t= 0;\t// Firebird 4.0 features\ninline constexpr USHORT ODS_CURRENT13_1\t= 1;\t// Firebird 5.0 features\ninline constexpr USHORT ODS_CURRENT13\t= 1;\n\n// Minor versions for ODS 14\n\ninline constexpr USHORT ODS_CURRENT14_0\t= 0;\t// Firebird 6.0 features\ninline constexpr USHORT ODS_CURRENT14\t= 0;\n\n// useful ODS macros. These are currently used to flag the version of the\n// system triggers and system indices in ini.e\n\ninline constexpr USHORT ENCODE_ODS(USHORT major, USHORT minor)\n{\n\treturn ((major &lt;&lt; 4) | minor);\n}\n\ninline constexpr USHORT ODS_8_0\t\t= ENCODE_ODS(ODS_VERSION8, 0);\ninline constexpr USHORT ODS_8_1\t\t= ENCODE_ODS(ODS_VERSION8, 1);\ninline constexpr USHORT ODS_9_0\t\t= ENCODE_ODS(ODS_VERSION9, 0);\ninline constexpr USHORT ODS_9_1\t\t= ENCODE_ODS(ODS_VERSION9, 1);\ninline constexpr USHORT ODS_10_0\t= ENCODE_ODS(ODS_VERSION10, 0);\ninline constexpr USHORT ODS_10_1\t= ENCODE_ODS(ODS_VERSION10, 1);\ninline constexpr USHORT ODS_11_0\t= ENCODE_ODS(ODS_VERSION11, 0);\ninline constexpr USHORT ODS_11_1\t= ENCODE_ODS(ODS_VERSION11, 1);\ninline constexpr USHORT ODS_11_2\t= ENCODE_ODS(ODS_VERSION11, 2);\ninline constexpr USHORT ODS_12_0\t= ENCODE_ODS(ODS_VERSION12, 0);\ninline constexpr USHORT ODS_13_0\t= ENCODE_ODS(ODS_VERSION13, 0);\ninline constexpr USHORT ODS_13_1\t= ENCODE_ODS(ODS_VERSION13, 1);\ninline constexpr USHORT ODS_14_0\t= ENCODE_ODS(ODS_VERSION14, 0);\n\ninline constexpr USHORT ODS_FIREBIRD_FLAG = 0x8000;\n\n// Decode ODS version to Major and Minor parts. The 4 LSB&#x27;s are minor and\n// the next 11 bits are major version number. The highest significant bit\n// is the Firebird database flag.\ninline constexpr USHORT DECODE_ODS_MAJOR(USHORT ods_version)\n{\n\treturn ((ods_version &amp; 0x7FF0) &gt;&gt; 4);\n}\n\ninline constexpr USHORT DECODE_ODS_MINOR(USHORT ods_version)\n{\n\treturn (ods_version &amp; 0x000F);\n}\n\n// Set current ODS major and minor version\n\ninline constexpr USHORT ODS_VERSION = ODS_VERSION14;\t\t// Current ODS major version -- always\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// the highest.\n\ninline constexpr USHORT ODS_RELEASED = ODS_CURRENT14_0;\t\t// The lowest stable minor version\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// number for this ODS_VERSION!\n\ninline constexpr USHORT ODS_CURRENT = ODS_CURRENT14;\t\t// The highest defined minor version\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// number for this ODS_VERSION!\n\ninline constexpr USHORT ODS_CURRENT_VERSION = ODS_14_0;\t\t// Current ODS version in use which includes\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// both major and minor ODS versions!\n\n\n//const USHORT USER_REL_INIT_ID_ODS8\t= 31;\t// ODS &lt; 9 ( &lt;= 8.2)\ninline constexpr USHORT USER_DEF_REL_INIT_ID = 128;\t// ODS &gt;= 9\n\n\n// Page types\n\ninline constexpr SCHAR pag_undefined\t\t= 0;\ninline constexpr SCHAR pag_header\t\t\t= 1;\t\t// Database header page\ninline constexpr SCHAR pag_pages\t\t\t= 2;\t\t// Page inventory page\ninline constexpr SCHAR pag_transactions\t\t= 3;\t\t// Transaction inventory page\ninline constexpr SCHAR pag_pointer\t\t\t= 4;\t\t// Pointer page\ninline constexpr SCHAR pag_data\t\t\t\t= 5;\t\t// Data page\ninline constexpr SCHAR pag_root\t\t\t\t= 6;\t\t// Index root page\ninline constexpr SCHAR pag_index\t\t\t= 7;\t\t// Index (B-tree) page\ninline constexpr SCHAR pag_blob\t\t\t\t= 8;\t\t// Blob data page\ninline constexpr SCHAR pag_ids\t\t\t\t= 9;\t\t// Gen-ids\ninline constexpr SCHAR pag_scns\t\t\t\t= 10;\t\t// SCN&#x27;s inventory page\ninline constexpr SCHAR pag_max\t\t\t\t= 10;\t\t// Max page type\n\n// Pre-defined page numbers\n\ninline constexpr ULONG HEADER_PAGE\t\t= 0;\ninline constexpr ULONG FIRST_PIP_PAGE\t= 1;\ni
