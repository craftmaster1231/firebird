      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

      });
    }, 0);
  }
}

void using very small values because overhead for each page is 28-32 bytes on\n// 32-bit platforms. Node pages are optimal to be significantly larger because\n// they are modified less often, but are searched much more often.\n//\n// Values below are fine-tuned for AMD Athlon 64 3000+ with DDR400 memory.\ninline constexpr int LEAF_PAGE_SIZE = 400;\ninline constexpr int NODE_PAGE_SIZE = 3000;\n\n// This is maximum level of tree nesting. 10^9 elements for binary tree case\n// should be more than enough. No checks are performed in code against overflow of this value\ninline constexpr int MAX_TREE_LEVEL = 30;\n\nenum LocType { locEqual, locLess, locGreat, locGreatEqual, locLessEqual };\n\n// Fast and simple B+ tree of simple types.\n// Tree is always accessed via accessor classes. There is default accessor\n// built into the class to simplify programming in single-threaded\n// non-reentrant access model.\n//\n// Notes:\n//\n// 1) Items in the tree MUST be unique (this is performance optimization),\n// you can always convert set of non-unique items to a set of unique items with count\n// like this:\n//  struct TreeItem\n//\t{\n//      Value value;\n//      int count;\n//      static const Key&amp; generate(void *sender, const TreeItem&amp; item)\n//\t\t{\n//          return KeyOfValue::generate(sender, value);\n//      }\n//  }\n// Small and simple (just a few lines) template derived from BePlusTree can be created\n// for this when real need arises. It will still be much faster than allowing duplicates\n// in BePlusTree itself\n//\n// 2) We could store ultimate item count for each node and make tree accessible like\n// an indexed dynamic array without increase of algorithm calculation costs (this is one\n// more classical B+ tree feature). This is also not done to improve tree performance a little\n//\ntemplate &lt;typename Value, typename Key = Value,\n\t\t  typename KeyOfValue = DefaultKeyValue&lt;Value&gt;,\n\t\t  typename Cmp = DefaultComparator&lt;Key&gt; &gt;\nclass BePlusTree\n{\n\tstatic constexpr FB_SIZE_T LEAF_COUNT = LEAF_PAGE_SIZE / sizeof(Value);\n\tstatic constexpr FB_SIZE_T NODE_COUNT = NODE_PAGE_SIZE / sizeof(void*);\npublic:\n\texplicit BePlusTree(Firebird::MemoryPool&amp; _pool)\n\t\t: pool(&amp;_pool), level(0), defaultAccessor(this)\n\t{ }\n\n\tBePlusTree(Firebird::MemoryPool&amp; _pool, const BePlusTree&amp; from)\n\t\t: pool(&amp;_pool), level(0), defaultAccessor(this)\n\t{\n\t\tappend(from);\n\t}\n\n\tBePlusTree&amp; operator =(const BePlusTree&amp; from)\n\t{\n\t\tclear();\n\t\tappend(from);\n\t\treturn *this;\n\t}\n\n\tvoid clear()\n\t{\n\t\tdefaultAccessor.curr = nullptr;\n\n\t\t// Do not deallocate root page if tree is shallow\n\t\tif (level == 0)\n\t\t{\n\t\t\tif (root) {\n\t\t\t\troot.items-&gt;clear();\n\t\t\t}\n\t\t\treturn;\n\t\t}\n\n\t\t// Find first items page\n\t\tNodePtr temp = root;\n\t\tfor (int i = level; i &gt; 0; i--)\n\t\t\ttemp = (*temp.nodes)[0];\n\t\tItemList *items = temp.items;\n\n\t\t// Delete all items pages\n\t\tNodeList *lists = items-&gt;parent;\n\t\twhile (items)\n\t\t{\n\t\t\tItemList *t = items-&gt;next;\n\t\t\tdelete items;\n\t\t\titems = t;\n\t\t}\n\n\t\t// Delete all upper layers of tree\n\t\twhile (lists)\n\t\t{\n\t\t\tNodeList *list = lists;\n\t\t\tlists = lists-&gt;parent;\n\t\t\twhile (list)\n\t\t\t{\n\t\t\t\tNodeList *t = list-&gt;next;\n\t\t\t\tdelete list;\n\t\t\t\tlist = t;\n\t\t\t}\n\t\t}\n\n\t\t// Initialize fields to make tree usable again\n\t\troot.items = nullptr;\n\t\tlevel = 0;\n\t}\n\n    ~BePlusTree()\n\t{\n\t\tclear();\n\t\tdelete root.items;\n\t}\n\n\tbool isEmpty() const\n\t{\n\t\treturn !root || (level == 0 &amp;&amp; root.items-&gt;getCount() == 0);\n\t}\n\n\tbool add(const Value&amp; item) { return defaultAccessor.add(item); }\n\n\tclass ConstAccessor;\n\tclass Accessor;\n\t// If item already exists method sets accessor&#x27;s current position\n\t// to found item&#x27;s location and returns false.\n\t// If item not exists method will add it to the tree
