      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

  }

nd&quot;, kind);\n\treturn SingleTpb;\n}\n\nvoid ClumpletReader::adjustSpbState()\n{\n\tif (kind == SpbStart &amp;&amp;\n\t\tspbState == 0 &amp;&amp;\t\t\t\t\t\t\t// Just started with service start block ...\n\t\tgetClumpletSize(true, true, true) == 1)\t\t// and this is action_XXX clumplet\n\t{\n\t\tspbState = getClumpTag();\n\t}\n}\n\nFB_SIZE_T ClumpletReader::getClumpletSize(bool wTag, bool wLength, bool wData) const\n{\n\tconst UCHAR* clumplet = getBuffer() + cur_offset;\n\tconst UCHAR* const buffer_end = getBufferEnd();\n\n\t// Check for EOF\n\tif (clumplet &gt;= buffer_end)\n\t{\n\t\tusage_mistake(&quot;read past EOF&quot;);\n\t\treturn 0;\n\t}\n\n\tFB_SIZE_T rc = wTag ? 1 : 0;\n\tFB_SIZE_T lengthSize = 0;\n\tFB_SIZE_T dataSize = 0;\n\n\tconst ClumpletType t = getClumpletType(clumplet[0]);\n\tswitch (t)\n\t{\n\n\t// This form allows clumplets of virtually any size\n\tcase Wide:\n\t\t// Check did we receive length component for clumplet\n\t\tif (buffer_end - clumplet &lt; 5)\n\t\t{\n\t\t\tinvalid_structure(&quot;buffer end before end of clumplet - no length component&quot;, buffer_end - clumplet);\n\t\t\treturn rc;\n\t\t}\n\t\tlengthSize = 4;\n\t\tdataSize = clumplet[4];\n\t\tdataSize &lt;&lt;= 8;\n\t\tdataSize += clumplet[3];\n\t\tdataSize &lt;&lt;= 8;\n\t\tdataSize += clumplet[2];\n\t\tdataSize &lt;&lt;= 8;\n\t\tdataSize += clumplet[1];\n\t\tbreak;\n\n\t// This is the most widely used form\n\tcase TraditionalDpb:\n\t\t// Check did we receive length component for clumplet\n\t\tif (buffer_end - clumplet &lt; 2)\n\t\t{\n\t\t\tinvalid_structure(&quot;buffer end before end of clumplet - no length component&quot;, buffer_end - clumplet);\n\t\t\treturn rc;\n\t\t}\n\t\tlengthSize = 1;\n\t\tdataSize = clumplet[1];\n\t\tbreak;\n\n\t// Almost all TPB parameters are single bytes\n\tcase SingleTpb:\n\t\tbreak;\n\n\t// Used in SPB for long strings\n\tcase StringSpb:\n\t\t// Check did we receive length component for clumplet\n\t\tif (buffer_end - clumplet &lt; 3)\n\t\t{\n\t\t\tinvalid_structure(&quot;buffer end before end of clumplet - no length component&quot;, buffer_end - clumplet);\n\t\t\treturn rc;\n\t\t}\n\t\tlengthSize = 2;\n\t\tdataSize = clumplet[2];\n\t\tdataSize &lt;&lt;= 8;\n\t\tdataSize += clumplet[1];\n\t\tbreak;\n\n\t// Used in SPB for 4-byte integers\n\tcase IntSpb:\n\t\tdataSize = 4;\n\t\tbreak;\n\n\t// Used in SPB for 8-byte integers\n\tcase BigIntSpb:\n\t\tdataSize = 8;\n\t\tbreak;\n\n\t// Used in SPB for single byte\n\tcase ByteSpb:\n\t\tdataSize = 1;\n\t\tbreak;\n\n\tdefault:\n\t\tinvalid_structure(&quot;unknown clumplet type&quot;, t);\n\t\treturn rc;\n\t}\n\n\tconst FB_SIZE_T total = 1 + lengthSize + dataSize;\n\tif (clumplet + total &gt; buffer_end)\n\t{\n\t\tinvalid_structure(&quot;buffer end before end of clumplet - clumplet too long&quot;, total);\n\t\tconst FB_SIZE_T delta = total - (buffer_end - clumplet);\n\t\tif (delta &gt; dataSize)\n\t\t\tdataSize = 0;\n\t\telse\n\t\t\tdataSize -= delta;\n\t}\n\n\tif (wLength) {\n\t\trc += lengthSize;\n\t}\n\tif (wData) {\n\t\trc += dataSize;\n\t}\n\treturn rc;\n}\n\nvoid ClumpletReader::moveNext()\n{\n\tif (isEof())\n\t\treturn;\t\t// no need to raise useless exceptions\n\n\tif (kind == InfoResponse)\n\t{\n\t\tswitch (getClumpTag())\n\t\t{\n\t\tcase isc_info_end:\n\t\tcase isc_info_truncated:\n\t\t\t// terminating clumplet\n\t\t\tcur_offset = getBufferLength();\n\t\t\treturn;\n\t\tdefault:\n\t\t\tbreak;\n\t\t}\n\t}\n\n\tconst FB_SIZE_T cs = getClumpletSize(true, true, true);\n\tadjustSpbState();\n\tcur_offset += cs;\n}\n\nvoid ClumpletReader::rewind()\n{\n\tif (!getBuffer() || !isTagged())\n\t\tcur_offset = 0;\n\telse if (kind == SpbAttach &amp;&amp; getBufferLength() &gt; 0 &amp;&amp; getBuffer()[0] == isc_spb_version)\n\t\tcur_offset = 2;\n\telse\n\t\tcur_offset = 1;\n\tspbState = 0;\n}\n\nbool ClumpletReader::find(UCHAR tag)\n{\n\tconst FB_SIZE_T co = getCurOffset();\n\tfor (rewind(); !isEof(); moveNext())\n\t{\n\t\tif (tag == getClumpTag())\n\t\t{\n\t\t\treturn true;\n\t\t}\n\t}\n\tsetCurOffset(co);\n\treturn false;\n}\n\nbool ClumpletReader::next(UCHAR tag)\n{\n\tif (!isEof())\n\t{\n\t\tconst FB_SIZE_T co = getCurOffset();\n\t\tif (tag == getClumpTag())\n\t\t{\n\t\t\tmoveNext();\n\t\t}\n\t\tfor (; !isEof(); moveNext())\n\t\t{\n\t\t\tif (tag == getClumpTag())\n\t\t\t{\n\t\t\t\treturn true;\n\t\t\t}\n\t\t}\n\t\tsetCurOffset(co);\n\t}\n\treturn false;\n}\n\n// Methods which work with currently selected clumplet\nUCHAR ClumpletReader::getClumpTag() const\n{\n\tconst UCHAR* clumplet = getBuffer() + cur_offset;\n\tconst UCHAR* const buffer_end = getBufferEnd();\n\n\t// Check for EOF\n\tif (clumplet &gt;= buffer_end)\n\t{\n\t\tusage_mistake(&quot;read past EOF&quot;);\n\t\treturn 0;\n\t}\n\n\treturn clumplet[0];\n}\n\nFB_SIZE_T ClumpletReader::getClumpLength() const\n{\n\treturn getClumpletSize(false, false, true);\n}\n\nconst UCHAR* ClumpletReader::getBytes() const\n{\n\treturn getBuffer() + cur_offset + getClumpletSize(true, true, false);\n}\n\nSINT64 ClumpletReader::fromVaxInteger(const UCHAR* ptr, FB_SIZE_T length)\n{\n\t// We can&#x27;t handle numbers bigger than int64. Some cases use length == 0.\n\tfb_assert(ptr &amp;&amp; length &gt;= 0 &amp;&amp; length &lt; 9);\n\n\t// This code is taken from isc_portable_integer()\n\t// Be ready to parse buffer made by hand instead of ClumpletWriter\n\tif (!ptr || length &lt;= 0 || length &gt; 8)\n\t\treturn 0;\n\n\tSINT64 value = 0;\n\tint shift = 0;\n\n\twhile (--length &gt; 0)\n\t{\n\t\tvalue += ((SINT64) *ptr++) &lt;&lt; shift;\n\t\tshift += 8;\n\t}\n\n\tvalue += ((SINT64)(SCHAR) *ptr) &lt;&lt; shift;\n\n\treturn value;\n}\n\nSLONG ClumpletReader::getInt() const\n{\n\tconst FB_SIZE_T length = getClumpLength();\n\n\tif (length &gt; 4)\n\t{\n\t\tinvalid_structure(&quot;length of integer exceeds 4 bytes&quot;, length);\n\t\treturn 0;\n\t}\n\n\treturn fromVaxInteger(getBytes(), length);\n}\n\ndouble ClumpletReader::getDouble() const\n{\n\tconst FB_SIZE_T length = getClumpLength();\n\tif (length != sizeof(double))\n\t{\n\t\tinvalid_structure(&quot;length of double must be equal 8 bytes&quot;, length);\n\t\treturn 0;\n\t}\n\n\t// based on XDR code\n\tunion {\n\t\tdouble temp_double;\n\t\tSLONG temp_long[2];\n\t} temp;\n\n\tfb_assert(sizeof(double) == sizeof(temp));\n\n\tconst UCHAR* ptr = getBytes();\n\ttemp.temp_long[FB_LONG_DOUBLE_FIRST] = fromVaxInteger(ptr, sizeof(SLONG));\n\ttemp.temp_long[FB_LONG_DOUBLE_SECOND] = fromVaxInteger(ptr + sizeof(SLONG), sizeof(SLONG));\n\n\treturn temp.temp_double;\n}\n\nISC_TIMESTAMP ClumpletReader::getTimeStamp() const\n{\n\tISC_TIMESTAMP value;\n\n\tconst FB_SIZE_T length = getClumpLength();\n\tif (length != sizeof(ISC_TIMESTAMP))\n\t{\n\t\tinvalid_structure(&quot;length of ISC_TIMESTAMP must be equal 8 bytes&quot;, length);\n\t\tvalue.timestamp_date = 0;\n\t\tvalue.timestamp_time = 0;\n\t\treturn value;\n\t}\n\n\tconst UCHAR* ptr = getBytes();\n\tvalue.timestamp_date = fromVaxInteger(ptr, sizeof(SLONG));\n\tvalue.timestamp_time = fromVaxInteger(ptr + sizeof(SLONG), sizeof(SLONG));\n\treturn value;\n}\n\nSINT64 ClumpletReader::getBigInt() const\n{\n\tconst FB_SIZE_T length = getClumpLength();\n\n\tif (length &gt; 8)\n\t{\n\t\tinvalid_structure(&quot;length of BigInt exceeds 8 bytes&quot;, length);\n\t\treturn 0;\n\t}\n\n\treturn fromVaxInteger(getBytes(), length);\n}\n\nstring&amp; ClumpletReader::getString(string&amp; str) const\n{\n\tconst UCHAR* ptr = getBytes();\n\tconst FB_SIZE_T length = getClumpLength();\n\tstr.assign(reinterpret_cast&lt;const char*&gt;(ptr), length);\n\tstr.recalculate_length();\n\tif (str.length() + 1 &lt; length)\n\t{\n\t\tinvalid_structure(&quot;string length doesn&#x27;t match with clumplet&quot;, str.length() + 1);\n\t}\n\treturn str;\n}\n\nPathName&amp; ClumpletReader::getPath(PathName&amp; str) const\n{\n\tconst UCHAR* ptr = getBytes();\n\tconst FB_SIZE_T length = getClumpLength();\n\tstr.assign(reinterpret_cast&lt;const char*&gt;(ptr), length);\n\tstr.recalculate_length();\n\tif (str.length() + 1 &lt; length)\n\t{\n\t\tinvalid_structure(&quot;path length doesn&#x27;t match with clumplet&quot;, str.length() + 1);\n\t}\n\treturn str;\n}\n\nvoid ClumpletReader::getData(UCharBuffer&amp; data) const\n{\n\tdata.assign(getBytes(), getClumpLength());\n}\n\nbool ClumpletReader::getBoolean() const\n{\n\tconst UCHAR* ptr = getBytes();\n\tconst FB_SIZE_T length = getClumpLength();\n\tif (length &gt; 1)\n\t{\n\t\tinvalid_structure(&quot;length of boolean exceeds 1 byte&quot;, length);\n\t\treturn false;\n\t}\n\treturn length &amp;&amp; ptr[0];\n}\n\nClumpletReader::SingleClumplet ClumpletReader::getClumplet() const\n{\n\tSingleClumplet rc;\n\trc.tag = getClumpTag();\n\trc.size = getClumpletSize(false, false, true);\n\trc.data = getBytes();\n\treturn rc;\n}\n\nconst ClumpletReader::KindList ClumpletReader::dpbList[] = {\n\t{ClumpletReader::Tagged, isc_dpb_version1},\n\t{ClumpletReader::WideTagged, isc_dpb_version2},\n\t{ClumpletReader::EndOfList, 0}\n};\n\nconst ClumpletReader::KindList ClumpletReader::spbList[] = {\n\t{ClumpletReader::SpbAttach, isc_spb_current_version},\n\t{ClumpletReader::SpbAttach, isc_spb_version1},\n\t{ClumpletReader::WideTagged, isc_spb_version3},\n\t{ClumpletReader::EndOfList, 0}\n};\n\nAuthReader::AuthReader(const AuthBlock&amp; authBlock)\n\t: ClumpletReader(ClumpletReader::WideUnTagged, authBlock.begin(), authBlock.getCount())\n{\n\trewind();\n}\n\nAuthReader::AuthReader(MemoryPool&amp; pool, const AuthBlock&amp; authBlock)\n\t: ClumpletReader(pool, ClumpletReader::WideUnTagged, authBlock.begin(), authBlock.getCount())\n{\n\trewind();\n}\n\nstatic inline void erase(NoCaseString&amp; s) noexcept\n{\n\ts.erase();\n}\n\nstatic inline void set(NoCaseString&amp; s, const ClumpletReader&amp; rdr)\n{\n\ts.assign(rdr.getBytes(), rdr.getClumpLength());\n}\n\nbool AuthReader::getInfo(Info&amp; info)\n{\n\tif (isEof())\n\t{\n\t\treturn false;\n\t}\n\n\terase(info.type);\n\terase(info.name);\n\terase(info.plugin);\n\terase(info.secDb);\n\terase(info.origPlug);\n\n\tClumpletReader internal(WideUnTagged, getBytes(), getClumpLength());\n\tfor (internal.rewind(); !internal.isEof(); internal.moveNext())\n\t{\n\t\tswitch(internal.getClumpTag())\n\t\t{\n\t\tcase AUTH_TYPE:\n\t\t\tset(info.type, internal);\n\t\t\tbreak;\n\t\tcase AUTH_NAME:\n\t\t\tset(info.name, internal);\n\t\t\tbreak;\n\t\tcase AUTH_PLUGIN:\n\t\t\tset(info.plugin, internal);\n\t\t\tbreak;\n\t\tcase AUTH_SECURE_DB:\n\t\t\tset(info.secDb, internal);\n\t\t\tbreak;\n\t\tcase AUTH_ORIG_PLUG:\n\t\t\tset(info.origPlug, internal);\n\t\t\tbreak;\n\t\tdefault:\n\t\t\tbreak;\n\t\t}\n\t}\n\n\treturn true;\n}\n\n#ifdef AUTH_BLOCK_DEBUG\nvoid dumpAuthBlock(const char* text, ClumpletReader* pb, unsigned char param)\n{\n\tfprintf(stderr, &quot;AuthBlock in %s:&quot;, text);\n\tif (pb-&gt;find(param))\n\t{\n\t\tFirebird::AuthReader::AuthBlock tmp;\n\t\ttmp.assign(pb-&gt;getBytes(), pb-&gt;getClumpLength());\n\t\tFirebird::AuthReader rdr(tmp);\n\t\tstring name, plugin;\n\t\tPathName secureDb;\n\t\tbool x = false;\n\t\twhile (rdr.getInfo(&amp;name, &amp;plugin, &amp;secureDb))\n\t\t{\n\t\t\tfprintf(stderr, &quot; %s::%s::%s&quot;, name.c_str(), plugin.c_str(), secureDb.c_str());\n\t\t\tx = true;\n\t\t\trdr.moveNext();\n\t\t}\n\t\tfprintf(stderr, &quot;%s\\n&quot;, x ? &quot;&quot; : &quot; &lt;empty&gt;&quot;);\n\t}\n\telse\n\t{\n\t\tfprintf(stderr, &quot; &lt;missing&gt;\\n&quot;);\n\t}\n}\n#endif\n\n} // namespace\n"}, "/build/src/remote/server/server.cpp": {"id": "/build/src/remote/server/server.cpp", "filePath": "src/remote/server/server.cpp", "content": "/*\n *\tPROGRAM:\tJRD Remote Server\n *\tMODULE:\t\tserver.cpp\n *\tDESCRIPTION:\tRemote server\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.02.27 Claudio Valderrama: Fix SF Bug #509995.\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n * 2002.10.30 Sean Leyne - Removed support for obsolete &quot;PC_PLATFORM&quot; define\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &lt;stdio.h&gt;\n#include &lt;string.h&gt;\n#include &quot;ibase.h&quot;\t\t\t// fb_shutdown_callback() is used from it\n#include &quot;../common/gdsassert.h&quot;\n#ifdef UNIX\n#include &quot;../common/file_params.h&quot;\n#endif\n#include &quot;../remote/remote.h&quot;\n#include &quot;../common/file_params.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../remote/merge_proto.h&quot;\n#include &quot;../remote/parse_proto.h&quot;\n#include &quot;../remote/remot_proto.h&quot;\n#include &quot;../remote/server/serve_proto.h&quot;\n#ifdef WIN_NT\n#include &quot;../../remote/server/os/win32/cntl_proto.h&quot;\n#include &lt;stdlib.h&gt;\n#endif\n#ifdef HAVE_UNISTD_H\n#include &lt;unistd.h&gt;\n#endif\n#include &quot;../common/isc_proto.h&quot;\n#include &quot;../jrd/constants.h&quot;\n#include &quot;firebird/impl/inf_pub.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/semaphore.h&quot;\n#include &quot;../common/classes/ClumpletWriter.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#ifdef DEBUG\n#include &quot;iberror.h&quot;\n#endif\n#include &quot;../common/classes/FpeControl.h&quot;\n#include &quot;../remote/proto_proto.h&quot;\t// xdr_protocol_overhead()\n#include &quot;../common/classes/DbImplementation.h&quot;\n#include &quot;../common/Auth.h&quot;\n#include &quot;../common/classes/GetPlugins.h&quot;\n#include &quot;../common/StatementMetadata.h&quot;\n#include &quot;../common/isc_f_proto.h&quot;\n#include &quot;../auth/SecurityDatabase/LegacyHash.h&quot;\n#include &quot;../common/enc_proto.h&quot;\n#include &quot;../common/classes/InternalMessageBuffer.h&quot;\n#include &quot;../common/os/os_utils.h&quot;\n#include &quot;../common/security.h&quot;\n\nusing namespace Firebird;\n\n\nstruct server_req_t : public GlobalStorage\n{\n\tserver_req_t*\treq_next;\n\tserver_req_t*\treq_chain;\n\tRemPortPtr\t\treq_port;\n\tPACKET\t\t\treq_send;\n\tPACKET\t\t\treq_receive;\npublic:\n\tserver_req_t() : req_next(0), req_chain(0) { }\n};\n\nstruct srvr : public GlobalStorage\n{\n\tsrvr* const srvr_next;\n\tconst rem_port*\tconst srvr_parent_port;\n\tconst rem_port::rem_port_t srvr_port_type;\n\tconst USHORT srvr_flags;\n\npublic:\n\tsrvr(srvr* servers, rem_port* port, USHORT flags) :\n\t\tsrvr_next(servers), srvr_parent_port(port),\n\t\tsrvr_port_type(port-&gt;port_type), srvr_flags(flags)\n\t{ }\n};\n\nnamespace {\n\n// DB crypt key passthrough\n\nclass NetworkCallback : public VersionedIface&lt;ICryptKeyCallbackImpl&lt;NetworkCallback, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\texplicit NetworkCallback(rem_port* prt)\n\t\t: port(prt), replyLength(0), replyData(NULL), stopped(false), wake(false)\n\t{ }\n\n\tvoid wakeup(unsigned int wakeLength, const void* wakeData)\n\t{\n\t\tif (replyLength &gt; wakeLength)\n\t\t\treplyLength = wakeLength;\n\n\t\tif (wakeData)\n\t\t{\n\t\t\tmemcpy(replyData, wakeData, replyLength);\n\t\t\twake = true;\n\t\t}\n\t\telse\n\t\t\tstop();\n\n\t\tsem.release();\n\t}\n\n\tvoid stop()\n\t{\n\t\tstopped = true;\n\t}\n\n\tbool isStopped() const\n\t{\n\t\treturn stopped;\n\t}\n\n\t// ICryptKeyCallback implementation\n\tunsigned int callback(unsigned int dataLength, const void* data,\n\t\tunsigned int bufferLength, void* buffer) override\n\t{\n\t\tif (stopped)\n\t\t\treturn 0;\n\n\t\tif (port-&gt;port_protocol &lt; PROTOCOL_VERSION13 || port-&gt;port_type != rem_port::INET)\n\t\t\treturn 0;\n\n\t\tReference r(*port);\n\n\t\treplyData = buffer;\n\t\treplyLength = bufferLength;\n\n\t\tPACKET p;\n\t\tp.p_operation = op_crypt_key_callback;\n\t\tp.p_cc.p_cc_data.cstr_length = dataLength;\n\t\tp.p_cc.p_cc_data.cstr_address = (UCHAR*) data;\n\t\tp.p_cc.p_cc_reply = bufferLength;\n\t\tport-&gt;send(&amp;p);\n\n\t\tif (!sem.tryEnter(60))\n\t\t\treturn 0;\n\n\t\treturn replyLength;\n\t}\n\n\tint getHashLength(Firebird::CheckStatusWrapper* status) override\n\t{\n\t\tgetHashData(status, nullptr);\n\n\t\treturn -1;\n\t}\n\n\tvoid getHashData(Firebird::CheckStatusWrapper* status, void* h) override\n\t{\n\t\tconstexpr ISC_STATUS err[] = {isc_arg_gds, isc_wish_list};\n\t\tstatus-&gt;setErrors2(FB_NELEM(err), err);\n\t}\n\nprivate:\n\trem_port* port;\n\tSemaphore sem;\n\tunsigned int replyLength;\n\tvoid* replyData;\n\tbool stopped;\n\npublic:\n\tbool wake;\n};\n\nclass CryptKeyCallback : public VersionedIface&lt;ICryptKeyCallbackImpl&lt;CryptKeyCallback, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\texplicit CryptKeyCallback(rem_port* prt)\n\t\t: port(prt), networkCallback(prt)\n\t{ }\n\n\t~CryptKeyCallback()\n\t{\n\t\tdispose();\n\t\tif (keyHolder)\n\t\t\tPluginManagerInterfacePtr()-&gt;releasePlugin(keyHolder);\n\t}\n\n\tvoid loadClientKey()\n\t{\n\t\tif (clientKeyChecked)\n\t\t\treturn;\n\n\t\tReference r(*port);\n\n\t\tfor (GetPlugins&lt;IKeyHolderPlugin&gt; kh(IPluginManager::TYPE_KEY_HOLDER, port-&gt;getPortConfig());\n\t\t\tkh.hasData(); kh.next())\n\t\t{\n\t\t\tIKeyHolderPlugin* keyPlugin = kh.plugin();\n\t\t\tLocalStatus ls;\n\t\t\tCheckStatusWrapper st(&amp;ls);\n\n\t\t\tnetworkCallback.wake = false;\n\t\t\tbool callbackResult = keyPlugin-&gt ception\n\t\t\t\tLocalStatus ls;\n\t\t\t\tCheckStatusWrapper status_vector(&amp;ls);\n\t\t\t\te.stuffException(&amp;status_vector);\n\t\t\t\tiscLogStatus(&quot;SRVR_multi_thread: unhandled exception&quot;, &amp;status_vector);\n\n\t\t\t\t// If we got as far as having a port allocated before the error, disconnect it\n\t\t\t\t// gracefully.\n\n\t\t\t\tif (port)\n\t\t\t\t{\n\t\t\t\t\tgds__log(&quot;SRVR_multi_thread: forcefully disconnecting a port&quot;);\n\n\t\t\t\t\t// Avoid errors inside handler\n\t\t\t\t\ttry\n\t\t\t\t\t{\n\t\t\t\t\t\t// If we have a port, request really should be non-null, but just in case ...\n\t\t\t\t\t\tif (request != NULL)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\t// Send client a real status indication of why we disconnected them\n\t\t\t\t\t\t\t// Note that send_response() can post errors that wind up in this same handler\n\t\t\t\t\t\t\tport-&gt;send_response(&amp;request-&gt;req_send, 0, 0, &amp;status_vector, false);\n\t\t\t\t\t\t\tport-&gt;disconnect(&amp;request-&gt;req_send, &amp;request-&gt;req_receive);\n\t\t\t\t\t\t}\n\t\t\t\t\t\telse\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\t// Can&#x27;t tell the client much, just make &#x27;em go away.  Their side should detect\n\t\t\t\t\t\t\t// a network error\n\t\t\t\t\t\t\tport-&gt;disconnect(NULL, NULL);\n\t\t\t\t\t\t}\n\t\t\t\t\t}\t// try\n\t\t\t\t\tcatch (const Exception&amp;)\n\t\t\t\t\t{\n\t\t\t\t\t\tport-&gt;disconnect(NULL, NULL);\n\t\t\t\t\t}\n\n\t\t\t\t\tport = NULL;\n\t\t\t\t}\n\n\t\t\t\t// There was an error in the processing of the request, if we have allocated\n\t\t\t\t// a request, free it up and continue.\n\t\t\t\tif (request != NULL)\n\t\t\t\t{\n\t\t\t\t\tfree_request(request);\n\t\t\t\t\trequest = NULL;\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\tWorker::shutdown();\n\n\t\t// All worker threads are stopped and will never run any more\n\t\t// Disconnect remaining ports gracefully\n\t\trem_port* run_port = main_port;\n\t\twhile (run_port)\n\t\t{\n\t\t\trem_port* current_port = run_port;\t// important order of ope ***************************/\n\tLocalStatus ls;\n\tCheckStatusWrapper status_vector(&amp;ls);\n\tRsr* statement;\n\tgetHandle(statement, sqldata-&gt;p_sqldata_statement);\n\n\t// The default (and legacy) scrolling option is FETCH NEXT\n\tconst auto operation = scroll ? sqldata-&gt;p_sqldata_fetch_op : fetch_next;\n\tconst auto position = scroll ? sqldata-&gt;p_sqldata_fetch_pos : 0;\n\n\t// Whether we&#x27;re fetching in the forward direction\n\tconst bool forward =\n\t\t(operation == fetch_next || operation == fetch_last ||\n\t\t((operation == fetch_absolute || operation == fetch_relative) &amp;&amp; position &gt; 0));\n\n\t// Whether we&#x27;re fetching relatively to the current position\n\tconst bool relative =\n\t\t(operation == fetch_next || operation == fetch_prior || operation == fetch_relative);\n\n\tif (!statement-&gt;rsr_flags.test(Rsr::FETCHED))\n\t{\n\t\t// On first fetch, clear the end-of-stream flag &amp; reset the message buffers\n\n\t\tstatement-&gt;rsr_flags.clear(Rsr::STREAM_END | Rsr::STREAM_ERR);\n\t\tstatement-&gt;rsr_fetch_operation = operation;\n\t\tstatement-&gt;rsr_fetch_position = position;\n\t\tstatement-&gt;clearException();\n\n\t\tRMessage* message = statement-&gt;rsr_message;\n\n\t\tif (message)\n\t\t{\n\t\t\tstatement-&gt;rsr_buffer = message;\n\n\t\t\twhile (true)\n\t\t\t{\n\t\t\t\tmessage-&gt;msg_address = NULL;\n\t\t\t\tmessage = message-&gt;msg_next;\n\n\t\t\t\tif (message == statement-&gt;rsr_message)\n\t\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\telse if (!relative)\n\t{\n\t\t// Clear the end-of-stream flag if the fetch is positioned absolutely\n\t\tstatement-&gt;rsr_flags.clear(Rsr::STREAM_END);\n\t}\n\n\tconst ULONG msg_length = statement-&gt;rsr_format ? statement-&gt;rsr_format-&gt;fmt_length : 0;\n\n\tstatement-&gt;checkCursor();\n\tauto cursor = statement-&gt;rsr_cursor;\n\n\t// If required, call setDelayedOutputFormat()\n\n\tif (statement-&gt;rsr_delayed_format)\n\t{\n\t\tInternalMessageBuffer msgBuffer(sqldata-&gt;p_sqldata_bl (*request-&gt;req_port-&gt;port_que_sync, FB_FUNCTION);\n\t\t\t\t{ // port_sync scope\n\t\t\t\t\tRefMutexGuard portGuard(*request-&gt;req_port-&gt;port_sync, FB_FUNCTION);\n\n\t\t\t\t\tif (request-&gt;req_port-&gt;port_state == rem_port::DISCONNECTED ||\n\t\t\t\t\t\t!process_packet(request-&gt;req_port, &amp;request-&gt;req_send, &amp;request-&gt;req_receive, &amp;port))\n\t\t\t\t\t{\n\t\t\t\t\t\tport = NULL;\n\t\t\t\t\t}\n\n\t\t\t\t\t// With lazy port feature enabled we can have more received and\n\t\t\t\t\t// not handled data in receive queue. Handle it now if it contains\n\t\t\t\t\t// whole request packet. If it contain partial packet don&#x27;t clear\n\t\t\t\t\t// request queue, restore receive buffer state to state before\n\t\t\t\t\t// reading packet and wait until rest of data arrives\n\t\t\t\t\tif (port)\n\t\t\t\t\t{\n\t\t\t\t\t\tfb_assert(port == request-&gt;req_port);\n\n\t\t\t\t\t\t// It is very important to not release port_que_sync before\n\t\t\t\t\t\t// port_sync, else we can miss data arrived at time between\n\t\t\t\t\t\t// releasing locks and will never handle it. Therefore we\n\t\t\t\t\t\t// can&#x27;t use MutexLockGuard here\n\t\t\t\t\t\tportQueGuard.enter();\n\t\t\t\t\t\tif (port-&gt;haveRecvData())\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tserver_req_t* new_request = alloc_request();\n\n\t\t\t\t\t\t\tconst rem_port::RecvQueState recvState = port-&gt;getRecvState();\n\t\t\t\t\t\t\tport-&gt;receive(&amp;new_request-&gt;req_receive);\n\n\t\t\t\t\t\t\tif (new_request-&gt;req_receive.p_operation == op_partial)\n\t\t\t\t\t\t\t{\n\t\t\t\t\t\t\t\tfree_request(new_request);\n\t\t\t\t\t\t\t\tport-&gt;setRecvState(recvState);\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t\telse\n\t\t\t\t\t\t\t{\n\t\t\t\t\t\t\t\tif (!port-&gt;haveRecvData())\n\t\t\t\t\t\t\t\t\tport-&gt;clearRecvQue();\n\n\t\t\t\t\t\t\t\tnew_request-&gt;req_port = port;\n\n#ifdef DEV_BUILD\n\t\t\t\t\t\t\t\tconst bool ok =\n#endif\n\t\t\t\t\t\t\t\t\tlink_request(port, new_request);\n\t\t\t\t\t\t\t\tfb_assert(ok);\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t} // port_sync scope\n\n\t\t\t\tif (port) {\n\t\t\t\t\tportQueGuard.leave();\n\t\t\t\t}\n\n\t\t\t\t{ // request_que_mutex scope\n\t\t\t\t\tMutexLockGuard queGuard(request_que_mutex, FB_FUNCTION);\n\n\t\t\t\t\t// Take request out of list of active requests\n\n\t\t\t\t\tfor (server_req_t** req_ptr = &amp;active_requests; *req_ptr;\n\t\t\t\t\t\treq_ptr = &amp;(*req_ptr)-&gt;req_next)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (*req_ptr == request)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\t*req_ptr = request-&gt;req_next;\n\t\t\t\t\t\t\tports_active--;\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\n\t\t\t\t\t// If this is a explicit or implicit disconnect, get rid of\n\t\t\t\t\t// any chained requests\n\n\t\t\t\t\tif (!port)\n\t\t\t\t\t{\n\t\t\t\t\t\tserver_req_t* next;\n\t\t\t\t\t\twhile ((next = request-&gt;req_chain))\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\trequest-&gt;req_chain = next-&gt;req_chain;\n\t\t\t\t\t\t\tfree_request(next);\n\t\t\t\t\t\t}\n\t\t\t\t\t\tif (request-&gt;req_send.p_operation == op_void &amp;&amp;\n\t\t\t\t\t\t\trequest-&gt;req_receive.p_operation == op_void)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tdelete request;\n\t\t\t\t\t\t\trequest = 0;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t{\n#ifdef DEBUG_REMOTE_MEMORY\n\t\t\t\t\t\tprintf(&quot;thread    ACTIVE     request_queued %d\\n&quot;,\n\t\t\t\t\t\t\t\t  port-&gt;port_requests_queued.value());\n\t\t\t\t\t\tfflush(stdout);\n#endif\n\t\t\t\t\t}\n\n\t\t\t\t\t// Pick up any remaining chained request, and free current request\n\n\t\t\t\t\tif (request)\n\t\t\t\t\t{\n\t\t\t\t\t\tserver_req_t* next = request-&gt;req_chain;\n\t\t\t\t\t\tfree_request(request);\n\t\t\t\t\t\t//request = next;\n\n\t\t\t\t\t\t// Try to be fair - put new request at the end of waiting\n\t\t\t\t\t\t// requests queue and take request to work on from the\n\t\t\t\t\t\t// head of the queue\n\t\t\t\t\t\tif (next)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tappend_request_next(next, &amp;request_que);\n\t\t\t\t\t\t\trequest = re &gt;rpr_in_format-&gt;fmt_length : 0;\n\tUCHAR* out_msg = (procedure-&gt;rpr_out_msg) ? procedure-&gt;rpr_out_msg-&gt;msg_address : NULL;\n\tconst ULONG out_msg_length =\n\t\t(procedure-&gt;rpr_out_format) ? procedure-&gt;rpr_out_format-&gt;fmt_length : 0;\n\n\trdb-&gt;rdb_iface-&gt;transactRequest(&amp;status_vector, transaction-&gt;rtr_iface,\n\t\tblr_length, blr, in_msg_length, in_msg, out_msg_length, out_msg);\n\n\tif (status_vector.getState() &amp; IStatus::STATE_ERRORS)\n\t\treturn this-&gt;send_response(sendL, 0, 0, &amp;status_vector, false);\n\n\tP_DATA* data = &amp;sendL-&gt;p_data;\n\tsendL-&gt;p_operation = op_transact_response;\n\tdata-&gt;p_data_messages = 1;\n\tthis-&gt;send(sendL);\n\n\treturn FB_SUCCESS;\n}\n\nstatic void zap_packet(PACKET* packet, bool new_packet)\n{\n/**************************************\n *\n *\tz a p _ p a c k e t\n *\n **************************************\n *\n * Functional description\n *\tZero out a packet block.\n *\n **************************************/\n\n\tif (new_packet)\n\t\tmemset(packet, 0, sizeof(PACKET));\n\telse\n\t{\n#ifdef DEBUG_XDR_MEMORY\n\t\t// Don&#x27;t trash debug xdr memory allocation table of recycled packets.\n\n\t\tmemset(&amp;packet-&gt;p_operation, 0, sizeof(PACKET) - offsetof(PACKET, p_operation));\n#else\n\t\tmemset(packet, 0, sizeof(PACKET));\n#endif\n\t}\n}\n\n\n\n\nWorker::Worker()\n{\n\tm_active = false;\n\tm_going = false;\n\tm_next = m_prev = NULL;\n#ifdef DEV_BUILD\n\tm_tid = getThreadId();\n#endif\n\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\tinsert(m_active);\n}\n\nWorker::~Worker()\n{\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\tremove();\n\t--m_cntAll;\n\tif (m_going)\n\t\t--m_cntGoing;\n}\n\n\nbool Worker::wait(int timeout)\n{\n\tif (m_sem.tryEnter(timeout))\n\t\treturn true;\n\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\tif (m_sem.tryEnter(0))\n\t\treturn true;\n\n\t// don&#x27;t exit last worker until server shutdown\n\tif ((m_cntAll - m_cntGoing == 1) &amp;&amp; !isShuttingDown())\n\t\treturn true;\n\n\tremove();\n\tm_going = true;\n\tm_cntGoing++;\n\n\treturn false;\n}\n\nvoid Worker::setState(const bool active)\n{\n\tif (m_active == active)\n\t\treturn;\n\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\tremove();\n\tinsert(active);\n}\n\nbool Worker::wakeUp()\n{\n\tMutexLockGuard reqQueGuard(request_que_mutex, FB_FUNCTION);\n\n#ifdef _DEBUG\n\tint cnt = 0;\n\tfor (server_req_t* req = request_que; req; req = req-&gt;req_next)\n\t\tcnt++;\n\tfb_assert(cnt == ports_pending);\n\n\tcnt = 0;\n\tfor (server_req_t* req = active_requests; req; req = req-&gt;req_next)\n\t\tcnt++;\n\tfb_assert(cnt == ports_active);\n#endif\n\n\tif (!ports_pending)\n\t\treturn true;\n\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\n\tif (m_idleWorkers)\n\t{\n\t\tWorker* idle = m_idleWorkers;\n\t\tidle-&gt;setState(true);\n\t\tidle-&gt;m_sem.release();\n\t\treturn true;\n\t}\n\n\tif (m_cntAll - m_cntGoing &gt;= ports_active + ports_pending)\n\t\treturn true;\n\n\treturn (m_cntAll - m_cntGoing &gt;= MAX_THREADS);\n}\n\nvoid Worker::wakeUpAll()\n{\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\tfor (Worker* thd = m_idleWorkers; thd; thd = thd-&gt;m_next)\n\t\tthd-&gt;m_sem.release();\n}\n\nvoid Worker::remove()\n{\n\tif (!m_active &amp;&amp; (m_next || m_prev || m_idleWorkers == this)) {\n\t\tm_cntIdle--;\n\t}\n\n\tif (m_idleWorkers == this) {\n\t\tm_idleWorkers = this-&gt;m_next;\n\t}\n\tif (m_activeWorkers == this) {\n\t\tm_activeWorkers = this-&gt;m_next;\n\t}\n\tif (m_next) {\n\t\tm_next-&gt;m_prev = this-&gt;m_prev;\n\t}\n\tif (m_prev) {\n\t\tm_prev-&gt;m_next = this-&gt;m_next;\n\t}\n\tm_prev = m_next = NULL;\n}\n\nvoid Worker::insert(const bool active)\n{\n\tfb_assert(!m_next);\n\tfb_assert(!m_prev);\n\tfb_assert(m_idleWorkers != this);\n\tfb_assert(m_activeWorkers != this);\n\n\tWorker** list = active ? &amp;m_activeWorkers : &amp;m_idleWorkers;\n\tm_next = *list;\n\tif (*list) {\n\t\t(*list)-&gt;m_prev = this;\n\t}\n\t*list = this;\n\tm_active = active;\n\tif (!m_active)\n\t{\n\t\tm_cntIdle++;\n\t\tfb_assert(m_idleWorkers == this);\n\t}\n\telse\n\t\tfb_assert(m_activeWorkers == this);\n}\n\nvoid Worker::start(USHORT flags)\n{\n\tif (!isShuttingDown() &amp;&amp; !wakeUp())\n\t{\n\t\tif (isShuttingDown())\n\t\t\treturn;\n\n\t\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\t\ttry\n\t\t{\n\t\t\tThread::start(loopThread, (void*)(IPTR) flags, THREAD_medium);\n\t\t\t++m_cntAll;\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tif (!m_cntAll)\n\t\t\t{\n\t\t\t\tArg::Gds(isc_no_threads).raise();\n\t\t\t}\n\t\t}\n\t}\n}\n\nvoid Worker::shutdown()\n{\n\tMutexLockGuard guard(m_mutex, FB_FUNCTION);\n\tif (shutting_down)\n\t{\n\t\treturn;\n\t}\n\n\tshutting_down = true;\n\n\twhile (getCount())\n\t{\n\t\twakeUpAll();\n\t\tm_mutex-&gt;leave();\t// we need CheckoutGuard here\n\t\ttry\n\t\t{\n\t\t\tThread::sleep(100);\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tm_mutex-&gt;enter(FB_FUNCTION);\n\t\t\tthrow;\n\t\t}\n\t\tm_mutex-&gt;enter(FB_FUNCTION);\n\t}\n}\n\nstatic int shut_server(const int, const int, void*)\n{\n\tserver_shutdown = true;\n\treturn 0;\n}\n\nstatic int pre_shutdown(const int, const int, void*)\n{\n\tengine_shutdown = true;\n\treturn 0;\n}\n\nvoid SrvAuthBlock::extractDataFromPluginTo(cstring* to)\n{\n\tto-&gt;cstr_allocated = 0;\n\tto-&gt;cstr_length = (ULONG) dataFromPlugin.getCount();\n\tto-&gt;cstr_address = dataFromPlugin.begin();\n}\n\nbool SrvAuthBlock::authCompleted(bool flag)\n{\n\tif (flag)\n\t\tflComplete = true;\n\treturn flComplete;\n}\n\nvoid SrvAuthBlock::setLogin(const string&amp; user)\n{\n\tuserName = user;\n}\n\nvoid SrvAuthBlock::load(ClumpletReader&amp; id)\n{\n\tif (id.find(CNCT_login))\n\t{\n\t\tid.getString(userName);\n\t\tfb_utils::dpbItemUpper(userName);\n\t\tHANDSHAKE_DEBUG(fprintf(stderr, &quot;Srv: AuthBlock: login %s\\n&quot;, userName.c_str()));\n\t}\n\n\tif (id.find(CNCT_plugin_name))\n\t{\n\t\tid.getPath(pluginName);\n\t\tfirstTime = false;\n\t\tHANDSHAKE_DEBUG(fprintf(stderr, &quot;Srv: AuthBlock: plugin %s\\n&quot;, pluginName.c_str()));\n\t}\n\n\tif (id.find(CNCT_plugin_list))\n\t{\n\t\tid.getPath(pluginList);\n\t\tHANDSHAKE_DEBUG(fprintf(stderr, &quot;Srv: AuthBlock: plugin list %s\\n&quot;, pluginList.c_str()));\n\t}\n\n\tdataForPlugin.clear();\n\tgetMultiPartConnectParameter(dataForPlugin, id, CNCT_specific_data);\n\tif (dataForPlugin.hasData())\n\t{\n\t\tHANDSHAKE_DEBUG(fprintf(stderr, &quot;Srv: AuthBlock: data %u\\n&quot;, static_cast&lt;unsigned&gt;(dataForPlugin.getCount())));\n\t}\n}\n\nconst char* SrvAuthBlock::getPluginName()\n{\n\treturn pluginName.nullStr();\n}\n\nvoid SrvAuthBlock::setPluginName(const string&amp; name)\n{\n\tpluginName = name.ToPathName();\n}\n\nvoid SrvAuthBlock::setPluginList(const string&amp; list)\n{\n\tif (firstTime)\n\t{\n\t\tpluginList = list.ToPathName();\n\t}\n\tif (pluginList.hasData())\n\t{\n\t\tfirstTime = false;\n\t}\n}\n\nvoid SrvAuthBlock::setDataForPlugin(const UCharBuffer&amp; data)\n{\n\tdataForPlugin.assign(data.begin(), data.getCount());\n}\n\nvoid SrvAuthBlock::setDataForPlugin(const cstring&amp; data)\n{\n\tdataForPlugin.assign(data.cstr_address, data.cstr_length);\n}\n\nvoid SrvAuthBlock::setDataForPlugin(const p_auth_continue* data)\n{\n\tdataForPlugin.assign(data-&gt;p_data.cstr_address, data-&gt;p_data.cstr_length);\n\tHANDSHAKE_DEBUG(fprintf(stderr, &quot;Srv: setDataForPlugin: %d firstTime = %d nm=%d ls=%d login=&#x27;%s&#x27;\\n&quot;,\n\t\t\t\t\t\t data-&gt;p_data.cstr_length, firstTime, data-&gt;p_name.cstr_length,\n\t\t\t\t\t\t data-&gt;p_list.cstr_length, userName.c_str()));\n\tif (firstTime)\n\t{\n\t\tpluginName.assign(data-&gt;p_name.cstr_address, data-&gt;p_name.cstr_length);\n\t\tpluginList.assign(data-&gt;p_list.cstr_address, data-&gt;p_list.cstr_length);\n\n\t\tfirstTime = false;\n\t}\n}\n\nbool SrvAuthBlock::hasDataForPlugin()\n{\n\treturn dataForPlugin.hasData();\n}\n\nvoid SrvAuthBlock::extractDataFromPluginTo(P_AUTH_CONT* to)\n{\n\textractDataFromPluginTo(&amp;to-&gt;p_data);\n\textractPluginName(&amp;to-&gt;p_name);\n}\n\nvoid SrvAuthBlock::extractDataFromPluginTo(P_ACPD* to)\n{\n\textractDataFromPluginTo(&amp;to-&gt;p_acpt_data);\n\textractPluginName(&amp;to-&gt;p_acpt_plugin);\n}\n\nvoid SrvAuthBlock::extractPluginName(cstring* to)\n{\n\tto-&gt;cstr_length = (ULONG) pluginName.length();\n\tto-&gt;cstr_address = (UCHAR*)(pluginName.c_str());\n\tto-&gt;cstr_allocated = 0;\n}\n\nvoid SrvAuthBlock::createPluginsItr()\n{\n\tif (firstTime || plugins)\n\t{\n\t\treturn;\n\t}\n\n\tParsedList fromClient(pluginList);\n\tParsedList onServer(port-&gt;getPortConfig()-&gt;getPlugins(IPluginManager::TYPE_AUTH_SERVER));\n\tParsedList final;\n\n\tfor (unsigned s = 0; s &lt; onServer.getCount(); ++s)\n\t{\n\t\t// do not expect too long lists, therefore use double loop\n\t\tfor (unsigned c = 0; c &lt; fromClient.getCount(); ++c)\n\t\t{\n\t\t\tif (onServer[s] == fromClient[c])\n\t\t\t{\n\t\t\t\tfinal.push(onServer[s]);\n\t\t\t}\n\t\t}\n\t}\n\n\tif (final.getCount() == 0)\n\t{\n\t\tHANDSHAKE_DEBUG(fprintf(stderr, &quot;Srv: createPluginsItr: No matching plugins on server\\n&quot;));\n\n\t\tArg::Gds loginError(isc_login_error);\n#ifdef DEV_BUILD\n\t\tloginError &lt;&lt; Arg::Gds(isc_random) &lt;&lt; &quot;No matching plugins on server&quot;;\n#endif\n\t\tgds__log(&quot;Authentication error\\n\\tNo matching plugins on server&quot;);\n\t\tloginError.raise();\n\t}\n\n\t// reorder to make it match first, already passed, plugin data\n\tfor (unsigned f = 1; f &lt; final.getCount(); ++f)\n\t{\n\t\tif (final[f] == pluginName)\n\t\t{\n\t\t\tfinal[f] = final[0];\n\t\t\tfinal[0] = pluginName;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\t// special case - last plugin from the list on the server may be used to check\n\t// correctness of what previous plugins added to auth parameters block\n\tbool multiFactor = true;\n\tfor (unsigned sp = 0; sp &lt; final.getCount(); ++sp)\n\t{\n\t\tif (final[sp] == onServer[onServer.getCount() - 1])\n\t\t{\n\t\t\tmultiFactor = false;\n\t\t\tbreak;\n\t\t}\n\t}\n\tif (multiFactor)\n\t{\n\t\tfinal.push(onServer[onServer.getCount() - 1]);\n\t}\n\n\tfinal.makeList(pluginList);\n\n\tRefPtr&lt;const Config&gt; portConf(port-&gt;getPortConfig());\n\tplugins = FB_NEW AuthServerPlugins(IPluginManager::TYPE_AUTH_SERVER, portConf, pluginList.c_str());\n}\n\nvoid SrvAuthBlock::reset()\n{\n\tpluginName = &quot;&quot;;\n\tpluginList = &quot;&quot;;\n\tdataForPlugin.clear();\n\tdataFromPlugin.clear();\n\tflComplete = false;\n\tfirstTime = true;\n\n\tauthBlockWriter.reset();\n\tdelete plugins;\n\tplugins = NULL;\n}\n\nbool SrvAuthBlock::extractNewKeys(CSTRING* to, ULONG flags)\n{\n\tlastExtractedKeys.reset();\n\n\tif (!(flags &amp; ONLY_CLEANUP))\n\t{\n\t\tfor (unsigned n = 0; n &lt; newKeys.getCount(); ++n)\n\t\t{\n\t\t\tconst PathName&amp; t = newKeys[n]-&gt;keyName;\n\t\t\tPathName plugins = knownCryptKeyTypes()[t];\n\t\t\tif (plugins.hasData())\n\t\t\t{\n\t\t\t\tlastExtractedKeys.insertString(TAG_KEY_TYPE, t);\n\t\t\t\tlastExtractedKeys.insertString(TAG_KEY_PLUGINS, plugins);\n\n\t\t\t\tif (port-&gt;port_protocol &lt; PROTOCOL_VERSION16)\n\t\t\t\t\tcontinue;\n\n\t\t\t\tfor (CryptKeyTypeManager::SpecificPlugins sp(knownCryptKeyTypes().getSpecific(t)); sp.hasData(); sp.next())\n\t\t\t\t{\n\t\t\t\t\tPathName plugin = sp.get();\n\t\t\t\t\tGetPlugins&lt;IWireCryptPlugin&gt; cp(IPluginManager::TYPE_WIRE_CRYPT, plugin.c_str());\n\t\t\t\t\tfb_assert(cp.hasData());\n\t\t\t\t\tif (cp.hasData())\n\t\t\t\t\t{\n\t\t\t\t\t\tLocalStatus ls;\n\t\t\t\t\t\tCheckStatusWrapper st(&amp;ls);\n\t\t\t\t\t\tunsigned l;\n\t\t\t\t\t\tconst unsigned char* d = cp.plugin()-&gt;getSpecificData(&amp;st, t.c_str(), &amp;l);\n\t\t\t\t\t\tcheck(&amp;st, isc_wish_list);\n\t\t\t\t\t\tif (d)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tport-&gt;addSpecificData(t, plugin, l, d);\n\n\t\t\t\t\t\t\tplugin += &#x27;\\0&#x27;;\n\t\t\t\t\t\t\tplugin.append(reinterpret_cast&lt;const char*&gt;(d), l);\n\t\t\t\t\t\t\tlastExtractedKeys.insertString(TAG_PLUGIN_SPECIFIC, plugin);\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\tif ((flags &amp; EXTRACT_PLUGINS_LIST) &amp;&amp; (dataFromPlugin.getCount() == 0))\n\t\t{\n\t\t\tlastExtractedKeys.insertString(TAG_KNOWN_PLUGINS, pluginList);\n\t\t}\n\t}\n\n\tto-&gt;cstr_length = (ULONG) lastExtractedKeys.getBufferLength();\n\tto-&gt;cstr_address = const_cast&lt;UCHAR*&gt;(lastExtractedKeys.getBuffer());\n\tto-&gt;cstr_allocated = 0;\n\n\tnewKeys.clear();\t\t// Very important - avoids sending same key type more than once\n\n\treturn to-&gt;cstr_length &gt; 0;\n}\n"}, "/build/src/common/classes/ClumpletWriter.cpp": {"id": "/build/src/common/classes/ClumpletWriter.cpp", "filePath": "src/common/classes/ClumpletWriter.cpp", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\tClumpletWriter.cpp\n *\tDESCRIPTION:\tSecure handling of clumplet buffers\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#include &quot;firebird.h&quot;\n\n#include &quot;../common/classes/ClumpletWriter.h&quot;\n#include &quot;../common/classes/MetaString.h&quot;\n#include &quot;fb_exception.h&quot;\n#include &quot;ibase.h&quot;\n\nnamespace Firebird {\n\nClumpletWriter::ClumpletWriter(Kind k, FB_SIZE_T limit, UCHAR tag)\n\t: ClumpletReader(k, NULL, 0),\n\t  sizeLimit(limit),\n\t  kindList(NULL),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tinitNewBuffer(tag);\n\trewind();\n}\n\nClumpletWriter::ClumpletWriter(MemoryPool&amp; given_pool, Kind k, FB_SIZE_T limit, UCHAR tag)\n\t: ClumpletReader(given_pool, k, NULL, 0),\n\t  sizeLimit(limit),\n\t  kindList(NULL),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tinitNewBuffer(tag);\n\trewind();\n}\n\nconst UCHAR* ClumpletWriter::getBuffer() const\n{\n\treturn dynamic_buffer.begin();\n}\n\nconst UCHAR* ClumpletWriter::getBufferEnd() const\n{\n\treturn dynamic_buffer.end();\n}\n\nvoid ClumpletWriter::initNewBuffer(UCHAR tag)\n{\n\tswitch (kind)\n\t{\n\t\tcase SpbAttach:\n\t\t\tif (tag == isc_spb_version)\n\t\t\t{\n\t\t\t\tdynamic_buffer.push(isc_spb_version);\n\t\t\t}\n\t\t\t[[fallthrough]];\n\t\tcase Tagged:\n\t\tcase Tpb:\n\t\tcase WideTagged:\n\t\t\tdynamic_buffer.push(tag);\n\t\t\tbreak;\n\t\tdefault:\n\t\t\tfb_assert(tag == 0);\n\t\t\tbreak;\n\t}\n}\n\nClumpletWriter::ClumpletWriter(Kind k, FB_SIZE_T limit, const UCHAR* buffer, FB_SIZE_T buffLen, UCHAR tag)\n\t: ClumpletReader(k, NULL, 0),\n\t  sizeLimit(limit),\n\t  kindList(NULL),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(buffer, buffLen, tag);\n}\n\nClumpletWriter::ClumpletWriter(MemoryPool&amp; pool, const KindList* kl, FB_SIZE_T limit,\n\t\t\t\t\t\t\t   const UCHAR* buffer, FB_SIZE_T buffLen)\n\t: ClumpletReader(pool, kl, buffer, buffLen),\n\t  sizeLimit(limit),\n\t  kindList(kl),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(buffer, buffLen, kl-&gt;tag);\n}\n\nClumpletWriter::ClumpletWriter(const KindList* kl, FB_SIZE_T limit, const UCHAR* buffer, FB_SIZE_T buffLen)\n\t: ClumpletReader(kl, buffer, buffLen),\n\t  sizeLimit(limit),\n\t  kindList(kl),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(buffer, buffLen, kl-&gt;tag);\n}\n\nClumpletWriter::ClumpletWriter(MemoryPool&amp; pool, const KindList* kl, FB_SIZE_T limit)\n\t: ClumpletReader(pool, kl, NULL, 0),\n\t  sizeLimit(limit),\n\t  kindList(kl),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(NULL, 0, kl-&gt;tag);\n}\n\nClumpletWriter::ClumpletWriter(const KindList* kl, FB_SIZE_T limit)\n\t: ClumpletReader(kl, NULL, 0),\n\t  sizeLimit(limit),\n\t  kindList(kl),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(NULL, 0, kl-&gt;tag);\n}\n\nClumpletWriter::ClumpletWriter(MemoryPool&amp; pool, const ClumpletWriter&amp; from)\n\t: ClumpletReader(pool, from),\n\t  sizeLimit(from.sizeLimit),\n\t  kindList(NULL),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(from.getBuffer(), from.getBufferEnd() - from.getBuffer(), from.isTagged() ? from.getBufferTag() : 0);\n}\n\nClumpletWriter::ClumpletWriter(const ClumpletWriter&amp; from)\n\t: ClumpletReader(from),\n\t  sizeLimit(from.sizeLimit),\n\t  kindList(NULL),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tcreate(from.getBuffer(), from.getBufferEnd() - from.getBuffer(), from.isTagged() ? from.getBufferTag() : 0);\n}\n\nvoid ClumpletWriter::create(const UCHAR* buffer, FB_SIZE_T buffLen, UCHAR tag)\n{\n\tif (buffer &amp;&amp; buffLen) {\n\t\tdynamic_buffer.push(buffer, buffLen);\n\t}\n\telse {\n\t\tinitNewBuffer(tag);\n\t}\n\trewind();\n}\n\nClumpletWriter::ClumpletWriter(MemoryPool&amp; given_pool, Kind k, FB_SIZE_T limit,\n\t\t\t\t\t\t\t   const UCHAR* buffer, FB_SIZE_T buffLen, UCHAR tag)\n\t: ClumpletReader(given_pool, k, NULL, 0),\n\t  sizeLimit(limit),\n\t  kindList(NULL),\n\t  dynamic_buffer(getPool()),\n\t  flag_overflow(false)\n{\n\tif (buffer &amp;&amp; buffLen) {\n\t\tdynamic_buffer.push(buffer, buffLen);\n\t}\n\telse {\n\t\tinitNewBuffer(tag);\n\t}\n\trewind();\n}\n\nvoid ClumpletWriter::reset(UCHAR tag)\n{\n\tif (kindList)\n\t{\n\t\tfor (const KindList* kl = kindList; kl-&gt;kind != EndOfList; ++kl)\n\t\t{\n\t\t\tif (tag == kl-&gt;tag)\n\t\t\t{\n\t\t\t\tkind = kl-&gt;kind;\n\t\t\t\tdynamic_buffer.shrink(0);\n\t\t\t\tinitNewBuffer(tag);\n\t\t\t\trewind();\n\n\t\t\t\treturn;\n\t\t\t}\n\t\t}\n\n\t\tinvalid_structure(&quot;Unknown tag value - missing in the list of possible&quot;, tag);\n\t}\n\n\tdynamic_buffer.shrink(0);\n\tinitNewBuffer(tag);\n\trewind();\n}\n\nvoid ClumpletWriter::reset(const UCHAR* buffer, const FB_SIZE_T buffLen)\n{\n\tconst UCHAR tag = isTagged() ? getBufferTag() : 0;\n\tdynamic_buffer.clear();\n\tif (buffer &amp;&amp; buffLen) {\n\t\tdynamic_buffer.push(buffer, buffLen);\n\t}\n\telse\n\t{\n\t\tinitNewBuffer(tag);\n\t}\n\trewind();\n}\n\nvoid ClumpletWriter::reset(const ClumpletWriter&amp; from)\n{\n\treset(from.getBuffer(), from.getBufferEnd() - from.getBuffer());\n}\n\nvoid ClumpletWriter::size_overflow()\n{\n\tfatal_exception::raise(&quot;Clumplet buffer size limit reached&quot;);\n}\n\nvoid ClumpletWriter::size_overflow(bool condition)\n{\n\tflag_overflow = condition;\n\tif (condition)\n\t\tsize_overflow();\n}\n\nvoid ClumpletWriter::toVaxInteger(UCHAR* ptr, FB_SIZE_T length, const SINT64 value)\n{\n\tfb_assert(ptr &amp;&amp; length &gt; 0 &amp;&amp; length &lt; 9); // We can&#x27;t handle numbers bigger than int64.\n\tint shift = 0;\n\twhile (length--)\n\t{\n\t\t*ptr++ = (UCHAR) (value &gt;&gt; shift);\n\t\tshift += 8;\n\t}\n}\n\nvoid ClumpletWriter::insertInt(UCHAR tag, const SLONG value)\n{\n\tUCHAR bytes[sizeof(SLONG)];\n\n\ttoVaxInteger(bytes, sizeof(bytes), value);\n\tinsertBytesLengthCheck(tag, bytes, sizeof(bytes));\n}\n\nvoid ClumpletWriter::insertBigInt(UCHAR tag, const SINT64 value)\n{\n\tUCHAR bytes[sizeof(SINT64)];\n\n\ttoVaxInteger(bytes, sizeof(bytes), value);\n\tinsertBytesLengthCheck(tag, bytes, sizeof(bytes));\n}\n\nvoid ClumpletWriter::insertDouble(UCHAR tag, const double value)\n{\n\tunion {\n\t\tdouble temp_double;\n\t\tSLONG temp_long[2];\n\t} temp;\n\n\tfb_assert(sizeof(double) == sizeof(temp));\n\n\ttemp.temp_double = value;\n\tUCHAR bytes[sizeof(double)];\n\ttoVaxInteger(bytes, sizeof(SLONG), temp.temp_long[FB_LONG_DOUBLE_FIRST]);\n\ttoVaxInteger(bytes + sizeof(SLONG), sizeof(SLONG), temp.temp_long[FB_LONG_DOUBLE_SECOND]);\n\tinsertBytesLengthCheck(tag, bytes, sizeof(bytes));\n}\n\nvoid ClumpletWriter::insertTimeStamp(UCHAR tag, const ISC_TIMESTAMP value)\n{\n\tUCHAR bytes[sizeof(ISC_TIMESTAMP)];\n\ttoVaxInteger(bytes, sizeof(SLONG), value.timestamp_date);\n\ttoVaxInteger(bytes + sizeof(SLONG), sizeof(SLONG), value.timestamp_time);\n\tinsertBytesLengthCheck(tag, bytes, sizeof(bytes));\n}\n\nvoid ClumpletWriter::insertString(UCHAR tag, const char* str)\n{\n\tinsertString(tag, str, fb_strlen(str));\n}\n\nvoid ClumpletWriter::insertString(UCHAR tag, char* str)\n{\n\tinsertString(tag, str, fb_strlen(str));\n}\n\nvoid ClumpletWriter::insertString(UCHAR tag, const char* str, FB_SIZE_T length)\n{\n\tinsertBytesLengthCheck(tag, str, length);\n}\n\nvoid ClumpletWriter::insertData(UCHAR tag, const UCharBuffer&amp; data)\n{\n\tinsertBytesLengthCheck(tag, data.begin(), data.getCount());\n}\n\nvoid ClumpletWriter::insertBytes(UCHAR tag, const void* bytes, FB_SIZE_T length)\n{\n\tinsertBytesLengthCheck(tag, bytes, length);\n}\n\nvoid ClumpletWriter::insertByte(UCHAR tag, const UCHAR byte)\n{\n\tinsertBytesLengthCheck(tag, &amp;byte, 1);\n}\n\nvoid ClumpletWriter::insertBytesLengthCheck(UCHAR tag, const void* bytes, const FB_SIZE_T length)\n{\n\t// Check that we&#x27;re not beyond the end of buffer.\n\t// We get there when we set end marker.\n\tif (cur_offset &gt; dynamic_buffer.getCount())\n\t{\n\t\tusage_mistake(&quot;write past EOF&quot;);\n\t\treturn;\n\t}\n\n\tUCHAR lenSize = 0;\n\t// Check length according to clumplet type\n\t// Perform structure upgrade when needed and possible\n\tfor(;;)\n\t{\n\t\tconst ClumpletType t = getClumpletType(tag);\n\t\tstring m;\n\n\t\tswitch (t)\n\t\t{\n\t\tcase Wide:\n\t\t\tif (length &gt; MAX_ULONG)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store %d bytes in a clumplet&quot;, length);\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tlenSize = 4;\n\t\t\tbreak;\n\t\tcase TraditionalDpb:\n\t\t\tif (length &gt; MAX_UCHAR)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store %d bytes in a clumplet with maximum size 255 bytes&quot;, length);\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tlenSize = 1;\n\t\t\tbreak;\n\t\tcase SingleTpb:\n\t\t\tif (length &gt; 0)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store data in dataless clumplet&quot;);\n\t\t\t}\n\t\t\tbreak;\n\t\tcase StringSpb:\n\t\t\tif (length &gt; MAX_USHORT)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store %d bytes in a clumplet&quot;, length);\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tlenSize = 2;\n\t\t\tbreak;\n\t\tcase IntSpb:\n\t\t\tif (length != 4)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store %d bytes in a clumplet, need 4&quot;, length);\n\t\t\t}\n\t\t\tbreak;\n\t\tcase BigIntSpb:\n\t\t\tif (length != 8)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store %d bytes in a clumplet, need 8&quot;, length);\n\t\t\t}\n\t\t\tbreak;\n\t\tcase ByteSpb:\n\t\t\tif (length != 1)\n\t\t\t{\n\t\t\t\tm.printf(&quot;attempt to store %d bytes in a clumplet, need 1&quot;, length);\n\t\t\t}\n\t\t\tbreak;\n\t\tdefault:\n\t\t\tinvalid_structure(&quot;unknown clumplet type&quot;, t);\n\t\t}\n\n\t\tif (m.isEmpty())\n\t\t{\n\t\t\t// OK, no errors\n\t\t\tbreak;\n\t\t}\n\n\t\tif (!upgradeVersion())\n\t\t{\n\t\t\t// can&#x27;t upgrade - report failure\n\t\t\tusage_mistake(m.c_str());\n\t\t\treturn;\n\t\t}\n\t}\n\n\t// Check that resulting data doesn&#x27;t overflow size limit\n\tsize_overflow(dynamic_buffer.getCount() + length + lenSize + 1 &gt; sizeLimit);\n\n\t// Insert the data\n\tconst FB_SIZE_T saved_offset = cur_offset;\n\tdynamic_buffer.insert(cur_offset++, tag);\n\tswitch (lenSize)\n\t{\n\tcase 0:\n\t\tbreak;\n\tcase 1:\n\t\tdynamic_buffer.insert(cur_offset++, static_cast&lt;UCHAR&gt;(length));\n\t\tbreak;\n\tcase 2:\n\t\t{\n\t\t\tUCHAR b[2];\n\t\t\ttoVaxInteger(b, sizeof(b), length);\n\t\t\tdynamic_buffer.insert(cur_offset, b, sizeof(b));\n\t\t\tcur_offset += 2;\n\t\t}\n\t\tbreak;\n\tcase 4:\n\t\t{\n\t\t\tUCHAR b[4];\n\t\t\ttoVaxInteger(b, sizeof(b), length);\n\t\t\tdynamic_buffer.insert(cur_offset, b, sizeof(b));\n\t\t\tcur_offset += 4;\n\t\t}\n\t\tbreak;\n\tdefault:\n\t\tfb_assert(lenSize &gt;= 0 &amp;&amp; lenSize &lt;= 2 || lenSize == 4);\n\t\treturn;\n\t}\n\tdynamic_buffer.insert(cur_offset, static_cast&lt;const UCHAR*&gt;(bytes), length);\n\tconst FB_SIZE_T new_offset = cur_offset + length;\n\tcur_offset = saved_offset;\n    adjustSpbState();\n\tcur_offset = new_offset;\n}\n\nvoid ClumpletWriter::insertTag(UCHAR tag)\n{\n\tinsertBytesLengthCheck(tag, 0, 0);\n}\n\n\nvoid ClumpletWriter::insertEndMarker(UCHAR tag)\n{\n\t// Check that we&#x27;re not beyond the end of buffer.\n\t// We get there when we set end marker.\n\tif (cur_offset &gt; dynamic_buffer.getCount())\n\t{\n\t\tusage_mistake(&quot;write past EOF&quot;);\n\t\treturn;\n\t}\n\n\t// Check that resulting data doesn&#x27;t overflow size limit\n\tsize_overflow(cur_offset + 1 &gt; sizeLimit);\n\n\tdynamic_buffer.shrink(cur_offset);\n\tdynamic_buffer.push(tag);\n\n\tcur_offset += 2; // Go past EOF to indicate we set the marker\n}\n\nvoid ClumpletWriter::deleteClumplet()\n{\n\tconst UCHAR* clumplet = getBuffer() + cur_offset;\n\tconst UCHAR* buffer_end = getBufferEnd();\n\n\t// Check for EOF\n\tif (clumplet &gt;= buffer_end)\n\t{\n\t\tusage_mistake(&quot;write past EOF&quot;);\n\t\treturn;\n\t}\n\n\tif (buffer_end - clumplet &lt; 2)\n\t{\n\t\t// It appears we&#x27;re erasing EOF marker\n\t\tdynamic_buffer.shrink(cur_offset);\n\t}\n\telse {\n\t\tdynamic_buffer.removeCount(cur_offset, getClumpletSize(true, true, true));\n\t}\n}\n\nbool ClumpletWriter::deleteWithTag(UCHAR tag)\n{\n   bool rc = false;\n   while (find(tag))\n   {\n       rc = true;\n       deleteClumplet();\n   }\n\n   return rc;\n}\n\nbool ClumpletWriter::upgradeVersion()\n{\n\t// Sanity check\n\tif (!kindList)\n\t{\n\t\treturn false;\n\t}\n\n\t// Check for required version - use highmost one\n\tconst KindList* newest = kindList;\n\tfor (const KindList* itr = kindList; itr-&gt;tag != EndOfList; ++itr)\n\t{\n\t\tif (itr-&gt;tag &gt; newest-&gt;tag)\n\t\t{\n\t\t\tnewest = itr;\n\t\t}\n\t}\n\n\tif (getBufferLength() &amp;&amp; newest-&gt;tag &lt;= getBufferTag())\n\t{\n\t\treturn false;\n\t}\n\n\t// Copy data to new clumplet writer\n\tFB_SIZE_T newPos = 0;\n\tClumpletWriter newPb(newest-&gt;kind, sizeLimit, newest-&gt;tag);\n\tconst FB_SIZE_T currentPosition = cur_offset;\n\tfor(rewind(); !isEof(); moveNext())\n\t{\n\t\tif (currentPosition == cur_offset)\n\t\t{\n\t\t\tnewPos = newPb.cur_offset;\n\t\t}\n\t\tnewPb.insertClumplet(getClumplet());\n\t\tnewPb.moveNext();\n\t}\n\n\t// Return it to current clumplet writer in new format\n\tdynamic_buffer.clear();\n\tkind = newest-&gt;kind;\n\tdynamic_buffer.push(newPb.dynamic_buffer.begin(), newPb.dynamic_buffer.getCount());\n\n\t// Set pointer to correct position\n\tif (newPos)\n\t{\n\t\tcur_offset = newPos;\n\t}\n\telse\n\t{\n\t\trewind();\n\t}\n\n\treturn true;\n}\n\nvoid ClumpletWriter::insertClumplet(const SingleClumplet&amp; clumplet)\n{\n\tinsertBytes(clumplet.tag, clumplet.data, clumplet.size);\n}\n\nvoid ClumpletWriter::clear()\n{\n\treset(isTagged() ? getBufferTag() : 0);\n}\n\n} // namespace\n"}, "/build/src/common/classes/alloc.cpp": {"id": "/build/src/common/classes/alloc.cpp", "filePath": "src/common/classes/alloc.cpp", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.cpp\n *\tDESCRIPTION:\tMemory Pool Manager (based on B+ tree)\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n\n#ifdef WIN_NT\n\n#include &lt;windows.h&gt;\n\n#ifndef PATH_MAX\n#define PATH_MAX MAX_PATH\n#endif\n\n#else\n\n#include &lt;unistd.h&gt;\n#include &lt;sys/types.h&gt;\n#include &lt;sys/stat.h&gt;\n#include &lt;fcntl.h&gt;\n#include &lt;sys/mman.h&gt;\n\n#endif\n\n#include &quot;../common/classes/fb_tls.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/vector.h&quot;\n#include &quot;../common/classes/RefMutex.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/os/os_utils.h&quot;\n#include &quot;../common/os/fbsyslog.h&quot;\n#include &quot;iberror.h&quot;\n\n#ifdef USE_VALGRIND\n#include &lt;valgrind/memcheck.h&gt;\n\n//#define VALGRIND_FIX_IT\t\t// overrides suspicious valgrind behavior\n#endif\t// USE_VALGRIND\n\nnamespace {\n\n///#define MEM_DEBUG_EXTERNAL\n\n/*** emergency debugging stuff\nstatic const char* lastFileName
