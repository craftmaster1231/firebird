      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},
      viewportMargin : 100
    });

    this._createNavigationMenu();
  },

  navigate : function (report, item) {
    if (!item) {
      var items = this._navigationMenuItems.filter(function (navItem) {
        return navItem.report.reportHash === report.reportHash;
      });

      if (!items.length) return;

      item = items[0].widget;
    }

    this._selectedReport.classList.remove('active');
    this._selectedReport = item;
    this._selectedReport.classList.add('active');
    this.setReport(report);
  },

  _createNavigationMenu : function () {
    var that = this;

    var nav = document.getElementById('report-nav');
    var list = document.createElement('ul');
    this._reports.forEach(function (report) {
      var events = report.events;
      var lastBugEvent = events[events.length - 1];
      var item = document.createElement('li');

      var severity = document.createElement('i');
      severity.className = 'severity-' + report.severity.toLowerCase();

      item.appendChild(severity);
      item.appendChild(document.createTextNode(lastBugEvent.message));

      item.addEventListener('click', function () {
        that.navigate(report, item);
      })
      list.appendChild(item);
      that._navigationMenuItems.push({ report : report, widget : item });
    });

    if (!this._selectedReport && list.childNodes.length) {
      this._selectedReport = list.childNodes[0];
      this._selectedReport.classList.add('active');
    }

    nav.appendChild(list);
  },

  setReport : function (report) {
    this._currentReport = report;
    var events = report.events;
    var lastBugEvent = events[events.length - 1];
    this.setCurrentBugEvent(lastBugEvent, events.length - 1);
    this.setChecker(report.checker);
    this.setReviewStatus(report.reviewStatus);

    window.location.hash = '#reportHash=' + report.reportHash;
  },

  setCurrentBugEvent : function (event, idx) {
    this._currentBugEvent = event;
    this.setSourceFileData(this._files[event.fileId]);
    this.drawBugPath();

    this.jumpTo(event.line, 0);
    this.highlightBugEvent(idx);
  },

  highlightBugEvent : function (idx) {
    this._lineWidgets.forEach(function (widget) {
      var lineIdx = widget.node.getAttribute('idx');
      if (parseInt(lineIdx) === idx) {
        widget.node.classList.add('current');
      }
    });
  },

  setChecker : function (checker) {
    var content = checker.name;
    if (checker.url) {
      content = '<a href="' + checker.url + '" target="_blank">' +
        checker.name + '</a>';
    }

    this._checkerName.innerHTML = content;
  },

  setReviewStatus : function (status) {
    if (status) {
      var className =
        'review-status-' + status.toLowerCase().split(' ').join('-');
      this._reviewStatus.className = "review-status " + className;

      this._reviewStatus.innerHTML = status;
      this._reviewStatusWrapper.style.display = 'block';
    } else {
      this._reviewStatusWrapper.style.display = 'none';
    }
  },

  setSourceFileData : function (file) {
    if (this._sourceFileData && file.id === this._sourceFileData.id) {
      return;
    }

    this._sourceFileData = file;
    this._filepath.innerHTML = file.filePath;
    let e = document.createElement('div');
    e.innerHTML = file.content;
    this._codeMirror.doc.setValue(e.innerText);
    this._refresh();
  },

  _refresh : function () {
    var that = this;
    setTimeout(function () {
      var fullHeight = parseInt(that._content.clientHeight);
      var headerHeight = that._filepath.clientHeight;

      that._codeMirror.setSize('auto', fullHeight - headerHeight);
      that._codeMirror.refresh();
    }, 200);
  },

  clearBubbles : function () {
    this._lineWidgets.forEach(function (widget) { widget.clear(); });
    this._lineWidgets = [];
  },

  getMessage : function (event, kind) {
    if (kind === 'macro') {
      var name = 'macro expansion' + (event.name ? ': ' + event.name : '');

      return '<span class="tag macro">' + name + '</span>'
        + this.escapeHTML(event.message).replace(/(?:\r\n|\r|\n)/g, '<br>');
    } else if (kind === 'note') {
      return '<span class="tag note">note</span>'
        +  this.escapeHTML(event.message).replace(/(?:\r\n|\r|\n)/g, '<br>');
    }
  },

  addExtraPathEvents : function (events, kind) {
    var that = this;

    if (!events) {
      return;
    }

    events.forEach(function (event) {
      if (event.fileId !== that._currentBugEvent.fileId) {
        return;
      }

      var left = that._codeMirror.defaultCharWidth() * event.column + 'px';

      var element = document.createElement('div');
      element.setAttribute('style', 'margin-left: ' + left);
      element.setAttribute('class', 'check-msg ' + kind);

      var msg = document.createElement('span');
      msg.innerHTML = that.getMessage(event, kind);
      element.appendChild(msg);

      that._lineWidgets.push(that._codeMirror.addLineWidget(
        event.line - 1, element));
    });
  },

  drawBugPath : function () {
    var that = this;

    this.clearBubbles();

    this.addExtraPathEvents(this._currentReport.macros, 'macro');
    this.addExtraPathEvents(this._currentReport.notes, 'note');

    // Processing bug path events.
    var currentEvents = this._currentReport.events;
    currentEvents.forEach(function (event, step) {
      if (event.fileId !== that._currentBugEvent.fileId)
        return;

      var left = that._codeMirror.defaultCharWidth() * event.column + 'px';
      var type = step === currentEvents.length - 1 ? 'error' : 'info';

      var element = document.createElement('div');
      element.setAttribute('style', 'margin-left: ' + left);
      element.setAttribute('class', 'check-msg ' + type);
      element.setAttribute('idx', step);

      var enumeration = document.createElement('span');
      enumeration.setAttribute('class', 'checker-enum ' + type);
      enumeration.innerHTML = step + 1;

      if (currentEvents.length > 1)
        element.appendChild(enumeration);

      var prevBugEvent = step - 1;
      if (step > 0) {
        var prevBug = document.createElement('span');
        prevBug.setAttribute('class', 'arrow left-arrow');
        prevBug.addEventListener('click', function () {
          var event = currentEvents[prevBugEvent];
          that.setCurrentBugEvent(event, prevBugEvent);
        });
        element.appendChild(prevBug);
      }

      var msg = document.createElement('span');
      msg.innerHTML = that.escapeHTML(event.message)
        .replace(/(?:\r\n|\r|\n)/g, '<br>');

      element.appendChild(msg);

      var nextBugEvent = step + 1;
      if (nextBugEvent < currentEvents.length) {
        var nextBug = document.createElement('span');
        nextBug.setAttribute('class', 'arrow right-arrow');
        nextBug.addEventListener('click', function () {
          var event = currentEvents[nextBugEvent];
          that.setCurrentBugEvent(event, nextBugEvent);
        });
        element.appendChild(nextBug);
      }


      that._lineWidgets.push(that._codeMirror.addLineWidget(
        event.line - 1, element));
    });
  },

  jumpTo : function (line, column) {
    var that = this;

    setTimeout(function () {
      var selPosPixel
        = that._codeMirror.charCoords({ line : line, ch : column }, 'local');
      var editorSize = {
        width  : that._editor.clientWidth,
        height : that._editor.clientHeight
      };

      that._codeMirror.scrollIntoView({
        top    : selPosPixel.top - 100,
        bottom : selPosPixel.top + editorSize.height - 150,
        left   : selPosPixel.left < editorSize.width - 100
               ? 0
               : selPosPixel.left - 50,
        right  : selPosPixel.left < editorSize.width - 100
               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }
}

 rc % hashSize;\n\t\t}\n\n\t\tstatic FB_SIZE_T hash(const K&amp; value, FB_SIZE_T hashSize)\n\t\t{\n\t\t\treturn hash(&amp;value, sizeof value, hashSize);\n\t\t}\n\t};\n\n\tinline constexpr FB_SIZE_T DEFAULT_HASH_SIZE = 97;\t// largest prime number &lt; 100\n\n\ttemplate &lt;typename C,\n\t\t\t  FB_SIZE_T HASHSIZE = DEFAULT_HASH_SIZE,\n\t\t\t  typename K = C,\t\t\t\t\t\t// default key\n\t\t\t  typename KeyOfValue = DefaultKeyValue&lt;C&gt;,\t// default keygen\n\t\t\t  typename F = DefaultHash&lt;K&gt; &gt;\t\t\t// hash function definition\n\tclass HashTable\n\t{\n\tpublic:\n\t\t// This class is supposed to be used as a BASE class for class to be hashed\n\t\tclass Entry\n\t\t{\n\t\tprivate:\n\t\t\tEntry** previousElement;\n\t\t\tEntry* nextElement;\n\n\t\tpublic:\n\t\t\tEntry() noexcept : previousElement(NULL), nextElement(NULL) { }\n\n\t\t\tvirtual ~Entry()\n\t\t\t{\n\t\t\t\tunLink();\n\t\t\t}\n\n\t\t\tvoid link(Entry** where) noexcept\n\t\t\t{\n\t\t\t\tunLink();\n\n\t\t\t\t// set our pointers\n\t\t\t\tpreviousElement = where;\n\t\t\t\tnextElement = previousElement ? *previousElement : NULL;\n\n\t\t\t\t// make next element (if present) to point to us\n\t\t\t\tif (nextElement)\n\t\t\t\t{\n\t\t\t\t\tnextElement-&gt;previousElement = &amp;nextElement;\n\t\t\t\t}\n\n\t\t\t\t// make previous element point to us\n\t\t\t\t*previousElement = this;\n\t\t\t}\n\n\t\t\tvoid unLink() noexcept\n\t\t\t{\n\t\t\t\t// if we are linked\n\t\t\t\tif (previousElement)\n\t\t\t\t{\n\t\t\t\t\tif (nextElement)\n\t\t\t\t\t{\n\t\t\t\t\t\t// adjust previous pointer in next element ...\n\t\t\t\t\t\tnextElement-&gt;previousElement = previousElement;\n\t\t\t\t\t}\n\t\t\t\t\t// ... and next pointer in previous element\n\t\t\t\t\t*previousElement = nextElement;\n\t\t\t\t\t// finally mark ourselves not linked\n\t\t\t\t\tpreviousElement = NULL;\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tEntry** nextPtr() noexcept\n\t\t\t{\n\t\t\t\treturn &amp;nextElement;\n\t\t\t}\n\n\t\t\tEntry* next() const noexcept\n\t\t\t{\n\t\t\t\treturn nextElement;\n\t\t\t}\n\n\t\t\tC* next(const K&amp; key)\n\t\t\t{\n\t\t\t\tEntry* e = next();\n\t\t\t\treturn (e &amp;&amp; e-&gt;isEqual(key)) ? e-&gt;get() : NULL;\n\t\t\t}\n\n\t\t\tvirtual bool isEqual(const K&amp;) const = 0;\n\t\t\tvirtual C* get() = 0;\n\t\t}; // class Entry\n\n\tpublic:\n\t\texplicit HashTable(MemoryPool&amp;) noexcept\n\t\t{\n\t\t}\n\n\t\tHashTable() noexcept\n\t\t{\n\t\t}\n\n\t\t~HashTable()\n\t\t{\n\t\t\t// by default we let hash entries be cleaned by someone else\n\t\t\tcleanup(NULL);\n\t\t}\n\n\t\tHashTable(const HashTable&amp;) = delete;\n\t\tHashTable&amp; operator= (const HashTable&amp;) = delete;\n\n\t\ttypedef void CleanupRoutine(C* toClean);\n\t\tvoid cleanup(CleanupRoutine* cleanupRoutine)\n\t\t{\n\t\t\tfor (FB_SIZE_T n = 0; n &lt; HASHSIZE; ++n)\n\t\t\t{\n\t\t\t\twhile (data[n])\n\t\t\t\t{\n\t\t\t\t\tEntry* entry = data[n];\n\t\t\t\t\tentry-&gt;unLink();\n\t\t\t\t\tif (cleanupRoutine)\n\t\t\t\t\t\tcleanupRoutine(entry-&gt;get());\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\tvoid enableDuplicates() noexcept\n\t\t{\n\t\t\tduplicates = true;\n\t\t}\n\n\tprivate:\n\t\tEntry* data[HASHSIZE]{};\n\t\tbool duplicates = false;\n\n\t\tEntry** locate(const K&amp; key, FB_SIZE_T h)\n\t\t{\n\t\t\tEntry** pointer = &amp;data[h];\n\t\t\twhile (*pointer)\n\t\t\t{\n\t\t\t\tif ((*pointer)-&gt;isEqual(key))\n\t\t\t\t{\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\t\t\t\tpointer = (*pointer)-&gt;nextPtr();\n\t\t\t}\n\n\t\t\treturn pointer;\n\t\t}\n\n\t\tEntry** locate(const K&amp; key)\n\t\t{\n\t\t\tconst FB_SIZE_T hashValue = F::hash(key, HASHSIZE);\n\t\t\tfb_assert(hashValue &lt; HASHSIZE);\n\t\t\treturn locate(key, hashValue % HASHSIZE);\n\t\t}\n\n\tpublic:\n\t\tbool add(C* value)\n\t\t{\n\t\t\tEntry** e = locate(KeyOfValue::generate(*value));\n\t\t\tif ((!duplicates) &amp;&amp; (*e))\n\t\t\t{\n\t\t\t\treturn false;\t// sorry, duplicate\n\t\t\t}\n\t\t\tvalue-&gt;link(e);\n\t\t\treturn true;\n\t\t}\n\n\t\tC* lookup(const K&amp; key)\n\t\t{\n\t\t\tEntry** e = locate(key);\n\t\t\treturn (*e) ? (*e)-&gt;get() : NULL;\n\t\t}\n\n\t\tC* remove(const K&amp; key)\n\t\t{\n\t\t\tEntry** e = locate(key);\n\t\t\tif (*e)\n\t\t\t{\n\t\t\t\tEntry* entry = *e;\n\t\t\t\tentry-&gt;unLink();\n\t\t\t\treturn entry-&gt;get();\n\t\t\t}\n\t\t\treturn NULL;\n\t\t}\n\n\tpublic:\n\t\tclass iterator\n\t\t{\n\t\tprivate:\n\t\t\tconst HashTable* hash;\n\t\t\tFB_SIZE_T elem;\n\t\t\tEntry* current;\n\n\t\t\titerator(const iterator&amp; i);\n\t\t\titerator&amp; operator= (const iterator&amp; i);\n\n\t\t\tvoid next()\n\t\t\t{\n\t\t\t\twhile (!current)\n\t\t\t\t{\n\t\t\t\t\tif (++elem &gt;= HASHSIZE)\n\t\t\t\t\t{\n\t\t\t\t\t\tbreak;\n\t\t\t\t\t}\n\t\t\t\t\tcurrent = hash-&gt;data[elem];\n\t\t\t\t}\n\t\t\t}\n\n\t\tpublic:\n\t\t\texplicit iterator(const HashTable&amp; h)\n\t\t\t\t: hash(&amp;h), elem(0), current(hash-&gt;data[elem])\n\t\t\t{\n\t\t\t\tnext();\n\t\t\t}\n\n\t\t\titerator&amp; operator++()\n\t\t\t{\n\t\t\t\tif (hasData())\n\t\t\t\t{\n\t\t\t\t\tcurrent = current-&gt;next();\n\t\t\t\t\tnext();\n\t\t\t\t}\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tbool hasData() const\n\t\t\t{\n\t\t\t\treturn current ? true : false;\n\t\t\t}\n\n\t\t\toperator C*() const\n\t\t\t{\n\t\t\t\tfb_assert(hasData());\n\t\t\t\treturn current-&gt;get();\n\t\t\t}\n\n\t\t\tC* operator -&gt;() const\n\t\t\t{\n\t\t\t\tfb_assert(hasData());\n\t\t\t\treturn current-&gt;get();\n\t\t\t}\n\n\t\t\tbool operator== (const iterator&amp; h) const\n\t\t\t{\n\t\t\t\treturn (hash == h.hash) &amp;&amp; (elem == h.elem) &amp;&amp; (current == h.current);\n\t\t\t}\n\n\t\t\tbool operator!= (const iterator&amp; h) const\n\t\t\t{\n\t\t\t\treturn !(*this == h);\n\t\t\t}\n\t\t}; // class iterator\n\t}; // class HashTable\n\n\tclass InternalHash\n\t{\n\tpublic:\n\t\tstatic unsigned int hash(unsigned int length, const UCHAR* value) noexcept;\n\n\t\tstatic unsigned int hash(unsigned int length, const UCHAR* value, unsigned int hashSize) noexcept\n\t\t{\n\t\t\treturn hash(length, value) % hashSize;\n\t\t se;\n\n\t\t\t\tcase 1:\n\t\t\t\tcase 2:\n\t\t\t\t\treturn true;\n\n\t\t\t\tcase 3:\n\t\t\t\t\troutine = lookupById(tdbb, work-&gt;dfw_id, false, true, 0);\n\t\t\t\t\tif (!routine)\n\t\t\t\t\t\treturn false;\n\n\t\t\t\t\tif (routine-&gt;existenceLock)\n\t\t\t\t\t{\n\t\t\t\t\t\t// Let routine be deleted if only this transaction is using it\n\n\t\t\t\t\t\tif (!LCK_convert(tdbb, routine-&gt;existenceLock, LCK_EX,\n\t\t\t\t\t\t\t\ttransaction-&gt;getLockWait()))\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\traiseRoutineInUseError(routine, name);\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\n\t\t\t\t\t// If we are in a multi-client server, someone else may have marked\n\t\t\t\t\t// routine obsolete. Unmark and we will remark it later.\n\n\t\t\t\t\troutine-&gt;flags &amp;= ~Routine::FLAG_OBSOLETE;\n\t\t\t\t\treturn true;\n\n\t\t\t\tcase 4:\n\t\t\t\t{\n\t\t\t\t\troutine = lookupById(tdbb, work-&gt;dfw_id, false, true, 0);\n\t\t\t\t\tif (!routine)\n\t\t\t\t\t\treturn false;\n\n\t\t\t\t\t// Do not allow to modify routine used by user requests\n\t\t\t\t\tif (routine-&gt;isUsed() &amp;&amp; MET_routine_in_use(tdbb, routine))\n\t\t\t\t\t{\n\t\t\t\t\t\t///raiseRoutineInUseError(routine, name);\n\t\t\t\t\t\tgds__log(&quot;Modifying %s %s which is currently in use by active user requests&quot;,\n\t\t\t\t\t\t\t\t Self::getTypeStr(), name.toQuotedString().c_str());\n\n\t\t\t\t\t\tUSHORT alterCount = routine-&gt;alterCount;\n\n\t\t\t\t\t\tif (alterCount &gt; Routine::MAX_ALTER_COUNT)\n\t\t\t\t\t\t\traiseTooManyVersionsError(routine-&gt;getObjectType(), work-&gt;getQualifiedName());\n\n\t\t\t\t\t\tif (routine-&gt;existenceLock)\n\t\t\t\t\t\t\tLCK_release(tdbb, routine-&gt;existenceLock);\n\n\t\t\t\t\t\tSelf::clearId(tdbb-&gt;getAttachment(), routine-&gt;getId());\n\n\t\t\t\t\t\tif (!(routine = lookupById(tdbb, work-&gt;dfw_id, false,\n\t\t\t\t\t\t\t\ttrue, Routine::FLAG_BEING_ALTERED)))\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\treturn false;\n\t\t\t\t\t\t}\n\n\t\t\t\t\t\troutine-&gt;alterCount = ++alterCount;\n\t\t\t\t\t}\n\n\t
