:\n\t\t\tAbstractString(Comparator::getMaxLength(), static_cast&lt;size_type&gt;(strlen((char*)s)), (char*)s) {}\n\t\tStringBase(const MetaString&amp; v) : AbstractString(Comparator::getMaxLength(), v) {}\n\t\tStringBase(size_type n, char_type c) : AbstractString(Comparator::getMaxLength(), n, c) {}\n\t\tStringBase(const_iterator first, const_iterator last) :\n\t\t\tAbstractString(Comparator::getMaxLength(), last - first, first) {}\n\t\texplicit StringBase(MemoryPool&amp; p) : AbstractString(Comparator::getMaxLength(), p) {}\n\t\tStringBase(MemoryPool&amp; p, const AbstractString&amp; v) : AbstractString(Comparator::getMaxLength(), p, v) {}\n\t\tStringBase(MemoryPool&amp; p, const_pointer s) :\n\t\t\tAbstractString(Comparator::getMaxLength(), p, s, static_cast&lt;size_type&gt;(s ? strlen(s) : 0)) {}\n\t\tStringBase(MemoryPool&amp; p, const char_type* s, size_type l) :\n\t\t\tAbstractString(Comparator::getMaxLength(), p, s, l) {}\n\t\tStringBase(StringType&amp;&amp; rhs) :\n\t\t\tAbstractString(Comparator::getMaxLength(), std::forward&lt;AbstractString&gt;(rhs)) {}\n\t\tStringBase(MemoryPool&amp; p, StringType&amp;&amp; rhs) :\n\t\t\tAbstractString(Comparator::getMaxLength(), p, std::forward&lt;AbstractString&gt;(rhs)) {}\n\n\t\tstatic size_type max_length()\n\t\t{\n\t\t\treturn Comparator::getMaxLength();\n\t\t}\n\n\t\tStringType&amp; assign(const StringType&amp; str)\n\t\t{\n\t\t\tfb_assert(&amp;str != this);\n\t\t\treturn assign(str.c_str(), str.length());\n\t\t}\n\t\tStringType&amp; assign(const StringType&amp; str, size_type pos, size_type n)\n\t\t{\n\t\t\tfb_assert(&amp;str != this);\n\t\t\tadjustRange(str.length(), pos, n);\n\t\t\treturn assign(&amp;str.c_str()[pos], n);\n\t\t}\n\t\tStringType&amp; assign(const void* s, size_type n)\n\t\t{\n\t\t\tmemcpy(baseAssign(n), s, n);\n\t\t\treturn *this;\n\t\t}\n\t\tStringType&amp; assign(const_pointer s)\n\t\t{\n\t\t\treturn assign(s, static_cast&lt;size_type&gt;(strlen(s)));\n\t\t}\n\t\tStringType&amp; assign(size_type n, char_type c)\n\t\t{\n\t\t\tmemset(baseAssign(n), c, n);\n\t\t\treturn *this;\n\t\t}\n\t\tStringType&amp; assign(const_iterator first, const_iterator last)\n\t\t{\n\t\t\treturn assign(first, last - first);\n\t\t}\n\t\tStringType&amp; assign(std::string_view s)\n\t\t{\n\t\t\treturn assign(s.data(), static_cast&lt;size_type&gt;(s.length()));\n\t\t}\n\n\t\tStringType&amp; operator=(const StringType&amp; v)\n\t\t{\n\t\t\tif (&amp;v == this)\n\t\t\t\treturn *this;\n\t\t\treturn assign(v);\n\t\t}\n\t\tStringType&amp; operator=(const_pointer s)\n\t\t{\n\t\t\treturn assign(s, static_cast&lt;size_type&gt;(strlen(s)));\n\t\t}\n\t\tStringType&amp; operator=(char_type c)\n\t\t{\n\t\t\treturn assign(&amp;c, 1);\n\t\t}\n\t\tStringType&amp; operator+=(const StringType&amp; v)\n\t\t{\n\t\t\tfb_assert(&amp;v != this);\n\t\t\tappend(v);\n\t\t\treturn *this;\n\t\t}\n\t\tStringType&amp; operator+=(const_pointer s)\n\t\t{\n\t\t\tappend(s);\n\t\t\treturn *this;\n\t\t}\n\t\tStringType&amp; operator+=(char_type c)\n\t\t{\n\t\t\tappend(1, c);\n\t\t\treturn *this;\n\t\t}\n\t\tStringType operator+(const StringType&amp; v) const\n\t\t{\n\t\t\treturn add(v.c_str(), v.length());\n\t\t}\n\t\tStringType operator+(const_pointer s) const\n\t\t{\n\t\t\treturn add(s, static_cast&lt;size_type&gt;(strlen(s)));\n\t\t}\n\t\tStringType operator+(char_type c) const\n\t\t{\n\t\t\treturn add(&amp;c, 1);\n\t\t}\n\t\tStringType&amp; operator=(StringType&amp;&amp; rhs)\n\t\t{\n\t\t\t// baseMove do not clear the buffer so do it in this method\n\t\t\tchar_type* backup = nullptr;\n\t\t\tif (stringBuffer != inlineBuffer)\n\t\t\t\tbackup = stringBuffer;\n\n\t\t\tif (baseMove(std::forward&lt;AbstractString&gt;(rhs)))\n\t\t\t{\n\t\t\t\t// The dynamic buffer has been replaced, so clear the old one\n\t\t\t\tdelete[] backup;\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\t// Cannot move, do the base assignment\n\t\t\t\tassign(rhs.c_str(), rhs.length());\n\t\t\t}\n\t\t\treturn *this;\n\t\t}\n\n\t\tStringBase&lt;StringComparator&gt; ToString() const\n\t\t{\n\t\t\treturn StringBase&lt;StringComparator&gt;(c_str());\n\t\t}\n\t\tStringBase&lt;PathNameComparator&gt; ToPathName() const\n\t\t{\n\t\t\treturn StringBase&lt;PathNameComparator&gt;(c_str());\n\t\t}\n\t\tStringBase&lt;IgnoreCaseComparator&gt; ToNoCaseString() const\n\t\t{\n\t\t\treturn StringBase&lt;IgnoreCaseComparator&gt;(c_str());\n\t\t}\n\n\t\tStringType substr(size_type pos = 0, size_type n = npos) const\n\t\t{\n\t\t\tadjustRange(length(), pos, n);\n\t\t\treturn StringType(&amp;c_str()[pos], n);\n\t\t}\n\t\tint compare(const StringType&amp; str) const\n\t\t{\n\t\t\treturn compare(str.c_str(), str.length());\n\t\t}\n\t\tint compare(size_type p0, size_type n0, const StringType&amp; str)\n\t\t{\n\t\t\treturn compare(p0, n0, str.c_str(), str.length());\n\t\t}\n\t\tint compare(size_type p0, size_type n0, const StringType&amp; str, size_type pos, size_type n)\n\t\t{\n\t\t\tadjustRange(str.length(), pos, n);\n\t\t\treturn compare(p0, n0, &amp;str.c_str()[pos], n);\n\t\t}\n\t\tint compare(const_pointer s) const\n\t\t{\n\t\t\treturn compare(s, static_cast&lt;size_type&gt;(strlen(s)));\n\t\t}\n\t\tint compare(size_type p0, size_type n0, const_pointer s, const size_type n) const\n\t\t{\n\t\t\tadjustRange(length(), p0, n0);\n\t\t\tconst size_type ml = n0 &lt; n ? n0 : n;\n\t\t\tconst int rc = Comparator::compare(&amp;c_str()[p0], s, ml);\n\t\t\treturn rc ? rc : n0 - n;\n\t\t}\n\t\tint compare(const_pointer s, const size_type n) const\n\t\t{\n\t\t\tconst size_type ml = length() &lt; n ? length() : n;\n\t\t\tconst int rc = Comparator::compare(c_str(), s, ml);\n\t\t\tif (rc)\n\t\t\t{\n\t\t\t\treturn rc;\n\t\t\t}\n\t\t\tconst difference_type dl = length() - n;\n\t\t\treturn (dl &lt; 0) ? -1 : (dl &gt; 0) ? 1 : 0;\n\t\t}\n\n\t\t// These four functions are to speed up the most common comparisons: equality and inequality.\n\t\tbool equals(const StringType&amp; str) const\n\t\t{\n\t\t\tconst size_type n = str.length();\n\t\t\treturn (length() != n) ? false : (Comparator::compare(c_str(), str.c_str(), n) == 0);\n\t\t}\n\t\tbool different(const StringType&amp; str) const\n\t\t{\n\t\t\tconst size_type n = str.length();\n\t\t\treturn (length() != n) ? true : (Comparator::compare(c_str(), str.c_str(), n) != 0);\n\t\t}\n\t\tbool equals(const_pointer s) const\n\t\t{\n\t\t\tconst size_type n = static_cast&lt;size_type&gt;(strlen(s));\n\t\t\treturn (length() != n) ? false : (Comparator::compare(c_str(), s, n) == 0);\n\t\t}\n\t\tbool different(const_pointer s) const\n\t\t{\n\t\t\tconst size_type n = static_cast&lt;size_type&gt;(strlen(s));\n\t\t\treturn (length() != n) ? true : (Comparator::compare(c_str(), s, n) != 0);\n\t\t}\n\n\t\tbool operator&lt; (const StringType&amp; str) const {return compare(str) &lt;  0;}\n\t\tbool operator&lt;=(const StringType&amp; str) const {return compare(str) &lt;= 0;}\n\t\tbool operator==(const StringType&amp; str) const {return equals(str);}\n\t\tbool operator&gt;=(const StringType&amp; str) const {return compare(str) &gt;= 0;}\n\t\tbool operator&gt; (const StringType&amp; str) const {return compare(str) &gt;  0;}\n\t\tbool operator!=(const StringType&amp; str) const {return different(str);}\n\n\t\tbool operator&lt; (const char_type* str) const {return compare(str) &lt;  0;}\n\t\tbool operator&lt;=(const char_type* str) const {return compare(str) &lt;= 0;}\n\t\tbool operator==(const char_type* str) const {return equals(str);}\n\t\tbool operator&gt;=(const char_type* str) const {return compare(str) &gt;= 0;}\n\t\tbool operator&gt; (const char_type* str) const {return compare(str) &gt;  0;}\n\t\tbool operator!=(const char_type* str) const {return different(str);}\n\n\t\tbool getWord(StringType&amp; from, const char* sep)\n\t\t{\n\t\t\tfrom.alltrim(sep);\n\t\t\tsize_type p = from.find_first_of(sep);\n\t\t\tif (p == npos)\n\t\t\t{\n\t\t\t\tif (from.isEmpty())\n\t\t\t\t{\n\t\t\t\t\t*this = &quot;&quot;;\n\t\t\t\t\treturn false;\n\t\t\t\t}\n\t\t\t\t*this = from;\n\t\t\t\tfrom = &quot;&quot;;\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\t*this = from.substr(0, p);\n\t\t\tfrom = from.substr(p);\n\t\t\tfrom.ltrim(sep);\n\t\t\treturn true;\n\t\t}\n    };\n\n\ttypedef StringBase&lt;StringComparator&gt; string;\n\tstatic inline string operator+(string::const_pointer s, const string&amp; str)\n\t{\n\t\tstring rc(s);\n\t\trc += str;\n\t\treturn rc;\n\t}\n\tstatic inline string operator+(string::char_type c, const string&amp; str)\n\t{\n\t\tstring rc(1, c);\n\t\trc += str;\n\t\treturn rc;\n\t}\n\n\ttypedef StringBase&lt;PathNameComparator&gt; PathName;\n\tstatic inline PathName operator+(PathName::const_pointer s, const PathName&amp; str)\n\t{\n\t\tPathName rc(s);\n\t\trc += str;\n\t\treturn rc;\n\t}\n\tstatic inline PathName operator+(PathName::char_type c, const PathName&amp; str)\n\t{\n\t\tPathName rc(1, c);\n\t\trc += str;\n\t\treturn rc;\n\t}\n\n\ttypedef StringBase&lt;IgnoreCaseComparator&gt; NoCaseString;\n\tstatic inline NoCaseString operator+(NoCaseString::const_pointer s, const NoCaseString&amp; str)\n\t{\n\t\tNoCaseString rc(s);\n\t\trc += str;\n\t\treturn rc;\n\t}\n\tstatic inline NoCaseString operator+(NoCaseString::char_type c, const NoCaseString&amp; str)\n\t{\n\t\tNoCaseString rc(1, c);\n\t\trc += str;\n\t\treturn rc;\n\t}\n\n\t// reference-counted strings\n\ttypedef AnyRef&lt;string&gt; RefString;\n\ttypedef RefPtr&lt;RefString&gt; RefStrPtr;\n}\n\n\n#endif\t// INCLUDE_FB_STRING_H\n"}, "/build/src/common/isc_s_proto.h": {"id": "/build/src/common/isc_s_proto.h", "filePath": "src/common/isc_s_proto.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tisc_s_proto.h\n *\tDESCRIPTION:\tPrototype header file for isc_sync.cpp\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n * 2002.10.30 Sean Leyne - Removed support for obsolete &quot;PC_PLATFORM&quot; define\n *\n */\n\n#ifndef JRD_ISC_S_PROTO_H\n#define JRD_ISC_S_PROTO_H\n\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n\n// Firebird platform-specific synchronization data structures\n\n#ifdef LINUX\n// This hack fixes CORE-2896 - embedded connections fail on linux.\n// Looks like a lot of linux kernels are buggy when working with PRIO_INHERIT mutexes.\n// dimitr (10-11-2016): PRIO_INHERIT also causes undesired short-time sleeps (CPU idle 30-35%)\n// during context switches under concurrent load. Proved on linux kernels up to 4.8.\n#undef HAVE_PTHREAD_MUTEXATTR_SETPROTOCOL\n#endif\n\n#if defined(HAVE_MMAP) || defined(WIN_NT)\n#define HAVE_OBJECT_MAP\n#endif\n\n#if defined(HAVE_MMAP)\n#define USE_MUTEX_MAP\n#endif\n\n\n#ifdef UNIX\n\n#if defined(HAVE_PTHREAD_MUTEXATTR_SETROBUST) &amp;&amp; defined(HAVE_PTHREAD_MUTEX_CONSISTENT)\n#define USE_ROBUST_MUTEX\n#endif // ROBUST mutex\n\n#include &quot;fb_pthread.h&quot;\n\n#define HAVE_SHARED_MUTEX_SECTION\n\nnamespace Firebird {\n\nstruct mtx\n{\n\tpthread_mutex_t mtx_mutex[1];\n};\n\nstruct event_t\n{\n\tSLONG event_count;\n\tint event_pid;\n\tpthread_mutex_t event_mutex[1];\n\tpthread_cond_t event_cond[1];\n};\n\n#endif // UNIX\n\n\n#ifdef WIN_NT\n#include &lt;windows.h&gt;\n\nnamespace Firebird {\n\nstruct FAST_MUTEX_SHARED_SECTION\n{\n\tSLONG fInitialized;\n\tSLONG lSpinLock;\n\tSLONG lThreadsWaiting;\n\tSLONG lAvailable;\n\tSLONG lOwnerPID;\n#ifdef DEV_BUILD\n\tSLONG lThreadId;\n#endif\n};\n\nstruct FAST_MUTEX\n{\n\tHANDLE hEvent;\n\tHANDLE hFileMap;\n\tSLONG lSpinCount;\n\tvolatile FAST_MUTEX_SHARED_SECTION* lpSharedInfo;\n};\n\nstruct mtx\n{\n\tFAST_MUTEX mtx_fast;\n};\n\n// Enforce equal binary layout for both 32 and 64-bit platforms as instances of\n// event_t is used in shared memory.\nstruct event_t\n{\n\tSLONG event_pid;\n\tSLONG event_id;\n\tSLONG event_count;\n\tunion\n\t{\n\t\tHANDLE event_handle;\n\t\tFB_UINT64 dummy;\n\t};\n};\n\n#endif // WIN_NT\n\nclass MemoryHeader\n{\npublic:\n\tstatic constexpr USHORT HEADER_VERSION = 2;\n\n\t// Values for mhb_flags\n\tstatic constexpr USHORT FLAG_DELETED = 1;\t// Shared file has been deleted\n\n\tvoid init(USHORT type, USHORT version)\n\t{\n\t\tmhb_type = type;\n\t\tmhb_header_version = HEADER_VERSION;\n\t\tmhb_version = version;\n\t\tmhb_timestamp = TimeStamp::getCurrentTimeStamp().value();\n\t\tmhb_flags = 0;\n#ifdef HAVE_SHARED_MUTEX_SECTION\n\t\tfb_assert(sizeof(mhb_mutex) &lt;= sizeof(dummy));\n#endif\n\t}\n\n\tbool check(const char* name, USHORT type, USHORT version, bool raiseError = true) const;\n\n\tvoid markAsDeleted() noexcept\n\t{\n\t\tmhb_flags |= FLAG_DELETED;\n\t}\n\n\tbool isDeleted() const noexcept\n\t{\n\t\treturn (mhb_flags &amp; FLAG_DELETED);\n\t}\n\n\tUSHORT mhb_type;\n\tUSHORT mhb_header_version;\n\tUSHORT mhb_version;\n\tUSHORT mhb_flags;\n\tGDS_TIMESTAMP mhb_timestamp;\n\tunion\n\t{\n#ifdef HAVE_SHARED_MUTEX_SECTION\n\t\tstruct mtx mhb_mutex;\n#endif\n\t\tFB_UINT64 dummy[8];\t\t\t// make sizeof(MemoryHeader) OS-independent\n\t};\n};\n\n\n#ifdef UNIX\n\n#if !defined(HAVE_FLOCK)\n#define USE_FCNTL\n#endif\n\nclass SharedFileInfo;\n\nclass FileLock\n{\n\tfriend class CountedRWLock;\n\npublic:\n\tenum LockMode {FLM_EXCLUSIVE, FLM_TRY_EXCLUSIVE, FLM_SHARED};\n\n\ttypedef void InitFunction(int fd);\n\n\texplicit FileLock(const char* fileName, InitFunction* init = NULL);\n\t~FileLock();\n\n\t// Main function to lock file\n\tint setlock(const LockMode mode);\n\n\t// Alternative locker is using status vector to report errors\n\tbool setlock(Firebird::CheckStatusWrapper* status, const LockMode mode);\n\n\t// Unlocking can only put error into log file - we can&#x27;t throw in dtors\n\tvoid unlock();\n\n\t// Obvious access to file descriptor\n\tint getFd();\n\n\tenum LockLevel {LCK_NONE, LCK_SHARED, LCK_EXCL};\n\nprivate:\n\tFirebird::RefPtr&lt;SharedFileInfo&gt; file;\n\tInitFunction* initFunction;\n\tLockLevel level;\n};\n\n#endif // UNIX\n\n\nclass SharedMemoryBase;\t\t// forward\n\nclass IpcObject\n{\npublic:\n\tvirtual bool initialize(SharedMemoryBase*, bool) = 0;\n\tvirtual void mutexBug(int osErrorCode, const char* text) = 0;\n\t//virtual void eventBug(int osErrorCode, const char* text) = 0;\n\n\tvirtual USHORT getType() const = 0;\n\tvirtual USHORT getVersion() const = 0;\n\tvirtual const char* getName() const = 0;\n\n\tvirtual void initHeader(MemoryHeader* header)\n\t{\n\t\theader-&gt;init(getType(), getVersion());\n\t}\n\n\tvirtual bool checkHeader(const MemoryHeader* header, bool raiseError = true)\n\t{\n\t\treturn header-&gt;check(getName(), getType(), getVersion(), raiseError);\n\t}\n};\n\n\n// NS 2014-08-11: FIXME - this class needs major refactoring:\n// - remove conditional compilation from header file (for example,\n//   you can use virtual interface and factory method to create\n//   implementation-specific instance)\n// - hide implementation details from interface\n// - users of shared mutex implemented by this class shall be using\n//   RAII SharedMutexGuard to improve reliability of code\n// - shared memory initialization shall be separate from construction\n//   so users (event.cpp, tpc.cpp) can avoid storing pointers to a\n//   partially constructed object in code\nclass SharedMemoryBase\n{\npublic:\n\tSharedMemoryBase(const TEXT* fileName, ULONG size, IpcObject* cb, bool skipLock);\n\t~SharedMemoryBase();\n\n#ifdef HAVE_OBJECT_MAP\n\tUCHAR* mapObject(Firebird::CheckStatusWrapper* status, ULONG offset, ULONG size);\n\tvoid unmapObject(Firebird::CheckStatusWrapper* status, UCHAR** object, ULONG size);\n#endif\n\tbool remapFile(Firebird::CheckStatusWrapper* status, ULONG newSize, bool truncateFlag);\n\tvoid removeMapFile();\n\tstatic void unlinkFile(const TEXT* expanded_filename) noexcept;\n\tFirebird::PathName getMapFileName();\n\n\tvoid mutexLock();\n\tbool mutexLockCond();\n\tvoid mutexUnlock();\n\n\tint eventInit(event_t* event);\n\tvoid eventFini(event_t* event);\n\tSLONG eventClear(event_t* event);\n\tint eventWait(event_t* event, const SLONG value, const SLONG micro_seconds);\n\tint eventPost(event_t* event);\n\npublic:\n#ifdef UNIX\n\tFirebird::AutoPtr&lt;FileLock&gt; mainLock;\n#endif\n#ifdef WIN_NT\n\tstruct mtx sh_mem_winMutex;\n\tstruct mtx* sh_mem_mutex;\n#endif\n#ifdef HAVE_SHARED_MUTEX_SECTION\n\tstruct mtx* sh_mem_mutex;\n#endif\n\n#ifdef UNIX\n\tFirebird::AutoPtr&lt;FileLock&gt; initFile;\n#endif\n\n\tULONG\tsh_mem_length_mapped;\n#ifdef WIN_NT\n\tHANDLE\tsh_mem_handle;\t\t\t\t\t// file handle\n\tHANDLE\tsh_mem_object;\t\t\t\t\t// file mapping\n\tHANDLE\tsh_mem_interest;\t\t\t\t// event\n\tHANDLE\tsh_mem_hdr_object;\t\t\t\t// file mapping\n\tULONG*\tsh_mem_hdr_address;\n#endif\n\tTEXT\tsh_mem_name[MAXPATHLEN];\n\tMemoryHeader* volatile sh_mem_header; // NS 2014-08-01: FIXME: Why use volatile pointer and not volatile MemoryHeader????\n\t\t\t\t\t\t\t\t\t\t  // Also, &quot;volatile&quot; variables should never be used directly, only via atomics API\n\t\t\t\t\t\t\t\t\t\t  // because there is no portable barrier semantics for them. Only MS2005+ generate\n\t\t\t\t\t\t\t\t\t\t  // barriers, and all other compilers generally do not.\n\nprivate:\n\tIpcObject* sh_mem_callback;\n#ifdef WIN_NT\n\tbool sh_mem_unlink;\n#endif\n\tvoid unlinkFile();\n\tvoid internalUnmap();\n\npublic:\n\tenum MemoryTypes\n\t{\n\t\tSRAM_LOCK_MANAGER = 0xFF,\t\t// To avoid mixing with old files no matter of endianness\n\t\tSRAM_DATABASE_SNAPSHOT = 0xFE,\t// use downcount for shared memory types\n\t\tSRAM_EVENT_MANAGER = 0xFD,\n\t\tSRAM_TRACE_CONFIG = 0xFC,\n\t\tSRAM_TRACE_LOG = 0xFB,\n\t\tSRAM_MAPPING_RESET = 0xFA,\n\t\tSRAM_TPC_HEADER = 0xF9,\n\t\tSRAM_TPC_BLOCK = 0xF8,\n\t\tSRAM_TPC_SNAPSHOTS = 0xF7,\n\t\tSRAM_CHANGELOG_STATE = 0xF6,\n\t\tSRAM_TRACE_AUDIT_MTX = 0xF5,\n\t\tSRAM_PROFILER = 0XF4\n\t};\n\nprotected:\n\tvoid logError(const char* text, const Firebird::CheckStatusWrapper* status);\n};\n\ntemplate &lt;class Header&gt;\t\t// Header must be &quot;public MemoryHeader&quot;\nclass SharedMemory : public SharedMemoryBase\n{\npublic:\n\tSharedMemory(const TEXT* fileName, ULONG size, IpcObject* cb, bool skipLock = false)\n\t\t: SharedMemoryBase(fileName, size, cb, skipLock)\n\t{ }\n\n#ifdef HAVE_OBJECT_MAP\n\ttemplate &lt;class Object&gt; Object* mapObject(Firebird::CheckStatusWrapper* status, ULONG offset)\n\t{\n\t\treturn (Object*) SharedMemoryBase::mapObject(status, offset, sizeof(Object));\n\t}\n\n\ttemplate &lt;class Object&gt; void unmapObject(Firebird::CheckStatusWrapper* status, Object** object)\n\t{\n\t\tSharedMemoryBase::unmapObject(status, (UCHAR**) object, sizeof(Object));\n\t}\n#endif\n\npublic:\n\tvoid setHeader(Header* hdr)\n\t{\n\t\tsh_mem_header = hdr;\t// This implicit cast ensures that Header is &quot;public MemoryHeader&quot;\n\t}\n\n\tconst Header* getHeader() const\n\t{\n\t\treturn (const Header*) sh_mem_header;\n\t}\n\n\tHeader* getHeader()\n\t{\n\t\treturn (Header*) sh_mem_header;\n\t}\n\n};\n\nclass SharedMutexGuard\n{\npublic:\n\texplicit SharedMutexGuard(SharedMemoryBase* shmem, bool init_lock = true)\n\t\t: m_shmem(shmem)\n\t{\n\t\tif (init_lock)\n\t\t\tlock();\n\t\telse\n\t\t\tm_locked = false;\n\t}\n\n\tSharedMutexGuard(const SharedMutexGuard&amp;) = delete;\n\tSharedMutexGuard&amp; operator=(const SharedMutexGuard&amp;) = delete;\n\n\tbool tryLock() {\n\t\tm_locked = m_shmem-&gt;mutexLockCond();\n\t\treturn m_locked;\n\t}\n\n\tvoid lock() {\n\t\tm_shmem-&gt;mutexLock();\n\t\tm_locked = true;\n\t}\n\n\tvoid unlock() {\n\t\tm_shmem-&gt;mutexUnlock();\n\t\tm_locked = false;\n\t}\n\n\tbool isLocked() noexcept {\n\t\treturn m_locked;\n\t}\n\n\t~SharedMutexGuard()\n\t{\n\t\tif (m_locked)\n\t\t\tm_shmem-&gt;mutexUnlock();\n\t}\n\nprivate:\n\tSharedMemoryBase* m_shmem;\n\tbool m_locked;\n};\n\n\n} // namespace Firebird\n\n#ifdef WIN_NT\nint\t\tISC_mutex_init(struct Firebird::mtx*, const TEXT*);\nvoid\tISC_mutex_fini(struct Firebird::mtx*);\nint\t\tISC_mutex_lock(struct Firebird::mtx*);\nint\t\tISC_mutex_unlock(struct Firebird::mtx*);\n#endif\n\nULONG\tISC_exception_post(ULONG, const TEXT*, ISC_STATUS&amp;);\n\n#endif // JRD_ISC_S_PROTO_H\n"}, "/build/src/common/StatusHolder.h": {"id": "/build/src/common/StatusHolder.h", "filePath": "src/common/StatusHolder.h", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusHolder.h\n *\tDESCRIPTION:\tFirebird&#x27;s exception classes\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Vlad Khorsun\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2007 Vlad Khorsun &lt;hvlad at users.sourceforge.net&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_STATUS_HOLDER\n#define FB_STATUS_HOLDER\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/DynamicStrings.h&quot;\n\nnamespace Firebird {\n\n// DynamicVector owns strings, contained in it\ntemplate &lt;unsigned S&gt;\nclass DynamicVector : private SimpleStatusVector&lt;S&gt;\n{\npublic:\n\texplicit DynamicVector(MemoryPool&amp; p)\n\t\t: SimpleStatusVector&lt;S&gt;(p)\n\t{\n\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t}\n\n\t~DynamicVector()\n\t{\n\t\tdelete[] findDynamicStrings(this-&gt;getCount(), this-&gt;begin());\n\t}\n\nprivate:\n\tchar* prepareForNewValue()\n\t{\n\t\t// Do not delete old strings buffer because strings from it\n\t\t// may be used in status vector passed to current save() call.\n\t\t// I.e. strings should be first saved in new dynamic buffer and only afterwards\n\t\t// old buffer may be released.\n\t\tchar* oldBuffer = findDynamicStrings(this-&gt;getCount(), this-&gt;begin());\n\t\tthis-&gt;resize(0);\n\t\treturn oldBuffer;\n\t}\n\npublic:\n\tvoid clear()\n\t{\n\t\tdelete[] this-&gt;prepareForNewValue();\n\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t}\n\n\tvoid save(unsigned int length, const ISC_STATUS* status, bool warningMode) noexcept\n\t{\n\t\ttry\n\t\t{\n\t\t\tchar* oldBuffer = this-&gt;prepareForNewValue();\n\t\t\tISC_STATUS* b = this-&gt;getBuffer(length + 1);\n\t\t\tunsigned newLen = makeDynamicStrings(length, b, status);\n\t\t\tdelete[] oldBuffer;\n\n\t\t\tfb_assert(newLen &lt;= length);\n\n\t\t\t// Sanity check\n\t\t\tif (newLen &lt; 2)\n\t\t\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t\t\telse\n\t\t\t\tthis-&gt;resize(newLen + 1);\n\t\t}\n\t\tcatch (const BadAlloc&amp;)\n\t\t{\n\t\t\tif (!warningMode)\n\t\t\t{\n\t\t\t\t// do not use stuff here to avoid endless cycle\n\t\t\t\tthis-&gt;shrink(3);\n\t\t\t\tISC_STATUS* s = this-&gt;getBuffer(3);\t// Should not throw - see assert() in ctor\n\t\t\t\tfb_utils::statusBadAlloc(s);\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tthis-&gt;clear();\n\t\t\t}\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tfb_assert(false);\n\n\t\t\tthis-&gt;shrink(3);\n\t\t\tISC_STATUS* s = this-&gt;getBuffer(3);\t// Should not throw - see assert() in ctor\n\t\t\tfb_utils::statusUnknown(s);\n\t\t}\n\t}\n\n\tISC_STATUS save(const ISC_STATUS* status, bool warningMode = false) noexcept\n\t{\n\t\tsave(fb_utils::statusLength(status), status, warningMode);\n\t\treturn status[1];\n\t}\n\n\tconst ISC_STATUS* value() const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::begin();\n\t}\n\n\tunsigned length() const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::getCount();\n\t}\n\n\tISC_STATUS operator[](unsigned int index) const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::operator[](index);\n\t}\n};\n\n\n// DynamicStatusVector performs error/success checks and load from IStatus\nclass DynamicStatusVector : public DynamicVector&lt;ISC_STATUS_LENGTH&gt;\n{\npublic:\n\tDynamicStatusVector()\n\t\t: DynamicVector(*getDefaultMemoryPool())\n\t{ }\n\n\tISC_STATUS load(const IStatus* status);\n\n\tISC_STATUS getError() const\n\t{\n\t\treturn value()[1];\n\t}\n\n\tbool isSuccess() const\n\t{\n\t\treturn getError() == 0;\n\t}\n};\n\n\n// Implements IStatus using 2 DynamicVectors\ntemplate &lt;class Final&gt;\nclass BaseStatus : public IStatusImpl&lt;Final, CheckStatusWrapper&gt;\n{\npublic:\n\t// IStatus implementation\n\tvoid init()\n\t{\n\t\terrors.clear();\n\t\twarnings.clear();\n\t}\n\n\tvoid setErrors(const ISC_STATUS* value)\n\t{\n\t\terrors.save(fb_utils::statusLength(value), value, false);\n\t}\n\n\tvoid setErrors2(unsigned int length, const ISC_STATUS* value)\n\t{\n\t\terrors.save(length, value, false);\n\t}\n\n\tvoid setWarnings(const ISC_STATUS* value)\n\t{\n\t\twarnings.save(fb_utils::statusLength(value), value, true);\n\t}\n\n\tvoid setWarnings2(unsigned int length, const ISC_STATUS* value)\n\t{\n\t\twarnings.save(length, value, true);\n\t}\n\n\tconst ISC_STATUS* getErrors() const\n\t{\n\t\treturn errors.value();\n\t}\n\n\tconst ISC_STATUS* getWarnings() const\n\t{\n\t\treturn warnings.value();\n\t}\n\n\tunsigned getState() const\n\t{\n\t\treturn (errors.value()[1] ? IStatus::STATE_ERRORS : 0) |\n\t\t\t   (warnings.value()[1] ? IStatus::STATE_WARNINGS  : 0);\n\t}\n\n\tIStatus* clone() const\n\t{\n\t\tIStatus* ret = MasterInterfacePtr()-&gt;getStatus();\n\n\t\tret-&gt;setWarnings(getWarnings());\n\t\tret-&gt;setErrors(getErrors());\n\n\t\treturn ret;\n\t}\n\npublic:\n\texplicit BaseStatus(MemoryPool&amp; p)\n\t\t: errors(p), warnings(p)\n\t{\n\t\tinit();\n\t}\n\n\tBaseStatus()\n\t\t: errors(*getDefaultMemoryPool()), warnings(*getDefaultMemoryPool())\n\t{\n\t\tinit();\n\t}\n\n\tvoid check()\n\t{\n\t\tconst ISC_STATUS* s = errors.value();\n\t\tif (s[0] == isc_arg_gds &amp;&amp; s[1] != isc_arg_end)\n\t\t\tstatus_exception::raise(s);\n\t}\n\nprotected:\n\tvoid clear()\n\t{\n\t\terrors.clear();\n\t\twarnings.clear();\n\t}\n\nprivate:\n\tDynamicVector&lt;11&gt; errors;\t\t// gds-code (2) + 3 args (6) + stack trace (2) + end (1)\n\tDynamicVector&lt;3&gt; warnings;\t\t// no warnings (empty vector)\n};\n\n\n// Hold status vector and raise error on request\nclass StatusHolder : public BaseStatus&lt;StatusHolder&gt;\n{\npublic:\n\tStatusHolder()\n\t\t: BaseStatus(*getDefaultMemoryPool()), m_raised(false)\n\t{ }\n\n\tISC_STATUS save(IStatus* status);\n\tvoid clear();\n\tvoid raise();\n\n\tISC_STATUS getError()\n\t{\n\t\treturn value()-&gt;getErrors()[1];\n\t}\n\n\tconst IStatus* value()\n\t{\n\t\tif (m_raised)\n\t\t\tclear();\n\n\t\treturn this;\n\t}\n\n\tbool isSuccess()\n\t{\n\t\treturn getError() == 0;\n\t}\n\n\tconst StatusHolder&amp; operator=(const StatusHolder&amp; val)\n\t{\n\t\tsetErrors(val.getErrors());\n\t\tsetWarnings(val.getWarnings());\n\t\tm_raised = val.m_raised;\n\t\treturn *this;\n\t}\n\npublic:\n\tvoid dispose() override\n\t{\n\t}\n\nprivate:\n\tbool m_raised;\n};\n\n\n// Status interface to be used on stack when entering engine\nclass LocalStatus : public AutoStorage, public BaseStatus&lt;LocalStatus&gt;\n{\npublic:\n\tLocalStatus()\n\t\t: AutoStorage(), BaseStatus&lt;LocalStatus&gt;(getPool())\n\t{ }\n\n\texplicit LocalStatus(MemoryPool&amp; p)\n\t\t: AutoStorage(p), BaseStatus&lt;LocalStatus&gt;(getPool())\n\t{ }\n\npublic:\n\tvoid dispose() override\n\t{\n\t}\n\npublic:\n\tstatic void checkException(LocalStatus* status)\n\t{\n\t}\n\n\tstatic void catchException(LocalStatus* status)\n\t{\n\t\tBaseStatusWrapper&lt;LocalStatus&gt;::catchException(status);\n\t}\n\n\tstatic void setVersionError(IStatus* status, const char* interfaceName,\n\t\tunsigned currentVersion, unsigned expectedVersion)\n\t{\n\t\tBaseStatusWrapper&lt;LocalStatus&gt;::setVersionError(\n\t\t\tstatus, interfaceName,currentVersion, expectedVersion);\n\t}\n};\n\n} // namespace Firebird\n\n\n#endif // FB_STATUS_HOLDER\n"}, "/build/src/common/classes/ImplementHelper.h": {"id": "/build/src/common/classes/ImplementHelper.h", "filePath": "src/common/classes/ImplementHelper.h", "content": "/*\n *\tPROGRAM:\t\tFirebird interface.\n *\tMODULE:\t\t\tImplementHelper.h\n *\tDESCRIPTION:\tTools to help create interfaces.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2010 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_COMMON_CLASSES_IMPLEMENT_HELPER\n#define FB_COMMON_CLASSES_IMPLEMENT_HELPER\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;firebird/impl/consts_pub.h&quot;\n#ifdef DEV_BUILD\n#include &lt;stdio.h&gt;\n#endif\n\nnamespace Firebird {\n\n// Implement standard interface and plugin functions\n\n// Helps to implement generic versioned interfaces\ntemplate &lt;class C&gt;\nclass VersionedIface : public C\n{\npublic:\n\tVersionedIface() { }\n\nprivate:\n\tVersionedIface(const VersionedIface&amp;);\n\tVersionedIface&amp; operator=(const VersionedIface&amp;);\n};\n\n// Helps to implement versioned interfaces on stack or static\ntemplate &lt;class C&gt;\nclass AutoIface : public VersionedIface&lt;C&gt;\n{\npublic:\n\tAutoIface() { }\n};\n\n// Helps to implement disposable interfaces\ntemplate &lt;class C&gt;\nclass DisposeIface : public VersionedIface&lt;C&gt;, public GlobalStorage\n{\npublic:\n\tDisposeIface() { }\n\n\tvoid dispose() override\n\t{\n\t\tdelete this;\n\t}\n};\n\n// Helps to implement standard interfaces\ntemplate &lt;class C&gt;\nclass RefCntIface : public VersionedIface&lt;C&gt;, public GlobalStorage\n{\n\n#ifdef DEV_BUILD\npublic:\n\tRefCntIface(const char* m = NULL)\n\t\t:  mark(m), refCounter(0)\n\t{\n\t\trefCntDPrt(&#x27;^&#x27;);\n\t}\n\n\tconst char* mark;\n#else\npublic:\n\tRefCntIface() : refCounter(0) { }\n#endif\n\nprotected:\n\tvirtual ~RefCntIface()\n\t{\n\t\trefCntDPrt(&#x27;_&#x27;);\n\t\tfb_assert(refCounter == 0);\n\t}\n\npublic:\n\tvoid addRef() override\n\t{\n\t\trefCntDPrt(&#x27;+&#x27;);\n\t\t++refCounter;\n\t}\n\n\tint release() override\n\t{\n\t\tint rc = --refCounter;\n\t\trefCntDPrt(&#x27;-&#x27;);\n\t\tif (rc == 0)\n\t\t\tdelete this;\n\n\t\treturn rc;\n\t}\n\nprotected:\n\tvoid refCntDPrt(char f)\n\t{\n#ifdef DEV_BUILD\n\t\tif (mark)\n\t\t\tfprintf(stderr, &quot;%s %p %c %d\\n&quot;, mark, this, f, int(refCounter));\n#endif\n\t}\n\n\tAtomicCounter refCounter;\n};\n\n\n// Helps to implement plugins\ntemplate &lt;class C&gt;\nclass StdPlugin : public RefCntIface&lt;C&gt;\n{\nprivate:\n\tIReferenceCounted* owner;\n\npublic:\n\tStdPlugin(const char* m = NULL)\n#ifdef DEV_BUILD\n\t\t: RefCntIface&lt;C&gt;(m), owner(NULL)\n#else\n\t\t: owner(NULL)\n#endif\n\t{ }\n\n\tIReferenceCounted* getOwner() override\n\t{\n\t\treturn owner;\n\t}\n\n\tvoid setOwner(IReferenceCounted* iface) override\n\t{\n\t\towner = iface;\n\t}\n};\n\n\n// Trivial factory\ntemplate &lt;class P&gt;\nclass SimpleFactoryBase : public AutoIface&lt;IPluginFactoryImpl&lt;SimpleFactoryBase&lt;P&gt;, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tIPluginBase* createPlugin(CheckStatusWrapper* status, IPluginConfig* factoryParameter)\n\t{\n\t\ttry\n\t\t{\n\t\t\tP* p = FB_NEW P(factoryParameter);\n\t\t\tp-&gt;addRef();\n\t\t\treturn p;\n\t\t}\n\t\tcatch (const Firebird::Exception&amp; ex)\n\t\t{\n\t\t\tex.stuffException(status);\n\t\t}\n\t\treturn NULL;\n\t}\n};\n\ntemplate &lt;class P&gt;\nclass SimpleFactory : public Static&lt;SimpleFactoryBase&lt;P&gt; &gt;\n{\n};\n\n\n// Ensure access to cached pointer to master interface\nclass CachedMasterInterface\n{\npublic:\n\tstatic void set(IMaster* master);\n\nprotected:\n\tstatic IMaster* getMasterInterface();\n};\n\n// Base for interface type independent accessors\ntemplate &lt;typename C&gt;\nclass AccessAutoInterface : public CachedMasterInterface\n{\npublic:\n\texplicit AccessAutoInterface(C* aPtr)\n\t\t: ptr(aPtr)\n\t{ }\n\n\toperator C*()\n\t{\n\t\treturn ptr;\n\t}\n\n\tC* operator-&gt;()\n\t{\n\t\treturn ptr;\n\t}\n\nprivate:\n\tC* ptr;\n};\n\n// Master interface access\nclass MasterInterfacePtr : public AccessAutoInterface&lt;IMaster&gt;\n{\npublic:\n\tMasterInterfacePtr()\n\t\t: AccessAutoInterface&lt;IMaster&gt;(getMasterInterface())\n\t{ }\n};\n\n\n// Generic plugins interface access\nclass PluginManagerInterfacePtr : public AccessAutoInterface&lt;IPluginManager&gt;\n{\npublic:\n\tPluginManagerInterfacePtr()\n\t\t: AccessAutoInterface&lt;IPluginManager&gt;(getMasterInterface()-&gt;getPluginManager())\n\t{ }\n};\n\n\n// Control timer interface access\nclass TimerInterfacePtr : public AccessAutoInterface&lt;ITimerControl&gt;\n{\npublic:\n\tTimerInterfacePtr()\n\t\t: AccessAutoInterface&lt;ITimerControl&gt;(getMasterInterface()-&gt;getTimerControl())\n\t{ }\n};\n\n\n// Distributed transactions coordinator access\nclass DtcInterfacePtr : public AccessAutoInterface&lt;IDtc&gt;\n{\npublic:\n\tDtcInterfacePtr()\n\t\t: AccessAutoInterface&lt;IDtc&gt;(getMasterInterface()-&gt;getDtc())\n\t{ }\n};\n\n\n// Dispatcher access\nclass DispatcherPtr : public AccessAutoInterface&lt;IProvider&gt;\n{\npublic:\n\tDispatcherPtr()\n\t\t: AccessAutoInterface&lt;IProvider&gt;(getMasterInterface()-&gt;getDispatcher())\n\t{ }\n\n\t~DispatcherPtr()\n\t{\n\t\t(*this)-&gt;release();\n\t}\n};\n\n\n// Misc utl access\nclass UtilInterfacePtr : public AccessAutoInterface&lt;IUtil&gt;\n{\npublic:\n\tUtilInterfacePtr()\n\t\t: AccessAutoInterface&lt;IUtil&gt;(getMasterInterface()-&gt;getUtilInterface())\n\t{ }\n};\n\n\n// When process exits, dynamically loaded modules (for us plugin modules)\n// are unloaded first. As the result all global variables in plugin are already destroyed\n// when yvalve is starting fb_shutdown(). This causes almost unavoidable segfault.\n// To avoid it this class is added - it detects spontaneous (not by PluginManager)\n// module unload and notifies PluginManager about this said fact.\nclass UnloadDetectorHelper final :\n\tpublic VersionedIface&lt;IPluginModuleImpl&lt;UnloadDetectorHelper, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\ttypedef void VoidNoParam();\n\n\texplicit UnloadDetectorHelper(MemoryPool&amp;)\n\t\t: cleanup(NULL), thdDetach(NULL), flagOsUnload(false)\n\t{ }\n\n\tvoid registerMe()\n\t{\n\t\tPluginManagerInterfacePtr()-&gt;registerModule(this);\n\t\tflagOsUnload = true;\n\t}\n\n\t~UnloadDetectorHelper()\n\t{\n\t\tif (flagOsUnload)\n\t\t{\n\t\t\tconst bool dontCleanup = MasterInterfacePtr()-&gt;getProcessExiting();\n\t\t\tif (dontCleanup)\n\t\t\t{\n\t\t\t\tInstanceControl::cancelCleanup();\n\t\t\t\treturn;\n\t\t\t}\n\n\t\t\tPluginManagerInterfacePtr()-&gt;unregisterModule(this);\n\t\t\tdoClean();\n\t\t}\n\t}\n\n\tbool unloadStarted()\n\t{\n\t\treturn !flagOsUnload;\n\t}\n\n\tvoid setCleanup(VoidNoParam* function)\n\t{\n\t\tcleanup = function;\n\t}\n\n\tvoid setThreadDetach(VoidNoParam* function)\n\t{\n\t\tthdDetach = function;\n\t}\n\n\tvoid doClean()\n\t{\n\t\tflagOsUnload = false;\n\n\t\tif (cleanup)\n\t\t{\n\t\t\tcleanup();\n\t\t\tcleanup = NULL;\n\t\t}\n\t}\n\n\tvoid threadDetach()\n\t{\n\t\tif (thdDetach)\n\t\t\tthdDetach();\n\t}\n\nprivate:\n\tVoidNoParam* cleanup;\n\tVoidNoParam* thdDetach;\n\tbool flagOsUnload;\n};\n\ntypedef GlobalPtr&lt;UnloadDetectorHelper, InstanceControl::PRIORITY_DETECT_UNLOAD&gt; UnloadDetector;\nUnloadDetectorHelper* getUnloadDetector();\n\n// Generic status checker\ninline void check(IStatus* status, ISC_STATUS exclude = 0)\n{\n\tif (status-&gt;getState() &amp; IStatus::STATE_ERRORS)\n\t{\n\t\tif (status-&gt;getErrors()[1] != exclude)\n\t\t\tstatus_exception::raise(status);\n\t}\n}\n\n// Config keys cache\nclass ConfigKeys : private HalfStaticArray&lt;unsigned int, 8&gt;\n{\npublic:\n\tConfigKeys(MemoryPool&amp; p)\n\t\t: HalfStaticArray&lt;unsigned int, 8&gt;(p)\n\t{ }\n\n\tconst static unsigned int INVALID_KEY = ~0u;\n\n\tunsigned int getKey(IFirebirdConf* config, const char* keyName);\n};\n\n#ifdef NEVERDEF\nstatic inline int refCount(IReferenceCounted* refCounted)\n{\n#ifdef DEV_BUILD\n\tif (refCounted)\n\t{\n\t\trefCounted-&gt;addRef();\n\t\treturn refCounted-&gt;release();\n\t}\n#endif\n\treturn 0;\n}\n#endif\n\n} // namespace Firebird\n\n#endif // FB_COMMON_CLASSES_IMPLEMENT_HELPER\n"}, "/build/src/yvalve/YObjects.h": {"id": "/build/src/yvalve/YObjects.h", "filePath": "src/yvalve/YObjects.h", "content": "/*\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * Dmitry Yemanov\n * Sean Leyne\n * Alex Peshkoff\n * Adriano dos Santos Fernandes\n *\n */\n\n#ifndef YVALVE_Y_OBJECTS_H\n#define YVALVE_Y_OBJECTS_H\n\n#include &quot;firebird.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;../common/StatusHolder.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/MsgMetadata.h&quot;\n#include &quot;../common/classes/ClumpletWriter.h&quot;\n\n#include &lt;functional&gt;\n\nnamespace Why\n{\n\n\nclass YAttachment;\nclass YBlob;\nclass YRequest;\nclass YResultSet;\nclass YService;\nclass YStatement;\nclass IscStatement;\nclass YTransaction;\nclass Dispatcher;\n\nclass YObject\n{\npublic:\n\tYObject()\n\t\t: handle(0)\n\t{\n\t}\n\nprotected:\n\tFB_API_HANDLE handle;\n};\n\nclass CleanupCallback\n{\npublic:\n\tvirtual void cleanupCallbackFunction() = 0;\n\tvirtual ~CleanupCallback() { }\n};\n\ntemplate &lt;typename T&gt;\nclass HandleArray\n{\npublic:\n\texplicit HandleArray(Firebird::MemoryPool&amp; pool)\n\t\t: array(pool)\n\t{\n\t}\n\n\tvoid add(T* obj)\n\t{\n\t\tFirebird::MutexLockGuard guard(mtx, FB_FUNCTION);\n\n\t\tarray.add(obj);\n\t}\n\n\tvoid remove(T* obj)\n\t{\n\t\tFirebird::MutexLockGuard guard(mtx, FB_FUNCTION);\n\t\tFB_SIZE_T pos;\n\n\t\tif (array.find(obj, pos))\n\t\t\tarray.remove(pos);\n\t}\n\n\tvoid destroy(unsigned dstrFlags)\n\t{\n\t\tFirebird::MutexLockGuard guard(mtx, FB_FUNCTION);\n\n\t\t// Call destroy() only once even if handle is not removed from array\n\t\t// by this call for any reason\n\t\tfor (int i = array.getCount() - 1; i &gt;= 0; i--)\n\t\t\tarray[i]-&gt;destroy(dstrFlags);\n\n\t\tclear();\n\t}\n\n\tvoid assign(HandleArray&amp; from)\n\t{\n\t\tclear();\n\t\tarray.assign(from.array);\n\t}\n\n\tvoid clear()\n\t{\n\t\tarray.clear();\n\t}\n\nprivate:\n\tFirebird::Mutex mtx;\n\tFirebird::SortedArray&lt;T*&gt; array;\n};\n\ntemplate &lt;typename Impl, typename Intf&gt;\nclass YHelper : public Firebird::RefCntIface&lt;Intf&gt;, public YObject\n{\npublic:\n\ttypedef typename Intf::Declaration NextInterface;\n\ttypedef YAttachment YRef;\n\n\tstatic const unsigned DF_RELEASE =\t\t0x1;\n\tstatic const unsigned DF_KEEP_NEXT =\t0x2;\n\n\texplicit YHelper(NextInterface* aNext, const char* m = NULL)\n\t\t:\n#ifdef DEV_BUILD\n\t\t  Firebird::RefCntIface&lt;Intf&gt;(m),\n#endif\n\t\t  next(Firebird::REF_NO_INCR, aNext)\n\t{ }\n\n\tint release() override\n\t{\n\t\tint rc = --this-&gt;refCounter;\n\t\tthis-&gt;refCntDPrt(&#x27;-&#x27;);\n\t\tif (rc == 0)\n\t\t{\n\t\t\tif (next)\n\t\t\t\tdestroy(0);\n\t\t\tdelete this;\n\t\t}\n\n\t\treturn rc;\n\t}\n\n\tvirtual void destroy(unsigned dstrFlags) = 0;\n\n\tvoid destroy2(unsigned dstrFlags)\n\t{\n\t\tif (dstrFlags &amp; DF_KEEP_NEXT)\n\t\t\tnext.clear( t;;\nstatic inline constexpr const char* FOPEN_WRITE_TYPE\t\t= &quot;w&quot;;\nstatic inline constexpr const char* FOPEN_READ_TYPE_TEXT\t= FOPEN_READ_TYPE;\nstatic inline constexpr const char* FOPEN_WRITE_TYPE_TEXT\t= FOPEN_WRITE_TYPE;\n#endif\n\n#define LOWER7(c) ( (c &gt;= &#x27;A&#x27; &amp;&amp; c&lt;= &#x27;Z&#x27;) ? c + &#x27;a&#x27; - &#x27;A&#x27;: c )\n\n\n// Blob stream stuff\n\ninline constexpr int BSTR_input\t\t= 0;\ninline constexpr int BSTR_output\t= 1;\ninline constexpr int BSTR_alloc\t\t= 2;\n\nstatic void isc_expand_dpb_internal(const UCHAR** dpb, SSHORT* dpb_size, ...);\n\n\n// Blob info stuff\n\nstatic inline constexpr char blob_items[] =\n{\n\tisc_info_blob_max_segment, isc_info_blob_num_segments,\n\tisc_info_blob_total_length\n};\n\n\n// gds__version stuff\n\nstatic inline constexpr unsigned char info[] =\n\t{ isc_info_firebird_version, isc_info_implementation, fb_info_implementation, isc_info_end };\n\nstatic inline constexpr unsigned char ods_info[] =\n\t{ isc_info_ods_version, isc_info_ods_minor_version, isc_info_end };\n\nstatic inline constexpr const TEXT* impl_class[] =\n{\n\tNULL,\t\t\t\t\t\t// 0\n\t&quot;access method&quot;,\t\t\t// 1\n\t&quot;Y-valve&quot;,\t\t\t\t\t// 2\n\t&quot;remote interface&quot;,\t\t\t// 3\n\t&quot;remote server&quot;,\t\t\t// 4\n\tNULL,\t\t\t\t\t\t// 5\n\tNULL,\t\t\t\t\t\t// 6\n\t&quot;pipe interface&quot;,\t\t\t// 7\n\t&quot;pipe server&quot;,\t\t\t\t// 8\n\t&quot;central interface&quot;,\t\t// 9\n\t&quot;central server&quot;,\t\t\t// 10\n\t&quot;gateway&quot;,\t\t\t\t\t// 11\n\t&quot;classic server&quot;,\t\t\t// 12\n\t&quot;super server&quot;\t\t\t\t// 13\n};\n\n\nnamespace {\n\nclass VersionCallback : public AutoIface&lt;IVersionCallbackImpl&lt;VersionCallback, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tVersionCallback(FPTR_VERSION_CALLBACK routine, void* user)\n\t\t: func(routine), arg(user)\n\t{ }\n\n\t// IVersionCallback implementation\n\tvoid callback(CheckStatusWrapper*, const char* text)\n\t{\n\t\tfunc(arg, text);\n\t}\n\nprivate:\n\tFPTR_VERSION_CALLBACK func;\n\tvoid* arg;\n};\n\nvoid load(CheckStatusWrapper* status, ISC_QUAD* blobId, IAttachment* att, ITransaction* tra, FILE* file)\n{\n/**************************************\n *\n *     l o a d\n *\n **************************************\n *\n * Functional description\n *      Load a blob from a file.\n *\n **************************************/\n\tLocalStatus ls;\n\tCheckStatusWrapper temp(&amp;ls);\n\n\t// Open the blob.  If it failed, what the hell -- just return failure\n\tIBlob* blob = att-&gt;createBlob(status, tra, blobId, 0, NULL);\n\tif (status-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\treturn;\n\n\t// Copy data from file to blob.  Make up boundaries at end of line.\n\tTEXT buffer[512];\n\tTEXT* p = buffer;\n\tconst TEXT* const buffer_end = buffer + sizeof(buffer);\n\n\tfor (;;)\n\t{\n\t\tconst SSHORT c = fgetc(file);\n\t\tif (feof(file))\n\t\t\tbreak;\n\n\t\t*p++ = static_cast&lt;TEXT&gt;(c);\n\n\t\tif (c != &#x27;\\n&#x27; &amp;&amp; p &lt; buffer_end)\n\t\t\tcontinue;\n\n\t\tconst SSHORT l = p - buffer;\n\n\t\tblob-&gt;putSegment(status, l, buffer);\n\t\tif (status-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t{\n\t\t\tblob-&gt;close(&amp;temp);\n\t\t\treturn;\n\t\t}\n\n\t\tp = buffer;\n\t}\n\n\tconst SSHORT l = p - buffer;\n\tif (l != 0)\n\t\tblob-&gt;putSegment(status, l, buffer);\n\n\tblob-&gt;close(&amp;temp);\n\treturn;\n}\n\nvoid dump(CheckStatusWrapper* status, ISC_QUAD* blobId, IAttachment* att, ITransaction* tra, FILE* file)\n{\n/**************************************\n *\n *\td u m p\n *\n **************************************\n *\n * Functional description\n *\tDump a blob into a file.\n *\n **************************************/\n\t// Open the blob.  If it failed, what the hell -- just return failure\n\n\tIBlob* blob = att-&gt;openBlob(status, tra, blobId, 0, NULL);\n\tif (status-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\treturn;\n\n\t// ng blanks from string\n\t\tconst SCHAR* end = q + MAX_NAME_LENGTH;\n\t\twhile (--end &gt;= q &amp;&amp; *end == &#x27; &#x27;)\n\t\t\t; // null body\n\t\t*p++ = end - q + 1;\n\t\twhile (q &lt;= end)\n\t\t\t*p++ = *q++;\n\t\t*p++ = 0;\n\t\t*p++ = 0;\n\t\t*p++ = 0;\n\t\t*p++ = 0;\n\t}\n\n\treturn (p - *event_buffer);\n}\n\n\nvoid API_ROUTINE gds__event_block_s(SCHAR** event_buffer,\n\t\t\t\t\t\t\t\t\tSCHAR** result_buffer,\n\t\t\t\t\t\t\t\t\tSSHORT count,\n\t\t\t\t\t\t\t\t\tSCHAR** name_buffer,\n\t\t\t\t\t\t\t\t\tSSHORT* return_count)\n{\n/**************************************\n *\n *\tg d s _ $ e v e n t _ b l o c k _ s\n *\n **************************************\n *\n * Functional description\n *\tTHIS IS THE COBOL VERSION of gds__event_block_a for Cobols\n *\tthat don&#x27;t permit return values.\n *\n **************************************/\n\n\t*return_count = gds__event_block_a(event_buffer, result_buffer, count, name_buffer);\n}\n\n\nvoid API_ROUTINE isc_event_counts(ULONG* result_vector,\n\t\t\t\t\t\t\t\t  SSHORT buffer_length,\n\t\t\t\t\t\t\t\t  UCHAR* event_buffer,\n\t\t\t\t\t\t\t\t  const UCHAR* result_buffer)\n{\n/**************************************\n *\n *\tg d s _ $ e v e n t _ c o u n t s\n *\n **************************************\n *\n * Functional description\n *\tGet the delta between two events in an event\n *\tparameter block.  Used to update gds_events\n *\tfor GPRE support of events.\n *\n **************************************/\n\tULONG* vec = result_vector;\n\tconst UCHAR* p = event_buffer;\n\tconst UCHAR* q = result_buffer;\n\tUSHORT length = buffer_length;\n\tconst UCHAR* const end = p + length;\n\n\t// analyze the event blocks, getting the delta for each event\n\n\tp++;\n\tq++;\n\twhile (p &lt; end)\n\t{\n\t\t// skip over the event name\n\n\t\tconst USHORT i = (USHORT)* p++;\n\t\tp += i;\n\t\tq += i + 1;\n\n\t\t// get the change in count\n\n\t\tconst ULONG initial_count = gds__vax_integer(p, sizeof(SLONG));\n\t\tp += sizeof(SLONG);\n\ ch_database) that take a dpb length.\n *\n * TMN: Note: According to Ann Harrison:\n * That routine should be deprecated.  It doesn&#x27;t do what it\n * should, and does do things it shouldn&#x27;t, and is harder to\n * use than the natural alternative.\n *\n * CVC: This alternative version returns either the original dpb or a\n * new one, but never overwrites the original dpb. More accurately, it&#x27;s\n * clearer than the original function that really never modifies its source\n * dpb, but there appears to be a logic failure on an impossible path.\n * Also, since the change from UCHAR** to const UCHAR** is not transparent,\n * a new version was needed to make sure the old world wasn&#x27;t broken.\n *\n **************************************/\n\tSSHORT\tlength;\n\tunsigned char* p = 0;\n\tconst char* q;\n\tconst unsigned char* uq;\n\tva_list\targs;\n\tUSHORT\ttype;\n\tUCHAR* new_dpb;\n\n\t// calculate length of database parameter block, setting initial length to include version\n\n\tSSHORT new_dpb_length;\n\tif (!*dpb || !(new_dpb_length = *dpb_size))\n\t{\n\t\tnew_dpb_length = 1;\n\t}\n\n\tva_start(args, dpb_size);\n\n\twhile ((type = va_arg(args, int)))\n\t{\n\t\tswitch (type)\n\t\t{\n\t\tcase isc_dpb_user_name:\n\t\tcase isc_dpb_password:\n\t\tcase isc_dpb_sql_role_name:\n\t\tcase isc_dpb_lc_messages:\n\t\tcase isc_dpb_lc_ctype:\n\t\tcase isc_dpb_reserved:\n\t\t\tq = va_arg(args, char*);\n\t\t\tif (q)\n\t\t\t{\n\t\t\t\tlength = static_cast&lt;SSHORT&gt;(strlen(q));\n\t\t\t\tnew_dpb_length += 2 + length;\n\t\t\t}\n\t\t\tbreak;\n\n\t\tdefault:\n\t\t\tva_arg(args, int);\n\t\t\tbreak;\n\t\t}\n\t}\n\tva_end(args);\n\n\t// if items have been added, allocate space for the new dpb and copy the old one over\n\n\tif (new_dpb_length &gt; *dpb_size)\n\t{\n\t\t// Note: gds__free done by GPRE generated code\n\n\t\tnew_dpb = (UCHAR*) gds__alloc((SLONG)(sizeof(UCHAR) * new_dpb_length));\n\t\tp = new_dpb;\n\t\t// FREE: done by client process in GPRE generated code\n\t\tif (!new_dpb)\n\t\t{\n\t\t\t// NOMEM: don&#x27;t trash existing dpb\n\t\t\tDEV_REPORT(&quot;isc_extend_dpb: out of memory&quot;);\n\t\t\treturn;\t\t\t\t// NOMEM: not really handled\n\t\t}\n\n\t\tuq = *dpb;\n\t\tfor (length = *dpb_size; length; length--)\n\t\t{\n\t\t\t*p++ = *uq++;\n\t\t}\n\n\t}\n\telse\n\t{\n\t\t// CVC: Notice the initialization is: new_dpb_length = *dpb_size\n\t\t// Therefore, the worst case is new_dpb_length == *dpb_size\n\t\t// Also, if *dpb_size == 0, then new_dpb_length is set to 1,\n\t\t// so there will be again a bigger new buffer.\n\t\t// Hence, this else just means &quot;we found nothing that we can\n\t\t// recognize in the variable params list to add and thus,\n\t\t// there&#x27;s nothing to do&quot;. The case for new_dpb_length being less\n\t\t// than the original length simply can&#x27;t happen. Therefore,\n\t\t// the input can be declared const.\n\t\treturn;\n\t}\n\n\tif (!*dpb_size)\n\t\t*p++ = isc_dpb_version1;\n\n\t// copy in the new runtime items\n\n\tva_start(args, dpb_size);\n\n\twhile ((type = va_arg(args, int)))\n\t{\n\t\tswitch (type)\n\t\t{\n\t\tcase isc_dpb_user_name:\n\t\tcase isc_dpb_password:\n\t\tcase isc_dpb_sql_role_name:\n\t\tcase isc_dpb_lc_messages:\n\t\tcase isc_dpb_lc_ctype:\n\t\tcase isc_dpb_reserved:\n\t\t    q = va_arg(args, char*);\n\t\t\tif (q)\n\t\t\t{\n\t\t\t\tlength = static_cast&lt;SSHORT&gt;(strlen(q));\n\t\t\t\tfb_assert(type &lt;= CHAR_MAX);\n\t\t\t\t*p++ = (unsigned char) type;\n\t\t\t\tfb_assert(length &lt;= CHAR_MAX);\n\t\t\t\t*p++ = (unsigned char) length;\n\t\t\t\twhile (length--)\n\t\t\t\t\t*p++ = *q++;\n\t\t\t}\n\t\t\tbreak;\n\n\t\tdefault:\n\t\t\tva_arg(args, int);\n\t\t\tbreak;\n\t\t}\n\t}\n\tva_end(args);\n\n\t*dpb_size = p - new_dpb;\n\t*dpb = new_dpb;\n}\n\n\n// new utl\nstatic void setTag(ClumpletWriter&amp; dpb, UCHAR tag, const char* env, bool utf8)\n{\n\tstring value;\n\n\tif (fb_utils::readenv(env, value) &amp;&amp; !dpb.find(tag))\n\t{\n\t\tif (utf8)\n\t\t\tISC_systemToUtf8(value);\n\n\t\tdpb.insertString(tag, value);\n\t}\n}\n\nvoid setLogin(ClumpletWriter&amp; dpb, bool spbFlag)\n{\n\tconst UCHAR address_path = spbFlag ? isc_spb_address_path : isc_dpb_address_path;\n\tconst UCHAR trusted_auth = spbFlag ? isc_spb_trusted_auth : isc_dpb_trusted_auth;\n\tconst UCHAR auth_block = spbFlag ? isc_spb_auth_block : isc_dpb_auth_block;\n\tconst UCHAR utf8Tag = spbFlag ? isc_spb_utf8_filename : isc_dpb_utf8_filename;\n\t// username and password tags match for both SPB and DPB\n\n\tif (!(dpb.find(trusted_auth) || dpb.find(address_path) || dpb.find(auth_block)))\n\t{\n\t\tbool utf8 = dpb.find(utf8Tag);\n\n\t\tsetTag(dpb, isc_dpb_user_name, ISC_USER, utf8);\n\t\tif (!dpb.find(isc_dpb_password_enc))\n\t\t\tsetTag(dpb, isc_dpb_password, ISC_PASSWORD, utf8);\n\n\t\tif (spbFlag)\n\t\t\tsetTag(dpb, isc_spb_expected_db, &quot;FB_EXPECTED_DB&quot;, utf8);\n\t}\n}\n\n\n//\n// circularAlloc()\n//\n\n#ifdef WIN_NT\n#include &lt;windows.h&gt;\n#endif\n\nnamespace {\n\nclass ThreadCleanup\n{\npublic:\n\tstatic void add(FPTR_VOID_PTR cleanup, void* arg);\n\tstatic void remove(FPTR_VOID_PTR cleanup, void* arg);\n\tstatic void destructor(void*);\n\n\tstatic void assertNoCleanupChain()\n\t{\n\t\tfb_assert(!chain);\n\t}\n\nprivate:\n\tFPTR_VOID_PTR function;\n\tvoid* argument;\n\tThreadCleanup* next;\n\n\tstatic ThreadCleanup* chain;\n\tstatic GlobalPtr&lt;Mutex&gt; cleanupMutex;\n\n\tThreadCleanup(FPTR_VOID_PTR cleanup, void* arg, ThreadCleanup* chain)\n\t\t: function(cleanup), argument(arg), next(chain) { }\n\n\tstatic void initThreadCleanup();\n\tstatic void finiThreadCleanup();\n\n\tstatic ThreadCleanup** findCleanup(FPTR_VOID_PTR cleanup, void* arg);\n};\n\nThreadCleanup* ThreadCleanup::chain = NULL;\nGlobalPtr&lt;Mutex&gt; ThreadCleanup::cleanupMutex;\n\n#ifdef USE_POSIX_THREADS\n\npthread_key_t key;\npthread_once_t keyOnce = PTHREAD_ONCE_INIT;\nbool keySet = false;\n\nvoid makeKey()\n{\n\tint err = pthread_key_create(&amp;key, ThreadCleanup::destructor);\n\tif (err)\n\t{\n\t\tFirebird::system_call_failed::raise(&quot;pthread_key_create&quot;, err);\n\t}\n\tkeySet = true;\n}\n\nvoid ThreadCleanup::initThreadCleanup()\n{\n\tint err = pthread_once(&amp;keyOnce, makeKey);\n\tif (err)\n\t{\n\t\tFirebird::system_call_failed::raise(&quot;pthread_once&quot;, err);\n\t}\n\n\terr = pthread_setspecific(key, &amp;key);\n\tif (err)\n\t{\n\t\tFirebird::system_call_failed::raise(&quot;pthread_setspecific&quot;, err);\n\t}\n}\n\nvoid ThreadCleanup::finiThreadCleanup()\n{\n\tpthread_setspecific(key, NULL);\n\tPluginManager::threadDetach();\n}\n\n\nclass FiniThreadCleanup\n{\npublic:\n\tFiniThreadCleanup(Firebird::MemoryPool&amp;)\n\t{ }\n\n\t~FiniThreadCleanup()\n\t{\n\t\tThreadCleanup::assertNoCleanupChain();\n\t\tif (keySet)\n\t\t{\n\t\t\tint err = pthread_key_delete(key);\n\t\t\tif (err)\n\t\t\t\tgds__log(&quot;pthread_key_delete failed with error %d&quot;, err);\n\t\t}\n\t}\n};\n\nFirebird::GlobalPtr&lt;FiniThreadCleanup&gt; thrCleanup;\t\t// needed to call dtor\n\n#endif // USE_POSIX_THREADS\n\n#ifdef WIN_NT\nvoid ThreadCleanup::initThreadCleanup()\n{\n}\n\nvoid ThreadCleanup::finiThreadCleanup()\n{\n\tPluginManager::threadDetach();\n}\n#endif // #ifdef WIN_NT\n\nThreadCleanup** ThreadCleanup::findCleanup(FPTR_VOID_PTR cleanup, void* arg)\n{\n\tfor (ThreadCleanup** ptr = &amp;chain; *ptr; ptr = &amp;((*ptr)-&gt;next))\n\t{\n\t\tif ((*ptr)-&gt;function == cleanup &amp;&amp; (*ptr)-&gt;argument == arg)\n\t\t{\n\t\t\treturn ptr;\n\t\t}\n\t}\n\n\treturn NULL;\n}\n\nvoid ThreadCleanup::destructor(void*)\n{\n\tMutexLockGuard guard(cleanupMutex, FB_FUNCTION);\n\n\tfor (ThreadCleanup* ptr = chain; ptr; ptr = ptr-&gt;next)\n\t{\n\t\tptr-&gt;function(ptr-&gt;argument);\n\t}\n\n\tfiniThreadCleanup();\n}\n\nvoid ThreadCleanup::add(FPTR_VOID_PTR cleanup, void* arg)\n{\n\tFirebird::MutexLockGuard guard(cleanupMutex, FB_FUNCTION);\n\n\tinitThreadCleanup();\n\n\tif (findCleanup(cleanup, arg))\n\t{\n\t\treturn;\n\t}\n\n\tchain = FB_NEW_POOL(*getDefaultMemoryPool()) ThreadCleanup(cleanup, arg, chain);\n}\n\nvoid ThreadCleanup::remove(FPTR_VOID_PTR cleanup, void* arg)\n{\n\tMutexLockGuard guard(cleanupMutex, FB_FUNCTION);\n\n\tThreadCleanup** ptr = findCleanup(cleanup, arg);\n\tif (!ptr)\n\t{\n\t\treturn;\n\t}\n\n\tThreadCleanup* toDelete = *ptr;\n\t*ptr = toDelete-&gt;next;\n\tdelete toDelete;\n}\n\nclass ThreadBuffer : public GlobalStorage\n{\nprivate:\n\tstatic inline constexpr size_t BUFFER_SIZE = 8192;\t// make it match with call stack limit == 2048\n\tchar buffer[BUFFER_SIZE]{};\n\tchar* buffer_ptr;\n\npublic:\n\tThreadBuffer() : buffer_ptr(buffer) { }\n\n\tconst char* alloc(const char* string, size_t length)\n\t{\n\t\t// if string is already in our buffer - return it\n\t\t// it was already saved in our buffer once\n\t\tif (string &gt;= buffer &amp;&amp; string &lt; &amp;buffer[BUFFER_SIZE])\n\t\t\treturn string;\n\n\t\t// if string too long, truncate it\n\t\tif (length &gt; BUFFER_SIZE / 4)\n\t\t\tlength = BUFFER_SIZE / 4;\n\n\t\t// If there isn&#x27;t any more room in the buffer, start at the beginning again\n\t\tif (buffer_ptr + length + 1 &gt; buffer + BUFFER_SIZE)\n\t\t\tbuffer_ptr = buffer;\n\n\t\tchar* new_string = buffer_ptr;\n\t\tmemcpy(new_string, string, length);\n\t\tnew_string[length] = 0;\n\t\tbuffer_ptr += length + 1;\n\n\t\treturn new_string;\n\t}\n};\n\nTLS_DECLARE(ThreadBuffer*, threadBuffer);\n\nvoid cleanupAllStrings(void*)\n{\n\t///fprintf(stderr, &quot;Cleanup is called\\n&quot;);\n\n\tdelete TLS_GET(threadBuffer);\n\tTLS_SET(threadBuffer, NULL);\n\n\t///fprintf(stderr, &quot;Buffer removed\\n&quot;);\n}\n\nThreadBuffer* getThreadBuffer()\n{\n\tThreadBuffer* rc = TLS_GET(threadBuffer);\n\tif (!rc)\n\t{\n\t\tThreadCleanup::add(cleanupAllStrings, NULL);\n\t\trc = FB_NEW ThreadBuffer;\n\t\tTLS_SET(threadBuffer, rc);\n\t}\n\n\treturn rc;\n}\n\n// Needed to call dtor\nclass Strings\n{\npublic:\n\tStrings(MemoryPool&amp;)\n\t{ }\n\n\t~Strings()\n\t{\n\t\tThreadCleanup::remove(cleanupAllStrings, NULL);\n\t}\n};\nFirebird::GlobalPtr&lt;Strings&gt; cleanStrings;\n\nconst char* circularAlloc(const char* s, size_t len)\n{\n\treturn getThreadBuffer()-&gt;alloc(s, len);\n}\n\n// CVC: Do not let &quot;perm&quot; be incremented before &quot;trans&quot;, because it may lead to serious memory errors,\n// since our code blindly passes the same vector twice.\nvoid makePermanentVector(ISC_STATUS* perm, const ISC_STATUS* trans) noexcept\n{\n\ttry\n\t{\n\t\twhile (true)\n\t\t{\n\t\t\tconst ISC_STATUS type = *perm++ = *trans++;\n\n\t\t\tswitch (type)\n\t\t\t{\n\t\t\tcase isc_arg_end:\n\t\t\t\treturn;\n\n\t\t\tcase isc_arg_cstring:\n\t\t\t\t{\n\t\t\t\t\tperm [-1] = isc_arg_string;\n\t\t\t\t\tconst size_t len = *trans++;\n\t\t\t\t\tconst char* temp = reinterpret_cast&lt;char*&gt;(*trans++);\n\t\t\t\t\t*perm++ = (ISC_STATUS)(IPTR) circularAlloc(temp, len);\n\t\t\t\t}\n\t\t\t\tbreak;\n\n\t\t\tcase isc_arg_string:\n\t\t\tcase isc_arg_interpreted:\n\t\t\tcase isc_arg_sql_state:\n\t\t\t\t{\n\t\t\t\t\tconst char* temp = reinterpret_cast&lt;char*&gt;(*trans++);\n\t\t\t\t\tconst size_t len = strlen(temp);\n\t\t\t\t\t*perm++ = (ISC_STATUS)(IPTR) circularAlloc(temp, len);\n\t\t\t\t}\n\t\t\t\tbreak;\n\n\t\t\tdefault:\n\t\t\t\t*perm++ = *trans++;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\tcatch (const system_call_failed&amp; ex)\n\t{\n\t\tmemcpy(perm, ex.value(), sizeof(ISC_STATUS_ARRAY));\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\t*perm++ = isc_arg_gds;\n\t\t*perm++ = isc_virmemexh;\n\t\t*perm++ = isc_arg_end;\n\t}\n\tcatch (...)\n\t{\n\t\t*perm++ = isc_arg_gds;\n\t\t*perm++ = isc_random;\n\t\t*perm++ = isc_arg_string;\n\t\t*perm++ = (ISC_STATUS)(IPTR) &quot;Unexpected exception in makePermanentVector()&quot;;\n\t\t*perm++ = isc_arg_end;\n\t}\n}\n\n} // anonymous namespace\n\nvoid makePermanentVector(ISC_STATUS* v) noexcept\n{\n\tmakePermanentVector(v, v);\n}\n\n#ifdef WIN_NT\nnamespace Why\n{\n\t// This is called from ibinitdll.cpp:DllMain()\n\tvoid threadCleanup()\n\t{\n\t\tThreadCleanup::destructor(NULL);\n\t}\n}\n#endif\n"}, "/build/src/common/utils_proto.h": {"id": "/build/src/common/utils_proto.h", "filePath": "src/common/utils_proto.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Claudio Valderrama on 25-Dec-2003\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2003 Claudio Valderrama\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *  Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n */\n\n\n// =====================================\n// Utility functions\n\n#ifndef INCLUDE_UTILS_PROTO_H\n#define INCLUDE_UTILS_PROTO_H\n\n#include &lt;cctype&gt;\n#include &lt;string.h&gt;\n#include &lt;type_traits&gt;\n\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;memory_routines.h&quot;\n\n#ifdef SFIO\n#include &lt;stdio.h&gt;\n#endif\n\nnamespace fb_utils\n{\n\tchar* copy_terminate(char* dest, const char* src, size_t bufsize) noexcept;\n\tchar* exact_name(char* const name) noexcept;\n\tinline void exact_name(Firebird::string&amp; str)\n\t{\n\t\tstr.rtrim();\n\t}\n\tchar* exact_name_limit(char* const name, size_t bufsize) noexcept;\n\tbool implicit_domain(const char* domain_name) noexcept;\n\tbool implicit_integrity(const char* integ_name) noexcept;\n\tbool implicit_pk(const char* pk_name) noexcept;\n\tint name_length(const TEXT* const name) noexcept;\n\tint name_length_limit(const TEXT* const name, size_t bufsize) noexcept;\n\tbool readenv(const char* env_name, Firebird::string&amp; env_value);\n\tbool readenv(const char* env_name, Firebird::PathName&amp; env_value);\n\tbool setenv(const char* name, const char* value, bool overwrite);\n\tint snprintf(char* buffer, size_t count, const char* format...) noexcept;\n\tchar* cleanup_passwd(char* arg);\n\tinline char* get_passwd(char* arg)\n\t{\n\t\treturn cleanup_passwd(arg);\n\t}\n\ttypedef char* arg_string;\n\n\t// Warning: Only wrappers:\n\n\t// ********************\n\t// s t r i c m p\n\t// ********************\n\t// Abstraction of incompatible routine names\n\t// for case insensitive comparison.\n\tinline int stricmp(const char* a, const char* b) noexcept\n\t{\n#if defined(HAVE_STRCASECMP)\n\t\treturn ::strcasecmp(a, b);\n#elif defined(HAVE_STRICMP)\n\t\treturn ::stricmp(a, b);\n#else\n#error dont know how to compare strings case insensitive on this system\n#endif\n\t}\n\n\n\t// ********************\n\t// s t r n i c m p\n\t// ********************\n\t// Abstraction of incompatible routine names\n\t// for counted length and case insensitive comparison.\n\tinline int strnicmp(const char* a, const char* b, size_t count) noexcept\n\t{\n#if defined(HAVE_STRNCASECMP)\n\t\treturn ::strncasecmp(a, b, count);\n#elif defined(HAVE_STRNICMP)\n\t\treturn ::strnicmp(a, b, count);\n#else\n#error dont know how to compare counted length strings case insensitive on this system\n#endif\n\t}\n\n\t// std::isspace behavior is undefined with char and signed char.\n\t// https://en.cppreference.com/w/cpp/string/byte/isspace\n\tstatic inline int isspace(const char c)\n\t{\n\t\treturn std::isspace(static_cast&lt;unsigned char&gt;(c));\n\t}\n\n#ifdef WIN_NT\n\tbool prefix_kernel_object_name(char* name, size_t bufsize) noexcept;\n\tbool isGlobalKernelPrefix() noexcept;\n\tbool private_k
