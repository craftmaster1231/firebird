      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

        right  : selPosPixel.left < editorSize.width - 100
               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }
}

n\tT* removeRange(const size_type from, const size_type to) noexcept\n\t{\n\t\tfb_assert(from &lt;= to);\n\t\tfb_assert(to &lt;= count);\n\t\tmemmove(static_cast&lt;void*&gt;(data + from), data + to, sizeof(T) * (count - to));\n\t\tcount -= (to - from);\n\t\treturn &amp;data[from];\n\t}\n\n\tT* removeCount(const size_type index, const size_type n) noexcept\n\t{\n\t\tfb_assert(index + n &lt;= count);\n\t\tmemmove(static_cast&lt;void*&gt;(data + index), data + index + n, sizeof(T) * (count - index - n));\n\t\tcount -= n;\n\t\treturn &amp;data[index];\n\t}\n\n\tT* remove(T* itr) noexcept\n\t{\n\t\tconst size_type index = itr - begin();\n\t\tfb_assert(index &lt; count);\n\t\tmemmove(static_cast&lt;void*&gt;(data + index), data + index + 1, sizeof(T) * (--count - index));\n\t\treturn &amp;data[index];\n\t}\n\n\tT* remove(T* itrFrom, T* itrTo) noexcept\n\t{\n\t\treturn removeRange(itrFrom - begin(), itrTo - begin());\n\t}\n\n\tvoid shrink(size_type newCount) noexcept\n\t{\n\t\tfb_assert(newCount &lt;= count);\n\t\tcount = newCount;\n\t}\n\n\t// Grow size of our array and zero-initialize new items\n\tvoid grow(const size_type newCount)\n\t{\n\t\tfb_assert(newCount &gt;= count);\n\t\tensureCapacity(newCount);\n\t\tmemset(static_cast&lt;void*&gt;(data + count), 0, sizeof(T) * (newCount - count));\n\t\tcount = newCount;\n\t}\n\n\t// Resize array according to STL&#x27;s vector::resize() rules\n\tvoid resize(const size_type newCount, const T&amp; val)\n\t{\n\t\tif (newCount &gt; count)\n\t\t{\n\t\t\tensureCapacity(newCount);\n\t\t\twhile (count &lt; newCount) {\n\t\t\t\tdata[count++] = val;\n\t\t\t}\n\t\t}\n\t\telse {\n\t\t\tcount = newCount;\n\t\t}\n\t}\n\n\t// Resize array according to STL&#x27;s vector::resize() rules\n\tvoid resize(const size_type newCount)\n\t{\n\t\tif (newCount &gt; count) {\n\t\t\tgrow(newCount);\n\t\t}\n\t\telse {\n\t\t\tcount = newCount;\n\t\t}\n\t}\n\n\tvoid join(const Array&lt;T, Storage&gt;&amp; L)\n\t{\n\t\tfb_assert(count &lt;= FB_MAX_SIZEOF - L.count);\n\t\tensureCapacity(count + L.count);\n\t\tmemcpy(static_cast&lt;void*&gt;(data + count), L.data, sizeof(T) * L.count);\n\t\tcount += L.count;\n\t}\n\n\tvoid assign(const Array&lt;T, Storage&gt;&amp; source)\n\t{\n\t\tcopyFrom(source);\n\t}\n\n\tvoid assign(const T* items, const size_type itemsCount)\n\t{\n\t\tresize(itemsCount);\n\t\tmemcpy(static_cast&lt;void*&gt;(data), items, sizeof(T) * count);\n\t}\n\n\tsize_type getCount() const noexcept { return count; }\n\n\tbool isEmpty() const noexcept { return count == 0; }\n\n\tbool hasData() const noexcept { return count != 0; }\n\n\tsize_type getCapacity() const noexcept { return capacity; }\n\n\tvoid push(const T&amp; item)\n\t{\n\t\tadd(item);\n\t}\n\n\tvoid push(const T* items, const size_type itemsSize)\n\t{\n\t\tfb_assert(count &lt;= FB_MAX_SIZEOF - itemsSize);\n\t\tensureCapacity(count + itemsSize);\n\t\tmemcpy(static_cast&lt;void*&gt;(data + count), items, sizeof(T) * itemsSize);\n\t\tcount += itemsSize;\n\t}\n\n\tvoid append(const T* items, const size_type itemsSize)\n\t{\n\t\tpush(items, itemsSize);\n\t}\n\n\tvoid append(const Array&lt;T, Storage&gt;&amp; source)\n\t{\n\t\tpush(source.begin(), source.getCount());\n\t}\n\n\tT pop()\n\t{\n\t\tfb_assert(count &gt; 0);\n\t\tcount--;\n\t\treturn data[count];\n\t}\n\n\t// prepare array to be used as a buffer of capacity items\n\tT* getBuffer(const size_type capacityL, bool preserve = true)\n\t{\n\t\tensureCapacity(capacityL, preserve);\n\t\tcount = capacityL;\n\t\treturn data;\n\t}\n\n\t// prepare array to be used as a buffer of capacity bytes aligned on given alignment\n\tT* getAlignedBuffer(const size_type capacityL, const size_type alignL)\n\t{\n\t\tstatic_assert(sizeof(T) == 1, &quot;sizeof(T) != 1&quot;);\n\n\t\tensureCapacity(capacityL + alignL, false);\n\t\tcount = capacityL + alignL;\n\t\treturn FB_ALIGN(data, alignL);\n\t}\n\n\t// clear array and release dynamically allocated memory\n\tvoid free()\n\t{\n\t\tclear();\n\t\tfreeData();\n\t\tcapacity = this-&gt;getStorageSize();\n\t\tdata = this-&gt;getStorage();\n\t}\n\n\t// This method only assigns &quot;pos&quot; if the element is found.\n\t// Maybe we should modify it to iterate directy with &quot;pos&quot;.\n\tbool find(const T&amp; item, size_type&amp; pos) const\n\t{\n\t\tfor (size_type i = 0; i &lt; count; i++)\n\t\t{\n\t\t\tif (data[i] == item)\n\t\t\t{\n\t\t\t\tpos = i;\n\t\t\t\treturn true;\n\t\t\t}\n\t\t}\n\t\treturn false;\n\t}\n\n\tbool findAndRemove(const T&amp; item)\n\t{\n\t\tsize_type pos;\n\t\tif (find(item, pos))\n\t\t{\n\t\t\tremove(pos);\n\t\t\treturn true;\n\t\t}\n\n\t\treturn false;\n\t}\n\n\tbool exist(const T&amp; item) const\n\t{\n\t\tsize_type pos;\t// ignored\n\t\treturn find(item, pos);\n\t}\n\n\tbool operator==(const Array&amp; op) const\n\t{\n\t\tif (count != op.count)\n\t\t\treturn false;\n\t\treturn memcmp(data, op.data, count) == 0;\n\t}\n\n\t// Member function only for some debugging tests. Hope nobody is bothered.\n\tvoid swapElems()\n\t{\n\t\tconst size_type limit = count / 2;\n\t\tfor (size_type i = 0; i &lt; limit; ++i)\n\t\t{\n\t\t\tT temp = data[i];\n\t\t\tdata[i] = data[count - 1 - i];\n\t\t\tdata[count - 1 - i] = temp;\n\t\t}\n\t}\n\n\tvoid ensureCapacity(size_type newcapacity)\n\t{\n\t\tensureCapacity(newcapacity, true);\n\t}\n\nprotected:\n\tsize_type count, capacity;\n\tT* data;\n\n\tvoid ensureCapacity(size_type newcapacity, bool preserve)\n\t{\n\t\tif (newcapacity &gt; capacity)\n\t\t{\n\t\t\tif (capacity &lt;= FB_MAX_SIZEOF / 2)\n\t\t\t{\n\t\t\t\tif (newcapacity &lt; capacity * 2)\n\t\t\t\t\tnewcapacity = capacity * 2;\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tnewcapacity = FB_MAX_SIZEOF;\n\t\t\t}\n\n\t\t\t// Ensure we can carry byte copy operations.\n\t\t\t// What to do here, throw in release build?\n\t\t\tfb_assert(newcapacity &lt; FB_MAX_SIZEOF / sizeof(T));\n\n\t\t\tT* newdata = static_cast&lt;T*&gt;\n\t\t\t\t(this-&gt;getPool().allocate(sizeof(T) * newcapacity ALLOC_ARGS));\n\t\t\tif (preserve)\n\t\t\t\tmemcpy(static_cast&lt;void*&gt;(newdata), data, sizeof(T) * count);\n\t\t\tfreeData();\n\t\t\tdata = newdata;\n\t\t\tcapacity = newcapacity;\n\t\t}\n\t}\n};\n\nstatic inline constexpr int FB_ARRAY_SORT_MANUAL = 0;\nstatic inline constexpr int FB_ARRAY_SORT_WHEN_ADD = 1;\n\n// Dynamic sorted array of simple objects\ntemplate &lt;typename Value,\n\ttypename Storage = EmptyStorage&lt;Value&gt;,\n\ttypename Key = Value,\n\ttypename KeyOfValue = DefaultKeyValue&lt;Value&gt;,\n\ttypename Cmp = DefaultComparator&lt;Key&gt; &gt;\nclass SortedArray : public Array&lt;Value, Storage&gt;\n{\npublic:\n\ttypedef typename Array&lt;Value, Storage&gt;::size_type size_type;\n\tSortedArray(MemoryPool&amp; p, size_type s)\n\t\t: Array&lt;Value, Storage&gt;(p, s), sortMode(FB_ARRAY_SORT_WHEN_ADD), sorted(true)\n\t{ }\n\n\texplicit SortedArray(MemoryPool&amp; p)\n\t\t: Array&lt;Value, Storage&gt;(p), sortMode(FB_ARRAY_SORT_WHEN_ADD), sorted(true)\n\t{ }\n\n\texplicit SortedArray(size_type s)\n\t\t: Array&lt;Value, Storage&gt;(s), sortMode(FB_ARRAY_SORT_WHEN_ADD), sorted(true)\n\t{ }\n\n\tSortedArray()\n\t\t: Array&lt;Value, Storage&gt;(), sortMode(FB_ARRAY_SORT_WHEN_ADD), sorted(true)\n\t{ }\n\n\t// When item is not found, set pos to the position where the element should be\n\t// stored if/when added.\n\tbool find(const Key&amp; item, size_type&amp; pos) const\n\t{\n\t\tfb_assert(sorted);\n\n\t\tsize_type highBound = this-&gt;count, lowBound = 0;\n\t\twhile (highBound &gt; lowBound)\n\t\t{\n\t\t\tconst size_type temp = (highBound + lowBound) &gt;&gt; 1;\n\t\t\tif (Cmp::greaterThan(item, KeyOfValue::generate(this-&gt;data[temp])))\n\t\t\t\tlowBound = temp + 1;\n\t\t\telse\n\t\t\t\thighBound = temp;\n\t\t}\n\t\tpos = lowBound;\n\t\treturn highBound != this-&gt;count &amp;&amp;\n\t\t\t!Cmp::greaterThan(KeyOfValue::generate(this-&gt;data[lowBound]), item);\n\t}\n\n\tbool findAndRemove(const Key&amp; item)\n\t{\n\t\tsize_type pos;\n\t\tif (find(item, pos))\n\t\t{\n\t\t\tthis-&gt;remove(pos);\n\t\t\treturn true;\n\t\t}\n\n\t\treturn false;\n\t}\n\n\tbool exist(const Key&amp; item) const\n\t{\n\t\tsize_type pos;\t// ignored\n\t\treturn find(item, pos);\n\t}\n\n\tsize_type add(const Value&amp; item)\n\t{\n\t\tsize_type pos;\n\t\tif (sortMode == FB_ARRAY_SORT_WHEN_ADD)\n\t\t\tfind(KeyOfValue::generate(item), pos);\n\t\telse\n\t\t{\n\t\t\tsorted = false;\n\t\t\tpos = this-&gt;getCount();\n\t\t}\n\t\tthis-&gt;insert(pos, item);\n\t\treturn pos;\n\t}\n\n\tvoid setSortMode(int sm)\n\t{\n\t\tif (sortMode != FB_ARRAY_SORT_WHEN_ADD &amp;&amp; sm == FB_ARRAY_SORT_WHEN_ADD &amp;&amp; !sorted)\n\t\t{\n\t\t\tsort();\n\t\t}\n\t\tsortMode = sm;\n\t}\n\n\tvoid sort()\n\t{\n\t\tif (sorted)\n\t\t\treturn;\n\n\t\tauto compare = [] (const void* a, const void* b) {\n\t\t\tconst Key&amp; first(KeyOfValue::generate(*static_cast&lt;const Value*&gt;(a)));\n\t\t\tconst Key&amp; second(KeyOfValue::generate(*static_cast&lt;const Value*&gt;(b)));\n\n\t\t\tif (Cmp::greaterThan(first, second))\n\t\t\t\treturn 1;\n\t\t\tif (Cmp::greaterThan(second, first))\n\t\t\t\treturn -1;\n\n\t\t\treturn 0;\n\t\t};\n\n\t\tqsort(this-&gt;begin(), this-&gt;getCount(), sizeof(Value), compare);\n\t\tsorted = true;\n\t}\n\nprivate:\n\tint sortMode;\n\tbool sorted;\n};\n\n// Nice shorthand for arrays with static part\ntemplate &lt;typename T, FB_SIZE_T InlineCapacity, typename AlignT = T&gt;\nusing HalfStaticArray = Array&lt;T, InlineStorage&lt;T, InlineCapacity, AlignT&gt; &gt;;\n\ntypedef HalfStaticArray&lt;UCHAR, BUFFER_TINY&gt; UCharBuffer;\n\n}\t// namespace Firebird\n\n#endif // CLASSES_ARRAY_H\n"}, "/build/src/common/classes/tree.h": {"id": "/build/src/common/classes/tree.h", "filePath": "src/common/classes/tree.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\ttree.h\n *\tDESCRIPTION:\tGeneric In-memory B+ Tree\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n *\n */\n\n#ifndef CLASSES_TREE_H\n#define CLASSES_TREE_H\n\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;fb_exception.h&quot;\n#include &lt;string.h&gt;\n#ifdef HAVE_STDLIB_H\n#include &lt;stdlib.h&gt; // XPG: prototypes for malloc/free have to be in stdlib.h (EKU)\n#endif\n#include &quot;vector.h&quot;\n\nnamespace Firebird {\n\n// This macro controls merging of nodes of all B+ trees\n// Now it merges pages only when resulting page will be 3/4 filled or less\n// Be careful while changing this expression. N=2 must always cause merge\n\n// 2009-04 Please do not make this function static, it will break xlC build!\ninline bool NEED_MERGE(FB_SIZE_T current_count, FB_SIZE_T page_count) noexcept\n{\n\treturn current_count * 4 / 3 &lt;= page_count;\n}\n\n// Default tree leaf and node page sizes in bytes.\n//\n// Avoid using very small values because overhead for each page is 28-32 bytes on\n// 32-bit platforms. Node pages are optimal to be significantly larger because\n// they are modified less often, but are searched much more often.\n//\n// Values below are fine-tuned for AMD Athlon 64 3000+ with DDR400 memory.\ninline constexpr int LEAF_PAGE_SIZE = 400;\ninline constexpr int NODE_PAGE_SIZE = 3000;\n\n// This is maximum level of tree nesting. 10^9 elements for binary tree case\n// should be more than enough. No checks are performed in code against overflow of this value\ninline constexpr int MAX_TREE_LEVEL = 30;\n\nenum LocType { locEqual, locLess, locGreat, locGreatEqual, locLessEqual };\n\n// Fast and simple B+ tree of simple types.\n// Tree is always accessed via accessor classes. There is default accessor\n// built into the class to simplify programming in single-threaded\n// non-reentrant access model.\n//\n// Notes:\n//\n// 1) Items in the tree MUST be unique (this is performance optimization),\n// you can always convert set of non-unique items to a set of unique items with count\n// like this:\n//  struct TreeItem\n//\t{\n//      Value value;\n//      int count;\n//      static const Key&amp; generate(void *sender, const TreeItem&amp; item)\n//\t\t{\n//          return KeyOfValue::generate(sender, value);\n//      }\n//  }\n// Small and simple (just a few lines) template derived from BePlusTree can be created\n// for this when real need arises. It will still be much faster than allowing duplicates\n// in BePlusTree itself\n//\n// 2) We could store ultimate item count for each node and make tree accessible like\n// an indexed dynamic array without increase of algorithm calculation costs (this is one\n// more classical B+ tree feature). This is also not done to improve tree performance a little\n//\ntemplate &lt;typename Value, typename Key = Value,\n\t\t  typename KeyOfValue = DefaultKeyValue&lt;Value&gt;,\n\t\t  typename Cmp = DefaultComparator&lt;Key&gt; &gt;\nclass BePlusTree\n{\n\tstatic constexpr FB_SIZE_T LEAF_COUNT = LEAF_PAGE_SIZE / sizeof(Value);\n\tstatic constexpr FB_SIZE_T NODE_COUNT = NODE_PAGE_SIZE / sizeof(void*);\npublic:\n\texplicit BePlusTree(Firebird::MemoryPool&amp; _pool)\n\t\t: pool(&amp;_pool), level(0), defaultAccessor(this)\n\t{ }\n\n\tBePlusTree(Firebird::MemoryPool&amp; _pool, const BePlusTree&amp; from)\n\t\t: pool(&amp;_pool), level(0), defaultAccessor(this)\n\t{\n\t\tappend(from);\n\t}\n\n\tBePlusTree&amp; operator =(const BePlusTree&amp; from)\n\t{\n\t\tclear();\n\t\tappend(from);\n\t\treturn *this;\n\t}\n\n\tvoid clear()\n\t{\n\t\tdefaultAccessor.curr = nullptr;\n\n\t\t// Do not deallocate root page if tree is shallow\n\t\tif (level == 0)\n\t\t{\n\t\t\tif (root) {\n\t\t\t\troot.items-&gt;clear();\n\t\t\t}\n\t\t\treturn;\n\t\t}\n\n\t\t// Find first items page\n\t\tNodePtr temp = root;\n\t\tfor (int i = level; i &gt; 0; i--)\n\t\t\ttemp = (*temp.nodes)[0];\n\t\tItemList *items = temp.items;\n\n\t\t// Delete all items pages\n\t\tNodeList *lists = items-&gt;parent;\n\t\twhile (items)\n\t\t{\n\t\t\tItemList *t = items-&gt;next;\n\t\t\tdelete items;\n\t\t\titems = t;\n\t\t}\n\n\t\t// Delete all upper layers of tree\n\t\twhile (lists)\n\t\t{\n\t\t\tNodeList *list = lists;\n\t\t\tlists = lists-&gt;parent;\n\t\t\twhile (list)\n\t\t\t{\n\t\t\t\tNodeList *t = list-&gt;next;\n\t\t\t\tdelete list;\n\t\t\t\tlist = t;\n\t\t\t}\n\t\t}\n\n\t\t// Initialize fields to make tree usable again\n\t\troot.items = nullptr;\n\t\tlevel = 0;\n\t}\n\n    ~BePlusTree()\n\t{\n\t\tclear();\n\t\tdelete root.items;\n\t}\n\n\tbool isEmpty() const\n\t{\n\t\treturn !root || (level == 0 &amp;&amp; root.items-&gt;getCount() == 0);\n\t}\n\n\tbool add(const Value&amp; item) { return defaultAccessor.add(item); }\n\n\tclass ConstAccessor;\n\tclass Accessor;\n\t// If item already exists method sets accessor&#x27;s current position\n\t// to found item&#x27;s location and returns false.\n\t// If item not exists method will add it to the tree and return true,\n\t// not touching accessor&#x27;s current position.\n\tbool add(const Value&amp; item, Accessor* accessor);\n\n\t// Remove item. Current position moves to next item after this call.\n\t// If next item doesn&#x27;t exist method returns false\n    bool fastRemove() { return defaultAccessor.fastRemove(); }\n\n\tbool isPositioned(const Key&amp; key) const { return defaultAccessor.isPositioned(key); }\n\n\tbool locate(const Key&amp; key) { return defaultAccessor.locate(locEqual, key); }\n\n\tbool locate(LocType lt, const Key&amp; key) { return defaultAccessor.locate(lt, key); }\n\n\tbool getFirst() { return defaultAccessor.getFirst(); }\n\n\tbool getLast() { return defaultAccessor.getLast(); }\n\n\tbool getNext() { return defaultAccessor.getNext(); }\n\n\tbool getPrev() { return defaultAccessor.getPrev(); }\n\n    Value&amp; current() const { return defaultAccessor.current(); }\n\n\t// Returns true if this tree appears to contain more elements than the other\n\tbool seemsBiggerThan(const BePlusTree&amp; other) const\n\t{\n\t\tif (level != other.level)\n\t\t\treturn level &gt; other.level;\n\n\t\tif (level == 0)\n\t\t{\n\t\t\tif (!root)\n\t\t\t\treturn !other.root;\n\t\t\tif (!other.root)\n\t\t\t\treturn true;\n\t\t\treturn root.items-&gt;getCount() &gt; other.root.items-&gt;getCount();\n\t\t}\n\n\t\treturn root.nodes-&gt;getCount() &gt; other.root.nodes-&gt;getCount();\n\t}\n\n\t// Compute approximate number of leafs in the tree\n\tsize_t approxCount() const\n\t{\n\t\tif (!root)\n\t\t\treturn 0;\n\n\t\tif (level == 0)\n\t\t\treturn root.items-&gt;getCount();\n\n\t\t// Tree is large. Roughly estimate number of leaf nodes using number of\n\t\t// items in root list and depth of the tree. Theoretically possible fill\n\t\t// factor range for the tree on each level for current NEED_MERGE routine\n\t\t// is [0.375, 1]. We take 3/5 = 0.6 as most probable case and\n\t\t// play from there.\n\t\tsize_t items_per_node = LEAF_COUNT * 3 / 5;\n\t\tfor (int i = 1; i &lt; level; i++)\n\t\t\titems_per_node *= NODE_COUNT * 3 / 5;\n\n\t\tfb_assert(items_per_node);\n\t\treturn root.nodes-&gt;getCount() * items_per_node;\n\t}\n\n\t// Compute approximate memory consumption for tree in bytes\n\tsize_t approxSize() const\n\t{\n\t\tif (!root)\n\t\t\treturn 0;\n\n\t\tif (level == 0)\n\t\t\treturn sizeof(ItemList);\n\n\t\t// Tree is large. Roughly estimate memory consumption using number\n\t\t// of items in root list and depth of the tree. Approach to approximation\n\t\t// is the same as in approxCount() routine above\n\t\tsize_t bytes_per_node = sizeof(ItemList);\n\t\tfor (int i = 1; i &lt; level; i++)\n\t\t\tbytes_per_node *= NODE_COUNT * 3 / 5;\n\n\t\tfb_assert(bytes_per_node);\n\t\treturn root.nodes-&gt;getCount() * bytes_per_node;\n\t}\n\n\tvoid append(const BePlusTree&amp; from)\n\t{\n\t\t// This is slow approach especially when used for assignment.\n\t\t// Optimize it when need arises.\n\t\tConstAccessor accessor(&amp;from);\n\t\tif (accessor.getFirst())\n\t\t{\n\t\t\tdo {\n\t\t\t\tadd(accessor.current());\n\t\t\t} while (accessor.getNext());\n\t\t}\n\t}\n\nprivate:\n\tclass NodeList;\n\n    class ItemList : public SortedVector&lt;Value, LEAF_COUNT, Key, KeyOfValue, Cmp&gt;\n\t{\n\tpublic:\n\t\tNodeList* parent = nullptr;\n\t\tItemList* next;\n\t\tItemList* prev;\n\n\t\t// Adds newly created item to doubly-linked list\n\t\tItemList(ItemList* items)\n\t\t{\n\t\t\tif ((next = items-&gt;next))\n\t\t\t\tnext-&gt;prev = this;\n\t\t\tprev = items;\n\t\t\titems-&gt;next = this;\n\t\t}\n\t\t// Create first item in the linked list\n\t\tItemList() noexcept : next(nullptr), prev(nullptr) {}\n\t};\n\n\tunion NodePtr\n\t{\n\t\tNodePtr() noexcept : items(nullptr) {}\n\t\tNodePtr(ItemList* p) : items(p) {}\n\t\tNodePtr(NodeList* p) : nodes(p) {}\n\n\t\toperator bool() const noexcept { return items != nullptr; }\n\n\t\tItemList* items;\n\t\tNodeList* nodes;\n\t};\n\n    class NodeList : public SortedVector&lt;NodePtr, NODE_COUNT, Key, NodeList, Cmp&gt;\n\t{\n\tpublic:\n\t\t// Adds newly created item to the doubly-linked list\n\t\tNodeList(NodeList* items)\n\t\t{\n\t\t\tif ((next = items-&gt;next))\n\t\t\t\tnext-&gt;prev = this;\n\t\t\tprev = items;\n\t\t\titems-&gt;next = this;\n\t\t}\n\t\t// Create first item in the linked list\n\t\tNodeList() noexcept : next(nullptr), prev(nullptr) {}\n\n\t\tint level;\n\t\tNodeList *parent = nullptr;\n\t\tNodeList *next, *prev;\n\t\tstatic const Ke n\t{\n\t\tFB_SIZE_T pos;\n\t\tif (!vList.nodes-&gt;find(key, pos))\n\t\t{\n\t\t\tif (pos &gt; 0)\n\t\t\t\tpos--;\n\t\t}\n\t\tvList = (*vList.nodes)[pos];\n\t}\n\n\tItemList *leaf = vList.items;\n\n\tFB_SIZE_T pos;\n\tif (leaf-&gt;find(key, pos))\n\t{\n\t\tif (accessor)\n\t\t{\n\t\t\taccessor-&gt;curr = leaf;\n\t\t\taccessor-&gt;curPos = pos;\n\t\t}\n\t\treturn false;\n\t}\n\n\tif (leaf-&gt;getCount() &lt; LEAF_COUNT)\n\t{\n\t\tleaf-&gt;insert(pos, item);\n\t\treturn true;\n\t}\n\n\t// Page is full. Look up nearby pages for space if possible\n\tItemList *temp;\n\t// Adding items to the next page is cheaper in most cases that\n\t// is why it is checked first\n\tif ((temp = leaf-&gt;next) &amp;&amp; temp-&gt;getCount() &lt; LEAF_COUNT)\n\t{\n\t\t// Found space on the next page\n\t\tif (pos == LEAF_COUNT)\n\t\t{\n\t\t\t// This would be ok if items were unique: temp-&gt;insert(0, item);\n\t\t\t// The same applies to all simular cases below\n\t\t\ttemp-&gt;insert(0, item);\n\t\t}\n\t\telse\n\t\t{\n\t\t\t// Maybe splitting array by half would make things faster ?\n\t\t\t// It should do it in case of random size items.\n\t\t\t// It would make things slower in case of sequental items addition.\n\t\t\t// Let&#x27;s leave it as is now.\n\t\t\ttemp-&gt;insert(0, (*leaf)[LEAF_COUNT - 1]);\n\t\t\tleaf-&gt;shrink(LEAF_COUNT - 1);\n\t\t\tleaf-&gt;insert(pos, item);\n\t\t}\n\t\treturn true;\n\t}\n\n\tif ((temp = leaf-&gt;prev) &amp;&amp; temp-&gt;getCount() &lt; LEAF_COUNT)\n\t{\n\t\t// Found space on the previous page\n\t\tif (pos == 0) {\n\t\t\ttemp-&gt;insert(temp-&gt;getCount(), item);\n\t\t}\n\t\telse\n\t\t{\n\t\t\ttemp-&gt;insert(temp-&gt;getCount(), (*leaf)[0]);\n\t\t\tleaf-&gt;remove(0);\n\t\t\tleaf-&gt;insert(pos - 1, item);\n\t\t}\n\t\treturn true;\n\t}\n\n\t// Nearby pages are also full. We need to add one more leaf page to the list\n\t// This shouldn&#x27;t happen very often. Traverse tree up trying to add node\n\n\t// No re-enterance allowed !!!\n\t// Since we haven&#x27;t done anything with tree yet, thus we don&#x27;t need to recover\n\t// anything in case of error thrown at this allocation here\n\tItemList *newLeaf = FB_NEW_POOL(*pool) ItemList(leaf);\n\n\t// Start building recovery map.\n\t// This array contains index of the element we try to add on page of each level\n\t// MAP_NEW_PAGE means that element is on new page\n\t// In case of low memory condition we use this data to recover to innocent state\n\tFB_SIZE_T recovery_map[MAX_TREE_LEVEL];\n\tconstexpr FB_SIZE_T MAP_NEW_PAGE = ~((FB_SIZE_T) 0);\n\n\tif (pos == LEAF_COUNT)\n\t{\n\t\tnewLeaf-&gt;insert(0, item);\n\t\trecovery_map[0] = MAP_NEW_PAGE;\n\t}\n\telse\n\t{\n\t\tnewLeaf-&gt;insert(0, (*leaf)[LEAF_COUNT - 1]);\n\t\tleaf-&gt;shrink(leaf-&gt;getCount() - 1);\n\t\tleaf-&gt;insert(pos, item);\n\t\trecovery_map[0] = pos;\n\t}\n\n\tNodePtr newNode = newLeaf;\n\tNodeList *nodeList = leaf-&gt;parent;\n\tint curLevel = 0;\n\ttry {\n\t\twhile (nodeList)\n\t\t{\n\t\t\t// Easy case. We&#x27;ve got some space on the node page\n\t\t\tif (nodeList-&gt;getCount() &lt; NODE_COUNT)\n\t\t\t{\n\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, nodeList);\n\t\t\t\tnodeList-&gt;add(newNode);\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\t// Page is full. Look up nearby pages for space if possible\n\t\t\tnodeList-&gt;find(NodeList::generate(nodeList, newNode), pos);\n\t\t\tNodeList *list;\n\n\t\t\tif ((list = nodeList-&gt;next) &amp;&amp; list-&gt;getCount() &lt; NODE_COUNT)\n\t\t\t{\n\t\t\t\t// Found space on the next page\n\t\t\t\tif (pos == NODE_COUNT)\n\t\t\t\t{\n\t\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, list);\n\t\t\t\t\tlist-&gt;insert(0, newNode);\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tNodePtr t = (*nodeList)[NODE_COUNT - 1];\n\t\t\t\t\tNodeList::setNodeParent(t, curLevel, list);\n\t\t\t\t\tlist-&gt;insert(0, t);\n\t\t\t\t\tnodeList-&gt;shrink(NODE_COUNT - 1);\n\t\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, nodeList);\n\t\t\t\t\tnodeList-&gt;insert(pos, newNode);\n\t\t\t\t}\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\tif ((list = nodeList-&gt;prev) &amp;&amp; list-&gt;getCount() &lt; NODE_COUNT)\n\t\t\t{\n\t\t\t\t// Found space on the previous page\n\t\t\t\tif (pos == 0)\n\t\t\t\t{\n\t\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, list);\n\t\t\t\t\tlist-&gt;insert(list-&gt;getCount(), newNode);\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tNodePtr t = (*nodeList)[0];\n\t\t\t\t\tNodeList::setNodeParent(t, curLevel, list);\n\t\t\t\t\tlist-&gt;insert(list-&gt;getCount(), t);\n\t\t\t\t\tnodeList-&gt;remove(0);\n\t\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, nodeList);\n\t\t\t\t\tnodeList-&gt;insert(pos - 1, newNode);\n\t\t\t\t}\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\t// No space found. Allocate NodeList page and climb up the tree\n\n\t\t\t// No re-enterance allowed !!!\n\t\t\t// Exceptions from this point\n\t\t\t// are cleaned up lower\n\t\t\tNodeList *newList = FB_NEW_POOL(*pool) NodeList(nodeList);\n\n\t\t\tif (pos == NODE_COUNT)\n\t\t\t{\n\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, newList);\n\t\t\t\tnewList-&gt;insert(0, newNode);\n\t\t\t\trecovery_map[curLevel + 1] = MAP_NEW_PAGE;\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tNodePtr t = (*nodeList)[NODE_COUNT - 1];\n\t\t\t\tNodeList::setNodeParent(t, curLevel, newList);\n\t\t\t\tnewList-&gt;insert(0, t);\n\t\t\t\tnodeList-&gt;shrink(NODE_COUNT - 1);\n\t\t\t\tNodeList::setNodeParentAndLevel(newNode, curLevel, nodeList);\n\t\t\t\tnodeList-&gt;insert(pos, newNode);\n\t\t\t\trecovery_map[curLevel + 1] = pos;\n\t\t\t}\n\t\t\tnewNode = newList;\n\t\t\tnodeList = nodeList-&gt;parent;\n\t\t\tcurLevel++;\n\t\t}\n\n\t\t// This is the worst case. We reached the top of tree but were not able to insert node\n\t\t// Allocate new root page and increase level of our tree\n\t\tnodeList = FB_NEW_POOL(*pool) NodeList();\n\t\tnodeList-&gt;level = this-&gt;level;\n\t\tnodeList-&gt;insert(0, this-&gt;root);\n\t\tNodeList::setNodeParentAndLevel(newNode, this-&gt;level, nodeList);\n\t\tNodeList::setNodeParent(this-&gt;root, this-&gt;level, nodeList);\n\t\tnodeList-&gt;add(newNode);\n\t\tthis-&gt;root = nodeList;\n\t\tthis-&gt;level++;\n\t}\n\tcatch (const Firebird::Exception&amp;)\n\t{\n\t\t// Recover tree to innocent state\n\t\twhile (curLevel)\n\t\t{\n\t\t\tNodeList *itemL = newNode.nodes;\n\t\t\tNodePtr lower;\n\t\t    if (recovery_map[curLevel] == MAP_NEW_PAGE) {\n\t\t\t\tlower = (*itemL)[0];\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tlower = (*itemL-&gt;prev)[recovery_map[curLevel]];\n\t\t\t\titemL-&gt;prev-&gt;remove(recovery_map[curLevel]);\n\t\t\t\titemL-&gt;prev-&gt;insert(itemL-&gt;prev-&gt;getCount(), (*itemL)[0]);\n\t\t\t\tNodeList::setNodeParent((*itemL)[0], curLevel - 1, itemL-&gt;prev);\n\t\t\t}\n\t\t\tdelete itemL;\n\t\t\tnewNode = lower;\n\t\t\tcurLevel--;\n\t\t}\n\t\tItemList *itemL2 = newNode.items;\n\t\tif (recovery_map[0] != MAP_NEW_PAGE)\n\t\t{\n\t\t\titemL2-&gt;prev-&gt;remove(recovery_map[0]);\n\t\t\titemL2-&gt;prev-&gt;insert(itemL2-&gt;prev-&gt;getCount(), (*itemL2)[0]);\n\t\t}\n\t\tdelete itemL2;\n\t\tthrow;\n\t}\n\treturn true;\n}\n\ntemplate &lt;typename Value, typename Key, typename KeyOfValue, typename Cmp&gt;\nvoid BePlusTree&lt;Value, Key, KeyOfValue, Cmp&gt;::_removePage(const int nodeLevel, NodePtr node)\n{\n\tNodeList *list;\n\t// Get parent and adjust the links\n\tif (nodeLevel)\n\t{\n\t\tNodeList *temp = node.nodes;\n\t\tif (temp-&gt;prev)\n\t\t\ttemp-&gt;prev-&gt;next = temp-&gt;next;\n\t\tif (temp-&gt;next)\n\t\t\ttemp-&gt;next-&gt;prev = temp-&gt;prev;\n\t\tlist = temp-&gt;parent;\n\t}\n\telse\n\t{\n\t\tItemList *temp = node.items;\n\t\tif (temp-&gt;prev)\n\t\t\ttemp-&gt;prev-&gt;next = temp-&gt;next;\n\t\tif (temp-&gt;next)\n\t\t\ttemp-&gt;next-&gt;prev = temp-&gt;prev;\n\t\tlist = temp-&gt;parent;\n\t}\n\n\tif (list-&gt;getCount() == 1)\n\t{\n\t\t// Only one node left in the list. We cannot remove it directly\n\t\t// because is would invalidate our tree structure\n\t\tNodeList *temp;\n\t\tif ((temp = list-&gt;prev) &amp;&amp; NEED_MERGE(temp-&gt;getCount(), NODE_COUNT)) {\n\t\t\t_removePage(nodeLevel + 1, list);\n\t\t}\n\t\telse\n\t\tif ((temp = list-&gt;next) &amp;&amp; NEED_MERGE(temp-&gt;getCount(), NODE_COUNT)) {\n\t\t\t_removePage(nodeLevel + 1, list);\n\t\t}\n\t\telse\n\t\tif ((temp = list-&gt;prev))\n\t\t{\n\t\t\tNodeList::setNodeParent(((*list)[0] = (*temp)[temp-&gt;getCount() - 1]), nodeLevel, list);\n\t\t\ttemp-&gt;shrink(temp-&gt;getCount() - 1);\n\t\t}\n\t\telse\n\t\tif ((temp = list-&gt;next))\n\t\t{\n\t\t\tNodeList::setNodeParent(((*list)[0] = (*temp)[0]), nodeLevel, list);\n\t\t\ttemp-&gt;remove(0);\n\t\t}\n\t\telse\n\t\t{\n\t\t\t// It means the tree is broken\n\t\t\tfb_assert(false);\n\t\t}\n\t}\n\telse\n\t{\n\t\tFB_SIZE_T pos;\n#ifndef DEV_BUILD\n\t\tlist-&gt;find(NodeList::generate(list, node), pos);\n#else\n\t\tconst bool found = list-&gt;find(NodeList::generate(list, node), pos);\n\t\tfb_assert(found);\n#endif\n\t\tlist-&gt;remove(pos);\n\n\t\tif (root.nodes == list &amp;&amp; list-&gt;getCount() == 1)\n\t\t{\n\t\t\t// We reached the top of the tree and were asked to modify root\n\t\t\t// page so only one node will be left in this case.\n\t\t\t// Reduce the level of the tree\n\t\t\troot = (*list)[0];\n\t\t\tlevel--;\n\t\t\tNodeList::setNodeParent(root, level, nullptr);\n\t\t\tdelete list;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tNodeList *temp;\n\t\t\tif ((temp = list-&gt;prev) &amp;&amp; NEED_MERGE(temp-&gt;getCount() + list-&gt;getCount(), NODE_COUNT))\n\t\t\t{\n\t\t\t\t// After join upper levels of the tree remain stable because join doesn&#x27;t change\n\t\t\t\t// key of the page. The same applies to lower case too.\n\t\t\t\ttemp-&gt;join(*list);\n\t\t\t\tfor (FB_SIZE_T i = 0; i &lt; list-&gt;getCount(); i++)\n\t\t\t\t\tNodeList::setNodeParent((*list)[i], nodeLevel, temp);\n\t\t\t\t_removePage(nodeLevel + 1, list);\n\t\t\t}\n\t\t\telse\n\t\t\tif ((temp = list-&gt;next) &amp;&amp; NEED_MERGE(temp-&gt;getCount() + list-&gt;getCount(), NODE_COUNT))\n\t\t\t{\n\t\t\t\tlist-&gt;join(*temp);\n\t\t\t\tfor (FB_SIZE_T i = 0; i &lt; temp-&gt;getCount(); i++)\n\t\t\t\t\tNodeList::setNodeParent((*temp)[i], nodeLevel, list);\n\t\t\t\t_removePage(nodeLevel + 1, temp);\n\t\t\t}\n\t\t}\n\t}\n\n\tif (nodeLevel)\n\t\tdelete node.nodes;\n\telse\n\t\tdelete node.items;\n}\n\n}  // namespace Firebird\n\n#endif // CLASSES_TREE_H\n\n"}, "/build/src/common/classes/vector.h": {"id": "/build/src/common/classes/vector.h", "filePath": "src/common/classes/vector.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\tvector.h\n *\tDESCRIPTION:\tstatic array of simple elements\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n *\n */\n\n#ifndef VECTOR_H\n#define VECTOR_H\n\n#include &quot;../common/gdsassert.h&quot;\n#include &lt;string.h&gt;\n\nnamespace Firebird {\n\n// Very fast static array of simple types\ntemplate &lt;typename T, FB_SIZE_T Capacity, typename A = char&gt;\nclass Vector\n{\npublic:\n\tVector() : count(0) {}\n\n\tT&amp; operator[](FB_SIZE_T index) noexcept\n\t{\n  \t\tfb_assert(index &lt; count);\n  \t\treturn data[index];\n\t}\n\n\tconst T&amp; operator[](FB_SIZE_T index) const noexcept\n\t{\n  \t\tfb_assert(index &lt; count);\n  \t\treturn data[index];\n\t}\n\n\tT* begin() noexcept { return data; }\n\tT* end() noexcept { return data + count; }\n\tconst T* begin() const noexcept { return data; }\n\tconst T* end() const noexcept { return data + count; }\n\tbool hasData() const noexcept { return (count != 0); }\n\tFB_SIZE_T getCount() const noexcept { return count; }\n\tFB_SIZE_T getCapacity() const noexcept { return Capacity; }\n\tvoid clear() noexcept { count = 0; }\n\n\tvoid insert(FB_SIZE_T index, const T&amp; item)\n\t{\n\t  fb_assert(index &lt;= count);\n\t  fb_assert(count &lt; Capacity);\n\t  memmove(data + index + 1, data + index, sizeof(T) * (count++ - index));\n\t  data[index] = item;\n\t}\n\n\tFB_SIZE_T add(const T&amp; item)\n\t{\n\t\tfb_assert(count &lt; Capacity);\n\t\tdata[count] = item;\n  \t\treturn ++count;\n\t}\n\n\tT* remove(FB_SIZE_T index) noexcept\n\t{\n  \t\tfb_assert(index &lt; count);\n  \t\tmemmove(data + index, data + index + 1, sizeof(T) * (--count - index));\n\t\treturn &amp;data[index];\n\t}\n\n\tT* removeCount(const FB_SIZE_T index, const FB_SIZE_T n) noexcept\n\t{\n  \t\tfb_assert(index + n &lt;= count);\n  \t\tmemmove(data + index, data + index + n, sizeof(T) * (count - index - n));\n\t\tcount -= n;\n\t\treturn &amp;data[index];\n\t}\n\n\tvoid shrink(FB_SIZE_T newCount) noexcept\n\t{\n\t\tfb_assert(newCount &lt;= count);\n\t\tcount = newCount;\n\t}\n\n\tvoid join(const Vector&lt;T, Capacity&gt;&amp; L) noexcept\n\t{\n\t\tfb_assert(count + L.count &lt;= Capacity);\n\t\tmemcpy(data + count, L.data, sizeof(T) * L.count);\n\t\tcount += L.count;\n\t}\n\n\t// prepare vector to be used as a buffer of capacity items\n\tT* getBuffer(FB_SIZE_T capacityL) noexcept\n\t{\n\t\tfb_assert(capacityL &lt;= Capacity);\n\t\tcount = capacityL;\n\t\treturn data;\n\t}\n\n\tvoid push(const T&amp; item)\n\t{\n\t\tadd(item);\n\t}\n\n\tT pop()\n\t{\n\t\tfb_assert(count &gt; 0);\n\t\tcount--;\n\t\treturn data[count];\n\t}\n\n\tvoid push(const T* items, const FB_SIZE_T itemsCount)\n\t{\n\t\tfb_assert(count &lt;= FB_MAX_SIZEOF - itemsCount);\n\t\tfb_assert(count + itemsCount &lt;= Capacity);\n\t\tmemcpy(data + count, items, sizeof(T) * itemsCount);\n\t\tcount += itemsCount;\n\t}\n\n\tvoid append(const T* items, const FB_SIZE_T itemsCount)\n\t{\n\t\tpush(items, itemsCount);\n\t}\n\n\n\t// This method only assigns &quot;pos&quot; if the element is found.\n\t// Maybe we should modify it to iterate directy with &quot;pos&quot;.\n\tbool find(const T&amp; item, FB_SIZE_T&amp; pos) const\n\t{\n\t\tfor (FB_SIZE_T i = 0; i &lt; count; i++)\n\t\t{\n\t\t\tif (data[i] == item)\n\t\t\t{\n\t\t\t\tpos = i;\n\t\t\t\treturn true;\n\t\t\t}\n\t\t}\n\t\treturn false;\n\t}\n\nprotected:\n\tunion\n\t{\n\t\tFB_SIZE_T count;\n\t\tA align;\n\t};\n\t// Do not insert data members between align and data:\n\t// alignment of data is ensured by preceding union\n\tT data[Capacity];\n};\n\n// Template for default value comparsion\ntemplate &lt;typename T&gt;\nclass DefaultComparator\n{\npublic:\n\tstatic bool greaterThan(const T&amp; i1, const T&amp; i2)\n\t{\n\t    return i1 &gt; i2;\n\t}\n};\n\n// Template to convert value to index directly\ntemplate &lt;typename T&gt;\nclass DefaultKeyValue\n{\npublic:\n\tstatic const T&amp; generate(const void* /*sender*/, const T&amp; item) { return item; }\n\tstatic const T&amp; generate(const T&amp; item) { return item; }\n};\n\n// Fast sorted array of simple objects\n// It is used for B+ tree nodes lower, but can still be used by itself\ntemplate &lt;typename Value, FB_SIZE_T Capacity, typename Key = Value,\n\ttypename KeyOfValue = DefaultKeyValue&lt;Value&gt;,\n\ttypename Cmp = DefaultComparator&lt;Key&gt; &gt;\nclass SortedVector : public Vector&lt;Value, Capacity&gt;\n{\npublic:\n\tSortedVector() : Vector&lt;Value, Capacity&gt;() {}\n\tbool find(const Key&amp; item, FB_SIZE_T&amp; pos) const\n\t{\n\t\tFB_SIZE_T highBound = this-&gt;count, lowBound = 0;\n\t\twhile (highBound &gt; lowBound)\n\t\t{\n\t\t\tconst FB_SIZE_T temp = (highBound + lowBound) &gt;&gt; 1;\n\t\t\tif (Cmp::greaterThan(item, KeyOfValue::generate(this, this-&gt;data[temp])))\n\t\t\t\tlowBound = temp + 1;\n\t\t\telse\n\t\t\t\thighBound = temp;\n\t\t}\n\t\tpos = lowBound;\n\t\treturn highBound != this-&gt;count &amp;&amp;\n\t\t\t!Cmp::greaterThan(KeyOfValue::generate(this, this-&gt;data[lowBound]), item);\n\t}\n\tFB_SIZE_T add(const Value&amp; item)\n\t{\n\t    FB_SIZE_T pos;\n  \t    find(KeyOfValue::generate(this, item), pos);\n\t\tthis-&gt;insert(pos, item);\n\t\treturn pos;\n\t}\n};\n\n\n// Templates to allow to iterate thru array\\vector of values and process items\n// in some way. Processed items are marked and skipped at next iteration circle.\n// Idea is to not remove processed items from array and avoid costly memory\n// moving. Also, iterator is able to move upper and lower bounds of array if\n// last (or first) items are marked, making next iterations more efficient.\n\ntemplate &lt;typename T&gt;\nclass DefaultMarkValue\n{\npublic:\n\tstatic T getMarkValue()\n\t{\n\t\treturn T(0);\n\t}\n};\n\ntemplate &lt;typename T, typename MarkValue = DefaultMarkValue&lt;T&gt; &gt;\nclass DefaultMarker\n{\npublic:\n\tstatic void mark(T* const item)\n\t{\n\t\t*item = MarkValue::getMarkValue();\n\t}\n\n\tstatic bool isMarked(const T* const item)\n\t{\n\t\treturn *item == MarkValue::getMarkValue();\n\t}\n};\n\ntemplate &lt;typename T, typename Marker = DefaultMarker&lt;T&gt; &gt;\nclass MarkIterator\n{\npublic:\n\tMarkIterator(T* begin, FB_SIZE_T count) :\n\t\tm_begin(begin),\n\t\tm_end(begin + count),\n\t\tm_curr(begin),\n\t\tm_last(begin)\n\t{\n\t}\n\n\t// Mark current item as processed\n\tvoid mark()\n\t{\n\t\tMarker::mark(m_curr);\n\n\t\tif (m_last == m_curr)\n\t\t\tm_last--;\n\t}\n\n\t// Move iterator position to the first not processed item\n\tvoid rewind()\n\t{\n\t\tm_curr = m_begin;\n\t\tm_end = m_last + 1;\n\t\tm_last = m_begin;\n\t}\n\n\tT&amp; operator*() const\n\t{\n\t\tfb_assert(m_begin &lt;= m_curr);\n\t\tfb_assert(m_curr &lt; m_end);\n\t\treturn *m_curr;\n\t}\n\n\t// Advance iterator to the next not processed item, if exist\n\tvoid operator++()\n\t{\n\t\tfb_assert(m_begin &lt;= m_curr);\n\t\tfb_assert(m_curr &lt; m_end);\n\n\t\tconst bool at_begin = (m_begin == m_curr);\n\t\tm_curr++;\n\n\t\twhile (m_curr &lt; m_end &amp;&amp; Marker::isMarked(m_curr))\n\t\t\tm_curr++;\n\n\t\tif (m_curr == m_end)\n\t\t\treturn;\n\n\t\tif (at_begin)\n\t\t{\n\t\t\tif (Marker::isMarked(m_begin))\n\t\t\t\tm_begin = m_curr;\n\t\t\telse if (m_begin != m_curr - 1)\n\t\t\t{\n\t\t\t\tm_curr[-1] = *m_begin;\n\t\t\t\tm_begin = m_curr - 1;\n\t\t\t}\n\t\t}\n\n\t\tif (!Marker::isMarked(m_curr))\n\t\t\tm_last = m_curr;\n\t}\n\n\t// Show if current position is valid\n\tbool isEof() const\n\t{\n\t\treturn m_curr &gt;= m_end;\n\t}\n\n\t// Show if not processed items still exists\n\tbool isEmpty() const\n\t{\n\t\treturn m_begin &gt;= m_end;\n\t}\n\nprivate:\n\tT* m_begin;\n\tT* m_end;\n\tT* m_curr;\n\tT* m_last;\n};\n\n} // namespace Firebird\n\n#endif\n"}, "/build/src/common/ThreadStart.h": {"id": "/build/src/common/ThreadStart.h", "filePath": "src/common/ThreadStart.h", "content": "/*\n *\tPROGRAM:\tJRD access method\n *\tMODULE:\t\tthd.h\n *\tDESCRIPTION:\tThread support definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.28 Sean Leyne - Completed removal of obsolete &quot;DGUX&quot; port\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n * Alex Peshkov\n */\n\n#ifndef JRD_THREADSTART_H\n#define JRD_THREADSTART_H\n\n#include &quot;../common/ThreadData.h&quot;\n#include &quot;../common/classes/semaphore.h&quot;\n\n#ifdef WIN_NT\n#include &lt;windows.h&gt;\n#endif\n\n\n// Thread priorities (may be ignored)\n\ninline constexpr int THREAD_high\t\t= 1;\ninline constexpr int THREAD_medium_high\t= 2;\ninline constexpr int THREAD_medium\t\t= 3;\ninline constexpr int THREAD_medium_low\t= 4;\ninline constexpr int THREAD_low\t\t\t= 5;\ninline constexpr int THREAD_critical\t= 6;\n\n\n// Thread startup\n\n// BRS 01/07/2004\n// Hack due to a bug in mingw.\n// The definition inside the thdd class should be replaced with the following one.\ntypedef THREAD_ENTRY_DECLARE ThreadEntryPoint(THREAD_ENTRY_PARAM);\n\n#if defined(WIN_NT)\ntypedef DWORD ThreadId;\n#elif defined(LINUX) &amp;&amp; !defined(ANDROID) &amp;&amp; !defined(LSB_BUILD)\n#define USE_LWP_AS_THREAD_ID\ntypedef int ThreadId;\n#elif defined(USE_POSIX_THREADS)\ntypedef pthread_t ThreadId;\n#else\nerror - unknown ThreadId type\n#endif\n\nclass Thread\n{\npublic:\n#ifdef WIN_NT\n\ttypedef DWORD InternalId;\n\ttypedef HANDLE Handle;\n#endif\n#ifdef USE_POSIX_THREADS\n\ttypedef pthread_t Handle;\n\ttypedef pthread_t InternalId;\n#endif\n\n\tstatic Thread start(ThreadEntryPoint* routine, void* arg, int priority_arg, Handle* p_handle = NULL);\n\tstatic void waitForCompletion(Handle&amp; handle);\n\tstatic void kill(Handle&amp; handle);\n\n\tstatic ThreadId getId();\n\n\tstatic void sleep(unsigned milliseconds);\n\tstatic void yield();\n\n\tstatic bool isCurrent(Handle threadHandle);\n\tbool isCurrent();\n\n\tThread() noexcept { }\n\nprivate:\n\tThread(InternalId iid) noexcept\n\t\t: internalId(iid)\n\t{ }\n\n\tInternalId internalId{};\n};\n\ninline ThreadId getThreadId()\n{\n\treturn Thread::getId();\n}\n\n\ntemplate &lt;typename TA, void (*cleanup) (TA) = nullptr&gt;\nclass ThreadFinishSync\n{\npublic:\n\ttypedef void ThreadRoutine(TA);\n\n\tThreadFinishSync(Firebird::MemoryPool&amp; pool, ThreadRoutine* routine, int priority_arg = THREAD_medium)\n\t\t: threadHandle(0),\n\t\t  threadRoutine(routine),\n\t\t  threadPriority(priority_arg),\n\t\t  closing(false)\n\t{ }\n\n\tvoid run(TA arg)\n\t{\n\t\tthreadArg = arg;\n\t\tThread::start(internalRun, this, threadPriority, &amp;threadHandle);\n\t}\n\n\tbool tryWait()\n\t{\n\t\tif (closing)\n\t\t{\n\t\t\twaitForCompletion();\n\t\t\treturn true;\n\t\t}\n\t\treturn false;\n\t}\n\n\tvoid waitForCompletion()\n\t{\n\t\tif (threadHandle)\n\t\t{\n\t\t\tThread::waitForCompletion(threadHandle);\n\t\t\tthreadHandle = 0;\n\t\t}\n\t}\n\nprivate:\n\tThread::Handle threadHandle;\n\tTA threadArg;\n\tThreadRoutine* threadRoutine;\n\tint threadPriority;\n\tbool closing;\n\n\tstatic THREAD_ENTRY_DECLARE internalRun(THREAD_ENTRY_PARAM arg)\n\t{\n\t\t((ThreadFinishSync*) arg)-&gt;internalRun();\n\t\treturn 0;\n\t}\n\n\tvoid internalRun()\n\t{\n\t\ttry\n\t\t{\n\t\t\tthreadRoutine(threadArg);\n\t\t}\n\t\tcatch (const Firebird::Exception&amp; ex)\n\t\t{\n\t\t\tthreadArg-&gt;exceptionHandler(ex, threadRoutine);\n\t\t}\n\n\t\tif (cleanup != nullptr)\n\t\t\tcleanup(threadArg);\n\t\tclosing = true;\n\t}\n};\n\n#endif // JRD_THREADSTART_H\n"}, "/build/src/common/TimeZoneUtil.h": {"id": "/build/src/common/TimeZoneUtil.h", "filePath": "src/common/TimeZoneUtil.h", "content": "/*\n *\tPROGRAM:\t\tFirebird interface.\n *\tMODULE:\t\t\tTimeZoneUtil.h\n *\tDESCRIPTION:\tTime zone utility functions.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Adriano dos Santos Fernandes\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2018 Adriano dos Santos Fernandes &lt;adrianosf@gmail.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef COMMON_TIME_ZONE_UTIL_H\n#define COMMON_TIME_ZONE_UTIL_H\n\n#include &lt;atomic&gt;\n#include &lt;functional&gt;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../common/cvt.h&quot;\n#include &quot;../common/unicode_util.h&quot;\n\n // struct tm declaration\n#if defined(TIME_WITH_SYS_TIME)\n#include &lt;sys/time.h&gt;\n#include &lt;time.h&gt;\n#else\n#if defined(HAVE_SYS_TIME_H)\n#include &lt;sys/time.h&gt;\n#else\n#include &lt;time.h&gt;\n#endif\n#endif\n\nnamespace Firebird {\n\nclass NoThrowTimeStamp;\n\nclass TimeZoneUtil\n{\npublic:\n\tstatic const ISC_DATE TIME_TZ_BASE_DATE;\n\tstatic const char GMT_FALLBACK[5];\t// &quot;GMT*&quot;\n\n\tstatic inline constexpr USHORT GMT_ZONE = 65535;\n\tstatic inline constexpr unsigned MAX_LEN = 32;\n\tstatic inline constexpr unsigned MAX_SIZE = MAX_LEN + 1;\n\nprivate:\n\tstatic InitInstance&lt;PathName&gt; tzDataPath;\n\npublic:\n\tstatic constexpr UDate timeStampToIcuDate(ISC_TIMESTAMP ts) noexcept\n\t{\n\t\treturn (TimeStamp::timeStampToTicks(ts) -\n\t\t\t((TimeStamp::UNIX_DATE - TimeStamp::MIN_DATE) * TimeStamp::ISC_TICKS_PER_DAY)) /\n\t\t\t(ISC_TIME_SECONDS_PRECISION / 1000);\n\t}\n\n\tstatic constexpr ISC_TIMESTAMP icuDateToTimeStamp(UDate icuDate) noexcept\n\t{\n\t\treturn TimeStamp::ticksToTimeStamp(icuDate * (ISC_TIME_SECONDS_PRECISION / 1000) +\n\t\t\t((TimeStamp::UNIX_DATE - TimeStamp::MIN_DATE) * TimeStamp::ISC_TICKS_PER_DAY));\n\t}\n\n\tstatic void initTimeZoneEnv();\n\tstatic const PathName&amp; getTzDataPath();\n\n\tstatic USHORT getSystemTimeZone();\n\n\tstatic void getDatabaseVersion(Firebird::string&amp; str);\n\n\tstatic void iterateRegions(std::function&lt;void (USHORT, const char*)&gt; func);\n\n\tstatic USHORT parse(const char* str, unsigned strLen, bool strict = true);\n\tstatic USHORT parseRegion(const char* str, unsigned strLen);\n\n\tstatic unsigned format(char* buffer, size_t bufferSize, USHORT timeZone,\n\t\tbool fallback = false, SLONG offset = NO_OFFSET);\n\n\tstatic bool isValidOffset(int sign, unsigned tzh, unsigned tzm) noexcept;\n\n\tstatic void extractOffset(const ISC_TIMESTAMP_TZ&amp; timeStampTz, int* sign, unsigned* tzh, unsigned* tzm);\n\tstatic void extractOffset(const ISC_TIMESTAMP_TZ&amp; timeStampTz, SSHORT* offset);\n\tstatic void extractOffset(const ISC_TIME_TZ&amp; timeTz, SSHORT* offset);\n\n\tstatic USHORT makeFromOffset(int sign, unsigned tzh, unsigned tzm);\n\n\tstatic void localTimeToUtc(ISC_TIME&amp; time, ISC_USHORT timeZone);\n\tstatic void localTimeToUtc(ISC_TIME_TZ&amp; timeTz);\n\n\tstatic void localTimeStampToUtc(ISC_TIMESTAMP&amp; timeStamp, Callbacks* cb);\n\tstatic void localTimeStampToUtc(ISC_TIMESTAMP_TZ&amp; timeStampTz);\n\n\tstatic inline constexpr SLONG NO_OFFSET = MAX_SLONG;\n\n\tstatic bool decodeTime(const ISC_TIME_TZ&amp; timeTz, bool gmtFallback, SLONG gmtOffset,\n\t\tstruct tm* times, int* fractions = NULL);\n\tstatic bool decodeTimeStamp(const ISC_TIMESTAMP_TZ&amp; timeStampTz, bool gmtFallback, SLONG gmtOffset,\n\t\tstruct tm* times, int* fractions = NULL);\n\n\tstatic ISC_TIMESTAMP_TZ getCurrentSystemTimeStamp();\n\tstatic ISC_TIMESTAMP_TZ getCurrentGmtTimeStamp();\n\n\tstatic ISC_TIMESTAMP_TZ getCurrentTimeStamp(USHORT timeZone)\n\t{\n\t\tauto tsTz = getCurrentGmtTimeStamp();\n\t\ttsTz.time_zone = timeZone;\n\t\treturn tsTz;\n\t}\n\n\tstatic void validateGmtTimeStamp(NoThrowTimeStamp&amp; ts);\n\n\tstatic ISC_TIME timeTzToTime(const ISC_TIME_TZ&amp; timeTz, Callbacks* cb);\n\tstatic ISC_TIMESTAMP timeStampTzToTimeStamp(const ISC_TIMESTAMP_TZ&amp; timeStampTz, USHORT toTimeZone);\n\n\tstatic ISC_TIMESTAMP_TZ timeToTimeStampTz(const ISC_TIME&amp; time, Callbacks* cb);\n\tstatic ISC_TIME_TZ timeToTimeTz(const ISC_TIME&amp; time, Callbacks* cb);\n\n\tstatic ISC_TIMESTAMP_TZ timeTzToTimeStampTz(const ISC_TIME_TZ&amp; timeTz, Callbacks* cb);\n\tstatic ISC_TIMESTAMP timeTzToTimeStamp(const ISC_TIME_TZ&amp; timeTz, Callbacks* cb);\n\n\tstatic ISC_TIME_TZ timeStampTzToTimeTz(const ISC_TIMESTAMP_TZ&amp; timeStampTz);\n\tstatic ISC_TIMESTAMP timeStampTzToTimeStamp(const ISC_TIMESTAMP_TZ&amp; timeStampTz, Callbacks* cb);\n\n\tstatic ISC_TIMESTAMP_TZ timeStampToTimeStampTz(const ISC_TIMESTAMP&amp; timeStamp, Callbacks* cb);\n\tstatic ISC_TIME_TZ timeStampToTimeTz(const ISC_TIMESTAMP&amp; timeStamp, Callbacks* cb);\n\n\tstatic ISC_TIMESTAMP_TZ dateToTimeStampTz(const ISC_DATE&amp; date, Callbacks* cb);\n};\n\nclass IcuCalendarWrapper\n{\npublic:\n\tIcuCalendarWrapper(UCalendar* aWrapped, std::atomic&lt;UCalendar*&gt;* aCachePtr) noexcept\n\t\t: wrapped(aWrapped),\n\t\t  cachePtr(aCachePtr)\n\t{}\n\n\tIcuCalendarWrapper(IcuCalendarWrapper&amp;&amp; o) noexcept\n\t\t: wrapped(o.wrapped),\n\t\t  cachePtr(o.cachePtr)\n\t{\n\t\to.wrapped = nullptr;\n\t}\n\n\t~IcuCalendarWrapper()\n\t{\n\t\tif (wrapped)\n\t\t{\n\t\t\tauto newCached = cachePtr-&gt;exchange(wrapped);\n\n\t\t\tif (newCached)\n\t\t\t{\n\t\t\t\tauto&amp; icuLib = UnicodeUtil::getConversionICU();\n\t\t\t\ticuLib.ucalClose(newCached);\n\t\t\t}\n\t\t}\n\t}\n\n\tIcuCalendarWrapper(const IcuCalendarWrapper&amp;) = delete;\n\tIcuCalendarWrapper&amp; operator=(const IcuCalendarWrapper&amp;) = delete;\n\npublic:\n\tUCalendar* operator-&gt;() noexcept\n\t{\n\t\treturn wrapped;\n\t}\n\n\toperator UCalendar*() noexcept\n\t{\n\t\treturn wrapped;\n\t}\n\n\tbool operator!() const noexcept\n\t{\n\t\treturn !wrapped;\n\t}\n\nprivate:\n\tUCalendar* wrapped;\n\tstd::atomic&lt;UCalendar*&gt;* cachePtr;\n};\n\nclass TimeZoneRuleIterator\n{\npublic:\n\tTimeZoneRuleIterator(USHORT id, const ISC_TIMESTAMP_TZ&amp; aFrom, const ISC_TIMESTAMP_TZ&amp; aTo);\n\npublic:\n\tbool next();\n\npublic:\n\tISC_TIMESTAMP_TZ startTimestamp;\n\tISC_TIMESTAMP_TZ endTimestamp;\n\tSSHORT zoneOffset;\n\tSSHORT dstOffset;\n\nprivate:\n\tUnicodeUtil::ConversionICU&amp; icuLib;\n\tSINT64 startTicks;\n\tSINT64 toTicks;\n\tIcuCalendarWrapper icuCalendar;\n\tUDate icuDate;\n};\n\n}\t// namespace Firebird\n\n#endif\t// COMMON_TIME_ZONE_UTIL_H\n"}, "/build/src/include/firebird/impl/dsc_pub.h": {"id": "/build/src/include/firebird/impl/dsc_pub.h", "filePath": "src/include/firebird/impl/dsc_pub.h", "content": "/*\n *\tPROGRAM:\tJRD access method\n *\tMODULE:\t\tdsc.h\n *\tDESCRIPTION:\tDefinitions associated with descriptors\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n * 2002.04.16  Paul Beach - HP10 Define changed from -4 to (-4) to make it\n *             compatible with the HP Compiler\n */\n\n#ifndef FIREBIRD_IMPL_DSC_PUB_H\n#define FIREBIRD_IMPL_DSC_PUB_H\n\n\n/*\n * The following flags are used in an internal structure dsc (dsc.h) or in the external one paramdsc (ibase.h)\n */\n\n/* values for dsc_flags\n * Note: DSC_null is only reliably set for local variables (blr_variable)\n */\n#define DSC_null\t\t1\n#define DSC_no_subtype\t2\t/* dsc has no sub type specified */\n#define DSC_nullable  \t4\t/* not stored. instead, is derived\n\t\t\t\t\t\t\t   from metadata primarily to flag\n\t\t\t\t\t\t\t   SQLDA (in DSQL)               */\n\n#define dtype_unknown\t0\n#define dtype_text\t\t1\n#define dtype_cstring\t2\n#define dtype_varying\t3\n\n#define dtype_packed\t6\n#define dtype_byte\t\t7\n#define dtype_short\t\t8\n#define dtype_long\t\t9\n#define dtype_quad\t\t10\n#define dtype_real\t\t11\n#define dtype_double\t12\n#define dtype_d_float\t13\n#define dtype_sql_date\t14\n#define dtype_sql_time\t15\n#define dtype_timestamp\t16\n#define dtype_blob\t\t17\n#define dtype_array\t\t18\n#define dtype_int64\t\t19\n#define dtype_dbkey\t\t20\n#define dtype_boolean\t21\n#define dtype_dec64\t\t22\n#define dtype_dec128\t23\n#define dtype_int128\t24\n#define dtype_sql_time_tz\t25\n#define dtype_timestamp_tz\t26\n#define dtype_ex_time_tz\t27\n#define dtype_ex_timestamp_tz\t28\n#define DTYPE_TYPE_MAX\t29\n\n#define ISC_TIME_SECONDS_PRECISION\t\t10000\n#define ISC_TIME_SECONDS_PRECISION_SCALE\t(-4)\n\n#endif /* FIREBIRD_IMPL_DSC_PUB_H */\n"}, "/build/src/common/classes/MetaString.h": {"id": "/build/src/common/classes/MetaString.h", "filePath": "src/common/classes/MetaString.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\tMetaString.h\n *\tDESCRIPTION:\tmetadata name holder\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alexander Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2005 Alexander Peshkov &lt;peshkoff@mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef METASTRING_H\n#define METASTRING_H\n\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/fb_pair.h&quot;\n#include &quot;../common/classes/objects_array.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../jrd/constants.h&quot;\n#include &lt;algorithm&gt;\n#include &lt;cctype&gt;\n\n#ifdef SFIO\n#include &lt;stdio.h&gt;\n#endif\n\nnamespace Firebird {\n\ntemplate &lt;typename T&gt;\nstring toQuotedString(const T&amp; name)\n{\n\tstring s;\n\n\tif (name.hasData())\n\t{\n\t\ts.reserve(name.length() + 2);\n\n\t\ts.append(&quot;\\&quot;&quot;);\n\n\t\tfor (const auto c : name)\n\t\t{\n\t\t\tif (c == &#x27;&quot;&#x27;)\n\t\t\t\ts.append(&quot;\\&quot;&quot;);\n\n\t\t\ts.append(&amp;c, 1);\n\t\t}\n\n\t\ts.append(&quot;\\&quot;&quot;);\n\t}\n\n\treturn s;\n}\n\nclass MetaString\n{\nprivate:\n\tchar data[MAX_SQL_IDENTIFIER_SIZE];\n\tunsigned int count;\n\n\tvoid init() noexcept\n\t{\n\t\tmemset(data, 0, MAX_SQL_IDENTIFIER_SIZE);\n\t}\n\tMetaString&amp; set(const MetaString&amp; m) noexcept\n\t{\n\t\tmemcpy(data, m.data, MAX_SQL_IDENTIFIER_SIZE);\n\t\tcount = m.count;\n\t\treturn *this;\n\t}\n\npublic:\n\tMetaString() noexcept { init(); count = 0; }\n\tMetaString(const char* s) noexcept { assign(s); }\n\tMetaString(const char* s, FB_SIZE_T l) noexcept { assign(s, l); }\n\tMetaString(const MetaString&amp; m) noexcept { set(m); }\n\tMetaString(const AbstractString&amp; s) noexcept { assign(s.c_str(), s.length()); }\n\texplicit MetaString(MemoryPool&amp;) noexcept { init(); count = 0; }\n\tMetaString(MemoryPool&amp;, const char* s) noexcept { assign(s); }\n\tMetaString(MemoryPool&amp;, const char* s, FB_SIZE_T l) noexcept { assign(s, l); }\n\tMetaString(MemoryPool&amp;, const MetaString&amp; m) noexcept { set(m); }\n\tMetaString(MemoryPool&amp;, const AbstractString&amp; s) noexcept { assign(s.c_str(), s.length()); }\n\npublic:\n\tstatic void parseList(const string&amp; str, ObjectsArray&lt;MetaString&gt;&amp; list)\n\t{\n\t\tauto pos = str.begin();\n\n\t\tconst auto skipSpaces = [&amp;pos, &amp;str]() noexcept\n\t\t{\n\t\t\twhile (pos != str.end() &amp;&amp; (*pos == &#x27; &#x27; || *pos == &#x27;\\t&#x27; || *pos == &#x27;\\f&#x27; || *pos == &#x27;\\r&#x27; || *pos == &#x27;\\n&#x27;))\n\t\t\t\t++pos;\n\n\t\t\treturn pos != str.end();\n\t\t};\n\n\t\tconst auto isQuoted = [](const string&amp; name) -&gt; bool\n\t\t{\n\t\t\treturn name.length() &gt;= 2 &amp;&amp; name[0] == &#x27;&quot;&#x27; &amp;&amp; name[name.length() - 1] == &#x27;&quot;&#x27;;\n\t\t};\n\n\t\tconst auto unquote = [&amp;](const string&amp; name) -&gt; string\n\t\t{\n\t\t\tif (!isQuoted(name))\n\t\t\t\treturn name;\n\n\t\t\tstring result;\n\n\t\t\tfor (FB_SIZE_T i = 1; i &lt; name.length() - 1; ++i)\n\t\t\t{\n\t\t\t\tif (name[i] == &#x27;&quot;&#x27;)\n\t\t\t\t{\n\t\t\t\t\tif (i + 1 &lt; name.length() - 1 &amp;&amp; name[i + 1] == &#x27;&quot;&#x27;)\n\t\t\t\t\t\t++i;\n\t\t\t\t\telse\n\t\t\t\t\t\t(Arg::Gds(isc_invalid_unqualified_name_list) &lt;&lt; str).raise();\n\t\t\t\t}\n\n\t\t\t\tresult += name[i];\n\t\t\t}\n\n\t\t\treturn result;\n\t\t};\n\n\t\tconst auto validateUnquotedIdentifier = [&amp;](const string&amp; name)\n\t\t{\n\t\t\tif (name.length() &gt; MAX_SQL_IDENTIFIER_LEN)\n\t\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\n\t\t\tbool first = true;\n\n\t\t\tfor (const auto c : name)\n\t\t\t{\n\t\t\t\tif (!((c &gt;= &#x27;A&#x27; &amp;&amp; c &lt;= &#x27;Z&#x27;) ||\n\t\t\t\t\t  (c &gt;= &#x27;a&#x27; &amp;&amp; c &lt;= &#x27;z&#x27;) ||\n\t\t\t\t\t  c == &#x27;{&#x27; ||\n\t\t\t\t\t  c == &#x27;}&#x27; ||\n\t\t\t\t\t  (!first &amp;&amp; c &gt;= &#x27;0&#x27; &amp;&amp; c &lt;= &#x27;9&#x27;) ||\n\t\t\t\t\t  (!first &amp;&amp; c == &#x27;$&#x27;) ||\n\t\t\t\t\t  (!first &amp;&amp; c == &#x27;_&#x27;)))\n\t\t\t\t{\n\t\t\t\t\t(Arg::Gds(isc_invalid_unqualified_name_list) &lt;&lt; str).raise();\n\t\t\t\t}\n\n\t\t\t\tfirst = false;\n\t\t\t}\n\n\t\t\treturn true;\n\t\t};\n\n\t\tlist.clear();\n\n\t\tif (!skipSpaces())\n\t\t\treturn;\n\n\t\tdo\n\t\t{\n\t\t\tconst auto nameStart = pos;\n\t\t\tauto nameEnd = pos;\n\t\t\tbool inQuotes = false;\n\n\t\t\twhile (pos != str.end())\n\t\t\t{\n\t\t\t\tif (*pos == &#x27;&quot;&#x27;)\n\t\t\t\t\tinQuotes = !inQuotes;\n\t\t\t\telse if (*pos == &#x27;,&#x27; &amp;&amp; !inQuotes)\n\t\t\t\t\tbreak;\n\n\t\t\t\tnameEnd = ++pos;\n\t\t\t\tskipSpaces();\n\t\t\t}\n\n\t\t\tstring name(nameStart, nameEnd);\n\n\t\t\tif (isQuoted(name))\n\t\t\t\tname = unquote(name);\n\t\t\telse\n\t\t\t{\n\t\t\t\tvalidateUnquotedIdentifier(name);\n\t\t\t\tstd::transform(name.begin(), name.end(), name.begin(), ::toupper);\n\t\t\t}\n\n\t\t\tif (name.isEmpty())\n\t\t\t\t(Arg::Gds(isc_invalid_unqualified_name_list) &lt;&lt; str).raise();\n\n\t\t\tlist.add(name);\n\n\t\t\tif (pos == str.end())\n\t\t\t\tbreak;\n\n\t\t\tif (*pos == &#x27;,&#x27;)\n\t\t\t{\n\t\t\t\t++pos;\n\t\t\t\tskipSpaces();\n\t\t\t}\n\t\t} while(true);\n\t}\n\npublic:\n\tMetaString&amp; assign(const char* s, FB_SIZE_T l) noexcept;\n\tMetaString&amp; assign(const char* s) noexcept { return assign(s, s ? fb_strlen(s) : 0); }\n\tMetaString&amp; clear() noexcept { return assign(nullptr, 0); }\n\tMetaString&amp; operator=(const char* s) noexcept { return assign(s); }\n\tMetaString&amp; operator=(const AbstractString&amp; s) noexcept { return assign(s.c_str(), s.length()); }\n\tMetaString&amp; operator=(const MetaString&amp; m) noexcept { return set(m); }\n\tchar* getBuffer(const FB_SIZE_T l) noexcept;\n\n\tFB_SIZE_T length() const noexcept { return count; }\n\tconst char* c_str() const noexcept { return data; }\n\tconst char* nullStr() const noexcept { return (count == 0 ? NULL : data); }\n\tbool isEmpty() const noexcept { return count == 0; }\n\tbool hasData() const noexcept { return count != 0; }\n\n\tchar&amp; operator[](unsigned n) noexcept { return data[n]; }\n\tchar operator[](unsigned n) const noexcept { return data[n]; }\n\n\tconst char* begin() const noexcept { return data; }\n\tconst char* end() const noexcept { return data + count; }\n\n\tint compare(const char* s, FB_SIZE_T l) const noexcept;\n\tint compare(const char* s) const noexcept { return compare(s, s ? fb_strlen(s) : 0); }\n\tint compare(const AbstractString&amp; s) const noexcept { return compare(s.c_str(), s.length()); }\n\tint compare(const MetaString&amp; m) const noexcept { return memcmp(data, m.data, MAX_SQL_IDENTIFIER_SIZE); }\n\n\tstring toQuotedString() const\n\t{\n\t\treturn Firebird::toQuotedString(*this);\n\t}\n\n\tbool operator==(const char* s) const noexcept { return compare(s) == 0; }\n\tbool operator!=(const char* s) const noexcept { return compare(s) != 0; }\n\tbool operator==(const AbstractString&amp; s) const noexcept { return compare(s) == 0; }\n\tbool operator!=(const AbstractString&amp; s) const noexcept { return compare(s) != 0; }\n\tbool operator==(const MetaString&amp; m) const noexcept { return compare(m) == 0; }\n\tbool operator!=(const MetaString&amp; m) const noexcept { return compare(m) != 0; }\n\tbool operator&lt;=(const MetaString&amp; m) const noexcept { return compare(m) &lt;= 0; }\n\tbool operator&gt;=(const MetaString&amp; m) const noexcept { return compare(m) &gt;= 0; }\n\tbool operator&lt; (const MetaString&amp; m) const noexcept { return compare(m) &lt;  0; }\n\tbool operator&gt; (const MetaString&amp; m) const noexcept { return compare(m) &gt;  0; }\n\n\tvoid printf(const char*, ...);\n\tFB_SIZE_T copyTo(char* to, FB_SIZE_T toSize) const;\n\nprotected:\n\tstatic void adjustLength(const char* const s, FB_SIZE_T&amp; l) noexcept;\n};\n\n} // namespace Firebird\n\n#endif // METASTRING_H\n"}, "/build/src/common/classes/fb_string.h": {"id": "/build/src/common/classes/fb_string.h", "filePath": "src/common/classes/fb_string.h", "content": "/*\n *\tPROGRAM:\tstring class definition\n *\tMODULE:\t\tfb_string.h\n *\tDESCRIPTION:\tProvides almost that same functionality,\n *\t\t\tthat STL::basic_string&lt;char&gt; does,\n *\t\t\tbut behaves MemoryPools friendly.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alexander Peshkoff\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Alexander Peshkoff &lt;peshkoff@mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef INCLUDE_FB_STRING_H\n#define INCLUDE_FB_STRING_H\n\n#include &quot;firebird.h&quot;\n\n#include &lt;stdio.h&gt;\n#include &lt;string.h&gt;\n#include &lt;stdarg.h&gt;\n#include &lt;utility&gt;\n\n#include &quot;fb_types.h&quot;\n#include &quot;fb_exception.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n\nnamespace Firebird\n{\n\tclass MetaString;\n\n\tclass AbstractString : private AutoStorage\n\t{\n\tpublic:\n\t\ttypedef char char_type;\n\t\ttypedef FB_SIZE_T size_type;\n\t\ttypedef FB_SSIZE_T difference_type;\n\t\ttypedef char* pointer;\n\t\ttypedef const char* const_pointer;\n\t\ttypedef char&amp; reference;\n\t\ttypedef const char&amp; const_reference;\n\t\ttypedef char value_type;\n\t\ttypedef pointer iterator;\n\t\ttypedef const_pointer const_iterator;\n\t\tstatic const size_type npos;\n\t\tenum {INLINE_BUFFER_SIZE = 32, INIT_RESERVE = 16/*, KEEP_SIZE = 512*/};\n\n\tprotected:\n\t\ttypedef ULONG internal_size_type; // 32 bits!\n\n\tprivate:\n\t\tconst internal_size_type max_length;\n\n\tprotected:\n\t\tchar_type inlineBuffer[INLINE_BUFFER_SIZE];\n\t\tchar_type* stringBuffer;\n\t\tinternal_size_type stringLength, bufferSize;\n\n\tprivate:\n\t\tvoid checkPos(size_type pos) const\n\t\t{\n\t\t\tif (pos &gt;= length()) {\n\t\t\t\tfatal_exception::raise(&quot;Firebird::string - pos out of range&quot;);\n\t\t\t}\n\t\t}\n\n\t\tvoid checkLength(size_type len)\n\t\t{\n\t\t\tif (len &gt; getMaxLength()) {\n\t\t\t\tfatal_exception::raise(&quot;Firebird::string - length exceeds predefined limit&quot;);\n\t\t\t}\n\t\t}\n\n\t\t// Reserve buffer to allow storing at least newLen characters there\n\t\t// (not including null terminator). Existing contents of our string are preserved.\n\t\tvoid reserveBuffer(const size_type newLen)\n\t\t{\n\t\t\tsize_type newSize = newLen + 1;\n\t\t\tfb_assert(newSize != 0); // This large argument would be a programming error for sure.\n\t\t\tif (newSize &gt; bufferSize)\n\t\t\t{\n\t\t\t\t// Make sure we do not exceed string length limit\n\t\t\t\tcheckLength(newLen);\n\n\t\t\t\t// Order of assignments below is important in case of low memory conditions\n\n\t\t\t\t// Grow buffer exponentially to prevent memory fragmentation\n\t\t\t\tif (newSize / 2 &lt; bufferSize)\n\t\t\t\t\tnewSize = size_type(bufferSize) * 2u;\n\n\t\t\t\t// Do not grow buffer beyond string length limit\n\t\t\t\tconst size_type max_length = getMaxLength() + 1;\n\t\t\t\tif (newSize &gt; max_length)\n\t\t\t\t\tnewSize = max_length;\n\n\t\t\t\t// Allocate new buffer\n\t\t\t\tchar_type *newBuffer = FB_NEW_POOL(getPool()) char_type[newSize];\n\n\t\t\t\t// Carefully copy string data including null terminator\n\t\t\t\tmemcpy(newBuffer, stringBuffer, sizeof(char_type) * (stringLength + 1u));\n\n\t\t\t\t// Deallocate old buffer if needed\n\t\t\t\tif (stringBuffer != inlineBuffer)\n\t\t\t\t\tdelete[] stringBuffer;\n\n\t\t\t\tstringBuffer = newBuffer;\n\t\t\t\tbufferSize = static_cast&lt;internal_size_type&gt;(newSize);\n\t\t\t}\n\t\t}\n\n\t\t// Make sure our buffer is large enough to store at least &lt;length&gt; characters in it\n\t\t// (not including null terminator). Resulting buffer is not initialized.\n\t\t// Use it in constructors only when stringBuffer is not assigned yet.\n\t\tvoid initialize(const size_type len)\n\t\t{\n\t\t\tif (len &lt; INLINE_BUFFER_SIZE)\n\t\t\t{\n\t\t\t\tstringBuffer = inlineBuffer;\n\t\t\t\tbufferSize = INLINE_BUFFER_SIZE;\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tstringBuffer = NULL; // Be safe in case of exception\n\t\t\t\tcheckLength(len);\n\n\t\t\t\t// Reserve a few extra bytes in the buffer\n\t\t\t\tsize_type newSize = len + 1 + INIT_RESERVE;\n\n\t\t\t\t// Do not grow buffer beyond string length limit\n\t\t\t\tconst size_type max_length = getMaxLength() + 1;\n\t\t\t\tif (newSize &gt; max_length)\n\t\t\t\t\tnewSize = max_length;\n\n\t\t\t\t// Allocate new buffer\n\t\t\t\tstringBuffer = FB_NEW_POOL(getPool()) char_type[newSize];\n\t\t\t\tbufferSize = static_cast&lt;internal_size_type&gt;(newSize);\n\t\t\t}\n\t\t\tstringLength = static_cast&lt;internal_size_type&gt;(len);\n\t\t\tstringBuffer[stringLength] = 0;\n\t\t}\n\n\t\tvoid shrinkBuffer() noexcept\n\t\t{\n\t\t\t// Shrink buffer if we decide it is beneficial\n\t\t}\n\n\tprotected:\n\t\tAbstractString(const size_type limit, const size_type sizeL, const void* datap);\n\t\tAbstractString(const size_type limit, const_pointer p1, const size_type n1,\n\t\t\t\t\t const_pointer p2, const size_type n2);\n\t\tAbstractString(const size_type limit, const AbstractString&amp; v);\n\n\t\ttem
