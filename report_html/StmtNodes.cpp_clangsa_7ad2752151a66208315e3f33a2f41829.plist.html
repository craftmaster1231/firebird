cordBuffer-&gt;getTempRecord();\n\n\t\trecord-&gt;reset(format);\n\t}\n\telse\n\t\trecord = VIO_record(tdbb, rpb, format, tdbb-&gt;getDefaultPool());\n\n\trpb-&gt;rpb_address = record-&gt;getData();\n\trpb-&gt;rpb_length = format-&gt;fmt_length;\n\trpb-&gt;rpb_format_number = format-&gt;fmt_version;\n\n\t// dimitr:\tfake an invalid record number so that it could be evaluated to NULL\n\t// \t\t\teven if the valid stream marker is present for OLD/NEW trigger contexts\n\trpb-&gt;rpb_number.setValue(BOF_NUMBER);\n\n\t// CVC: This small block added by Ann Harrison to\n\t// start with a clean empty buffer and so avoid getting\n\t// new record buffer with misleading information. Fixes\n\t// bug with incorrect blob sharing during insertion in\n\t// a stored procedure.\n\n\trecord-&gt;nullify();\n\n\treturn statement;\n}\n\n\n//--------------------\n\n\nRseNode* SelectNode::dsqlProcess(DsqlCompilerScratch* dsqlScratch)\n{\n\tconst auto statement = dsqlScratch-&gt;getDsqlStatement();\n\n\tconst auto node = FB_NEW_POOL(dsqlScratch-&gt;getPool()) SelectNode(dsqlScratch-&gt;getPool());\n\tnode-&gt;forUpdate = forUpdate;\n\tnode-&gt;optimizeForFirstRows = optimizeForFirstRows;\n\n\tconst DsqlContextStack::iterator base(*dsqlScratch-&gt;context);\n\tconst auto processedRse = PASS1_rse(dsqlScratch, selectExpr, this);\n\tdsqlScratch-&gt;context-&gt;clear(base);\n\n\tif (forUpdate &amp;&amp; !processedRse-&gt;dsqlDistinct)\n\t{\n\t\tstatement-&gt;setType(DsqlStatement::TYPE_SELECT_UPD);\n\t\tstatement-&gt;addFlags(DsqlStatement::FLAG_NO_BATCH);\n\t}\n\telse\n\t{\n\t\t// If there is a union without ALL or order by or a select distinct buffering is OK even if\n\t\t// stored procedure occurs in the select list. In these cases all of stored procedure is\n\t\t// executed under savepoint for open cursor.\n\n\t\tif (processedRse-&gt;dsqlOrder || processedRse-&gt;dsqlDistinct)\n\t\t\tstatement-&gt;setFlags(statement-&gt;getFlags() &amp; ~DsqlStatement::FLAG_NO_BATCH);\n\t}\n\n\treturn processedRse;\n}\n\nSelectNode* SelectNode::dsqlPass(DsqlCompilerScratch* dsqlScratch)\n{\n\tconst auto statement = dsqlScratch-&gt;getDsqlStatement();\n\n\tconst auto node = FB_NEW_POOL(dsqlScratch-&gt;getPool()) SelectNode(dsqlScratch-&gt;getPool());\n\tnode-&gt;optimizeForFirstRows = optimizeForFirstRows;\n\tnode-&gt;forUpdate = forUpdate;\n\tnode-&gt;withLock = withLock;\n\tnode-&gt;skipLocked = skipLocked;\n\tnode-&gt;rse = dsqlProcess(dsqlScratch);\n\n\t// Set up parameter for things in the select list.\n\tfor (auto item : node-&gt;rse-&gt;dsqlSelectList-&gt;items)\n\t{\n\t\tconst auto parameter = MAKE_parameter(statement-&gt;getReceiveMsg(), true, true, 0, item);\n\t\tparameter-&gt;par_node = item;\n\t\tDsqlDescMaker::fromNode(dsqlScratch, &amp;parameter-&gt;par_desc, item);\n\t}\n\n\treturn node;\n}\n\nstring SelectNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tStmtNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, selectExpr);\n\tNODE_PRINT(printer, optimizeForFirstRows);\n\tNODE_PRINT(printer, forUpdate);\n\tNODE_PRINT(printer, withLock);\n\tNODE_PRINT(printer, skipLocked);\n\tNODE_PRINT(printer, rse);\n\n\treturn &quot;SelectNode&quot;;\n}\n\n// Generate BLR for a SELECT statement.\nvoid SelectNode::genBlr(DsqlCompilerScratch* dsqlScratch)\n{\n\tconst auto statement = dsqlScratch-&gt;getDsqlStatement();\n\n\t// Generate definitions for the messages.\n\n\tGEN_port(dsqlScratch, statement-&gt;getReceiveMsg());\n\n\tauto message = statement-&gt;getSendMsg();\n\n\tif (message-&gt;msg_parameter)\n\t\tGEN_port(dsqlScratch, message);\n\telse\n\t\tstatement-&gt;setSendMsg(nullptr);\n\n\t// If there is a send message, build a RECEIVE.\n\n\tif ((message = statement-&gt;getSendMsg()))\n\t{\n\t\tdsqlScratch-&gt;appendUChar(blr_receive);\n\t\tdsqlScratch-&gt;appendUChar(message-&gt;msg_number);\n\t}\n\n\t// Generate FOR loop.\n\n\tmessage = statement-&gt;getReceiveMsg();\n\n\tdsqlScratch-&gt;appendUChar(blr_for);\n\tdsqlScratch-&gt;appendUChar(blr_stall);\n\tGEN_rse(dsqlScratch, rse);\n\n\tdsqlScratch-&gt;appendUChar(blr_send);\n\tdsqlScratch-&gt;appendUChar(message-&gt;msg_number);\n\n\tdsqlScratch-&gt;appendUChar(blr_begin);\n\n\t// Build body of FOR loop.\n\n\tfor (const auto parameter : message-&gt;msg_parameters)\n\t{\n\t\tif (parameter-&gt;par_node)\n\t\t{\n\t\t\tdsqlScratch-&gt;appendUChar(blr_assignment);\n\t\t\tGEN_expr(dsqlScratch, parameter-&gt;par_node);\n\t\t\tGEN_parameter(dsqlScratch, parameter);\n\t\t}\n\t}\n\n\tdsqlScratch-&gt;appendUChar(blr_end);\n}\n\n\n//--------------------\n\n\nstatic RegisterNode&lt;SelectMessageNode&gt; regSelectMessageNode({blr_select});\n\nDmlNode* SelectMessageNode::parse(thread_db* tdbb, MemoryPool&amp; pool, CompilerScratch* csb, const UCHAR /*blrOp*/)\n{\n\tconst auto node = FB_NEW_POOL(pool) SelectMessageNode(pool);\n\n\twhile (csb-&gt;csb_blr_reader.peekByte() != blr_end)\n\t{\n\t\tif (csb-&gt;csb_blr_reader.peekByte() != blr_receive)\n\t\t\tPAR_syntax_error(csb, &quot;blr_receive&quot;);\n\t\tnode-&gt;statements.add(PAR_parse_stmt(tdbb, csb));\n\t}\n\n\tcsb-&gt;csb_blr_reader.getByte();\t// skip blr_end\n\n\treturn node;\n}\n\nstring SelectMessageNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tStmtNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, statements);\n\n\treturn &quot;SelectMessageNode&quot;;\n}\n\nSelectMessageNode* SelectMessageNode::pass1(thread_db* tdbb, CompilerScratch* csb)\n{\n\tfor (auto statement : statements)\n\t\tdoPass1(tdbb, csb, statement.getAddress());\n\treturn this;\n}\n\nSelectMessageNode* SelectMessageNode::pass2(thread_db* tdbb, CompilerScratch* csb)\n{\n\tfor (auto statement : statements)\n\t\tdoPass2(tdbb, csb, statement.getAddress(), this);\n\treturn this;\n}\n\n// Execute a blr_select statement. This is more than a little obscure.\n// We first set up the SELECT statement as the &quot;message&quot; and stall on receive (waiting for user send).\n// EXE_send will then loop thru the sub-statements of select looking for the appropriate RECEIVE\n// statement. When (or if) it finds it, it will set it up the next statement to be executed.\n// The RECEIVE, then, will be entered with the operation &quot;req_proceed&quot;.\nconst StmtNode* SelectMessageNode::execute(thread_db* /*tdbb*/, Request* request, ExeState* /*exeState*/) const\n{\n\tswitch (request-&gt;req_operation)\n\t{\n\t\tcase Request::req_evaluate:\n\t\t\trequest-&gt;req_message = this;\n\t\t\trequest-&gt;req_operation = Request::req_receive;\n\t\t\trequest-&gt;req_flags |= req_stall;\n\t\t\treturn this;\n\n\t\tdefault:\n\t\t\treturn parentStmt;\n\t}\n}\n\n\n//--------------------\n\n\n// This is only for GPRE&#x27;s cmp_set_generator().\nstatic RegisterNode&lt;SetGeneratorNode&gt; regSetGeneratorNode({blr_set_generator});\n\nDmlNode* SetGeneratorNode::parse(thread_db* tdbb, MemoryPool&amp; pool, CompilerScratch* csb, const UCHAR /*blrOp*/)\n{\n\tQualifiedName name;\n\tcsb-&gt;csb_blr_reader.getMetaName(name.object);\n\tcsb-&gt;qualifyExistingName(tdbb, name, obj_generator);\n\n\tSetGeneratorNode* const node = FB_NEW_POOL(pool) SetGeneratorNode(pool, name);\n\n\tbool sysGen = false;\n\tif (!MET_load_generator(tdbb, node-&gt;generator, &amp;sysGen))\n\t\tPAR_error(csb, Arg::Gds(isc_gennotdef) &lt;&lt; name.toQuotedString());\n\n\tif (sysGen)\n\t\tPAR_error(csb, Arg::Gds(isc_cant_modify_sysobj) &lt;&lt; &quot;generator&quot; &lt;&lt; name.toQuotedString());\n\n\tnode-&gt;value = PAR_parse_value(tdbb, csb);\n\n\treturn node;\n}\n\nstring SetGeneratorNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tStmtNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, generator);\n\tNODE_PRINT(printer, value);\n\n\treturn &quot;SetGeneratorNode&quot;;\n}\n\nSetGeneratorNode* SetGeneratorNode::pass1(thread_db* tdbb, CompilerScratch* csb)\n{\n\tdoPass1(tdbb, csb, value.getAddress());\n\n\tCMP_post_access(tdbb, csb, generator.secName.schema, 0, SCL_usage, obj_schemas,\n\t\tQualifiedName(generator.name.schema));\n\n\tCMP_post_access(tdbb, csb, generator.secName.object, 0, SCL_usage, obj_generators, generator.name);\n\n\treturn this;\n}\n\nSetGeneratorNode* SetGeneratorNode::pass2(thread_db* tdbb, CompilerScratch* csb)\n{\n\tExprNode::doPass2(tdbb, csb, value.getAddress());\n\treturn this;\n}\n\nconst StmtNode* SetGeneratorNode::execute(thread_db* tdbb, Request* request, ExeState* /*exeState*/) const\n{\n\tif (request-&gt;req_operation == Request::req_evaluate)\n\t{\n\t\tjrd_tra* const transaction = request-&gt;req_transaction;\n\n\t\tDdlNode::executeDdlTrigger(tdbb, transaction, DdlNode::DTW_BEFORE,\n\t\t\tDDL_TRIGGER_ALTER_SEQUENCE, generator.name, {}, *request-&gt;getStatement()-&gt;sqlText);\n\n\t\tdsc* const desc = EVL_expr(tdbb, request, value);\n\t\tDPM_gen_id(tdbb, generator.id, true, MOV_get_int64(tdbb, desc, 0));\n\n\t\tDdlNode::executeDdlTrigger(tdbb, transaction, DdlNode::DTW_AFTER,\n\t\t\tDDL_TRIGGER_ALTER_SEQUENCE, generator.name, {}, *request-&gt;getStatement()-&gt;sqlText);\n\n\t\trequest-&gt;req_operation = Request::req_return;\n\t}\n\n\treturn parentStmt;\n}\n\n\n//--------------------\n\n\nstatic RegisterNode&lt;StallNode&gt; regStallNode({blr_stall});\n\nDmlNode* StallNode::parse(thread_db* /*tdbb*/, MemoryPool&amp; pool, CompilerScratch* /*csb*/, const UCHAR /*blrOp*/)\n{\n\tStallNode* node = FB_NEW_POOL(pool) StallNode(pool);\n\treturn node;\n}\n\nStallNode* StallNode::dsqlPass(DsqlCompilerScratch* /*dsqlScratch*/)\n{\n\treturn this;\n}\n\nstring StallNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tStmtNode::internalPrint(printer);\n\treturn &quot;StallNode&quot;;\n}\n\nvoid StallNode::genBlr(DsqlCompilerScratch* /*dsqlScratch*/)\n{\n}\n\nStallNode* StallNode::pass1(thread_db* /*tdbb*/, CompilerScratch* /*csb*/)\n{\n\treturn this;\n}\n\nStallNode* StallNode::pass2(thread_db* /*tdbb*/, CompilerScratch* /*csb*/)\n{\n\treturn this;\n}\n\n// Execute a stall statement. This is like a blr_receive, except that there is no need for a\n// gds__send () from the user (i.e. EXE_send () in the engine).\n// A gds__receive () will unblock the user.\nconst StmtNode* StallNode::execute(thread_db* /*tdbb*/, Request* request, ExeState* /*exeState*/) const\n{\n\tswitch (request-&gt;req_operation)\n\t{\n\t\tcase Request::req_evaluate:\n\t\tcase Request::req_return:\n\t\t\trequest-&gt;req_message = this;\n\t\t\trequest-&gt;req_operation = Request::req_return;\n\t\t\trequest-&gt;req_flags |= req_stall; // Signal looper to return\n\t\t\treturn this;\n\n\t\tcase Request::req_proceed:\n\t\t\trequest-&gt;req_operation = Request::req_return;\n\t\t\treturn parentStmt;\n\n\t\tdefault:\n\t\t\treturn parentStmt;\n\t}\n}\n\n\n//--------------------\n\n\nstatic RegisterNode&lt;SuspendNode&gt; regSuspendNode({blr_send});\n\nDmlNode* SuspendNode::parse(thread_db* tdbb, MemoryPool&amp; pool, CompilerScratch* csb, const UCHAR /*blrOp*/)\n{\n\tSuspendNode* node = FB_NEW_POOL(pool) SuspendNode(pool);\n\n\tUSHORT n = csb-&gt;csb_blr_reader.getByte();\n\tnode-&gt;message = csb-&gt;csb_rpt[n].csb_message;\n\tnode-&gt;statement = PAR_parse_stmt(tdbb, csb);\n\n\treturn node;\n}\n\nSuspendNode* SuspendNode::dsqlPass(DsqlCompilerScratch* dsqlScratch)\n{\n\tDsqlStatement* const statement = dsqlScratch-&gt;getDsqlStatement();\n\n\tif (dsqlScratch-&gt;flags &amp; (DsqlCompilerScratch::FLAG_TRIGGER | DsqlCompilerScratch::FLAG_FUNCTION))\n\t{\n\t\tERRD_post(Arg::Gds(isc_sqlerr) &lt;&lt; Arg::Num(-104) &lt;&lt;\n\t\t\t\t  // Token unknown\n\t\t\t\t  Arg::Gds(isc_token_err) &lt;&lt;\n\t\t\t\t  Arg::Gds(isc_random) &lt;&lt; Arg::Str(&quot;SUSPEND&quot;));\n\t}\n\n\tif (dsqlScratch-&gt;outputVariables.isEmpty())\n\t{\n\t\tERRD_post(Arg::Gds(isc_sqlerr) &lt;&lt; Arg::Num(-104) &lt;&lt;\n\t\t\t\t  Arg::Gds(isc_suspend_without_returns));\n\t}\n\n\tif (dsqlScratch-&gt;flags &amp; DsqlCompilerScratch::FLAG_IN_AUTO_TRANS_BLOCK)\t// autonomous transaction\n\t{\n\t\tERRD_post(Arg::Gds(isc_sqlerr) &lt;&lt; Arg::Num(-901) &lt;&lt;\n\t\t\t\t  Arg::Gds(isc_dsql_unsupported_in_auto_trans) &lt;&lt; Arg::Str(&quot;SUSPEND&quot;));\n\t}\n\n\tstatement-&gt;addFlags(DsqlStatement::FLAG_SELECTABLE);\n\n\treturn this;\n}\n\nstring SuspendNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tStmtNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, message);\n\tNODE_PRINT(printer, statement);\n\n\treturn &quot;SuspendNode&quot;;\n}\n\nvoid SuspendNode::genBlr(DsqlCompilerScratch* dsqlScratch)\n{\n\tdsqlScratch-&gt;genReturn();\n}\n\nSuspendNode* SuspendNode::pass1(thread_db* tdbb, CompilerScratch* csb)\n{\n\tdoPass1(tdbb, csb, statement.getAddress());\n\treturn this;\n}\n\nSuspendNode* SuspendNode::pass2(thread_db* tdbb, CompilerScratch* csb)\n{\n\tdoPass2(tdbb, csb, statement.getAddress(), this);\n\treturn this;\n}\n\n// Execute a SEND statement.\nconst StmtNode* SuspendNode::execute(thread_db* tdbb, Request* request, ExeState* /*exeState*/) const\n{\n\tswitch (request-&gt;req_operation)\n\t{\n\t\tcase Request::req_evaluate:\n\t\t\t// Signal EXE_receive that we are ready to assign data\n\t\t\trequest-&gt;req_operation = Request::req_send;\n\t\t\trequest-&gt;req_message = message;\n\t\t\trequest-&gt;req_flags |= req_stall; // Signal looper to return\n\t\t\treturn this;\n\n\t\tcase Request::req_proceed:\n\t\t{\n\t\t\t// EXE_receive prepared everything and ask us to proceed assignments\n\t\t\trequest-&gt;req_operation = Request::req_evaluate;\n\n\t\t\t// ASF: If this is the send in the tail of a procedure and the procedure was called\n\t\t\t// with a SELECT, don&#x27;t run all the send statements. It may make validations fail when\n\t\t\t// the procedure didn&#x27;t return any rows. See CORE-2204.\n\t\t\t// But we should run the last assignment, as it&#x27;s the one who make the procedure stop.\n\n\t\t\t// req_proc_fetch is used by both SP and EB but EB doesn&#x27;t generate EOS parameter\n\t\t\tif (!(request-&gt;req_flags &amp; req_proc_select))\n\t\t\t\treturn statement;\n\n\t\t\tconst CompoundStmtNode* list = nodeAs&lt;CompoundStmtNode&gt;(parentStmt);\n\n\t\t\tif (list &amp;&amp; !list-&gt;parentStmt &amp;&amp; list-&gt;statements[list-&gt;statements.getCount() - 1] == this)\n\t\t\t{\n\t\t\t\tlist = nodeAs&lt;CompoundStmtNode&gt;(statement);\n\n\t\t\t\tif (list &amp;&amp; list-&gt;onlyAssignments &amp;&amp; list-&gt;statements.getCount() &gt; 1)\n\t\t\t\t{\n\t\t\t\t\t// This should be the assignment that sets the old-fashioned EOS parameter.\n\t\t\t\t\tconst AssignmentNode* assign = static_cast&lt;const AssignmentNode*&gt;(\n\t\t\t\t\t\tlist-&gt;statements[list-&gt;statements.getCount() - 1].getObject());\n\t\t\t\t\tEXE_assignment(tdbb, assign);\n\n\t\t\t\t\t// Perform normal return but without stopping of looper because request in this case is expected to finish\n\t\t\t\t\t// execution till the end.\n\t\t\t\t\trequest-&gt;req_operation = Request::req_return;\n\t\t\t\t\trequest-&gt;req_message = message; // Just in case if it has been changed in-between\n\t\t\t\t\treturn parentStmt;\n\t\t\t\t}\n\t\t\t}\n\t\t\treturn statement;\n\t\t}\n\n\t\tcase Request::req_return:\n\t\t\t// Inner nodes finished and there is nothing to do anymore so we can return as well\n\t\t\trequest-&gt;req_message = message; // Just in case if it has been changed in-between\n\t\t\trequest-&gt;req_flags |= req_stall; // but still looper must stop processing nodes because who knows what code is after SUSPEND...\n\t\t\treturn parentStmt;\n\n\t\tdefault:\n\t\t\treturn parentStmt;\n\t}\n}\n\n\n//--------------------\n\n\nReturnNode* ReturnNode::dsqlPass(DsqlCompilerScratch* dsqlScratch)\n{\n\tif (!(dsqlScratch-&gt;flags &amp; DsqlCompilerScratch::FLAG_FUNCTION))\n\t{\n\t\tERRD_post(Arg::Gds(isc_sqlerr) &lt;&lt; Arg::Num(-104) &lt;&lt;\n\t\t\t\t  // Token unknown\n\t\t\t\t  Arg::Gds(isc_token_err) &lt;&lt;\n\t\t\t\t  Arg::Gds(isc_random) &lt;&lt; Arg::Str(&quot;RETURN&quot;));\n\t}\n\n\tif (dsqlScratch-&gt;flags &amp; DsqlCompilerScratch::FLAG_IN_AUTO_TRANS_BLOCK)\t// autonomous transaction\n\t{\n\t\tERRD_post(Arg::Gds(isc_sqlerr) &lt;&lt; Arg::Num(-901) &lt;&lt;\n\t\t\t\t  Arg::Gds(isc_dsql_unsupported_in_auto_trans) &lt;&lt; Arg::Str(&quot;RETURN&quot;));\n\t}\n\n\tReturnNode* node = FB_NEW_POOL(dsqlScratch-&gt;getPool()) ReturnNode(dsqlScratch-&gt;getPool());\n\tnode-&gt;value = doDsqlPass(dsqlScratch, value);\n\n\treturn node;\n}\n\nstring ReturnNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tDsqlOnlyStmtNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, value);\n\n\treturn &quot;ReturnNode&quot;;\n}\n\nvoid ReturnNode::genBlr(DsqlCompilerScratch* dsqlScratch)\n{\n\tdsqlScratch-&gt;appendUChar(blr_begin);\n\n\tif (hasLineColumn)\n\t\tdsqlScratch-&gt;putDebugSrcInfo(line, column);\n\n\tdsqlScratch-&gt;appendUChar(blr_assignment);\n\tGEN_expr(dsqlScratch, value);\n\tdsqlScratch-&gt;appendUChar(blr_variable);\n\tdsqlScratch-&gt;appendUShort(0);\n\tdsqlScratch-&gt;genReturn();\n\tdsqlScratch-&gt;appendUChar(blr_leave);\n\tdsqlScratch-&gt;appendUChar(0);\n\tdsqlScratch-&gt;appendUChar(blr_end);\n}\n\n\n//--------------------\n\n\nstatic RegisterNode&lt;SavepointEncloseNode&gt; regSavePointNode({blr_start_savepoint});\n\nDmlNode* SavepointEncloseNode::parse(thread_db* tdbb, MemoryPool&amp; pool, CompilerScratch* csb, const UCHAR /*blrOp*/)\n{\n\tconst auto statement = PAR_parse_stmt(tdbb, csb);\n\n\tconst auto node = FB_NEW_POOL(pool) SavepointEncloseNode(pool, statement);\n\n\t// skip blr_end_savepoint\n\tconst auto blrOp = csb-&gt;csb_blr_reader.getByte();\n\tfb_assert(blrOp == blr_end_savepoint);\n\n\treturn node;\n}\n\nStmtNode* SavepointEncloseNode::make(MemoryPool&amp; pool, DsqlCompilerScratch* dsqlScratch, StmtNode* node, bool force)\n{\n\t// Add savepoint wrapper around the statement having error handlers, or if requested explicitly\n\n\tif (dsqlScratch-&gt;errorHandlers || force)\n\t{\n\t\t// Ensure that savepoints are never created around a DSQL statement\n\t\tfb_assert(dsqlScratch-&gt;flags &amp; DsqlCompilerScratch::FLAG_BLOCK);\n\t\treturn FB_NEW_POOL(pool) SavepointEncloseNode(pool, node);\n\t}\n\n\treturn node;\n}\n\nSavepointEncloseNode* SavepointEncloseNode::dsqlPass(DsqlCompilerScratch* dsqlScratch)\n{\n\tconst auto node = FB_NEW_POOL(dsqlScratch-&gt;getPool()) SavepointEncloseNode(dsqlScratch-&gt;getPool(), statement);\n\tnode-&gt;statement = statement-&gt;dsqlPass(dsqlScratch);\n\treturn node;\n}\n\nstring SavepointEncloseNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tStmtNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, statement);\n\n\treturn &quot;SavepointEncloseNode&quot;;\n}\n\nvoid SavepointEncloseNode::genBlr(DsqlCompilerScratch* dsqlScratch)\n{\n\tdsqlScratch-&gt;appendUChar(blr_begin);\n\tdsqlScratch-&gt;appendUChar(blr_start_savepoint);\n\tstatement-&gt;genBlr(dsqlScratch);\n\tdsqlScratch-&gt;appendUChar(blr_end_savepoint);\n\tdsqlScratch-&gt;appendUChar(blr_end);\n}\n\nSavepointEncloseNode* SavepointEncloseNode::pass1(thread_db* tdbb, CompilerScratch* csb)\n{\n\tdoPass1(tdbb, csb, statement.getAddress());\n\treturn this;\n}\n\nSavepointEncloseNode* SavepointEncloseNode::pass2(thread_db* tdbb, CompilerScratch* csb)\n{\n\tdoPass2(tdbb, csb, statement.getAddress(), this);\n\timpureOffset = csb-&gt;allocImpure&lt;SavNumber&gt;();\n\treturn this;\n}\n\nconst StmtNode* SavepointEncloseNode::execute(thread_db* tdbb, Request* request, ExeState* /*exeState*/) const\n{\n\tconst auto transaction = request-&gt;req_transaction;\n\n\tif (request-&gt;req_operation == Request::req_evaluate)\n\t{\n\t\tif (!(transaction-&gt;tra_flags &amp; TRA_system))\n\t\t{\n\t\t\tconst auto savepoint = transaction-&gt;startSavepoint();\n\t\t\t*request-&gt;getImpure&lt;SavNumber&gt;(impureOffset) = savepoint-&gt;getNumber();\n\t\t}\n\n\t\treturn statement;\n\t}\n\n\tif (request-&gt;req_operation == Request::req_return)\n\t{\n\t\tif (!(transaction-&gt;tra_flags &amp; TRA_system))\n\t\t{\n\t\t\tconst auto savNumber = *request-&gt;getImpure&lt;SavNumber&gt;(impureOffset);\n\n\t\t\twhile (transaction-&gt;tra_save_point &amp;&amp;\n\t\t\t\ttransaction-&gt;tra_save_point-&gt;getNumber() &gt;= savNumber)\n\t\t\t{\n\t\t\t\tfb_assert(!transaction-&gt;tra_save_point-&gt;isChanging());\n\t\t\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\t\t\t}\n\t\t}\n\t}\n\n\treturn parentStmt;\n}\n\n\n//--------------------\n\n\nSetTransactionNode* SetTransactionNode::dsqlPass(DsqlCompilerScratch* dsqlScratch)\n{\n\tdsqlScratch-&gt;getDsqlStatement()-&gt;setType(DsqlStatement::TYPE_START_TRANS);\n\n\t// Generate tpb for set transaction. Use blr string of dsqlScratch.\n\t// If a value is not specified, default is not stuffed, let the engine handle it.\n\n\tfb_assert(dsqlScratch-&gt;getBlrData().getCount() == 0);\n\n\t// Find out isolation level - if specified. This is required for\n\t// specifying the correct lock level in reserving clause.\n\tconst USHORT lockLevel = isoLevel == ISO_LEVEL_CONSISTENCY ? isc_tpb_protected : isc_tpb_shared;\n\n\t// Stuff some version info.\n\tdsqlScratch-&gt;appendUChar(isc_tpb_version1);\n\n\tif (readOnly.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(readOnly.asBool() ? isc_tpb_read : isc_tpb_write);\n\n\tif (wait.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(wait.asBool() ? isc_tpb_wait : isc_tpb_nowait);\n\n\tif (isoLevel.has_value())\n\t{\n\t\tif (isoLevel == ISO_LEVEL_CONCURRENCY)\n\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_concurrency);\n\t\telse if (isoLevel == ISO_LEVEL_CONSISTENCY)\n\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_consistency);\n\t\telse\n\t\t{\n\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_read_committed);\n\n\t\t\tif (isoLevel == ISO_LEVEL_READ_COMMITTED_READ_CONSISTENCY)\n\t\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_read_consistency);\n\t\t\telse if (isoLevel == ISO_LEVEL_READ_COMMITTED_REC_VERSION)\n\t\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_rec_version);\n\t\t\telse\n\t\t\t{\n\t\t\t\tfb_assert(isoLevel == ISO_LEVEL_READ_COMMITTED_NO_REC_VERSION);\n\t\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_no_rec_version);\n\t\t\t}\n\t\t}\n\t}\n\n\tif (noAutoUndo.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_no_auto_undo);\n\n\tif (ignoreLimbo.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_ignore_limbo);\n\n\tif (restartRequests.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_restart_requests);\n\n\tif (autoCommit.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_autocommit);\n\n\tif (autoReleaseTempBlobID.isAssigned())\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_auto_release_temp_blobid);\n\n\tif (lockTimeout.has_value())\n\t{\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_lock_timeout);\n\t\tdsqlScratch-&gt;appendUChar(2);\n\t\tdsqlScratch-&gt;appendUShort(lockTimeout.value());\n\t}\n\n\tfor (RestrictionOption** i = reserveList.begin(); i != reserveList.end(); ++i)\n\t\tgenTableLock(dsqlScratch, **i, lockLevel);\n\n\tif (atSnapshotNumber.has_value())\n\t{\n\t\tdsqlScratch-&gt;appendUChar(isc_tpb_at_snapshot_number);\n\t\tstatic_assert(sizeof(CommitNumber) == sizeof(FB_UINT64), &quot;sizeof(CommitNumber) == sizeof(FB_UINT64)&quot;);\n\t\tdsqlScratch-&gt;appendUChar(sizeof(CommitNumber));\n\t\tdsqlScratch-&gt;appendUInt64(atSnapshotNumber.value());\n\t}\n\n\tif (dsqlScratch-&gt;getBlrData().getCount() &gt; 1)\t// 1 -&gt; isc_tpb_version1\n\t\ttpb.add(dsqlScratch-&gt;getBlrData().begin(), dsqlScratch-&gt;getBlrData().getCount());\n\n\treturn this;\n}\n\nvoid SetTransactionNode::execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** transaction) const\n{\n\tJRD_start_transaction(tdbb, &amp;request-&gt;req_transaction, request-&gt;req_dbb-&gt;dbb_attachment,\n\t\ttpb.getCount(), tpb.begin());\n\t*transaction = request-&gt;req_transaction;\n}\n\n// Generate tpb for table lock.\n// If lock level is specified, it overrrides the transaction lock level.\nvoid SetTransactionNode::genTableLock(DsqlCompilerScratch* dsqlScratch,\n\tconst RestrictionOption&amp; tblLock, USHORT lockLevel)\n{\n\tconst auto tdbb = JRD_get_thread_data();\n\tconst auto attachment = dsqlScratch-&gt;getAttachment()-&gt;dbb_attachment;\n\n\tif (tblLock.tables-&gt;isEmpty())\n\t\treturn;\n\n\tif (tblLock.lockMode &amp; LOCK_MODE_PROTECTED)\n\t\tlockLevel = isc_tpb_protected;\n\telse if (tblLock.lockMode &amp; LOCK_MODE_SHARED)\n\t\tlockLevel = isc_tpb_shared;\n\n\tconst USHORT lockMode = (tblLock.lockMode &amp; LOCK_MODE_WRITE) ?\n\t\tisc_tpb_lock_write : isc_tpb_lock_read;\n\n\tfor (auto&amp; tableName : *tblLock.tables)\n\t{\n\t\tdsqlScratch-&gt;appendUChar(lockMode);\n\t\tdsqlScratch-&gt;appendNullString(attachment-&gt;nameToUserCharSet(tdbb, tableName.object).c_str());\n\n\t\tdsqlScratch-&gt;qualifyExistingName(tableName, obj_relation);\n\n\t\tif (tableName.schema.hasData())\n\t\t{\n\t\t\tdsqlScratch-&gt;appendUChar(isc_tpb_lock_table_schema);\n\t\t\tdsqlScratch-&gt;appendNullString(attachment-&gt;nameToUserCharSet(tdbb, tableName.schema).c_str());\n\t\t}\n\n\t\tdsqlScratch-&gt;appendUChar(lockLevel);\n\t}\n}\n\n\n//--------------------\n\n\nvoid SessionResetNode::execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** traHandle) const\n{\n\tSET_TDBB(tdbb);\n\tAttachment* const attachment = tdbb-&gt;getAttachment();\n\tattachment-&gt;resetSession(tdbb, traHandle);\n}\n\n\n//--------------------\n\n\nvoid SetRoleNode::execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** /*traHandle*/) const\n{\n\tSET_TDBB(tdbb);\n\tAttachment* const attachment = tdbb-&gt;getAttachment();\n\tUserId* user = attachment-&gt;att_user;\n\tfb_assert(user);\n\n\tif (trusted)\n\t\tuser-&gt;setRoleTrusted();\n\telse\n\t{\n\t\tif (!SCL_role_granted(tdbb, *user, roleName.c_str()))\n\t\t\t(Arg::Gds(isc_set_invalid_role) &lt;&lt; roleName).raise();\n\n\t\tuser-&gt;setSqlRole(roleName.c_str());\n\t}\n\n\tSCL_release_all(attachment-&gt;att_security_classes);\n}\n\n\n//--------------------\n\n\nSetDebugOptionNode::SetDebugOptionNode(MemoryPool&amp; pool, MetaName* aName, ExprNode* aValue)\n\t: SessionManagementNode(pool),\n\t  name(pool, *aName),\n\t  value(aValue)\n{\n}\n\nvoid SetDebugOptionNode::execute(thread_db* tdbb, DsqlRequest* /*request*/, jrd_tra** /*traHandle*/) const\n{\n\tSET_TDBB(tdbb);\n\tauto&amp; debugOptions = tdbb-&gt;getAttachment()-&gt;getDebugOptions();\n\n\tconst auto literal = nodeAs&lt;LiteralNode&gt;(value);\n\n\tif (!literal)\n\t{\n\t\t// This currently can happen with negative numbers.\n\t\t// Since it&#x27;s not relevant for DSQL_KEEP_BLR, let&#x27;s throw an error.\n\t\tERR_post(Arg::Gds(isc_random) &lt;&lt; &quot;Invalid DEBUG option value&quot;);\n\t}\n\n\tconst auto litDesc = &amp;literal-&gt;litDesc;\n\n\tif (name == &quot;DSQL_KEEP_BLR&quot;)\n\t\tdebugOptions.setDsqlKeepBlr(MOV_get_boolean(litDesc));\n\telse\n\t\tERR_post(Arg::Gds(isc_random) &lt;&lt; &quot;Invalid DEBUG option&quot;);\n}\n\n\n//--------------------\n\n\nSetDecFloatRoundNode::SetDecFloatRoundNode(MemoryPool&amp; pool, MetaName* name)\n\t: SessionManagementNode(pool)\n{\n\tfb_assert(name);\n\tconst DecFloatConstant* mode = DecFloatConstant::getByText(name-&gt;c_str(), FB_DEC_RoundModes, FB_DEC_RMODE_OFFSET);\n\tif (!mode)\n\t\t(Arg::Gds(isc_invalid_decfloat_round) &lt;&lt; *name).raise();\n\trndMode = mode-&gt;val;\n}\n\nvoid SetDecFloatRoundNode::execute(thread_db* tdbb, DsqlRequest* /*request*/, jrd_tra** /*traHandle*/) const\n{\n\tSET_TDBB(tdbb);\n\tAttachment* const attachment = tdbb-&gt;getAttachment();\n\tattachment-&gt;att_dec_status.roundingMode = rndMode;\n}\n\n\n//--------------------\n\n\nvoid SetDecFloatTrapsNode::trap(MetaName* name)\n{\n\tfb_assert(name);\n\tconst DecFloatConstant* trap = DecFloatConstant::getByText(name-&gt;c_str(), FB_DEC_IeeeTraps, FB_DEC_TRAPS_OFFSET);\n\tif (!trap)\n\t\t(Arg::Gds(isc_invalid_decfloat_trap) &lt;&lt; *name).raise();\n\ttraps |= trap-&gt;val;\n}\n\nvoid SetDecFloatTrapsNode::execute(thread_db* tdbb, DsqlRequest* /*request*/, jrd_tra** /*traHandle*/) const\n{\n\tSET_TDBB(tdbb);\n\tAttachment* const attachment = tdbb-&gt;getAttachment();\n\tattachment-&gt;att_dec_status.decExtFlag = traps;\n}\n\n\n//--------------------\n\n\nSessionManagementNode* SetBindNode::dsqlPass(DsqlCompilerScratch* dsqlScratch)\n{\n\tstatic constexpr USHORT NON_FIELD_MASK = FLD_legacy | FLD_native;\n\n\tfrom-&gt;resolve(dsqlScratch);\n\tif (!(to-&gt;flags &amp; NON_FIELD_MASK))\n\t\tto-&gt;resolve(dsqlScratch);\n\n\treturn SessionManagementNode::dsqlPass(dsqlScratch);\n}\n\n\nvoid SetBindNode::execute(thread_db* tdbb, DsqlRequest* /*request*/, jrd_tra** /*traHandle*/) const\n{\n\tSET_TDBB(tdbb);\n\n\tfb_assert(from);\n\tfb_assert(to);\n\n\tAttachment* const attachment = tdbb-&gt;getAttachment();\n\tCoercionArray* coercions = attachment-&gt;att_dest_bind;\n\tcoercions-&gt;setRule(from, to);\n}\n\n\n//--------------------\n\n\nSetSessionNode::SetSessionNode(MemoryPool&amp; pool, Type aType, ULONG aVal, UCHAR blr_timepart)\n\t: SessionManagementNode(pool),\n\t  m_type(aType),\n\t  m_value(0)\n{\n\t// TYPE_IDLE_TIMEOUT should be set in seconds\n\t// TYPE_STMT_TIMEOUT should be set in milliseconds\n\n\tULONG mult = 1;\n\n\tswitch (blr_timepart)\n\t{\n\tcase blr_extract_hour:\n\t\tmult = (aType == TYPE_IDLE_TIMEOUT) ? 3600 : 3600000;\n\t\tbreak;\n\n\tcase blr_extract_minute:\n\t\tmult = (aType == TYPE_IDLE_TIMEOUT) ? 60 : 60000;\n\t\tbreak;\n\n\tcase blr_extract_second:\n\t\tmult = (aType == TYPE_IDLE_TIMEOUT) ? 1 : 1000;\n\t\tbreak;\n\n\tcase blr_extract_millisecond:\n\t\tif (aType == TYPE_IDLE_TIMEOUT)\n\t\t\tArg::Gds(isc_invalid_extractpart_time).raise();\n\t\tmult = 1;\n\t\tbreak;\n\n\tdefault:\n\t\tArg::Gds(isc_invalid_extractpart_time).raise();\n\t\tbreak;\n\t}\n\n\tm_value = aVal * mult;\n}\n\nstring SetSessionNode::internalPrint(NodePrinter&amp; printer) const\n{\n\tNode::internalPrint(printer);\n\n\tNODE_PRINT(printer, m_type);\n\tNODE_PRINT(printer, m_value);\n\n\treturn &quot;SetSessionNode&quot;;\n}\n\nvoid SetSessionNode::execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** /*traHandle*/) const\n{\n\tAttachment* att = tdbb-&gt;getAttachment();\n\n\tswitch (m_type)\n\t{\n\tcase TYPE_IDLE_TIMEOUT:\n\t\tatt-&gt;setIdleTimeout(m_value);\n\t\tbreak;\n\n\tcase TY nt. It is called when\n// either &quot;insert&quot; or &quot;update&quot; statements are parsed. If the statements have input parameters, then\n// the parameter is assigned the name of the field it is being inserted (or updated). The same goes\n// to the name of a relation.\n// The names are assigned to the parameter only if the field is of array data type.\nstatic void dsqlSetParameterName(DsqlCompilerScratch* dsqlScratch, ExprNode* exprNode, const ValueExprNode* fld_node,\n\tconst dsql_rel* relation)\n{\n\tDEV_BLKCHK(fld_node, dsql_type_nod);\n\tDEV_BLKCHK(relation, dsql_type_dsql_rel);\n\n\tif (!exprNode)\n\t\treturn;\n\n\tconst FieldNode* fieldNode = nodeAs&lt;FieldNode&gt;(fld_node);\n\tfb_assert(fieldNode);\t// Could it be something else ???\n\n\tif (fieldNode-&gt;getDsqlDesc().dsc_dtype != dtype_array)\n\t\treturn;\n\n\tswitch (exprNode-&gt;getType())\n\t{\n\t\tcase ExprNode::TYPE_ARITHMETIC:\n\t\tcase ExprNode::TYPE_CONCATENATE:\n\t\tcase ExprNode::TYPE_EXTRACT:\n\t\tcase ExprNode::TYPE_NEGATE:\n\t\tcase ExprNode::TYPE_STR_CASE:\n\t\tcase ExprNode::TYPE_STR_LEN:\n\t\tcase ExprNode::TYPE_SUBSTRING:\n\t\tcase ExprNode::TYPE_SUBSTRING_SIMILAR:\n\t\tcase ExprNode::TYPE_TRIM:\n\t\t{\n\t\t\tNodeRefsHolder holder(dsqlScratch-&gt;getPool());\n\t\t\texprNode-&gt;getChildren(holder, true);\n\n\t\t\tfor (auto ref : holder.refs)\n\t\t\t\tdsqlSetParameterName(dsqlScratch, *ref, fld_node, relation);\n\n\t\t\tbreak;\n\t\t}\n\n\t\tcase ExprNode::TYPE_PARAMETER:\n\t\t{\n\t\t\tParameterNode* paramNode = nodeAs&lt;ParameterNode&gt;(exprNode);\n\t\t\tdsql_par* parameter = paramNode-&gt;dsqlParameter;\n\t\t\tparameter-&gt;par_name = fieldNode-&gt;dsqlField-&gt;fld_name;\n\t\t\tparameter-&gt;par_rel_name = relation-&gt;rel_name;\n\t\t\tbreak;\n\t\t}\n\n\t\tdefault:\n\t\t\tbreak;\n\t}\n}\n\n// Setup parameter parameters name.\nstatic void dsqlSetParametersName(DsqlCompilerScratch* dsqlScratch, CompoundStmtNode* statements,\n\tconst RecordSourceNode* relNode)\n{\n\tconst dsql_ctx*  -= varying-&gt;vary_length;\n\t\t\t\tmemset(trail, 0, length);\n\t\t\t}\n\t\t}\n\t}\n}\n\n// Try to set write lock on record until success or record exists\nstatic void forceWriteLock(thread_db* tdbb, record_param* rpb, jrd_tra* transaction)\n{\n\twhile (VIO_refetch_record(tdbb, rpb, transaction, true, true))\n\t{\n\t\trpb-&gt;rpb_runtime_flags &amp;= ~RPB_refetch;\n\n\t\t// VIO_writelock returns false if record has been deleted or modified\n\t\t// by someone else.\n\t\tif (VIO_writelock(tdbb, rpb, transaction) == WriteLockResult::LOCKED)\n\t\t\tbreak;\n\t}\n}\n\n// Build a validation list for a relation, if appropriate.\nstatic void makeValidation(thread_db* tdbb, CompilerScratch* csb, StreamType stream,\n\tArray&lt;ValidateInfo&gt;&amp; validations)\n{\n\tSET_TDBB(tdbb);\n\n\tDEV_BLKCHK(csb, type_csb);\n\n\tjrd_rel* relation = csb-&gt;csb_rpt[stream].csb_relation;\n\tif (!relation)\t//// TODO: LocalTableSourceNode\n\t\treturn;\n\n\tvec&lt;jrd_fld*&gt;* vector = relation-&gt;rel_fields;\n\tif (!vector)\n\t\treturn;\n\n\tStreamMap localMap;\n\tStreamType* map = csb-&gt;csb_rpt[stream].csb_map;\n\n\tif (!map)\n\t{\n\t\tmap = localMap.getBuffer(STREAM_MAP_LENGTH);\n\t\tfb_assert(stream &lt;= MAX_STREAMS);\n\t\tmap[0] = stream;\n\t}\n\n\tUSHORT fieldId = 0;\n\tvec&lt;jrd_fld*&gt;::iterator ptr1 = vector-&gt;begin();\n\n\tfor (const vec&lt;jrd_fld*&gt;::const_iterator end = vector-&gt;end(); ptr1 &lt; end; ++ptr1, ++fieldId)\n\t{\n\t\tBoolExprNode* validation;\n\n\t\tif (*ptr1 &amp;&amp; (validation = (*ptr1)-&gt;fld_validation))\n\t\t{\n\t\t\tAutoSetRestore&lt;USHORT&gt; autoRemapVariable(&amp;csb-&gt;csb_remap_variable,\n\t\t\t\t(csb-&gt;csb_variables ? csb-&gt;csb_variables-&gt;count() : 0) + 1);\n\n\t\t\tRemapFieldNodeCopier copier(csb, map, fieldId);\n\n\t\t\tvalidation = copier.copy(tdbb, validation);\n\n\t\t\tValidateInfo validate;\n\t\t\tvalidate.boolean = validation;\n\t\t\tvalidate.value = PAR_gen_field(tdbb, stream, fieldId);\n\t\t\tvalidations.add(validate);\n\t\t}\n\n\t\tif (*ptr1 &amp;&amp; (validation = (*ptr1)-&gt;fld_not_null))\n\t\t{\n\t\t\tAutoSetRestore&lt;USHORT&gt; autoRemapVariable(&amp;csb-&gt;csb_remap_variable,\n\t\t\t\t(csb-&gt;csb_variables ? csb-&gt;csb_variables-&gt;count() : 0) + 1);\n\n\t\t\tRemapFieldNodeCopier copier(csb, map, fieldId);\n\n\t\t\tvalidation = copier.copy(tdbb, validation);\n\n\t\t\tValidateInfo validate;\n\t\t\tvalidate.boolean = validation;\n\t\t\tvalidate.value = PAR_gen_field(tdbb, stream, fieldId);\n\t\t\tvalidations.add(validate);\n\t\t}\n\t}\n}\n\n// Process a view update performed by a trigger.\nstatic StmtNode* pass1ExpandView(thread_db* tdbb, CompilerScratch* csb, StreamType orgStream,\n\tStreamType newStream, bool remap)\n{\n\tSET_TDBB(tdbb);\n\n\tDEV_BLKCHK(csb, type_csb);\n\n\tStmtNodeStack stack;\n\tjrd_rel* relation = csb-&gt;csb_rpt[orgStream].csb_relation;\n\tvec&lt;jrd_fld*&gt;* fields = relation-&gt;rel_fields;\n\n\tdsc desc;\n\tUSHORT id = 0, newId = 0;\n\tvec&lt;jrd_fld*&gt;::iterator ptr = fields-&gt;begin();\n\n\tfor (const vec&lt;jrd_fld*&gt;::const_iterator end = fields-&gt;end(); ptr &lt; end; ++ptr, ++id)\n\t{\n\t\tif (*ptr)\n\t\t{\n\t\t\tif (remap)\n\t\t\t{\n\t\t\t\tconst jrd_fld* field = MET_get_field(relation, id);\n\n\t\t\t\tif (field-&gt;fld_source)\n\t\t\t\t\tnewId = nodeAs&lt;FieldNode&gt;(field-&gt;fld_source)-&gt;fieldId;\n\t\t\t\telse\n\t\t\t\t\tnewId = id;\n\t\t\t}\n\t\t\telse\n\t\t\t\tnewId = id;\n\n\t\t\tconst Format* const format = CMP_format(tdbb, csb, newStream);\n\t\t\tif (newId &gt;= format-&gt;fmt_count || !format-&gt;fmt_desc[newId].dsc_address)\n\t\t\t\tcontinue;\n\n\t\t\tAssignmentNode* const assign =\n\t\t\t\tFB_NEW_POOL(*tdbb-&gt;getDefaultPool()) AssignmentNode(*tdbb-&gt;getDefaultPool());\n\t\t\tassign-&gt;asgnTo = PAR_gen_field(tdbb, newStream, newId);\n\t\t\tassign-&gt;asgnFrom = PAR_gen_field(tdbb, orgStream, id);\n\n\t\t\tstack.push(assign);\n\t\t}\n\t}\n\n\treturn PAR_make_list(tdbb, stack);\n}\n\n// Check out a prospective update to a relation. If it fails security check, bounce it.\n// If it&#x27;s a view update, make sure the view is updatable, and return the view source for redirection.\n// If it&#x27;s a simple relation, return NULL.\nstatic RelationSourceNode* pass1Update(thread_db* tdbb, CompilerScratch* csb, jrd_rel* relation,\n\tconst TrigVector* trigger, StreamType stream, StreamType updateStream, SecurityClass::flags_t priv,\n\tjrd_rel* view, StreamType viewStream, StreamType viewUpdateStream)\n{\n\tSET_TDBB(tdbb);\n\n\tDEV_BLKCHK(csb, type_csb);\n\tDEV_BLKCHK(relation, type_rel);\n\tDEV_BLKCHK(view, type_rel);\n\n\t// unless this is an internal request, check access permission\n\n\tconst SLONG ssRelationId = view ? view-&gt;rel_id : 0;\n\n\tCMP_post_access(tdbb, csb, relation-&gt;rel_security_name.schema, ssRelationId,\n\t\tSCL_usage, obj_schemas, QualifiedName(relation-&gt;rel_name.schema));\n\n\tCMP_post_access(tdbb, csb, relation-&gt;rel_security_name.object, ssRelationId,\n\t\tpriv, obj_relations, relation-&gt;rel_name);\n\n\t// ensure that the view is set for the input streams,\n\t// so that access to views can be checked at the field level\n\n\tfb_assert(viewStream &lt;= MAX_STREAMS);\n\tCMP_csb_element(csb, stream)-&gt;csb_view = view;\n\tCMP_csb_element(csb, stream)-&gt;csb_view_stream = viewStream;\n\n\tif (stream != updateStream)\n\t{\n\t\tfb_assert(viewUpdateStream &lt;= MAX_STREAMS);\n\t\tCMP_csb_element(csb, updateStream)-&gt;csb_view = view;\n\t\tCMP_csb_element(csb, updateStream)-&gt;csb_view_stream = viewUpdateStream;\n\t}\n\n\t// if we&#x27;re not a view, everything&#x27;s cool\n\n\tRseNode* rse = relation-&gt;rel_view_rse;\n\tif (!rse)\n\t\treturn NULL;\n\n\t// a view with triggers is always updatable\n\n\tif (trigger)\n\t{\n\t\tbool userTriggers = false;\n\n\t\tfor (FB_SIZE_T i = 0; i &lt; trigger-&gt;getCount(); i++)\n\t\t{\n\t\t\tif (!(*trigger)[i].sysTrigger)\n\t\t\t{\n\t\t\t\tuserTriggers = true;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\tif (userTriggers)\n\t\t{\n\t\t\tcsb-&gt;csb_rpt[updateStream].csb_flags |= csb_view_update;\n\t\t\treturn NULL;\n\t\t}\n\t}\n\n\t// we&#x27;ve got a view without triggers, let&#x27;s check whether it&#x27;s updateable\n\n\tif (rse-&gt;rse_relations.getCount() != 1 || rse-&gt;rse_projection || rse-&gt;rse_sorted ||\n\t\trse-&gt;rse_relations[0]-&gt;getType() != RelationSourceNode::TYPE)\n\t{\n\t\tERR_post(Arg::Gds(isc_read_only_view) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\t}\n\n\t// for an updateable view, return the view source\n\n\tcsb-&gt;csb_rpt[updateStream].csb_flags |= csb_view_update;\n\n\treturn static_cast&lt;RelationSourceNode*&gt;(rse-&gt;rse_relations[0].getObject());\n}\n\n// The csb-&gt;csb_validate_expr becomes true if an ancestor of the current node (the one being\n// passed in) in the parse tree is a validation. &quot;Ancestor&quot; does not include the current node\n// being passed in as an argument.\n// If we are in a &quot;validate subtree&quot; (as determined by the csb-&gt;csb_validate_expr), we must not\n// post update access to the fields involved in the validation clause.\n// (See the call for CMP_post_access in this function.)\nstatic void pass1Validations(thread_db* tdbb, CompilerScratch* csb, Array&lt;ValidateInfo&gt;&amp; validations)\n{\n\tAutoSetRestore&lt;bool&gt; autoValidateExpr(&amp;csb-&gt;csb_validate_expr, true);\n\n\tfor (Array&lt;ValidateInfo&gt;::iterator i = validations.begin(); i != validations.end(); ++i)\n\t{\n\t\tDmlNode::doPass1(tdbb, csb, i-&gt;boolean.getAddress());\n\t\tDmlNode::doPass1(tdbb, csb, i-&gt;value.getAddress());\n\t}\n}\n\nForNode* pass2FindForNode(StmtNode* node, StreamType stream)\n{\n\t// lookup for parent ForNode\n\twhile (node &amp;&amp; !nodeIs&lt;ForNode&gt;(node))\n\t\tnode = node-&gt;parentStmt;\n\n\tForNode* forNode = nodeAs&lt;ForNode&gt;(node);\n\tif (forNode &amp;&amp; forNode-&gt;rse-&gt;containsStream(stream))\n\t{\n\t\t//fb_assert(forNode-&gt;marks &amp; StmtNode::MARK_FOR_UPDATE);\n\t\tif (forNode-&gt;marks &amp; StmtNode::MARK_FOR_UPDATE)\n\t\t\treturn forNode;\n\t}\n\n\treturn nullptr;\n};\n\n// Inherit access to triggers to be fired.\n//\n// When we detect that a trigger could be fired by a request,\n// then we add the access list for that trigger to the access\n// list for this request.  That way, when we check access for\n// the request we also check access for any other objects that\n// could be fired off by the request.\n//\n// Note that when we add the access item, we specify that\n//    Trigger X needs access to resource Y.\n// In the access list we parse here, if there is no &quot;accessor&quot;\n// name then the trigger must access it directly.  If there is\n// an &quot;accessor&quot; name, then something accessed by this trigger\n// must require the access.\n//\n// CVC: The code no longer matches this comment.\n// CVC: The third parameter is the owner of the triggers vector\n// and was added to avoid triggers posting access checks to\n// their base tables, since it&#x27;s nonsense and causes weird\n// messages about false REFERENCES right failures.\nstatic void postTriggerAccess(CompilerScratch* csb, jrd_rel* ownerRelation,\n\tExternalAccess::exa_act operation, jrd_rel* view)\n{\n\tDEV_BLKCHK(csb, type_csb);\n\tDEV_BLKCHK(view, type_rel);\n\n\t// allow all access to internal requests\n\tif (csb-&gt;csb_g_flags &amp; (csb_internal | csb_ignore_perm))\n\t\treturn;\n\n\t// Post trigger access\n\tExternalAccess temp(operation, ownerRelation-&gt;rel_id, view ? view-&gt;rel_id : 0);\n\tFB_SIZE_T i;\n\n\tif (!csb-&gt;csb_external.find(temp, i))\n\t\tcsb-&gt;csb_external.insert(i, temp);\n}\n\n// Perform operation&#x27;s pre-triggers, storing active rpb in chain.\nstatic void preModifyEraseTriggers(thread_db* tdbb, TrigVector** trigs,\n\tStmtNode::WhichTrigger whichTrig, record_param* rpb, record_param* rec, TriggerAction op)\n{\n\tif (!tdbb-&gt;getTransaction()-&gt;tra_rpblist)\n\t{\n\t\ttdbb-&gt;getTransaction()-&gt;tra_rpblist =\n\t\t\tFB_NEW_POOL(*tdbb-&gt;getTransaction()-&gt;tra_pool) traRpbList(*tdbb-&gt;getTransaction()-&gt;tra_pool);\n\t}\n\n\tconst auto relation = rpb-&gt;rpb_relation;\n\tconst int rpblevel = tdbb-&gt;getTransaction()-&gt;tra_rpblist-&gt;PushRpb(rpb);\n\n\tif ((*trigs || relation-&gt;isSystem()) &amp;&amp; whichTrig != StmtNode::POST_TRIG)\n\t{\n\t\ttry\n\t\t{\n\t\t\tEXE_execute_triggers(tdbb, trigs, rpb, rec, op, StmtNode::PRE_TRIG);\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\ttdbb-&gt;getTransaction()-&gt;tra_rpblist-&gt;PopRpb(rpb, rpblevel);\n\t\t\tthrow;\n\t\t}\n\t}\n\n\ttdbb-&gt;getTransaction()-&gt;tra_rpblist-&gt;PopRpb(rpb, rpblevel);\n}\n\n// 1. Remove assignments of DEFAULT to computed fields.\n// 2. Remove assignments to identity column when OVERRIDING USER VALUE is specified in INSERT.\nstatic void preprocessAssignments(thread_db* tdbb, CompilerScratch* csb,\n\tStreamType stream, CompoundStmtNode* compoundNode, const std::optional&lt;OverrideClause&gt;* insertOverride)\n{\n\tif (!compoundNode)\n\t\treturn;\n\n\tjrd_rel* relation = csb-&gt;csb_rpt[stream].csb_relation;\n\n\t//// TODO: LocalTableSourceNode\n\tif (!relation)\n\t\treturn;\n\n\tstd::optional&lt;IdentityType&gt; identityType;\n\n\tfor (FB_SIZE_T i = compoundNode-&gt;statements.getCount(); i--; )\n\t{\n\t\tconst AssignmentNode* assign = nodeAs&lt;AssignmentNode&gt;(compoundNode-&gt;statements[i]);\n\t\tfb_assert(assign);\n\t\tif (!assign)\n\t\t\tcontinue;\n\n\t\tconst ExprNode* assignFrom = assign-&gt;asgnFrom;\n\t\tconst FieldNode* assignToField = nodeAs&lt;FieldNode&gt;(assign-&gt;asgnTo);\n\n\t\tif (assignToField)\n\t\t{\n\t\t\tint fieldId = assignToField-&gt;fieldId;\n\t\t\tjrd_fld* fld;\n\n\t\t\twhile (true)\n\t\t\t{\n\t\t\t\tif (assignToField-&gt;fieldStream == stream &amp;&amp;\n\t\t\t\t\t(fld = MET_get_field(relation, fieldId)))\n\t\t\t\t{\n\t\t\t\t\tif (insertOverride &amp;&amp; fld-&gt;fld_identity_type.has_value())\n\t\t\t\t\t{\n\t\t\t\t\t\tif (insertOverride-&gt;has_value() || !nodeIs&lt;DefaultNode&gt;(assignFrom))\n\t\t\t\t\t\t\tidentityType = fld-&gt;fld_identity_type;\n\n\t\t\t\t\t\tif (*insertOverride == OverrideClause::USER_VALUE)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tcompoundNode-&gt;statements.remove(i);\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\n\t\t\t\t\tif (fld-&gt;fld_computation)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (nodeIs&lt;DefaultNode&gt;(assignFrom))\n\t\t\t\t\t\t\tcompoundNode-&gt;statements.remove(i);\n\t\t\t\t\t}\n\t\t\t\t\telse if (relation-&gt;rel_view_rse &amp;&amp; fld-&gt;fld_source_rel_field.first.object.hasData())\n\t\t\t\t\t{\n\t\t\t\t\t\trelation = MET_lookup_relation(tdbb, fld-&gt;fld_source_rel_field.first);\n\n\t\t\t\t\t\tfb_assert(relation);\n\t\t\t\t\t\tif (!relation)\n\t\t\t\t\t\t\treturn;\n\n\t\t\t\t\t\tif ((fieldId = MET_lookup_field(tdbb, relation, fld-&gt;fld_source_rel_field.second)) &gt;= 0)\n\t\t\t\t\t\t\tcontinue;\n\t\t\t\t\t}\n\t\t\t\t}\n\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\n\tif (!insertOverride)\n\t\treturn;\n\n\tif (insertOverride-&gt;has_value())\n\t{\n\t\tif (!identityType.has_value())\n\t\t\tERR_post(Arg::Gds(isc_overriding_without_identity) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\n\t\tif (identityType == IDENT_TYPE_BY_DEFAULT &amp;&amp; *insertOverride == OverrideClause::SYSTEM_VALUE)\n\t\t\tERR_post(Arg::Gds(isc_overriding_system_invalid) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\t}\n\telse\n\t{\n\t\tif (identityType == IDENT_TYPE_ALWAYS)\n\t\t\tERR_post(Arg::Gds(isc_overriding_missing) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\t}\n}\n\nstatic void restartRequest(const Request* request, jrd_tra* transaction)\n{\n\tconst Request* top_request = request-&gt;req_snapshot.m_owner;\n\tfb_assert(top_request);\n\tfb_assert(top_request-&gt;req_flags &amp; req_update_conflict);\n\n\ttransaction-&gt;tra_flags |= TRA_ex_restart;\n\n\tERR_post(Arg::Gds(isc_deadlock) &lt;&lt;\n\t\tArg::Gds(isc_update_conflict) &lt;&lt;\n\t\tArg::Gds(isc_concurrent_transaction) &lt;&lt; Arg::Int64(top_request-&gt;req_conflict_txn));\n}\n\n// Execute a list of validation expressions.\nstatic void validateExpressions(thread_db* tdbb, const Array&lt;ValidateInfo&gt;&amp; validations)\n{\n\tSET_TDBB(tdbb);\n\n\tArray&lt;ValidateInfo&gt;::const_iterator end = validations.end();\n\n\tfor (Array&lt;ValidateInfo&gt;::const_iterator i = validations.begin(); i != end; ++i)\n\t{\n\t\tRequest* request = tdbb-&gt;getRequest();\n\n\t\tif (!i-&gt;boolean-&gt;execute(tdbb, request) &amp;&amp; !(request-&gt;req_flags &amp; req_null))\n\t\t{\n\t\t\t// Validation error -- report result\n\t\t\tconst char* value;\n\t\t\tVaryStr&lt;TEMP_STR_LENGTH&gt; temp;\n\n\t\t\tconst dsc* desc = EVL_expr(tdbb, request, i-&gt;value);\n\t\t\tconst USHORT length = (desc &amp;&amp; !(request-&gt;req_flags &amp; req_null)) ?\n\t\t\t\tMOV_make_string(tdbb, desc, ttype_dynamic, &amp;value, &amp;temp, sizeof(temp) - 1) : 0;\n\n\t\t\tif (!desc || (request-&gt;req_flags &amp; req_null))\n\t\t\t\tvalue = NULL_STRING_MARK;\n\t\t\telse if (!length)\n\t\t\t\tvalue = &quot;&quot;;\n\t\t\telse\n\t\t\t\tconst_cast&lt;char*&gt;(value)[length] = 0;\t// safe cast - data is actually on the stack\n\n\t\t\tstring name;\n\t\t\tconst FieldNode* fieldNode = nodeAs&lt;FieldNode&gt;(i-&gt;value);\n\n\t\t\tif (fieldNode)\n\t\t\t{\n\t\t\t\tconst jrd_rel* relation = request-&gt;req_rpb[fieldNode-&gt;fieldStream].rpb_relation;\n\t\t\t\tconst vec&lt;jrd_fld*&gt;* vector = relation-&gt;rel_fields;\n\t\t\t\tconst jrd_fld* field;\n\n\t\t\t\tif (vector &amp;&amp; fieldNode-&gt;fieldId &lt; vector-&gt;count() &amp;&amp;\n\t\t\t\t\t(field = (*vector)[fieldNode-&gt;fieldId]))\n\t\t\t\t{\n\t\t\t\t\tif (relation-&gt;rel_name.object.hasData())\n\t\t\t\t\t{\n\t\t\t\t\t\tname.printf(\n\t\t\t\t\t\t\t&quot;%s.%s&quot;,\n\t\t\t\t\t\t\trelation-&gt;rel_name.toQuotedString().c_str(),\n\t\t\t\t\t\t\tfield-&gt;fld_name.toQuotedString().c_str());\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t\tname = field-&gt;fld_name.toQuotedString();\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (name.isEmpty())\n\t\t\t\tname = UNKNOWN_STRING_MARK;\n\n\t\t\tERR_post(Arg::Gds(isc_not_valid) &lt;&lt; Arg::Str(name) &lt;&lt; Arg::Str(value));\n\t\t}\n\t}\n}\n\n\n}\t// namespace Jrd\n"}, "/build/src/common/classes/alloc.h": {"id": "/build/src/common/classes/alloc.h", "filePath": "src/common/classes/alloc.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.h\n *\tDESCRIPTION:\tMemory Pool Manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  STL allocator is based on one by Mike Nordell and John Bellardo\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#ifndef CLASSES_ALLOC_H\n#define CLASSES_ALLOC_H\n\n#include &quot;firebird.h&quot;\n#include &quot;fb_types.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n\n#include &lt;stdio.h&gt;\n\n#if defined(MVS) || defined(DARWIN) || defined(__clang__)\n#include &lt;stdlib.h&gt;\n#else\n#include &lt;malloc.h&gt;\n#endif\n\n#include &lt;memory.h&gt;\n#include &lt;memory&gt;\n\n#ifdef DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool(), __FILE__, __LINE__)\n#define FB_NEW_POOL(pool) new(pool, __FILE__, __LINE__)\n#define FB_NEW_RPT(pool, count) new(pool, count, __FILE__, __LINE__)\n#else // DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool())\n#define FB_NEW_POOL(pool) new(pool)\n#define FB_NEW_RPT(pool, count) new(pool, count)\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird {\n\n// Alignment for all memory blocks\n#define ALLOC_ALIGNMENT 16\n\nstatic inline constexpr size_t MEM_ALIGN(size_t value)\n{\n\treturn FB_ALIGN(value, ALLOC_ALIGNMENT);\n}\n\n\nclass MemPool;\n\nclass MemoryStats\n{\npublic:\n\texplicit MemoryStats(MemoryStats* parent = NULL) noexcept\n\t\t: mst_parent(parent), mst_usage(0), mst_mapped(0), mst_max_usage(0), mst_max_mapped(0)\n\t{}\n\n\t~MemoryStats()\n\t{}\n\n\t// Forbid copying/assignment\n\tMemoryStats(const MemoryStats&amp;) = delete;\n\tMemoryStats&amp; operator=(const MemoryStats&amp;) = delete;\n\n\tsize_t getCurrentUsage() const noexcept { return mst_usage.value(); }\n\tsize_t getMaximumUsage() const noexcept { return mst_max_usage; }\n\tsize_t getCurrentMapping() const noexcept { return mst_mapped.value(); }\n\tsize_t getMaximumMapping() const noexcept { return mst_max_mapped; }\n\nprivate:\n\tMemoryStats* mst_parent;\n\n\t// Currently allocated memory (without allocator overhead)\n\t// Useful for monitoring engine memory leaks\n\tAtomicCounter mst_usage;\n\t// Amount of memory mapped (including all overheads)\n\t// Useful for monitoring OS memory consumption\n\tAtomicCounter mst_mapped;\n\n\t// We don&#x27;t particularily care about extreme precision of these max values,\n\t// this is why we don&#x27;t synchronize them\n\tsize_t mst_max_usage;\n\tsize_t mst_max_mapped;\n\n\t// These methods are thread-safe due to usage of atomic counters only\n\tvoid increment_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_usage.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_usage)\n\t\t\t\tstatistics-&gt;mst_max_usage = temp;\n\t\t}\n\t}\n\n\tvoid decrement_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_usage -= size;\n\t\t}\n\t}\n\n\tvoid increment_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_mapped.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_mapped)\n\t\t\t\tstatistics-&gt;mst_max_mapped = temp;\n\t\t}\n\t}\n\n\tvoid decrement_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_mapped -= size;\n\t\t}\n\t}\n\n\tfriend class MemPool;\n};\n\n\nclass MemoryPool\n{\nfriend class ExternalMemoryHandler;\n\nprivate:\n\tMemPool* pool;\n\n\tMemoryPool(MemPool* p) noexcept\n\t\t: pool(p)\n\t{ }\n\n\t// Default statistics group for process\n\tstatic MemoryStats* default_stats_group;\n\npublic:\n\t// This is maximum block size which is cached (not allocated directly from OS)\n\tenum RecommendedBufferSize { MAX_MEDIUM_BLOCK_SIZE = 64384 };\t// MediumLimits::TOP_LIMIT - 128\n\n\tstatic MemoryPool* defaultMemoryManager;\n\tstatic MemoryPool* externalMemoryManager;\n\npublic:\n\t// Create memory pool instance\n\tstatic MemoryPool* createPool(MemoryPool* parent = NULL, MemoryStats&amp; stats = *default_stats_group);\n\t// Delete memory pool instance\n\tstatic void deletePool(MemoryPool* pool);\n\n#ifdef DEBUG_GDS_ALLOC\n#define ALLOC_ARGS , __FILE__, __LINE__\n#define ALLOC_PARAMS , const char* file, int line\n#define ALLOC_PASS_ARGS , file, line\n#else\n#define ALLOC_ARGS\n#define ALLOC_PARAMS\n#define ALLOC_PASS_ARGS\n#endif // DEBUG_GDS_ALLOC\n\n\tvoid* calloc(size_t size ALLOC_PARAMS);\n\n\tstatic void* globalAlloc(size_t s ALLOC_PARAMS)\n\t{\n\t\treturn defaultMemoryManager-&gt;allocate(s ALLOC_PASS_ARGS);\n\t}\n\n\tvoid* allocate(size_t size ALLOC_PARAMS);\n\n\tstatic void globalFree(void* mem) noexcept;\n\tvoid deallocate(void* mem) noexcept;\n\n\t// Set context pool for current thread of execution\n\tstatic MemoryPool* setContextPool(MemoryPool* newPool);\n\n\t// Get context pool for current thread of execution\n\tstatic MemoryPool* getContextPool();\n\n\tMemoryStats&amp; getStatsGroup() noexcept;\n\n\t// Set statistics group for pool. Usage counters will be decremented from\n\t// previously set group and added to new\n\tvoid setStatsGroup(MemoryStats&amp; stats) noexcept;\n\n\t// Initialize and finalize global memory pool\n\tstatic void initDefaultPool();\n\tstatic void cleanupDefaultPool();\n\n\t// Initialize context pool\n\tstatic void contextPoolInit();\n\n\t// Print out pool contents. This is debugging routine\n\tstatic constexpr unsigned PRINT_USED_ONLY = 0x01;\n\tstatic constexpr unsigned PRINT_RECURSIVE = 0x02;\n\tvoid print_contents(FILE*, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\t// The same routine, but more easily callable from the debugger\n\tvoid print_contents(const char* filename, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\n\tinline bool operator==(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn pool == rhs.pool;\n\t}\n\n\tinline bool operator!=(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn !operator==(rhs);\n\t}\n\npublic:\n\tstruct Finalizer\n\t{\n\t\tvirtual ~Finalizer()\n\t\t{\n\t\t}\n\n\t\tvirtual void finalize() = 0;\n\n\t\tFinalizer* prev = nullptr;\n\t\tFinalizer* next = nullptr;\n\t};\n\n\ttemplate &lt;typename T&gt; Finalizer* registerFinalizer(void (*func)(T*), T* object)\n\t{\n\t\tstruct FinalizerImpl : Finalizer\n\t\t{\n\t\t\tFinalizerImpl(void (*aFunc)(T*), T* aObject)\n\t\t\t\t: func(aFunc),\n\t\t\t\t  object(aObject)\n\t\t\t{\n\t\t\t}\n\n\t\t\tvoid finalize() override\n\t\t\t{\n\t\t\t\tfunc(object);\n\t\t\t}\n\n\t\t\tvoid (*func)(T*);\n\t\t\tT* object;\n\t\t};\n\n\t\tfb_assert(func);\n\t\tFinalizerImpl* finalizer = FB_NEW_POOL(*this) FinalizerImpl(func, object);\n\n\t\tinternalRegisterFinalizer(finalizer);\n\n\t\treturn finalizer;\n\t}\n\n\tvoid unregisterFinalizer(Finalizer*&amp; finalizer);\n\nprivate:\n\tvoid internalRegisterFinalizer(Finalizer* entry);\n\nprivate:\n\tFinalizer* finalizers = nullptr;\n\n\tfriend class MemPool;\n};\n\nvoid initExternalMemoryPool();\n\n} // namespace Firebird\n\nstatic inline Firebird::MemoryPool* getDefaultMemoryPool() noexcept\n{\n\tfb_assert(Firebird::MemoryPool::defaultMemoryManager);\n\treturn Firebird::MemoryPool::defaultMemoryManager;\n}\n\nstatic inline Firebird::MemoryPool* getExternalMemoryPool() noexcept\n{\n\tusing namespace Firebird;\n\n\tif (!MemoryPool::externalMemoryManager)\n\t\tinitExternalMemoryPool();\n\n\treturn MemoryPool::externalMemoryManager;\n}\n\nnamespace Firebird {\n\n// Class intended to manage execution context pool stack\n// Declare instance of this class when you need to set new context pool and it\n// will be restored automatically as soon holder variable gets out of scope\nclass ContextPoolHolder\n{\npublic:\n\texplicit ContextPoolHolder(MemoryPool* newPool)\n\t{\n\t\tsavedPool = MemoryPool::setContextPool(newPool);\n\t}\n\t~ContextPoolHolder()\n\t{\n\t\tMemoryPool::setContextPool(savedPool);\n\t}\nprivate:\n\tMemoryPool* savedPool;\n};\n\n// template enabling common use of old and new pools control code\n// to be dropped when old-style code goes away\ntemplate &lt;typename SubsystemThreadData, typename SubsystemPool&gt;\nclass SubsystemContextPoolHolder : public ContextPoolHolder\n{\npublic:\n\tSubsystemContextPoolHolder\n\t(\n\t\tSubsystemThreadData* subThreadData,\n\t\tSubsystemPool* newPool\n\t)\n\t\t: ContextPoolHolder(newPool),\n\t\tsavedThreadData(subThreadData),\n\t\tsavedPool(savedThreadData-&gt;getDefaultPool())\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(newPool);\n\t}\n\n\t~SubsystemContextPoolHolder()\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(savedPool);\n\t}\n\nprivate:\n\tSubsystemThreadData* savedThreadData;\n\tSubsystemPool* savedPool;\n};\n\n} // namespace Firebird\n\nusing Firebird::MemoryPool;\n\n// operators new and delete\n\ninline void* operator new(size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void* operator new[](size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void operator delete(void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\ninline void operator delete[](void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#ifdef DEBUG_GDS_ALLOC\n\nextern void operator delete(void* mem) noexcept;\nextern void operator delete[](void* mem) noexcept;\n\n#if __cplusplus &gt;= 201402L\nextern void operator delete(void* mem, std::size_t s) noexcept;\nextern void operator delete[](void* mem, std::size_t s) noexcept;\n#endif\n\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird\n{\n\t// Global storage makes it possible to use new and delete for classes,\n\t// based on it, to behave traditionally, i.e. get memory from permanent pool.\n\tclass GlobalStorage\n\t{\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept\n\t\t{\n\t\t\treturn *getDefaultMemoryPool();\n\t\t}\n\t};\n\n\n\t// Permanent storage is used as base class for all objects,\n\t// performing memory allocation in methods other than\n\t// constructors of this objects. Permanent means that pool,\n\t// which will be later used for such allocations, must\n\t// be explicitly passed in all constructors of such object.\n\tclass PermanentStorage\n\t{\n\tprotected:\n\t\texplicit PermanentStorage(MemoryPool&amp; p) noexcept : pool(p) { }\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept { return pool; }\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n\n\t// Automatic storage is used as base class for objects,\n\t// that may have constructors without explicit MemoryPool\n\t// parameter. In this case AutoStorage sends AutoMemoryPool\n\t// to PermanentStorage. To ensure this operation to be safe\n\t// such trick possible only for local (on stack) variables.\n\tclass AutoStorage : public PermanentStorage\n\t{\n\tprivate:\n#if defined(DEV_BUILD)\n\t\tvoid ProbeStack() const noexcept;\n#endif\n\tpublic:\n\t\tstatic MemoryPool&amp; getAutoMemoryPool();\n\tprotected:\n\t\tAutoStorage()\n\t\t\t: PermanentStorage(getAutoMemoryPool())\n\t\t{\n#if defined(DEV_BUILD)\n\t\t\tProbeStack();\n#endif\n\t\t}\n\t\texplicit AutoStorage(MemoryPool&amp; p) noexcept : PermanentStorage(p) { }\n\t};\n\n\ttemplate &lt;&gt;\n\tinline void SimpleDelete&lt;MemoryPool&gt;::clear(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t\tMemoryPool::deletePool(pool);\n\t}\n\n\ttypedef AutoPtr&lt;MemoryPool&gt; AutoMemoryPool;\n\n\ttemplate &lt;typename T&gt;\n\tclass PoolAllocator\n\t{\n\ttemplate &lt;typename&gt; friend class PoolAllocator;\n\n\tpublic:\n\t\tusing value_type = T;\n\t\tusing size_type = size_t;\n\t\tusing pointer = T*;\n\t\tusing const_pointer = const T*;\n\t\tusing reference = T&amp;;\n\t\tusing const_reference = const T&amp;;\n\t\tusing void_pointer = void* ;\n\t\tusing const_void_pointer = const void*;\n\t\tusing difference_type = std::ptrdiff_t;\n\t\tusing is_always_equal = std::true_type;\n\n\t\ttemplate &lt;typename U&gt;\n\t\tstruct rebind\n\t\t{\n\t\t\ttypedef PoolAllocator&lt;U&gt; other;\n\t\t};\n\n\tpublic:\n\t\tPoolAllocator(MemoryPool&amp; aPool) noexcept\n\t\t\t: pool(aPool)\n\t\t{}\n\n\t\tPoolAllocator(const PoolAllocator&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\ttemplate &lt;class U&gt;\n\t\tPoolAllocator(const PoolAllocator&lt;U&gt;&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\t~PoolAllocator() noexcept\n\t\t{}\n\n\tpublic:\n\t\tconstexpr pointer allocate(size_type n, const void* hint = nullptr)\n\t\t{\n\t\t\treturn static_cast&lt;T*&gt;(pool.allocate(n * sizeof(T) ALLOC_ARGS));\n\t\t}\n\n\t\tconstexpr void deallocate(pointer p, size_type n)\n\t\t{\n\t\t\tpool.deallocate(p);\n\t\t}\n\n\t\tconstexpr size_type max_size() const noexcept\n\t\t{\n\t\t\treturn size_t(-1) / sizeof(T);\n\t\t}\n\n\t\ttemplate &lt;typename U, typename... Args&gt;\n\t\tconstexpr void construct(U* ptr, Args&amp;&amp;... args)\n\t\t{\n\t\t\tif constexpr (std::is_constructible&lt;U, MemoryPool&amp;, Args...&gt;::value)\n\t\t\t\tnew ((void*) ptr) U(pool, std::forward&lt;Args&gt;(args)...);\n\t\t\telse\n\t\t\t\tnew ((void*) ptr) U(std::forward&lt;Args&gt;(args)...);\n\t\t}\n\n\t\ttemplate &lt;typename U&gt;\n\t\tconstexpr void destroy(U* ptr)\n\t\t{\n\t\t\tptr-&gt;~U();\n\t\t}\n\n\t\tconstexpr bool operator==(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool == &amp;o.pool;\n\t\t}\n\n\t\tconstexpr bool operator!=(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool != &amp;o.pool;\n\t\t}\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n} // namespace Firebird\n\n\ntemplate &lt;typename TAlloc&gt;\nstruct std::allocator_traits&lt;Firebird::PoolAllocator&lt;TAlloc&gt;&gt;\n{\n\tusing Alloc = Firebird::PoolAllocator&lt;TAlloc&gt;;\n\n\tusing allocator_type = Alloc;\n\tusing value_type = typename Alloc::value_type;\n\tusing pointer = typename Alloc::pointer;\n\tusing const_pointer = typename Alloc::const_pointer;\n\tusing void_pointer = typename Alloc::void_pointer;\n\tusing const_void_pointer = typename Alloc::const_void_pointer;\n\tusing size_type = typename Alloc::size_type;\n\tusing difference_type = typename Alloc::difference_type;\n\tusing reference = value_type&amp;;\n\tusing const_reference = const value_type&amp;;\n\n\tusing is_always_equal = typename Alloc::is_always_equal;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_alloc = typename Alloc::template rebind&lt;T&gt;::other;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_traits = allocator_traits&lt;rebind_alloc&lt;T&gt;&gt;;\n\n\tstatic constexpr pointer allocate(Alloc&amp; alloc, size_type size)\n\t{\n\t\treturn alloc.allocate(size);\n\t}\n\n\tstatic constexpr void deallocate(Alloc&amp; alloc, pointer ptr, size_type size)\n\t{\n\t\talloc.deallocate(ptr, size);\n\t}\n\n\ttemplate &lt;typename T, typename... Args&gt;\n\tstatic constexpr void construct(Alloc&amp; alloc, T* ptr, Args&amp;&amp;... args)\n\t{\n\t\talloc.construct(ptr, std::forward&lt;Args&gt;(args)...);\n\t}\n\n\ttemplate &lt;typename T&gt;\n\tstatic constexpr void destroy(Alloc&amp; alloc, T* ptr)\n\t{\n\t\talloc.destroy(ptr);\n\t}\n\n\tstatic constexpr size_type max_size(const Alloc&amp; alloc) noexcept\n\t{\n\t\treturn alloc.max_size();\n\t}\n};\n\n\n#endif // CLASSES_ALLOC_H\n"}, "/build/src/jrd/jrd.h": {"id": "/build/src/jrd/jrd.h", "filePath": "src/jrd/jrd.h", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         jrd.h\n *      DESCRIPTION:    Common descriptions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;DecOSF&quot; port\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n * Claudio Valderrama C.\n * Adriano dos Santos Fernandes\n *\n */\n\n#ifndef JRD_JRD_H\n#define JRD_JRD_H\n\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../common/dsc.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/obj.h&quot;\n#include &quot;../jrd/val.h&quot;\n#include &quot;../jrd/status.h&quot;\n\n#include &quot;../common/classes/fb_atomic.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../jrd/MetaName.h&quot;\n#include &quot;../common/classes/NestConst.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/objects_array.h&quot;\n#include &quot;../common/classes/stack.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../common/classes/GenericMap.h&quot;\n#include &quot;../common/classes/Synchronize.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/StatusHolder.h&quot;\n#include &quot;../jrd/RandomGenerator.h&quot;\n#include &quot;../common/os/guid.h&quot;\n#include &quot;../jrd/sbm.h&quot;\n#include &quot;../jrd/scl.h&quot;\n#include &quot;../jrd/Routine.h&quot;\n#include &quot;../jrd/ExtEngineManager.h&quot;\n#include &quot;../jrd/Attachment.h&quot;\n#include &quot;firebird/Interface.h&quot;\n\n#ifndef CDS_UNAVAILABLE\n#include &lt;cds/threading/model.h&gt;\t// cds::threading::Manager\n#endif\n\n#define BUGCHECK(number)\t\tERR_bugcheck(number, __FILE__, __LINE__)\n#define SOFT_BUGCHECK(number)\tERR_soft_bugcheck(number, __FILE__, __LINE__)\n#define CORRUPT(number)\t\t\tERR_corrupt(number)\n#define IBERROR(number)\t\t\tERR_error(number)\n\n\n#define BLKCHK(blk, type)       if (!blk-&gt;checkHandle()) BUGCHECK(147)\n\n#define DEV_BLKCHK(blk, type)\tdo { } while (false)\t// nothing\n\n\n// Thread data block / IPC related data blocks\n#include &quot;../common/ThreadData.h&quot;\n\n// Definition of block types for data allocation in JRD\n#include &quot;../include/fb_blk.h&quot;\n\n#include &quot;../jrd/blb.h&quot;\n\n// Definition of DatabasePlugins\n#include &quot;../jrd/flu.h&quot;\n\n#include &quot;../jrd/pag.h&quot;\n\n#include &quot;../jrd/RuntimeStatistics.h&quot;\n#include &quot;../jrd/Database.h&quot;\n#include &quot;../jrd/lck.h&quot;\n\n// Error codes\n#include &quot;iberror.h&quot;\n\nstruct dsc;\n\nnamespace EDS {\n\tclass Connection;\n}\n\nnamespace Firebird {\n\tclass TextType;\n}\n\nnamespace Jrd {\n\ninline constexpr unsigned MAX_CALLBACKS = 50;\n\n// fwd. decl.\nclass thread_db;\nclass Attachment;\nclass jrd_tra;\nclass Request;\nclass Statement;\nclass jrd_file;\nclass Format;\nclass BufferDesc;\nclass SparseBitmap;\nclass jrd_rel;\nclass ExternalFile;\nclass ViewContext;\nclass IndexBlock;\nclass IndexLock;\nclass ArrayField;\nstruct sort_context;\nclass vcl;\nclass Parameter;\nclass jrd_fld;\nclass dsql_dbb;\nclass PreparedStatement;\nclass TraceManager;\nclass MessageNode;\n\n\n// Relation trigger definition\n\nclass Trigger\n{\npublic:\n\tFirebird::HalfStaticArray&lt;UCHAR, 128&gt; blr;\t\t\t// BLR code\n\tFirebird::HalfStaticArray&lt;UCHAR, 128&gt; debugInfo;\t// Debug info\n\tStatement* statement = nullptr;\t\t\t\t\t\t// Compiled statement\n\tbool releaseInProgress = false;\n\tSSHORT sysTrigger = 0;\t\t\t\t// See fb_sysflag in constants.h\n\tFB_UINT64 type = 0;\t\t\t\t\t// Trigger type\n\tUSHORT flags = 0;\t\t\t\t\t// Flags as they are in RDB$TRIGGERS table\n\tjrd_rel* relation = nullptr;\t\t// Trigger parent relation\n\tQualifiedName name;\t\t\t\t\t// Trigger name\n\tMetaName engine;\t\t\t\t\t// External engine name\n\tMetaName owner;\t\t\t\t\t\t// Owner for SQL SECURITY\n\tFirebird::string entryPoint;\t\t// External trigger entrypoint\n\tFirebird::string extBody;\t\t\t// External trigger body\n\tFirebird::TriState ssDefiner;\t\t// SQL SECURITY\n\tstd::unique_ptr&lt;ExtEngineManager::Trigger&gt; extTrigger;\t// External trigger\n\n\tbool isActive() const;\n\n\tvoid compile(thread_db*);\t\t\t\t// Ensure that trigger is compiled\n\tvoid release(thread_db*);\t\t\t\t// Try to free trigger request\n\n\texplicit Trigger(MemoryPool&amp; p)\n\t\t: blr(p), debugInfo(p), entryPoint(p), extBody(p)\n\t{}\n};\n\n\n// Array of triggers (suppose separate arrays for triggers of different types)\n\nclass TrigVector : public Firebird::ObjectsArray&lt;Trigger&gt;\n{\npublic:\n\texplicit TrigVector(Firebird::MemoryPool&amp; pool)\n\t\t: Firebird::ObjectsArray&lt;Trigger&gt;(pool),\n\t\t  useCount(0)\n\t{ }\n\n\tTrigVector()\n\t\t: Firebird::ObjectsArray&lt;Trigger&gt;(),\n\t\t  useCount(0)\n\t{ }\n\n\tvoid addRef()\n\t{\n\t\t++useCount;\n\t}\n\n\tbool hasActive() const;\n\n\tvoid decompile(thread_db* tdbb);\n\n\tvoid release();\n\tvoid release(thread_db* tdbb);\n\n\t~TrigVector()\n\t{\n\t\tfb_assert(useCount.value() == 0);\n\t}\n\nprivate:\n\tFirebird::AtomicCounter useCount;\n};\n\n\n//\n// Flags to indicate normal internal requests vs. dyn internal requests\n//\n// IRQ_REQUESTS and DYN_REQUESTS are deprecated\ninline constexpr int IRQ_REQUESTS\t\t= 1;\ninline constexpr int DYN_REQUESTS\t\t= 2;\ninline constexpr int CACHED_REQUESTS\t= 3;\n\n\n// Procedure block\n\nclass jrd_prc final : public Routine\n{\npublic:\n\tconst Format*\tprc_record_format = nullptr;\n\tprc_t\t\t\tprc_type = prc_legacy;\t\t\t// procedure type\n\n\tconst ExtEngineManager::Procedure* getExternal() const noexcept { return prc_external; }\n\tvoid setExternal(const ExtEngineManager::Procedure* value) noexcept { prc_external = value; }\n\nprivate:\n\tconst ExtEngineManager::Procedure* prc_external = nullptr;\n\npublic:\n\texplicit jrd_prc(MemoryPool&amp; p)\n\t\t: Routine(p)\n\t{\n\t}\n\npublic:\n\tint getObjectType() const override\n\t{\n\t\treturn obj_procedure;\n\t}\n\n\tSLONG getSclType() const override\n\t{\n\t\treturn obj_procedures;\n\t}\n\n\tvoid releaseFormat() override\n\t{\n\t\tdelete prc_record_format;\n\t\tprc_record_format = NULL;\n\t}\n\n\t~jrd_prc() override\n\t{\n\t\tdelete prc_external;\n\t}\n\n\tbool checkCache(thread_db* tdbb) const override;\n\tvoid clearCache(thread_db* tdbb) override;\n\n\tvoid releaseExternal() override\n\t{\n\t\tdelete prc_external;\n\t\tprc_external = NULL;\n\t}\n\nprotected:\n\tbool reload(thread_db* tdbb) override;\t// impl is in met.epp\n};\n\n\n// Parameter block\n\nclass Parameter final : public pool_alloc&lt;type_prm&gt;\n{\npublic:\n\tUSHORT\t\tprm_number;\n\tdsc\t\t\tprm_desc;\n\tNestConst&lt;ValueExprNode&gt;\tprm_default_value;\n\tbool\t\tprm_nullable;\n\tprm_mech_t\tprm_mechanism;\n\tMetaName prm_name;\n\tQualifiedName prm_field_source;\n\tMetaName prm_type_of_column;\n\tQualifiedName prm_type_of_table;\n\tstd::optional&lt;USHORT&gt; prm_text_type;\n\tFUN_T\t\tprm_fun_mechanism;\n\npublic:\n\texplicit Parameter(MemoryPool&amp; p)\n\t\t: prm_name(p),\n\t\t  prm_field_source(p),\n\t\t  prm_type_of_column(p),\n\t\t  prm_type_of_table(p)\n\t{\n\t}\n};\n\n// Index block to cache index information\n\nclass IndexBlock final : public pool_alloc&lt;type_idb&gt;\n{\npublic:\n\tIndexBlock*\tidb_next;\n\tValueExprNode* idb_expression;\t\t\t// node tree for index expression\n\tStatement* idb_expression_statement;\t// statement for index expression evaluation\n\tdsc\t\t\tidb_expression_desc;\t\t// descriptor for expression result\n\tBoolExprNode* idb_condition;\t\t\t// node tree for index condition\n\tStatement* idb_condition_statement;\t\t// statement for index condition evaluation\n\tLock*\t\tidb_lock;\t\t\t\t\t// lock to synchronize changes to index\n\tUSHORT\t\tidb_id;\n};\n\n\n//\n// Transaction element block\n//\nstruct teb\n{\n\tAttachment* teb_database;\n\tint teb_tpb_length;\n\tconst UCHAR* teb_tpb;\n};\n\ntypedef teb TEB;\n\n// Window block for loading cached pages into\n// CVC: Apparently, the only possible values are HEADER_PAGE==0 and LOG_PAGE==2\n// and reside in ods.h, although I watched a place with 1 and others with members\n// of a struct.\n\nstruct win\n{\n\tPageNumber win_page;\n\tOds::pag* win_buffer;\n\tclass BufferDesc* win_bdb;\n\tSSHORT win_scans;\n\tUSHORT win_flags;\n\texplicit win(const PageNumber&amp; wp) noexcept\n\t\t: win_page(wp), win_bdb(NULL), win_flags(0)\n\t{}\n\twin(const USHORT pageSpaceID, const ULONG pageNum) noexcept\n\t\t: win_page(pageSpaceID, pageNum), win_bdb(NULL), win_flags(0)\n\t{}\n};\n\ntypedef win WIN;\n\n// This is a compilation artifact: I wanted to be sure I would pick all old &quot;win&quot;\n// declarations at the top, so &quot;win&quot; was built with a mandatory argument in\n// the constructor. This struct satisfies a single place with an array. The\n// alternative would be to initialize 16 elements of the array with 16 calls\n// to the constructor: win my_array[n] = {win(-1), ... (win-1)};\n// When all places are changed, this class can disappear and win&#x27;s constructor\n// may get the default value of ~0 to &quot;wp&quot;.\nstruct win_for_array : public win\n{\n\twin_for_array() noexcept\n\t\t: win(DB_PAGE_SPACE, ~0)\n\t{}\n};\n\n// win_flags\n\ninline constexpr USHORT WIN_large_scan\t\t\t= 1;\t// large sequential scan\ninline constexpr USHORT WIN_secondary\t\t\t= 2;\t// secondary stream\ninline constexpr USHORT WIN_garbage_collector\t= 4;\t// garbage collector&#x27;s window\ninline constexpr USHORT WIN_garbage_collect\t\t= 8;\t// scan left a page for garbage collector\n\n\n#ifdef USE_ITIMER\nclass TimeoutTimer final :\n\tpublic Firebird::RefCntIface&lt;Firebird::ITimerImpl&lt;TimeoutTimer, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\texplicit TimeoutTimer() noexcept\n\t\t: m_started(0),\n\t\t  m_expired(false),\n\t\t  m_value(0),\n\t\t  m_error(0)\n\t{ }\n\n\t// tform specific version.\n * If we&#x27;re in DEV mode, also do consistancy checks on the\n * retrieved memory structure.  This was originally done to\n * track down cases of no &quot;PUT_THREAD_DATA&quot; on the NLM.\n *\n * This allows for NULL thread data (which might be an error by itself)\n * If there is thread data,\n * AND it is tagged as being a thread_db.\n * AND it has a non-NULL database field,\n * THEN we validate that the structure there is a database block.\n * Otherwise, we return what we got.\n * We can&#x27;t always validate the database field, as during initialization\n * there is no database set up.\n */\n\n#if defined(DEV_BUILD)\n#include &quot;../jrd/err_proto.h&quot;\n\ninline Jrd::thread_db* JRD_get_thread_data()\n{\n\tFirebird::ThreadData* p1 = Firebird::ThreadData::getSpecific();\n\tif (p1 &amp;&amp; p1-&gt;getType() == Firebird::ThreadData::tddDBB)\n\t{\n\t\tJrd::thread_db* p2 = (Jrd::thread_db*) p1;\n\t\tif (p2-&gt;getDatabase() &amp;&amp; !p2-&gt;getDatabase()-&gt;checkHandle())\n\t\t{\n\t\t\tBUGCHECK(147);\n\t\t}\n\t}\n\treturn (Jrd::thread_db*) p1;\n}\n\ninline void CHECK_TDBB(const Jrd::thread_db* tdbb)\n{\n\tfb_assert(tdbb &amp;&amp; (tdbb-&gt;getType() == Firebird::ThreadData::tddDBB) &amp;&amp;\n\t\t(!tdbb-&gt;getDatabase() || tdbb-&gt;getDatabase()-&gt;checkHandle()));\n}\n\ninline void CHECK_DBB(const Jrd::Database* dbb)\n{\n\tfb_assert(dbb &amp;&amp; dbb-&gt;checkHandle());\n}\n\n#else // PROD_BUILD\n\ninline Jrd::thread_db* JRD_get_thread_data()\n{\n\treturn (Jrd::thread_db*) Firebird::ThreadData::getSpecific();\n}\n\ninline void CHECK_DBB(const Jrd::Database*)\n{\n}\n\ninline void CHECK_TDBB(const Jrd::thread_db*)\n{\n}\n\n#endif\n\ninline Jrd::Database* GET_DBB()\n{\n\treturn JRD_get_thread_data()-&gt;getDatabase();\n}\n\n/*-------------------------------------------------------------------------*\n * macros used to set thread_db and Database pointers when there are not set already *\n *-------------------------------------------------------------------------*/\ninline void SET_TDBB(Jrd::thread_db*&amp; tdbb)\n{\n\tif (tdbb == NULL) {\n\t\ttdbb = JRD_get_thread_data();\n\t}\n\tCHECK_TDBB(tdbb);\n}\n\ninline void SET_DBB(Jrd::Database*&amp; dbb)\n{\n\tif (dbb == NULL) {\n\t\tdbb = GET_DBB();\n\t}\n\tCHECK_DBB(dbb);\n}\n\n\n// global variables for engine\n\nnamespace Jrd {\n\ttypedef Firebird::SubsystemContextPoolHolder &lt;Jrd::thread_db, MemoryPool&gt; ContextPoolHolder;\n\n\tclass DatabaseContextHolder : public Jrd::ContextPoolHolder\n\t{\n\tpublic:\n\t\texplicit DatabaseContextHolder(thread_db* tdbb)\n\t\t\t: Jrd::ContextPoolHolder(tdbb, tdbb-&gt;getDatabase()-&gt;dbb_permanent)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tDatabaseContextHolder(const DatabaseContextHolder&amp;) = delete;\n\t\tDatabaseContextHolder&amp; operator=(const DatabaseContextHolder&amp;) = delete;\n\t};\n\n\tclass BackgroundContextHolder : public ThreadContextHolder, public DatabaseContextHolder,\n\t\tpublic Jrd::Attachment::SyncGuard\n\t{\n\tpublic:\n\t\tBackgroundContextHolder(Database* dbb, Jrd::Attachment* att, FbStatusVector* status, const char* f)\n\t\t\t: ThreadContextHolder(dbb, att, status),\n\t\t\t  DatabaseContextHolder(operator thread_db*()),\n\t\t\t  Jrd::Attachment::SyncGuard(att, f)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tBackgroundContextHolder(const BackgroundContextHolder&amp;) = delete;\n\t\tBackgroundContextHolder&amp; operator=(const BackgroundContextHolder&amp;) = delete;\n\t};\n\n\tclass AttachmentHolder\n\t{\n\tpublic:\n\t\tstatic constexpr unsigned ATT_LOCK_ASYNC\t\t= 1;\n\t\tstatic constexpr unsigned ATT_DONT_LOCK\t\t\t= 2;\n\t\tstatic constexpr unsigned ATT_NO_SHUTDOWN_CHECK\t= 4;\n\t\tstatic constexpr unsigned ATT_NON_BLOCKING\t\t= 8;\n\n\t\tAttachmentHolder(thread_db* tdbb, StableAttachmentPart* sa, unsigned lockFlags, const char* from);\n\t\t~AttachmentHolder();\n\n\t\t// copying is prohibited\n\t\tAttachmentHolder(const AttachmentHolder&amp;) = delete;\n\t\tAttachmentHolder&am
