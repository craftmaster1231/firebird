 &quot;isc_tpb_lock_read, isc_tpb_shared&quot;;\n\t\tbreak;\n\tcase LCK_PR:\n\t\ttypestr = &quot;isc_tpb_lock_read, isc_tpb_protected/isc_tpb_exclusive&quot;;\n\t\tbreak;\n\tcase LCK_SW:\n\t\ttypestr = &quot;isc_tpb_lock_write, isc_tpb_shared&quot;;\n\t\tbreak;\n\tcase LCK_EX:\n\t\ttypestr = &quot;isc_tpb_lock_write, isc_tpb_protected/isc_tpb_exclusive&quot;;\n\t\tbreak;\n\t}\n\treturn typestr;\n}\n\n\nstatic ULONG inventory_page(thread_db* tdbb, ULONG sequence)\n{\n/**************************************\n *\n *\ti n v e n t o r y _ p a g e\n *\n **************************************\n *\n * Functional description\n *\tGet the physical page number of the n-th transaction inventory\n *\tpage. If not found, try to reconstruct using sibling pointer\n *\tfrom last known TIP page.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tif (const ULONG pageno = dbb-&gt;getKnownPage(pag_transactions, sequence))\n\t\treturn pageno;\n\n\twhile (sequence &gt;= dbb-&gt;getKnownPagesCount(pag_transactions))\n\t{\n\t\tDPM_scan_pages(tdbb);\n\n\t\tconst ULONG tipCount = dbb-&gt;getKnownPagesCount(pag_transactions);\n\t\tif (sequence &lt; tipCount)\n\t\t\tbreak;\n\n\t\tif (!tipCount)\n\t\t\tBUGCHECK(165);\t\t// msg 165 cannot find tip page\n\n\t\tWIN window(DB_PAGE_SPACE, dbb-&gt;getKnownPage(pag_transactions, tipCount - 1));\n\t\ttx_inv_page* tip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_read, pag_transactions);\n\t\tconst ULONG next = tip-&gt;tip_next;\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\tif (!(window.win_page = next))\n\t\t\tBUGCHECK(165);\t\t// msg 165 cannot find tip page\n\n\t\t// Type check it\n\t\ttip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_read, pag_transactions);\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\tDPM_pages(tdbb, 0, pag_transactions, tipCount, window.win_page.getPageNum());\n\t}\n\n\treturn dbb-&gt;getKnownPage(pag_transactions, sequence);\n}\n\n\nstatic int limbo_transaction(thread_db* tdbb, TraNumber id)\n{\n/**************************************\n *\n *\tl i m b o _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\n *\tlimbo_state is called when reconnecting\n *\tto an existing transaction to assure that\n *\tthe transaction is actually in limbo.\n *\tIt returns the transaction state.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tconst ULONG trans_per_tip = dbb-&gt;dbb_page_manager.transPerTIP;\n\n\tconst ULONG page = id / trans_per_tip;\n\tconst ULONG number = id % trans_per_tip;\n\n\tWIN window(DB_PAGE_SPACE, -1);\n\tconst tx_inv_page* tip = fetch_inventory_page(tdbb, &amp;window, page, LCK_write);\n\n\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\tconst UCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\tconst USHORT shift = TRANS_SHIFT(number);\n\tconst int state = (*byte &gt;&gt; shift) &amp; TRA_MASK;\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\treturn state;\n}\n\n\nvoid jrd_tra::unlinkFromAttachment()\n{\n\tfor (jrd_tra** ptr = &amp;tra_attachment-&gt;att_transactions; *ptr; ptr = &amp;(*ptr)-&gt;tra_next)\n\t{\n\t\tif (*ptr == this)\n\t\t{\n\t\t\t*ptr = tra_next;\n\t\t\treturn;\n\t\t}\n\t}\n\n\ttra_abort(&quot;transaction to unlink is missing in the attachment&quot;);\n}\n\n\nvoid jrd_tra::linkToAttachment(Attachment* attachment)\n{\n/**************************************\n *\n *\tl i n k _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\tLink transaction block into database attachment.\n *\n **************************************/\n\ttra_next = attachment-&gt;att_transactions;\n\tattachment-&gt;att_transactions = this;\n}\n\n\nvoid jrd_tra::tra_abort(const char* reason)\n{\n\tstring buff;\n\tbuff.printf(&quot;Failure working with transactions list: %s&quot;, reason);\n\tSyslog::Record(Syslog::Error, buff.c_str());\n\tgds__log(buff.c_str());\n#ifdef DEV_BUILD\n\tabort();\n#endif\n}\n\n\nstatic void release_temp_tables(thread_db* tdbb, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tr e l e a s e _ t e m p _ t a b l e s\n *\n **************************************\n *\n * Functional description\n *\tRelease data of temporary tables with transaction lifetime\n *\n **************************************/\n\tAttachment* att = tdbb-&gt;getAttachment();\n\tvec&lt;jrd_rel*&gt;&amp; rels = *att-&gt;att_relations;\n\n\tfor (FB_SIZE_T i = 0; i &lt; rels.count(); i++)\n\t{\n\t\tjrd_rel* relation = rels[i];\n\n\t\tif (relation &amp;&amp; (relation-&gt;rel_flags &amp; REL_temp_tran))\n\t\t\trelation-&gt;delPages(tdbb, transaction-&gt;tra_number);\n\t}\n}\n\n\nstatic void retain_temp_tables(thread_db* tdbb, jrd_tra* transaction, TraNumber new_number)\n{\n/**************************************\n *\n *\tr e t a i n _ t e m p _ t a b l e s\n *\n **************************************\n *\n * Functional description\n *\tReassign instance of temporary tables with transaction lifetime to the new\n *  transaction number (see retain_context).\n *\n **************************************/\n\tAttachment* att = tdbb-&gt;getAttachment();\n\tvec&lt;jrd_rel*&gt;&amp; rels = *att-&gt;att_relations;\n\n\tfor (FB_SIZE_T i = 0; i &lt; rels.count(); i++)\n\t{\n\t\tjrd_rel* relation = rels[i];\n\n\t\tif (relation &amp;&amp; (relation-&gt;rel_flags &amp; REL_temp_tran))\n\t\t\trelation-&gt;retainPages(tdbb, transaction-&gt;tra_number, new_number);\n\t}\n}\n\n\nstatic void restart_requests(thread_db* tdbb, jrd_tra* trans)\n{\n/**************************************\n *\n *\tr e s t a r t _ r e q u e s t s\n *\n **************************************\n *\n * Functional description\n *\tRestart all requests in the current\n *\tattachment to utilize the passed\n *\ttransaction.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tfor (Request** i = trans-&gt;tra_attachment-&gt;att_requests.begin();\n\t\t i != trans-&gt;tra_attachment-&gt;att_requests.end();\n\t\t ++i)\n\t{\n\t\tArray&lt;Request*&gt;&amp; requests = (*i)-&gt;getStatement()-&gt;requests;\n\n\t\tfor (Request** j = requests.begin(); j != requests.end(); ++j)\n\t\t{\n\t\t\tRequest* request = *j;\n\n\t\t\tif (request &amp;&amp; request-&gt;req_transaction)\n\t\t\t{\n\t\t\t\tEXE_unwind(tdbb, request);\n\t\t\t\tEXE_start(tdbb, request, trans);\n\t\t\t}\n\t\t}\n\t}\n}\n\n\nstatic void retain_context(thread_db* tdbb, jrd_tra* transaction, bool commit, int state)\n{\n/**************************************\n *\n *\tr e t a i n _ c o n t e x t\n *\n **************************************\n *\n * Functional description\n *\tIf &#x27;commit&#x27; flag is true, commit the transaction,\n *\telse rollback the transaction.\n *\n *\tCommit/rollback a transaction while preserving the\n *\tcontext, in particular, its snapshot. The\n *\ttrick is to insure that the transaction&#x27;s\n *\toldest active is seen by other transactions\n *\tsimultaneously starting up.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// All savepoints must already be released in TRA_commit/TRA_rollback\n\tfb_assert(!transaction-&gt;tra_save_point);\n\n\t// The new transaction needs to remember the &#x27;commit-retained&#x27; transaction\n\t// because it must see the operations of the &#x27;commit-retained&#x27; transaction and\n\t// its snapshot doesn&#x27;t contain these operations.\n\n\tif (commit)\n\t\tTBM_SET(tdbb-&gt;getDefaultPool(), &amp;transaction-&gt;tra_commit_sub_trans, transaction-&gt;tra_number);\n\n\t// Create a new transaction lock, inheriting oldest active from transaction being committed.\n\n\tWIN window(DB_PAGE_SPACE, -1);\n\tTraNumber new_number;\n#ifdef SUPERSERVER_V2\n\tnew_number = bump_transaction_id(tdbb, &amp;window);\n#else\n\tif (dbb-&gt;readOnly())\n\t\tnew_number = dbb-&gt;generateTransactionId();\n\telse\n\t{\n\t\tconst bool dontWrite = (dbb-&gt;dbb_flags &amp; DBB_shared) &amp;&amp;\n\t\t\t(transaction-&gt;tra_flags &amp; TRA_readonly);\n\n\t\tconst auto header = bump_transaction_id(tdbb, &amp;window, dontWrite);\n\t\tnew_number = header-&gt;hdr_next_transaction;\n\t}\n#endif\n\n\tLock* new_lock = NULL;\n\tLock* old_lock = transaction-&gt;tra_lock;\n\tif (old_lock)\n\t{\n\t\tnew_lock = FB_NEW_RPT(*tdbb-&gt;getDefaultPool(), 0) Lock(tdbb, sizeof(TraNumber), LCK_tra);\n\t\tnew_lock-&gt;setKey(new_number);\n\t\tnew_lock-&gt;lck_data = transaction-&gt;tra_lock-&gt;lck_data;\n\n\t\tif (!LCK_lock(tdbb, new_lock, LCK_write, LCK_WAIT))\n\t\t{\n#ifndef SUPERSERVER_V2\n\t\t\tif (!dbb-&gt;readOnly())\n\t\t\t\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\t\t\tERR_post(Arg::Gds(isc_lock_conflict));\n\t\t}\n\t}\n\n#ifndef SUPERSERVER_V2\n\tif (!dbb-&gt;readOnly())\n\t\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\n\t// Update database notion of the youngest commit retaining\n\t// transaction before committing the first transaction. This\n\t// secures the original snapshot by insuring the oldest active\n\t// is seen by other transactions.\n\n\tconst TraNumber old_number = transaction-&gt;tra_number;\n\n\tif (!dbb-&gt;readOnly())\n\t{\n\t\tif (commit)\n\t\t\tREPL_trans_commit(tdbb, transaction);\n\t\telse\n\t\t\tREPL_trans_rollback(tdbb, transaction);\n\n\t\t// Set the state on the inventory page\n\t\tTRA_set_state(tdbb, transaction, old_number, state);\n\t}\n\n\tretain_temp_tables(tdbb, transaction, new_number);\n\n\ttransaction-&gt;tra_number = new_number;\n\n\t// Release transaction lock since it isn&#x27;t needed\n\t// anymore and the new one is already in place.\n\n\tif (old_lock)\n\t{\n\t\t++transaction-&gt;tra_use_count;\n\t\tLCK_release(tdbb, old_lock);\n\t\ttransaction-&gt;tra_lock = new_lock;\n\t\t--transaction-&gt;tra_use_count;\n\t\tdelete old_lock;\n\t}\n\n\t// Perform any post commit work OR delete entries from deferred list\n\n\tif (commit)\n\t\tDFW_perform_post_c t = true;\n\t\t\t\ttransaction-&gt;tra_snapshot_number = isc_portable_integer(tpb, len);\n\n\t\t\t\tif (transaction-&gt;tra_snapshot_number == 0)\n\t\t\t\t{\n\t\t\t\t\tERR_post(\n\t\t\t\t\t\tArg::Gds(isc_bad_tpb_content) &lt;&lt;\n\t\t\t\t\t\tArg::Str(option_name));\n\t\t\t\t}\n\n\t\t\t\ttpb += len;\n\t\t\t}\n\t\t\tbreak;\n\n\t\tdefault:\n\t\t\tERR_post(Arg::Gds(isc_bad_tpb_form));\n\t\t}\n\t}\n\n\tif (rec_version.isAssigned() &amp;&amp; !(transaction-&gt;tra_flags &amp; TRA_read_committed))\n\t{\n\t\tif (rec_version.asBool())\n\t\t{\n\t\t\tERR_post(Arg::Gds(isc_bad_tpb_content) &lt;&lt;\n\t\t\t\t\t Arg::Gds(isc_tpb_option_without_rc) &lt;&lt; Arg::Str(&quot;isc_tpb_rec_version&quot;));\n\t\t}\n\t\telse\n\t\t{\n\t\t\tERR_post(Arg::Gds(isc_bad_tpb_content) &lt;&lt;\n\t\t\t\t\t Arg::Gds(isc_tpb_option_without_rc) &lt;&lt; Arg::Str(&quot;isc_tpb_no_rec_version&quot;));\n\t\t}\n\t}\n\n\tif ((transaction-&gt;tra_flags &amp; TRA_read_committed) &amp;&amp; !(tdbb-&gt;tdbb_flags &amp; TDBB_sweeper))\n\t{\n\t\tif (tdbb-&gt;getDatabase()-&gt;dbb_config-&gt;getReadConsistency())\n\t\t\ttransaction-&gt;tra_flags |= TRA_read_consistency | TRA_rec_version;\n\t}\n\n\tif (transaction-&gt;tra_attachment-&gt;isGbak())\n\t\ttransaction-&gt;tra_flags |= TRA_no_blob_check;\n\n\t// If there aren&#x27;t any relation locks to seize, we&#x27;re done.\n\n\tvec&lt;Lock*&gt;* vector = transaction-&gt;tra_relation_locks;\n\tif (!vector)\n\t\treturn;\n\n\t// Try to seize all relation locks. If any can&#x27;t be seized, release all and try again.\n\n\tfor (ULONG id = 0; id &lt; vector-&gt;count(); id++)\n\t{\n\t\tLock* lock = (*vector)[id];\n\t\tif (!lock)\n\t\t\tcontinue;\n\n\t\tUSHORT level = lock-&gt;lck_logical;\n\n\t\tif (level == LCK_none || LCK_lock(tdbb, lock, level, transaction-&gt;getLockWait()))\n\t\t\tcontinue;\n\n\t\tfor (ULONG l = 0; l &lt; id; l++)\n\t\t{\n\t\t\tif ( (lock = (*vector)[l]) )\n\t\t\t{\n\t\t\t\tlevel = lock-&gt;lck_logical;\n\t\t\t\tLCK_release(tdbb, lock);\n\t\t\t\tlock-&gt;lck_logical = level;\n\t\t\t}\n\t\t}\n\n\t\tid = 0;\n\t\tERR_punt();\n\t}\n}\n\n\nstatic void transaction_start(thread_db* tdbb, jrd_tra* trans)\n{\n/**************************************\n *\n *\tt r a n s a c t i o n _ s t a r t\n *\n **************************************\n *\n * Functional description\n *\tStart a transaction.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\tJrd::Attachment* const attachment = tdbb-&gt;getAttachment();\n\tWIN window(DB_PAGE_SPACE, -1);\n\n\tLock* lock = FB_NEW_RPT(*tdbb-&gt;getDefaultPool(), 0) Lock(tdbb, sizeof(TraNumber), LCK_tra);\n\n\t// Read header page and allocate transaction number.  Since\n\t// the transaction inventory page was initialized to zero, it\n\t// transaction is automatically marked active.\n\n\tTraNumber oldest, number, active, oldest_active;\n\n#ifdef SUPERSERVER_V2\n\tnumber = bump_transaction_id(tdbb, &amp;window);\n\toldest = dbb-&gt;dbb_oldest_transaction;\n\tactive = MAX(dbb-&gt;dbb_oldest_active, dbb-&gt;dbb_oldest_transaction);\n\toldest_active = dbb-&gt;dbb_oldest_active;\n\n#else // SUPERSERVER_V2\n\tif (dbb-&gt;readOnly())\n\t{\n\t\tnumber = dbb-&gt;generateTransactionId();\n\t\toldest = dbb-&gt;dbb_oldest_transaction;\n\t\toldest_active = dbb-&gt;dbb_oldest_active;\n\t}\n\telse\n\t{\n\t\tconst bool dontWrite = (dbb-&gt;dbb_flags &amp; DBB_shared) &amp;&amp;\n\t\t\t(trans-&gt;tra_flags &amp; TRA_readonly);\n\n\t\tconst auto header = bump_transaction_id(tdbb, &amp;window, dontWrite);\n\t\tnumber = header-&gt;hdr_next_transaction;\n\t\toldest = header-&gt;hdr_oldest_transaction;\n\t\toldest_active = header-&gt;hdr_oldest_active;\n\t}\n\n\t// oldest (OIT) &gt; oldest_active (OAT) if OIT was advanced by sweep\n\t// and no transactions was started after the sweep starts\n\tactive = MAX(oldest_active, oldest);\n\n#endif // SUPERSERVER_V2\n\n\t// Allocate pool and transactions block.  Since, by policy,\n\t// all transactions older than the oldest are either committed\n\t// or cleaned up, they can be all considered as committed.  To\n\t// make everything simpler, round down the oldest to a multiple\n\t// of four, which puts the transaction on a byte boundary.\n\n\ttrans-&gt;tra_number = number;\n\ttrans-&gt;tra_initial_number = number;\n\ttrans-&gt;tra_top = number;\n\ttrans-&gt;tra_oldest = oldest;\n\ttrans-&gt;tra_oldest_active = active;\n\n\ttrans-&gt;tra_lock = lock;\n\tlock-&gt;setKey(number);\n\n\t// Put the TID of the oldest active transaction (from the header page)\n\t// in the new transaction&#x27;s lock.\n\t// hvlad: it is important to put transaction number for read-committed\n\t// transaction instead of oldest active to correctly calculate new oldest\n\t// active value (look at call to LCK_query_data below which will take into\n\t// account this new lock too)\n\n\tlock-&gt;lck_data = ((trans-&gt;tra_flags &amp; TRA_read_committed) &amp;&amp;\n\t\t!(trans-&gt;tra_flags &amp; TRA_read_consistency)) ? number : active;\n\tlock-&gt;lck_object = trans;\n\n\tif (!LCK_lock(tdbb, lock, LCK_write, LCK_WAIT))\n\t{\n#ifndef SUPERSERVER_V2\n\t\tif (!dbb-&gt;readOnly())\n\t\t\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\t\tERR_post(Arg::Gds(isc_lock_conflict));\n\t}\n\n\t// Link the transaction to the attachment block before releasing\n\t// header page for handling signals.\n\n\ttrans-&gt;linkToAttachment(attachment);\n\n\ttry\n\t{\n#ifndef SUPERSERVER_V2\n\t\tif (!dbb-&gt;readOnly())\n\t\t\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\n\t\tif (dbb-&gt;readOnly())\n\t\t{\n\t\t\t// Set transaction flags to TRA_precommitted, TRA_readonly\n\t\t\ttrans-&gt;tra_flags |= (TRA_readonly | TRA_precommitted);\n\t\t}\n\n\t\t// Next, take a snapshot of all transactions between the oldest interesting\n\t\t// transaction and the current.  Don&#x27;t bother to get a snapshot for\n\t\t// read-committed transactions; they use the snapshot off the dbb block\n\t\t// since they need to know what is currently committed.\n\n\t\tif (!(trans-&gt;tra_flags &amp; TRA_read_committed))\n\t\t{\n\t\t\ttrans-&gt;tra_snapshot_handle = dbb-&gt;dbb_tip_cache-&gt;beginSnapshot(\n\t\t\t\ttdbb, attachment-&gt;att_attachment_id, trans-&gt;tra_snapshot_number);\n\t\t}\n\n\t\t// Next task is to find the oldest active transaction on the system.  This\n\t\t// is needed for garbage collection.  Things are made ever so slightly\n\t\t// more complicated by the fact that existing transaction may have oldest\n\t\t// actives older than they are.\n\n\t\tLock temp_lock(tdbb, sizeof(TraNumber), LCK_tra, trans);\n\n\t\ttrans-&gt;tra_oldest_active = number;\n\t\toldest_active = number;\n\t\tbool cleanup = !(number % TRA_ACTIVE_CLEANUP);\n\t\tint oldest_state;\n\n\t\tfor (; active &lt; number; active++)\n\t\t{\n\t\t\t//oldest_state = TPC_cache_state(tdbb, active);\n\t\t\tconst ULONG mask = (1 &lt;&lt; tra_active);\n\t\t\tactive = TPC_find_states(tdbb, active, number, mask, oldest_state);\n\t\t\tif (!active)\n\t\t\t{\n\t\t\t\tactive = number;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tfb_assert(oldest_state == tra_active);\n\n\t\t\tif (oldest_state == tra_active)\n\t\t\t{\n\t\t\t\ttemp_lock.setKey(active);\n\t\t\t\tTraNumber data = LCK_read_data(tdbb, &amp;temp_lock);\n\t\t\t\tif (!data)\n\t\t\t\t{\n\t\t\t\t\tif (cleanup)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (TRA_wait(tdbb, trans, active, jrd_tra::tra_no_wait) == tra_committed)\n\t\t\t\t\t\t\tcleanup = false;\n\t\t\t\t\t\tcontinue;\n\t\t\t\t\t}\n\n\t\t\t\t\tdata = active;\n\t\t\t\t}\n\n\t\t\t\toldest_active = active;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\t// Calculate attachment-local oldest active and oldest snapshot numbers\n\t\t// looking at current attachment&#x27;s transactions only. Calculated values\n\t\t// are used to determine garbage collection threshold for attachment-local\n\t\t// data such as temporary tables (GTT&#x27;s).\n\n\t\ttrans-&gt;tra_att_oldest_active = number;\n\t\tTraNumber att_oldest_active = number;\n\t\tTraNumber att_oldest_snapshot = number;\n\n\t\tfor Class* s_class = SCL_get_class(tdbb, security_name);\n\n\t\t\tif (!s_class)\n\t\t\t\treturn;\n\n\t\t\tswitch (s_class-&gt;scl_blb_access)\n\t\t\t{\n\t\t\tcase SecurityClass::BA_UNKNOWN:\n\t\t\t\t// Relation (or field) has not been checked for access rights\n\t\t\t\ttry\n\t\t\t\t{\n\t\t\t\t\tThreadStatusGuard status_vector(tdbb);\n\n\t\t\t\t\tSCL_check_schema(tdbb, blb_relation-&gt;rel_name.schema, SCL_usage);\n\n\t\t\t\t\tif (fld)\n\t\t\t\t\t{\n\t\t\t\t\t\tSCL_check_access(tdbb, s_class, 0, {}, SCL_select, obj_column,\n\t\t\t\t\t\t\tfalse, blb_relation-&gt;rel_name, fld-&gt;fld_name);\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t{\n\t\t\t\t\t\tSCL_check_access(tdbb, s_class, 0, {}, SCL_select, obj_relations,\n\t\t\t\t\t\t\tfalse, blb_relation-&gt;rel_name);\n\t\t\t\t\t}\n\n\t\t\t\t\ts_class-&gt;scl_blb_access = SecurityClass::BA_SUCCESS;\n\t\t\t\t}\n\t\t\t\tcatch (const Exception&amp; ex)\n\t\t\t\t{\n\t\t\t\t\tStaticStatusVector status;\n\t\t\t\t\tex.stuffException(status);\n\t\t\t\t\tif (status[1] != isc_no_priv)\n\t\t\t\t\t\tthrow;\n\n\t\t\t\t\t// We don&#x27;t have access to this relation\n\t\t\t\t\ts_class-&gt;scl_blb_access = SecurityClass::BA_FAILURE;\n\n\t\t\t\t\tif (punt)\n\t\t\t\t\t\tthrow;\n\n\t\t\t\t\t// but someone else has (SP, view)\n\t\t\t\t\t// store Blob ID as allowed in this transaction\n\t\t\t\t\ttra_fetched_blobs.add(*blob_id);\n\t\t\t\t}\n\t\t\t\tbreak;\n\n\t\t\tcase SecurityClass::BA_FAILURE:\n\t\t\t\t// Relation has been checked earlier and check was failed\n\t\t\t\tif (punt)\n\t\t\t\t{\n\t\t\t\t\tERR_post(Arg::Gds(isc_no_priv) &lt;&lt; Arg::Str(&quot;SELECT&quot;) &lt;&lt;\n\t\t\t\t\t\t(fld ? Arg::Str(&quot;COLUMN&quot;) : Arg::Str(&quot;TABLE&quot;)) &lt;&lt;\n\t\t\t\t\t\t(Arg::Str(fld ?\n\t\t\t\t\t\t\tfld-&gt;fld_name.toQuotedString().c_str() :\n\t\t\t\t\t\t\tblb_relation-&gt;rel_name.toQuotedString().c_str())));\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t\ttra_fetched_blobs.add(*blob_id);\n\t\t\t\tbreak;\n\n\t\t\tcase SecurityClass::BA_SUCCESS:\n\t\t\t\t// do nothing\n\t\t\t\tbreak;\n\n\t\t\tdefault:\n\t\t\t\tfb_assert(false);\n\t\t\t}\n\t\t}\n\t}\n}\n\n/// class TraceSweepEvent\n\nTraceSweepEvent::TraceSweepEvent(thread_db* tdbb)\n{\n\tm_tdbb = tdbb;\n\n\tWIN window(HEADER_PAGE_NUMBER);\n\tOds::header_page* header = (Ods::header_page*) CCH_FETCH(m_tdbb, &amp;window, LCK_read, pag_header);\n\n\tm_sweep_info.update(header);\n\tCCH_RELEASE(m_tdbb, &amp;window);\n\n\tAttachment* att = m_tdbb-&gt;getAttachment();\n\n\tgds__log(&quot;Sweep is started by %s\\n&quot;\n\t\t&quot;\\tDatabase \\&quot;%s\\&quot; \\n&quot;\n\t\t&quot;\\tOIT %&quot; SQUADFORMAT&quot;, OAT %&quot; SQUADFORMAT&quot;, OST %&quot; SQUADFORMAT&quot;, Next %&quot; SQUADFORMAT,\n\t\tatt-&gt;getUserName(&quot;&lt;Unknown user&gt;&quot;).c_str(),\n\t\tatt-&gt;att_filename.c_str(),\n\t\tm_sweep_info.getOIT(),\n\t\tm_sweep_info.getOAT(),\n\t\tm_sweep_info.getOST(),\n\t\tm_sweep_info.getNext());\n\n\tTraceManager* trace_mgr = att-&gt;att_trace_manager;\n\n\tm_start_clock = fb_utils::query_performance_counter();\n\tm_need_trace = trace_mgr-&gt;needs(ITraceFactory::TRACE_EVENT_SWEEP);\n\n\tif (!m_need_trace)\n\t\treturn;\n\n\tTraceConnectionImpl conn(att);\n\ttrace_mgr-&gt;event_sweep(&amp;conn, &amp;m_sweep_info, ITracePlugin::SWEEP_STATE_STARTED);\n}\n\n\nTraceSweepEvent::~TraceSweepEvent()\n{\n\tm_tdbb-&gt;setRequest(NULL);\n\treport(ITracePlugin::SWEEP_STATE_FAILED);\n}\n\n\nvoid TraceSweepEvent::beginSweepRelation(jrd_rel* relation)\n{\n\tif (!m_need_trace)\n\t\treturn;\n\n\tif (relation &amp;&amp; relation-&gt;rel_name.object.isEmpty())\n\t{\n\t\t// don&#x27;t accumulate per-relation stats for metadata query below\n\t\tMET_lookup_relation_id(m_tdbb, relation-&gt;rel_id, false);\n\t}\n\n\tm_relation_clock = fb_utils::query_performance_counter();\n\tm_base_stats.assign(m_tdbb-&gt;getTransaction()-&gt;tra_stats);\n}\n\n\nvoid TraceSweepEvent::endSweepRelation(jrd_rel* relation)\n{\n\tif (!m_need_trace)\n\t\treturn;\n\n\tAttachment* att = m_tdbb-&gt;getAttachment();\n\tjrd_tra* tran = m_tdbb-&gt;getTransaction();\n\n\t// don&#x27;t report empty relation\n\tif (m_base_stats.getValue(RuntimeStatistics::RECORD_SEQ_READS) ==\n\t\ttran-&gt;tra_stats.getValue(RuntimeStatistics::RECORD_SEQ_READS) &amp;&amp;\n\n\t\tm_base_stats.getValue(RuntimeStatistics::RECORD_BACKOUTS) ==\n\t\ttran-&gt;tra_stats.getValue(RuntimeStatistics::RECORD_BACKOUTS) &amp;&amp;\n\n\t\tm_base_stats.getValue(RuntimeStatistics::RECORD_PURGES) ==\n\t\ttran-&gt;tra_stats.getValue(RuntimeStatistics::RECORD_PURGES) &amp;&amp;\n\n\t\tm_base_stats.getValue(RuntimeStatistics::RECORD_EXPUNGES) ==\n\t\ttran-&gt;tra_stats.getValue(RuntimeStatistics::RECORD_EXPUNGES) )\n\t{\n\t\treturn;\n\t}\n\n\tTraceRuntimeStats stats(att, &amp;m_base_stats, &amp;tran-&gt;tra_stats,\n\t\tfb_utils::query_performance_counter() - m_relation_clock,\n\t\t0);\n\n\tm_sweep_info.setPerf(stats.getPerf());\n\n\tTraceConnectionImpl conn(att);\n\tTraceManager* trace_mgr = att-&gt;att_trace_manager;\n\ttrace_mgr-&gt;event_sweep(&amp;conn, &amp;m_sweep_info, ITracePlugin::SWEEP_STATE_PROGRESS);\n}\n\n\nvoid TraceSweepEvent::report(ntrace_process_state_t state)\n{\n\tAttachment* att = m_tdbb-&gt;getAttachment();\n\n\tconst SINT64 finiTime = fb_utils::query_performance_counter() - m_start_clock;\n\n\tif (state == ITracePlugin::SWEEP_STATE_FINISHED)\n\t{\n\t\tconst SINT64 timeMs = finiTime * 1000 / fb_utils::query_performance_frequency();\n\n\t\tgds__log(&quot;Sweep is finished\\n&quot;\n\t\t\t&quot;\\tDatabase \\&quot;%s\\&quot; \\n&quot;\n\t\t\t&quot;\\t%i workers, time %&quot; SLONGFORMAT &quot;.%03d sec \\n&quot;\n\t\t\t&quot;\\tOIT %&quot; SQUADFORMAT&quot;, OAT %&quot; SQUADFORMAT&quot;, OST %&quot; SQUADFORMAT&quot;, Next %&quot; SQUADFORMAT,\n\t\t\tatt-&gt;att_filename.c_str(),\n\t\t\tatt-&gt;att_parallel_workers,\n\t\t\t(int) timeMs / 1000, (unsigned int) timeMs % 1000,\n\t\t\tm_sweep_info.getOIT(),\n\t\t\tm_sweep_info.getOAT(),\n\t\t\tm_sweep_info.getOST(),\n\t\t\tm_sweep_info.getNext());\n\t}\n\n\tif (!m_need_trace)\n\t\treturn;\n\n\tDatabase* dbb = m_tdbb-&gt;getDatabase();\n\tTraceManager* trace_mgr = att-&gt;att_trace_manager;\n\n\tTraceConnectionImpl conn(att);\n\n\t// we need to compare stats against zero base\n\tif (state != ITracePlugin::SWEEP_STATE_PROGRESS)\n\t\tm_base_stats.reset();\n\n\tjrd_tra* tran = m_tdbb-&gt;getTransaction();\n\n\tTraceRuntimeStats stats(att, &amp;m_base_stats, &amp;att-&gt;att_stats, finiTime, 0);\n\n\tm_sweep_info.setPerf(stats.getPerf());\n\ttrace_mgr-&gt;event_sweep(&amp;conn, &amp;m_sweep_info, state);\n\n\tif (state == ITracePlugin::SWEEP_STATE_FAILED || state == ITracePlugin::SWEEP_STATE_FINISHED)\n\t\tm_need_trace = false;\n}\n\nSecDbContext::SecDbContext(IAttachment* a, ITransaction* t)\n\t: att(a), tra(t), savePoint(0)\n{ }\n\nSecDbContext::~SecDbContext()\n{\n\tLocalStatus ls;\n\tCheckStatusWrapper st(&amp;ls);\n\tif (tra)\n\t{\n\t\ttra-&gt;rollback(&amp;st);\n\t\ttra = NULL;\n\t}\n\tif (att)\n\t{\n\t\tatt-&gt;detach(&amp;st);\n\t\tatt = NULL;\n\t}\n}\n\nSecDbContext* jrd_tra::getSecDbContext()\n{\n\treturn tra_sec_db_context;\n}\n\nSecDbContext* jrd_tra::setSecDbContext(IAttachment* att, ITransaction* tra)\n{\n\tfb_assert(!tra_sec_db_context);\n\n\ttra_sec_db_context = FB_NEW_POOL(*getDefaultMemoryPool()) SecDbContext(att, tra);\n\treturn tra_sec_db_context;\n}\n\nvoid jrd_tra::eraseSecDbContext()\n{\n\tdelete tra_sec_db_context;\n\ttra_sec_db_context = NULL;\n}\n"}, "/build/src/jrd/trace/TraceJrdHelpers.h": {"id": "/build/src/jrd/trace/TraceJrdHelpers.h", "filePath": "src/jrd/trace/TraceJrdHelpers.h", "content": "/*\n *\tPROGRAM:\tFirebird Trace Services\n *\tMODULE:\t\tTraceJrdHelpers.h\n *\tDESCRIPTION:\tTrace API manager support\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ib start_clock, 0);\n\n\t\tTraceConnectionImpl conn(attachment);\n\t\tTraceTransactionImpl tran(m_transaction, stats.getPerf(), m_prevID);\n\n\t\tattachment-&gt;att_trace_manager-&gt;event_transaction_end(&amp;conn, &amp;tran, m_commit, m_retain, result);\n\t\tm_baseline = NULL;\n\t}\n\nprivate:\n\tbool m_need_trace;\n\tconst bool m_commit;\n\tconst bool m_retain;\n\tjrd_tra* const m_transaction;\n\tconst ISC_INT64 m_prevID;\n\tSINT64 m_start_clock;\n\tFirebird::AutoPtr&lt;RuntimeStatistics&gt; m_baseline;\n};\n\n\nclass TraceProcCompile\n{\npublic:\n\tTraceProcCompile(thread_db* tdbb, const Firebird::string&amp; name) :\n\t\tm_tdbb(tdbb), m_name(name)\n\t{\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\tm_need_trace = trace_mgr-&gt;needs(ITraceFactory::TRACE_EVENT_PROC_COMPILE);\n\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_start_clock = fb_utils::query_performance_counter();\n\t}\n\n\t~TraceProcCompile()\n\t{\n\t\tfinish(nullptr, ITracePlugin::RESULT_FAILED);\n\t}\n\n\tvoid finish(Statement* statement, ntrace_result_t result)\n\t{\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_need_trace = false;\n\n\t\tconst auto time = (fb_utils::query_performance_counter() - m_start_clock) * 1000 /\n\t\t\tfb_utils::query_performance_frequency();\n\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\n\t\tTraceConnectionImpl conn(attachment);\n\t\tTraceProcedureImpl proc(m_name, statement);\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\ttrace_mgr-&gt;event_proc_compile(&amp;conn, &amp;proc, time, result);\n\t}\n\nprivate:\n\tbool m_need_trace;\n\tthread_db* const m_tdbb;\n\tconst Firebird::string m_name;\n\tSINT64 m_start_clock;\n};\n\nclass TraceProcExecute\n{\npublic:\n\tTraceProcExecute(thread_db* tdbb, Request* request, Request* caller, const ValueListNode* inputs) :\n\t\tm_tdbb(tdbb),\n\t\tm_request(request)\n\t{\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\t\tconst auto transaction = m_tdbb-&gt;getTransaction();\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\tm_need_trace = trace_mgr-&gt;needs(ITraceFactory::TRACE_EVENT_PROC_EXECUTE);\n\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_request-&gt;req_proc_inputs = inputs;\n\t\tm_request-&gt;req_proc_caller = caller;\n\n\t\t{\t// scope\n\t\t\tTraceConnectionImpl conn(attachment);\n\t\t\tTraceTransactionImpl tran(transaction);\n\t\t\tTraceProcedureImpl proc(m_request, nullptr);\n\n\t\t\ttrace_mgr-&gt;event_proc_execute(&amp;conn, &amp;tran, &amp;proc, true, ITracePlugin::RESULT_SUCCESS);\n\t\t}\n\n\t\tm_start_clock = fb_utils::query_performance_counter();\n\n\t\tm_request-&gt;req_fetch_elapsed = 0;\n\t\tm_request-&gt;req_fetch_rowcount = 0;\n\t\tfb_assert(!m_request-&gt;req_fetch_baseline);\n\t\tm_request-&gt;req_fetch_baseline = NULL;\n\n\t\tMemoryPool* pool = m_request-&gt;req_pool;\n\t\tm_request-&gt;req_fetch_baseline = FB_NEW_POOL(*pool) RuntimeStatistics(*pool, m_request-&gt;req_stats);\n\t}\n\n\t~TraceProcExecute()\n\t{\n\t\tfinish(false, ITracePlugin::RESULT_FAILED);\n\t}\n\n\tvoid finish(bool have_cursor, ntrace_result_t result)\n\t{\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_need_trace = false;\n\n\t\tif (have_cursor)\n\t\t{\n\t\t\tm_request-&gt;req_fetch_elapsed = fb_utils::query_performance_counter() - m_start_clock;\n\t\t\treturn;\n\t\t}\n\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\t\tconst auto transaction = m_tdbb-&gt;getTransaction();\n\n\t\tTraceRuntimeStats stats(attachment, m_request-&gt;req_fetch_baseline, &amp;m_request-&gt;req_stats,\n\t\t\tfb_utils::query_performance_counter() - m_start_clock,\n\t\t\tm_request-&gt;req_fetch_rowcount);\n\n\t\tTraceConnectionImpl conn(attachment);\n\t\tTraceTransactionImpl tran(transaction);\n\t\tTraceProcedureImpl proc(m_request, stats.getPerf());\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\ttrace_mgr-&gt;event_proc_execute(&amp;conn, &amp;tran, &amp;proc, false, result);\n\n\t\tm_request-&gt;req_proc_inputs = nullptr;\n\t\tm_request-&gt;req_proc_caller = nullptr;\n\t\tm_request-&gt;req_fetch_baseline = nullptr;\n\t}\n\nprivate:\n\tbool m_need_trace;\n\tthread_db* const m_tdbb;\n\tRequest* const m_request;\n\tSINT64 m_start_clock;\n};\n\nclass TraceProcFetch\n{\npublic:\n\tTraceProcFetch(thread_db* tdbb, Request* request) :\n\t\tm_tdbb(tdbb),\n\t\tm_request(request)\n\t{\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\n\t\tm_need_trace = (request-&gt;req_flags &amp; req_proc_fetch) &amp;&amp;\n\t\t\ttrace_mgr-&gt;needs(ITraceFactory::TRACE_EVENT_PROC_EXECUTE);\n\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_start_clock = fb_utils::query_performance_counter();\n\t}\n\n\t~TraceProcFetch()\n\t{\n\t\tfetch(true, ITracePlugin::RESULT_FAILED);\n\t}\n\n\tvoid fetch(bool eof, ntrace_result_t result)\n\t{\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_need_trace = false;\n\n\t\tm_request-&gt;req_fetch_elapsed += fb_utils::query_performance_counter() - m_start_clock;\n\t\tif (!eof)\n\t\t{\n\t\t\tm_request-&gt;req_fetch_rowcount++;\n\t\t\treturn;\n\t\t}\n\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\t\tconst auto transaction = m_tdbb-&gt;getTransaction();\n\n\t\tTraceRuntimeStats stats(attachment, m_request-&gt;req_fetch_baseline, &amp;m_request-&gt;req_stats,\n\t\t\tm_request-&gt;req_fetch_elapsed, m_request-&gt;req_fetch_rowcount);\n\n\t\tTraceConnectionImpl conn(attachment);\n\t\tTraceTransactionImpl tran(transaction);\n\t\tTraceProcedureImpl proc(m_request, stats.getPerf());\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\ttrace_mgr-&gt;event_proc_execute(&amp;conn, &amp;tran, &amp;proc, false, result);\n\n\t\tm_request-&gt;req_proc_inputs = nullptr;\n\t\tm_request-&gt;req_proc_caller = nullptr;\n\t\tm_request-&gt;req_fetch_elapsed = 0;\n\t\tm_request-&gt;req_fetch_baseline = nullptr;\n\t}\n\nprivate:\n\tbool m_need_trace;\n\tthread_db* const m_tdbb;\n\tRequest* const m_request;\n\tSINT64 m_start_clock;\n};\n\n\nclass TraceFuncCompile\n{\npublic:\n\tTraceFuncCompile(thread_db* tdbb, const Firebird::string&amp; name) :\n\t\tm_tdbb(tdbb),\n\t\tm_name(name)\n\t{\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\tm_need_trace = trace_mgr-&gt;needs(ITraceFactory::TRACE_EVENT_FUNC_COMPILE);\n\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_start_clock = fb_utils::query_performance_counter();\n\t}\n\n\t~TraceFuncCompile()\n\t{\n\t\tfinish(nullptr, ITracePlugin::RESULT_FAILED);\n\t}\n\n\tvoid finish(Statement* statement, ntrace_result_t result)\n\t{\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\tm_need_trace = false;\n\n\t\tconst auto time = (fb_utils::query_performance_counter() - m_start_clock) * 1000 /\n\t\t\tfb_utils::query_performance_frequency();\n\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\n\t\tTraceConnectionImpl conn(attachment);\n\t\tTraceFunctionImpl func(m_name, statement);\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\ttrace_mgr-&gt;event_func_compile(&amp;conn, &amp;func, time, result);\n\t}\n\nprivate:\n\tbool m_need_trace;\n\tthread_db* const m_tdbb;\n\tconst Firebird::string m_name;\n\tSINT64 m_start_clock;\n};\n\nclass TraceFuncExecute\n{\npublic:\n\tTraceFuncExecute(thread_db* tdbb, Request* request, Request* caller,\n\t\t\t\t\t const UCHAR* inMsg, ULONG inMsgLength) :\n\t\tm_tdbb(tdbb),\n\t\tm_request(request),\n\t\tm_inMsg(inMsg),\n\t\tm_inMsgLength(inMsgLength)\n\t{\n\t\tconst auto attachment = m_tdbb-&gt;getAttachment();\n\t\tconst auto transaction = m_tdbb-&gt;getTransaction();\n\n\t\tconst auto trace_mgr = attachment-&gt;att_trace_manager;\n\t\tm_need_trace = trace_mgr-&gt;needs(ITraceFactory::TRACE_EVENT_FUNC_EXECUTE);\n\n\t\tif (!m_need_trace)\n\t\t\treturn;\n\n\t\t//m_request-&gt;req_proc_inputs = inputs;\n\t\tm_request-&gt;req_proc_calle t RegisterNode(std::initializer_list&lt;UCHAR&gt; blrList)\n\t{\n\t\tfor (const auto blr : blrList)\n\t\t\tPAR_register(blr, T::parse);\n\t}\n};\n\ntemplate &lt;typename T&gt;\nclass RegisterBoolNode\n{\npublic:\n\texplicit RegisterBoolNode(std::initializer_list&lt;UCHAR&gt; blrList)\n\t{\n\t\tfor (const auto blr : blrList)\n\t\t\tPAR_register(blr, T::parse);\n\t}\n};\n\n\nclass Node : public Printable\n{\npublic:\n\texplicit Node(MemoryPool&amp; pool)\n\t\t: line(0),\n\t\t  column(0)\n\t{\n\t}\n\n\tvirtual ~Node()\n\t{\n\t}\n\n\t// Compile a parsed statement into something more interesting.\n\ttemplate &lt;typename T&gt;\n\tstatic T* doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T&gt;&amp; node)\n\t{\n\t\tif (!node)\n\t\t\treturn NULL;\n\n\t\treturn node-&gt;dsqlPass(dsqlScratch);\n\t}\n\n\t// Compile a parsed statement into something more interesting and assign it to target.\n\ttemplate &lt;typename T1, typename T2&gt;\n\tstatic void doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T1&gt;&amp; target, NestConst&lt;T2&gt;&amp; node)\n\t{\n\t\tif (!node)\n\t\t\ttarget = NULL;\n\t\telse\n\t\t\ttarget = node-&gt;dsqlPass(dsqlScratch);\n\t}\n\n\t// Changes dsqlScratch-&gt;isPsql() value, calls doDsqlPass and restore dsqlScratch-&gt;isPsql().\n\ttemplate &lt;typename T&gt;\n\tstatic T* doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T&gt;&amp; node, bool psql)\n\t{\n\t\tPsqlChanger changer(dsqlScratch, psql);\n\t\treturn doDsqlPass(dsqlScratch, node);\n\t}\n\n\t// Changes dsqlScratch-&gt;isPsql() value, calls doDsqlPass and restore dsqlScratch-&gt;isPsql().\n\ttemplate &lt;typename T1, typename T2&gt;\n\tstatic void doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T1&gt;&amp; target, NestConst&lt;T2&gt;&amp; node, bool psql)\n\t{\n\t\tPsqlChanger changer(dsqlScratch, psql);\n\t\tdoDsqlPass(dsqlScratch, target, node);\n\t}\n\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override = 0;\n\n\tvirtual void getChildren(NodeRefsHolder&amp; holder, bool dsql) const\n\t{\n\t}\n\n\tvirtual Node* dsqlPass(DsqlCompilerScratch* /*dsqlScratch*/)\n\t{\n\t\treturn this;\n\t}\n\npublic:\n\tULONG line;\n\tULONG column;\n};\n\n\nclass DdlNode : public Node\n{\npublic:\n\texplicit DdlNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\n\tstatic void protectSystemSchema(const MetaName&amp; name, ObjectType objType)\n\t{\n\t\tif (name == SYSTEM_SCHEMA)\n\t\t{\n\t\t\tFirebird::status_exception::raise(\n\t\t\t\tFirebird::Arg::Gds(isc_dyn_cannot_mod_obj_sys_schema) &lt;&lt;\n\t\t\t\tgetObjectName(objType));\n\t\t}\n\t}\n\n\tstatic bool deleteSecurityClass(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst MetaName&amp; secClass);\n\n\tstatic void storePrivileges(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst QualifiedName&amp; name, int type, const char* privileges);\n\n\tstatic void deletePrivilegesByRelName(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst QualifiedName&amp; name, int type);\n\npublic:\n\t// Check permission on DDL operation. Return true if everything is OK.\n\t// Raise an exception for bad permission.\n\t// If returns false permissions will be check in old style at vio level as well as while direct RDB$ tables modify.\n\tvirtual void checkPermission(thread_db* tdbb, jrd_tra* transaction) = 0;\n\n\t// Set the scratch&#x27;s transaction when executing a node. Fact of accessing the scratch during\n\t// execution is a hack.\n\tvoid executeDdl(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction, bool trusted = false)\n\t{\n\t\t// dsqlScratch should be NULL with CREATE DATABASE.\n\t\tif (dsqlScratch)\n\t\t\tdsqlScratch-&gt;setTransaction(transaction);\n\n\t\tif (!trusted)\n\t\t\tcheckPermission(tdbb, transaction);\n\t\texecute(tdbb, dsqlScratch, transaction);\n\t}\n\n\tDdlNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tdsqlScratch-&gt;getDsqlStatement()-&gt;setType(DsqlStatement::TYPE_DDL);\n\t\treturn this;\n\t}\n\npublic:\n\tenum DdlTriggerWhen { DTW_BEFORE, DTW_AFTER };\n\n\tstatic void executeDdlTrigger(thread_db* tdbb, jrd_tra* transaction,\n\t\tDdlTriggerWhen when, int action, const QualifiedName&amp; objectName,\n\t\tconst QualifiedName&amp; oldNewObjectName, const Firebird::string&amp; sqlText);\n\nprotected:\n\ttypedef Firebird::Pair&lt;Firebird::Left&lt;MetaName, bid&gt; &gt; MetaNameBidPair;\n\ttypedef Firebird::GenericMap&lt;MetaNameBidPair&gt; MetaNameBidMap;\n\n\t// Return exception code based on combination of create and alter clauses.\n\tstatic ISC_STATUS createAlterCode(bool create, bool alter, ISC_STATUS createCode,\n\t\tISC_STATUS alterCode, ISC_STATUS createOrAlterCode)\n\t{\n\t\tif (create &amp;&amp; alter)\n\t\t\treturn createOrAlterCode;\n\n\t\tif (create)\n\t\t\treturn createCode;\n\n\t\tif (alter)\n\t\t\treturn alterCode;\n\n\t\tfb_assert(false);\n\t\treturn 0;\n\t}\n\n\tvoid executeDdlTrigger(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction,\n\t\tDdlTriggerWhen when, int action, const QualifiedName&amp; objectName,\n\t\tconst QualifiedName&amp; oldNewObjectName);\n\tvoid storeGlobalField(thread_db* tdbb, jrd_tra* transaction, QualifiedName&amp; name,\n\t\tconst TypeClause* field,\n\t\tconst Firebird::string&amp; computedSource = &quot;&quot;,\n\t\tconst BlrDebugWriter::BlrData&amp; computedValue = BlrDebugWriter::BlrData());\n\npublic:\n\t// Prefix DDL exceptions. To be implemented in each command.\n\t// Attention: do not store temp strings in Arg::StatusVector,\n\t// when needed keep them permanently in command&#x27;s node.\n\tvirtual void putErrorPrefix(Firebird::Arg::StatusVector&amp; statusVector) = 0;\n\n\tvirtual void execute(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction) = 0;\n\n\tvirtual bool mustBeReplicated() const\n\t{\n\t\treturn true;\n\t}\n};\n\n\nclass TransactionNode : public Node\n{\npublic:\n\texplicit TransactionNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\npublic:\n\tTransactionNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tNode::dsqlPass(dsqlScratch);\n\t\treturn this;\n\t}\n\n\tvirtual void execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** transaction) const = 0;\n};\n\n\nclass SessionManagementNode : public Node\n{\npublic:\n\texplicit SessionManagementNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\npublic:\n\tSessionManagementNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tNode::dsqlPass(dsqlScratch);\n\n\t\tdsqlScratch-&gt;getDsqlStatement()-&gt;setType(DsqlStatement::TYPE_SESSION_MANAGEMENT);\n\n\t\treturn this;\n\t}\n\n\tvirtual void execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** traHandle) const = 0;\n};\n\n\nclass DmlNode : public Node\n{\npublic:\n\t// DML node kinds\n\tenum Kind\n\t{\n\t\tKIND_STATEMENT,\n\t\tKIND_VALUE,\n\t\tKIND_BOOLEAN,\n\t\tKIND_REC_SOURCE,\n\t\tKIND_LIST\n\t};\n\n\texplicit DmlNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\n\t// Merge missing values, computed values, validation expressions, and views into a parsed request.\n\ttemplate &lt;typename T&gt; static void doPass1(thread_db* tdbb, CompilerScratch* csb, T** node)\n\t{\n\t\tif (!*node)\n\t\t\treturn;\n\n\t\t*node = (*node)-&gt;pass1(tdbb, csb);\n\t}\n\npublic:\n\tvirtual Kind getKind() = 0;\n\tvirtual void genBlr(DsqlCompilerScratch* dsqlScratch) = 0;\n\tvirtual DmlNode* pass1(thread_db* tdbb, CompilerScratch* csb) = 0;\n\tvirtual DmlNode* pass2(thread_db* tdbb, CompilerScratch* csb) = 0;\n\tvirtual DmlNode* copy(thread_db* tdbb, NodeCopier&amp; copier) const = 0;\n};\n\n\ntemplate &lt;typename T, typename T::Type typeConst&gt;\nclass TypedNode : public T\n{\npublic:\n\texplicit TypedNode(MemoryPool&amp; pool)\n\t\t: T(typeConst, pool)\n\t{\n\t}\n\npublic:\n\ttypename T::Type getType() const override\n\t{\n\t\treturn typeConst;\n\t}\n\npublic:\n\tconst static typename T::Type TYPE = typeConst;\n};\n\n\ntemplate &lt;typename To, typename From&gt; static To* nodeAs(From* fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;To*&gt;(fromNode) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static To* nodeAs(NestConst&lt;From&gt;&amp; fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;To*&gt;(fromNode.getObject()) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static const To* nodeAs(const From* fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;const To*&gt;(fromNode) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static const To* nodeAs(const NestConst&lt;From&gt;&amp; fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;const To*&gt;(fromNode.getObject()) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static bool nodeIs(const From* fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE;\n}\n\ntemplate &lt;typename To, typename From&gt; static bool nodeIs(const NestConst&lt;From&gt;&amp; fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE;\n}\n\n\nclass NodeRefsHolder : public Firebird::AutoStorage\n{\npublic:\n\tNodeRefsHolder()\n\t\t: refs(getPool())\n\t{\n\t}\n\n\texplicit NodeRefsHolder(MemoryPool&amp; pool)\n\t\t: AutoStorage(pool),\n\t\t  refs(pool)\n\t{\n\t}\n\n\ttemplate &lt;typename T&gt; void add(const NestConst&lt;T&gt;&amp; node)\n\t{\n\t\tstatic_assert(std::is_base_of&lt;ExprNode, T&gt;::value, &quot;T must be derived from ExprNode&quot;);\n\n\t\tstatic_assert(\n\t\t\tstd::is_convertible&lt;\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject())-&gt;pass1(\n\t\t\t\t\t(thread_db*) nullptr, (CompilerScratch*) nullptr)),\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject()))\n\t\t\t&gt;::value,\n\t\t\t&quot;pass1 problem&quot;);\n\n\t\tstatic_assert(\n\t\t\tstd::is_convertible&lt;\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject())-&gt;pass2(\n\t\t\t\t\t(thread_db*) nullptr, (CompilerScratch*) nullptr)),\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject()))\n\t\t\t&gt;::value,\n\t\t\t&quot;pass2 problem&quot;);\n\n\t\tstatic_assert(\n\t\t\tstd::is_convertible&lt;\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject())-&gt;dsqlFieldRemapper(*(FieldRemapper*) nullptr)),\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject()))\n\t\t\t&gt;::value,\n\t\t\t&quot;dsqlFieldRemapper problem&quot;);\n\n\t\tT** ptr = const_cast&lt;T**&gt; (node.getAddress());\n\t\tfb_assert(ptr);\n\n\t\trefs.add(reinterpret_cast&lt;ExprNode**&gt;(ptr));\n\t}\n\npublic:\n\tFirebird::HalfStaticArray&lt;ExprNode**, 8&gt; refs;\n};\n\n\nclass ExprNode : public DmlNode\n{\npublic:\n\tenum Type\n\t{\n\t\t// Value types\n\t\tTYPE_AGGREGATE,\n\t\tTYPE_ALIAS,\n\t\tTYPE_ARITHMETIC,\n\t\tTYPE_ARRAY,\n\t\tTYPE_AT,\n\t\tTYPE_BOOL_AS_VALUE,\n\t\tTYPE_CAST,\n\t\tTYPE_COALESCE,\n\t\tTYPE_COLLATE,\n\t\tTYPE_CONCATENATE,\n\t\tTYPE_CURRENT_DATE,\n\t\tTYPE_CURRENT_TIME,\n\t\tTYPE_CURRENT_TIMESTAMP,\n\t\tTYPE_CURRENT_ROLE,\n\t\tTYPE_CURRENT_SCHEMA,\n\t\tTYPE_CURRENT_USER,\n\t\tTYPE_DERIVED_EXPR,\n\t\tTYPE_DECODE,\n\t\tTYPE_DEFAULT,\n\t\tTYPE_DERIVED_FIELD,\n\t\tTYPE_DOMAIN_VALIDATION,\n\t\tTYPE_EXTRACT,\n\t\tTYPE_FIELD,\n\t\tTYPE_GEN_ID,\n\t\tTYPE_INTERNAL_INFO,\n\t\tTYPE_LITERAL,\n\t\tTYPE_LOCAL_TIME,\n\t\tTYPE_LOCAL_TIMESTAMP,\n\t\tTYPE_MAP,\n\t\tTYPE_NEGATE,\n\t\tTYPE_NULL,\n\t\tTYPE_ORDER,\n\t\tTYPE_OVER,\n\t\tTYPE_PARAMETER,\n\t\tTYPE_RECORD_KEY,\n\t\tTYPE_SCALAR,\n\t\tTYPE_STMT_EXPR,\n\t\tTYPE_STR_CASE,\n\t\tTYPE_STR_LEN,\n\t\tTYPE_SUBQUERY,\n\t\tTYPE_SUBSTRING,\n\t\tTYPE_SUBSTRING_SIMILAR,\n\t\tTYPE_SYSFUNC_CALL,\n\t\tTYPE_TRIM,\n\t\tTYPE_UDF_CALL,\n\t\tTYPE_VALUE_IF,\n\t\tTYPE_VARIABLE,\n\t\tTYPE_WINDOW_CLAUSE,\n\t\tTYPE_WINDOW_CLAUSE_FRAME,\n\t\tTYPE_WINDOW_CLAUSE_FRAME_EXTENT,\n\n\t\t// Bool types\n\t\tTYPE_BINARY_BOOL,\n\t\tTYPE_COMPARATIVE_BOOL,\n\t\tTYPE_MISSING_BOOL,\n\t\tTYPE_NOT_BOOL,\n\t\tTYPE_RSE_BOOL,\n\t\tTYPE_IN_LIST_BOOL,\n\n\t\t// RecordSource types\n\t\ {\n\t\tValueListNode* node = FB_NEW_POOL(*tdbb-&gt;getDefaultPool()) ValueListNode(*tdbb-&gt;getDefaultPool(),\n\t\t\titems.getCount());\n\n\t\tNestConst&lt;ValueExprNode&gt;* j = node-&gt;items.begin();\n\n\t\tfor (const NestConst&lt;ValueExprNode&gt;* i = items.begin(); i != items.end(); ++i, ++j)\n\t\t\t*j = copier.copy(tdbb, *i);\n\n\t\treturn node;\n\t}\n\npublic:\n\tNestValueArray items;\n\nprivate:\n\tstatic constexpr unsigned INITIAL_CAPACITY = 4;\n};\n\n// Container for a list of record source expressions.\nclass RecSourceListNode : public TypedNode&lt;ListExprNode, ExprNode::TYPE_REC_SOURCE_LIST&gt;\n{\npublic:\n\tRecSourceListNode(MemoryPool&amp; pool, unsigned count);\n\tRecSourceListNode(MemoryPool&amp; pool, RecordSourceNode* arg1);\n\n\tRecSourceListNode* add(RecordSourceNode* argn)\n\t{\n\t\titems.add(argn);\n\t\treturn this;\n\t}\n\n\tvoid getChildren(NodeRefsHolder&amp; holder, bool dsql) const override\n\t{\n\t\tListExprNode::getChildren(holder, dsql);\n\n\t\tfor (auto&amp; item : items)\n\t\t\tholder.add(item);\n\t}\n\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override;\n\n\tRecSourceListNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override;\n\n\tRecSourceListNode* dsqlFieldRemapper(FieldRemapper&amp; visitor) override\n\t{\n\t\tExprNode::dsqlFieldRemapper(visitor);\n\t\treturn this;\n\t}\n\n\tRecSourceListNode* pass1(thread_db* tdbb, CompilerScratch* csb) override\n\t{\n\t\tExprNode::pass1(tdbb, csb);\n\t\treturn this;\n\t}\n\n\tRecSourceListNode* pass2(thread_db* tdbb, CompilerScratch* csb) override\n\t{\n\t\tExprNode::pass2(tdbb, csb);\n\t\treturn this;\n\t}\n\n\tRecSourceListNode* copy(thread_db* tdbb, NodeCopier&amp; copier) const override\n\t{\n\t\tfb_assert(false);\n\t\treturn NULL;\n\t}\n\npublic:\n\tFirebird::Array&lt;NestConst&lt;RecordSourceNode&gt; &gt; items;\n};\n\n\nclass StmtNode : public DmlNode\n{\npublic:\n\tenum Type\n\t{\n\t\tTYPE_ASSIGNMENT,\n\t\tTYPE_BLOCK,\n\t\tTYPE_COMPOUND_STMT,\n\t\tTYPE_CONTINUE_LEAVE,\n\t\tTYPE_CURSOR_STMT,\n\t\tTYPE_DECLARE_CURSOR,\n\t\tTYPE_DECLARE_LOCAL_TABLE,\n\t\tTYPE_DECLARE_SUBFUNC,\n\t\tTYPE_DECLARE_SUBPROC,\n\t\tTYPE_DECLARE_VARIABLE,\n\t\tTYPE_ERASE,\n\t\tTYPE_ERROR_HANDLER,\n\t\tTYPE_EXCEPTION,\n\t\tTYPE_EXEC_BLOCK,\n\t\tTYPE_EXEC_PROCEDURE,\n\t\tTYPE_EXEC_STATEMENT,\n\t\tTYPE_EXIT,\n\t\tTYPE_IF,\n\t\tTYPE_IN_AUTO_TRANS,\n\t\tTYPE_INIT_VARIABLE,\n\t\tTYPE_FOR,\n\t\tTYPE_FOR_RANGE,\n\t\tTYPE_HANDLER,\n\t\tTYPE_LABEL,\n\t\tTYPE_LINE_COLUMN,\n\t\tTYPE_LOCAL_DECLARATIONS,\n\t\tTYPE_LOOP,\n\t\tTYPE_MERGE,\n\t\tTYPE_MERGE_SEND,\n\t\tTYPE_MESSAGE,\n\t\tTYPE_MODIFY,\n\t\tTYPE_OUTER_MAP,\n\t\tTYPE_POST_EVENT,\n\t\tTYPE_RECEIVE,\n\t\tTYPE_RETURN,\n\t\tTYPE_SAVEPOINT,\n\t\tTYPE_SELECT,\n\t\tTYPE_SELECT_MESSAGE,\n\t\tTYPE_SESSION_MANAGEMENT_WRAPPER,\n\t\tTYPE_SET_GENERATOR,\n\t\tTYPE_STALL,\n\t\tTYPE_STORE,\n\t\tTYPE_SUSPEND,\n\t\tTYPE_TRUNCATE_LOCAL_TABLE,\n\t\tTYPE_UPDATE_OR_INSERT,\n\n\t\tTYPE_EXT_INIT_PARAMETERS,\n\t\tTYPE_EXT_TRIGGER\n\t};\n\n\tenum WhichTrigger : UCHAR\n\t{\n\t\tALL_TRIGS = 0,\n\t\tPRE_TRIG = 1,\n\t\tPOST_TRIG = 2\n\t};\n\n\t// Marks used by EraseNode, ModifyNode, StoreNode and ForNode\n\tstatic constexpr unsigned MARK_POSITIONED\t\t= 0x01;\t// Erase|Modify node is positioned at explicit cursor\n\tstatic constexpr unsigned MARK_MERGE\t\t\t= 0x02;\t// node is part of MERGE statement\n\tstatic constexpr unsigned MARK_FOR_UPDATE\t\t= 0x04;\t// implicit cursor used in UPDATE\\DELETE\\MERGE statement\n\tstatic constexpr unsigned MARK_AVOID_COUNTERS\t= 0x08;\t// do not touch record counters\n\tstatic constexpr unsigned MARK_BULK_INSERT\t\t= 0x10; // StoreNode is used for bulk operation\n\n\tstruct ExeState\n\t{\n\t\tExeState(thread_db* tdbb, Request* request, jrd_tra* transaction)\n\t\t\t: savedTdbb(tdbb),\n\t\t\t  oldPool(tdbb-&gt;getDefaultPool()),\n\t\t\t  oldRequest(tdbb-&gt;getRequest()),\n\t\t\t  oldTransaction(tdbb-&gt;getTransaction())\n\t\t{\n\t\t\tsavedTdbb-&gt;setTransaction(transaction);\n\t\t\tsavedTdbb-&gt tatus_exception::raise(\n\t\t\tFirebird::Arg::Gds(isc_cannot_copy_stmt) &lt;&lt;\n\t\t\tFirebird::Arg::Num(int(getType())));\n\n\t\treturn NULL;\n\t}\n\n\tvirtual bool isProfileAware() const\n\t{\n\t\treturn true;\n\t}\n\n\tvirtual const StmtNode* execute(thread_db* tdbb, Request* request, ExeState* exeState) const = 0;\n\npublic:\n\tNestConst&lt;StmtNode&gt; parentStmt;\n\tULONG impureOffset;\t// Inpure offset from request block.\n\tbool hasLineColumn;\n};\n\n\n// Used to represent nodes that don&#x27;t have a specific BLR verb, i.e.,\n// do not use RegisterNode.\nclass DsqlOnlyStmtNode : public StmtNode\n{\npublic:\n\texplicit DsqlOnlyStmtNode(Type aType, MemoryPool&amp; pool)\n\t\t: StmtNode(aType, pool)\n\t{\n\t}\n\npublic:\n\tDsqlOnlyStmtNode* pass1(thread_db* /*tdbb*/, CompilerScratch* /*csb*/) override\n\t{\n\t\tfb_assert(false);\n\t\treturn this;\n\t}\n\n\tDsqlOnlyStmtNode* pass2(thread_db* /*tdbb*/, CompilerScratch* /*csb*/) override\n\t{\n\t\tfb_assert(false);\n\t\treturn this;\n\t}\n\n\tDsqlOnlyStmtNode* copy(thread_db* /*tdbb*/, NodeCopier&amp; /*copier*/) const override\n\t{\n\t\tfb_assert(false);\n\t\treturn NULL;\n\t}\n\n\tconst StmtNode* execute(thread_db* /*tdbb*/, Request* /*request*/, ExeState* /*exeState*/) const override\n\t{\n\t\tfb_assert(false);\n\t\treturn NULL;\n\t}\n};\n\n\nstruct ScaledNumber\n{\n\tFB_UINT64 number;\n\tSCHAR scale;\n\tbool hex;\n};\n\n\nclass RowsClause : public Printable\n{\npublic:\n\texplicit RowsClause(MemoryPool&amp; pool)\n\t\t: length(NULL),\n\t\t  skip(NULL)\n\t{\n\t}\n\npublic:\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override;\n\npublic:\n\tNestConst&lt;ValueExprNode&gt; length;\n\tNestConst&lt;ValueExprNode&gt; skip;\n};\n\n\nclass GeneratorItem : public Printable\n{\npublic:\n\tGeneratorItem(Firebird::MemoryPool&amp; pool, const QualifiedName&amp; name)\n\t\t: id(0), name(pool, name), secName(pool)\n\t{}\n\n\tGeneratorItem&amp; operator=(const GeneratorItem&amp; other)\n\t{\n\t\tid = other.id;\n\t\tname = other.name;\n\t\tsecName = other.secName;\n\t\treturn *this;\n\t}\n\npublic:\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override;\n\npublic:\n\tSLONG id;\n\tQualifiedName name;\n\tQualifiedName secName;\n};\n\ntypedef Firebird::Array&lt;StreamType&gt; StreamMap;\n\n// Copy sub expressions (including subqueries).\nclass SubExprNodeCopier : private StreamMap, public NodeCopier\n{\npublic:\n\tSubExprNodeCopier(Firebird::MemoryPool&amp; pool, CompilerScratch* aCsb)\n\t\t: NodeCopier(pool, aCsb, getBuffer(STREAM_MAP_LENGTH))\n\t{\n\t\t// Initialize the map so all streams initially resolve to the original number.\n\t\t// As soon as copy creates new streams, the map is being overwritten.\n\t\tfor (unsigned i = 0; i &lt; STREAM_MAP_LENGTH; ++i)\n\t\t\tremap[i] = i;\n\t}\n};\n\n\n} // namespace\n\n#endif // DSQL_NODES_H\n"}, "/build/src/jrd/req.h": {"id": "/build/src/jrd/req.h", "filePath": "src/jrd/req.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\treq.h\n *\tDESCRIPTION:\tRequest block definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.09.28 Dmitry Yemanov: Reworked internal_info stuff, enhanced\n *                            exception handling in SPs/triggers,\n *
