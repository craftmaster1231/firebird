 = (page-&gt;btr_level == 0);\n\n\t// Read node that need to be removed\n\tIndexNode removingNode;\n\tUCHAR* localPointer = removingNode.readNode(pointer, leafPage);\n\tconst USHORT offsetDeletePoint = (pointer - (UCHAR*) page);\n\n\t// Read the next node after the removing node\n\tIndexNode nextNode;\n\tconst USHORT offsetNextPoint = (localPointer - (UCHAR*) page);\n\tlocalPointer = nextNode.readNode(localPointer, leafPage);\n\n\t// Save data in tempKey so we can rebuild from it\n\tUSHORT newNextPrefix = nextNode.prefix;\n\tUSHORT newNextLength = 0;\n\tUSHORT length = MAX(removingNode.length + removingNode.prefix, nextNode.length + nextNode.prefix);\n\tHalfStaticArray&lt;UCHAR, MAX_KEY&gt; tempBuf;\n\tUCHAR* tempData = tempBuf.getBuffer(length);\n\tlength = 0;\n\tif (nextNode.prefix &gt; removingNode.prefix)\n\t{\n\t\t// The next node uses data from the node that is going to\n\t\t// be removed so save it.\n\t\tlength = nextNode.prefix - removingNode.prefix;\n\t\tnewNextPrefix -= length;\n\t\tnewNextLength += length;\n\t\tmemcpy(tempData, removingNode.data, length);\n\t}\n\tmemcpy(tempData + length, nextNode.data, nextNode.length);\n\tnewNextLength += nextNode.length;\n\n\t// Update the page prefix total.\n\tpage-&gt;btr_prefix_total -= (removingNode.prefix + (nextNode.prefix - newNextPrefix));\n\n\t// Update the next node so we are ready to save it.\n\tnextNode.prefix = newNextPrefix;\n\tnextNode.length = newNextLength;\n\tnextNode.data = tempData;\n\tpointer = nextNode.writeNode(pointer, leafPage);\n\t// below this point tempData contents is not used anymore and buffer may be reused\n\n\t// Compute length of rest of bucket and move it down.\n\tlength = page-&gt;btr_length - (localPointer - (UCHAR*) page);\n\tif (length)\n\t{\n\t\t// Could be overlapping buffers.\n\t\t// memmove() is guaranteed to work non-destructivly on overlapping buffers.\n\t\tmemmove(pointer, localPointer, length);\n\t\tpointer += length;\n\t\tlocalPointer += length;\n\t}\n\n\t// Set page size and get delta\n\tUSHORT delta = page-&gt;btr_length;\n\tpage-&gt;btr_length = pointer - (UCHAR*) page;\n\tdelta -= page-&gt;btr_length;\n\n\t// We use a fast approach here.\n\t// Only update offsets pointing after the deleted node and\n\t// remove jump nodes pointing to the deleted node or node\n\t// next to the deleted one.\n\tJumpNodeList tmpJumpNodes;\n\tJumpNodeList* jumpNodes = &amp;tmpJumpNodes;\n\n\tpointer = page-&gt;btr_nodes;\n\n\t// We are going to rebuild jump nodes. In the end of this process we will either have\n\t// the same jump nodes as before or one jump node less. The jump table size\n\t// by its definition is a good upper estimate for summary size of all existing\n\t// jump nodes data length&#x27;s.\n\t// After rebuild jump node next after removed one may have new length longer than\n\t// before rebuild but no longer than length of removed node. All other nodes didn&#x27;t\n\t// change its lengths. Therefore the jump table size is valid upper estimate\n\t// for summary size of all new jump nodes data length&#x27;s too.\n\ttempData = tempBuf.getBuffer(page-&gt;btr_jump_size);\n\tUCHAR* const tempEnd = tempBuf.end();\n\n\tbool rebuild = false;\n\tUCHAR n = page-&gt;btr_jump_count;\n\tIndexJumpNode jumpNode, delJumpNode;\n\tIndexJumpNode* jumpPrev = NULL;\n\ttemporary_key jumpKey;\n\tjumpKey.key_length = 0;\n\tUSHORT jumpersNewSize = 0;\n\n\twhile (n)\n\t{\n\t\tpointer = jumpNode.readJumpNode(pointer);\n\t\t// Jump nodes pointing to the deleted node are removed.\n\t\tif ((jumpNode.offset &lt; offsetDeletePoint) || (jumpNode.offset &gt;= offsetNextPoint))\n\t\t{\n\t\t\tIndexJumpNode newJumpNode;\n\t\t\tif (rebuild &amp;&amp; jumpNode.prefix &gt; delJumpNode.prefix)\n\t\t\t{\n\t\t\t\t// This node has prefix against a removing jump node\n\t\t\t\tconst USHORT addLength = jumpNode.prefix - delJumpNode.prefix;\n\t\t\t\tnewJumpNode.prefix = jumpNode.prefix - addLength;\n\t\t\t\tnewJumpNode.length = jumpNode.length + addLength;\n\t\t\t\tnewJumpNode.offset = jumpNode.offset;\n\n\t\t\t\tif (jumpNode.offset == offsetNextPoint)\n\t\t\t\t\tnewJumpNode.offset = offsetDeletePoint;\n\t\t\t\telse if (jumpNode.offset &gt; offsetDeletePoint)\n\t\t\t\t\tnewJumpNode.offset -= delta;\n\n\t\t\t\tnewJumpNode.data = tempData;\n\t\t\t\ttempData += newJumpNode.length;\n\t\t\t\tfb_assert(tempData &lt; tempEnd);\n\n\t\t\t\tmemcpy(newJumpNode.data, delJumpNode.data, addLength);\n\t\t\t\tmemcpy(newJumpNode.data + addLength, jumpNode.data, jumpNode.length);\n\t\t\t\t// update jump key data\n\t\t\t\tmemcpy(jumpKey.key_data + newJumpNode.prefix, newJumpNode.data, newJumpNode.length);\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tnewJumpNode.prefix = jumpNode.prefix;\n\t\t\t\tnewJumpNode.length = jumpNode.length;\n\t\t\t\tnewJumpNode.offset = jumpNode.offset;\n\t\t\t\tif (jumpNode.offset == offsetNextPoint)\n\t\t\t\t\tnewJumpNode.offset = offsetDeletePoint;\n\t\t\t\telse if (jumpNode.offset &gt; offsetDeletePoint)\n\t\t\t\t\tnewJumpNode.offset -= delta;\n\n\t\t\t\tnewJumpNode.data = tempData;\n\t\t\t\ttempData += newJumpNode.length;\n\t\t\t\tfb_assert(tempData &lt; tempEnd);\n\t\t\t\tmemcpy(newJumpNode.data, jumpNode.data, newJumpNode.length);\n\t\t\t}\n\n\t\t\t// There is no sense in jump node pointing to the first index node on page.\n\n\t\t\tif ((UCHAR*) page + newJumpNode.offset == page-&gt;btr_nodes + page-&gt;btr_jump_size)\n\t\t\t{\n\t\t\t\tfb_assert(!jumpPrev);\n\t\t\t\tdelJumpNode = jumpNode;\n\t\t\t\trebuild = true;\n\n\t\t\t\tmemcpy(jumpKey.key_data + jumpNode.prefix, jumpNode.data, jumpNode.length);\n\t\t\t\tjumpKey.key_length = jumpNode.prefix + jumpNode.length;\n\t\t\t\tn--;\n\t\t\t\ttempData = newJumpNode.data;\n\t\t\t\tcontinue;\n\t\t\t}\n\n\t\t\tIndexNode newNode;\n\t\t\tnewNode.readNode(newJumpNode.offset + (UCHAR*) page, leafPage);\n\t\t\tconst USHORT newPrefix = newNode.prefix;\n\n\t\t\t// We must enforce two conditions below:\n\t\t\t// newJumpNode.prefix + newJumpNode.length == newPrefix, and\n\t\t\t// jumpPrev != NULL : newJumpNode.prefix &lt;= jumpPrev-&gt;prefix + jumpPrev-&gt;length, or\n\t\t\t// jumpPrev == NULL : newJumpNode.prefix = 0 &amp;&amp; newJumpNode.length == newPrefix.\n\t\t\t// Also, if we know not all bytes in newPrefix, i.e. if\n\t\t\t// newPrefix &gt; newJumpNode.prefix + newJumpNode.length\n\t\t\t// then we shoud walk index nodes from previous jump point to the new one and\n\t\t\t// fill absent bytes in jumpKey\n\n\t\t\tif (newJumpNode.prefix + newJumpNode.length &gt; newPrefix)\n\t\t\t{\n\t\t\t\tif (newJumpNode.prefix &gt; newPrefix)\n\t\t\t\t{\n\t\t\t\t\tnewJumpNode.prefix = newPrefix;\n\t\t\t\t\tnewJumpNode.length = 0;\n\t\t\t\t}\n\t\t\t\telse // newJumpNode.prefix &lt;= newPrefix\n\t\t\t\t\tnewJumpNode.length = newPrefix - newJumpNode.prefix;\n\t\t\t}\n\n\t\t\tif (newJumpNode.prefix + newJumpNode.length &lt; newPrefix &amp;&amp;\n\t\t\t\tjumpPrev &amp;&amp;\n\t\t\t\tnewPrefix &lt;= jumpPrev-&gt;prefix + jumpPrev-&gt;length)\n\t\t\t{\n\t\t\t\tnewJumpNode.prefix = newPrefix;\n\t\t\t\tnewJumpNode.length = 0;\n\t\t\t}\n\n\t\t\tif ((newJumpNode.prefix + newJumpNode.length != newPrefix) ||\n\t\t\t\t(jumpPrev &amp;&amp; (newJumpNode.prefix &gt; jumpPrev-&gt;prefix + jumpPrev-&gt;length)))\n\t\t\t{\n\t\t\t\tUCHAR* prevPtr = page-&gt;btr_jump_size + page-&gt;btr_nodes;\n\t\t\t\tif (jumpPrev)\n\t\t\t\t{\n\t\t\t\t\tfb_assert(jumpKey.key_length &gt;= jumpPrev-&gt;prefix + jumpPrev-&gt;length);\n\n\t\t\t\t\tnewJumpNode.prefix = jumpPrev-&gt;prefix + jumpPrev-&gt;length;\n\t\t\t\t\tnewJumpNode.length = newPrefix - newJumpNode.prefix;\n\n\t\t\t\t\tprevPtr = jumpPrev-&gt;offset + (UCHAR*) page;\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tnewJumpNode.prefix = 0;\n\t\t\t\t\tnewJumpNode.length = newPrefix;\n\t\t\t\t}\n\n\t\t\t\tconst UCHAR* endPtr = newJumpNode.offset + (UCHAR*) page;\n\t\t\t\tIndexNode prevNode;\n\t\t\t\twhile (prevPtr &lt; endPtr)\n\t\t\t\t{\n\t\t\t\t\tprevPtr = prevNode.readNode(prevPtr, leafPage);\n\t\t\t\t\tif (prevNode.prefix &lt; newPrefix &amp;&amp; prevNode.length)\n\t\t\t\t\t{\n\t\t\t\t\t\tconst USHORT len = MIN(newPrefix - prevNode.prefix, prevNode.length);\n\t\t\t\t\t\tmemcpy(jumpKey.key_data + prevNode.prefix, prevNode.data, len);\n\t\t\t\t\t\tjumpKey.key_length = prevNode.prefix + len;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\tfb_assert(jumpKey.key_length &gt;= newPrefix);\n\t\t\t\tfb_assert(newJumpNode.data + newJumpNode.length &lt; tempEnd);\n\n\t\t\t\tmemcpy(newJumpNode.data, jumpKey.key_data + newJumpNode.prefix, newJumpNode.length);\n\t\t\t}\n\n\t\t\tmemcpy(jumpKey.key_data + newJumpNode.prefix, newJumpNode.data, newJumpNode.length);\n\t\t\tjumpKey.key_length = newJumpNode.prefix + newJumpNode.length;\n\n\t\t\tjumpersNewSize += newJumpNode.getJumpNodeSize();\n\t\t\tif (jumpersNewSize &gt; page-&gt;btr_jump_size)\n\t\t\t\tbreak;\n\n\t\t\tjumpNodes-&gt;add(newJumpNode);\n\t\t\tjumpPrev = &amp;jumpNodes-&gt;back();\n\t\t\trebuild = false;\n\n\t\t\ttempData = newJumpNode.data + newJumpNode.length;\n\t\t\tfb_assert(tempData &lt; tempEnd);\n\t\t}\n\t\telse\n\t\t{\n\t\t\tdelJumpNode = jumpNode;\n\t\t\trebuild = true;\n\t\t}\n\n\t\tn--;\n\t}\n\n\t// Update jump information\n\tpage-&gt;btr_jump_count = (UCHAR) jumpNodes-&gt;getCount();\n\n\t// Write jump nodes\n\tpointer = page-&gt;btr_nodes;\n\n\tIndexJumpNode* walkJumpNode = jumpNodes-&gt;begin();\n\tfor (size_t i = 0; i &lt; jumpNodes-&gt;getCount(); i++)\n\t\tpointer = walkJumpNode[i].writeJumpNode(pointer);\n\n\tjumpNodes-&gt;clear();\n\n\t// check to see if the page is now empty\n\tpointer = page-&gt;btr_nodes + page-&gt;btr_jump_size;\n\tIndexNode node;\n\tpointer = node.readNode(pointer, leafPage);\n\tif (node.isEndBucket || node.isEndLevel)\n\t\treturn contents_empty;\n\n\t// check to see if there is just one node\n\tpointer = node.readNode(pointer, leafPage);\n\tif (node.isEndBucket ||\tnode.isEndLevel)\n\t\treturn contents_single;\n\n\t// check to see if the size of the page is below the garbage collection threshold,\n\t// meaning below the size at which it should be merged with its left sibling if possible.\n\tif (page-&gt;btr_length &lt; GARBAGE_COLLECTION_BELOW_THRESHOLD)\n\t\treturn contents_below_threshold;\n\n\treturn contents_above_threshold;\n}\n\n\nstatic void delete_tree(thread_db* tdbb,\n\t\t\t\t\t\tUSHORT rel_id, USHORT idx_id, PageNumber next, PageNumber prior)\n{\n/**************************************\n *\n *\td e l e t e _ t r e e\n *\n **************************************\n *\n * Functional description\n *\tRelease index pages back to free list.\n *\n **************************************/\n\n\tSET_TDBB(tdbb);\n\tWIN window(next.getPageSpaceID(), -1);\n\twindow.win_flags = WIN_large_scan;\n\twindow.win_scans = 1;\n\n\tULONG down = next.getPageNum();\n\t// Delete the index tree from the top down.\n\twhile (next.getPageNum())\n\t{\n\t\twindow.win_page = next;\n\t\tbtree_page* page = (btree_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, 0);\n\n\t\t// do a little defensive programming--if any of these conditions\n\t\t// are true we have a damaged pointer, so just stop deleting. At\n\t\t// the same time, allow updates of indexes with id &gt; 255 even though\n\t\t// the page header uses a byte for its index id.  This requires relaxing\n\t\t// the check slightly introducing a risk that we&#x27;ll pick up a page belonging\n\t\t// to some other index that is ours +/- (256*n).  On the whole, unlikely.\n\t\tif (page-&gt;btr_header.pag_type != pag_index ||\n\t\t\tpage-&gt;btr_id != (UCHAR)(idx_id % 256) || page-&gt;btr_relation != rel_id)\n\t\t{\n\t\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\t\treturn;\n\t\t}\n\n\t\t// if we are at the beginning of a non-leaf level, position\n\t\t// &quot;down&quot; to the beginning of the next level down\n\t\tif (next.getPageNum() == down)\n\t\t{\n\t\t\tif (page-&gt;btr_level)\n\t\t\t{\n\t\t\t\tUCHAR* pointer = page-&gt;btr_nodes + page-&gt;btr_jump_size;\n\t\t\t\tIndexNode pageNode;\n\t\t\t\tpageNode.readNode(pointer, false);\n\t\t\t\tdown = pageNode.pageNumber;\n\t\t\t}\n\t\t\telse\n\t\t\t\tdown = 0;\n\t\t}\n\n\t\t// go through all the sibling pages on this level and release them\n\t\tnext = page-&gt;btr_sibling;\n\t\tCCH_RELEASE_TAIL(tdbb, &amp;window);\n\t\tPAG_release_page(tdbb, window.win_page, prior);\n\t\tprior = window.win_page;\n\n\t\t// if we are at end of level, go down to the next level\n\t\tif (!next.getPageNum())\n\t\t\tnext = down;\n\t}\n}\n\n\nstatic ULONG fast_load(thread_db* tdbb,\n\t\t\t\t\t   IndexCreation&amp; creation,\n\t\t\t\t\t   SelectivityList&amp; selectivity)\n{\n/**************************************\n *\n *\tf a s t _ l o a d\n *\n **************************************\n *\n * Functional description\n *\tDo a fast load.  The indices have already been passed into sort, and\n *\tare ripe for the plucking.  This beast is complicated, but, I hope,\n *\tcomprehendable.\n *\n **************************************/\n#ifdef DEBUG_BTR_PAGES\n\tTEXT debugtext[1024];\n#endif\n\n\tSET_TDBB(tdbb);\n\tconst Database* const dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tjrd_rel* const relation = creation.relation;\n\tindex_desc* const idx = creation.index;\n\tconst USHORT key_length = creation.key_length;\n\n\tconst USHORT pageSpaceID = relation-&gt;getPages(tdbb)-&gt;rel_pg_space_id;\n\n\t// leaf-page and pointer-page size limits, we always need to\n\t// leave room for the END_LEVEL node.\n\tconst USHORT lp_fill_limit = dbb-&gt;dbb_page_size - BTN_LEAF_SIZE;\n\tconst USHORT pp_fill_limit = dbb-&gt;dbb_page_size - BTN_PAGE_SIZE;\n\n\t// AB: Let&#x27;s try to determine to size between the jumps to speed up\n\t// index search. Of course the size depends on the key_length. The\n\t// bigger the key, the less jumps we can make. (Although we must\n\t// not forget that mostly the keys are compressed and much smaller\n\t// than the maximum possible key!).\n\t// These values can easily change without effect on previous created\n\t// indices, cause this value is stored on each page.\n\t// Remember, the lower the value how more jumpkeys are generated and\n\t// how faster jumpkeys are recalculated on insert.\n\n\tconst USHORT jumpAreaSize = 512 + ((int) sqrt((float) key_length) * 16);\n\n\t//  key_size  |  jumpAreaSize\n\t//  ----------+-----------------\n\t//         4  |    544\n\t//         8  |    557\n\t//        16  |    576\n\t//        64  |    640\n\t//       128  |    693\n\t//       256  |    768\n\n\tWIN* window = NULL;\n\tbool error = false;\n\tFB_UINT64 count = 0;\n\tFB_UINT64 duplicates = 0;\n\tconst bool unique = (idx-&gt;idx_flags &amp; idx_unique);\n\tconst bool descending = (idx-&gt;idx_flags &amp; idx_descending);\n\tconst ULONG segments = idx-&gt;idx_count;\n\n\t// hvlad: look at IDX_create_index for explanations about NULL indicator below\n\tconst int nullIndLen = !descending &amp;&amp; (idx-&gt;idx_count == 1) ? 1 : 0;\n\n\tMemoryPool&amp; pool = *tdbb-&gt;getDefaultPool();\n\n\tHalfStaticArray&lt;FB_UINT64, 4&gt; duplicatesList(pool);\n\tHalfStaticArray&lt;FastLoadLevel, 4&gt; levels(pool);\n\n\ttry\n\t{\n\t\tlevels.resize(1);\n\t\tFastLoadLevel* leafLevel = &amp;levels[0];\n\n\t\t// Initialize level\n\t\tleafLevel-&gt;window.win_page.setPageSpaceID(pageSpaceID);\n\n\t\t// Allocate and format the first leaf level bucket.  Awkwardly,\n\t\t// the bucket header has room for only a byte of index id and that&#x27;s\n\t\t// part of the ODS.  So, for now, we&#x27;ll just record the first byte\n\t\t// of the id and hope for the best.  Index buckets are (almost) always\n\t\t// located through the index structure (dmp being an exception used\n\t\t// only for debug) so the id is actually redundant.\n\t\tbtree_page* bucket = (btree_page*) DPM_allocate(tdbb, &amp;leafLevel-&gt;window);\n\t\tbucket-&gt;btr_header.pag_type = pag_index;\n\t\tbucket-&gt;btr_relation = relation-&gt;rel_id;\n\t\tbucket-&gt;btr_id = (UCHAR)(idx-&gt;idx_id % 256);\n\t\tbucket-&gt;btr_level = 0;\n\t\tbucket-&gt;btr_length = BTR_SIZE;\n\t\tbucket-&gt;btr_jump_interval = jumpAreaSize;\n\t\tbucket-&gt;btr_jump_size = 0;\n\t\tbucket-&gt;btr_jump_count = 0;\n\n#ifdef DEBUG_BTR_PAGES\n\t\tsnprintf(debugtext, sizeof(debugtext), &quot;\\t new page (%d)&quot;, windows[0].win_page);\n\t\tgds__log(debugtext);\n#endif\n\n\t\tUCHAR* pointer = bucket-&gt;btr_nodes;\n\n\t\tleafLevel-&gt;levelNode.setNode();\n\t\tleafLevel-&gt;jumpNodes = FB_NEW_POOL(pool) JumpNodeList(pool);\n\t\tleafLevel-&gt;newAreaPointer = pointer + jumpAreaSize;\n\n\t\ttdbb-&gt;tdbb_flags |= TDBB_no_cache_unwind;\n\n\t\tleafLevel-&gt;bucket = bucket;\n\n\t\tduplicatesList.grow(segments);\n\t\tmemset(duplicatesList.begin(), 0, segments * sizeof(FB_UINT64));\n\n\t\t// If there&#x27;s an error during index construction, fall\n\t\t// thru to release the last index bucket at each level\n\t\t// of the index. This will prepare for a single attempt\n\t\t// to deallocate the index pages for reuse.\n\t\tIndexNode newNode;\n\t\tIndexNode previousNode;\n\t\t// pointer holds the &quot;main&quot; pointer for inserting new nodes.\n\n\t\twin_for_array split_window;\n\t\tsplit_window.win_page.setPageSpaceID(pageSpaceID);\n\n\t\ttemporary_key split_key, temp_key;\n\t\tsplit_key.key_flags = 0;\n\t\tsplit_key.key_length = 0;\n\t\ttemp_key.key_flags = 0;\n\t\ttemp_key.key_length = 0;\n\t\tbool duplicate = false;\n\n\t\tIndexNode tempNode;\n\n\t\t// Detect the case when set of duplicate keys contains more then one key\n\t\t// from primary record version. It breaks the unique constraint and must\n\t\t// be rejected. Note, it is not always could be detected while sorting.\n\t\t// Set to true when primary record version is found in current set of\n\t\t// duplicate keys.\n\t\tbool primarySeen = false;\n\n\t\twhile (!error)\n\t\t{\n\t\t\t// Get the next record in sorted order.\n\n\t\t\tUCHAR* record;\n\t\t\tcreation.sort-&gt;get(tdbb, reinterpret_cast&lt;ULONG**&gt;(&amp;record));\n\n\t\t\tif (!record || creation.duplicates.value())\n\t\t\t\tbreak;\n\n\t\t\tindex_sort_record* isr = (index_sort_record*) (record + key_length);\n\t\t\tcount++;\n\t\t\trecord += nullIndLen;\n\n\t\t\tleafLevel = &amp;levels[0]; // reset after possible array reallocation\n\n\t\t\t// restore previous values\n\t\t\tbucket = leafLevel-&gt;bucket;\n\t\t\tleafLevel-&gt;splitPage = 0;\n\n\t\t\ttemporary_key* const leafKey = &amp;leafLevel-&gt;key;\n\t\t\tJumpNodeList* const leafJumpNodes = leafLevel-&gt;jumpNodes;\n\t\t\ttemporary_key* const leafJumpKey = &amp;leafLevel-&gt;jumpKey;\n\n\t\t\t// Compute the prefix as the length in common with the previous record&#x27;s key.\n\t\t\tUSHORT prefix =\n\t\t\t\tIndexNode::computePrefix(leafKey-&gt;key_data, leafKey-&gt;key_length, record, isr-&gt;isr_key_length);\n\n\t\t\t// set node values\n\t\t\tnewNode.setNode(prefix, isr-&gt;isr_key_length - prefix,\n\t\t\t\t\t\t    RecordNumber(isr-&gt;isr_record_number));\n\t\t\tnewNode.data = record + prefix;\n\n\t\t\t// If the length of the new node will cause us to overflow the bucket,\n\t\t\t// form a new bucket.\n\t\t\tif (bucket-&gt;btr_length + leafLevel-&gt;totalJumpSize +\n\t\t\t\tnewNode.getNodeSize(true) &gt; lp_fill_limit)\n\t\t\t{\n\t\t\t\t// mark the end of the previous page\n\t\t\t\tconst RecordNumber lastRecordNumber = previousNode.recordNumber;\n\t\t\t\tpreviousNode.readNode(previousNode.nodePointer, true);\n\t\t\t\tpreviousNode.setEndBucket();\n\t\t\t\tpointer = previousNode.writeNode(previousNode.nodePointer, true, false);\n\t\t\t\tbucket-&gt;btr_length = pointer - (UCHAR*) bucket;\n\n\t\t\t\tif (leafLevel-&gt;totalJumpSize)\n\t\t\t\t{\n\t\t\t\t\t// Slide down current nodes;\n\t\t\t\t\t// CVC: Warning, this may overlap. It seems better to use\n\t\t\t\t\t// memmove or to ensure manually that leafLevel-&gt;totalJumpSize &gt; l\n\t\t\t\t\t// Also, &quot;sliding down&quot; here is moving contents higher in memory.\n\t\t\t\t\tconst USHORT l = bucket-&gt;btr_length - BTR_SIZE;\n\t\t\t\t\tmemmove(bucket-&gt;btr_nodes + leafLevel-&gt;totalJumpSize, bucket-&gt;btr_nodes, l);\n\n\t\t\t\t\t// Update JumpInfo\n\t\t\t\t\tif (leafJumpNodes-&gt;getCount() &gt; MAX_UCHAR)\n\t\t\t\t\t\tBUGCHECK(205);\t// msg 205 index bucket overfilled\n\n\t\t\t\t\tbucket-&gt;btr_jump_interval = jumpAreaSize;\n\t\t\t\t\tbucket-&gt;btr_jump_size = leafLevel-&gt;totalJumpSize;\n\t\t\t\t\tbucket-&gt;btr_jump_count = (UCHAR) leafJumpNodes-&gt;getCount();\n\n\t\t\t\t\t// Write jumpnodes on page.\n\t\t\t\t\tpointer = bucket-&gt;btr_nodes;\n\t\t\t\t\tIndexJumpNode* walkJumpNode = leafJumpNodes-&gt;begin();\n\t\t\t\t\tfor (size_t i = 0; i &lt; leafJumpNodes-&gt;getCount(); i++)\n\t\t\t\t\t{\n\t\t\t\t\t\t// Update offset position first.\n\t\t\t\t\t\twalkJumpNode[i].offset += leafLevel-&gt;totalJumpSize;\n\t\t\t\t\t\tpointer = walkJumpNode[i].writeJumpNode(pointer);\n\t\t\t\t\t}\n\n\t\t\t\t\tbucket-&gt;btr_length += leafLevel-&gt;totalJumpSize;\n\t\t\t\t}\n\n\t\t\t\tif (bucket-&gt;btr_length &gt; dbb-&gt;dbb_page_size)\n\t\t\t\t\tBUGCHECK(205);\t// msg 205 index bucket overfilled\n\n\t\t\t\t// Allocate new bucket.\n\t\t\t\tbtree_page* split = (btree_page*) DPM_allocate(tdbb, &amp;split_window);\n\t\t\t\tbucket-&gt;btr_sibling = split_window.win_page.getPageNum();\n\t\t\t\tsplit-&gt;btr_left_sibling = leafLevel-&gt;window.win_page.getPageNum();\n\t\t\t\tsplit-&gt;btr_header.pag_type = pag_index;\n\t\t\t\tsplit-&gt;btr_relation = bucket-&gt;btr_relation;\n\t\t\t\tsplit-&gt;btr_level = bucket-&gt;btr_level;\n\t\t\t\tsplit-&gt;btr_id = bucket-&gt;btr_id;\n\t\t\t\tsplit-&gt;btr_jump_interval = bucket-&gt;btr_jump_interval;\n\t\t\t\tsplit-&gt;btr_jump_size = 0;\n\t\t\t\tsplit-&gt;btr_jump_count = 0;\n\n#ifdef DEBUG_BTR_PAGES\n\t\t\t\tsnprintf(debugtext, sizeof(debugtext), &quot;\\t new page (%d), left page (%d)&quot;,\n\t\t\t\t\tsplit_window.win_page, split-&gt;btr_left_sibling);\n\t\t\t\tgds__log(debugtext);\n#endif\n\n\t\t\t\t// Reset position and size for generating jumpnode\n\t\t\t\tpointer = split-&gt;btr_nodes;\n\t\t\t\tleafLevel-&gt;newAreaPointer = pointer + jumpAreaSize;\n\t\t\t\tleafLevel-&gt;totalJumpSize = 0;\n\t\t\t\tleafJumpKey-&gt;key_length = 0;\n\n\t\t\t\t// store the first node on the split page\n\t\t\t\tIndexNode splitNode;\n\t\t\t\tsplitNode.setNode(0, leafKey-&gt;key_length, lastRecordNumber);\n\t\t\t\tsplitNode.data = leafKey-&gt;key_data;\n\t\t\t\tpointer = splitNode.writeNode(pointer, true);\n\t\t\t\tpreviousNode = splitNode;\n\n\t\t\t\t// save the page number of the previous page and release it\n\t\t\t\tleafLevel-&gt;splitPage = leafLevel-&gt;window.win_page.getPageNum();\n\t\t\t\tleafLevel-&gt;splitRecordNumber = splitNode.recordNumber;\n\t\t\t\tCCH_RELEASE(tdbb, &amp;leafLevel-&gt;window);\n\n#ifdef DEBUG_BTR_PAGES\n\t\t\t\tsnprintf(debugtext, sizeof(debugtext),\n\t\t\t\t\t&quot;\\t release page (%d), left page (%d), right page (%d)&quot;,\n\t\t\t\t\tleafLevel-&gt;window.win_page,\n\t\t\t\t\t((btr*) leafLevel-&gt;window.win_buffer)-&gt;btr_left_sibling,\n\t\t\t\t\t((btr*) leafLevel-&gt;window.win_buffer)-&gt;btr_sibling);\n\t\t\t\tgds__log(debugtext);\n#endif\n\n\t\t\t\t// set up the new page as the &quot;current&quot; page\n\t\t\t\tleafLevel-&gt;window = split_window;\n\t\t\t\tleafLevel-&gt;bucket = bucket = split;\n\n\t\t\t\t// save the first key on page as the page to be propagated\n\t\t\t\tcopy_key(leafKey, &amp;split_key);\n\n\t\t\t\t// Clear jumplist.\n\t\t\t\tIndexJumpNode* walkJumpNode = leafJumpNodes-&gt;begin();\n\t\t\t\tfor (size_t i = 0; i &lt; leafJumpNodes-&gt;getCount(); i++)\n\t\t\t\t\tdelete[] walkJumpNode[i].data;\n\n\t\t\t\tleafJumpNodes-&gt;clear();\n\t\t\t}\n\n\t\t\t// Insert the new node in the current bucket\n\t\t\tbucket-&gt;btr_prefix_total += prefix;\n\t\t\tpointer = newNode.writeNode(pointer, true);\n\t\t\tpreviousNode = newNode;\n\n\t\t\t// if we have a compound-index calculate duplicates per segment.\n\t\t\tif (segments &gt; 1 &amp;&amp; count &gt; 1)\n\t\t\t{\n\t\t\t\t// Initialize variables for segment duplicate check.\n\t\t\t\t// count holds the current checking segment (starting by\n\t\t\t\t// the maximum segment number to 1).\n\t\t\t\tconst UCHAR* p1 = leafKey-&gt;key_data;\n\t\t\t\tconst UCHAR* const p1_end = p1 + leafKey-&gt;key_length;\n\t\t\t\tconst UCHAR* p2 = newNode.data;\n\t\t\t\tconst UCHAR* const p2_end = p2 + newNode.length;\n\t\t\t\tSSHORT segment, stuff_count;\n\t\t\t\tif (newNode.prefix == 0)\n\t\t\t\t{\n\t\t\t\t\tsegment = *p2;\n\t\t\t\t\t//pos = 0;\n\t\t\t\t\tstuff_count = 0;\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tconst SSHORT pos = newNode.prefix;\n\t\t\t\t\t// find the segment number were we&#x27;re starting.\n\t\t\t\t\tconst SSHORT i = (pos / (STUFF_COUNT + 1)) * (STUFF_COUNT + 1);\n\t\t\t\t\tif (i == pos)\n\t\t\t\t\t{\n\t\t\t\t\t\t// We _should_ pick number from data if available\n\t\t\t\t\t\tsegment = *p2;\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t\tsegment = *(p1 + i);\n\n\t\t\t\t\t// update stuff_count to the current position.\n\t\t\t\t\tstuff_count = STUFF_COUNT + 1 - (pos - i);\n\t\t\t\t\tp1 += pos;\n\t\t\t\t}\n\n\t\t\t\t//Look for duplicates in the segments\n\t\t\t\twhile ((p1 &lt; p1_end) &amp;&amp; (p2 &lt; p2_end))\n\t\t\t\t{\n\t\t\t\t\tif (stuff_count == 0)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (*p1 != *p2)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\t// We&#x27;re done\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t\tsegment = *p2;\n\t\t\t\t\t\tp1++;\n\t\t\t\t\t\tp2++;\n\t\t\t\t\t\tstuff_count = STUFF_COUNT;\n\t\t\t\t\t}\n\n\t\t\t\t\tif (*p1 != *p2)\n\t\t\t\t\t{\n\t\t\t\t\t\t//We&#x27;re done\n\t\t\t\t\t\tbreak;\n\t\t\t\t\t}\n\n\t\t\t\t\tp1++;\n\t\t\t\t\tp2++;\n\t\t\t\t\tstuff_count--;\n\t\t\t\t}\n\n\t\t\t\t// For descending indexes the segment-number is also\n\t\t\t\t// complemented, thus reverse it back.\n\t\t\t\t// Note: values are complemented per UCHAR base.\n\t\t\t\tif (descending)\n\t\t\t\t\tsegment = (255 - segment);\n\n\t\t\t\tif ((p1 == p1_end) &amp;&amp; (p2 == p2_end))\n\t\t\t\t\tsegment = 0; // All segments are duplicates\n\n\t\t\t\tfor (ULONG i = segment + 1; i &lt;= segments; i++)\n\t\t\t\t\tduplicatesList[segments - i]++;\n\t\t\t}\n\n\t\t\t// check if this is a duplicate node\n\t\t\tduplicate = (!newNode.length &amp;&amp; prefix == leafKey-&gt;key_length);\n\t\t\tconst bool isPrimary = !(isr-&gt;isr_flags &amp; ISR_secondary);\n\t\t\tif (duplicate &amp;&amp; (count &gt; 1))\n\t\t\t{\n\t\t\t\t++duplicates;\n\t\t\t\tif (unique &amp;&amp; primarySeen &amp;&amp; isPrimary &amp;&amp; !(isr-&gt;isr_flags &amp; ISR_null))\n\t\t\t\t{\n\t\t\t\t\t++creation.duplicates;\n\t\t\t\t\tcreation.dup_recno = isr-&gt;isr_record_number;\n\t\t\t\t}\n\n\t\t\t\tif (isPrimary)\n\t\t\t\t\tprimarySeen = true;\n\t\t\t}\n\t\t\telse\n\t\t\t\tprimarySeen = isPrimary;\n\n\t\t\t// Update the length of the page.\n\t\t\tbucket-&gt;btr_length = pointer - (UCHAR*) bucket;\n\t\t\tif (bucket-&gt;btr_length &gt; dbb-&gt;dbb_page_size)\n\t\t\t\tBUGCHECK(205);\t// msg 205 index bucket overfilled\n\n\t\t\t// Remember the last key inserted to compress the next one.\n\t\t\tleafKey-&gt;key_length = isr-&gt;isr_key_length;\n\t\t\tmemcpy(leafKey-&gt;key_data, record, leafKey-&gt;key_length);\n\n\t\t\tif (leafLevel-&gt;newAreaPointer &lt; pointer)\n\t\t\t{\n\t\t\t\t// Create a jumpnode\n\t\t\t\tIndexJumpNode jumpNode;\n\t\t\t\tjumpNode.prefix = IndexNode::computePrefix(leafJumpKey-&gt;key_data,\n\t\t\t\t\tleafJumpKey-&gt;key_length, leafKey-&gt;key_data, newNode.prefix);\n\t\t\t\tjumpNode.length = newNode.prefix - jumpNode.prefix;\n\n\t\t\t\tconst USHORT jumpNodeSize = jumpNode.getJumpNodeSize();\n\t\t\t\t// Ensure the new jumpnode fits in the bucket\n\t\t\t\tif (bucket-&gt;btr_length + leafLevel-&gt;totalJumpSize + jumpNodeSize &lt; lp_fill_limit)\n\t\t\t\t{\n\t\t\t\t\t// Initialize the rest of the jumpnode\n\t\t\t\t\tjumpNode.offset = (newNode.nodePointer - (UCHAR*) bucket);\n\t\t\t\t\tjumpNode.data = FB_NEW_POOL(pool) UCHAR[jumpNode.length];\n\t\t\t\t\tmemcpy(jumpNode.data, leafKey-&gt;key_data + jumpNode.prefix, jumpNode.length);\n\t\t\t\t\t// Push node on end in list\n\t\t\t\t\tleafJumpNodes-&gt;add(jumpNode);\n\t\t\t\t\t// Store new data in leafJumpKey, so a new jump nod e;\n\t\t\tCCH_must_write(tdbb, &amp;window);\n\t\t\tCCH_RELEASE(tdbb, &amp;window);\n\n\t\t\tpageNumber = window.win_page.getPageNum();\n\t\t\tdbb-&gt;setKnownPage(pag_ids, sequence, pageNumber);\n\t\t\tDPM_pages(tdbb, 0, pag_ids, sequence, pageNumber);\n\t\t}\n\t}\n\n\twindow.win_page = pageNumber;\n\twindow.win_flags = 0;\n\n\t// As a special exception that allows physical backups for read-only replicas,\n\t// we allow to modify the RDB$BACKUP_HISTORY generator\n\tconst int BACKUP_HISTORY_GENERATOR = 9;\n\n\tconst bool isReadOnly = dbb-&gt;readOnly() ||\n\t\t(dbb-&gt;isReplica(REPLICA_READ_ONLY) &amp;&amp;\n\t\t!(tdbb-&gt;tdbb_flags &amp; TDBB_replicator) &amp;&amp;\n\t\tgenerator != BACKUP_HISTORY_GENERATOR);\n\n\tconst SSHORT lock_mode = isReadOnly ? LCK_read : LCK_write;\n\tgenerator_page* const page = (generator_page*) CCH_FETCH(tdbb, &amp;window, lock_mode, pag_ids);\n\n\t/*  If we are in ODS &gt;= 10, then we have a pointer to an int64 value in the\n\t *  generator page: if earlier than 10, it&#x27;s a pointer to a long value.\n\t *  Pick up the right kind of pointer, based on the ODS version.\n\t *  The conditions were commented out 1999-05-14 by ChrisJ, because we\n\t *  decided that the V6 engine would only access an ODS-10 database.\n\t *  (and uncommented 2000-05-05, also by ChrisJ, when minds changed.)\n\t */\n\tSINT64* const ptr = ((SINT64*) (page-&gt;gpg_values)) + offset;\n\n\tif (!val &amp;&amp; !initialize) // read-only case: zero increment\n\t{\n\t\tconst SINT64 value = *ptr;\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\treturn value;\n\t}\n\n\tif (dbb-&gt;readOnly())\n\t{\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\tERR_post(Arg::Gds(isc_read_only_database));\n\t}\n\telse if (isReadOnly)\n\t{\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\tERR_post(Arg::Gds(isc_read_only_trans));\n\t}\n\n\tCCH_MARK_SYSTEM(tdbb, &amp;window);\n\n\tif (initialize)\n\t\t*ptr = val;\n\telse\n\t\t*ptr += val;\n\n\tconst SINT64 value = *ptr;\n\n\tCCH_RELEASE(tdbb, &amp;window);\n\ ; ULONGFORMAT&quot;:%d transaction %&quot; ULONGFORMAT&quot; back %&quot;\n\t\tULONGFORMAT&quot;:%d fragment %&quot; ULONGFORMAT&quot;:%d flags %d\\n&quot;,\n\t\trpb-&gt;rpb_page, rpb-&gt;rpb_line, rpb-&gt;rpb_transaction_nr,\n\t\trpb-&gt;rpb_b_page, rpb-&gt;rpb_b_line, rpb-&gt;rpb_f_page,\n\t\trpb-&gt;rpb_f_line, rpb-&gt;rpb_flags);\n#endif\n\n\t// Mark the page as modified, then figure out the compressed length of the\n\t// replacement record.\n\n\tif (stack)\n\t{\n\t\twhile (stack-&gt;hasData())\n\t\t\tCCH_precedence(tdbb, &amp;rpb-&gt;getWindow(tdbb), stack-&gt;pop());\n\t}\n\n\tCCH_tra_precedence(tdbb, &amp;rpb-&gt;getWindow(tdbb), rpb-&gt;rpb_transaction_nr);\n\tCCH_MARK(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\tdata_page* page = (data_page*) rpb-&gt;getWindow(tdbb).win_buffer;\n\n\tCompressor dcc(tdbb, rpb-&gt;rpb_length, rpb-&gt;rpb_address);\n\tconst auto size = dcc.getPackedLength();\n\n\tconst ULONG header_size = (rpb-&gt;rpb_transaction_nr &gt; MAX_ULONG) ? RHDE_SIZE : RHD_SIZE;\n\n\t// It is critical that the record be padded, if necessary, to the length of\n\t// a fragmented record header.  Compute the amount of fill required.\n\n\tSLONG fill = (RHDF_SIZE - header_size) - size;\n\tif (fill &lt; 0)\n\t\tfill = 0;\n\n\t// Accommodate max record size i.e. 64K\n\tconst SLONG length = ROUNDUP(header_size + size + fill, ODS_ALIGNMENT);\n\tconst USHORT slot = rpb-&gt;rpb_line;\n\n\t// Find space on page\n\tUSHORT space = dbb-&gt;dbb_page_size;\n\tconst USHORT top = HIGH_WATER(page-&gt;dpg_count);\n\tSSHORT available = dbb-&gt;dbb_page_size - top;\n\tconst USHORT old_length = page-&gt;dpg_rpt[slot].dpg_length;\n\tpage-&gt;dpg_rpt[slot].dpg_length = 0;\n\n    const data_page::dpg_repeat* index = page-&gt;dpg_rpt;\n\tfor (const data_page::dpg_repeat* const end = index + page-&gt;dpg_count; index &lt; end; index++)\n\t{\n\t\tif (index-&gt;dpg_offset)\n\t\t{\n\t\t\tavailable -= ROUNDUP(index-&gt;dpg_length, ODS_ALIGNMENT);\n\t\t\tspace = MIN(space, index-&gt;dpg_off \tPAG_release_page(tdbb, PageNumber(page_space, *page1), ZERO_PAGE_NUMBER);\n\t}\n}\n\n\nstatic void fragment(thread_db* tdbb,\n\t\t\t\t\t record_param* rpb,\n\t\t\t\t\t SSHORT available_space,\n\t\t\t\t\t Compressor&amp; dcc,\n\t\t\t\t\t SSHORT length,\n\t\t\t\t\t const jrd_tra* transaction)\n{\n/**************************************\n *\n *\tf r a g m e n t\n *\n **************************************\n *\n * Functional description\n *\tDPM_update tried to replace a record on a page, but it doesn&#x27;t\n *\tfit.  The record, obviously, needs to be fragmented.  Stick as\n *\tmuch as fits on the page and put the rest elsewhere (though not\n *\tin that order.\n *\n *\tDoesn&#x27;t sound so bad does it?\n *\n *\tLittle do you know.  The challenge is that we have to put the\n *\thead of the record in the designated page:line space and put\n *\tthe tail on a different page.  To maintain on-disk consistency\n *\twe have to write the tail first.  But we don&#x27;t want anybody\n *\tmessing with the head until we get back, and, if possible, we&#x27;d\n *\tlike to keep as much space on the original page as we can get.\n *\tMaking matters worse, we may be storing a new version of the\n *\trecord or we may be backing out an old one and replacing it\n *\twith one older still (replacing a dead rolled back record with\n *\tthe preceding version).\n *\n *\tHere is the order of battle.   If we&#x27;re creating a new version,\n *\tand the previous version is not a delta, we compress the page\n *\tand create a new record which claims all the available space\n *\t(but which contains garbage).  That record will have our transaction\n *\tid (so it won&#x27;t be committed for anybody) and it will have legitimate\n *\tback pointers to the previous version.\n *\n *\tIf we&#x27;re creating a new version and the previous version is a delta,\n *\twe leave the current version in place, putting our transaction id\n *\ton it.  We then point the back pointers to the delta version of the\n *\ts page, rpb-&gt;rpb_b_line, rpb-&gt;rpb_f_page,\n\t\trpb-&gt;rpb_f_line, rpb-&gt;rpb_flags);\n#endif\n\n\t/* Start by claiming what space exists on the page.  Note that\n\t   DPM_update has already set the length for this record to zero,\n\t   so we&#x27;re all set for a compress. However, if the current\n\t   version was re-stored as a delta, or if we&#x27;re restoring an\n\t   older version, we must preserve it here so\n\t   that others may reconstruct it during fragmentation of the\n\t   new version. */\n\n\tWIN* window = &amp;rpb-&gt;getWindow(tdbb);\n\tdata_page* page = (data_page*) window-&gt;win_buffer;\n\tconst USHORT line = rpb-&gt;rpb_line;\n\n\trhdf* header;\n\tif (rpb-&gt;rpb_transaction_nr != transaction-&gt;tra_number)\n\t{\n\t\theader = (rhdf*) ((SCHAR *) page + page-&gt;dpg_rpt[line].dpg_offset);\n\t\tpage-&gt;dpg_rpt[line].dpg_length = available_space = length;\n\t}\n\telse\n\t{\n\t\tif (rpb-&gt;rpb_flags &amp; rpb_delta)\n\t\t{\n\t\t\theader = (rhdf*) ((SCHAR *) page + page-&gt;dpg_rpt[line].dpg_offset);\n\t\t\theader-&gt;rhdf_flags |= rpb_delta;\n\t\t\tpage-&gt;dpg_rpt[line].dpg_length = available_space = length;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tconst USHORT space = compress(tdbb, page) - available_space;\n\t\t\theader = (rhdf*) ((SCHAR *) page + space);\n\t\t\theader-&gt;rhdf_flags = rhd_deleted;\n\t\t\theader-&gt;rhdf_f_page = header-&gt;rhdf_f_line = 0;\n\n\t\t\tconst ULONG header_size = (transaction-&gt;tra_number &gt; MAX_ULONG) ? RHDE_SIZE : RHD_SIZE;\n\t\t\tOds::writeTraNum(header, transaction-&gt;tra_number, header_size);\n\n\t\t\tpage-&gt;dpg_rpt[line].dpg_offset = space;\n\t\t\tpage-&gt;dpg_rpt[line].dpg_length = available_space;\n\t\t}\n\n\t\theader-&gt;rhdf_b_page = rpb-&gt;rpb_b_page;\n\t\theader-&gt;rhdf_b_line = rpb-&gt;rpb_b_line;\n\t}\n\n\theader-&gt;rhdf_flags |= rhd_gc_active;\n\n\tAutoLock gcLockGuard(tdbb, lockGCActive(tdbb, transaction, rpb));\n\n#ifdef VIO_DEBUG\n\tVIO_trace(DEBUG_WRITES_INFO,\n\t\t&quot;    rhdf_transaction %&q  const Jrd::RecordStorageType type)\n{\n/**************************************\n *\n *\tf i n d _ s p a c e\n *\n **************************************\n *\n * Functional description\n *\tFind space of a given size on a data page.  If no space, return\n *\tnull.  If space is found, mark the page, set up the line field\n *\tin the record parameter block, set up the offset/length on the\n *\tdata page, and return a pointer to the space.\n *\n *\tTo maintain page precedence when objects point to objects, a stack\n *\tof pages of high precedence may be passed in.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tconst SSHORT aligned_size = ROUNDUP(size, ODS_ALIGNMENT);\n\tdata_page* page = (data_page*) rpb-&gt;getWindow(tdbb).win_buffer;\n\n\tif ((page-&gt;dpg_count &gt; 0) &amp;&amp; (type == DPM_primary) &amp;&amp; (page-&gt;dpg_header.pag_flags &amp; dpg_secondary))\n\t{\n\t\t// Attempt to put primary record on secondary data page - seems\n\t\t// flags on PP is not correct. Fix flags and let caller to find\n\t\t// space for record at another data page.\n\n\t\tmark_full(tdbb, rpb);\n\t\treturn NULL;\n\t}\n\n\t// Scan allocated lines looking for an empty slot, the high water mark,\n\t// and the amount of space potentially available on the page\n\n\tUSHORT space = dbb-&gt;dbb_page_size;\n\tUSHORT slot = 0;\n\tUSHORT used = HIGH_WATER(page-&gt;dpg_count);\n\n\t{ // scope\n\t\tconst bool reserving = !(dbb-&gt;dbb_flags &amp; DBB_no_reserve);\n\t\tconst data_page::dpg_repeat* index = page-&gt;dpg_rpt;\n\t\tfor (USHORT i = 0; i &lt; page-&gt;dpg_count; i++, index++)\n\t\t{\n\t\t\tif (index-&gt;dpg_offset)\n\t\t\t{\n\t\t\t\tspace = MIN(space, index-&gt;dpg_offset);\n\t\t\t\tused += ROUNDUP(index-&gt;dpg_length, ODS_ALIGNMENT);\n\t\t\t\tif (type == DPM_primary &amp;&amp; reserving)\n\t\t\t\t{\n\t\t\t\t\tconst rhd* header = (rhd*) ((SCHAR *) page + index-&gt;dpg_offset);\n\t\t\t\t\tif (!header- r having fetched the first page with an\n\t// exclusive latch, care has to be taken to prevent a deadlock.  This\n\t// is accomplished by timing out the second latch request and retrying\n\t// the whole thing.\n\n\tpointer_page* ppage = 0;\n\tdo {\n\t\tppage = get_pointer_page(tdbb, relation, relPages, &amp;pp_window, pp_sequence, LCK_write);\n\t\tif (!ppage)\n\t\t\tBUGCHECK(256);\t// msg 256 pointer page vanished from mark_full\n\n\t\t// If data page has been deleted from relation then there&#x27;s nothing left to do.\n\t\tif (slot &gt;= ppage-&gt;ppg_count ||\n\t\t\trpb-&gt;getWindow(tdbb).win_page.getPageNum() != ppage-&gt;ppg_page[slot])\n\t\t{\n\t\t\tCCH_RELEASE(tdbb, &amp;pp_window);\n\t\t\treturn;\n\t\t}\n\n\t\t// Fetch the data page, but timeout after 1 second to break a possible deadlock.\n\t\tdpage = (data_page*) CCH_FETCH_TIMEOUT(tdbb, &amp;rpb-&gt;getWindow(tdbb), LCK_read, pag_data, -1);\n\n\t\t// In case of a latch timeout, release the latch on the pointer page and retry.\n\t\tif (!dpage)\n\t\t\tCCH_RELEASE(tdbb, &amp;pp_window);\n\t} while (!dpage);\n\n\tconst UCHAR flags = dpage-&gt;dpg_header.pag_flags;\n\tconst bool dpEmpty = (dpage-&gt;dpg_count == 0);\n\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\n\t// page can&#x27;t be full and empty at the same time\n\tfb_assert(!(flags &amp; ppg_dp_full) || !dpEmpty);\n\n\t// Check if PP flags already equal to the DP flags\n\n\tUCHAR* byte = &amp;PPG_DP_BITS_BYTE((UCHAR*) &amp;ppage-&gt;ppg_page[dbb-&gt;dbb_dp_per_pp], slot);\n\n\tconst UCHAR bit_full_set  = ((*byte &amp; PPG_DP_BIT_MASK(slot, ppg_dp_full))  == 0) ? 0 : dpg_full;\n\tconst UCHAR bit_large_set = ((*byte &amp; PPG_DP_BIT_MASK(slot, ppg_dp_large)) == 0) ? 0 : dpg_large;\n\tconst UCHAR bit_swept_set = ((*byte &amp; PPG_DP_BIT_MASK(slot, ppg_dp_swept)) == 0) ? 0 : dpg_swept;\n\tconst UCHAR bit_scnd_set  = ((*byte &amp; PPG_DP_BIT_MASK(slot, ppg_dp_secondary)) == 0) ? 0 : dpg_secondary;\n\tconst bool bit_empty_set  = ((*byte &amp; PPG_DP_BIT_MASK(slot, ppg_dp_empty)) != 0);\n\n\tif ((flags &amp; (dpg_full | dpg_large | dpg_swept | dpg_secondary)) ==\n\t\t\t(bit_full_set | bit_large_set | bit_swept_set | bit_scnd_set) &amp;&amp;\n\t\t(dpEmpty == bit_empty_set))\n\t{\n\t\tCCH_RELEASE(tdbb, &amp;pp_window);\n\t\treturn;\n\t}\n\n\tCCH_precedence(tdbb, &amp;pp_window, rpb-&gt;getWindow(tdbb).win_page);\n\tCCH_MARK(tdbb, &amp;pp_window);\n\n\n\tUCHAR bit = PPG_DP_BIT_MASK(slot, ppg_dp_full);\n\tif (flags &amp; dpg_full)\n\t{\n\t\t*byte |= bit;\n\t\tif (slot == ppage-&gt;ppg_min_space)\n\t\t{\n\t\t\tconst UCHAR* bits = (UCHAR*) &amp;ppage-&gt;ppg_page[dbb-&gt;dbb_dp_per_pp];\n\t\t\twhile (ppage-&gt;ppg_min_space &lt; ppage-&gt;ppg_count)\n\t\t\t{\n\t\t\t\tppage-&gt;ppg_min_space++;\n\t\t\t\tif (!PPG_DP_BIT_TEST(bits, ppage-&gt;ppg_min_space, ppg_dp_full))\n\t\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\telse\n\t{\n\t\t*byte &amp;= ~bit;\n\t\tppage-&gt;ppg_min_space = MIN(slot, ppage-&gt;ppg_min_space);\n\n\t\tif (flags &amp; dpg_secondary)\n\t\t\trelPages-&gt;rel_sec_data_space = MIN(pp_sequence, relPages-&gt;rel_sec_data_space);\n\t\telse\n\t\t\trelPages-&gt;rel_pri_data_space = MIN(pp_sequence, relPages-&gt;rel_pri_data_space);\n\t}\n\n\tbit = PPG_DP_BIT_MASK(slot, ppg_dp_large);\n\tif (flags &amp; dpg_large)\n\t\t*byte |= bit;\n\telse\n\t\t*byte &amp;= ~bit;\n\n\tbit = PPG_DP_BIT_MASK(slot, ppg_dp_swept);\n\tif (flags &amp; dpg_swept)\n\t\t*byte |= bit;\n\telse\n\t\t*byte &amp;= ~bit;\n\n\tbit = PPG_DP_BIT_MASK(slot, ppg_dp_secondary);\n\tif (flags &amp; dpg_secondary)\n\t\t*byte |= bit;\n\telse\n\t\t*byte &amp;= ~bit;\n\n\tbit = PPG_DP_BIT_MASK(slot, ppg_dp_empty);\n\tif (dpEmpty)\n\t{\n\t\t*byte |= bit;\n\t\tppage-&gt;ppg_min_space = MIN(slot, ppage-&gt;ppg_min_space);\n\t\trelPages-&gt;rel_pri_data_space = MIN(pp_sequence, relPages-&gt;rel_pri_data_space);\n\t\trelPages-&gt;rel_sec_data_space = MIN(pp_sequence, relPages-&gt;rel_sec_data_space);\n\t}\n\telse\n\t\t*byte &amp;= ~bit;\n\n\tCCH_RELEASE(tdbb, &amp;pp_window);\n}\n\n\nstatic void store_big_record(thread_db* tdbb,\n\t\t\t\t\t\t\t record_param* rpb,\n\t\t\t\t\t\t\t PageStack&amp; stack,\n\t\t\t\t\t\t\t Compressor&amp; dcc,\n\t\t\t\t\t\t\t const Jrd::RecordStorageType type)\n{\n/**************************************\n *\n *\ts t o r e _ b i g _ r e c o r d\n *\n **************************************\n *\n * Functional description\n *\tStore a new record in a relation.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n#ifdef VIO_DEBUG\n\tjrd_rel* relation = rpb-&gt;rpb_relation;\n\tVIO_trace(DEBUG_TRACE_ALL,\n\t\t&quot;store_big_record (rel_id %u, record %&quot; SQUADFORMAT&quot;)\\n&quot;,\n\t\trelation-&gt;rel_id, rpb-&gt;rpb_number.getValue());\n#endif\n\n\t// Start compression from the end.\n\n\tconst UCHAR* in = rpb-&gt;rpb_address + rpb-&gt;rpb_length;\n\tRelationPages* relPages = rpb-&gt;rpb_relation-&gt;getPages(tdbb);\n\tPageNumber prior(relPages-&gt;rel_pg_space_id, 0);\n\n\t// The last fragment should have rhd header because rhd_incomplete flag won&#x27;t be set for it.\n\t// It&#x27;s important for get_header() function which relies on rhd_incomplete flag to determine header size.\n\tULONG header_size = RHD_SIZE;\n\tULONG max_data = dbb-&gt;dbb_page_size - sizeof(data_page) - header_size;\n\n\t// Fill up data pages tail first until what&#x27;s left fits on a single page.\n\n\tauto size = dcc.getPackedLength();\n\tfb_assert(size &gt; max_data);\n\n\tdo\n\t{\n\t\t// Allocate and format data page and fragment header\n\n\t\tdata_page* page = (data_page*) DPM_allocate(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\t\tpage-&gt;dpg_header.pag_type = pag_data;\n\t\tpage-&gt;dpg_header.pag_flags = dpg_orphan | dpg_full;\n\t\tpage-&gt;dpg_relation = rpb-&gt;rpb_relation-&gt;rel_id;\n\t\tpage-&gt;dpg_count = 1;\n\n\t\tconst auto inLength = dcc.truncateTail(max_data);\n\t\tin -= inLength;\n\t\tsize = dcc.getPackedLength();\n\n\t\tconst Compressor tailDcc(tdbb, inLength, in);\n\t\tconst auto tail_size = tailDcc.getPackedLength();\n\t\tfb_assert(tail_size &lt;= max_data);\n\n\t\t// Cast to (rhdf*) but use only rhd fields for the last fragment\n\t\trhdf* header = (rhdf*) &amp;page-&gt;dpg_rpt[1];\n\t\tpage-&gt;dpg_rpt[0].dpg_offset = (UCHAR*) header - (UCHAR*) page;\n\t\tpage-&gt;dpg_rpt[0].dpg_length = tail_size + header_size;\n\t\theader-&gt;rhdf_flags = rhd_fragment;\n\n\t\tif (prior.getPageNum())\n\t\t{\n\t\t\t// This is not the last fragment\n\t\t\theader-&gt;rhdf_flags |= rhd_incomplete;\n\t\t\theader-&gt;rhdf_f_page = prior.getPageNum();\n\t\t}\n\n\t\tif (!tailDcc.isPacked())\n\t\t\theader-&gt;rhdf_flags |= rhd_not_packed;\n\n\t\tconst auto out = (UCHAR*) header + header_size;\n\t\ttailDcc.pack(in, out);\n\n\t\tif (prior.getPageNum())\n\t\t\tCCH_precedence(tdbb, &amp;rpb-&gt;getWindow(tdbb), prior);\n\n#ifdef VIO_DEBUG\n\t\tVIO_trace(DEBUG_WRITES_INFO,\n\t\t\t&quot;    back portion\\n&quot;);\n\n\t\tVIO_trace(DEBUG_WRITES_INFO,\n\t\t\t&quot;    window page %&quot; ULONGFORMAT\n\t\t\t&quot;, max_data %d, \\n\\trhdf_flags %d, prior %&quot; ULONGFORMAT&quot;\\n&quot;,\n\t\t\trpb-&gt;getWindow(tdbb).win_page.getPageNum(), max_data, header-&gt;rhdf_flags,\n\t\t\tprior.getPageNum());\n#endif\n\n\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\t\tprior = rpb-&gt;getWindow(tdbb).win_page;\n\n\t\t// Other fragments except the last one should have rhdf header\n\t\theader_size = RHDF_SIZE;\n\t\tmax_data = dbb-&gt;dbb_page_size - sizeof(data_page) - header_size;\n\t} while (size &gt; max_data);\n\n\t// What&#x27;s left fits on a page. Store it somewhere.\n\n\tconst auto inLength = in - rpb-&gt;rpb_address;\n\n\tstack.push(prior);\n\n\trhdf* header = (rhdf*) locate_space(tdbb, rpb, (SSHORT) (RHDF_SIZE + size), stack, NULL, type);\n\n\trpb-&gt;rpb_flags &amp;= ~rpb_not_packed;\n\n\theader-&gt;rhdf_flags = rhd_incomplete | rhd_large | rpb-&gt;rpb_flags;\n\tOds::writeTraNum(header, rpb-&gt;rpb_transaction_nr, RHDF_SIZE);\n\theader-&gt;rhdf_format = rpb-&gt;rpb_format_number;\n\theader-&gt;rhdf_b_page = rpb-&gt;rpb_b_page;\n\theader-&gt;rhdf_b_line = rpb-&gt;rpb_b_line;\n\theader-&gt;rhdf_f_page = prior.getPageNum();\n\theader-&gt;rhdf_f_line = 0;\n\n\tif (!dcc.isPacked())\n\t\theader-&gt;rhdf_flags |= rhd_not_packed;\n\n\tdcc.pack(rpb-&gt;rpb_address, header-&gt;rhdf_data);\n\n\tdata_page* page = (data_page*) rpb-&gt;getWindow(tdbb).win_buffer;\n\n#ifdef VIO_DEBUG\n\tVIO_trace(DEBUG_WRITES_INFO,\n\t\t&quot;    front part\\n&quot;);\n\n\tVIO_trace(DEBUG_WRITES_INFO,\n\t\t&quot;    rhdf_trans %&quot; SQUADFORMAT&quot;, rpb_window record %&quot; ULONGFORMAT\n\t\t&quot;:%d, dpg_length %d \\n\\trhdf_flags %d, rhdf_f record %&quot; ULONGFORMAT\n\t\t&quot;:%d, rhdf_b record %&quot; ULONGFORMAT&quot;:%d\\n&quot;,\n\t\tOds::getTraNum(header), rpb-&gt;getWindow(tdbb).win_page.getPageNum(),\n\t\trpb-&gt;rpb_line, page-&gt;dpg_rpt[rpb-&gt;rpb_line].dpg_length,\n\t\theader-&gt;rhdf_flags, header-&gt;rhdf_f_page, header-&gt;rhdf_f_line,\n\t\theader-&gt;rhdf_b_page, header-&gt;rhdf_b_line);\n#endif\n\n\n\tbool markPP = false;\n\n\t// When restoring, mark primary data page as swept, pointer page already marked by locate_space()\n\tif (swept_at_restore(tdbb, rpb-&gt;rpb_relation) &amp;&amp; (type == DPM_primary))\n\t{\n\t\tpage-&gt;dpg_header.pag_flags |= dpg_swept;\n\t}\n\telse if (page-&gt;dpg_header.pag_flags &amp; dpg_swept)\n\t{\n\t\tpage-&gt;dpg_header.pag_flags &amp;= ~dpg_swept;\n\t\tmarkPP = true;\n\t}\n\n\tif (!(page-&gt;dpg_header.pag_flags &amp; dpg_large))\n\t{\n\t\tpage-&gt;dpg_header.pag_flags |= dpg_large;\n\t\tmarkPP = true;\n\t}\n\n\tif (markPP)\n\t\tmark_full(tdbb, rpb);\n\telse\n\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n}\n"}, "/build/src/jrd/cch_proto.h": {"id": "/build/src/jrd/cch_proto.h", "filePath": "src/jrd/cch_proto.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tcch_proto.h\n *\tDESCRIPTION:\tPrototype header file for cch.cpp\n gesArray&amp;);\nOds::pag*\tCCH_handoff(Jrd::thread_db*, Jrd::win*, ULONG, int, SCHAR, int, const bool);\nvoid\t\tCCH_init(Jrd::thread_db*, ULONG);\nvoid\t\tCCH_init2(Jrd::thread_db*);\nvoid\t\tCCH_mark(Jrd::thread_db*, Jrd::win*, bool, bool);\nvoid\t\tCCH_must_write(Jrd::thread_db*, Jrd::win*);\nvoid\t\tCCH_precedence(Jrd::thread_db*, Jrd::win*, ULONG);\nvoid\t\tCCH_precedence(Jrd::thread_db*, Jrd::win*, Jrd::PageNumber);\nvoid\t\tCCH_tra_precedence(Jrd::thread_db*, Jrd::win*, TraNumber traNum);\n#ifdef SUPERSERVER_V2\nvoid\t\tCCH_prefetch(Jrd::thread_db*, SLONG*, SSHORT);\nbool\t\tCCH_prefetch_pages(Jrd::thread_db*);\n#endif\nvoid\t\tCCH_release(Jrd::thread_db*, Jrd::win*, const bool);\nvoid\t\tCCH_release_exclusive(Jrd::thread_db*);\nbool\t\tCCH_rollover_to_shadow(Jrd::thread_db* tdbb, Jrd::Database* dbb, Jrd::jrd_file*, const bool);\nvoid\t\tCCH_shutdown(Jrd::thread_db*);\nvoid\t\tCCH_unwind(Jrd::thread_db*, const bool);\nbool\t\tCCH_validate(Jrd::win*);\nvoid\t\tCCH_flush_ast(Jrd::thread_db*);\nbool\t\tCCH_write_all_shadows(Jrd::thread_db*, Jrd::Shadow*, Jrd::BufferDesc*, Ods::pag*,\n\t\t\t\t\t Jrd::FbStatusVector*, const bool);\n\n// macros for dealing with cache pages\n\ninline Ods::pag* CCH_FETCH(Jrd::thread_db* tdbb, Jrd::win* window, USHORT lock_type, SCHAR page_type)\n{\n\treturn CCH_fetch (tdbb, window, lock_type, page_type, 1, true);\n}\n\ninline Ods::pag* CCH_FETCH_NO_SHADOW(Jrd::thread_db* tdbb, Jrd::win* window, USHORT lock_type, SCHAR page_type)\n{\n\treturn CCH_fetch (tdbb, window, lock_type, page_type, 1, false);\n}\n\ninline Ods::pag* CCH_FETCH_TIMEOUT(Jrd::thread_db* tdbb, Jrd::win* window, USHORT lock_type, SCHAR page_type, SSHORT latch_wait)\n{\n\treturn CCH_fetch (tdbb, window, lock_type, page_type, latch_wait, true);\n}\n\ninline void CCH_RELEASE(Jrd::thread_db* tdbb, Jrd::win* window)\n{\n\tCCH_release(tdbb, window, false);\n}\n\ninline void CCH_RELEASE_TAIL(Jrd::thread_db* tdbb, Jrd::win* window)\n{\n\tCCH_release(tdbb, window, true);\n}\n\ninline void CCH_MARK(Jrd::thread_db* tdbb, Jrd::win* window)\n{\n\tCCH_mark (tdbb, window, 0, 0);\n}\n\ninline void CCH_MARK_SYSTEM(Jrd::thread_db* tdbb, Jrd::win* window)\n{\n\tCCH_mark (tdbb, window, 1, 0);\n}\n\ninline Ods::pag* CCH_HANDOFF(Jrd::thread_db* tdbb, Jrd::win* window, ULONG page, SSHORT lock, SCHAR page_type)\n{\n\treturn CCH_handoff (tdbb, window, page, lock, page_type, 1, false);\n}\n\ninline Ods::pag* CCH_HANDOFF_TIMEOUT(Jrd::thread_db* tdbb, Jrd::win* window, ULONG page, SSHORT lock, SCHAR page_type, SSHORT latch_wait)\n{\n\treturn CCH_handoff (tdbb, window, page, lock, page_type, latch_wait, false);\n}\n\ninline Ods::pag* CCH_HANDOFF_TAIL(Jrd::thread_db* tdbb, Jrd::win* window, ULONG page, SSHORT lock, SCHAR page_type)\n{\n\treturn CCH_handoff (tdbb, window, page, lock, page_type, 1, true);\n}\n\ninline void CCH_MARK_MUST_WRITE(Jrd::thread_db* tdbb, Jrd::win* window)\n{\n\tCCH_mark(tdbb, window, 0, 1);\n}\n\n#ifdef SUPERSERVER_V2\ninline void CCH_PREFETCH(Jrd::thread_db* tdbb, SLONG* pages, SSHORT count)\n{\n\tCCH_prefetch (tdbb, pages, count);\n}\n#endif\n\n//#define CCH_FETCH(tdbb, window, lock, type)\t\t  CCH_fetch (tdbb, window, lock, type, 1, true)\n//#define CCH_FETCH_NO_SHADOW(tdbb, window, lock, type)\t\t  CCH_fetch (tdbb, window, lock, type, 1, false)\n//#define CCH_FETCH_TIMEOUT(tdbb, window, lock, type, latch_wait)   CCH_fetch (tdbb, window, lock, type, latch_wait, true)\n//#define CCH_FETCH_LOCK(tdbb, window, lock, wait, type) CCH_fetch_lock (tdbb, window, lock, wait, type)\n//#define CCH_FETCH_PAGE(tdbb, window, read_shadow)       CCH_fetch_page (tdbb, window, read_shadow)\n//#define CCH_RELEASE(tdbb, window)                         CCH_release (tdbb, window, false)\n//#define CCH_RELEASE_TAIL(tdbb, window)                    CCH_release (tdbb, window, true)\n//#define CCH_MARK(tdbb, window)                            CCH_mark (tdbb, window, 0)\n//#define CCH_MARK_SYSTEM(tdbb, window)                     CCH_mark (tdbb, window, 1)\n//#define CCH_HANDOFF(tdbb, window, page, lock, type)       CCH_handoff (tdbb, window, page, lock, type, 1, false)\n//#define CCH_HANDOFF_TIMEOUT(tdbb, window, page, lock, type, latch_wait)   CCH_handoff (tdbb, window, page, lock, type, latch_wait, false)\n//#define CCH_HANDOFF_TAIL(tdbb, window, page, lock, type)  CCH_handoff (tdbb, window, page, lock, type, 1, true)\n//#define CCH_MARK_MUST_WRITE(tdbb, window)                 CCH_mark_must_write (tdbb, window)\n//#define CCH_PREFETCH(tdbb, pages, count)            CCH_prefetch (tdbb, pages, count)\n\n// Flush flags\n\ninline constexpr USHORT FLUSH_ALL\t\t= 1;\t\t// flush all dirty buffers in cache\ninline constexpr USHORT FLUSH_RLSE\t\t= 2;\t\t// release page locks after flush\ninline constexpr USHORT FLUSH_TRAN\t\t= 4;\t\t// flush transaction dirty buffers from dirty btree\ninline constexpr USHORT FLUSH_SWEEP\t\t= 8;\t\t// flush dirty buffers from garbage collection\ninline constexpr USHORT FLUSH_SYSTEM\t= 16;\t\t// flush system transaction only from dirty btree\ninline constexpr USHORT FLUSH_FINI\t\t= (FLUSH_ALL | FLUSH_RLSE);\n\n#endif // JRD_CCH_PROTO_H\n"}, "/build/src/jrd/cch.cpp": {"id": "/build/src/jrd/cch.cpp", "filePath": "src/jrd/cch.cpp", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tcch.cpp\n *\tDESCRIPTION:\tDisk cache manager\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n * 2001.07.06 Sean Leyne - Code Cleanup, removed &quot;#ifdef READONLY_DATABASE&quot;\n *                         conditionals, as the engine now fully supports\n *                         readonly databases.\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n */\n#include &quot;firebird.h&quot;\n#include &lt;stdio.h&gt;\n#include &lt;string.h&gt;\n#include &lt;stdlib.h&gt;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/que.h&quot;\n#include &quot;../jrd/lck.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/os/pio.h&quot;\n#include &quot;../jrd/cch.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;../jrd/lls.h&quot;\n#include &quot;../jrd/sdw.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/sbm.h&quot;\n#include &quot;../jrd/nbak.h&quot;\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../jrd/cch_proto.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/isc_proto.h&quot;\n#include &quot;../common/isc_s_proto.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/lck_proto.h&quot;\n#include &quot;../jrd/pag_proto.h&quot;\n#include &quot;../jrd/ods_proto.h&quot;\n#include &quot;../jrd/os/pio_proto.h&quot;\n#include &quot;../jrd/sdw_proto.h&quot;\n#include &quot;../jrd/shut_proto.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../jrd/tra_proto.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/classes/ClumpletWriter.h&quot;\n#include &quot;../common/classes/MsgPrint.h&quot;\n#include &quot;../jrd/CryptoManager.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../jrd/PageToBufferMap.h&quot;\n\n#ifndef CDS_UNAVAILABLE\n// Use lock-free lists in hash table implementation\n#define HASH_USE_CDS_LIST\n#endif\n\n\n#ifdef HASH_USE_CDS_LIST\n#include &lt;cds/container/michael_kvlist_dhp.h&gt;\n#include &quot;../jrd/InitCDSLib.h&quot;\n#endif\n\n\nusing namespace Jrd;\nusing namespace Ods;\nusing namespace Firebird;\n\n// In the superserver mode, no page locks are acquired through the lock manager.\n// Instead, a latching mechanism is used.  So the calls to lock subsystem for\n// database pages in the original code should not be made, lest they should cause\n// any undesirable side-effects.  The following defines help us achieve that.\n\n#ifdef CCH_DEBUG\n#include &lt;stdarg.h&gt;\nIMPLEMENT_TRACE_ROUTINE(cch_trace, &quot;CCH&quot;)\n#endif\n\n#ifdef SUPERSERVER_V2\n#define CACHE_READER\n#endif\n\n\nstatic inline void PAGE_LOCK_RELEASE(thread_db* tdbb, BufferControl* bcb, Lock* lock)\n{\n\tif (!(bcb-&gt;bcb_flags &amp; BCB_exclusive))\n\t{\n\t\tCCH_TRACE((&quot;LCK RLS %&quot; SQUADFORMAT, lock-&gt;getKey()));\n\t\tLCK_release(tdbb, lock);\n\t}\n}\n\nstatic inline void PAGE_LOCK_ASSERT(thread_db* tdbb, BufferControl* bcb, Lock* lock)\n{\n\tif (!(bcb-&gt;bcb_flags &amp; BCB_exclusive))\n\t\tLCK_assert(tdbb, lock);\n}\n\nstatic inline void PAGE_LOCK_RE_POST(thread_db* tdbb, BufferControl* bcb, Lock* lock)\n{\n\tif (!(bcb-&gt;bcb_flags &amp; BCB_exclusive))\n\t{\n\t\tCCH_TRACE((&quot;LCK REP %&quot; SQUADFORMAT, lock-&gt;getKey()));\n\t\tLCK_re_post(tdbb, lock);\n\t}\n}\n\nenum LatchState\n{\n\tlsOk,\n\tlsTimeout,\n\tlsPageChanged\n};\n\nstatic void adjust_scan_count(WIN* window, bool mustRead);\nstatic int blocking_ast_bdb(void*);\n#ifdef CACHE_READER\nstatic void prefetch_epilogue(Prefetch*, FbStatusVector *);\nstatic void prefetch_init(Prefetch*, thread_db*);\nstatic void prefetch_io(Prefetch*, FbStatusVector *);\nstatic void prefetch_prologue(Prefetch*, SLONG *);\n#endif\nstatic void cacheBuffer(Attachment* att, BufferDesc* bdb);\nstatic void check_precedence(thread_db*, WIN*, PageNumber);\nstatic void clear_precedence(thread_db*, BufferDesc*);\nstatic void down_grade(thread_db*, BufferDesc*, int high = 0);\nstatic bool expand_buffers(thread_db*, ULONG);\nstatic BufferDesc* get_buffer(thread_db*, const PageNumber, SyncType, int);\nstatic int get_related(BufferDesc*, PagesArray&amp;, int, const ULONG);\nstatic ULONG get_prec_walk_mark(BufferControl*);\nstatic LockState lock_buffer(thread_db*, BufferDesc*, const SSHORT, const SCHAR);\nstatic ULONG memory_init(thread_db*, BufferControl*, ULONG);\nstatic void page_validation_error(thread_db*, win*, SSHORT);\nstatic void purgePrecedence(BufferControl*, BufferDesc*);\nstatic SSHORT related(BufferDesc*, const BufferDesc*, SSHORT, const ULONG);\nstatic int write_buffer(thread_db*, BufferDesc*, const PageNumber, const bool, FbStatusVector* const,\n\tconst bool);\nstatic bool write_page(thread_db*, BufferDesc*, FbStatusVector* const, const bool);\nstatic bool set_diff_page(thread_db*, BufferDesc*);\nstatic void clear_dirty_flag_and_nbak_state(thread_db*, BufferDesc*);\n\nstatic BufferDesc* get_dirty_buffer(thread_db*);\n\n\nstatic inline void insertDirty(BufferControl* bcb, BufferDesc* bdb)\n{\n\tif (bdb-&gt;bdb_dirty.que_forward != &amp;bdb-&gt;bdb_dirty)\n\t\treturn;\n\n\tSync dirtySync(&amp;bcb-&gt;bcb_syncDirtyBdbs, &quot;insertDirty&quot;);\n\tdirtySync.lock(SYNC_EXCLUSIVE);\n\n\tif (bdb-&gt;bdb_dirty.que_forward != &amp;bdb-&gt;bdb_dirty)\n\t\treturn;\n\n\tbcb-&gt;bcb_dirty_count++;\n\tQUE_INSERT(bcb-&gt;bcb_dirty, bdb-&gt;bdb_dirty);\n}\n\nstatic inline void removeDirty(BufferControl* bcb, BufferDesc* bdb)\n{\n\tif (bdb-&gt;bdb_dirty.que_forward == &amp;bdb-&gt;bdb_dirty)\n\t\treturn;\n\n\tSync dirtySync(&amp;bcb-&gt;bcb_syncDirtyBdbs, &quot;removeDirty&quot;);\n\tdirtySync.lock(SYNC_EXCLUSIVE);\n\n\tif (bdb-&gt;bdb_dirty.que_forward == &amp;bdb-&gt;bdb_dirty)\n\t\treturn;\n\n\tfb_assert(bcb-&gt;bcb_dirty_count &gt; 0);\n\n\tbcb-&gt;bcb_dirty_count--;\n\tQUE_DELETE(bdb-&gt;bdb_dirty);\n\tQUE_INIT(bdb-&gt;bdb_dirty);\n}\n\nstatic void flushDirty(thread_db* tdbb, SLONG transaction_mask, const bool sys_only);\nstatic void flushAll(thread_db* tdbb, USHORT flush_flag);\nstatic void flushPages(thread_db* tdbb, USHORT flush_flag, BufferDesc** begin, FB_SIZE_T count);\n\nstatic void recentlyUsed(BufferDesc* bdb);\nstatic void requeueRecentlyUsed(BufferControl* bcb);\n\n\nconstexpr ULONG MIN_BUFFER_SEGMENT = 65536;\n\n// Given pointer a field in the block, find the block\n\n#define BLOCK(fld_ptr, type, fld) (type*)((SCHAR*) fld_ptr - offsetof(type, fld))\n\nconstexpr int PRE_SEARCH_LIMIT\t= 256;\nconstexpr int PRE_EXISTS\t\t= -1;\nconstexpr int PRE_UNKNOWN\t\t= -2;\n\nnamespace Jrd\n{\n\n#ifdef HASH_USE_CDS_LIST\n\ntemplate &lt;typename T&gt;\nclass ListNodeAllocator\n{\npublic:\n\ttypedef T value_type;\n\n\tListNodeAllocator() {};\n\n\ttemplate &lt;class U&gt;\n\tconstexpr ListNodeAllocator(const ListNodeAllocator&lt;U&gt;&amp;) noexcept {}\n\n\tT* allocate(std::size_t n);\n\tvoid deallocate(T* p, std::size_t n);\n\nprivate:\n};\n\nstruct BdbTraits : public cds::container::michael_list::traits\n{\n\ttypedef ListNodeAllocator&lt;int&gt; allocator;\n\t//typedef std::less&lt;PageNumber&gt; compare;\n};\n\ntypedef cds::container::MichaelKVList&lt;cds::gc::DHP, PageNumber, BufferDesc*, BdbTraits&gt; BdbList;\n\n#endif // HASH_USE_CDS_LIST\n\n\nclass BCBHashTable\n{\n#ifdef HASH_USE_CDS_LIST\n\tusing chain_type = BdbList;\n#else\n\tusing chain_type = que;\n#endif\n\npublic:\n\tBCBHashTable(MemoryPool&amp; pool, ULONG count) :\n\t\tm_pool(pool),\n\t\tm_count(0),\n\t\tm_chains(nullptr)\n\t{\n\t\tresize(count);\n\t}\n\n\t~BCBHashTable()\n\t{\n\t\tclear();\n\t}\n\n\tvoid resize(ULONG count);\n\tvoid clear();\n\n\tBufferDesc* find(const PageNumber&amp; page) const;\n\n\t// tries to put bdb into hash slot by page\n\t// if succeed, removes bdb from old slot, if necessary, and returns NULL\n\t// else, returns BufferDesc that is currently occupies target slot\n\tBufferDesc* emplace(BufferDesc* bdb, const PageNumber&amp; page, bool remove);\n\n\tvoid remove(BufferDesc* bdb);\nprivate:\n\tULONG hash(const PageNumber&amp; pageno) const\n\t{\n\t\treturn pageno.getPageNum() % m_count;\n\t}\n\n\tMemoryPool&amp; m_pool;\n\tULONG m_count;\n\tchain_type* m_chains;\n};\n\n}\n\n\nvoid CCH_clean_page(thread_db* tdbb, PageNumber page)\n{\n/**************************************\n *  C C H _ c l e a n _ p a g e\n **************************************\n *\n * Functional description\n *  Clear dirty status and dependencies. Buffer must be unused.\n *  If buffer with given page number is not found - it is OK, do nothing.\n *  Used to remove dirty pages from cache after releasing temporary objects.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\tfb_assert(page.getPageNum() &gt; 0);\n\tfb_assert(page.isTemporary());\n\tif (!page.isTemporary())\n\t\treturn;\n\n\tBufferControl* bcb = dbb-&gt;dbb_bcb;\n\tBufferDesc* bdb = NULL;\n\t{\n#ifndef HASH_USE_CDS_LIST\n\t\tSync bcbSync(&amp;bcb-&gt;bcb_syncObject, &quot;CCH_clean_page&quot;);\n\t\tbcbSync.lock(SYNC_SHARED);\n#endif\n\n\t\tbdb = bcb-&gt;bcb_hashTable-&gt;find(page);\n\t\tif (!bdb)\n\t\t\treturn;\n\n\t\tfb_assert(bdb-&gt;bdb_use_count == 0);\n\t\tif (!bdb-&gt;addRefConditional(tdbb, SYNC_EXCLUSIVE))\n\t\t\treturn;\n\t}\n\n\t// temporary pages should have no precedence relationship\n\tif (!QUE_EMPTY(bdb-&gt;bdb_higher))\n\t\tpurgePrecedence(bcb, bdb);\n\n\tfb_assert(QUE_EMPTY(bdb-&gt;bdb_higher));\n\tfb_assert(QUE_EMPTY(bdb-&gt;bdb_lower));\n\n\tif (!QUE_EMPTY(bdb-&gt;bdb_lower) || !QUE_EMPTY(bdb-&gt;bdb_higher))\n\t{\n\t\tbdb-&gt;release(tdbb, true);\n\t\treturn;\n\t}\n\n\tif (bdb-&gt;bdb_flags &amp; (BDB_dirty | BDB_db_dirty))\n\t{\n\t\tbdb-&gt;bdb_difference_page = 0;\n\t\tbdb-&gt;bdb_transactions = 0;\n\t\tbdb-&gt;bdb_mark_transaction = 0;\n\n\t\tif (!(bdb-&gt;bdb_bcb-&gt;bcb_flags &amp; BCB_keep_pages))\n\t\t\tremoveDirty(dbb-&gt;dbb_bcb, bdb);\n\n\t\tbdb-&gt;bdb_flags &amp;= ~(BDB_must_write | BDB_system_dirty | BDB_db_dirty);\n\t\tclear_dirty_flag_and_nbak_state(tdbb, bdb);\n\t}\n\n\t{\n\t\tSync lruSync(&amp;bcb-&gt;bcb_syncLRU, &quot;CCH_release&quot;);\n\t\tlruSync.lock(SYNC_EXCLUSIVE);\n\n\t\tif (bdb-&gt;bdb_flags &amp; BDB_lru_chained)\n\t\t\trequeueRecentlyUsed(bcb);\n\n\t\tQUE_DELETE(bdb-&gt;bdb_in_use);\n\t\tQUE_APPEND(bcb-&gt;bcb_in_use, bdb-&gt;bdb_in_use);\n\t}\n\n\tbdb-&gt;release(tdbb, true);\n}\n\n\nint CCH_down_grade_dbb(void* ast_object)\n{\n/**************************************\n *\n *\tC C H _ d o w n _ g r a d e _ d b b\n *\n **************************************\n *\n * Functional description\n *\tDown grade the lock on the database in response to a blocking\n *\tAST.\n *\n **************************************/\n\tDatabase* dbb = static_cast&lt;Database*&gt;(ast_object);\n\n\ttry\n\t{\n\t\tLock* const lock = dbb-&gt;dbb_lock;\n\n\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION);\n\n\t\tdbb-&gt;dbb_ast_flags |= DBB_blocking;\n\n\t\t// Process the database shutdown request, if any\n\n\t\tif (SHUT_blocking_ast(tdbb, true))\n\t\t\treturn 0;\n\n\t\tSyncLockGuard dsGuard(&amp;dbb-&gt;dbb_sync, SYNC_EXCLUSIVE, FB_FUNCTION);\n\n\t\t// If we are already shared, there is nothing more we can do.\n\t\t// If any case, the other guy probably wants exclusive access,\n\t\t// and we can&#x27;t give it anyway\n\n\t\tif ((lock-&gt;lck_logical == LCK_SW) || (lock-&gt;lck_logical == LCK_SR))\n\t\t{\n\t\t\t// Fake conversion to the same level as we already own.\n\t\t\t// This trick re-enables the AST delivery.\n\t\t\tLCK_convert(tdbb, lock, lock-&gt;lck_logical, LCK_NO_WAIT);\n\t\t\treturn 0;\n\t\t}\n\n\t\tif (dbb-&gt;dbb_flags &amp; DBB_bugcheck)\n\t\t{\n\t\t\tLCK_convert(tdbb, lock, LCK_SW, LCK_WAIT);\n\t\t\tdbb-&gt;dbb_ast_flags &amp;= ~DBB_blocking;\n\t\t\treturn 0;\n\t\t}\n\n\t\t// If we are supposed to be exclusive, stay exclusive\n\n\t\tif ((dbb-&gt;dbb_flags &amp; DBB_exclusive) || dbb-&gt;isShutdown(shut_mode_single))\n\t\t\treturn 0;\n\n\t\t// Assert any page locks that have been requested, but not asserted\n\n\t\tdbb-&gt;dbb_ast_flags |= DBB_assert_locks;\n\n\t\tBufferControl* bcb = dbb-&gt;dbb_bcb;\n\t\tif (bcb)\n\t\t{\n\t\t\tSyncLockGuard bcbSync(&amp;bcb-&gt;bcb_syncObject, SYNC_EXCLUSIVE, FB_FUNCTION);\n\t\t\tbcb-&gt;bcb_flags &amp;= ~BCB_exclusive;\n\n\t\t\tfor (auto blk : bcb-&gt;bcb_bdbBlocks)\n\t\t\t{\n\t\t\t\tfor (BufferDesc* bdb = blk.m_bdbs; bdb &lt; blk.m_bdbs + blk.m_count; bdb++)\n\t\t\t\t{\n\t\t\t\t\t// Acquire EX latch to avoid races with LCK_release (called by CCH_release)\n\t\t\t\t\t// or LCK_lock (by lock_buffer) in main thread. Take extra care to avoid\n\t\t\t\t\t// deadlock with CCH_handoff. See CORE-5436.\n\n\t\t\t\t\tSync sync(&amp;bdb-&gt;bdb_syncPage, FB_FUNCTION);\n\n\t\t\t\t\twhile (!sync.lockConditional(SYNC_EXCLUSIVE))\n\t\t\t\t\t{\n\t\t\t\t\t\tSyncUnlockGuard bcbUnlock(bcbSync);\n\t\t\t\t\t\tThread::sleep(1);\n\t\t\t\t\t}\n\n\t\t\t\t\tPAGE_LOCK_ASSERT(tdbb, bcb, bdb-&gt;bdb_lock);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\t// Down grade the lock on the database itself\n\n\t\tif (lock-&gt;lck_physical == LCK_EX)\n\t\t\tLCK_convert(tdbb, lock, LCK_PW, LCK_WAIT);\t// This lets waiting cache manager in first\n\t\telse if (lock-&gt;lck_physical == LCK_PW)\n\t\t\tLCK_convert(tdbb, lock, LCK_SW, LCK_WAIT);\n\t\telse\n\t\t\tfb_assert(lock-&gt;lck_physical == 0);\n\n\t\tdbb-&gt;dbb_ast_flags &amp;= ~DBB_blocking;\n\t}\n\tcatch (const Firebird::Exception&amp;)\n\t{} // no-op\n\n\treturn 0;\n}\n\n\nbool CCH_exclusive(thread_db* tdbb, USHORT level, SSHORT wait_flag, Firebird::Sync* guard)\n{\n/**************************************\n *\n *\tC C H _ e x c l u s i v e\n *\n **************************************\n *\n * Functional description\n *\tGet exclusive access to a database.  If we get it, return true.\n *\tIf the wait flag is FALSE, and we can&#x27;t get it, give up and\n *\treturn false. There are two levels of database exclusivity: LCK_PW\n *\tguarantees there are no normal users in the database while LCK_EX\n *\tadditionally guarantees background database processes like the\n *\tshared cache manager have detached.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\tif (dbb-&gt;dbb_flags &amp; DBB_shared)\n\t{\n\t\tif (!CCH_exclusive_attachment(tdbb, level, wait_flag, guard))\n\t\t\treturn false;\n\t}\n\n\tLock* lock = dbb-&gt;dbb_lock;\n\tif (!lock)\n\t\treturn false;\n\n\tdbb-&gt;dbb_flags |= DBB_exclusive;\n\n\tswitch (level)\n\t{\n\tcase LCK_PW:\n\t\tif (lock-&gt;lck_physical &gt;= LCK_PW || LCK_convert(tdbb, lock, LCK_PW, wait_flag))\n\t\t\treturn true;\n\t\tbreak;\n\n\tcase LCK_EX:\n\t\tif (lock-&gt;lck_physical == LCK_EX || LCK_convert(tdbb, lock, LCK_EX, wait_flag))\n\t\t\treturn true;\n\t\tbreak;\n\n\tdefault:\n\t\tbreak;\n\t}\n\n\t// Clear the status vector, as our callers check the return value\n\t// and throw custom exceptions themselves\n\tfb_utils::init_status(tdbb-&gt;tdbb_status_vector);\n\n\t// If we are supposed to wait (presumably patiently),\n\t// but can&#x27;t get the lock, generate an error\n\n\tif (wait_flag == LCK_WAIT)\n\t\tERR_post(Arg::Gds(isc_deadlock));\n\n\tdbb-&gt;dbb_flags &amp;= ~DBB_exclusive;\n\n\treturn false;\n}\n\n\nbool CCH_exclusive_attachment(thread_db* tdbb, USHORT level, SSHORT wait_flag, Sync* exGuard)\n{\n/**************************************\n *\n *\tC C H _ e x c l u s i v e _ a t t a c h m e n t\n *\n **************************************\n *\n * Functional description\n *\tGet exclusive access to a database. If we get it, return true.\n *\tIf the wait flag is FALSE, and we can&#x27;t get it, give up and\n *\treturn false.\n *\n **************************************/\n\tconstexpr int CCH_EXCLUSIVE_RETRY_INTERVAL = 10;\t// retry interval in milliseconds\n\n\tSET_TDBB(tdbb);\n\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\n\tSync dsGuard(&amp;dbb-&gt;dbb_sync, FB_FUNCTION);\n\n\tconst bool exLock = dbb-&gt;dbb_sync.ourExclusiveLock();\n\tif (!exLock)\n\t\tdsGuard.lock(level != LCK_none ? SYNC_EXCLUSIVE : SYNC_SHARED);\n\telse\n\t\tfb_assert(exGuard);\n\n\tJrd::Attachment* const attachment = tdbb-&gt;getAttachment();\n\n\tif (attachment-&gt;att_flags &amp; ATT_exclusive)\n\t\treturn true;\n\n\tattachment-&gt;att_flags |= (level == LCK_none) ? ATT_attach_pending : ATT_exclusive_pending;\n\n\tconst SLONG timeout = (wait_flag == LCK_WAIT) ? 1L &lt;&lt; 30 : (-wait_flag * 1000 / CCH_EXCLUSIVE_RETRY_INTERVAL);\n\n\t// If requesting exclusive database access, then re-position attachment as the\n\t// youngest so that pending attachments may pass.\n\n\tif (level != LCK_none)\n\t{\n\t\tfor (Jrd::Attachment** ptr = &amp;dbb-&gt;dbb_attachments; *ptr; ptr = &amp;(*ptr)-&gt;att_next)\n\t\t{\n\t\t\tif (*ptr == attachment)\n\t\t\t{\n\t\t\t\t*ptr = attachment-&gt;att_next;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t\tattachment-&gt;att_next = dbb-&gt;dbb_attachments;\n\t\tdbb-&gt;dbb_attachments = attachment;\n\n\t\tif (!exLock)\n\t\t\tdsGuard.downgrade(SYNC_SHARED);\n\t}\n\n\tfor (SLONG remaining = timeout; remaining &gt;= 0; remaining -= CCH_EXCLUSIVE_RETRY_INTERVAL)\n\t{\n\t\ttry\n\t\t{\n\t\t\tbool found = false;\n\t\t\tfor (Jrd::Attachment* other_attachment = attachment-&gt;att_next; other_attachment;\n\t\t\t\t other_attachment = other_attachment-&gt;att_next)\n\t\t\t{\n\t\t\t\tif (level == LCK_none)\n\t\t\t\t{\n\t\t\t\t\t// Wait for other attachments requesting exclusive access\n\t\t\t\t\tif (other_attachment-&gt;att_flags &amp; (ATT_exclusive | ATT_exclusive_pending))\n\t\t\t\t\t{\n\t\t\t\t\t\tfound = true;\n\t\t\t\t\t\tbreak;\n\t\t\t\t\t}\n\n\t\t\t\t\t// Forbid multiple attachments in single-user maintenance mode\n\t\t\t\t\tif (other_attachment != attachment &amp;&amp; dbb-&gt;isShutdown(shut_mode_single))\n\t\t\t\t\t{\n\t\t\t\t\t\tfound = true;\n\t\t\t\t\t\tbreak;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\t// Requesting exclusive database access\n\t\t\t\t\tfound = true;\n\t\t\t\t\tif (other_attachment-&gt;att_flags &amp; ATT_exclusive_pending)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (wait_flag == LCK_WAIT)\n\t\t\t\t\t\t\tERR_post(Arg::Gds(isc_deadlock));\n\n\t\t\t\t\t\tattachment-&gt;att_flags &amp;= ~ATT_exclusive_pending;\n\t\t\t\t\t\treturn false;\n\t\t\t\t\t}\n\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (!found)\n\t\t\t{\n\t\t\t\tif (level != LCK_none)\n\t\t\t\t\tattachment-&gt;att_flags |= ATT_exclusive;\n\n\t\t\t\tattachment-&gt;att_flags &amp;= ~(ATT_exclusive_pending | ATT_attach_pending);\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\t// Our thread needs to sleep for CCH_EXCLUSIVE_RETRY_INTERVAL milliseconds.\n\n\t\t\tif (remaining &gt;= CCH_EXCLUSIVE_RETRY_INTERVAL)\n\t\t\t{\n\t\t\t\tSyncUnlockGuard unlock(exLock ? (*exGuard) : dsGuard);\n\t\t\t\ttdbb-&gt;reschedule();\n\t\t\t\tThread::sleep(CCH_EXCLUSIVE_RETRY_INTERVAL);\n\t\t\t}\n\n\t\t} // try\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tattachment-&gt;att_flags &amp;= ~(ATT_exclusive_pending | ATT_attach_pending);\n\t\t\tthrow;\n\t\t}\n\t}\n\n\tattachment-&gt;att_flags &amp;= ~(ATT_exclusive_pending | ATT_attach_pending);\n\treturn false;\n}\n\n\nbool CCH_expand(thread_db* tdbb, ULONG number)\n{\n/**************************************\n *\n *\tC C H _ e x p a n d\n *\n **************************************\n *\n * Functional description\n *\tExpand the cache to at least a given number of buffers.  If\n *\tit&#x27;s already that big, don&#x27;t do anything.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\treturn expand_buffers(tdbb, number);\n}\n\n\npag* CCH_fake(thread_db* tdbb, WIN* window, int wait)\n{\n/**************************************\n *\n *\tC C H _ f a k e\n *\n **************************************\n *\n * Functional description\n *\tFake a fetch to a page.  Rather than reading it, however,\n *\tzero it in memory.  This is used when allocating a new page.\n *\n * input\n *\twait:\t1 =&gt; Wait as long as necessary to get the latch.\n *\t\t\t\tThis can cause deadlocks of course.\n *\t\t\t0 =&gt; If the latch can&#x27;t be acquired immediately,\n *\t\t\t\tor an IO would be necessary, then give\n *\t\t\t\tup and return 0.\n *\t\t\t&lt;negative number&gt; =&gt; Latch timeout interval in seconds.\n *\n * return\n *\tpag pointer if successful.\n *\tNULL pointer if timeout occurred (only possible if wait &lt;&gt; 1).\n *\tNULL pointer if wait=0 and the faked page would have to be\n *\t\t\tbefore reuse.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\tBufferControl *bcb = dbb-&gt;dbb_bcb;\n\n\tCCH_TRACE((&quot;FAKE    %d:%06d&quot;, window-&gt;win_page.getPageSpaceID(), window-&gt;win_page.getPageNum()));\n\n\t// if there has been a shadow added recently, go out and\n\t// find it before we grant any more write locks\n\n\tif (dbb-&gt;dbb_ast_flags &amp; DBB_get_shadows)\n\t\tSDW_get_shadows(tdbb);\n\n\tBufferDesc* bdb = get_buffer(tdbb, window-&gt;win_page, SYNC_EXCLUSIVE, wait);\n\tif (!bdb)\n\t\treturn NULL;\t\t\t// latch timeout occurred\n\n\tfb_assert(bdb-&gt;bdb_page == window-&gt;win_page);\n\n\t// If a dirty orphaned page is being reused - better write it first\n\t// to clear current precedences and checkpoint state. This would also\n\t// update the bcb_free_pages field appropriately.\n\n\tif (bdb-&gt;bdb_flags &amp; (BDB_dirty | BDB_db_dirty))\n\t{\n\t\t// If the caller didn&#x27;t want to wait at all, then\n\t\t// return &#x27;try to fake an other page&#x27; to the caller.\n\n\t\tif (!wait)\n\t\t{\n\t\t\tbdb-&gt;release(tdbb, true);\n\t\t\treturn NULL;\n\t\t}\n\n\t\tif (!write_buffer(tdbb, bdb, bdb-&gt;bdb_page, true, tdbb-&gt;tdbb_status_vector, true))\n\t\t{\n\t\t\tCCH_unwind(tdbb, true);\n\t\t}\n\t}\n\telse if (QUE_NOT_EMPTY(bdb-&gt;bdb_lower))\n\t{\n\t\t// Clear residual precedence left over from AST-level I/O.\n\t\tSync syncPrec(&amp;bcb-&gt;bcb_syncPrecedence, &quot;CCH_fake&quot;);\n\t\tsyncPrec.lock(SYNC_EXCLUSIVE);\n\t\tclear_precedence(tdbb, bdb);\n\t}\n\n\t// Here the page must not be dirty and have no backup lock owner\n\tfb_assert((bdb-&gt;bdb_flags &amp; (BDB_dirty | BDB_db_dirty)) == 0);\n\tfb_assert(bdb-&gt;bdb_page == window-&gt;win_page);\n\n\tbdb-&gt;bdb_flags &amp;= BDB_lru_chained;\t// yes, clear all except BDB_lru_chained\n\tbdb-&gt;bdb_flags |= (BDB_writer | BDB_faked);\n\tbdb-&gt;bdb_scan_count = 0;\n\n\tif (!(bcb-&gt;bcb_flags &amp; BCB_exclusive))\n\t\tlock_buffer(tdbb, bdb, LCK_WAIT, pag_undefined);\n\n\tMOVE_CLEAR(bdb-&gt;bdb_buffer, (SLONG) dbb-&gt;dbb_page_size);\n\tbdb-&gt;bdb_buffer-&gt;pag_pageno = window-&gt;win_page.getPageNum();\n\twindow-&gt;win_buffer = bdb-&gt;bdb_buffer;\n\twindow-&gt;win_bdb = bdb;\n\twindow-&gt;win_flags = 0;\n\tCCH_MARK(tdbb, window);\n\n\treturn bdb-&gt;bdb_buffer;\n}\n\n\npag* CCH_fetch(thread_db* tdbb, WIN* window, int lock_type, SCHAR page_type, int wait,\n\tconst bool read_shadow)\n{\n/**************************************\n *\n *\tC C H _ f e t c h\n *\n **************************************\n *\n * Functional description\n *\tFetch a specific page.  If it&#x27;s already in cache,\n *\tso much the better.\n *\n * input\n *\twait:\t1 =&gt; Wait as long as necessary to get the latch.\n *\t\t\t\tThis can cause deadlocks of course.\n *\t\t\t0 =&gt; If the latch can&#x27;t be acquired immediately,\n *\t\t\t\tgive up and return 0.\n *\t      \t\t&lt;negative number&gt; =&gt; Latch timeout interval in seconds.\n *\n * return\n *\tPAG if successful.\n *\tNULL pointer if timeout occurred (only possible if wait &lt;&gt; 1).\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tconst LockState lockState = CCH_fetch_lock(tdbb, window, lock_type, wait, page_type);\n\tBufferDesc* bdb = window-&gt;win_bdb;\n\tSyncType syncType = (lock_type &gt;= LCK_write) ? SYNC_EXCLUSIVE : SYNC_SHARED;\n\n\tswitch (lockState)\n\t{\n\tcase lsLockedHavePage:\n\t\t// page available\n\t\tbreak;\n\tcase lsLocked:\n\t\tCCH_TRACE((&quot;FE PAGE %d:%06d&quot;, window-&gt;win_page.getPageSpaceID(), window-&gt;win_page.getPageNum()));\n\t\tCCH_fetch_page(tdbb, window, read_shadow);\t// must read page from disk\n\t\tif (syncType != SYNC_EXCLUSIVE)\n\t\t\tbdb-&gt;downgrade(syncType);\n\t\tbreak;\n\n\tcase lsLatchTimeout:\n\tcase lsLockTimeout:\n\t\treturn NULL;\t\t\t// latch or lock timeout\n\tcase lsError:\n\t\tfb_assert(false);\n\t\tbreak;\n\t}\n\n\tadjust_scan_count(window, lockState == lsLocked);\n\n\t// Validate the fetched page matches the expected type\n\n\tif (bdb-&gt;bdb_buffer-&gt;pag_type != page_type &amp;&amp; page_type != pag_undefined)\n\t\tpage_validation_error(tdbb, window, page_type);\n\n\treturn window-&gt;win_buffer;\n}\n\n\nLockState CCH_fetch_lock(thread_db* tdbb, WIN* window, int lock_type, int wait, SCHAR page_type)\n{\n/**************************************\n *\n *\tC C H _ f e t c h _ l o c k\n *\n **************************************\n *\n * Functional description\n *\tFetch a latch and lock for a specific page.\n *\n * input\n *\n *\twait:\n *\tLCK_WAIT (1)\t=&gt; Wait as long a necessary to get the lock.\n *\t\tThis can cause deadlocks of course.\n *\n *\tLCK_NO_WAIT (0)\t=&gt;\n *\t\tIf the latch can&#x27;t be acquired immediately, give up and return -2.\n *\t\tIf the lock can&#x27;t be acquired immediately, give up and return -1.\n *\n *\t&lt;negative number&gt;\t=&gt; Lock (latch) timeout interval in seconds.\n *\n * return\n *\t0:\tfetch &amp; lock were successful, page doesn&#x27;t need to be read.\n *\t1:\tfetch &amp; lock were successful, page needs to be read from disk.\n *\t-1:\tlock timed out, fetch failed.\n *\t-2:\tlatch timed out, fetch failed, lock not attempted.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\tBufferControl* const bcb = dbb-&gt;dbb_bcb;\n\n\t// if there has been a shadow added recently, go out and\n\t// find it before we grant any more write locks\n\n\tif (dbb-&gt;dbb_ast_flags &amp; DBB_get_shadows)\n\t\tSDW_get_shadows(tdbb);\n\n\t// Look for the page
