      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},
      viewportMargin : 100
    });

    this._createNavigationMenu();
  },

  navigate : function (report, item) {
    if (!item) {
      var items = this._navigationMenuItems.filter(function (navItem) {
        return navItem.report.reportHash === report.reportHash;
      });

      if (!items.length) return;

      item = items[0].widget;
    }

    this._selectedReport.classList.remove('active');
    this._selectedReport = item;
    this._selectedReport.classList.add('active');
    this.setReport(report);
  },

  _createNavigationMenu : function () {
    var that = this;

    var nav = document.getElementById('report-nav');
    var list = document.createElement('ul');
    this._reports.forEach(function (report) {
      var events = report.events;
      var lastBugEvent = events[events.length - 1];
      var item = document.createElement('li');

      var severity = document.createElement('i');
      severity.className = 'severity-' + report.severity.toLowerCase();

      item.appendChild(severity);
      item.appendChild(document.createTextNode(lastBugEvent.message));

      item.addEventListener('click', function () {
        that.navigate(report, item);
      })
      list.appendChild(item);
      that._navigationMenuItems.push({ report : report, widget : item });
    });

    if (!this._selectedReport && list.childNodes.length) {
      this._selectedReport = list.childNodes[0];
      this._selectedReport.classList.add('active');
    }

    nav.appendChild(list);
  },

  setReport : function (report) {
    this._currentReport = report;
    var events = report.events;
    var lastBugEvent = events[events.length - 1];
    this.setCurrentBugEvent(lastBugEvent, events.length - 1);
    this.setChecker(report.checker);
    this.setReviewStatus(report.reviewStatus);

    window.location.hash = '#reportHash=' + report.reportHash;
  },

  setCurrentBugEvent : function (event, idx) {
    this._currentBugEvent = event;
    this.setSourceFileData(this._files[event.fileId]);
    this.drawBugPath();

    this.jumpTo(event.line, 0);
    this.highlightBugEvent(idx);
  },

  highlightBugEvent : function (idx) {
    this._lineWidgets.forEach(function (widget) {
      var lineIdx = widget.node.getAttribute('idx');
      if (parseInt(lineIdx) === idx) {
        widget.node.classList.add('current');
      }
    });
  },

  setChecker : function (checker) {
    var content = checker.name;
    if (checker.url) {
      content = '<a href="' + checker.url + '" target="_blank">' +
        checker.name + '</a>';
    }

    this._checkerName.innerHTML = content;
  },

  setReviewStatus : function (status) {
    if (status) {
      var className =
        'review-status-' + status.toLowerCase().split(' ').join('-');

      this._reviewStatusWrapper.style.display = 'block';
    } else {
      this._reviewStatusWrapper.style.display = 'none';
    }
  },

  setSourceFileData : function (file) {
    if (this._sourceFileData && file.id === this._sourceFileData.id) {
      return;
    }

    this._sourceFileData = file;
    this._filepath.innerHTML = file.filePath;
    let e = document.createElement('div');
    e.innerHTML = file.content;

  },

  _refresh : function () {

    setTimeout(function () {
      var fullHeight = parseInt(that._content.clientHeight);
      var headerHeight = that._filepath.clientHeight;

      that._codeMirror.refresh();

  },

  clearBubbles : function () {
    this._lineWidgets.forEach(function (widget) { widget.clear(); });

  },

  getMessage : function (event, kind) {

      return '<span class="tag macro">' + name + '</span>'
        + this.escapeHTML(event.message).replace(/(?:\r\n|\r|\n)/g, '<br>');

        +  this.escapeHTML(event.message).replace(/(?:\r\n|\r|\n)/g, '<br>');
    }
  },

  addExtraPathEvents : function (events, kind) {

        event.line - 1, element));
    });
  },

  drawBugPath : function () {
    var that = this;

    this.clearBubbles();

      element.setAttribute('style', 'margin-left: ' + left);
      element.setAttribute('class', 'check-msg ' + type);
      element.setAttribute('idx', step);

      var enumeration = document.createElement('span');
      enumeration.setAttribute('class', 'checker-enum ' + type);
      enumeration.innerHTML = step + 1;

      if (currentEvents.length > 1)
        element.appendChild(enumeration);

      var prevBugEvent = step - 1;
      if (step > 0) {
        var prevBug = document.createElement('span');
        prevBug.setAttribute('class', 'arrow left-arrow');
        prevBug.addEventListener('click', function () {
          var event = currentEvents[prevBugEvent];
          that.setCurrentBugEvent(event, prevBugEvent);
        });
        element.appendChild(prevBug);
      }

      var msg = document.createElement('span');
      msg.innerHTML = that.escapeHTML(event.message)
        .replace(/(?:\r\n|\r|\n)/g, '<br>');

      element.appendChild(msg);

      var nextBugEvent = step + 1;
      if (nextBugEvent < currentEvents.length) {
        var nextBug = document.createElement('span');
        nextBug.setAttribute('class', 'arrow right-arrow');
        nextBug.addEventListener('click', function () {
          var event = currentEvents[nextBugEvent];
          that.setCurrentBugEvent(event, nextBugEvent);
        });
        element.appendChild(nextBug);
      }


      that._lineWidgets.push(that._codeMirror.addLineWidget(
        event.line - 1, element));
    });
  },

  jumpTo : function (line, column) {
    var that = this;

    setTimeout(function () {
      var selPosPixel
        = that._codeMirror.charCoords({ line : line, ch : column }, 'local');
      var editorSize = {
        width  : that._editor.clientWidth,
        height : that._editor.clientHeight
      };

        top    : selPosPixel.top - 100,
        bottom : selPosPixel.top + editorSize.height - 150,
        left   : selPosPixel.left < editorSize.width - 100
               ? 0
               : selPosPixel.left - 50,
        right  : selPosPixel.left < editorSize.width - 100
               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }
}

\t\tparRight second;\n\t};\n\n// Right pair - right object in such pair has MemoryPool&#x27;ed constructor,\n//\tleft one - doesn&#x27;t (typically POD or builtin type)\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct Right\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit Right(MemoryPool&amp; p) : first(), second(p) { }\n\t\texplicit Right(MemoryPool&amp; p, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(v1), second(p, v2) { }\n\t\texplicit Right(MemoryPool&amp; p, const Right&amp; lp)\n\t\t\t: first(lp.first), second(p, lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Left pair - left object in such pair has MemoryPool&#x27;ed constructor,\n//\tright one - doesn&#x27;t (typically POD or builtin type)\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct Left\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit Left(MemoryPool&amp; p) : first(p), second() { }\n\t\texplicit Left(MemoryPool&amp; p, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(p, v1), second(v2) { }\n\t\texplicit Left(MemoryPool&amp; p, const Left&amp; lp)\n\t\t\t: first(p, lp.first), second(lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Full pair - both objects in such pair have MemoryPool&#x27;ed constructors.\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct Full\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit Full(MemoryPool&amp; p) : first(p), second(p) { }\n\t\texplicit Full(MemoryPool&amp; p, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(p, v1), second(p, v2) { }\n\t\texplicit Full(MemoryPool&amp; p, const Full&amp; lp)\n\t\t\t: first(p, lp.first), second(p, lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Pair - template providing full bool op-s set\n\ntemplate&lt;typename BasePair&gt;\n\tstruct Pair : public BasePair\n\t{\n\t\ttypedef typename Pair::first_type Pair_first_type;\n\t\ttypedef typename Pair::second_type Pair_second_type;\n\t\texplicit Pair(MemoryPool&amp; p) : BasePair(p) { }\n\t\texplicit Pair(MemoryPool&amp; p, const Pair_first_type&amp; v1,\n\t\t\tconst Pair_second_type&amp; v2) : BasePair(p, v1, v2) { }\n\t\texplicit Pair(MemoryPool&amp; p, const Pair&amp; lp)\n\t\t\t: BasePair(p, lp) { }\n\t\tPair() : BasePair(AutoStorage::getAutoMemoryPool()) { }\n\t\tPair(const Pair_first_type&amp; v1, const Pair_second_type&amp; v2)\n\t\t\t: BasePair(AutoStorage::getAutoMemoryPool(), v1, v2) { }\n\t\tPair(const Pair&amp; lp)\n\t\t\t: BasePair(AutoStorage::getAutoMemoryPool(), lp) { }\n\t\tbool operator==(const Pair&amp; v) const\n\t\t{\n\t\t\treturn this-&gt;first == v.first &amp;&amp; this-&gt;second == v.second;\n\t\t}\n\t\tbool operator&lt;(const Pair&amp; v) const\n\t\t{\n\t\t\treturn this-&gt;first &lt; v.first || (this-&gt;first == v.first &amp;&amp; this-&gt;second &lt; v.second);\n\t\t}\n\t\tbool operator!=(const Pair&amp; v) const\n\t\t{\n\t\t\treturn ! (*this == v);\n\t\t}\n\t\tbool operator&gt;(const Pair&amp; v) const\n\t\t{\n\t\t\treturn v &lt; *this;\n\t\t}\n\t\tbool operator&lt;=(const Pair&amp; v) const\n\t\t{\n\t\t\treturn ! (v &lt; *this);\n\t\t}\n\t\tbool operator&gt;=(const Pair&amp; v) const\n\t\t{\n\t\t\treturn ! (*this &lt; v);\n\t\t}\n\t};\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing NonPooledPair = Pair&lt;NonPooled&lt;parLeft, parRight&gt;&gt;;\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing LeftPooledPair = Pair&lt;Left&lt;parLeft, parRight&gt;&gt;;\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing RightPooledPair = Pair&lt;Right&lt;parLeft, parRight&gt;&gt;;\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing FullPooledPair = Pair&lt;Full&lt;parLeft, parRight&gt;&gt;;\n\ntemplate &lt;typename P&gt;\n\tclass FirstKey\n\t{\n\tpublic:\n\t\ttypedef typename P::first_type Pair_first_type;\n\t\tstatic const Pair_first urn lst ? pos != v.pos : true;\n\t\t\t}\n\t\t\tbool operator==(const const_iterator&amp; v) const\n\t\t\t{\n\t\t\t\tfb_assert(lst == v.lst);\n\t\t\t\treturn lst ? pos == v.pos : false;\n\t\t\t}\n\t\t\t// Against iterator\n\t\t\tbool operator!=(const iterator&amp; v) const\n\t\t\t{\n\t\t\t\tfb_assert(lst == v.lst);\n\t\t\t\treturn lst ? pos != v.pos : true;\n\t\t\t}\n\t\t\tbool operator==(const iterator&amp; v) const\n\t\t\t{\n\t\t\t\tfb_assert(lst == v.lst);\n\t\t\t\treturn lst ? pos == v.pos : false;\n\t\t\t}\n\n\t\t};\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const\n\t\t{\n\t\t\treturn inherited::getPool();\n\t\t}\n\n\t\tvoid insert(size_type index, const T&amp; item)\n\t\t{\n\t\t\tT* dataL = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool(), item);\n\t\t\tinherited::insert(index, dataL);\n\t\t}\n\n\t\tT&amp; insert(size_type index)\n\t\t{\n\t\t\tT* dataL = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool());\n\t\t\tinherited::insert(index, dataL);\n\t\t\treturn *dataL;\n\t\t}\n\n\t\tsize_type add(const T&amp; item)\n\t\t{\n\t\t\tT* dataL = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool(), item);\n\t\t\treturn inherited::add(dataL);\n\t\t}\n\n\t\tsize_type add(T&amp;&amp; item)\n\t\t{\n\t\t\tT* dataL = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool(), std::move(item));\n\t\t\treturn inherited::add(dataL);\n\t\t}\n\n\t\tT&amp; add()\n\t\t{\n\t\t\tT* dataL = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool());\n\t\t\tinherited::add(dataL);\n\t\t\treturn *dataL;\n\t\t}\n\n\t\tvoid push(const T&amp; item)\n\t\t{\n\t\t\tadd(item);\n\t\t}\n\n\t\tT pop()\n\t\t{\n\t\t\tT* pntr = inherited::pop();\n\t\t\tT rc = *pntr;\n\t\t\tdelete pntr;\n\t\t\treturn rc;\n\t\t}\n\n\t\tvoid remove(size_type index)\n\t\t{\n\t\t\tfb_assert(index &lt; getCount());\n\t\t\tdelete getPointer(index);\n\t\t\tinherited::remove(index);\n\t\t}\n\n\t\tvoid remove(iterator itr)\n\t\t{\n  \t\t\tfb_assert(itr.lst == this);\n\t\t\tremove(itr.pos);\n\t\t}\n\n\t\tvoid shrink(size_type newCount)\n\t\t{\n\t\t\tfor (size_type i = newCount; i &lt; getCount(); i++) {\n\t\t\t\tdelete getPointer(i);\n\t\t\t}\n\t\t\tinherited::shrink(newCount);\n\t\t}\n\n\t\tvoid grow(size_type newCount)\n\t\t{\n\t\t\tsize_type oldCount = getCount();\n\t\t\tinherited::grow(newCount);\n\t\t\tfor (size_type i = oldCount; i &lt; newCount; i++) {\n\t\t\t\tinherited::getElement(i) = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool());\n\t\t\t}\n\t\t}\n\n\t\tvoid resize(const size_type newCount, const T&amp; val)\n\t\t{\n\t\t\tif (newCount &gt; getCount())\n\t\t\t{\n\t\t\t\tsize_type oldCount = getCount();\n\t\t\t\tinherited::grow(newCount);\n\t\t\t\tfor (size_type i = oldCount; i &lt; newCount; i++) {\n\t\t\t\t\tinherited::getElement(i) = FB_NEW_POOL(this-&gt;getPool()) T(this-&gt;getPool(), val);\n\t\t\t\t}\n\t\t\t}\n\t\t\telse {\n\t\t\t\tshrink(newCount);\n\t\t\t}\n\t\t}\n\n\t\tvoid resize(const size_type newCount)\n\t\t{\n\t\t\tif (newCount &gt; getCount())\n\t\t\t{\n\t\t\t\tgrow(newCount);\n\t\t\t}\n\t\t\telse {\n\t\t\t\tshrink(newCount);\n\t\t\t}\n\t\t}\n\n\t\titerator begin()\n\t\t{\n\t\t\treturn iterator(this, 0);\n\t\t}\n\n\t\titerator end()\n\t\t{\n\t\t\treturn iterator(this, getCount());\n\t\t}\n\n\t\tconst T&amp; front() const\n\t\t{\n\t\t\tfb_assert(getCount() &gt; 0);\n\t\t\treturn *begin();\n\t\t}\n\n\t\tT&amp; front()\n\t\t{\n\t\t\tfb_assert(getCount() &gt; 0);\n\t\t\treturn *begin();\n\t\t}\n\n\t\tconst T&amp; back() const\n\t\t{\n\t\t\tfb_assert(getCount() &gt; 0);\n\t\t\treturn *iterator(this, getCount() - 1);\n\t\t}\n\n\t\tT&amp; back()\n\t\t{\n\t\t\tfb_assert(getCount() &gt; 0);\n\t\t\treturn *iterator(this, getCount() - 1);\n\t\t}\n\n\t\tconst_iterator begin() const\n\t\t{\n\t\t\treturn const_iterator(this, 0);\n\t\t}\n\n\t\tconst_iterator end() const\n\t\t{\n\t\t\treturn const_iterator(this, getCount());\n\t\t}\n\n\t\tconst T&amp; operator[](size_type index) const\n\t\t{\n  \t\t\treturn *getPointer(index);\n\t\t}\n\n\t\tconst T* getPointer(size_type index) \n\n\t\texplicit SortedObjectsArray(MemoryPool&amp; p, const SortedObjectsArray&amp; o) :\n\t\t\tObjectsArray &lt;ObjectValue, SortedArray&lt;ObjectValue*,\n\t\t\t\tObjectStorage, const ObjectKey*, ObjectKeyOfValue,\n\t\t\t\tObjectCmp&gt; &gt;(p, o)\n\t\t{\n\t\t}\n\n\t\tbool find(const ObjectKey&amp; item, size_type&amp; pos) const\n\t\t{\n\t\t\tconst ObjectKey* const pItem = &amp;item;\n\t\t\treturn static_cast&lt;const SortedArray&lt;ObjectValue*,\n\t\t\t\tObjectStorage, const ObjectKey*, ObjectKeyOfValue,\n\t\t\t\tObjectCmp&gt;*&gt;(this)-&gt;find(pItem, pos);\n\t\t}\n\n\t\tbool exist(const ObjectKey&amp; item) const\n\t\t{\n\t\t\tsize_type pos;\t// ignored\n\t\t\treturn find(item, pos);\n\t\t}\n\n\t\tsize_type add(const ObjectValue&amp; item)\n\t\t{\n\t\t\treturn inherited::add(item);\n\t\t}\n\n\t\tvoid setSortMode(int sm)\n\t\t{\n\t\t\tinherited::setSortMode(sm);\n\t\t}\n\n\t\tvoid sort()\n\t\t{\n\t\t\tinherited::sort();\n\t\t}\n\n\tprivate:\n\t\tObjectValue&amp; add();\t// Unusable when sorted\n\t};\n\n\t// Sorted pointers array - contains 2 arrays: simple for values (POD)\n\t// and sorted for pointers to them. Effective for big sizeof(POD).\n\ttemplate &lt;typename Value,\n\t\ttypename Storage = EmptyStorage&lt;Value&gt;,\n\t\ttypename Key = Value,\n\t\ttypename KeyOfValue = DefaultKeyValue&lt;Value*&gt;,\n\t\ttypename Cmp = ObjectComparator&lt;const Key*&gt; &gt;\n\tclass PointersArray\n\t{\n\tprivate:\n\t\tArray&lt;Value, Storage&gt; values;\n\t\tSortedArray&lt;Value*, InlineStorage&lt;Value*, 8&gt;, const Key*, KeyOfValue, Cmp&gt; pointers;\n\n\t\tvoid checkPointers(const Value* oldBegin)\n\t\t{\n\t\t\tValue* newBegin = values.begin();\n\t\t\tif (newBegin != oldBegin)\n\t\t\t{\n\t\t\t\tfor (Value** ptr = pointers.begin(); ptr &lt; pointers.end(); ++ptr)\n\t\t\t\t{\n\t\t\t\t\t*ptr = newBegin + (*ptr - oldBegin);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\tpublic:\n\t\ttypedef FB_SIZE_T size_type;\n\n\t\tclass const_iterator\n\t\t{\n\t\tprivate:\n\t\t\tconst Value* const* ptr;\n\n\t\tpublic:\n\t\t\tconst_iterator() : ptr(NULL) { }\n\t\t\tconst_iterator(const const_iterator&amp; it) : ptr(it.ptr) { }\n\t\t\texplicit const_iterator(const PointersArray&amp; a) : ptr(a.pointers.begin()) { }\n\n\t\t\tconst_iterator&amp; operator++()\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr++;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tconst_iterator operator++(int)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tconst_iterator tmp = *this;\n\t\t\t\tptr++;\n\t\t\t\treturn tmp;\n\t\t\t}\n\n\t\t\tconst_iterator&amp; operator--()\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr--;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tconst_iterator operator--(int)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tconst_iterator tmp = *this;\n\t\t\t\tptr--;\n\t\t\t\treturn tmp;\n\t\t\t}\n\n\t\t\tconst_iterator&amp; operator+=(size_type v)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr += v;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tconst_iterator&amp; operator-=(size_type v)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr -= v;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tconst Value* operator-&gt;()\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\treturn *ptr;\n\t\t\t}\n\n\t\t\tconst Value&amp; operator*()\n\t\t\t{\n\t\t\t\tfb_assert(ptr &amp;&amp; *ptr);\n\t\t\t\treturn **ptr;\n\t\t\t}\n\n\t\t\tbool operator==(const const_iterator&amp; v) const\n\t\t\t{\n\t\t\t\treturn ptr &amp;&amp; ptr == v.ptr;\n\t\t\t}\n\n\t\t\tbool operator!=(const const_iterator&amp; v) const\n\t\t\t{\n\t\t\t\treturn !operator==(v);\n\t\t\t}\n\t\t};\n\n\t\tclass iterator\n\t\t{\n\t\tprivate:\n\t\t\tValue** ptr;\n\n\t\tpublic:\n\t\t\titerator() : ptr(NULL) { }\n\t\t\titerator(const iterator&amp; it) : ptr(it.ptr) { }\n\t\t\texplicit iterator(PointersArray&amp; a) : ptr(a.pointers.begin()) { }\n\n\t\t\titerator&amp; operator++()\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr++;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\titerator operator++(int)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\titerator tmp = *this;\n\t\t\t\tptr++;\n\t\t\t\treturn tmp;\n\t\t\t}\n\n\t\t\titerator&amp; operator--()\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr--;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\titerator operator--(int)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\titerator tmp = *this;\n\t\t\t\tptr--;\n\t\t\t\treturn tmp;\n\t\t\t}\n\n\t\t\titerator&amp; operator+=(size_type v)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr += v;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\titerator&amp; operator-=(size_type v)\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\tptr -= v;\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tValue* operator-&gt;()\n\t\t\t{\n\t\t\t\tfb_assert(ptr);\n\t\t\t\treturn *ptr;\n\t\t\t}\n\n\t\t\tValue&amp; operator*()\n\t\t\t{\n\t\t\t\tfb_assert(ptr &amp;&amp; *ptr);\n\t\t\t\treturn **ptr;\n\t\t\t}\n\n\t\t\tbool operator==(const iterator&amp; v) const\n\t\t\t{\n\t\t\t\treturn ptr &amp;&amp; ptr == v.ptr;\n\t\t\t}\n\n\t\t\tbool operator!=(const iterator&amp; v) const\n\t\t\t{\n\t\t\t\treturn !operator==(v);\n\t\t\t}\n\t\t};\n\n\tpublic:\n\t\tsize_type add(const Value&amp; item)\n\t\t{\n\t\t\tconst Value* oldBegin = values.begin();\n\t\t\tvalues.add(item);\n\t\t\tcheckPointers(oldBegin);\n\t\t\treturn pointers.add(values.end() - 1);\n\t\t}\n\n\t\tconst_iterator begin() const\n\t\t{\n\t\t\treturn const_iterator(*this);\n\t\t}\n\n\t\tconst_iterator end() const\n\t\t{\n\t\t\tconst_iterator rc(*this);\n\t\t\trc += getCount();\n\t\t\treturn rc;\n\t\t}\n\n\t\titerator begin()\n\t\t{\n\t\t\treturn iterator(*this);\n\t\t}\n\n\t\titerator end()\n\t\t{\n\t\t\titerator rc(*this);\n\t\t\trc += getCount();\n\t\t\treturn rc;\n\t\t}\n\n\t\tconst Value&amp; operator[](size_type index) const\n\t\t{\n  \t\t\treturn *getPointer(index);\n\t\t}\n\n\t\tconst Value* getPointer(size_type index) const\n\t\t{\n  \t\t\treturn pointers[index];\n\t\t}\n\n\t\tValue&amp; operator[](size_type index)\n\t\t{\n  \t\t\treturn *getPointer(index);\n\t\t}\n\n\t\tValue* getPointer(size_type index)\n\t\t{\n  \t\t\treturn pointers[index];\n\t\t}\n\n\t\texplicit PointersArray(MemoryPool&amp; p) : values(p), pointers(p) { }\n\t\tPointersArray() : values(), pointers() { }\n\t\t~PointersArray() { }\n\n\t\tsize_type getCount() const noexcept\n\t\t{\n\t\t\tfb_assert(values.getCount() == pointers.getCount());\n\t\t\treturn values.getCount();\n\t\t}\n\n\t\tsize_type getCapacity() const\n\t\t{\n\t\t\treturn values.getCapacity();\n\t\t}\n\n\t\tvoid clear()\n\t\t{\n\t\t\tpointers.clear();\n\t\t\tvalues.clear();\n\t\t}\n\n\t\tPointersArray&amp; operator=(const PointersArray&amp; o)\n\t\t{\n\t\t\tvalues = o.values;\n\t\t\tpointers = o.pointers;\n\t\t\tcheckPointers(o.values.begin());\n\t\t\treturn *this;\n\t\t}\n\n\t\tbool find(const Key&amp; item, size_type&amp; pos) const\n\t\t{\n\t\t\treturn pointers.find(&amp;item, pos);\n\t\t}\n\n\t\tbool exist(const Key&amp; item) const\n\t\t{\n\t\t\treturn pointers.exist(item);\n\t\t}\n\n\t\tvoid insert(size_type pos, const Value&amp; item)\n\t\t{\n\t\t\tconst Value* oldBegin = values.begin();\n\t\t\tvalues.add(item);\n\t\t\tcheckPointers(oldBegin);\n\t\t\tpointers.insert(pos, values.end() - 1);\n\t\t}\n\t};\n\n} // namespace Firebird\n\n#endif\t// CLASSES_OBJECTS_ARRAY_H\n"}, "/build/src/remote/remote.h": {"id": "/build/src/remote/remote.h", "filePath": "src/remote/remote.h", "content": "/*\n *\tPROGRAM:\tJRD Remote Interface/Server\n *\tMODULE:\t\tremote.h\n *\tDESCRIPTION:\tCommon descriptions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its ORY\n\n#endif\n\ninline constexpr int BLOB_LENGTH = 16384;\n\n#include &quot;../remote/protocol.h&quot;\n#include &quot;fb_blk.h&quot;\n\n// Prefetch constants\n\ninline constexpr ULONG MAX_PACKETS_PER_BATCH = 16;\n\ninline constexpr ULONG MIN_ROWS_PER_BATCH = 10;\ninline constexpr ULONG MAX_ROWS_PER_BATCH = 1000;\n\ninline constexpr ULONG MAX_BATCH_CACHE_SIZE = 1024 * 1024; // 1 MB\n\ninline constexpr ULONG\tDEFAULT_BLOBS_CACHE_SIZE = 10 * 1024 * 1024;\t// 10 MB\n\ninline constexpr ULONG\tMAX_INLINE_BLOB_SIZE = MAX_USHORT;\ninline constexpr ULONG\tDEFAULT_INLINE_BLOB_SIZE = MAX_USHORT;\n\n// fwd. decl.\nnamespace Firebird {\n\tclass Exception;\n\tclass BatchCompletionState;\n}\n\n#ifdef WIN_NT\n#include &lt;WinSock2.h&gt;\n#else\ntypedef int SOCKET;\n#endif\n\nnamespace os_utils\n{\n\t// force descriptor to have O_CLOEXEC set\n\tSOCKET socket(int domain, int type, int protocol);\n\tSOCKET accept(SOCKET sockfd, sockaddr *addr, socklen_t *addrlen);\n}\n\nstruct rem_port;\n\ntypedef Firebird::AutoPtr&lt;UCHAR, Firebird::ArrayDelete &gt; UCharArrayAutoPtr;\n\ntypedef Firebird::RefPtr&lt;Firebird::IAttachment&gt; ServAttachment;\ntypedef Firebird::RefPtr&lt;Firebird::IBlob&gt; ServBlob;\ntypedef Firebird::RefPtr&lt;Firebird::ITransaction&gt; ServTransaction;\ntypedef Firebird::RefPtr&lt;Firebird::IStatement&gt; ServStatement;\ntypedef Firebird::RefPtr&lt;Firebird::IResultSet&gt; ServCursor;\ntypedef Firebird::RefPtr&lt;Firebird::IBatch&gt; ServBatch;\ntypedef Firebird::RefPtr&lt;Firebird::IRequest&gt; ServRequest;\ntypedef Firebird::RefPtr&lt;Firebird::IEvents&gt; ServEvents;\ntypedef Firebird::RefPtr&lt;Firebird::IService&gt; ServService;\n\n\n// this set of parameters helps using same functions\n// for both services and databases attachments\nstruct ParametersSet\n{\n\tUCHAR dummy_packet_interval, user_name, auth_block,\n\t\t  password, password_enc, trusted_auth,\n\t\t  plugin_name, plugin_list, specific_data,\n\t\t  address_path, process_id, process_name,\n\t\t  encrypt_key, client_version, remote_protocol,\n\t\t  host_name, os_user, config_text,\n\t\t  utf8_filename, map_attach;\n};\n\nextern const ParametersSet dpbParam, spbParam, connectParam;\n\n\nstruct Svc : public Firebird::GlobalStorage\n{\n\tServService\t\t\t\t\tsvc_iface;\t\t// service interface\n\tSvc() :\n\t\tsvc_iface(NULL)\n\t{ }\n};\n\n\nstruct Rdb : public Firebird::GlobalStorage, public TypedHandle&lt;rem_type_rdb&gt;\n{\n\tServAttachment\trdb_iface;\t\t\t\t// attachment interface\n\trem_port*\t\trdb_port;\t\t\t\t// communication port\n\tFirebird::AutoPtr&lt;Svc&gt;\trdb_svc;\t\t// service-specific block\n\tstruct Rtr*\t\trdb_transactions;\t\t// linked list of transactions\n\tstruct Rrq*\t\trdb_requests;\t\t\t// compiled requests\n\tstruct Rvnt*\trdb_events;\t\t\t\t// known events\n\tstruct Rsr*\t\trdb_sql_requests;\t\t// SQL requests\n\tPACKET\t\t\trdb_packet;\t\t\t\t// Communication structure\n\tUSHORT\t\t\trdb_id;\n\nprivate:\n\tThreadId\t\trdb_async_thread_id;\t// Id of async thread (when active)\n\npublic:\n\tstd::atomic&lt;int&gt; rdb_async_lock;\t\t// Atomic to avoid &gt;1 async calls at once\n\n\tULONG\t\t\trdb_inline_blob_size;\t\t// default max size of blob that can be transferred inline\n\tULONG\t\t\trdb_blob_cache_size;\t\t// limit on cached blobs size\n\tULONG\t\t\trdb_cached_blobs_size;\t\t// actual size of cached blobs\n\tULONG\t\t\trdb_cached_blobs_count;\t\t// actual count of cached blobs\n\npublic:\n\tRdb() :\n\t\trdb_iface(NULL), rdb_port(0),\n\t\trdb_transactions(0), rdb_requests(0), rdb_events(0), rdb_sql_requests(0),\n\t\trdb_id(0), rdb_async_thread_id(0), rdb_async_lock(0),\n\t\trdb_inline_blob_size(DEFAULT_INLINE_BLOB_SIZE), rdb_blob_cache_size(DEFAULT_BLOBS_CACHE_SIZE),\n\t\trdb_cached_blobs_size(0), rdb_cached_blobs_count(0)\n\t{\n\t}\n\n\tstatic constexpr ISC_STATUS badHandle() noexcept { return isc_bad_db_handle; }\n\n\t// Increment blob cache usage.\n\t// Return false if blob cache have not enough space for a blob of given size.\n\ nt(P_SQLFREE*, PACKET*);\n\tISC_STATUS\tend_transaction(P_OP, P_RLSE*, PACKET*);\n\tISC_STATUS\texecute_immediate(P_OP, P_SQLST*, PACKET*);\n\tISC_STATUS\texecute_statement(P_OP, P_SQLDATA*, PACKET*);\n\tISC_STATUS\tfetch(P_SQLDATA*, PACKET*, bool);\n\tISC_STATUS\tget_segment(P_SGMT*, PACKET*);\n\tISC_STATUS\tget_slice(P_SLC*, PACKET*);\n\tvoid\t\tinfo(P_OP, P_INFO*, PACKET*);\n\tISC_STATUS\topen_blob(P_OP, P_BLOB*, PACKET*);\n\tISC_STATUS\tprepare(P_PREP*, PACKET*);\n\tISC_STATUS\tprepare_statement(P_SQLST*, PACKET*);\n\tISC_STATUS\tput_segment(P_OP, P_SGMT*, PACKET*);\n\tISC_STATUS\tput_slice(P_SLC*, PACKET*);\n\tISC_STATUS\tque_events(P_EVENT*, PACKET*);\n\tISC_STATUS\treceive_after_start(P_DATA* data, PACKET* sendL, Firebird::CheckStatusWrapper* status_vector);\n\tISC_STATUS\treceive_msg(P_DATA*, PACKET*);\n\tISC_STATUS\tseek_blob(P_SEEK*, PACKET*);\n\tISC_STATUS\tsend_msg(P_DATA*, PACKET*);\n\tISC_STATUS\tsend_response(PACKET*, OBJCT, ULONG, const ISC_STATUS*, bool);\n\tISC_STATUS\tsend_response(PACKET* p, OBJCT obj, ULONG length, const Firebird::IStatus* status, bool defer_flag);\n\tISC_STATUS\tservice_attach(const char*, Firebird::ClumpletWriter*, PACKET*);\n\tISC_STATUS\tservice_end(P_RLSE*, PACKET*);\n\tvoid\t\tservice_start(P_INFO*, PACKET*);\n\tISC_STATUS\tset_cursor(P_SQLCUR*, PACKET*);\n\tISC_STATUS\tstart(P_OP, P_DATA*, PACKET*);\n\tISC_STATUS\tstart_and_send(P_OP, P_DATA*, PACKET*);\n\tISC_STATUS\tstart_transaction(P_OP, P_STTR*, PACKET*);\n\tISC_STATUS\ttransact_request(P_TRRQ *, PACKET*);\n\tSSHORT\t\tasyncReceive(PACKET* asyncPacket, const UCHAR* buffer, SSHORT dataSize);\n\tvoid\t\tstart_crypt(P_CRYPT*, PACKET*);\n\tvoid\t\tbatch_create(P_BATCH_CREATE*, PACKET*);\n\tvoid\t\tbatch_msg(P_BATCH_MSG*, PACKET*);\n\tvoid\t\tbatch_blob_stream(P_BATCH_BLOB*, PACKET*);\n\tvoid\t\tbatch_regblob(P_BATCH_REGBLOB*, PACKET*);\n\tvoid\t\tbatch_exec(P_BATCH_EXEC*, PACKET*);\n\tvoid\t\tbatch_rls(P_RLSE*, PACKET*);\n\tvoid\t\tbatch_cancel(P_RLSE*, PACKET*);\n\tvoid\t\tbatch_sync(PACKET*);\n\tvoid\t\tbatch_bpb(P_BATCH_SETBPB*, PACKET*);\n\tvoid\t\treplicate(P_REPLICATE*, PACKET*);\n\n\tFirebird::string getRemoteId() const;\n\tvoid auxAcceptError(PACKET* packet);\n\n\t// Working with &#x27;key/plugin&#x27; pairs and associated plugin specific data\n\tvoid addServerKeys(const CSTRING* str);\n\tvoid addSpecificData(const Firebird::PathName&amp; type, const Firebird::PathName&amp; plugin,\n\t\tunsigned length, const void* data);\n\tconst Firebird::UCharBuffer* findSpecificData(const Firebird::PathName&amp; type, const Firebird::PathName&amp; plugin);\n\tbool tryNewKey(InternalCryptKey* cryptKey);\n\n\tvoid checkResponse(Firebird::IStatus* warning, PACKET* packet, bool checkKeys = false);\n\nprivate:\n\tbool tryKeyType(const KnownServerKey&amp; srvKey, InternalCryptKey* cryptKey);\n\n\tvoid sendInlineBlobs(PACKET*, Rtr* rtr, UCHAR* message, const rem_fmt* format, ULONG maxSize);\n\n\t// return false if any error retrieving blob happens\n\tbool sendInlineBlob(PACKET*, Rtr* rtr, SQUAD blobId, ULONG maxSize);\n};\n\n\n// Port guard is needed to close events delivery thread in safe way\nclass RemotePortGuard\n{\nprivate:\n\tclass WaitThread\n\t{\n\tpublic:\n\t\tWaitThread(rem_port* async) noexcept\n\t\t\t: asyncPort(async),\n\t\t\t  waitFlag(false)\n\t\t{ }\n\n\t\t~WaitThread()\n\t\t{\n\t\t\tif (waitFlag)\n\t\t\t{\n\t\t\t\tThread::waitForCompletion(waitHandle);\n\n\t\t\t\tfb_assert(asyncPort);\n\n\t\t\t\tif (asyncPort)\n\t\t\t\t\tasyncPort-&gt;releasePort();\n\t\t\t}\n\t\t\telse if (asyncPort)\n\t\t\t\tasyncPort-&gt;port_thread_guard = nullptr;\n\t\t}\n\n\t\trem_port* asyncPort;\n\t\tThread::Handle waitHandle{};\n\t\tbool waitFlag;\n\t};\n\npublic:\n\tRemotePortGuard(rem_port* port, const char* f)\n\t\t: wThr(port-&gt;port_async),\n\t\t  guard(*port-&gt;port_sync, f)\n\t{\n\t\tif (wThr.asyncPort)\n\t\t\twThr.asyncPort-&gt;port_thread_guard = this;\n\t}\n\n\tvoid setWait(Thread::Handle&amp; handle) noexcept\n\t{\n\t\twThr.waitHandle = handle;\n\t\twThr.waitFlag = true;\n\t\tfb_assert(wThr.asyncPort);\n\t\twThr.asyncPort-&gt;port_thread_guard = nullptr;\n\t}\n\nprivate:\n\tWaitThread wThr;\n\tFirebird::RefMutexGuard guard;\n};\n\n\n// Queuing structure for Client batch fetches\n\ntypedef void (*t_rmtque_fn)(rem_port*, rmtque*, USHORT);\n\nstruct rmtque : public Firebird::GlobalStorage\n{\n\trmtque*\t\t\t\trmtque_next;\t// Next entry in queue\n\tvoid*\t\t\t\trmtque_parm;\t// What request has response in queue\n\tRrq::rrq_repeat*\trmtque_message;\t// What message is pending\n\tRdb*\t\t\t\trmtque_rdb;\t\t// What database has pending msg\n\n\t// Fn that receives queued entry\n\tt_rmtque_fn\t\t\trmtque_function;\n\npublic:\n\trmtque() noexcept :\n\t\trmtque_next(0), rmtque_parm(0), rmtque_message(0), rmtque_rdb(0), rmtque_function(0)\n\t{ }\n};\n\n\n// contains ports which must be closed at engine shutdown\nclass PortsCleanup\n{\npublic:\n\tPortsCleanup() noexcept :\n\t  m_ports(NULL),\n\t  m_mutex(),\n\t  closing(false)\n\t{}\n\n\texplicit PortsCleanup(MemoryPool&amp;) :\n\t  m_ports(NULL),\n\t  m_mutex(),\n\t  closing(false)\n\t{}\n\n\tvirtual ~PortsCleanup()\n\t{}\n\n\tvoid registerPort(rem_port*);\n\tvoid unRegisterPort(rem_port*);\n\n\tvoid closePorts();\n\tvirtual void closePort(rem_port*);\n\tvirtual void delay();\n\nprivate:\n\ttypedef Firebird::SortedArray&lt;rem_port*&gt; PortsArray;\n\tPortsArray*\t\tm_ports;\n\tFirebird::Mutex\tm_mutex;\n\tbool closing;\n};\n\n#endif // REMOTE_REMOTE_H\n"}, "/build/src/common/classes/ImplementHelper.h": {"id": "/build/src/common/classes/ImplementHelper.h", "filePath": "src/common/classes/ImplementHelper.h", "content": "/*\n *\tPROGRAM:\t\tFirebird interface.\n *\tMODULE:\t\t\tImplementHelper.h\n *\tDESCRIPTION:\tTools to help create interfaces.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2010 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_COMMON_CLASSES_IMPLEMENT_HELPER\n#define FB_COMMON_CLASSES_IMPLEMENT_HELPER\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;firebird/impl/consts_pub.h&quot;\n#ifdef DEV_BUILD\n#include &lt;stdio.h&gt;\n#endif\n\nnamespace Firebird {\n\n// Implement standard interface and plugin functions\n\n// Helps to implement generic versioned interfaces\ntemplate &lt;class C&gt;\nclass VersionedIface : public C\n{\npublic:\n\tVersionedIface() { }\n\nprivate:\n\tVersionedIface(const VersionedIface&amp;);\n\tVersionedIface&amp; operator=(const VersionedIface&amp;);\n};\n\n// Helps to implement versioned interfaces on stack or static\ntemplate &lt;class C&gt;\nclass AutoIface : public VersionedIface&lt;C&gt;\n{\npublic:\n\tAutoIface() { }\n};\n\n// Helps to implement disposable interfaces\ntemplate &lt;class C&gt;\nclass DisposeIface : public VersionedIface&lt;C&gt;, public GlobalStorage\n{\npublic:\n\tDisposeIface() { }\n\n\tvoid dispose() override\n\t{\n\t\tdelete this;\n\t}\n};\n\n// Helps to implement standard interfaces\ntemplate &lt;class C&gt;\nclass RefCntIface : public VersionedIface&lt;C&gt;, public GlobalStorage\n{\n\n#ifdef DEV_BUILD\npublic:\n\tRefCntIface(const char* m = NULL)\n\t\t:  mark(m), refCounter(0)\n\t{\n\t\trefCntDPrt(&#x27;^&#x27;);\n\t}\n\n\tconst char* mark;\n#else\npublic:\n\tRefCntIface() : refCounter(0) { }\n#endif\n\nprotected:\n\tvirtual ~RefCntIface()\n\t{\n\t\trefCntDPrt(&#x27;_&#x27;);\n\t\tfb_assert(refCounter == 0);\n\t}\n\npublic:\n\tvoid addRef() override\n\t{\n\t\trefCntDPrt(&#x27;+&#x27;);\n\t\t++refCounter;\n\t}\n\n\tint release() override\n\t{\n\t\tint rc = --refCounter;\n\t\trefCntDPrt(&#x27;-&#x27;);\n\t\tif (rc == 0)\n\t\t\tdelete this;\n\n\t\treturn rc;\n\t}\n\nprotected:\n\tvoid refCntDPrt(char f)\n\t{\n#ifdef DEV_BUILD\n\t\tif (mark)\n\t\t\tfprintf(stderr, &quot;%s %p %c %d\\n&quot;, mark, this, f, int(refCounter));\n#endif\n\t}\n\n\tAtomicCounter refCounter;\n};\n\n\n// Helps to implement plugins\ntemplate &lt;class C&gt;\nclass StdPlugin : public RefCntIface&lt;C&gt;\n{\nprivate:\n\tIReferenceCounted* owner;\n\npublic:\n\tStdPlugin(const char* m = NULL)\n#ifdef DEV_BUILD\n\t\t: RefCntIface&lt;C&gt;(m), owner(NULL)\n#else\n\t\t: owner(NULL)\n#endif\n\t{ }\n\n\tIReferenceCounted* getOwner() override\n\t{\n\t\treturn owner;\n\t}\n\n\tvoid setOwner(IReferenceCounted* iface) override\n\t{\n\t\towner = iface;\n\t}\n};\n\n\n// Trivial factory\ntemplate &lt;class P&gt;\nclass SimpleFactoryBase : public AutoIface&lt;IPluginFactoryImpl&lt;SimpleFactoryBase&lt;P&gt;, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tIPluginBase* createPlugin(CheckStatusWrapper* status, IPluginConfig* factoryParameter)\n\t{\n\t\ttry\n\t\t{\n\t\t\tP* p = FB_NEW P(factoryParameter);\n\t\t\tp-&gt;addRef();\n\t\t\treturn p;\n\t\t}\n\t\tcatch (const Firebird::Exception&amp; ex)\n\t\t{\n\t\t\tex.stuffException(status);\n\t\t}\n\t\treturn NULL;\n\t}\n};\n\ntemplate &lt;class P&gt;\nclass SimpleFactory : public Static&lt;SimpleFactoryBase&lt;P&gt; &gt;\n{\n};\n\n\n// Ensure access to cached pointer to master interface\nclass CachedMasterInterface\n{\npublic:\n\tstatic void set(IMaster* master);\n\nprotected:\n\tstatic IMaster* getMasterInterface();\n};\n\n// Base for interface type independent accessors\ntemplate &lt;typename C&gt;\nclass AccessAutoInterface : public CachedMasterInterface\n{\npublic:\n\texplicit AccessAutoInterface(C* aPtr)\n\t\t: ptr(aPtr)\n\t{ }\n\n\toperator C*()\n\t{\n\t\treturn ptr;\n\t}\n\n\tC* operator-&gt;()\n\t{\n\t\treturn ptr;\n\t}\n\nprivate:\n\tC* ptr;\n};\n\n// Master interface access\nclass MasterInterfacePtr : public AccessAutoInterface&lt;IMaster&gt;\n{\npublic:\n\tMasterInterfacePtr()\n\t\t: AccessAutoInterface&lt;IMaster&gt;(getMasterInterface())\n\t{ }\n};\n\n\n// Generic plugins interface access\nclass PluginManagerInterfacePtr : public AccessAutoInterface&lt;IPluginManager&gt;\n{\npublic:\n\tPluginManagerInterfacePtr()\n\t\t: AccessAutoInterface&lt;IPluginManager&gt;(getMasterInterface()-&gt;getPluginManager())\n\t{ }\n};\n\n\n// Control timer interface access\nclass TimerInterfacePtr : public AccessAutoInterface&lt;ITimerControl&gt;\n{\npublic:\n\tTimerInterfacePtr()\n\t\t: AccessAutoInterface&lt;ITimerControl&gt;(getMasterInterface()-&gt;getTimerControl())\n\t{ }\n};\n\n\n// Distributed transactions coordinator access\nclass DtcInterfacePtr : public AccessAutoInterface&lt;IDtc&gt;\n{\npublic:\n\tDtcInterfacePtr()\n\t\t: AccessAutoInterface&lt;IDtc&gt;(getMasterInterface()-&gt;getDtc())\n\t{ }\n};\n\n\n// Dispatcher access\nclass DispatcherPtr : public AccessAutoInterface&lt;IProvider&gt;\n{\npublic:\n\tDispatcherPtr()\n\t\t: AccessAutoInterface&lt;IProvider&gt;(getMasterInterface()-&gt;getDispatcher())\n\t{ }\n\n\t~DispatcherPtr()\n\t{\n\t\t(*this)-&gt;release();\n\t}\n};\n\n\n// Misc utl access\nclass UtilInterfacePtr : public AccessAutoInterface&lt;IUtil&gt;\n{\npublic:\n\tUtilInterfacePtr()\n\t\t: AccessAutoInterface&lt;IUtil&gt;(getMasterInterface()-&gt;getUtilInterface())\n\t{ }\n};\n\n\n// When process exits, dynamically loaded modules (for us plugin modules)\n// are unloaded first. As the result all global variables in plugin are already destroyed\n// when yvalve is starting fb_shutdown(). This causes almost unavoidable segfault.\n// To avoid it this class is added - it detects spontaneous (not by PluginManager)\n// module unload and notifies PluginManager about this said fact.\nclass UnloadDetectorHelper final :\n\tpublic VersionedIface&lt;IPluginModuleImpl&lt;UnloadDetectorHelper, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\ttypedef void VoidNoParam();\n\n\texplicit UnloadDetectorHelper(MemoryPool&amp;)\n\t\t: cleanup(NULL), thdDetach(NULL), flagOsUnload(false)\n\t{ }\n\n\tvoid registerMe()\n\t{\n\t\tPluginManagerInterfacePtr()-&gt;registerModule(this);\n\t\tflagOsUnload = true;\n\t}\n\n\t~UnloadDetectorHelper()\n\t{\n\t\tif (flagOsUnload)\n\t\t{\n\t\t\tconst bool dontCleanup = MasterInterfacePtr()-&gt;getProcessExiting();\n\t\t\tif (dontCleanup)\n\t\t\t{\n\t\t\t\tInstanceControl::cancelCleanup();\n\t\t\t\treturn;\n\t\t\t}\n\n\t\t\tPluginManagerInterfacePtr()-&gt;unregisterModule(this);\n\t\t\tdoClean();\n\t\t}\n\t}\n\n\tbool unloadStarted()\n\t{\n\t\treturn !flagOsUnload;\n\t}\n\n\tvoid setCleanup(VoidNoParam* function)\n\t{\n\t\tcleanup = function;\n\t}\n\n\tvoid setThreadDetach(VoidNoParam* function)\n\t{\n\t\tthdDetach = function;\n\t}\n\n\tvoid doClean()\n\t{\n\t\tflagOsUnload = false;\n\n\t\tif (cleanup)\n\t\t{\n\t\t\tcleanup();\n\t\t\tcleanup = NULL;\n\t\t}\n\t}\n\n\tvoid threadDetach()\n\t{\n\t\tif (thdDetach)\n\t\t\tthdDetach();\n\t}\n\nprivate:\n\tVoidNoParam* cleanup;\n\tVoidNoParam* thdDetach;\n\tbool flagOsUnload;\n};\n\ntypedef GlobalPtr&lt;UnloadDetectorHelper, InstanceControl::PRIORITY_DETECT_UNLOAD&gt; UnloadDetector;\nUnloadDetectorHelper* getUnloadDetector();\n\n// Generic status checker\ninline void check(IStatus* status, ISC_STATUS exclude = 0)\n{\n\tif (status-&gt;getState() &amp; IStatus::STATE_ERRORS)\n\t{\n\t\tif (status-&gt;getErrors()[1] != exclude)\n\t\t\tstatus_exception::raise(status);\n\t}\n}\n\n// Config keys cache\nclass ConfigKeys : private HalfStaticArray&lt;unsigned int, 8&gt;\n{\npublic:\n\tConfigKeys(MemoryPool&amp; p)\n\t\t: HalfStaticArray&lt;unsigned int, 8&gt;(p)\n\t{ }\n\n\tconst static unsigned int INVALID_KEY = ~0u;\n\n\tunsigned int getKey(IFirebirdConf* config, const char* keyName);\n};\n\n#ifdef NEVERDEF\nstatic inline int refCount(IReferenceCounted* refCounted)\n{\n#ifdef DEV_BUILD\n\tif (refCounted)\n\t{\n\t\trefCounted-&gt;addRef();\n\t\treturn refCounted-&gt;release();\n\t}\n#endif\n\treturn 0;\n}\n#endif\n\n} // namespace Firebird\n\n#endif // FB_COMMON_CLASSES_IMPLEMENT_HELPER\n"}, "/build/src/remote/remot_proto.h": {"id": "/build/src/remote/remot_proto.h", "filePath": "src/remote/remot_proto.h", "content": "/*\n *\tPROGRAM:\tJRD Remote Interface/Server\n *\tMODULE:\t\tremot_proto.h\n *\tDESCRIPTION:\tPrototpe header file for remote.cpp\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#ifndef REMOTE_REMOT_PROTO_H\n#define REMOTE_REMOT_PROTO_H\n\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n#include &quot;../common/classes/ParsedList.h&quot;\n#include &quot;../remote/protocol.h&quot;\n#include &quot;../common/xdr_proto.h&quot;\n\n\nnamespace Firebird\n{\n\tclass ClumpletReader;\n}\n\nstruct rem_port;\nstruct RemoteXdr : public xdr_t\n{\n\tRemoteXdr()\n\t\t: x_public(nullptr)\n\t{ }\n\n\trem_port* x_public;\n};\n\nstruct rem_fmt;\nstruct Rdb;\ntypedef bool PacketReceive(rem_port*, UCHAR*, SSHORT, SSHORT*);\ntypedef bool PacketSend(rem_port*, const SCHAR*, SSHORT);\ntypedef bool ProtoWrite(RemoteXdr*);\nenum LegacyPlugin {PLUGIN_NEW = 0, PLUGIN_LEGACY, PLUGIN_TRUSTED};\n\nvoid\t\tREMOTE_cleanup_transaction (struct Rtr *);\nUSHORT\t\tREMOTE_compute_batch_size (rem_port*, USHORT, P_OP, const rem_fmt*);\nvoid\t\tREMOTE_get_timeout_params(rem_port* port, Firebird::ClumpletReader* pb);\nstruct Rrq*\tREMOTE_find_request (struct Rrq *, USHORT);\nvoid\t\tREMOTE_free_packet (rem_port*, struct packet *, bool = false);\nstruct rem_str*\tREMOTE_make_string (const SCHAR*);\nvoid\t\tREMOTE_release_messages (struct RMessage*);\nvoid\t\tREMOTE_release_request (struct Rrq *);\nvoid\t\tREMOTE_reset_request (struct Rrq *, struct RMessage*);\nvoid\t\tREMOTE_reset_statement (struct Rsr *);\nbool_t\t\tREMOTE_getbytes (RemoteXdr*, SCHAR*, unsigned);\nLegacyPlugin REMOTE_legacy_auth(const char* nm, int protocol);\nFirebird::RefPtr&lt;const Firebird::Config&gt; REMOTE_get_config(const Firebird::PathName* dbName,\n\tconst Firebird::string* dpb_config = NULL);\nvoid\t\tREMOTE_check_response(Firebird::IStatus* warning, Rdb* rdb, PACKET* packet, bool checkKeys = false);\nbool\t\tREMOTE_inflate(rem_port*, PacketReceive*, UCHAR*, SSHORT, SSHORT*);\nbool\t\tREMOTE_deflate(RemoteXdr*, ProtoWrite*, PacketSend*, bool flash);\n\nextern signed char wcCompatible[3][3];\n\n#define HANDSHAKE_DEBUG(A)\n#define WIRECRYPT_DEBUG(A)\n\n#endif // REMOTE_REMOT_PROTO_H\n"}, "/build/src/remote/remote.cpp": {"id": "/build/src/remote/remote.cpp", "filePath": "src/remote/remote.cpp", "content": "/*\n *\tPROGRAM:\tJRD Remote Interface\n *\tMODULE:\t\tremote.cpp\n *\tDESCRIPTION:\tCommon routines for remote interface/server\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#include &quot;firebird.h&quot;\n#include &lt;string.h&gt;\n#include &lt;stdlib.h&gt;\n#include &quot;ibase.h&quot;\n#include &quot;../remote/remote.h&quot;\n#include &quot;../common/file_params.h&quot;\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../remote/proto_proto.h&quot;\n#include &quot;../remote/remot_proto.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/db_alias.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/os/mod_loader.h&quot;\n#include &quot;../jrd/license.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n\nusing namespace Firebird;\n\n#ifdef DEV_BUILD\nAtomicCounter rem_port::portCounter;\n#endif\n\n#ifdef REMOTE_DEBUG\nIMPLEMENT_TRACE_ROUTINE(remote_trace, &quot;REMOTE&quot;)\n#endif\n\n\nconst ParametersSet dpbParam =\n{\n\tisc_dpb_dummy_packet_interval,\n\tisc_dpb_user_name,\n\tisc_dpb_auth_block,\n\tisc_dpb_password,\n\tisc_dpb_password_enc,\n\tisc_dpb_trusted_auth,\n\tisc_dpb_auth_plugin_name,\n\tisc_dpb_auth_plugin_list,\n\tisc_dpb_specific_auth_data,\n\tisc_dpb_address_path,\n\tisc_dpb_process_id,\n\tisc_dpb_process_name,\n\tisc_dpb_encrypt_key,\n\tisc_dpb_client_version,\n\tisc_dpb_remote_protocol,\n\tisc_dpb_host_name,\n\tisc_dpb_os_user,\n\tisc_dpb_config,\n\tisc_dpb_utf8_filename,\n\tisc_dpb_map_attach\n};\n\nconst ParametersSet spbParam =\n{\n\tisc_spb_dummy_packet_interval,\n\tisc_spb_user_name,\n\tisc_spb_auth_block,\n\tisc_spb_password,\n\tisc_spb_password_enc,\n\tisc_spb_trusted_auth,\n\tisc_spb_auth_plugin_name,\n\tisc_spb_auth_plugin_list,\n\tisc_spb_specific_auth_data,\n\tisc_spb_address_path,\n\tisc_spb_process_id,\n\tisc_spb_process_name,\n\t0,\n\tisc_spb_client_version,\n\tisc_spb_remote_protocol,\n\tisc_spb_host_name,\n\tisc_spb_os_user,\n\tisc_spb_config,\n\tisc_spb_utf8_filename,\n\t0\n};\n\nconst ParametersSet connectParam =\n{\n\t0,\n\tCNCT_login,\n\t0,\n\t0,\n\t0,\n\t0,\n\tCNCT_plugin_name,\n\tCNCT_plugin_list,\n\tCNCT_specific_data,\n\t0,\n\t0,\n\t0,\n\t0,\n\t0,\n\t0,\n\tCNCT_host,\n\tCNCT_user,\n\t0,\n\t0,\n\t0\n};\n\n\nconst SLONG DUMMY_INTERVAL\t\t= 60;\t// seconds\nconst int ATTACH_FAILURE_SPACE\t= 16 * 1024;\t// bytes\n\n\nvoid REMOTE_cleanup_transaction( Rtr* transaction)\n{\n/**************************************\n *\n *\tR E M O T E _ c l e a n u p _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\tA transaction is being committed or rolled back.\n *\tPurge any active messages in case the user calls\n *\treceive while we still have something cached.\n *\n **************************************/\n\tfor (Rrq* request = transaction-&gt;rtr_rdb-&gt;rdb_requests; request; request = request-&gt;rrq_next)\n\t{\n\t\tif (request-&gt;rrq_rtr == transaction)\n\t\t{\n\t\t\tREMOTE_reset_request(request, 0);\n\t\t\trequest-&gt;rrq_rtr = NULL;\n\t\t}\n\t\tfor (Rrq* level = request-&gt;rrq_levels; level; level = level-&gt;rrq_next)\n\t\t{\n\t\t\tif (level-&gt;rrq_rtr == transaction)\n\t\t\t{\n\t\t\t\tREMOTE_reset_request(level, 0);\n\t\t\t\tlevel-&gt;rrq_rtr = NULL;\n\t\t\t}\n\t\t}\n\t}\n\n\tfor (Rsr* statement = transaction-&gt;rtr_rdb-&gt;rdb_sql_requests; statement;\n\t\t statement = statement-&gt;rsr_next)\n\t{\n\t\tif (statement-&gt;rsr_rtr == transaction)\n\t\t{\n\t\t\tREMOTE_reset_statement(statement);\n\t\t\tstatement-&gt;rsr_flags.clear(Rsr::FETCHED);\n\t\t\tstatement-&gt;rsr_rtr = NULL;\n\t\t}\n\t}\n}\n\n\nUSHORT REMOTE_compute_batch_size(rem_port* port,\n\t\t\t\t\t\t\t\t USHORT buffer_used, P_OP op_code,\n\t\t\t\t\t\t\t\t const rem_fmt* format)\n{\n/**************************************\n *\n *\tR E M O T E _ c o m p u t e _ b a t c h _ s i z e\n *\n **************************************\n *\n * Functional description\n *\n * When batches of records are returned, they are returned as\n *    follows:\n *     &lt;op_fetch_response&gt; &lt;data_record 1&gt;\n *     &lt;op_fetch_response&gt; &lt;data_record 2&gt;\n * \t...\n *     &lt;op_fetch_response&gt; &lt;data_record n-1&gt;\n *     &lt;op_fetch_response&gt; &lt;data_record n&gt;\n *\n * end-of-batch is indicated by setting p_sqldata_messages to\n * 0 in the op_fetch_response.  End of cursor is indicated\n * by setting p_sqldata_status to a non-zero value.  Note\n * that a fetch CAN be attempted after end of cursor, this\n * is sent to the server for the server to return the appropriate\n * error code.\n *\n * Each data block has one overhead packet\n * to indicate the data is present.\n *\n * (See also op_send in receive_msg() - which is a kissing cousin\n *  to this routine)\n *\n * Here we make a guess for the optimal number of records to\n * send in each batch.  This is important as we wait for the\n * whole batch to be received before we return the first item\n * to the client program.  How many are cached on the client also\n * impacts client-side memory utilization.\n *\n * We optimize the number by how many can fit into a packet.\n * The client calculates this number (n from the list above)\n * and sends it to the server.\n *\n * The data size is either the XDR data representation, or the\n * actual message size (rounded up) if this is a symmetric\n * architecture connection.\n *\n **************************************/\n\n\tconst USHORT op_overhead = (USHORT) xdr_protocol_overhead(op_code);\n\n#ifdef DEBUG\n\tfprintf(stderr,\n\t\t\t   &quot;port_buff_size = %d fmt_net_length = %d fmt_length = %d overhead = %d\\n&quot;,\n\t\t\t   port-&gt;port_buff_size, format-&gt;fmt_net_length,\n\t\t\t   format-&gt;fmt_length, op_overhead);\n#endif\n\n\tconst ULONG row_size = op_overhead +\n\t\t(port-&gt;port_flags &amp; PORT_symmetric) ?\n\t\t\tROUNDUP(format-&gt;fmt_length, 4) : \t// Same architecture connection\n\t\t\tROUNDUP(format-&gt;fmt_net_length, 4);\t// Using XDR for data transfer\n\n\tULONG result = (port-&gt;port_protocol &gt;= PROTOCOL_VERSION13) ?\n\t\tMAX_ROWS_PER_BATCH : (MAX_PACKETS_PER_BATCH * port-&gt;port_buff_size - buffer_used) / row_size;\n\n\t// Don&#x27;t ask for more records than we can cache\n\n\tresult = MIN(result, MAX_BATCH_CACHE_SIZE / format-&gt;fmt_length);\n\n\t// Must always send some messages, even if message is larger than packet\n\n\tresult = MAX(result, MIN_ROWS_PER_BATCH);\n\n\tfb_assert(result &lt;= MAX_USHORT);\n\treturn static_cast&lt;USHORT&gt;(result);\n}\n\n\nRrq* REMOTE_find_request(Rrq* request, USHORT level)\n{\n/**************************************\n *\n *\tR E M O T E _ f i n d _ r e q u e s t\n *\n **************************************\n *\n * Functional description\n *\tFind sub-request if level is non-zero.\n *\n **************************************/\n\n\t// See if we already know about the request level\n\n\tfor (;;)\n\t{\n\t\tif (request-&gt;rrq_level == level)\n\t\t\treturn request;\n\t\tif (!request-&gt;rrq_levels)\n\t\t\tbreak;\n\t\trequest = request-&gt;rrq_levels;\n\t}\n\n\t// This is a new level -- make up a new request block.\n\n\trequest-&gt;rrq_levels = request-&gt;clone();\n\t// FREE: REMOTE_remove_request()\n#ifdef DEBUG_REMOTE_MEMORY\n\tprintf(&quot;REMOTE_find_request       allocate request %x\\n&quot;, request-&gt;rrq_levels);\n#endif\n\trequest = request-&gt;rrq_levels;\n\trequest-&gt;rrq_level = level;\n\trequest-&gt;rrq_levels = NULL;\n\n\t// Allocate message block for known messages\n\n\tRrq::rrq_repeat* tail = request-&gt;rrq_rpt.begin();\n\tconst Rrq::rrq_repeat* const end = tail + request-&gt;rrq_max_msg;\n\tfor (; tail &lt;= end; tail++)\n\t{\n\t\tconst rem_fmt* format = tail-&gt;rrq_format;\n\t\tif (!format)\n\t\t\tcontinue;\n\t\tRMessage* msg = FB_NEW RMessage(format-&gt;fmt_length);\n\t\ttail-&gt;rrq_xdr = msg;\n#ifdef DEBUG_REMOTE_MEMORY\n\t\tprintf(&quot;REMOTE_find_request       allocate message %x\\n&quot;, msg);\n#endif\n\t\tmsg-&gt;msg_next = msg;\n\t\tmsg-&gt;msg_number = tail-&gt;rrq_message-&gt;msg_number;\n\t\ttail-&gt;rrq_message = msg;\n\t}\n\n\treturn request;\n}\n\n\nvoid REMOTE_free_packet( rem_port* port, PACKET * packet, bool partial)\n{\n/**************************************\n *\n *\tR E M O T E _ f r e e _ p a c k e t\n *\n **************************************\n *\n * Functional description\n *\tZero out a full packet block (partial == false) or\n *\tpart of packet used in last operation (partial == true)\n **************************************/\n\tRemoteXdr xdr;\n\tUSHORT n;\n\n\tif (packet)\n\t{\n\t\txdr.create(reinterpret_cast&lt;char*&gt;(packet), sizeof(PACKET), XDR_FREE);\n\t\txdr.x_public = port;\n\t\txdr.x_local = (port-&gt;port_type == rem_port::XNET);\n\n\t\tif (partial) {\n\t\t\txdr_protocol(&amp;xdr, packet);\n\t\t}\n\t\telse\n\t\t{\n\t\t\tfor (n = (USHORT) op_connect; n &lt; (USHORT) op_max; n++)\n\t\t\t{\n\t\t\t\tpacket-&gt;p_operation = (P_OP) n;\n\t\t\t\txdr_protocol(&amp;xdr, packet);\n\t\t\t}\n\t\t}\n#ifdef DEBUG_XDR_MEMORY\n\t\t// All packet memory allocations should now be voided.\n\t\t// note: this code will may work properly if partial == true\n\n\t\tfor (n = 0; n &lt; P_MALLOC_SIZE; n++)\n\t\t\tfb_assert(packet-&gt;p_malloc[n].p_operation == op_void);\n#endif\n\t\tpacket-&gt;p_operation = op_void;\n\t}\n}\n\n\nvoid REMOTE_get_timeout_params(rem_port* port, ClumpletReader* pb)\n{\n/**************************************\n *\n *\tR E M O T E _ g e t _ t i m e o u t _ p a r a m s\n *\n **************************************\n *\n * Functional description\n *\tDetermine the connection timeout parameter values for this newly created\n *\tport.  If the client did a specification in the DPB, use those values.\n *\tOtherwise, see if there is anything in the configuration file.  The\n *\tconfiguration file management code will set the default values if there\n *\tis no other specification.\n *\n **************************************/\n\t//bool got_dpb_connect_timeout = false;\n\n\tfb_assert(isc_dpb_connect_timeout == isc_spb_connect_timeout);\n\n\tport-&gt;port_connect_timeout = pb &amp;&amp; pb-&gt;find(isc_dpb_connect_timeout) ?\n\t\tpb-&gt;getInt() : port-&gt;getPortConfig()-&gt;getConnectionTimeout();\n\n\tport-&gt;port_flags |= PORT_dummy_pckt_set;\n\tport-&gt;port_dummy_packet_interval = port-&gt;getPortConfig()-&gt;getDummyPacketInterval();\n\tif (port-&gt;port_dummy_packet_interval &lt; 0)\n\t\tport-&gt;port_dummy_packet_interval = DUMMY_INTERVAL;\n\n\tport-&gt;port_dummy_timeout = port-&gt;port_dummy_packet_interval;\n\n#ifdef DEBUG\n\tprintf(&quot;REMOTE_get_timeout dummy = %lu conn = %lu\\n&quot;,\n\t\t\t  port-&gt;port_dummy_packet_interval, port-&gt;port_connect_timeout);\n\tfflush(stdout);\n#endif\n}\n\n\nrem_str* REMOTE_make_string(const SCHAR* input)\n{\n/**************************************\n *\n *\tR E M O T E _ m a k e _ s t r i n g\n *\n **************************************\n *\n * Functional description\n *\tCopy a given string to a permanent location, returning\n *\taddress of new string.\n *\n **************************************/\n\tconst USHORT length = static_cast&lt;USHORT&gt;(strlen(input));\n\trem_str* string = FB_NEW_RPT(*getDefaultMemoryPool(), length) rem_str;\n#ifdef DEBUG_REMOTE_MEMORY\n\tprintf(&quot;REMOTE_make_string        allocate string  %x\\n&quot;, string);\n#endif\n\tstrcpy(string-&gt;str_data, input);\n\tstring-&gt;str_length = length;\n\n\treturn string;\n}\n\n\nvoid REMOTE_release_messages( RMessage* messages)\n{\n/**************************************\n *\n *\tR E M O T E _ r e l e a s e _ m e s s a g e s\n *\n **************************************\n *\n * Functional description\n *\tRelease a circular list of messages.\n *\n **************************************/\n\tRMessage* message = messages;\n\tif (message)\n\t{\n\t\twhile (true)\n\t\t{\n\t\t\tRMessage* temp = message;\n\t\t\tmessage = message-&gt;msg_next;\n#ifdef DEBUG_REMOTE_MEMORY\n\t\t\tprintf(&quot;REMOTE_release_messages   free message     %x\\n&quot;, temp);\n#endif\n\t\t\tdelete temp;\n\t\t\tif (message == messages)\n\t\t\t\tbreak;\n\t\t}\n\t}\n}\n\n\nvoid REMOTE_release_request( Rrq* request)\n{\n/**************************************\n *\n *\tR E M O T E _ r e l e a s e _ r e q u e s t\n *\n **************************************\n *\n * Functional description\n *\tRelease a request block and friends.\n *\n **************************************/\n\tRdb* rdb = request-&gt;rrq_rdb;\n\n\tfor (Rrq** p = &amp;rdb-&gt;rdb_requests; *p; p = &amp;(*p)-&gt;rrq_next)\n\t{\n\t\tif (*p == request)\n\t\t{\n\t\t\t*p = request-&gt;rrq_next;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\t// Get rid of request and all levels\n\n\tfor (;;)\n\t{\n\t\tRrq::rrq_repeat* tail = request-&gt;rrq_rpt.begin();\n\t\tconst Rrq::rrq_repeat* const end = tail + request-&gt;rrq_max_msg;\n\t\tfor (; tail &lt;= end; tail++)\n\t\t{\n\t\t    RMessage* message = tail-&gt;rrq_message;\n\t\t\tif (message)\n\t\t\t{\n\t\t\t\tif (!request-&gt;rrq_level)\n\t\t\t\t{\n#ifdef DEBUG_REMOTE_MEMORY\n\t\t\t\t\tprintf(&quot;REMOTE_release_request    free format      %x\\n&quot;, tail-&gt;rrq_format);\
