!map)\n\t{\n\t\tmap = localMap.getBuffer(STREAM_MAP_LENGTH);\n\t\tfb_assert(stream &lt;= MAX_STREAMS);\n\t\tmap[0] = stream;\n\t}\n\n\tUSHORT fieldId = 0;\n\tvec&lt;jrd_fld*&gt;::iterator ptr1 = vector-&gt;begin();\n\n\tfor (const vec&lt;jrd_fld*&gt;::const_iterator end = vector-&gt;end(); ptr1 &lt; end; ++ptr1, ++fieldId)\n\t{\n\t\tBoolExprNode* validation;\n\n\t\tif (*ptr1 &amp;&amp; (validation = (*ptr1)-&gt;fld_validation))\n\t\t{\n\t\t\tAutoSetRestore&lt;USHORT&gt; autoRemapVariable(&amp;csb-&gt;csb_remap_variable,\n\t\t\t\t(csb-&gt;csb_variables ? csb-&gt;csb_variables-&gt;count() : 0) + 1);\n\n\t\t\tRemapFieldNodeCopier copier(csb, map, fieldId);\n\n\t\t\tvalidation = copier.copy(tdbb, validation);\n\n\t\t\tValidateInfo validate;\n\t\t\tvalidate.boolean = validation;\n\t\t\tvalidate.value = PAR_gen_field(tdbb, stream, fieldId);\n\t\t\tvalidations.add(validate);\n\t\t}\n\n\t\tif (*ptr1 &amp;&amp; (validation = (*ptr1)-&gt;fld_not_null))\n\t\t{\n\t\t\tAutoSetRestore&lt;USHORT&gt; autoRemapVariable(&amp;csb-&gt;csb_remap_variable,\n\t\t\t\t(csb-&gt;csb_variables ? csb-&gt;csb_variables-&gt;count() : 0) + 1);\n\n\t\t\tRemapFieldNodeCopier copier(csb, map, fieldId);\n\n\t\t\tvalidation = copier.copy(tdbb, validation);\n\n\t\t\tValidateInfo validate;\n\t\t\tvalidate.boolean = validation;\n\t\t\tvalidate.value = PAR_gen_field(tdbb, stream, fieldId);\n\t\t\tvalidations.add(validate);\n\t\t}\n\t}\n}\n\n// Process a view update performed by a trigger.\nstatic StmtNode* pass1ExpandView(thread_db* tdbb, CompilerScratch* csb, StreamType orgStream,\n\tStreamType newStream, bool remap)\n{\n\tSET_TDBB(tdbb);\n\n\tDEV_BLKCHK(csb, type_csb);\n\n\tStmtNodeStack stack;\n\tjrd_rel* relation = csb-&gt;csb_rpt[orgStream].csb_relation;\n\tvec&lt;jrd_fld*&gt;* fields = relation-&gt;rel_fields;\n\n\tdsc desc;\n\tUSHORT id = 0, newId = 0;\n\tvec&lt;jrd_fld*&gt;::iterator ptr = fields-&gt;begin();\n\n\tfor (const vec&lt;jrd_fld*&gt;::const_iterator end = fields-&gt;end(); ptr &lt; end; ++ptr, ++id)\n\t{\n\t\tif (*ptr)\n\t\t{\n\t\t\tif (remap)\n\t\t\t{\n\t\t\t\tconst jrd_fld* field = MET_get_field(relation, id);\n\n\t\t\t\tif (field-&gt;fld_source)\n\t\t\t\t\tnewId = nodeAs&lt;FieldNode&gt;(field-&gt;fld_source)-&gt;fieldId;\n\t\t\t\telse\n\t\t\t\t\tnewId = id;\n\t\t\t}\n\t\t\telse\n\t\t\t\tnewId = id;\n\n\t\t\tconst Format* const format = CMP_format(tdbb, csb, newStream);\n\t\t\tif (newId &gt;= format-&gt;fmt_count || !format-&gt;fmt_desc[newId].dsc_address)\n\t\t\t\tcontinue;\n\n\t\t\tAssignmentNode* const assign =\n\t\t\t\tFB_NEW_POOL(*tdbb-&gt;getDefaultPool()) AssignmentNode(*tdbb-&gt;getDefaultPool());\n\t\t\tassign-&gt;asgnTo = PAR_gen_field(tdbb, newStream, newId);\n\t\t\tassign-&gt;asgnFrom = PAR_gen_field(tdbb, orgStream, id);\n\n\t\t\tstack.push(assign);\n\t\t}\n\t}\n\n\treturn PAR_make_list(tdbb, stack);\n}\n\n// Check out a prospective update to a relation. If it fails security check, bounce it.\n// If it&#x27;s a view update, make sure the view is updatable, and return the view source for redirection.\n// If it&#x27;s a simple relation, return NULL.\nstatic RelationSourceNode* pass1Update(thread_db* tdbb, CompilerScratch* csb, jrd_rel* relation,\n\tconst TrigVector* trigger, StreamType stream, StreamType updateStream, SecurityClass::flags_t priv,\n\tjrd_rel* view, StreamType viewStream, StreamType viewUpdateStream)\n{\n\tSET_TDBB(tdbb);\n\n\tDEV_BLKCHK(csb, type_csb);\n\tDEV_BLKCHK(relation, type_rel);\n\tDEV_BLKCHK(view, type_rel);\n\n\t// unless this is an internal request, check access permission\n\n\tconst SLONG ssRelationId = view ? view-&gt;rel_id : 0;\n\n\tCMP_post_access(tdbb, csb, relation-&gt;rel_security_name.schema, ssRelationId,\n\t\tSCL_usage, obj_schemas, QualifiedName(relation-&gt;rel_name.schema));\n\n\tCMP_post_access(tdbb, csb, relation-&gt;rel_security_name.object, ssRelationId,\n\t\tpriv, obj_relations, relation-&gt;rel_name);\n\n\t// ensure that the view is set for the input streams,\n\t// so that access to views can be checked at the field level\n\n\tfb_assert(viewStream &lt;= MAX_STREAMS);\n\tCMP_csb_element(csb, stream)-&gt;csb_view = view;\n\tCMP_csb_element(csb, stream)-&gt;csb_view_stream = viewStream;\n\n\tif (stream != updateStream)\n\t{\n\t\tfb_assert(viewUpdateStream &lt;= MAX_STREAMS);\n\t\tCMP_csb_element(csb, updateStream)-&gt;csb_view = view;\n\t\tCMP_csb_element(csb, updateStream)-&gt;csb_view_stream = viewUpdateStream;\n\t}\n\n\t// if we&#x27;re not a view, everything&#x27;s cool\n\n\tRseNode* rse = relation-&gt;rel_view_rse;\n\tif (!rse)\n\t\treturn NULL;\n\n\t// a view with triggers is always updatable\n\n\tif (trigger)\n\t{\n\t\tbool userTriggers = false;\n\n\t\tfor (FB_SIZE_T i = 0; i &lt; trigger-&gt;getCount(); i++)\n\t\t{\n\t\t\tif (!(*trigger)[i].sysTrigger)\n\t\t\t{\n\t\t\t\tuserTriggers = true;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\tif (userTriggers)\n\t\t{\n\t\t\tcsb-&gt;csb_rpt[updateStream].csb_flags |= csb_view_update;\n\t\t\treturn NULL;\n\t\t}\n\t}\n\n\t// we&#x27;ve got a view without triggers, let&#x27;s check whether it&#x27;s updateable\n\n\tif (rse-&gt;rse_relations.getCount() != 1 || rse-&gt;rse_projection || rse-&gt;rse_sorted ||\n\t\trse-&gt;rse_relations[0]-&gt;getType() != RelationSourceNode::TYPE)\n\t{\n\t\tERR_post(Arg::Gds(isc_read_only_view) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\t}\n\n\t// for an updateable view, return the view source\n\n\tcsb-&gt;csb_rpt[updateStream].csb_flags |= csb_view_update;\n\n\treturn static_cast&lt;RelationSourceNode*&gt;(rse-&gt;rse_relations[0].getObject());\n}\n\n// The csb-&gt;csb_validate_expr becomes true if an ancestor of the current node (the one being\n// passed in) in the parse tree is a validation. &quot;Ancestor&quot; does not include the current node\n// being passed in as an argument.\n// If we are in a &quot;validate subtree&quot; (as determined by the csb-&gt;csb_validate_expr), we must not\n// post update access to the fields involved in the validation clause.\n// (See the call for CMP_post_access in this function.)\nstatic void pass1Validations(thread_db* tdbb, CompilerScratch* csb, Array&lt;ValidateInfo&gt;&amp; validations)\n{\n\tAutoSetRestore&lt;bool&gt; autoValidateExpr(&amp;csb-&gt;csb_validate_expr, true);\n\n\tfor (Array&lt;ValidateInfo&gt;::iterator i = validations.begin(); i != validations.end(); ++i)\n\t{\n\t\tDmlNode::doPass1(tdbb, csb, i-&gt;boolean.getAddress());\n\t\tDmlNode::doPass1(tdbb, csb, i-&gt;value.getAddress());\n\t}\n}\n\nForNode* pass2FindForNode(StmtNode* node, StreamType stream)\n{\n\t// lookup for parent ForNode\n\twhile (node &amp;&amp; !nodeIs&lt;ForNode&gt;(node))\n\t\tnode = node-&gt;parentStmt;\n\n\tForNode* forNode = nodeAs&lt;ForNode&gt;(node);\n\tif (forNode &amp;&amp; forNode-&gt;rse-&gt;containsStream(stream))\n\t{\n\t\t//fb_assert(forNode-&gt;marks &amp; StmtNode::MARK_FOR_UPDATE);\n\t\tif (forNode-&gt;marks &amp; StmtNode::MARK_FOR_UPDATE)\n\t\t\treturn forNode;\n\t}\n\n\treturn nullptr;\n};\n\n// Inherit access to triggers to be fired.\n//\n// When we detect that a trigger could be fired by a request,\n// then we add the access list for that trigger to the access\n// list for this request.  That way, when we check access for\n// the request we also check access for any other objects that\n// could be fired off by the request.\n//\n// Note that when we add the access item, we specify that\n//    Trigger X needs access to resource Y.\n// In the access list we parse here, if there is no &quot;accessor&quot;\n// name then the trigger must access it directly.  If there is\n// an &quot;accessor&quot; name, then something accessed by this trigger\n// must require the access.\n//\n// CVC: The code no longer matches this comment.\n// CVC: The third parameter is the owner of the triggers vector\n// and was added to avoid triggers posting access checks to\n// their base tables, since it&#x27;s nonsense and causes weird\n// messages about false REFERENCES right failures.\nstatic void postTriggerAccess(CompilerScratch* csb, jrd_rel* ownerRelation,\n\tExternalAccess::exa_act operation, jrd_rel* view)\n{\n\tDEV_BLKCHK(csb, type_csb);\n\tDEV_BLKCHK(view, type_rel);\n\n\t// allow all access to internal requests\n\tif (csb-&gt;csb_g_flags &amp; (csb_internal | csb_ignore_perm))\n\t\treturn;\n\n\t// Post trigger access\n\tExternalAccess temp(operation, ownerRelation-&gt;rel_id, view ? view-&gt;rel_id : 0);\n\tFB_SIZE_T i;\n\n\tif (!csb-&gt;csb_external.find(temp, i))\n\t\tcsb-&gt;csb_external.insert(i, temp);\n}\n\n// Perform operation&#x27;s pre-triggers, storing active rpb in chain.\nstatic void preModifyEraseTriggers(thread_db* tdbb, TrigVector** trigs,\n\tStmtNode::WhichTrigger whichTrig, record_param* rpb, record_param* rec, TriggerAction op)\n{\n\tif (!tdbb-&gt;getTransaction()-&gt;tra_rpblist)\n\t{\n\t\ttdbb-&gt;getTransaction()-&gt;tra_rpblist =\n\t\t\tFB_NEW_POOL(*tdbb-&gt;getTransaction()-&gt;tra_pool) traRpbList(*tdbb-&gt;getTransaction()-&gt;tra_pool);\n\t}\n\n\tconst auto relation = rpb-&gt;rpb_relation;\n\tconst int rpblevel = tdbb-&gt;getTransaction()-&gt;tra_rpblist-&gt;PushRpb(rpb);\n\n\tif ((*trigs || relation-&gt;isSystem()) &amp;&amp; whichTrig != StmtNode::POST_TRIG)\n\t{\n\t\ttry\n\t\t{\n\t\t\tEXE_execute_triggers(tdbb, trigs, rpb, rec, op, StmtNode::PRE_TRIG);\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\ttdbb-&gt;getTransaction()-&gt;tra_rpblist-&gt;PopRpb(rpb, rpblevel);\n\t\t\tthrow;\n\t\t}\n\t}\n\n\ttdbb-&gt;getTransaction()-&gt;tra_rpblist-&gt;PopRpb(rpb, rpblevel);\n}\n\n// 1. Remove assignments of DEFAULT to computed fields.\n// 2. Remove assignments to identity column when OVERRIDING USER VALUE is specified in INSERT.\nstatic void preprocessAssignments(thread_db* tdbb, CompilerScratch* csb,\n\tStreamType stream, CompoundStmtNode* compoundNode, const std::optional&lt;OverrideClause&gt;* insertOverride)\n{\n\tif (!compoundNode)\n\t\treturn;\n\n\tjrd_rel* relation = csb-&gt;csb_rpt[stream].csb_relation;\n\n\t//// TODO: LocalTableSourceNode\n\tif (!relation)\n\t\treturn;\n\n\tstd::optional&lt;IdentityType&gt; identityType;\n\n\tfor (FB_SIZE_T i = compoundNode-&gt;statements.getCount(); i--; )\n\t{\n\t\tconst AssignmentNode* assign = nodeAs&lt;AssignmentNode&gt;(compoundNode-&gt;statements[i]);\n\t\tfb_assert(assign);\n\t\tif (!assign)\n\t\t\tcontinue;\n\n\t\tconst ExprNode* assignFrom = assign-&gt;asgnFrom;\n\t\tconst FieldNode* assignToField = nodeAs&lt;FieldNode&gt;(assign-&gt;asgnTo);\n\n\t\tif (assignToField)\n\t\t{\n\t\t\tint fieldId = assignToField-&gt;fieldId;\n\t\t\tjrd_fld* fld;\n\n\t\t\twhile (true)\n\t\t\t{\n\t\t\t\tif (assignToField-&gt;fieldStream == stream &amp;&amp;\n\t\t\t\t\t(fld = MET_get_field(relation, fieldId)))\n\t\t\t\t{\n\t\t\t\t\tif (insertOverride &amp;&amp; fld-&gt;fld_identity_type.has_value())\n\t\t\t\t\t{\n\t\t\t\t\t\tif (insertOverride-&gt;has_value() || !nodeIs&lt;DefaultNode&gt;(assignFrom))\n\t\t\t\t\t\t\tidentityType = fld-&gt;fld_identity_type;\n\n\t\t\t\t\t\tif (*insertOverride == OverrideClause::USER_VALUE)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tcompoundNode-&gt;statements.remove(i);\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\n\t\t\t\t\tif (fld-&gt;fld_computation)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (nodeIs&lt;DefaultNode&gt;(assignFrom))\n\t\t\t\t\t\t\tcompoundNode-&gt;statements.remove(i);\n\t\t\t\t\t}\n\t\t\t\t\telse if (relation-&gt;rel_view_rse &amp;&amp; fld-&gt;fld_source_rel_field.first.object.hasData())\n\t\t\t\t\t{\n\t\t\t\t\t\trelation = MET_lookup_relation(tdbb, fld-&gt;fld_source_rel_field.first);\n\n\t\t\t\t\t\tfb_assert(relation);\n\t\t\t\t\t\tif (!relation)\n\t\t\t\t\t\t\treturn;\n\n\t\t\t\t\t\tif ((fieldId = MET_lookup_field(tdbb, relation, fld-&gt;fld_source_rel_field.second)) &gt;= 0)\n\t\t\t\t\t\t\tcontinue;\n\t\t\t\t\t}\n\t\t\t\t}\n\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\n\tif (!insertOverride)\n\t\treturn;\n\n\tif (insertOverride-&gt;has_value())\n\t{\n\t\tif (!identityType.has_value())\n\t\t\tERR_post(Arg::Gds(isc_overriding_without_identity) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\n\t\tif (identityType == IDENT_TYPE_BY_DEFAULT &amp;&amp; *insertOverride == OverrideClause::SYSTEM_VALUE)\n\t\t\tERR_post(Arg::Gds(isc_overriding_system_invalid) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\t}\n\telse\n\t{\n\t\tif (identityType == IDENT_TYPE_ALWAYS)\n\t\t\tERR_post(Arg::Gds(isc_overriding_missing) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n\t}\n}\n\nstatic void restartRequest(const Request* request, jrd_tra* transaction)\n{\n\tconst Request* top_request = request-&gt;req_snapshot.m_owner;\n\tfb_assert(top_request);\n\tfb_assert(top_request-&gt;req_flags &amp; req_update_conflict);\n\n\ttransaction-&gt;tra_flags |= TRA_ex_restart;\n\n\tERR_post(Arg::Gds(isc_deadlock) &lt;&lt;\n\t\tArg::Gds(isc_update_conflict) &lt;&lt;\n\t\tArg::Gds(isc_concurrent_transaction) &lt;&lt; Arg::Int64(top_request-&gt;req_conflict_txn));\n}\n\n// Execute a list of validation expressions.\nstatic void validateExpressions(thread_db* tdbb, const Array&lt;ValidateInfo&gt;&amp; validations)\n{\n\tSET_TDBB(tdbb);\n\n\tArray&lt;ValidateInfo&gt;::const_iterator end = validations.end();\n\n\tfor (Array&lt;ValidateInfo&gt;::const_iterator i = validations.begin(); i != end; ++i)\n\t{\n\t\tRequest* request = tdbb-&gt;getRequest();\n\n\t\tif (!i-&gt;boolean-&gt;execute(tdbb, request) &amp;&amp; !(request-&gt;req_flags &amp; req_null))\n\t\t{\n\t\t\t// Validation error -- report result\n\t\t\tconst char* value;\n\t\t\tVaryStr&lt;TEMP_STR_LENGTH&gt; temp;\n\n\t\t\tconst dsc* desc = EVL_expr(tdbb, request, i-&gt;value);\n\t\t\tconst USHORT length = (desc &amp;&amp; !(request-&gt;req_flags &amp; req_null)) ?\n\t\t\t\tMOV_make_string(tdbb, desc, ttype_dynamic, &amp;value, &amp;temp, sizeof(temp) - 1) : 0;\n\n\t\t\tif (!desc || (request-&gt;req_flags &amp; req_null))\n\t\t\t\tvalue = NULL_STRING_MARK;\n\t\t\telse if (!length)\n\t\t\t\tvalue = &quot;&quot;;\n\t\t\telse\n\t\t\t\tconst_cast&lt;char*&gt;(value)[length] = 0;\t// safe cast - data is actually on the stack\n\n\t\t\tstring name;\n\t\t\tconst FieldNode* fieldNode = nodeAs&lt;FieldNode&gt;(i-&gt;value);\n\n\t\t\tif (fieldNode)\n\t\t\t{\n\t\t\t\tconst jrd_rel* relation = request-&gt;req_rpb[fieldNode-&gt;fieldStream].rpb_relation;\n\t\t\t\tconst vec&lt;jrd_fld*&gt;* vector = relation-&gt;rel_fields;\n\t\t\t\tconst jrd_fld* field;\n\n\t\t\t\tif (vector &amp;&amp; fieldNode-&gt;fieldId &lt; vector-&gt;count() &amp;&amp;\n\t\t\t\t\t(field = (*vector)[fieldNode-&gt;fieldId]))\n\t\t\t\t{\n\t\t\t\t\tif (relation-&gt;rel_name.object.hasData())\n\t\t\t\t\t{\n\t\t\t\t\t\tname.printf(\n\t\t\t\t\t\t\t&quot;%s.%s&quot;,\n\t\t\t\t\t\t\trelation-&gt;rel_name.toQuotedString().c_str(),\n\t\t\t\t\t\t\tfield-&gt;fld_name.toQuotedString().c_str());\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t\tname = field-&gt;fld_name.toQuotedString();\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (name.isEmpty())\n\t\t\t\tname = UNKNOWN_STRING_MARK;\n\n\t\t\tERR_post(Arg::Gds(isc_not_valid) &lt;&lt; Arg::Str(name) &lt;&lt; Arg::Str(value));\n\t\t}\n\t}\n}\n\n\n}\t// namespace Jrd\n"}, "/build/src/dsql/Nodes.h": {"id": "/build/src/dsql/Nodes.h", "filePath": "src/dsql/Nodes.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Adriano dos Santos Fernandes\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Adriano dos Santos Fernandes &lt;adrianosf@uol.com.br&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef DSQL_NODES_H\n#define DSQL_NODES_H\n\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../dsql/DsqlCompilerScratch.h&quot;\n#include &quot;../dsql/Visitors.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/NestConst.h&quot;\n#include &lt;functional&gt;\n#include &lt;initializer_list&gt;\n#include &lt;type_traits&gt;\n\nnamespace Jrd {\n\nclass AggregateSort;\nclass CompilerScratch;\nclass SubQuery;\nclass Cursor;\nclass Node;\nclass NodePrinter;\nclass ExprNode;\nclass NodeRefsHolder;\nclass Optimizer;\nclass OptimizerRetrieval;\nclass RecordSource;\nclass RseNode;\nclass SlidingWindow;\nclass TypeClause;\nclass ValueExprNode;\n\n\n// Must be less then MAX_SSHORT. Not used for static arrays.\ninline constexpr unsigned MAX_CONJUNCTS = 32000;\n\n// New: MAX_STREAMS should be a multiple of BITS_PER_LONG (32 and hard to believe it will change)\n\ninline constexpr StreamType INVALID_STREAM = ~StreamType(0);\ninline constexpr StreamType MAX_STREAMS = 4096;\n\ninline constexpr StreamType STREAM_MAP_LENGTH = MAX_STREAMS + 2;\n\n// New formula is simply MAX_STREAMS / BITS_PER_LONG\ninline constexpr int OPT_STREAM_BITS = MAX_STREAMS / BITS_PER_LONG; // 128 with 4096 streams\n\ntypedef Firebird::HalfStaticArray&lt;StreamType, OPT_STATIC_STREAMS&gt; StreamList;\ntypedef Firebird::SortedArray&lt;StreamType&gt; SortedStreamList;\n\ntypedef Firebird::Array&lt;NestConst&lt;ValueExprNode&gt; &gt; NestValueArray;\n\n\nclass Printable\n{\npublic:\n\tvirtual ~Printable()\n\t{\n\t}\n\npublic:\n\tvoid print(NodePrinter&amp; printer) const;\n\n\tvirtual Firebird::string internalPrint(NodePrinter&amp; printer) const = 0;\n};\n\n\ntemplate &lt;typename T&gt;\nclass RegisterNode\n{\npublic:\n\texplicit RegisterNode(std::initializer_list&lt;UCHAR&gt; blrList)\n\t{\n\t\tfor (const auto blr : blrList)\n\t\t\tPAR_register(blr, T::parse);\n\t}\n};\n\ntemplate &lt;typename T&gt;\nclass RegisterBoolNode\n{\npublic:\n\texplicit RegisterBoolNode(std::initializer_list&lt;UCHAR&gt; blrList)\n\t{\n\t\tfor (const auto blr : blrList)\n\t\t\tPAR_register(blr, T::parse);\n\t}\n};\n\n\nclass Node : public Printable\n{\npublic:\n\texplicit Node(MemoryPool&amp; pool)\n\t\t: line(0),\n\t\t  column(0)\n\t{\n\t}\n\n\tvirtual ~Node()\n\t{\n\t}\n\n\t// Compile a parsed statement into something more interesting.\n\ttemplate &lt;typename T&gt;\n\tstatic T* doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T&gt;&amp; node)\n\t{\n\t\tif (!node)\n\t\t\treturn NULL;\n\n\t\treturn node-&gt;dsqlPass(dsqlScratch);\n\t}\n\n\t// Compile a parsed statement into something more interesting and assign it to target.\n\ttemplate &lt;typename T1, typename T2&gt;\n\tstatic void doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T1&gt;&amp; target, NestConst&lt;T2&gt;&amp; node)\n\t{\n\t\tif (!node)\n\t\t\ttarget = NULL;\n\t\telse\n\t\t\ttarget = node-&gt;dsqlPass(dsqlScratch);\n\t}\n\n\t// Changes dsqlScratch-&gt;isPsql() value, calls doDsqlPass and restore dsqlScratch-&gt;isPsql().\n\ttemplate &lt;typename T&gt;\n\tstatic T* doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T&gt;&amp; node, bool psql)\n\t{\n\t\tPsqlChanger changer(dsqlScratch, psql);\n\t\treturn doDsqlPass(dsqlScratch, node);\n\t}\n\n\t// Changes dsqlScratch-&gt;isPsql() value, calls doDsqlPass and restore dsqlScratch-&gt;isPsql().\n\ttemplate &lt;typename T1, typename T2&gt;\n\tstatic void doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T1&gt;&amp; target, NestConst&lt;T2&gt;&amp; node, bool psql)\n\t{\n\t\tPsqlChanger changer(dsqlScratch, psql);\n\t\tdoDsqlPass(dsqlScratch, target, node);\n\t}\n\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override = 0;\n\n\tvirtual void getChildren(NodeRefsHolder&amp; holder, bool dsql) const\n\t{\n\t}\n\n\tvirtual Node* dsqlPass(DsqlCompilerScratch* /*dsqlScratch*/)\n\t{\n\t\treturn this;\n\t}\n\npublic:\n\tULONG line;\n\tULONG column;\n};\n\n\nclass DdlNode : public Node\n{\npublic:\n\texplicit DdlNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\n\tstatic void protectSystemSchema(const MetaName&amp; name, ObjectType objType)\n\t{\n\t\tif (name == SYSTEM_SCHEMA)\n\t\t{\n\t\t\tFirebird::status_exception::raise(\n\t\t\t\tFirebird::Arg::Gds(isc_dyn_cannot_mod_obj_sys_schema) &lt;&lt;\n\t\t\t\tgetObjectName(objType));\n\t\t}\n\t}\n\n\tstatic bool deleteSecurityClass(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst MetaName&amp; secClass);\n\n\tstatic void storePrivileges(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst QualifiedName&amp; name, int type, const char* privileges);\n\n\tstatic void deletePrivilegesByRelName(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst QualifiedName&amp; name, int type);\n\npublic:\n\t// Check permission on DDL operation. Return true if everything is OK.\n\t// Raise an exception for bad permission.\n\t// If returns false permissions will be check in old style at vio level as well as while direct RDB$ tables modify.\n\tvirtual void checkPermission(thread_db* tdbb, jrd_tra* transaction) = 0;\n\n\t// Set the scratch&#x27;s transaction when executing a node. Fact of accessing the scratch during\n\t// execution is a hack.\n\tvoid executeDdl(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction, bool trusted = false)\n\t{\n\t\t// dsqlScratch should be NULL with CREATE DATABASE.\n\t\tif (dsqlScratch)\n\t\t\tdsqlScratch-&gt;setTransaction(transaction);\n\n\t\tif (!trusted)\n\t\t\tcheckPermission(tdbb, transaction);\n\t\texecute(tdbb, dsqlScratch, transaction);\n\t}\n\n\tDdlNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tdsqlScratch-&gt;getDsqlStatement()-&gt;setType(DsqlStatement::TYPE_DDL);\n\t\treturn this;\n\t}\n\npublic:\n\tenum DdlTriggerWhen { DTW_BEFORE, DTW_AFTER };\n\n\tstatic void executeDdlTrigger(thread_db* tdbb, jrd_tra* transaction,\n\t\tDdlTriggerWhen when, int action, const QualifiedName&amp; objectName,\n\t\tconst QualifiedName&amp; oldNewObjectName, const Firebird::string&amp; sqlText);\n\nprotected:\n\ttypedef Firebird::Pair&lt;Firebird::Left&lt;MetaName, bid&gt; &gt; MetaNameBidPair;\n\ttypedef Firebird::GenericMap&lt;MetaNameBidPair&gt; MetaNameBidMap;\n\n\t// Return exception code based on combination of create and alter clauses.\n\tstatic ISC_STATUS createAlterCode(bool create, bool alter, ISC_STATUS createCode,\n\t\tISC_STATUS alterCode, ISC_STATUS createOrAlterCode)\n\t{\n\t\tif (create &amp;&amp; alter)\n\t\t\treturn createOrAlterCode;\n\n\t\tif (create)\n\t\t\treturn createCode;\n\n\t\tif (alter)\n\t\t\treturn alterCode;\n\n\t\tfb_assert(false);\n\t\treturn 0;\n\t}\n\n\tvoid executeDdlTrigger(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction,\n\t\tDdlTriggerWhen when, int action, const QualifiedName&amp; objectName,\n\t\tconst QualifiedName&amp; oldNewObjectName);\n\tvoid storeGlobalField(thread_db* tdbb, jrd_tra* transaction, QualifiedName&amp; name,\n\t\tconst TypeClause* field,\n\t\tconst Firebird::string&amp; computedSource = &quot;&quot;,\n\t\tconst BlrDebugWriter::BlrData&amp; computedValue = BlrDebugWriter::BlrData());\n\npublic:\n\t// Prefix DDL exceptions. To be implemented in each command.\n\t// Attention: do not store temp strings in Arg::StatusVector,\n\t// when needed keep them permanently in command&#x27;s node.\n\tvirtual void putErrorPrefix(Firebird::Arg::StatusVector&amp; statusVector) = 0;\n\n\tvirtual void execute(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction) = 0;\n\n\tvirtual bool mustBeReplicated() const\n\t{\n\t\treturn true;\n\t}\n};\n\n\nclass TransactionNode : public Node\n{\npublic:\n\texplicit TransactionNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\npublic:\n\tTransactionNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tNode::dsqlPass(dsqlScratch);\n\t\treturn this;\n\t}\n\n\tvirtual void execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** transaction) const = 0;\n};\n\n\nclass SessionManagementNode : public Node\n{\npublic:\n\texplicit SessionManagementNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\npublic:\n\tSessionManagementNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tNode::dsqlPass(dsqlScratch);\n\n\t\tdsqlScratch-&gt;getDsqlStatement()-&gt;setType(DsqlStatement::TYPE_SESSION_MANAGEMENT);\n\n\t\treturn this;\n\t}\n\n\tvirtual void execute(thread_db* tdbb, DsqlRequest* request, jrd_tra** traHandle) const = 0;\n};\n\n\nclass DmlNode : public Node\n{\npublic:\n\t// DML node kinds\n\tenum Kind\n\t{\n\t\tKIND_STATEMENT,\n\t\tKIND_VALUE,\n\t\tKIND_BOOLEAN,\n\t\tKIND_REC_SOURCE,\n\t\tKIND_LIST\n\t};\n\n\texplicit DmlNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\n\t// Merge missing values, computed values, validation expressions, and views into a parsed request.\n\ttemplate &lt;typename T&gt; static void doPass1(thread_db* tdbb, CompilerScratch* csb, T** node)\n\t{\n\t\tif (!*node)\n\t\t\treturn;\n\n\t\t*node = (*node)-&gt;pass1(tdbb, csb);\n\t}\n\npublic:\n\tvirtual Kind getKind() = 0;\n\tvirtual void genBlr(DsqlCompilerScratch* dsqlScratch) = 0;\n\tvirtual DmlNode* pass1(thread_db* tdbb, CompilerScratch* csb) = 0;\n\tvirtual DmlNode* pass2(thread_db* tdbb, CompilerScratch* csb) = 0;\n\tvirtual DmlNode* copy(thread_db* tdbb, NodeCopier&amp; copier) const = 0;\n};\n\n\ntemplate &lt;typename T, typename T::Type typeConst&gt;\nclass TypedNode : public T\n{\npublic:\n\texplicit TypedNode(MemoryPool&amp; pool)\n\t\t: T(typeConst, pool)\n\t{\n\t}\n\npublic:\n\ttypename T::Type getType() const override\n\t{\n\t\treturn typeConst;\n\t}\n\npublic:\n\tconst static typename T::Type TYPE = typeConst;\n};\n\n\ntemplate &lt;typename To, typename From&gt; static To* nodeAs(From* fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;To*&gt;(fromNode) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static To* nodeAs(NestConst&lt;From&gt;&amp; fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;To*&gt;(fromNode.getObject()) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static const To* nodeAs(const From* fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;const To*&gt;(fromNode) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static const To* nodeAs(const NestConst&lt;From&gt;&amp; fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE ? static_cast&lt;const To*&gt;(fromNode.getObject()) : NULL;\n}\n\ntemplate &lt;typename To, typename From&gt; static bool nodeIs(const From* fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE;\n}\n\ntemplate &lt;typename To, typename From&gt; static bool nodeIs(const NestConst&lt;From&gt;&amp; fromNode)\n{\n\treturn fromNode &amp;&amp; fromNode-&gt;getType() == To::TYPE;\n}\n\n\nclass NodeRefsHolder : public Firebird::AutoStorage\n{\npublic:\n\tNodeRefsHolder()\n\t\t: refs(getPool())\n\t{\n\t}\n\n\texplicit NodeRefsHolder(MemoryPool&amp; pool)\n\t\t: AutoStorage(pool),\n\t\t  refs(pool)\n\t{\n\t}\n\n\ttemplate &lt;typename T&gt; void add(const NestConst&lt;T&gt;&amp; node)\n\t{\n\t\tstatic_assert(std::is_base_of&lt;ExprNode, T&gt;::value, &quot;T must be derived from ExprNode&quot;);\n\n\t\tstatic_assert(\n\t\t\tstd::is_convertible&lt;\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject())-&gt;pass1(\n\t\t\t\t\t(thread_db*) nullptr, (CompilerScratch*) nullptr)),\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject()))\n\t\t\t&gt;::value,\n\t\t\t&quot;pass1 problem&quot;);\n\n\t\tstatic_assert(\n\t\t\tstd::is_convertible&lt;\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject())-&gt;pass2(\n\t\t\t\t\t(thread_db*) nullptr, (CompilerScratch*) nullptr)),\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject()))\n\t\t\t&gt;::value,\n\t\t\t&quot;pass2 problem&quot;);\n\n\t\tstatic_assert(\n\t\t\tstd::is_convertible&lt;\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject())-&gt;dsqlFieldRemapper(*(FieldRemapper*) nullptr)),\n\t\t\t\tdecltype(const_cast&lt;T*&gt;(node.getObject()))\n\t\t\t&gt;::value,\n\t\t\t&quot;dsqlFieldRemapper problem&quot;);\n\n\t\tT** ptr = const_cast&lt;T**&gt; (node.getAddress());\n\t\tfb_assert(ptr);\n\n\t\trefs.add(reinterpret_cast&lt;ExprNode**&gt;(ptr));\n\t}\n\npublic:\n\tFirebird::HalfStaticArray&lt;ExprNode**, 8&gt; refs;\n};\n\n\nclass ExprNode : public DmlNode\n{\npublic:\n\tenum Type\n\t{\n\t\t// Value types\n\t\tTYPE_AGGREGATE,\n\t\tTYPE_ALIAS,\n\t\tTYPE_ARITHMETIC,\n\t\tTYPE_ARRAY,\n\t\tTYPE_AT,\n\t\tTYPE_BOOL_AS_VALUE,\n\t\tTYPE_CAST,\n\t\tTYPE_COALESCE,\n\t\tTYPE_COLLATE,\n\t\tTYPE_CONCATENATE,\n\t\tTYPE_CURRENT_DATE,\n\t\tTYPE_CURRENT_TIME,\n\t\tTYPE_CURRENT_TIMESTAMP,\n\t\tTYPE_CURRENT_ROLE,\n\t\tTYPE_CURRENT_SCHEMA,\n\t\tTYPE_CURRENT_USER,\n\t\tTYPE_DERIVED_EXPR,\n\t\tTYPE_DECODE,\n\t\tTYPE_DEFAULT,\n\t\tTYPE_DERIVED_FIELD,\n\t\tTYPE_DOMAIN_VALIDATION,\n\t\tTYPE_EXTRACT,\n\t\tTYPE_FIELD,\n\t\tTYPE_GEN_ID,\n\t\tTYPE_INTERNAL_INFO,\n\t\tTYPE_LITERAL,\n\t\tTYPE_LOCAL_TIME,\n\t\tTYPE_LOCAL_TIMESTAMP,\n\t\tTYPE_MAP,\n\t\tTYPE_NEGATE,\n\t\tTYPE_NULL,\n\t\tTYPE_ORDER,\n\t\tTYPE_OVER,\n\t\tTYPE_PARAMETER,\n\t\tTYPE_RECORD_KEY,\n\t\tTYPE_SCALAR,\n\t\tTYPE_STMT_EXPR,\n\t\tTYPE_STR_CASE,\n\t\tTYPE_STR_LEN,\n\t\tTYPE_SUBQUERY,\n\t\tTYPE_SUBSTRING,\n\t\tTYPE_SUBSTRING_SIMILAR,\n\t\tTYPE_SYSFUNC_CALL,\n\t\tTYPE_TRIM,\n\t\tTYPE_UDF_CALL,\n\t\tTYPE_VALUE_IF,\n\t\tTYPE_VARIABLE,\n\t\tTYPE_WINDOW_CLAUSE,\n\t\tTYPE_WINDOW_CLAUSE_FRAME,\n\t\tTYPE_WINDOW_CLAUSE_FRAME_EXTENT,\n\n\t\t// Bool types\n\t\tTYPE_BINARY_BOOL,\n\t\tTYPE_COMPARATIVE_BOOL,\n\t\tTYPE_MISSING_BOOL,\n\t\tTYPE_NOT_BOOL,\n\t\tTYPE_RSE_BOOL,\n\t\tTYPE_IN_LIST_BOOL,\n\n\t\t// RecordSource types\n\t\tTYPE_AGGREGATE_SOURCE,\n\t\tTYPE_LOCAL_TABLE,\n\t\tTYPE_PROCEDURE,\n\t\tTYPE_RELATION,\n\t\tTYPE_RSE,\n\t\tTYPE_SELECT_EXPR,\n\t\tTYPE_UNION,\n\t\tTY gregateSort : protected Firebird::PermanentStorage, public Printable\n{\npublic:\n\texplicit AggregateSort(Firebird::MemoryPool&amp; p)\n\t\t: PermanentStorage(p),\n\t\t  keyItems(p)\n\t{\n\t}\n\npublic:\n\tvirtual Firebird::string internalPrint(NodePrinter&amp; printer) const\n\t{\n\t\treturn &quot;AggregateSort&quot;;\n\t}\n\npublic:\n\tdsc desc;\n\tULONG length = 0;\n\tbool intl = false;\n\tULONG impure = 0;\n\tFirebird::HalfStaticArray&lt;sort_key_def, 2&gt; keyItems;\n};\n\n// Inversion (i.e. nod_index) impure area\n\nstruct impure_inversion\n{\n\tRecordBitmap* inv_bitmap;\n};\n\n\n// AggregateSort impure area\n\nstruct impure_agg_sort\n{\n\tSort* iasb_sort;\n\tULONG iasb_dummy;\n};\n\n\n// Request resources\n\nstruct Resource\n{\n\tenum rsc_s\n\t{\n\t\trsc_relation,\n\t\trsc_procedure,\n\t\trsc_index,\n\t\trsc_collation,\n\t\trsc_function\n\t};\n\n\trsc_s\t\trsc_type;\n\tUSHORT\t\trsc_id;\t\t\t// Id of the resource\n\tjrd_rel*\trsc_rel;\t\t// Relation block\n\tRoutine*\trsc_routine;\t// Routine block\n\tCollation*\trsc_coll;\t\t// Collation block\n\n\tstatic bool greaterThan(const Resource&amp; i1, const Resource&amp; i2) noexcept\n\t{\n\t\t// A few places of the engine depend on fact that rsc_type\n\t\t// is the first field in ResourceList ordering\n\t\tif (i1.rsc_type != i2.rsc_type)\n\t\t\treturn i1.rsc_type &gt; i2.rsc_type;\n\t\tif (i1.rsc_type == rsc_index)\n\t\t{\n\t\t\t// Sort by relation ID for now\n\t\t\tif (i1.rsc_rel-&gt;rel_id != i2.rsc_rel-&gt;rel_id)\n\t\t\t\treturn i1.rsc_rel-&gt;rel_id &gt; i2.rsc_rel-&gt;rel_id;\n\t\t}\n\t\treturn i1.rsc_id &gt; i2.rsc_id;\n\t}\n\n\tResource(rsc_s type, USHORT id, jrd_rel* rel, Routine* routine, Collation* coll) noexcept\n\t\t: rsc_type(type), rsc_id(id), rsc_rel(rel), rsc_routine(routine), rsc_coll(coll)\n\t{ }\n};\n\ntypedef Firebird::SortedArray&lt;Resource, Firebird::EmptyStorage&lt;Resource&gt;,\n\tResource, Firebird::DefaultKeyValue&lt;Resource&gt;, Resource&gt; ResourceList;\n\n// Access items\n// In case we start to use MetaName with required pool parameter,\n// access item to be reworked!\n// This struct seems better located in scl.h.\n\nstruct AccessItem\n{\n\tMetaName\t\tacc_security_name;\n\tSLONG\t\t\tacc_ss_rel_id;\t// Relation Id which owner will be used to check permissions\n\tQualifiedName\tacc_name;\n\tMetaName\t\tacc_col_name;\n\tObjectType\t\tacc_type;\n\tSecurityClass::flags_t\tacc_mask;\n\n\tstatic bool greaterThan(const AccessItem&amp; i1, const AccessItem&amp; i2)\n\t{\n\t\tint v;\n\n\t\t/* CVC: Disabled this horrible hack.\n\t\t// Relations and procedures should be sorted before\n\t\t// columns, hence such a tricky inverted condition\n\t\tif ((v = -strcmp(i1.acc_type, i2.acc_type)) != 0)\n\t\t\treturn v &gt; 0;\n\t\t*/\n\t\tif (i1.acc_type != i2.acc_type)\n\t\t\treturn i1.acc_type &gt; i2.acc_type;\n\n\t\tif ((v = i1.acc_security_name.compare(i2.acc_security_name)) != 0)\n\t\t\treturn v &gt; 0;\n\n\t\tif (i1.acc_ss_rel_id != i2.acc_ss_rel_id)\n\t\t\treturn i1.acc_ss_rel_id &gt; i2.acc_ss_rel_id;\n\n\t\tif (i1.acc_mask != i2.acc_mask)\n\t\t\treturn i1.acc_mask &gt; i2.acc_mask;\n\n\t\tif (i1.acc_name != i2.acc_name)\n\t\t\treturn i1.acc_name &gt; i2.acc_name;\n\n\t\tif (i1.acc_col_name != i2.acc_col_name)\n\t\t\treturn i1.acc_col_name &gt; i2.acc_col_name;\n\n\t\treturn false; // Equal\n\t}\n\n\tAccessItem(const MetaName&amp; security_name, SLONG view_id,\n\t\tconst QualifiedName&amp; name, ObjectType type,\n\t\tSecurityClass::flags_t mask, const MetaName&amp; columnName)\n\t\t: acc_security_name(security_name), acc_ss_rel_id(view_id), acc_name(name),\n\t\t\tacc_col_name(columnName), acc_type(type), acc_mask(mask)\n\t{}\n};\n\ntypedef Firebird::SortedArray&lt;AccessItem, Firebird::EmptyStorage&lt;AccessItem&gt;,\n\tAccessItem, Firebird::DefaultKeyValue&lt;AccessItem&gt;, AccessItem&gt; AccessItemList;\n\n// Triggers and procedures the request accesses\nstruct ExternalAccess\n{\n\tenum exa_act\n\t{\n\t\texa_procedure,\n\t\texa_function,\n\t\texa_insert,\n\t\texa_update,\n\t\texa_delete\n\t};\n\texa_act exa_action;\n\tUSHORT exa_prc_id;\n\tUSHORT exa_fun_id;\n\tUSHORT exa_rel_id;\n\tUSHORT exa_view_id;\n\tMetaName user;\t\t// User which touch the recources.\n\n\t// Procedure\n\tExternalAccess(exa_act action, USHORT id) :\n\t\texa_action(action),\n\t\texa_prc_id(action == exa_procedure ? id : 0),\n\t\texa_fun_id(action == exa_function ? id : 0),\n\t\texa_rel_id(0), exa_view_id(0)\n\t{ }\n\n\t// Trigger\n\tExternalAccess(exa_act action, USHORT rel_id, USHORT view_id) :\n\t\texa_action(action), exa_prc_id(0), exa_fun_id(0),\n\t\texa_rel_id(rel_id), exa_view_id(view_id)\n\t{ }\n\n\tstatic bool greaterThan(const ExternalAccess&amp; i1, const ExternalAccess&amp; i2)\n\t{\n\t\tif (i1.exa_action != i2.exa_action)\n\t\t\treturn i1.exa_action &gt; i2.exa_action;\n\t\tif (i1.exa_prc_id != i2.exa_prc_id)\n\t\t\treturn i1.exa_prc_id &gt; i2.exa_prc_id;\n\t\tif (i1.exa_fun_id != i2.exa_fun_id)\n\t\t\treturn i1.exa_fun_id &gt; i2.exa_fun_id;\n\t\tif (i1.exa_rel_id != i2.exa_rel_id)\n\t\t\treturn i1.exa_rel_id &gt; i2.exa_rel_id;\n\t\tif (i1.exa_view_id != i2.exa_view_id)\n\t\t\treturn i1.exa_view_id &gt; i2.exa_view_id;\n\t\tif (i1.user != i2.user)\n\t\t\treturn i1.user &gt; i2.user;\n\t\treturn false; // Equal\n\t}\n};\n\ntypedef Firebird::SortedArray&lt;ExternalAccess, Firebird::EmptyStorage&lt;ExternalAccess&gt;,\n\tExternalAccess, Firebird::DefaultKeyValue&lt;ExternalAccess&gt;, ExternalAccess&gt; ExternalAccessList;\n\n// The three structs below are used for domains DEFAULT and constraints in PSQL\nstruct Item\n{\n\tenum Type\n\t{\n\t\tTYPE_VARIABLE,\n\t\tTYPE_PARAMETER,\n\t\tTYPE_CAST\n\t};\n\n\tItem(Type aType, UCHAR aSubType, USHORT aIndex) noexcept\n\t\t: type(aType),\n\t\t  subType(aSubType),\n\t\t  index(aIndex)\n\t{\n\t}\n\n\tItem(Type aType, USHORT aIndex = 0) noexcept\n\t\t: type(aType),\n\t\t  subType(0),\n\t\t  index(aIndex)\n\t{\n\t}\n\n\tType type;\n\tUCHAR subType;\n\tUSHORT index;\n\n\tbool operator &gt;(const Item&amp; x) const noexcept\n\t{\n\t\tif (type == x.type)\n\t\t{\n\t\t\tif (subType == x.subType)\n\t\t\t\treturn index &gt; x.index;\n\n\t\t\treturn subType &gt; x.subType;\n\t\t}\n\n\t\treturn type &gt; x.type;\n\t}\n\n\tFirebird::string getDescription(Request* request, const ItemInfo* itemInfo) const;\n};\n\nstruct FieldInfo\n{\n\tFieldInfo() noexcept\n\t\t: nullable(false), defaultValue(NULL), validationExpr(NULL)\n\t{}\n\n\tbool nullable;\n\tNestConst&lt;ValueExprNode&gt; defaultValue;\n\tNestConst&lt;BoolExprNode&gt; validationExpr;\n};\n\nclass ItemInfo : public Printable\n{\npublic:\n\tItemInfo(MemoryPool&amp; p, const ItemInfo&amp; o)\n\t\t: name(p, o.name),\n\t\t  field(p, o.field),\n\t\t  nullable(o.nullable),\n\t\t  explicitCollation(o.explicitCollation),\n\t\t  fullDomain(o.fullDomain)\n\t{\n\t}\n\n\texplicit ItemInfo(MemoryPool&amp; p)\n\t\t: name(p),\n\t\t  field(p),\n\t\t  nullable(true),\n\t\t  explicitCollation(false),\n\t\t  fullDomain(false)\n\t{\n\t}\n\n\tItemInfo() noexcept\n\t\t: name(),\n\t\t  field(),\n\t\t  nullable(true),\n\t\t  explicitCollation(false),\n\t\t  fullDomain(false)\n\t{\n\t}\n\npublic:\n\tbool isSpecial() const noexcept\n\t{\n\t\treturn !nullable || fullDomain;\n\t}\n\n\tvirtual Firebird::string internalPrint(NodePrinter&amp; printer) const\n\t{\n\t\t/*** FIXME-PRINT:\n\t\tNODE_PRINT(printer, name);\n\t\tNODE_PRINT(printer, field);\n\t\tNODE_PRINT(printer, nullable);\n\t\tNODE_PRINT(printer, explicitCollation);\n\t\tNODE_PRINT(printer, fullDomain);\n\t\t***/\n\n\t\treturn &quot;ItemInfo&quot;;\n\t}\n\npublic:\n\tMetaName name;\n\tQualifiedNameMetaNamePair field;\n\tbool nullable;\n\tbool explicitCollation;\n\tbool fullDomain;\n};\n\ntypedef Firebird::LeftPooledMap&lt;QualifiedNameMetaNamePair, FieldInfo&gt; MapFieldInfo;\ntypedef Firebird::RightPooledMap&lt;Item, ItemInfo&gt; MapItemInfo;\n\n// Table value function block\n\nclass jrd_table_value_fun\n{\npublic:\n\texplicit jrd_table_value_fun(MemoryPool&amp; p) : recordFormat(nullptr), fields(p), funcId(0)\n\t{\n\t}\n\n\tSSHORT getId(const MetaName&amp; fieldName) const\n\t{\n\t\tconst SSHORT* const id = fields.get(fieldName);\n\t\tfb_assert(id);\n\t\treturn *id;\n\t}\n\n\tconst Format* recordFormat;\n\tFirebird::LeftPooledMap&lt;MetaName, SSHORT&gt; fields;\n\tMetaName name;\n\tUSHORT funcId;\n};\n\n// Compile scratch block\n\nclass CompilerScratch : public pool_alloc&lt;type_csb&gt;\n{\npublic:\n\tstruct Dependency\n\t{\n\t\texplicit Dependency(int aObjType)\n\t\t{\n\t\t\tmemset(this, 0, sizeof(*this));\n\t\t\tobjType = aObjType;\n\t\t}\n\n\t\tint objType;\n\n\t\tunion\n\t\t{\n\t\t\tjrd_rel* relation;\n\t\t\tconst Function* function;\n\t\t\tconst jrd_prc* procedure;\n\t\t\tconst QualifiedName* name;\n\t\t\tSLONG number;\n\t\t};\n\n\t\tconst MetaName* subName;\n\t\tSLONG subNumber;\n\t};\n\n\texplicit CompilerScratch(MemoryPool&amp; p, CompilerScratch* aMainCsb = NULL)\n\t:\t/*csb_node(0),\n\t\tcsb_variables(0),\n\t\tcsb_dependencies(0),\n\t\tcsb_count(0),\n\t\tcsb_n_stream(0),\n\t\tcsb_msg_number(0),\n\t\tcsb_impure(0),\n\t\tcsb_g_flags(0),*/\n#ifdef CMP_DEBUG\n\t\tcsb_dump(p),\n#endif\n\t\tmainCsb(aMainCsb),\n\t\tcsb_external(p),\n\t\tcsb_access(p),\n\t\tcsb_resources(p),\n\t\tcsb_dependencies(p),\n\t\tcsb_fors(p),\n\t\tcsb_localTables(p),\n\t\tcsb_invariants(p),\n\t\tcsb_current_nodes(p),\n\t\tcsb_current_for_nodes(p),\n\t\tcsb_forCursorNames(p),\n\t\tcsb_computing_fields(p),\n\t\tcsb_inner_booleans(p),\n\t\tcsb_variables_used_in_subroutines(p),\n\t\tcsb_pool(p),\n\t\tcsb_map_field_info(p),\n\t\tcsb_map_item_info(p),\n\t\tcsb_message_pad(p),\n\t\tsubFunctions(p),\n\t\tsubProcedures(p),\n\t\touterMessagesMap(p),\n\t\touterVarsMap(p),\n\t\tcsb_schema(p),\n\t\tcsb_currentForNode(NULL),\n\t\tcsb_currentDMLNode(NULL),\n\t\tcsb_currentAssignTarget(NULL),\n\t\tcsb_preferredDesc(NULL),\n\t\tcsb_rpt(p)\n\t{\n\t\tcsb_dbg_info = FB_NEW_POOL(p) Firebird::DbgInfo(p);\n\t}\n\n\t// Implemented in Statement.cpp\n\tULONG allocImpure(ULONG align, ULONG size);\n\n\ttemplate &lt;typename T&gt;\n\tULONG allocImpure()\n\t{\n\t\treturn allocImpure(alignof(T), sizeof(T));\n\t}\n\n\tStreamType nextStream(bool check = true)\n\t{\n\t\tif (csb_n_stream &gt;= MAX_STREAMS &amp;&amp; check)\n\t\t\tERR_post(Firebird::Arg::Gds(isc_too_many_contexts));\n\n\t\treturn csb_n_stream++;\n\t}\n\n\tbool collectingDependencies() const noexcept\n\t{\n\t\treturn (mainCsb ? mainCsb : this)-&gt;csb_g_flags &amp; csb_get_dependencies;\n\t}\n\n\tvoid addDependency(const Dependency&amp; dependency)\n\t{\n\t\tauto&amp; dependencies = mainCsb ? mainCsb-&gt;csb_dependencies : csb_dependencies;\n\t\tdependencies.add(dependency);\n\t}\n\n\tvoid qualifyExistingName(thread_db* tdbb, QualifiedName&amp; name, ObjectType objType)\n\t{\n\t\tif (!(name.schema.isEmpty() &amp;&amp; name.object.hasData()))\n\t\t\treturn;\n\n\t\tconst auto attachment = tdbb-&gt;getAttachment();\n\n\t\tif (csb_schema.hasData())\n\t\t{\n\t\t\tFirebird::ObjectsArray&lt;Firebird::MetaString&gt; schemaSearchPath;\n\n\t\t\tif (csb_g_flags &amp; csb_search_system_schema)\n\t\t\t\tschemaSearchPath.push(SYSTEM_SCHEMA);\n\n\t\t\tschemaSearchPath.push(csb_schema);\n\n\t\t\tattachment-&gt;qualifyExistingName(tdbb, name, {objType}, &amp;schemaSearchPath);\n\t\t}\n\t\telse\n\t\t\tattachment-&gt;qualifyExistingName(tdbb, name, {objType});\n\t}\n\n#ifdef CMP_DEBUG\n\tvoid dump(const char* format, ...)\n\t{\n\t\tva_list params;\n\t\tva_start(params, format);\n\n\t\tFirebird::string s;\n\t\ts.vprintf(format, params);\n\n\t\tva_end(params);\n\n\t\tcsb_dump += s;\n\t}\n\n\tFirebird::string csb_dump;\n#endif\n\n\tCompilerScratch* mainCsb;\n\tFirebird::BlrReader\tcsb_blr_reader;\n\tDmlNode*\t\tcsb_node;\n\tExternalAccessList csb_external;\t\t\t// Access to outside procedures/triggers to be checked\n\tAccessItemList\tcsb_access;\t\t\t\t\t// Access items to be checked\n\tvec&lt;DeclareVariableNode*&gt;*\tcsb_variables;\t// Vector of variables, if any\n\tResourceList\tcsb_resources;\t\t\t\t// Resources (relations and indexes)\n\tFirebird::Array&lt;Dependency&gt;\tcsb_dependencies;\t// objects that this statement depends upon\n\tFirebird::Array&lt;const Select*&gt; csb_fors;\t// select expressions\n\tFirebird::Array&lt;const DeclareLocalTableNode*&gt; csb_localTables;\t// local tables\n\tFirebird::Array&lt;ULONG*&gt; csb_invariants;\t\t// stack of pointer to nodes invariant offsets\n\tFirebird::Array&lt;ExprNode*&gt; csb_current_nodes;\t// RseNode&#x27;s and other invariant\n\t\t\t\t\t\t\t\t\t\t\t\t// candidates within whose scope we are\n\tFirebird::Array&lt;ForNode*&gt; csb_current_for_nodes;\n\tFirebird::RightPooledMap&lt;ForNode*, MetaName&gt; csb_forCursorNames;\n\tFirebird::SortedArray&lt;jrd_fld*&gt; csb_computing_fields;\t// Computed fields being compiled\n\tFirebird::Array&lt;BoolExprNode*&gt; csb_inner_booleans;\t// Inner booleans at the current scope\n\tFirebird::SortedArray&lt;USHORT&gt; csb_variables_used_in_subroutines;\n\tStreamType\t\tcsb_n_stream;\t\t\t\t// Next available stream\n\tUSHORT\t\t\tcsb_msg_number;\t\t\t\t// Highest used message number\n\tULONG\t\t\tcsb_impure;\t\t\t\t\t// Next offset into impure area\n\tUSHORT\t\t\tcsb_g_flags;\n\tMemoryPool&amp;\t\tcsb_pool;\t\t\t\t\t// Memory pool to be used by csb\n\tFirebird::AutoPtr&lt;Firebird::DbgInfo&gt; csb_dbg_info;\t// Debug information\n\tMapFieldInfo\t\tcsb_map_field_info;\t\t// Map field name to field info\n\tMapItemInfo\t\t\tcsb_map_item_info;\t\t// Map item to item info\n\n\t// Map of message number to field number to pad for external routines.\n\tFirebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;USHORT, USHORT&gt; &gt; &gt; csb_message_pad;\n\n\tQualifiedName\tcsb_domain_validation;\t// Parsing domain constraint in PSQL\n\n\t// used in cmp.cpp/pass1\n\tjrd_rel*\tcsb_view;\n\tStreamType\tcsb_view_stream;\n\tjrd_rel*\tcsb_parent_relation;\n\tunsigned\tblrVersion;\n\tUSHORT\t\tcsb_remap_variable;\n\tbool\t\tcsb_validate_expr;\n\tbool\t\tcsb_returning_expr;\n\tbool\t\tcsb_implicit_cursor;\n\n\tFirebird::LeftPooledMap&lt;MetaName, DeclareSubFuncNode*&gt; subFunctions;\n\tFirebird::LeftPooledMap&lt;MetaName, DeclareSubProcNode*&gt; subProcedures;\n\tFirebird::NonPooledMap&lt;USHORT, USHORT&gt; outerMessagesMap;\t// &lt;inner, outer&gt;\n\tFirebird::NonPooledMap&lt;USHORT, USHORT&gt; outerVarsMap;\t\t// &lt;inner, outer&gt;\n\n\tMetaName csb_schema;\n\n\tForNode*\tcsb_currentForNode;\n\tStmtNode*\tcsb_currentDMLNode;\t\t// could be StoreNode or ModifyNode\n\tExprNode*\tcsb_currentAssignTarget;\n\tdsc*\t\tcsb_preferredDesc;\t\t// expected by receiving side data format\n\n\tULONG\t\tcsb_currentCursorId = 0;\n\tULONG\t\tcsb_nextCursorId = 1;\n\tULONG\t\tcsb_nextRecSourceId = 1;\n\n\tstruct csb_repeat\n\t{\n\t\t// We must zero-initialize this one\n\t\tcsb_repeat() noexcept;\n\n\t\tvoid activate() noexcept;\n\t\tvoid deactivate() noexcept;\n\t\tQualifiedName getName(bool allowEmpty = true) const;\n\n\t\tstd::optional&lt;USHORT&gt; csb_cursor_number;\t// Cursor number for this stream\n\t\tStreamType csb_stream;\t\t\t// Map user context to internal stream\n\t\tStreamType csb_view_stream;\t\t// stream number for view relation, below\n\t\tUSHORT csb_flags;\n\n\t\tjrd_rel* csb_relation;\n\t\tFirebird::string* csb_alias;\t// SQL alias name for this instance of relation\n\t\tjrd_prc* csb_procedure;\n\t\tjrd_rel* csb_view;\t\t\t\t// parent view\n\n\t\tIndexDescList* csb_idx;\t\t\t// Packed description of indices\n\t\tMessageNode* csb_message;\t\t// Msg for send/receive\n\t\tconst Format* csb_format;\t\t// Default Format for stream\n\t\tFormat* csb_internal_format;\t// Statement internal format\n\t\tUInt32Bitmap* csb_fields;\t\t// Fields referenced\n\t\tdouble csb_cardinality;\t\t\t// Cardinality of relation\n\t\tPlanNode* csb_plan;\t\t\t\t// user-specified plan for this relation\n\t\tStreamType* csb_map;\t\t\t// Stream map for views\n\t\tRecordSource** csb_rsb_ptr;\t\t// point to rsb for nod_stream\n\t\tjrd_table_value_fun* csb_table_value_fun;  // Table value function\n\t};\n\n\ttypedef csb_repeat* rpt_itr;\n\ttypedef const csb_repeat* rpt_const_itr;\n\tFirebird::HalfStaticArray&lt;csb_repeat, 5&gt; csb_rpt;\n};\n\n\t// We must zero-initialize this one\ninline CompilerScratch::csb_repeat::csb_repeat() noexcept\n\t: csb_stream(0),\n\t  csb_view_stream(0),\n\t  csb_flags(0),\n\t  csb_relation(0),\n\t  csb_alias(0),\n\t  csb_procedure(0),\n\t  csb_view(0),\n\t  csb_idx(0),\n\t  csb_message(0),\n\t  csb_format(0),\n\t  csb_internal_format(0),\n\t  csb_fields(0),\n\t  csb_cardinality(0.0),\t// TMN: Non-natural cardinality?!\n\t  csb_plan(0),\n\t  csb_map(0),\n\t  csb_rsb_ptr(0),\n\t  csb_table_value_fun(0)\n{\n}\n\ninline void CompilerScratch::csb_repeat::activate() noexcept\n{\n\tcsb_flags |= csb_active;\n}\n\ninline void CompilerScratch::csb_repeat::deactivate() noexcept\n{\n\tcsb_flags &amp;= ~csb_active;\n}\n\ninline QualifiedName CompilerScratch::csb_repeat::getName(bool allowEmpty) const\n{\n\tif (csb_relation)\n\t\treturn csb_relation-&gt;rel_name;\n\telse if (csb_procedure)\n\t\treturn csb_procedure-&gt;getName();\n\telse if (csb_table_value_fun)\n\t\treturn QualifiedName(csb_table_value_fun-&gt;name);\n\t//// TODO: LocalTableSourceNode\n\t//// TODO: JsonTableSourceNode\n\telse\n\t{\n\t\tfb_assert(allowEmpty);\n\t\treturn {};\n\t}\n}\n\n\nclass AutoSetCurrentCursorId : private Firebird::AutoSetRestore&lt;ULONG&gt;\n{\npublic:\n\texplicit AutoSetCurrentCursorId(CompilerScratch* csb)\n\t\t: AutoSetRestore(&amp;csb-&gt;csb_currentCursorId,\n\t\t\t(csb-&gt;csb_currentCursorId == 0 ? csb-&gt;csb_nextCursorId++ : csb-&gt;csb_currentCursorId))\n\t{\n\t}\n};\n\n\nclass StatusXcp\n{\n\tFirebird::FbLocalStatus status;\n\npublic:\n\tStatusXcp();\n\n\tvoid clear();\n\tvoid init(const Jrd::FbStatusVector*) noexcept;\n\tvoid copyTo(Jrd::FbStatusVector*) const noexcept;\n\tbool success() const;\n\tSLONG as_gdscode() const;\n\tSLONG as_sqlcode() const;\n\tvoid as_sqlstate(char*) const;\n\tSLONG as_xcpcode() const;\n\tFirebird::string as_text() const;\n};\n\n// must correspond to the declared size of RDB$EXCEPTIONS.RDB$MESSAGE\ninline constexpr unsigned XCP_MESSAGE_LENGTH = 1023;\n\n// Array which stores relative pointers to impure areas of invariant nodes\ntypedef Firebird::SortedArray&lt;ULONG&gt; VarInvariantArray;\n\n} // namespace Jrd\n\n#endif // JRD_EXE_H\n"}, "/build/src/common/classes/GenericMap.h": {"id": "/build/src/common/classes/GenericMap.h", "filePath": "src/common/classes/GenericMap.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\tStringMap.h\n *\tDESCRIPTION:\tSecure handling of clumplet buffers\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef STRINGMAP_H\n#define STRINGMAP_H\n\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/fb_pair.h&quot;\n#include &quot;../common/classes/rwlock.h&quot;\n#include &quot;../common/classes/tree.h&quot;\n#include &lt;functional&gt;\n\nnamespace Firebird {\n\n//\n// Generic map which allows to have POD and non-POD keys and values.\n// The class is memory pools friendly.\n//\n// Usage\n//\n//   POD key (integer), non-POD value (string):\n//     GenericMap&lt;Pair&lt;Right&lt;int, string&gt; &gt; &gt;\n//\n//   non-POD key (string), POD value (integer):\n//     GenericMap&lt;Pair&lt;Left&lt;string, int&gt; &gt; &gt;\n//\n//   non-POD key (string), non-POD value (string):\n//     GenericMap&lt;Pair&lt;Full&lt;string, string&gt; &gt; &gt;\n//\ntemplate &lt;typename KeyValuePair, typename KeyComparator = DefaultComparator&lt;typename KeyValuePair::first_type&gt; &gt;\nclass GenericMap : public AutoStorage\n{\nprivate:\n\ttemplate &lt;typename TGenericMap, typename TAccessor, typename TKeyValuePair&gt;\n\tclass BaseIterator\n\t{\n\tpublic:\n\t\tBaseIterator(TGenericMap* map, bool initFinished = false)\n\t\t\t: accessor(map),\n\t\t\t  finished(initFinished)\n\t\t{\n\t\t\tif (!initFinished)\n\t\t\t\tfinished = !accessor.getFirst();\n\t\t}\n\n\tpublic:\n\t\tbool operator !=(const BaseIterator&amp; o)\n\t\t{\n\t\t\treturn !(\n\t\t\t\t(finished &amp;&amp; o.finished) ||\n\t\t\t\t((!finished &amp;&amp; !o.finished &amp;&amp; accessor.current() == o.accessor.current())));\n\t\t}\n\n\t\tvoid operator ++()\n\t\t{\n\t\t\tfb_assert(!finished);\n\t\t\tfinished = !accessor.getNext();\n\t\t}\n\n\t\tTKeyValuePair&amp; operator *()\n\t\t{\n\t\t\tfb_assert(!finished);\n\t\t\treturn *accessor.current();\n\t\t}\n\n\tprivate:\n\t\tTAccessor accessor;\n\t\tbool finished;\n\t};\n\npublic:\n\ttypedef typename KeyValuePair::first_type KeyType;\n\ttypedef typename KeyValuePair::second_type ValueType;\n\n\ttypedef BePlusTree&lt;KeyValuePair*, KeyType, FirstObjectKey&lt;KeyValuePair&gt;, KeyComparator&gt; ValuesTree;\n\ttypedef typename ValuesTree::Accessor TreeAccessor;\n\ttypedef typename ValuesTree::ConstAccessor ConstTreeAccessor;\n\n\tclass Accessor\n\t{\n\tpublic:\n\t\texplicit Accessor(GenericMap* map) : m_Accessor(&amp;map-&gt;tree) {}\n\n\t\tKeyValuePair* current() const { return m_Accessor.current(); }\n\n\t\tbool getFirst() { return m_Accessor.getFirst(); }\n\t\tbool getNext() { return m_Accessor.getNext(); }\n\n\t\tbool locate(const KeyType&amp; key) { return m_Accessor.locate(key); }\n\n\tprivate:\n\t\tTreeAccessor m_Accessor;\n\t};\n\n\tclass ConstAccessor\n\t{\n\tpublic:\n\t\texplicit ConstAccessor(const GenericMap* map) : m_Accessor(&amp;map-&gt;tree) {}\n\n\t\tconst KeyValuePair* current() const { return m_Accessor.current(); }\n\n\t\tbool getFirst() { return m_Accessor.getFirst(); }\n\t\tbool getNext() { return m_Accessor.getNext(); }\n\n\t\tbool locate(const KeyType&amp; key) { return m_Accessor.locate(key); }\n\n\tprivate:\n\t\tConstTreeAccessor m_Accessor;\n\t};\n\n\tusing Iterator = BaseIterator&lt;GenericMap, Accessor, KeyValuePair&gt;;\n\tusing ConstIterator = BaseIterator&lt;const GenericMap, ConstAccessor, const KeyValuePair&gt;;\n\n\tfriend class Accessor;\n\tfriend class ConstAccessor;\n\n\tGenericMap() : tree(getPool()), mCount(0) { }\n\n\texplicit GenericMap(MemoryPool&amp; a_pool)\n\t\t: AutoStorage(a_pool), tree(getPool()), mCount(0)\n\t{ }\n\n\t~GenericMap()\n\t{\n\t\tclear();\n\t}\n\n\tvoid assign(GenericMap&amp; v)\n\t{\n\t\tclear();\n\n\t\tAccessor accessor(&amp;v);\n\n\t\tfor (bool found = accessor.getFirst(); found; found = accessor.getNext())\n\t\t{\n\t\t\tconst KeyValuePair* const current_pair = accessor.current();\n\t\t\tput(current_pair-&gt;first, current_pair-&gt;second);\n\t\t}\n\t}\n\n\tvoid takeOwnership(GenericMap&amp; from)\n\t{\n\t\tfb_assert(this != &amp;from);\n\n\t\tclear();\n\n\t\ttree = from.tree;\n\t\tmCount = from.mCount;\n\n\t\tTreeAccessor treeAccessor(&amp;from.tree);\n\n\t\tif (treeAccessor.getFirst())\n\t\t{\n\t\t\twhile (true)\n\t\t\t{\n\t\t\t\tbool haveMore = treeAccessor.fastRemove();\n\t\t\t\tif (!haveMore)\n\t\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\tfrom.mCount = 0;\n\t}\n\n\t// Clear the map\n\tvoid clear()\n\t{\n\t\tTreeAccessor treeAccessor(&amp;tree);\n\n\t\tif (treeAccessor.getFirst())\n\t\t{\n\t\t\twhile (true)\n\t\t\t{\n\t\t\t\tKeyValuePair* temp = treeAccessor.current();\n\t\t\t\tbool haveMore = treeAccessor.fastRemove();\n\t\t\t\tdelete temp;\n\t\t\t\tif (!haveMore)\n\t\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\tmCount = 0;\n\t}\n\n\t// Returns true if value existed\n\tbool remove(const KeyType&amp; key)\n\t{\n\t\tTreeAccessor treeAccessor(&amp;tree);\n\n\t\tif (treeAccessor.locate(key))\n\t\t{\n\t\t\tKeyValuePair* var = treeAccessor.current();\n\t\t\ttreeAccessor.fastRemove();\n\t\t\tdelete var;\n\t\t\tmCount--;\n\t\t\treturn true;\n\t\t}\n\n\t\treturn false;\n\t}\n\n\t// Returns true if value existed previously\n\tbool put(const KeyType&amp; key, const ValueType&amp; value)\n\t{\n\t\tTreeAccessor treeAccessor(&amp;tree);\n\n\t\tif (treeAccessor.locate(key))\n\t\t{\n\t\t\ttreeAccessor.current()-&gt;second = value;\n\t\t\treturn true;\n\t\t}\n\n\t\tKeyValuePair* var = FB_NEW_POOL(getPool()) KeyValuePair(getPool(), key, value);\n\t\ttree.add(var);\n\t\tmCount++;\n\t\treturn false;\n\t}\n\n\t// Returns pointer to the added empty value or null when key already exists\n\tValueType* put(const KeyType&amp; key)\n\t{\n\t\tTreeAccessor treeAccessor(&amp;tree);\n\n\t\tif (treeAccessor.locate(key)) {\n\t\t\treturn NULL;\n\t\t}\n\n\t\tKeyValuePair* var = FB_NEW_POOL(getPool()) KeyValuePair(getPool());\n\t\tvar-&gt;first = key;\n\t\ttree.add(var);\n\t\tmCount++;\n\t\treturn &amp;var-&gt;second;\n\t}\n\n\t// Returns true if value is found\n\tbool get(const KeyType&amp; key, ValueType&amp; value) const\n\t{\n\t\tConstTreeAccessor treeAccessor(&amp;tree);\n\n\t\tif (treeAccessor.locate(key))\n\t\t{\n\t\t\tvalue = treeAccessor.current()-&gt;second;\n\t\t\treturn true;\n\t\t}\n\n\t\treturn false;\n\t}\n\n\t// Returns pointer to the found value or null otherwise\n\tValueType* get(const KeyType&amp; key) const\n\t{\n\t\tConstTreeAccessor treeAccessor(&amp;tree);\n\n\t\tif (treeAccessor.locate(key)) {\n\t\t\treturn &amp;treeAccessor.current()-&gt;second;\n\t\t}\n\n\t\treturn NULL;\n\t}\n\n\t// If the key is not present, add it. Not synchronized.\n\tValueType* getOrPut(const KeyType&amp; key)\n\t{\n\t\tif (auto value = get(key))\n\t\t\treturn value;\n\n\t\treturn put(key);\n\t}\n\n\tbool exist(const KeyType&amp; key) const\n\t{\n\t\treturn ConstTreeAccessor(&amp;tree).locate(key);\n\t}\n\n\tsize_t count() const { return mCount; }\n\n\tbool isEmpty() const { return mCount == 0; }\n\n\tbool hasData() const { return mCount != 0; }\n\n\tAccessor accessor()\n\t{\n\t\treturn Accessor(this);\n\t}\n\n\tConstAccessor constAccessor() const\n\t{\n\t\treturn ConstAccessor(this);\n\t}\n\n\tIterator begin()\n\t{\n\t\treturn Iterator(this);\n\t}\n\n\tConstIterator begin() const\n\t{\n\t\treturn ConstIterator(this);\n\t}\n\n\tIterator end()\n\t{\n\t\treturn Iterator(this, true);\n\t}\n\n\tConstIterator end() const\n\t{\n\t\treturn ConstIterator(this, true);\n\t}\n\n\tValueType&amp; compute(RWLock&amp; lock, const KeyType&amp; key, std::function&lt;void (const KeyType&amp;, ValueType&amp;, bool)&gt; func)\n\t{\n\t\t{\t// scope\n\t\t\tReadLockGuard sync(lock, FB_FUNCTION);\n\n\t\t\tconst auto value = get(key);\n\n\t\t\tif (value)\n\t\t\t{\n\t\t\t\tfunc(key, *value, true);\n\t\t\t\treturn *value;\n\t\t\t}\n\t\t}\n\n\t\t{\t// scope\n\t\t\tWriteLockGuard sync(lock, FB_FUNCTION);\n\n\t\t\tauto value = get(key);\n\n\t\t\tif (value)\n\t\t\t{\n\t\t\t\tfunc(key, *value, true);\n\t\t\t\treturn *value;\n\t\t\t}\n\n\t\t\tvalue = put(key);\n\t\t\tfb_assert(value);\n\n\t\t\ttry\n\t\t\t{\n\t\t\t\tfunc(key, *value, false);\n\t\t\t}\n\t\t\tcatch (...)\n\t\t\t{\n\t\t\t\tremove(key);\n\t\t\t\tthrow;\n\t\t\t}\n\n\t\t\treturn *value;\n\t\t}\n\t}\n\nprivate:\n\tValuesTree tree;\n\tsize_t mCount;\n};\n\ntypedef GenericMap&lt;Pair&lt;Full&lt;string, string&gt; &gt; &gt; StringMap;\n\ntemplate &lt;typename T, typename V, typename KeyComparator = DefaultComparator&lt;T&gt;&gt;\nusing NonPooledMap = GenericMap&lt;NonPooledPair&lt;T, V&gt;, KeyComparator&gt;;\n\ntemplate &lt;typename T, typename V, typename KeyComparator = DefaultComparator&lt;T&gt;&gt;\nusing LeftPooledMap = GenericMap&lt;LeftPooledPair&lt;T, V&gt;, KeyComparator&gt;;\n\ntemplate &lt;typename T, typename V, typename KeyComparator = DefaultComparator&lt;T&gt;&gt;\nusing RightPooledMap = GenericMap&lt;RightPooledPair&lt;T, V&gt;, KeyComparator&gt;;\n\ntemplate &lt;typename T, typename V, typename KeyComparator = DefaultComparator&lt;T&gt;&gt;\nusing FullPooledMap = GenericMap&lt;FullPooledPair&lt;T, V&gt;, KeyComparator&gt;;\n\n}\n\n#endif\n"}, "/usr/include/x86_64-linux-gnu/sys/param.h": {"id": "/usr/include/x86_64-linux-gnu/sys/param.h", "filePath": "/usr/include/x86_64-linux-gnu/sys/param.h", "content": "/* Compatibility header for old-style Unix parameters and limits.\n   Copyright (C) 1995-2022 Free Software Foundation, Inc.\n   This file is part of the GNU C Library.\n\n   The GNU C Library is free software; you can redistribute it and/or\n   modify it under the terms of the GNU Lesser General Public\n   License as published by the Free Software Foundation; either\n   version 2.1 of the License, or (at your option) any later version.\n\n   The GNU C Library is distributed in the hope that it will be useful,\n   but WITHOUT ANY WARRANTY; without even the implied warranty of\n   MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n   Lesser General Public License for more details.\n\n   You should have received a copy of the GNU Lesser General Public\n   License along with the GNU C Library; if not, see\n   &lt;https://www.gnu.org/licenses/&gt;.  */\n\n#ifndef _SYS_PARAM_H\n#define _SYS_PARAM_H    1\n\n#define __need_NULL\n#include &lt;stddef.h&gt;\n\n#include &lt;sys/types.h&gt;\n#include &lt;limits.h&gt;\n#include &lt;endian.h&gt;                     /* Define BYTE_ORDER et al.  */\n#include &lt;signal.h&gt;                     /* Define NSIG.  */\n\n/* This file defines some things in system-specific ways.  */\n#include &lt;bits/param.h&gt;\n\n\n/* BSD names for some &lt;limits.h&gt; values.  */\n\n#define NBBY\t\tCHAR_BIT\n\n#if !defined NGROUPS &amp;&amp; defined NGROUPS_MAX\n# define NGROUPS\tNGROUPS_MAX\n#endif\n#if !defined MAXSYMLINKS &amp;&amp; defined SYMLOOP_MAX\n# define MAXSYMLINKS\tSYMLOOP_MAX\n#endif\n#if !defined CANBSIZ &amp;&amp; defined MAX_CANON\n# define CANBSIZ\tMAX_CANON\n#endif\n#if !defined MAXPATHLEN &amp;&amp; defined PATH_MAX\n# define MAXPATHLEN\tPATH_MAX\n#endif\n#if !defined NOFILE &amp;&amp; defined OPEN_MAX\n# define NOFILE\t\tOPEN_MAX\n#endif\n#if !defined MAXHOSTNAMELEN &amp;&amp; defined HOST_NAME_MAX\n# define MAXHOSTNAMELEN\tHOST_NAME_MAX\n#endif\n#ifndef NCARGS\n# ifdef ARG_MAX\n#  define NCARGS\tARG_MAX\n# else\n/* ARG_MAX is unlimited, but we define NCARGS for BSD programs that want to\n   compare against some fixed limit.  */\n# define NCARGS\t\tINT_MAX\n# endif\n#endif\n\n\n/* Magical constants.  */\n#ifndef NOGROUP\n# define NOGROUP\t65535     /* Marker for empty group set member.  */\n#endif\n#ifndef NODEV\n# define NODEV\t\t((dev_t) -1)    /* Non-existent device.  */\n#endif\n\n\n/* Unit of `st_blocks&#x27;.  */\n#ifndef DEV_BSIZE\n# define DEV_BSIZE\t512\n#endif\n\n\n/* Bit map related macros.  */\n#define setbit(a,i)     ((a)[(i)/NBBY] |= 1&lt;&lt;((i)%NBBY))\n#define clrbit(a,i)     ((a)[(i)/NBBY] &amp;= ~(1&lt;&lt;((i)%NBBY)))\n#define isset(a,i)      ((a)[(i)/NBBY] &amp; (1&lt;&lt;((i)%NBBY)))\n#define isclr(a,i)      (((a)[(i)/NBBY] &amp; (1&lt;&lt;((i)%NBBY))) == 0)\n\n/* Macros for counting and rounding.  */\n#ifndef howmany\n# define howmany(x, y)  (((x) + ((y) - 1)) / (y))\n#endif\n#ifdef __GNUC__\n# define roundup(x, y)  (__builtin_constant_p (y) &amp;&amp; powerof2 (y)             \\\n                         ? (((x) + (y) - 1) &amp; ~((y) - 1))                     \\\n                         : ((((x) + ((y) - 1)) / (y)) * (y)))\n#else\n# define roundup(x, y)  ((((x) + ((y) - 1)) / (y)) * (y))\n#endif\n#define powerof2(x)     ((((x) - 1) &amp; (x)) == 0)\n\n/* Macros for min/max.  */\n#define MIN(a,b) (((a)&lt;(b))?(a):(b))\n#define MAX(a,b) (((a)&gt;(b))?(a):(b))\n\n\n#endif  /* sys/param.h */\n"}, "/build/src/common/classes/fb_pair.h": {"id": "/build/src/common/classes/fb_pair.h", "filePath": "src/common/classes/fb_pair.h", "content": "/*\n *\tPROGRAM:\tCommon class definition\n *\tMODULE:\t\tfb_pair.h\n *\tDESCRIPTION:\tProvides almost that same functionality,\n *\t\t\tthat STL::pair does, but behaves\n *\t\t\tMemoryPools friendly.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alexander Peshkoff\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Alexander Peshkoff &lt;peshkoff@mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef CLASSES_FB_PAIR_H\n#define CLASSES_FB_PAIR_H\n\n#include &quot;../common/classes/alloc.h&quot;\n\nnamespace Firebird\n{\n\n// Non MemoryPool&#x27;ed pair - left and right object in such pair hasn&#x27;t MemoryPool&#x27;ed\n// constructor (typically POD or builtin type).\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct NonPooled\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit NonPooled(MemoryPool&amp;) : first(), second() { }\n\t\texplicit NonPooled(MemoryPool&amp;, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(v1), second(v2) { }\n\t\texplicit NonPooled(MemoryPool&amp;, const NonPooled&amp; lp)\n\t\t\t: first(lp.first), second(lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Right pair - right object in such pair has MemoryPool&#x27;ed constructor,\n//\tleft one - doesn&#x27;t (typically POD or builtin type)\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct Right\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit Right(MemoryPool&amp; p) : first(), second(p) { }\n\t\texplicit Right(MemoryPool&amp; p, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(v1), second(p, v2) { }\n\t\texplicit Right(MemoryPool&amp; p, const Right&amp; lp)\n\t\t\t: first(lp.first), second(p, lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Left pair - left object in such pair has MemoryPool&#x27;ed constructor,\n//\tright one - doesn&#x27;t (typically POD or builtin type)\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct Left\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit Left(MemoryPool&amp; p) : first(p), second() { }\n\t\texplicit Left(MemoryPool&amp; p, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(p, v1), second(v2) { }\n\t\texplicit Left(MemoryPool&amp; p, const Left&amp; lp)\n\t\t\t: first(p, lp.first), second(lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Full pair - both objects in such pair have MemoryPool&#x27;ed constructors.\n\ntemplate&lt;typename parLeft, typename parRight&gt;\n\tstruct Full\n\t{\n\t\ttypedef parLeft first_type;\n\t\ttypedef parRight second_type;\n\t\texplicit Full(MemoryPool&amp; p) : first(p), second(p) { }\n\t\texplicit Full(MemoryPool&amp; p, const parLeft&amp; v1, const parRight&amp; v2)\n\t\t\t: first(p, v1), second(p, v2) { }\n\t\texplicit Full(MemoryPool&amp; p, const Full&amp; lp)\n\t\t\t: first(p, lp.first), second(p, lp.second) { }\n\t\tparLeft first;\n\t\tparRight second;\n\t};\n\n// Pair - template providing full bool op-s set\n\ntemplate&lt;typename BasePair&gt;\n\tstruct Pair : public BasePair\n\t{\n\t\ttypedef typename Pair::first_type Pair_first_type;\n\t\ttypedef typename Pair::second_type Pair_second_type;\n\t\texplicit Pair(MemoryPool&amp; p) : BasePair(p) { }\n\t\texplicit Pair(MemoryPool&amp; p, const Pair_first_type&amp; v1,\n\t\t\tconst Pair_second_type&amp; v2) : BasePair(p, v1, v2) { }\n\t\texplicit Pair(MemoryPool&amp; p, const Pair&amp; lp)\n\t\t\t: BasePair(p, lp) { }\n\t\tPair() : BasePair(AutoStorage::getAutoMemoryPool()) { }\n\t\tPair(const Pair_first_type&amp; v1, const Pair_second_type&amp; v2)\n\t\t\t: BasePair(AutoStorage::getAutoMemoryPool(), v1, v2) { }\n\t\tPair(const Pair&amp; lp)\n\t\t\t: BasePair(AutoStorage::getAutoMemoryPool(), lp) { }\n\t\tbool operator==(const Pair&amp; v) const\n\t\t{\n\t\t\treturn this-&gt;first == v.first &amp;&amp; this-&gt;second == v.second;\n\t\t}\n\t\tbool operator&lt;(const Pair&amp; v) const\n\t\t{\n\t\t\treturn this-&gt;first &lt; v.first || (this-&gt;first == v.first &amp;&amp; this-&gt;second &lt; v.second);\n\t\t}\n\t\tbool operator!=(const Pair&amp; v) const\n\t\t{\n\t\t\treturn ! (*this == v);\n\t\t}\n\t\tbool operator&gt;(const Pair&amp; v) const\n\t\t{\n\t\t\treturn v &lt; *this;\n\t\t}\n\t\tbool operator&lt;=(const Pair&amp; v) const\n\t\t{\n\t\t\treturn ! (v &lt; *this);\n\t\t}\n\t\tbool operator&gt;=(const Pair&amp; v) const\n\t\t{\n\t\t\treturn ! (*this &lt; v);\n\t\t}\n\t};\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing NonPooledPair = Pair&lt;NonPooled&lt;parLeft, parRight&gt;&gt;;\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing LeftPooledPair = Pair&lt;Left&lt;parLeft, parRight&gt;&gt;;\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing RightPooledPair = Pair&lt;Right&lt;parLeft, parRight&gt;&gt;;\n\ntemplate&lt;typename parLeft, typename parRight&gt;\nusing FullPooledPair = Pair&lt;Full&lt;parLeft, parRight&gt;&gt;;\n\ntemplate &lt;typename P&gt;\n\tclass FirstKey\n\t{\n\tpublic:\n\t\ttypedef typename P::first_type Pair_first_type;\n\t\tstatic const Pair_first_type&amp; generate(const P&amp; item)\n\t\t{\n\t\t\treturn item.first;\n\t\t}\n\t\tstatic const Pair_first_type&amp; generate(const void* /*sender*/, const P&amp; item)\n\t\t{\n\t\t\treturn item.first;\n\t\t}\n\t};\n\ntemplate &lt;typename P&gt;\n\tclass FirstPointerKey\n\t{\n\tpublic:\n\t\ttypedef typename P::first_type Pair_first_type;\n\t\tstatic const Pair_first_type* generate(const P* item)\n\t\t{\n\t\t\treturn &amp;item-&gt;first;\n\t\t}\n\t\tstatic const Pair_first_type* generate(const void* /*sender*/, const P* item)\n\t\t{\n\t\t\treturn &amp;item-&gt;first;\n\t\t}\n\t};\n\ntemplate &lt;typename P&gt;\n\tclass FirstObjectKey\n\t{\n\tpublic:\n\t\ttypedef typename P::first_type Pair_first_type;\n\t\tstatic const Pair_first_type&amp; generate(const P* item)\n\t\t{\n\t\t\treturn item-&gt;first;\n\t\t}\n\t\tstatic const Pair_first_type&amp; generate(const void* /*sender*/, const P* item)\n\t\t{\n\t\t\treturn item-&gt;first;\n\t\t}\n\t};\n} // namespace Firebird\n\n#endif\t// CLASSES_FB_PAIR_H\n"}}, "reports": [{"fileId": "/build/src/common/classes/objects_array.h", "reportHash": "bd051bfbcbac3ed5944212b19d901a74", "checker": {"name": "clang-diagnostic-deprecated-copy-with-user-provided-copy", "url": "https://clang.llvm.org/docs/DiagnosticsReference.html#wdeprecated-copy-with-user-provided-copy"}, "analyzerName": "clang-tidy", "line": 64, "column": 4, "message": "definition of implicit copy assignment operator for 'iterator' is deprecated because it has a user-provided copy constructor", "events": [{"message": "in implicit copy assignment operator for 'Firebird::ObjectsArray<Jrd::MergeNode::Matched>::iterator' first required here", "fileId": "/build/src/dsql/StmtNodes.cpp", "line": 7246, "column": 16}, {"message": "definition of implicit copy assignment operator for 'iterator' is deprecated because it has a user-provided copy constructor", "fileId": "/build/src/common/classes/objects_array.h", "line": 64, "column": 4}], "macros": [], "notes": [], "reviewStatus": "U
