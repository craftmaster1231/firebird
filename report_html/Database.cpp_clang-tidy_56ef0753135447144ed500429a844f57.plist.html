t\t\t// max number of indexes on a root page\n\n#ifdef SUPERSERVER_V2\n\tUSHORT dbb_prefetch_sequence;\t\t// sequence to pace frequency of prefetch requests\n\tUSHORT dbb_prefetch_pages;\t\t\t// prefetch pages per request\n#endif\n\n\tFirebird::PathName dbb_filename;\t// filename string\n\tFirebird::PathName dbb_database_name;\t// database visible name (file name or alias)\n#ifdef HAVE_ID_BY_NAME\n\tFirebird::UCharBuffer dbb_id;\n#endif\n\tMetaName dbb_owner;\t\t// database owner\n\n\tFirebird::SyncObject\t\t\tdbb_pools_sync;\n\tFirebird::Array&lt;MemoryPool*&gt;\tdbb_pools;\t\t// pools\n\n\tFirebird::SyncObject\t\t\tdbb_sortbuf_sync;\n\tFirebird::Array&lt;UCHAR*&gt;\t\t\tdbb_sort_buffers;\t// sort buffers ready for reuse\n\n\tTraNumber dbb_oldest_active;\t\t// Cached &quot;oldest active&quot; transaction\n\tTraNumber dbb_oldest_transaction;\t// Cached &quot;oldest interesting&quot; transaction\n\tTraNumber dbb_oldest_snapshot;\t\t// Cached &quot;oldest snapshot&quot; of all active transactions\n\tTraNumber dbb_next_transaction;\t\t// Next transaction id used by NETWARE\n\tAttNumber dbb_attachment_id;\t\t// Next attachment id for ReadOnly DB&#x27;s\n\tULONG dbb_page_buffers;\t\t\t\t// Page buffers from header page\n\n\tGarbageCollector*\tdbb_garbage_collector;\t// GarbageCollector class\n\tFirebird::Semaphore dbb_gc_sem;\t\t// Event to wake up garbage collector\n\tFirebird::Semaphore dbb_gc_init;\t// Event for initialization garbage collector\n\tThreadFinishSync&lt;Database*&gt; dbb_gc_fini;\t// Sync for finalization garbage collector\n\n\tFirebird::MemoryStats dbb_memory_stats;\n\tRuntimeStatistics dbb_stats;\n\tmutable Firebird::Mutex dbb_stats_mutex;\n\n\tTraNumber\tdbb_last_header_write;\t// Transaction id of last header page physical write\n\tSLONG dbb_flush_cycle;\t\t\t\t// Current flush cycle\n\tULONG dbb_sweep_interval;\t\t\t// Transactions between sweep\n\tconst ULONG dbb_lock_owner_id;\t\t// ID for the lock manager\n\tSLONG dbb_lock_owner_handle;\t\t// Handle for the lock manager\n\n\tUSHORT unflushed_writes;\t\t\t// unflushed writes\n\ttime_t last_flushed_write;\t\t\t// last flushed write time\n\n\tTipCache*\t\tdbb_tip_cache;\t\t// cache of latest known state of all transactions in system\n\tBackupManager*\tdbb_backup_manager;\t\t\t\t\t\t// physical backup manager\n\tISC_TIMESTAMP_TZ dbb_creation_date; \t\t\t\t\t// creation timestamp in GMT\n\tExternalFileDirectoryList* dbb_external_file_directory_list;\n\tFirebird::RefPtr&lt;const Firebird::Config&gt; dbb_config;\n\n\tCryptoManager* dbb_crypto_manager;\n\tFirebird::RefPtr&lt;ExistenceRefMutex&gt; dbb_init_fini;\n\tFirebird::XThreadMutex dbb_thread_mutex;\t\t// special threads start/stop mutex\n\tFirebird::RefPtr&lt;Linger&gt; dbb_linger_timer;\n\tunsigned dbb_linger_seconds;\n\ttime_t dbb_linger_end;\n\tFirebird::RefPtr&lt;Firebird::IPluginConfig&gt; dbb_plugin_config;\n\n\tFirebird::TriState dbb_repl_state;\t// replication state\n\tLock* dbb_repl_lock;\t\t\t\t// replication state lock\n\tFirebird::SyncObject dbb_repl_sync;\n\tFB_UINT64 dbb_repl_sequence;\t\t// replication sequence\n\tstd::atomic&lt;ReplicaMode&gt; dbb_replica_mode;\t\t// replica access mode\n\n\tunsigned dbb_compatibility_index;\t// datatype backward compatibility level\n\tDictionary dbb_dic;\t\t\t\t\t// metanames dictionary\n\tFirebird::InitInstance&lt;Keywords, Keywords::Allocator, Firebird::TraditionalDelete&gt; dbb_keywords;\n\n\t// returns true if primary file is located on raw device\n\tbool onRawDevice() const;\n\n\t// returns an unique ID string for a database file\n\tconst Firebird::string&amp; getUniqueFileId();\n\n\t// returns the minimum IO block size\n\tULONG getIOBlockSize() const;\n\n#ifdef DEV_BUILD\n\t// returns true if main lock is in exclusive state\n\tbool locked() const\n\t{\n\t\treturn dbb_sync.ourExclusiveLock();\n\t}\n#endif\n\n\tMemoryPool* createPool()\n\t{\n\t\tMemoryPool* const pool = MemoryPool::createPool(dbb_permanent, dbb_memory_stats);\n\n\t\tFirebird::SyncLockGuard guard(&amp;dbb_pools_sync, Firebird::SYNC_EXCLUSIVE, &quot;Database::createPool&quot;);\n\t\tdbb_pools.add(pool);\n\t\treturn pool;\n\t}\n\n\tvoid deletePool(MemoryPool* pool);\n\n\tvoid registerModule(Module&amp;);\n\n\tbool isShutdown() const\n\t{\n\t\treturn (dbb_shutdown_mode.load(std::memory_order_relaxed) != shut_mode_online);\n\t}\n\n\tbool isShutdown(shut_mode_t mode) const\n\t{\n\t\treturn (dbb_shutdown_mode.load(std::memory_order_relaxed) == mode);\n\t}\n\n\tbool isReplica() const\n\t{\n\t\treturn (dbb_replica_mode.load(std::memory_order_relaxed) != REPLICA_NONE);\n\t}\n\n\tbool isReplica(ReplicaMode mode) const\n\t{\n\t\treturn (dbb_replica_mode.load(std::memory_order_relaxed) == mode);\n\t}\n\n\tUSHORT getEncodedOdsVersion() const\n\t{\n\t\treturn ENCODE_ODS(dbb_ods_version, dbb_minor_version);\n\t}\n\n\t// Methods encapsulating operations with vectors of known pages\n\tULONG getKnownPagesCount(SCHAR ptype);\n\tULONG getKnownPage(SCHAR ptype, ULONG sequence);\n\tvoid setKnownPage(SCHAR ptype, ULONG sequence, ULONG value);\n\tvoid copyKnownPages(SCHAR ptype, ULONG count, ULONG* data);\n\nprivate:\n\tDatabase(MemoryPool* p, Firebird::IPluginConfig* pConf, bool shared)\n\t:\tdbb_permanent(p),\n\t\tdbb_guid(Firebird::Guid::empty()),\n\t\tdbb_page_manager(this, *p),\n\t\tdbb_file_id(*p),\n\t\tdbb_modules(*p),\n\t\tdbb_extManager(nullptr),\n\t\tdbb_flags(shared ? DBB_shared : 0),\n\t\tdbb_shutdown_mode(shut_mode_online),\n\t\tdbb_filename(*p),\n\t\tdbb_database_name(*p),\n#ifdef HAVE_ID_BY_NAME\n\t\tdbb_id(*p),\n#endif\n\t\tdbb_owner(*p),\n\t\tdbb_pools(*p, 4),\n\t\tdbb_sort_buffers(*p),\n\t\tdbb_gc_fini(*p, garbage_collector, THREAD_medium),\n\t\tdbb_stats(*p),\n\t\tdbb_lock_owner_id(getLockOwnerId()),\n\t\tdbb_tip_cache(NULL),\n\t\tdbb_creation_date(Firebird::TimeZoneUtil::getCurrentGmtTimeStamp()),\n\t\tdbb_external_file_directory_list(NULL),\n\t\tdbb_init_fini(FB_NEW_POOL(*getDefaultMemoryPool()) ExistenceRefMutex()),\n\t\tdbb_linger_seconds(0),\n\t\tdbb_linger_end(0),\n\t\tdbb_plugin_config(pConf),\n\t\tdbb_repl_sequence(0),\n\t\tdbb_replica_mode(REPLICA_NONE),\n\t\tdbb_compatibility_index(~0U),\n\t\tdbb_dic(*p)\n\t{\n\t\tdbb_pools.add(p);\n\t}\n\n\t~Database();\n\npublic:\n\tAttNumber generateAttachmentId();\n\tTraNumber generateTransactionId();\n\tStmtNumber generateStatementId();\n\t// void assignLatestTransactionId(TraNumber number);\n\tvoid assignLatestAttachmentId(AttNumber number);\n\tAttNumber getLatestAttachmentId() const;\n\tStmtNumber getLatestStatementId() const;\n\n\tULONG getMonitorGeneration() const;\n\tULONG newMonitorGeneration() const;\n\n\tUSHORT getMaxIndexKeyLength() const\n\t{\n\t\treturn dbb_page_size / 4;\n\t}\n\n\tbool readOnly() const\n\t{\n\t\treturn (dbb_flags &amp; DBB_read_only) != 0;\n\t}\n\n\t// returns true if sweeper thread could start\n\tbool allowSweepThread(thread_db* tdbb);\n\t// Throw an exception if sweep cannot be run\n\tvoid initiateSweepRun(thread_db* tdbb);\n\t// reset sweep flag and release sweep lock\n\tvoid clearSweepFlags(thread_db* tdbb);\n\t// reset sweep starting flag, release thread starting mutex\n\tbool clearSweepStarting();\n\n\tstatic void garbage_collector(Database* dbb);\n\tvoid exceptionHandler(const Firebird::Exception&amp; ex, ThreadFinishSync&lt;Database*&gt;::ThreadRoutine* routine);\n\n\tFB_UINT64 getReplSequence(thread_db* tdbb);\n\tvoid setReplSequence(thread_db* tdbb, FB_UINT64 sequence);\n\tbool isReplicating(thread_db* tdbb);\n\tvoid invalidateReplState(thread_db* tdbb, bool broadcast);\n\tstatic int replStateAst(void*);\n\n\tconst CoercionArray *getBindings() const;\n\n\tvoid initGlobalObjects();\n\tvoid shutdownGlobalObjects();\n\n\tLockManager* lockManager()\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getLockManager();\n\t}\n\n\tEventManager* eventManager()\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getEventManager();\n\t}\n\n\tReplication::Manager* replManager(bool create = false)\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getReplManager(create);\n\t}\n\n\tconst Replication::Config* replConfig()\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getReplConfig();\n\t}\n\n\tbool incTempCacheUsage(FB_SIZE_T size)\n\t{\n\t\treturn dbb_gblobj_holder-&gt;incTempCacheUsage(size);\n\t}\n\n\tvoid decTempCacheUsage(FB_SIZE_T size)\n\t{\n\t\tdbb_gblobj_holder-&gt;decTempCacheUsage(size);\n\t}\n\n\tbool isRestoring() const\n\t{\n\t\treturn dbb_flags &amp; DBB_restoring;\n\t}\n\n\tvoid setRestoring(bool value)\n\t{\n\t\tif (value)\n\t\t\tdbb_flags |= DBB_restoring;\n\t\telse\n\t\t\tdbb_flags &amp;= ~DBB_restoring;\n\t}\n\nprivate:\n\t//static int blockingAstSharedCounter(void*);\n\tstatic int blocking_ast_sweep(void* ast_object);\n\tLock* createSweepLock(thread_db* tdbb);\n\n\t// The delete operators are no-oped because the Database memory is allocated from the\n\t// Database&#x27;s own permanent pool.  That pool has already been released by the Database\n\t// destructor, so the memory has already been released.  Hence the operator\n\t// delete no-op.\n\tvoid operator delete(void*) {}\n\tvoid operator delete[](void*) {}\n\n\tDatabase(const Database&amp;);\t\t\t// no impl.\n\tconst Database&amp; operator =(const Database&amp;) { return *this; }\n};\n\n} // namespace Jrd\n\n#endif // JRD_DATABASE_H\n"}, "/build/src/jrd/nbak.h": {"id": "/build/src/jrd/nbak.h", "filePath": "src/jrd/nbak.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tnbak.h\n *\tDESCRIPTION:\tIncremental backup interface definitions\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s):\n *\n *  Roman Simakov &lt;roman-simakov@users.sourceforge.net&gt;\n *\n */\n\n#ifndef JRD_NBAK_H\n#define JRD_NBAK_H\n\n#include &quot;../common/classes/tree.h&quot;\n#include &quot;../common/classes/rwlock.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;GlobalRWLock.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/Attachment.h&quot;\n\n// Uncomment this line if you need to trace backup-related activity\n//#define NBAK_DEBUG\n\n#ifdef NBAK_DEBUG\nDEFINE_TRACE_ROUTINE(nbak_trace);\n#define NBAK_TRACE(args) nbak_trace args\n#define NBAK_TRACE_AST(message) gds__trace(message)\n#else\n#define NBAK_TRACE(args) /* nothing */\n#define NBAK_TRACE_AST(message) /* nothing */\n#endif\n\nnamespace Ods {\n\tstruct pag;\n}\n\nnamespace Jrd {\n\nclass Lock;\nclass Record;\nclass thread_db;\nclass Database;\nclass jrd_file;\n\nclass AllocItem\n{\npublic:\n\tULONG db_page; // Page number in the main database file\n\tULONG diff_page; // Page number in the difference file\n\n\tstatic const ULONG&amp; generate(const void* /*sender*/, const AllocItem&amp; item)\n\t{\n\t\treturn item.db_page;\n\t}\n\n\tAllocItem() {}\n\n\tAllocItem(ULONG db_pageL, ULONG diff_pageL)\n\t{\n\t\tthis-&gt;db_page = db_pageL;\n\t\tthis-&gt;diff_page = diff_pageL;\n\t}\n};\n\ntypedef Firebird::BePlusTree&lt;AllocItem, ULONG, AllocItem&gt; AllocItemTree;\n\n// Class to synchronize access to backup state\n\nclass NBackupStateLock: public GlobalRWLock\n{\npublic:\n\tNBackupStateLock(thread_db* tdbb, MemoryPool&amp; p, BackupManager* bakMan);\n\tvirtual ~NBackupStateLock() { }\n\nprotected:\n\tBackupManager *backup_manager;\n\tvirtual void blockingAstHandler(thread_db* tdbb);\n\tvirtual bool fetch(thread_db* tdbb);\n\tvirtual void invalidate(thread_db* tdbb);\n};\n\n// Class to synchronize access to diff page allocation table\nclass NBackupAllocLock: public GlobalRWLock\n{\npublic:\n\tNBackupAllocLock(thread_db* tdbb, MemoryPool&amp; p, BackupManager* bakMan);\n\tvirtual ~NBackupAllocLock() { }\n\nprotected:\n\tBackupManager* backup_manager;\n\tvirtual bool fetch(thread_db* tdbb);\n\n\tvirtual void invalidate(thread_db* tdbb);\n};\n\n/*\n *  The functional responsibilities of NBAK are:\n *  1. to redirect writes to difference files when asked (ALTER DATABASE BEGIN\n *  BACKUP statement)\n *  2. to produce a GUID for the database snapshot and write it into the database\n *  header before the ALTER DATABASE BEGIN BACKUP statement returns\n *  3. to merge differences into the database when asked (ALTER DATABASE END BACKUP\n *  statement)\n *  4. to mark pages written by the engine with the current SCN [System Change\n *  Number] counter value for the database\n *  5. to increment SCN on each change of backup state\n *\n *  The backup state cycle is:\n *  hdr_nbak_normal -&gt; hdr_nbak_stalled -&gt; hdr_nbak_merge -&gt; hdr_nbak_normal\n *  - In normal state writes go directly to the main database files.\n *  - In stalled state writes go to the difference file only and the main files are\n *  read-only.\n *  - In merge state new pages are not allocated from difference files. Writes go to\n *  the main database files. Reads of mapped pages compare both page versions and\n *  return the version which is fresher, because we don&#x27;t know if it is merged or not.\n *  Merged pages are written only in database file.\n *\n *  For synchronization NBAK uses 3 lock types via Firebird::GlobalRWLock:\n *  LCK_backup_database, LCK_backup_alloc, LCK_backup_end.\n *\n *  LCK_backup_database protects &quot;clean&quot; state of database. Database is meant to be\n *  clean when it has no dirty or fetched pages. When attachment needs to fake, to fetch or to mark a page as dirty\n *  (via CCH_mark) it needs to obtain READ (LCK_PR) lock of this kind. WRITE\n *  (LCK_EX) lock forces flush of all caches leaving no dirty pages to be written to\n *  database.\n *\n *  Modification process of a page is as follows:\n *  CCH_fetch -&gt; CCH_mark -&gt; CCH_release -&gt; write_page\n *\n *  The dirty page is owned by the DATABASE between setting up and clearing the page dirty flag until write_page happens.\n *\n *  The page lock is requested every time under LCK_backup_database to prevent any deadlocks. So fecthed page is\n *  owned by the ATTACHMENT between CCH_FETCH_LOCK, CCH_FAKE and CCH_RELEASE.\n *  AST on LCK_backup_database forces all dirty pages owned by DATABASE to be\n *  written to disk via write_page. Since finalizing processing of the pages owned\n *  by attachment may require taking new locks BDB_must_write is set for them to\n *  ensure that LCK_backup_database lock is released as soon as possible.\n *\n *  To change backup state, engine takes LCK_backup_database lock first, forcing all\n *  dirty pages to the disk, modifies the header page reflecting the state change,\n *  and releases the lock allowing transaction processing to continue.\n *\n *  LCK_backup_alloc is used to protect mapping table between difference file\n *  (.delta) and the database. To add new page to the mapping attachment needs to\n *  take WRITE lock of this kind. READ lock is necessary to read the table.\n *\n *  LCK_backup_end is used to ensure reliable execution of state transition from\n *  hdr_nbak_merge to hdr_nbak_normal (MERGE process). Taking of WRITE (LCK_EX)\n *  lock of this kind is needed to perform the MERGE. Every new attachment attempts\n *  to finalize incomplete merge if the database is in hdr_nbak_merge mode and\n *  this lock is not taken.\n */\n\n\nclass BackupManager\n{\nprivate:\n\tclass StateWriteGuard\n\t{\n\tpublic:\n\t\tStateWriteGuard(thread_db* tdbb, Jrd::WIN* window);\n\t\t~StateWriteGuard();\n\n\t\tvoid releaseHeader();\n\n\t\tvoid setSuccess()\n\t\t{\n\t\t\tm_success = true;\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tStateWriteGuard(const StateWriteGuard&amp;);\n\t\tStateWriteGuard&amp; operator=(const StateWriteGuard&amp;);\n\n\t\tthread_db* m_tdbb;\n\t\tJrd::WIN* m_window;\n\t\tbool m_success;\n\t};\n\npublic:\n\tclass StateReadGuard\n\t{\n\tpublic:\n\t\texplicit StateReadGuard(thread_db* tdbb) : m_tdbb(tdbb)\n\t\t{\n\t\t\ttry\n\t\t\t{\n\t\t\t\tlock(tdbb, LCK_WAIT);\n\t\t\t}\n\t\t\tcatch (const Firebird::Exception&amp;)\n\t\t\t{\n\t\t\t\tunlock(tdbb);\n\t\t\t\tthrow;\n\t\t\t}\n\t\t}\n\n\t\t~StateReadGuard()\n\t\t{\n\t\t\tunlock(m_tdbb);\n\t\t}\n\n\t\tstatic bool lock(thread_db* tdbb, SSHORT wait)\n\t\t{\n\t\t\tJrd::Attachment* const att = tdbb-&gt;getAttachment();\n\t\t\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\n\t\t\tconst bool ok = att ?\n\t\t\t\tatt-&gt;backupStateReadLock(tdbb, wait) :\n\t\t\t\tdbb-&gt;dbb_backup_manager-&gt;lockStateRead(tdbb, wait);\n\n\t\t\tif (!ok)\n\t\t\t\tERR_bugcheck_msg(&quot;Can&#x27;t lock state for read&quot;);\n\n\t\t\treturn ok;\n\t\t}\n\n\t\tstatic void unlock(thread_db* tdbb)\n\t\t{\n\t\t\tJrd::Attachment* const att = tdbb-&gt;getAttachment();\n\t\t\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\n\t\t\tif (att)\n\t\t\t\tatt-&gt;backupStateReadUnLock(tdbb);\n\t\t\telse\n\t\t\t\tdbb-&gt;dbb_backup_manager-&gt;unlockStateRead(tdbb);\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tStateReadGuard(const StateReadGuard&amp;);\n\t\tStateReadGuard&amp; operator=(const StateReadGuard&amp;);\n\n\t\tthread_db* m_tdbb;\n\t};\n\nprivate:\n\t// Set and clear &quot;master&quot; status for BackupManager instance\n\tclass MasterGuard\n\t{\n\tpublic:\n\t\tMasterGuard(BackupManager&amp; bm) :\n\t\t\tm_bm(bm)\n\t\t{\n\t\t\tm_bm.master = true;\n\t\t}\n\n\t\t~MasterGuard()\n\t\t{\n\t\t\tm_bm.master = false;\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tMasterGuard(const MasterGuard&amp;);\n\t\tMasterGuard&amp; operator=(const MasterGuard&amp;);\n\n\t\tBackupManager&amp; m_bm;\n\t};\n\n\ttemplate&lt;bool Exclusive&gt;\n\tclass LocalAllocGuard\n\t{\n\tpublic:\n\t\texplicit LocalAllocGuard(BackupManager* bm)\n\t\t\t: m_bm(bm)\n\t\t{\n\t\t\t//Database::Checkout cout(m_bm-&gt;database);\n\n\t\t\tif (Exclusive)\n\t\t\t\tm_bm-&gt;localAllocLock.beginWrite(&quot;BackupManager::LocalAllocGuard&quot;);\n\t\t\telse\n\t\t\t\tm_bm-&gt;localAllocLock.beginRead(&quot;BackupManager::LocalAllocGuard&quot;);\n\t\t}\n\n\t\t~LocalAllocGuard()\n\t\t{\n\t\t\trelease();\n\t\t}\n\n\t\tvoid release()\n\t\t{\n\t\t\tif (Exclusive)\n\t\t\t\tm_bm-&gt;localAllocLock.endWrite();\n\t\t\telse\n\t\t\t\tm_bm-&gt;localAllocLock.endRead();\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tLocalAllocGuard(const LocalAllocGuard&amp;);\n\t\tLocalAllocGuard&amp; operator=(const LocalAllocGuard&amp;);\n\n\t\tBackupManager* m_bm;\n\t};\n\n\ttypedef LocalAllocGuard&lt;true&gt; LocalAllocWriteGuard;\n\ttypedef LocalAllocGuard&lt;false&gt; LocalAllocReadGuard;\n\n\ttemplate&lt;bool Exclusive&gt;\n\tclass GlobalAllocGuard\n\t{\n\tpublic:\n\t\tGlobalAllocGuard(thread_db* aTdbb, BackupManager* aBackupManager)\n\t\t\t: tdbb(aTdbb), backupManager(aBackupManager)\n\t\t{\n\t\t\tif (Exclusive)\n\t\t\t\tbackupManager-&gt;lockAllocWrite(tdbb);\n\t\t\telse\n\t\t\t\tbackupManager-&gt;lockAllocRead(tdbb);\n\t\t}\n\n\t\t~GlobalAllocGuard()\n\t\t{\n\t\t\tif (Exclusive)\n\t\t\t\tbackupManager-&gt;unlockAllocWrite(tdbb);\n\t\t\telse\n\t\t\t\tbackupManager-&gt;unlockAllocRead(tdbb);\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tGlobalAllocGuard(const GlobalAllocGuard&amp;);\n\t\tGlobalAllocGuard&amp; operator=(const GlobalAllocGuard&amp;);\n\n\t\tthread_db* tdbb;\n\t\tBackupManager* backupManager;\n\t};\n\n\ttypedef GlobalAllocGuard&lt;true&gt; GlobalAllocWriteGuard;\n\ttypedef GlobalAllocGuard&lt;false&gt; GlobalAllocReadGuard;\n\npublic:\n\t// Set when db is creating. Default = false\n\tbool dbCreating;\n\n\tBackupManager(thread_db* tdbb, Database* _database, int ini_state);\n\t~BackupManager();\n\n\t// Set difference file name in header.\n\t// State must be locked and equal to hdr_nbak_normal to call this method\n\tvoid setDifference(thread_db* tdbb, const char* filename);\n\n\t// Return current backup state\n\tUCHAR getState() const\n\t{\n\t\treturn backup_state;\n\t}\n\n\tvoid setState(const UCHAR newState)\n\t{\n\t\tbackup_state = newState;\n\t}\n\n\t// Return current SCN for database\n\tULONG getCurrentSCN() const\n\t{\n\t\treturn current_scn;\n\t}\n\n\t// Initialize and open difference file for writing\n\tvoid beginBackup(thread_db* tdbb);\n\n\t// Merge difference file to main files (if needed) and unlink() difference\n\t// file then. If merge is already in progress method silently returns false and\n\t// does nothing (so it can be used for recovery on database startup).\n\tvoid endBackup(thread_db* tdbb, bool recover);\n\n\t// State Lock member functions\n\tbool lockStateWrite(thread_db* tdbb, SSHORT wait)\n\t{\n\t\tfb_assert(!(tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked));\n\t\ttdbb-&gt;tdbb_flags |= TDBB_backup_write_locked;\n\t\tif (stateLock-&gt;lockWrite(tdbb, wait))\n\t\t\treturn true;\n\n\t\ttdbb-&gt;tdbb_flags &amp;= ~TDBB_backup_write_locked;\n\t\treturn false;\n\t}\n\n\tvoid unlockStateWrite(thread_db* tdbb)\n\t{\n\t\tfb_assert(tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked);\n\t\ttdbb-&gt;tdbb_flags &amp;= ~TDBB_backup_write_locked;\n\t\tstateLock-&gt;unlockWrite(tdbb, backup_state == Ods::hdr_nbak_unknown);\n\t}\n\n\tbool lockStateRead(thread_db* tdbb, SSHORT wait)\n\t{\n\t\tif (tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked)\n\t\t\treturn true;\n\n\t\tlocalStateLock.beginRead(FB_FUNCTION);\n\t\tif (backup_state == Ods::hdr_nbak_unknown)\n\t\t{\n\t\t\tif (!stateLock-&gt;lockRead(tdbb, wait))\n\t\t\t{\n\t\t\t\tlocalStateLock.endRead();\n\t\t\t\treturn false;\n\t\t\t}\n\t\t\tstateLock-&gt;unlockRead(tdbb);\n\t\t}\n\t\treturn true;\n\t}\n\n\tvoid unlockStateRead(thread_db* tdbb)\n\t{\n\t\tif (tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked)\n\t\t\treturn;\n\n\t\tlocalStateLock.endRead();\n\n\t\tif (stateBlocking &amp;&amp; localStateLock.tryBeginWrite(FB_FUNCTION))\n\t\t{\n\t\t\tif (!stateLock-&gt;tryReleaseLock(tdbb))\n\t\t\t\tfb_assert(false);\n\n\t\t\tstateBlocking = false;\n\t\t\tlocalStateLock.endWrite();\n\t\t}\n\t}\n\n\tbool actualizeState(thread_db* tdbb);\n\tbool actualizeAlloc(thread_db* tdbb, bool haveGlobalLock);\n\tvoid initializeAlloc(thread_db* tdbb);\n\n\tvoid invalidateAlloc(thread_db* tdbb)\n\t{\n\t\tallocIsValid = false;\n\t}\n\n\t// Return page index in difference file that can be used in\n\t// writeDifference call later.\n\tULONG getPageIndex(thread_db* tdbb, ULONG db_page);\n\n\t// Return next page index in the difference file to be allocated\n\tULONG allocateDifferencePage(thread_db* tdbb, ULONG db_page);\n\n\t// Must have FbStatusVector because it is called from write_page\n\tvoid openDelta(thread_db* tdbb);\n\tvoid closeDelta(thread_db* tdbb);\n\tbool writeDifference(thread_db* tdbb, FbStatusVector* status, ULONG diff_page, Ods::pag* page);\n\tbool readDifference(thread_db* tdbb, ULONG diff_page, Ods::pag* page);\n\tvoid flushDifference(thread_db* tdbb);\n\tvoid setForcedWrites(const bool forceWrite);\n\n\tvoid shutdown(thread_db* tdbb);\n\n\tvoid beginFlush()\n\t{\n\t\tflushInProgress = true;\n\t}\n\n\tvoid endFlush()\n\t{\n\t\tflushInProgress = false;\n\t}\n\n\tbool databaseFlushInProgress() const\n\t{\n\t\treturn flushInProgress;\n\t}\n\n\tbool isMaster() const\n\t{\n\t\treturn master;\n\t}\n\n\tbool isShutDown() const\n\t{\n\t\treturn shutDown;\n\t}\n\n\t// Get size (in pages) of locked database file\n\tULONG getPageCount(thread_db* tdbb);\nprivate:\n\tfriend class NBackupStateLock;\n\n\tDatabase* database;\n\tjrd_file* diff_file;\n\tAllocItemTree* alloc_table; // Cached allocation table of pages in difference file\n\tUCHAR backup_state;\n\tULONG last_allocated_page; // Last physical page allocated in the difference file\n\tFirebird::Array&lt;UCHAR&gt; temp_buffers_space;\n\tULONG *alloc_buffer, *empty_buffer, *spare_buffer;\n\tULONG current_scn;\n\tFirebird::PathName diff_name;\n\tbool explicit_diff_name;\n\tbool flushInProgress;\n\tbool shutDown;\n\tbool allocIsValid;\t\t\t// true, if alloc table cache is completely read from disk\n\tbool master;\t\t\t\t// this instance performs current begin\\end backup process\n\tbool stateBlocking;\t\t\t// blocking AST handler doesn&#x27;t released stateLock\n\n\tNBackupStateLock* stateLock;\n\tFirebird::RWLock localStateLock;\t// must be acquired before global stateLock\n\t\t\t\t\t\t\t\t\t\t// Important: this lock must prefer readers to writers !\n\tNBackupAllocLock* allocLock;\n\tFirebird::RWLock localAllocLock;\t// must be acquired before global allocLock\n\n\tULONG findPageIndex(thread_db* tdbb, ULONG db_page);\n\tvoid generateFilename();\n\tbool extendDatabase(thread_db* tdbb);\n\n\tvoid lockAllocWrite(thread_db* tdbb)\n\t{\n\t\tif (!allocLock-&gt;lockWrite(tdbb, LCK_WAIT))\n\t\t\tERR_bugcheck_msg(&quot;Can&#x27;t lock alloc table for writing&quot;);\n\t}\n\n\tvoid unlockAllocWrite(thread_db* tdbb)\n\t{\n\t\tallocLock-&gt;unlockWrite(tdbb);\n\t}\n\n\tvoid lockAllocRead(thread_db* tdbb)\n\t{\n\t\tif (!allocLock-&gt;lockRead(tdbb, LCK_WAIT))\n\t\t\tERR_bugcheck_msg(&quot;Can&#x27;t lock alloc table for reading&quot;);\n\t}\n\n\tvoid unlockAllocRead(thread_db* tdbb)\n\t{\n\t\tallocLock-&gt;unlockRead(tdbb);\n\t}\n};\n\n\n} //namespace Jrd\n\n#endif /* JRD_NBAK_H */\n"}, "/build/src/jrd/tpc_proto.h": {"id": "/build/src/jrd/tpc_proto.h", "filePath": "src/jrd/tpc_proto.h", "content": "/*\n *\tPROGRAM:\tJRD Access method\n *\tMODULE:\t\ttpc_proto.h\n *\tDESCRIPTION:\tPrototype Header file for tpc.cpp\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#ifndef JRD_TPC_PROTO_H\n#define JRD_TPC_PROTO_H\n\n#include &lt;atomic&gt;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/SyncObject.h&quot;\n\nnamespace Ods {\n\nstruct tx_inv_page;\n\n}\n\nnamespace Jrd {\n\nclass Database;\nclass thread_db;\nclass TipCache;\nclass ActiveSnapshots;\n\n// Special values of CommitNumber reserved for uncommitted transaction states\ninline constexpr CommitNumber\n\tCN_PREHISTORIC = 1,\n\tCN_ACTIVE = 0,\n\tCN_LIMBO = static_cast&lt;CommitNumber&gt;(-1),\n\tCN_DEAD = static_cast&lt;CommitNumber&gt;(-2),\n\tCN_MAX_NUMBER = static_cast&lt;CommitNumber&gt;(-3); // Assume CommitNumber is unsigned integer\n\nclass TipCache\n{\npublic:\n\t// XXX: maybe use static factory method to create and initialize instance?\n\texplicit TipCache(Database* dbb);\n\t~TipCache();\n\n\tstatic TipCache* create(thread_db* tdbb)\n\t{\n\t\tconst auto dbb = tdbb-&gt;getDatabase();\n\t\tFirebird::AutoPtr&lt;TipCache&gt; tipCache(FB_NEW_POOL(*dbb-&gt;dbb_permanent) TipCache(dbb));\n\t\ttipCache-&gt;initializeTpc(tdbb);\n\t\treturn tipCache.release();\n\t}\n\n\t// Disconnect from shared memory objects\n\tvoid finalizeTpc(thread_db* tdbb);\n\n\t// Get the current state of a transaction in the cache\n\tCommitNumber cacheState(TraNumber number);\n\n\t// Return the oldest transaction in the given state.\n\t// Lookup in the [min_number, max_number) bounds.\n\t// If not found, return zero.\n\tTraNumber findStates(TraNumber minNumber, TraNumber maxNumber, ULONG mask, int&amp; state);\n\n\t// Set state for a transaction in cache. If new state is tra_committed and\n\t// commit# is not assigned yet, then assign it now.\n\t// Return new state for a transaction in cache.\n\t//\n\t// tra_active is the initial set of a transaction and it cannot be assigned.\n\t//\n\t// Valid assignments are:\n\t//   - tra_active -&gt; tra_committed\n\t//   - tra_active -&gt; tra_limbo\n\t//   - tra_active -&gt; tra_dead\n\t//   - tra_limbo -&gt; tra_committed\n\t//   - tra_limbo -&gt; tra_dead\n\t// All other combinations are expressly forbidden with BUGCHECK error.\n\tCommitNumber setState(TraNumber number, int state);\n\n\t// Compute most current state of a transaction. This is called when we encountered\n\t// a record produced by this transaction and need to know what to do with this record.\n\t// This function needs to be very fast as it will be called quite frequently.\n\t// Since we shall be using snapshots for read committed, concurrency and consistency\n\t// modes, calling this function is not necessary there. Only system transaction, GC and\n\t// sweep threads are expected to use it. For all other cases cacheState is sufficient.\n\t//\n\t// The function shall perform as follows:\n\t// 1) read return transaction state (and commit#) from shared memory cache. If\n\t//   transaction is known committed (with commit#) or dead - just return the state.\n\t// 2) If transaction is active, or in limbo, query its data using lock manager.\n\t//   If we get non-zero return - we assume transaction is still active and our cached\n\t//   state is valid.\n\t// 3) If our query returned zero and transaction state is still unassigned after that\n\t//   it means that process handling the transaction has terminated abnormally\n\t//   (as normal protocol is to release the lock only after we notified global cache\n\t//   of commit). In this case re-fetch transaction state from disk and update cache.\n\t//   If transaction has been found committed on disk then assign new commit# to it.\n\t//   If transaction is marked active on disk, mark it dead.\n\tCommitNumber snapshotState(thread_db* tdbb, TraNumber number);\n\n\t// If engine has recalculated Oldest (interesting) transaction or Oldest Snapshot\n\t// number for the database (via Sweep or during regular transaction start) it\n\t// needs to notify TPC, so that it can release cache resources. Any transaction\n\t// with number less than oldest interesting transaction and oldest snapshot\n\t// is treated as &quot;prehistoric&quot; committed (CN_PREHISTORIC)\n\tvoid updateOldestTransaction(thread_db* tdbb, TraNumber oldest, TraNumber oldestSnapshot);\n\n\t// Create snapshot. The snapshot shall use only versions committed\n\t// before commitNumber (the latest CN when it&#x27;s 0). Snapshots inhibit GC to some extent.\n\t// When snapshot is no longer needed you call endSnapshot.\n\tSnapshotHandle beginSnapshot(thread_db* tdbb, AttNumber attachmentId, CommitNumber&amp; commitNumber);\n\n\t// Deallocate snapshot.\n\tvoid endSnapshot(thread_db* tdbb, SnapshotHandle handle, AttNumber attachmentId);\n\n\t// Get the list of active snapshots for GC purposes. This function can be\n\t// called multiple times with the same object to obtain most recent information.\n\t// During initialization it checks that all attachments holding snapshots are\n\t// actually alive (via lock manager) to prevent GC inhibition in case of sudden\n\t// death of attachment process. Update is quick and happens only if needed and\n\t// there is no contention.\n\tvoid updateActiveSnapshots(thread_db* tdbb, ActiveSnapshots* activeSnapshots);\n\n\t// Transactions, attachments, statements ID management.\n\tTraNumber generateTransactionId();\n\tAttNumber generateAttachmentId();\n\tStmtNumber generateStatementId();\n\t//void assignLatestTransactionId(TraNumber number);\n\tvoid assignLatestAttachmentId(AttNumber number);\n\tAttNumber getLatestAttachmentId() const;\n\tStmtNumber getLatestStatementId() const;\n\n\tCommitNumber getGlobalCommitNumber() const\n\t{\n\t\treturn m_tpcHeader-&gt;getHeader()-&gt;latest_commit_number.load(std::memory_order_acquire);\n\t}\n\n\tULONG getMonitorGeneration() const\n\t{\n\t\treturn m_tpcHeader-&gt;getHeader()-&gt;monitor_generation.load(std::memory_order_acquire);\n\t}\n\n\tULONG newMonitorGeneration() const\n\t{\n\t\treturn m_tpcHeader-&gt;getHeader()-&gt;monitor_generation++ + 1;\n\t}\n\nprivate:\n\tclass GlobalTpcHeader : public Firebird::MemoryHeader\n\t{\n\tpublic:\n\t\tstd::atomic&lt;CommitNumber&gt; latest_commit_number;\n\n\t\t// We do not need hardware barriers when working with this variable, because\n\t\t// TPC is essentially log-structured and we have extra large safety margin\n\t\t// during shared memory clean-up operations to cover expected fuzziness.\n\t\t// The assumption of the code is that it is not possible to process full\n\t\t// memory block worth of transactions during the period of cache decoherence\n\t\t// of any one CPU accessing this variable\n\t\tstd::atomic&lt;TraNumber&gt; oldest_transaction;\n\n\t\t// Incremented each time whenever snapshot is released\n\t\tstd::atomic&lt;ULONG&gt; snapshot_release_count;\n\n\t\t// Shared counters\n\t\tstd::atomic&lt;TraNumber&gt; latest_transaction_id;\n\t\tstd::atomic&lt;AttNumber&gt; latest_attachment_id;\n\t\tstd::atomic&lt;StmtNumber&gt; latest_statement_id;\n\n\t\t// Monitor state generation\n\t\tstd::atomic&lt;ULONG&gt; monitor_generation;\n\n\t\t// Size of memory chunk with TransactionStatusBlock\n\t\tULONG tpc_block_size; // final\n\t};\n\n\tstruct SnapshotData\n\t{\n\t\tstd::atomic&lt;AttNumber&gt; attachment_id; // Unused slots have attachment_id == 0\n\t\tstd::atomic&lt;CommitNumber&gt; snapshot;\n\t};\n\n\t// Note: when maintaining this structure, we are extra careful\n\t// to keep it consistent at all times, so that the process using it\n\t// can be killed at any time without adverse consequences.\n\tclass SnapshotList : public Firebird::MemoryHeader\n\t{\n\tpublic:\n\t\tstd::atomic&lt;ULONG&gt; slots_allocated;\n\t\tstd::atomic&lt;ULONG&gt; slots_used;\n\t\tULONG min_free_slot; // Position where to start looking for free space\n\t\tSnapshotData slots[1];\n\t};\n\n\tclass TransactionStatusBlock : public Firebird::MemoryHeader\n\t{\n\tpublic:\n\t\tstd::atomic&lt;CommitNumber&gt; data[1];\n\t};\n\n\ttypedef TransactionStatusBlock* PTransactionStatusBlock;\n\n\t// Block number storage should match TraNumber to avoid unexpected overflows\n\ttypedef FB_UINT64 TpcBlockNumber;\n\n\tclass StatusBlockData\n\t{\n\tpublic:\n\t\tStatusBlockData(Jrd::thread_db* tdbb, Jrd::TipCache* tipCache, ULONG blockSize, TpcBlockNumber blkNumber);\n\t\t~StatusBlockData();\n\n\t\tTpcBlockNumber blockNumber;\n\t\tFirebird::SharedMemory&lt;TransactionStatusBlock&gt;* memory;\n\t\tLock existenceLock;\n\t\tTipCache* cache;\n\t\tbool acceptAst;\n\n\t\tinline static TpcBlockNumber&amp; generate(const void* /*sender*/, StatusBlockData* item) noexcept\n\t\t{\n\t\t\treturn item-&gt;blockNumber;\n\t\t}\n\n\t\tvoid clear(thread_db* tdbb);\n\n\t\tstatic Firebird::PathName makeSharedMemoryFileName(Database* dbb, TpcBlockNumber n, bool fullPath);\n\t};\n\n\tclass MemoryInitializer : public Firebird::IpcObject\n\t{\n\tpublic:\n\t\texplicit MemoryInitializer(TipCache *cache) noexcept : m_cache(cache) {}\n\t\tvoid mutexBug(int osErrorCode, const char* text) override;\n\t\tUSHORT getVersion() const override { return TPC_VERSION; }\n\tprotected:\n\t\tTipCache* m_cache;\n\t};\n\n\tclass GlobalTpcInitializer final : public MemoryInitializer\n\t{\n\tpublic:\n\t\texplicit GlobalTpcInitializer(TipCache *cache) noexcept : MemoryInitializer(cache) {}\n\t\tbool initialize(Firebird::SharedMemoryBase* sm, bool initFlag) override;\n\n\t\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TPC_HEADER; }\n\t\tconst char* getName() const override { return &quot;TipCache:Global&quot;; }\n\t};\n\n\tclass SnapshotsInitializer final : public MemoryInitializer\n\t{\n\tpublic:\n\t\texplicit SnapshotsInitializer(TipCache *cache) noexcept : MemoryInitializer(cache) {}\n\t\tbool initialize(Firebird::SharedMemoryBase* sm, bool initFlag) override;\n\n\t\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TPC_SNAPSHOTS; }\n\t\tconst char* getName() const override { return &quot;TipCache:Snapshots&quot;; }\n\t};\n\n\tclass MemBlockInitializer final : public MemoryInitializer\n\t{\n\tpublic:\n\t\texplicit MemBlockInitializer(TipCache *cache) noexcept : MemoryInitializer(cache) {}\n\t\tbool initialize(Firebird::SharedMemoryBase* sm, bool initFlag) override;\n\n\t\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TPC_BLOCK; }\n\t\tconst char* getName() const override { return &quot;TipCache:TranBlock&quot;; }\n\t};\n\n\ttypedef Firebird::BePlusTree&lt;StatusBlockData*, TpcBlockNumber, StatusBlockData&gt; BlocksMemoryMap;\n\n\tstatic constexpr ULONG TPC_VERSION = 2;\n\tstatic constexpr int SAFETY_GAP_BLOCKS = 1;\n\n\tFirebird::SharedMemory&lt;GlobalTpcHeader&gt;* m_tpcHeader; // final\n\tFirebird::SharedMemory&lt;SnapshotList&gt;* m_snapshots; // final\n\tULONG m_transactionsPerBlock; // final. When set, we assume TPC has been initialized.\n\n\tFirebird::AutoPtr&lt;Lock&gt; m_lock;\n\n\tGlobalTpcInitializer globalTpcInitializer;\n\tSnapshotsInitializer snapshotsInitializer;\n\tMemBlockInitializer memBlockInitializer;\n\n\t// Tree with TIP cache memory blocks\n\t// Reads and writes to the tree are protected with m_sync_status.\n\tBlocksMemoryMap m_blocks_memory;\n\n\tFirebird::SyncObject m_sync_status;\n\n\t// Attach to shared memory objects and populate process-local structures.\n\t// If shared memory area did not exist - populate initial TIP by reading cache\n\t// from disk.\n\t// This function has no in-process synchronization, assuming caller prevents\n\t// concurrent use of object being initialized.\n\tvoid initializeTpc(thread_db *tdbb);\n\n\tvoid initTransactionsPerBlock(ULONG blockSize) noexcept;\n\n\t// Returns block holding transaction state.\n\t// Returns NULL if requested block is too old and is no longer cached.\n\t// Sync should be bound to m_sync_status. On enter, sync must be unlocked.\n\t// If returns not NULL then sync remains locked.\n\tTransactionStatusBlock* getTransactionStatusBlock(const GlobalTpcHeader* header, TpcBlockNumber blockNumber, Firebird::Sync&amp; sync);\n\n\t// Map shared memory for a block.\n\t// Assume exclusive lock of m_sync_status.\n\tTransactionStatusBlock* createTransactionStatusBlock(ULONG blockSize, TpcBlockNumber blockNumber);\n\n\t// Release shared memory blocks, if possible.\n\t// We utilize one full MemoryBlock as a safety margin to account for possible\n\t// race conditions during lockless operations, so this operation shall be pretty safe.\n\tvoid releaseSharedMemory(thread_db *tdbb, TraNumber oldest_old, TraNumber oldest_new);\n\n\t// Populate TIP cache from disk\n\tvoid loadInventoryPages(thread_db *tdbb, GlobalTpcHeader* header);\n\t// Init mapping for existing TIP blocks\n\tvoid mapInventoryPages(const GlobalTpcHeader* header);\n\n\tstatic int tpc_block_blocking_ast(void* arg);\n\n\tSnapshotHandle allocateSnapshotSlot();\n\tvoid deallocateSnapshotSlot(SnapshotHandle slotNumber);\n\tvoid remapSnapshots(bool sync);\n};\n\n\ninline int TPC_cache_state(thread_db* tdbb, TraNumber number)\n{\n\tconst CommitNumber stateCn = tdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;cacheState(number);\n\tswitch (stateCn)\n\t{\n\tcase CN_ACTIVE:\treturn tra_active;\n\tcase CN_LIMBO:\treturn tra_limbo;\n\tcase CN_DEAD:\treturn tra_dead;\n\tdefault:\t\treturn tra_committed;\n\t}\n}\n\ninline TraNumber TPC_find_states(thread_db* tdbb, TraNumber minNumber, TraNumber maxNumber,\n\tULONG mask, int&amp; state)\n{\n\treturn tdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;findStates(minNumber, maxNumber, mask, state);\n}\n\ninline void TPC_set_state(thread_db* tdbb, TraNumber number, int state)\n{\n\ttdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;setState(number, state);\n}\n\nint TPC_snapshot_state(thread_db* tdbb, TraNumber number);\n\n} // namespace Jrd\n\n#endif // JRD_TPC_PROTO_H\n"}, "/build/src/jrd/tra.h": {"id": "/build/src/jrd/tra.h", "filePath": "src/jrd/tra.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\ttra.h\n *\tDESCRIPTION:\tTransaction block definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n * 2001.6.25 Claudio Valderrama: add dfw_delete_generator and dfw_delete_udf\n *           to the dfw_t enumeration.\n * 2002.10.29 Nickolay Samofatov: Added support for savepoints\n */\n\n#ifndef JRD_TRA_H\n#define JRD_TRA_H\n\n/*\n * TMN: Fix this header! It should include any header it needs\n * to define the types this header uses.\n */\n\n#include &quot;../include/fb_blk.h&quot;\n#include &quot;../common/classes/tree.h&quot;\n#include &quot;../common/classes/GenericMap.h&quot;\n#include &quot;../jrd/exe.h&quot;\n#include &quot;../jrd/rpb_chain.h&quot;\n#include &quot;../jrd/blb.h&quot; // For bid structure\n#include &quot;../jrd/sbm.h&quot; // For bid structure\n#include &quot;../jrd/sort.h&quot;\n\n#include &quot;../jrd/Monitoring.h&quot;\n#include &quot;../jrd/TempSpace.h&quot;\n#include &quot;../jrd/obj.h&quot;\n#include &quot;../jrd/EngineInterface.h&quot;\n#include &quot;../jrd/Savepoint.h&quot;\n\nnamespace EDS {\nclass Transaction;\n}\n\nnamespace Jrd {\n\nclass blb;\nclass Lock;\nclass jrd_rel;\ntemplate &lt;typename T&gt; class vec;\nclass Record;\nclass ArrayField;\nclass Attachment;\nclass DeferredWork;\nclass DeferredJob;\nclass TimeZoneSnapshot;\nclass UserManagement;\nclass MappingList;\nclass DbCreatorsList;\nclass thread_db;\n\nclass SecDbContext\n{\npublic:\n\tSecDbContext(Firebird::IAttachment* a, Firebird::ITransaction* t);\n\t~SecDbContext();\n\n\tFirebird::IAttachment* att;\n\tFirebird::ITransaction* tra;\n\tint savePoint;\n};\n\n// Blobs active in transaction identified by bli_temp_id. Please keep this\n// structure small as there can be huge amount of them floating in memory.\nstruct BlobIndex\n{\n\tULONG bli_temp_id;\n\tbool bli_materialized = false;\n\tRequest* bli_request = nullptr;\n\tunion\n\t{\n\t\tbid bli_blob_id;\t\t// ID of materialized blob\n\t\tblb* bli_blob_object;\t// Blob object\n\t};\n    static const ULONG&amp; generate(const void* /*sender*/, const BlobIndex&amp; item) noexcept\n\t{\n\t\treturn item.bli_temp_id;\n    }\n\t// Empty default constructor to make it behave like POD structure\n\tBlobIndex() noexcept : bli_temp_id(0), bli_blob_object(nullptr) {}\n\tBlobIndex(ULONG temp_id, blb* blob_object) noexcept :\n\t\tbli_temp_id(temp_id), bli_blob_object(blob_object)\n\t{ }\n};\n\ntypedef Firebird::BePlusTree&lt;BlobIndex, ULONG, BlobIndex&gt; BlobIndexTree;\ntypedef Firebird::BePlusTree&lt;bid, bid&gt; FetchedBlobIdTree;\n\n// Transaction block\n\nstruct CallerName\n{\n\tCallerName(int aType, const QualifiedName&amp; aName, const Firebird::MetaString&amp; aUserName)\n\t\t: type(aType),\n\t\t  name(aName),\n\t\t  userName(aUserName)\n\t{\n\t}\n\n\tCallerName()\n\t\t: type(obj_type_MAX)\n\t{\n\t}\n\n\tCallerName(const CallerName&amp; o)\n\t\t: type(o.type),\n\t\t  name(o.name),\n\t\t  userName(o.userName)\n\t{\n\t}\n\n\tvoid operator =(const CallerName&amp; o)\n\t{\n\t\tif (&amp;o != this)\n\t\t{\n\t\t\ttype = o.type;\n\t\t\tname = o.name;\n\t\t\tuserName = o.userName;\n\t\t}\n\t}\n\n\tint type;\n\tQualifiedName name;\n\tFirebird::MetaString userName;\n};\n\ntypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;SINT64, ULONG&gt; &gt; &gt; ReplBlobMap;\ntypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;SLONG, blb*&gt; &gt; &gt; BlobUtilMap;\n\ninline constexpr int DEFAULT_LOCK_TIMEOUT = -1; // infinite\ninline constexpr const char* TRA_BLOB_SPACE = &quot;fb_blob_&quot;;\ninline constexpr const char* TRA_UNDO_SPACE = &quot;fb_undo_&quot;;\ninline constexpr ULONG MAX_TEMP_BLOBS = 1000;\n\nclass jrd_tra : public pool_alloc&lt;type_tra&gt;\n{\n\ttypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;USHORT, SINT64&gt; &gt; &gt; GenIdCache;\n\n\tstatic const size_t MAX_UNDO_RECORDS = 2;\n\ttypedef Firebird::HalfStaticArray&lt;Record*, MAX_UNDO_RECORDS&gt; UndoRecordList;\n\npublic:\n\tenum wait_t {\n\t\ttra_no_wait,\n\t\ttra_probe,\n\t\ttra_wait\n\t};\n\n\tjrd_tra(MemoryPool* p, Firebird::MemoryStats* parent_stats,\n\t\t\tAttachment* attachment, jrd_tra* outer)\n\t:\ttra_attachment(attachment),\n\t\ttra_pool(p),\n\t\ttra_memory_stats(parent_stats),\n\t\ttra_blobs_tree(*p),\n\t\ttra_blobs(outer ? outer-&gt;tra_blobs : &amp;tra_blobs_tree),\n\t\ttra_fetched_blobs(*p),\n\t\ttra_repl_blobs(*p),\n\t\ttra_blob_util_map(*p),\n\t\ttra_arrays(NULL),\n\t\ttra_deferred_job(NULL),\n\t\ttra_resources(*p),\n\t\ttra_context_vars(*p),\n\t\ttra_lock_timeout(DEFAULT_LOCK_TIMEOUT),\n\t\ttra_timestamp(Firebird::TimeZoneUtil::getCurrentSystemTimeStamp()),\n\t\ttra_stats(*p),\n\t\ttra_open_cursors(*p),\n\t\ttra_outer(outer),\n\t\ttra_snapshot_handle(0),\n\t\ttra_snapshot_number(0),\n\t\ttra_sorts(*p, attachment-&gt;att_database),\n\t\ttra_gen_ids(NULL),\n\t\ttra_replicator(NULL),\n\t\ttra_interface(NULL),\n\t\ttra_blob_space(NULL),\n\t\ttra_undo_space(NULL),\n\t\ttra_undo_records(*p),\n\t\ttra_timezone_snapshot(NULL),\n\t\ttra_user_management(NULL),\n\t\ttra_sec_db_context(NULL),\n\t\ttra_mapping_list(NULL),\n\t\ttra_dbcreators_list(nullptr),\n\t\ttra_autonomous_pool(NULL),\n\t\ttra_autonomous_cnt(0)\n\t{\n\t}\n\n\t~jrd_tra();\n\n\tstatic jrd_tra* create(MemoryPool* pool, Attachment* attachment, jrd_tra* outer)\n\t{\n\t\tjrd_tra* const transaction =\n\t\t\tFB_NEW_POOL(*pool) jrd_tra(pool, &amp;attachment-&gt;att_memory_stats, attachment, outer);\n\n\t\tif (!outer)\n\t\t{\n\t\t\tpool-&gt;setStatsGroup(transaction-&gt;tra_memory_stats);\n\t\t}\n\n\t\treturn transaction;\n\t}\n\n\tstatic void destroy(Attachment* const attachment, jrd_tra* const transaction)\n\t{\n\t\tif (transaction)\n\t\t{\n\t\t\tif (!attachment)\n\t\t\t\tdelete transaction;\n\t\t\telse if (transaction-&gt;tra_outer)\n\t\t\t{\n\t\t\t\tjrd_tra* outer = transaction-&gt;tra_outer;\n\t\t\t\tMemoryPool* const pool = transaction-&gt;tra_pool;\n\t\t\t\tdelete transaction;\n\t\t\t\touter-&gt;releaseAutonomousPool(pool);\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tMemoryPool* const pool = transaction-&gt;tra_pool;\n\t\t\t\tFirebird::MemoryStats temp_stats;\n\t\t\t\tpool-&gt;setStatsGroup(temp_stats);\n\t\t\t\tdelete transaction;\n\t\t\t\tattachment-&gt;deletePool(pool);\n\t\t\t}\n\t\t}\n\t}\n\n\tAttachment* getAttachment() noexcept\n\t{\n\t\treturn tra_attachment;\n\t}\n\n\tdsql_dbb* getDsqlAttachment() noexcept\n\t{\n\t\treturn tra_attachment-&gt;att_dsql_instance;\n\t}\n\n\tJTransaction* getInterface(bool create);\n\tvoid setInterface(JTransaction* jt);\n\n\tFB_API_HANDLE tra_public_handle;\t// Public handle\n\tAttachment* tra_attachment;\t\t\t// database attachment\n\tTraNumber tra_number;\t\t\t\t// transaction number\n\tTraNumber tra_top;\t\t\t\t\t// highest transaction in snapshot\n\tTraNumber tra_oldest;\t\t\t\t// oldest interesting transaction\n\tTraNumber tra_oldest_active;\t\t// record versions older than this can be\n\t\t\t\t\t\t\t\t\t\t// gargage-collected by this tx\n\tTraNumber tra_att_oldest_active;\t// oldest active transaction in the same attachment\n\tTraNumber tra_initial_number;\t\t// initial transaction number, not changed by retain context\n\tjrd_tra* tra_next;\t\t\t\t\t// next transaction in attachment\n\tMemoryPool* const tra_pool;\t\t\t// pool for transaction\n\tFirebird::MemoryStats\ttra_memory_stats;\n\tBlobIndexTree tra_blobs_tree;\t\t// list of active blobs\n\tBlobIndexTree* tra_blobs;\t\t\t// pointer to actual list of active blobs\n\tFetchedBlobIdTree tra_fetched_blobs;\t// list of fetched blobs\n\tReplBlobMap tra_repl_blobs;\t\t\t// map of blob IDs replicated in this transaction\n\tBlobUtilMap tra_blob_util_map;\t\t// map of blob IDs for RDB$BLOB_UTIL package\n\tArrayField*\ttra_arrays;\t\t\t\t// Linked list of active arrays\n\tLock*\t\ttra_lock;\t\t\t\t// lock for transaction\n\tLock*\t\ttra_alter_db_lock;\t\t// lock for ALTER DATABASE statement(s)\n\tvec&lt;Lock*&gt;*\t\t\ttra_relation_locks;\t// locks for relations\n\tTransactionBitmap*\ttra_commit_sub_trans;\t// committed sub-transactions\n\tSavepoint*\ttra_save_point;\t\t\t// list of savepoints\n\tSavepoint*\ttra_save_free;\t\t\t// free savepoints\n\tSavNumber tra_save_point_number;\t// next save point number to use\n\tULONG tra_flags;\n\tDeferredJob*\ttra_deferred_job;\t// work deferred to commit time\n\tResourceList tra_resources;\t\t\t// resource existence list\n\tFirebird::StringMap tra_context_vars; // Context variables for the transaction\n\ttraRpbList* tra_rpblist;\t\t\t// active record_param&#x27;s of given transaction\n\tUCHAR tra_use_count;\t\t\t\t// use count for safe AST delivery\n\tUCHAR tra_callback_count;\t\t\t// callback count for &#x27;execute statement&#x27;\n\tSSHORT tra_lock_timeout;\t\t\t// in seconds, -1 means infinite, 0 means NOWAIT\n\tULONG tra_next_blob_id;     \t\t// ID of the previous blob or array created in this transaction\n\tULONG tra_temp_blobs_count;\t\t\t// Number of active temporary blobs\n\tconst ISC_TIMESTAMP_TZ tra_timestamp;\t// transaction start time\n\tRequest* tra_requests;\t\t\t\t// Doubly linked list of requests active in this transaction\n\tMonitoringSnapshot* tra_mon_snapshot;\t// Database state snapshot (for monitoring purposes)\n\tRuntimeStatistics tra_stats;\n\tFirebird::Array&lt;DsqlCursor*&gt; tra_open_cursors;\n\tbool tra_in_use;\t\t\t\t\t// transaction in use (can&#x27;t be committed or rolled back)\n\tjrd_tra* const tra_outer;\t\t\t// outer transaction of an autonomous transaction\n\tCallerName tra_caller_name;\t\t\t// caller object name\n\tSnapshotHandle tra_snapshot_handle;\n\tCommitNumber tra_snapshot_number;\n\tSortOwner tra_sorts;\n\tSLONG tra_blob_util_next = 1;\n\n\tEDS::Transaction *tra_ext_common;\n\t//Transaction *tra_ext_two_phase;\n\tGenIdCache* tra_gen_ids;\n\tFirebird::IReplicatedTransaction* tra_replicator;\n\nprivate:\n\tJTransaction* tra_interface;\n\tTempSpace* tra_blob_space;\t// temp blob storage\n\tTempSpace* tra_undo_space;\t// undo log storage\n\n\tUndoRecordList tra_undo_records;\t// temporary records used for the undo purposes\n\tTimeZoneSnapshot* tra_timezone_snapshot;\n\tUserManagement* tra_user_management;\n\tSecDbContext* tra_sec_db_context;\n\tMappingList* tra_mapping_list;\n\tDbCreatorsList* tra_dbcreators_list;\n\tMemoryPool* tra_autonomous_pool;\n\tUSHORT tra_autonomous_cnt;\n\tstatic const USHORT TRA_AUTONOMOUS_PER_POOL = 64;\n\npublic:\n\tMemoryPool* getAutonomousPool();\n\tvoid releaseAutonomousPool(MemoryPool* toRelease);\n\tjrd_tra* getOuter();\n\n\tSSHORT getLockWait() const noexcept\n\t{\n\t\treturn -tra_lock_timeout;\n\t}\n\n\tTempSpace* getBlobSpace()\n\t{\n\t\tif (tra_outer)\n\t\t\treturn tra_outer-&gt;getBlobSpace();\n\n\t\tif (!tra_blob_space)\n\t\t{\n\t\t\tfb_assert(!tra_outer);\n\t\t\ttra_blob_space = FB_NEW_POOL(*tra_pool) TempSpace(*tra_pool, TRA_BLOB_SPACE);\n\t\t}\n\n\t\treturn tra_blob_space;\n\t}\n\n\tTempSpace* getUndoSpace()\n\t{\n\t\tif (!tra_undo_space)\n\t\t{\n\t\t\ttra_undo_space = FB_NEW_POOL(*tra_pool) TempSpace(*tra_pool, TRA_UNDO_SPACE);\n\t\t}\n\n\t\treturn tra_undo_space;\n\t}\n\n\tRecord* getUndoRecord(const Format* format)\n\t{\n\t\tfor (Record** iter = tra_undo_records.begin(); iter != tra_undo_records.end(); ++iter)\n\t\t{\n\t\t\tRecord* const record = *iter;\n\t\t\tfb_assert(record);\n\n\t\t\tif (!record-&gt;isTempActive())\n\t\t\t{\n\t\t\t\t// initialize record for reuse\n\t\t\t\trecord-&gt;reset(format);\n\t\t\t\trecord-&gt;setTempActive();\n\t\t\t\treturn record;\n\t\t\t}\n\t\t}\n\n\t\tRecord* const record = FB_NEW_POOL(*tra_pool) Record(*tra_pool, format, true);\n\t\ttra_undo_records.add(record);\n\n\t\treturn record;\n\t}\n\n\tvoid unlinkFromAttachment();\n\tvoid linkToAttachment(Attachment* attachment);\n\tstatic void tra_abort(const char* reason);\n\n\tTimeZoneSnapshot* getTimeZoneSnapshot(thread_db* tdbb);\n\tUserManagement* getUserManagement();\n\tSecDbContext* getSecDbContext();\n\tSecDbContext* setSecDbContext(Firebird::IAttachment* att, Firebird::ITransaction* tra);\n\tvoid eraseSecDbContext();\n\tMappingList* getMappingList();\n\tRecord* findNextUndo(VerbAction* before_this, jrd_rel* relation, SINT64 number);\n\tvoid listStayingUndo(jrd_rel* relation, SINT64 number, RecordStack &amp;staying);\n\tSavepoint* startSavepoint(bool root = false);\n\tvoid rollbackSavepoint(thread_db* tdbb, bool preserveLocks = false);\n\tvoid rollbackToSavepoint(thread_db* tdbb, SavNumber number);\n\tvoid releaseSavepoint(thread_db* tdbb);\n\tDbCreatorsList* getDbCreatorsList();\n\tvoid checkBlob(thread_db* tdbb, const bid* blob_id, jrd_fld* fld, bool punt);\n\n\tGenIdCache* getGenIdCache()\n\t{\n\t\tif (!tra_gen_ids)\n\t\t\ttra_gen_ids = FB_NEW_POOL(*tra_pool) GenIdCache(*tra_pool);\n\n\t\treturn tra_gen_ids;\n\t}\n};\n\n// System transaction is always transaction 0.\ninline constexpr TraNumber TRA_system_transaction = 0;\n\n// Flag definitions for tra_flags.\n\ninline constexpr ULONG TRA_system\t\t\t\t= 0x1L;\t\t\t// system transaction\ninline constexpr ULONG TRA_prepared\t\t\t\t= 0x2L;\t\t\t// transaction is in limbo\ninline constexpr ULONG TRA_reconnected\t\t\t= 0x4L;\t\t\t// reconnect in progress\ninline constexpr ULONG TRA_degree3\t\t\t\t= 0x8L;\t\t\t// serializeable transaction\ninline constexpr ULONG TRA_write\t\t\t\t= 0x10L;\t\t// transaction has written\ninline constexpr ULONG TRA_readonly\t\t\t\t= 0x20L;\t\t// transaction is readonly\ninline constexpr ULONG TRA_prepare2\t\t\t\t= 0x40L;\t\t// transaction has updated RDB$TRANSACTIONS\ninline constexpr ULONG TRA_ignore_limbo\t\t\t= 0x80L;\t\t// ignore transactions in limbo\ninline constexpr ULONG TRA_invalidated \t\t\t= 0x100L;\t\t// transaction invalidated by failed write\ninline constexpr ULONG TRA_deferred_meta \t\t= 0x200L;\t\t// deferred meta work posted\ninline constexpr ULONG TRA_read_committed\t\t= 0x400L;\t\t// can see latest committed records\ninline constexpr ULONG TRA_autocommit\t\t\t= 0x800L;\t\t// autocommits all updates\ninline constexpr ULONG TRA_perform_autocommit\t= 0x1000L;\t\t// indicates autocommit is necessary\ninline constexpr ULONG TRA_rec_version\t\t\t= 0x2000L;\t\t// don&#x27;t wait for uncommitted versions\ninline constexpr ULONG TRA_restart_requests\t\t= 0x4000L;\t\t// restart all requests in attachment\ninline constexpr ULONG TRA_no_auto_undo\t\t\t= 0x8000L;\t\t// don&#x27;t start a savepoint in TRA_start\ninline constexpr ULONG TRA_precommitted\t\t\t= 0x10000L;\t\t// transaction committed at startup\ninline constexpr ULONG TRA_own_interface\t\t= 0x20000L;\t\t// tra_interface was created for internal needs\ninline constexpr ULONG TRA_read_consistency\t\t= 0x40000L; \t// ensure read consistency in this transaction\ninline constexpr ULONG TRA_ex_restart\t\t\t= 0x80000L; \t// Exception was raised to restart request\ninline constexpr ULONG TRA_replicating\t\t\t= 0x100000L;\t// transaction is allowed to be replicated\ninline constexpr ULONG TRA_no_blob_check\t\t= 0x200000L;\t// disable blob access checking\ninline constexpr ULONG TRA_auto_release_temp_blobid = 0x400000L;// remove temp ids of materialized user blobs from tra_blobs\n\n// flags derived from TPB, see also transaction_options() at tra.cpp\ninline constexpr ULONG TRA_OPTIONS_MASK = (TRA_degree3 | TRA_readonly | TRA_ignore_limbo | TRA_read_committed |\n\tTRA_autocommit | TRA_rec_version | TRA_read_consistency | TRA_no_auto_undo | TRA_restart_requests | TRA_auto_release_temp_blobid);\n\ninline constexpr int TRA_MASK\t\t\t\t= 3;\n//inline constexpr int TRA_BITS_PER_TRANS\t= 2;\n//inline constexpr int TRA_TRANS_PER_BYTE\t= 4;\ninline constexpr int TRA_SHIFT\t\t\t\t= 2;\n\n#define TRANS_SHIFT(number)\t(((number) &amp; TRA_MASK) &lt;&lt; 1)\n#define TRANS_OFFSET(number)\t((number) &gt;&gt; TRA_SHIFT)\n\n// Transaction cleanup. If a database is never quiescent, look\n// for &quot;dead&quot; active transactions every so often at transaction\n// startup\n\ninline constexpr int TRA_ACTIVE_CLEANUP = 100;\n\n// Transaction states.  The first four are states found\n// in the transaction inventory page; the last two are\n// returned internally\n\ninline constexpr int tra_active\t\t\t= 0;\t// Transaction is active\ninline constexpr int tra_limbo\t\t\t= 1;\ninline constexpr int tra_dead\t\t\t= 2;\ninline constexpr int tra_committed\t\t= 3;\ninline constexpr int tra_us\t\t\t\t= 4;\t// Transaction is us\ninline constexpr int tra_precommitted\t= 5;\t// Transaction is precommitted\n\n// Deferred work blocks are used by the meta data handler to keep track\n// of work deferred to commit time.  This are usually used to perform\n// meta data updates\n\nenum dfw_t {\n\tdfw_null,\n\tdfw_create_relation,\n\tdfw_delete_relation,\n\tdfw_update_format,\n\tdfw_create_index,\n\tdfw_delete_index,\n\tdfw_compute_security,\n\tdfw_add_shadow,\n\tdfw_delete_shadow,\n\tdfw_delete_shadow_nodelete,\n\tdfw_modify_file,\n\tdfw_erase_file,\n\tdfw_create_field,\n\tdfw_delete_field,\n\tdfw_modify_field,\n\tdfw_delete_global,\n\tdfw_delete_rfr,\n\tdfw_post_event,\n\tdfw_create_trigger,\n\tdfw_delete_trigger,\n\tdfw_modify_trigger,\n\t//dfw_load_triggers,\n\tdfw_grant,\n\tdfw_revoke,\n\tdfw_scan_relation,\n\tdfw_create_expression_index,\n\tdfw_create_procedure,\n\tdfw_modify_procedure,\n\tdfw_delete_procedure,\n\tdfw_delete_prm,\n\tdfw_create_collation,\n\tdfw_delete_collation,\n\tdfw_delete_exception,\n\t//dfw_unlink_file,\n\tdfw_delete_generator,\n\tdfw_create_function,\n\tdfw_modify_function,\n\tdfw_delete_function,\n\tdfw_add_difference,\n\tdfw_delete_difference,\n\tdfw_begin_backup,\n\tdfw_end_backup,\n\tdfw_user_management,\n\tdfw_modify_package_header,\n\tdfw_drop_package_header,\n\tdfw_drop_package_body,\n\tdfw_check_not_null,\n\tdfw_store_view_context_type,\n\tdfw_set_generator,\n\tdfw_change_repl_state,\n\n\t// deferred works argument types\n\tdfw_arg_index_name,\t\t// index name for dfw_delete_index, mandatory\n\tdfw_arg_partner_rel_id,\t// partner relation id for dfw_delete_index if index is FK, optional\n\tdfw_arg_proc_name,\t\t// procedure name for dfw_delete_prm, mandatory\n\tdfw_arg_force_computed,\t// we need to drop dependencies from a field that WAS computed\n\tdfw_arg_check_blr,\t\t// check if BLR is still compilable\n\tdfw_arg_rel_name,\t\t// relation name of a trigger\n\tdfw_arg_trg_type,\t\t// trigger type\n\tdfw_arg_new_name,\t\t// new name\n\tdfw_arg_field_not_null,\t// set domain to not nullable\n\tdfw_db_crypt,\t\t\t// change database encryption status\n\tdfw_set_linger,\t\t\t// set database linger\n\tdfw_clear_cache\t\t\t// clear user mapping cache\n};\n\n} //namespace Jrd\n\n#endif // JRD_TRA_H\n"}, "/build/src/jrd/Database.cpp": {"id": "/build/src/jrd/Database.cpp", "filePath": "src/jrd/Database.cpp", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         Database.cpp\n *      DESCRIPTION:    Common descriptions\n *\n bb_page_manager.findPageSpace(DB_PAGE_SPACE);\n\t\tfb_assert(pageSpace &amp;&amp; pageSpace-&gt;file);\n\n\t\tif ((pageSpace-&gt;file-&gt;fil_flags &amp; FIL_no_fs_cache) || pageSpace-&gt;onRawDevice())\n\t\t\treturn DIRECT_IO_BLOCK_SIZE;\n\n\t\treturn PAGE_ALIGNMENT;\n\t}\n\n\tAttNumber Database::generateAttachmentId()\n\t{\n\t\tfb_assert(dbb_tip_cache);\n\t\treturn dbb_tip_cache-&gt;generateAttachmentId();\n\t}\n\n\tTraNumber Database::generateTransactionId()\n\t{\n\t\tfb_assert(dbb_tip_cache);\n\t\treturn dbb_tip_cache-&gt;generateTransactionId();\n\t}\n\n\t/***\n\tvoid Database::assignLatestTransactionId(TraNumber number)\n\t{\n\t\tfb_assert(dbb_tip_cache);\n\t\tdbb_tip_cache-&gt;assignLatestTransactionId(number);\n\t}\n\t***/\n\n\tvoid Database::assignLatestAttachmentId(AttNumber number)\n\t{\n\t\tif (dbb_tip_cache)\n\t\t\tdbb_tip_cache-&gt;assignLatestAttachmentId(number);\n\t}\n\n\tStmtNumber Database::generateStatementId()\n\t{\n\t\tif (!dbb_tip_cache)\n\t\t\treturn 0;\n\t\treturn dbb_tip_cache-&gt;generateStatementId();\n\t}\n\n\tAttNumber Database::getLatestAttachmentId() const\n\t{\n\t\tif (!dbb_tip_cache)\n\t\t\treturn 0;\n\t\treturn dbb_tip_cache-&gt;getLatestAttachmentId();\n\t}\n\n\tStmtNumber Database::getLatestStatementId() const\n\t{\n\t\tif (!dbb_tip_cache)\n\t\t\treturn 0;\n\t\treturn dbb_tip_cache-&gt;getLatestStatementId();\n\t}\n\n\tULONG Database::getMonitorGeneration() const\n\t{\n\t\tif (!dbb_tip_cache)\n\t\t\treturn 0;\n\t\treturn dbb_tip_cache-&gt;getMonitorGeneration();\n\t}\n\n\tULONG Database::newMonitorGeneration() const\n\t{\n\t\tfb_assert(dbb_tip_cache);\n\t\treturn dbb_tip_cache-&gt;newMonitorGeneration();\n\t}\n\n\tconst Firebird::string&amp; Database::getUniqueFileId()\n\t{\n\t\tif (dbb_file_id.isEmpty())\n\t\t{\n\t\t\tconst PageSpace* const pageSpace = dbb_page_manager.findPageSpace(DB_PAGE_SPACE);\n\n\t\t\tUCharBuffer buffer;\n\t\t\tos_utils::getUniqueFileId(pageSpace-&gt;file-&gt;fil_desc, buffer);\n\n\t\t\tdbb_file_id.reserve(2 * static_cast&lt;size_t&gt;(buffer.getCount()));\n\t\t\tchar hex[3];\n\t\t\tfor (const auto val : buffer)\n\t\t\t{\n\t\t\t\tsnprintf(hex, sizeof(hex), &quot;%02x&quot;, static_cast&lt;unsigned&gt;(val));\n\t\t\t\tdbb_file_id.append(hex);\n\t\t\t}\n\t\t}\n\n\t\treturn dbb_file_id;\n\t}\n\n\tDatabase::~Database()\n\t{\n\t\tif (dbb_linger_timer)\n\t\t{\n\t\t\tdbb_linger_timer-&gt;destroy();\n\t\t}\n\n\t\t{ // scope\n\t\t\tSyncLockGuard guard(&amp;dbb_sortbuf_sync, SYNC_EXCLUSIVE, &quot;Database::~Database&quot;);\n\n\t\t\twhile (dbb_sort_buffers.hasData())\n\t\t\t\tdelete[] dbb_sort_buffers.pop();\n\t\t}\n\n\t\t{ // scope\n\t\t\tSyncLockGuard guard(&amp;dbb_pools_sync, SYNC_EXCLUSIVE, &quot;Database::~Database&quot;);\n\n\t\t\tfb_assert(dbb_pools[0] == dbb_permanent);\n\n\t\t\tfor (FB_SIZE_T i = 1; i &lt; dbb_pools.getCount(); ++i)\n\t\t\t\tMemoryPool::deletePool(dbb_pools[i]);\n\t\t}\n\n\t\tdelete dbb_tip_cache;\n\t\tdelete dbb_monitoring_data;\n\t\tdelete dbb_backup_manager;\n\t\tdelete dbb_crypto_manager;\n\t}\n\n\tvoid Database::deletePool(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t{\n\t\t\t{\n\t\t\t\tSyncLockGuard guard(&amp;dbb_pools_sync, SYNC_EXCLUSIVE, &quot;Database::deletePool&quot;);\n\t\t\t\tFB_SIZE_T pos;\n\n\t\t\t\tif (dbb_pools.find(pool, pos))\n\t\t\t\t\tdbb_pools.remove(pos);\n\t\t\t}\n\n\t\t\tMemoryPool::deletePool(pool);\n\t\t}\n\t}\n\n\tint Database::blocking_ast_sweep(void* ast_object)\n\t{\n\t\ttry\n\t\t{\n\t\t\tDatabase* dbb = static_cast&lt;Database*&gt;(ast_object);\n\t\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION);\n\n\t\t\twhile (true)\n\t\t\t{\n\t\t\t\tAtomicCounter::counter_type old = dbb-&gt;dbb_flags;\n\t\t\t\tif ((old &amp; DBB_sweep_in_progress) || !(old &amp; DBB_sweep_starting))\n\t\t\t\t{\n\t\t\t\t\tSPTHR_DEBUG(fprintf(stderr, &quot;blocking_ast_sweep %p false wrong flags %lx\\n&quot;, dbb, old));\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\n\t\t\t\tif (dbb-&gt;dbb_flags.compareExchange(old, old &amp; ~DBB_sweep_starting))\n\t\t\t\t{\n\t\t\t\t
