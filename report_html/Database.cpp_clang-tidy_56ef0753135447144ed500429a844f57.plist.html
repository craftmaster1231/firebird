      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},
      viewportMargin : 100
    });

    this._createNavigationMenu();
  },

  navigate : function (report, item) {
    if (!item) {
      var items = this._navigationMenuItems.filter(function (navItem) {
        return navItem.report.reportHash === report.reportHash;
      });

      if (!items.length) return;

      item = items[0].widget;
    }

    this._selectedReport.classList.remove('active');
    this._selectedReport = item;
    this._selectedReport.classList.add('active');
    this.setReport(report);
  },

  _createNavigationMenu : function () {
    var that = this;

    var nav = document.getElementById('report-nav');
    var list = document.createElement('ul');
    this._reports.forEach(function (report) {
      var events = report.events;
      var lastBugEvent = events[events.length - 1];
      var item = document.createElement('li');

      var severity = document.createElement('i');
      severity.className = 'severity-' + report.severity.toLowerCase();

      item.appendChild(severity);
      item.appendChild(document.createTextNode(lastBugEvent.message));

      item.addEventListener('click', function () {
        that.navigate(report, item);
      })
      list.appendChild(item);
      that._navigationMenuItems.push({ report : report, widget : item });
    });

    if (!this._selectedReport && list.childNodes.length) {
      this._selectedReport = list.childNodes[0];
      this._selectedReport.classList.add('active');
    }

    nav.appendChild(list);
  },

  setReport : function (report) {
    this._currentReport = report;
    var events = report.events;
    var lastBugEvent = events[events.length - 1];
    this.setCurrentBugEvent(lastBugEvent, events.length - 1);
    this.setChecker(report.checker);
    this.setReviewStatus(report.reviewStatus);

    window.location.hash = '#reportHash=' + report.reportHash;
  },

  setCurrentBugEvent : function (event, idx) {
    this._currentBugEvent = event;
    this.setSourceFileData(this._files[event.fileId]);
    this.drawBugPath();

    this.jumpTo(event.line, 0);
    this.highlightBugEvent(idx);
  },

  highlightBugEvent : function (idx) {
    this._lineWidgets.forEach(function (widget) {
      var lineIdx = widget.node.getAttribute('idx');
      if (parseInt(lineIdx) === idx) {
        widget.node.classList.add('current');
      }
    });
  },

  setChecker : function (checker) {
    var content = checker.name;
    if (checker.url) {
      content = '<a href="' + checker.url + '" target="_blank">' +
        checker.name + '</a>';
    }

    this._checkerName.innerHTML = content;
  },

  setReviewStatus : function (status) {
    if (status) {
      var className =
        'review-status-' + status.toLowerCase().split(' ').join('-');
      this._reviewStatus.className = "review-status " + className;

      this._reviewStatus.innerHTML = status;
      this._reviewStatusWrapper.style.display = 'block';
    } else {
      this._reviewStatusWrapper.style.display = 'none';
    }
  },

  setSourceFileData : function (file) {
    if (this._sourceFileData && file.id === this._sourceFileData.id) {
      return;
    }

    this._sourceFileData = file;
    this._filepath.innerHTML = file.filePath;
    let e = document.createElement('div');
    e.innerHTML = file.content;
    this._codeMirror.doc.setValue(e.innerText);
    this._refresh();
  },

  _refresh : function () {
    var that = this;
    setTimeout(function () {
      var fullHeight = parseInt(that._content.clientHeight);
      var headerHeight = that._filepath.clientHeight;

      that._codeMirror.setSize('auto', fullHeight - headerHeight);
      that._codeMirror.refresh();
    }, 200);
  },

  clearBubbles : function () {
    this._lineWidgets.forEach(function (widget) { widget.clear(); });
    this._lineWidgets = [];
  },

  getMessage : function (event, kind) {
    if (kind === 'macro') {
      var name = 'macro expansion' + (event.name ? ': ' + event.name : '');

      return '<span class="tag macro">' + name + '</span>'
        + this.escapeHTML(event.message).replace(/(?:\r\n|\r|\n)/g, '<br>');
    } else if (kind === 'note') {
      return '<span class="tag note">note</span>'
        +  this.escapeHTML(event.message).replace(/(?:\r\n|\r|\n)/g, '<br>');
    }
  },

  addExtraPathEvents : function (events, kind) {
    var that = this;

    if (!events) {
      return;
    }

    events.forEach(function (event) {
      if (event.fileId !== that._currentBugEvent.fileId) {
        return;
      }

      var left = that._codeMirror.defaultCharWidth() * event.column + 'px';

      var element = document.createElement('div');
      element.setAttribute('style', 'margin-left: ' + left);
      element.setAttribute('class', 'check-msg ' + kind);

      var msg = document.createElement('span');
      msg.innerHTML = that.getMessage(event, kind);
      element.appendChild(msg);

      that._lineWidgets.push(that._codeMirror.addLineWidget(
        event.line - 1, element));
    });
  },

  drawBugPath : function () {
    var that = this;

    this.clearBubbles();

    this.addExtraPathEvents(this._currentReport.macros, 'macro');
    this.addExtraPathEvents(this._currentReport.notes, 'note');

    // Processing bug path events.
    var currentEvents = this._currentReport.events;
    currentEvents.forEach(function (event, step) {
      if (event.fileId !== that._currentBugEvent.fileId)
        return;

      var left = that._codeMirror.defaultCharWidth() * event.column + 'px';
      var type = step === currentEvents.length - 1 ? 'error' : 'info';

      var element = document.createElement('div');
      element.setAttribute('style', 'margin-left: ' + left);
      element.setAttribute('class', 'check-msg ' + type);
      element.setAttribute('idx', step);

      var enumeration = document.createElement('span');
      enumeration.setAttribute('class', 'checker-enum ' + type);
      enumeration.innerHTML = step + 1;

      if (currentEvents.length > 1)
        element.appendChild(enumeration);

      var prevBugEvent = step - 1;
      if (step > 0) {
        var prevBug = document.createElement('span');
        prevBug.setAttribute('class', 'arrow left-arrow');
        prevBug.addEventListener('click', function () {
          var event = currentEvents[prevBugEvent];
          that.setCurrentBugEvent(event, prevBugEvent);
        });
        element.appendChild(prevBug);
      }

      var msg = document.createElement('span');
      msg.innerHTML = that.escapeHTML(event.message)
        .replace(/(?:\r\n|\r|\n)/g, '<br>');

      element.appendChild(msg);

      var nextBugEvent = step + 1;
      if (nextBugEvent < currentEvents.length) {
        var nextBug = document.createElement('span');
        nextBug.setAttribute('class', 'arrow right-arrow');
        nextBug.addEventListener('click', function () {
          var event = currentEvents[nextBugEvent];
          that.setCurrentBugEvent(event, nextBugEvent);
        });
        element.appendChild(nextBug);
      }


      that._lineWidgets.push(that._codeMirror.addLineWidget(
        event.line - 1, element));
    });
  },

  jumpTo : function (line, column) {
    var that = this;

    setTimeout(function () {
      var selPosPixel
        = that._codeMirror.charCoords({ line : line, ch : column }, 'local');
      var editorSize = {
        width  : that._editor.clientWidth,
        height : that._editor.clientHeight
      };

      that._codeMirror.scrollIntoView({
        top    : selPosPixel.top - 100,
        bottom : selPosPixel.top + editorSize.height - 150,
        left   : selPosPixel.left < editorSize.width - 100
               ? 0
               : selPosPixel.left - 50,
        right  : selPosPixel.left < editorSize.width - 100
               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }
}

se : public AutoIface&lt;IPluginFactoryImpl&lt;SimpleFactoryBase&lt;P&gt;, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tIPluginBase* createPlugin(CheckStatusWrapper* status, IPluginConfig* factoryParameter)\n\t{\n\t\ttry\n\t\t{\n\t\t\tP* p = FB_NEW P(factoryParameter);\n\t\t\tp-&gt;addRef();\n\t\t\treturn p;\n\t\t}\n\t\tcatch (const Firebird::Exception&amp; ex)\n\t\t{\n\t\t\tex.stuffException(status);\n\t\t}\n\t\treturn NULL;\n\t}\n};\n\ntemplate &lt;class P&gt;\nclass SimpleFactory : public Static&lt;SimpleFactoryBase&lt;P&gt; &gt;\n{\n};\n\n\n// Ensure access to cached pointer to master interface\nclass CachedMasterInterface\n{\npublic:\n\tstatic void set(IMaster* master);\n\nprotected:\n\tstatic IMaster* getMasterInterface();\n};\n\n// Base for interface type independent accessors\ntemplate &lt;typename C&gt;\nclass AccessAutoInterface : public CachedMasterInterface\n{\npublic:\n\texplicit AccessAutoInterface(C* aPtr)\n\t\t: ptr(aPtr)\n\t{ }\n\n\toperator C*()\n\t{\n\t\treturn ptr;\n\t}\n\n\tC* operator-&gt;()\n\t{\n\t\treturn ptr;\n\t}\n\nprivate:\n\tC* ptr;\n};\n\n// Master interface access\nclass MasterInterfacePtr : public AccessAutoInterface&lt;IMaster&gt;\n{\npublic:\n\tMasterInterfacePtr()\n\t\t: AccessAutoInterface&lt;IMaster&gt;(getMasterInterface())\n\t{ }\n};\n\n\n// Generic plugins interface access\nclass PluginManagerInterfacePtr : public AccessAutoInterface&lt;IPluginManager&gt;\n{\npublic:\n\tPluginManagerInterfacePtr()\n\t\t: AccessAutoInterface&lt;IPluginManager&gt;(getMasterInterface()-&gt;getPluginManager())\n\t{ }\n};\n\n\n// Control timer interface access\nclass TimerInterfacePtr : public AccessAutoInterface&lt;ITimerControl&gt;\n{\npublic:\n\tTimerInterfacePtr()\n\t\t: AccessAutoInterface&lt;ITimerControl&gt;(getMasterInterface()-&gt;getTimerControl())\n\t{ }\n};\n\n\n// Distributed transactions coordinator access\nclass DtcInterfacePtr : public AccessAutoInterface&lt;IDtc&gt;\n{\npublic:\n\tDtcInterfacePtr()\n\t\t: AccessAutoInterface&lt;IDtc&gt;(getMasterInterface()-&gt;getDtc())\n\t{ }\n};\n\n\n// Dispatcher access\nclass DispatcherPtr : public AccessAutoInterface&lt;IProvider&gt;\n{\npublic:\n\tDispatcherPtr()\n\t\t: AccessAutoInterface&lt;IProvider&gt;(getMasterInterface()-&gt;getDispatcher())\n\t{ }\n\n\t~DispatcherPtr()\n\t{\n\t\t(*this)-&gt;release();\n\t}\n};\n\n\n// Misc utl access\nclass UtilInterfacePtr : public AccessAutoInterface&lt;IUtil&gt;\n{\npublic:\n\tUtilInterfacePtr()\n\t\t: AccessAutoInterface&lt;IUtil&gt;(getMasterInterface()-&gt;getUtilInterface())\n\t{ }\n};\n\n\n// When process exits, dynamically loaded modules (for us plugin modules)\n// are unloaded first. As the result all global variables in plugin are already destroyed\n// when yvalve is starting fb_shutdown(). This causes almost unavoidable segfault.\n// To avoid it this class is added - it detects spontaneous (not by PluginManager)\n// module unload and notifies PluginManager about this said fact.\nclass UnloadDetectorHelper final :\n\tpublic VersionedIface&lt;IPluginModuleImpl&lt;UnloadDetectorHelper, CheckStatusWrapper&gt; &gt;\n{\npublic:\n\ttypedef void VoidNoParam();\n\n\texplicit UnloadDetectorHelper(MemoryPool&amp;)\n\t\t: cleanup(NULL), thdDetach(NULL), flagOsUnload(false)\n\t{ }\n\n\tvoid registerMe()\n\t{\n\t\tPluginManagerInterfacePtr()-&gt;registerModule(this);\n\t\tflagOsUnload = true;\n\t}\n\n\t~UnloadDetectorHelper()\n\t{\n\t\tif (flagOsUnload)\n\t\t{\n\t\t\tconst bool dontCleanup = MasterInterfacePtr()-&gt;getProcessExiting();\n\t\t\tif (dontCleanup)\n\t\t\t{\n\t\t\t\tInstanceControl::cancelCleanup();\n\t\t\t\treturn;\n\t\t\t}\n\n\t\t\tPluginManagerInterfacePtr()-&gt;unregisterModule(this);\n\t\t\tdoClean();\n\t\t}\n\t}\n\n\tbool unloadStarted()\n\t{\n\t\treturn !flagOsUnload;\n\t}\n\n\tvoid setCleanup(VoidNoParam* function)\n\t{\n\t\tcleanup = function;\n\t}\n\n\tvoid setThreadDetach(VoidNoParam* function)\n\t{\n\t\tthdDetach = function;\n\t}\n\n\tvoid doClean()\n\t{\n\t\tflagOsUnload = false;\n\n\t\tif *  The Original Code was created by Adriano dos Santos Fernandes\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2024 Adriano dos Santos Fernandes &lt;adrianosf@gmail.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef QUALIFIED_METASTRING_H\n#define QUALIFIED_METASTRING_H\n\n#include &quot;../common/classes/MetaString.h&quot;\n#include &quot;../common/classes/objects_array.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &lt;algorithm&gt;\n#include &lt;cctype&gt;\n\nnamespace Firebird {\n\ntemplate &lt;typename T&gt;\nconcept IsQualifiedName = requires(T t)\n{\n\t{ t.schema };\n\t{ t.object };\n\t{ t.package };\n};\n\ntemplate &lt;typename T&gt;\nclass BaseQualifiedName\n{\npublic:\n\texplicit BaseQualifiedName(MemoryPool&amp; p, const T&amp; aObject,\n\t\t\tconst T&amp; aSchema = {}, const T&amp; aPackage = {})\n\t\t: object(p, aObject),\n\t\t  schema(p, aSchema),\n\t\t  package(p, aPackage)\n\t{\n\t}\n\n\texplicit BaseQualifiedName(const T&amp; aObject, const T&amp; aSchema = {}, const T&amp; aPackage = {})\n\t\t: object(aObject),\n\t\t  schema(aSchema),\n\t\t  package(aPackage)\n\t{\n\t}\n\n\tBaseQualifiedName(MemoryPool&amp; p, const BaseQualifiedName&amp; src)\n\t\t: object(p, src.object),\n\t\t  schema(p, src.schema),\n\t\t  package(p, src.package),\n\t\t  unambiguous(src.isUnambiguous())\n\t{\n\t}\n\n\tBaseQualifiedName(const BaseQualifiedName&amp; src)\n\t\t: object(src.object),\n\t\t  schema(src.schema),\n\t\t  package(src.package),\n\t\t  unambiguous(src.isUnambiguous())\n\t{\n\t}\n\n\ttemplate &lt;typename TT&gt;\n\tBaseQualifiedName(const BaseQualifiedName&lt;TT&gt;&amp; src)\n\t\t: object(src.object),\n\t\t  schema(src.schema),\n\t\t  package(src.package),\n\t\t  unambiguous(src.isUnambiguous())\n\t{\n\t}\n\n\texplicit BaseQualifiedName(MemoryPool&amp; p)\n\t\t: object(p),\n\t\t  schema(p),\n\t\t  package(p)\n\t{\n\t}\n\n\tBaseQualifiedName()\n\t{\n\t}\n\npublic:\n\tstatic void parseSchemaObjectListNoSep(const string&amp; str, ObjectsArray&lt;BaseQualifiedName&lt;T&gt;&gt;&amp; list)\n\t{\n\t\tconst auto isQuoted = [](const string&amp; name) -&gt; bool\n\t\t{\n\t\t\treturn name.length() &gt;= 2 &amp;&amp; name[0] == &#x27;&quot;&#x27; &amp;&amp; name[name.length() - 1] == &#x27;&quot;&#x27;;\n\t\t};\n\n\t\tconst auto unquote = [&amp;](const string&amp; name) -&gt; string\n\t\t{\n\t\t\tif (!isQuoted(name))\n\t\t\t\treturn name;\n\n\t\t\tstring result;\n\n\t\t\tfor (FB_SIZE_T i = 1; i &lt; name.length() - 1; ++i)\n\t\t\t{\n\t\t\t\tif (name[i] == &#x27;&quot;&#x27;)\n\t\t\t\t{\n\t\t\t\t\tif (i + 1 &lt; name.length() - 1 &amp;&amp; name[i + 1] == &#x27;&quot;&#x27;)\n\t\t\t\t\t\t++i;\n\t\t\t\t\telse\n\t\t\t\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\t\t\t\t}\n\n\t\t\t\tresult += name[i];\n\t\t\t}\n\n\t\t\treturn result;\n\t\t};\n\n\t\tconst auto validateUnquotedIdentifier = [&amp;](const string&amp; name)\n\t\t{\n\t\t\tif (name.length() &gt; MAX_SQL_IDENTIFIER_LEN)\n\t\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\n\t\t\tbool first = true;\n\n\t\t\tfor (const auto c : name)\n\t\t\t{\n\t\t\t\tif (!((c &gt;= &#x27;A&#x27; &amp;&amp; c &lt;= &#x27;Z&#x27;) ||\n\t\t\t\t\t  (c &gt;= &#x27;a&#x27; &amp;&amp; c &lt;= &#x27;z&#x27;) ||\n\t\t\t\t\t  c == &#x27;{&#x27; ||\n\t\t\t\t\t  c == &#x27;}&#x27; ||\n\t\t\t\t\t  (!first &amp;&amp; c &gt;= &#x27;0&#x27; &amp;&amp; c &lt;= &#x27;9&#x27;) ||\n\t\t\t\t\t  (!first &amp;&amp; c == &#x27;$&#x27;) ||\n\t\t\t\t\t  (!first &amp;&amp; c == &#x27;_&#x27;)))\n\t\t\t\t{\n\t\t\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\t\t\t\t}\n\n\t\t\t\tfirst = false;\n\t\t\t}\n\n\t\t\treturn true;\n\t\t};\n\n\t\tFB_SIZE_T i = 0;\n\n\t\tconst auto skipSpaces = [&amp;]()\n\t\t{\n\t\t\twhile (i &lt; str.size() &amp;&amp;\n\t\t\t\t(str[i] == &#x27; &#x27; || str[i] == &#x27;\\t&#x27; || str[i] == &#x27;\\f&#x27; || str[i] == &#x27;\\r&#x27; || str[i] == &#x27;\\n&#x27;))\n\t\t\t{\n\t\t\t\t++i;\n\t\t\t}\n\t\t};\n\n\t\tskipSpaces();\n\n\t\tdo\n\t\t{\n\t\t\tBaseQualifiedName&lt;T&gt; result;\n\t\t\tstring schema, object;\n\n\t\t\tconst auto start = i;\n\t\t\tbool nameFound = false;\n\t\t\tbool inQuotes = false;\n\t\t\tauto dotPos = string::npos;\n\n\t\t\tfor (; !nameFound &amp;&amp; i &lt; str.size(); ++i)\n\t\t\t{\n\t\t\t\tconst auto ch = str[i];\n\n\t\t\t\tif (inQuotes)\n\t\t\t\t{\n\t\t\t\t\tif (ch == &#x27;&quot;&#x27;)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (i + 1 &lt; str.size() &amp;&amp; str[i + 1] == &#x27;&quot;&#x27;)\n\t\t\t\t\t\t\t++i;\n\t\t\t\t\t\telse\n\t\t\t\t\t\t\tinQuotes = false;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tswitch (ch)\n\t\t\t\t\t{\n\t\t\t\t\t\tcase &#x27;&quot;&#x27;:\n\t\t\t\t\t\t\tinQuotes = true;\n\t\t\t\t\t\t\tbreak;\n\n\t\t\t\t\t\tcase &#x27;.&#x27;:\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tdotPos = i++;\n\t\t\t\t\t\t\tskipSpaces();\n\t\t\t\t\t\t\t--i;\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\n\t\t\t\t\t\tcase &#x27; &#x27;:\n\t\t\t\t\t\tcase &#x27;\\t&#x27;:\n\t\t\t\t\t\tcase &#x27;\\f&#x27;:\n\t\t\t\t\t\tcase &#x27;\\r&#x27;:\n\t\t\t\t\t\tcase &#x27;\\n&#x27;:\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tskipSpaces();\n\n\t\t\t\t\t\t\tif (i &lt; str.size() &amp;&amp; str[i] == &#x27;.&#x27;)\n\t\t\t\t\t\t\t{\n\t\t\t\t\t\t\t\tdotPos = i++;\n\t\t\t\t\t\t\t\tskipSpaces();\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t\telse\n\t\t\t\t\t\t\t\tnameFound = true;\n\n\t\t\t\t\t\t\t--i;\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (dotPos != string::npos)\n\t\t\t{\n\t\t\t\tschema = str.substr(start, dotPos - start);\n\t\t\t\tobject = str.substr(dotPos + 1, i - dotPos - 1);\n\t\t\t}\n\t\t\telse\n\t\t\t\tobject = str.substr(start, i - start);\n\n\t\t\tschema.trim(&quot; \\t\\f\\r\\n&quot;);\n\t\t\tobject.trim(&quot; \\t\\f\\r\\n&quot;);\n\n\t\t\t// Process schema if it exists\n\t\t\tif (schema.hasData())\n\t\t\t{\n\t\t\t\tif (isQuoted(schema))\n\t\t\t\t\tresult.schema = unquote(schema);\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tvalidateUnquotedIdentifier(schema);\n\n\t\t\t\t\tstd::transform(schema.begin(), schema.end(), schema.begin(), ::toupper);\n\t\t\t\t\tresult.schema = schema;\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (dotPos != string::npos &amp;&amp; result.schema.isEmpty())\n\t\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\n\t\t\t// Process object\n\t\t\tif (isQuoted(object))\n\t\t\t\tresult.object = unquote(object);\n\t\t\telse\n\t\t\t{\n\t\t\t\tvalidateUnquotedIdentifier(object);\n\n\t\t\t\tstd::transform(object.begin(), object.end(), object.begin(), ::toupper);\n\t\t\t\tresult.object = object;\n\t\t\t}\n\n\t\t\tif (result.object.isEmpty())\n\t\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\n\t\t\tlist.add(result);\n\t\t} while (i &lt; str.size());\n\t}\n\n\tstatic BaseQualifiedName&lt;T&gt; parseSchemaObject(const string&amp; str)\n\t{\n\t\tObjectsArray&lt;BaseQualifiedName&lt;T&gt;&gt; list;\n\t\tparseSchemaObjectListNoSep(str, list);\n\n\t\tif (list.getCount() != 1)\n\t\t\t(Arg::Gds(isc_invalid_name) &lt;&lt; str).raise();\n\n\t\treturn list[0];\n\t}\n\npublic:\n\ttemplate &lt;IsQualifiedName U&gt;\n\tbool operator&lt;(const U&amp; m) const\n\t{\n\t\treturn schema &lt; m.schema ||\n\t\t\t(schema == m.schema &amp;&amp; object &lt; m.object) ||\n\t\t\t(schema == m.schema &amp;&amp; object == m.object &amp;&amp; package &lt; m.package);\n\t}\n\n\ttemplate &lt;IsQualifiedName U&gt;\n\tbool operator&gt;(const U&amp; m) const\n\t{\n\t\treturn schema &gt; m.schema ||\n\t\t\t(schema == m.schema &amp;&amp; object &gt; m.object) ||\n\t\t\t(schema == m.schema &amp;&amp; object == m.object &amp;&amp; package &gt; m.package);\n\t}\n\n\ttemplate &lt;IsQualifiedName U&gt;\n\tbool operator==(const U&amp; m) const\n\t{\n\t\treturn schema == m.schema &amp;&amp; object == m.object &amp;&amp; package == m.package;\n\t}\n\n\ttemplate &lt;IsQualifiedName U&gt;\n\tbool operator!=(const U&amp; m) const\n\t{\n\t\treturn !(*this == m);\n\t}\n\npublic:\n\tbool isUnambiguous() const\n\t{\n\t\treturn unambiguous;\n\t}\n\n\tvoid setUnambiguous(bool value)\n\t{\n\t\tunambiguous = value;\n\t}\n\n\tBaseQualifiedName getSchemaAndPackage() const\n\t{\n\t\treturn BaseQualifiedName(package, schema);\n\t}\n\n\tvoid clear()\n\t{\n\t\tobject = {};\n\t\tschema = {};\n\t\tpackage = {};\n\t}\n\n\tFirebird::string toQuotedString() const\n\t{\n\t\tFirebird::string s;\n\n\t\tconst auto appendName = [&amp;s](const T&amp; name) {\n\t\t\tif (name.hasData())\n\t\t\t{\n\t\t\t\ts += name.toQuotedString();\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\treturn false;\n\t\t};\n\n\t\tif (appendName(schema))\n\t\t\ts.append(&quot;.&quot;);\n\n\t\tif (appendName(package))\n\t\t\ts.append(&quot;.&quot;);\n\n\t\tappendName(object);\n\n\t\treturn s;\n\t}\n\npublic:\n\tT object;\n\tT schema;\n\tT package;\n\nprivate:\n\tbool unambiguous = false;\n};\n\nusing QualifiedMetaString = Firebird::BaseQualifiedName&lt;MetaString&gt;;\n\n} // namespace Firebird\n\n#endif // QUALIFIED_METASTRING_H\n"}, "/build/src/jrd/Attachment.h": {"id": "/build/src/jrd/Attachment.h", "filePath": "src/jrd/Attachment.h", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         Attachment.h\n *      DESCRIPTION:    JRD Attachment class\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n */\n\n#ifndef JRD_ATTACHMENT_H\n#define JRD_ATTACHMENT_H\n\n#include &quot;firebird.h&quot;\n// Definition of block types for data allocation in JRD\n#include &quot;../include/fb_blk.h&quot;\n#include &quot;../jrd/scl.h&quot;\n#include &quot;../jrd/PreparedStatement.h&quot;\n#include &quot;../jrd/RandomGenerator.h&quot;\n#include &quot;../jrd/RuntimeStatistics.h&quot;\n#include &quot;../jrd/Coercion.h&quot;\n\n#include &quot;../common/classes/ByteChunk.h&quot;\n#include &quot;../common/classes/GenericMap.h&quot;\n#include &quot;../jrd/QualifiedName.h&quot;\n#include &quot;../common/classes/SyncObject.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/stack.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../common/classes/TimerImpl.h&quot;\n#include &quot;../common/classes/TriState.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../common/TimeZoneUtil.h&quot;\n\n#include &quot;../jrd/EngineInterface.h&quot;\n#include &quot;../jrd/sbm.h&quot;\n\n#include &lt;atomic&gt;\n#include &lt;initializer_list&gt;\n\n//#define DEBUG_LCK_LIST\n\nnamespace EDS {\n\tclass Connection;\n}\n\nnamespace Replication\n{\n\tclass TableMatcher;\n}\n\nnamespace Firebird {\n\tclass TextType;\n}\n\nclass CharSetContainer;\n\nnamespace Jrd\n{\n\tclass thread_db;\n\tclass Database;\n\tclass jrd_tra;\n\tclass Request;\n\tclass Lock;\n\tclass jrd_file;\n\tclass Format;\n\tclass BufferControl;\n\tclass PageToBufferMap;\n\tclass SparseBitmap;\n\tclass jrd_rel;\n\tclass ExternalFile;\n\tclass ViewContext;\n\tclass IndexBlock;\n\tclass IndexLock;\n\tclass ArrayField;\n\tstruct sort_context;\n\tclass vcl;\n\tclass Parameter;\n\tclass jrd_fld;\n\tclass dsql_dbb;\n\tclass PreparedStatement;\n\tclass TraceManager;\n\ttemplate &lt;typename T&gt; class vec;\n\tclass jrd_rel;\n\tclass jrd_prc;\n\tclass Trigger;\n\tclass TrigVector;\n\tclass Function;\n\tclass Statement;\n\tclass ProfilerManager;\n\tclass Validation;\n\tclass Applier;\n\n\nstruct DSqlCacheItem\n{\n\tDSqlCacheItem(MemoryPool&amp; pool)\n\t\t: key(pool),\n\t\t  obsoleteMap(pool),\n\t\t  lock(nullptr),\n\t\t  locked(false)\n\t{\n\t}\n\n\tFirebird::string key;\n\tFirebird::LeftPooledMap&lt;QualifiedName, bool&gt; obsoleteMap;\n\tLock* lock;\n\tbool locked;\n};\n\ntypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::Full&lt;\n\tFirebird::string, DSqlCacheItem&gt; &gt; &gt; DSqlCache;\n\n\nstruct DdlTriggerContext\n{\n\tDdlTriggerContext()\n\t\t: eventType(*getDefaultMemoryPool()),\n\t\t  objectType(*getDefaultMemoryPool()),\n\t\t  objectName(*getDefaultMemoryPool()),\n\t\t  oldObjectName(*getDefaultMemoryPool()),\n\t\t  newObjectName(*getDefaultMemoryPool()),\n\t\t  sqlText(*getDefaultMemoryPool())\n\t{\n\t}\n\n\tFirebird::string eventType;\n\tFirebird::string objectType;\n\tQualifiedName objectName;\n\tQualifiedName oldObjectName;\n\tQualifiedName newObjectName;\n\tFirebird::string sqlText;\n};\n\n\n// Attachment flags\n\ninline constexpr ULONG ATT_no_cleanup\t\t\t= 0x00001L;\t// Don&#x27;t expunge, purge, or garbage collect\ninline constexpr ULONG ATT_shutdown\t\t\t\t= 0x00002L;\t// attachment has been shutdown\ninline constexpr ULONG ATT_shutdown_manager\t\t= 0x00004L;\t// attachment requesting shutdown\ninline constexpr ULONG ATT_exclusive\t\t\t= 0x00008L;\t// attachment wants exclusive database access\ninline constexpr ULONG ATT_attach_pending\t\t= 0x00010L;\t// Indicate attachment is only pending\ninline constexpr ULONG ATT_exclusive_pending\t= 0x00020L;\t// Indicate exclusive attachment pending\ninline constexpr ULONG ATT_notify_gc\t\t\t= 0x00040L;\t// Notify garbage collector to expunge, purge ..\ninline constexpr ULONG ATT_garbage_collector\t= 0x00080L;\t// I&#x27;m a garbage collector\ninline constexpr ULONG ATT_cancel_raise\t\t\t= 0x00100L;\t// Cancel currently running operation\ninline constexpr ULONG ATT_cancel_disable\t\t= 0x00200L;\t// Disable cancel operations\ninline constexpr ULONG ATT_no_db_triggers\t\t= 0x00400L;\t// Don&#x27;t execute database triggers\ninline constexpr ULONG ATT_manual_lock\t\t\t= 0x00800L;\t// Was locked manually\ninline constexpr ULONG ATT_async_manual_lock\t= 0x01000L;\t// Async mutex was locked manually\ninline constexpr ULONG ATT_overwrite_check\t\t= 0x02000L;\t// Attachment checks is it possible to overwrite DB\ninline constexpr ULONG ATT_system\t\t\t\t= 0x04000L; // Special system attachment\ninline constexpr ULONG ATT_creator\t\t\t\t= 0x08000L; // This attachment created the DB\ninline constexpr ULONG ATT_monitor_disabled\t\t= 0x10000L; // Monitoring lock is downgraded\ninline constexpr ULONG ATT_security_db\t\t\t= 0x20000L; // Attachment used for security purposes\ninline constexpr ULONG ATT_mapping\t\t\t\t= 0x40000L; // Attachment used for mapping auth block\ninline constexpr ULONG ATT_from_thread\t\t\t= 0x80000L; // Attachment from internal special thread (sweep, crypt)\ninline constexpr ULONG ATT_monitor_init\t\t\t= 0x100000L; // Attachment is registered in monitoring\ninline constexpr ULONG ATT_repl_reset\t\t\t= 0x200000L; // Replication set has been reset\ninline constexpr ULONG ATT_replicating\t\t\t= 0x400000L; // Replication is active\ninline constexpr ULONG ATT_resetting\t\t\t= 0x800000L; // Session reset is in progress\ninline constexpr ULONG ATT_worker\t\t\t\t= 0x1000000L; // Worker attachment, managed by the engine\ninline constexpr ULONG ATT_gbak_restore_has_schema = 0x2000000L;\n\ninline constexpr ULONG ATT_NO_CLEANUP\t\t\t= (ATT_no_cleanup | ATT_notify_gc);\n\nclass Attachment;\nclass DatabaseOptions;\nstruct bid;\n\n\nclass ActiveSnapshots\n{\npublic:\n\texplicit ActiveSnapshots(Firebird::MemoryPool&amp; p);\n\n\t// Returns snapshot number given version belongs to.\n\t// It is not needed to maintain two versions for the same snapshot, so the latter\n\t// version can be garbage-collected.\n\t//\n\t// Function returns CN_ACTIVE if version was committed after we obtained\n\t// our list of snapshots. It means GC is not possible for this version.\n\tCommitNumber getSnapshotForVersion(CommitNumber version_cn);\n\nprivate:\n\tFirebird::SparseBitmap&lt;CommitNumber&gt; m_snapshots;\t\t// List of active snapshots as of the moment of time\n\tCommitNumber m_lastCommit;\t\t// CN_ACTIVE here means object is not populated\n\tULONG m_releaseCount;\t\t\t// Release event counter when list was last updated\n\tULONG m_slots_used;\t\t\t\t// Snapshot slots used when list was last updated\n\n\tfriend class TipCache;\n};\n\n\n//\n// RefCounted part of Attachment object, placed into permanent pool\n//\nclass StableAttachmentPart : public Firebird::RefCounted, public Firebird::GlobalStorage\n{\npublic:\n\tclass Sync\n\t{\n\tpublic:\n\t\tSync() noexcept\n\t\t\t: waiters(0), threadId(0), totalLocksCounter(0), currentLocksCounter(0)\n\t\t{ }\n\n\t\t// copying is prohibited\n\t\tSync(const Sync&amp;) = delete;\n\t\tSync&amp; operator=(const Sync&amp;) = delete;\n\n\t\tvoid enter(const char* aReason)\n\t\t{\n\t\t\tconst ThreadId curTid = getThreadId();\n\n\t\t\tif (threadId == curTid)\n\t\t\t{\n\t\t\t\tcurrentLocksCounter++;\n\t\t\t\treturn;\n\t\t\t}\n\n\t\t\tif (threadId || !syncMutex.tryEnter(aReason))\n\t\t\t{\n\t\t\t\t// we have contention with another thread\n\t\t\t\twaiters.fetch_add(1, std::memory_order_relaxed);\n\t\t\t\tsyncMutex.enter(aReason);\n\t\t\t\twaiters.fetch_sub(1, std::memory_order_relaxed);\n\t\t\t}\n\n\t\t\tthreadId = curTid;\n\t\t\ttotalLocksCounter++;\n\t\t\tfb_assert(currentLocksCounter == 0);\n\t\t\tcurrentLocksCounter++;\n\t\t}\n\n\t\tbool tryEnter(const char* aReason)\n\t\t{\n\t\t\tconst ThreadId curTid = getThreadId();\n\n\t\t\tif (threadId == curTid)\n\t\t\t{\n\t\t\t\tcurrentLocksCounter++;\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\tif (threadId || !syncMutex.tryEnter(aReason))\n\t\t\t\treturn false;\n\n\t\t\tthreadId = curTid;\n\t\t\ttotalLocksCounter++;\n\t\t\tfb_assert(currentLocksCounter == 0) l Attachment::isUtility() const noexcept\n{\n\treturn (att_utility != UTIL_NONE);\n}\n\n// This class holds references to all attachments it contains\n\nclass AttachmentsRefHolder\n{\n\tfriend class Iterator;\n\npublic:\n\tclass Iterator\n\t{\n\tpublic:\n\t\texplicit Iterator(AttachmentsRefHolder&amp; list) noexcept\n\t\t\t: m_list(list), m_index(0)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tIterator(const Iterator&amp;) = delete;\n\t\tIterator&amp; operator=(const Iterator&amp;) = delete;\n\n\t\tStableAttachmentPart* operator*() noexcept\n\t\t{\n\t\t\tif (m_index &lt; m_list.m_attachments.getCount())\n\t\t\t\treturn m_list.m_attachments[m_index];\n\n\t\t\treturn NULL;\n\t\t}\n\n\t\tvoid operator++() noexcept\n\t\t{\n\t\t\tm_index++;\n\t\t}\n\n\t\tvoid remove()\n\t\t{\n\t\t\tif (m_index &lt; m_list.m_attachments.getCount())\n\t\t\t{\n\t\t\t\tm_list.m_attachments[m_index]-&gt;release();\n\t\t\t\tm_list.m_attachments.remove(m_index);\n\t\t\t}\n\t\t}\n\n\tprivate:\n\t\tAttachmentsRefHolder&amp; m_list;\n\t\tFB_SIZE_T m_index;\n\t};\n\n\texplicit AttachmentsRefHolder(MemoryPool&amp; p)\n\t\t: m_attachments(p)\n\t{}\n\n\tAttachmentsRefHolder()\n\t\t: m_attachments(*MemoryPool::getContextPool())\n\t{}\n\n\tAttachmentsRefHolder&amp; operator=(const AttachmentsRefHolder&amp; other)\n\t{\n\t\tclear();\n\n\t\tfor (FB_SIZE_T i = 0; i &lt; other.m_attachments.getCount(); i++)\n\t\t\tadd(other.m_attachments[i]);\n\n\t\treturn *this;\n\t}\n\n\tvoid clear()\n\t{\n\t\twhile (m_attachments.hasData())\n\t\t{\n\t\t\tm_attachments.pop()-&gt;release();\n\t\t}\n\t}\n\n\t~AttachmentsRefHolder()\n\t{\n\t\tclear();\n\t}\n\n\tvoid add(StableAttachmentPart* jAtt)\n\t{\n\t\tif (jAtt)\n\t\t{\n\t\t\tjAtt-&gt;addRef();\n\t\t\tm_attachments.add(jAtt);\n\t\t}\n\t}\n\n\tbool hasData() const noexcept\n\t{\n\t\treturn m_attachments.hasData();\n\t}\n\nprivate:\n\tAttachmentsRefHolder(const AttachmentsRefHolder&amp;);\n\n\tFirebird::HalfStaticArray&lt;StableAttachmentPart*, 128&gt; m_attachments;\n};\ DEX_LAST = 2\n\t\t};\n\n\t\tstruct Impure : public TableValueFunctionScan::Impure\n\t\t{\n\t\t\tblb* m_blob;\n\t\t\tFirebird::string* m_separatorStr;\n\t\t\tFirebird::string* m_resultStr;\n\t\t};\n\n\tpublic:\n\t\tUnlistFunctionScan(CompilerScratch* csb, StreamType stream, const Firebird::string&amp; alias,\n\t\t\t\t\t\t   ValueListNode* list);\n\n\tprotected:\n\t\tvoid close(thread_db* tdbb) const final;\n\t\tvoid internalOpen(thread_db* tdbb) const final;\n\t\tvoid internalGetPlan(thread_db* tdbb, PlanEntry&amp; planEntry, unsigned level,\n\t\t\t\t\t\t\t bool recurse) const final;\n\n\t\tbool nextBuffer(thread_db* tdbb) const final;\n\n\tprivate:\n\t\tNestConst&lt;ValueListNode&gt; m_inputList;\n\t};\n\n} // namespace\n\n#endif // JRD_RECORD_SOURCE_H\n"}, "/build/src/jrd/Monitoring.h": {"id": "/build/src/jrd/Monitoring.h", "filePath": "src/jrd/Monitoring.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Dmitry Yemanov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2006 Dmitry Yemanov &lt;dimitr@users.sf.net&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\t\tAlex Peshkoff, 2010 - divided into class DataDump and the remaining part of DatabaseSnapshot\n */\n\n#ifndef JRD_DATABASE_SNAPSHOT_H\n#define JRD_DATABASE_SNAPSHOT_H\n\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/isc_s_proto.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../jrd/val.h&quot;\n#include &quot;../jrd/recsrc/RecordSource.h&quot;\n#include &quot;../jrd/TempSpace.h&quot;\n\nnamespace Jrd {\n\n// forward declarations\nclass jrd_rel;\nclass Record;\nclass RecordBuffer;\nclass RuntimeStatistics;\n\nclass SnapshotData\n{\npublic:\n\tstruct RelationData\n\t{\n\t\tint rel_id;\n\t\tRecordBuffer* data;\n\t};\n\n\tenum ValueType\n\t{\n\t\tVALUE_UNKNOWN,\n\t\tVALUE_GLOBAL_ID,\n\t\tVALUE_TABLE_ID_OBJECT_NAME,\n\t\tVALUE_INTEGER,\n\t\tVALUE_TIMESTAMP,\n\t\tVALUE_TIMESTAMP_TZ,\n\t\tVALUE_STRING,\n\t\tVALUE_BOOLEAN,\n\t\tVALUE_TABLE_ID_SCHEMA_NAME,\n\t\tVALUE_LAST_MARKER\t// Should be last item\n\t};\n\n\tstruct DumpField\n\t{\n\t\tDumpField(USHORT p_id, ValueType p_type, ULONG p_length, const void* p_data)\n\t\t\t: id(p_id), type(p_type), length(p_length), data(p_data)\n\t\t{}\n\n\t\tDumpField()\n\t\t\t: id(0), type(VALUE_UNKNOWN), length(0), data(NULL)\n\t\t{}\n\n\t\tUSHORT id;\n\t\tValueType type;\n\t\tULONG length;\n\t\tconst void* data;\n\t};\n\n\tclass DumpRecord\n\t{\n\tpublic:\n\t\tclass Writer\n\t\t{\n\t\tpublic:\n\t\t\tvirtual void write(const DumpRecord&amp; record) = 0;\n\t\t};\n\n\t\texplicit DumpRecord(MemoryPool&amp; pool)\n\t\t\t: buffer(pool), offset(0), writer(NULL)\n\t\t{}\n\n\t\tDumpRecord(MemoryPool&amp; pool, Writer&amp; wr)\n\t\t\t: buffer(pool), offset(0), writer(&amp;wr)\n\t\t{}\n\n\t\tvoid reset(int rel_id)\n\t\t{\n\t\t\toffset = 1;\n\t\t\tbuffer.clear();\n\t\t\tbuffer.add(rel_id);\n\t\t}\n\n\t\tvoid assign(ULONG length, const UCHAR* ptr)\n\t\t{\n\t\t\toffset = 0;\n\t\t\tbuffer.assign(ptr, length);\n\t\t}\n\n\t\tULONG getLength() const\n\t\t{\n\t\t\treturn offset;\n\t\t}\n\n\t\tconst UCHAR* getData() const\n\t\t{\n\t\t\treturn buffer.begin();\n\t\t}\n\n\t\tvoid storeGlobalId(int field_id, SINT64 value)\n\t\t{\n\t\t\tstoreField(field_id, VALUE_GLOBAL_ID, sizeof(SINT64), &amp;value);\n\t\t}\n\n\t\tvoid storeTableIdObjectName(int field_id, SLONG value)\n\t\t{\n\t\t\tstoreField(field_id, VALUE_TABLE_ID_OBJECT_NAME, sizeof(SLONG), &amp;value);\n\t\t}\n\n\t\tvoid storeTableIdSchemaName(int field_id, SLONG value)\n\t\t{\n\t\t\tstoreField(field_id, VALUE_TABLE_ID_SCHEMA_NAME, sizeof(SLONG), &amp;value);\n\t\t}\n\n\t\tvoid storeInteger(int field_id, SINT64 value)\n\t\t{\n\t\t\tstoreField(field_id, VALUE_INTEGER, sizeof(SINT64), &amp;value);\n\t\t}\n\n\t\tvoid storeTimestamp(int field_id, const Firebird::TimeStamp&amp; value)\n\t\t{\n\t\t\tif (!value.isEmpty())\n\t\t\t\tstoreField(field_id, VALUE_TIMESTAMP, sizeof(ISC_TIMESTAMP), &amp;value.value());\n\t\t}\n\n\t\tvoid storeTimestamp(int field_id, const ISC_TIMESTAMP&amp; value)\n\t\t{\n\t\t\tstoreField(field_id, VALUE_TIMESTAMP, sizeof(ISC_TIMESTAMP), &amp;value);\n\t\t}\n\n\t\tvoid storeTimestampTz(int field_id, const ISC_TIMESTAMP_TZ&amp; value)\n\t\t{\n\t\t\tstoreField(field_id, VALUE_TIMESTAMP_TZ, sizeof(ISC_TIMESTAMP_TZ), &amp;value);\n\t\t}\n\n\t\ttemplate &lt;class S&gt;\n\t\tvoid storeString(int field_id, const S&amp; value)\n\t\t{\n\t\t\tif (value.length())\n\t\t\t\tstoreField(field_id, VALUE_STRING, value.length(), value.c_str());\n\t\t}\n\n\t\tvoid storeBoolean(int field_id, bool value)\n\t\t{\n\t\t\tconst UCHAR boolean = value ? 1 : 0;\n\t\t\tstoreField(field_id, VALUE_BOOLEAN, sizeof(UCHAR), &amp;boolean);\n\t\t}\n\n\t\tint getRelationId()\n\t\t{\n\t\t\tfb_assert(!offset);\n\t\t\treturn (ULONG) buffer[offset++];\n\t\t}\n\n\t\tbool getField(DumpField&amp; field)\n\t\t{\n\t\t\tfb_assert(offset);\n\n\t\t\tif (offset &lt; buffer.getCount())\n\t\t\t{\n\t\t\t\tfield.id = (USHORT) buffer[offset++];\n\t\t\t\tfield.type = (ValueType) buffer[offset++];\n\t\t\t\tfb_assert(field.type &gt;= VALUE_GLOBAL_ID &amp;&amp; field.type &lt; VALUE_LAST_MARKER);\n\t\t\t\tmemcpy(&amp;field.length, &amp;buffer[offset], sizeof(ULONG));\n\t\t\t\toffset += sizeof(ULONG);\n\t\t\t\tfield.data = &amp;buffer[offset];\n\t\t\t\toffset += field.length;\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\treturn false;\n\t\t}\n\n\t\tvoid write() const\n\t\t{\n\t\t\tfb_assert(writer);\n\t\t\twriter-&gt;write(*this);\n\t\t}\n\n\tprivate:\n\t\tvoid storeField(int field_id, ValueType type, FB_SIZE_T length, const void* value)\n\t\t{\n\t\t\tconst FB_SIZE_T delta = sizeof(UCHAR) + sizeof(UCHAR) + sizeof(ULONG) + length;\n\t\t\tbuffer.resize(offset + delta);\n\n\t\t\tUCHAR* ptr = buffer.begin() + offset;\n\t\t\tfb_assert(field_id &lt;= int(MAX_UCHAR));\n\t\t\t*ptr++ = (UCHAR) field_id;\n\t\t\t*ptr++ = (UCHAR) type;\n\t\t\tconst ULONG adjusted_length = (ULONG) length;\n\t\t\tmemcpy(ptr, &amp;adjusted_length, sizeof(adjusted_length));\n\t\t\tptr += sizeof(ULONG);\n\t\t\tmemcpy(ptr, value, length);\n\t\t\toffset += (ULONG) delta;\n\t\t}\n\n\t\tFirebird::HalfStaticArray&lt;UCHAR, 1024&gt; buffer;\n\t\tULONG offset;\n\t\tWriter* const writer;\n\t};\n\n\texplicit SnapshotData(MemoryPool&amp; pool)\n\t\t: m_snapshot(pool), m_map(pool), m_counter(0)\n\t{}\n\n\tvirtual ~SnapshotData()\n\t{\n\t\tclearSnapshot();\n\t}\n\n\tvoid putField(thread_db*, Record*, const DumpField&amp;);\n\n\tRecordBuffer* allocBuffer(thread_db*, MemoryPool&amp;, int);\n\tRecordBuffer* getData(const jrd_rel*) const;\n\tRecordBuffer* getData(int) const;\n\tvoid clearSnapshot();\n\nprivate:\n\tFirebird::Array&lt;RelationData&gt; m_snapshot;\n\tFirebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;SINT64, SLONG&gt; &gt; &gt; m_map;\n\tint m_counter;\n};\n\n\nstruct MonitoringHeader : public Firebird::MemoryHeader\n{\n\tULONG used;\n\tULONG allocated;\n};\n\n\nclass MonitoringData final : public Firebird::PermanentStorage, public Firebird::IpcObject\n{\n\tstatic const USHORT MONITOR_VERSION = 6;\n\tstatic const ULONG DEFAULT_SIZE = 1048576;\n\n\ttypedef MonitoringHeader Header;\n\n\tstruct Element\n\t{\n\t\tAttNumber attId;\n\t\tTEXT userName[USERNAME_LENGTH + 1];\n\t\tULONG generation;\n\t\tULONG length;\n\n\t\tinline ULONG getBlockLength() const\n\t\t{\n\t\t\treturn (ULONG) FB_ALIGN(sizeof(Element) + length, FB_ALIGNMENT);\n\t\t}\n\t};\n\npublic:\n\tclass Guard\n\t{\n\tpublic:\n\t\texplicit Guard(MonitoringData* ptr)\n\t\t\t: data(ptr)\n\t\t{\n\t\t\tdata-&gt;acquire();\n\t\t}\n\n\t\t~Guard()\n\t\t{\n\t\t\tdata-&gt;release();\n\t\t}\n\n\tprivate:\n\t\tGuard(const Guard&amp;);\n\t\tGuard&amp; operator=(const Guard&amp;);\n\n\t\tMonitoringData* const data;\n\t};\n\n\tclass Reader\n\t{\n\tpublic:\n\t\tReader(MemoryPool&amp; pool, TempSpace&amp; temp)\n\t\t\t: source(temp), offset(0), buffer(pool)\n\t\t{}\n\n\t\tbool getRecord(SnapshotData::DumpRecord&amp; record)\n\t\t{\n\t\t\tif (offset &lt; source.getSize())\n\t\t\t{\n\t\t\t\tULONG length;\n\t\t\t\tsource.read(offset, &amp;length, sizeof(ULONG));\n\t\t\t\toffset += sizeof(ULONG);\n\n\t\t\t\tUCHAR* const ptr = buffer.getBuffer(length);\n\t\t\t\tsource.read(offset, ptr, length);\n\t\t\t\toffset += length;\n\n\t\t\t\trecord.assign(length, ptr);\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\treturn false;\n\t\t}\n\n\tprivate:\n\t\tTempSpace&amp; source;\n\t\toffset_t offset;\n\t\tFirebird::UCharBuffer buffer;\n\t};\n\n\ttypedef Firebird::HalfStaticArray&lt;AttNumber, 64&gt; SessionList;\n\n\texplicit MonitoringData(Database*);\n\t~MonitoringData();\n\n\tbool initialize(Firebird::SharedMemoryBase*, bool) override;\n\tvoid mutexBug(int osErrorCode, const char* text) override;\n\n\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_DATABASE_SNAPSHOT; }\n\tUSHORT getVersion() const override { return MONITOR_VERSION; }\n\tconst char* getName() const override { return &quot;MonitoringData&quot;; }\n\n\tvoid initSharedFile();\n\n\tvoid acquire();\n\tvoid release();\n\n\tvoid enumerate(const char*, ULONG, SessionList&amp;);\n\tvoid read(const char*, TempSpace&amp;);\n\tULONG setup(AttNumber, const char*, ULONG);\n\tvoid write(ULONG, ULONG, const void*);\n\n\tvoid cleanup(AttNumber);\n\nprivate:\n\t// copying is prohibited\n\tMonitoringData(const MonitoringData&amp;);\n\tMonitoringData&amp; operator =(const MonitoringData&amp;);\n\n\tvoid ensureSpace(ULONG);\n\n\tconst Firebird::string&amp; m_dbId;\n\tFirebird::AutoPtr&lt;Firebird::SharedMemory&lt;MonitoringHeader&gt; &gt; m_sharedMemory;\n\tFirebird::Mutex m_localMutex;\n};\n\n\nclass MonitoringTableScan: public VirtualTableScan\n{\npublic:\n\tMonitoringTableScan(CompilerScratch* csb, const Firebird::string&amp; alias,\n\t\t\t\t\t\tStreamType stream, jrd_rel* relation)\n\t\t: VirtualTableScan(csb, alias, stream, relation)\n\t{}\n\nprotected:\n\tconst Format* getFormat(thread_db* tdbb, jrd_rel* relation) const override;\n\tbool retrieveRecord(thread_db* tdbb, jrd_rel* relation, FB_UINT64 position,\n\t\tRecord* record) const override;\n};\n\n\nclass MonitoringSnapshot : public SnapshotData\n{\npublic:\n\tstatic MonitoringSnapshot* create(thread_db* tdbb);\n\nprotected:\n\tMonitoringSnapshot(thread_db* tdbb, MemoryPool&amp; pool);\n};\n\n\nclass Monitoring\n{\npublic:\n\tstatic int blockingAst(void* ast_object);\n\n\tstatic ULONG checkGeneration(const Database* dbb, const Attachment* attachment)\n\t{\n\t\tconst auto generation = dbb-&gt;getMonitorGeneration();\n\n\t\tif (generation != attachment-&gt;att_monitor_generation)\n\t\t\treturn generation;\n\n\t\treturn 0;\n\t}\n\n\tstatic void checkState(thread_db* tdbb);\n\tstatic SnapshotData* getSnapshot(thread_db* tdbb);\n\n\tstatic void dumpAttachment(thread_db* tdbb, Attachment* attachment, ULONG generation);\n\n\tstatic void publishAttachment(thread_db* tdbb);\n\tstatic void cleanupAttachment(thread_db* tdbb);\n\n\tstatic void putDatabase(thread_db* tdbb, SnapshotData::DumpRecord&amp;);\nprivate:\n\tstatic SINT64 getGlobalId(int);\n\n\tstatic void putAttachment(SnapshotData::DumpRecord&amp;, const Attachment*);\n\tstatic void putTransaction(SnapshotData::DumpRecord&amp;, const jrd_tra*);\n\tstatic void putStatement(SnapshotData::DumpRecord&amp;, const Statement*, const Firebird::string&amp;);\n\tstatic void putRequest(SnapshotData::DumpRecord&amp;, const Request*, const Firebird::string&amp;);\n\tstatic void putCall(SnapshotData::DumpRecord&amp;, const Request*);\n\tstatic void putStatistics(SnapshotData::DumpRecord&amp;, const RuntimeStatistics&amp;, int, int);\n\tstatic void putContextVars(SnapshotData::DumpRecord&amp;, const Firebird::StringMap&amp;, SINT64, bool);\n\tstatic void putMemoryUsage(SnapshotData::DumpRecord&amp;, const Firebird::MemoryStats&amp;, int, int);\n};\n\n} // namespace\n\n#endif // JRD_DATABASE_SNAPSHOT_H\n"}, "/build/src/jrd/lck_proto.h": {"id": "/build/src/jrd/lck_proto.h", "filePath": "src/jrd/lck_proto.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tlck_proto.h\n *\tDESCRIPTION:\tPrototype header file for lck.cpp\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#ifndef JRD_LCK_PROTO_H\n#define JRD_LCK_PROTO_H\n\n#include &quot;../jrd/lck.h&quot;\n\nnamespace Jrd {\n\tenum lck_t;\n}\n\nvoid\tLCK_assert(Jrd::thread_db*, Jrd::Lock*);\nbool\tLCK_cancel_wait(Jrd::Attachment*);\nbool\tLCK_convert(Jrd::thread_db*, Jrd::Lock*, USHORT, SSHORT);\nbool\tLCK_convert_opt(Jrd::thread_db*, Jrd::Lock*, USHORT);\nvoid\tLCK_downgrade(Jrd::thread_db*, Jrd::Lock*);\nvoid\tLCK_fini(Jrd::thread_db*, Jrd::lck_owner_t);\nvoid\tLCK_init(Jrd::thread_db*, Jrd::lck_owner_t);\nbool\tLCK_lock(Jrd::thread_db*, Jrd::Lock*, USHORT, SSHORT);\nbool\tLCK_lock_opt(Jrd::thread_db*, Jrd::Lock*, USHORT, SSHORT);\nLOCK_DATA_T LCK_query_data(Jrd::thread_db*, Jrd::lck_t, USHORT);\nLOCK_DATA_T LCK_read_data(Jrd::thread_db*, Jrd::Lock*);\nvoid\tLCK_release(Jrd::thread_db*, Jrd::Lock*);\nvoid\tLCK_re_post(Jrd::thread_db*, Jrd::Lock*);\nvoid\tLCK_write_data(Jrd::thread_db*, Jrd::Lock*, LOCK_DATA_T);\n\n\nclass AutoLock\n{\npublic:\n\texplicit AutoLock(Jrd::thread_db* tdbb, Jrd::Lock* lck = NULL)\n\t\t: m_tdbb(tdbb),\n\t\t  m_lock(lck)\n\t{\n\t}\n\n\t~AutoLock()\n\t{\n\t\trelease();\n\t}\n\n\tvoid release()\n\t{\n\t\tif (m_lock)\n\t\t{\n\t\t\tif (m_lock-&gt;lck_id)\n\t\t\t\tLCK_release(m_tdbb, m_lock);\n\t\t\tdelete m_lock;\n\t\t\tm_lock = NULL;\n\t\t}\n\t}\n\n\tJrd::Lock* operator-&gt; ()\n\t{\n\t\treturn m_lock;\n\t}\n\n\toperator Jrd::Lock* ()\n\t{\n\t\treturn m_lock;\n\t}\n\n\tJrd::Lock* operator= (Jrd::Lock* lck)\n\t{\n\t\trelease();\n\t\tm_lock = lck;\n\t\treturn m_lock;\n\t}\n\nprivate:\n\tJrd::thread_db* m_tdbb;\n\tJrd::Lock* m_lock;\n};\n\n\n#endif // JRD_LCK_PROTO_H\n"}, "/build/src/jrd/CryptoManager.h": {"id": "/build/src/jrd/CryptoManager.h", "filePath": "src/jrd/CryptoManager.h", "content": "/*\n *\tPROGRAM:\t\tJRD access method\n *\tMODULE:\t\t\tCryptoManager.h\n *\tDESCRIPTION:\tDatabase encryption\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2012 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef JRD_CRYPTO_MANAGER\n#define JRD_CRYPTO_MANAGER\n\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n#include &quot;../common/classes/SyncObject.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/objects_array.h&quot;\n#include &quot;../common/classes/condition.h&quot;\n#include &quot;../jrd/MetaName.h&quot;\n#include &quot;../jrd/Attachment.h&quot;\n#include &quot;../common/classes/GetPlugins.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/status.h&quot;\n#include &quot;firebird/Interface.h&quot;\n\n// forward\n\nnamespace Ods {\n\nstruct pag;\n\n}\n\nnamespace Firebird {\n\nclass ClumpletReader;\n\n}\n\nnamespace Jrd {\n\nclass Database;\nclass Attachment;\nclass jrd_file;\nclass BufferDesc;\nclass thread_db;\nclass Lock;\nclass PageSpace;\n\n\n//\n// This very specific locking class makes it possible to perform traditional read/write locks,\n// but in addition it can on special request perform some predefined action or (in a case when\n// &gt;=1 read lock is taken) set barrier for new locks (new locks will not be granted) and\n// at the moment when last existing lock is released execute that predefined action in context\n// of a thread, releasing last lock.\n//\n// In our case special request is done from AST handler - and therefore called ast.\n// Read locks are done when performing IO+crypt activity - and called ioBegin/ioEnd.\n// Write locks are done when some exclusive activity like changing crypt state is\n// needed - they are full locks and called lockBegin/lockEnd.\n//\n\nclass BarSync\n{\npublic:\n\tclass IBar\n\t{\n\tpublic:\n\t\tvirtual void doOnTakenWriteSync(Jrd::thread_db* tdbb) = 0;\n\t\tvirtual void doOnAst(Jrd::thread_db* tdbb) = 0;\n\t};\n\n\tBarSync(IBar* i)\n\t\t: callback(i), counter(0), lockMode(0), flagWriteLock(false)\n\t{ }\n\n\tclass IoGuard\n\t{\n\tpublic:\n\t\tIoGuard(Jrd::thread_db* p_tdbb, BarSync&amp; p_bs)\n\t\t\t: tdbb(p_tdbb), bs(p_bs)\n\t\t{\n\t\t\tbs.ioBegin(tdbb);\n\t\t}\n\n\t\t~IoGuard()\n\t\t{\n\t\t\tbs.ioEnd(tdbb);\n\t\t}\n\n\tprivate:\n\t\tJrd::thread_db* tdbb;\n\t\tBarSync&amp; bs;\n\t};\n\n\tclass LockGuard\n\t{\n\tpublic:\n\t\tLockGuard(Jrd::thread_db* p_tdbb, BarSync&amp; p_bs)\n\t\t\t: tdbb(p_tdbb), bs(p_bs), flagLocked(false)\n\t\t{ }\n\n\t\tvoid lock()\n\t\t{\n\t\t\tfb_assert(!flagLocked);\n\t\t\tif (!flagLocked)\n\t\t\t{\n\t\t\t\tbs.lockBegin(tdbb);\n\t\t\t\tflagLocked = true;\n\t\t\t}\n\t\t}\n\n\t\t~LockGuard()\n\t\t{\n\t\t\tif (flagLocked)\n\t\t\t{\n\t\t\t\tbs.lockEnd(tdbb);\n\t\t\t}\n\t\t}\n\n\tprivate:\n\t\tJrd::thread_db* tdbb;\n\t\tBarSync&amp; bs;\n\t\tbool flagLocked;\n\t};\n\n\tvoid ioBegin(Jrd::thread_db* tdbb)\n\t{\n\t\tFirebird::MutexLockGuard g(mutex, FB_FUNCTION);\n\n\t\tif (counter &lt; 0)\n\t\t{\n\t\t\tif (!(flagWriteLock &amp;&amp; (thread == getThreadId())))\n\t\t\t{\n\t\t\t\tif ((counter % BIG_VALUE == 0) &amp;&amp; (!flagWriteLock))\n\t\t\t\t{\n\t\t\t\t\tif (lockMode)\n\t\t\t\t\t{\n\t\t\t\t\t\t// Someone is waiting for write lock\n\t\t\t\t\t\tlockCond.notifyOne();\n\t\t\t\t\t\tbarCond.wait(mutex);\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t{\n\t\t\t\t\t\t// Ast done\n\t\t\t\t\t\tcallWriteLockHandler(tdbb);\n\t\t\t\t\t\tcounter = 0;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t\tbarCond.wait(mutex);\n\t\t\t}\n\t\t}\n\t\t++counter;\n\t}\n\n\tvoid ioEnd(Jrd::thread_db* tdbb)\n\t{\n\t\tFirebird::MutexLockGuard g(mutex, FB_FUNCTION);\n\n\t\tif (--counter &lt; 0 &amp;&amp; counter % BIG_VALUE == 0)\n\t\t{\n\t\t\tif (!(flagWriteLock &amp;&amp; (thread == getThreadId())))\n\t\t\t{\n\t\t\t\tif (lockMode)\n\t\t\t\t\tlockCond.notifyOne();\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tcallWriteLockHandler(tdbb);\n\t\t\t\t\tfinishWriteLock();\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\tvoid ast(Jrd::thread_db* tdbb)\n\t{\n\t\tFirebird::MutexLockGuard g(mutex, FB_FUNCTION);\n\t\tif (counter &gt;= 0)\n\t\t{\n\t\t\tcounter -= BIG_VALUE;\n\t\t}\n\t\tcallback-&gt;doOnAst(tdbb);\n\t}\n\n\tvoid lockBegin(Jrd::thread_db* tdbb)\n\t{\n\t\tFirebird::MutexLockGuard g(mutex, FB_FUNCTION);\n\n\t\tif ((counter -= BIG_VALUE) != -BIG_VALUE)\n\t\t{\n\t\t\t++lockMode;\n\t\t\ttry\n\t\t\t{\n\t\t\t\tlockCond.wait(mutex);\n\t\t\t}\n\t\t\tcatch (const Firebird::Exception&amp;)\n\t\t\t{\n\t\t\t\t--lockMode;\n\t\t\t\tthrow;\n\t\t\t}\n\t\t\t--lockMode;\n\t\t}\n\n\t\tthread = getThreadId();\n\t\tflagWriteLock = true;\n\t}\n\n\tvoid lockEnd(Jrd::thread_db* tdbb)\n\t{\n\t\tFirebird::MutexLockGuard g(mutex, FB_FUNCTION);\n\n\t\tflagWriteLock = false;\n\t\tfinishWriteLock();\n\t}\n\nprivate:\n\tvoid callWriteLockHandler(Jrd::thread_db* tdbb)\n\t{\n\t\tthread = getThreadId();\n\t\tflagWriteLock = true;\n\t\tcallback-&gt;doOnTakenWriteSync(tdbb);\n\t\tflagWriteLock = false;\n\t}\n\n\tvoid finishWriteLock()\n\t{\n\t\tif ((counter += BIG_VALUE) == 0)\n\t\t\tbarCond.notifyAll();\n\t\telse\n\t\t\tlockCond.notifyOne();\n\t}\n\n\tFirebird::Condition barCond, lockCond;\n\tFirebird::Mutex mutex;\n\tIBar* callback;\n\tThreadId thread;\n\tint counter;\n\tint lockMode;\n\tbool flagWriteLock;\n\n\tstatic const int BIG_VALUE = 1000000;\n};\n\nclass CryptoManager final : public Firebird::PermanentStorage, public BarSync::IBar\n{\npublic:\n\ttypedef Firebird::GetPlugins&lt;Firebird::IDbCryptPlugin&gt; Factory;\n\n\texplicit CryptoManager(thread_db* tdbb);\n\t~CryptoManager();\n\n\tvoid shutdown(thread_db* tdbb);\n\n\tvoid prepareChangeCryptState(thread_db* tdbb, const MetaName&amp; plugName,\n\t\tconst MetaName&amp; key);\n\tvoid changeCryptState(thread_db* tdbb, const Firebird::string&amp; plugName);\n\tvoid attach(thread_db* tdbb, Attachment* att);\n\tvoid detach(thread_db* tdbb, Attachment* att);\n\n\tvoid startCryptThread(thread_db* tdbb);\n\tvoid terminateCryptThread(thread_db* tdbb, bool wait);\n\tvoid stopThreadUsing(thread_db* tdbb, Attachment* att);\n\n\tclass IOCallback\n\t{\n\tpublic:\n\t\tvirtual bool callback(thread_db* tdbb, FbStatusVector* sv, Ods::pag* page) = 0;\n\t};\n\n\tbool read(thread_db* tdbb, FbStatusVector* sv, Ods::pag* page, IOCallback* io);\n\tbool write(thread_db* tdbb, FbStatusVector* sv, Ods::pag* page, IOCallback* io);\n\n\tvoid cryptThread();\n\n\tbool checkValidation(Firebird::IDbCryptPlugin* crypt);\n\tvoid setDbInfo(Firebird::IDbCryptPlugin* cp);\n\n\tULONG getCurrentPage(thread_db* tdbb) const;\n\tUCHAR getCurrentState(thread_db* tdbb) const;\n\tconst char* getKeyName() const;\n\tconst char* getPluginName() const;\n\tThread::Handle getCryptThreadHandle() const\n\t{\n\t\treturn cryptThreadHandle;\n\t}\n\nprivate:\n\tenum IoResult {SUCCESS_ALL, FAILED_CRYPT, FAILED_IO};\n\tIoResult internalRead(thread_db* tdbb, FbStatusVector* sv, Ods::pag* page, IOCallback* io);\n\tIoResult internalWrite(thread_db* tdbb, FbStatusVector* sv, Ods::pag* page, IOCallback* io);\n\n\tclass Buffer\n\t{\n\tpublic:\n\t\toperator Ods::pag*()\n\t\t{\n\t\t\treturn reinterpret_cast&lt;Ods::pag*&gt;(buf);\n\t\t}\n\n\t\tOds::pag* operator-&gt;()\n\t\t{\n\t\t\treturn reinterpret_cast&lt;Ods::pag*&gt;(buf);\n\t\t}\n\n\tprivate:\n\t\talignas(DIRECT_IO_BLOCK_SIZE) char buf[MAX_PAGE_SIZE];\n\t};\n\n\tclass DbInfo;\n\tfriend class DbInfo;\n\n\tclass DbInfo final : public Firebird::RefCntIface&lt;Firebird::IDbCryptInfoImpl&lt;DbInfo, Firebird::CheckStatusWrapper&gt; &gt;\n\t{\n\tpublic:\n\t\tDbInfo(CryptoManager* cm)\n\t\t\t: cryptoManager(cm)\n\t\t{ }\n\n\t\tvoid destroy()\n\t\t{\n\t\t\tcryptoManager = NULL;\n\t\t}\n\n\t\t// IDbCryptInfo implementation\n\t\tconst char* getDatabaseFullPath(Firebird::CheckStatusWrapper* status);\n\n\tprivate:\n\t\tCryptoManager* cryptoManager;\n\t};\n\n\tstatic int blockingAstChangeCryptState(void*);\n\tvoid blockingAstChangeCryptState();\n\n\t// IBar&#x27;s pure virtual functions are implemented here\n\tvoid doOnTakenWriteSync(thread_db* tdbb);\n\tvoid doOnAst(thread_db* tdbb);\n\n\tvoid loadPlugin(thread_db* tdbb, const char* pluginName);\n\tbool validateAttachment(thread_db* tdbb, Attachment* att, bool consume);\n\tULONG getLastPage(thread_db* tdbb);\n\tvoid writeDbHeader(thread_db* tdbb, ULONG runpage);\n\tvoid calcValidation(Firebird::string&amp; valid, Firebird::IDbCryptPlugin* plugin);\n\tvoid checkValidation();\n\tvoid shutdownConsumers(thread_db* tdbb);\n\n\tvoid lockAndReadHeader(thread_db* tdbb, unsigned flags = 0);\n\tstatic const unsigned CRYPT_HDR_INIT =\t\t0x01;\n\tstatic const unsigned CRYPT_HDR_NOWAIT =\t0x02;\n\tstatic const unsigned CRYPT_RELOAD_PLUGIN =\t0x04;\n\n\tvoid addClumplet(Firebird::string&amp; value, Firebird::ClumpletReader&amp; block, UCHAR tag);\n\tvoid calcDigitalSignature(thread_db* tdbb, Firebird::string&amp; signature, const class Header&amp; hdr);\n\tvoid digitalySignDatabase(thread_db* tdbb, class CchHdr&amp; hdr);\n\tvoid checkDigitalSignature(thread_db* tdbb, const class Header&amp; hdr);\n\n\tBarSync sync;\n\tMetaName keyName, pluginName;\n\tULONG currentPage;\n\tFirebird::Mutex pluginLoadMtx, cryptThreadMtx, holdersMutex;\n\tAttachmentsRefHolder keyProviders, keyConsumers;\n\tFirebird::string hash;\n\tFirebird::RefPtr&lt;DbInfo&gt; dbInfo;\n\tThread::Handle cryptThreadHandle;\n\tFirebird::IDbCryptPlugin* cryptPlugin;\n\tFactory* checkFactory;\n\tDatabase&amp; dbb;\n\tLock* stateLock;\n\tLock* threadLock;\n\tAttachment* cryptAtt;\n\n\t// This counter works only in a case when database encryption is changed.\n\t// Traditional processing of AST can not be used for crypto manager.\n\t// The problem is with taking state lock after AST.\n\t// That should be done before next IO operation to guarantee database\n\t// consistency, but IO operation may be requested from another AST\n\t// (database cache blocking) when &#x27;wait for a lock&#x27; operations are\n\t// prohibited. I.e. we can&#x27;t proceed with normal IO without a lock\n\t// but at the same time can&#x27;t take it.\n\n\t// The solution is to use crypt versions counter in a lock (incremented\n\t// by one each time one issues ALTER DATABASE ENCRYPT/DECRYPT), read\n\t// it when lock can&#x27;t be taken, store in slowIO variable, perform IO\n\t// and compare stored value with current lock data. In case when values\n\t// differ encryption status of database was changed during IO operation\n\t// and such operation should be repeated. When data in lock does not\n\t// change during IO that means that crypt rules remained the same even\n\t// without state lock taken by us and therefore result of IO operation\n\t// is correct. As soon as non-waiting attempt to take state lock succeeds\n\t// slowIO mode is off (slowIO counter becomes zero) and we return to\n\t// normal operation.\n\n\tSINT64 slowIO;\n\tbool crypt, process, flDown, run;\n\n\tbool down() const;\n};\n\n} // namespace Jrd\n\n\n#endif // JRD_CRYPTO_MANAGER\n"}, "/build/src/jrd/Database.h": {"id": "/build/src/jrd/Database.h", "filePath": "src/jrd/Database.h", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         Database.h\n *      DESCRIPTION:    Common descriptions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise C /config/config.h&quot;\n#include &quot;../common/classes/SyncObject.h&quot;\n#include &quot;../common/classes/Synchronize.h&quot;\n#include &quot;../jrd/replication/Manager.h&quot;\n#include &quot;../dsql/Keywords.h&quot;\n#include &quot;fb_types.h&quot;\n\n\n#define SPTHR_DEBUG(A)\n\n\nnamespace Jrd\n{\ntemplate &lt;typename T&gt; class vec;\nclass jrd_rel;\nclass Shadow;\nclass BlobFilter;\nclass TipCache;\nclass BackupManager;\nclass ExternalFileDirectoryList;\nclass MonitoringData;\nclass GarbageCollector;\nclass CryptoManager;\nclass KeywordsMap;\n\n// general purpose vector\ntemplate &lt;class T, BlockType TYPE = type_vec&gt;\nclass vec_base : protected pool_alloc&lt;TYPE&gt;\n{\npublic:\n\ttypedef typename Firebird::Array&lt;T&gt;::iterator iterator;\n\ttypedef typename Firebird::Array&lt;T&gt;::const_iterator const_iterator;\n\n\t/*\n\tstatic vec_base* newVector(MemoryPool&amp; p, int len)\n\t{\n\t\treturn FB_NEW_POOL(p) vec_base&lt;T, TYPE&gt;(p, len);\n\t}\n\n\tstatic vec_base* newVector(MemoryPool&amp; p, const vec_base&amp; base)\n\t{\n\t\treturn FB_NEW_POOL(p) vec_base&lt;T, TYPE&gt;(p, base);\n\t}\n\t*/\n\n\tFB_SIZE_T count() const { return v.getCount(); }\n\tT&amp; operator[](FB_SIZE_T index) { return v[index]; }\n\tconst T&amp; operator[](FB_SIZE_T index) const { return v[index]; }\n\n\titerator begin() { return v.begin(); }\n\titerator end() { return v.end(); }\n\n\tconst_iterator begin() const { return v.begin(); }\n\tconst_iterator end() const { return v.end(); }\n\n\tvoid clear() { v.clear(); }\n\n\tT* memPtr() { return &amp;v[0]; }\n\n\tvoid resize(FB_SIZE_T n, T val = T()) { v.resize(n, val); }\n\n\tvoid operator delete(void* mem) { MemoryPool::globalFree(mem); }\n\nprotected:\n\tvec_base(MemoryPool&amp; p, int len)\n\t\t: v(p, len)\n\t{\n\t\tv.resize(len);\n\t}\n\n\tvec_base(MemoryPool&amp; p, const vec_base&amp; base)\n\t\t: v(p)\n\t{\n\t\tv = base.v;\n\t}\n\nprivate:\n\tFirebird::Array&lt;T&gt; v;\n};\n\ntemplate &lt;typename T&gt;\nclass ve
