 (void*) rpb-&gt;rpb_prior);\n#endif\n\n\t/* We&#x27;re almost ready to go.  To erase the record, we must first\n\tmake a copy of the old record someplace else.  Then we must re-fetch\n\tthe record (for write) and verify that it is legal for us to\n\terase it -- that it was written by a transaction that was committed\n\twhen we started.  If not, the transaction that wrote the record\n\tis either active, dead, or in limbo.  If the transaction is active,\n\twait for it to finish.  If it commits, we can&#x27;t procede and must\n\treturn an update conflict.  If the transaction is dead, back out the\n\told version of the record and try again.  If in limbo, punt.\n\n\tThe above is true only for concurrency &amp; consistency mode transactions.\n\tFor read committed transactions, check if the latest commited version\n\tis the same as the version that was read for the update.  If yes,\n\tthe update can take place.  If some other transaction has modified\n\tthe record and committed, then an update error will be returned.\n   */\n\n\t*temp = *rpb;\n\tRecord* const record = rpb-&gt;rpb_record;\n\n\t// Mark the record as chained version, and re-store it\n\n\ttemp-&gt;rpb_address = record-&gt;getData();\n\tconst Format* const format = record-&gt;getFormat();\n\ttemp-&gt;rpb_length = format-&gt;fmt_length;\n\ttemp-&gt;rpb_format_number = format-&gt;fmt_version;\n\ttemp-&gt;rpb_flags = rpb_chained;\n\n\tif (temp-&gt;rpb_prior)\n\t\ttemp-&gt;rpb_flags |= rpb_delta;\n\n\t// If it makes sense, store a differences record\n\tDifference difference;\n\n\tif (new_rpb)\n\t{\n\t\t// If both descriptors share the same record, there cannot be any difference.\n\t\t// This trick is used by VIO_writelock(), but can be a regular practice as well.\n\t\tif (new_rpb-&gt;rpb_address == temp-&gt;rpb_address)\n\t\t{\n\t\t\tfb_assert(new_rpb-&gt;rpb_length == temp-&gt;rpb_length);\n\n\t\t\tconst ULONG diffLength = difference.makeNoDiff(temp-&gt;rpb_length);\n\n\t\t\tif (diffLength)\n\t\t\t{\n\t\t\t\tfb_assert(diffLength &lt; temp-&gt;rpb_length);\n\n\t\t\t\ttemp-&gt;rpb_address = difference.getData();\n\t\t\t\ttemp-&gt;rpb_length = diffLength;\n\t\t\t\tnew_rpb-&gt;rpb_flags |= rpb_delta;\n\t\t\t}\n\t\t}\n\t\telse\n\t\t{\n\t\t\tconst ULONG diffLength =\n\t\t\t\tdifference.make(new_rpb-&gt;rpb_length, new_rpb-&gt;rpb_address,\n\t\t\t\t\t\t\t\ttemp-&gt;rpb_length, temp-&gt;rpb_address);\n\n\t\t\tif (diffLength &amp;&amp; diffLength &lt; temp-&gt;rpb_length)\n\t\t\t{\n\t\t\t\ttemp-&gt;rpb_address = difference.getData();\n\t\t\t\ttemp-&gt;rpb_length = diffLength;\n\t\t\t\tnew_rpb-&gt;rpb_flags |= rpb_delta;\n\t\t\t}\n\t\t}\n\t}\n\n#ifdef VIO_DEBUG\n\tif (new_rpb)\n\t{\n\t\tVIO_trace(DEBUG_WRITES_INFO,\n\t\t\t&quot;    new record is%sa delta \\n&quot;,\n\t\t\t(new_rpb-&gt;rpb_flags &amp; rpb_delta) ? &quot; &quot; : &quot; NOT &quot;);\n\t}\n#endif\n\n\ttemp-&gt;rpb_number = rpb-&gt;rpb_number;\n\tDPM_store(tdbb, temp, stack, DPM_secondary);\n\n\t// Re-fetch the original record for write in anticipation of\n\t// replacing it with a completely new version.  Make sure it\n\t// was the same one we stored above.\n\trecord_param org_rpb;\n\tTraNumber update_conflict_trans = MAX_TRA_NUMBER; //-1;\n\tconst bool skipLocked = rpb-&gt;rpb_stream_flags &amp; RPB_s_skipLocked;\n\twhile (true)\n\t{\n\t\torg_rpb.rpb_flags = rpb-&gt;rpb_flags;\n\t\torg_rpb.rpb_f_line = rpb-&gt;rpb_f_line;\n\t\torg_rpb.rpb_f_page = rpb-&gt;rpb_f_page;\n\n\t\tif (!DPM_get(tdbb, rpb, LCK_write))\n\t\t{\n\t\t\t// There is no reason why this record would disappear for a\n\t\t\t// snapshot transaction.\n\t\t\tif (!(transaction-&gt;tra_flags &amp; TRA_read_committed) || (transaction-&gt;tra_flags &amp; TRA_read_consistency))\n\t\t\t\tBUGCHECK(186);\t// msg 186 record disappeared\n\t\t\telse\n\t\t\t{\n\t\t\t\t// A read-committed transaction, on the other hand, doesn&#x27;t\n\t\t\t\t// insist on the presence of any version, so versions of records\n\t\t\t\t// and entire records it has already read might be garbage-collected.\n\t\t\t\tif (!DPM_fetch(tdbb, temp, LCK_write))\n\t\t\t\t\tBUGCHECK(291);\t// msg 291 cannot find record back version\n\n\t\t\t\tdelete_record(tdbb, temp, 0, NULL);\n\n\t\t\t\ttdbb-&gt;bumpRelStats(RuntimeStatistics::RECORD_CONFLICTS, relation-&gt;rel_id);\n\t\t\t\treturn PrepareResult::DELETED;\n\t\t\t}\n\t\t}\n\n\t\tint state = TRA_snapshot_state(tdbb, transaction, rpb-&gt;rpb_transaction_nr);\n\n\t\t// Reset (if appropriate) the garbage collect active flag to reattempt the backout\n\n\t\tif (rpb-&gt;rpb_flags &amp; rpb_gc_active)\n\t\t{\n\t\t\tif (checkGCActive(tdbb, rpb, state))\n\t\t\t{\n\t\t\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\t\t\t\twaitGCActive(tdbb, rpb);\n\t\t\t\tcontinue;\n\t\t\t}\n\t\t}\n\n\t\tfb_assert(!(rpb-&gt;rpb_flags &amp; rpb_gc_active));\n\n\t\tif (state == tra_committed)\n\t\t\tstate = check_precommitted(transaction, rpb);\n\n\t\tswitch (state)\n\t\t{\n\t\tcase tra_committed:\n#ifdef VIO_DEBUG\n\t\t\tVIO_trace(DEBUG_READS_INFO,\n\t\t\t\t&quot;    record&#x27;s transaction (%&quot; SQUADFORMAT\n\t\t\t\t&quot;) is committed (my TID - %&quot; SQUADFORMAT&quot;)\\n&quot;,\n\t\t\t\trpb-&gt;rpb_transaction_nr, transaction-&gt;tra_number);\n#endif\n\t\t\tif (rpb-&gt;rpb_flags &amp; rpb_deleted)\n\t\t\t{\n\t\t\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\n\t\t\t\t// get rid of the back records we just created\n\t\t\t\tif (!DPM_fetch(tdbb, temp, LCK_write))\n\t\t\t\t\tBUGCHECK(291);\t// msg 291 cannot find record back version\n\n\t\t\t\tdelete_record(tdbb, temp, 0, NULL);\n\n\t\t\t\tif (writelock || skipLocked || (transaction-&gt;tra_flags &amp; TRA_read_consistency))\n\t\t\t\t{\n\t\t\t\t\ttdbb-&gt;bumpRelStats(RuntimeStatistics::RECORD_CONFLICTS, relation-&gt;rel_id);\n\t\t\t\t\treturn PrepareResult::DELETED;\n\t\t\t\t}\n\n\t\t\t\tIBERROR(188);\t// msg 188 cannot update erased record\n\t\t\t}\n\n\t\t\t// For read committed transactions, if the record version we read\n\t\t\t// and started the update\n\t\t\t// has been updated by another transaction which committed in the\n\t\t\t// meantime, we cannot proceed further - update conflict error.\n\n\t\t\tif ((transaction-&gt;tra_flags &amp; TRA_read_committed) &amp;&amp;\n\t\t\t\t(commit_tid_read != rpb-&gt;rpb_transaction_nr))\n\t\t\t{\n\t\t\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\t\t\t\tif (!DPM_fetch(tdbb, temp, LCK_write))\n\t\t\t\t\tBUGCHECK(291);\t// msg 291 cannot find record back version\n\n\t\t\t\tdelete_record(tdbb, temp, 0, NULL);\n\n\t\t\t\ttdbb-&gt;bumpRelStats(RuntimeStatistics::RECORD_CONFLICTS, relation-&gt;rel_id);\n\t\t\t\treturn PrepareResult::CONFLICT;\n\t\t\t}\n\n\t\t\t/*\n\t\t\t * The case statement for tra_us has been pushed down to this\n\t\t\t * current position as we do not want to give update conflict\n\t\t\t * errors and the &quot;cannot update erased record&quot; within the same\n\t\t\t * transaction. We were getting these errors in case of triggers.\n\t\t\t * A pre-delete trigger could update or delete a record which we\n\t\t\t * are then trying to change.\n\t\t\t * In order to remove these changes and restore original behaviour,\n\t\t\t * move this case statement above the 2 &quot;if&quot; statements.\n\t\t\t * smistry 23-Aug-99\n\t\t\t */\n\t\tcase tra_us:\n#ifdef VIO_DEBUG\n\t\t\tif (state == tra_us)\n\t\t\t{\n\t\t\t\tVIO_trace(DEBUG_READS_INFO,\n\t\t\t\t\t&quot;    record&#x27;s transaction (%&quot; SQUADFORMAT\n\t\t\t\t\t&quot;) is us (my TID - %&quot; SQUADFORMAT&quot;)\\n&quot;,\n\t\t\t\t\trpb-&gt;rpb_transaction_nr, transaction-&gt;tra_number);\n\t\t\t}\n#endif\n\t\t\tif (rpb-&gt;rpb_b_page != temp-&gt;rpb_b_page || rpb-&gt;rpb_b_line != temp-&gt;rpb_b_line ||\n\t\t\t\trpb-&gt;rpb_transaction_nr != temp-&gt;rpb_transaction_nr ||\n\t\t\t\t(rpb-&gt;rpb_flags &amp; rpb_delta) != (temp-&gt;rpb_flags &amp; rpb_delta) ||\n\t\t\t\trpb-&gt;rpb_flags != org_rpb.rpb_flags ||\n\t\t\t\t(rpb-&gt;rpb_flags &amp; rpb_incomplete) &amp;&amp;\n\t\t\t\t\t(rpb-&gt;rpb_f_page != org_rpb.rpb_f_page || rpb-&gt;rpb_f_line != org_rpb.rpb_f_line))\n\t\t\t{\n\n\t\t\t\t// the primary copy of the record was dead and someone else\n\t\t\t\t// backed it out for us.  Our data is OK but our pointers\n\t\t\t\t// aren&#x27;t, so get rid of the record we created and try again\n\n\t\t\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\n\t\t\t\trecord_param temp2 = *temp;\n\t\t\t\tif (!DPM_fetch(tdbb, &amp;temp2, LCK_write))\n\t\t\t\t\tBUGCHECK(291);\t// msg 291 cannot find record back version\n\t\t\t\tdelete_record(tdbb, &amp;temp2, 0, 0);\n\n\t\t\t\ttemp-&gt;rpb_b_page = rpb-&gt;rpb_b_page;\n\t\t\t\ttemp-&gt;rpb_b_line = rpb-&gt;rpb_b_line;\n\t\t\t\ttemp-&gt;rpb_flags &amp;= ~rpb_delta;\n\t\t\t\ttemp-&gt;rpb_flags |= rpb-&gt;rpb_flags &amp; rpb_delta;\n\t\t\t\ttemp-&gt;rpb_transaction_nr = rpb-&gt;rpb_transaction_nr;\n\n\t\t\t\tDPM_store(tdbb, temp, stack, DPM_secondary);\n\t\t\t\tcontinue;\n\t\t\t}\n\n\t\t\t{\n\t\t\t\tconst USHORT pageSpaceID = temp-&gt;getWindow(tdbb).win_page.getPageSpaceID();\n\t\t\t\tstack.push(PageNumber(pageSpaceID, temp-&gt;rpb_page));\n\t\t\t}\n\t\t\treturn PrepareResult::SUCCESS;\n\n\t\tcase tra_active:\n\t\tcase tra_limbo:\n#ifdef VIO_DEBUG\n\t\t\tVIO_trace(DEBUG_READS_INFO,\n\t\t\t\t&quot;    record&#x27;s transaction (%&quot; SQUADFORMAT&quot;) is %s (my TID - %&quot; SQUADFORMAT&quot;)\\n&quot;,\n\t\t\t\trpb-&gt;rpb_transaction_nr, (state == tra_active) ? &quot;active&quot; : &quot;limbo&quot;,\n\t\t\t\ttransaction-&gt;tra_number);\n#endif\n\t\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\n\t\t\t// Wait as long as it takes (if not skipping locks) for an active\n\t\t\t// transaction which has modified the record.\n\n\t\t\tstate = wait(tdbb, transaction, rpb, skipLocked);\n\n\t\t\tif (state == tra_committed)\n\t\t\t\tstate = check_precommitted(transaction, rpb);\n\n\t\t\t// The snapshot says: transaction was active.  The TIP page says: transaction\n\t\t\t// is committed.  Maybe the transaction was rolled back via a transaction\n\t\t\t// level savepoint.  In that case, the record DPM_get-ed via rpb is already\n\t\t\t// backed out.  Try to refetch that record one more time.\n\n\t\t\tif ((state == tra_committed) &amp;&amp; (rpb-&gt;rpb_transaction_nr != update_conflict_trans))\n\t\t\t{\n\t\t\t\tupdate_conflict_trans = rpb-&gt;rpb_transaction_nr;\n\t\t\t\tcontinue;\n\t\t\t}\n\n\t\t\tif (state != tra_dead &amp;&amp; !(temp-&gt;rpb_flags &amp; rpb_deleted))\n\t\t\t{\n\t\t\t\tif (!DPM_fetch(tdbb, temp, LCK_write))\n\t\t\t\t\tBUGCHECK(291);\t// msg 291 cannot find record back version\n\n\t\t\t\tdelete_record(tdbb, temp, 0, NULL);\n\t\t\t}\n\n\t\t\tswitch (state)\n\t\t\t{\n\t\t\tcase tra_committed:\n\t\t\t\t// For SNAPSHOT mode transactions raise error early\n\t\t\t\tif (!(transaction-&gt;tra_flags &amp; TRA_read_committed))\n\t\t\t\t{\n\t\t\t\t\ttdbb-&gt;bumpRelStats(RuntimeStatistics::RECORD_CONFLICTS, relation-&gt;rel_id);\n\n\t\t\t\t\tif (skipLocked)\n\t\t\t\t\t\treturn PrepareResult::SKIP_LOCKED;\n\n\t\t\t\t\t// Cannot use Arg::Num here because transaction number is 64-bit unsigned integer\n\t\t\t\t\tERR_post(Arg::Gds(isc_deadlock) &lt;&lt;\n\t\t\t\t\t\t\t Arg::Gds(isc_update_conflict) &lt;&lt;\n\t\t\t\t\t\t\t Arg::Gds(isc_concurrent_transaction) &lt;&lt; Arg::Int64(update_conflict_trans));\n\t\t\t\t}\n\t\t\t\treturn PrepareResult::CONFLICT;\n\n\t\t\tcase tra_limbo:\n\t\t\t\tif (!(transaction-&gt;tra_flags &amp; TRA_ignore_limbo))\n\t\t\t\t{\n\t\t\t\t\t// Cannot use Arg::Num here because transaction number is 64-bit unsigned integer\n\t\t\t\t\tERR_post(Arg::Gds(isc_rec_in_limbo) &lt;&lt; Arg::Int64(rpb-&gt;rpb_transaction_nr));\n\t\t\t\t}\n\t\t\t\t[[fallthrough]];\n\n\t\t\tcase tra_active:\n\t\t\t\treturn skipLocked ? PrepareResult::SKIP_LOCKED : PrepareResult::LOCK_ERROR;\n\n\t\t\tcase tra_dead:\n\t\t\t\tbreak;\n\n\t\t\tdefault:\n\t\t\t\tfb_assert(false);\n\n\t\t\t} // switch (state)\n\t\t\tbreak;\n\n\t\tcase tra_dead:\n#ifdef VIO_DEBUG\n\t\t\tVIO_trace(DEBUG_READS_INFO,\n\t\t\t\t&quot;    record&#x27;s transaction (%&quot; SQUADFORMAT&quot;) is dead (my TID - %&quot; SQUADFORMAT&quot;)\\n&quot;,\n\t\t\t\trpb-&gt;rpb_transaction_nr, transaction-&gt;tra_number);\n#endif\n\t\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\t\t\tbreak;\n\t\t}\n\n\t\tVIO_backout(tdbb, rpb, transaction);\n\t}\n\n\treturn PrepareResult::SUCCESS;\n}\n\n\nstatic void protect_system_table_insert(thread_db* tdbb,\n\t\t\t\t\t\t\t\t\t\tconst Request* request,\n\t\t\t\t\t\t\t\t\t\tconst jrd_rel* relation,\n\t\t\t\t\t\t\t\t\t\tbool force_flag)\n{\n/**************************************\n *\n *\tp r o t e c t _ s y s t e m _ t a b l e _ i n s e r t\n *\n **************************************\n *\n * Functional description\n *\tDisallow insertions on system tables for everyone except\n *\tthe GBAK restore process and internal (system) requests used\n *\tby the engine itself.\n *\n **************************************/\n\tconst Attachment* const attachment = tdbb-&gt;getAttachment();\n\n\tif (!force_flag)\n\t{\n\t\tif (attachment-&gt;isGbak() || request-&gt;hasInternalStatement())\n\t\t\treturn;\n\t}\n\n\tstatus_exception::raise(Arg::Gds(isc_protect_sys_tab) &lt;&lt;\n\t\t\tArg::Str(&quot;INSERT&quot;) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n}\n\n\nstatic void protect_system_table_delupd(thread_db* tdbb,\n\t\t\t\t\t\t\t\t const jrd_rel* relation,\n\t\t\t\t\t\t\t\t const char* operation,\n\t\t\t\t\t\t\t\t bool force_flag)\n{\n/**************************************\n *\n *\tp r o t e c t _ s y s t e m _ t a b l e _ d e l u p d\n *\n **************************************\n *\n * Functional description\n *\tDisallow DELETE and UPDATE on system tables for everyone except\n *\tthe GBAK restore process and internal (system) requests used\n *\tby the engine itself.\n *\tHere we include sys triggers and the ones authorized to bypass security.\n *\n **************************************/\n\tconst Attachment* const attachment = tdbb-&gt;getAttachment();\n\tconst Request* const request = tdbb-&gt;getRequest();\n\n\tif (!force_flag)\n\t{\n\t\tif (attachment-&gt;isGbak() || request-&gt;hasPowerfulStatement())\n\t\t\treturn;\n\t}\n\n\tstatus_exception::raise(Arg::Gds(isc_protect_sys_tab) &lt;&lt;\n\t\tArg::Str(operation) &lt;&lt; relation-&gt;rel_name.toQuotedString());\n}\n\n\nstatic void purge(thread_db* tdbb, record_param* rpb)\n{\n/**************************************\n *\n *\tp u r g e\n *\n **************************************\n *\n * Functional description\n *\tPurge old versions of a fully mature record.  The record is\n *\tguaranteed not to be deleted.  Return true if the record\n *\tdidn&#x27;t need to be purged or if the purge was done.  Return false\n *\tif the purge couldn&#x27;t happen because somebody else had the record.\n *\tBut the function was made void since nobody checks its return value.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tfb_assert(assert_gc_enabled(tdbb-&gt;getTransaction(), rpb-&gt;rpb_relation));\n\n\tjrd_rel* const relation = rpb-&gt;rpb_relation;\n#ifdef VIO_DEBUG\n\tVIO_trace(DEBUG_TRACE_ALL,\n\t\t&quot;purge (rel_id %u, record_param %&quot; QUADFORMAT&quot;d)\\n&quot;,\n\t\trelation-&gt;rel_id, rpb-&gt;rpb_number.getValue());\n\n\tVIO_trace(DEBUG_TRACE_ALL_INFO,\n\t\t&quot;   record  %&quot; SLONGFORMAT&quot;:%d, rpb_trans %&quot; SQUADFORMAT\n\t\t&quot;, flags %d, back %&quot; SLONGFORMAT&quot;:%d, fragment %&quot; SLONGFORMAT&quot;:%d\\n&quot;,\n\t\trpb-&gt;rpb_page, rpb-&gt;rpb_line, rpb-&gt;rpb_transaction_nr,\n\t\trpb-&gt;rpb_flags, rpb-&gt;rpb_b_page, rpb-&gt;rpb_b_line,\n\t\trpb-&gt;rpb_f_page, rpb-&gt;rpb_f_line);\n#endif\n\n\t// Release and re-fetch the page for write.  Make sure it&#x27;s still the\n\t// same record (give up if not).  Then zap the back pointer and release\n\t// the record.\n\n\trecord_param temp = *rpb;\n\tAutoTempRecord gc_rec(VIO_gc_record(tdbb, relation));\n\tRecord* record = rpb-&gt;rpb_record = gc_rec;\n\n\tVIO_data(tdbb, rpb, relation-&gt;rel_pool);\n\n\ttemp.rpb_prior = rpb-&gt;rpb_prior;\n\trpb-&gt;rpb_record = temp.rpb_record;\n\n\tif (!DPM_get(tdbb, rpb, LCK_write))\n\t{\n\t\t// purge\n\t\tif (tdbb-&gt;getDatabase()-&gt;dbb_flags &amp; DBB_gc_background)\n\t\t\tnotify_garbage_collector(tdbb, rpb);\n\n\t\treturn; //false;\n\t}\n\n\trpb-&gt;rpb_prior = temp.rpb_prior;\n\n\tif (temp.rpb_transaction_nr != rpb-&gt;rpb_transaction_nr || temp.rpb_b_line != rpb-&gt;rpb_b_line ||\n\t\ttemp.rpb_b_page != rpb-&gt;rpb_b_page || rpb-&gt;rpb_b_page == 0)\n\t{\n\t\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\t\treturn; // true;\n\t}\n\n\trpb-&gt;rpb_b_page = 0;\n\trpb-&gt;rpb_b_line = 0;\n\trpb-&gt;rpb_flags &amp;= ~(rpb_delta | rpb_gc_active);\n\tCCH_MARK(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\tDPM_rewrite_header(tdbb, rpb);\n\tCCH_RELEASE(tdbb, &amp;rpb-&gt;getWindow(tdbb));\n\n\tRecordStack staying;\n\tstaying.push(record);\n\tgarbage_collect(tdbb, &amp;temp, rpb-&gt;rpb_page, staying);\n\n\ttdbb-&gt;bumpRelStats(RuntimeStatistics::RECORD_PURGES, relation-&gt;rel_id);\n\treturn; // true;\n}\n\n\nstatic void replace_record(thread_db*\t\ttdbb,\n\t\t\t\t\t\t   record_param*\trpb,\n\t\t\t\t\t\t   PageStack*\t\tstack,\n\t\t\t\t\t\t   const jrd_tra*\ttransaction)\n{\n/**************************************\n *\n *\tr e p l a c e _ r e c o r d\n *\n **************************************\n *\n * Functional description\n *\tReplace a record and get rid of the old tail, if any.  If requested,\n *\tfetch data for the record on the way out.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n#ifdef VIO_DEBUG\n\tjrd_rel* relation = rpb-&gt;rpb_relation;\n\tVIO_trace(DEBUG_TRACE_ALL,\n\t\t&quot;replace_record (rel_id %u, record_param %&quot; QUADFORMAT&quot;d, transaction %&quot; SQUADFORMAT&quot;)\\n&quot;,\n\t\trelation-&gt;rel_id, rpb-&gt;rpb_number.getValue(), transaction ? transaction-&gt;tra_number : 0);\n\n\tVIO_trace(DEBUG_TRACE_ALL_INFO,\n\t\t&quot;   record  %&quot; SLONGFORMAT&quot;:%d, rpb_trans %&quot; SQUADFORMAT\n\t\t&quot;, flags %d, back %&quot; SLONGFORMAT&quot;:%d, fragment %&quot; SLONGFORMAT\n\t\t&quot;:%d, prior %p\\n&quot;,\n\t\trpb-&gt;rpb_page, rpb-&gt;rpb_line, rpb-&gt;rpb_transaction_nr,\n\t\trpb-&gt;rpb_flags, rpb-&gt;rpb_b_page, rpb-&gt;rpb_b_line,\n\t\trpb-&gt;rpb_f_page, rpb-&gt;rpb_f_line, (void*) rpb-&gt;rpb_prior);\n#endif\n\n\trecord_param temp = *rpb;\n\tDPM_update(tdbb, rpb, stack, transaction);\n\tdelete_tail(tdbb, &amp;temp, rpb-&gt;rpb_page);\n\n\tif ((rpb-&gt;rpb_flags &amp; rpb_delta) &amp;&amp; !rpb-&gt;rpb_prior)\n\t\trpb-&gt;rpb_prior = rpb-&gt;rpb_record;\n}\n\n\nstatic void refresh_fk_fields(thread_db* tdbb, Record* old_rec, record_param* cur_rpb,\n\trecord_param* new_rpb)\n{\n/**************************************\n *\n *\tr e f r e s h _ f k _ f i e l d s\n *\n **************************************\n *\n * Functional description\n *\tUpdate new_rpb with foreign key fields values changed by cascade triggers.\n *  Consider self-referenced foreign keys only.\n *\n *  old_rec - old record before modify\n *  cur_rpb - just read record with possibly changed FK fields\n *  new_rpb - new record evaluated by modify statement and before-triggers\n *\n **************************************/\n\tjrd_rel* relation = cur_rpb-&gt;rpb_relation;\n\n\tMET_scan_partners(tdbb, relation);\n\n\tif (!(relation-&gt;rel_foreign_refs.frgn_relations))\n\t\treturn;\n\n\tconst FB_SIZE_T frgnCount = relation-&gt;rel_foreign_refs.frgn_relations-&gt;count();\n\tif (!frgnCount)\n\t\treturn;\n\n\tRelationPages* relPages = cur_rpb-&gt;rpb_relation-&gt;getPages(tdbb);\n\n\t// Collect all fields of all foreign keys\n\tSortedArray&lt;int, InlineStorage&lt;int, 16&gt; &gt; fields;\n\n\tfor (FB_SIZE_T i = 0; i &lt; frgnCount; i++)\n\t{\n\t\t// We need self-referenced FK&#x27;s only\n\t\tif ((*relation-&gt;rel_foreign_refs.frgn_relations)[i] == relation-&gt;rel_id)\n\t\t{\n\t\t\tindex_desc idx;\n\t\t\tidx.idx_id = idx_invalid;\n\n\t\t\tif (BTR_lookup(tdbb, relation, (*relation-&gt;rel_foreign_refs.frgn_reference_ids)[i],\n\t\t\t\t\t&amp;idx, relPages))\n\t\t\t{\n\t\t\t\tfb_assert(idx.idx_flags &amp; idx_foreign);\n\n\t\t\t\tfor (int fld = 0; fld &lt; idx.idx_count; fld++)\n\t\t\t\t{\n\t\t\t\t\tconst int fldNum = idx.idx_rpt[fld].idx_field;\n\t\t\t\t\tif (!fields.exist(fldNum))\n\t\t\t\t\t\tfields.add(fldNum);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\tif (fields.isEmpty())\n\t\treturn;\n\n\tDSC desc1, desc2;\n\tfor (FB_SIZE_T idx = 0; idx &lt; fields.getCount(); idx++)\n\t{\n\t\t// Detect if user changed FK field by himself.\n\t\tconst int fld = fields[idx];\n\t\tconst bool flag_old = EVL_field(relation, old_rec, fld, &amp;desc1);\n\t\tconst bool flag_new = EVL_field(relation, new_rpb-&gt;rpb_record, fld, &amp;desc2);\n\n\t\t// If field was not changed by user - pick up possible modification by\n\t\t// system cascade trigger\n\t\tif (flag_old == flag_new &amp;&amp;\n\t\t\t(!flag_old || (flag_old &amp;&amp; !MOV_compare(tdbb, &amp;desc1, &amp;desc2))))\n\t\t{\n\t\t\tconst bool flag_tmp = EVL_field(relation, cur_rpb-&gt;rpb_record, fld, &amp;desc1);\n\t\t\tif (flag_tmp)\n\t\t\t\tMOV_move(tdbb, &amp;desc1, &amp;desc2);\n\t\t\telse\n\t\t\t\tnew_rpb-&gt;rpb_record-&gt;setNull(fld);\n\t\t}\n\t}\n}\n\n\nstatic SSHORT set_metadata_id(thread_db* tdbb, Record* record, USHORT field_id, drq_type_t dyn_id,\n\tconst char* name)\n{\n/**************************************\n *\n *\ts e t _ m e t a d a t a _ i d\n *\n **************************************\n *\n * Functional description\n *\tAssign the auto generated ID to a particular field\n *  and return it to the caller.\n *\n **************************************/\n\tdsc desc1;\n\n\tif (EVL_field(0, record, field_id, &amp;desc1))\n\t\treturn MOV_get_long(tdbb, &amp;desc1, 0);\n\n\tSSHORT value = (SSHORT) DYN_UTIL_gen_unique_id(tdbb, dyn_id, name);\n\tdsc desc2;\n\tdesc2.makeShort(0, &amp;value);\n\tMOV_move(tdbb, &amp;desc2, &amp;desc1);\n\trecord-&gt;clearNull(field_id);\n\treturn value;\n}\n\n\n// Assign the 31-bit auto generated ID to a particular field\nstatic void set_nbackup_id(thread_db* tdbb, Record* record, USHORT field_id, drq_type_t dyn_id,\n\tconst char* name)\n{\n\tdsc desc1;\n\n\tif (EVL_field(0, record, field_id, &amp;desc1))\n\t\treturn;\n\n\tSLONG value = (SLONG) DYN_UTIL_gen_unique_id(tdbb, dyn_id, name);\n\tdsc desc2;\n\tdesc2.makeLong(0, &amp;value);\n\tMOV_move(tdbb, &amp;desc2, &amp;desc1);\n\trecord-&gt;clearNull(field_id);\n}\n\n\nstatic void set_owner_name(thread_db* tdbb, Record* record, USHORT field_id)\n{\n/**************************************\n *\n *\ts e t _ o w n e r _ n a m e\n *\n **************************************\n *\n * Functional description\n *\tSet the owner name for the metadata object.\n *\n **************************************/\n\tdsc desc1;\n\n\tif (!EVL_field(0, record, field_id, &amp;desc1))\n\t{\n\t\tconst auto attachment = tdbb-&gt;getAttachment();\n\t\tconst MetaString&amp; name = attachment-&gt;getEffectiveUserName();\n\n\t\tif (name.hasData())\n\t\t{\n\t\t\tdsc desc2;\n\t\t\tdesc2.makeText((USHORT) name.length(), CS_METADATA, (UCHAR*) name.c_str());\n\t\t\tMOV_move(tdbb, &amp;desc2, &amp;desc1);\n\t\t\trecord-&gt;clearNull(field_id);\n\t\t}\n\t}\n}\n\n\nstatic bool set_security_class(thread_db* tdbb, Record* record, USHORT field_id)\n{\n/**************************************\n *\n *\ts e t _ s e c u r i t y _ c l a s s\n *\n **************************************\n *\n * Functional description\n *\tGenerate the security class name.\n *\n **************************************/\n\tdsc desc1;\n\n\tif (!EVL_field(0, record, field_id, &amp;desc1))\n\t{\n\t\tconst SINT64 value = DYN_UTIL_gen_unique_id(tdbb, drq_g_nxt_sec_id, SQL_SECCLASS_GENERATOR);\n\t\tMetaName name;\n\t\tname.printf(&quot;%s%&quot; SQUADFORMAT, SQL_SECCLASS_PREFIX, value);\n\t\tdsc desc2;\n\t\tdesc2.makeText((USHORT) name.length(), CS_ASCII, (UCHAR*) name.c_str());\n\t\tMOV_move(tdbb, &amp;desc2, &amp;desc1);\n\t\trecord-&gt;clearNull(field_id);\n\n\t\treturn true;\n\t}\n\n\treturn false;\n}\n\n\nstatic void set_system_flag(thread_db* tdbb, Record* record, USHORT field_id)\n{\n/**************************************\n *\n *\ts e t _ s y s t e m _ f l a g\n *\n **************************************\n *\n * Functional description\n *\tSet the value of a particular field to a known binary value.\n *\n **************************************/\n\tdsc desc1;\n\n\tif (!EVL_field(0, record, field_id, &amp;desc1))\n\t{\n\t\tSSHORT flag = 0;\n\t\tdsc desc2;\n\t\tdesc2.makeShort(0, &amp;flag);\n\t\tMOV_move(tdbb, &amp;desc2, &amp;desc1);\n\t\trecord-&gt;clearNull(field_id);\n\t}\n}\n\n\nvoid VIO_update_in_place(thread_db* tdbb,\n\t\t\t\t\t\t\tjrd_tra* transaction, record_param* org_rpb, record_param* new_rpb)\n{\n/**************************************\n *\n *\tu p d a t e _ i n _ p l a c e\n *\n **************************************\n *\n * Functional description\n *\tModify a record in place.  This is used for system transactions\n *\tand for multiple modifications of a user record.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tjrd_rel* const relation = org_rpb-&gt;rpb_relation;\n#ifdef VIO_DEBUG\n\tVIO_trace(DEBUG_TRACE_ALL,\n\t\t&quot;update_in_place (rel_id %u, transaction %&quot; SQUADFORMAT&quot;, org_rpb %&quot; QUADFORMAT&quot;d, &quot;\n\t\t&quot;new_rpb %&quot; QUADFORMAT&quot;d)\\n&quot;,\n\t\trelation-&gt;rel_id, transaction ? transaction-&gt;tra_number : 0, org_rpb-&gt;rpb_number.getValue(),\n\t\tnew_rpb ? new_rpb-&gt;rpb_number.getValue() : 0);\n\n\tVIO_trace(DEBUG_TRACE_ALL_INFO,\n\t\t&quot;   old record  %&quot; SLONGFORMAT&quot;:%d, rpb_trans %&quot; SQUADFORMAT\n\t\t&quot;, flags %d, back %&quot; SLONGFORMAT&quot;:%d, fragment %&quot; SLONGFORMAT&quot;:%d\\n&quot;,\n\t\torg_rpb-&gt;rpb_page, org_rpb-&gt;rpb_line, org_rpb-&gt;rpb_transaction_nr,\n\t\torg_rpb-&gt;rpb_flags, org_rpb-&gt;rpb_b_page, org_rpb-&gt;rpb_b_line,\n\t\torg_rpb-&gt;rpb_f_page, org_rpb-&gt;rpb_f_line);\n#endif\n\n\tPageStack *stack = NULL;\n\tif (new_rpb-&gt;rpb_record) // we apply update to new data\n\t{\n\t\tstack = &amp;new_rpb-&gt;rpb_record-&gt;getPrecedence();\n\t}\n\telse if (org_rpb-&gt;rpb_record) // we apply update to delete stub\n\t{\n\t\tstack = &amp;org_rpb-&gt;rpb_record-&gt;getPrecedence();\n\t}\n\t// According to DS on firebird-devel: it is not possible update non-existing record so stack is\n\t// unavoidable assigned to some value\n\tfb_assert(stack);\n\n\tRecord* const old_data = org_rpb-&gt;rpb_record;\n\n\t// If the old version has been stored as a delta, things get complicated.  Clearly,\n\t// if we overwrite the current record, the differences from the current version\n\t// becomes meaningless.  What we need to do is replace the old &quot;delta&quot; record\n\t// with an old &quot;complete&quot; record, update in placement, then delete the old delta record\n\n\tAutoTempRecord gc_rec;\n\n\trecord_param temp2;\n\tconst Record* prior = org_rpb-&gt;rpb_prior;\n\tif (prior)\n\t{\n\t\ttemp2 = *org_rpb;\n\t\ttemp2.rpb_record = gc_rec = VIO_gc_record(tdbb, relation);\n\t\ttemp2.rpb_page = org_rpb-&gt;rpb_b_page;\n\t\ttemp2.rpb_line = org_rpb-&gt;rpb_b_line;\n\n\t\tif (!DPM_fetch(tdbb, &amp;temp2, LCK_read))\n\t\t\tBUGCHECK(291);\t // msg 291 cannot find record back version\n\n\t\tVIO_data(tdbb, &amp;temp2, relation-&gt;rel_pool);\n\n\t\ttemp2.rpb_flags = rpb_chained;\n\n\t\tif (temp2.rpb_prior)\n\t\t\ttemp2.rpb_flags |= rpb_delta;\n\n\t\ttemp2.rpb_number = org_rpb-&gt;rpb_number;\n\t\tDPM_store(tdbb, &amp;temp2, *stack, DPM_secondary);\n\n\t\tconst USHORT pageSpaceID = temp2.getWindow(tdbb).win_page.getPageSpaceID();\n\t\tstack-&gt;push(PageNumber(pageSpaceID, temp2.rpb_page));\n\t}\n\n\tif (!DPM_get(tdbb, org_rpb, LCK_write))\n\t\tBUGCHECK(186);\t// msg 186 record disappeared\n\n\tif (prior)\n\t{\n\t\tconst ULONG page = org_rpb-&gt;rpb_b_page;\n\t\tconst USHORT line = org_rpb-&gt;rpb_b_line;\n\t\torg_rpb-&gt;rpb_b_page = temp2.rpb_page;\n\t\torg_rpb-&gt;rpb_b_line = temp2.rpb_line;\n\t\torg_rpb-&gt;rpb_flags &amp;= ~rpb_delta;\n\t\torg_rpb-&gt;rpb_prior = NULL;\n\t\ttemp2.rpb_page = page;\n\t\ttemp2.rpb_line = line;\n\t}\n\n\tUCHAR* const save_address = org_rpb-&gt;rpb_address;\n\tconst ULONG length = org_rpb-&gt;rpb_length;\n\tconst USHORT format_number = org_rpb-&gt;rpb_format_number;\n\torg_rpb-&gt;rpb_address = new_rpb-&gt;rpb_address;\n\torg_rpb-&gt;rpb_length = new_rpb-&gt;rpb_length;\n\torg_rpb-&gt;rpb_format_number = new_rpb-&gt;rpb_format_number;\n\torg_rpb-&gt;rpb_flags &amp;= ~rpb_deleted;\n\torg_rpb-&gt;rpb_flags |= new_rpb-&gt;rpb_flags &amp; (rpb_uk_modified|rpb_deleted);\n\n\treplace_record(tdbb, org_rpb, stack, transaction);\n\n\torg_rpb-&gt;rpb_address = save_address;\n\torg_rpb-&gt;rpb_length = length;\n\torg_rpb-&gt;rpb_format_number = format_number;\n\torg_rpb-&gt;rpb_undo = old_data;\n\n\tif (transaction-&gt;tra_flags &amp; TRA_system)\n\t{\n\t\t// Garbage collect.  Start by getting all existing old versions (other\n\t\t// than the immediate two in question).\n\n\t\tRecordStack staying;\n\t\tlist_staying(tdbb, org_rpb, staying);\n\t\tstaying.push(new_rpb-&gt;rpb_record);\n\n\t\tRecordStack going;\n\t\tgoing.push(org_rpb-&gt;rpb_record);\n\n\t\tIDX_garbage_collect(tdbb, org_rpb, going, staying);\n\t\tBLB_garbage_collect(tdbb, going, staying, org_rpb-&gt;rpb_page, relation);\n\n\t\tstaying.pop();\n\t\tclearRecordStack(staying);\n\t}\n\n\tif (prior)\n\t{\n\t\tif (!DPM_fetch(tdbb, &amp;temp2, LCK_write))\n\t\t\tBUGCHECK(291);\t\t// msg 291 cannot find record back version\n\n\t\tdelete_record(tdbb, &amp;temp2, org_rpb-&gt;rpb_page, NULL);\n\t}\n}\n\n\nstatic void verb_post(thread_db* tdbb,\n\t\t\t\t\t  jrd_tra* transaction,\n\t\t\t\t\t  record_param* rpb,\n\t\t\t\t\t  Record* old_data)\n{\n/**************************************\n *\n *\tv e r b _ p o s t\n *\n **************************************\n *\n * Functional description\n *\tPost a record update under verb control to a transaction.\n *\tIf the previous version of the record was created by\n *\tthis transaction in a different verb, save the data as well.\n *\n * Input:\n *  rpb:\t\tNew content of the record\n *\told_data:\tOnly supplied if an in-place operation was performed\n *\t\t\t\t(i.e. update_in_place).\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tVerbAction* const action = transaction-&gt;tra_save_point-&gt;createAction(rpb-&gt;rpb_relation);\n\n\tif (!RecordBitmap::test(action-&gt;vct_records, rpb-&gt;rpb_number.getValue()))\n\t{\n\t\tRBM_SET(transaction-&gt;tra_pool, &amp;action-&gt;vct_records, rpb-&gt;rpb_number.getValue());\n\n\t\tif (old_data)\n\t\t{\n\t\t\t// An update-in-place is being posted to this savepoint, and this\n\t\t\t// savepoint hasn&#x27;t seen this record before.\n\n\t\t\tif (!action-&gt;vct_undo)\n\t\t\t{\n\t\t\t\taction-&gt;vct_undo =\n\t\t\t\t\tFB_NEW_POOL(*transaction-&gt;tra_pool) UndoItemTree(*transaction-&gt;tra_pool);\n\t\t\t}\n\n\t\t\taction-&gt;vct_undo-&gt;add(UndoItem(transaction, rpb-&gt;rpb_number, old_data));\n\t\t}\n\t}\n\telse if (old_data)\n\t{\n\t\t// Double update us posting. The old_data will not be used,\n\t\t// so make sure we garbage collect before we lose track of the\n\t\t// in-place-updated record.\n\t\taction-&gt;garbageCollectIdxLite(tdbb, transaction, rpb-&gt;rpb_number.getValue(), action, old_data);\n\t}\n}\n"}, "/build/src/jrd/Attachment.cpp": {"id": "/build/src/jrd/Attachment.cpp", "filePath": "src/jrd/Attachment.cpp", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         Attachment.cpp\n *      DESCRIPTION:    JRD Attachment class\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../jrd/Attachment.h&quot;\n#include &quot;../jrd/MetaName.h&quot;\n#include &quot;../jrd/Database.h&quot;\n#include &quot;../jrd/Function.h&quot;\n#include &quot;../jrd/nbak.h&quot;\n#include &quot;../jrd/trace/TraceManager.h&quot;\n#include &quot;../jrd/PreparedStatement.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/intl.h&quot;\n\n#include &quot;../jrd/blb_proto.h&quot;\n#include &quot;../jrd/exe_proto.h&quot;\n#include &quot;../jrd/ext_proto.h&quot;\n#include &quot;../jrd/intl_proto.h&quot;\n#include &quot;../jrd/met_proto.h&quot;\n#include &quot;../jrd/scl_proto.h&quot;\n#include &quot;../jrd/tra_proto.h&quot;\n#include &quot;../jrd/tpc_proto.h&quot;\n\n#include &quot;../jrd/extds/ExtDS.h&quot;\n#include &quot;../jrd/ProfilerManager.h&quot;\n#include &quot;../jrd/replication/Applier.h&quot;\n#include &quot;../jrd/replication/Manager.h&quot;\n\n#include &quot;../dsql/DsqlBatch.h&quot;\n#include &quot;../dsql/DsqlStatementCache.h&quot;\n\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../common/TimeZoneUtil.h&quot;\n#include &quot;../common/isc_proto.h&quot;\n#include &quot;../common/classes/RefMutex.h&quot;\n\n\nusing namespace Jrd;\nusing namespace Firebird;\n\n/// class ActiveSnapshots\n\nActiveSnapshots::ActiveSnapshots(Firebird::MemoryPool&amp; p) :\n\tm_snapshots(p),\n\tm_lastCommit(CN_ACTIVE),\n\tm_releaseCount(0),\n\tm_slots_used(0)\n{\n}\n\n\nCommitNumber ActiveSnapshots::getSnapshotForVersion(CommitNumber version_cn)\n{\n\tif (version_cn &gt; m_lastCommit)\n\t\treturn CN_ACTIVE;\n\n\tif (m_snapshots.locate(locGreatEqual, version_cn))\n\t\treturn m_snapshots.current();\n\n\treturn m_lastCommit;\n}\n\n\n/// class Attachment\n\n\n// static method\nJrd::Attachment* Jrd::Attachment::create(Database* dbb, JProvider* provider)\n{\n\tMemoryPool* const pool = dbb-&gt;createPool();\n\n\ttry\n\t{\n\t\tAttachment* const attachment = FB_NEW_POOL(*pool) Attachment(pool, dbb, provider);\n\t\tpool-&gt;setStatsGroup(attachment-&gt;att_memory_stats);\n\t\treturn attachment;\n\t}\n\tcatch (const Firebird::Exception&amp;)\n\t{\n\t\tdbb-&gt;deletePool(pool);\n\t\tthrow;\n\t}\n}\n\n\n// static method\nvoid Jrd::Attachment::destroy(Attachment* const attachment)\n{\n\tif (!attachment)\n\t\treturn;\n\n\tStableAttachmentPart* sAtt = attachment-&gt;getStable();\n\tfb_assert(sAtt);\n\tif (sAtt)\n\t{\n\t\t// break link between attachment and its stable part\n\t\tsAtt-&gt;cancel();\n\t\tattachment-&gt;setStable(NULL);\n\n\t\tsAtt-&gt;manualUnlock(attachment-&gt;att_flags);\n\t}\n\n\tthread_db* tdbb = JRD_get_thread_data();\n\n\tjrd_tra* sysTransaction = attachment-&gt;getSysTransaction();\n\tif (sysTransaction)\n\t{\n\t\t// unwind any active system requests\n\t\twhile (sysTransaction-&gt;tra_requests)\n\t\t\tEXE_unwind(tdbb, sysTransaction-&gt;tra_requests);\n\n\t\tjrd_tra::destroy(NULL, sysTransaction);\n\t}\n\n\tDatabase* const dbb = attachment-&gt;att_database;\n\tMemoryPool* const pool = attachment-&gt;att_pool;\n\tFirebird::MemoryStats temp_stats;\n\tpool-&gt;setStatsGroup(temp_stats);\n\n\tdelete attachment;\n\n\tdbb-&gt;deletePool(pool);\n}\n\n\nMemoryPool* Jrd::Attachment::createPool()\n{\n\tMemoryPool* const pool = MemoryPool::createPool(att_pool, att_memory_stats);\n\tauto stats = FB_NEW_POOL(*pool) MemoryStats(&amp;att_memory_stats);\n\tpool-&gt;setStatsGroup(*stats);\n\tatt_pools.add(pool);\n\treturn pool;\n}\n\n\nvoid Jrd::Attachment::deletePool(MemoryPool* pool)\n{\n\tif (pool)\n\t{\n\t\tatt_pools.findAndRemove(pool);\n\n#ifdef DEBUG_LCK_LIST\n\t\t// hvlad: this could be slow, use only when absolutely necessary\n\t\tfor (Lock* lock = att_long_locks; lock; )\n\t\t{\n\t\t\tLock* next = lock-&gt;lck_next;\n\t\t\tif (BtrPageGCLock::checkPool(lock, pool))\n\t\t\t{\n\t\t\t\tgds__log(&quot;DEBUG_LCK_LIST: found not detached lock 0x%p in deleting pool 0x%p&quot;, lock, pool);\n\n\t\t\t\t//delete lock;\n\t\t\t\tlock-&gt;setLockAttachment(NULL);\n\t\t\t}\n\t\t\tlock = next;\n\t\t}\n#endif\n\t\tMemoryPool::deletePool(pool);\n\t}\n}\n\n\nbool Jrd::Attachment::backupStateWriteLock(thread_db* tdbb, SSHORT wait)\n{\n\tif (att_backup_state_counter++)\n\t\treturn true;\n\n\tif (att_database-&gt;dbb_backup_manager-&gt;lockStateWrite(tdbb, wait))\n\t\treturn true;\n\n\tatt_backup_state_counter--;\n\treturn false;\n}\n\n\nvoid Jrd::Attachment::backupStateWriteUnLock(thread_db* tdbb)\n{\n\tif (--att_backup_state_counter == 0)\n\t\tatt_database-&gt;dbb_backup_manager-&gt;unlockStateWrite(tdbb);\n}\n\n\nbool Jrd::Attachment::backupStateReadLock(thread_db* tdbb, SSHORT wait)\n{\n\tif (att_backup_state_counter++)\n\t\treturn true;\n\n\tif (att_database-&gt;dbb_backup_manager-&gt;lockStateRead(tdbb, wait))\n\t\treturn true;\n\n\tatt_backup_state_counter--;\n\treturn false;\n}\n\n\nvoid Jrd::Attachment::backupStateReadUnLock(thread_db* tdbb)\n{\n\tif (--att_backup_state_counter == 0)\n\t\tatt_database-&gt;dbb_backup_manager-&gt;unlockStateRead(tdbb);\n}\n\n\nJrd::Attachment::Attachment(MemoryPool* pool, Database* dbb, JProvider* provider)\n\t: att_pool(pool),\n\t  att_memory_stats(&amp;dbb-&gt;dbb_memory_stats),\n\t  att_database(dbb),\n\t  att_user(nullptr),\n\t  att_ss_user(nullptr),\n\t  att_user_ids(*pool),\n\t  att_active_snapshots(*pool),\n\t  att_statements(*pool),\n\t  att_requests(*pool),\n\t  att_lock_owner_id(Database::getLockOwnerId()),\n\t  att_backup_state_counter(0),\n\t  att_stats(*pool),\n\t  att_base_stats(*pool),\n\t  att_working_directory(*pool),\n\t  att_filename(*pool),\n\t  att_timestamp(TimeZoneUtil::getCurrentSystemTimeStamp()),\n\t  att_context_vars(*pool),\n\t  ddlTriggersContext(*pool),\n\t  att_network_protocol(*pool),\n\t  att_remote_crypt(*pool),\n\t  att_remote_address(*pool),\n\t  att_remote_process(*pool),\n\t  att_client_version(*pool),\n\t  att_remote_protocol(*pool),\n\t  att_remote_host(*pool),\n\t  att_remote_os_user(*pool),\n\t  att_dsql_cache(*pool),\n\t  att_udf_pointers(*pool),\n\t  att_ext_connection(NULL),\n\t  att_ext_parent(NULL),\n\t  att_ext_call_depth(0),\n\t  att_trace_manager(FB_NEW_POOL(*att_pool) TraceManager(this)),\n\t  att_bindings(*pool),\n\t  att_dest_bind(&amp;att_bindings),\n\t  att_original_timezone(TimeZoneUtil::getSystemTimeZone()),\n\t  att_current_timezone(att_original_timezone),\n\t  att_schema_search_path(FB_NEW_POOL(*pool) AnyRef&lt;ObjectsArray&lt;MetaString&gt;&gt;(*pool)),\n\t  att_system_schema_search_path(FB_NEW_POOL(*pool) AnyRef&lt;ObjectsArray&lt;MetaString&gt;&gt;(*pool)),\n\t  att_unqualified_charset_resolved_cache_search_path(att_schema_search_path),\n\t  att_unqualified_charset_resolved_cache(*pool),\n\t  att_parallel_workers(0),\n\t  att_repl_appliers(*pool),\n\t  att_utility(UTIL_NONE),\n\t  att_procedures(*pool),\n\t  att_functions(*pool),\n\t  att_generators(*pool),\n\t  att_internal(*pool),\n\t  att_dyn_req(*pool),\n\t  att_internal_cached_statements(*pool),\n\t  att_dec_status(DecimalStatus::DEFAULT),\n\t  att_charsets(*pool),\n\t  att_charset_ids(*pool),\n\t  att_pools(*pool),\n\t  att_idle_timeout(0),\n\t  att_stmt_timeout(0),\n\t  att_batches(*pool),\n\t  att_initial_options(*pool),\n\t  att_provider(provider)\n{\n\tatt_internal.grow(irq_MAX);\n\tatt_dyn_req.grow(drq_MAX);\n\n\tatt_system_schema_search_path-&gt;push(SYSTEM_SCHEMA);\n}\n\n\nJrd::Attachment::~Attachment()\n{\n\tif (att_idle_timer)\n\t\tatt_idle_timer-&gt;stop();\n\n\tdelete att_trace_manager;\n\n\tfor (Function** iter = att_functions.begin(); iter &lt; att_functions.end(); ++iter)\n\t{\n\t\tFunction* const function = *iter;\n\t\tif (function)\n\t\t\tdelete function;\n\t}\n\n\tfor (jrd_prc** iter = att_procedures.begin(); iter &lt; att_procedures.end(); ++iter)\n\t{\n\t\tjrd_prc* const procedure = *iter;\n\t\tif (procedure)\n\t\t\tdelete procedure;\n\t}\n\n\twhile (att_pools.hasData())\n\t\tdeletePool(att_pools.pop());\n\n\t// For normal attachments that happens in release_attachment(),\n\t// but for special ones like GC should be done also in dtor -\n\t// they do not (and should not) call release_attachment().\n\t// It&#x27;s no danger calling detachLocks()\n\t// once more here because it nulls att_long_locks.\n\t//\t\tAP 2007\n\tdetachLocks();\n}\n\n\nJrd::PreparedStatement* Jrd::Attachment::prepareStatement(thread_db* tdbb, jrd_tra* transaction,\n\tconst string&amp; text, Firebird::MemoryPool* pool)\n{\n\tpool = pool ? pool : tdbb-&gt;getDefaultPool();\n\treturn FB_NEW_POOL(*pool) PreparedStatement(tdbb, *pool, this, transaction, text, true);\n}\n\n\nJrd::PreparedStatement* Jrd::Attachment::prepareStatement(thread_db* tdbb, jrd_tra* transaction,\n\tconst PreparedStatement::Builder&amp; builder, Firebird::MemoryPool* pool)\n{\n\tpool = pool ? pool : tdbb-&gt;getDefaultPool();\n\treturn FB_NEW_POOL(*pool) PreparedStatement(tdbb, *pool, this, transaction, builder, true);\n}\n\n\nPreparedStatement* Jrd::Attachment::prepareUserStatement(thread_db* tdbb, jrd_tra* transaction,\n\tconst string&amp; text, Firebird::MemoryPool* pool)\n{\n\tpool = pool ? pool : tdbb-&gt;getDefaultPool();\n\treturn FB_NEW_POOL(*pool) PreparedStatement(tdbb, *pool, this, transaction, text, false);\n}\n\n\nMetaName Jrd::Attachment::nameToMetaCharSet(thread_db* tdbb, const MetaName&amp; name)\n{\n\tif (att_charset == CS_METADATA || att_charset == CS_NONE)\n\t\treturn name;\n\n\tUCHAR buffer[MAX_SQL_IDENTIFIER_SIZE];\n\tULONG len = INTL_convert_bytes(tdbb, CS_METADATA, buffer, MAX_SQL_IDENTIFIER_LEN,\n\t\tatt_charset, (const BYTE*) name.c_str(), name.length(), ERR_post);\n\tbuffer[len] = &#x27;\\0&#x27;;\n\n\treturn MetaName((const char*) buffer);\n}\n\n\nMetaName Jrd::Attachment::nameToUserCharSet(thread_db* tdbb, const MetaName&amp; name)\n{\n\tif (att_charset == CS_METADATA || att_charset == CS_NONE)\n\t\treturn name;\n\n\tUCHAR buffer[MAX_SQL_IDENTIFIER_SIZE];\n\tULONG len = INTL_convert_bytes(tdbb, att_charset, buffer, MAX_SQL_IDENTIFIER_LEN,\n\t\tCS_METADATA, (const BYTE*) name.c_str(), name.length(), ERR_post);\n\tbuffer[len] = &#x27;\\0&#x27;;\n\n\treturn MetaName((const char*) buffer);\n}\n\n\nstring Jrd::Attachment::stringToUserCharSet(thread_db* tdbb, const string&amp; str)\n{\n\tif (att_charset == CS_METADATA || att_charset == CS_NONE)\n\t\treturn str;\n\n\tHalfStaticArray&lt;UCHAR, BUFFER_MEDIUM&gt; buffer(str.length() * sizeof(ULONG));\n\tconst ULONG len = INTL_convert_bytes(tdbb, att_charset, buffer.begin(), buffer.getCapacity(),\n\t\tCS_METADATA, (const BYTE*) str.c_str(), str.length(), ERR_post);\n\n\treturn string((char*) buffer.begin(), len);\n}\n\n\n// We store in CS_METADATA.\nvoid Jrd::Attachment::storeMetaDataBlob(thread_db* tdbb, jrd_tra* transaction,\n\tbid* blobId, const string&amp; text, USHORT fromCharSet)\n{\n\tUCharBuffer bpb;\n\tif (fromCharSet != CS_METADATA)\n\t\tBLB_gen_bpb(isc_blob_text, isc_blob_text, fromCharSet, CS_METADATA, bpb);\n\n\tblb* blob = blb::create2(tdbb, transaction, blobId, bpb.getCount(), bpb.begin());\n\ttry\n\t{\n\t\tblob-&gt;BLB_put_data(tdbb, (const UCHAR*) text.c_str(), text.length());\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tblob-&gt;BLB_close(tdbb);\n\t\tthrow;\n\t}\n\n\tblob-&gt;BLB_close(tdbb);\n}\n\n\n// We store raw stuff; don&#x27;t attempt to translate.\nvoid Jrd::Attachment::storeBinaryBlob(thread_db* tdbb, jrd_tra* transaction,\n\tbid* blobId, const ByteChunk&amp; chunk)\n{\n\tblb* blob = blb::create2(tdbb, transaction, blobId, 0, NULL);\n\ttry\n\t{\n\t\tblob-&gt;BLB_put_data(tdbb, chunk.data, chunk.length);\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tblob-&gt;BLB_close(tdbb);\n\t\tthrow;\n\t}\n\n\tblob-&gt;BLB_close(tdbb);\n}\n\nvoid Jrd::Attachment::releaseBatches()\n{\n\twhile (att_batches.hasData())\n\t\tdelete att_batches.pop();\n}\n\nvoid Jrd::Attachment::releaseGTTs(thread_db* tdbb)\n{\n\tif (!att_relations)\n\t\treturn;\n\n\tfor (FB_SIZE_T i = 1; i &lt; att_relations-&gt;count(); i++)\n\t{\n\t\tjrd_rel* relation = (*att_relations)[i];\n\t\tif (relation &amp;&amp; (relation-&gt;rel_flags &amp; REL_temp_conn) &amp;&amp;\n\t\t\t!(relation-&gt;rel_flags &amp; (REL_deleted | REL_deleting)))\n\t\t{\n\t\t\trelation-&gt;delPages(tdbb);\n\t\t}\n\t}\n}\n\nstatic void runDBTriggers(thread_db* tdbb, TriggerAction action)\n{\n\tfb_assert(action == TRIGGER_CONNECT || action == TRIGGER_DISCONNECT);\n\n\tconst Database* dbb = tdbb-&gt;getDatabase();\n\tconst Attachment* att = tdbb-&gt;getAttachment();\n\tfb_assert(dbb);\n\tfb_assert(att);\n\n\tconst unsigned trgKind = (action == TRIGGER_CONNECT) ? DB_TRIGGER_CONNECT : DB_TRIGGER_DISCONNECT;\n\n\tconst TrigVector* const triggers =\tatt-&gt;att_triggers[trgKind];\n\tif (!triggers || triggers-&gt;isEmpty())\n\t\treturn;\n\n\tThreadStatusGuard temp_status(tdbb);\n\tjrd_tra* transaction = NULL;\n\n\ttry\n\t{\n\t\ttransaction = TRA_start(tdbb, 0, NULL);\n\t\tEXE_execute_db_triggers(tdbb, transaction, action);\n\t\tTRA_commit(tdbb, transaction, false);\n\t\treturn;\n\t}\n\tcatch (const Exception&amp; /*ex*/)\n\t{\n\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_bugcheck) &amp;&amp; transaction)\n\t\t{\n\t\t\ttry\n\t\t\t{\n\t\t\t\tTRA_rollback(tdbb, transaction, false, false);\n\t\t\t}\n\t\t\tcatch (const Exception&amp; /*ex2*/)\n\t\t\t{\n\t\t\t}\n\t\t}\n\t\tthrow;\n\t}\n}\n\nvoid Jrd::Attachment::resetSession(thread_db* tdbb, jrd_tra** traHandle)\n{\n\tjrd_tra* oldTran = traHandle ? *traHandle : nullptr;\n\tif (att_transactions)\n\t{\n\t\tint n = 0;\n\t\tbool err = false;\n\t\tfor (const jrd_tra* tra = att_transactions; tra; tra = tra-&gt;tra_next)\n\t\t{\n\t\t\tn++;\n\t\t\tif (tra != oldTran &amp;&amp; !(tra-&gt;tra_flags &amp; TRA_prepared))\n\t\t\t\terr = true;\n\t\t}\n\n\t\t// Cannot reset user session\n\t\t// There are open transactions (@1 active)\n\t\tif (err)\n\t\t{\n\t\t\tERR_post(Arg::Gds(isc_ses_reset_err) &lt;&lt;\n\t\t\t\tArg::Gds(isc_ses_reset_open_trans) &lt;&lt; Arg::Num(n));\n\t\t}\n\t}\n\n\tAutoSetRestoreFlag&lt;ULONG&gt; flags(&amp;att_flags, ATT_resetting, true);\n\n\tULONG oldFlags = 0;\n\tSSHORT oldTimeout = 0;\n\tRefPtr&lt;JTransaction&gt; jTran;\n\tbool shutAtt = false;\n\ttry\n\t{\n\t\t// Run ON DISCONNECT trigger before reset\n\t\tif (!(att_flags &amp; ATT_no_db_triggers))\n\t\t\trunDBTriggers(tdbb, TRIGGER_DISCONNECT);\n\n\t\t// shutdown attachment on any error after this point\n\t\tshutAtt = true;\n\n\t\tif (oldTran)\n\t\t{\n\t\t\toldFlags = oldTran-&gt;tra_flags;\n\t\t\toldTimeout = oldTran-&gt;tra_lock_timeout;\n\t\t\tjTran = oldTran-&gt;getInterface(false);\n\n\t\t\t// It will also run run ON TRANSACTION ROLLBACK triggers\n\t\t\tJRD_rollback_transaction(tdbb, oldTran);\n\t\t\t*traHandle = nullptr;\n\t\t}\n\n\t\t// Session was reset with warning(s)\n\t\t// Transaction is rolled back due to session reset, all changes are lost\n\t\tif (oldFlags &amp; TRA_write)\n\t\t{\n\t\t\tERR_post_warning(Arg::Warning(isc_ses_reset_warn) &lt;&lt;\n\t\t\t\tArg::Gds(isc_ses_reset_tran_rollback));\n\t\t}\n\n\t\tatt_initial_options.resetAttachment(this);\n\n\t\t// reset timeouts\n\t\tsetIdleTimeout(0);\n\t\tsetStatementTimeout(0);\n\n\t\t// reset context variables\n\t\tatt_context_vars.clear();\n\n\t\t// reset role\n\t\tif (att_user-&gt;resetRole())\n\t\t\tSCL_release_all(att_security_classes);\n\n\t\t// reset GTT&#x27;s\n\t\treleaseGTTs(tdbb);\n\n\t\t// Run ON CONNECT trigger after reset\n\t\tif (!(att_flags &amp; ATT_no_db_triggers))\n\t\t\trunDBTriggers(tdbb, TRIGGER_CONNECT);\n\n\t\tif (oldTran)\n\t\t{\n\t\t\tjrd_tra* newTran = TRA_start(tdbb, oldFlags, oldTimeout);\n\t\t\tif (jTran)\n\t\t\t{\n\t\t\t\tfb_assert(jTran-&gt;getHandle() == NULL);\n\n\t\t\t\tnewTran-&gt;setInterface(jTran);\n\t\t\t\tjTran-&gt;setHandle(newTran);\n\t\t\t}\n\n\t\t\t// run ON TRANSACTION START triggers\n\t\t\tJRD_run_trans_start_triggers(tdbb, newTran);\n\n\t\t\ttdbb-&gt;setTransaction(newTran);\n\t\t\t*traHandle = newTran;\n\t\t}\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\tif (att_ext_call_depth &amp;&amp; !shutAtt)\n\t\t{\n\t\t\tflags.release(ATT_resetting);\t\t// reset is incomplete - keep state\n\t\t\tshutAtt = true;\n\t\t}\n\n\t\tif (shutAtt)\n\t\t\tsignalShutdown(isc_ses_reset_failed);\n\n\t\tArg::StatusVector error;\n\t\terror.assign(ex);\n\t\terror.prepend(Arg::Gds(shutAtt ? isc_ses_reset_failed : isc_ses_reset_err));\n\t\terror.raise();\n\t}\n}\n\n\nvoid Jrd::Attachment::signalCancel()\n{\n\tatt_flags |= ATT_cancel_raise;\n\n\tif (att_ext_connection &amp;&amp; att_ext_connection-&gt;isConnected())\n\t\tatt_ext_connection-&gt;cancelExecution(false);\n\n\tLCK_cancel_wait(this);\n}\n\n\nvoid Jrd::Attachment::signalShutdown(ISC_STATUS code)\n{\n\tatt_flags |= ATT_shutdown;\n\tif (getStable())\n\t\tgetStable()-&gt;setShutError(code);\n\n\tif (att_ext_connection &amp;&amp; att_ext_connection-&gt;isConnected())\n\t\tatt_ext_connection-&gt;cancelExecution(true);\n\n\tLCK_cancel_wait(this);\n}\n\n\nvoid Jrd::Attachment::mergeStats(bool pageStatsOnly)\n{\n\tMutexLockGuard guard(att_database-&gt;dbb_stats_mutex, FB_FUNCTION);\n\tatt_database-&gt;dbb_stats.adjustPageStats(att_base_stats, att_stats);\n\tif (!pageStatsOnly)\n\t{\n\t\tatt_database-&gt;dbb_stats.adjust(att_base_stats, att_stats, true);\n\t\tatt_base_stats.assign(att_stats);\n\t}\n}\n\n\nbool Attachment::hasActiveRequests() const noexcept\n{\n\tfor (const jrd_tra* transaction = att_transactions;\n\t\ttransaction; transaction = transaction-&gt;tra_next)\n\t{\n\t\tfor (const Request* request = transaction-&gt;tra_requests;\n\t\t\trequest; request = request-&gt;req_tra_next)\n\t\t{\n\t\t\tif (request-&gt;req_transaction &amp;&amp; (request-&gt;req_flags &amp; req_active))\n\t\t\t\treturn true;\n\t\t}\n\t}\n\n\treturn false;\n}\n\n\n// Find an inactive incarnation of a system request. If necessary, clone it.\nRequest* Jrd::Attachment::findSystemRequest(thread_db* tdbb, USHORT id, USHORT which)\n{\n\tconstexpr int MAX_RECURSION = 100;\n\n\t// If the request hasn&#x27;t been compiled or isn&#x27;t active, there&#x27;re nothing to do.\n\n\t//Database::CheckoutLockGuard guard(this, dbb_cmp_clone_mutex);\n\n\tfb_assert(which == IRQ_REQUESTS || which == DYN_REQUESTS || which == CACHED_REQUESTS);\n\n\tif (which == CACHED_REQUESTS &amp;&amp; id &gt;= att_internal_cached_statements.getCount())\n\t\tatt_internal_cached_statements.grow(id + 1);\n\n\tStatement* statement =\n\t\twhich == IRQ_REQUESTS ? att_internal[id] :\n\t\twhich == DYN_REQUESTS ? att_dyn_req[id] :\n\t\tatt_internal_cached_statements[id];\n\n\tif (!statement)\n\t\treturn NULL;\n\n\t// Look for requests until we find one that is available.\n\n\tfor (int n = 0;; ++n)\n\t{\n\t\tif (n &gt; MAX_RECURSION)\n\t\t{\n\t\t\tERR_post(Arg::Gds(isc_no_meta_update) &lt;&lt;\n\t\t\t\t\t\tArg::Gds(isc_req_depth_exceeded) &lt;&lt; Arg::Num(MAX_RECURSION));\n\t\t\t// Msg363 &quot;request depth exceeded. (Recursive definition?)&quot;\n\t\t}\n\n\t\tRequest* clone = statement-&gt;getRequest(tdbb, n);\n\n\t\tif (!(clone-&gt;req_flags &amp; (req_active | req_reserved)))\n\t\t{\n\t\t\tclone-&gt;req_flags |= req_reserved;\n\t\t\treturn clone;\n\t\t}\n\t}\n}\n\nvoid Jrd::Attachment::initLocks(thread_db* tdbb)\n{\n\t// Take out lock on attachment id\n\n\tconst lock_ast_t ast = (att_flags &amp; ATT_system) ? NULL : blockingAstShutdown;\n\n\tLock* lock = FB_NEW_RPT(*att_pool, 0)\n\t\tLock(tdbb, sizeof(AttNumber), LCK_attachment, this, ast);\n\tatt_id_lock = lock;\n\tlock-&gt;setKey(att_attachment_id);\n\tLCK_lock(tdbb, lock, LCK_EX, LCK_WAIT);\n\n\t// Allocate and take the monitoring lock\n\n\tlock = FB_NEW_RPT(*att_pool, 0)\n\t\tLock(tdbb, sizeof(AttNumber), LCK_monitor, this, blockingAstMonitor);\n\tatt_monitor_lock = lock;\n\tlock-&gt;setKey(att_attachment_id);\n\tLCK_lock(tdbb, lock, LCK_EX, LCK_WAIT);\n\n\t// Unless we&#x27;re a system attachment, allocate cancellation and replication locks\n\n\tif (!(att_flags &amp; ATT_system))\n\t{\n\t\tlock = FB_NEW_RPT(*att_pool, 0)\n\t\t\tLock(tdbb, sizeof(AttNumber), LCK_cancel, this, blockingAstCancel);\n\t\tatt_cancel_lock = lock;\n\t\tlock-&gt;setKey(att_attachment_id);\n\n\t\tlock = FB_NEW_RPT(*att_pool, 0)\n\t\t\tLock(tdbb, 0, LCK_repl_tables, this, blockingAstReplSet);\n\t\tatt_repl_lock = lock;\n\n\t\tlock = FB_NEW_RPT(*att_pool, 0)\n\t\t\tLock(tdbb, sizeof(AttNumber), LCK_profiler_listener, this, ProfilerManager::blockingAst);\n\t\tatt_profiler_listener_lock = lock;\n\t\tlock-&gt;setKey(att_attachment_id);\n\t\tLCK_lock(tdbb, lock, LCK_EX, LCK_WAIT);\n\t}\n}\n\nvoid Jrd::Attachment::releaseLocks(thread_db* tdbb)\n{\n\t// Go through relations and indices and release\n\t// all existence locks that might have been taken.\n\n\tvec&lt;jrd_rel*&gt;* rvector = att_relations;\n\n\tif (rvector)\n\t{\n\t\tvec&lt;jrd_rel*&gt;::iterator ptr, end;\n\n\t\tfor (ptr = rvector-&gt;begin(), end = rvector-&gt;end(); ptr &lt; end; ++ptr)\n\t\t{\n\t\t\tjrd_rel* relation = *ptr;\n\n\t\t\tif (relation)\n\t\t\t{\n\t\t\t\tif (relation-&gt;rel_existence_lock)\n\t\t\t\t{\n\t\t\t\t\tLCK_release(tdbb, relation-&gt;rel_existence_lock);\n\t\t\t\t\trelation-&gt;rel_flags |= REL_check_existence;\n\t\t\t\t\trelation-&gt;rel_use_count = 0;\n\t\t\t\t}\n\n\t\t\t\tif (relation-&gt;rel_partners_lock)\n\t\t\t\t{\n\t\t\t\t\tLCK_release(tdbb, relation-&gt;rel_partners_lock);\n\t\t\t\t\trelation-&gt;rel_flags |= REL_check_partners;\n\t\t\t\t}\n\n\t\t\t\tif (relation-&gt;rel_rescan_lock)\n\t\t\t\t{\n\t\t\t\t\tLCK_release(tdbb, relation-&gt;rel_rescan_lock);\n\t\t\t\t\trelation-&gt;rel_flags &amp;= ~REL_scanned;\n\t\t\t\t}\n\n\t\t\t\tif (relation-&gt;rel_gc_lock)\n\t\t\t\t{\n\t\t\t\t\tLCK_release(tdbb, relation-&gt;rel_gc_lock);\n\t\t\t\t\trelation-&gt;rel_flags |= REL_gc_lockneed;\n\t\t\t\t}\n\n\t\t\t\tfor (IndexLock* index = relation-&gt;rel_index_locks; index; index = index-&gt;idl_next)\n\t\t\t\t{\n\t\t\t\t\tif (index-&gt;idl_lock)\n\t\t\t\t\t{\n\t\t\t\t\t\tindex-&gt;idl_count = 0;\n\t\t\t\t\t\tLCK_release(tdbb, index-&gt;idl_lock);\n\t\t\t\t\t}\n\t\t\t\t}\n\n\t\t\t\tfor (IndexBlock* index = relation-&gt;rel_index_blocks; index; index = index-&gt;idb_next)\n\t\t\t\t{\n\t\t\t\t\tif (index-&gt;idb_lock)\n\t\t\t\t\t\tLCK_release(tdbb, index-&gt;idb_lock);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\t// Release all procedure existence locks that might have been taken\n\n\tfor (jrd_prc** iter = att_procedures.begin(); iter &lt; att_procedures.end(); ++iter)\n\t{\n\t\tjrd_prc* const procedure = *iter;\n\n\t\tif (procedure)\n\t\t{\n\t\t\tif (procedure-&gt;existenceLock)\n\t\t\t{\n\t\t\t\tLCK_release(tdbb, procedure-&gt;existenceLock);\n\t\t\t\tprocedure-&gt;flags |= Routine::FLAG_CHECK_EXISTENCE;\n\t\t\t\tprocedure-&gt;useCount = 0;\n\t\t\t}\n\t\t}\n\t}\n\n\t// Release all function existence locks that might have been taken\n\n\tfor (Function** iter = att_functions.begin(); iter &lt; att_functions.end(); ++iter)\n\t{\n\t\tFunction* const function = *iter;\n\n\t\tif (function)\n\t\t\tfunction-&gt;releaseLocks(tdbb);\n\t}\n\n\t// Release collation existence locks\n\n\treleaseIntlObjects(tdbb);\n\n\t// Release the DSQL cache locks\n\n\tDSqlCache::Accessor accessor(&amp;att_dsql_cache);\n\tfor (bool getResult = accessor.getFirst(); getResult; getResult = accessor.getNext())\n\t\tLCK_release(tdbb, accessor.current()-&gt;second.lock);\n\n\t// Release DSQL statement cache lock\n\n\tif (att_dsql_instance)\n\t\tatt_dsql_instance-&gt;dbb_statement_cache-&gt;shutdown(tdbb);\n\n\t// Release the remaining locks\n\n\tif (att_id_lock)\n\t\tLCK_release(tdbb, att_id_lock);\n\n\tif (att_cancel_lock)\n\t\tLCK_release(tdbb, att_cancel_lock);\n\n\tif (att_monitor_lock)\n\t\tLCK_release(tdbb, att_monitor_lock);\n\n\tif (att_temp_pg_lock)\n\t\tLCK_release(tdbb, att_temp_pg_lock);\n\n\tif (att_repl_lock)\n\t\tLCK_release(tdbb, att_repl_lock);\n\n\tif (att_profiler_listener_lock)\n\t\tLCK_release(tdbb, att_profiler_listener_lock);\n\n\t// And release the system requests\n\n\tfor (Statement** itr = att_internal.begin(); itr != att_internal.end(); ++itr)\n\t{\n\t\tif (*itr)\n\t\t\t(*itr)-&gt;release(tdbb);\n\t}\n\n\tfor (Statement** itr = att_dyn_req.begin(); itr != att_dyn_req.end(); ++itr)\n\t{\n\t\tif (*itr)\n\t\t\t(*itr)-&gt;release(tdbb);\n\t}\n}\n\nvoid Jrd::Attachment::detachLocks()\n{\n/**************************************\n *\n *\td e t a c h L o c k s\n *\n **************************************\n *\n * Functional description\n * Bug #7781, need to null out the attachment pointer of all locks which\n * were hung off this attachment block, to ensure that the attachment\n * block doesn&#x27;t get dereferenced after it is released\n *\n **************************************/\n\tif (!att_long_locks)\n\t\treturn;\n\n\tLock* long_lock = att_long_locks;\n\twhile (long_lock)\n\t{\n#ifdef DEBUG_LCK_LIST\n\t\tatt_long_locks_type = long_lock-&gt;lck_next_type;\n#endif\n\t\tlong_lock = long_lock-&gt;detach();\n\t}\n\n\tatt_long_locks = NULL;\n}\n\nvoid Jrd::Attachment::releaseRelations(thread_db* tdbb)\n{\n\tif (att_relations)\n\t{\n\t\tvec&lt;jrd_rel*&gt;* vector = att_relations;\n\n\t\tfor (vec&lt;jrd_rel*&gt;::iterator ptr = vector-&gt;begin(), end = vector-&gt;end(); ptr &lt; end; ++ptr)\n\t\t{\n\t\t\tjrd_rel* relation = *ptr;\n\n\t\t\tif (relation)\n\t\t\t{\n\t\t\t\tif (relation-&gt;rel_file)\n\t\t\t\t\tEXT_fini(relation, false);\n\n\t\t\t\tdelete relation;\n\t\t\t}\n\t\t}\n\t}\n}\n\nint Jrd::Attachment::blockingAstShutdown(void* ast_object)\n{\n\tJrd::Attachment* const attachment = static_cast&lt;Jrd::Attachment*&gt;(ast_object);\n\n\ttry\n\t{\n\t\tDatabase* const dbb = attachment-&gt;att_database;\n\n\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION, attachment-&gt;att_id_lock);\n\n\t\tattachment-&gt;signalShutdown(isc_att_shut_killed);\n\n\t\tJRD_shutdown_attachment(attachment);\n\t}\n\tcatch (const Exception&amp;)\n\t{} // no-op\n\n\treturn 0;\n}\n\nint Jrd::Attachment::blockingAstCancel(void* ast_object)\n{\n\tJrd::Attachment* const attachment = static_cast&lt;Jrd::Attachment*&gt;(ast_object);\n\n\ttry\n\t{\n\t\tDatabase* const dbb = attachment-&gt;att_database;\n\n\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION, attachment-&gt;att_cancel_lock);\n\n\t\tattachment-&gt;signalCancel();\n\n\t\tLCK_release(tdbb, attachment-&gt;att_cancel_lock);\n\t}\n\tcatch (const Exception&amp;)\n\t{} // no-op\n\n\treturn 0;\n}\n\nint Jrd::Attachment::blockingAstMonitor(void* ast_object)\n{\n\tconst auto attachment = static_cast&lt;Jrd::Attachment*&gt;(ast_object);\n\n\ttry\n\t{\n\t\tconst auto dbb = attachment-&gt;att_database;\n\n\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION, attachment-&gt;att_monitor_lock);\n\n\t\tif (const auto generation = Monitoring::checkGeneration(dbb, attachment))\n\t\t{\n\t\t\ttry\n\t\t\t{\n\t\t\t\tMonitoring::dumpAttachment(tdbb, attachment, generation);\n\t\t\t}\n\t\t\tcatch (const Exception&amp; ex)\n\t\t\t{\n\t\t\t\tiscLogException(&quot;Cannot dump the monitoring data&quot;, ex);\n\t\t\t}\n\t\t}\n\n\t\tLCK_downgrade(tdbb, attachment-&gt;att_monitor_lock);\n\t\tattachment-&gt;att_flags |= ATT_monitor_disabled;\n\t}\n\tcatch (const Exception&amp;)\n\t{} // no-op\n\n\treturn 0;\n}\n\nvoid Jrd::Attachment::SyncGuard::init(const char* f, bool\n#ifdef DEV_BUILD\n\toptional\n#endif\n\t)\n{\n\tfb_assert(optional || jStable);\n\n\tif (jStable)\n\t{\n\t\tjStable-&gt;getSync()-&gt;enter(f);\n\t\tif (!jStable-&gt;getHandle())\n\t\t{\n\t\t\tjStable-&gt;getSync()-&gt;leave();\n\t\t\tArg::Gds(isc_att_shutdown).raise();\n\t\t}\n\t}\n}\n\nvoid StableAttachmentPart::manualLock(ULONG&amp; flags, const ULONG whatLock)\n{\n\tfb_assert(!(flags &amp; whatLock));\n\n\tif (whatLock &amp; ATT_async_manual_lock)\n\t{\n\t\tasync.enter(FB_FUNCTION);\n\t\tflags |= ATT_async_manual_lock;\n\t}\n\n\tif (whatLock &amp; ATT_manual_lock)\n\t{\n\t\tmainSync.enter(FB_FUNCTION);\n\t\tflags |= ATT_manual_lock;\n\t}\n}\n\nvoid StableAttachmentPart::manualUnlock(ULONG&amp; flags)\n{\n\tif (flags &amp; ATT_manual_lock)\n\t{\n\t\tflags &amp;= ~ATT_manual_lock;\n\t\tmainSync.leave();\n\t}\n\tmanualAsyncUnlock(flags);\n}\n\nvoid StableAttachmentPart::manualAsyncUnlock(ULONG&amp; flags)\n{\n\tif (flags &amp; ATT_async_manual_lock)\n\t{\n\t\tflags &amp;= ~ATT_async_manual_lock;\n\t\tasync.leave();\n\t}\n}\n\nvoid StableAttachmentPart::doOnIdleTimer(TimerImpl*)\n{\n\t// Ensure attachment is still alive and still idle\n\n\tEnsureUnlock&lt;Sync, NotRefCounted&gt; guard(*this-&gt;getSync(), FB_FUNCTION);\n\tif (!guard.tryEnter())\n\t\treturn;\n\n\tAttachment* att = this-&gt;getHandle();\n\tatt-&gt;signalShutdown(isc_att_shut_idle);\n\tJRD_shutdown_attachment(att);\n}\n\nJAttachment* Attachment::getInterface() noexcept\n{\n\treturn att_stable-&gt;getInterface();\n}\n\nunsigned int Attachment::getActualIdleTimeout() const\n{\n\tunsigned int timeout = att_database-&gt;dbb_config-&gt;getConnIdleTimeout() * 60;\n\tif (att_idle_timeout &amp;&amp; (att_idle_timeout &lt; timeout || !timeout))\n\t\ttimeout = att_idle_timeout;\n\n\treturn timeout;\n}\n\nvoid Attachment::setupIdleTimer(bool clear)\n{\n\tconst unsigned int timeout = clear ? 0 : getActualIdleTimeout();\n\tif (!timeout || hasActiveRequests())\n\t{\n\t\tif (att_idle_timer)\n\t\t\tatt_idle_timer-&gt;reset(0);\n\t}\n\telse\n\t{\n\t\tif (!att_idle_timer)\n\t\t{\n\t\t\tusing IdleTimer = TimerWithRef&lt;StableAttachmentPart&gt;;\n\n\t\t\tauto idleTimer = FB_NEW IdleTimer(getStable());\n\t\t\tidleTimer-&gt;setOnTimer(&amp;StableAttachmentPart::onIdleTimer);\n\t\t\tatt_idle_timer = idleTimer;\n\t\t}\n\n\t\tatt_idle_timer-&gt;reset(timeout);\n\t}\n}\n\nUserId* Attachment::getUserId(const MetaString&amp; userName)\n{\n\t// It&#x27;s necessary to keep specified sql role of user\n\tif (att_user &amp;&amp; att_user-&gt;getUserName() == userName)\n\t\treturn att_user;\n\n\tUserId* result = NULL;\n\tif (!att_user_ids.get(userName, result))\n\t{\n\t\tresult = FB_NEW_POOL(*att_pool) UserId(*att_pool);\n\t\tresult-&gt;setUserName(userName);\n\t\tatt_user_ids.put(userName, result);\n\t}\n\treturn result;\n}\n\nvoid Attachment::checkReplSetLock(thread_db* tdbb)\n{\n\tif (att_flags &amp; ATT_repl_reset)\n\t{\n\t\tfb_assert(att_repl_lock-&gt;lck_logical == LCK_none);\n\t\tLCK_lock(tdbb, att_repl_lock, LCK_SR, LCK_WAIT);\n\t\tatt_flags &amp;= ~ATT_repl_reset;\n\t}\n}\n\nvoid Attachment::invalidateReplSet(thread_db* tdbb, bool broadcast)\n{\n\tif (broadcast)\n\t{\n\t\t// Signal other attachments about the changed state\n\t\tif (att_repl_lock-&gt;lck_logical == LCK_none)\n\t\t\tLCK_lock(tdbb, att_repl_lock, LCK_EX, LCK_WAIT);\n\t\telse\n\t\t\tLCK_convert(tdbb, att_repl_lock, LCK_EX, LCK_WAIT);\n\t}\n\n\tif (att_flags &amp; ATT_repl_reset)\n\t\treturn;\n\n\tatt_flags |= ATT_repl_reset;\n\n\tif (att_relations)\n\t{\n\t\tfor (auto relation : *att_relations)\n\t\t{\n\t\t\tif (relation)\n\t\t\t\trelation-&gt;rel_repl_state.reset();\n\t\t}\n\t}\n\n\tLCK_release(tdbb, att_repl_lock);\n}\n\nint Attachment::blockingAstReplSet(void* ast_object)\n{\n\tAttachment* const attachment = static_cast&lt;Attachment*&gt;(ast_object);\n\n\ttry\n\t{\n\t\tDatabase* const dbb = attachment-&gt;att_database;\n\n\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION, attachment-&gt;att_repl_lock);\n\n\t\tattachment-&gt;invalidateReplSet(tdbb, false);\n\t}\n\tcatch (const Exception&amp;)\n\t{} // no-op\n\n\treturn 0;\n}\n\nProfilerManager* Attachment::getProfilerManager(thread_db* tdbb)\n{\n\tauto profilerManager = att_profiler_manager.get();\n\tif (!profilerManager)\n\t\tatt_profiler_manager.reset(profilerManager = ProfilerManager::create(tdbb));\n\treturn profilerManager;\n}\n\nProfilerManager* Attachment::getActiveProfilerManagerForNonInternalStatement(thread_db* tdbb)\n{\n\tconst auto* request = tdbb-&gt;getRequest();\n\n\treturn isProfilerActive() &amp;&amp; !request-&gt;hasInternalStatement() ?\n\t\tgetProfilerManager(tdbb) :\n\t\tnullptr;\n}\n\nbool Attachment::isProfilerActive()\n{\n\treturn att_profiler_manager &amp;&amp; att_profiler_manager-&gt;isActive();\n}\n\nvoid Attachment::releaseProfilerManager(thread_db* tdbb)\n{\n\tif (!att_profiler_manager)\n\t\treturn;\n\n\tif (att_profiler_manager-&gt;haveListener())\n\t{\n\t\tEngineCheckout cout(tdbb, FB_FUNCTION);\n\t\tatt_profiler_manager.reset();\n\t}\n\telse\n\t\tatt_profiler_manager.reset();\n}\n\nbool Attachment::qualifyNewName(thread_db* tdbb, QualifiedName&amp; name, const ObjectsArray&lt;MetaString&gt;* schemaSearchPath)\n{\n\tif (!schemaSearchPath)\n\t\tschemaSearchPath = att_schema_search_path;\n\n\tif (name.schema.isEmpty() &amp;&amp; schemaSearchPath-&gt;hasData())\n\t{\n\t\tfor (const auto&amp; searchSchema : *schemaSearchPath)\n\t\t{\n\t\t\tif (MET_check_schema_exists(tdbb, searchSchema))\n\t\t\t{\n\t\t\t\tname.schema = searchSchema;\n\t\t\t\treturn true;\n\t\t\t}\n\t\t}\n\t}\n\n\treturn MET_check_schema_exists(tdbb, name.schema);\n}\n\nvoid Attachment::qualifyExistingName(thread_db* tdbb, QualifiedName&amp; name,\n\tstd::initializer_list&lt;ObjectType&gt; objTypes, const ObjectsArray&lt;MetaString&gt;* schemaSearchPath)\n{\n\tif (name.object.hasData())\n\t{\n\t\tif (name.schema.isEmpty())\n\t\t{\n\t\t\tif (!MET_qualify_existing_name(tdbb, name, objTypes, schemaSearchPath))\n\t\t\t\tqualifyNewName(tdbb, name, schemaSearchPath);\n\t\t}\n\t}\n}\n"}, "/build/src/jrd/Database.h": {"id": "/build/src/jrd/Database.h", "filePath": "src/jrd/Database.h", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         Database.h\n *      DESCRIPTION:    Common descriptions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;DecOSF&quot; port\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n * Claudio Valderrama C.\n *\n */\n\n#ifndef JRD_DATABASE_H\n#define JRD_DATABASE_H\n\n#include &quot;firebird.h&quot;\n#include &quot;../jrd/cch.h&quot;\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../common/dsc.h&quot;\n#include &quot;../jrd/btn.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/val.h&quot;\n#include &quot;../jrd/irq.h&quot;\n#include &quot;../jrd/drq.h&quot;\n#include &quot;../jrd/lck.h&quot;\n#include &quot;../include/iberror.h&quot;\n\n#include &quot;../common/classes/fb_atomic.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../jrd/MetaName.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/Hash.h&quot;\n#include &quot;../common/classes/objects_array.h&quot;\n#include &quot;../common/classes/stack.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../common/classes/GenericMap.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n#include &quot;../common/classes/semaphore.h&quot;\n#include &quot;../common/classes/TriState.h&quot;\n#include &quot;../common/classes/XThreadMutex.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../jrd/RandomGenerator.h&quot;\n#include &quot;../common/os/guid.h&quot;\n#include &quot;../common/os/os_utils.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/sbm.h&quot;\n#include &quot;../jrd/flu.h&quot;\n#include &quot;../jrd/RuntimeStatistics.h&quot;\n#include &quot;../jrd/event_proto.h&quot;\n#include &quot;../jrd/ExtEngineManager.h&quot;\n#include &quot;../jrd/Coercion.h&quot;\n#include &quot;../lock/lock_proto.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/classes/SyncObject.h&quot;\n#include &quot;../common/classes/Synchronize.h&quot;\n#include &quot;../jrd/replication/Manager.h&quot;\n#include &quot;../dsql/Keywords.h&quot;\n#include &quot;fb_types.h&quot;\n\n\n#define SPTHR_DEBUG(A)\n\n\nnamespace Jrd\n{\ntemplate &lt;typename T&gt; class vec;\nclass jrd_rel;\nclass Shadow;\nclass BlobFilter;\nclass TipCache;\nclass BackupManager;\nclass ExternalFileDirectoryList;\nclass MonitoringData;\nclass GarbageCollector;\nclass CryptoManager;\nclass KeywordsMap;\n\n// general purpose vector\ntemplate &lt;class T, BlockType TYPE = type_vec&gt;\nclass vec_base : protected pool_alloc&lt;TYPE&gt;\n{\npublic:\n\ttypedef typename Firebird::Array&lt;T&gt;::iterator iterator;\n\ttypedef typename Firebird::Array&lt;T&gt;::const_iterator const_iterator;\n\n\t/*\n\tstatic vec_base* newVector(MemoryPool&amp; p, int len)\n\t{\n\t\treturn FB_NEW_POOL(p) vec_base&lt;T, TYPE&gt;(p, len);\n\t}\n\n\tstatic vec_base* newVector(MemoryPool&amp; p, const vec_base&amp; base)\n\t{\n\t\treturn FB_NEW_POOL(p) vec_base&lt;T, TYPE&gt;(p, base);\n\t}\n\t*/\n\n\tFB_SIZE_T count() const { return v.getCount(); }\n\tT&amp; operator[](FB_SIZE_T index) { return v[index]; }\n\tconst T&amp; operator[](FB_SIZE_T index) const { return v[index]; }\n\n\titerator begin() { return v.begin(); }\n\titerator end() { return v.end(); }\n\n\tconst_iterator begin() const { return v.begin(); }\n\tconst_iterator end() const { return v.end(); }\n\n\tvoid clear() { v.clear(); }\n\n\tT* memPtr() { return &amp;v[0]; }\n\n\tvoid resize(FB_SIZE_T n, T val = T()) { v.resize(n, val); }\n\n\tvoid operator delete(void* mem) { MemoryPool::globalFree(mem); }\n\nprotected:\n\tvec_base(MemoryPool&amp; p, int len)\n\t\t: v(p, len)\n\t{\n\t\tv.resize(len);\n\t}\n\n\tvec_base(MemoryPool&amp; p, const vec_base&amp; base)\n\t\t: v(p)\n\t{\n\t\tv = base.v;\n\t}\n\nprivate:\n\tFirebird::Array&lt;T&gt; v;\n};\n\ntemplate &lt;typename T&gt;\nclass vec : public vec_base&lt;T, type_vec&gt;\n{\npublic:\n\tstatic vec* newVector(MemoryPool&amp; p, int len)\n\t{\n\t\treturn FB_NEW_POOL(p) vec&lt;T&gt;(p, len);\n\t}\n\n\tstatic vec* newVector(MemoryPool&amp; p, const vec&amp; base)\n\t{\n\t\treturn FB_NEW_POOL(p) vec&lt;T&gt;(p, base);\n\t}\n\n\tstatic vec* newVector(MemoryPool&amp; p, vec* base, int len)\n\t{\n\t\tif (!base)\n\t\t\tbase = FB_NEW_POOL(p) vec&lt;T&gt;(p, len);\n\t\telse if (len &gt; (int) base-&gt;count())\n\t\t\tbase-&gt;resize(len);\n\t\treturn base;\n\t}\n\nprivate:\n\tvec(MemoryPool&amp; p, int len) : vec_base&lt;T, type_vec&gt;(p, len) {}\n\tvec(MemoryPool&amp; p, const vec&amp; base) : vec_base&lt;T, type_vec&gt;(p, base) {}\n};\n\nclass vcl : public vec_base&lt;ULONG, type_vcl&gt;\n{\npublic:\n\tstatic vcl* newVector(MemoryPool&amp; p, int len)\n\t{\n\t\treturn FB_NEW_POOL(p) vcl(p, len);\n\t}\n\n\tstatic vcl* newVector(MemoryPool&amp; p, const vcl&amp; base)\n\t{\n\t\treturn FB_NEW_POOL(p) vcl(p, base);\n\t}\n\n\tstatic vcl* newVector(MemoryPool&amp; p, vcl* base, int len)\n\t{\n\t\tif (!base)\n\t\t\tbase = FB_NEW_POOL(p) vcl(p, len);\n\t\telse if (len &gt; (int) base-&gt;count())\n\t\t\tbase-&gt;resize(len);\n\t\treturn base;\n\t}\n\nprivate:\n\tvcl(MemoryPool&amp; p, int len) : vec_base&lt;ULONG, type_vcl&gt;(p, len) {}\n\tvcl(MemoryPool&amp; p, const vcl&amp; base) : vec_base&lt;ULONG, type_vcl&gt;(p, base) {}\n};\n\ntypedef vec&lt;TraNumber&gt; TransactionsVector;\n\n\n//\n// bit values for dbb_flags\n//\ninline constexpr ULONG DBB_damaged\t\t\t\t\t= 0x1L;\ninline constexpr ULONG DBB_exclusive\t\t\t\t= 0x2L;\t\t\t// Database is accessed in exclusive mode\ninline constexpr ULONG DBB_bugcheck\t\t\t\t\t= 0x4L;\t\t\t// Bugcheck has occurred\ninline constexpr ULONG DBB_garbage_collector\t\t= 0x8L;\t\t\t// garbage collector thread exists\ninline constexpr ULONG DBB_gc_active\t\t\t\t= 0x10L;\t\t// ... and is actively working.\ninline constexpr ULONG DBB_gc_pending\t\t\t\t= 0x20L;\t\t// garbage collection requested\ninline constexpr ULONG DBB_force_write\t\t\t\t= 0x40L;\t\t// Database is forced write\ninline constexpr ULONG DBB_no_reserve\t\t\t\t= 0x80L;\t\t// No reserve space for versions\ninline constexpr ULONG DBB_DB_SQL_dialect_3\t\t\t= 0x100L;\t\t// database SQL dialect 3\ninline constexpr ULONG DBB_read_only\t\t\t\t= 0x200L;\t\t// DB is ReadOnly (RO). If not set, DB is RW\ninline constexpr ULONG DBB_being_opened_read_only\t= 0x400L;\t\t// DB is being opened RO. If unset, opened as RW\ninline constexpr ULONG DBB_no_ast\t\t\t\t\t= 0x800L;\t\t// AST delivery is prohibited\ninline constexpr ULONG DBB_sweep_in_progress\t\t= 0x1000L;\t\t// A database sweep operation is in progress\ninline constexpr ULONG DBB_gc_starting\t\t\t\t= 0x2000L;\t\t// garbage collector thread is starting\ninline constexpr ULONG DBB_suspend_bgio\t\t\t\t= 0x4000L;\t\t// Suspend I/O by background threads\ninline constexpr ULONG DBB_new\t\t\t\t\t\t= 0x8000L;\t\t// Database object is just created\ninline constexpr ULONG DBB_gc_cooperative\t\t\t= 0x10000L;\t\t// cooperative garbage collection\ninline constexpr ULONG DBB_gc_background\t\t\t= 0x20000L;\t\t// background garbage collection by gc_thread\ninline constexpr ULONG DBB_sweep_starting\t\t\t= 0x40000L;\t\t// Auto-sweep is starting\ninline constexpr ULONG DBB_creating\t\t\t\t\t= 0x80000L;\t\t// Database creation is in progress\ninline constexpr ULONG DBB_shared\t\t\t\t\t= 0x100000L;\t// Database object is shared among connections\ninline constexpr ULONG DBB_restoring\t\t\t\t= 0x200000L;\t// Database restore is in progress\n\n//\n// dbb_ast_flags\n//\ninline constexpr ULONG DBB_blocking\t\t= 0x1L;\t\t// Exclusive mode is blocking\ninline constexpr ULONG DBB_get_shadows\t= 0x2L;\t\t// Signal received to check for new shadows\ninline constexpr ULONG DBB_assert_locks\t= 0x4L;\t\t// Locks are to be asserted\ninline constexpr ULONG DBB_shut_attach\t= 0x8L;\t\t// No new attachments accepted\ninline constexpr ULONG DBB_shut_tran\t= 0x10L;\t// No new transactions accepted\ninline constexpr ULONG DBB_shut_force\t= 0x20L;\t// Forced shutdown in progress\n\nclass Database : public pool_alloc&lt;type_dbb&gt;\n{\n\t// This class is a reference-counted container for all &quot;global&quot;\n\t// (shared among different dbb&#x27;s) objects -- e.g. the lock manager.\n\t// The contained objects are created on demand (upon the first reference).\n\t// The container is destroyed by the last dbb going away and\n\t// it automatically destroys all the objects it holds.\n\n\tclass GlobalObjectHolder : public Firebird::RefCounted, public Firebird::GlobalStorage\n\t{\n\t\tstruct DbId;\n\t\ttypedef Firebird::HashTable&lt;DbId, Firebird::DEFAULT_HASH_SIZE,\n\t\t\tFirebird::string, DbId, DbId &gt; DbIdHash;\n\n\t\tstruct DbId : public DbIdHash::Entry, public Firebird::GlobalStorage, public Firebird::RefCounted\n\t\t{\n\t\t\tDbId(const Firebird::string&amp; x, GlobalObjectHolder* h)\n\t\t\t\t: id(getPool(), x), holder(h)\n\t\t\t{}\n\n\t\t\tDbId* get()\n\t\t\t{\n\t\t\t\treturn this;\n\t\t\t}\n\n\t\t\tbool isEqual(const Firebird::string&amp; val) const\n\t\t\t{\n\t\t\t\treturn val == id;\n\t\t\t}\n\n\t\t\tstatic const Firebird::string&amp; generate(const DbId&amp; item)\n\t\t\t{\n\t\t\t\treturn item.id;\n\t\t\t}\n\n\t\t\tstatic FB_SIZE_T hash(const Firebird::string&amp; value, FB_SIZE_T hashSize)\n\t\t\t{\n\t\t\t\treturn Firebird::InternalHash::hash(value.length(),\n\t\t\t\t\t\t\t\t\t\t\t\t\t(const UCHAR*) value.c_str(),\n\t\t\t\t\t\t\t\t\t\t\t\t\thashSize);\n\t\t\t}\n\n\t\t\tconst Firebird::string id;\n\t\t\tGlobalObjectHolder* holder;\n\t\t\t// This mutex is working very tight with `g_mutex`, so use it carefully to avoid possible deadlocks.\n\t\t\tFirebird::Mutex shutdownMutex;\n\t\t};\n\n\t\tstatic Firebird::GlobalPtr&lt;DbIdHash&gt; g_hashTable;\n\t\tstatic Firebird::GlobalPtr&lt;Firebird::Mutex&gt; g_mutex;\n\n\tpublic:\n\t\tstatic GlobalObjectHolder* init(const Firebird::string&amp; id,\n\t\t\t\t\t\t\t\t\t\tconst Firebird::PathName&amp; filename,\n\t\t\t\t\t\t\t\t\t\tFirebird::RefPtr&lt;const Firebird::Config&gt; config);\n\n\t\tint release() const override;\n\n\t\t~GlobalObjectHolder();\n\n\t\tLockManager* getLockManager();\n\t\tEventManager* getEventManager();\n\t\tReplication::Manager* getReplManager(bool create);\n\n\t\tconst Replication::Config* getReplConfig()\n\t\t{\n\t\t\treturn m_replConfig.get();\n\t\t}\n\n\t\tbool incTempCacheUsage(FB_SIZE_T size);\n\t\tvoid decTempCacheUsage(FB_SIZE_T size);\n\n\tprivate:\n\t\tconst Firebird::string m_id;\n\t\tconst Firebird::RefPtr&lt;const Firebird::Config&gt; m_config;\n\t\tconst Firebird::AutoPtr&lt;const Replication::Config&gt; m_replConfig;\n\t\tFirebird::AutoPtr&lt;LockManager&gt; m_lockMgr;\n\t\tFirebird::AutoPtr&lt;EventManager&gt; m_eventMgr;\n\t\tFirebird::AutoPtr&lt;Replication::Manager&gt; m_replMgr;\n\t\tFirebird::Mutex m_mutex;\n\t\tstd::atomic&lt;FB_UINT64&gt; m_tempCacheUsage;\t\t// total size of in-memory temp space chunks (see TempSpace class)\n\t\tconst FB_UINT64 m_tempCacheLimit;\n\n\t\texplicit GlobalObjectHolder(const Firebird::string&amp; id,\n\t\t\t\t\t\t\t\t\tconst Firebird::PathName&amp; filename,\n\t\t\t\t\t\t\t\t\tFirebird::RefPtr&lt;const Firebird::Config&gt; config)\n\t\t\t: m_id(getPool(), id), m_config(config),\n\t\t\t  m_replConfig(Replication::Config::get(filename)),\n\t\t\t  m_tempCacheUsage(0),\n\t\t\t  m_tempCacheLimit(m_config-&gt;getTempCacheLimit())\n\t\t{}\n\t};\n\npublic:\n\tclass ExistenceRefMutex : public Firebird::RefCounted\n\t{\n\tpublic:\n\t\tExistenceRefMutex()\n\t\t\t: exist(true)\n\t\t{ }\n\n\t\t~ExistenceRefMutex()\n\t\t{ }\n\n\tpublic:\n\t\tvoid destroy()\n\t\t{\n\t\t\texist = false;\n\t\t}\n\n\t\tbool doesExist() const\n\t\t{\n\t\t\treturn exist;\n\t\t}\n\n\t\tvoid enter()\n\t\t{\n\t\t\tmutex.enter(&quot;ExistenceRefMutex::enter()&quot;);\n\t\t}\n\n\t\tvoid leave()\n\t\t{\n\t\t\tmutex.leave();\n\t\t}\n\n\tprivate:\n\t\tFirebird::Mutex mutex;\n\t\tbool exist;\n\t};\n\n\tclass Linger final :\n\t\tpublic Firebird::RefCntIface&lt;Firebird::ITimerImpl&lt;Linger, Firebird::CheckStatusWrapper&gt; &gt;\n\t{\n\tpublic:\n\t\texplicit Linger(Database* a_dbb)\n\t\t\t: dbb(a_dbb), active(false)\n\t\t{ }\n\n\t\tvoid set(unsigned seconds);\n\t\tvoid reset();\n\t\tvoid destroy();\n\n\t\t// ITimer implementation\n\t\tvoid handler();\n\n\tprivate:\n\t\tDatabase* dbb;\n\t\tbool active;\n\t};\n\n\tstatic Database* create(Firebird::IPluginConfig* pConf, bool shared)\n\t{\n\t\tFirebird::MemoryStats temp_stats;\n\t\tMemoryPool* const pool = MemoryPool::createPool(NULL, temp_stats);\n\t\tDatabase* const dbb = FB_NEW_POOL(*pool) Database(pool, pConf, shared);\n\t\tpool-&gt;setStatsGroup(dbb-&gt;dbb_memory_stats);\n\t\treturn dbb;\n\t}\n\n\t// The destroy() function MUST be used to delete a Database object.\n\t// The function hides some tricky order of operations.  Since the\n\t// memory for the vectors in the Database is allocated out of the Database&#x27;s\n\t// permanent memory pool, the entire delete() operation needs\n\t// to complete _before_ the permanent pool is deleted, or else\n\t// risk an aborted engine.\n\tstatic void destroy(Database* const toDelete)\n\t{\n\t\tif (!toDelete)\n\t\t\treturn;\n\n\t\tMemoryPool* const perm = toDelete-&gt;dbb_permanent;\n\n\t\t// Memory pool destruction below decrements memory statistics\n\t\t// situated in database block we are about to deallocate right
