rd::RWLock\t\tdbb_ast_lock;\t\t// avoids delivering AST to going away database\n\tFirebird::AtomicCounter dbb_ast_flags;\t\t// flags modified at AST level\n\tFirebird::AtomicCounter dbb_flags;\n\tstd::atomic&lt;shut_mode_t&gt; dbb_shutdown_mode;\t\t// shutdown mode\n\tUSHORT dbb_ods_version;\t\t\t\t// major ODS version number\n\tUSHORT dbb_minor_version;\t\t\t// minor ODS version number\n\tUSHORT dbb_page_size;\t\t\t\t// page size\n\tUSHORT dbb_dp_per_pp;\t\t\t\t// data pages per pointer page\n\tUSHORT dbb_max_records;\t\t\t\t// max record per data page\n\tUSHORT dbb_max_idx;\t\t\t\t\t// max number of indexes on a root page\n\n#ifdef SUPERSERVER_V2\n\tUSHORT dbb_prefetch_sequence;\t\t// sequence to pace frequency of prefetch requests\n\tUSHORT dbb_prefetch_pages;\t\t\t// prefetch pages per request\n#endif\n\n\tFirebird::PathName dbb_filename;\t// filename string\n\tFirebird::PathName dbb_database_name;\t// database visible name (file name or alias)\n#ifdef HAVE_ID_BY_NAME\n\tFirebird::UCharBuffer dbb_id;\n#endif\n\tMetaName dbb_owner;\t\t// database owner\n\n\tFirebird::SyncObject\t\t\tdbb_pools_sync;\n\tFirebird::Array&lt;MemoryPool*&gt;\tdbb_pools;\t\t// pools\n\n\tFirebird::SyncObject\t\t\tdbb_sortbuf_sync;\n\tFirebird::Array&lt;UCHAR*&gt;\t\t\tdbb_sort_buffers;\t// sort buffers ready for reuse\n\n\tTraNumber dbb_oldest_active;\t\t// Cached &quot;oldest active&quot; transaction\n\tTraNumber dbb_oldest_transaction;\t// Cached &quot;oldest interesting&quot; transaction\n\tTraNumber dbb_oldest_snapshot;\t\t// Cached &quot;oldest snapshot&quot; of all active transactions\n\tTraNumber dbb_next_transaction;\t\t// Next transaction id used by NETWARE\n\tAttNumber dbb_attachment_id;\t\t// Next attachment id for ReadOnly DB&#x27;s\n\tULONG dbb_page_buffers;\t\t\t\t// Page buffers from header page\n\n\tGarbageCollector*\tdbb_garbage_collector;\t// GarbageCollector class\n\tFirebird::Semaphore dbb_gc_sem;\t\t// Event to wake up garbage collector\n\tFirebird::Semaphore dbb_gc_init;\t// Event for initialization garbage collector\n\tThreadFinishSync&lt;Database*&gt; dbb_gc_fini;\t// Sync for finalization garbage collector\n\n\tFirebird::MemoryStats dbb_memory_stats;\n\tRuntimeStatistics dbb_stats;\n\tmutable Firebird::Mutex dbb_stats_mutex;\n\n\tTraNumber\tdbb_last_header_write;\t// Transaction id of last header page physical write\n\tSLONG dbb_flush_cycle;\t\t\t\t// Current flush cycle\n\tULONG dbb_sweep_interval;\t\t\t// Transactions between sweep\n\tconst ULONG dbb_lock_owner_id;\t\t// ID for the lock manager\n\tSLONG dbb_lock_owner_handle;\t\t// Handle for the lock manager\n\n\tUSHORT unflushed_writes;\t\t\t// unflushed writes\n\ttime_t last_flushed_write;\t\t\t// last flushed write time\n\n\tTipCache*\t\tdbb_tip_cache;\t\t// cache of latest known state of all transactions in system\n\tBackupManager*\tdbb_backup_manager;\t\t\t\t\t\t// physical backup manager\n\tISC_TIMESTAMP_TZ dbb_creation_date; \t\t\t\t\t// creation timestamp in GMT\n\tExternalFileDirectoryList* dbb_external_file_directory_list;\n\tFirebird::RefPtr&lt;const Firebird::Config&gt; dbb_config;\n\n\tCryptoManager* dbb_crypto_manager;\n\tFirebird::RefPtr&lt;ExistenceRefMutex&gt; dbb_init_fini;\n\tFirebird::XThreadMutex dbb_thread_mutex;\t\t// special threads start/stop mutex\n\tFirebird::RefPtr&lt;Linger&gt; dbb_linger_timer;\n\tunsigned dbb_linger_seconds;\n\ttime_t dbb_linger_end;\n\tFirebird::RefPtr&lt;Firebird::IPluginConfig&gt; dbb_plugin_config;\n\n\tFirebird::TriState dbb_repl_state;\t// replication state\n\tLock* dbb_repl_lock;\t\t\t\t// replication state lock\n\tFirebird::SyncObject dbb_repl_sync;\n\tFB_UINT64 dbb_repl_sequence;\t\t// replication sequence\n\tstd::atomic&lt;ReplicaMode&gt; dbb_replica_mode;\t\t// replica access mode\n\n\tunsigned dbb_compatibility_index;\t// datatype backward compatibility level\n\tDictionary dbb_dic;\t\t\t\t\t// metanames dictionary\n\tFirebird::InitInstance&lt;Keywords, Keywords::Allocator, Firebird::TraditionalDelete&gt; dbb_keywords;\n\n\t// returns true if primary file is located on raw device\n\tbool onRawDevice() const;\n\n\t// returns an unique ID string for a database file\n\tconst Firebird::string&amp; getUniqueFileId();\n\n\t// returns the minimum IO block size\n\tULONG getIOBlockSize() const;\n\n#ifdef DEV_BUILD\n\t// returns true if main lock is in exclusive state\n\tbool locked() const\n\t{\n\t\treturn dbb_sync.ourExclusiveLock();\n\t}\n#endif\n\n\tMemoryPool* createPool()\n\t{\n\t\tMemoryPool* const pool = MemoryPool::createPool(dbb_permanent, dbb_memory_stats);\n\n\t\tFirebird::SyncLockGuard guard(&amp;dbb_pools_sync, Firebird::SYNC_EXCLUSIVE, &quot;Database::createPool&quot;);\n\t\tdbb_pools.add(pool);\n\t\treturn pool;\n\t}\n\n\tvoid deletePool(MemoryPool* pool);\n\n\tvoid registerModule(Module&amp;);\n\n\tbool isShutdown() const\n\t{\n\t\treturn (dbb_shutdown_mode.load(std::memory_order_relaxed) != shut_mode_online);\n\t}\n\n\tbool isShutdown(shut_mode_t mode) const\n\t{\n\t\treturn (dbb_shutdown_mode.load(std::memory_order_relaxed) == mode);\n\t}\n\n\tbool isReplica() const\n\t{\n\t\treturn (dbb_replica_mode.load(std::memory_order_relaxed) != REPLICA_NONE);\n\t}\n\n\tbool isReplica(ReplicaMode mode) const\n\t{\n\t\treturn (dbb_replica_mode.load(std::memory_order_relaxed) == mode);\n\t}\n\n\tUSHORT getEncodedOdsVersion() const\n\t{\n\t\treturn ENCODE_ODS(dbb_ods_version, dbb_minor_version);\n\t}\n\n\t// Methods encapsulating operations with vectors of known pages\n\tULONG getKnownPagesCount(SCHAR ptype);\n\tULONG getKnownPage(SCHAR ptype, ULONG sequence);\n\tvoid setKnownPage(SCHAR ptype, ULONG sequence, ULONG value);\n\tvoid copyKnownPages(SCHAR ptype, ULONG count, ULONG* data);\n\nprivate:\n\tDatabase(MemoryPool* p, Firebird::IPluginConfig* pConf, bool shared)\n\t:\tdbb_permanent(p),\n\t\tdbb_guid(Firebird::Guid::empty()),\n\t\tdbb_page_manager(this, *p),\n\t\tdbb_file_id(*p),\n\t\tdbb_modules(*p),\n\t\tdbb_extManager(nullptr),\n\t\tdbb_flags(shared ? DBB_shared : 0),\n\t\tdbb_shutdown_mode(shut_mode_online),\n\t\tdbb_filename(*p),\n\t\tdbb_database_name(*p),\n#ifdef HAVE_ID_BY_NAME\n\t\tdbb_id(*p),\n#endif\n\t\tdbb_owner(*p),\n\t\tdbb_pools(*p, 4),\n\t\tdbb_sort_buffers(*p),\n\t\tdbb_gc_fini(*p, garbage_collector, THREAD_medium),\n\t\tdbb_stats(*p),\n\t\tdbb_lock_owner_id(getLockOwnerId()),\n\t\tdbb_tip_cache(NULL),\n\t\tdbb_creation_date(Firebird::TimeZoneUtil::getCurrentGmtTimeStamp()),\n\t\tdbb_external_file_directory_list(NULL),\n\t\tdbb_init_fini(FB_NEW_POOL(*getDefaultMemoryPool()) ExistenceRefMutex()),\n\t\tdbb_linger_seconds(0),\n\t\tdbb_linger_end(0),\n\t\tdbb_plugin_config(pConf),\n\t\tdbb_repl_sequence(0),\n\t\tdbb_replica_mode(REPLICA_NONE),\n\t\tdbb_compatibility_index(~0U),\n\t\tdbb_dic(*p)\n\t{\n\t\tdbb_pools.add(p);\n\t}\n\n\t~Database();\n\npublic:\n\tAttNumber generateAttachmentId();\n\tTraNumber generateTransactionId();\n\tStmtNumber generateStatementId();\n\t// void assignLatestTransactionId(TraNumber number);\n\tvoid assignLatestAttachmentId(AttNumber number);\n\tAttNumber getLatestAttachmentId() const;\n\tStmtNumber getLatestStatementId() const;\n\n\tULONG getMonitorGeneration() const;\n\tULONG newMonitorGeneration() const;\n\n\tUSHORT getMaxIndexKeyLength() const\n\t{\n\t\treturn dbb_page_size / 4;\n\t}\n\n\tbool readOnly() const\n\t{\n\t\treturn (dbb_flags &amp; DBB_read_only) != 0;\n\t}\n\n\t// returns true if sweeper thread could start\n\tbool allowSweepThread(thread_db* tdbb);\n\t// Throw an exception if sweep cannot be run\n\tvoid initiateSweepRun(thread_db* tdbb);\n\t// reset sweep flag and release sweep lock\n\tvoid clearSweepFlags(thread_db* tdbb);\n\t// reset sweep starting flag, release thread starting mutex\n\tbool clearSweepStarting();\n\n\tstatic void garbage_collector(Database* dbb);\n\tvoid exceptionHandler(const Firebird::Exception&amp; ex, ThreadFinishSync&lt;Database*&gt;::ThreadRoutine* routine);\n\n\tFB_UINT64 getReplSequence(thread_db* tdbb);\n\tvoid setReplSequence(thread_db* tdbb, FB_UINT64 sequence);\n\tbool isReplicating(thread_db* tdbb);\n\tvoid invalidateReplState(thread_db* tdbb, bool broadcast);\n\tstatic int replStateAst(void*);\n\n\tconst CoercionArray *getBindings() const;\n\n\tvoid initGlobalObjects();\n\tvoid shutdownGlobalObjects();\n\n\tLockManager* lockManager()\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getLockManager();\n\t}\n\n\tEventManager* eventManager()\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getEventManager();\n\t}\n\n\tReplication::Manager* replManager(bool create = false)\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getReplManager(create);\n\t}\n\n\tconst Replication::Config* replConfig()\n\t{\n\t\treturn dbb_gblobj_holder-&gt;getReplConfig();\n\t}\n\n\tbool incTempCacheUsage(FB_SIZE_T size)\n\t{\n\t\treturn dbb_gblobj_holder-&gt;incTempCacheUsage(size);\n\t}\n\n\tvoid decTempCacheUsage(FB_SIZE_T size)\n\t{\n\t\tdbb_gblobj_holder-&gt;decTempCacheUsage(size);\n\t}\n\n\tbool isRestoring() const\n\t{\n\t\treturn dbb_flags &amp; DBB_restoring;\n\t}\n\n\tvoid setRestoring(bool value)\n\t{\n\t\tif (value)\n\t\t\tdbb_flags |= DBB_restoring;\n\t\telse\n\t\t\tdbb_flags &amp;= ~DBB_restoring;\n\t}\n\nprivate:\n\t//static int blockingAstSharedCounter(void*);\n\tstatic int blocking_ast_sweep(void* ast_object);\n\tLock* createSweepLock(thread_db* tdbb);\n\n\t// The delete operators are no-oped because the Database memory is allocated from the\n\t// Database&#x27;s own permanent pool.  That pool has already been released by the Database\n\t// destructor, so the memory has already been released.  Hence the operator\n\t// delete no-op.\n\tvoid operator delete(void*) {}\n\tvoid operator delete[](void*) {}\n\n\tDatabase(const Database&amp;);\t\t\t// no impl.\n\tconst Database&amp; operator =(const Database&amp;) { return *this; }\n};\n\n} // namespace Jrd\n\n#endif // JRD_DATABASE_H\n"}, "/build/src/common/classes/alloc.h": {"id": "/build/src/common/classes/alloc.h", "filePath": "src/common/classes/alloc.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.h\n *\tDESCRIPTION:\tMemory Pool Manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  STL allocator is based on one by Mike Nordell and John Bellardo\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#ifndef CLASSES_ALLOC_H\n#define CLASSES_ALLOC_H\n\n#include &quot;firebird.h&quot;\n#include &quot;fb_types.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n\n#include &lt;stdio.h&gt;\n\n#if defined(MVS) || defined(DARWIN) || defined(__clang__)\n#include &lt;stdlib.h&gt;\n#else\n#include &lt;malloc.h&gt;\n#endif\n\n#include &lt;memory.h&gt;\n#include &lt;memory&gt;\n\n#ifdef DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool(), __FILE__, __LINE__)\n#define FB_NEW_POOL(pool) new(pool, __FILE__, __LINE__)\n#define FB_NEW_RPT(pool, count) new(pool, count, __FILE__, __LINE__)\n#else // DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool())\n#define FB_NEW_POOL(pool) new(pool)\n#define FB_NEW_RPT(pool, count) new(pool, count)\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird {\n\n// Alignment for all memory blocks\n#define ALLOC_ALIGNMENT 16\n\nstatic inline constexpr size_t MEM_ALIGN(size_t value)\n{\n\treturn FB_ALIGN(value, ALLOC_ALIGNMENT);\n}\n\n\nclass MemPool;\n\nclass MemoryStats\n{\npublic:\n\texplicit MemoryStats(MemoryStats* parent = NULL) noexcept\n\t\t: mst_parent(parent), mst_usage(0), mst_mapped(0), mst_max_usage(0), mst_max_mapped(0)\n\t{}\n\n\t~MemoryStats()\n\t{}\n\n\t// Forbid copying/assignment\n\tMemoryStats(const MemoryStats&amp;) = delete;\n\tMemoryStats&amp; operator=(const MemoryStats&amp;) = delete;\n\n\tsize_t getCurrentUsage() const noexcept { return mst_usage.value(); }\n\tsize_t getMaximumUsage() const noexcept { return mst_max_usage; }\n\tsize_t getCurrentMapping() const noexcept { return mst_mapped.value(); }\n\tsize_t getMaximumMapping() const noexcept { return mst_max_mapped; }\n\nprivate:\n\tMemoryStats* mst_parent;\n\n\t// Currently allocated memory (without allocator overhead)\n\t// Useful for monitoring engine memory leaks\n\tAtomicCounter mst_usage;\n\t// Amount of memory mapped (including all overheads)\n\t// Useful for monitoring OS memory consumption\n\tAtomicCounter mst_mapped;\n\n\t// We don&#x27;t particularily care about extreme precision of these max values,\n\t// this is why we don&#x27;t synchronize them\n\tsize_t mst_max_usage;\n\tsize_t mst_max_mapped;\n\n\t// These methods are thread-safe due to usage of atomic counters only\n\tvoid increment_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_usage.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_usage)\n\t\t\t\tstatistics-&gt;mst_max_usage = temp;\n\t\t}\n\t}\n\n\tvoid decrement_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_usage -= size;\n\t\t}\n\t}\n\n\tvoid increment_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_mapped.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_mapped)\n\t\t\t\tstatistics-&gt;mst_max_mapped = temp;\n\t\t}\n\t}\n\n\tvoid decrement_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_mapped -= size;\n\t\t}\n\t}\n\n\tfriend class MemPool;\n};\n\n\nclass MemoryPool\n{\nfriend class ExternalMemoryHandler;\n\nprivate:\n\tMemPool* pool;\n\n\tMemoryPool(MemPool* p) noexcept\n\t\t: pool(p)\n\t{ }\n\n\t// Default statistics group for process\n\tstatic MemoryStats* default_stats_group;\n\npublic:\n\t// This is maximum block size which is cached (not allocated directly from OS)\n\tenum RecommendedBufferSize { MAX_MEDIUM_BLOCK_SIZE = 64384 };\t// MediumLimits::TOP_LIMIT - 128\n\n\tstatic MemoryPool* defaultMemoryManager;\n\tstatic MemoryPool* externalMemoryManager;\n\npublic:\n\t// Create memory pool instance\n\tstatic MemoryPool* createPool(MemoryPool* parent = NULL, MemoryStats&amp; stats = *default_stats_group);\n\t// Delete memory pool instance\n\tstatic void deletePool(MemoryPool* pool);\n\n#ifdef DEBUG_GDS_ALLOC\n#define ALLOC_ARGS , __FILE__, __LINE__\n#define ALLOC_PARAMS , const char* file, int line\n#define ALLOC_PASS_ARGS , file, line\n#else\n#define ALLOC_ARGS\n#define ALLOC_PARAMS\n#define ALLOC_PASS_ARGS\n#endif // DEBUG_GDS_ALLOC\n\n\tvoid* calloc(size_t size ALLOC_PARAMS);\n\n\tstatic void* globalAlloc(size_t s ALLOC_PARAMS)\n\t{\n\t\treturn defaultMemoryManager-&gt;allocate(s ALLOC_PASS_ARGS);\n\t}\n\n\tvoid* allocate(size_t size ALLOC_PARAMS);\n\n\tstatic void globalFree(void* mem) noexcept;\n\tvoid deallocate(void* mem) noexcept;\n\n\t// Set context pool for current thread of execution\n\tstatic MemoryPool* setContextPool(MemoryPool* newPool);\n\n\t// Get context pool for current thread of execution\n\tstatic MemoryPool* getContextPool();\n\n\tMemoryStats&amp; getStatsGroup() noexcept;\n\n\t// Set statistics group for pool. Usage counters will be decremented from\n\t// previously set group and added to new\n\tvoid setStatsGroup(MemoryStats&amp; stats) noexcept;\n\n\t// Initialize and finalize global memory pool\n\tstatic void initDefaultPool();\n\tstatic void cleanupDefaultPool();\n\n\t// Initialize context pool\n\tstatic void contextPoolInit();\n\n\t// Print out pool contents. This is debugging routine\n\tstatic constexpr unsigned PRINT_USED_ONLY = 0x01;\n\tstatic constexpr unsigned PRINT_RECURSIVE = 0x02;\n\tvoid print_contents(FILE*, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\t// The same routine, but more easily callable from the debugger\n\tvoid print_contents(const char* filename, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\n\tinline bool operator==(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn pool == rhs.pool;\n\t}\n\n\tinline bool operator!=(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn !operator==(rhs);\n\t}\n\npublic:\n\tstruct Finalizer\n\t{\n\t\tvirtual ~Finalizer()\n\t\t{\n\t\t}\n\n\t\tvirtual void finalize() = 0;\n\n\t\tFinalizer* prev = nullptr;\n\t\tFinalizer* next = nullptr;\n\t};\n\n\ttemplate &lt;typename T&gt; Finalizer* registerFinalizer(void (*func)(T*), T* object)\n\t{\n\t\tstruct FinalizerImpl : Finalizer\n\t\t{\n\t\t\tFinalizerImpl(void (*aFunc)(T*), T* aObject)\n\t\t\t\t: func(aFunc),\n\t\t\t\t  object(aObject)\n\t\t\t{\n\t\t\t}\n\n\t\t\tvoid finalize() override\n\t\t\t{\n\t\t\t\tfunc(object);\n\t\t\t}\n\n\t\t\tvoid (*func)(T*);\n\t\t\tT* object;\n\t\t};\n\n\t\tfb_assert(func);\n\t\tFinalizerImpl* finalizer = FB_NEW_POOL(*this) FinalizerImpl(func, object);\n\n\t\tinternalRegisterFinalizer(finalizer);\n\n\t\treturn finalizer;\n\t}\n\n\tvoid unregisterFinalizer(Finalizer*&amp; finalizer);\n\nprivate:\n\tvoid internalRegisterFinalizer(Finalizer* entry);\n\nprivate:\n\tFinalizer* finalizers = nullptr;\n\n\tfriend class MemPool;\n};\n\nvoid initExternalMemoryPool();\n\n} // namespace Firebird\n\nstatic inline Firebird::MemoryPool* getDefaultMemoryPool() noexcept\n{\n\tfb_assert(Firebird::MemoryPool::defaultMemoryManager);\n\treturn Firebird::MemoryPool::defaultMemoryManager;\n}\n\nstatic inline Firebird::MemoryPool* getExternalMemoryPool() noexcept\n{\n\tusing namespace Firebird;\n\n\tif (!MemoryPool::externalMemoryManager)\n\t\tinitExternalMemoryPool();\n\n\treturn MemoryPool::externalMemoryManager;\n}\n\nnamespace Firebird {\n\n// Class intended to manage execution context pool stack\n// Declare instance of this class when you need to set new context pool and it\n// will be restored automatically as soon holder variable gets out of scope\nclass ContextPoolHolder\n{\npublic:\n\texplicit ContextPoolHolder(MemoryPool* newPool)\n\t{\n\t\tsavedPool = MemoryPool::setContextPool(newPool);\n\t}\n\t~ContextPoolHolder()\n\t{\n\t\tMemoryPool::setContextPool(savedPool);\n\t}\nprivate:\n\tMemoryPool* savedPool;\n};\n\n// template enabling common use of old and new pools control code\n// to be dropped when old-style code goes away\ntemplate &lt;typename SubsystemThreadData, typename SubsystemPool&gt;\nclass SubsystemContextPoolHolder : public ContextPoolHolder\n{\npublic:\n\tSubsystemContextPoolHolder\n\t(\n\t\tSubsystemThreadData* subThreadData,\n\t\tSubsystemPool* newPool\n\t)\n\t\t: ContextPoolHolder(newPool),\n\t\tsavedThreadData(subThreadData),\n\t\tsavedPool(savedThreadData-&gt;getDefaultPool())\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(newPool);\n\t}\n\n\t~SubsystemContextPoolHolder()\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(savedPool);\n\t}\n\nprivate:\n\tSubsystemThreadData* savedThreadData;\n\tSubsystemPool* savedPool;\n};\n\n} // namespace Firebird\n\nusing Firebird::MemoryPool;\n\n// operators new and delete\n\ninline void* operator new(size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void* operator new[](size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void operator delete(void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\ninline void operator delete[](void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#ifdef DEBUG_GDS_ALLOC\n\nextern void operator delete(void* mem) noexcept;\nextern void operator delete[](void* mem) noexcept;\n\n#if __cplusplus &gt;= 201402L\nextern void operator delete(void* mem, std::size_t s) noexcept;\nextern void operator delete[](void* mem, std::size_t s) noexcept;\n#endif\n\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird\n{\n\t// Global storage makes it possible to use new and delete for classes,\n\t// based on it, to behave traditionally, i.e. get memory from permanent pool.\n\tclass GlobalStorage\n\t{\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept\n\t\t{\n\t\t\treturn *getDefaultMemoryPool();\n\t\t}\n\t};\n\n\n\t// Permanent storage is used as base class for all objects,\n\t// performing memory allocation in methods other than\n\t// constructors of this objects. Permanent means that pool,\n\t// which will be later used for such allocations, must\n\t// be explicitly passed in all constructors of such object.\n\tclass PermanentStorage\n\t{\n\tprotected:\n\t\texplicit PermanentStorage(MemoryPool&amp; p) noexcept : pool(p) { }\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept { return pool; }\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n\n\t// Automatic storage is used as base class for objects,\n\t// that may have constructors without explicit MemoryPool\n\t// parameter. In this case AutoStorage sends AutoMemoryPool\n\t// to PermanentStorage. To ensure this operation to be safe\n\t// such trick possible only for local (on stack) variables.\n\tclass AutoStorage : public PermanentStorage\n\t{\n\tprivate:\n#if defined(DEV_BUILD)\n\t\tvoid ProbeStack() const noexcept;\n#endif\n\tpublic:\n\t\tstatic MemoryPool&amp; getAutoMemoryPool();\n\tprotected:\n\t\tAutoStorage()\n\t\t\t: PermanentStorage(getAutoMemoryPool())\n\t\t{\n#if defined(DEV_BUILD)\n\t\t\tProbeStack();\n#endif\n\t\t}\n\t\texplicit AutoStorage(MemoryPool&amp; p) noexcept : PermanentStorage(p) { }\n\t};\n\n\ttemplate &lt;&gt;\n\tinline void SimpleDelete&lt;MemoryPool&gt;::clear(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t\tMemoryPool::deletePool(pool);\n\t}\n\n\ttypedef AutoPtr&lt;MemoryPool&gt; AutoMemoryPool;\n\n\ttemplate &lt;typename T&gt;\n\tclass PoolAllocator\n\t{\n\ttemplate &lt;typename&gt; friend class PoolAllocator;\n\n\tpublic:\n\t\tusing value_type = T;\n\t\tusing size_type = size_t;\n\t\tusing pointer = T*;\n\t\tusing const_pointer = const T*;\n\t\tusing reference = T&amp;;\n\t\tusing const_reference = const T&amp;;\n\t\tusing void_pointer = void* ;\n\t\tusing const_void_pointer = const void*;\n\t\tusing difference_type = std::ptrdiff_t;\n\t\tusing is_always_equal = std::true_type;\n\n\t\ttemplate &lt;typename U&gt;\n\t\tstruct rebind\n\t\t{\n\t\t\ttypedef PoolAllocator&lt;U&gt; other;\n\t\t};\n\n\tpublic:\n\t\tPoolAllocator(MemoryPool&amp; aPool) noexcept\n\t\t\t: pool(aPool)\n\t\t{}\n\n\t\tPoolAllocator(const PoolAllocator&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\ttemplate &lt;class U&gt;\n\t\tPoolAllocator(const PoolAllocator&lt;U&gt;&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\t~PoolAllocator() noexcept\n\t\t{}\n\n\tpublic:\n\t\tconstexpr pointer allocate(size_type n, const void* hint = nullptr)\n\t\t{\n\t\t\treturn static_cast&lt;T*&gt;(pool.allocate(n * sizeof(T) ALLOC_ARGS));\n\t\t}\n\n\t\tconstexpr void deallocate(pointer p, size_type n)\n\t\t{\n\t\t\tpool.deallocate(p);\n\t\t}\n\n\t\tconstexpr size_type max_size() const noexcept\n\t\t{\n\t\t\treturn size_t(-1) / sizeof(T);\n\t\t}\n\n\t\ttemplate &lt;typename U, typename... Args&gt;\n\t\tconstexpr void construct(U* ptr, Args&amp;&amp;... args)\n\t\t{\n\t\t\tif constexpr (std::is_constructible&lt;U, MemoryPool&amp;, Args...&gt;::value)\n\t\t\t\tnew ((void*) ptr) U(pool, std::forward&lt;Args&gt;(args)...);\n\t\t\telse\n\t\t\t\tnew ((void*) ptr) U(std::forward&lt;Args&gt;(args)...);\n\t\t}\n\n\t\ttemplate &lt;typename U&gt;\n\t\tconstexpr void destroy(U* ptr)\n\t\t{\n\t\t\tptr-&gt;~U();\n\t\t}\n\n\t\tconstexpr bool operator==(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool == &amp;o.pool;\n\t\t}\n\n\t\tconstexpr bool operator!=(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool != &amp;o.pool;\n\t\t}\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n} // namespace Firebird\n\n\ntemplate &lt;typename TAlloc&gt;\nstruct std::allocator_traits&lt;Firebird::PoolAllocator&lt;TAlloc&gt;&gt;\n{\n\tusing Alloc = Firebird::PoolAllocator&lt;TAlloc&gt;;\n\n\tusing allocator_type = Alloc;\n\tusing value_type = typename Alloc::value_type;\n\tusing pointer = typename Alloc::pointer;\n\tusing const_pointer = typename Alloc::const_pointer;\n\tusing void_pointer = typename Alloc::void_pointer;\n\tusing const_void_pointer = typename Alloc::const_void_pointer;\n\tusing size_type = typename Alloc::size_type;\n\tusing difference_type = typename Alloc::difference_type;\n\tusing reference = value_type&amp;;\n\tusing const_reference = const value_type&amp;;\n\n\tusing is_always_equal = typename Alloc::is_always_equal;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_alloc = typename Alloc::template rebind&lt;T&gt;::other;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_traits = allocator_traits&lt;rebind_alloc&lt;T&gt;&gt;;\n\n\tstatic constexpr pointer allocate(Alloc&amp; alloc, size_type size)\n\t{\n\t\treturn alloc.allocate(size);\n\t}\n\n\tstatic constexpr void deallocate(Alloc&amp; alloc, pointer ptr, size_type size)\n\t{\n\t\talloc.deallocate(ptr, size);\n\t}\n\n\ttemplate &lt;typename T, typename... Args&gt;\n\tstatic constexpr void construct(Alloc&amp; alloc, T* ptr, Args&amp;&amp;... args)\n\t{\n\t\talloc.construct(ptr, std::forward&lt;Args&gt;(args)...);\n\t}\n\n\ttemplate &lt;typename T&gt;\n\tstatic constexpr void destroy(Alloc&amp; alloc, T* ptr)\n\t{\n\t\talloc.destroy(ptr);\n\t}\n\n\tstatic constexpr size_type max_size(const Alloc&amp; alloc) noexcept\n\t{\n\t\treturn alloc.max_size();\n\t}\n};\n\n\n#endif // CLASSES_ALLOC_H\n"}, "/build/src/common/classes/auto.h": {"id": "/build/src/common/classes/auto.h", "filePath": "src/common/classes/auto.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tauto.h\n *\tDESCRIPTION:\tSTL::auto_ptr replacement\n *\n *\t\t*** warning ***\n *  Unlike STL&#x27;s auto_ptr ALWAYS deletes ptr in destructor -\n *  no ownership flag!\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alexander Peshkoff\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Alexander Peshkoff &lt;peshkoff@mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef CLASSES_AUTO_PTR_H\n#define CLASSES_AUTO_PTR_H\n\n#include &lt;stdio.h&gt;\n\nnamespace Firebird {\n\n\ntemplate &lt;typename What&gt;\nclass SimpleDelete\n{\npublic:\n\tstatic void clear(What* ptr)\n\t{\n\t\tstatic_assert(sizeof(What), &quot;can&#x27;t delete pointer to incomplete type&quot;);\n\t\tdelete ptr;\n\t}\n};\n\ntemplate &lt;&gt;\ninline void SimpleDelete&lt;FILE&gt;::clear(FILE* f)\n{\n\tif (f) {\n\t\t(void)fclose(f);\n\t}\n}\n\n\ntemplate &lt;typename What&gt;\nclass ArrayDelete\n{\npublic:\n\tstatic void clear(What* ptr)\n\t{\n\t\tusing Element = std::remove_pointer_t&lt;What*&gt;;\n\t\tstatic_assert(sizeof(Element), &quot;can&#x27;t delete pointer to incomplete type&quot;);\n\t\tdelete[] ptr;\n\t}\n};\n\n\ntemplate &lt;typename T&gt;\nclass SimpleRelease\n{\npublic:\n\tstatic void clear(T* ptr)\n\t{\n\t\tif (ptr)\n\t\t{\n\t\t\tptr-&gt;release();\n\t\t}\n\t}\n};\n\n\ntemplate &lt;typename T&gt;\nclass SimpleDispose\n{\npublic:\n\tstatic void clear(T* ptr)\n\t{\n\t\tif (ptr)\n\t\t{\n\t\t\tptr-&gt;dispose();\n\t\t}\n\t}\n};\n\n\ntemplate &lt;typename Where, template &lt;typename W&gt; class Clear = SimpleDelete &gt;\nclass AutoPtr\n{\nprivate:\n\tWhere* ptr;\npublic:\n\tAutoPtr(Where* v = nullptr) noexcept\n\t\t: ptr(v)\n\t{}\n\n\tAutoPtr(AutoPtr&amp;&amp; v) noexcept\n\t\t: ptr(v.ptr)\n\t{\n\t\tv.ptr = nullptr;\n\t}\n\n\t~AutoPtr()\n\t{\n\t\tClear&lt;Where&gt;::clear(ptr);\n\t}\n\n\tAutoPtr&amp; operator= (Where* v)\n\t{\n\t\tClear&lt;Where&gt;::clear(ptr);\n\t\tptr = v;\n\t\treturn *this;\n\t}\n\n\tAutoPtr&amp; operator=(AutoPtr&amp;&amp; r) noexcept\n\t{\n\t\tif (this != &amp;r)\n\t\t{\n\t\t\tptr = r.ptr;\n\t\t\tr.ptr = nullptr;\n\t\t}\n\n\t\treturn *this;\n\t}\n\n\tconst Where* get() const\n\t{\n\t\treturn ptr;\n\t}\n\n\toperator const Where*() const\n\t{\n\t\treturn ptr;\n\t}\n\n\tWhere* get()\n\t{\n\t\treturn ptr;\n\t}\n\n\toperator Where*()\n\t{\n\t\treturn ptr;\n\t}\n\n\tbool operator !() const\n\t{\n\t\treturn !ptr;\n\t}\n\n\tbool hasData() const\n\t{\n\t\treturn ptr != NULL;\n\t}\n\n\tWhere* operator-&gt;() const\n\t{\n\t\treturn ptr;\n\t}\n\n\tWhere* release()\n\t{\n\t\tWhere* tmp = ptr;\n\t\tptr = NULL;\n\t\treturn tmp;\n\t}\n\n\tvoid reset(Where* v = NULL)\n\t{\n\t\tif (v != ptr)\n\t\t{\n\t\t\tClear&lt;Where&gt;::clear(ptr);\n\t\t\tptr = v;\n\t\t}\n\t}\n\nprivate:\n\tAutoPtr(AutoPtr&amp;);\n\tvoid operator=(AutoPtr&amp;);\n};\n\ntemplate &lt;typename T&gt;\nusing AutoDispose = AutoPtr&lt;T, SimpleDispose&gt;;\n\ntemplate &lt;typename T&gt;\nusing AutoRelease = AutoPtr&lt;T, SimpleRelease&gt;;\n\n\ntemplate &lt;typename T&gt;\nclass AutoSaveRestore\n{\npublic:\n\tAutoSaveRestore(T* aValue)\n\t\t: value(aValue),\n\t\t  oldValue(*aValue)\n\t{ }\n\n\t~AutoSaveRestore()\n\t{\n\t\t*value = oldValue;\n\t}\n\nprivate:\n\t// copying is prohibited\n\tAutoSaveRestore(const AutoSaveRestore&amp;);\n\tAutoSaveRestore&amp; operator =(const AutoSaveRestore&amp;);\n\n\tT* value;\n\tT oldValue;\n};\n\ntemplate &lt;typename T&gt;\nclass AutoSetRestore : public AutoSaveRestore&lt;T&gt;\n{\npublic:\n\tAutoSetRestore(T* aValue, T newValue)\n\t\t: AutoSaveRestore&lt;T&gt;(aValue)\n\t{\n\t\t*aValue = newValue;\n\t}\n};\n\n\ntemplate &lt;typename T&gt;\nclass AutoSetRestoreFlag\n{\npublic:\n\tAutoSetRestoreFlag(T* aValue, T newBit, bool set)\n\t\t: value(aValue),\n\t\t  bit(newBit),\n\t\t  oldValue((*value) &amp; bit)\n\t{\n\t\tif (set)\n\t\t\t*value |= bit;\n\t\telse\n\t\t\t*value &amp;= ~bit;\n\t}\n\n\t~AutoSetRestoreFlag()\n\t{\n\t\t*value &amp;= ~bit;\n\t\t*value |= oldValue;\n\t}\n\n\tvoid release(T cleanBit)\n\t{\n\t\tbit &amp;= ~cleanBit;\n\t\toldValue &amp;= ~cleanBit;\n\t}\n\nprivate:\n\t// copying is prohibited\n\tAutoSetRestoreFlag(const AutoSetRestoreFlag&amp;);\n\tAutoSetRestoreFlag&amp; operator =(const AutoSetRestoreFlag&amp;);\n\n\tT* value;\n\tT bit;\n\tT oldValue;\n};\n\n\ntemplate &lt;typename T, typename T2&gt;\nclass AutoSetRestore2\n{\nprivate:\n\ttypedef T (T2::*Getter)();\n\ttypedef void (T2::*Setter)(T);\n\npublic:\n\tAutoSetRestore2(T2* aPointer, Getter aGetter, Setter aSetter, T newValue)\n\t\t: pointer(aPointer),\n\t\t  setter(aSetter),\n\t\t  oldValue((aPointer-&gt;*aGetter)())\n\t{\n\t\t(aPointer-&gt;*aSetter)(newValue);\n\t}\n\n\t~AutoSetRestore2()\n\t{\n\t\t(pointer-&gt;*setter)(oldValue);\n\t}\n\nprivate:\n\t// copying is prohibited\n\tAutoSetRestore2(const AutoSetRestore2&amp;);\n\tAutoSetRestore2&amp; operator =(const AutoSetRestore2&amp;);\n\nprivate:\n\tT2* pointer;\n\tSetter setter;\n\tT oldValue;\n};\n\ntemplate &lt;typename F&gt;\nclass Cleanup\n{\npublic:\n\tCleanup(F&amp;&amp; clFunc)\n\t\t: clean(clFunc)\n\t{ }\n\n\t~Cleanup()\n\t{\n\t\tclean();\n\t}\n\nprivate:\n\tF clean;\n};\n\nclass CleanupFunction\n{\n\ttypedef void Func();\n\npublic:\n\tCleanupFunction(Func* clFunc)\n\t\t: clean(clFunc)\n\t{ }\n\n\t~CleanupFunction()\n\t{\n\t\tclean();\n\t}\n\nprivate:\n\tFunc* clean;\n};\n\n} //namespace Firebird\n\n#endif // CLASSES_AUTO_PTR_H\n\n"}, "/build/src/jrd/trace/TraceConfigStorage.h": {"id": "/build/src/jrd/trace/TraceConfigStorage.h", "filePath": "src/jrd/trace/TraceConfigStorage.h", "content": "/*\n *\tPROGRAM:\tFirebird Trace Services\n *\tMODULE:\t\tTraceConfigStorage.h\n *\tDESCRIPTION:\tTrace API shared configurations storage\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Khorsun Vladyslav\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Khorsun Vladyslav &lt;hvlad@users.sourceforge.net&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n */\n\n#ifndef JRD_TRACECONFIGSTORAGE_H\n#define JRD_TRACECONFIGSTORAGE_H\n\n#include &quot;../../common/classes/array.h&quot;\n#include &quot;../../common/classes/fb_string.h&quot;\n#include &quot;../../common/classes/init.h&quot;\n#include &quot;../../common/isc_s_proto.h&quot;\n#include &quot;../../common/ThreadStart.h&quot;\n#include &quot;../../jrd/trace/TraceSession.h&quot;\n#include &quot;../../common/classes/RefCounted.h&quot;\n#include &lt;atomic&gt;\n\nnamespace Jrd {\n\n/*\n  Session ID and flags are stored within slot itself.\n  Length of session data could be less than or equal of slot size.\n  Slots are sorted by session id.\n  Slot for new session is always last slot.\n  When session is removed its slot is marked as unused.\n  Unused slot could be reused: slot itself moved at last position in slots array,\n  higher slots are moved down on its former place, slot data is not moved.\n  Slot is reused with best-fit algorithm.\n*/\n\nclass StorageGuard;\n\nstruct TraceCSHeader final : public Firebird::MemoryHeader\n{\n\tstatic constexpr USHORT TRACE_STORAGE_VERSION = 2;\n\tstatic constexpr USHORT TRACE_STORAGE_MAX_SLOTS = 1000;\n\tstatic constexpr ULONG TRACE_STORAGE_MIN_SIZE = 64 * 1024;\n\tstatic constexpr ULONG TRACE_STORAGE_MAX_SIZE = 16 * 1024 * 1024;\n\n\tstruct Slot\n\t{\n\t\tULONG offset;\n\t\tULONG size;\n\t\tULONG used;\n\t\tULONG ses_id;\n\t\tULONG ses_flags;\n\t\tULONG ses_pid;\n\t};\n\n\tstd::atomic&lt;ULONG&gt; change_number;\n\tstd::atomic&lt;ULONG&gt; session_number;\n\tULONG cnt_uses;\n\tULONG mem_max_size;\t\t\t// maximum allowed mapping size\n\tULONG mem_allocated;\t\t// currently mapped memory\n\tULONG mem_used;\t\t\t\t// used memory\n\tULONG mem_offset;\t\t\t// never used free space begins here\n\tULONG slots_free;\t\t\t// number of unused slots\n\tULONG slots_cnt;\t\t\t// number of slots in use\n\tSlot slots[TRACE_STORAGE_MAX_SLOTS];\n};\n\nstatic_assert(sizeof(TraceCSHeader) &lt; TraceCSHeader::TRACE_STORAGE_MIN_SIZE,\n\t\t\t  &quot;TraceCSHeader not fits TRACE_STORAGE_MIN_SIZE&quot;);\n\n\nclass ConfigStorage final : public Firebird::GlobalStorage, public Firebird::IpcObject, public Firebird::Reasons\n{\npublic:\n\tenum GET_FLAGS {ALL, FLAGS, AUTH};\n\n\tConfigStorage();\n\t~ConfigStorage();\n\n\tvoid addSession(Firebird::TraceSession&amp; session);\n\tvoid updateFlags(const Firebird::TraceSession&amp; session);\n\tvoid removeSession(ULONG id);\n\n\t// get session by sesion id\n\tbool getSession(Firebird::TraceSession&amp; session, GET_FLAGS getFlag);\n\n\tULONG getChangeNumber() const\n\t{ return m_sharedMemory &amp;&amp; m_sharedMemory-&gt;getHeader() ? m_sharedMemory-&gt;getHeader()-&gt;change_number.load() : 0; }\n\n\tvoid acquire();\n\tvoid release();\n\n\tvoid shutdown();\n\n\tmutable Firebird::Mutex m_localMutex;\n\n\tclass Accessor\n\t{\n\tpublic:\n\t\t// Use when storage is not locked by caller\n\t\texplicit Accessor(ConfigStorage* storage) noexcept :\n\t\t\tm_storage(storage),\n\t\t\tm_guard(nullptr)\n\t\t{}\n\n\t\t// Use when storage is locked by caller\n\t\texplicit Accessor(StorageGuard* guard) noexcept;\n\n\t\tvoid restart() noexcept\n\t\t{\n\t\t\tm_change_number = 0;\n\t\t\tm_sesId = 0;\n\t\t\tm_nextIdx = 0;\n\t\t}\n\n\t\tbool getNext(Firebird::TraceSession&amp; session, GET_FLAGS getFlag);\n\n\tprivate:\n\t\tConfigStorage* const m_storage;\n\t\tStorageGuard* const m_guard;\n\t\tULONG m_change_number = 0;\n\t\tULONG m_sesId = 0;\t\t\t\t\t// last seen session ID\n\t\tULONG m_nextIdx = 0;\t\t\t\t// slot index next after last seen one\n\t};\n\nprivate:\n\tvoid mutexBug(int osErrorCode, const char* text) override;\n\tbool initialize(Firebird::SharedMemoryBase*, bool) override;\n\n\tvoid initSharedFile();\n\n\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TRACE_CONFIG; }\n\tUSHORT getVersion() const override { return TraceCSHeader::TRACE_STORAGE_VERSION; }\n\tconst char* getName() const override { return &quot;TraceConfigStorage&quot;; }\n\n\tvoid checkAudit();\n\n\tclass TouchFile final :\n\t\tpublic Firebird::RefCntIface&lt;Firebird::ITimerImpl&lt;TouchFile, Firebird::CheckStatusWrapper&gt; &gt;\n\t{\n\tpublic:\n\t\tTouchFile() :\n\t\t\tfileName(*getDefaultMemoryPool())\n\t\t{}\n\n\t\tvoid handler();\n\t\tvoid start(const char* fName);\n\t\tvoid stop();\n\n\tprivate:\n\t\tFirebird::PathName fileName;\n\t};\n\tFirebird::RefPtr&lt;TouchFile&gt; m_timer;\n\n\tvoid checkDirty() noexcept\n\t{\n\t\tm_dirty = false;\n\t}\n\n\tvoid setDirty()\n\t{\n\t\tif (!m_dirty)\n\t\t{\n\t\t\tif (m_sharedMemory &amp;&amp; m_sharedMemory-&gt;getHeader())\n\t\t\t\tm_sharedMemory-&gt;getHeader()-&gt;change_number++;\n\t\t\tm_dirty = true;\n\t\t}\n\t}\n\n\t// items in every session record at session data\n\tenum ITEM\n\t{\n\t\ttagName = 1,\t\t// session Name\n\t\ttagAuthBlock,\t\t// with which creator logged in\n\t\ttagUserName,\t\t// creator user name\n\t\ttagConfig,\t\t\t// configuration\n\t\ttagStartTS,\t\t\t// date+time when started\n\t\ttagLogFile,\t\t\t// log file name, if any\n\t\ttagRole,\t\t\t// SQL role name, if any\n\t\ttagEnd\n\t};\n\n\t// allocate slot with size &gt;= of given slotLen, returns slot index\n\t// could remap shared memory\n\tULONG allocSlot(ULONG slotSize);\n\tvoid markDeleted(TraceCSHeader::Slot * slot);\n\n\t// remove unused space between slots data\n\tvoid compact();\n\tbool validate();\n\n\tULONG getSessionSize(const Firebird::TraceSession&amp; session) noexcept;\n\n\tbool findSession(ULONG sesId, ULONG&amp; idx);\n\tbool readSession(const TraceCSHeader::Slot* slot, Firebird::TraceSession&amp; session, GET_FLAGS getFlag);\n\n\t// Search for used slot starting from nextIdx and increments nextIdx to point to the next slot\n\t// returns false, if used slot was not found\n\tbool getNextSession(Firebird::TraceSession&amp; session, GET_FLAGS getFlag, ULONG&amp; nextIdx);\n\n\tclass Reader\n\t{\n\tpublic:\n\t\tReader(const void* memory, ULONG size) noexcept :\n\t\t\tm_mem(static_cast&lt;const char*&gt;(memory)),\n\t\t\tm_end(m_mem + size)\n\t\t{}\n\n\t\t// fill tag and len, returns pointer to data or NULL if data can&#x27;t be read\n\t\tconst void* read(ITEM&amp; tag, ULONG&amp; len) noexcept;\n\n\tprivate:\n\t\tconst char* m_mem;\n\t\tconst char* const m_end;\n\t};\n\n\tclass Writer\n\t{\n\tpublic:\n\t\tWriter(void* memory, ULONG size) noexcept :\n\t\t\tm_mem(static_cast&lt;char*&gt;(memory)),\n\t\t\tm_end(m_mem + size)\n\t\t{}\n\n\t\tvoid write(ITEM tag, ULONG len, const void* data);\n\n\tprivate:\n\t\tchar* m_mem;\n\t\tconst char* const m_end;\n\t};\n\n\tFirebird::AutoPtr&lt;Firebird::SharedMemory&lt;TraceCSHeader&gt; &gt; m_sharedMemory;\n\tFirebird::PathName m_filename;\n\tint m_recursive;\n\tThreadId m_mutexTID;\n\tbool m_dirty;\n};\n\n\nclass StorageInstance\n{\nprivate:\n\tFirebird::Mutex initMtx;\n\tConfigStorage* storage;\n\npublic:\n\texplicit StorageInstance(Firebird::MemoryPool&amp;) :\n\t\tstorage(NULL)\n\t{}\n\n\t~StorageInstance()\n\t{\n\t\tdelete storage;\n\t}\n\n\tConfigStorage* getStorage()\n\t{\n\t\tif (!storage)\n\t\t{\n\t\t\tFirebird::MutexLockGuard guard(initMtx, FB_FUNCTION);\n\t\t\tif (!storage)\n\t\t\t{\n\t\t\t\tstorage = FB_NEW ConfigStorage;\n\t\t\t}\n\t\t}\n\t\treturn storage;\n\t}\n};\n\n\nclass StorageGuard final : public Firebird::MutexLockGuard\n{\npublic:\n\texplicit StorageGuard(ConfigStorage* storage) :\n\t\tFirebird::MutexLockGuard(storage-&gt;m_localMutex, FB_FUNCTION), m_storage(storage)\n\t{\n\t\tm_storage-&gt;acquire();\n\t}\n\n\t~StorageGuard()\n\t{\n\t\tm_storage-&gt;release();\n\t}\n\n\tConfigStorage* getStorage() noexcept\n\t{\n\t\treturn m_storage;\n\t}\n\nprivate:\n\tConfigStorage* m_storage;\n};\n\n\ninline ConfigStorage::Accessor::Accessor(StorageGuard* guard) noexcept :\n\tm_storage(guard-&gt;getStorage()),\n\tm_guard(guard)\n{}\n\n}\n\n#endif\n"}, "/build/src/common/StatusHolder.h": {"id": "/build/src/common/StatusHolder.h", "filePath": "src/common/StatusHolder.h", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusHolder.h\n *\tDESCRIPTION:\tFirebird&#x27;s exception classes\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Vlad Khorsun\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2007 Vlad Khorsun &lt;hvlad at users.sourceforge.net&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_STATUS_HOLDER\n#define FB_STATUS_HOLDER\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/DynamicStrings.h&quot;\n\nnamespace Firebird {\n\n// DynamicVector owns strings, contained in it\ntemplate &lt;unsigned S&gt;\nclass DynamicVector : private SimpleStatusVector&lt;S&gt;\n{\npublic:\n\texplicit DynamicVector(MemoryPool&amp; p)\n\t\t: SimpleStatusVector&lt;S&gt;(p)\n\t{\n\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t}\n\n\t~DynamicVector()\n\t{\n\t\tdelete[] findDynamicStrings(this-&gt;getCount(), this-&gt;begin());\n\t}\n\nprivate:\n\tchar* prepareForNewValue()\n\t{\n\t\t// Do not delete old strings buffer because strings from it\n\t\t// may be used in status vector passed to current save() call.\n\t\t// I.e. strings should be first saved in new dynamic buffer and only afterwards\n\t\t// old buffer may be released.\n\t\tchar* oldBuffer = findDynamicStrings(this-&gt;getCount(), this-&gt;begin());\n\t\tthis-&gt;resize(0);\n\t\treturn oldBuffer;\n\t}\n\npublic:\n\tvoid clear()\n\t{\n\t\tdelete[] this-&gt;prepareForNewValue();\n\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t}\n\n\tvoid save(unsigned int length, const ISC_STATUS* status, bool warningMode) noexcept\n\t{\n\t\ttry\n\t\t{\n\t\t\tchar* oldBuffer = this-&gt;prepareForNewValue();\n\t\t\tISC_STATUS* b = this-&gt;getBuffer(length + 1);\n\t\t\tunsigned newLen = makeDynamicStrings(length, b, status);\n\t\t\tdelete[] oldBuffer;\n\n\t\t\tfb_assert(newLen &lt;= length);\n\n\t\t\t// Sanity check\n\t\t\tif (newLen &lt; 2)\n\t\t\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t\t\telse\n\t\t\t\tthis-&gt;resize(newLen + 1);\n\t\t}\n\t\tcatch (const BadAlloc&amp;)\n\t\t{\n\t\t\tif (!warningMode)\n\t\t\t{\n\t\t\t\t// do not use stuff here to avoid endless cycle\n\t\t\t\tthis-&gt;shrink(3);\n\t\t\t\tISC_STATUS* s = this-&gt;getBuffer(3);\t// Should not throw - see assert() in ctor\n\t\t\t\tfb_utils::statusBadAlloc(s);\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tthis-&gt;clear();\n\t\t\t}\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tfb_assert(false);\n\n\t\t\tthis-&gt;shrink(3);\n\t\t\tISC_STATUS* s = this-&gt;getBuffer(3);\t// Should not throw - see assert() in ctor\n\t\t\tfb_utils::statusUnknown(s);\n\t\t}\n\t}\n\n\tISC_STATUS save(const ISC_STATUS* status, bool warningMode = false) noexcept\n\t{\n\t\tsave(fb_utils::statusLength(status), status, warningMode);\n\t\treturn status[1];\n\t}\n\n\tconst ISC_STATUS* value() const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::begin();\n\t}\n\n\tunsigned length() const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::getCount();\n\t}\n\n\tISC_STATUS operator[](unsigned int index) const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::operator[](index);\n\t}\n};\n\n\n// DynamicStatusVector performs error/success checks and load from IStatus\nclass DynamicStatusVector : public DynamicVector&lt;ISC_STATUS_LENGTH&gt;\n{\npublic:\n\tDynamicStatusVector()\n\t\t: DynamicVector(*getDefaultMemoryPool())\n\t{ }\n\n\tISC_STATUS load(const IStatus* status);\n\n\tISC_STATUS getError() const\n\t{\n\t\treturn value()[1];\n\t}\n\n\tbool isSuccess() const\n\t{\n\t\treturn getError() == 0;\n\t}\n};\n\n\n// Implements IStatus using 2 DynamicVectors\ntemplate &lt;class Final&gt;\nclass BaseStatus : public IStatusImpl&lt;Final, CheckStatusWrapper&gt;\n{\npublic:\n\t// IStatus implementation\n\tvoid init()\n\t{\n\t\terrors.clear();\n\t\twarnings.clear();\n\t}\n\n\tvoid setErrors(const ISC_STATUS* value)\n\t{\n\t\terrors.save(fb_utils::statusLength(value), value, false);\n\t}\n\n\tvoid setErrors2(unsigned int length, const ISC_STATUS* value)\n\t{\n\t\terrors.save(length, value, false);\n\t}\n\n\tvoid setWarnings(const ISC_STATUS* value)\n\t{\n\t\twarnings.save(fb_utils::statusLength(value), value, true);\n\t}\n\n\tvoid setWarnings2(unsigned int length, const ISC_STATUS* value)\n\t{\n\t\twarnings.save(length, value, true);\n\t}\n\n\tconst ISC_STATUS* getErrors() const\n\t{\n\t\treturn errors.value();\n\t}\n\n\tconst ISC_STATUS* getWarnings() const\n\t{\n\t\treturn warnings.value();\n\t}\n\n\tunsigned getState() const\n\t{\n\t\treturn (errors.value()[1] ? IStatus::STATE_ERRORS : 0) |\n\t\t\t   (warnings.value()[1] ? IStatus::STATE_WARNINGS  : 0);\n\t}\n\n\tIStatus* clone() const\n\t{\n\t\tIStatus* ret = MasterInterfacePtr()-&gt;getStatus();\n\n\t\tret-&gt;setWarnings(getWarnings());\n\t\tret-&gt;setErrors(getErrors());\n\n\t\treturn ret;\n\t}\n\npublic:\n\texplicit BaseStatus(MemoryPool&amp; p)\n\t\t: errors(p), warnings(p)\n\t{\n\t\tinit();\n\t}\n\n\tBaseStatus()\n\t\t: errors(*getDefaultMemoryPool()), warnings(*getDefaultMemoryPool())\n\t{\n\t\tinit();\n\t}\n\n\tvoid check()\n\t{\n\t\tconst ISC_STATUS* s = errors.value();\n\t\tif (s[0] == isc_arg_gds &amp;&amp; s[1] != isc_arg_end)\n\t\t\tstatus_exception::raise(s);\n\t}\n\nprotected:\n\tvoid clear()\n\t{\n\t\terrors.clear();\n\t\twarnings.clear();\n\t}\n\nprivate:\n\tDynamicVector&lt;11&gt; errors;\t\t// gds-code (2) + 3 args (6) + stack trace (2) + end (1)\n\tDynamicVector&lt;3&gt; warnings;\t\t// no warnings (empty vector)\n};\n\n\n// Hold status vector and raise error on request\nclass StatusHolder : public BaseStatus&lt;StatusHolder&gt;\n{\npublic:\n\tStatusHolder()\n\t\t: BaseStatus(*getDefaultMemoryPool()), m_raised(false)\n\t{ }\n\n\tISC_STATUS save(IStatus* status);\n\tvoid clear();\n\tvoid raise();\n\n\tISC_STATUS getError()\n\t{\n\t\treturn value()-&gt;getErrors()[1];\n\t}\n\n\tconst IStatus* value()\n\t{\n\t\tif (m_raised)\n\t\t\tclear();\n\n\t\treturn this;\n\t}\n\n\tbool isSuccess()\n\t{\n\t\treturn getError() == 0;\n\t}\n\n\tconst StatusHolder&amp; operator=(const StatusHolder&amp; val)\n\t{\n\t\tsetErrors(val.getErrors());\n\t\tsetWarnings(val.getWarnings());\n\t\tm_raised = val.m_raised;\n\t\treturn *this;\n\t}\n\npublic:\n\tvoid dispose() override\n\t{\n\t}\n\nprivate:\n\tbool m_raised;\n};\n\n\n// Status interface to be used on stack when entering engine\nclass LocalStatus : public AutoStorage, public BaseStatus&lt;LocalStatus&gt;\n{\npublic:\n\tLocalStatus()\n\t\t: AutoStorage(), BaseStatus&lt;LocalStatus&gt;(getPool())\n\t{ }\n\n\texplicit LocalStatus(MemoryPool&amp; p)\n\t\t: AutoStorage(p), BaseStatus&lt;LocalStatus&gt;(getPool())\n\t{ }\n\npublic:\n\tvoid dispose() override\n\t{\n\t}\n\npublic:\n\tstatic void checkException(LocalStatus* status)\n\t{\n\t}\n\n\tstatic void catchException(LocalStatus* status)\n\t{\n\t\tBaseStatusWrapper&lt;LocalStatus&gt;::catchException(status);\n\t}\n\n\tstatic void setVersionError(IStatus* status, const char* interfaceName,\n\t\tunsigned currentVersion, unsigned expectedVersion)\n\t{\n\t\tBaseStatusWrapper&lt;LocalStatus&gt;::setVersionError(\n\t\t\tstatus, interfaceName,currentVersion, expectedVersion);\n\t}\n};\n\n} // namespace Firebird\n\n\n#endif // FB_STATUS_HOLDER\n"}, "/build/src/jrd/replication/Manager.h": {"id": "/build/src/jrd/replication/Manager.h", "filePath": "src/jrd/replication/Manager.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Dmitry Yemanov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2014 Dmitry Yemanov &lt;dimitr@firebirdsql.org&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n\n#ifndef JRD_REPLICATION_MANAGER_H\n#define JRD_REPLICATION_MANAGER_H\n\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/semaphore.h&quot;\n#include &quot;../common/SimilarToRegex.h&quot;\n#include &quot;../common/os/guid.h&quot;\n#include &quot;../../jrd/QualifiedName.h&quot;\n#include &quot;../common/isc_s_proto.h&quot;\n#include &quot;../../jrd/intl_classes.h&quot;\n\n#include &quot;Config.h&quot;\n#include &quot;ChangeLog.h&quot;\n\nnamespace Replication\n{\n\tclass TableMatcher\n\t{\n\t\ttypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::Left&lt;Jrd::QualifiedName, bool&gt; &gt; &gt; TablePermissionMap;\n\n\tpublic:\n\t\tTableMatcher(MemoryPool&amp; pool,\n\t\t\t\t\t const Firebird::string&amp; includeSchemaFilter,\n\t\t\t\t\t const Firebird::string&amp; excludeSchemaFilter,\n\t\t\t\t\t const Firebird::string&amp; includeFilter,\n\t\t\t\t\t const Firebird::string&amp; excludeFilter);\n\n\t\tbool matchTable(const Jrd::QualifiedName&amp; tableName);\n\n\tprivate:\n\t\tFirebird::AutoPtr&lt;Firebird::SimilarToRegex&gt; m_includeSchemaMatcher;\n\t\tFirebird::AutoPtr&lt;Firebird::SimilarToRegex&gt; m_excludeSchemaMatcher;\n\t\tFirebird::AutoPtr&lt;Firebird::SimilarToRegex&gt; m_includeMatcher;\n\t\tFirebird::AutoPtr&lt;Firebird::SimilarToRegex&gt; m_excludeMatcher;\n\t\tTablePermissionMap m_tables;\n\t};\n\n\tclass Manager final : public Firebird::GlobalStorage\n\t{\n\t\tstruct SyncReplica\n\t\t{\n\t\t\tSyncReplica(Firebird::MemoryPool&amp; pool, Firebird::IAttachment* att, Firebird::IReplicator* repl)\n\t\t\t\t: status(pool), attachment(att), replicator(repl)\n\t\t\t{}\n\n\t\t\tFirebird::FbLocalStatus status;\n\t\t\tFirebird::IAttachment* attachment;\n\t\t\tFirebird::IReplicator* replicator;\n\t\t};\n\n\tpublic:\n\t\tManager(const Firebird::string&amp; dbId, const Replication::Config* config);\n\t\t~Manager();\n\n\t\tvoid shutdown();\n\n\t\tFirebird::UCharBuffer* getBuffer();\n\t\tvoid releaseBuffer(Firebird::UCharBuffer* buffer);\n\n\t\tvoid flush(Firebird::UCharBuffer* buffer, bool sync, bool prepare);\n\n\t\tvoid forceJournalSwitch()\n\t\t{\n\t\t\tif (m_changeLog)\n\t\t\t\tm_changeLog-&gt;forceSwitch();\n\t\t}\n\n\t\tvoid journalCleanup()\n\t\t{\n\t\t\tif (m_changeLog)\n\t\t\t\tm_changeLog-&gt;cleanup();\n\t\t}\n\n\t\tconst Replication::Config* getConfig() const noexcept\n\t\t{\n\t\t\treturn m_config;\n\t\t}\n\n\tprivate:\n\t\tvoid bgWriter();\n\n\t\tstatic THREAD_ENTRY_DECLARE writer_thread(THREAD_ENTRY_PARAM arg)\n\t\t{\n\t\t\tManager* const mgr = static_cast&lt;Manager*&gt;(arg);\n\t\t\tmgr-&gt;bgWriter();\n\t\t\treturn 0;\n\t\t}\n\n\t\tFirebird::Semaphore m_startupSemaphore;\n\t\tFirebird::Semaphore m_cleanupSemaphore;\n\t\tFirebird::Semaphore m_workingSemaphore;\n\n\t\tconst Replication::Config* const m_config;\n\t\tFirebird::Array&lt;SyncReplica*&gt; m_replicas;\n\t\tFirebird::Array&lt;Firebird::UCharBuffer*&gt; m_buffers;\n\t\tFirebird::Mutex m_buffersMutex;\n\t\tFirebird::Array&lt;Firebird::UCharBuffer*&gt; m_queue;\n\t\tFirebird::Mutex m_queueMutex;\n\t\tULONG m_queueSize;\n\t\tFB_UINT64 m_sequence;\n\n\t\tvolatile bool m_shutdown;\n\t\tvolatile bool m_signalled;\n\n\t\tFirebird::AutoPtr&lt;ChangeLog&gt; m_changeLog;\n\t\tFirebird::RWLock m_lock;\n\t};\n}\n\n#endif // JRD_REPLICATION_MANAGER_H\n"}, "/build/src/common/status.h": {"id": "/build/src/common/status.h", "filePath": "src/common/status.h", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tstatus.h\n *\tDESCRIPTION:\tStatus vector filling and parsing.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Mike Nordell\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2001 Mike Nordell &lt;tamlin at algonet.se&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n */\n\n\n#ifndef COMMON_STATUS_H\n#define COMMON_STATUS_H\n\n#include &quot;fb_exception.h&quot;\n#include &quot;../common/isc_proto.h&quot;\n#include &quot;../common/StatusHolder.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &lt;utility&gt;\n\ninline constexpr int MAX_ERRMSG_LEN = 128;\ninline constexpr int MAX_ERRSTR_LEN = 1024;\n\nnamespace Firebird\n{\n\ttemplate &lt;class SW&gt;\n\tclass LocalStatusWrapper\n\t{\n\tpublic:\n\t\ttemplate &lt;typename... Args&gt;\n\t\tLocalStatusWrapper(Args&amp;&amp;... args)\n\t\t\t: localStatusVector(&amp;localStatus, std::forward&lt;Args&gt;(args)...)\n\t\t{ }\n\n\t\ttemplate &lt;typename... Args&gt;\n\t\texplicit LocalStatusWrapper(Firebird::MemoryPool&amp; p, Args&amp;&amp;... args)\n\t\t\t: localStatus(p), localStatusVector(&amp;localStatus, std::forward&lt;Args&gt;(args)...)\n\t\t{ }\n\n\t\tSW* operator-&gt;() noexcept\n\t\t{\n\t\t\treturn &amp;localStatusVector;\n\t\t}\n\n\t\tSW* operator&amp;() noexcept\n\t\t{\n\t\t\treturn &amp;localStatusVector;\n\t\t}\n\n\t\tISC_STATUS operator[](unsigned n) const\n\t\t{\n\t\t\tfb_assert(n &lt; fb_utils::statusLength(localStatusVector.getErrors()));\n\t\t\treturn localStatusVector.getErrors()[n];\n\t\t}\n\n\t\tconst SW* operator-&gt;() const noexcept\n\t\t{\n\t\t\treturn &amp;localStatusVector;\n\t\t}\n\n\t\tconst SW* operator&amp;() const noexcept\n\t\t{\n\t\t\treturn &amp;localStatusVector;\n\t\t}\n\n\t\tvoid check() const\n\t\t{\n\t\t\tif (localStatusVector.isDirty())\n\t\t\t{\n\t\t\t\tif (localStatus.getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t\t\t\traise();\n\t\t\t}\n\t\t}\n\n\t\tvoid copyTo(SW* to) const noexcept\n\t\t{\n\t\t\tfb_utils::copyStatus(to, &amp;localStatusVector);\n\t\t}\n\n\t\tvoid loadFrom(const SW* to) noexcept\n\t\t{\n\t\t\tfb_utils::copyStatus(&amp;localStatusVector, to);\n\t\t}\n\n\t\t[[noreturn]] void raise() const\n\t\t{\n\t\t\tFirebird::status_exception::raise(&amp;localStatus);\n\t\t}\n\n\t\tbool isEmpty() const\n\t\t{\n\t\t\treturn localStatusVector.isEmpty();\n\t\t}\n\n\t\tbool isSuccess() const\n\t\t{\n\t\t\treturn localStatusVector.isEmpty();\n\t\t}\n\n\tprivate:\n\t\tFirebird::LocalStatus localStatus;\n\t\tSW localStatusVector;\n\t};\n\n\ttypedef LocalStatusWrapper&lt;CheckStatusWrapper&gt; FbLocalStatus;\n\n\tclass LogWrapper : public BaseStatusWrapper&lt;LogWrapper&gt;\n\t{\n\tpublic:\n\t\tLogWrapper(IStatus* aStatus, const char* aText = nullptr)\n\t\t\t: BaseStatusWrapper(aStatus),\n\t\t\t  text(aText)\n\t\t{\n\t\t}\n\n\tpublic:\n\t\tstatic void checkException(const LogWrapper* status)\n\t\t{\n\t\t\tif (status-&gt;dirty &amp;&amp; (status-&gt;getState() &amp; IStatus::STATE_ERRORS))\n\t\t\t\tiscLogStatus(status-&gt;text, status-&gt;status);\n\t\t}\n\n\tprivate:\n\t\tconst char* text;\n\t};\n\n\ttypedef LocalStatusWrapper&lt;LogWrapper&gt; LogLocalStatus;\n\n\tclass ThrowWrapper : public BaseStatusWrapper&lt;ThrowWrapper&gt;\n\t{\n\tpublic:\n\t\tThrowWrapper(IStatus* aStatus)\n\t\t\t: BaseStatusWrapper(aStatus)\n\t\t{\n\t\t}\n\n\tpublic:\n\t\tstatic void checkException(const ThrowWrapper* status)\n\t\t{\n\t\t\tif (status-&gt;dirty &amp;&amp; (status-&gt;getState() &amp; IStatus::STATE_ERRORS))\n\t\t\t\tstatus_exception::raise(status-&gt;status);\n\t\t}\n\t};\n\n\ttypedef LocalStatusWrapper&lt;ThrowWrapper&gt; ThrowLocalStatus;\n\n\tclass ThrowStatusExceptionWrapper : public ThrowStatusWrapper\n\t{\n\tpublic:\n\t\tThrowStatusExceptionWrapper(IStatus* aStatus)\n\t\t\t: ThrowStatusWrapper(aStatus)\n\t\t{\n\t\t}\n\n\tpublic:\n\t\tstatic void catchException(IStatus* status)\n\t\t{\n\t\t\tif (!status)\n\t\t\t\treturn;\n\n\t\t\ttry\n\t\t\t{\n\t\t\t\tthrow;\n\t\t\t}\n\t\t\tcatch (const FbException&amp; e)\n\t\t\t{\n\t\t\t\tstatus-&gt;setErrors(e.getStatus()-&gt;getErrors());\n\t\t\t}\n\t\t\tcatch (const status_exception&amp; e)\n\t\t\t{\n\t\t\t\tstatus-&gt;setErrors(e.value());\n\t\t\t}\n\t\t\tcatch (...)\n\t\t\t{\n\t\t\t\tconst ISC_STATUS statusVector[] = {\n\t\t\t\t\tisc_arg_gds, isc_random,\n\t\t\t\t\tisc_arg_string, (ISC_STATUS) &quot;Unrecognized C++ exception&quot;,\n\t\t\t\t\tisc_arg_end};\n\t\t\t\tstatus-&gt;setErrors(statusVector);\n\t\t\t}\n\t\t}\n\t};\n}\n\n#endif // COMMON_STATUS_H\n"}, "/build/src/common/classes/stack.h": {"id": "/build/src/common/classes/stack.h", "filePath": "src/common/classes/stack.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tstack.h\n *\tDESCRIPTION:\tStack.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alexander Peshkoff\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Alexander Peshkoff &lt;peshkoff@mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n */\n\n#ifndef CLASSES_STACK_H\n#define CLASSES_STACK_H\n\n#include &quot;../common/classes/vector.h&quot;\n\nnamespace Firebird {\n\n\ttemplate &lt;typename Object, FB_SIZE_T Capacity = 16&gt;\n\t\tclass Stack : public AutoStorage\n\t{\n\tprivate:\n\t\tStack(Stack&lt;Object, Capacity&gt;&amp;);\t// not implemented\n\n\t\tclass Entry : public Vector&lt;Object, Capacity&gt;\n\t\t{\n\t\tprivate:\n\t\t\ttypedef Vector&lt;Object, Capacity&gt; inherited;\n\t\tpublic:\n\t\t\tEntry* next;\n\n\t\t\tEntry(Object e, Entry* stk)\n\t\t\t\t: inherited(), next(stk)\n\t\t\t{\n\t\t\t\tthis-&gt;add(e);\n\t\t\t}\n\n\t\t\tEntry(Entry* stk) : inherited(), next(stk) { }\n\n\t\t\t~Entry()\n\t\t\t{\n\t\t\t\tdelete next;\n\t\t\t}\n\n\t\t\tEntry* push(Object e, MemoryPool&amp; p)\n\t\t\t{\n\t\t\t\tif (inherited::getCount() &lt; this-&gt;getCapacity())\n\t\t\t\t{\n\t\t\t\t\tthis-&gt;add(e);\n\t\t\t\t\treturn this;\n\t\t\t\t}\n\t\t\t\tEntry* newEntry = FB_NEW_POOL(p) Entry(e, this);\n\t\t\t\treturn newEntry;\n\t\t\t}\n\n\t\t\tObject pop()\n\t\t\t{\n\t\t\t\tfb_assert(inherited::getCount() &gt; 0);\n\t\t\t\treturn this-&gt;data[--this-&gt;count];\n\t\t\t}\n\n\t\t\tObject getObject(FB_SIZE_T pos) const\n\t\t\t{\n\t\t\t\treturn this-&gt;data[pos];\n\t\t\t}\n\n\t\t\tvoid split(FB_SIZE_T elem, Entry* target)\n\t\t\t{\n\t\t\t\tfb_assert(elem &gt; 0 &amp;&amp; elem &lt; this-&gt;count);\n\t\t\t\tfb_assert(target-&gt;count == 0);\n\t\t\t\ttarget-&gt;count = this-&gt;count - elem;\n\t\t\t\tmemcpy(target-&gt;data, &amp;this-&gt;data[elem], target-&gt;count * sizeof(Object));\n\t\t\t\tthis-&gt;count = elem;\n\t\t\t}\n\n\t\t\tEntry* dup(MemoryPool&amp; p)\n\t\t\t{\n\t\t\t\tEntry* rc = FB_NEW_POOL(p) Entry(next ? next-&gt;dup(p) : 0);\n\t\t\t\trc-&gt;join(*this);\n\t\t\t\treturn rc;\n\t\t\t}\n\n\t\t\tbool hasMore(FB_SIZE_T value) const\n\t\t\t{\n\t\t\t\tfor (const Entry* stk = this; stk; stk = stk-&gt;next)\n\t\t\t\t{\n\t\t\t\t\tFB_SIZE_T c = static_cast&lt;const inherited*&gt;(stk)-&gt;getCount();\n\t\t\t\t\tif (value &lt; c)\n\t\t\t\t\t{\n\t\t\t\t\t\treturn true;\n\t\t\t\t\t}\n\t\t\t\t\tvalue -= c;\n\t\t\t\t}\n\n\t\t\t\treturn false;\n\t\t\t}\n\n\t\t}; // class Entry\n\n\t\tEntry* stk;\n\t\tEntry* stk_cache;\n\n\tpublic:\n\t\texplicit Stack(MemoryPool&amp; p)\n\t\t\t: AutoStorage(p), stk(0), stk_cache(0)\n\t\t{ }\n\n\t\tStack() : AutoStorage(), stk(0), stk_cache(0) { }\n\n\t\t~Stack()\n\t\t{\n\t\t\tdelete stk;\n\t\t\tdelete stk_cache;\n\t\t}\n\n\t\tvoid push(const Object&amp; e)\n\t\t{\n\t\t\tif (!stk &amp;&amp; stk_cache)\n\t\t\t{\n\t\t\t\tstk = stk_cache;\n\t\t\t\tstk_cache = 0;\n\t\t\t}\n\t\t\tstk = stk ? stk-&gt;push(e, getPool())\n\t\t\t\t\t  : FB_NEW_POOL(getPool()) Entry(e, 0);\n\t\t}\n\n\t\tvoid push(const Stack&amp; s)\n\t\t{\n\t\t\tfor (const_iterator itr(s); itr.hasData(); ++itr)\n\t\t\t\tpush(itr.object());\n\t\t}\n\n\t\tObject pop()\n\t\t{\n\t\t\tfb_assert(stk);\n\t\t\tObject tmp = stk-&gt;pop();\n\t\t\tif (!stk-&gt;getCount())\n\t\t\t{\n\t\t\t\tfb_assert(!stk_cache);\n\t\t\t\tstk_cache = stk;\n\t\t\t\tstk = stk-&gt;next;\n\t\t\t\tstk_cache-&gt;next = 0;\n\n\t\t\t\t// don&#x27;t delete last empty Entry\n\t\t\t\tif (stk)\n\t\t\t\t{\n\t\t\t\t\tdelete stk_cache;\n\t\t\t\t\tstk_cache = 0;\n\t\t\t\t}\n\t\t\t}\n\t\t\treturn tmp;\n\t\t}\n\n\tprivate:\n\t\t// disable use of default operator=\n\t\tStack&lt;Object, Capacity&gt;&amp; operator= (const Stack&lt;Object, Capacity&gt;&amp; s);\n\n\tpublic:\n\t\tvoid takeOwnership (Stack&lt;Object, Capacity&gt;&amp; s)\n\t\t{\n\t\t\tfb_assert(&amp;getPool() == &amp;s.getPool());\n\t\t\tdelete stk;\n\t\t\tstk = s.stk;\n\t\t\ts.stk = 0;\n\n\t\t\tif (stk)\n\t\t\t{\n\t\t\t\tdelete stk_cache;\n\t\t\t\tstk_cache = 0;\n\t\t\t}\n\t\t}\n\n\t\t// Push a element on the stack and pop when we go out of scope.\n\t\tclass AutoPushPop\n\t\t{\n\t\tpublic:\n\t\t\tAutoPushPop(Stack&lt;Object, Capacity&gt;&amp; s, const Object&amp; o)\n\t\t\t\t: stack(s)\n\t\t\t{\n\t\t\t\tstack.push(o);\n\t\t\t}\n\n\t\t\t~AutoPushPop()\n\t\t\t{\n\t\t\t\tstack.pop();\n\t\t\t}\n\n\t\tprivate:\n\t\t\tStack&lt;Object, Capacity&gt;&amp; stack;\n\t\t};\n\n\t\t// Restore the stack when we go out of scope.\n\t\tclass AutoRestore\n\t\t{\n\t\tpublic:\n\t\t\texplicit AutoRestore(Stack&lt;Object, Capacity&gt;&amp; s)\n\t\t\t\t: stack(s),\n\t\t\t\t  count(s.getCount())\n\t\t\t{\n\t\t\t}\n\n\t\t\t~AutoRestore()\n\t\t\t{\n\t\t\t\tFB_SIZE_T currentCount = stack.getCount();\n\t\t\t\tfb_assert(currentCount &gt;= count);\n\n\t\t\t\twhile (currentCount-- &gt; count)\n\t\t\t\t\tstack.pop();\n\t\t\t}\n\n\t\tprivate:\n\t\t\tStack&lt;Object, Capacity&gt;&amp; stack;\n\t\t\tFB_SIZE_T count;\n\t\t};\n\n\t\tclass iterator;\n\t\tfriend class iterator;\n\t\tfriend class reverse_iterator;\n\n\t\t// Very basic iterator, that permits to walk linked list in backwards direction\n\t\t// and remove elements along the way.\n\t\tclass reverse_iterator\n\t\t{\n\t\tprivate:\n\t\t\tStack&lt;Object, Capacity&gt;&amp; stack;\n\t\t\tStack&lt;Entry*&gt; entries;\n\t\t\tEntry* current_entry;\n\t\t\tFB_SIZE_T elem;\n\n\t\tpublic:\n\t\t\texplicit reverse_iterator(Stack&lt;Object, Capacity&gt;&amp; s)\n\t\t\t\t: stack(s), entries(s.getPool()), elem(0)\n\t\t\t{\n\t\t\t\tcurrent_entry = s.stk;\n\t\t\t\tif (current_entry) {\n\t\t\t\t\twhile (Entry *next = current_entry-&gt;next) {\n\t\t\t\t\t\tentries.push(current_entry);\n\t\t\t\t\t\tcurrent_entry = next;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tbool hasData() const\n\t\t\t{\n\t\t\t\treturn current_entry;\n\t\t\t}\n\n\t\t\treverse_iterator&amp; operator++()\n\t\t\t{\n\t\t\t\tfb_assert(current_entry);\n\t\t\t\telem++;\n\n\t\t\t\tif (elem &gt;= current_entry-&gt;getCount()) {\n\t\t\t\t\telem = 0;\n\t\t\t\t\tif (entries.hasData())\n\t\t\t\t\t\tcurrent_entry = entries.pop();\n\t\t\t\t\telse\n\t\t\t\t\t\tcurrent_entry = NULL;\n\t\t\t\t}\n\n\t\t\t\treturn *this;\n\t\t\t}\n\n\t\t\tObject object() const\n\t\t\t{\n\t\t\t\tfb_assert(current_entry);\n\t\t\t\treturn current_entry-&gt;getObject(elem);\n\t\t\t}\n\n\t\t\tvoid remove() {\n\t\t\t\tfb_assert(current_entry);\n\t\t\t\tcurrent_entry-&gt;remove(elem);\n\n\t\t\t\tif (elem &gt;= current_entry-&gt;getCount()) {\n\t\t\t\t\tif (elem) {\n\t\t\t\t\t\t// Simple case - just advance pointer\n\t\t\t\t\t\telem = 0;\n\t\t\t\t\t\tif (entries.hasData())\n\t\t\t\t\t\t\tcurrent_entry = entries.pop();\n\t\t\t\t\t\telse\n\t\t\t\t\t\t\tcurrent_entry = NULL;\n\t\t\t\t\t}\n\t\t\t\t\telse {\n\t\t\t\t\t\t// Complicated case - Entry is empty and we need to delete it\n\t\t\t\t\t\tif (entries.hasData()) {\n\t\t\t\t\t\t\tEntry* previous = entries.pop();\n\t\t\t\t\t\t\tprevious-&gt;next = current_entry-&gt;next;\n\t\t\t\t\t\t\tcurrent_entry-&gt;next = NULL;\n\t\t\t\t\t\t\tdelete current_entry;\n\t\t\t\t\t\t\tcurrent_entry = previous;\n\t\t\t\t\t\t}\n\t\t\t\t\t\telse {\n\t\t\t\t\t\t\tstack.stk = current_entry-&gt;next;\n\t\t\t\t\t\t\tcurrent_entry-&gt;next = NULL;\n\t\t\t\t\t\t\tdelete current_entry;\n\t\t\t\t\t\t\tcurrent_entry = NULL;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\n\t\tprivate:\n\t\t\treverse_iterator(const r
