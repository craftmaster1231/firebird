 = delete;\n\tWorkerContextHolder&amp; operator=(const WorkerContextHolder&amp;) = delete;\n};\n\n\nclass WorkerAttachment\n{\n\tfriend class WorkerStableAttachment;\n\npublic:\n\texplicit WorkerAttachment();\n\n\tstatic Jrd::StableAttachmentPart* getAttachment(FbStatusVector* status, Jrd::Database* dbb);\n\tstatic void releaseAttachment(FbStatusVector* status, Jrd::StableAttachmentPart* sAtt);\n\n\tstatic bool detachIdle(Jrd::StableAttachmentPart* sAtt);\n\n\tstatic void incUserAtts(const Firebird::PathName&amp; dbname);\n\tstatic void decUserAtts(const Firebird::PathName&amp; dbname);\n\n\tstatic void shutdown();\n\tstatic void shutdownDbb(Jrd::Database* dbb);\n\nprivate:\n\tstatic WorkerAttachment* getByName(const Firebird::PathName&amp; dbname);\n\tJrd::StableAttachmentPart* doAttach(FbStatusVector* status, Jrd::Database* dbb);\n\tstatic void doDetach(FbStatusVector* status, Jrd::StableAttachmentPart* sAtt);\n\tvoid clear(bool checkRefs);\n\n\tvoid incWorkers();\n\tvoid decWorkers();\n\tvoid waitForWorkers();\n\n\n\ttypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::Left&lt;Firebird::PathName, WorkerAttachment*&gt; &gt; &gt;\n\t\tMapDbIdToWorkAtts;\n\n\tstatic Firebird::GlobalPtr&lt;Firebird::Mutex&gt; m_mapMutex;\n\tstatic Firebird::GlobalPtr&lt;MapDbIdToWorkAtts&gt; m_map;\n\tstatic bool m_shutdown;\n\n\tFirebird::Mutex m_mutex;\n\tFirebird::HalfStaticArray&lt;Jrd::StableAttachmentPart*, 8&gt; m_idleAtts;\n\tFirebird::SortedArray&lt;Jrd::StableAttachmentPart*,\n\t\tFirebird::InlineStorage&lt;Jrd::StableAttachmentPart*, 8&gt; &gt; m_activeAtts;\n\n\t// count of regular user attachments, used with non-shared Database\n\tint m_cntUserAtts = 0;\n\n\t// count of internal worker attachments, used with shared Database\n\tint m_cntWorkers = 0;\n\n\t// used to wait for &quot;no internal workers&quot; condition\n\tFirebird::Condition m_noWorkers;\n};\n\n} // namespace Jrd\n\n#endif // JRD_WORKER_ATTACHMENT_H\n"}, "/build/src/jrd/nbak.h": {"id": "/build/src/jrd/nbak.h", "filePath": "src/jrd/nbak.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tnbak.h\n *\tDESCRIPTION:\tIncremental backup interface definitions\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s):\n *\n *  Roman Simakov &lt;roman-simakov@users.sourceforge.net&gt;\n *\n */\n\n#ifndef JRD_NBAK_H\n#define JRD_NBAK_H\n\n#include &quot;../common/classes/tree.h&quot;\n#include &quot;../common/classes/rwlock.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;GlobalRWLock.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/Attachment.h&quot;\n\n// Uncomment this line if you need to trace backup-related activity\n//#define NBAK_DEBUG\n\n#ifdef NBAK_DEBUG\nDEFINE_TRACE_ROUTINE(nbak_trace);\n#define NBAK_TRACE(args) nbak_trace args\n#define NBAK_TRACE_AST(message) gds__trace(message)\n#else\n#define NBAK_TRACE(args) /* nothing */\n#define NBAK_TRACE_AST(message) /* nothing */\n#endif\n\nnamespace Ods {\n\tstruct pag;\n}\n\nnamespace Jrd {\n\nclass Lock;\nclass Record;\nclass thread_db;\nclass Database;\nclass jrd_file;\n\nclass AllocItem\n{\npublic:\n\tULONG db_page; // Page number in the main database file\n\tULONG diff_page; // Page number in the difference file\n\n\tstatic const ULONG&amp; generate(const void* /*sender*/, const AllocItem&amp; item)\n\t{\n\t\treturn item.db_page;\n\t}\n\n\tAllocItem() {}\n\n\tAllocItem(ULONG db_pageL, ULONG diff_pageL)\n\t{\n\t\tthis-&gt;db_page = db_pageL;\n\t\tthis-&gt;diff_page = diff_pageL;\n\t}\n};\n\ntypedef Firebird::BePlusTree&lt;AllocItem, ULONG, AllocItem&gt; AllocItemTree;\n\n// Class to synchronize access to backup state\n\nclass NBackupStateLock: public GlobalRWLock\n{\npublic:\n\tNBackupStateLock(thread_db* tdbb, MemoryPool&amp; p, BackupManager* bakMan);\n\tvirtual ~NBackupStateLock() { }\n\nprotected:\n\tBackupManager *backup_manager;\n\tvirtual void blockingAstHandler(thread_db* tdbb);\n\tvirtual bool fetch(thread_db* tdbb);\n\tvirtual void invalidate(thread_db* tdbb);\n};\n\n// Class to synchronize access to diff page allocation table\nclass NBackupAllocLock: public GlobalRWLock\n{\npublic:\n\tNBackupAllocLock(thread_db* tdbb, MemoryPool&amp; p, BackupManager* bakMan);\n\tvirtual ~NBackupAllocLock() { }\n\nprotected:\n\tBackupManager* backup_manager;\n\tvirtual bool fetch(thread_db* tdbb);\n\n\tvirtual void invalidate(thread_db* tdbb);\n};\n\n/*\n *  The functional responsibilities of NBAK are:\n *  1. to redirect writes to difference files when asked (ALTER DATABASE BEGIN\n *  BACKUP statement)\n *  2. to produce a GUID for the database snapshot and write it into the database\n *  header before the ALTER DATABASE BEGIN BACKUP statement returns\n *  3. to merge differences into the database when asked (ALTER DATABASE END BACKUP\n *  statement)\n *  4. to mark pages written by the engine with the current SCN [System Change\n *  Number] counter value for the database\n *  5. to increment SCN on each change of backup state\n *\n *  The backup state cycle is:\n *  hdr_nbak_normal -&gt; hdr_nbak_stalled -&gt; hdr_nbak_merge -&gt; hdr_nbak_normal\n *  - In normal state writes go directly to the main database files.\n *  - In stalled state writes go to the difference file only and the main files are\n *  read-only.\n *  - In merge state new pages are not allocated from difference files. Writes go to\n *  the main database files. Reads of mapped pages compare both page versions and\n *  return the version which is fresher, because we don&#x27;t know if it is merged or not.\n *  Merged pages are written only in database file.\n *\n *  For synchronization NBAK uses 3 lock types via Firebird::GlobalRWLock:\n *  LCK_backup_database, LCK_backup_alloc, LCK_backup_end.\n *\n *  LCK_backup_database protects &quot;clean&quot; state of database. Database is meant to be\n *  clean when it has no dirty or fetched pages. When attachment needs to fake, to fetch or to mark a page as dirty\n *  (via CCH_mark) it needs to obtain READ (LCK_PR) lock of this kind. WRITE\n *  (LCK_EX) lock forces flush of all caches leaving no dirty pages to be written to\n *  database.\n *\n *  Modification process of a page is as follows:\n *  CCH_fetch -&gt; CCH_mark -&gt; CCH_release -&gt; write_page\n *\n *  The dirty page is owned by the DATABASE between setting up and clearing the page dirty flag until write_page happens.\n *\n *  The page lock is requested every time under LCK_backup_database to prevent any deadlocks. So fecthed page is\n *  owned by the ATTACHMENT between CCH_FETCH_LOCK, CCH_FAKE and CCH_RELEASE.\n *  AST on LCK_backup_database forces all dirty pages owned by DATABASE to be\n *  written to disk via write_page. Since finalizing processing of the pages owned\n *  by attachment may require taking new locks BDB_must_write is set for them to\n *  ensure that LCK_backup_database lock is released as soon as possible.\n *\n *  To change backup state, engine takes LCK_backup_database lock first, forcing all\n *  dirty pages to the disk, modifies the header page reflecting the state change,\n *  and releases the lock allowing transaction processing to continue.\n *\n *  LCK_backup_alloc is used to protect mapping table between difference file\n *  (.delta) and the database. To add new page to the mapping attachment needs to\n *  take WRITE lock of this kind. READ lock is necessary to read the table.\n *\n *  LCK_backup_end is used to ensure reliable execution of state transition from\n *  hdr_nbak_merge to hdr_nbak_normal (MERGE process). Taking of WRITE (LCK_EX)\n *  lock of this kind is needed to perform the MERGE. Every new attachment attempts\n *  to finalize incomplete merge if the database is in hdr_nbak_merge mode and\n *  this lock is not taken.\n */\n\n\nclass BackupManager\n{\nprivate:\n\tclass StateWriteGuard\n\t{\n\tpublic:\n\t\tStateWriteGuard(thread_db* tdbb, Jrd::WIN* window);\n\t\t~StateWriteGuard();\n\n\t\tvoid releaseHeader();\n\n\t\tvoid setSuccess()\n\t\t{\n\t\t\tm_success = true;\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tStateWriteGuard(const StateWriteGuard&amp;);\n\t\tStateWriteGuard&amp; operator=(const StateWriteGuard&amp;);\n\n\t\tthread_db* m_tdbb;\n\t\tJrd::WIN* m_window;\n\t\tbool m_success;\n\t};\n\npublic:\n\tclass StateReadGuard\n\t{\n\tpublic:\n\t\texplicit StateReadGuard(thread_db* tdbb) : m_tdbb(tdbb)\n\t\t{\n\t\t\ttry\n\t\t\t{\n\t\t\t\tlock(tdbb, LCK_WAIT);\n\t\t\t}\n\t\t\tcatch (const Firebird::Exception&amp;)\n\t\t\t{\n\t\t\t\tunlock(tdbb);\n\t\t\t\tthrow;\n\t\t\t}\n\t\t}\n\n\t\t~StateReadGuard()\n\t\t{\n\t\t\tunlock(m_tdbb);\n\t\t}\n\n\t\tstatic bool lock(thread_db* tdbb, SSHORT wait)\n\t\t{\n\t\t\tJrd::Attachment* const att = tdbb-&gt;getAttachment();\n\t\t\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\n\t\t\tconst bool ok = att ?\n\t\t\t\tatt-&gt;backupStateReadLock(tdbb, wait) :\n\t\t\t\tdbb-&gt;dbb_backup_manager-&gt;lockStateRead(tdbb, wait);\n\n\t\t\tif (!ok)\n\t\t\t\tERR_bugcheck_msg(&quot;Can&#x27;t lock state for read&quot;);\n\n\t\t\treturn ok;\n\t\t}\n\n\t\tstatic void unlock(thread_db* tdbb)\n\t\t{\n\t\t\tJrd::Attachment* const att = tdbb-&gt;getAttachment();\n\t\t\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\n\t\t\tif (att)\n\t\t\t\tatt-&gt;backupStateReadUnLock(tdbb);\n\t\t\telse\n\t\t\t\tdbb-&gt;dbb_backup_manager-&gt;unlockStateRead(tdbb);\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tStateReadGuard(const StateReadGuard&amp;);\n\t\tStateReadGuard&amp; operator=(const StateReadGuard&amp;);\n\n\t\tthread_db* m_tdbb;\n\t};\n\nprivate:\n\t// Set and clear &quot;master&quot; status for BackupManager instance\n\tclass MasterGuard\n\t{\n\tpublic:\n\t\tMasterGuard(BackupManager&amp; bm) :\n\t\t\tm_bm(bm)\n\t\t{\n\t\t\tm_bm.master = true;\n\t\t}\n\n\t\t~MasterGuard()\n\t\t{\n\t\t\tm_bm.master = false;\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tMasterGuard(const MasterGuard&amp;);\n\t\tMasterGuard&amp; operator=(const MasterGuard&amp;);\n\n\t\tBackupManager&amp; m_bm;\n\t};\n\n\ttemplate&lt;bool Exclusive&gt;\n\tclass LocalAllocGuard\n\t{\n\tpublic:\n\t\texplicit LocalAllocGuard(BackupManager* bm)\n\t\t\t: m_bm(bm)\n\t\t{\n\t\t\t//Database::Checkout cout(m_bm-&gt;database);\n\n\t\t\tif (Exclusive)\n\t\t\t\tm_bm-&gt;localAllocLock.beginWrite(&quot;BackupManager::LocalAllocGuard&quot;);\n\t\t\telse\n\t\t\t\tm_bm-&gt;localAllocLock.beginRead(&quot;BackupManager::LocalAllocGuard&quot;);\n\t\t}\n\n\t\t~LocalAllocGuard()\n\t\t{\n\t\t\trelease();\n\t\t}\n\n\t\tvoid release()\n\t\t{\n\t\t\tif (Exclusive)\n\t\t\t\tm_bm-&gt;localAllocLock.endWrite();\n\t\t\telse\n\t\t\t\tm_bm-&gt;localAllocLock.endRead();\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tLocalAllocGuard(const LocalAllocGuard&amp;);\n\t\tLocalAllocGuard&amp; operator=(const LocalAllocGuard&amp;);\n\n\t\tBackupManager* m_bm;\n\t};\n\n\ttypedef LocalAllocGuard&lt;true&gt; LocalAllocWriteGuard;\n\ttypedef LocalAllocGuard&lt;false&gt; LocalAllocReadGuard;\n\n\ttemplate&lt;bool Exclusive&gt;\n\tclass GlobalAllocGuard\n\t{\n\tpublic:\n\t\tGlobalAllocGuard(thread_db* aTdbb, BackupManager* aBackupManager)\n\t\t\t: tdbb(aTdbb), backupManager(aBackupManager)\n\t\t{\n\t\t\tif (Exclusive)\n\t\t\t\tbackupManager-&gt;lockAllocWrite(tdbb);\n\t\t\telse\n\t\t\t\tbackupManager-&gt;lockAllocRead(tdbb);\n\t\t}\n\n\t\t~GlobalAllocGuard()\n\t\t{\n\t\t\tif (Exclusive)\n\t\t\t\tbackupManager-&gt;unlockAllocWrite(tdbb);\n\t\t\telse\n\t\t\t\tbackupManager-&gt;unlockAllocRead(tdbb);\n\t\t}\n\n\tprivate:\n\t\t// copying is prohibited\n\t\tGlobalAllocGuard(const GlobalAllocGuard&amp;);\n\t\tGlobalAllocGuard&amp; operator=(const GlobalAllocGuard&amp;);\n\n\t\tthread_db* tdbb;\n\t\tBackupManager* backupManager;\n\t};\n\n\ttypedef GlobalAllocGuard&lt;true&gt; GlobalAllocWriteGuard;\n\ttypedef GlobalAllocGuard&lt;false&gt; GlobalAllocReadGuard;\n\npublic:\n\t// Set when db is creating. Default = false\n\tbool dbCreating;\n\n\tBackupManager(thread_db* tdbb, Database* _database, int ini_state);\n\t~BackupManager();\n\n\t// Set difference file name in header.\n\t// State must be locked and equal to hdr_nbak_normal to call this method\n\tvoid setDifference(thread_db* tdbb, const char* filename);\n\n\t// Return current backup state\n\tUCHAR getState() const\n\t{\n\t\treturn backup_state;\n\t}\n\n\tvoid setState(const UCHAR newState)\n\t{\n\t\tbackup_state = newState;\n\t}\n\n\t// Return current SCN for database\n\tULONG getCurrentSCN() const\n\t{\n\t\treturn current_scn;\n\t}\n\n\t// Initialize and open difference file for writing\n\tvoid beginBackup(thread_db* tdbb);\n\n\t// Merge difference file to main files (if needed) and unlink() difference\n\t// file then. If merge is already in progress method silently returns false and\n\t// does nothing (so it can be used for recovery on database startup).\n\tvoid endBackup(thread_db* tdbb, bool recover);\n\n\t// State Lock member functions\n\tbool lockStateWrite(thread_db* tdbb, SSHORT wait)\n\t{\n\t\tfb_assert(!(tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked));\n\t\ttdbb-&gt;tdbb_flags |= TDBB_backup_write_locked;\n\t\tif (stateLock-&gt;lockWrite(tdbb, wait))\n\t\t\treturn true;\n\n\t\ttdbb-&gt;tdbb_flags &amp;= ~TDBB_backup_write_locked;\n\t\treturn false;\n\t}\n\n\tvoid unlockStateWrite(thread_db* tdbb)\n\t{\n\t\tfb_assert(tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked);\n\t\ttdbb-&gt;tdbb_flags &amp;= ~TDBB_backup_write_locked;\n\t\tstateLock-&gt;unlockWrite(tdbb, backup_state == Ods::hdr_nbak_unknown);\n\t}\n\n\tbool lockStateRead(thread_db* tdbb, SSHORT wait)\n\t{\n\t\tif (tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked)\n\t\t\treturn true;\n\n\t\tlocalStateLock.beginRead(FB_FUNCTION);\n\t\tif (backup_state == Ods::hdr_nbak_unknown)\n\t\t{\n\t\t\tif (!stateLock-&gt;lockRead(tdbb, wait))\n\t\t\t{\n\t\t\t\tlocalStateLock.endRead();\n\t\t\t\treturn false;\n\t\t\t}\n\t\t\tstateLock-&gt;unlockRead(tdbb);\n\t\t}\n\t\treturn true;\n\t}\n\n\tvoid unlockStateRead(thread_db* tdbb)\n\t{\n\t\tif (tdbb-&gt;tdbb_flags &amp; TDBB_backup_write_locked)\n\t\t\treturn;\n\n\t\tlocalStateLock.endRead();\n\n\t\tif (stateBlocking &amp;&amp; localStateLock.tryBeginWrite(FB_FUNCTION))\n\t\t{\n\t\t\tif (!stateLock-&gt;tryReleaseLock(tdbb))\n\t\t\t\tfb_assert(false);\n\n\t\t\tstateBlocking = false;\n\t\t\tlocalStateLock.endWrite();\n\t\t}\n\t}\n\n\tbool actualizeState(thread_db* tdbb);\n\tbool actualizeAlloc(thread_db* tdbb, bool haveGlobalLock);\n\tvoid initializeAlloc(thread_db* tdbb);\n\n\tvoid invalidateAlloc(thread_db* tdbb)\n\t{\n\t\tallocIsValid = false;\n\t}\n\n\t// Return page index in difference file that can be used in\n\t// writeDifference call later.\n\tULONG getPageIndex(thread_db* tdbb, ULONG db_page);\n\n\t// Return next page index in the difference file to be allocated\n\tULONG allocateDifferencePage(thread_db* tdbb, ULONG db_page);\n\n\t// Must have FbStatusVector because it is called from write_page\n\tvoid openDelta(thread_db* tdbb);\n\tvoid closeDelta(thread_db* tdbb);\n\tbool writeDifference(thread_db* tdbb, FbStatusVector* status, ULONG diff_page, Ods::pag* page);\n\tbool readDifference(thread_db* tdbb, ULONG diff_page, Ods::pag* page);\n\tvoid flushDifference(thread_db* tdbb);\n\tvoid setForcedWrites(const bool forceWrite);\n\n\tvoid shutdown(thread_db* tdbb);\n\n\tvoid beginFlush()\n\t{\n\t\tflushInProgress = true;\n\t}\n\n\tvoid endFlush()\n\t{\n\t\tflushInProgress = false;\n\t}\n\n\tbool databaseFlushInProgress() const\n\t{\n\t\treturn flushInProgress;\n\t}\n\n\tbool isMaster() const\n\t{\n\t\treturn master;\n\t}\n\n\tbool isShutDown() const\n\t{\n\t\treturn shutDown;\n\t}\n\n\t// Get size (in pages) of locked database file\n\tULONG getPageCount(thread_db* tdbb);\nprivate:\n\tfriend class NBackupStateLock;\n\n\tDatabase* database;\n\tjrd_file* diff_file;\n\tAllocItemTree* alloc_table; // Cached allocation table of pages in difference file\n\tUCHAR backup_state;\n\tULONG last_allocated_page; // Last physical page allocated in the difference file\n\tFirebird::Array&lt;UCHAR&gt; temp_buffers_space;\n\tULONG *alloc_buffer, *empty_buffer, *spare_buffer;\n\tULONG current_scn;\n\tFirebird::PathName diff_name;\n\tbool explicit_diff_name;\n\tbool flushInProgress;\n\tbool shutDown;\n\tbool allocIsValid;\t\t\t// true, if alloc table cache is completely read from disk\n\tbool master;\t\t\t\t// this instance performs current begin\\end backup process\n\tbool stateBlocking;\t\t\t// blocking AST handler doesn&#x27;t released stateLock\n\n\tNBackupStateLock* stateLock;\n\tFirebird::RWLock localStateLock;\t// must be acquired before global stateLock\n\t\t\t\t\t\t\t\t\t\t// Important: this lock must prefer readers to writers !\n\tNBackupAllocLock* allocLock;\n\tFirebird::RWLock localAllocLock;\t// must be acquired before global allocLock\n\n\tULONG findPageIndex(thread_db* tdbb, ULONG db_page);\n\tvoid generateFilename();\n\tbool extendDatabase(thread_db* tdbb);\n\n\tvoid lockAllocWrite(thread_db* tdbb)\n\t{\n\t\tif (!allocLock-&gt;lockWrite(tdbb, LCK_WAIT))\n\t\t\tERR_bugcheck_msg(&quot;Can&#x27;t lock alloc table for writing&quot;);\n\t}\n\n\tvoid unlockAllocWrite(thread_db* tdbb)\n\t{\n\t\tallocLock-&gt;unlockWrite(tdbb);\n\t}\n\n\tvoid lockAllocRead(thread_db* tdbb)\n\t{\n\t\tif (!allocLock-&gt;lockRead(tdbb, LCK_WAIT))\n\t\t\tERR_bugcheck_msg(&quot;Can&#x27;t lock alloc table for reading&quot;);\n\t}\n\n\tvoid unlockAllocRead(thread_db* tdbb)\n\t{\n\t\tallocLock-&gt;unlockRead(tdbb);\n\t}\n};\n\n\n} //namespace Jrd\n\n#endif /* JRD_NBAK_H */\n"}, "/build/src/jrd/svc.h": {"id": "/build/src/jrd/svc.h", "filePath": "src/jrd/svc.h", "content": "/*\n *\tPROGRAM:\tJRD access method\n *\tMODULE:\t\tsvc.h\n *\tDESCRIPTION:\tService manager declarations\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#ifndef JRD_SVC_H\n#define JRD_SVC_H\n\n#include &lt;stdio.h&gt;\n\n#include &quot;fb_blk.h&quot;\n#include &quot;firebird/impl/consts_pub.h&quot;\n\n#include &quot;../jrd/svc_undoc.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/semaphore.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/SafeArg.h&quot;\n#include &quot;../common/UtilSvc.h&quot;\n#include &quot;../jrd/EngineInterface.h&quot;\n#include &quot;../common/classes/Switches.h&quot;\n#include &quot;../common/classes/ClumpletReader.h&quot;\n#include &quot;../common/classes/RefMutex.h&quot;\n#include &quot;../burp/split/spit.h&quot;\n#include &quot;../jrd/status.h&quot;\n\nnamespace Firebird {\n\tnamespace Arg {\n\t\tclass StatusVector;\n\t}\n}\n\nnamespace Jrd {\n\ntypedef int ServiceEntry(Firebird::UtilSvc*);\n\nstruct serv_entry\n{\n\tUSHORT\t\t\t\tserv_action;\t\t// isc_action_svc_....\n\tconst TEXT*\t\t\tserv_name;\t\t\t// service name\n\tServiceEntry*\t\tserv_thd;\t\t\t// thread to execute\n};\n\ninline constexpr ULONG SERVICE_VERSION\t\t= 2;\n\ninline constexpr int SVC_STDOUT_BUFFER_SIZE\t= 1024;\n\n// Flag of capabilities supported by the server\n//inline constexpr ULONG WAL_SUPPORT\t\t\t\t= 0x1L;\t\t// Write Ahead Log\ninline constexpr ULONG MULTI_CLIENT_SUPPORT\t\t\t= 0x2L;\t\t// SuperServer model (vs. multi-inet)\ninline constexpr ULONG REMOTE_HOP_SUPPORT\t\t\t= 0x4L;\t\t// Server can connect to other server\n//inline constexpr ULONG NO_SVR_STATS_SUPPORT\t\t= 0x8L;\t\t// Does not support statistics\n\n//inline constexpr ULONG NO_DB_STATS_SUPPORT\t\t= 0x10L;\t// Does not support statistics\n// Really the 16 bit LIBS here?\n//inline constexpr ULONG LOCAL_ENGINE_SUPPORT\t\t= 0x20L;\t// The local 16 bit engine\n//inline constexpr ULONG NO_FORCED_WRITE_SUPPORT\t= 0x40L;\t// Can not configure sync writes\n//inline constexpr ULONG NO_SHUTDOWN_SUPPORT\t\t= 0x80L;\t// Can not shutdown/restart databases\ninline constexpr ULONG NO_SERVER_SHUTDOWN_SUPPORT\t= 0x100L;\t// Can not shutdown server\n//inline constexpr ULONG SERVER_CONFIG_SUPPORT\t\t= 0x200L;\t// Can configure server\ninline constexpr ULONG QUOTED_FILENAME_SUPPORT\t\t= 0x400L;\t// Can pass quoted filenames in\n\n// Range definitions for service actions.  Any action outside of\n// this range is not supported\ninline constexpr USHORT isc_action_min\t= 1;\ninline constexpr USHORT isc_action_max\t= isc_action_svc_last;\n\n// Range definitions for service actions.  Any action outside of\n// this range is not supported\n//define isc_info_min                  50\n//define isc_info_max                  67\n\n// Bitmask values for the svc_flags variable\n//inline constexpr int SVC_shutdown\t\t= 0x1;\n//inline constexpr int SVC_timeout\t\t= 0x2;\n//inline constexpr int SVC_forked\t\t= 0x4;\ninline constexpr int SVC_detached\t\t= 0x8;\ninline constexpr int SVC_finished\t\t= 0x10;\n//inline constexpr int SVC_thd_running\t= 0x20;\ninline constexpr int SVC_evnt_fired\t\t= 0x40;\ninline constexpr int SVC_cmd_line\t\t= 0x80;\ninline constexpr int SVC_failed_start\t= 0x100;\n\n// forward decl.\nclass thread_db;\nclass TraceManager;\n\n// Service manager\nclass Service : public Firebird::UtilSvc, public TypedHandle&lt;type_svc&gt;\n{\npublic:\t\t// utilities interface with service\n\t// output to svc_stdout verbose info\n\tvoid outputVerbose(const char* text) override;\n\t// outpur error text\n\tvoid outputError(const char* text) override;\n\t// output some data to service\n\tvoid outputData(const void* data, FB_SIZE_T len) override;\n\t// printf() to svc_stdout\n    void printf(bool err, const SCHAR* format, ...) override;\n\t// returns true - it&#x27;s service :)\n\tbool isService() override;\n\t// client thread started\n\tvoid started() override;\n\t// put various info items in info buffer\n    void putLine(char tag, const char* val) override;\n    void putSLong(char tag, SLONG val) override;\n    void putSInt64(char tag, SINT64 val) override;\n\tvoid putChar(char tag, char val) override;\n\t// put raw bytes to svc_stdout\n\tvoid putBytes(const UCHAR*, FB_SIZE_T) override;\n\t// get raw bytes from svc_stdin\n\tULONG getBytes(UCHAR*, ULONG) override;\n\nprivate:\n\t// append status_vector to service&#x27;s status\n\tvoid setServiceStatus(const ISC_STATUS* status_vector) override;\n\t// append error message to service&#x27;s status\n\tvoid setServiceStatus(const USHORT facility, const USHORT errcode, const MsgFormat::SafeArg&amp; args) override;\n\npublic:\n\t// no-op for services\n\tvoid hidePasswd(ArgvType&amp;, int) override;\n\t// return service status\n    StatusAccessor getStatusAccessor() override;\n\t// no-op for services\n\tvoid checkService() override;\n\t// add address path and utf8 flag (taken from spb) to dpb if present\n\tvoid fillDpb(Firebird::ClumpletWriter&amp; dpb) override;\n\t// encoding for string parameters passed to utility\n\tbool utf8FileNames() override;\n\t// get database encryption key transfer callback routine\n\tFirebird::ICryptKeyCallback* getCryptCallback() override;\n\tint getParallelWorkers() override { return svc_parallel_workers; }\n\n\tTraceManager* getTraceManager() noexcept\n\t{\n\t\treturn svc_trace_manager;\n\t}\n\n\tbool finished() override\n\t{\n\t\treturn ((svc_flags &amp; (SVC_finished | SVC_detached)) != 0)\n\t\t\t|| checkForShutdown();\n\t}\n\n\t// Get authentication block if present\n\tunsigned int getAuthBlock(const unsigned char** bytes) override;\n\npublic:\t\t// external interface with service\n\t// Attach - service ctor\n\tService(const TEXT* service_name, USHORT spb_length, const UCHAR* spb_data,\n\t\tFirebird::ICryptKeyCallback* crypt_callback);\n\t// Start service thread\n\tvoid start(USHORT spb_length, const UCHAR* spb_data);\n\t// Query service state (v. 1 &amp; 2)\n\tvoid query(USHORT send_item_length, const UCHAR* send_items, USHORT recv_item_length,\n\t\t\t   const UCHAR* recv_items, USHORT buffer_length, UCHAR* info);\n\tISC_STATUS query2(thread_db* tdbb, USHORT send_item_length, const UCHAR* send_items,\n\t\t\t   USHORT recv_item_length, const UCHAR* recv_items, USHORT buffer_length, UCHAR* info);\n\t// Cancel wait in query service\n\tvoid cancel(thread_db* tdbb);\n\t// Detach from service\n\tvoid detach();\n\t// get service version\n\tUSHORT getVersion() const noexcept\n\t{\n\t\treturn svc_spb_version;\n\t}\n\n\t// Firebird log reader\n\tstatic int readFbLog(Firebird::UtilSvc* uSvc);\n\t// Shuts all service threads (should be called after databases shutdown)\n\tstatic void shutdownServices();\n\n\t// Total number of service attachments\n\tstatic ULONG totalCount();\n\n\tconst char* getServiceMgr() const noexcept;\n\tconst char* getServiceName() const noexcept;\n\n\tconst Firebird::string&amp;\tgetUserName() const noexcept\n\t{\n\t\treturn svc_username;\n\t}\n\n\tconst Firebird::string&amp;\tgetRoleName() const noexcept\n\t{\n\t\treturn svc_sql_role;\n\t}\n\n\t// return true if user have admin privileges in security database used\n\t// for service user authentication\n\tbool getUserAdminFlag() const noexcept;\n\n\tconst Firebird::string&amp;\tgetNetworkProtocol() const noexcept\t{ return svc_network_protocol; }\n\tconst Firebird::string&amp;\tgetRemoteAddress() const noexcept\t{ return svc_remote_address; }\n\tconst Firebird::string&amp;\tgetRemoteProcess() const noexcept\t{ return svc_remote_process; }\n\tint\tgetRemotePID() const noexcept { return svc_remote_pid; }\n\tconst Firebird::PathName&amp; getExpectedDb() const noexcept\t{ return svc_expected_db; }\n\nprivate:\n\t// Service must have private destructor, called from finish\n\t// when both (server and client) threads are finished\n\t~Service();\n\t// Find current service in global services list\n\tbool\tlocateInAllServices(FB_SIZE_T* posPtr = NULL);\n\t// Detach self from global services list\n\tvoid\tremoveFromAllServices();\n\t// The only service, implemented internally\n\tvoid\treadFbLog();\n\t// Create argv, argc and svc_parsed_sw\n\tvoid\tparseSwitches();\n\t// Check does this action need arg or not\n\tstatic bool actionNeedsArg(UCHAR action) noexcept;\n\t// Put data into stdout buffer\n\tvoid\tenqueue(const UCHAR* s, ULONG len);\n\t// true if there is no data in stdout buffer\n\tbool\tempty(ULONG head) const noexcept;\n\t// true if no more space in stdout buffer\n\tbool\tfull() const noexcept;\n\t// start service thread\n\tvoid\tstart(const serv_entry* service_run);\n\t// Set the flag (either SVC_finished for the main service thread or SVC_detached for the client thread).\n\t// If both main thread and client thread are completed that is main thread is finished and\n\t// client is detached then free memory used by service.\n\tvoid\tfinish(USHORT flag);\n\t// Throws shutdown exception if global flag is set for it\n\tbool\tcheckForShutdown();\n\t// Check for the existence of errors in the service that has not started\n\tbool\tcheckForFailedStart() noexcept;\n\t// Transfer data from svc_stdout into buffer\n\tvoid\tget(UCHAR* buffer, USHORT length, USHORT flags, USHORT timeout, USHORT* return_length);\n\t// Sends stdin for a service\n\t// Returns number of bytes service wants more\n\tULONG\tput(const UCHAR* buffer, ULONG length);\n\t// Copies argument value to status vector\n\tvoid put_status_arg(Firebird::Arg::StatusVector&amp; status, const MsgFormat::safe_cell&amp; value);\n\n\t// Increment circular buffer pointer\n\tstatic ULONG\t\tadd_one(ULONG i) noexcept;\n\tstatic ULONG\t\tadd_val(ULONG i, ULONG val) noexcept;\n\t// Convert spb flags to utility switches\n#ifndef DEV_BUILD\n\tstatic\n#endif\n\tvoid\t\t\t\tconv_switches(Firebird::ClumpletReader&amp; spb, Firebird::string&amp; switches);\n\t// Find spb switch in switch table\n\tstatic const TEXT*\tfind_switch(int in_spb_sw, const Switches::in_sw_tab_t* table, bool bitmask);\n\t// Loop through the appropriate switch table looking for the text for the given command switch\n#ifndef DEV_BUILD\n\tstatic\n#endif\n\tbool\t\t\t\tprocess_switches(Firebird::ClumpletReader&amp; spb, Firebird::string&amp; switches);\n\t// Get bitmask from within spb buffer, find corresponding switches within specified table,\n\t// add them to the command line\n\tstatic bool get_action_svc_bitmask(const Firebird::ClumpletReader&amp; spb,\n\t\t\t\t\t\t\t\t\t   const Switches::in_sw_tab_t* table,\n\t\t\t\t\t\t\t\t\t   Firebird::string&amp; sw);\n\t// Get string from within spb buffer, add it to the command line\n\tstatic void get_action_svc_string(const Firebird::ClumpletReader&amp; spb, Firebird::string&amp; sw);\n\t// Get string from within spb buffer, insert it at given position into command line\n\tstatic void get_action_svc_string_pos(const Firebird::ClumpletReader&amp; spb, Firebird::string&amp; switches,\n\t\t\t\t\t\t\t\t\t\t  Firebird::string::size_type p = Firebird::string::npos);\n\t// Get integer from within spb buffer, add it to the command line\n\tstatic void get_action_svc_data(const Firebird::ClumpletReader&amp; spb, Firebird::string&amp; sw, bool bigint);\n\t// Get parameter from within spb buffer, find corresponding switch within specified table,\n\t// add it to the command line\n\tstatic bool get_action_svc_parameter(UCHAR tag, const Switches::in_sw_tab_t* table,\n\t\t\t\t\t\t\t\t\t\t Firebird::string&amp;);\n\t// Create &#x27;SYSDBA needed&#x27; error in status vector\n\tstatic void need_admin_privs(Firebird::Arg::StatusVector&amp; status, const char* message) noexcept;\n\t// Does info buffer have enough space for SLONG?\n\tstatic bool ck_space_for_numeric(UCHAR*&amp; info, const UCHAR* const end) noexcept;\n\t// Make status vector permamnent, if one present in worker thread&#x27;s space\n\tvoid makePermanentStatusVector() noexcept;\n\t// Read SPB on attach\n\tvoid getOptions(Firebird::ClumpletReader&amp;);\n\t// Invoke appropriate service thread entry and finalize it correctly\n\tstatic THREAD_ENTRY_DECLARE run(THREAD_ENTRY_PARAM arg);\n\nprivate:\n\tFirebird::FbLocalStatus svc_status;\t\t\t\t// status vector for running service\n\tFirebird::Mutex svc_status_mutex;\t\t\t\t// protects svc_status from access in different threads\n\tFirebird::string svc_parsed_sw;\t\t\t\t\t// Here point elements of argv\n\tULONG\tsvc_stdout_head;\n\tULONG\tsvc_stdout_tail;\n\tUCHAR\tsvc_stdout[SVC_STDOUT_BUFFER_SIZE];\t\t// output from service\n\tFirebird::Semaphore\tsvcStart;\n\tconst serv_entry*\tsvc_service_run;\t\t\t// running service&#x27;s entry\n\tFirebird::Array&lt;UCHAR&gt; svc_resp_alloc;\n\tUCHAR*\tsvc_resp_buf;\n\tconst UCHAR*\tsvc_resp_ptr;\n\tUSHORT\tsvc_resp_buf_len;\n\tUSHORT\tsvc_resp_len;\n\tUSHORT\tsvc_flags;\n\tUSHORT\tsvc_user_flag;\n\tUSHORT\tsvc_spb_version;\n\tbool\tsvc_shutdown_server;\n\tbool\tsvc_shutdown_request;\n\tbool\tsvc_shutdown_in_progress;\n\tbool\tsvc_timeout;\n\tchar\tsvc_arg_conv[MsgFormat::SAFEARG_MAX_ARG * 2];\n\tchar*\tsvc_arg_ptr;\n\n\tFirebird::string\tsvc_username;\n\tFirebird::string\tsvc_sql_role;\n\tFirebird::AuthReader::AuthBlock\tsvc_auth_block;\n\tFirebird::PathName\tsvc_expected_db;\n\tbool                svc_trusted_role;\n\tbool\t\t\t\tsvc_utf8;\n\tFirebird::string\tsvc_switches;\t// Full set of switches\n\tFirebird::string\tsvc_perm_sw;\t// Switches, taken from services table and/or passed using spb_command_line\n\tFirebird::UCharBuffer\tsvc_address_path;\n\tFirebird::string\tsvc_command_line;\n\tint\t\t\t\t\tsvc_parallel_workers;\n\n\tFirebird::string\tsvc_network_protocol;\n\tFirebird::string\tsvc_remote_address;\n\tFirebird::string\tsvc_remote_process;\n\tSLONG\t\t\t\tsvc_remote_pid;\n\n\tTraceManager*\t\tsvc_trace_manager;\n\tFirebird::ICryptKeyCallback* svc_crypt_callback;\n\npublic:\n\tFirebird::Semaphore\tsvc_detach_sem;\n\n\tclass SvcMutex : public Firebird::RefMutex\n\t{\n\tpublic:\n\t\texplicit SvcMutex(Service* svc)\n\t\t\t: link(svc)\n\t\t{ }\n\n\t\tService* link;\n\t};\n\n\tFirebird::RefPtr&lt;SvcMutex&gt; svc_existence;\n\nprivate:\n\tFirebird::Semaphore svc_sem_empty, svc_sem_full;\n\tbool svc_output_overflow;\n\n\tvoid unblockQueryGet(bool over = false);\n\npublic:\n\tclass Validate\n\t{\n\tpublic:\n\t\texplicit Validate(Service* svc);\n\t\tFirebird::MutexEnsureUnlock sharedGuard;\n\t};\n\nprivate:\n\tclass SafeMutexLock : private Validate\n\t{\n\tpublic:\n\t\tSafeMutexLock(Service* svc, const char* f);\n\t\tbool lock();\n\n\tprotected:\n\t\tFirebird::RefPtr&lt;SvcMutex&gt; existenceMutex;\n\t\tconst char* from;\n\t};\n\n\tfriend class SafeMutexLock;\n\n\t//Service existence guard\n\tclass ExistenceGuard : private SafeMutexLock\n\t{\n\tpublic:\n\t\texplicit ExistenceGuard(Service* svc, const char* from);\n\t\t~ExistenceGuard();\n\t};\n\n\t//Service unlock guard\n\tclass UnlockGuard : private SafeMutexLock\n\t{\n\tpublic:\n\t\texplicit UnlockGuard(Service* svc, const char* from);\n\t\tbool enter();\n\t\t~UnlockGuard();\n\tprivate:\n\t\tbool locked, doLock;\n\t};\n\n\t// Data pipe from client to service\n\tFirebird::Semaphore svc_stdin_semaphore;\n\tFirebird::Mutex svc_stdin_mutex;\n\t// Size of data, requested by service (set in getBytes, reset in put)\n\tULONG svc_stdin_size_requested;\n\t// Buffer passed by service\n\tUCHAR* svc_stdin_buffer;\n\t// Size of data, preloaded by user (set in put, reset in getBytes)\n\tULONG svc_stdin_size_preload;\n\t// Buffer for datam preloaded by user\n\tFirebird::AutoPtr&lt;UCHAR&gt; svc_stdin_preload;\n\t// Size of data, requested from user to preload (set in getBytes)\n\tULONG svc_stdin_preload_requested;\n\t// Size of data, placed into svc_stdin_buffer (set in put)\n\tULONG svc_stdin_user_size;\n\tstatic inline constexpr ULONG PRELOAD_BUFFER_SIZE = SVC_IO_BUFFER_SIZE;\n\t// Handle of a thread to wait for when closing\n\tThread::Handle svc_thread;\n\n#ifdef DEV_BUILD\n\tbool svc_debug;\n#endif\n};\n\n} //namespace Jrd\n\n#endif // JRD_SVC_H\n"}, "/build/src/jrd/tpc_proto.h": {"id": "/build/src/jrd/tpc_proto.h", "filePath": "src/jrd/tpc_proto.h", "content": "/*\n *\tPROGRAM:\tJRD Access method\n *\tMODULE:\t\ttpc_proto.h\n *\tDESCRIPTION:\tPrototype Header file for tpc.cpp\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#ifndef JRD_TPC_PROTO_H\n#define JRD_TPC_PROTO_H\n\n#include &lt;atomic&gt;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/SyncObject.h&quot;\n\nnamespace Ods {\n\nstruct tx_inv_page;\n\n}\n\nnamespace Jrd {\n\nclass Database;\nclass thread_db;\nclass TipCache;\nclass ActiveSnapshots;\n\n// Special values of CommitNumber reserved for uncommitted transaction states\ninline constexpr CommitNumber\n\tCN_PREHISTORIC = 1,\n\tCN_ACTIVE = 0,\n\tCN_LIMBO = static_cast&lt;CommitNumber&gt;(-1),\n\tCN_DEAD = static_cast&lt;CommitNumber&gt;(-2),\n\tCN_MAX_NUMBER = static_cast&lt;CommitNumber&gt;(-3); // Assume CommitNumber is unsigned integer\n\nclass TipCache\n{\npublic:\n\t// XXX: maybe use static factory method to create and initialize instance?\n\texplicit TipCache(Database* dbb);\n\t~TipCache();\n\n\tstatic TipCache* create(thread_db* tdbb)\n\t{\n\t\tconst auto dbb = tdbb-&gt;getDatabase();\n\t\tFirebird::AutoPtr&lt;TipCache&gt; tipCache(FB_NEW_POOL(*dbb-&gt;dbb_permanent) TipCache(dbb));\n\t\ttipCache-&gt;initializeTpc(tdbb);\n\t\treturn tipCache.release();\n\t}\n\n\t// Disconnect from shared memory objects\n\tvoid finalizeTpc(thread_db* tdbb);\n\n\t// Get the current state of a transaction in the cache\n\tCommitNumber cacheState(TraNumber number);\n\n\t// Return the oldest transaction in the given state.\n\t// Lookup in the [min_number, max_number) bounds.\n\t// If not found, return zero.\n\tTraNumber findStates(TraNumber minNumber, TraNumber maxNumber, ULONG mask, int&amp; state);\n\n\t// Set state for a transaction in cache. If new state is tra_committed and\n\t// commit# is not assigned yet, then assign it now.\n\t// Return new state for a transaction in cache.\n\t//\n\t// tra_active is the initial set of a transaction and it cannot be assigned.\n\t//\n\t// Valid assignments are:\n\t//   - tra_active -&gt; tra_committed\n\t//   - tra_active -&gt; tra_limbo\n\t//   - tra_active -&gt; tra_dead\n\t//   - tra_limbo -&gt; tra_committed\n\t//   - tra_limbo -&gt; tra_dead\n\t// All other combinations are expressly forbidden with BUGCHECK error.\n\tCommitNumber setState(TraNumber number, int state);\n\n\t// Compute most current state of a transaction. This is called when we encountered\n\t// a record produced by this transaction and need to know what to do with this record.\n\t// This function needs to be very fast as it will be called quite frequently.\n\t// Since we shall be using snapshots for read committed, concurrency and consistency\n\t// modes, calling this function is not necessary there. Only system transaction, GC and\n\t// sweep threads are expected to use it. For all other cases cacheState is sufficient.\n\t//\n\t// The function shall perform as follows:\n\t// 1) read return transaction state (and commit#) from shared memory cache. If\n\t//   transaction is known committed (with commit#) or dead - just return the state.\n\t// 2) If transaction is active, or in limbo, query its data using lock manager.\n\t//   If we get non-zero return - we assume transaction is still active and our cached\n\t//   state is valid.\n\t// 3) If our query returned zero and transaction state is still unassigned after that\n\t//   it means that process handling the transaction has terminated abnormally\n\t//   (as normal protocol is to release the lock only after we notified global cache\n\t//   of commit). In this case re-fetch transaction state from disk and update cache.\n\t//   If transaction has been found committed on disk then assign new commit# to it.\n\t//   If transaction is marked active on disk, mark it dead.\n\tCommitNumber snapshotState(thread_db* tdbb, TraNumber number);\n\n\t// If engine has recalculated Oldest (interesting) transaction or Oldest Snapshot\n\t// number for the database (via Sweep or during regular transaction start) it\n\t// needs to notify TPC, so that it can release cache resources. Any transaction\n\t// with number less than oldest interesting transaction and oldest snapshot\n\t// is treated as &quot;prehistoric&quot; committed (CN_PREHISTORIC)\n\tvoid updateOldestTransaction(thread_db* tdbb, TraNumber oldest, TraNumber oldestSnapshot);\n\n\t// Create snapshot. The snapshot shall use only versions committed\n\t// before commitNumber (the latest CN when it&#x27;s 0). Snapshots inhibit GC to some extent.\n\t// When snapshot is no longer needed you call endSnapshot.\n\tSnapshotHandle beginSnapshot(thread_db* tdbb, AttNumber attachmentId, CommitNumber&amp; commitNumber);\n\n\t// Deallocate snapshot.\n\tvoid endSnapshot(thread_db* tdbb, SnapshotHandle handle, AttNumber attachmentId);\n\n\t// Get the list of active snapshots for GC purposes. This function can be\n\t// called multiple times with the same object to obtain most recent information.\n\t// During initialization it checks that all attachments holding snapshots are\n\t// actually alive (via lock manager) to prevent GC inhibition in case of sudden\n\t// death of attachment process. Update is quick and happens only if needed and\n\t// there is no contention.\n\tvoid updateActiveSnapshots(thread_db* tdbb, ActiveSnapshots* activeSnapshots);\n\n\t// Transactions, attachments, statements ID management.\n\tTraNumber generateTransactionId();\n\tAttNumber generateAttachmentId();\n\tStmtNumber generateStatementId();\n\t//void assignLatestTransactionId(TraNumber number);\n\tvoid assignLatestAttachmentId(AttNumber number);\n\tAttNumber getLatestAttachmentId() const;\n\tStmtNumber getLatestStatementId() const;\n\n\tCommitNumber getGlobalCommitNumber() const\n\t{\n\t\treturn m_tpcHeader-&gt;getHeader()-&gt;latest_commit_number.load(std::memory_order_acquire);\n\t}\n\n\tULONG getMonitorGeneration() const\n\t{\n\t\treturn m_tpcHeader-&gt;getHeader()-&gt;monitor_generation.load(std::memory_order_acquire);\n\t}\n\n\tULONG newMonitorGeneration() const\n\t{\n\t\treturn m_tpcHeader-&gt;getHeader()-&gt;monitor_generation++ + 1;\n\t}\n\nprivate:\n\tclass GlobalTpcHeader : public Firebird::MemoryHeader\n\t{\n\tpublic:\n\t\tstd::atomic&lt;CommitNumber&gt; latest_commit_number;\n\n\t\t// We do not need hardware barriers when working with this variable, because\n\t\t// TPC is essentially log-structured and we have extra large safety margin\n\t\t// during shared memory clean-up operations to cover expected fuzziness.\n\t\t// The assumption of the code is that it is not possible to process full\n\t\t// memory block worth of transactions during the period of cache decoherence\n\t\t// of any one CPU accessing this variable\n\t\tstd::atomic&lt;TraNumber&gt; oldest_transaction;\n\n\t\t// Incremented each time whenever snapshot is released\n\t\tstd::atomic&lt;ULONG&gt; snapshot_release_count;\n\n\t\t// Shared counters\n\t\tstd::atomic&lt;TraNumber&gt; latest_transaction_id;\n\t\tstd::atomic&lt;AttNumber&gt; latest_attachment_id;\n\t\tstd::atomic&lt;StmtNumber&gt; latest_statement_id;\n\n\t\t// Monitor state generation\n\t\tstd::atomic&lt;ULONG&gt; monitor_generation;\n\n\t\t// Size of memory chunk with TransactionStatusBlock\n\t\tULONG tpc_block_size; // final\n\t};\n\n\tstruct SnapshotData\n\t{\n\t\tstd::atomic&lt;AttNumber&gt; attachment_id; // Unused slots have attachment_id == 0\n\t\tstd::atomic&lt;CommitNumber&gt; snapshot;\n\t};\n\n\t// Note: when maintaining this structure, we are extra careful\n\t// to keep it consistent at all times, so that the process using it\n\t// can be killed at any time without adverse consequences.\n\tclass SnapshotList : public Firebird::MemoryHeader\n\t{\n\tpublic:\n\t\tstd::atomic&lt;ULONG&gt; slots_allocated;\n\t\tstd::atomic&lt;ULONG&gt; slots_used;\n\t\tULONG min_free_slot; // Position where to start looking for free space\n\t\tSnapshotData slots[1];\n\t};\n\n\tclass TransactionStatusBlock : public Firebird::MemoryHeader\n\t{\n\tpublic:\n\t\tstd::atomic&lt;CommitNumber&gt; data[1];\n\t};\n\n\ttypedef TransactionStatusBlock* PTransactionStatusBlock;\n\n\t// Block number storage should match TraNumber to avoid unexpected overflows\n\ttypedef FB_UINT64 TpcBlockNumber;\n\n\tclass StatusBlockData\n\t{\n\tpublic:\n\t\tStatusBlockData(Jrd::thread_db* tdbb, Jrd::TipCache* tipCache, ULONG blockSize, TpcBlockNumber blkNumber);\n\t\t~StatusBlockData();\n\n\t\tTpcBlockNumber blockNumber;\n\t\tFirebird::SharedMemory&lt;TransactionStatusBlock&gt;* memory;\n\t\tLock existenceLock;\n\t\tTipCache* cache;\n\t\tbool acceptAst;\n\n\t\tinline static TpcBlockNumber&amp; generate(const void* /*sender*/, StatusBlockData* item) noexcept\n\t\t{\n\t\t\treturn item-&gt;blockNumber;\n\t\t}\n\n\t\tvoid clear(thread_db* tdbb);\n\n\t\tstatic Firebird::PathName makeSharedMemoryFileName(Database* dbb, TpcBlockNumber n, bool fullPath);\n\t};\n\n\tclass MemoryInitializer : public Firebird::IpcObject\n\t{\n\tpublic:\n\t\texplicit MemoryInitializer(TipCache *cache) noexcept : m_cache(cache) {}\n\t\tvoid mutexBug(int osErrorCode, const char* text) override;\n\t\tUSHORT getVersion() const override { return TPC_VERSION; }\n\tprotected:\n\t\tTipCache* m_cache;\n\t};\n\n\tclass GlobalTpcInitializer final : public MemoryInitializer\n\t{\n\tpublic:\n\t\texplicit GlobalTpcInitializer(TipCache *cache) noexcept : MemoryInitializer(cache) {}\n\t\tbool initialize(Firebird::SharedMemoryBase* sm, bool initFlag) override;\n\n\t\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TPC_HEADER; }\n\t\tconst char* getName() const override { return &quot;TipCache:Global&quot;; }\n\t};\n\n\tclass SnapshotsInitializer final : public MemoryInitializer\n\t{\n\tpublic:\n\t\texplicit SnapshotsInitializer(TipCache *cache) noexcept : MemoryInitializer(cache) {}\n\t\tbool initialize(Firebird::SharedMemoryBase* sm, bool initFlag) override;\n\n\t\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TPC_SNAPSHOTS; }\n\t\tconst char* getName() const override { return &quot;TipCache:Snapshots&quot;; }\n\t};\n\n\tclass MemBlockInitializer final : public MemoryInitializer\n\t{\n\tpublic:\n\t\texplicit MemBlockInitializer(TipCache *cache) noexcept : MemoryInitializer(cache) {}\n\t\tbool initialize(Firebird::SharedMemoryBase* sm, bool initFlag) override;\n\n\t\tUSHORT getType() const override { return Firebird::SharedMemoryBase::SRAM_TPC_BLOCK; }\n\t\tconst char* getName() const override { return &quot;TipCache:TranBlock&quot;; }\n\t};\n\n\ttypedef Firebird::BePlusTree&lt;StatusBlockData*, TpcBlockNumber, StatusBlockData&gt; BlocksMemoryMap;\n\n\tstatic constexpr ULONG TPC_VERSION = 2;\n\tstatic constexpr int SAFETY_GAP_BLOCKS = 1;\n\n\tFirebird::SharedMemory&lt;GlobalTpcHeader&gt;* m_tpcHeader; // final\n\tFirebird::SharedMemory&lt;SnapshotList&gt;* m_snapshots; // final\n\tULONG m_transactionsPerBlock; // final. When set, we assume TPC has been initialized.\n\n\tFirebird::AutoPtr&lt;Lock&gt; m_lock;\n\n\tGlobalTpcInitializer globalTpcInitializer;\n\tSnapshotsInitializer snapshotsInitializer;\n\tMemBlockInitializer memBlockInitializer;\n\n\t// Tree with TIP cache memory blocks\n\t// Reads and writes to the tree are protected with m_sync_status.\n\tBlocksMemoryMap m_blocks_memory;\n\n\tFirebird::SyncObject m_sync_status;\n\n\t// Attach to shared memory objects and populate process-local structures.\n\t// If shared memory area did not exist - populate initial TIP by reading cache\n\t// from disk.\n\t// This function has no in-process synchronization, assuming caller prevents\n\t// concurrent use of object being initialized.\n\tvoid initializeTpc(thread_db *tdbb);\n\n\tvoid initTransactionsPerBlock(ULONG blockSize) noexcept;\n\n\t// Returns block holding transaction state.\n\t// Returns NULL if requested block is too old and is no longer cached.\n\t// Sync should be bound to m_sync_status. On enter, sync must be unlocked.\n\t// If returns not NULL then sync remains locked.\n\tTransactionStatusBlock* getTransactionStatusBlock(const GlobalTpcHeader* header, TpcBlockNumber blockNumber, Firebird::Sync&amp; sync);\n\n\t// Map shared memory for a block.\n\t// Assume exclusive lock of m_sync_status.\n\tTransactionStatusBlock* createTransactionStatusBlock(ULONG blockSize, TpcBlockNumber blockNumber);\n\n\t// Release shared memory blocks, if possible.\n\t// We utilize one full MemoryBlock as a safety margin to account for possible\n\t// race conditions during lockless operations, so this operation shall be pretty safe.\n\tvoid releaseSharedMemory(thread_db *tdbb, TraNumber oldest_old, TraNumber oldest_new);\n\n\t// Populate TIP cache from disk\n\tvoid loadInventoryPages(thread_db *tdbb, GlobalTpcHeader* header);\n\t// Init mapping for existing TIP blocks\n\tvoid mapInventoryPages(const GlobalTpcHeader* header);\n\n\tstatic int tpc_block_blocking_ast(void* arg);\n\n\tSnapshotHandle allocateSnapshotSlot();\n\tvoid deallocateSnapshotSlot(SnapshotHandle slotNumber);\n\tvoid remapSnapshots(bool sync);\n};\n\n\ninline int TPC_cache_state(thread_db* tdbb, TraNumber number)\n{\n\tconst CommitNumber stateCn = tdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;cacheState(number);\n\tswitch (stateCn)\n\t{\n\tcase CN_ACTIVE:\treturn tra_active;\n\tcase CN_LIMBO:\treturn tra_limbo;\n\tcase CN_DEAD:\treturn tra_dead;\n\tdefault:\t\treturn tra_committed;\n\t}\n}\n\ninline TraNumber TPC_find_states(thread_db* tdbb, TraNumber minNumber, TraNumber maxNumber,\n\tULONG mask, int&amp; state)\n{\n\treturn tdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;findStates(minNumber, maxNumber, mask, state);\n}\n\ninline void TPC_set_state(thread_db* tdbb, TraNumber number, int state)\n{\n\ttdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;setState(number, state);\n}\n\nint TPC_snapshot_state(thread_db* tdbb, TraNumber number);\n\n} // namespace Jrd\n\n#endif // JRD_TPC_PROTO_H\n"}, "/build/src/jrd/trace/TraceManager.h": {"id": "/build/src/jrd/trace/TraceManager.h", "filePath": "src/jrd/trace/TraceManager.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tTraceManager.h\n *\tDESCRIPTION:\tTrace API manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *  2008 Khorsun Vladyslav\n */\n\n#ifndef JRD_TRACEMANAGER_H\n#define JRD_TRACEMANAGER_H\n\n#include &lt;time.h&gt;\n#include &quot;../../jrd/ntrace.h&quot;\n#include &quot;../../common/classes/array.h&quot;\n#include &quot;../../common/classes/fb_string.h&quot;\n#include &quot;../../common/classes/init.h&quot;\n#include &quot;../../common/classes/rwlock.h&quot;\n#include &quot;../../common/classes/ImplementHelper.h&quot;\n#include &quot;../../jrd/trace/TraceConfigStorage.h&quot;\n#include &quot;../../jrd/trace/TraceSession.h&quot;\n\nnamespace Firebird {\n\nclass ICryptKeyCallback;\n\n}\n\nnamespace Jrd {\n\nclass Database;\nclass Attachment;\nclass jrd_tra;\nclass DsqlRequest;\nclass Service;\n\nclass TraceManager\n{\npublic:\n    /* Initializes plugins. */\n\texplicit TraceManager(Attachment* in_att);\n\texplicit TraceManager(Service* in_svc);\n\tTraceManager(const char* in_filename, Firebird::ICryptKeyCallback* callback, bool failedAttach);\n\n\t/* Finalize plugins. Called when database is closed by the engine */\n\t~TraceManager();\n\n\tstatic ConfigStorage* getStorage()\n\t{ return storageInstance-&gt;getStorage(); }\n\n\tstatic size_t pluginsCount()\n\t{ return factories-&gt;getCount(); }\n\n\tvoid event_attach(Firebird::ITraceDatabaseConnection* connection, bool create_db,\n\t\tntrace_result_t att_result);\n\n\tvoid event_detach(Firebird::ITraceDatabaseConnection* connection, bool drop_db);\n\n\t/* Start/end transaction */\n\tvoid event_transaction_start(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tunsigned tpb_length, const ntrace_byte_t* tpb, ntrace_result_t tra_result);\n\n\tvoid event_transaction_end(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tbool commit, bool retain_context, ntrace_result_t tra_result);\n\n\tvoid event_set_context(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceTransaction* transaction, Firebird::ITraceContextVariable* variable);\n\n\tvoid event_proc_compile(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceProcedure* procedure, ntrace_counter_t time_millis, ntrace_result_t proc_result);\n\n\tvoid event_proc_execute(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tFirebird::ITraceProcedure* procedure, bool started, ntrace_result_t proc_result);\n\n\tvoid event_func_compile(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceFunction* function, ntrace_counter_t time_millis, ntrace_result_t func_result);\n\n\tvoid event_func_execute(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tFirebird::ITraceFunction* function, bool started, ntrace_result_t func_result);\n\n\tvoid event_trigger_compile(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceTrigger* trigger, ntrace_counter_t time_millis, ntrace_result_t trig_result);\n\n\tvoid event_trigger_execute(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tFirebird::ITraceTrigger* trigger, bool started, ntrace_result_t trig_result);\n\n\tvoid event_blr_compile(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceTransaction* transaction, Firebird::ITraceBLRStatement* statement,\n\t\tntrace_counter_t time_millis, ntrace_result_t req_result);\n\n\tvoid event_blr_execute(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceTransaction* transaction, Firebird::ITraceBLRStatement* statement,\n\t\tntrace_result_t req_result);\n\n\tvoid event_dyn_execute(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceTransaction* transaction, Firebird::ITraceDYNRequest* request,\n\t\tntrace_counter_t time_millis, ntrace_result_t req_result);\n\n\tvoid event_service_attach(Firebird::ITraceServiceConnection* service, ntrace_result_t att_result);\n\n\tvoid event_service_start(Firebird::ITraceServiceConnection* service,\n\t\tunsigned switches_length, const char* switches,\n\t\tntrace_result_t start_result);\n\n\tvoid event_service_query(Firebird::ITraceServiceConnection* service,\n\t\tunsigned send_item_length, const ntrace_byte_t* send_items,\n\t\tunsigned recv_item_length, const ntrace_byte_t* recv_items,\n\t\tntrace_result_t query_result);\n\n\tvoid event_service_detach(Firebird::ITraceServiceConnection* service, ntrace_result_t detach_result);\n\n\tvoid event_error(Firebird::ITraceConnection* connection, Firebird::ITraceStatusVector* status, const char* function);\n\n\tvoid event_sweep(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceSweepInfo* sweep,\n\t\tntrace_process_state_t sweep_state);\n\n\ttypedef ntrace_mask_t NotificationNeeds;\n\n\tinline bool needs(unsigned e)\n\t{\n\t\tif (!active || !init_factories)\n\t\t\treturn false;\n\n\t\tif (changeNumber != getStorage()-&gt;getChangeNumber())\n\t\t\tupdate_sessions();\n\n\t\treturn trace_needs &amp; (FB_CONST64(1) &lt;&lt; e);\n\t}\n\n\t// should be called after attachment user is authenticated\n\tvoid activate()\n\t{\n\t\tactive = true;\n\t}\n\n\t// helps avoid early use\n\tbool isActive()\n\t{\n\t\treturn active;\n\t}\n\n\t// external access to stored attachment\n\tAttachment* getAttachment()\n\t{\n\t\treturn attachment;\n\t}\n\n\t/* DSQL-friendly routines to call Trace API hooks.\n       Needed because DSQL cannot include JRD for the current engine */\n\tstatic bool need_dsql_prepare(Attachment* att);\n\tstatic bool need_dsql_free(Attachment* att);\n\tstatic bool need_dsql_execute(Attachment* att);\n\n\tstatic void event_dsql_prepare(Attachment* att, jrd_tra* transaction, Firebird::ITraceSQLStatement* statement,\n\t\tntrace_counter_t time_millis, ntrace_result_t req_result);\n\n\tstatic void event_dsql_free(Attachment* att, Firebird::ITraceSQLStatement* statement,\n\t\tunsigned short option);\n\n\tstatic void event_dsql_execute(Attachment* att, jrd_tra* transaction, Firebird::ITraceSQLStatement* statement,\n\t\tbool started, ntrace_result_t req_result);\n\n\tstatic void event_dsql_restart(Attachment* att, jrd_tra* transaction, DsqlRequest* statement, const UCHAR* data,\n\t\tint number);\n\n\tstatic void shutdown();\n\nprivate:\n\tAttachment*\tattachment;\n\tService* service;\n\tconst char* filename;\n\tFirebird::ICryptKeyCallback* callback;\n\tNotificationNeeds trace_needs, new_needs;\n\n\t// This structure should be POD-like to be stored in Array\n\tstruct FactoryInfo\n\t{\n\t\tFactoryInfo() : factory(NULL)\n\t\t{\n\t\t\tmemset(name, 0, sizeof(name));\n\t\t}\n\n\t\tFirebird::ITraceFactory* factory;\n\t\tchar name[MAXPATHLEN];\n\t};\n\n\tclass Factories : public Firebird::Array&lt;FactoryInfo&gt;\n\t{\n\tpublic:\n\t\texplicit Factories(Firebird::MemoryPool&amp; p)\n\t\t\t: Firebird::Array&lt;FactoryInfo&gt;(p)\n\t\t{ }\n\n\t\t~Factories()\n\t\t{\n\t\t\tFirebird::PluginManagerInterfacePtr pi;\n\n\t\t\tfor (unsigned int i = 0; i &lt; getCount(); ++i)\n\t\t\t\tpi-&gt;releasePlugin(getElement(i).factory);\n\t\t}\n\t};\n\n\tstatic Factories* factories;\n\tstatic Firebird::GlobalPtr&lt;Firebird::RWLock&gt; init_factories_lock;\n\tstatic volatile bool init_factories;\n\n\tstruct SessionInfo\n\t{\n\t\tFactoryInfo* factory_info;\n\t\tFirebird::ITracePlugin* plugin;\n\t\tULONG ses_id;\n\n\t\tstatic ULONG generate(const SessionInfo&amp; item)\n\t\t{ return item.ses_id; }\n\t};\n\tclass Sessions : public Firebird::SortedArray&lt;SessionInfo, Firebird::EmptyStorage&lt;SessionInfo&gt;, ULONG, SessionInfo&gt;\n\t{\n\tpublic:\n\t\texplicit Sessions(MemoryPool&amp; p)\n\t\t\t: Firebird::SortedArray&lt;SessionInfo, Firebird::EmptyStorage&lt;SessionInfo&gt;, ULONG, SessionInfo&gt;(p)\n\t\t{ }\n\n\t\t~Sessions()\n\t\t{\n\t\t\tfor (unsigned int i = 0; i &lt; getCount(); ++i)\n\t\t\t{\n\t\t\t\tgetElement(i).plugin-&gt;release();\n\t\t\t}\n\t\t}\n\t};\n\tSessions trace_sessions;\n\n\tvoid init();\n\tvoid load_plugins();\n\tvoid update_sessions();\n\tvoid update_session(const Firebird::TraceSession&amp; session);\n\n\tbool check_result(Firebird::ITracePlugin* plugin, const char* module, const char* function, bool result);\n\n\t/* DSQL statement lifecycle. To be moved to public and used directly when DSQL becomes a part of JRD */\n\tvoid event_dsql_prepare(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tFirebird::ITraceSQLStatement* statement,\n\t\tntrace_counter_t time_millis, ntrace_result_t req_result);\n\n\tvoid event_dsql_free(Firebird::ITraceDatabaseConnection* connection,\n\t\tFirebird::ITraceSQLStatement* statement, unsigned short option);\n\n\tvoid event_dsql_execute(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction,\n\t\tFirebird::ITraceSQLStatement* statement,\n\t\tbool started, ntrace_result_t req_result);\n\n\tvoid event_dsql_restart(Firebird::ITraceDatabaseConnection* connection, Firebird::ITraceTransaction* transaction, Firebird::ITraceSQLStatement* statement,\n\t\tunsigned number);\n\n\tstatic Firebird::GlobalPtr&lt;StorageInstance, Firebird::InstanceControl::PRIORITY_DELETE_FIRST&gt; storageInstance;\n\n\tULONG changeNumber;\n\tbool active, failedAttach;\n};\n\n}\n\n#endif\n"}, "/build/src/jrd/trace/TraceObjects.h": {"id": "/build/src/jrd/trace/TraceObjects.h", "filePath": "src/jrd/trace/TraceObjects.h", "content": "/*\n *\tPROGRAM:\tFirebird Trace Services\n *\tMODULE:\t\tTraceObjects.h\n *\tDESCRIPTION:\tTrace API manager support\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Khorsun Vladyslav\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2009 Khorsun Vladyslav &lt;hvlad@users.sourceforge.net&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n */\n\n#ifndef JRD_TRACE_OBJECTS_H\n#define JRD_TRACE_OBJECTS_H\n\n#include &lt;time.h&gt;\n#include &quot;../../common/classes/array.h&quot;\n#include &quot;../../common/classes/fb_string.h&quot;\n#include &quot;../../dsql/dsql.h&quot;\n#include &quot;../../jrd/ntrace.h&quot;\n#include &quot;../../common/dsc.h&quot;\n#include &quot;../../common/isc_s_proto.h&quot;\n#include &quot;../../jrd/ods_proto.h&quot;\n#include &quot;../../jrd/req.h&quot;\n#include &quot;../../jrd/svc.h&quot;\n#include &quot;../../jrd/tra.h&quot;\n#include &quot;../../jrd/status.h&quot;\n#include &quot;../../jrd/Function.h&quot;\n#include &quot;../../jrd/RuntimeStatistics.h&quot;\n#include &quot;../../jrd/trace/TraceSession.h&quot;\n#include &quot;../../common/classes/ImplementHelper.h&quot;\n#include &quot;../../common/prett_proto.h&quot;\n\n//// TODO: DDL triggers, packages and external procedures and functions support\nnamespace Jrd {\n\nclass Database;\nclass Attachment;\nclass jrd_tra;\n\n\nclass StatementHolder\n{\npublic:\n\texplicit StatementHolder(const Statement* statement)\n\t\t: m_statement(statement)\n\t{}\n\n\texplicit StatementHolder(const Request* request)\n\t\t: m_statement(request ? request-&gt;getStatement() : nullptr)\n\t{}\n\n\tSINT64 getId() const\n\t{\n\t\treturn m_statement ? m_statement-&gt;getStatementId() : 0;\n\t}\n\n\tFirebird::string getName() const\n\t{\n\t\tif (m_statement)\n\t\t{\n\t\t\tif (m_statement-&gt;procedure)\n\t\t\t\treturn m_statement-&gt;procedure-&gt;getName().toQuotedString();\n\n\t\t\tif (m_statement-&gt;function)\n\t\t\t\treturn m_statement-&gt;function-&gt;getName().toQuotedString();\n\n\t\t\tif (m_statement-&gt;triggerName.object.hasData())\n\t\t\t\treturn m_statement-&gt;triggerName.toQuotedString();\n\t\t}\n\n\t\treturn &quot;&quot;;\n\t}\n\n\tconst char* ensurePlan(bool explained);\n\nprivate:\n\tconst Statement* const m_statement;\n\tFirebird::string m_plan;\n\tbool m_planExplained = false;\n};\n\n\nclass TraceConnectionImpl :\n\tpublic Firebird::AutoIface&lt;Firebird::ITraceDatabaseConnectionImpl&lt;TraceConnectionImpl, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tTraceConnectionImpl(const Attachment* att) :\n\t\tm_att(att)\n\t{}\n\n\t// TraceConnection implementation\n\tunsigned getKind();\n\tint getProcessID();\n\tconst char* getUserName();\n\tconst char* getRoleName();\n\tconst char* getCharSet();\n\tconst char* getRemoteProtocol();\n\tconst char* getRemoteAddress();\n\tint getRemoteProcessID();\n\tconst char* getRemoteProcessName();\n\n\t// TraceDatabaseConnection implementation\n\tISC_INT64 getConnectionID();\n\tconst char* getDatabaseName();\nprivate:\n\tconst Attachment* const m_att;\n};\n\n\nclass TraceTransactionImpl :\n\tpublic Firebird::AutoIface&lt;Firebird::ITraceTransactionImpl&lt;TraceTransactionImpl, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tTraceTransactionImpl(const jrd_tra* tran, Firebird::PerformanceInfo* perf = NULL, ISC_INT64 prevID = 0) :\n\t\tm_tran(tran),\n\t\tm_perf(perf),\n\t\tm_prevID(prevID)\n\t{}\n\n\t// TraceTransaction implementation\n\tISC_INT64 getTransactionID();\n\tFB_BOOLEAN getReadOnly();\n\tint getWait();\n\tunsigned getIsolation();\n\tFirebird::PerformanceInfo* getPerf()\t{ return m_perf; }\n\tISC_INT64 getInitialID();\n\tISC_INT64 getPreviousID()\t{ return m_prevID; }\n\nprivate:\n\tconst jrd_tra* const m_tran;\n\tFirebird::PerformanceInfo* const m_perf;\n\tconst ISC_INT64 m_prevID;\n};\n\n\ntemplate &lt;class Final&gt;\nclass BLRPrinter :\n\tpublic Firebird::AutoIface&lt;Firebird::ITraceBLRStatementImpl&lt;Final, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\tBLRPrinter(const unsigned char* blr, unsigned length) :\n\t\tm_blr(blr),\n\t\tm_length(length),\n\t\tm_text(*getDefaultMemoryPool())\n\t{}\n\n\t// TraceBLRStatement implementation\n\tconst unsigned char* getData()\t{ return m_blr; }\n\tunsigned getDataLength()\t\t{ return m_length; }\n\tconst char* getText()\n\t{\n\t\tif (m_text.empty() &amp;&amp; getDataLength())\n\t\t\tfb_print_blr(getData(), (ULONG) getDataLength(), print_blr, this, 0);\n\t\treturn m_text.c_str();\n\t}\n\nprivate:\n\tstatic void print_blr(void* arg, SSHORT offset, const char* line)\n\t{\n\t\tBLRPrinter* blr = (BLRPrinter*) arg;\n\n\t\tFirebird::string temp;\n\t\ttemp.printf(&quot;%4d %s\\n&quot;, offset, line);\n\t\tblr-&gt;m_text.append(temp);\n\t}\n\n\tconst unsigned char* const m_blr;\n\tconst unsigned m_length;\n\tFirebird::string m_text;\n};\n\n\nclass TraceBLRStatementImpl : public BLRPrinter&lt;TraceBLRStatementImpl&gt;\n{\npublic:\n\tTraceBLRStatementImpl(const Statement* stmt, Firebird::PerformanceInfo* perf) :\n tatement* statement) :\n\t\tStatementHolder(statement),\n\t\tm_name(name),\n\t\tm_perf(nullptr),\n\t\tm_inputs(nullptr, nullptr)\n\t{}\n\n\tTraceProcedureImpl(Request* request, Firebird::PerformanceInfo* perf) :\n\t\tStatementHolder(request),\n\t\tm_name(getName()),\n\t\tm_perf(perf),\n\t\tm_inputs(request-&gt;req_proc_caller, request-&gt;req_proc_inputs)\n\t{}\n\n\t// TraceProcedure implementation\n\tconst char* getProcName()\n\t{\n\t\treturn m_name.c_str();\n\t}\n\n\tFirebird::ITraceParams* getInputs()\n\t{\n\t\treturn m_inputs;\n\t}\n\n\tFirebird::PerformanceInfo* getPerf()\n\t{\n\t\treturn m_perf;\n\t};\n\n\tISC_INT64 getStmtID()\n\t{\n\t\treturn getId();\n\t}\n\n\tconst char* getPlan()\n\t{\n\t\treturn ensurePlan(false);\n\t}\n\n\tconst char* getExplainedPlan()\n\t{\n\t\treturn ensurePlan(true);\n\t}\n\nprivate:\n\tconst Firebird::string m_name;\n\tFirebird::PerformanceInfo* const m_perf;\n\tTraceDscFromValues m_inputs;\n};\n\n\nclass TraceFunctionImpl :\n\tpublic Firebird::AutoIface&lt;Firebird::ITraceFunctionImpl&lt;TraceFunctionImpl, Firebird::CheckStatusWrapper&gt; &gt;,\n\tpublic StatementHolder\n{\npublic:\n\tTraceFunctionImpl(const Firebird::string&amp; name, const Statement* statement) :\n\t\tStatementHolder(statement),\n\t\tm_name(name),\n\t\tm_perf(nullptr),\n\t\tm_inputs(nullptr),\n\t\tm_value(nullptr)\n\t{}\n\n\tTraceFunctionImpl(Request* request, Firebird::PerformanceInfo* perf,\n\t\t\t\t\t  Firebird::ITraceParams* inputs, const dsc* value) :\n\t\tStatementHolder(request),\n\t\tm_name(getName()),\n\t\tm_perf(perf),\n\t\tm_inputs(inputs),\n\t\tm_value(value)\n\t{}\n\n\t// TraceFunction implementation\n\tconst char* getFuncName()\n\t{\n\t\treturn m_name.c_str();\n\t}\n\n\tFirebird::ITraceParams* getInputs()\n\t{\n\t\treturn m_inputs;\n\t}\n\n\tFirebird::ITraceParams* getResult()\n\t{\n\t\treturn m_value;\n\t}\n\n\tFirebird::PerformanceInfo* getPerf()\n\t{\n\t\treturn m_perf;\n\t};\n\n\tISC_INT64 getStmtID()\n\t{\n\t\treturn getId();\n\t}\n\n\tconst char* getPlan()\n\t{\n\t\treturn ensurePlan(false);\n\t}\n\n\tconst char* getExplainedPlan()\n\t{\n\t\treturn ensurePlan(true);\n\t}\n\nprivate:\n\tFirebird::string m_name;\n\tFirebird::PerformanceInfo* const m_perf;\n\tFirebird::ITraceParams* const m_inputs;\n\tTraceDscFromDsc m_value;\n};\n\n\nclass TraceTriggerImpl :\n\tpublic Firebird::AutoIface&lt;Firebird::ITraceTriggerImpl&lt;TraceTriggerImpl, Firebird::CheckStatusWrapper&gt; &gt;,\n\tpublic StatementHolder\n{\npublic:\n\tTraceTriggerImpl(const Firebird::string&amp; name, const Firebird::string&amp; relationName,\n\t\tint which, int action, const Statement* statement) :\n\t\tStatementHolder(statement),\n\t\tm_name(name),\n\t\tm_relationName(relationName),\n\t\tm_which(which),\n\t\tm_action(action),\n\t\tm_perf(nullptr)\n\t{}\n\n\tTraceTriggerImpl(int which, const Request* request, Firebird::PerformanceInfo* perf) :\n\t\tStatementHolder(request),\n\t\tm_name(getName()),\n\t\tm_relationName((request-&gt;req_rpb.hasData() &amp;&amp; request-&gt;req_rpb[0].rpb_relation) ?\n\t\t\trequest-&gt;req_rpb[0].rpb_relation-&gt;rel_name.toQuotedString() : &quot;&quot;),\n\t\tm_which(which),\n\t\tm_action(request-&gt;req_trigger_action),\n\t\tm_perf(perf)\n\t{}\n\n\t// TraceTrigger implementation\n\tconst char* getTriggerName()\n\t{\n\t\treturn m_name.nullStr();\n\t}\n\n\tconst char* getRelationName()\n\t{\n\t\treturn m_relationName.nullStr();\n\t}\n\n\tint getWhich()\n\t{\n\t\treturn m_which;\n\t}\n\n\tint getAction()\n\t{\n\t\treturn m_action;\n\t}\n\n\tFirebird::PerformanceInfo* getPerf()\n\t{\n\t\treturn m_perf;\n\t}\n\n\tISC_INT64 getStmtID()\n\t{\n\t\treturn getId();\n\t}\n\n\tconst char* getPlan()\n\t{\n\t\treturn ensurePlan(false);\n\t}\n\n\tconst char* getExplainedPlan()\n\t{\n\t\treturn ensurePlan(true);\n\t}\n\nprivate:\n\tconst Firebird::string m_name;\n\tconst Firebird::string m_relationName;\n\tconst int m_which;\n\tconst int m_action;\n\tFirebird::PerformanceInfo* const m_perf;\n};\n\n\nclass TraceServiceImpl
