_tid == Thread::getId())\n\t{\n//\t\tfb_assert(false); // recursive call - impossible ?\n\t\treturn;\n\t}\n\n\twhile (attachment &amp;&amp; attachment-&gt;att_purge_tid)\n\t{\n\t\tattachment-&gt;att_use_count--;\n\n\t\t{ // scope\n\t\t\tAttSyncUnlockGuard cout(*attSync, FB_FUNCTION);\n\t\t\t// !!!!!!!!!!!!!!!!! - event? semaphore? condvar? (when ATT_purge_started / sAtt-&gt;getHandle() changes)\n\n\t\t\tfb_assert(!attSync-&gt;locked());\n\t\t\tThread::yield();\n\t\t\tThread::sleep(1);\n\t\t}\n\n\t\tattachment = sAtt-&gt;getHandle();\n\n\t\tif (attachment)\n\t  \t\tattachment-&gt;att_use_count++;\n\t}\n\n\tif (!attachment)\n\t\treturn;\n\n\tfb_assert(attachment-&gt;att_flags &amp; ATT_shutdown);\n\tattachment-&gt;att_purge_tid = Thread::getId();\n\n\tfb_assert(attachment-&gt;att_use_count &gt; 0);\n\tattachment = sAtt-&gt;getHandle();\n\twhile (attachment &amp;&amp; attachment-&gt;att_use_count &gt; 1)\n\t{\n\t\tattachment-&gt;att_use_count--;\n\n\t\t{ // scope\n\t\t\tAttSyncUnlockGuard cout(*attSync, FB_FUNCTION);\n\t\t\t// !!!!!!!!!!!!!!!!! - event? semaphore? condvar? (when --att_use_count)\n\n\t\t\tfb_assert(!attSync-&gt;locked());\n\t\t\tThread::yield();\n\t\t\tThread::sleep(1);\n\t\t}\n\n\t\tattachment = sAtt-&gt;getHandle();\n\n\t\tif (attachment)\n\t  \t\tattachment-&gt;att_use_count++;\n\t}\n\n\tfb_assert(attSync-&gt;locked());\n\n\tif (!attachment)\n\t\treturn;\n\n\tDatabase* const dbb = attachment-&gt;att_database;\n\tconst bool forcedPurge = (flags &amp; PURGE_FORCE);\n\tconst bool nocheckPurge = (flags &amp; (PURGE_FORCE | PURGE_NOCHECK));\n\n\ttdbb-&gt;tdbb_flags |= TDBB_detaching;\n\n\tif (!(dbb-&gt;dbb_flags &amp; DBB_bugcheck))\n\t{\n\t\ttry\n\t\t{\n\t\t\tconst TrigVector* const trig_disconnect =\n\t\t\t\tattachment-&gt;att_triggers[DB_TRIGGER_DISCONNECT];\n\n\t\t\t// ATT_resetting may be set here only in a case when running on disconnect triggers\n\t\t\t// in ALTER SESSION RESET already failed and attachment was shut down.\n\t\t\t// Trying them once again here makes no sense.\n\t\t\tif (!forcedPurge &amp;&amp;\n\t\t\t\t!(attachment-&gt;att_flags &amp; (ATT_no_db_triggers | ATT_resetting)) &amp;&amp;\n\t\t\t\ttrig_disconnect &amp;&amp; !trig_disconnect-&gt;isEmpty())\n\t\t\t{\n\t\t\t\tThreadStatusGuard temp_status(tdbb);\n\n\t\t\t\tjrd_tra* transaction = NULL;\n\t\t\t\tconst ULONG save_flags = attachment-&gt;att_flags;\n\n\t\t\t\ttry\n\t\t\t\t{\n\t\t\t\t\t// Start a transaction to execute ON DISCONNECT triggers.\n\t\t\t\t\t// Ensure this transaction can&#x27;t trigger auto-sweep.\n\t\t\t\t\tattachment-&gt;att_flags |= ATT_no_cleanup;\n\t\t\t\t\ttransaction = TRA_start(tdbb, 0, NULL);\n\t\t\t\t\tattachment-&gt;att_flags = save_flags;\n\n\t\t\t\t\t// Allow cancelling while ON DISCONNECT triggers are running\n\t\t\t\t\ttdbb-&gt;tdbb_flags &amp;= ~TDBB_detaching;\n\n\t\t\t\t\t// run ON DISCONNECT triggers\n\t\t\t\t\tEXE_execute_db_triggers(tdbb, transaction, TRIGGER_DISCONNECT);\n\n\t\t\t\t\ttdbb-&gt;tdbb_flags |= TDBB_detaching;\n\n\t\t\t\t\t// and commit the transaction\n\t\t\t\t\tTRA_commit(tdbb, transaction, false);\n\t\t\t\t}\n\t\t\t\tcatch (const Exception&amp; ex)\n\t\t\t\t{\n\t\t\t\t\tattachment-&gt;att_flags = save_flags;\n\t\t\t\t\ttdbb-&gt;tdbb_flags |= TDBB_detaching;\n\n\t\t\t\t\tif (attachment-&gt;att_trace_manager-&gt;needs(ITraceFactory::TRACE_EVENT_ERROR))\n\t\t\t\t\t{\n\t\t\t\t\t\tFbLocalStatus status;\n\t\t\t\t\t\tex.stuffException(&amp;status);\n\n\t\t\t\t\t\tTraceConnectionImpl conn(attachment);\n\t\t\t\t\t\tTraceStatusVectorImpl traceStatus(&amp;status, TraceStatusVectorImpl::TS_ERRORS);\n\n\t\t\t\t\t\tattachment-&gt;att_trace_manager-&gt;event_error(&amp;conn, &amp;traceStatus, FB_FUNCTION);\n\t\t\t\t\t}\n\n\t\t\t\t\tstring s;\n\t\t\t\t\ts.printf(&quot;Database: %s\\n\\tError at disconnect:&quot;, attachment-&gt;att_filename.c_str());\n\t\t\t\t\tiscLogException(s.c_str(), ex);\n\n\t\t\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_bugcheck)\n\t\t\t\t\t\tthrow;\n\n\t\t\t\t\ttry\n\t\t\t\t\t{\n\t\t\t\t\t\tif (transaction)\n\t\t\t\t\t\t\tTRA_rollback(tdbb, transaction, false, false);\n\t\t\t\t\t}\n\t\t\t\t\tcatch (const Exception&amp;)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_bugcheck)\n\t\t\t\t\t\t\tthrow;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tif (!nocheckPurge)\n\t\t\t{\n\t\t\t\tattachment-&gt;att_purge_tid = 0;\n\t\t\t\tthrow;\n\t\t\t}\n\t\t}\n\t}\n\n\ttry\n\t{\n\t\t// allow to free resources used by dynamic statements\n\t\tEDS::Manager::jrdAttachmentEnd(tdbb, attachment, forcedPurge);\n\n\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_bugcheck))\n\t\t{\n\t\t\t// Check for any pending transactions\n\t\t\tpurge_transactions(tdbb, attachment, nocheckPurge);\n\t\t}\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tif (!nocheckPurge)\n\t\t{\n\t\t\tattachment-&gt;att_purge_tid = 0;\n\t\t\tthrow;\n\t\t}\n\t}\n\n\tattachment-&gt;releaseProfilerManager(tdbb);\n\n\t// stop crypt thread using this attachment\n\tdbb-&gt;dbb_crypto_manager-&gt;stopThreadUsing(tdbb, attachment);\n\n\t// Notify Trace API manager about disconnect\n\tif (attachment-&gt;att_trace_manager-&gt;needs(ITraceFactory::TRACE_EVENT_DETACH))\n\t{\n\t\tTraceConnectionImpl conn(attachment);\n\t\tattachment-&gt;att_trace_manager-&gt;event_detach(&amp;conn, false);\n\t}\n\n\tfb_assert(attSync-&gt;locked());\n\tStableAttachmentPart::Sync* attAsync = sAtt-&gt;getSync(true, true);\n\tEnsureUnlock&lt;StableAttachmentPart::Sync, NotRefCounted&gt; asyncGuard(*attAsync, FB_FUNCTION);\n\n\t{ // scope - ensure correct order of taking both async and main mutexes\n\t\tAttSyncUnlockGuard cout(*attSync, FB_FUNCTION);\n\t\tfb_assert(!attSync-&gt;locked());\n\t\tasyncGuard.enter();\n\t}\n\n\tif (!sAtt-&gt;getHandle())\n\t\treturn;\n\n\tunsigned shutdownFlags = SHUT_DBB_RELEASE_POOLS;\n\tif (flags &amp; PURGE_LINGER)\n\t\tshutdownFlags |= SHUT_DBB_LINGER;\n\tif (attachment-&gt;att_flags &amp; ATT_overwrite_check)\n\t\tshutdownFlags |= SHUT_DBB_OVERWRITE_CHECK;\n\n\tif (!attachment-&gt;isWorker())\n\t\tWorkerAttachment::decUserAtts(dbb-&gt;dbb_filename);\n\n\t// Unlink attachment from database\n\trelease_attachment(tdbb, attachment);\n\n\tasyncGuard.leave();\n\tAttSyncUnlockGuard cout(*attSync, FB_FUNCTION);\n\tMutexUnlockGuard coutBlocking(*sAtt-&gt;getBlockingMutex(), FB_FUNCTION);\n\n\t// Try to close database if there are no attachments\n\tJRD_shutdown_database(dbb, shutdownFlags);\n}\n\n\nstatic void run_commit_triggers(thread_db* tdbb, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tr u n _ c o m m i t _ t r i g g e r s\n *\n **************************************\n *\n * Functional description\n *\tRun ON TRANSACTION COMMIT triggers of a transaction.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tif (transaction-&gt;tra_flags &amp; TRA_system)\n\t\treturn;\n\n\t// start a savepoint to rollback changes of all triggers\n\tAutoSavePoint savePoint(tdbb, transaction);\n\n\t// run ON TRANSACTION COMMIT triggers\n\tEXE_execute_db_triggers(tdbb, transaction, TRIGGER_TRANS_COMMIT);\n\n\tsavePoint.release();\n}\n\n\n// verify_request_synchronization\n//\n// @brief Finds the sub-requests at the given level and replaces it with the\n// original passed request (note the pointer by reference). If that specific\n// sub-request is not found, throw the dreaded &quot;request synchronization error&quot;.\n// Notice that at this time, the calling function&#x27;s &quot;request&quot; pointer has been\n// set to null, so remember that if you write a debugging routine.\n// This function replaced a chunk of code repeated four times.\n//\n// @param request The incoming, parent request to be replaced.\n// @param level The level of the sub-request we need to find.\nstatic Request* verify_request_synchronization(Statement* statement, USHORT level)\n{\n\tif (level)\n\t{\n\t\tif (level &gt;= statement-&gt;requests.getCount() || !statement-&gt;requests[level])\n\t\t\tERR_post(Arg::Gds(isc_req_sync));\n\t}\n\n\treturn statement-&gt;requests[level];\n}\n\n\n/**\n\n \tverifyDatabaseName\n\n    @brief\tVerify database name for open/create\n\tagainst given in conf file list of available directories\n\tand security database name\n\n    @param name\n    @param status\n\n **/\nstatic VdnResult verifyDatabaseName(const PathName&amp; name, FbStatusVector* status, bool is_alias)\n{\n\t// Check for securityX.fdb\n\tstatic GlobalPtr&lt;PathName&gt; securityNameBuffer, expandedSecurityNameBuffer;\n\tstatic GlobalPtr&lt;Mutex&gt; mutex;\n\n\tMutexLockGuard guard(mutex, FB_FUNCTION);\n\n\tif (!securityNameBuffer-&gt;hasData())\n\t{\n\t\tconst RefPtr&lt;const Config&gt; defConf(Config::getDefaultConfig());\n\t\tsecurityNameBuffer-&gt;assign(defConf-&gt;getSecurityDatabase());\n\t\texpandedSecurityNameBuffer-&gt;assign(securityNameBuffer);\n\t\tISC_expand_filename(expandedSecurityNameBuffer, false);\n\t}\n\n\tif (name == securityNameBuffer || name == expandedSecurityNameBuffer)\n\t\treturn VDN_OK;\n\n\t// Check for .conf\n\tif (!JRD_verify_database_access(name))\n\t{\n\t\tif (!is_alias) {\n\t\t\tERR_build_status(status, Arg::Gds(isc_conf_access_denied) &lt;&lt; Arg::Str(&quot;database&quot;) &lt;&lt;\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t Arg::Str(name));\n\t\t}\n\t\treturn VDN_FAIL;\n\t}\n\treturn VDN_OK;\n}\n\n\n/**\n\n\tgetUserInfo\n\n    @brief\tFills UserId structure with resulting values.\n    Takes into an account mapping of users and groups.\n\n    @param user\n    @param options\n    @param aliasName\n    @param dbName\n    @param config\n    @param iAtt\n    @param cryptCb\n\n **/\nstatic void getUserInfo(UserId&amp; user, const DatabaseOptions&amp; options, const char* aliasName,\n\tconst RefPtr&lt;const Config&gt;* config, Mapping&amp; mapping, bool icuReset)\n{\n\tbool wheel = false;\n\tint id = -1, group = -1;\t// CVC: This var contained trash\n\tstring name, trusted_role, auth_method;\n\n\tif (fb_utils::bootBuild())\n\t{\n\t\tauth_method = &quot;bootBuild&quot;;\n\t\twheel = true;\n\t}\n\telse\n\t{\n\t\tauth_method = &quot;User name in DPB&quot;;\n\t\tif (options.dpb_trusted_login.hasData())\n\t\t{\n\t\t\tname = options.dpb_trusted_login;\n\t\t\tfb_utils::dpbItemUpper(name);\n\t\t}\n\t\telse if (options.dpb_user_name.hasData())\n\t\t{\n\t\t\tname = options.dpb_user_name;\n\t\t\tfb_utils::dpbItemUpper(name);\n\t\t}\n\t\telse if (options.dpb_auth_block.hasData())\n\t\t{\n\t\t\tmapping.needAuthMethod(auth_method);\n\t\t\tmapping.needAuthBlock(user.usr_auth_block);\n\n\t\t\tif (mapping.mapUser(name, trusted_role) &amp; Mapping::MAP_DOWN)\n\t\t\t\tuser.setFlag(USR_mapdown);\n\t\t}\n\t\telse\n\t\t{\n\t\t\tauth_method = &quot;OS user name&quot;;\n\t\t\twheel = ISC_get_user(&amp;name, &amp;id, &amp;group);\n\t\t\tISC_systemToUtf8(name);\n\t\t\tfb_utils::dpbItemUpper(name);\n\t\t\tif (wheel || id == 0)\n\t\t\t{\n\t\t\t\tauth_method = &quot;OS user name / wheel&quot;;\n\t\t\t\twheel = true;\n\t\t\t}\n\t\t}\n\n\t\t// if the name from the user database is defined as SYSDBA,\n\t\t// we define that user id as having system privileges\n\n\t\tif (name == DBA_USER_NAME)\n\t\t{\n\t\t\twheel = true;\n\t\t}\n\t}\n\n\t// In case we became WHEEL on an OS that didn&#x27;t require name SYSDBA,\n\t// (Like Unix) force the effective Database User name to be SYSDBA\n\n\tif (wheel)\n\t{\n\t\tname = DBA_USER_NAME;\n\t\tif (icuReset)\n\t\t\tuser.setFlag(USR_sysdba);\n\t}\n\n\tif (name.length() &gt; USERNAME_LENGTH)\n\t{\n\t\tstatus_exception::raise(Arg::Gds(isc_long_login) &lt;&lt; Arg::Num(name.length())\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t &lt;&lt; Arg::Num(USERNAME_LENGTH));\n\t}\n\n\tuser.setUserName(name);\n\tuser.usr_project_name = &quot;&quot;;\n\tuser.usr_org_name = &quot;&quot;;\n\tuser.usr_auth_method = auth_method;\n\tuser.usr_user_id = id;\n\tuser.usr_group_id = group;\n\n\tif (trusted_role.hasData())\n\t{\n\t\tuser.setTrustedRole(trusted_role);\n\t}\n\n\tif (options.dpb_role_name.hasData())\n\t{\n\t\tuser.setSqlRole(options.dpb_role_name.c_str());\n\t}\n}\n\nstatic void unwindAttach(thread_db* tdbb, const char* filename, const Exception&amp; ex,\n\tFbStatusVector* userStatus, unsigned flags, const DatabaseOptions&amp; options, Mapping&amp; mapping, ICryptKeyCallback* callback)\n{\n\tFbLocalStatus savUserStatus;\t\t// Required to save status before transliterate\n\tbool traced = false;\n\n\t// Trace almost completed attachment\n\ttry\n\t{\n\t\tconst auto att = tdbb-&gt;getAttachment();\n\t\tTraceManager* traceManager = att ? att-&gt;att_trace_manager : nullptr;\n\t\tif (att &amp;&amp; traceManager &amp;&amp; traceManager-&gt;isActive())\n\t\t{\n\t\t\tTraceConnectionImpl conn(att);\n\t\t\tTraceStatusVectorImpl traceStatus(userStatus, TraceStatusVectorImpl::TS_ERRORS);\n\n\t\t\tif (traceManager-&gt;needs(ITraceFactory::TRACE_EVENT_ATTACH))\n\t\t\t\ttraceManager-&gt;event_attach(&amp;conn, flags &amp; UNWIND_CREATE, ITracePlugin::RESULT_FAILED);\n\n\t\t\ttraced = true;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tconst auto* dbb = tdbb-&gt;getDatabase();\n\t\t\tif (dbb &amp;&amp; (dbb-&gt;dbb_flags &amp; DBB_new))\n\t\t\t{\n\t\t\t\t// attach failed before completion of DBB initialization\n\t\t\t\t// that&#x27;s hardly recoverable error - avoid extra problems in mapping\n\t\t\t\tflags |= UNWIND_NEW;\n\t\t\t}\n\n\t\t\tsavUserStatus.loadFrom(userStatus);\n\t\t}\n\n\t\tconst char* func = flags &amp; UNWIND_CREATE ? &quot;JProvider::createDatabase&quot; : &quot;JProvider::attachDatabase&quot;;\n\t\ttransliterateException(tdbb, ex, userStatus, func);\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\t// no-op\n\t}\n\n\t// Actual unwind\n\ttry\n\t{\n\t\tmapping.clearMainHandle();\n\n\t\tconst auto dbb = tdbb-&gt;getDatabase();\n\n\t\tif (dbb)\n\t\t{\n\t\t\tfb_assert(!dbb-&gt;locked());\n\t\t\tThreadStatusGuard temp_status(tdbb);\n\n\t\t\t// In case when sweep attachment failed try to release appropriate lock\n\t\t\tif (options.dpb_sweep)\n\t\t\t\tdbb-&gt;clearSweepStarting();\n\n\t\t\tconst auto attachment = tdbb-&gt;getAttachment();\n\n\t\t\tif (attachment)\n\t\t\t{\n\t\t\t\t// A number of holders to make Attachment::destroy() happy\n\t\t\t\t// StablePart will be released in JAttachment::release\n\t\t\t\tRefPtr&lt;StableAttachmentPart&gt; sAtt(attachment-&gt;getStable());\n\t\t\t\t// Will release addRef() addedin  create_attachment()\n\t\t\t\tRefPtr&lt;JAttachment&gt; jAtt(REF_NO_INCR, sAtt-&gt;getInterface());\n\n\t\t\t\t// This unlocking/locking order guarantees stable release of attachment\n\t\t\t\tsAtt-&gt;manualUnlock(attachment-&gt;att_flags);\n\n\t\t\t\tULONG flags = 0;\t// att_flags may already not exist here!\n\t\t\t\tsAtt-&gt;manualLock(flags);\n\t\t\t\tif (sAtt-&gt;getHandle())\n\t\t\t\t{\n\t\t\t\t\tTraceManager* traceManager = attachment-&gt;att_trace_manager;\n\t\t\t\t\tTraceConnectionImpl conn(attachment);\n\n\t\t\t\t\tif (traceManager-&gt;needs(ITraceFactory::TRACE_EVENT_DETACH))\n\t\t\t\t\t\ttraceManager-&gt;event_detach(&amp;conn, false);\n\n\t\t\t\t\tattachment-&gt;att_flags |= flags;\n\t\t\t\t\ttry\n\t\t\t\t\t{\n\t\t\t\t\t\trelease_attachment(tdbb, attachment);\n\t\t\t\t\t}\n\t\t\t\t\tcatch (const Exception&amp;)\n\t\t\t\t\t{\n\t\t\t\t\t\t// Minimum cleanup instead is needed to avoid repeated call\n\t\t\t\t\t\t// of release_attachment() when decrementing reference counter of jAtt.\n\t\t\t\t\t\ttry\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tAttachment::destroy(attachment);\n\t\t\t\t\t\t}\n\t\t\t\t\t\tcatch (const Exception&amp;)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\t// Let&#x27;s be absolutely minimalistic though\n\t\t\t\t\t\t\t// this will almost for sure cause assertion in DEV_BUILD.\n\t\t\t\t\t\t\tsAtt-&gt;cancel();\n\t\t\t\t\t\t\tattachment-&gt;setStable(NULL);\n\t\t\t\t\t\t\tsAtt-&gt;manualUnlock(attachment-&gt;att_flags);\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\ttdbb-&gt;setAttachment(nullptr);\n\t\t\t\t\tsAtt-&gt;manualUnlock(flags);\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tJRD_shutdown_database(dbb, SHUT_DBB_RELEASE_POOLS |\n\t\t\t\t(flags &amp; UNWIND_INTERNAL ? SHUT_DBB_OVERWRITE_CHECK : 0));\n\t\t}\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\t// no-op\n\t}\n\n\t// Trace attachment that failed before enough for normal trace context of it was established\n\tif (!traced)\n\t{\n\t\ttry\n\t\t{\n\t\t\ttrace_failed_attach(filename, options, flags, &amp;savUserStatus, callback);\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\t// no-op\n\t\t}\n\t}\n}\n\n\nnamespace\n{\n\tbool shutdownAttachments(AttachmentsRefHolder* arg, ISC_STATUS signal)\n\t{\n\t\tAutoPtr&lt;AttachmentsRefHolder&gt; queue(arg);\n\t\tAttachmentsRefHolder&amp; attachments = *arg;\n\t\tbool success = true;\n\n\t\tif (signal)\n\t\t{\n\t\t\t// Set terminate flag for all attachments\n\n\t\t\tfor (AttachmentsRefHolder::Iterator iter(attachments); *iter; ++iter)\n\t\t\t{\n\t\t\t\tStableAttachmentPart* const sAtt = *iter;\n\n\t\t\t\tAttSyncLockGuard guard(*(sAtt-&gt;getSync(true)), FB_FUNCTION);\n\t\t\t\tAttachment* attachment = sAtt-&gt;getHandle();\n\n\t\t\t\tif (attachment)\n\t\t\t\t\tattachment-&gt;signalShutdown(signal);\n\t\t\t}\n\t\t}\n\n\t\t// Purge all attachments\n\n\t\tfor (AttachmentsRefHolder::Iterator iter(attachments); *iter; ++iter)\n\t\t{\n\t\t\tStableAttachmentPart* const sAtt = *iter;\n\n\t\t\tMutexLockGuard guardBlocking(*(sAtt-&gt;getBlockingMutex()), FB_FUNCTION);\n\t\t\tAttSyncLockGuard guard(*(sAtt-&gt;getSync()), FB_FUNCTION);\n\t\t\tAttachment* attachment = sAtt-&gt;getHandle();\n\n\t\t\tif (attachment)\n\t\t\t{\n\t\t\t\tThreadContextHolder tdbb;\n\t\t\t\ttdbb-&gt;setAttachment(attachment);\n\t\t\t\ttdbb-&gt;setDatabase(attachment-&gt;att_database);\n\n\t\t\t\ttry\n\t\t\t\t{\n\t\t\t\t\t// purge attachment, rollback any open transactions\n\t\t\t\t\tattachment-&gt;att_use_count++;\n\t\t\t\t\tpurge_attachment(tdbb, sAtt, engineShutdown ? PURGE_FORCE : PURGE_NOCHECK);\n\t\t\t\t}\n\t\t\t\tcatch (const Exception&amp; ex)\n\t\t\t\t{\n\t\t\t\t\tiscLogException(&quot;error while shutting down attachment&quot;, ex);\n\t\t\t\t\tsuccess = false;\n\t\t\t\t}\n\n\t\t\t\tattachment = sAtt-&gt;getHandle();\n\n\t\t\t\tif (attachment)\n\t\t\t\t\tattachment-&gt;att_use_count--;\n\t\t\t}\n\t\t}\n\n\t\treturn success;\n\t}\n\n\tTHREAD_ENTRY_DECLARE attachmentShutdownThread(THREAD_ENTRY_PARAM arg)\n\t{\n#ifdef WIN_NT\n\t\tThreadModuleRef thdRef(attachmentShutdownThread, &amp;engineShutdown);\n#endif\n\n\t\tAttShutParams* params = static_cast&lt;AttShutParams*&gt;(arg);\n\t\tAttachmentsRefHolder* attachments = params-&gt;attachments;\n\n\t\ttry\n\t\t{\n\t\t\tparams-&gt;startCallCompleteSem.enter();\n\t\t}\n\t\tcatch (const Exception&amp; ex)\n\t\t{\n\t\t\tiscLogException(&quot;attachmentShutdownThread&quot;, ex);\n\t\t\treturn 0;\n\t\t}\n\n\t\tThread::Handle th = params-&gt;thrHandle;\n\t\tfb_assert(th);\n\n\t\ttry\n\t\t{\n\t\t\tshutThreadCollect-&gt;running(th);\n\t\t\tparams-&gt;thdStartedSem.release();\n\n\t\t\tMutexLockGuard guard(shutdownMutex, FB_FUNCTION);\n\t\t\tif (!engineShutdown)\n\t\t\t\tshutdownAttachments(attachments, isc_att_shut_db_down);\n\t\t}\n\t\tcatch (const Exception&amp; ex)\n\t\t{\n\t\t\tiscLogException(&quot;attachmentShutdownThread&quot;, ex);\n\t\t}\n\n\t\tshutThreadCollect-&gt;ending(th);\n\t\treturn 0;\n\t}\n} // anonymous namespace\n\n\nstatic void waitForShutdown(Semaphore&amp; shutdown_semaphore)\n{\n\tconst int pid = getpid();\n\tunsigned int timeout = 10;\t// initial value, 10 sec\n\tbool done = false;\n\n\tfor (int i = 0; i &lt; 5; i++)\n\t{\n\t\tgds__log(&quot;PID %d: engine shutdown is in progress with %s database(s) attached&quot;,\n\t\t\tpid, databases == NULL ? &quot;no&quot; : &quot;some&quot;);\n\n\t\ttimeout *= 2;\n\t\tif (shutdown_semaphore.tryEnter(timeout))\n\t\t{\n\t\t\tdone = true;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\tif (!done)\n\t{\n\t\tif (databases == NULL)\n\t\t{\n\t\t\tgds__log(&quot;PID %d: wait for engine shutdown failed, terminating&quot;, pid);\n\t\t\tif (Config::getBugcheckAbort())\n\t\t\t\tabort();\n\n\t\t\t// return immediately\n\t\t\t_exit(5);\n\t\t}\n\n\t\tshutdown_semaphore.enter();\n\t}\n}\n\n\nstatic THREAD_ENTRY_DECLARE shutdown_thread(THREAD_ENTRY_PARAM arg)\n{\n/**************************************\n *\n *\ts h u t d o w n _ t h r e a d\n *\n **************************************\n *\n * Functional description\n *\tShutdown the engine.\n *\n **************************************/\n\tSemaphore* const semaphore = static_cast&lt;Semaphore*&gt;(arg);\n\n\tbool success = true;\n\tMemoryPool&amp; pool = *getDefaultMemoryPool();\n\tAttachmentsRefHolder* const attachments = FB_NEW_POOL(pool) AttachmentsRefHolder(pool);\n\n\ttry\n\t{\n\t\t{ // scope\n\t\t\tMutexLockGuard guard(databases_mutex, FB_FUNCTION);\n\n\t\t\tfor (Database* dbb = databases; dbb; dbb = dbb-&gt;dbb_next)\n\t\t\t{\n\t\t\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_bugcheck))\n\t\t\t\t{\n\t\t\t\t\tSync dbbGuard(&amp;dbb-&gt;dbb_sync, FB_FUNCTION);\n\t\t\t\t\tdbbGuard.lock(SYNC_EXCLUSIVE);\n\n\t\t\t\t\tfor (Attachment* att = dbb-&gt;dbb_attachments; att; att = att-&gt;att_next)\n\t\t\t\t\t\tattachments-&gt;add(att-&gt;getStable());\n\t\t\t\t}\n\t\t\t}\n\t\t\t// No need in databases_mutex any more\n\t\t}\n\n\t\t// Shutdown existing attachments\n\t\tsuccess = success &amp;&amp; shutdownAttachments(attachments, isc_att_shut_engine);\n\n\t\tHalfStaticArray&lt;Database*, 32&gt; dbArray(pool);\n\t\t{ // scope\n\t\t\tMutexLockGuard guard(databases_mutex, FB_FUNCTION);\n\n\t\t\tfor (Database* dbb = databases; dbb; dbb = dbb-&gt;dbb_next)\n\t\t\t\tdbArray.push(dbb);\n\n\t\t\t// No need in databases_mutex any more\n\t\t}\n\n\t\tfor (unsigned n = 0; n &lt; dbArray.getCount(); ++n)\n\t\t\tJRD_shutdown_database(dbArray[n], SHUT_DBB_RELEASE_POOLS);\n\n\t\t// Extra shutdown operations\n\t\tService::shutdownServices();\n\t\tTRA_shutdown_sweep();\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\tsuccess = false;\n\t\tiscLogException(&quot;Error at shutdown_thread&quot;, ex);\n\t}\n\n\tif (success &amp;&amp; semaphore)\n\t\tsemaphore-&gt;release();\n\n\treturn 0;\n}\n\n\n/// TimeoutTimer\n#ifdef USE_ITIMER\nvoid TimeoutTimer::handler()\n{\n\tm_expired = true;\n\tm_started = 0;\n}\n\nint TimeoutTimer::release()\n{\n\tif (--refCounter == 0)\n\t{\n\t\tdelete this;\n\t\treturn 0;\n\t}\n\n\treturn 1;\n}\n\nunsigned int TimeoutTimer::timeToExpire() const\n{\n\tif (!m_started || m_expired)\n\t\treturn 0;\n\n\tconst SINT64 t = fb_utils::query_performance_counter() * 1000 / fb_utils::query_performance_frequency();\n\tconst SINT64 r = m_started + m_value - t;\n\treturn r &gt; 0 ? r : 0;\n}\n\nbool TimeoutTimer::getExpireTimestamp(const ISC_TIMESTAMP_TZ start, ISC_TIMESTAMP_TZ&amp; exp) const\n{\n\tif (!m_started || m_expired)\n\t\treturn false;\n\n\tSINT64 ticks = TimeStamp::timeStampToTicks(start.utc_timestamp);\n\tticks += m_value * ISC_TIME_SECONDS_PRECISION / 1000;\n\n\texp.utc_timestamp = TimeStamp::ticksToTimeStamp(ticks);\n\texp.time_zone = start.time_zone;\n\n\treturn true;\n}\n\nvoid TimeoutTimer::start()\n{\n\tFbLocalStatus s;\n\tITimerControl* timerCtrl = Firebird::TimerInterfacePtr();\n\n\tm_expired = false;\n\n\t// todo: timerCtrl-&gt;restart to avoid 2 times acquire timerCtrl mutex\n\n\tif (m_started)\n\t{\n\t\ttimerCtrl-&gt;stop(&amp;s, this);\n\t\tm_started = 0;\n\t}\n\n\tif (m_value != 0)\n\t{\n\t\ttimerCtrl-&gt;start(&amp;s, this, m_value * 1000);\n\t\tcheck(&amp;s); // ?? todo\n\t\tm_started = fb_utils::query_performance_counter() * 1000 / fb_utils::query_performance_frequency();\n\t}\n\n\tfb_assert(m_value &amp;&amp; m_started || !m_value &amp;&amp; !m_started);\n}\n\nvoid TimeoutTimer::stop()\n{\n\tif (m_started)\n\t{\n\t\tm_started = 0;\n\n\t\tFbLocalStatus s;\n\t\tITimerControl* timerCtrl = Firebird::TimerInterfacePtr();\n\t\ttimerCtrl-&gt;stop(&amp;s, this);\n\t}\n}\n#else\nbool TimeoutTimer::expired() const\n{\n\tif (!m_start)\n\t\treturn false;\n\n\tconst SINT64 t = currTime();\n\treturn t &gt;= m_start + m_value - 1;\n}\n\nunsigned int TimeoutTimer::timeToExpire() const\n{\n\tif (!m_start)\n\t\treturn 0;\n\n\tconst SINT64 t = currTime();\n\tconst SINT64 r = m_start + m_value - t;\n\treturn r &gt; 0 ? r : 0;\n}\n\nbool TimeoutTimer::getExpireClock(SINT64&amp; clock) const noexcept\n{\n\tif (!m_start)\n\t\treturn false;\n\n\tclock = m_start + m_value;\n\treturn true;\n}\n\nvoid TimeoutTimer::start()\n{\n\tm_start = 0;\n\n\tif (m_value != 0)\n\t\tm_start = currTime();\n}\n\nvoid TimeoutTimer::stop() noexcept\n{\n\tm_start = 0;\n}\n\n\n#endif // USE_ITIMER\n\n// begin thread_db methods\n\nvoid thread_db::setDatabase(Database* val)\n{\n\tif (database != val)\n\t{\n\t\tdatabase = val;\n\t\tdbbStat = val ? &amp;val-&gt;dbb_stats : RuntimeStatistics::getDummy();\n\t}\n}\n\nvoid thread_db::setAttachment(Attachment* val)\n{\n\tattachment = val;\n\tattStat = val ? &amp;val-&gt;att_stats : RuntimeStatistics::getDummy();\n}\n\nvoid thread_db::setTransaction(jrd_tra* val)\n{\n\ttransaction = val;\n\ttraStat = val ? &amp;val-&gt;tra_stats : RuntimeStatistics::getDummy();\n}\n\nvoid thread_db::setRequest(Request* val)\n{\n\trequest = val;\n\treqStat = val ? &amp;val-&gt;req_stats : RuntimeStatistics::getDummy();\n}\n\nSSHORT thread_db::getCharSet() const noexcept\n{\n\tUSHORT charSetId;\n\n\tif (request &amp;&amp; (charSetId = request-&gt;getStatement()-&gt;charSetId) != CS_dynamic)\n\t\treturn charSetId;\n\n\treturn attachment-&gt;att_charset;\n}\n\nISC_STATUS thread_db::getCancelState(ISC_STATUS* secondary)\n{\n\t// Test for asynchronous shutdown/cancellation requests.\n\t// But do that only if we&#x27;re neither in the verb cleanup state\n\t// nor currently detaching, as these actions should never be interrupted.\n\t// Also don&#x27;t break wait in LM if it is not safe.\n\n\tif (tdbb_flags &amp; (TDBB_verb_cleanup | TDBB_dfw_cleanup | TDBB_detaching | TDBB_wait_cancel_disable))\n\t\treturn FB_SUCCESS;\n\n\tif (attachment &amp;&amp; attachment-&gt;att_purge_tid != Thread::getId())\n\t{\n\t\tif (attachment-&gt;att_flags &amp; ATT_shutdown)\n\t\t{\n\t\t\tif (database-&gt;isShutdown())\n\t\t\t\treturn isc_shutdown;\n\n\t\t\tif (secondary)\n\t\t\t\t*secondary = attachment-&gt;getStable() ? attachment-&gt;getStable()-&gt;getShutError() : 0;\n\n\t\t\treturn isc_att_shutdown;\n\t\t}\n\n\t\t// If a cancel has been raised, defer its acknowledgement\n\t\t// when executing in the context of an internal request or\n\t\t// the system transaction.\n\n\t\tif ((attachment-&gt;att_flags &amp; ATT_cancel_raise) &amp;&amp;\n\t\t\t!(attachment-&gt;att_flags &amp; ATT_cancel_disable))\n\t\t{\n\t\t\tif ((!request ||\n\t\t\t\t\t!(request-&gt;getStatement()-&gt;flags &amp;\n\t\t\t\t\t\t// temporary change to fix shutdown\n\t\t\t\t\t\t(/*Statement::FLAG_INTERNAL | */Statement::FLAG_SYS_TRIGGER))) &amp;&amp;\n\t\t\t\t(!transaction || !(transaction-&gt;tra_flags &amp; TRA_system)))\n\t\t\t{\n\t\t\t\treturn isc_cancelled;\n\t\t\t}\n\t\t}\n\t}\n\n\tif (tdbb_reqTimer &amp;&amp; tdbb_reqTimer-&gt;expired())\n\t{\n\t\tif (secondary)\n\t\t\t*secondary = tdbb_reqTimer-&gt;getErrCode();\n\n\t\treturn isc_cancelled;\n\t}\n\n\t// Check the thread state for already posted system errors. If any still persists,\n\t// then someone tries to ignore our attempts to interrupt him. Let&#x27;s insist.\n\n\tif (tdbb_flags &amp; TDBB_sys_error)\n\t\treturn isc_cancelled;\n\n\treturn FB_SUCCESS;\n}\n\nvoid thread_db::checkCancelState()\n{\n\tISC_STATUS secondary = 0;\n\tconst ISC_STATUS error = getCancelState(&amp;secondary);\n\n\tif (error)\n\t{\n\t\tArg::Gds status(error);\n\n\t\tif (error == isc_shutdown)\n\t\t\tstatus &lt;&lt; Arg::Str(attachment-&gt;att_filename);\n\n\t\tif (secondary)\n\t\t\tstatus &lt;&lt; Arg::Gds(secondary);\n\n\t\tif (attachment)\n\t\t\tattachment-&gt;att_flags &amp;= ~ATT_cancel_raise;\n\n\t\ttdbb_flags |= TDBB_sys_error;\n\t\tstatus.copyTo(tdbb_status_vector);\n\n\t\tCCH_unwind(this, true);\n\t}\n}\n\nvoid thread_db::reschedule()\n{\n\t// Somebody has kindly offered to relinquish\n\t// control so that somebody else may run\n\n\tcheckCancelState();\n\n\tconst StableAttachmentPart::Sync* sync = this-&gt;getAttachment()-&gt;getStable()-&gt;getSync();\n\n\tif (sync-&gt;hasContention())\n\t{\n\t\tconst FB_UINT64 cnt = sync-&gt;getLockCounter();\n\n\t\t{\t// scope\n\t\t\tEngineCheckout cout(this, FB_FUNCTION);\n\t\t\tThread::yield();\n\n\t\t\twhile (sync-&gt;hasContention() &amp;&amp; (sync-&gt;getLockCounter() == cnt))\n\t\t\t\tThread::sleep(1);\n\t\t}\n\n\t\tcheckCancelState();\n\t}\n\n\tMonitoring::checkState(this);\n\n\tif (tdbb_quantum &lt;= 0)\n\t\ttdbb_quantum = (tdbb_flags &amp; TDBB_sweeper) ? SWEEP_QUANTUM : QUANTUM;\n}\n\nULONG thread_db::adjustWait(ULONG wait) const\n{\n\tif ((wait == 0) || (tdbb_flags &amp; TDBB_wait_cancel_disable) || !tdbb_reqTimer)\n\t\treturn wait;\n\n\t// This limit corresponds to the lock manager restriction (wait time is signed short)\n\tconstexpr ULONG MAX_WAIT_TIME = MAX_SSHORT; // seconds\n\n\tconst unsigned int timeout = tdbb_reqTimer-&gt;timeToExpire(); // milliseconds\n\n\tconst ULONG adjustedTimeout =\n\t\t(timeout &lt; MAX_WAIT_TIME * 1000) ? (timeout + 999) / 1000 : MAX_WAIT_TIME;\n\n\treturn MIN(wait, adjustedTimeout);\n}\n\n// end thread_db methods\n\n\nvoid JRD_autocommit_ddl(thread_db* tdbb, jrd_tra* transaction)\n{\n\t// Ignore autocommit for:\n\t// 1) cancelled requests (already detached from the transaction)\n\t// 2) requests created by EXECUTE STATEMENT or coming from external engines\n\n\tif (!transaction || transaction-&gt;tra_callback_count)\n\t\treturn;\n\n\t// Perform an auto commit for autocommit transactions.\n\t// This is slightly tricky. If the commit retain works, all is well.\n\t// If TRA_commit() fails, we perform a rollback_retain(). This will backout\n\t// the effects of the transaction, mark it dead and start a new transaction.\n\n\tif (transaction-&gt;tra_flags &amp; TRA_perform_autocommit)\n\t{\n\t\ttransaction-&gt;tra_flags &amp;= ~TRA_perform_autocommit;\n\n\t\ttry\n\t\t{\n\t\t\tTRA_commit(tdbb, transaction, true);\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\ttry\n\t\t\t{\n\t\t\t\tThreadStatusGuard temp_status(tdbb);\n\n\t\t\t\tTRA_rollback(tdbb, transaction, true, false);\n\t\t\t}\n\t\t\tcatch (const Exception&amp;)\n\t\t\t{\n\t\t\t\t// no-op\n\t\t\t}\n\n\t\t\tthrow;\n\t\t}\n\t}\n}\n\n\nvoid JRD_receive(thread_db* tdbb, Request* request, USHORT msg_type, ULONG msg_length, void* msg)\n{\n/**************************************\n *\n *\tJ R D _ r e c e i v e\n *\n **************************************\n *\n * Functional description\n *\tGet a record from the host program.\n *\n **************************************/\n\tEXE_receive(tdbb, request, msg_type, msg_length, msg, true);\n\n\tcheck_autocommit(tdbb, request);\n\n\tif (request-&gt;req_flags &amp; req_warning)\n\t{\n\t\trequest-&gt;req_flags &amp;= ~req_warning;\n\t\tERR_punt();\n\t}\n}\n\n\nvoid JRD_send(thread_db* tdbb, Request* request, USHORT msg_type, ULONG msg_length, const void* msg)\n{\n/**************************************\n *\n *\tJ R D _ s e n d\n *\n **************************************\n *\n * Functional description\n *\tGet a record from the host program.\n *\n **************************************/\n\tEXE_send(tdbb, request, msg_type, msg_length, msg);\n\n\tcheck_autocommit(tdbb, request);\n\n\tif (request-&gt;req_flags &amp; req_warning)\n\t{\n\t\trequest-&gt;req_flags &amp;= ~req_warning;\n\t\tERR_punt();\n\t}\n}\n\n\nvoid JRD_start(Jrd::thread_db* tdbb, Request* request, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tJ R D _ s t a r t\n *\n **************************************\n *\n * Functional description\n *\tGet a record from the host program.\n *\n **************************************/\n\tEXE_unwind(tdbb, request);\n\tEXE_start(tdbb, request, transaction);\n\n\tcheck_autocommit(tdbb, request);\n\n\tif (request-&gt;req_flags &amp; req_warning)\n\t{\n\t\trequest-&gt;req_flags &amp;= ~req_warning;\n\t\tERR_punt();\n\t}\n}\n\n\nvoid JRD_commit_transaction(thread_db* tdbb, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tJ R D _ c o m m i t _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\tCommit a transaction and keep the environment valid.\n *\n **************************************/\n\tcommit(tdbb, transaction, false);\n}\n\n\nvoid JRD_commit_retaining(thread_db* tdbb, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tJ R D _ c o m m i t _ r e t a i n i n g\n *\n **************************************\n *\n * Functional description\n *\tCommit a transaction.\n *\n **************************************/\n\tcommit(tdbb, transaction, true);\n}\n\n\nvoid JRD_rollback_transaction(thread_db* tdbb, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tJ R D _ r o l l b a c k _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\tAbort a transaction.\n *\n **************************************/\n\trollback(tdbb, transaction, false);\n}\n\n\nvoid JRD_rollback_retaining(thread_db* tdbb, jrd_tra* transaction)\n{\n/**************************************\n *\n *\tJ R D _ r o l l b a c k _ r e t a i n i n g\n *\n **************************************\n *\n * Functional description\n *\tAbort a transaction but keep the environment valid\n *\n **************************************/\n\trollback(tdbb, transaction, true);\n}\n\n\nvoid JRD_start_and_send(thread_db* tdbb, Request* request, jrd_tra* transaction,\n\tUSHORT msg_type, ULONG msg_length, const void* msg)\n{\n/**************************************\n *\n *\tJ R D _ s t a r t _ a n d _ s e n d\n *\n **************************************\n *\n * Functional description\n *\tGet a record from the host program.\n *\n **************************************/\n\tEXE_unwind(tdbb, request);\n\tEXE_start(tdbb, request, transaction);\n\tEXE_send(tdbb, request, msg_type, msg_length, msg);\n\n\tcheck_autocommit(tdbb, request);\n\n\tif (request-&gt;req_flags &amp; req_warning)\n\t{\n\t\trequest-&gt;req_flags &amp;= ~req_warning;\n\t\tERR_punt();\n\t}\n}\n\n\nvoid JRD_run_trans_start_triggers(thread_db* tdbb, jrd_tra* transaction)\n{\n\t/**************************************\n\t*\n\t*  Run TRIGGER_TRANS_START, rollback transaction on failure.\n\t*  Handle rollback error, re-throw trigger error\n\t*\n\t**************************************/\n\n\ttry\n\t{\n\t\tEXE_execute_db_triggers(tdbb, transaction, TRIGGER_TRANS_START);\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\ttry\n\t\t{\n\t\t\tTRA_rollback(tdbb, transaction, false, false);\n\t\t}\n\t\tcatch (const Exception&amp; ex2)\n\t\t{\n\t\t\tif (tdbb-&gt;getDatabase()-&gt;dbb_flags &amp; DBB_bugcheck)\n\t\t\t\tthrow;\n\n\t\t\tiscLogException(&quot;Error rolling back new transaction&quot;, ex2);\n\t\t}\n\n\t\tthrow;\n\t}\n}\n\n\nstatic void start_transaction(thread_db* tdbb, bool transliterate, jrd_tra** tra_handle,\n\tJrd::Attachment* attachment, unsigned int tpb_length, const UCHAR* tpb)\n{\n/**************************************\n *\n *\ts t a r t _ m u l t i p l e\n *\n **************************************\n *\n * Functional description\n *\tStart a transaction.\n *\n **************************************/\n\tfb_assert(attachment == tdbb-&gt;getAttachment());\n\n\ttry\n\t{\n\t\tif (*tra_handle)\n\t\t\tstatus_exception::raise(Arg::Gds(isc_bad_trans_handle));\n\n\n\t\ttry\n\t\t{\n\t\t\tif (tpb_length &gt; 0 &amp;&amp; !tpb)\n\t\t\t\tstatus_exception::raise(Arg::Gds(isc_bad_tpb_form));\n\n\t\t\tjrd_tra* transaction = TRA_start(tdbb, tpb_length, tpb);\n\n\t\t\t// run ON TRANSACTION START triggers\n\t\t\tJRD_run_trans_start_triggers(tdbb, transaction);\n\n\t\t\t*tra_handle = transaction;\n\t\t}\n\t\tcatch (const Exception&amp; ex)\n\t\t{\n\t\t\tif (transliterate)\n\t\t\t{\n\t\t\t\tFbLocalStatus tempStatus;\n\t\t\t\ttransliterateException(tdbb, ex, &amp;tempStatus, &quot;startTransaction&quot;);\n\t\t\t\tstatus_exception::raise(&amp;tempStatus);\n\t\t\t}\n\t\t\tthrow;\n\t\t}\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\t*tra_handle = NULL;\n\t\tthrow;\n\t}\n}\n\n\nvoid JRD_start_transaction(thread_db* tdbb, jrd_tra** transaction,\n   Jrd::Attachment* attachment, unsigned int tpb_length, const UCHAR* tpb)\n{\n/**************************************\n *\n *\tJ R D _ s t a r t _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\tStart a transaction.\n *\n **************************************/\n\tstart_transaction(tdbb, false, transaction, attachment, tpb_length, tpb);\n}\n\n\nvoid JRD_unwind_request(thread_db* tdbb, Request* request)\n{\n/**************************************\n *\n *\tJ R D _ u n w i n d _ r e q u e s t\n *\n **************************************\n *\n * Functional description\n *\tUnwind a running request.  This is potentially nasty since it can\n *\tbe called asynchronously.\n *\n **************************************/\n\t// Unwind request. This just tweaks some bits.\n\tEXE_unwind(tdbb, request);\n}\n\n\nnamespace\n{\n\tclass DatabaseDirList final : public DirectoryList\n\t{\n\tprivate:\n\t\tconst PathName getConfigString() const\n\t\t{\n\t\t\treturn PathName(Config::getDatabaseAccess());\n\t\t}\n\tpublic:\n\t\texplicit DatabaseDirList(MemoryPool&amp; p)\n\t\t\t: DirectoryList(p)\n\t\t{\n\t\t\tinitialize();\n\t\t}\n\t};\n\n\tInitInstance&lt;DatabaseDirList&gt; iDatabaseDirectoryList;\n}\n\n\nbool JRD_verify_database_access(const PathName&amp; name)\n{\n/**************************************\n *\n *      J R D _ v e r i f y _ d a t a b a s e _ a c c e s s\n *\n **************************************\n *\n * Functional description\n *      Verify &#x27;name&#x27; against DatabaseAccess entry of firebird.conf.\n *\n **************************************/\n\treturn iDatabaseDirectoryList().isPathInList(name);\n}\n\n\nvoid JRD_shutdown_attachment(Attachment* attachment)\n{\n/**************************************\n *\n *      J R D _ s h u t d o w n _ a t t a c h m e n t\n *\n **************************************\n *\n * Functional description\n *  Schedule the attachment marked as shutdown for disconnection.\n *\n **************************************/\n\tfb_assert(attachment);\n\n\ttry\n\t{\n\t\tfb_assert(attachment-&gt;att_flags &amp; ATT_shutdown);\n\n\t\tMemoryPool&amp; pool = *getDefaultMemoryPool();\n\t\tAutoPtr&lt;AttachmentsRefHolder&gt; queue(FB_NEW_POOL(pool) AttachmentsRefHolder(pool));\n\n\t\tfb_assert(attachment-&gt;getStable());\n\t\tattachment-&gt;getStable()-&gt;addRef();\n\t\tqueue-&gt;add(attachment-&gt;getStable());\n\n\t\tAttShutParams params;\n\t\tparams.attachments = queue;\n\t\tThread::start(attachmentShutdownThread, &amp;params, THREAD_high, &amp;params.thrHandle);\n\t\tparams.startCallCompleteSem.release();\n\n\t\tqueue.release();\n\t\tshutThreadCollect-&gt;houseKeeping();\n\t\tparams.thdStartedSem.enter();\n\t}\n\tcatch (const Exception&amp;)\n\t{} // no-op\n}\n\n\nvoid JRD_shutdown_attachments(Database* dbb)\n{\n/**************************************\n *\n *      J R D _ s h u t d o w n _ a t t a c h m e n t s\n *\n **************************************\n *\n * Functional description\n *  Schedule the attachments not marked as shutdown for disconnection.\n *\n **************************************/\n\tfb_assert(dbb);\n\n\ttry\n\t{\n\t\tMemoryPool&amp; pool = *getDefaultMemoryPool();\n\t\tAutoPtr&lt;AttachmentsRefHolder&gt; queue(FB_NEW_POOL(pool) AttachmentsRefHolder(pool));\n\n\t\t// Collect all user attachments to shutdown. Lock dbb_sync for safety.\n\t\t// Note, attachments will be marked for shutdown later, in shutdownAttachments()\n\n\t\t{\t// scope\n\t\t\tSync guard(&amp;dbb-&gt;dbb_sync, &quot;JRD_shutdown_attachments&quot;);\n\t\t\tif (!dbb-&gt;dbb_sync.ourExclusiveLock())\n\t\t\t\tguard.lock(SYNC_SHARED);\n\n\t\t\tfor (Jrd::Attachment* attachment = dbb-&gt;dbb_attachments;\n\t\t\t\t attachment;\n\t\t\t\t attachment = attachment-&gt;att_next)\n\t\t\t{\n\t\t\t\tif (!(attachment-&gt;att_flags &amp; ATT_shutdown) &amp;&amp;\n\t\t\t\t\t!(attachment-&gt;att_flags &amp; ATT_shutdown_manager))\n\t\t\t\t{\n\t\t\t\t\tfb_assert(attachment-&gt;getStable());\n\t\t\t\t\tattachment-&gt;getStable()-&gt;addRef();\n\t\t\t\t\tqueue-&gt;add(attachment-&gt;getStable());\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\tif (queue-&gt;hasData())\n\t\t{\n\t\t\tAttShutParams params;\n\t\t\tparams.attachments = queue;\n\t\t\tThread::start(attachmentShutdownThread, &amp;params, THREAD_high, &amp;params.thrHandle);\n\t\t\tparams.startCallCompleteSem.release();\n\n\t\t\tqueue.release();\n\t\t\tshutThreadCollect-&gt;houseKeeping();\n\t\t\tparams.thdStartedSem.enter();\n\t\t}\n\t}\n\tcatch (const Exception&amp;)\n\t{} // no-op\n}\n\n\nvoid JRD_cancel_operation(thread_db* /*tdbb*/, Jrd::Attachment* attachment, int option)\n{\n/**************************************\n *\n *\tJ R D _ c a n c e l _ o p e r a t i o n\n *\n **************************************\n *\n * Functional description\n *\tTry to cancel an operation.\n *\n **************************************/\n\tswitch (option)\n\t{\n\tcase fb_cancel_disable:\n\t\tattachment-&gt;att_flags |= ATT_cancel_disable;\n\t\tattachment-&gt;att_flags &amp;= ~ATT_cancel_raise;\n\t\tbreak;\n\n\tcase fb_cancel_enable:\n\t\tif (attachment-&gt;att_flags &amp; ATT_cancel_disable)\n\t\t{\n\t\t\t// avoid leaving ATT_cancel_raise set when cleaning ATT_cancel_disable\n\t\t\t// to avoid unexpected CANCEL (though it should not be set, but...)\n\t\t\tattachment-&gt;att_flags &amp;= ~(ATT_cancel_disable | ATT_cancel_raise);\n\t\t}\n\t\tbreak;\n\n\tcase fb_cancel_raise:\n\t\tif (!(attachment-&gt;att_flags &amp; ATT_cancel_disable))\n\t\t\tattachment-&gt;signalCancel();\n\t\tbreak;\n\n\tcase fb_cancel_abort:\n\t\tif (!(attachment-&gt;att_flags &amp; ATT_shutdown))\n\t\t\tattachment-&gt;signalShutdown(isc_att_shut_killed);\n\t\tbreak;\n\n\tdefault:\n\t\tfb_assert(false);\n\t}\n}\n\n\nbool TrigVector::hasActive() const\n{\n\tfor (const_iterator iter = begin(); iter != end(); ++iter)\n\t{\n\t\tif (iter-&gt;isActive())\n\t\t\treturn true;\n\t}\n\n\treturn false;\n}\n\n\nvoid TrigVector::decompile(thread_db* tdbb)\n{\n\tfor (iterator iter = begin(); iter != end(); ++iter)\n\t\titer-&gt;release(tdbb);\n}\n\n\nvoid TrigVector::release()\n{\n\trelease(JRD_get_thread_data());\n}\n\n\nvoid TrigVector::release(thread_db* tdbb)\n{\n\tfb_assert(useCount.value() &gt; 0);\n\n\tif (--useCount == 0)\n\t{\n\t\tdecompile(tdbb);\n\t\tdelete this;\n\t}\n}\n"}, "/build/src/jrd/tra.cpp": {"id": "/build/src/jrd/tra.cpp", "filePath": "src/jrd/tra.cpp", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\ttra.cpp\n *\tDESCRIPTION:\tTransaction manager\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n * 2001.07.06 Sean Leyne - Code Cleanup, removed &quot;#ifdef READONLY_DATABASE&quot;\n *                         conditionals, as the engine now fully supports\n *                         readonly databases.\n * 2002.10.29 Nickolay Samofatov: Added support for savepoints\n */\n\n#include &quot;firebird.h&quot;\n#include &lt;string.h&gt;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/pag.h&quot;\n#include &quot;../jrd/lck.h&quot;\n#include &quot;../jrd/lls.h&quot;\n#include &quot;../jrd/btr.h&quot;\n#include &quot;../jrd/req.h&quot;\n#include &quot;../jrd/exe.h&quot;\n#include &quot;../jrd/extds/ExtDS.h&quot;\n#include &quot;../jrd/intl_classes.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../jrd/TimeZone.h&quot;\n#include &quot;../jrd/UserManagement.h&quot;\n#include &quot;../jrd/blb_proto.h&quot;\n#include &quot;../jrd/cch_proto.h&quot;\n#include &quot;../jrd/cmp_proto.h&quot;\n#include &quot;../jrd/dfw_proto.h&quot;\n#include &quot;../jrd/dpm_proto.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/exe_proto.h&quot;\n#include &quot;../jrd/ext_proto.h&quot;\n#include &quot;../jrd/idx_proto.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/isc_proto.h&quot;\n#include &quot;../jrd/lck_proto.h&quot;\n#include &quot;../jrd/met_proto.h&quot;\n#include &quot;../jrd/mov_proto.h&quot;\n#include &quot;../jrd/pag_proto.h&quot;\n#include &quot;../jrd/rlck_proto.h&quot;\n#include &quot;../jrd/tpc_proto.h&quot;\n#include &quot;../jrd/tra_proto.h&quot;\n#include &quot;../jrd/vio_proto.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/scl_proto.h&quot;\n#include &quot;../common/classes/ClumpletWriter.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../lock/lock_proto.h&quot;\n#include &quot;../dsql/dsql.h&quot;\n#include &quot;../dsql/dsql_proto.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../jrd/replication/Publisher.h&quot;\n#include &quot;../jrd/trace/TraceManager.h&quot;\n#include &quot;../jrd/trace/TraceJrdHelpers.h&quot;\n#include &quot;../jrd/Function.h&quot;\n#include &quot;../jrd/Collation.h&quot;\n#include &quot;../jrd/Mapping.h&quot;\n#include &quot;../jrd/DbCreators.h&quot;\n#include &quot;../common/os/fbsyslog.h&quot;\n#include &quot;firebird/impl/msg_helper.h&quot;\n\n\nconst int DYN_MSG_FAC\t= 8;\n\nusing namespace Jrd;\nusing namespace Ods;\nusing namespace Firebird;\n\ntypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;USHORT, UCHAR&gt; &gt; &gt; RelationLockTypeMap;\n\n\n#ifdef SUPERSERVER_V2\nstatic TraNumber bump_transaction_id(thread_db*, WIN*);\n#else\nstatic header_page* bump_transaction_id(thread_db*, WIN*, bool);\n#endif\nstatic void retain_context(thread_db* tdbb, jrd_tra* transaction, bool commit, int state);\nstatic void expand_view_lock(thread_db* tdbb, jrd_tra*, jrd_rel*, UCHAR lock_type,\n\tconst char* option_name, RelationLockTypeMap&amp; lockmap, const int level);\nstatic tx_inv_page* fetch_inventory_page(thread_db*, WIN* window, ULONG sequence, USHORT lock_level);\nstatic const char* get_lockname_v3(const UCHAR lock);\nstatic ULONG inventory_page(thread_db*, ULONG);\nstatic int limbo_transaction(thread_db*, TraNumber id);\nstatic void release_temp_tables(thread_db*, jrd_tra*);\nstatic void retain_temp_tables(thread_db*, jrd_tra*, TraNumber);\nstatic void restart_requests(thread_db*, jrd_tra*);\nstatic void start_sweeper(thread_db*);\n//static THREAD_ENTRY_DECLARE sweep_database(THREAD_ENTRY_PARAM);\nstatic void transaction_flush(thread_db* tdbb, USHORT flush_flag, TraNumber tra_number);\nstatic void transaction_options(thread_db*, jrd_tra*, const UCHAR*, USHORT);\nstatic void transaction_start(thread_db* tdbb, jrd_tra* temp);\n\nstatic const UCHAR sweep_tpb[] =\n{\n\tisc_tpb_version1, isc_tpb_read,\n\tisc_tpb_read_committed, isc_tpb_rec_version\n};\n\n\nRequest* TRA_get_prior_request(thread_db* tdbb)\n{\n\t// See if there is any request right above us in the call stack\n\tRequest* org_request;\n\tthread_db* jrd_ctx = tdbb;\n\tdo\n\t{\n\t\t// Check regular request call stack\n\t\torg_request = jrd_ctx-&gt;getRequest();\n\t\tif (org_request)\n\t\t\tbreak;\n\n\t\t// Check for engine context switch (EXECUTE STATEMENT, etc)\n\t\tThreadData* ctx = jrd_ctx;\n\t\tjrd_ctx = NULL;\n\t\twhile( (ctx = ctx-&gt;getPriorContext()) )\n\t\t{\n\t\t\tif (ctx-&gt;getType() == ThreadData::tddDBB)\n\t\t\t{\n\t\t\t\tjrd_ctx = static_cast&lt;thread_db*&gt;(ctx);\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t} while (jrd_ctx);\n\n\treturn org_request;\n}\n\nvoid TRA_setup_request_snapshot(Jrd::thread_db* tdbb, Jrd::Request* request)\n{\n\t// This function is called whenever request is started in a transaction.\n\t// Setup context to preserve read consistency in READ COMMITTED transactions.\n\n\tJrd::jrd_tra* transaction = request-&gt;req_transaction;\n\n\t// We assume that request is already attached to a transaction\n\tfb_assert(transaction);\n\n\t// If we are not READ COMMITTED or read consistency is not needed then nothing to do here\n\tif (!(transaction-&gt;tra_flags &amp; TRA_read_committed) || !(transaction-&gt;tra_flags &amp; TRA_read_consistency))\n\t\treturn;\n\n\t// See if there is any request right above us in the call stack\n\tRequest* org_request = TRA_get_prior_request(tdbb);\n\n\tif (org_request &amp;&amp; org_request-&gt;req_transaction == transaction)\n\t{\n\t\tfb_assert(org_request-&gt;req_snapshot.m_owner);\n\t\trequest-&gt;req_snapshot.m_owner = org_request-&gt;req_snapshot.m_owner;\n\t\treturn;\n\t}\n\n\t// If we are a top-level request or caller is executed in a different transaction,\n\t// we need to set up statement snapshot for read consistency and own it\n\n\trequest-&gt;req_snapshot.m_owner = request;\n\trequest-&gt;req_snapshot.m_number = 0;\n\n\trequest-&gt;req_snapshot.m_handle =\n\t\ttdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;beginSnapshot(tdbb,\n\t\t\ttdbb-&gt;getAttachment()-&gt;att_attachment_id, request-&gt;req_snapshot.m_number);\n}\n\n\nvoid TRA_release_request_snapshot(Jrd::thread_db* tdbb, Jrd::Request* request)\n{\n\t// This function is called whenever request has completed processing\n\t// in a transaction (normally or abnormally)\n\n\tif (!request-&gt;req_snapshot.m_owner)\n\t\treturn;\n\n\tif (request-&gt;req_snapshot.m_number)\n\t{\n\t\ttdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;endSnapshot(tdbb, request-&gt;req_snapshot.m_handle,\n\t\t\trequest-&gt;req_attachment-&gt;att_attachment_id);\n\t\trequest-&gt;req_snapshot.m_handle = 0;\n\t\trequest-&gt;req_snapshot.m_number = 0;\n\t}\n\n\trequest-&gt;req_snapshot.m_owner = nullptr;\n}\n\n\nvoid TRA_attach_request(Jrd::jrd_tra* transaction, Jrd::Request* request)\n{\n\t// When request finishes normally transaction reference is not cleared.\n\t// Then if afterwards request is restarted TRA_attach_request is called again.\n\tif (request-&gt;req_transaction)\n\t{\n\t\tif (request-&gt;req_transaction == transaction)\n\t\t\treturn;\n\t\tTRA_detach_request(request);\n\t}\n\n\tfb_assert(request-&gt;req_transaction == NULL);\n\tfb_assert(request-&gt;req_tra_next == NULL);\n\tfb_assert(request-&gt;req_tra_prev == NULL);\n\n\t// Assign transaction reference\n\trequest-&gt;req_transaction = transaction;\n\n\t// Add request to the doubly linked list\n\tif (transaction-&gt;tra_requests)\n\t{\n\t\tfb_assert(transaction-&gt;tra_requests-&gt;req_tra_prev == NULL);\n\t\ttransaction-&gt;tra_requests-&gt;req_tra_prev = request;\n\t\trequest-&gt;req_tra_next = transaction-&gt;tra_requests;\n\t}\n\ttransaction-&gt;tra_requests = request;\n}\n\nvoid TRA_detach_request(Jrd::Request* request)\n{\n\tif (!request-&gt;req_transaction)\n\t{\n\t\tfb_assert(!request-&gt;req_savepoints);\n\t\treturn;\n\t}\n\n\t// Release stored looper savepoints\n\tSavepoint::destroy(request-&gt;req_savepoints);\n\tfb_assert(!request-&gt;req_savepoints);\n\n\t// Release procedure savepoints used by this request\n\tif (request-&gt;req_proc_sav_point)\n\t{\n\t\tfb_assert(request-&gt;req_flags &amp; req_proc_fetch);\n\t\tSavepoint::destroy(request-&gt;req_proc_sav_point);\n\t\tfb_assert(!request-&gt;req_proc_sav_point);\n\t}\n\n\t// Remove request from the doubly linked list\n\tif (request-&gt;req_tra_next)\n\t{\n\t\tfb_assert(request-&gt;req_tra_next-&gt;req_tra_prev == request);\n\t\trequest-&gt;req_tra_next-&gt;req_tra_prev = request-&gt;req_tra_prev;\n\t}\n\n\tif (request-&gt;req_tra_prev)\n\t{\n\t\tfb_assert(request-&gt;req_tra_prev-&gt;req_tra_next == request);\n\t\trequest-&gt;req_tra_prev-&gt;req_tra_next = request-&gt;req_tra_next;\n\t}\n\telse\n\t{\n\t\tfb_assert(request-&gt;req_transaction-&gt;tra_requests == request);\n\t\trequest-&gt;req_transaction-&gt;tra_requests = request-&gt;req_tra_next;\n\t}\n\n\t// Clear references\n\trequest-&gt;req_transaction = NULL;\n\trequest-&gt;req_tra_next = NULL;\n\trequest-&gt;req_tra_prev = NULL;\n}\n\nbool TRA_active_transactions(thread_db* tdbb, Database* dbb)\n{\n/**************************************\n *\n *\tT R A _ a c t i v e _ t r a n s a c t i o n s\n *\n **************************************\n *\n * Functional description\n *\tDetermine if any transactions are active.\n *\tReturn true is active transactions; otherwise\n *\treturn false if no active transactions.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\treturn LCK_query_data(tdbb, LCK_tra, LCK_ANY) ? true : false;\n}\n\nbool TRA_cleanup(thread_db* tdbb)\n{\n/**************************************\n *\n *\tT R A _ c l e a n u p\n *\n **************************************\n *\n * Functional description\n *\tTRA_cleanup is called at startup while an exclusive lock is\n *\theld on the database.  Because we haven&#x27;t started a transaction,\n *\tand we have an exclusive lock on the db, any transactions marked\n *\tas active on the transaction inventory pages are indeed dead.\n *\tMark them so.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// Return without cleaning up the TIP&#x27;s for a ReadOnly database\n\tif (dbb-&gt;readOnly())\n\t\treturn false;\n\n\t// First, make damn sure there are no outstanding transactions\n\n\tfor (Jrd::Attachment* attachment = dbb-&gt;dbb_attachments; attachment;\n\t\t attachment = attachment-&gt;att_next)\n\t{\n\t\tif (attachment-&gt;att_transactions)\n\t\t\treturn false;\n\t}\n\n\tconst ULONG trans_per_tip = dbb-&gt;dbb_page_manager.transPerTIP;\n\n\t// Read header page and allocate transaction number.  Since\n\t// the transaction inventory page was initialized to zero, it\n\t// transaction is automatically marked active.\n\n\tWIN window(HEADER_PAGE_NUMBER);\n\tconst header_page* header = (header_page*) CCH_FETCH(tdbb, &amp;window, LCK_read, pag_header);\n\tconst TraNumber ceiling = header-&gt;hdr_next_transaction;\n\tconst TraNumber active = header-&gt;hdr_oldest_active;\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\tif (ceiling == 0)\n\t\treturn false;\n\n\t// Zip thru transactions from the &quot;oldest active&quot; to the next looking for\n\t// active transactions.  When one is found, declare it dead.\n\n\tconst ULONG last = ceiling / trans_per_tip;\n\tULONG number = active % trans_per_tip;\n\tTraNumber limbo = 0;\n\tbool found = false;\n\n\tfor (ULONG sequence = active / trans_per_tip; sequence &lt;= last; sequence++, number = 0)\n\t{\n\t\twindow.win_page = inventory_page(tdbb, sequence);\n\t\ttx_inv_page* tip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_transactions);\n\t\tTraNumber max = ceiling - (TraNumber) sequence * trans_per_tip;\n\t\tif (max &gt;= trans_per_tip)\n\t\t\tmax = trans_per_tip - 1;\n\t\tfor (; number &lt;= max; number++)\n\t\t{\n\t\t\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\t\t\tUCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\t\t\tconst USHORT shift = TRANS_SHIFT(number);\n\t\t\tconst int state = (*byte &gt;&gt; shift) &amp; TRA_MASK;\n\t\t\tif (state == tra_limbo &amp;&amp; limbo == 0)\n\t\t\t\tlimbo = (TraNumber) sequence * trans_per_tip + number;\n\t\t\telse if (state == tra_active)\n\t\t\t{\n\t\t\t\tfound = true;\n\t\t\t\tCCH_MARK(tdbb, &amp;window);\n\t\t\t\t*byte &amp;= ~(TRA_MASK &lt;&lt; shift);\n\n\t\t\t\t// hvlad: mark system transaction as committed\n\t\t\t\tif (sequence == 0 &amp;&amp; number == 0) {\n\t\t\t\t\t*byte |= tra_committed &lt;&lt; shift;\n\t\t\t\t}\n\t\t\t\telse {\n\t\t\t\t\t*byte |= tra_dead &lt;&lt; shift;\n\t\t\t\t}\n\t\t\t}\n\t\t}\n#ifdef SUPERSERVER_V2\n\t\tif (sequence == last)\n\t\t{\n\t\t\tCCH_MARK(tdbb, &amp;window);\n\t\t\tfor (; number &lt; trans_per_tip; number++)\n\t\t\t{\n\t\t\t\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\t\t\t\tUCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\t\t\t\tconst USHORT shift = TRANS_SHIFT(number);\n\t\t\t\t*byte &amp;= ~(TRA_MASK &lt;&lt; shift);\n\t\t\t\tif (tip-&gt;tip_next)\n\t\t\t\t\t*byte |= tra_committed &lt;&lt; shift;\n\t\t\t\telse\n\t\t\t\t\t*byte |= tra_active &lt;&lt; shift;\n\t\t\t}\n\t\t}\n#endif\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t}\n\n#ifdef SUPERSERVER_V2\n\twindow.win_page = inventory_page(tdbb, last);\n\ttx_inv_page* tip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_transactions);\n\n\twhile (tip-&gt;tip_next)\n\t{\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\twindow.win_page = inventory_page(tdbb, ++last);\n\t\ttip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_transactions);\n\t\tCCH_MARK(tdbb, &amp;window);\n\t\tfor (number = 0; number &lt; trans_per_tip; number++)\n\t\t{\n\t\t\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\t\t\tUCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\t\t\tconst USHORT shift = TRANS_SHIFT(number);\n\t\t\t*byte &amp;= ~(TRA_MASK &lt;&lt; shift);\n\t\t\tif (tip-&gt;tip_next || !number)\n\t\t\t\t*byte |= tra_committed &lt;&lt; shift;\n\t\t\telse\n\t\t\t\t*byte |= tra_active &lt;&lt; shift;\n\t\t}\n\n\t\tif (!tip-&gt;tip_next)\n\t\t\tdbb-&gt;dbb_next_transaction = (TraNumber) last * trans_per_tip;\n\t}\n\n\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\n\treturn found;\n}\n\n\nvoid TRA_commit(thread_db* tdbb, jrd_tra* transaction, const bool retaining_flag)\n{\n/**************************************\n *\n *\tT R A _ c o m m i t\n *\n **************************************\n *\n * Functional description\n *\tCommit a transaction.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tTraceTransactionEnd trace(transaction, true, retaining_flag);\n\n\tEDS::Transaction::jrdTransactionEnd(tdbb, transaction, true, retaining_flag, false);\n\n\tjrd_tra* const sysTran = tdbb-&gt;getAttachment()-&gt;getSysTransaction();\n\n\t// If this is a commit retaining, and no updates have been performed,\n\t// and no events have been posted (via stored procedures etc)\n\t// no-op the operation.\n\n\tif (retaining_flag &amp;&amp; !((transaction-&gt;tra_flags &amp; TRA_write) || transaction-&gt;tra_deferred_job))\n\t{\n\t\tif (sysTran-&gt;tra_flags &amp; TRA_write)\n\t\t\ttransaction_flush(tdbb, FLUSH_SYSTEM, 0);\n\n\t\ttransaction-&gt;tra_flags &amp;= ~TRA_prepared;\n\n\t\t// Get rid of all user savepoints\n\t\twhile (transaction-&gt;tra_save_point &amp;&amp; !transaction-&gt;tra_save_point-&gt;isRoot())\n\t\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\n\t\ttrace.finish(ITracePlugin::RESULT_SUCCESS);\n\t\treturn;\n\t}\n\n\tif (transaction-&gt;tra_flags &amp; TRA_invalidated)\n\t\tERR_post(Arg::Gds(isc_trans_invalid));\n\n\tJrd::ContextPoolHolder context(tdbb, transaction-&gt;tra_pool);\n\n\t// Get rid of all user savepoints\n\twhile (transaction-&gt;tra_save_point &amp;&amp; !transaction-&gt;tra_save_point-&gt;isRoot())\n\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\n\t// Let replicator perform heavy and error-prone part of work\n\n\tREPL_trans_prepare(tdbb, transaction);\n\n\t// Perform any meta data work deferred\n\n\tif (!(transaction-&gt;tra_flags &amp; TRA_prepared))\n\t\tDFW_perform_work(tdbb, transaction);\n\n\t// Commit associated transaction in security DB\n\n\tSecDbContext* secContext = transaction-&gt;getSecDbContext();\n\tif (secContext &amp;&amp; secContext-&gt;tra)\n\t{\n\t\tLocalStatus ls;\n\t\tCheckStatusWrapper st(&amp;ls);\n\t\tsecContext-&gt;tra-&gt;commit(&amp;st);\n\n\t\tif (st.getState() &amp; IStatus::STATE_ERRORS)\n\t\t\tstatus_exception::raise(&amp;st);\n\n\t\tsecContext-&gt;tra = NULL;\n\t\tMapping::clearCache(tdbb-&gt;getDatabase()-&gt;dbb_config-&gt;getSecurityDatabase(), Mapping::MAPPING_CACHE);\n\n\t\ttransaction-&gt;eraseSecDbContext();\n\t}\n\n\tif (transaction-&gt;tra_flags &amp; (TRA_prepare2 | TRA_reconnected))\n\t\tMET_update_transaction(tdbb, transaction, true);\n\n\t// Get rid of the rest of savepoints to allow intermediate garbage collection\n\t// in indices and BLOBs after in-place updates\n\n\twhile (transaction-&gt;tra_save_point)\n\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\n\t// Flush pages if transaction logically modified data\n\n\tif (transaction-&gt;tra_flags &amp; TRA_write)\n\t{\n\t\ttransaction_flush(tdbb, FLUSH_TRAN, transaction-&gt;tra_number);\n\t}\n\telse if ((transaction-&gt;tra_flags &amp; (TRA_prepare2 | TRA_reconnected)) ||\n\t\t(sysTran-&gt;tra_flags &amp; TRA_write))\n\t{\n\t\t// If the transaction only read data but is a member of a\n\t\t// multi-database transaction with a transaction description\n\t\t// message then flush RDB$TRANSACTIONS.\n\n\t\ttransaction_flush(tdbb, FLUSH_SYSTEM, 0);\n\t}\n\n\tif (retaining_flag)\n\t{\n\t\tretain_context(tdbb, transaction, true, tra_committed);\n\t\ttrace.finish(ITracePlugin::RESULT_SUCCESS);\n\t\treturn;\n\t}\n\n\t// Set the state on the inventory page to be committed\n\n\tREPL_trans_commit(tdbb, transaction);\n\tTRA_set_state(tdbb, transaction, transaction-&gt;tra_number, tra_committed);\n\n\t// Perform any post commit work\n\n\tDFW_perform_post_commit_work(transaction);\n\n\t// notify any waiting locks that this transaction is committing;\n\t// there could be no lock if this transaction is being reconnected\n\n\t++transaction-&gt;tra_use_count;\n\tLock* lock = transaction-&gt;tra_lock;\n\tif (lock &amp;&amp; (lock-&gt;lck_logical &lt; LCK_write))\n\t\tLCK_convert(tdbb, lock, LCK_write, LCK_WAIT);\n\t--transaction-&gt;tra_use_count;\n\n\tTRA_release_transaction(tdbb, transaction, &amp;trace);\n}\n\n\nvoid TRA_extend_tip(thread_db* tdbb, ULONG sequence) //, WIN* precedence_window)\n{\n/**************************************\n *\n *\tT R A _ e x t e n d _ t i p\n *\n **************************************\n *\n * Functional description\n *\tAllocate and link in new TIP (transaction inventory page).\n *\tThis is called from TRA_start and from validate/repair.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// Start by fetching prior transaction page, if any\n\ttx_inv_page* prior_tip = NULL;\n\tWIN prior_window(DB_PAGE_SPACE, -1);\n\tif (sequence)\n\t\tprior_tip = fetch_inventory_page(tdbb, &amp;prior_window, (sequence - 1), LCK_write);\n\n\t// Allocate and format new page\n\tWIN window(DB_PAGE_SPACE, -1);\n\ttx_inv_page* tip = (tx_inv_page*) DPM_allocate(tdbb, &amp;window);\n\ttip-&gt;tip_header.pag_type = pag_transactions;\n\n\tCCH_must_write(tdbb, &amp;window);\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\tconst ULONG pageNumber = window.win_page.getPageNum();\n\n\t// Release prior page\n\n\tif (sequence)\n\t{\n\t\tCCH_MARK_MUST_WRITE(tdbb, &amp;prior_window);\n\t\tprior_tip-&gt;tip_next = pageNumber;\n\t\tCCH_RELEASE(tdbb, &amp;prior_window);\n\t}\n\n\t// Link into internal data structures\n\n\tdbb-&gt;setKnownPage(pag_transactions, sequence, pageNumber);\n\n\t// Write into pages relation\n\n\tDPM_pages(tdbb, 0, pag_transactions, sequence, pageNumber);\n}\n\n\nint TRA_fetch_state(thread_db* tdbb, TraNumber number)\n{\n/**************************************\n *\n *\tT R A _ f e t c h _ s t a t e\n *\n **************************************\n *\n * Functional description\n *\tPhysically fetch the state of a given\n *\ttransaction on the transaction inventory\n *\tpage.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// locate and fetch the proper TIP page\n\n\tconst ULONG trans_per_tip = dbb-&gt;dbb_page_manager.transPerTIP;\n\tconst ULONG tip_seq = number / trans_per_tip;\n\tWIN window(DB_PAGE_SPACE, -1);\n\tconst tx_inv_page* tip = fetch_inventory_page(tdbb, &amp;window, tip_seq, LCK_read);\n\n\t// calculate the state of the desired transaction\n\n\tconst ULONG byte = TRANS_OFFSET(number % trans_per_tip);\n\tconst USHORT shift = TRANS_SHIFT(number);\n\tconst int state = (tip-&gt;tip_transactions[byte] &gt;&gt; shift) &amp; TRA_MASK;\n\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\treturn state;\n}\n\n\nvoid TRA_get_inventory(thread_db* tdbb, UCHAR* bit_vector, TraNumber base, TraNumber top)\n{\n/**************************************\n *\n *\tT R A _ g e t _ i n v e n t o r y\n *\n **************************************\n *\n * Functional description\n *\tGet an inventory of the state of all transactions\n *\tbetween the base and top (included) transactions passed.\n *\tTo get a consistent view of the transaction\n *\tinventory (in case we ever implement sub-transactions),\n *\tdo handoffs to read the pages in order.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// It does not make sence to call this function without bit_vector now\n\tfb_assert(bit_vector);\n\n\tconst ULONG trans_per_tip = dbb-&gt;dbb_page_manager.transPerTIP;\n\tULONG sequence = base / trans_per_tip;\n\tconst ULONG last = top / trans_per_tip;\n\n\t// fetch the first inventory page\n\n\tWIN window(DB_PAGE_SPACE, -1);\n\tconst tx_inv_page* tip = fetch_inventory_page(tdbb, &amp;window, sequence++, LCK_read);\n\n\t// move the first page into the bit vector\n\n\tUCHAR* p = bit_vector;\n\tULONG l = base % trans_per_tip;\n\tconst UCHAR* q = tip-&gt;tip_transactions + TRANS_OFFSET(l);\n\tl = TRANS_OFFSET(MIN((top + TRA_MASK + 1 - base), trans_per_tip - l));\n\tmemcpy(p, q, l);\n\tp += l;\n\n\t// move successive pages into the bit vector\n\n\twhile (sequence &lt;= last)\n\t{\n\t\tbase = (TraNumber) sequence * trans_per_tip;\n\n\t\t// release the read lock as we go, so that some one else can\n\t\t// commit without having to signal all other transactions.\n\n\t\ttip = (tx_inv_page*) CCH_HANDOFF(tdbb, &amp;window, inventory_page(tdbb, sequence++),\n\t\t\t\t\t\t\t  LCK_read, pag_transactions);\n\n\t\tl = TRANS_OFFSET(MIN((top + TRA_MASK + 1 - base), trans_per_tip));\n\t\tmemcpy(p, tip-&gt;tip_transactions, l);\n\t\tp += l;\n\t}\n\n\tCCH_RELEASE(tdbb, &amp;window);\n}\n\n\nint TRA_get_state(thread_db* tdbb, TraNumber number)\n{\n/**************************************\n *\n *\tT R A _ g e t _ s t a t e\n *\n **************************************\n *\n * Functional description\n *\tGet the state of a given transaction on the\n *\ttransaction inventory page.\n *\n **************************************/\n\n\treturn TPC_snapshot_state(tdbb, number);\n}\n\n\n#ifdef SUPERSERVER_V2\nvoid TRA_header_write(thread_db* tdbb, Database* dbb, TraNumber number)\n{\n/**************************************\n *\n *\tT R A _ h e a d e r _ w r i t e\n *\n **************************************\n *\n * Functional description\n *\tForce transaction ID on header to disk.\n *\tDo post fetch check of the transaction\n *\tID header write as a concurrent thread\n *\tmight have written the header page\n *\twhile blocked on the latch.\n *\n *\tThe idea is to amortize the cost of\n *\theader page I/O across multiple transactions.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\t// If transaction number is already on disk just return.\n\n\tif (!number || dbb-&gt;dbb_last_header_write &lt; number)\n\t{\n\t\tWIN window(HEADER_PAGE_NUMBER);\n\t\tconst auto header = (header_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_header);\n\n\t\tconst TraNumber next_transaction = header-&gt;hdr_next_transaction;\n\t\tconst TraNumber oldest_transaction = header-&gt;hdr_oldest_transaction;\n\t\tconst TraNumber oldest_active = header-&gt;hdr_oldest_active;\n\t\tconst TraNumber oldest_snapshot = header-&gt;hdr_oldest_snapshot;\n\n\t\tif (next_transaction)\n\t\t{\n\t\t\tif (oldest_active &gt; next_transaction)\n\t\t\t\tBUGCHECK(266);\t//next transaction older than oldest active\n\n\t\t\tif (oldest_transaction &gt; next_transaction)\n\t\t\t\tBUGCHECK(267);\t// next transaction older than oldest transaction\n\t\t}\n\n\t\t// The header page might have been written while waiting\n\t\t// for the latch; perform a post fetch check and optimize\n\t\t// this case by not writing the page again.\n\n\t\tif (!number || dbb-&gt;dbb_last_header_write &lt; number)\n\t\t{\n\t\t\tCCH_MARK_MUST_WRITE(tdbb, &amp;window);\n\n\t\t\tif (dbb-&gt;dbb_next_transaction &gt; next_transaction)\n\t\t\t\theader-&gt;hdr_next_transaction = dbb-&gt;dbb_next_transaction;\n\n\t\t\tif (dbb-&gt;dbb_oldest_transaction &gt; oldest_transaction)\n\t\t\t\theader-&gt;hdr_oldest_transaction = dbb-&gt;dbb_oldest_transaction;\n\n\t\t\tif (dbb-&gt;dbb_oldest_active &gt; oldest_active)\n\t\t\t\theader-&gt;hdr_oldest_active = dbb-&gt;dbb_oldest_active;\n\n\t\t\tif (dbb-&gt;dbb_oldest_snapshot &gt; oldest_snapshot)\n\t\t\t\theader-&gt;hdr_oldest_snapshot = dbb-&gt;dbb_oldest_snapshot;\n\t\t}\n\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t}\n}\n#endif\n\n\nvoid TRA_init(Jrd::Attachment* attachment)\n{\n/**************************************\n *\n *\tT R A _ i n i t\n *\n **************************************\n *\n * Functional description\n *\t&quot;Start&quot; the system transaction.\n *\n **************************************/\n\tDatabase* dbb = attachment-&gt;att_database;\n\tCHECK_DBB(dbb);\n\n\tMemoryPool* const pool = dbb-&gt;dbb_permanent;\n\tjrd_tra* const trans = FB_NEW_POOL(*pool) jrd_tra(pool, &amp;dbb-&gt;dbb_memory_stats, attachment, NULL);\n\tattachment-&gt;setSysTransaction(trans);\n\ttrans-&gt;tra_flags |= TRA_system | TRA_ignore_limbo;\n}\n\n\nvoid TRA_invalidate(thread_db* tdbb, ULONG mask)\n{\n/**************************************\n *\n *\tT R A _ i n v a l i d a t e\n *\n **************************************\n *\n * Functional description\n *\tInvalidate any active transactions that may have\n *\tmodified a page that couldn&#x27;t be written.\n *\n **************************************/\n\n\tDatabase* const database = tdbb-&gt;getDatabase();\n\n\tEngineCheckout cout(tdbb, FB_FUNCTION, EngineCheckout::UNNECESSARY);\n\n\tSyncLockGuard dbbSync(&amp;database-&gt;dbb_sync, SYNC_SHARED, &quot;TRA_invalidate&quot;);\n\n\tJrd::Attachment* attachment = database-&gt;dbb_attachments;\n\twhile (attachment)\n\t{\n\t\tJrd::Attachment::SyncGuard attGuard(attachment, FB_FUNCTION);\n\n\t\tfor (jrd_tra* transaction = attachment-&gt;att_transactions; transaction;\n\t\t\t transaction = transaction-&gt;tra_next)\n\t\t{\n\t\t\tconst ULONG transaction_mask = 1L &lt;&lt; (transaction-&gt;tra_number &amp; (BITS_PER_LONG - 1));\n\t\t\tif ((transaction_mask &amp; mask) &amp;&amp; (transaction-&gt;tra_flags &amp; TRA_write))\n\t\t\t\ttransaction-&gt;tra_flags |= TRA_invalidated;\n\t\t}\n\n\t\tattachment = attachment-&gt;att_next;\n\t}\n}\n\n\nvoid TRA_link_cursor(jrd_tra* transaction, DsqlCursor* cursor)\n{\n/**************************************\n *\n *\tT R A _ l i n k _ c u r s o r\n *\n **************************************\n *\n * Functional description\n *\tAdd cursor to the list of open cursors belonging to this transaction.\n *\n **************************************/\n\n\tfb_assert(!transaction-&gt;tra_open_cursors.exist(cursor));\n\ttransaction-&gt;tra_open_cursors.add(cursor);\n}\n\n\nvoid TRA_unlink_cursor(jrd_tra* transaction, DsqlCursor* cursor)\n{\n/**************************************\n *\n *\tT R A _ u n l i n k _ c u r s o r\n *\n **************************************\n *\n * Functional description\n *\tRemove cursor from the list of open cursors.\n *\n **************************************/\n\n\tFB_SIZE_T pos;\n\tif (transaction-&gt;tra_open_cursors.find(cursor, pos))\n\t\ttransaction-&gt;tra_open_cursors.remove(pos);\n}\n\n\nvoid TRA_update_counters(thread_db* tdbb, Database* dbb)\n{\n/**************************************\n*\n*\tT R A _ u p d a t e _ c o u n t e r s\n*\n**************************************\n*\n* Functional description\n*  Update header page using cached values of transactions counters\n*\n**************************************/\n\tSET_TDBB(tdbb);\n\n\tif (!dbb || dbb-&gt;dbb_flags &amp; DBB_read_only || dbb-&gt;dbb_flags &amp; DBB_new ||\n\t\tdbb-&gt;dbb_oldest_transaction == 0)\n\t{\n\t\treturn;\n\t}\n\n\tWIN window(HEADER_PAGE_NUMBER);\n\tconst auto header = (header_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_header);\n\n\tconst TraNumber next_transaction = header-&gt;hdr_next_transaction;\n\tconst TraNumber oldest_transaction = header-&gt;hdr_oldest_transaction;\n\tconst TraNumber oldest_active = header-&gt;hdr_oldest_active;\n\tconst TraNumber oldest_snapshot = header-&gt;hdr_oldest_snapshot;\n\n\tfb_assert(dbb-&gt;dbb_next_transaction &lt;= next_transaction);\n\n\tif (dbb-&gt;dbb_oldest_active &gt; oldest_active ||\n\t\tdbb-&gt;dbb_oldest_transaction &gt; oldest_transaction ||\n\t\tdbb-&gt;dbb_oldest_snapshot &gt; oldest_snapshot ||\n\t\tdbb-&gt;dbb_next_transaction &gt; next_transaction)\n\t{\n\t\tCCH_MARK_MUST_WRITE(tdbb, &amp;window);\n\n\t\tif (dbb-&gt;dbb_next_transaction &gt; next_transaction)\n\t\t\theader-&gt;hdr_next_transaction = dbb-&gt;dbb_next_transaction;\n\n\t\tif (dbb-&gt;dbb_oldest_transaction &gt; oldest_transaction)\n\t\t\theader-&gt;hdr_oldest_transaction = dbb-&gt;dbb_oldest_transaction;\n\n\t\tif (dbb-&gt;dbb_oldest_active &gt; oldest_active)\n\t\t\theader-&gt;hdr_oldest_active = dbb-&gt;dbb_oldest_active;\n\n\t\tif (dbb-&gt;dbb_oldest_snapshot &gt; oldest_snapshot)\n\t\t\theader-&gt;hdr_oldest_snapshot = dbb-&gt;dbb_oldest_snapshot;\n\t}\n\n\tCCH_RELEASE(tdbb, &amp;window);\n}\n\n\nvoid TRA_post_resources(thread_db* tdbb, jrd_tra* transaction, ResourceList&amp; resources)\n{\n/**************************************\n *\n *\tT R A _ p o s t _ r e s o u r c e s\n *\n **************************************\n *\n * Functional description\n *\tPost interest in relation/procedure/collation existence to transaction.\n *\tThis guarantees that the relation/procedure/collation won&#x27;t be dropped\n *\tout from under the transaction.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tJrd::ContextPoolHolder context(tdbb, transaction-&gt;tra_pool);\n\n\tfor (Resource* rsc = resources.begin(); rsc &lt; resources.end(); rsc++)\n\t{\n\t\tif (rsc-&gt;rsc_type == Resource::rsc_relation ||\n\t\t\trsc-&gt;rsc_type == Resource::rsc_procedure ||\n\t\t\trsc-&gt;rsc_type == Resource::rsc_function ||\n\t\t\trsc-&gt;rsc_type == Resource::rsc_collation)\n\t\t{\n\t\t\tFB_SIZE_T i;\n\t\t\tif (!transaction-&gt;tra_resources.find(*rsc, i))\n\t\t\t{\n\t\t\t\ttransaction-&gt;tra_resources.insert(i, *rsc);\n\t\t\t\tswitch (rsc-&gt;rsc_type)\n\t\t\t\t{\n\t\t\t\tcase Resource::rsc_relation:\n\t\t\t\t\tMET_post_existence(tdbb, rsc-&gt;rsc_rel);\n\t\t\t\t\tif (rsc-&gt;rsc_rel-&gt;rel_file) {\n\t\t\t\t\t\tEXT_tra_attach(rsc-&gt;rsc_rel-&gt;rel_file, transaction);\n\t\t\t\t\t}\n\t\t\t\t\tbreak;\n\t\t\t\tcase Resource::rsc_procedure:\n\t\t\t\tcase Resource::rsc_function:\n\t\t\t\t\trsc-&gt;rsc_routine-&gt;addRef();\n#ifdef DEBUG_PROCS\n\t\t\t\t\t{\n\t\t\t\t\t\tchar buffer[BUFFER_MEDIUM];\n\t\t\t\t\t\tsnprintf(buffer, sizeof(buffer),\n\t\t\t\t\t\t\t\t&quot;Called from TRA_post_resources():\\n\\t Incrementing use count of %s\\n&quot;,\n\t\t\t\t\t\t\t\trsc-&gt;rsc_routine-&gt;prc_name-&gt;c_str());\n\t\t\t\t\t\tJRD_print_procedure_info(tdbb, buffer);\n\t\t\t\t\t}\n#endif\n\t\t\t\t\tbreak;\n\t\t\t\tcase Resource::rsc_collation:\n\t\t\t\t\trsc-&gt;rsc_coll-&gt;incUseCount(tdbb);\n\t\t\t\t\tbreak;\n\t\t\t\tdefault:   // shut up compiler warning\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n}\n\n\nbool TRA_is_active(thread_db* tdbb, TraNumber number)\n{\n/**************************************\n *\n *\tT R A _ i s _ a c t i v e\n *\n **************************************\n *\n * Functional description\n *\tReturns whether a given transaction\n *  owned by some other guy active or not.\n *\n * If function return false - you can trust this value and be sure that transaction\n * is not active. However if function returns true - it might be inactive already,\n * but two engine threads are checking for its status at once. Callers need to\n * behave correctly when facing this behavior.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tLock temp_lock(tdbb, sizeof(TraNumber), LCK_tra);\n\ttemp_lock.setKey(number);\n\n\t// If we can&#x27;t get a lock on the transaction, it must be active\n\n\tif (!LCK_lock(tdbb, &amp;temp_lock, LCK_read, LCK_NO_WAIT))\n\t{\n\t\tfb_utils::init_status(tdbb-&gt;tdbb_status_vector);\n\t\treturn true;\n\t}\n\n\tLCK_release(tdbb, &amp;temp_lock);\n\treturn false;\n}\n\n\nvoid TRA_prepare(thread_db* tdbb, jrd_tra* transaction, USHORT length, const UCHAR* msg)\n{\n/**************************************\n *\n *\tT R A _ p r e p a r e\n *\n **************************************\n *\n * Functional description\n *\tPut a transaction into limbo.\n *\n **************************************/\n\n\tSET_TDBB(tdbb);\n\n\tif (transaction-&gt;tra_flags &amp; TRA_prepared)\n\t\treturn;\n\n\tif (transaction-&gt;tra_flags &amp; TRA_invalidated)\n\t\tERR_post(Arg::Gds(isc_trans_invalid));\n\n\t/* If there&#x27;s a transaction description message, log it to RDB$TRANSACTION\n\tWe should only log a message to RDB$TRANSACTION if there is a message\n\tto log (if the length = 0, we won&#x27;t log the transaction in RDB$TRANSACTION)\n\tThese messages are used to recover transactions in limbo.  The message indicates\n\tthe action that is to be performed (hence, if nothing is getting logged, don&#x27;t\n\tbother).\n\t*/\n\n\t/* Make sure that if msg is NULL there is no length.  The two\n\tshould go hand in hand\n\t          msg == NULL || *msg == NULL\n\t*/\n\tfb_assert(!(!msg &amp;&amp; length) || (msg &amp;&amp; (!*msg &amp;&amp; length)));\n\n\tif (msg &amp;&amp; length)\n\t{\n\t\tMET_prepare(tdbb, transaction, length, msg);\n\t\ttransaction-&gt;tra_flags |= TRA_prepare2;\n\t}\n\n\t// Prepare associated transaction in security DB\n\n\tSecDbContext* secContext = transaction-&gt;getSecDbContext();\n\tif (secContext &amp;&amp; secContext-&gt;tra)\n\t{\n\t\tLocalStatus ls;\n\t\tCheckStatusWrapper st(&amp;ls);\n\t\tsecContext-&gt;tra-&gt;prepare(&amp;st, length, msg);\n\t\tif (st.getState() &amp; IStatus::STATE_ERRORS)\n\t\t\tstatus_exception::raise(&amp;st);\n\t}\n\n\t// Perform any meta data work deferred\n\n\tDFW_perform_work(tdbb, transaction);\n\n\t// Flush pages if transaction logically modified data\n\tjrd_tra* sysTran = tdbb-&gt;getAttachment()-&gt;getSysTransaction();\n\n\tif (transaction-&gt;tra_flags &amp; TRA_write)\n\t\ttransaction_flush(tdbb, FLUSH_TRAN, transaction-&gt;tra_number);\n\telse if ((transaction-&gt;tra_flags &amp; TRA_prepare2) || (sysTran-&gt;tra_flags &amp; TRA_write))\n\t{\n\t\t// If the transaction only read data but is a member of a\n\t\t// multi-database transaction with a transaction description\n\t\t// message then flush RDB$TRANSACTIONS.\n\n\t\ttransaction_flush(tdbb, FLUSH_SYSTEM, 0);\n\t}\n\n\t// Set the state on the inventory page to be limbo\n\n\ttransaction-&gt;tra_flags |= TRA_prepared;\n\n\tif (!(tdbb-&gt;tdbb_flags &amp; TDBB_replicator))\n\t\tTRA_set_state(tdbb, transaction, transaction-&gt;tra_number, tra_limbo);\n}\n\n\njrd_tra* TRA_reconnect(thread_db* tdbb, const UCHAR* id, USHORT length)\n{\n/**************************************\n *\n *\tT R A _ r e c o n n e c t\n *\n **************************************\n *\n * Functional description\n *\tReconnect to a transaction in limbo.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* const dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\tJrd::Attachment* const attachment = tdbb-&gt;getAttachment();\n\n\t// Cannot work on limbo transactions for ReadOnly database\n\tif (dbb-&gt;readOnly())\n\t\tERR_post(Arg::Gds(isc_read_only_database));\n\n\tcon
