      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

          var event = currentEvents[nextBugEvent];

      }

        event.line - 1, element));
    });
  },

  jumpTo : function (line, column) {
    var that = this;

        height : that._editor.clientHeight

        bottom : selPosPixel.top + editorSize.height - 150,
        left   : selPosPixel.left < editorSize.width - 100

               : selPosPixel.left - 50,
        right  : selPosPixel.left < editorSize.width - 100
               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }
}

tdbb-&gt;getType() == Firebird::ThreadData::tddDBB) &amp;&amp;\n\t\t(!tdbb-&gt;getDatabase() || tdbb-&gt;getDatabase()-&gt;checkHandle()));\n}\n\ninline void CHECK_DBB(const Jrd::Database* dbb)\n{\n\tfb_assert(dbb &amp;&amp; dbb-&gt;checkHandle());\n}\n\n#else // PROD_BUILD\n\ninline Jrd::thread_db* JRD_get_thread_data()\n{\n\treturn (Jrd::thread_db*) Firebird::ThreadData::getSpecific();\n}\n\ninline void CHECK_DBB(const Jrd::Database*)\n{\n}\n\ninline void CHECK_TDBB(const Jrd::thread_db*)\n{\n}\n\n#endif\n\ninline Jrd::Database* GET_DBB()\n{\n\treturn JRD_get_thread_data()-&gt;getDatabase();\n}\n\n/*-------------------------------------------------------------------------*\n * macros used to set thread_db and Database pointers when there are not set already *\n *-------------------------------------------------------------------------*/\ninline void SET_TDBB(Jrd::thread_db*&amp; tdbb)\n{\n\tif (tdbb == NULL) {\n\t\ttdbb = JRD_get_thread_data();\n\t}\n\tCHECK_TDBB(tdbb);\n}\n\ninline void SET_DBB(Jrd::Database*&amp; dbb)\n{\n\tif (dbb == NULL) {\n\t\tdbb = GET_DBB();\n\t}\n\tCHECK_DBB(dbb);\n}\n\n\n// global variables for engine\n\nnamespace Jrd {\n\ttypedef Firebird::SubsystemContextPoolHolder &lt;Jrd::thread_db, MemoryPool&gt; ContextPoolHolder;\n\n\tclass DatabaseContextHolder : public Jrd::ContextPoolHolder\n\t{\n\tpublic:\n\t\texplicit DatabaseContextHolder(thread_db* tdbb)\n\t\t\t: Jrd::ContextPoolHolder(tdbb, tdbb-&gt;getDatabase()-&gt;dbb_permanent)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tDatabaseContextHolder(const DatabaseContextHolder&amp;) = delete;\n\t\tDatabaseContextHolder&amp; operator=(const DatabaseContextHolder&amp;) = delete;\n\t};\n\n\tclass BackgroundContextHolder : public ThreadContextHolder, public DatabaseContextHolder,\n\t\tpublic Jrd::Attachment::SyncGuard\n\t{\n\tpublic:\n\t\tBackgroundContextHolder(Database* dbb, Jrd::Attachment* att, FbStatusVector* status, const char* f)\n\t\t\t: ThreadContextHolder(dbb, att, status),\n\t\t\t  DatabaseContextHolder(operator thread_db*()),\n\t\t\t  Jrd::Attachment::SyncGuard(att, f)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tBackgroundContextHolder(const BackgroundContextHolder&amp;) = delete;\n\t\tBackgroundContextHolder&amp; operator=(const BackgroundContextHolder&amp;) = delete;\n\t};\n\n\tclass AttachmentHolder\n\t{\n\tpublic:\n\t\tstatic constexpr unsigned ATT_LOCK_ASYNC\t\t= 1;\n\t\tstatic constexpr unsigned ATT_DONT_LOCK\t\t\t= 2;\n\t\tstatic constexpr unsigned ATT_NO_SHUTDOWN_CHECK\t= 4;\n\t\tstatic constexpr unsigned ATT_NON_BLOCKING\t\t= 8;\n\n\t\tAttachmentHolder(thread_db* tdbb, StableAttachmentPart* sa, unsigned lockFlags, const char* from);\n\t\t~AttachmentHolder();\n\n\t\t// copying is prohibited\n\t\tAttachmentHolder(const AttachmentHolder&amp;) = delete;\n\t\tAttachmentHolder&amp; operator =(const AttachmentHolder&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::RefPtr&lt;StableAttachmentPart&gt; sAtt;\n\t\tbool async;\t\t\t// async mutex should be locked instead normal\n\t\tbool nolock; \t\t// if locked manually, no need to take lock recursively\n\t\tbool blocking;\t\t// holder instance is blocking other instances\n\t};\n\n\tclass EngineContextHolder final : public ThreadContextHolder, private AttachmentHolder, private DatabaseContextHolder\n\t{\n\tpublic:\n\t\ttemplate &lt;typename I&gt;\n\t\tEngineContextHolder(Firebird::CheckStatusWrapper* status, I* interfacePtr, const char* from,\n\t\t\t\t\t\t\tunsigned lockFlags = 0);\n\t};\n\n\tclass AstLockHolder : public Firebird::ReadLockGuard\n\t{\n\tpublic:\n\t\tAstLockHolder(Database* dbb, const char* f)\n\t\t\t: Firebird::ReadLockGuard(dbb-&gt;dbb_ast_lock, f)\n\t\t{\n\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_no_ast)\n\t\t\t{\n\t\t\t\t// usually to be swallowed by the AST, but it allows to skip its execution\n\t\t\t\tFirebird::status_exception::raise(Firebird::Arg::Gds(isc_unavailable));\n\t\t\t}\n\t\t}\n\t};\n\n\tclass AsyncContextHolder : public AstLockHolder, public Jrd::Attachment::SyncGuard,\n\t\tpublic ThreadContextHolder, public DatabaseContextHolder\n\t{\n\tpublic:\n\t\tAsyncContextHolder(Database* dbb, const char* f, Lock* lck = NULL)\n\t\t\t: AstLockHolder(dbb, f),\n\t\t\t  Jrd::Attachment::SyncGuard(lck ?\n\t\t\t\tlck-&gt;getLockStable() : Firebird::RefPtr&lt;StableAttachmentPart&gt;(), f, true),\n\t\t\t  ThreadContextHolder(dbb, lck ? lck-&gt;getLockAttachment() : NULL),\n\t\t\t  DatabaseContextHolder(operator thread_db*())\n\t\t{\n\t\t\tif (lck)\n\t\t\t{\n\t\t\t\t// The lock could be released while we were waiting on the attachment mutex.\n\t\t\t\t// This may cause a segfault due to lck_attachment == NULL stored in tdbb.\n\n\t\t\t\tif (!lck-&gt;lck_id)\n\t\t\t\t{\n\t\t\t\t\t// usually to be swallowed by the AST, but it allows to skip its execution\n\t\t\t\t\tFirebird::status_exception::raise(Firebird::Arg::Gds(isc_unavailable));\n\t\t\t\t}\n\n\t\t\t\tfb_assert((operator thread_db*())-&gt;getAttachment());\n\t\t\t}\n\n\t\t\t(*this)-&gt;tdbb_flags |= TDBB_async;\n\t\t}\n\n\t\t// copying is prohibited\n\t\tAsyncContextHolder(const AsyncContextHolder&amp;) = delete;\n\t\tAsyncContextHolder&amp; operator=(const AsyncContextHolder&amp;) = delete;\n\t};\n\n\tclass EngineCheckout\n\t{\n\tpublic:\n\t\tenum Type\n\t\t{\n\t\t\tREQUIRED,\n\t\t\tUNNECESSARY,\n\t\t\tAVOID\n\t\t};\n\n\t\tEngineCheckout(thread_db* tdbb, const char* from, Type type = REQUIRED)\n\t\t\t: m_tdbb(tdbb), m_from(from)\n\t\t{\n\t\t\tif (type != AVOID)\n\t\t\t{\n\t\t\t\tAttachment* const att = tdbb ? tdbb-&gt;getAttachment() : NULL;\n\n\t\t\t\tif (att)\n\t\t\t\t\tm_ref = att-&gt;getStable();\n\n\t\t\t\tfb_assert(type == UNNECESSARY || m_ref.hasData());\n\n\t\t\t\tif (m_ref.hasData())\n\t\t\t\t\tm_ref-&gt;getSync()-&gt;leave();\n\t\t\t}\n\t\t}\n\n\t\tEngineCheckout(Attachment* att, const char* from, Type type = REQUIRED)\n\t\t\t: m_tdbb(nullptr), m_from(from)\n\t\t{\n\t\t\tif (type != AVOID)\n\t\t\t{\n\t\t\t\tfb_assert(type == UNNECESSARY || att);\n\n\t\t\t\tif (att &amp;&amp; att-&gt;att_use_count)\n\t\t\t\t{\n\t\t\t\t\tm_ref = att-&gt;getStable();\n\t\t\t\t\tm_ref-&gt;getSync()-&gt;leave();\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\t~EngineCheckout()\n\t\t{\n\t\t\tif (m_ref.hasData())\n\t\t\t\tm_ref-&gt;getSync()-&gt;enter(m_from);\n\n\t\t\t// If we were signalled to cancel/shutdown, react as soon as possible.\n\t\t\t// We cannot throw immediately, but we can reschedule ourselves.\n\n\t\t\tif (m_tdbb &amp;&amp; m_tdbb-&gt;tdbb_quantum &gt; 0 &amp;&amp; m_tdbb-&gt;getCancelState() != FB_SUCCESS)\n\t\t\t\tm_tdbb-&gt;tdbb_quantum = 0;\n\t\t}\n\n\t\t// copying is prohibited\n\t\tEngineCheckout(const EngineCheckout&amp;) = delete;\n\t\tEngineCheckout&amp; operator=(const EngineCheckout&amp;) = delete;\n\n\tprivate:\n\t\tthread_db* const m_tdbb;\n\t\tFirebird::RefPtr&lt;StableAttachmentPart&gt; m_ref;\n\t\tconst char* m_from;\n\t};\n\n\tclass CheckoutLockGuard\n\t{\n\tpublic:\n\t\tCheckoutLockGuard(thread_db* tdbb, Firebird::Mutex&amp; mutex,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_mutex(mutex)\n\t\t{\n\t\t\tif (!m_mutex.tryEnter(from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_mutex.enter(from);\n\t\t\t}\n\t\t}\n\n\t\t~CheckoutLockGuard()\n\t\t{\n\t\t\tm_mutex.leave();\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutLockGuard(const CheckoutLockGuard&amp;) = delete;\n\t\tCheckoutLockGuard&amp; operator=(const CheckoutLockGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Mutex&amp; m_mutex;\n\t};\n\n\tclass CheckoutSyncGuard\n\t{\n\tpublic:\n\t\tCheckoutSyncGuard(thread_db* tdbb, Firebird::SyncObject&amp; sync,\n\t\t\t\t\t\t  Firebird::SyncType type,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_sync(&amp;sync, from)\n\t\t{\n\t\t\tif (!m_sync.lockConditional(type, from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_sync.lock(type);\n\t\t\t}\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutSyncGuard(const CheckoutSyncGuard&amp;) = delete;\n\t\tCheckoutSyncGuard&amp; operator=(const CheckoutSyncGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Sync m_sync;\n\t};\n}\n\n#endif // JRD_JRD_H\n"}, "/build/src/jrd/blb.h": {"id": "/build/src/jrd/blb.h", "filePath": "src/jrd/blb.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tblb.h\n *\tDESCRIPTION:\tBlob handling definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;DecOSF&quot; port\n *\n */\n\n#ifndef JRD_BLB_H\n#define JRD_BLB_H\n\n#include &quot;../include/fb_blk.h&quot;\n\n#include &quot;../jrd/RecordNumber.h&quot;\n#include &quot;../jrd/EngineInterface.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/File.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n#include &quot;../common/dsc.h&quot;\n\nnamespace Ods\n{\n\tstruct blob_page;\n\tstruct blh;\n}\n\nnamespace Jrd\n{\n\nclass Attachment;\nclass BlobControl;\nclass jrd_rel;\nclass Request;\nclass jrd_tra;\nclass vcl;\nclass thread_db;\nstruct win;\nclass Record;\nclass ArrayField;\nstruct impure_value;\n\n\n// Your basic blob block.\n\nclass blb : public pool_alloc&lt;type_blb&gt;\n{\npublic:\n\tblb(MemoryPool&amp; pool, USHORT page_size)\n\t\t: blb_buffer(pool, page_size / sizeof(SLONG)),\n\t\t  blb_has_buffer(true)\n\t{\n\t}\n\n\tjrd_rel* blb_relation = nullptr; // Relation, if known\n\tJBlob* blb_interface = nullptr;\n\n\tFB_UINT64 blb_length = 0;\t// Blob&#x27;s total length (in bytes)\n\tUSHORT blb_flags = 0;\t\t// Interesting stuff (see below)\n\n\tSSHORT blb_sub_type = isc_blob_untyped; // Blob&#x27;s declared sub-type\n\tUCHAR blb_charset = 0;\t\t// Blob&#x27;s charset\n\n\t// inline functions\n\tbool hasBuffer() const;\n\tUCHAR* getBuffer();\n\tvoid freeBuffer();\n\tbool isSegmented() const;\n\tAttachment* getAttachment();\n\tjrd_tra* getTransaction();\n\tUSHORT getLevel() const;\n\tULONG getMaxSequence() const;\n\tULONG getTempId() const;\n\tULONG getSegmentCount() const;\n\tUSHORT getFragmentSize() const;\n\tUSHORT getMaxSegment() const;\n\t// end inline\n\n\tvoid\tBLB_cancel(thread_db* tdbb);\n\tvoid\tBLB_cancel();\n\tvoid\tBLB_check_well_formed(thread_db*, const dsc* desc);\n\tbool\tBLB_close(thread_db*);\n\tstatic blb*\tcreate(thread_db*, jrd_tra*, bid*);\n\tstatic blb*\tcreate2(thread_db*, jrd_tra*, bid*, USHORT, const UCHAR*, bool = false);\n\tstatic Jrd::blb* get_array(Jrd::thread_db*, Jrd::jrd_tra*, const Jrd::bid*, Ods::InternalArrayDesc*);\n\tULONG\tBLB_get_data(thread_db*, UCHAR*, SLONG, bool = true);\n\tUSHORT\tBLB_get_segment(thread_db*, void*, USHORT);\n\tstatic SLONG get_slice(Jrd::thread_db*, Jrd::jrd_tra*, const Jrd::bid*, const UCHAR*, USHORT,\n\t\t\t\t\tconst UCHAR*, SLONG, UCHAR*);\n\tSLONG\tBLB_lseek(USHORT, SLONG);\n\tstatic void\tmove(thread_db* tdbb, dsc* from_desc, dsc* to_desc, jrd_rel* relation = nullptr, Record* record = nullptr, USHORT fieldId = 0, bool bulk = false);\n\tstatic blb* open(thread_db*, jrd_tra*, const bid*);\n\tstatic blb* open2(thread_db*, jrd_tra*, const bid*, USHORT, const UCHAR*, bool = false);\n\tvoid\tBLB_put_data(thread_db*, const UCHAR*, SLONG);\n\tvoid\tBLB_put_segment(thread_db*, const void*, USHORT);\n\tstatic void\tput_slice(thread_db*, jrd_tra*, bid*, const UCHAR*, USHORT, const UCHAR*, SLONG, UCHAR*);\n\tstatic void release_array(Jrd::ArrayField*);\n\tstatic void scalar(Jrd::thread_db*, Jrd::jrd_tra*, const Jrd::bid*, USHORT, const SLONG*, Jrd::impure_value*);\n\n\tstatic void delete_blob_id(thread_db*, const bid*, ULONG, jrd_rel*);\n\tvoid fromPageHeader(const Ods::blh* header);\n\tvoid toPageHeader(Ods::blh* header) const;\n\tvoid getFromPage(USHORT length, const UCHAR* data);\n\tvoid storeToPage(USHORT* length, Firebird::Array&lt;UCHAR&gt;&amp; buffer, const UCHAR** data, void* stack);\n\n\tstatic bid copy(thread_db* tdbb, const bid* source)\n\t{\n\t\tbid destination;\n\t\tcopy_blob(tdbb, source, &amp;destination, 0, nullptr, 0);\n\t\treturn destination;\n\t}\n\nprivate:\n\tstatic blb* allocate_blob(thread_db*, jrd_tra*);\n\tstatic blb* copy_blob(thread_db* tdbb, const bid* source, bid* destination,\n\t\t\t\t\tUSHORT bpb_length, const UCHAR* bpb, USHORT destPageSpaceID);\n\tvoid delete_blob(thread_db*, ULONG);\n\tOds::blob_page* get_next_page(thread_db*, win*);\n\tvoid insert_page(thread_db*);\n\tvoid destroy(const bool purge_flag);\n\n\tFB_SIZE_T blb_temp_size = 0;\t// size stored in transaction temp space\n\toffset_t blb_temp_offset = 0;\t// offset in transaction temp space\n\tAttachment* blb_attachment = nullptr; // database attachment\n\tjrd_tra* blb_transaction = nullptr; // Parent transaction block\n\tUCHAR* blb_segment = nullptr;\t// Next segment to be addressed\n\tBlobControl* blb_filter = nullptr; // Blob filter control block, if any\n\tbid blb_blob_id{};\t\t\t\t// Id of materialized blob\n\tvcl* blb_pages = nullptr;\t\t// Vector of pages\n\n\tFirebird::Array&lt;SLONG&gt; blb_buffer; // buffer used in opened blobs - must be longword aligned\n\n\tULONG blb_temp_id = 0;\t\t\t// ID of newly created blob in transaction\n\tULONG blb_sequence = 0;\t\t\t// Blob page sequence\n\tULONG blb_lead_page = 0;\t\t// First page number\n\tFB_UINT64 blb_seek = 0;\t\t\t// Seek location\n\tULONG blb_max_sequence = 0;\t\t// Number of data pages\n\tULONG blb_count = 0;\t\t\t// Number of segments\n\n\tUSHORT blb_pointers = 0;\t\t// Max pointer on a page\n\tUSHORT blb_clump_size = 0;\t\t// Size of data clump\n\tUSHORT blb_space_remaining = 0;\t// Data space left\n\tUSHORT blb_max_pages = 0;\t\t// Max pages in vector\n\tUSHORT blb_level = 0;\t\t\t// Storage type\n\tUSHORT blb_pg_space_id = 0;\t\t// page space\n\tUSHORT blb_fragment_size = 0;\t// Residual fragment size\n\tUSHORT blb_max_segment = 0;\t\t// Longest segment\n#ifdef CHECK_BLOB_FIELD_ACCESS_FOR_SELECT\n\tUSHORT blb_fld_id = 0;\t\t\t// Field ID\n#endif\n\tbool blb_has_buffer;\n};\n\ninline constexpr int BLB_temporary\t\t= 1;\t\t// Newly created blob\ninline constexpr int BLB_eof\t\t\t= 2;\t\t// This blob is exhausted\ninline constexpr int BLB_stream\t\t\t= 4;\t\t// Stream style blob\ninline constexpr int BLB_closed\t\t\t= 8;\t\t// Temporary blob has been closed\ninline constexpr int BLB_damaged\t\t= 16;\t\t// Blob is busted\ninline constexpr int BLB_seek\t\t\t= 32;\t\t// Seek is pending\ninline constexpr int BLB_large_scan\t\t= 64;\t\t// Blob is larger than page buffer cache\ninline constexpr int BLB_close_on_read\t= 128;\t\t// Temporary blob is not closed until read\ninline constexpr int BLB_bulk\t\t\t= 256;\t\t// Blob created by bulk insert operation\ninline constexpr int BLB_user\t\t\t= 512;\t\t// User-defined blob\n\n/* Blob levels are:\n\n\t0\tsmall blob -- blob &quot;record&quot; is actual data\n\t1\tmedium blob -- blob &quot;record&quot; is pointer to pages\n\t2\tlarge blob -- blob &quot;record&quot; is pointer to pages of pointers\n*/\n\n\ninline bool blb::hasBuffer() const\n{\n\treturn blb_has_buffer;\n}\n\ninline UCHAR* blb::getBuffer()\n{\n\tfb_assert(blb_has_buffer);\n\treturn (UCHAR*) blb_buffer.getBuffer(blb_buffer.getCapacity());\n}\n\ninline void blb::freeBuffer()\n{\n\tfb_assert(blb_has_buffer);\n\tblb_buffer.free();\n\tblb_has_buffer = false;\n}\n\ninline bool blb::isSegmented() const\n{\n\treturn !(blb_flags &amp; BLB_stream);\n}\n\ninline Attachment* blb::getAttachment()\n{\n\treturn blb_attachment;\n}\n\ninline jrd_tra* blb::getTransaction()\n{\n\treturn blb_transaction;\n}\n\ninline USHORT blb::getLevel() const\n{\n\treturn blb_level;\n}\n\ninline ULONG blb::getMaxSequence() const\n{\n\treturn blb_max_sequence;\n}\n\ninline ULONG blb::getTempId() const\n{\n\treturn blb_temp_id;\n}\n\ninline ULONG blb::getSegmentCount() const\n{\n\treturn blb_count;\n}\n\ninline USHORT blb::getFragmentSize() const\n{\n\treturn blb_fragment_size;\n}\n\ninline USHORT blb::getMaxSegment() const\n{\n\treturn blb_max_segment;\n}\n\n\n} //namespace Jrd\n\n\nnamespace Firebird {\n\ntemplate &lt;&gt;\ninline void SimpleDelete&lt;Jrd::blb&gt;::clear(Jrd::blb* b)\n{\n\tif (b)\n\t\tb-&gt;BLB_cancel();\n}\n\n} //namespace Firebird\n\n\n#endif // JRD_BLB_H\n"}, "/build/src/jrd/blb.cpp": {"id": "/build/src/jrd/blb.cpp", "filePath": "src/jrd/blb.cpp", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tblb.cpp\n *\tDESCRIPTION:\tBlob handler\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2001.6.23 Claudio Valderrama: move_from_string to accept assignments\n * from string to blob field. First use was to allow inserting a literal string\n * in a blob field without requiring an UDF.\n *\n * 2001.07.06 Sean Leyne - Code Cleanup, removed &quot;#ifdef READONLY_DATABASE&quot;\n *                         conditionals, as the engine now fully supports\n *                         readonly databases.\n *\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;MPEXL&quot; port\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;DecOSF&quot; port\n *\n * Adriano dos Santos Fernandes\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;memory_routines.h&quot;\n#include &lt;string.h&gt;\n\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/val.h&quot;\n#include &quot;../jrd/exe.h&quot;\n#include &quot;../jrd/req.h&quot;\n#include &quot;../jrd/blb.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/lls.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;../jrd/blob_filter.h&quot;\n#include &quot;../common/sdl.h&quot;\n#include &quot;../jrd/intl.h&quot;\n#include &quot;../jrd/cch.h&quot;\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../jrd/blb_proto.h&quot;\n#include &quot;../jrd/blf_proto.h&quot;\n#include &quot;../jrd/cch_proto.h&quot;\n#include &quot;../jrd/dpm_proto.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/evl_proto.h&quot;\n#include &quot;../jrd/exe_proto.h&quot;\n#include &quot;../jrd/filte_proto.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../jrd/intl_proto.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/met_proto.h&quot;\n#include &quot;../jrd/mov_proto.h&quot;\n#include &quot;../jrd/pag_proto.h&quot;\n#include &quot;../jrd/scl_proto.h&quot;\n#include &quot;../common/sdl_proto.h&quot;\n#include &quot;../common/dsc_proto.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/VaryStr.h&quot;\n\nusing namespace Jrd;\nusing namespace Firebird;\n\ntypedef Ods::blob_page blob_page;\n\nstatic ArrayField* alloc_array(jrd_tra*, Ods::InternalArrayDesc*);\n//static blb* allocate_blob(thread_db*, jrd_tra*);\nstatic ISC_STATUS blob_filter(USHORT, BlobControl*);\n//static blb* copy_blob(thread_db*, const bid*, bid*, USHORT, const UCHAR*, USHORT);\n//static void delete_blob(thread_db*, blb*, ULONG);\n//static void delete_blob_id(thread_db*, const bid*, ULONG, jrd_rel*);\nstatic ArrayField* find_array(jrd_tra*, const bid*);\nstatic BlobFilter* find_filter(thread_db*, SSHORT, SSHORT);\n//static blob_page* get_next_page(thread_db*, blb*, WIN *);\n//static void insert_page(thread_db*, blb*);\nstatic void move_from_string(Jrd::thread_db*, const dsc*, dsc*, jrd_rel*, Record*, USHORT);\nstatic void move_to_string(Jrd::thread_db*, dsc*, dsc*);\nstatic void slice_callback(array_slice*, ULONG, dsc*);\nstatic blb* store_array(thread_db*, jrd_tra*, bid*);\n\n\nvoid blb::BLB_cancel(thread_db* tdbb)\n{\n/**************************************\n *\n *      b l b : : c a n c e l\n *\n **************************************\n *\n * Functional description\n *      Abort a blob operation.  If the blob is a partially created\n *      temporary blob, free up any allocated pages.  In any case,\n *      get rid of the blob block.\n *\n **************************************/\n\n\tSET_TDBB(tdbb);\n\n\t// Release filter control resources\n\n\tif (blb_flags &amp; BLB_temporary)\n\t{\n\t\tif (!(blb_flags &amp; BLB_closed))\n\t\t\tblb_transaction-&gt;tra_temp_blobs_count--;\n\n\t\tdelete_blob(tdbb, 0);\n\t}\n\n\tdestroy(true);\n}\n\n\nvoid blb::BLB_check_well_formed(Jrd::thread_db* tdbb, const dsc* desc)\n{\n/**************************************\n *\n *      b l b : : c h e c k _ w e l l _ f o r m e d\n *\n **************************************\n *\n * Functional description\n *      Check if a text BLOB is well formed.\n *\n **************************************/\n\n\tSET_TDBB(tdbb);\n\n\t// Need to verify this to work in database creation, as the charsets didn&#x27;t exist yet.\n\tif (desc-&gt;getCharSet() == CS_NONE || desc-&gt;getCharSet() == CS_BINARY)\n\t\treturn;\n\n\tCharSet* charSet = INTL_charset_lookup(tdbb, desc-&gt;getCharSet());\n\n\tif (!charSet-&gt;shouldCheckWellFormedness())\n\t\treturn;\n\n\tHalfStaticArray&lt;UCHAR, BUFFER_MEDIUM&gt; buffer;\n\tULONG pos = 0;\n\n\twhile (!(blb_flags &amp; BLB_eof))\n\t{\n\t\tconst ULONG len = BLB_get_data(tdbb,\n\t\t\tbuffer.getBuffer(buffer.getCapacity()) + pos, buffer.getCapacity() - pos, false);\n\t\tbuffer.resize(pos + len);\n\n\t\tif (charSet-&gt;wellFormed(pos + len, buffer.begin(), &amp;pos))\n\t\t\tpos = 0;\n\t\telse\n\t\t{\n\t\t\tif (pos == 0)\n\t\t\t\tstatus_exception::raise(Arg::Gds(isc_malformed_string));\n\t\t\telse\n\t\t\t{\n\t\t\t\tbuffer.removeCount(0, pos);\n\t\t\t\tpos = buffer.getCount();\n\t\t\t}\n\t\t}\n\t}\n\n\tif (pos != 0)\n\t\tstatus_exception::raise(Arg::Gds(isc_malformed_string));\n}\n\n\nbool blb::BLB_close(thread_db* tdbb)\n{\n/**************************************\n *\n *      b l b : : c l o s e\n *\n **************************************\n *\n * Functional description\n *      Close a blob.  If the blob is open for retrieval, release the\n *      blob block.  If it&#x27;s a temporary blob, flush out the last page\n *      (if necessary) in preparation for materialization.\n *      Return true if the blob was physically destroyed.\n *\n **************************************/\n\n\tSET_TDBB(tdbb);\n\n\tconst bool alreadyClosed = (blb_flags &amp; BLB_closed);\n\n\t// Release filter control resources\n\n\tif (blb_filter)\n\t\tBLF_close_blob(tdbb, &amp;blb_filter);\n\n\tblb_flags &amp;= ~BLB_close_on_read;\n\tblb_flags |= BLB_closed;\n\n\tif (!(blb_flags &amp; BLB_temporary))\n\t{\n\t\tdestroy(true);\n\t\treturn true;\n\t}\n\n\tif (!alreadyClosed)\n\t\tblb_transaction-&gt;tra_temp_blobs_count--;\n\n\tif (blb_level == 0)\n\t{\n\t\t//Database* dbb = tdbb-&gt;getDatabase();\n\n\t\tblb_temp_size = blb_clump_size - blb_space_remaining;\n\n\t\tif (blb_temp_size &gt; 0)\n\t\t{\n\t\t\tblb_temp_size += BLP_SIZE;\n\t\t\tTempSpace* const tempSpace = blb_transaction-&gt;getBlobSpace();\n\n\t\t\tblb_temp_offset = tempSpace-&gt;allocateSpace(blb_temp_size);\n\t\t\ttempSpace-&gt;write(blb_temp_offset, getBuffer(), blb_temp_size);\n\t\t}\n\t}\n\telse if (blb_level &gt;= 1 &amp;&amp; blb_space_remaining &lt; blb_clump_size)\n\t{\n\t\tinsert_page(tdbb);\n\t}\n\n\tfreeBuffer();\n\treturn false;\n}\n\n\nblb* blb::create(thread_db* tdbb, jrd_tra* transaction, bid* blob_id)\n{\n/**************************************\n *\n *      b l b : : c r e a t e\n *\n **************************************\n *\n * Functional description\n *      Create a shiney, new, empty blob.\n *\n **************************************/\n\n\tSET_TDBB(tdbb);\n\treturn create2(tdbb, transaction, blob_id, 0, NULL);\n}\n\n\nblb* blb::create2(thread_db* tdbb,\n\t\t\t\tjrd_tra* transaction, bid* blob_id,\n\t\t\t\tUSHORT bpb_length, const UCHAR* bpb,\n\t\t\t\tbool userBlob)\n{\n/**************************************\n *\n *      b l b : : c r e a t e 2\n *\n **************************************\n *\n * Functional description\n *      Create a shiney, new, empty blob.\n *      Basically blb::create() with BPB structure.\n *\n **************************************/\n\ttransaction = transaction-&gt;getOuter();\n\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tif constexpr (MAX_TEMP_BLOBS == 0) {\n\t\t// unlimited temp blobs\n\t}\n\telse if (transaction-&gt;tra_temp_blobs_count &gt;= MAX_TEMP_BLOBS)\n\t{\n\t\tconst Request* request = tdbb-&gt;getRequest();\n\t\tstring info;\n\n\t\tif (userBlob)\n\t\t{\n\t\t\tAttachment* att = tdbb-&gt;getAttachment();\n\t\t\tinfo = &quot;By user application&quot;;\n\t\t\tif (att-&gt;att_remote_process.hasData())\n\t\t\t{\n\t\t\t\tinfo += string(&quot; (&quot;) + att-&gt;att_remote_process.c_str() + &quot;)&quot;;\n\t\t\t}\n\t\t}\n\t\telse if (request)\n\t\t{\n\t\t\tconst Statement* const statement = request-&gt;getStatement();\n\t\t\tif (statement &amp;&amp; statement-&gt;sqlText)\n\t\t\t\tinfo = string(&quot;By query: &quot;) + *statement-&gt;sqlText;\n\n\t\t\tstring stack;\n\t\t\tif (EXE_get_stack_trace(request, stack))\n\t\t\t{\n\t\t\t\tinfo += &quot;\\n&quot;;\n\t\t\t\tinfo += stack;\n\t\t\t}\n\t\t}\n\n\t\tgds__log(&quot;Too many temporary blobs (%u allowed)\\n%s&quot;, MAX_TEMP_BLOBS, info.c_str());\n\n\t\tERR_post(Arg::Gds(isc_random) &lt;&lt; Arg::Str(&quot;Too many temporary blobs&quot;));\n\t}\n\n\t// Create a blob large enough to hold a single data page\n\tSSHORT from, to;\n\tSSHORT from_charset, to_charset;\n\tconst SSHORT type = gds__parse_bpb2(bpb_length,\n\t\t\t\t\t\t   bpb,\n\t\t\t\t\t\t   &amp;from,\n\t\t\t\t\t\t   &amp;to,\n\t\t\t\t\t\t   reinterpret_cast&lt;USHORT*&gt;(&amp;from_charset),\t// safe - alignment not changed\n\t\t\t\t\t\t   reinterpret_cast&lt;USHORT*&gt;(&amp;to_charset),\t\t// safe - alignment not changed\n\t\t\t\t\t\t   NULL, NULL, NULL, NULL);\n\n\tblb* blob = allocate_blob(tdbb, transaction);\n\n\tif (userBlob)\n\t\tblob-&gt;blb_flags |= BLB_user;\n\n\tif (type &amp; isc_bpb_type_stream)\n\t\tblob-&gt;blb_flags |= BLB_stream;\n\n\tif ((type &amp; isc_bpb_storage_temp) || dbb-&gt;readOnly()) {\n\t\tblob-&gt;blb_pg_space_id = dbb-&gt;dbb_page_manager.getTempPageSpaceID(tdbb);\n\t}\n\telse {\n\t\tblob-&gt;blb_pg_space_id = DB_PAGE_SPACE;\n\t}\n\n\tblob-&gt;blb_sub_type = to;\n\n\tbool filter_required = false;\n\tBlobFilter* filter = NULL;\n\tif (to &amp;&amp; from != to)\n\t{\n\t\t// ASF: filter_text is not supported for write operations\n\t\tif (!(from == 0 &amp;&amp; to == isc_blob_text) &amp;&amp;\n\t\t\t!(to == isc_blob_text &amp;&amp; to_charset == CS_BINARY))\n\t\t{\n\t\t\tfilter = find_filter(tdbb, from, to);\n\t\t\tfilter_required = true;\n\t\t}\n\t}\n\telse if (to == isc_blob_text &amp;&amp; from_charset != to_charset)\n\t{\n\t\tif (from_charset == CS_dynamic)\n\t\t\tfrom_charset = tdbb-&gt;getCharSet();\n\t\tif (to_charset == CS_dynamic)\n\t\t\tto_charset = tdbb-&gt;getCharSet();\n\n\t\tif (to_charset != CS_NONE &amp;&amp; from_charset != CS_NONE &amp;&amp;\n\t\t\tto_charset != CS_BINARY &amp;&amp; from_charset != CS_BINARY &amp;&amp;\n\t\t\tfrom_charset != to_charset)\n\t\t{\n\t\t\tfilter = find_filter(tdbb, from, to);\n\t\t\tfilter_required = true;\n\t\t}\n\t}\n\n\tblob-&gt;blb_space_remaining = blob-&gt;blb_clump_size;\n\tblob-&gt;blb_flags |= BLB_temporary;\n\tblob-&gt;blb_transaction-&gt;tra_temp_blobs_count++;\n\n\tif (filter_required)\n\t{\n\t\tBLF_create_blob(tdbb,\n\t\t\t\t\t\ttransaction,\n\t\t\t\t\t\t&amp;blob-&gt;blb_filter,\n\t\t\t\t\t\tblob_id,\n\t\t\t\t\t\tbpb_length,\n\t\t\t\t\t\tbpb,\n\t\t\t\t\t\tblob_filter,\n\t\t\t\t\t\tfilter);\n\t\treturn blob;\n\t}\n\n\t// Set up for a &quot;small&quot; blob -- a blob that fits on an ordinary blob page\n\n\tblob_page* page = (blob_page*) blob-&gt;getBuffer();\n\tmemset(page, 0, BLP_SIZE);\t// initialize page header with NULLs\n\tpage-&gt;blp_header.pag_type = pag_blob;\n\tblob-&gt;blb_segment = (UCHAR*) page-&gt;blp_page;\n\n\t// Bind non-user blob to the request\n\n\tRequest* request = tdbb-&gt;getRequest();\n\tif (!userBlob &amp;&amp; request)\n\t{\n\t\ttransaction-&gt;tra_blobs-&gt;locate(blob-&gt;blb_temp_id);\n\t\tBlobIndex* current = &amp;transaction-&gt;tra_blobs-&gt;current();\n\n\t\tRequest* blob_request = request;\n\t\twhile (blob_request-&gt;req_caller)\n\t\t\tblob_request = blob_request-&gt;req_caller;\n\n\t\tcurrent-&gt;bli_request = blob_request;\n\t\tcurrent-&gt;bli_request-&gt;req_blobs.add(blob-&gt;blb_temp_id);\n\t}\n\n\t// Format blob id and return blob handle\n\n\tblob_id-&gt;set_temporary(blob-&gt;blb_temp_id);\n\n\treturn blob;\n}\n\n\n//\n// This function makes linear stacks lookup. Therefore\n// in case of big stacks garbage collection speed may become\n// real problem. Stacks should be sorted before run?\n// 2006.03.17 hvlad: it is sorted now\nvoid BLB_garbage_collect(thread_db* tdbb,\n\t\t\t\t\t\t RecordStack&amp; going,\n\t\t\t\t\t\t RecordStack&amp; staying,\n\t\t\t\t\t\t ULONG prior_page, jrd_rel* relation)\n{\n/**************************************\n *\n *      B L B _ g a r b a g e _ c o l l e c t\n *\n **************************************\n *\n * Functional description\n *      Garbage collect indices and blobs.  Garbage_collect is passed a\n *      stack of record blocks of records that are being deleted and a stack\n *      of records blocks of records that are staying.  Garbage_collect\n *      can be called from four operations:\n *\n *              VIO_backout     -- removing top record\n *              expunge         -- removing all versions of a record\n *              purge           -- removing all but top version of a record\n *              update_in_place -- replace the top level record.\n *\n *\thvlad: note that same blob_id can be reused by the staying record version\n *\t\tin the different field than it was in going record. This is happening\n *\t\twith 3 blob fields and update_in_place\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tfb_assert(prior_page &gt; 0);\n\tRecordBitmap bmGoing;\n\tULONG cntGoing = 0;\n\n\t// Loop thru records on the way out looking for blobs to garbage collect\n\tfor (RecordStack::iterator stack1(going); stack1.hasData(); ++stack1)\n\t{\n\t\tRecord* rec = stack1.object();\n\t\tif (!rec)\n\t\t\tcontinue;\n\n\t\t// Look for active blob records\n\t\tconst Format* format = rec-&gt;getFormat();\n\t\tfor (USHORT id = 0; id &lt; format-&gt;fmt_count; id++)\n\t\t{\n\t\t\tDSC desc;\n\t\t\tif (DTYPE_IS_BLOB(format-&gt;fmt_desc[id].dsc_dtype) &amp;&amp; EVL_field(0, rec, id, &amp;desc))\n\t\t\t{\n\t\t\t\tconst bid* blob = (bid*) desc.dsc_address;\n\t\t\t\tif (!blob-&gt;isEmpty())\n\t\t\t\t{\n\t\t\t\t\tif (blob-&gt;bid_internal.bid_relation_id == relation-&gt;rel_id)\n\t\t\t\t\t{\n\t\t\t\t\t\tconst RecordNumber number = blob-&gt;get_permanent_number();\n\t\t\t\t\t\tbmGoing.set(number.getValue());\n\t\t\t\t\t\tcntGoing++;\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t{\n\t\t\t\t\t\t// hvlad: blob_id in descriptor is not from our relation. Yes, it is\n\t\t\t\t\t\t// garbage in user data but we can handle it without bugcheck - just\n\t\t\t\t\t\t// ignore it. To be reconsider latter based on real user reports.\n\t\t\t\t\t\t// The same about staying blob few lines below\n\t\t\t\t\t\tgds__log(&quot;going blob (%ld:%ld) is not owned by relation (id = %d), ignored&quot;,\n\t\t\t\t\t\t\tblob-&gt;bid_quad.bid_quad_high, blob-&gt;bid_quad.bid_quad_low, relation-&gt;rel_id);\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\tif (!cntGoing)\n\t\treturn;\n\n\t// Make sure the blob doesn&#x27;t stay in any record remaining\n\tfor (RecordStack::iterator stack2(staying); stack2.hasData(); ++stack2)\n\t{\n\t\tRecord* rec = stack2.object();\n\t\tif (!rec)\n\t\t\tcontinue;\n\n\t\tconst Format* format = rec-&gt;getFormat();\n\t\tfor (USHORT id = 0; id &lt; format-&gt;fmt_count; id++)\n\t\t{\n\t\t\tDSC desc;\n\t\t\tif (DTYPE_IS_BLOB(format-&gt;fmt_desc[id].dsc_dtype) &amp;&amp; EVL_field(0, rec, id, &amp;desc))\n\t\t\t{\n\t\t\t\tconst bid* blob = (bid*) desc.dsc_address;\n\t\t\t\tif (!blob-&gt;isEmpty())\n\t\t\t\t{\n\t\t\t\t\tif (blob-&gt;bid_internal.bid_relation_id == relation-&gt;rel_id)\n\t\t\t\t\t{\n\t\t\t\t\t\tconst RecordNumber number = blob-&gt;get_permanent_number();\n\t\t\t\t\t\tif (bmGoing.test(number.getValue()))\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tbmGoing.clear(number.getValue());\n\t\t\t\t\t\t\tif (!--cntGoing)\n\t\t\t\t\t\t\t\treturn;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t{\n\t\t\t\t\t\tgds__log(&quot;staying blob (%ld:%ld) is not owned by relation (id = %d), ignored&quot;,\n\t\t\t\t\t\t\tblob-&gt;bid_quad.bid_quad_high, blob-&gt;bid_quad.bid_quad_low, relation-&gt;rel_id);\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\t// Get rid of blob\n\tif (bmGoing.getFirst())\n\t{\n\t\tdo {\n\t\t\tconst FB_UINT64 id = bmGoing.current();\n\n\t\t\tbid blob;\n\t\t\tblob.set_permanent(relation-&gt;rel_id, RecordNumber(id));\n\n\t\t\tblb::delete_blob_id(tdbb, &amp;blob, prior_page, relation);\n\t\t} while (bmGoing.getNext());\n\t}\n}\n\n\nvoid BLB_gen_bpb(SSHORT source, SSHORT target, UCHAR sourceCharset, UCHAR targetCharset, UCharBuffer&amp; bpb)\n{\n\tbpb.resize(15);\n\n\tUCHAR* p = bpb.begin();\n\t*p++ = isc_bpb_version1;\n\n\t*p++ = isc_bpb_source_type;\n\t*p++ = 2;\n\tput_vax_short(p, source);\n\tp += 2;\n\tif (source == isc_blob_text)\n\t{\n\t\t*p++ = isc_bpb_source_interp;\n\t\t*p++ = 1;\n\t\t*p++ = sourceCharset;\n\t}\n\n\t*p++ = isc_bpb_target_type;\n\t*p++ = 2;\n\tput_vax_short(p, target);\n\tp += 2;\n\tif (target == isc_blob_text)\n\t{\n\t\t*p++ = isc_bpb_target_interp;\n\t\t*p++ = 1;\n\t\t*p++ = targetCharset;\n\t}\n\tfb_assert(static_cast&lt;size_t&gt;(p - bpb.begin()) &lt;= bpb.getCount());\n\n\t// set the array count to the number of bytes we used\n\tbpb.shrink(p - bpb.begin());\n}\n\n\nvoid BLB_gen_bpb_from_descs(const dsc* fromDesc, const dsc* toDesc, UCharBuffer&amp; bpb)\n{\n\tBLB_gen_bpb(fromDesc-&gt;getBlobSubType(), toDesc-&gt;getBlobSubType(),\n\t\tfromDesc-&gt;getCharSet(), toDesc-&gt;getCharSet(), bpb);\n}\n\n\nblb* blb::get_array(thread_db* tdbb, jrd_tra* transaction, const bid* blob_id,\n\t\t\t\t   Ods::InternalArrayDesc* desc)\n{\n/**************************************\n *\n *      b l b : : g e t _ a r r a y\n *\n **************************************\n *\n * Functional description\n *      Get array blob and array descriptor.\n *\n **************************************/\n\ttransaction = transaction-&gt;getOuter();\n\n\tSET_TDBB(tdbb);\n\n\tblb* blob = open2(tdbb, transaction, blob_id, 0, 0);\n\n\tif (blob-&gt;blb_length &lt; sizeof(Ods::InternalArrayDesc))\n\t{\n\t\tblob-&gt;BLB_close(tdbb);\n\t\tIBERROR(193);\t\t\t// msg 193 null or invalid array\n\t}\n\n\tblob-&gt;BLB_get_segment(tdbb, reinterpret_cast&lt;UCHAR*&gt;(desc), sizeof(Ods::InternalArrayDesc));\n\n\tconst USHORT n = desc-&gt;iad_length - sizeof(Ods::InternalArrayDesc);\n\tif (n) {\n\t\tblob-&gt;BLB_get_segment(tdbb, reinterpret_cast&lt;UCHAR*&gt;(desc) + sizeof(Ods::InternalArrayDesc), n);\n\t}\n\n\treturn blob;\n}\n\n\nULONG blb::BLB_get_data(thread_db* tdbb, UCHAR* buffer, SLONG length, bool close)\n{\n/**************************************\n *\n *      b l b : : g e t _ d a t a\n *\n **************************************\n *\n * Functional description\n *      Get a large hunk of data from a blob, which can then be\n *      closed (if close == true).  Return total number of bytes read.\n *      Don&#x27;t worry about segment boundaries.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tBLOB_PTR* p = buffer;\n\n\twhile (length &gt; 0)\n\t{\n\t\t// I have no idea why this limit is 32768 instead of 32767\n\t\t// 1994-August-12 David Schnepper\n\t\tUSHORT n = (USHORT) MIN(length, (SLONG) 32768);\n\t\tn = BLB_get_segment(tdbb, p, n);\n\t\tp += n;\n\t\tlength -= n;\n\t\tif ((blb_flags &amp; BLB_eof) || (n == 0))\n\t\t\tbreak;\n\t}\n\n\tif (close)\n\t\tBLB_close(tdbb);\n\n\treturn (ULONG)(p - buffer);\n}\n\n\nUSHORT blb::BLB_get_segment(thread_db* tdbb, void* segment, USHORT buffer_length)\n{\n/**************************************\n *\n *      b l b : : g e t _ s e g m e n t\n *\n **************************************\n *\n * Functional description\n *      Get next segment or fragment from a blob.  Return the number\n *      of bytes returned.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\tif (blb_flags &amp; BLB_temporary)\n\t\tERR_post(Arg::Gds(isc_cannot_read_new_blob));\n\n\tJRD_reschedule(tdbb);\n\n\t// If we reached end of file, we&#x27;re still there\n\n\tif (blb_flags &amp; BLB_eof)\n\t\treturn 0;\n\n\tif (blb_filter)\n\t{\n\t\tblb_fragment_size = 0;\n\t\tUSHORT tmp_len = 0;\n\t\tconst ISC_STATUS status =\n\t\t\tBLF_get_segment(tdbb, &amp;blb_filter, &amp;tmp_len, buffer_length, segment);\n\n\t\tswitch (status)\n\t\t{\n\t\t\tcase isc_segstr_eof:\n\t\t\t\tblb_flags |= BLB_eof;\n\t\t\t\tbreak;\n\t\t\tcase isc_segment:\n\t\t\t\tblb_fragment_size = 1;\n\t\t\t\tbreak;\n\t\t\tdefault:\n\t\t\t\tfb_assert(status == 0);\n\t\t}\n\n\t\treturn tmp_len;\n\t}\n\n\t// If there is a seek pending, handle it here\n\n\tUSHORT seek = 0;\n\n\tif (blb_flags &amp; BLB_seek)\n\t{\n\t\tif (blb_seek &gt;= blb_length)\n\t\t{\n\t\t\tblb_flags |= BLB_eof;\n\t\t\treturn 0;\n\t\t}\n\t\tconst USHORT l = dbb-&gt;dbb_page_size - BLP_SIZE;\n\t\tblb_sequence = blb_seek / l;\n\t\tseek = (USHORT)(blb_seek % l);\t// safe cast\n\t\tblb_flags &amp;= ~BLB_seek;\n\t\tblb_fragment_size = 0;\n\t\tif (blb_level)\n\t\t{\n\t\t\tblb_space_remaining = 0;\n\t\t\tblb_segment = NULL;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tblb_space_remaining = blb_length - seek;\n\t\t\tblb_segment = ((UCHAR*) ((blob_page*) getBuffer())-&gt;blp_page) + seek;\n\t\t}\n\t}\n\n\tif (!blb_space_remaining &amp;&amp; blb_segment)\n\t{\n\t\tblb_flags |= BLB_eof;\n\t\treturn 0;\n\t}\n\n\t// Figure out how much data is to be moved, move it, and if necessary,\n\t// advance to the next page.  The length is a function of segment\n\t// size (or fragment size), buffer size, and amount of data left in the blob.\n\n\tUCHAR* to = static_cast&lt;UCHAR*&gt;(segment);\n\tconst BLOB_PTR* from = blb_segment;\n\tUSHORT length = blb_space_remaining;\n\tbool active_page = false;\n\tfb_assert(blb_pg_space_id);\n\tWIN window(blb_pg_space_id, -1); // there was no initialization of win_page here.\n\tif (blb_flags &amp; BLB_large_scan)\n\t{\n\t\twindow.win_flags = WIN_large_scan;\n\t\twindow.win_scans = 1;\n\t}\n\n\twhile (true)\n\t{\n\t\t// If the blob is segmented, and this isn&#x27;t a fragment, pick up\n\t\t// the length of the next segment.\n\n\t\tif (isSegmented() &amp;&amp; !blb_fragment_size)\n\t\t{\n\t\t\twhile (length &lt; 2)\n\t\t\t{\n\t\t\t\tif (active_page)\n\t\t\t\t{\n\t\t\t\t\tif (window.win_flags &amp; WIN_large_scan)\n\t\t\t\t\t\tCCH_RELEASE_TAIL(tdbb, &amp;window);\n\t\t\t\t\telse\n\t\t\t\t\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\t\t\t}\n\t\t\t\tconst blob_page* page = get_next_page(tdbb, &amp;window);\n\t\t\t\tif (!page)\n\t\t\t\t{\n\t\t\t\t\tblb_flags |= BLB_eof;\n\t\t\t\t\treturn 0;\n\t\t\t\t}\n\t\t\t\tfrom = (const UCHAR*) page-&gt;blp_page;\n\t\t\t\tlength = page-&gt;blp_length;\n\t\t\t\tactive_page = true;\n\t\t\t}\n\n\t\t\tUCHAR* p = (UCHAR*) &amp;blb_fragment_size;\n\t\t\t*p++ = *from++;\n\t\t\t*p++ = *from++;\n\t\t\tlength -= 2;\n\t\t}\n\n\t\t// Figure out how much data can be moved.  Then account for the space, and move the data\n\n\t\tUSHORT l = MIN(buffer_length, length);\n\n\t\tif (isSegmented())\n\t\t{\n\t\t\tl = MIN(l, blb_fragment_size);\n\t\t\tblb_fragment_size -= l;\n\t\t}\n\n\t\tlength -= l;\n\t\tbuffer_length -= l;\n\n\t\tmemcpy(to, from, l);\n\n\t\tto += l;\n\t\tfrom += l;\n\n\t\t// If we ran out of space in the data clump, and there is a next clump, get it.\n\n\t\tif (!length)\n\t\t{\n\t\t\tif (active_page)\n\t\t\t{\n\t\t\t\tif (window.win_flags &amp; WIN_large_scan)\n\t\t\t\t\tCCH_RELEASE_TAIL(tdbb, &amp;window);\n\t\t\t\telse\n\t\t\t\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\t\t}\n\t\t\tconst blob_page* page = get_next_page(tdbb, &amp;window);\n\t\t\tif (!page)\n\t\t\t{\n\t\t\t\tactive_page = false;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tfrom = reinterpret_cast&lt;const UCHAR*&gt;(page-&gt;blp_page) + seek;\n\t\t\tlength = page-&gt;blp_length - seek;\n\t\t\tseek = 0;\n\t\t\tactive_page = true;\n\t\t}\n\n\t\t// If either the buffer or the fragment is exhausted, we&#x27;re done.\n\n\t\tif (!buffer_length || (isSegmented() &amp;&amp; !blb_fragment_size))\n\t\t\tbreak;\n\t}\n\n\tif (active_page)\n\t{\n\t\tUCHAR* buffer = getBuffer();\n\t\tmemcpy(buffer, from, length);\n\t\tfrom = buffer;\n\n\t\tif (window.win_flags &amp; WIN_large_scan)\n\t\t\tCCH_RELEASE_TAIL(tdbb, &amp;window);\n\t\telse\n\t\t\tCCH_RELEASE(tdbb, &amp;window);\n\t}\n\n\tblb_segment = const_cast&lt;UCHAR*&gt;(from); // safe cast\n\tblb_space_remaining = length;\n\tlength = to - static_cast&lt;UCHAR*&gt;(segment);\n\tblb_seek += length;\n\n\t// If this is a stream blob, fake fragment unless we&#x27;re at the end\n\n\tif (!isSegmented())\n\t{\n\t\t// stream blob\n\t\tblb_fragment_size = (blb_seek == blb_length) ? 0 : 1;\n\t}\n\n\treturn length;\n}\n\n\nSLONG blb::get_slice(thread_db* tdbb,\n\t\t\t\t\tjrd_tra* transaction,\n\t\t\t\t\tconst bid* blob_id,\n\t\t\t\t\tconst UCHAR* sdl,\n\t\t\t\t\tUSHORT param_length,\n\t\t\t\t\tconst UCHAR* param, SLONG slice_length, UCHAR* slice_addr)\n{\n/**************************************\n *\n *      b l b : : g e t _ s l i c e\n *\n **************************************\n *\n * Functional description\n *      Fetch a slice of an array.\n *\n **************************************/\n\ttransaction = transaction-&gt;getOuter();\n\n\tSET_TDBB(tdbb);\n    //Database* database = GET_DBB();\n\tJrd::ContextPoolHolder context(tdbb, transaction-&gt;tra_pool);\n\n\t// Checkout slice description language\n\tSLONG variables[64];\n\tsdl_info info;\n\tmemcpy(variables, param, MIN(sizeof(variables), param_length));\n\n\tif (SDL_info(tdbb-&gt;tdbb_status_vector, sdl, &amp;info, variables)) {\n\t\tERR_punt();\n\t}\n\n\tSLONG stuff[IAD_LEN(16) / 4];\n\tOds::InternalArrayDesc* desc = (Ods::InternalArrayDesc*) stuff;\n\tblb* blob = get_array(tdbb, transaction, blob_id, desc);\n\tSLONG length = desc-&gt;iad_total_length;\n\n\t// Get someplace to put data\n\n\tUCharBuffer data_buffer;\n\tUCHAR* const data = data_buffer.getBuffer(desc-&gt;iad_total_length);\n\n\t// zero out memory, so that it does not have to be done for each element\n\n\tmemset(data, 0, desc-&gt;iad_total_length);\n\n\tSLONG offset = 0;\n\n\tarray_slice arg;\n\n\t// If we know something about the subscript bounds, prepare\n\t// to fetch only stuff we really care about\n\n\tif (info.sdl_info_dimensions)\n\t{\n\t\tconst SLONG from = SDL_compute_subscript(tdbb-&gt;tdbb_status_vector, desc,\n\t\t\t\t\t\t\t\t  \t\t\t\t info.sdl_info_dimensions, info.sdl_info_lower);\n\t\tconst SLONG to = SDL_compute_subscript(tdbb-&gt;tdbb_status_vector, desc,\n\t\t\t\t\t\t\t\t  \t\t\t   info.sdl_info_dimensions, info.sdl_info_upper);\n\t\tif (from != -1 &amp;&amp; to != -1)\n\t\t{\n\t\t\tif (from)\n\t\t\t{\n\t\t\t\toffset = from * desc-&gt;iad_element_length;\n\t\t\t\tblob-&gt;BLB_lseek(0, offset + (SLONG) desc-&gt;iad_length);\n\t\t\t}\n\t\t\tlength = (to - from + 1) * desc-&gt;iad_element_length;\n\t\t}\n\t}\n\n\tlength = blob-&gt;BLB_get_data(tdbb, data + offset, length) + offset;\n\n\t// Walk array\n\targ.slice_desc = info.sdl_info_element;\n\targ.slice_desc.dsc_address = slice_addr;\n\targ.slice_end = slice_addr + slice_length;\n\targ.slice_count = 0;\n\targ.slice_element_length = info.sdl_info_element.dsc_length;\n\targ.slice_direction = array_slice::slc_reading_array;\t// fetching from array\n\targ.slice_high_water = data + length;\n\targ.slice_base = data + offset;\n\n\tISC_STATUS status = SDL_walk(tdbb-&gt;tdbb_status_vector, sdl,\n\t\t\t\t\t\t\t\t data, desc, variables, slice_callback, &amp;arg);\n\n\tif (status) {\n\t\tERR_punt();\n\t}\n\n\treturn (SLONG) (arg.slice_count * arg.slice_element_length);\n}\n\n\nSLONG blb::BLB_lseek(USHORT mode, SLONG offset)\n{\n/**************************************\n *\n *      b l b : : l s e e k\n *\n **************************************\n *\n * Functional description\n *      Position a blob for direct access.  Seek is only defined for stream\n *      type blobs.\n *\n **************************************/\n\n\tif (!(blb_flags &amp; BLB_stream))\n\t\tERR_post(Arg::Gds(isc_bad_segstr_type));\n\n\tSINT64 position = offset;\n\n\tif (mode == 1)\n\t\tposition += blb_seek;\n\telse if (mode == 2)\n\t\tposition += blb_length;\n\n\tif (position &lt;= 0)\n\t\tblb_seek = 0;\n\telse if (static_cast&lt;FB_UINT64&gt;(position) &gt; blb_length)\n\t\tblb_seek = blb_length;\n\telse\n\t\tblb_seek = static_cast&lt;FB_UINT64&gt;(position);\n\tblb_flags |= BLB_seek;\n\tblb_flags &amp;= ~BLB_eof;\n\n\treturn blb_seek;\n}\n\n\n// This function can&#x27;t take from_desc as const because it may call store_array,\n// which in turn calls blb::create2 that writes in the blob id. Although the\n// compiler allows to modify from_desc-&gt;dsc_address&#x27; contents when from_desc is\n// constant, this is misleading so I didn&#x27;t make the source descriptor constant.\nvoid blb::move(thread_db* tdbb, dsc* from_desc, dsc* to_desc,\n\t\t\t   jrd_rel* relation, Record* record, USHORT fieldId, bool bulk)\n{\n/**************************************\n *\n *      b l b : : m o v e\n *\n **************************************\n *\n * Functional description\n *      Perform an assignment to a blob field or a blob descriptor.\n *      When assigning to a field, unless the blob is null,\n *      this requires that either a temporary blob be materialized or that\n *      a permanent blob be copied.  Note: it is illegal to have a blob\n *      field in a message.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tif (to_desc-&gt;dsc_dtype == dtype_array)\n\t{\n\t\t// only array-&gt;array conversions are allowed\n\t\tif (from_desc-&gt;dsc_dtype != dtype_array &amp;&amp; from_desc-&gt;dsc_dtype != dtype_quad)\n\t\t{\n\t\t\tERR_post(Arg::Gds(isc_array_convert_error));\n\t\t}\n\t}\n\telse if (DTYPE_IS_BLOB_OR_QUAD(to_desc-&gt;dsc_dtype))\n\t{\n\t\tif (!DTYPE_IS_BLOB_OR_QUAD(from_desc-&gt;dsc_dtype))\n\t\t{\n\t\t\t// anything that can be copied into a string can be copied into a blob\n\t\t\tmove_from_string(tdbb, from_desc, to_desc, relation, record, fieldId);\n\t\t\treturn;\n\t\t}\n\t}\n\telse if (DTYPE_IS_BLOB_OR_QUAD(from_desc-&gt;dsc_dtype))\n\t{\n\t\tmove_to_string(tdbb, from_desc, to_desc);\n\t\treturn;\n\t}\n\telse\n\t\tfb_assert(false);\n\n\t// If the target node is a field, we need more work to do.\n\n\t// We should not materialize the blob if the destination field\n\t// stream (nod_union, for example) doesn&#x27;t have a relation.\n\tconst bool simpleMove = (relation == NULL);\n\n\t// Use local copy of source blob id to not change contents of from_desc in\n\t// a case when it points to materialized temporary blob (see below for\n\t// assignment to *source).\n\tbid srcBlobID = *(bid*)from_desc-&gt;dsc_address;\n\tbid* source = &amp;srcBlobID;\n\tbid* destination = (bid*) to_desc-&gt;dsc_address;\n\n\t// If nothing changed, do nothing.  If it isn&#x27;t broken, don&#x27;t fix it.\n\tif (*source == *destination)\n\t\treturn;\n\n\tconst UCHAR fromCharSet = from_desc-&gt;getCharSet();\n\tconst UCHAR toCharSet = to_desc-&gt;getCharSet();\n\n\tconst bool needFilter =\n\t\t(from_desc-&gt;dsc_sub_type != isc_blob_untyped &amp;&amp; to_desc-&gt;dsc_sub_type != isc_blob_untyped &amp;&amp;\n\t\t\t(from_desc-&gt;dsc_sub_type != to_desc-&gt;dsc_sub_type ||\n\t\t \t\t(from_desc-&gt;dsc_sub_type == isc_blob_text &amp;&amp;\n\t\t\t\t\tfromCharSet != toCharSet &amp;&amp;\n\t\t\t\t\ttoCharSet != CS_NONE &amp;&amp; toCharSet != CS_BINARY &amp;&amp;\n\t\t\t\t\tfromCharSet != CS_NONE &amp;&amp; fromCharSet != CS_BINARY)));\n\n\tif (!needFilter &amp;&amp; to_desc-&gt;isBlob() &amp;&amp;\n        (fromCharSet == CS_NONE || fromCharSet == CS_BINARY) &amp;&amp;\n        (toCharSet != CS_NONE &amp;&amp; toCharSet != CS_BINARY))\n\t{\n\t\tAutoBlb blob(tdbb, blb::open(tdbb, tdbb-&gt;getTransaction(), source));\n\t\tblob.getBlb()-&gt;BLB_check_well_formed(tdbb, to_desc);\n\t}\n\n\t// If the target node is not a field, just copy the blob id and return.\n\tif (simpleMove)\n\t{\n\t\t// But if the sub_type or charset is different, create a new blob.\n\t\tif (DTYPE_IS_BLOB_OR_QUAD(from_desc-&gt;dsc_dtype) &amp;&amp;\n\t\t\tDTYPE_IS_BLOB_OR_QUAD(to_desc-&gt;dsc_dtype) &amp;&amp;\n\t\t\tneedFilter)\n\t\t{\n\t\t\tUCharBuffer bpb;\n\t\t\tBLB_gen_bpb_from_descs(fro \n\t\t\t}\n\n\t\t\tif (!current || !current-&gt;bli_materialized)\n\t\t\t{\n\t\t\t\tif (!new_blob || !(new_blob-&gt;blb_flags &amp; BLB_temporary) ||\n\t\t\t\t\t!(new_blob-&gt;blb_flags &amp; BLB_closed))\n\t\t\t\t{\n\t\t\t\t\tif (new_blob &amp;&amp; (new_blob-&gt;blb_flags &amp; BLB_close_on_read))\n\t\t\t\t\t\tnew_blob-&gt;BLB_close(tdbb);\n\t\t\t\t\telse\n\t\t\t\t\t\tERR_post(Arg::Gds(isc_bad_segstr_id));\n\t\t\t\t}\n\n\t\t\t\tblob-&gt;blb_lead_page = new_blob-&gt;blb_lead_page;\n\t\t\t\tblob-&gt;blb_max_sequence = new_blob-&gt;blb_max_sequence;\n\t\t\t\tblob-&gt;blb_count = new_blob-&gt;blb_count;\n\t\t\t\tblob-&gt;blb_length = new_blob-&gt;blb_length;\n\t\t\t\tblob-&gt;blb_max_segment = new_blob-&gt;blb_max_segment;\n\t\t\t\tblob-&gt;blb_level = new_blob-&gt;blb_level;\n\t\t\t\tblob-&gt;blb_flags = new_blob-&gt;blb_flags &amp; BLB_stream;\n\t\t\t\tblob-&gt;blb_pg_space_id = new_blob-&gt;blb_pg_space_id;\n\n\t\t\t\tif (new_blob-&gt;blb_temp_size &gt; 0)\n\t\t\t\t{\n\t\t\t\t\ttransaction-&gt;getBlobSpace()-&gt;read(new_blob-&gt;blb_temp_offset,\n\t\t\t\t\t\tblob-&gt;getBuffer(), new_blob-&gt;blb_temp_size);\n\t\t\t\t}\n\n\t\t\t\tconst vcl* pages = new_blob-&gt;blb_pages;\n\t\t\t\tif (pages)\n\t\t\t\t{\n\t\t\t\t\tvcl* new_pages = vcl::newVector(*transaction-&gt;tra_pool, *pages);\n\t\t\t\t\tblob-&gt;blb_pages = new_pages;\n\t\t\t\t}\n\n\t\t\t\tif (blob-&gt;blb_level == 0)\n\t\t\t\t{\n\t\t\t\t\tblob-&gt;blb_space_remaining =\n\t\t\t\t\t\tnew_blob-&gt;blb_clump_size - new_blob-&gt;blb_space_remaining;\n\t\t\t\t\tblob-&gt;blb_segment =\n\t\t\t\t\t\t(UCHAR*) ((blob_page*) blob-&gt;getBuffer())-&gt;blp_page;\n\t\t\t\t}\n\t\t\t}\n\t\t\telse\n\t\t\t\ttry_relations = true;\n\t\t}\n\t}\n\telse\n\t\ttry_relations = true;\n\n\tif (try_relations)\n\t{\n\t\t// Ordinarily, we would call MET_relation to get the relation id.\n\t\t// However, since the blob id must be considered suspect, this is\n\t\t// not a good idea.  On the other hand, if we don&#x27;t already\n\t\t// know about the relation, the blob id has got to be invalid\n\t\t// anyway.\n\n\t\tvec&lt;jrd_rel*&gt;* vector = tdbb-&gt;getAttachment()-&gt;att_relations;\n\n\t\tif (blobId.bid_internal.bid_relation_id &gt;= vector-&gt;count() ||\n\t\t\t!(blob-&gt;blb_relation = (*vector)[blobId.bid_internal.bid_relation_id] ) )\n\t\t{\n\t\t\t\tERR_post(Arg::Gds(isc_bad_segstr_id));\n\t\t}\n\n\t\tblob-&gt;blb_pg_space_id = blob-&gt;blb_relation-&gt;getPages(tdbb)-&gt;rel_pg_space_id;\n\t\tDPM_get_blob(tdbb, blob, blobId.get_permanent_number(), false, 0);\n\n#ifdef CHECK_BLOB_FIELD_ACCESS_FOR_SELECT\n\t\tif (!blob-&gt;blb_relation-&gt;isSystem() &amp;&amp; blob-&gt;blb_fld_id &lt; blob-&gt;blb_relation-&gt;rel_fields-&gt;count())\n\t\t{\n\t\t\tjrd_fld* fld = (*blob-&gt;blb_relation-&gt;rel_fields)[blob-&gt;blb_fld_id];\n\t\t\ttransaction-&gt;checkBlob(tdbb, &amp;blobId, fld, true);\n\t\t}\n#endif\n\n\t\t// If the blob is known to be damaged, ignore it.\n\n\t\tif (blob-&gt;blb_flags &amp; BLB_damaged)\n\t\t{\n\t\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_damaged))\n\t\t\t\tIBERROR(194);\t// msg 194 blob not found\n\n\t\t\tblob-&gt;blb_flags |= BLB_eof;\n\t\t\tblob-&gt;blb_count = 0;\n\t\t\tblob-&gt;blb_max_segment = 0;\n\t\t\tblob-&gt;blb_length = 0;\n\t\t\treturn blob;\n\t\t}\n\n\t\t// Get first data page in anticipation of reading.\n\n\t\tif (blob-&gt;blb_level == 0)\n\t\t\tblob-&gt;blb_segment = (UCHAR*) ((blob_page*) blob-&gt;getBuffer())-&gt;blp_page;\n\t}\n\n\tUCharBuffer new_bpb;\n\n\tif (external_call)\n\t{\n\t\tif (!from_type_specified)\n\t\t\tfrom = blob-&gt;blb_sub_type;\n\t\tif (!from_charset_specified)\n\t\t\tfrom_charset = blob-&gt;blb_charset;\n\n\t\tif (from == isc_blob_text)\n\t\t{\n\t\t\tif (!to_type_specified)\n\t\t\t\tto = isc_blob_text;\n\t\t\t// Source is either a temporary BLOB already created by data coercion logic\n\t\t\t// or a permanent blob which ID was delivered to client &quot;as is&quot; i.e. data coercion is not needed.\n\t\t\t// In either case it is already in needed character set and further filtering is not needed\n\t\t\tif (!to_charset_specified)\n\t\t\t\tto_charset = blob-&gt;blb_charset;\n\t\t}\n\n\t\tBLB_gen_bpb(from, to, from_charset, to_charset, new_bpb);\n\t\tbpb = new_bpb.begin();\n\t\tbpb_length = new_bpb.getCount();\n\t}\n\n\t//blob-&gt;blb_target_interp = to_charset;\n\t//blob-&gt;blb_source_interp = from_charset;\n\n\tBlobFilter* filter = NULL;\n\tbool filter_required = false;\n\tif (to &amp;&amp; from != to)\n\t{\n\t\tif (!(to == isc_blob_text &amp;&amp; to_charset == CS_BINARY))\n\t\t{\n\t\t\tfilter = find_filter(tdbb, from, to);\n\t\t\tfilter_required = true;\n\t\t}\n\t}\n\telse if (to == isc_blob_text &amp;&amp; from_charset != to_charset)\n\t{\n\t\tif (from_charset == CS_dynamic)\n\t\t\tfrom_charset = tdbb-&gt;getCharSet();\n\t\tif (to_charset == CS_dynamic)\n\t\t\tto_charset = tdbb-&gt;getCharSet();\n\n\t\tif (to_charset != CS_NONE &amp;&amp; from_charset != CS_NONE &amp;&amp;\n\t\t\tto_charset != CS_BINARY &amp;&amp; from_charset != CS_BINARY &amp;&amp;\n\t\t\tfrom_charset != to_charset)\n\t\t{\n\t\t\tfilter = find_filter(tdbb, from, to);\n\t\t\tfilter_required = true;\n\t\t}\n\t}\n\n\tif (filter_required)\n\t{\n\t\tBlobControl* control = 0;\n\t\tBLF_open_blob(tdbb, transaction, &amp;control, blob_id, bpb_length, bpb, blob_filter, filter);\n\t\tblob-&gt;blb_filter = control;\n\t\tblob-&gt;blb_max_segment = control-&gt;ctl_max_segment;\n\t\tblob-&gt;blb_count = control-&gt;ctl_number_segments;\n\t\tblob-&gt;blb_length = control-&gt;ctl_total_length;\n\t\treturn blob;\n\t}\n\n\treturn blob;\n}\n\n\nvoid blb::BLB_put_data(thread_db* tdbb, const UCHAR* buffer, SLONG length)\n{\n/**************************************\n *\n *      b l b : : p u t _ d a t a\n *\n **************************************\n *\n * Functional description\n *      Write data to a blob.\n *      Don&#x27;t worry about segment boundaries.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tconst BLOB_PTR* p = buffer;\n\n\twhile (length &gt; 0)\n\t{\n\t\t// ASF: the comment below was copied from BLB_get_data\n\t\t// I have no idea why this limit is 32768 instead of 32767\n\t\t// 1994-August-12 David Schnepper\n\t\tconst USHORT n = (USHORT) MIN(length, (SLONG) 32768);\n\t\tBLB_put_segment(tdbb, p, n);\n\t\tp += n;\n\t\tlength -= n;\n\t}\n}\n\n\nvoid blb::BLB_put_segment(thread_db* tdbb, const void* seg, USHORT segment_length)\n{\n/**************************************\n *\n *      b l b : : p u t _ s e g m e n t\n *\n **************************************\n *\n * Functional description\n *      Add a segment to a blob.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tconst UCHAR* segment = static_cast&lt;const UCHAR*&gt;(seg);\n\n\t// Make sure blob is a temporary blob.  If not, complain bitterly.\n\n\tif (!(blb_flags &amp; BLB_temporary) || (blb_flags &amp; BLB_closed))\n\t\tERR_post(Arg::Gds(isc_cannot_update_old_blob));\n\n\tif (blb_filter)\n\t{\n\t\tBLF_put_segment(tdbb, &amp;blb_filter, segment_length, segment);\n\t\treturn;\n\t}\n\n\t// Account for new segment\n\n\tblb_count++;\n\tblb_length += segment_length;\n\n\tif (segment_length &gt; blb_max_segment)\n\t\tblb_max_segment = segment_length;\n\n\t// Compute the effective length of the segment (counts length unless\n\t// the blob is a stream blob).\n\n\tULONG length;\t\t\t\t// length of segment + overhead\n\tbool length_flag;\n\tif (isSegmented())\n\t{\n\t\tlength = segment_length + 2;\n\t\tlength_flag = true;\n\t}\n\telse\n\t{\n\t\tlength = segment_length;\n\t\tlength_flag = false;\n\t}\n\n\t// Case 0: Transition from small blob to medium size blob.  This really\n\t// just does a form transformation and drops into the next case.\n\n\tif (blb_level == 0 &amp;&amp; length &gt; (ULONG) blb_space_remaining)\n\t{\n\t\tblb_pages = vcl::newVector(*blb_transaction-&gt;tra_pool, 0);\n\t\tconst USHORT l = dbb-&gt;dbb_page_size - BLP_SIZE;\n\t\tblb_space_remaining += l - blb_clump_size;\n\t\tblb_clump_size = l;\n\t\tblb_level = 1;\n\t}\n\n\t// Case 1: The segment fits.  In what is immaterial.  Just move the segment and get out!\n\n\tBLOB_PTR* p = blb_segment;\n\n\tif (length_flag &amp;&amp; blb_space_remaining &gt;= 2)\n\t{\n\t\tconst BLOB_PTR* q = (UCHAR*) &amp;segment_length;\n\t\t*p++ = *q++;\n\t\t*p++ = *q++;\n\t\tblb_space_remaining -= 2;\n\t\tlength_flag = false;\n\t}\n\n\tif (!length_flag &amp;&amp; segment_length &lt;= blb_space_remaining)\n\t{\n\t\tblb_space_remaining -= segment_length;\n\t\tmemcpy(p, segment, segment_length);\n\t\tblb_segment = p + segment_length;\n\t\treturn;\n\t}\n\n\t// The segment cannot be contained in the current clump.  What does\n\t// bit is copied to the current page image.  Then allocate a page to\n\t// hold the current page, copy the page image to the buffer, and release\n\t// the page.  Since a segment can be much larger than a page, this whole\n\t// mess is done in a loop.\n\n\twhile (length_flag || segment_length)\n\t{\n\t\t// Move what fits.  At this point, the length is known not to fit.\n\n\t\tconst USHORT l = MIN(segment_length, blb_space_remaining);\n\n\t\tif (!length_flag &amp;&amp; l)\n\t\t{\n\t\t\tsegment_length -= l;\n\t\t\tblb_space_remaining -= l;\n\n\t\t\tmemcpy(p, segment, l);\n\t\t\tp += l;\n\t\t\tsegment += l;\n\n\t\t\tif (segment_length == 0)\n\t\t\t{\n\t\t\t\tblb_segment = p;\n\t\t\t\treturn;\n\t\t\t}\n\t\t}\n\n\t\t// Data page is full.  Add the page to the blob data structure.\n\n\t\tinsert_page(tdbb);\n\t\tblb_sequence++;\n\n\t\t// Get ready to start filling the next page.\n\n\t\tblob_page* page = (blob_page*) getBuffer();\n\t\tp = blb_segment = (UCHAR*) page-&gt;blp_page;\n\t\tblb_space_remaining = blb_clump_size;\n\n\t\t// If there&#x27;s still a length waiting to be moved, move it already!\n\n\t\tif (length_flag)\n\t\t{\n\t\t\tconst BLOB_PTR* q = (UCHAR*) &amp;segment_length;\n\t\t\t*p++ = *q++;\n\t\t\t*p++ = *q++;\n\t\t\tblb_space_remaining -= 2;\n\t\t\tlength_flag = false;\n\t\t\tblb_segment = p;\n\t\t}\n\t}\n\n}\n\n\nvoid blb::put_slice(thread_db*\ttdbb,\n\t\t\t\t\tjrd_tra*\t\ttransaction,\n\t\t\t\t\tbid*\t\tblob_id,\n\t\t\t\t\tconst UCHAR*\tsdl,\n\t\t\t\t\tUSHORT\tparam_length,\n\t\t\t\t\tconst UCHAR*\tparam,\n\t\t\t\t\tSLONG\tslice_length,\n\t\t\t\t\tUCHAR*\tslice_addr)\n{\n/**************************************\n *\n *      b l b : : p u t _ s l i c e\n *\n **************************************\n *\n * Functional description\n *      Put a slice of an array.\n *\n **************************************/\n\ttransaction = transaction-&gt;getOuter();\n\n\tSET_TDBB(tdbb);\n\tJrd::ContextPoolHolder context(tdbb, transaction-&gt;tra_pool);\n\n\t// Do initial parse of slice description to get relation and field identification\n\tsdl_info info;\n\tif (SDL_info(tdbb-&gt;tdbb_status_vector, sdl, &amp;info, 0))\n\t\tERR_punt();\n\n\tjrd_rel* relation;\n\tif (info.sdl_info_relation.object.hasData())\n\t{\n\t\tQualifiedName infoRelationName(info.sdl_info_relation);\n\t\ttdbb-&gt;getAttachment()-&gt;qualifyExistingName(tdbb, infoRelationName, {obj_relation});\n\n\t\trelation = MET_lookup_relation(tdbb, infoRelationName);\n\t}\n\telse {\n\t\trelation = MET_relation(tdbb, info.sdl_info_rid);\n\t}\n\n\tif (!relation) {\n\t\tIBERROR(196);\t\t\t// msg 196 relation for array not known\n\t}\n\n\tSSHORT\tn;\n\tif (info.sdl_info_field.length()) {\n\t    n = MET_lookup_field(tdbb, relation, info.sdl_info_field);\n\t}\n\telse {\n\t\tn = info.sdl_info_fid;\n\t}\n\n\t// Make sure relation is scanned\n\tMET_scan_relation(tdbb, relation);\n\n\tjrd_fld* field = NULL;\n\tif (n &lt; 0 || !(field = MET_get_field(relation, n))) {\n\t\tIBERROR(197);\t\t\t// msg 197 field for array not known\n\t}\n\n\tArrayField* array_desc = field-&gt;fld_array;\n\tif (!array_desc)\n\t{\n\t\tERR_post(Arg::Gds(isc_invalid_dimension) &lt;&lt; Arg::Num(0) &lt;&lt; Arg::Num(1));\n\t}\n\n\t// Find and/or allocate array block.  There are three distinct cases:\n\n\t// 1.  Array is to \targ.slice_base = array-&gt;arr_data;\n\n\tSLONG variables[64];\n\tmemcpy(variables, param, MIN(sizeof(variables), param_length));\n\n\tif (SDL_walk(tdbb-&gt;tdbb_status_vector, sdl, array-&gt;arr_data, &amp;array_desc-&gt;arr_desc,\n\t\t\t\t variables, slice_callback, &amp;arg))\n\t{\n\t\tERR_punt();\n\t}\n\n\tconst SLONG length = arg.slice_high_water - array-&gt;arr_data;\n\n\tif (length &gt; array-&gt;arr_effective_length) {\n\t\tarray-&gt;arr_effective_length = length;\n\t}\n\n\tblob_id-&gt;set_temporary(array-&gt;arr_temp_id);\n}\n\n\nvoid blb::release_array(ArrayField* array)\n{\n/**************************************\n *\n *      b l b : : r e l e a s e _ a r r a y\n *\n **************************************\n *\n * Functional description\n *      Release an array block and friends and relations.\n *\n **************************************/\n\n\tdelete[] array-&gt;arr_data;\n\n\tjrd_tra* transaction = array-&gt;arr_transaction;\n\tif (transaction)\n\t{\n\t\tfor (ArrayField** ptr = &amp;transaction-&gt;tra_arrays; *ptr; ptr = &amp;(*ptr)-&gt;arr_next)\n\t\t{\n\t\t\tif (*ptr == array)\n\t\t\t{\n\t\t\t\t*ptr = array-&gt;arr_next;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\n\tdelete array;\n}\n\n\nvoid blb::scalar(thread_db*\t\ttdbb,\n\t\t\t\tjrd_tra*\t\ttransaction,\n\t\t\t\tconst bid*\t\tblob_id,\n\t\t\t\tUSHORT\t\t\tcount,\n\t\t\t\tconst SLONG*\tsubscripts,\n\t\t\t\timpure_value*\tvalue)\n{\n/**************************************\n *\n *      b l b : : s c a l a r\n *\n **************************************\n *\n * Functional description\n *\n **************************************/\n\ttransaction = transaction-&gt;getOuter();\n\n\tSLONG stuff[IAD_LEN(16) / 4];\n\n\tSET_TDBB(tdbb);\n\n\tOds::InternalArrayDesc* array_desc = (Ods::InternalArrayDesc*) stuff;\n\tblb* blob = get_array(tdbb, transaction, blob_id, array_desc);\n\n\t// Get someplace to put data.\n\t// We need DOUBLE_ALIGNed buffer, that&#x27;s why some tricks\n\tHalfStaticArray&lt;double, 64&gt; tem
