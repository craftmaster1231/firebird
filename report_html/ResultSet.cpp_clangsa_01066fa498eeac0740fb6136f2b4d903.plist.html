hile (i &lt; dbb-&gt;dbb_prefetch_pages &amp;&amp; sequence &lt;= blb_max_sequence)\n\t\t\t{\n\t\t\t\t pages[i++] = vector[sequence++];\n\t\t\t}\n\n\t\t\tCCH_PREFETCH(tdbb, pages, i);\n\t\t}\n#endif\n\t\twindow-&gt;win_page = vector[blb_sequence];\n\t\tpage = (blob_page*) CCH_FETCH(tdbb, window, LCK_read, pag_blob);\n\t}\n\telse\n\t{\n\t\twindow-&gt;win_page = vector[blb_sequence / blb_pointers];\n\t\tpage = (blob_page*) CCH_FETCH(tdbb, window, LCK_read, pag_blob);\n#ifdef SUPERSERVER_V2\n\t\t// Perform prefetch of blob level 2 data pages.\n\n\t\tUSHORT sequence = blb_sequence % blb_pointers;\n\t\tif (!(sequence % dbb-&gt;dbb_prefetch_sequence))\n\t\t{\n\t\t\tULONG abs_sequence = blb_sequence;\n\t\t\tUSHORT i = 0;\n\t\t\twhile (i &lt; dbb-&gt;dbb_prefetch_pages &amp;&amp; sequence &lt; blb_pointers &amp;&amp;\n\t\t\t\tabs_sequence &lt;= blb_max_sequence)\n\t\t\t{\n\t\t\t\tpages[i++] = page-&gt;blp_page[sequence++];\n\t\t\t\tabs_sequence++;\n\t\t\t}\n\n\t\t\tCCH_PREFETCH(tdbb, pages, i);\n\t\t}\n#endif\n\t\tpage = (blob_page*) CCH_HANDOFF(tdbb, window,\n\t\t\t\t\t\t\t\t\t\tpage-&gt;blp_page[blb_sequence % blb_pointers],\n\t\t\t\t\t\t\t\t\t\tLCK_read, pag_blob);\n\t}\n\n\tif (page-&gt;blp_sequence != blb_sequence)\n\t\tCORRUPT(201);\t\t\t// msg 201 cannot find blob page\n\n\tblb_sequence++;\n\n\treturn page;\n}\n\n\nvoid blb::insert_page(thread_db* tdbb)\n{\n/**************************************\n *\n *      i n s e r t _ p a g e\n *\n **************************************\n *\n * Functional description\n *      A data page has been formatted.  Allocate a physical page,\n *      move the data page to the buffer, and insert the page number\n *      of the new page into the blob data structure.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\tconst USHORT length = dbb-&gt;dbb_page_size - blb_space_remaining;\n\tvcl* vector = blb_pages;\n\tblb_max_sequence = blb_sequence;\n\n\t// Allocate a page for the now full blob data page.  Move the page\n\t// image to the buffer, and release the page.\n\n\tconst USHORT pageSpaceID = blb_pg_space_id;\n\n\tWIN window(pageSpaceID, -1);\n\tblob_page* page = (blob_page*) DPM_allocate(tdbb, &amp;window);\n\tconst PageNumber page_number = window.win_page;\n\n\tif (blb_sequence == 0)\n\t\tblb_lead_page = page_number.getPageNum();\n\n\t// Page header is partially populated by DPM_allocate. Preserve it.\n\tmemcpy(\n\t\treinterpret_cast&lt;char*&gt;(page) + sizeof(Ods::pag),\n\t\treinterpret_cast&lt;const char*&gt;(getBuffer()) + sizeof(Ods::pag),\n\t\tlength - sizeof(Ods::pag));\n\tpage-&gt;blp_header.pag_type = pag_blob;\n\n\tpage-&gt;blp_sequence = blb_sequence;\n\tpage-&gt;blp_lead_page = blb_lead_page;\n\tpage-&gt;blp_length = length - BLP_SIZE;\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\t// If the blob is at level 1, there are two cases.  First, and easiest,\n\t// is that there is still room in the page vector to hold the pointer.\n\t// The second case is that the vector is full, and the blob must be\n\t// transformed into a level 2 blob.\n\n\tif (blb_level == 1)\n\t{\n\t\t// See if there is room in the page vector.  If so, just update the vector.\n\n\t\tif (blb_sequence &lt; blb_max_pages)\n\t\t{\n\t\t\tif (blb_sequence &gt;= vector-&gt;count()) {\n\t\t\t\tvector-&gt;resize(blb_sequence + 1);\n\t\t\t}\n\t\t\t(*vector)[blb_sequence] = page_number.getPageNum();\n\t\t\treturn;\n\t\t}\n\n\t\t// The vector just overflowed.  Sigh.  Transform blob to level 2.\n\n\t\tblb_level = 2;\n\t\tpage = (blob_page*) DPM_allocate(tdbb, &amp;window);\n\t\tpage-&gt;blp_header.pag_flags = Ods::blp_pointers;\n\t\tpage-&gt;blp_header.pag_type = pag_blob;\n\t\tpage-&gt;blp_lead_page = blb_lead_page;\n\t\tpage-&gt;blp_length = vector-&gt;count() &lt;&lt; SHIFTLONG;\n\t\tmemcpy(page-&gt;blp_page, vector-&gt;memPtr(), page-&gt;blp_length);\n\t\tvector-&gt;resize(1);\n\t\t(*vector)[0] = window.win_page.getPageNum();\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t}\n\n\t// The blob must be level 2.  Find the appropriate pointer page (creating\n\t// it if need be, and stick the pointer in the appropriate slot.\n\n\tUSHORT l = blb_sequence / blb_pointers;\n\n\tif (l &lt; vector-&gt;count())\n\t{\n\t\twindow.win_page = (*vector)[l];\n\t\twindow.win_flags = 0;\n\t\tpage = (blob_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_blob);\n\t}\n\telse if (l &lt; blb_pointers)\n\t{\n\t\tpage = (blob_page*) DPM_allocate(tdbb, &amp;window);\n\t\tpage-&gt;blp_header.pag_flags = Ods::blp_pointers;\n\t\tpage-&gt;blp_header.pag_type = pag_blob;\n\t\tpage-&gt;blp_lead_page = blb_lead_page;\n\t\tvector-&gt;resize(l + 1);\n\t\t(*vector)[l] = window.win_page.getPageNum();\n\t}\n\telse {\n\t\tERR_post(Arg::Gds(isc_imp_exc) &lt;&lt; Arg::Gds(isc_blobtoobig));\n\t}\n\n\tCCH_precedence(tdbb, &amp;window, page_number);\n\tCCH_MARK(tdbb, &amp;window);\n\tl = blb_sequence % blb_pointers;\n\tpage-&gt;blp_page[l] = page_number.getPageNum();\n\tpage-&gt;blp_length = (l + 1) &lt;&lt; SHIFTLONG;\n\tCCH_RELEASE(tdbb, &amp;window);\n}\n\n\nstatic void move_from_string(thread_db* tdbb, const dsc* from_desc, dsc* to_desc,\n\t\t\t\t\t\t\t jrd_rel* relation, Record* record, USHORT fieldId)\n{\n/**************************************\n *\n *      m o v e _ f r o m _ s t r i n g\n *\n **************************************\n *\n * Functional description\n *      Perform an assignment to a blob field.  It&#x27;s capable of handling\n *      strings (and anything that could be converted to strings) by\n *      doing an internal conversion to blob and then calling blb::move\n *      with that new blob.\n *\n **************************************/\n\tSET_TDBB (tdbb);\n\n\tconst UCHAR charSet = INTL_GET_CHARSET(from_desc);\n\tUCHAR* fromstr = NULL;\n\n\tMoveBuffer buffer;\n\tconst int length = MOV_make_string2(tdbb, from_desc, charSet, &amp;fromstr, buffer);\n\tconst UCHAR toCharSet = to_desc-&gt;getCharSet();\n\n\tif ((charSet == CS_NONE || charSet == CS_BINARY || charSet == toCharSet) &amp;&amp;\n\t\ttoCharSet != CS_NONE &amp;&amp; toCharSet != CS_BINARY)\n\t{\n\t\tif (!INTL_charset_lookup(tdbb, toCharSet)-&gt;wellFormed(length, fromstr))\n\t\t\tstatus_exception::raise(Arg::Gds(isc_malformed_string));\n\t}\n\n\tRequest* request = tdbb-&gt;getRequest();\n\tjrd_tra* transaction = request ? request-&gt;req_transaction : tdbb-&gt;getTransaction();\n\ttransaction = transaction-&gt;getOuter();\n\n\tUCharBuffer bpb;\n\n\tif (!(from_desc-&gt;isText() &amp;&amp; from_desc-&gt;getCharSet() == CS_BINARY))\n\t\tBLB_gen_bpb_from_descs(from_desc, to_desc, bpb);\n\n\tbid temp_bid;\n\ttemp_bid.clear();\n\tblb* blob = blb::create2(tdbb, transaction, &amp;temp_bid, bpb.getCount(), bpb.begin());\n\n\tdsc blob_desc;\n\n\tblob_desc.dsc_scale = to_desc-&gt;dsc_scale;\t// blob charset\n\tblob_desc.dsc_flags = (blob_desc.dsc_flags &amp; 0xFF) | (to_desc-&gt;dsc_flags &amp; 0xFF00);\t// blob collation\n\tblob_desc.dsc_sub_type = to_desc-&gt;dsc_sub_type;\n\tblob_desc.dsc_dtype = dtype_blob;\n\tblob_desc.dsc_length = sizeof(ISC_QUAD);\n\tblob_desc.dsc_address = reinterpret_cast&lt;UCHAR*&gt;(&amp;temp_bid);\n\tblob-&gt;BLB_put_segment(tdbb, fromstr, length);\n\tblob-&gt;BLB_close(tdbb);\n\tULONG blob_temp_id = blob-&gt;getTempId();\n\tblb::move(tdbb, &amp;blob_desc, to_desc, relation, record, fieldId);\n\n\t// 14-June-2004. Nickolay Samofatov\n\t// The code below saves a lot of memory when bunches of records are\n\t// converted to blobs from strings. If blb::move is materialized blob we\n\t// can discard it without consequences since we know there are no other\n\t// descriptors using temporary ID of blob we just created. If blob is\n\t// still temporary we cannot free it as it may now be used inside\n\t// trigger for updatable view. In theory we could make this decision\n\t// solely via checking that destination field belongs to updatable\n\t// view, but direct check that blob is fully materialized should be\n\t// more future proof.\n\t// ASF: Blob ID could now be stored in any descriptor of parameters or\n\t// variables. - 2007-03-24\n\n\tif (request)\n\t{\n\t\tif (transaction-&gt;tra_blobs-&gt;locate(blob_temp_id))\n\t\t{\n\t\t\tBlobIndex* current = &amp;transaction-&gt;tra_blobs-&gt;current();\n\t\t\tif (current-&gt;bli_materialized)\n\t\t\t{\n\t\t\t\t// Delete BLOB from request owned blob list\n\t\t\t\tRequest* blob_request = current-&gt;bli_request;\n\t\t\t\tif (blob_request)\n\t\t\t\t{\n\t\t\t\t\tif (blob_request-&gt;req_blobs.locate(blob_temp_id)) {\n\t\t\t\t\t\tblob_request-&gt;req_blobs.fastRemove();\n\t\t\t\t\t}\n\t\t\t\t\telse\n\t\t\t\t\t{\n\t\t\t\t\t\t// We should never get here because when bli_request is assigned\n\t\t\t\t\t\t// item should be added to req_blobs array\n\t\t\t\t\t\tfb_assert(false);\n\t\t\t\t\t}\n\t\t\t\t}\n\n\t\t\t\t// Free materialized blob handle\n\t\t\t\ttransaction-&gt;tra_blobs-&gt;fastRemove();\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\t// But even in bad case when we cannot free blob immediately\n\t\t\t\t// we may still bind lifetime of blob to current top level request.\n\t\t\t\tif (!current-&gt;bli_request)\n\t\t\t\t{\n\t\t\t\t\tRequest* blob_request = request;\n\t\t\t\t\twhile (blob_request-&gt;req_caller)\n\t\t\t\t\t\tblob_request = blob_request-&gt;req_caller;\n\n\t\t\t\t\tcurrent-&gt;bli_request = blob_request;\n\t\t\t\t\tcurrent-&gt;bli_request-&gt;req_blobs.add(blob_temp_id);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n}\n\n\nstatic void move_to_string(thread_db* tdbb, dsc* fromDesc, dsc* toDesc)\n{\n/**************************************\n *\n *      m o v e _ t o _ s t r i n g\n *\n **************************************\n *\n * Functional description\n *      Perform an assignment from a blob to another datatype.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tfb_assert(DTYPE_IS_BLOB_OR_QUAD(fromDesc-&gt;dsc_dtype));\n\tfb_assert(!DTYPE_IS_BLOB_OR_QUAD(toDesc-&gt;dsc_dtype));\n\n\tdsc blobAsText;\n\tblobAsText.dsc_dtype = dtype_text;\n\n\tif (DTYPE_IS_TEXT(toDesc-&gt;dsc_dtype))\n\t\tblobAsText.dsc_ttype() = toDesc-&gt;dsc_ttype();\n\telse\n\t\tblobAsText.dsc_ttype() = ttype_ascii;\n\n\tRequest* request = tdbb-&gt;getRequest();\n\tjrd_tra* transaction = request ? request-&gt;req_transaction : tdbb-&gt;getTransaction();\n\ttransaction = transaction-&gt;getOuter();\n\n\tUCharBuffer bpb;\n\tBLB_gen_bpb_from_descs(fromDesc, &amp;blobAsText, bpb);\n\n\tblb* blob = blb::open2(tdbb, transaction,\n\t\t(bid*) fromDesc-&gt;dsc_address, bpb.getCount(), bpb.begin());\n\n\tconst CharSet* fromCharSet = INTL_charset_lookup(tdbb, fromDesc-&gt;dsc_scale);\n\tconst CharSet* toCharSet = INTL_charset_lookup(tdbb, INTL_GET_CHARSET(&amp;blobAsText));\n\n\tHalfStaticArray&lt;UCHAR, BUFFER_SMALL&gt; buffer;\n\tbuffer.getBuffer((blob-&gt;blb_length / fromCharSet-&gt;minBytesPerChar()) * toCharSet-&gt;maxBytesPerChar());\n\tconst ULONG len = blob-&gt;BLB_get_data(tdbb, buffer.begin(), buffer.getCapacity(), true);\n\n\tif (len &gt; MAX_STR_SIZE)\n\t\tERR_post(Arg::Gds(isc_arith_except) &lt;&lt; Arg::Gds(isc_blob_truncation));\n\n\tblobAsText.dsc_address = buffer.begin();\n\tblobAsText.dsc_length = (USHORT) len;\n\n\tMOV_move(tdbb, &amp;blobAsText, toDesc);\n}\n\n\n// Release a blob and associated blocks. Among other things, disconnect it from the transaction.\n// However, if purge_flag is false, then only release the associated blocks.\nvoid blb::destroy(const bool purge_flag)\n{\n\t// Disconnect blob from transaction block.\n\n\tif (purge_flag)\n\t{\n\t\tif (blb_transaction-&gt;tra_blobs-&gt;locate(blb_temp_id))\n\t\t{\n\t\t\tRequest* blob_request = blb_transaction-&gt;tra_blobs-&gt;current().bli_request;\n\n\t\t\tif (blob_request)\n\t\t\t{\n\t\t\t\tif (blob_request-&gt;req_blobs.locate(blb_temp_id))\n\t\t\t\t\tblob_request-&gt;req_blobs.fastRemove();\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\t// We should never get here because when bli_request is assigned\n\t\t\t\t\t// item should be added to req_blobs array\n\t\t\t\t\tfb_assert(false);\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tblb_transaction-&gt;tra_blobs-&gt;fastRemove();\n\t\t}\n\t\telse\n\t\t{\n\t\t\t// We should never get here because allocate_blob stores each blob object\n\t\t\t// in tra_blobs\n\t\t\tfb_assert(false);\n\t\t}\n\n\t\tif (blb_interface)\n\t\t\tblb_interface-&gt;clearHandle();\n\t}\n\n\tdelete blb_pages;\n\tblb_pages = NULL;\n\n\tif ((blb_flags &amp; BLB_temporary) &amp;&amp; blb_temp_size &gt; 0)\n\t{\n\t\tblb_transaction-&gt;getBlobSpace()-&gt;releaseSpace(blb_temp_offset, blb_temp_size);\n\t}\n\n\tdelete this;\n}\n\n\nstatic void slice_callback(array_slice* arg, ULONG /*count*/, DSC* descriptors)\n{\n/**************************************\n *\n *      s l i c e _ c a l l b a c k\n *\n **************************************\n *\n * Functional description\n *      Perform slice assignment.\n *\n **************************************/\n\tthread_db* tdbb = JRD_get_thread_data();\n\n\tdsc* array_desc = descriptors;\n\tdsc* slice_desc = &amp;arg-&gt;slice_desc;\n\tBLOB_PTR* const next = slice_desc-&gt;dsc_address + arg-&gt;slice_element_length;\n\n\tif (next &gt; arg-&gt;slice_end)\n\t\tERR_post(Arg::Gds(isc_out_of_bounds));\n\n\tif (array_desc-&gt;dsc_address &lt; arg-&gt;slice_base)\n\t\tERR_error(198);\t\t\t// msg 198 array subscript computation error\n\n\tif (arg-&gt;slice_direction == array_slice::slc_writing_array)\n\t{\n\t\t// Storing INTO array\n\t\t// FROM slice_desc TO array_desc\n\n\t\t// If storing beyond the high-water mark, ensure elements\n\t\t// from the high-water mark to current position are zeroed\n\n\t\t// Since we are only initializing, it makes sense to throw away\n\t\t// the constness of arg-&gt;slice_high_water.\n\t\tconst SLONG l = array_desc-&gt;dsc_address - arg-&gt;slice_high_water;\n\t\tif (l &gt; 0)\n\t\t\tmemset(const_cast&lt;BLOB_PTR*&gt;(arg-&gt;slice_high_water), 0, l);\n\n\t\t// The individual elements of a varying string array may not be aligned\n\t\t// correctly.  If they aren&#x27;t, some RISC machines may break.  In those\n\t\t// cases, calculate the actual length and then move the length and text manually.\n\n\t\tif (array_desc-&gt;dsc_dtype == dtype_varying &amp;&amp;\n\t\t\tarray_desc-&gt;dsc_address !=\n\t\t\t\tFB_ALIGN(array_desc-&gt;dsc_address, (MIN(sizeof(USHORT), FB_ALIGNMENT))))\n\t\t{\n\t\t\t// Note: cannot remove this JRD_get_thread_data without api change\n\t\t\t// to slice callback routines\n\t\t\t/*thread_db* tdbb = */ JRD_get_thread_data();\n\n\t\t\tDynamicVaryStr&lt;1024&gt; tmp_buffer;\n\t\t\tconst USHORT tmp_len = array_desc-&gt;dsc_length;\n\t\t\tconst char* p;\n\t\t\tconst USHORT len = MOV_make_string(tdbb, slice_desc, INTL_TEXT_TYPE(*array_desc), &amp;p,\n\t\t\t\t\t\t\t\t\t\t\t   tmp_buffer.getBuffer(tmp_len), tmp_len);\n\t\t\tmemcpy(array_desc-&gt;dsc_address, &amp;len, sizeof(USHORT));\n\t\t\tmemcpy(array_desc-&gt;dsc_address + sizeof(USHORT), p, (int) len);\n\t\t}\n\t\telse\n\t\t{\n\t\t\tMOV_move(tdbb, slice_desc, array_desc);\n\t\t}\n\t\tconst BLOB_PTR* const end = array_desc-&gt;dsc_address + array_desc-&gt;dsc_length;\n\t\tif (end &gt; arg-&gt;slice_high_water)\n\t\t\targ-&gt;slice_high_water = end;\n\t}\n\telse\n\t{\n\t\t// Fetching FROM array\n\t\t// FROM array_desc TO slice_desc\n\n\t\t// If the element is under the high-water mark, fetch it,\n\t\t// otherwise just zero it\n\n\t\tif (array_desc-&gt;dsc_address &lt; arg-&gt;slice_high_water)\n\t\t{\n\t\t\t// If a varying string isn&#x27;t aligned correctly, calculate the actual\n\t\t\t// length and then treat the string as if it had type text.\n\n\t\t\tif (array_desc-&gt;dsc_dtype == dtype_varying &amp;&amp;\n\t\t\t\tarray_desc-&gt;dsc_address !=\n\t\t\t\t\tFB_ALIGN(array_desc-&gt;dsc_address, (MIN(sizeof(USHORT), FB_ALIGNMENT))))\n\t\t\t{\n\t\t\t    // temp_desc will vanish at the end of the block, but it&#x27;s used\n\t\t\t    // only as a way to transfer blocks of memory.\n\t\t\t\tdsc temp_desc;\n\t\t\t\ttemp_desc.dsc_dtype = dtype_text;\n\t\t\t\ttemp_desc.dsc_sub_type = array_desc-&gt;dsc_sub_type;\n\t\t\t\ttemp_desc.dsc_scale = array_desc-&gt;dsc_scale;\n\t\t\t\ttemp_desc.dsc_flags = array_desc-&gt;dsc_flags;\n\t\t\t\tmemcpy(&amp;temp_desc.dsc_length, array_desc-&gt;dsc_address, sizeof(USHORT));\n\t\t\t\ttemp_desc.dsc_address = array_desc-&gt;dsc_address + sizeof(USHORT);\n\t\t\t\tMOV_move(tdbb, &amp;temp_desc, slice_desc);\n\t\t\t}\n\t\t\telse\n\t\t\t\tMOV_move(tdbb, array_desc, slice_desc);\n\t\t\t++arg-&gt;slice_count;\n\t\t}\n\t\telse\n\t\t{\n\t\t    const SLONG l = slice_desc-&gt;dsc_length;\n\t\t\tif (l)\n\t\t\t\tmemset(slice_desc-&gt;dsc_address, 0, l);\n\t\t}\n\t}\n\n\tslice_desc-&gt;dsc_address = next;\n}\n\n\nstatic blb* store_array(thread_db* tdbb, jrd_tra* transaction, bid* blob_id)\n{\n/**************************************\n *\n *      s t o r e _ a r r a y\n *\n **************************************\n *\n * Functional description\n *      Actually store an array.  Oh boy!\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\t// Validate array\n\n\tconst ArrayField* array = find_array(transaction, blob_id);\n\tif (!array)\n\t\treturn NULL;\n\n\t// Create blob for array\n\n\tblb* blob = blb::create2(tdbb, transaction, blob_id, 0, NULL);\n\tblob-&gt;blb_flags |= BLB_stream;\n\n\t// Write out array descriptor\n\n\tblob-&gt;BLB_put_segment(tdbb, reinterpret_cast&lt;const UCHAR*&gt;(&amp;array-&gt;arr_desc),\n\t\t\t\t\tarray-&gt;arr_desc.iad_length);\n\n\t// Write out actual array\n\tconstexpr USHORT seg_limit = 32768;\n\tconst BLOB_PTR* p = array-&gt;arr_data;\n\tSLONG length = array-&gt;arr_effective_length;\n\twhile (length &gt; seg_limit)\n\t{\n\t\tblob-&gt;BLB_put_segment(tdbb, p, seg_limit);\n\t\tlength -= seg_limit;\n\t\tp += seg_limit;\n\t}\n\n\tif (length)\n\t\tblob-&gt;BLB_put_segment(tdbb, p, (USHORT) length);\n\n\tblob-&gt;BLB_close(tdbb);\n\n\treturn blob;\n}\n\nvoid blb::fromPageHeader(const Ods::blh* header)\n{\n\tblb_lead_page = header-&gt;blh_lead_page;\n\tblb_max_sequence = header-&gt;blh_max_sequence;\n\tblb_count = header-&gt;blh_count;\n\tblb_length = header-&gt;blh_length;\n\tblb_max_segment = header-&gt;blh_max_segment;\n\tblb_level = header-&gt;blh_level;\n\tblb_sub_type = header-&gt;blh_sub_type;\n\tblb_charset = header-&gt;blh_charset;\n#ifdef CHECK_BLOB_FIELD_ACCESS_FOR_SELECT\n\tblb_fld_id = header-&gt;blh_fld_id;\n#endif\n}\n\nvoid blb::toPageHeader(Ods::blh* header) const\n{\n\theader-&gt;blh_lead_page = blb_lead_page;\n\theader-&gt;blh_max_sequence = blb_max_sequence;\n\theader-&gt;blh_count = blb_count;\n\theader-&gt;blh_max_segment = blb_max_segment;\n\theader-&gt;blh_length = blb_length;\n\theader-&gt;blh_level = blb_level;\n\theader-&gt;blh_sub_type = blb_sub_type;\n\theader-&gt;blh_charset = blb_charset;\n#ifdef CHECK_BLOB_FIELD_ACCESS_FOR_SELECT\n\theader-&gt;blh_fld_id = blb_fld_id;\n#endif\n}\n\n// Used by DPM_get_blob\nvoid blb::getFromPage(USHORT length, const UCHAR* data)\n{\n\tif (blb_level == 0)\n\t{\n\t\tblb_space_remaining = length - BLH_SIZE;\n\t\tif (length)\n\t\t\tmemcpy(getBuffer(), data, length);\n\t}\n\telse\n\t{\n\t\tif (!blb_pages)\n\t\t\tblb_pages = vcl::newVector(*blb_transaction-&gt;tra_pool, 0);\n\t\tfb_assert(length % sizeof(ULONG) == 0);\n\t\tblb_pages-&gt;resize(length / sizeof(ULONG));\n\t\tmemcpy(blb_pages-&gt;memPtr(), data, length);\n\t}\n}\n\n// Used by DPM_store_blob\nvoid blb::storeToPage(USHORT* length, Firebird::Array&lt;UCHAR&gt;&amp; buffer, const UCHAR** data, void* stack)\n{\n\tif (blb_level == 0)\n\t{\n\t\t*length = blb_clump_size - blb_space_remaining;\n\n\t\tif (!hasBuffer())\n\t\t{\n\t\t\tif (blb_temp_size &gt; 0)\n\t\t\t{\n\t\t\t\tblb_transaction-&gt;getBlobSpace()-&gt;read(\n\t\t\t\t\tblb_temp_offset, buffer.getBuffer(blb_temp_size), blb_temp_size);\n\t\t\t\t*data = buffer.begin();\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tfb_assert(*length == 0);\n\t\t\t\t*data = NULL;\n\t\t\t}\n\t\t}\n\t\telse\n\t\t\t*data = getBuffer();\n\n\t\tif (*data)\n\t\t\t*data = (UCHAR*) ((blob_page*) *data)-&gt;blp_page;\n\t}\n\telse\n\t{\n\t\t// CVC: Sorry, but I couldn&#x27;t use PageStack in blb.h without bringing several headers,\n\t\t// so I resorted to void* for the param declaration.\n\t\tPageStack&amp; stack2 = *static_cast&lt;PageStack*&gt;(stack);\n\t\t*length = static_cast&lt;USHORT&gt;(blb_pages-&gt;count() * sizeof(ULONG));\n\t\t*data = (UCHAR*) blb_pages-&gt;begin();\n\n\t\t// Figure out precedence pages, if any\n\t\t// hvlad: no need to maintain precedence for temporary data\n\t\tif (!PageSpace::isTemporary(blb_pg_space_id))\n\t\t{\n\t\t\tvcl::const_iterator ptr, end;\n\t\t\tfor (ptr = blb_pages-&gt;begin(), end = blb_pages-&gt;end(); ptr &lt; end; ++ptr)\n\t\t\t{\n\t\t\t\tstack2.push(PageNumber(blb_pg_space_id, *ptr));\n\t\t\t}\n\t\t}\n\t}\n}\n\nvoid blb::BLB_cancel()\n{\n\tBLB_cancel(JRD_get_thread_data());\n}\n"}, "/build/src/jrd/ResultSet.cpp": {"id": "/build/src/jrd/ResultSet.cpp", "filePath": "src/jrd/ResultSet.cpp", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Adriano dos Santos Fernandes\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Adriano dos Santos Fernandes &lt;adrianosf@uol.com.br&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#include &quot;../jrd/ResultSet.h&quot;\n#include &quot;../jrd/PreparedStatement.h&quot;\n#include &quot;../jrd/align.h&quot;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/req.h&quot;\n#include &quot;../dsql/dsql.h&quot;\n#include &quot;firebird/impl/sqlda_pub.h&quot;\n#include &quot;../dsql/dsql_proto.h&quot;\n#include &quot;../jrd/mov_proto.h&quot;\n\nusing namespace Firebird;\n\nnamespace Jrd {\n\n\nResultSet::ResultSet(thread_db* tdbb, PreparedStatement* aStmt, jrd_tra* aTransaction)\n\t: stmt(aStmt),\n\t  transaction(aTransaction),\n\t  firstFetchDone(false)\n{\n\tstmt-&gt;open(tdbb, transaction);\n\tstmt-&gt;resultSet = this;\n}\n\n\nResultSet::~ResultSet()\n{\n\tif (!stmt)\n\t\treturn;\n\n\tthread_db* tdbb = JRD_get_thread_data();\n\n\tstmt-&gt;resultSet = NULL;\n\n\tif (stmt-&gt;dsqlRequest-&gt;getDsqlStatement()-&gt;getType() != DsqlStatement::TYPE_EXEC_PROCEDURE)\n\t\tDSQL_free_statement(tdbb, stmt-&gt;dsqlRequest, DSQL_close);\n}\n\n\nbool ResultSet::fetch(thread_db* tdbb)\n{\n\tif (stmt-&gt;dsqlRequest-&gt;getDsqlStatement()-&gt;getType() == DsqlStatement::TYPE_EXEC_PROCEDURE &amp;&amp;\n\t\tfirstFetchDone)\n\t{\n\t\treturn false;\n\t}\n\n\tmemset(stmt-&gt;outMessage.begin(), 0, stmt-&gt;outMessage.getCount());\n\n\tif (!stmt-&gt;dsqlRequest-&gt;fetch(tdbb, stmt-&gt;outMessage.begin()))\n\t\treturn false;\n\n\tif (stmt-&gt;builder)\n\t\tstmt-&gt;builder-&gt;moveFromResultSet(tdbb, this);\n\n\tfirstFetchDone = true;\n\n\treturn true;\n}\n\n\nbool ResultSet::isNull(unsigned param) const\n{\n\tfb_assert(param &gt; 0);\n\n\tconst dsc* desc = &amp;stmt-&gt;outValues[(param - 1) * 2 + 1];\n\tfb_assert(desc-&gt;dsc_dtype == dtype_short);\n\n\treturn *reinterpret_cast&lt;SSHORT*&gt;(desc-&gt;dsc_address) != 0;\n}\n\n\ndsc&amp; ResultSet::getDesc(unsigned param)\n{\n\tfb_assert(param &gt; 0);\n\treturn stmt-&gt;outValues[(param - 1) * 2];\n}\n\n\nFirebird::string ResultSet::getString(thread_db* tdbb, unsigned param)\n{\n\tfb_assert(param &gt; 0);\n\n\tRequest* request = stmt-&gt;getDsqlRequest()-&gt;getRequest();\n\n\t// Setup tdbb info necessary for blobs.\n\tAutoSetRestore2&lt;Request*, thread_db&gt; autoRequest(\n\t\ttdbb, &amp;thread_db::getRequest, &amp;thread_db::setRequest, request);\n\tAutoSetRestore&lt;jrd_tra*&gt; autoRequestTrans(&amp;request-&gt;req_transaction,\n\t\ttdbb-&gt;getTransaction());\n\n\treturn MOV_make_string2(tdbb, &amp;getDesc(param), CS_NONE);\n}\n\n\nMetaName ResultSet::getMetaName(thread_db* tdbb, unsigned param)\n{\n\treturn getString(tdbb, param);\n}\n\n\nFirebird::MetaString ResultSet::getMetaString(thread_db* tdbb, unsigned param)\n{\n\treturn getString(tdbb, param);\n}\n\n\nvoid ResultSet::moveDesc(thread_db* tdbb, unsigned param, dsc&amp; desc)\n{\n\tfb_assert(param &gt; 0);\n\n\tRequest* request = stmt-&gt;getDsqlRequest()-&gt;getRequest();\n\n\t// Setup tdbb info necessary for blobs.\n\tAutoSetRestore2&lt;Request*, thread_db&gt; autoRequest(\n\t\ttdbb, &amp;thread_db::getRequest, &amp;thread_db::setRequest, request);\n\tAutoSetRestore&lt;jrd_tra*&gt; autoRequestTrans(&amp;request-&gt;req_transaction,\n\t\ttdbb-&gt;getTransaction());\n\n\tMOV_move(tdbb, &amp;getDesc(param), &amp;desc);\n}\n\n\n}\t// namespace\n"}, "/build/src/jrd/mov.cpp": {"id": "/build/src/jrd/mov.cpp", "filePath": "src/jrd/mov.cpp", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tmov.cpp\n *\tDESCRIPTION:\tData mover and converter and comparator, etc.\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.08.21 Dmitry Yemanov: fixed bug with a buffer overrun,\n *                            which at least caused invalid dependencies\n *                            to be stored (DB$xxx, for example)\n * Adriano dos Santos Fernandes\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../common/classes/VaryStr.h&quot;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/val.h&quot;\n#include &quot;../jrd/intl.h&quot;\n#include &quot;../jrd/blb_proto.h&quot;\n#include &quot;../jrd/blb.h&quot;\n#include &quot;../jrd/cvt_proto.h&quot;\n#include &quot;../common/cvt.h&quot;\n#include &quot;../jrd/cvt2_proto.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/intl_proto.h&quot;\n#include &quot;../jrd/mov_proto.h&quot;\n\nusing namespace Firebird;\n\nint MOV_compare(Jrd::thread_db* tdbb, const dsc* arg1, const dsc* arg2)\n{\n/**************************************\n *\n *\tM O V _ c o m p a r e\n *\n **************************************\n *\n * Functional description\n *\tCompare two descriptors.  Return (-1, 0, 1) if a&lt;b, a=b, or a&gt;b.\n *\n **************************************/\n\tfb_assert(!(arg1-&gt;dsc_flags &amp; DSC_null));\n\tfb_assert(!(arg2-&gt;dsc_flags &amp; DSC_null));\n\n\treturn CVT2_compare(arg1, arg2, tdbb-&gt;getAttachment()-&gt;att_dec_status);\n}\n\n\ndouble MOV_date_to_double(const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ d a t e _ t o _ d o u b l e\n *\n **************************************\n *\n * Functional description\n *    Convert a date to double precision for\n *    date arithmetic routines.\n *\n **************************************/\n\n\treturn CVT_date_to_double(desc);\n}\n\nvoid MOV_double_to_date(double real, SLONG fixed[2])\n{\n/**************************************\n *\n *\tM O V _ d o u b l e _ t o _ d a t e\n *\n **************************************\n *\n * Functional description\n *\tConvert a double precision representation of a date\n *\tto a fixed point representation.   Double is used for\n *      date arithmetic.\n *\n **************************************/\n\n\tCVT_double_to_date(real, fixed);\n}\n\n\n// Get the value of a boolean descriptor.\nbool MOV_get_boolean(const dsc* desc)\n{\n\treturn CVT_get_boolean(desc, ERR_post);\n}\n\n\ndouble MOV_get_double(Jrd::thread_db* tdbb, const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ d o u b l e\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a double precision number\n *\n **************************************/\n\n\treturn CVT_get_double(desc, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nSLONG MOV_get_long(Jrd::thread_db* tdbb, const dsc* desc, SSHORT scale)\n{\n/**************************************\n *\n *\tM O V _ g e t _ l o n g\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a long (32 bit) integer of given\n *\tscale.\n *\n **************************************/\n\n\treturn CVT_get_long(desc, scale, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nSINT64 MOV_get_int64(Jrd::thread_db* tdbb, const dsc* desc, SSHORT scale)\n{\n/**************************************\n *\n *\tM O V _ g e t _ i n t 6 4\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a 64 bit integer of given\n *\tscale.\n *\n **************************************/\n\n\treturn CVT_get_int64(desc, scale, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nvoid MOV_get_metaname(Jrd::thread_db* tdbb, const dsc* desc, Jrd::MetaName&amp; name)\n{\n/**************************************\n *\n *\tM O V _ g e t _ m e t a n a m e\n *\n **************************************\n *\n * Functional description\n *\tCopy string, which will afterward&#x27;s\n *\tbe treated as a metadata name value,\n *\tto the user-supplied object.\n *\n **************************************/\n\n\tVaryStr&lt;MAX_SQL_IDENTIFIER_SIZE&gt; temp;\n\tconst char* str = NULL;\n\tconst auto len = MOV_make_string(tdbb, desc, ttype_metadata, &amp;str,\n\t\t\t\t\t\t\t\t\t &amp;temp, MAX_SQL_IDENTIFIER_SIZE);\n\tname.assign(str, len);\n}\n\n\nSQUAD MOV_get_quad(Jrd::thread_db* tdbb, const dsc* desc, SSHORT scale)\n{\n/**************************************\n *\n *\tM O V _ g e t _ q u a d\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a quad\n *\tNote: a quad is NOT the same as a 64 bit integer\n *\n **************************************/\n\n\treturn CVT_get_quad(desc, scale, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nint MOV_get_string_ptr(Jrd::thread_db* tdbb,\n\t\t\t\t\t   const dsc* desc,\n\t\t\t\t\t   USHORT* ttype,\n\t\t\t\t\t   UCHAR** address, vary* temp, USHORT length)\n{\n/**************************************\n *\n *\tM O V _ g e t _ s t r i n g _ p t r\n *\n **************************************\n *\n * Functional description\n *\tGet address and length of string, converting the value to\n *\tstring, if necessary.  The caller must provide a sufficiently\n *\tlarge temporary.  The address of the resultant string is returned\n *\tby reference.  Get_string returns the length of the string.\n *\n *\tNote: If the descriptor is known to be a string type, the third\n *\targument (temp buffer) may be omitted.\n *\n **************************************/\n\n\treturn CVT_get_string_ptr(desc, ttype, address, temp, length, tdbb-&gt;getAttachment()-&gt;att_dec_status);\n}\n\n\nint MOV_get_string(Jrd::thread_db* tdbb, const dsc* desc, UCHAR** address, vary* temp, USHORT length)\n{\n/**************************************\n *\n *\tM O V _ g e t _ s t r i n g\n *\n **************************************\n *\n * Functional description\n *\n **************************************/\n\tUSHORT ttype;\n\n\treturn MOV_get_string_ptr(tdbb, desc, &amp;ttype, address, temp, length);\n}\n\n\nvoid MOV_get_string(Jrd::thread_db* tdbb, const dsc* desc, string&amp; str)\n{\n\tVaryStr&lt;MAX_SQL_IDENTIFIER_SIZE&gt; temp;\n\tconst char* strPtr = NULL;\n\tconst auto len = MOV_make_string(tdbb, desc, ttype_metadata, &amp;strPtr, &amp;temp, MAX_SQL_IDENTIFIER_SIZE);\n\tstr.assign(strPtr, len);\n}\n\n\nGDS_DATE MOV_get_sql_date(const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ s q l _ d a t e\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a SQL date\n *\n **************************************/\n\n\treturn CVT_get_sql_date(desc);\n}\n\n\nGDS_TIME MOV_get_sql_time(const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ s q l _ t i m e\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a SQL time\n *\n **************************************/\n\n\treturn CVT_get_sql_time(desc);\n}\n\n\nISC_TIME_TZ MOV_get_sql_time_tz(const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ s q l _ t i m e _ t z\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a SQL time with time zone\n *\n **************************************/\n\n\treturn CVT_get_sql_time_tz(desc);\n}\n\n\nGDS_TIMESTAMP MOV_get_timestamp(const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ t i m e s t a m p\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a timestamp\n *\n **************************************/\n\n\treturn CVT_get_timestamp(desc);\n}\n\n\nISC_TIMESTAMP_TZ MOV_get_timestamp_tz(const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ t i m e s t a m p _ t z\n *\n **************************************\n *\n * Functional description\n *\tConvert something arbitrary to a timestamp with time zone\n *\n **************************************/\n\n\treturn CVT_get_timestamp_tz(desc);\n}\n\n\nUSHORT MOV_make_string(Jrd::thread_db* tdbb,\n\t\t\t\t\tconst dsc*\t desc,\n\t\t\t\t\tUSHORT\t     ttype,\n\t\t\t\t\tconst char** address,\n\t\t\t\t\tvary*\t     temp,\n\t\t\t\t\tUSHORT\t     length)\n{\n/**************************************\n *\n *\tM O V _ m a k e _ s t r i n g\n *\n **************************************\n *\n * Functional description\n *\tMake a string, in a specified text type, out of a descriptor.\n *\tThe caller must provide a sufficiently\n *\tlarge temporary.  The address of the resultant string is returned\n *\tby reference.\n *\tMOV_make_string returns the length of the string in bytes.\n *\n *\tNote: If the descriptor is known to be a string type in the\n *\tgiven ttype the argument (temp buffer) may be omitted.\n *\tBut this would be a bad idea in general.\n *\n **************************************/\n\n\treturn CVT_make_string(desc, ttype, address, temp, length, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nULONG MOV_make_string2(Jrd::thread_db* tdbb,\n\t\t\t\t\t const dsc* desc,\n\t\t\t\t\t USHORT ttype,\n\t\t\t\t\t UCHAR** address,\n\t\t\t\t\t Jrd::MoveBuffer&amp; buffer,\n\t\t\t\t\t bool limit)\n{\n/**************************************\n *\n *\tM O V _ m a k e _ s t r i n g 2\n *\n **************************************\n *\n * Functional description\n *\tMake a string, in a specified text type, out of a descriptor.\n *\tThe address of the resultant string is returned by reference.\n *\tMOV_make_string2 returns the length of the string in bytes.\n *\n **************************************/\n\n\tif (desc-&gt;isBlob())\n\t{\n\t\t// fake descriptor\n\t\tdsc temp;\n\t\ttemp.dsc_dtype = dtype_text;\n\t\ttemp.setTextType(ttype);\n\n\t\tFirebird::UCharBuffer bpb;\n\t\tBLB_gen_bpb_from_descs(desc, &amp;temp, bpb);\n\n\t\tJrd::blb* blob = Jrd::blb::open2(tdbb, tdbb-&gt;getRequest()-&gt;req_transaction,\n\t\t\treinterpret_cast&lt;Jrd::bid*&gt;(desc-&gt;dsc_address), bpb.getCount(), bpb.begin());\n\n\t\tULONG size;\n\n\t\tif (temp.getCharSet() == desc-&gt;getCharSet())\n\t\t{\n\t\t\tsize = blob-&gt;blb_length;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tsize = (blob-&gt;blb_length / INTL_charset_lookup(tdbb, desc-&gt;getCharSet())-&gt;minBytesPerChar()) *\n\t\t\t\tINTL_charset_lookup(tdbb, temp.getCharSet())-&gt;maxBytesPerChar();\n\t\t}\n\n\t\t*address = buffer.getBuffer(size);\n\n\t\tsize = blob-&gt;BLB_get_data(tdbb, *address, size, true);\n\n\t\tif (limit &amp;&amp; size &gt; MAX_COLUMN_SIZE)\n\t\t{\n\t\t\tERR_post(Arg::Gds(isc_arith_except) &lt;&lt;\n\t\t\t\t\t Arg::Gds(isc_blob_truncation));\n\t\t}\n\n\t\treturn size;\n\t}\n\n\treturn CVT2_make_string2(desc, ttype, address, buffer, tdbb-&gt;getAttachment()-&gt;att_dec_status);\n}\n\n\nFirebird::string MOV_make_string2(Jrd::thread_db* tdbb, const dsc* desc, USHORT ttype, bool limit)\n{\n\tJrd::MoveBuffer buffer;\n\tUCHAR* ptr;\n\tint len = MOV_make_string2(tdbb, desc, ttype, &amp;ptr, buffer, limit);\n\n\treturn string((const char*) ptr, len);\n}\n\n\nvoid MOV_move(Jrd::thread_db* tdbb, /*const*/ dsc* from, dsc* to, bool trustedSource)\n{\n/**************************************\n *\n *\tM O V _ m o v e\n *\n **************************************\n *\n * Functional description\n *\tMove (and possible convert) something to something else.\n *\n **************************************/\n\n\tif (DTYPE_IS_BLOB_OR_QUAD(from-&gt;dsc_dtype) || DTYPE_IS_BLOB_OR_QUAD(to-&gt;dsc_dtype))\n\t\tJrd::blb::move(tdbb, from, to);\n\telse\n\t\tCVT_move_common(from, to, tdbb-&gt;getAttachment()-&gt;att_dec_status, &amp;Jrd::EngineCallbacks::instance, trustedSource);\n}\n\n\nDecimal64 MOV_get_dec64(Jrd::thread_db* tdbb, const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ d e c 6 4\n *\n **************************************/\n\n\treturn CVT_get_dec64(desc, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nDecimal128 MOV_get_dec128(Jrd::thread_db* tdbb, const dsc* desc)\n{\n/**************************************\n *\n *\tM O V _ g e t _ d e c 1 2 8\n *\n **************************************/\n\n\treturn CVT_get_dec128(desc, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nInt128 MOV_get_int128(Jrd::thread_db* tdbb, const dsc* desc, SSHORT scale)\n{\n/**************************************\n *\n *\tM O V _ g e t _ d e c _ f i x e d\n *\n **************************************/\n\n\treturn CVT_get_int128(desc, scale, tdbb-&gt;getAttachment()-&gt;att_dec_status, ERR_post);\n}\n\n\nnamespace Jrd\n{\n\nDescPrinter::DescPrinter(thread_db* tdbb, const dsc* desc, FB_SIZE_T mLen, USHORT charSetId)\n\t: maxLen(mLen)\n{\n\tconst char* const NULL_KEY_STRING = &quot;NULL&quot;;\n\n\tif (!desc)\n\t{\n\t\tvalue = NULL_KEY_STRING;\n\t\treturn;\n\t}\n\n\tfb_assert(!desc-&gt;isBlob());\n\n\tconst bool isBinary = (desc-&gt;isText() &amp;&amp; desc-&gt;getCharSet() == CS_BINARY);\n\tvalue = MOV_make_string2(tdbb, desc, isBinary ? CS_BINARY : charSetId);\n\n\tconst char* const str = value.c_str();\n\n\tif (desc-&gt;isText() || desc-&gt;isDateTime())\n\t{\n\t\tif (desc-&gt;dsc_dtype == dtype_text)\n\t\t{\n\t\t\tconst char* const pad = (desc-&gt;getCharSet() == CS_BINARY) ? &quot;\\0&quot; : &quot; &quot;;\n\t\t\tvalue.rtrim(pad);\n\t\t}\n\n\t\tif (isBinary)\n\t\t{\n\t\t\tFB_SIZE_T len = value.length();\n\t\t\tconst bool cut = (len &gt; (maxLen - 3) / 2);\t// 3 is a length of enclosing symbols: x&#x27; and &#x27;\n\t\t\tif (cut)\n\t\t\t\tlen = (maxLen - 5) / 2;\t\t\t\t\t// 5 is a length of enclosing symbols: x&#x27; and ...\n\n\t\t\tstring hex;\n\t\t\thex.reserve(2 * len);\t\t\t\t\t\t// each raw byte represented by 2 chars in string\n\n\t\t\tchar s[3];\n\t\t\tfor (FB_SIZE_T i = 0; i &lt; len; i++)\n\t\t\t{\n\t\t\t\tsnprintf(s, sizeof(s), &quot;%02X&quot;, (int)(unsigned char) str[i]);\n\t\t\t\thex.append(s);\n\t\t\t}\n\t\t\tvalue = &quot;x&#x27;&quot; + hex + (cut ? &quot;...&quot; : &quot;&#x27;&quot;);\n\t\t}\n\t\telse\n\t\t\tvalue = &quot;&#x27;&quot; + value + &quot;&#x27;&quot;;\n\t}\n\n\tif (value.length() &gt; maxLen)\n\t{\n\t\tfb_assert(desc-&gt;isText());\n\n\t\tvalue.resize(maxLen);\n\n\t\tconst CharSet* const cs = INTL_charset_lookup(tdbb, charSetId);\n\n\t\twhile (value.hasData() &amp;&amp; !cs-&gt;wellFormed(value.length(), (const UCHAR*) value.c_str()))\n\t\t\tvalue.resize(value.length() - 1);\n\n\t\tvalue += &quot;...&quot;;\n\t}\n}\n\n}\t// namespace Jrd\n"}, "/build/src/jrd/EngineInterface.h": {"id": "/build/src/jrd/EngineInterface.h", "filePath": "src/jrd/EngineInterface.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2011 Alex Peshkov &lt;peshkoff@mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef JRD_ENGINE_INTERFACE_H\n#define JRD_ENGINE_INTERFACE_H\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n#include &quot;../common/StatementMetadata.h&quot;\n#include &quot;../common/classes/RefCounted.h&quot;\n\nnamespace Jrd {\n\n// Engine objects used by interface objects\nclass blb;\nclass jrd_tra;\nclass DsqlCursor;\nclass DsqlBatch;\nclass DsqlRequest;\nclass Statement;\nclass StableAttachmentPart;\nclass Attachment;\nclass Service;\nclass UserId;\nclass Applier;\n\n// forward declarations\nclass JStatement;\nclass JAttachment;\nclass JProvider;\n\nclass JBlob final :\n\tpublic Firebird::RefCntIface&lt;Firebird::IBlobImpl&lt;JBlob, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\t// IBlob implementation\n\tint release() override;\n\tvoid getInfo(Firebird::CheckStatusWrapper* status,\n\t\tunsigned int itemsLength, const unsigned char* items,\n\t\tunsigned int bufferLength, unsigned char* buffer) override;\n\tint getSegment(Firebird::CheckStatusWrapper* status, unsigned int length, void* buffer,\n\t\tunsigned int* segmentLength) override;\n\tvoid putSegment(Firebird::CheckStatusWrapper* status, unsigned int length, const void* buffer) override;\n\tvoid cancel(Firebird::CheckStatusWrapper* status) override;\n\tvoid close(Firebird::CheckStatusWrapper* status) override;\n\tint seek(Firebird::CheckStatusWrapper* status, int mode, int offset) override;\t\t\t// returns position\n\tvoid deprecatedCancel(Firebird::CheckStatusWrapper* status) override;\n\tvoid deprecatedClose(Firebird::CheckStatusWrapper* status) override;\n\npublic:\n\tJBlob(blb* handle, StableAttachmentPart* sa);\n\n\tStableAttachmentPart* getAttachment()\n\t{\n\t\treturn sAtt;\n\t}\n\n\tblb* getHandle() noexcept\n\t{\n\t\treturn blob;\n\t}\n\n\tvoid clearHandle()\n\t{\n\t\tblob = NULL;\n\t}\n\nprivate:\n\tblb* blob;\n\tFirebird::RefPtr&lt;StableAttachmentPart&gt; sAtt;\n\n\tvoid freeEngineData(Firebird::CheckStatusWrapper* status);\n\tvoid internalClose(Firebird::CheckStatusWrapper* status);\n};\n\nclass JTransaction final :\n\tpublic Firebird::RefCntIface&lt;Firebird::ITransactionImpl&lt;JTransaction, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\t// ITransaction implementation\n\tint release() override;\n\tvoid getInfo(Firebird::CheckStatusWrapper* status,\n\t\ e(CheckStatusWrapper* user_status, const char* filename,\n\tunsigned int dpb_length, const unsigned char* dpb)\n{\n\treturn internalAttach(user_status, filename, dpb_length, dpb, NULL);\n}\n\nJAttachment* JProvider::internalAttach(CheckStatusWrapper* user_status, const char* const filename,\n\t\tunsigned int dpb_length, const unsigned char* dpb, const UserId* existingId)\n{\n/**************************************\n *\n *\tg d s _ $ a t t a c h _ d a t a b a s e\n *\n **************************************\n *\n * Functional description\n *\tAttach a moldy, grungy, old database\n *\tsullied by user data.\n *\n **************************************/\n\ttry\n\t{\n\t\tThreadContextHolder tdbb(user_status);\n\n\t\tDatabaseOptions options;\n\t\tRefPtr&lt;const Config&gt; config;\n\t\tbool invalid_client_SQL_dialect = false;\n\t\tPathName org_filename, expanded_name;\n\t\tbool is_alias = false;\n\t\tMutexEnsureUnlock guardDbInit(dbInitMutex, FB_FUNCTION);\n\t\tLateRefGuard lateBlocking(FB_FUNCTION);\n\t\tMapping mapping(Mapping::MAP_THROW_NOT_FOUND, cryptCallback);\n\n\t\ttry\n\t\t{\n\t\t\t// Process database parameter block\n\t\t\toptions.get(dpb, dpb_length, invalid_client_SQL_dialect);\n\n\t\t\t// And provide info about auth block to mapping\n\t\t\tmapping.setAuthBlock(options.dpb_auth_block);\n\n\t\t\tif (options.dpb_org_filename.hasData())\n\t\t\t\torg_filename = options.dpb_org_filename;\n\t\t\telse\n\t\t\t{\n\t\t\t\torg_filename = filename;\n\n\t\t\t\tif (!options.dpb_utf8_filename)\n\t\t\t\t\tISC_systemToUtf8(org_filename);\n\n\t\t\t\tISC_unescape(org_filename);\n\t\t\t}\n\n\t\t\tISC_utf8ToSystem(org_filename);\n\n\t\t\t// Resolve given alias name\n\t\t\tis_alias = expandDatabaseName(org_filename, expanded_name, &amp;config);\n\t\t\tif (!is_alias)\n\t\t\t{\n\t\t\t\texpanded_name = filename;\n\n\t\t\t\tif (!options.dpb_utf8_filename)\n\t\t\t\t\tISC_systemToUtf8(expanded_name);\n\n\t\t\t\tISC_unescape(expanded_name);\n\t\t\t\tISC_utf8ToSystem(expanded_name);\n\t\t\ 7;re already attached, do some initialization\n\t\t\tRefMutexUnlock initGuard;\n\t\t\tJAttachment* jAtt = initAttachment(tdbb, expanded_name,\n\t\t\t\tis_alias ? org_filename : expanded_name,\n\t\t\t\tconfig, true, options, initGuard, pluginConfig, this);\n\n\t\t\tdbb = tdbb-&gt;getDatabase();\n\t\t\tfb_assert(dbb);\n\t\t\tattachment = tdbb-&gt;getAttachment();\n\t\t\tfb_assert(attachment);\n\n\t\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_new))\n\t\t\t{\n\t\t\t\t// That&#x27;s already initialized DBB\n\t\t\t\t// No need keeping dbInitMutex any more\n\t\t\t\tguardDbInit.leave();\n\t\t\t}\n\n\t\t\t// Don&#x27;t pass user_status into ctor to keep warnings\n\t\t\tEngineContextHolder tdbb(nullptr, jAtt, FB_FUNCTION, AttachmentHolder::ATT_DONT_LOCK);\n\t\t\ttdbb-&gt;tdbb_status_vector = user_status;\n\t\t\tlateBlocking.lock(jAtt-&gt;getStable()-&gt;getBlockingMutex(), jAtt-&gt;getStable());\n\n\t\t\tattachment-&gt;att_crypt_callback = getDefCryptCallback(cryptCallback);\n\t\t\tattachment-&gt;att_client_charset = attachment-&gt;att_charset = options.dpb_interp;\n\n\t\t\tif (existingId)\n\t\t\t\tattachment-&gt;att_flags |= ATT_overwrite_check;\n\n\t\t\tif (options.dpb_no_garbage)\n\t\t\t\tattachment-&gt;att_flags |= ATT_no_cleanup;\n\t\t\tif (options.dpb_sec_attach)\n\t\t\t\tattachment-&gt;att_flags |= ATT_security_db;\n\t\t\tif (options.dpb_map_attach)\n\t\t\t\tattachment-&gt;att_flags |= ATT_mapping;\n\n\t\t\tif (options.dpb_gbak_attach)\n\t\t\t{\n\t\t\t\tattachment-&gt;att_utility = Attachment::UTIL_GBAK;\n\n\t\t\t\tif (options.dpb_gbak_restore_has_schema)\n\t\t\t\t\tattachment-&gt;att_flags |= ATT_gbak_restore_has_schema;\n\t\t\t}\n\t\t\telse if (options.dpb_gstat_attach)\n\t\t\t\tattachment-&gt;att_utility = Attachment::UTIL_GSTAT;\n\t\t\telse if (options.dpb_gfix_attach)\n\t\t\t\tattachment-&gt;att_utility = Attachment::UTIL_GFIX;\n\n\t\t\tif (options.dpb_working_directory.hasData())\n\t\t\t\tattachment-&gt;att_working_directory = options.dpb_working_directory;\n\n\t\t\tTRA e when we need to preset cache size set it first to minimum value.\n\t\t\t\t\t// We will check access rights and call CCH_expand() later when database is initialized.\n\n\t\t\t\t\tdbb-&gt;dbb_page_buffers = MIN_PAGE_BUFFERS;\n\t\t\t\t}\n\n\t\t\t\toptions.setBuffers(dbb-&gt;dbb_config);\n\t\t\t\tCCH_init(tdbb, options.dpb_buffers);\n\n\t\t\t\t// Initialize backup difference subsystem. This must be done before WAL and shadowing\n\t\t\t\t// is enabled because nbackup it is a lower level subsystem\n\t\t\t\tdbb-&gt;dbb_backup_manager = FB_NEW_POOL(*dbb-&gt;dbb_permanent) BackupManager(tdbb,\n\t\t\t\t\tdbb, Ods::hdr_nbak_unknown);\n\t\t\t\tdbb-&gt;dbb_backup_manager-&gt;initializeAlloc(tdbb);\n\t\t\t\tdbb-&gt;dbb_crypto_manager = FB_NEW_POOL(*dbb-&gt;dbb_permanent) CryptoManager(tdbb);\n\t\t\t\tdbb-&gt;dbb_monitoring_data = FB_NEW_POOL(*dbb-&gt;dbb_permanent) MonitoringData(dbb);\n\n\t\t\t\tPAG_init2(tdbb);\n\t\t\t\tPAG_header(tdbb, false, newForceWrite);\n\t\t\t\tdbb-&gt;dbb_page_manager.initTempPageSpace(tdbb);\n\t\t\t\tdbb-&gt;dbb_crypto_manager-&gt;attach(tdbb, attachment);\n\n\t\t\t\t// initialize shadowing as soon as the database is ready for it\n\t\t\t\t// but before any real work is done\n\t\t\t\tSDW_init(tdbb, options.dpb_activate_shadow, options.dpb_delete_shadow);\n\n\t\t\t\t// Initialize TIP cache. We do this late to give SDW a chance to\n\t\t\t\t// work while we read states for all interesting transactions\n\t\t\t\tdbb-&gt;dbb_tip_cache = TipCache::create(tdbb);\n\n\t\t\t\t// linger\n\t\t\t\tdbb-&gt;dbb_linger_seconds = MET_get_linger(tdbb);\n\n\t\t\t\t// Init complete - we can release dbInitMutex\n\t\t\t\tdbb-&gt;dbb_flags &amp;= ~DBB_new;\n\t\t\t\tguardDbInit.leave();\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tif ((dbb-&gt;dbb_flags &amp; DatabaseOptions::DPB_FLAGS_MASK) !=\n\t\t\t\t\t(options.dpb_flags &amp; DatabaseOptions::DPB_FLAGS_MASK))\n\t\t\t\t{\n\t\t\t\t\t// looks like someone tries to attach incompatibly\n\t\t\t\t\tArg::Gds err(isc_bad_dpb_content);\n\t\t\t\t\tif ((dbb-&gt;dbb_flags &amp; DBB_damaged) != (options.dpb_flags &amp; DBB_damaged))\n\t\t\t\t\t\terr &lt;&lt; Arg::Gds(isc_baddpb_damaged_mode);\n\t\t\t\t\terr.raise();\n\t\t\t\t}\n\n\t\t\t\tLCK_init(tdbb, LCK_OWNER_attachment);\n\t\t\t\tcheck_single_maintenance(tdbb);\n\t\t\t\tjAtt-&gt;getStable()-&gt;manualAsyncUnlock(attachment-&gt;att_flags);\n\n\t\t\t\tINI_init(tdbb);\n\t\t\t\tPAG_header(tdbb, true);\n\t\t\t\tdbb-&gt;dbb_crypto_manager-&gt;attach(tdbb, attachment);\n\t\t\t}\n\n\t\t\tif (dbb-&gt;isRestoring())\n\t\t\t{\n\t\t\t\tif (!options.dpb_gbak_attach &amp;&amp; !options.dpb_map_attach &amp;&amp; !options.dpb_worker_attach)\n\t\t\t\t\tERR_post(Arg::Gds(isc_no_user_att_while_restore));\n\t\t\t}\n\n\t\t\t// Basic DBB initialization complete\n\t\t\tinitGuard.leave();\n\n\t\t\t// Attachments to a ReadOnly database need NOT do garbage collection\n\t\t\tif (dbb-&gt;readOnly())\n\t\t\t\tattachment-&gt;att_flags |= ATT_no_cleanup;\n\n\t\t\tif (options.dpb_nolinger)\n\t\t\t\tdbb-&gt;dbb_linger_seconds = 0;\n\n\t\t\tif (options.dpb_disable_wal)\n\t\t\t{\n\t\t\t\tERR_post(Arg::Gds(isc_lock_timeout) &lt;&lt;\n\t\t\t\t\t\t Arg::Gds(isc_obj_in_use) &lt;&lt; Arg::Str(org_filename));\n\t\t\t}\n\n\t\t\tif (options.dpb_buffers &amp;&amp; !dbb-&gt;dbb_page_buffers)\n\t\t\t{\n\t\t\t\tif (CCH_expand(tdbb, options.dpb_buffers))\n\t\t\t\t\tdbb-&gt;dbb_linger_seconds = 0;\n\t\t\t}\n\n\t\t\tPAG_attachment_id(tdbb);\n\n\t\t\tINI_init_sys_relations(tdbb);\n\n\t\t\tbool cleanupTransactions = false;\n\n\t\t\tif (!options.dpb_verify &amp;&amp; CCH_exclusive(tdbb, LCK_PW, LCK_NO_WAIT, NULL))\n\t\t\t\tcleanupTransactions = TRA_cleanup(tdbb);\n\n\t\t\tif (invalid_client_SQL_dialect)\n\t\t\t{\n\t\t\t\tERR_post(Arg::Gds(isc_inv_client_dialect_specified) &lt;&lt; Arg::Num(options.dpb_sql_dialect) &lt;&lt;\n\t\t\t\t\t\t Arg::Gds(isc_valid_client_dialects) &lt;&lt; Arg::Str(&quot;1, 2 or 3&quot;));\n\t\t\t}\n\n\t\t\tswitch (options.dpb_sql_dialect)\n\t\t\t{\n\t\t\tcase 0:\n\t\t\t\t// V6 Client --&gt; V6 Server, dummy client SQL dialect 0 was passed\n\t\t\t\t// It means that client SQL dialect was not set by user\n\t\t\t\t// and takes DB SQL dialect as client SQL dialect\n\t\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_DB_SQL_dialect_3)\n\t\t\t\t{\n\t\t\t\t\t// DB created in IB V6.0 by client SQL dialect 3\n\t\t\t\t\toptions.dpb_sql_dialect = SQL_DIALECT_V6;\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\t// old DB was gbaked in IB V6.0\n\t\t\t\t\toptions.dpb_sql_dialect = SQL_DIALECT_V5;\n\t\t\t\t}\n\t\t\t\tbreak;\n\n\t\t\tcase 99:\n\t\t\t\t// V5 Client --&gt; V6 Server, old client has no concept of dialect\n\t\t\t\toptions.dpb_sql_dialect = SQL_DIALECT_V5;\n\t\t\t\tbreak;\n\n\t\t\tdefault:\n\t\t\t\t// V6 Client --&gt; V6 Server, but client SQL dialect was set\n\t\t\t\t// by user and was passed.\n\t\t\t\tbreak;\n\t\t\t}\n\n\t\t\t// Clear old mapping cache data on request.\n\t\t\t// Unfortunately have to do it w/o access rights check - to check access rights engine\n\t\t\t// needs correct mapping which sometimes can&#x27;t be guaranteed before cleaning cache.\n\t\t\tif (options.dpb_clear_map)\n\t\t\t\tMapping::clearCache(dbb-&gt;dbb_filename.c_str(), Mapping::ALL_CACHE);\n\n\t\t\t// Check for correct credentials supplied\n\t\t\tUserId userId;\n\n\t\t\tif (existingId)\n\t\t\t\tuserId = *existingId;\n\t\t\telse\n\t\t\t{\n\t\t\t\tjAtt-&gt;getStable()-&gt;manualUnlock(attachment-&gt;att_flags);\n\t\t\t\ttry\n\t\t\t\t{\n\t\t\t\t\tmapping.setDb(filename, expanded_name.c_str(), jAtt);\n\t\t\t\t\tgetUserInfo(userId, options, filename, &amp;config, mapping, options.dpb_reset_icu);\n\t\t\t\t}\n\t\t\t\tcatch(const Exception&amp;)\n\t\t\t\t{\n\t\t\t\t\tjAtt-&gt;getStable()-&gt;manualLock(attachment-&gt;att_flags, ATT_manual_lock);\n\t\t\t\t\tthrow;\n\t\t\t\t}\n\n\t\t\t\tjAtt-&gt;getStable()-&gt;manualLock(attachment-&gt;att_flags, ATT_manual_lock);\n\t\t\t}\n\n\t\t\tuserId.makeRoleName(options.dpb_sql_dialect);\n\t\t\tuserId.sclInit(tdbb, false);\n\n\t\t\tMonitoring::publishAttachment(tdbb);\n\n\t\t\t// This pair (SHUT_database/SHUT_online) checks itself for valid user name\n\t\t\tif (options.dpb_shutdown)\n\t\t\t\tSHUT_database(tdbb, options.dpb_shutdown, options.dpb_shutdown_delay, NULL);\n\n\t\t\tif (options.dpb_online)\n\t\t\t\tSHUT_online(tdbb, options.dpb_online, NULL);\n\n\t\t\t// Check if another attachment has or is requesting exclusive database access.\n\t\t\t// If this is an implicit attachment for the security (password) database, don&#x27;t\n\t\t\t// try to get exclusive attachment to avoid a deadlock condition which happens\n\t\t\t// when a client tries to connect to the security database itself.\n\n\t\t\tif (!options.dpb_sec_attach)\n\t\t\t{\n\t\t\t\tbool attachment_succeeded = true;\n\t\t\t\tif (dbb-&gt;isShutdown(shut_mode_single))\n\t\t\t\t\tattachment_succeeded = CCH_exclusive_attachment(tdbb, LCK_none, -1, NULL);\n\t\t\t\telse\n\t\t\t\t\tCCH_exclusive_attachment(tdbb, LCK_none, LCK_WAIT, NULL);\n\n\t\t\t\tif (attachment-&gt;att_flags &amp; ATT_shutdown)\n\t\t\t\t{\n\t\t\t\t\tconst ISC_STATUS err = jAtt-&gt;getStable()-&gt;getShutError();\n\n\t\t\t\t\tif (dbb-&gt;isShutdown())\n\t\t\t\t\t\tERR_post(Arg::Gds(isc_shutdown) &lt;&lt; Arg::Str(org_filename));\n\n\t\t\t\t\tif (err)\n\t\t\t\t\t\tERR_post(Arg::Gds(isc_att_shutdown) &lt;&lt; Arg::Gds(err));\n\n\t\t\t\t\tERR_post(Arg::Gds(isc_att_shutdown));\n\t\t\t\t}\n\n\t\t\t\tif (!attachment_succeeded)\n\t\t\t\t\tERR_post(Arg::Gds(isc_shutdown) &lt;&lt; Arg::Str(org_filename));\n\t\t\t}\n\n\t\t\t// If database is shutdown then kick &#x27;em out.\n\n\t\t\tif (dbb-&gt;dbb_ast_flags &amp; (DBB_shut_attach | DBB_shut_tran))\n\t\t\t\tERR_post(Arg::Gds(isc_shutinprog) &lt;&lt; Arg::Str(org_filename));\n\n\t\t\tif (dbb-&gt;isShutdown())\n\t\t\t{\n\t\t\t\t// Allow only SYSDBA/owner to access database that is shut down\n\t\t\t\tbool allow_access = attachment-&gt;locksmith(tdbb, ACCESS_SHUTDOWN_DATABASE);\n\t\t\t\t// Handle special shutdown modes\n\t\t\t\tif (allow_access)\n\t\t\t\t{\n\t\t\t\t\tif (dbb-&gt;isShutdown(shut_mode_full))\n\t\t\t\t\t{\n\t\t\t\t\t\t// Full shutdown. Deny access always\n\t\t\t\t\t\tallow_access = false;\n\t\t\t\t\t}\n\t\t\t\t\telse if (dbb-&gt;isShutdown(shut_mode_single))\n\t\t\t\t\t{\n\t\t\t\t\t\t// Single user maintenance. Allow access only if we were able to take exclusive lock\n\t\t\t\t\t\t// Note that logic below this exclusive lock differs for SS and CS builds:\n\t\t\t\t\t\t//   - CS keeps PW database lock from releasing in AST in single-user maintenance mode\n\t\t\t\t\t\t//   - for SS this code effectively checks that no other attachments are present\n\t\t\t\t\t\t//     at call point, ATT_exclusive bit is released just before this procedure exits\n\t\t\t\t\t\t// Things are done this way to handle return to online mode nicely.\n\t\t\t\t\t\tallow_access = CCH_exclusive(tdbb, LCK_PW, WAIT_PERIOD, NULL);\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\tif (!allow_access)\n\t\t\t\t{\n\t\t\t\t\t// Note we throw exception here when entering full-shutdown mode\n\t\t\t\t\tERR_post(Arg::Gds(isc_shutdown) &lt;&lt; org_filename);\n\t\t\t\t}\n\t\t\t}\n\n\t\t\t// Figure out what character set &amp; collation this attachment prefers\n\n\t\t\tfind_intl_charset(tdbb, attachment, &amp;options);\n\n\t\t\tif (!options.dpb_session_tz.isEmpty())\n\t\t\t{\n\t\t\t\tattachment-&gt;att_timestamp.time_zone = attachment-&gt;att_current_timezone =\n\t\t\t\t\tattachment-&gt;att_original_timezone = TimeZoneUtil::parse(\n\t\t\t\t\t\toptions.dpb_session_tz.c_str(), options.dpb_session_tz.length());\n\n\t\t\t}\n\n\t\t\t// if the attachment is through gbak and this attachment is not by owner\n\t\t\t// or sysdba then return error. This has been added here to allow for the\n\t\t\t// GBAK security feature of only allowing the owner or sysdba to backup a\n\t\t\t// database. smistry 10/5/98\n\n\t\t\tif (attachment-&gt;isUtility())\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment,\n\t\t\t\t\tattachment-&gt;att_utility == Attachment::UTIL_GBAK ? USE_GBAK_UTILITY :\n\t\t\t\t\tattachment-&gt;att_utility == Attachment::UTIL_GFIX ? USE_GFIX_UTILITY :\n\t\t\t\t\tUSE_GSTAT_UTILITY);\n\t\t\t}\n\n\t\t\tif (options.dpb_upgrade_db)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, USE_GFIX_UTILITY);\n\t\t\t\tif (!CCH_exclusive(tdbb, LCK_EX, WAIT_PERIOD, NULL))\n\t\t\t\t{\n\t\t\t\t\tERR_post(Arg::Gds(isc_lock_timeout) &lt;&lt;\n\t\t\t\t\t\t\t Arg::Gds(isc_obj_in_use) &lt;&lt; Arg::Str(org_filename));\n\t\t\t\t}\n\n\t\t\t\tINI_upgrade(tdbb);\n\t\t\t}\n\n\t\t\tif (options.dpb_verify)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, USE_GFIX_UTILITY);\n\t\t\t\tif (!CCH_exclusive(tdbb, LCK_PW, WAIT_PERIOD, NULL))\n\t\t\t\t\tERR_post(Arg::Gds(isc_bad_dpb_content) &lt;&lt; Arg::Gds(isc_cant_validate));\n\n\t\t\t\t// Can&#x27;t allow garbage collection during database validation.\n\n\t\t\t\tAutoSetRestoreFlag&lt;ULONG&gt; noCleanup(&amp;attachment-&gt;att_flags, ATT_no_cleanup, true);\n\t\t\t\tVIO_fini(tdbb);\n\n\t\t\t\tif (!VAL_validate(tdbb, options.dpb_verify))\n\t\t\t\t\tERR_punt();\n\t\t\t}\n\n\t\t\tif (options.dpb_reset_icu)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, USE_GFIX_UTILITY);\n\t\t\t\tDFW_reset_icu(tdbb);\n\n\t\t\t\t// force system privileges recheck for sysdba\n\t\t\t\tfb_assert(attachment-&gt;att_user);\t// set by UserId::sclInit()\n\t\t\t\tattachment-&gt;att_user-&gt;setFlag(USR_newrole);\n\t\t\t}\n\n\t\t\tif (options.dpb_journal.hasData())\n\t\t\t\tERR_post(Arg::Gds(isc_bad_dpb_content) &lt;&lt; Arg::Gds(isc_cant_start_journal));\n\n\t\t\tif (options.dpb_wal_action)\n\t\t\t{\n\t\t\t\t// No WAL anymore. We deleted it.\n\t\t\t\tERR_post(Arg::Gds(isc_no_wal));\n\t\t\t}\n\n\t\t\tif (attachment-&gt;att_utility == Attachment::UTIL_GFIX ||\n\t\t\t\tattachment-&gt;att_utility == Attachment::UTIL_GSTAT)\n\t\t\t{\n\t\t\t\toptions.dpb_no_db_triggers = true;\n\t\t\t}\n\n\t\t\tif (options.dpb_no_db_triggers)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, IGNORE_DB_TRIGGERS);\n\t\t\t\tattachment-&gt;att_flags |= ATT_no_db_triggers;\n\t\t\t}\n\n\t\t\tif (options.dpb_set_db_sql_dialect)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\t\t\t\tPAG_set_db_SQL_dialect(tdbb, options.dpb_set_db_sql_dialect);\n\t\t\t\tdbb-&gt;dbb_linger_seconds = 0;\n\t\t\t}\n\n\t\t\tif (options.dpb_sweep_interval &gt; -1)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\t\t\t\tPAG_set_sweep_interval(tdbb, options.dpb_sweep_interval);\n\t\t\t\tdbb-&gt;dbb_sweep_interval = options.dpb_sweep_interval;\n\t\t\t}\n\n\t\t\tif (options.dpb_set_force_write)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\t\t\t\tPAG_set_force_write(tdbb, options.dpb_force_write);\n\t\t\t}\n\n\t\t\tif (options.dpb_set_no_reserve)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\t\t\t\tPAG_set_no_reserve(tdbb, options.dpb_no_reserve);\n\t\t\t}\n\n\t\t\tif (options.dpb_set_page_buffers)\n\t\t\t{\n\t\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_shared)\n\t\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\n\t\t\t\tCCH_expand(tdbb, options.dpb_page_buffers);\n\n\t\t\t\tif (attachment-&gt;locksmith(tdbb, CHANGE_HEADER_SETTINGS))\n\t\t\t\t{\n\t\t\t\t\tPAG_set_page_buffers(tdbb, options.dpb_page_buffers);\n\t\t\t\t\tdbb-&gt;dbb_linger_seconds = 0;\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (options.dpb_parallel_workers)\n\t\t\t{\n\t\t\t\tattachment-&gt;att_parallel_workers = options.dpb_parallel_workers;\n\t\t\t}\n\n\t\t\tif (options.dpb_set_db_readonly)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\t\t\t\tif (!CCH_exclusive(tdbb, LCK_EX, WAIT_PERIOD, NULL))\n\t\t\t\t{\n\t\t\t\t\tERR_post(Arg::Gds(isc_lock_timeout) &lt;&lt;\n\t\t\t\t\t\t\t Arg::Gds(isc_obj_in_use) &lt;&lt; Arg::Str(org_filename));\n\t\t\t\t}\n\t\t\t\tPAG_set_db_readonly(tdbb, options.dpb_db_readonly);\n\t\t\t\tdbb-&gt;dbb_linger_seconds = 0;\n\t\t\t}\n\n\t\t\tif (options.dpb_set_db_replica)\n\t\t\t{\n\t\t\t\tvalidateAccess(tdbb, attachment, CHANGE_HEADER_SETTINGS);\n\t\t\t\tif (!CCH_exclusive(tdbb, LCK_EX, WAIT_PERIOD, NULL))\n\t\t\t\t{\n\t\t\t\t\tERR_post(Arg::Gds(isc_lock_timeout) &lt;&lt;\n\t\t\t\t\t\t\t Arg::Gds(isc_obj_in_use) &lt;&lt; Arg::Str(org_filename));\n\t\t\t\t}\n\t\t\t\tPAG_set_db_replica(tdbb, options.dpb_replica_mode);\n\t\t\t\tdbb-&gt;dbb_linger_seconds = 0;\n\t\t\t}\n\n\t\t\tCCH_init2(tdbb);\n\t\t\tVIO_init(tdbb);\n\t\t\tattachment-&gt;setInitialOptions(tdbb, options, newDb);\n\n\t\t\tCCH_release_exclusive(tdbb);\n\n\t\t\tREPL_attach(tdbb, cleanupTransactions);\n\n\t\t\tattachment-&gt;att_trace_manager-&gt;activate();\n\t\t\tif (attachment-&gt;att_trace_manager-&gt;needs(ITraceFactory::TRACE_EVENT_ATTACH))\n\t\t\t{\n\t\t\t\tTraceConnectionImpl conn(attachment);\n\t\t\t\tattachment-&gt;att_trace_manager-&gt;event_attach(&amp;conn, false, ITracePlugin::RESULT_SUCCESS);\n\t\t\t}\n\n\t\t\t// Recover database after crash during backup difference file merge\n\t\t\tdbb-&gt;dbb_backup_manager-&gt;endBackup(tdbb, true); // true = do recovery\n\n\t\t\tif (options.dpb_sweep &amp; isc_dpb_records)\n\t\t\t\tTRA_sweep(tdbb);\n\n\t\t\tdbb-&gt;dbb_crypto_manager-&gt;startCryptThread(tdbb);\n\n\t\t\tif (options.dpb_dbkey_scope)\n\t\t\t\tattachment-&gt;att_dbkey_trans = TRA_start(tdbb, 0, 0);\n\n\t\t\tif (!(attachment-&gt;att_flags &amp; ATT_no_db_triggers))\n\t\t\t{\n\t\t\t\tjrd_tra* transaction = NULL;\n\t\t\t\tconst ULONG save_flags = attachment-&gt;att_flags;\n\n\t\t\t\ttry\n\t\t\t\t{\n\t\t\t\t\t// load all database triggers\n\t\t\t\t\tMET_load_db_triggers(tdbb, DB_TRIGGER_CONNECT);\n\t\t\t\t\tMET_load_db_triggers(tdbb, DB_TRIGGER_DISCONNECT);\n\t\t\t\t\tMET_load_db_triggers(tdbb, DB_TRIGGER_TRANS_START);\n\t\t\t\t\tMET_load_db_triggers(tdbb, DB_TRIGGER_TRANS_COMMIT);\n\t\t\t\t\tMET_load_db_triggers(tdbb, DB_TRIGGER_TRANS_ROLLBACK);\n\n\t\t\t\t\t// load DDL triggers\n\t\t\t\t\tMET_load_ddl_triggers(tdbb);\n\n\t\t\t\t\tconst TrigVector* trig_connect = attachment-&gt;att_triggers[DB_TRIGGER_CONNECT];\n\t\t\t\t\tif (trig_connect &amp;&amp; !trig_connect-&gt;isEmpty())\n\t\t\t\t\t{\n\t\t\t\t\t\t// Start a transaction to execute ON CONNECT triggers.\n\t\t\t\t\t\t// Ensure this transaction can&#x27;t trigger auto-sweep.\n\t\t\t\t\t\t//// TODO: register the transaction in y-valve - for external engines\n\t\t\t\t\t\tattachment-&gt;att_flags |= ATT_no_cleanup;\n\t\t\t\t\t\ttransaction = TRA_start(tdbb, 0, NULL);\n\t\t\t\t\t\tattachment-&gt;att_flags = save_flags;\n\n\t\t\t\t\t\t// run ON CONNECT triggers\n\t\t\t\t\t\tEXE_execute_db_triggers(tdbb, transaction, TRIGGER_CONNECT);\n\n\t\t\t\t\t\t// and commit the transaction\n\t\t\t\t\t\tTRA_commit(tdbb, transaction, false);\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\tcatch (const Exception&amp;)\n\t\t\t\t{\n\t\t\t\t\tattachment-&gt;att_flags = save_flags;\n\t\t\t\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_bugcheck) &amp;&amp; transaction)\n\t\t\t\t\t\tTRA_rollback(tdbb, transaction, false, false);\n\t\t\t\t\tthrow;\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (options.dpb_worker_attach)\n\t\t\t\tattachment-&gt;att_flags |= ATT_worker;\n\t\t\telse\n\t\t\t\tWorkerAttachment::incUserAtts(dbb-&gt;dbb_filename);\n\n\t\t\tjAtt-&gt;getStable()-&gt;manualUnlock(attachment-&gt;att_flags);\n\n\t\t\treturn jAtt;\n\t\t}\t// try\n\t\tcatch (const Exception&amp; ex)\n\t\t{\n\t\t\tex.stuffException(user_status);\n\t\t\tunwindAttach(tdbb, filename, ex, user_status, existingId ? UNWIND_INTERNAL : 0,\n\t\t\t\toptions, mapping, cryptCallback);\n\t\t}\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\tex.stuffException(user_status);\n\t}\n\n\treturn NULL;\n}\n\n\nvoid JBlob::getInfo(CheckStatusWrapper* user_status,\n\t\t\t\t   unsigned int itemsLength, const unsigned char* items,\n\t\t\t\t   unsigned int bufferLength, unsigned char* buffer)\n{\n/**************************************\n *\n *\tg d s _ $ b l o b _ i n f o\n *\n **************************************\n *\n * Functional description\n *\tProvide information on blob object.\n *\n *********** ropGuard;\n\tif (!activeThreadGuard)\n\t{\n\t\tif (dbb-&gt;dbb_crypto_manager &amp;&amp;\n\t\t\tThread::isCurrent(dbb-&gt;dbb_crypto_manager-&gt;getCryptThreadHandle()))\n\t\t{\n\t\t\tactiveThreadGuard = &amp;dummyGuard;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tactiveThreadGuard = &amp;threadGuard;\n\t\t}\n\t\tactiveThreadGuard-&gt;enter();\n\t}\n\n\tsync.lock(SYNC_EXCLUSIVE);\n\n\t// stop special threads if and only if we release last regular attachment\n\tbool other = false;\n\t{ // checkout scope\n\t\tEngineCheckout checkout(tdbb, FB_FUNCTION);\n\n\t\tSPTHR_DEBUG(fprintf(stderr, &quot;\\nrelease attachment=%p\\n&quot;, attachment));\n\n\t\tfor (Jrd::Attachment* att = dbb-&gt;dbb_attachments; att; att = att-&gt;att_next)\n\t\t{\n\t\t\tSPTHR_DEBUG(fprintf(stderr, &quot;att=%p FromThr=%c &quot;, att, att-&gt;att_flags &amp; ATT_from_thread ? &#x27;1&#x27; : &#x27;0&#x27;));\n\n\t\t\tif (att == attachment)\n\t\t\t{\n\t\t\t\tSPTHR_DEBUG(fprintf(stderr, &quot;self\\n&quot;));\n\t\t\t\tcontinue;\n\t\t\t}\n\n\t\t\tif (att-&gt;att_flags &amp; ATT_from_thread)\n\t\t\t{\n\t\t\t\tSPTHR_DEBUG(fprintf(stderr, &quot;found special att=%p\\n&quot;, att));\n\t\t\t\tcontinue;\n\t\t\t}\n\n\t\t\t// Found attachment that is not current (to be released) and is not special\n\t\t\tother = true;\n\t\t\tSPTHR_DEBUG(fprintf(stderr, &quot;other\\n&quot;));\n\t\t\tbreak;\n\t\t}\n\n\t\t// Notify special threads\n\t\tactiveThreadGuard-&gt;leave();\n\n\t\t// Sync with special threads\n\t\tif (!other)\n\t\t{\n\t\t\tsync.unlock();\n\n\t\t\t// crypt thread\n\t\t\tif (dbb-&gt;dbb_crypto_manager)\n\t\t\t\tdbb-&gt;dbb_crypto_manager-&gt;terminateCryptThread(tdbb, true);\n\t\t}\n\n\t} // EngineCheckout scope\n\n\t// restore database lock if needed\n\tif (!other)\n\t\tsync.lock(SYNC_EXCLUSIVE);\n\n\tif (attachment-&gt;att_flags &amp; ATT_creator)\n\t\tdbb-&gt;setRestoring(false);\n\n\t// remove the attachment block from the dbb linked list\n\tfor (Jrd::Attachment** ptr = &amp;dbb-&gt;dbb_attachments; *ptr; ptr = &amp;(*ptr)-&gt;att_next)\n\t{\n\t\tif (*ptr == attachment)\n\t\t{\n\t\t\t*ptr = attachment-&gt;att_next;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\tSCL_release_all(attachment-&gt;att_security_classes);\n\n\tdelete attachment-&gt;att_user;\n\n\t{\n\t\tjrd_tra* next = NULL;\n\t\tfor (jrd_tra* tran = attachment-&gt;att_transactions; tran; tran = next)\n\t\t{\n\t\t\tnext = tran-&gt;tra_next;\n\t\t\tjrd_tra::destroy(attachment, tran);\n\t\t}\n\t}\n\n\ttdbb-&gt;setAttachment(NULL);\n\tJrd::Attachment::destroy(attachment);\n}\n\n\nstatic void rollback(thread_db* tdbb, jrd_tra* transaction, const bool retaining_flag)\n{\n/**************************************\n *\n *\tr o l l b a c k\n *\n **************************************\n *\n * Functional description\n *\tAbort a transaction.\n *\n **************************************/\n\tif (transaction-&gt;tra_in_use)\n\t\tArg::Gds(isc_transaction_in_use).raise();\n\n\tThreadStatusGuard tempStatus(tdbb);\n\n\tconst Database* const dbb = tdbb-&gt;getDatabase();\n\tconst Jrd::Attachment* const attachment = tdbb-&gt;getAttachment();\n\n\tif (!(attachment-&gt;att_flags &amp; ATT_no_db_triggers))\n\t{\n\t\ttry\n\t\t{\n\t\t\tThreadStatusGuard tempStatus2(tdbb);\n\t\t\t// run ON TRANSACTION ROLLBACK triggers\n\t\t\tEXE_execute_db_triggers(tdbb, transaction, TRIGGER_TRANS_ROLLBACK);\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_bugcheck)\n\t\t\t\tthrow;\n\t\t}\n\t}\n\n\ttdbb-&gt;setTransaction(transaction);\n\tTRA_rollback(tdbb, transaction, retaining_flag, false);\n}\n\n\nstatic void setEngineReleaseDelay(Database* dbb)\n{\n\tif (!dbb-&gt;dbb_plugin_config)\n\t\treturn;\n\n\ttime_t maxLinger = 0;\n\n\t{ // scope\n\t\tMutexLockGuard listGuardForLinger(databases_mutex, FB_FUNCTION);\n\n\t\tfor (Database* d = databases; d; d = d-&gt;dbb_next)\n\t\t{\n\t\t\tif (!d-&gt;dbb_attachments &amp;&amp; (d-&gt;dbb_linger_end &gt; maxLinger))\n\t\t\t\tmaxLinger = d-&gt;dbb_linger_end;\n\t\t}\n\t}\n\n\t++maxLinger;\t// avoid rounding errors\n\tconst time_t t = time(NULL);\n\tFbLocalStatus s;\n\tdbb-&gt;dbb_plugin_config-&gt;setReleaseDelay(&amp;s, maxLinger &gt; t ? (maxLinger - t) * 1000 * 1000 : 0);\n\tcheck(&amp;s);\n}\n\n\nbool JRD_shutdown_database(Database* dbb, const unsigned flags)\n{\n/*************************************************\n *\n *\tJ R D _ s h u t d o w n _ d a t a b a s e\n *\n *************************************************\n *\n * Functional description\n *\tShutdown physical database environment.\n *\n **************************************/\n\tThreadContextHolder tdbb(dbb, NULL);\n\n\tRefMutexUnlock finiGuard;\n\n\t{ // scope\n\t\tfb_assert((flags &amp; SHUT_DBB_OVERWRITE_CHECK) || (!databases_mutex-&gt;locked()));\n\t\tMutexLockGuard listGuard1(databases_mutex, FB_FUNCTION);\n\n\t\tDatabase** d_ptr;\n\t\tfor (d_ptr = &amp;databases; *d_ptr; d_ptr = &amp;(*d_ptr)-&gt;dbb_next)\n\t\t{\n\t\t\tif (*d_ptr == dbb)\n\t\t\t{\n\t\t\t\tfiniGuard.linkWith(dbb-&gt;dbb_init_fini);\n\n\t\t\t\t{\t// scope\n\t\t\t\t\tMutexUnlockGuard listUnlock(databases_mutex, FB_FUNCTION);\n\n\t\t\t\t\t// after unlocking databases_mutex we lose control over dbb\n\t\t\t\t\t// as long as dbb_init_fini is not locked and its activity is not checked\n\t\t\t\t\tfiniGuard.enter();\n\t\t\t\t\tif (finiGuard-&gt;doesExist())\n\t\t\t\t\t\tbreak;\n\n\t\t\t\t\t// database to shutdown does not exist\n\t\t\t\t\t// looks like somebody else took care to destroy it\n\t\t\t\t\treturn false;\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\t// Check - may be database already missing in linked list\n\t\tif (!finiGuard)\n\t\t\treturn false;\n\t}\n\n\t{\n\t\tSyncLockGuard dsGuard(&amp;dbb-&gt;dbb_sync, SYNC_EXCLUSIVE, FB_FUNCTION);\n\t\tif (dbb-&gt;dbb_attachments)\n\t\t\treturn false;\n\t}\n\n\t// Database linger\n\tif ((flags &amp; SHUT_DBB_LINGER) &amp;&amp;\n\t\t(!(engineShutdown || dbb-&gt;isShutdown())) &amp;&amp;\n\t\t(dbb-&gt;dbb_linger_seconds &gt; 0) &amp;&amp;\n\t\t(dbb-&gt;dbb_config-&gt;getServerMode() != MODE_CLASSIC) &amp;&amp;\n\t\t(dbb-&gt;dbb_flags &amp; DBB_shared))\n\t{\n\t\tif (!dbb-&gt;dbb_linger_timer)\n\t\t\tdbb-&gt;dbb_linger_timer = FB_NEW Database::Linger(dbb);\n\n\t\tdbb-&gt;dbb_linger_end = time(NULL) + dbb-&gt;dbb_linger_seconds;\n\t\tdbb-&gt;dbb_linger_timer-&gt;set(dbb-&gt;dbb_linger_seconds);\n\n\t\tsetEngineReleaseDelay(dbb);\n\n\t\treturn false;\n\t}\n\n\t// Reset provider unload delay if needed\n\tdbb-&gt;dbb_linger_end = 0;\n\tsetEngineReleaseDelay(dbb);\n\n\t// Deactivate dbb_init_fini lock\n\t// Since that moment dbb becomes not reusable\n\tdbb-&gt;dbb_init_fini-&gt;destroy();\n\n\tfb_assert(!dbb-&gt;locked());\n\n\tWorkerAttachment::shutdownDbb(dbb);\n\n\ttry\n\t{\n#ifdef SUPERSERVER_V2\n\t\tTRA_header_write(tdbb, dbb, 0);\t// Update transaction info on header page.\n#endif\n\t\tif (flags &amp; SHUT_DBB_RELEASE_POOLS)\n\t\t\tTRA_update_counters(tdbb, dbb);\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\t// Swallow exception raised from the physical I/O layer\n\t\t// (e.g. due to database file being inaccessible).\n\t\t// User attachment is already destroyed, so there&#x27;s no chance\n\t\t// this dbb can be cleaned up after raising an exception.\n\t}\n\n\t// Disable AST delivery as we&#x27;re about to release all locks\n\n\t{ // scope\n\t\tWriteLockGuard astGuard(dbb-&gt;dbb_ast_lock, FB_FUNCTION);\n\t\tdbb-&gt;dbb_flags |= DBB_no_ast;\n\t}\n\n\t// Shutdown file and/or remote connection\n\n\tVIO_fini(tdbb);\n\n\tCCH_shutdown(tdbb);\n\n\tif (dbb-&gt;dbb_tip_cache)\n\t\tdbb-&gt;dbb_tip_cache-&gt;finalizeTpc(tdbb);\n\n\tif (dbb-&gt;dbb_backup_manager)\n\t\tdbb-&gt;dbb_backup_manager-&gt;shutdown(tdbb);\n\n\tif (dbb-&gt;dbb_crypto_manager)\n\t\tdbb-&gt;dbb_crypto_manager-&gt;shutdown(tdbb);\n\n\tif (dbb-&gt;dbb_repl_lock)\n\t\tLCK_release(tdbb, dbb-&gt;dbb_repl_lock);\n\n\tif (dbb-&gt;dbb_shadow_lock)\n\t\tLCK_release(tdbb, dbb-&gt;dbb_shadow_lock);\n\n\tif (dbb-&gt;dbb_retaining_lock)\n\t\tLCK_release(tdbb, dbb-&gt;dbb_retaining_lock);\n\n\tif (dbb-&gt;dbb_sweep_lock)\n\t\tLCK_release(tdbb, dbb-&gt;dbb_sweep_lock);\n\n\tif (dbb-&gt;dbb_lock)\n\t\tLCK_release(tdbb, dbb-&gt;dbb_lock);\n\n\tdelete dbb-&gt;dbb_crypto_manager;\n\tdbb-&gt;dbb_crypto_manager = NULL;\n\n\tLCK_fini(tdbb, LCK_OWNER_database);\n\n\tCCH_fini(tdbb);\n\n\t{ // scope\n\t\tMutexLockGuard listGuard2(databases_mutex, FB_FUNCTION);\n\n\t\tDatabase** d_ptr;\n\t\tfor (d_ptr = &amp;databases; *d_ptr; d_ptr = &amp;(*d_ptr)-&gt;dbb_next)\n\t\t{\n\t\t\tif (*d_ptr == dbb)\n\t\t\t{\n\t\t\t\tfb_assert(!dbb-&gt;dbb_attachments);\n\n\t\t\t\t*d_ptr = dbb-&gt;dbb_next;\n\t\t\t\tdbb-&gt;dbb_next = NULL;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\n\tif (flags &amp; SHUT_DBB_RELEASE_POOLS)\n\t{\n\t\ttdbb-&gt;setDatabase(NULL);\n\t\tDatabase::destroy(dbb);\n\t}\n\n\treturn true;\n}\n\n\nvoid JRD_enum_attachments(PathNameList* dbList, ULONG&amp; atts, ULONG&amp; dbs, ULONG&amp; svcs)\n{\n/**************************************\n *\n *\tJ R D _ e n u m _ a t t a c h m e n t s\n *\n **************************************\n *\n * Functional description\n *\tCount the number of active databases and\n *\tattachments.\n *\n **************************************/\n\tatts = dbs = svcs = 0;\n\n\ttry\n\t{\n\t\tPathNameList dbFiles(*getDefaultMemoryPool());\n\n\t\tMutexLockGuard guard(databases_mutex, FB_FUNCTION);\n\n\t\t// Zip through the list of databases and count the number of local\n\t\t// connections.  If buf is not NULL then copy all the database names\n\t\t// that will fit into it.\n\n\t\tfor (Database* dbb = databases; dbb; dbb = dbb-&gt;dbb_next)\n\t\t{\n\t\t\tSyncLockGuard dbbGuard(&amp;dbb-&gt;dbb_sync, SYNC_SHARED, &quot;JRD_enum_attachments&quot;);\n\n\t\t\tif (!(dbb-&gt;dbb_flags &amp; DBB_bugcheck))\n\t\t\t{\n\t\t\t\tbool found = false;\t// look for user attachments only\n\t\t\t\tfor (const Jrd::Attachment* attach = dbb-&gt;dbb_attachments; attach;\n\t\t\t\t\t attach = attach-&gt;att_next)\n\t\t\t\t{\n\t\t\t\t\tif (!(attach-&gt;att_flags &amp; ATT_security_db))\n\t\t\t\t\t{\n\t\t\t\t\t\tatts++;\n\t\t\t\t\t\tfound = true;\n\t\t\t\t\t}\n\t\t\t\t}\n\n\t\t\t\tif (found &amp;&amp; !dbFiles.exist(dbb-&gt;dbb_filename))\n\t\t\t\t\tdbFiles.add(dbb-&gt;dbb_filename);\n\t\t\t}\n\t\t}\n\n\t\tdbs = (ULONG) dbFiles.getCount();\n\t\tsvcs = Service::totalCount();\n\n\t\tif (dbList)\n\t\t{\n\t\t\t*dbList = dbFiles;\n\t\t}\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\t// Here we ignore possible errors from databases_mutex.\n\t\t// They were always silently ignored, and for this function\n\t\t// we really have no way to notify world about mutex problem.\n\t\t//\t\tAP. 2008.\n\t}\n}\n\n\nvoid JTransaction::freeEngineData(CheckStatusWrapper* user_status)\n{\n/**************************************\n *\n *\tf r e e E n g i n e D a t a\n *\n **************************************\n *\n * Functional description\n *\tRelease or rollback transaction depending upon prepared it or not.\n *\n **************************************/\n\ttry\n\t{\n\t\tEngineContextHolder tdbb(user_status, this, FB_FUNCTION);\n\t\tcheck_database(tdbb, true);\n\n\t\ttry\n\t\t{\n\t\t\tif (transaction-&gt;tra_flags &amp; TRA_prepared)\n\t\t\t{\n\t\t\t\tTraceTransactionEnd trace(transaction, false, false);\n\t\t\t\tEDS::Transaction::jrdTransactionEnd(tdbb, transaction, false, false, false);\n\t\t\t\tTRA_release_transaction(tdbb, transaction, &amp;trace);\n\t\t\t}\n\t\t\telse\n\t\t\t\tTRA_rollback(tdbb, transaction, false, true);\n\n\t\t\ttransaction = NULL;\n\t\t}\n\t\tcatch (const Exception&amp; ex)\n\t\t{\n\t\t\ttransliterateException(tdbb, ex, user_status, &quot;JTransaction::freeEngineData&quot;);\n\t\t\treturn;\n\t\t}\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\ttransaction = NULL;\n\t\tex.stuffException(user_status);\n\t\treturn;\n\t}\n\n\tsuccessful_completion(user_status);\n}\n\n\nstatic void purge_transactions(thread_db* tdbb, Jrd::Attachment* attachment, const bool force_flag)\n{\n/**************************************\n *\n *\tp u r g e _ t r a n s a c t i o n s\n *\n **************************************\n *\n * Functional description\n *\tcommit or rollback all transactions\n *\tfrom an attachment\n *\n **************************************/\n\tjrd_tra* const trans_dbk = attachment-&gt;att_dbkey_trans;\n\n\tif (force_flag)\n\t{\n\t\tfor (auto applier : attachment-&gt;att_repl_appliers)\n\t\t\tapplier-&gt;cleanupTransactions(tdbb);\n\t}\n\n\tunsigned int count = 0;\n\tjrd_tra* next;\n\n\tfor (jrd_tra* transaction = attachment-&gt;att_transactions; transaction; transaction = next)\n\t{\n\t\tnext = transaction-&gt;tra_next;\n\t\tif (transaction != trans_dbk)\n\t\t{\n\t\t\tif (transaction-&gt;tra_flags &amp; TRA_prepared)\n\t\t\t{\n\t\t\t\tTraceTransactionEnd trace(transaction, false, false); // need ability to indicate prepared (in limbo) transaction\n\t\t\t\tEDS::Transaction::jrdTransactionEnd(tdbb, transaction, false, false, true);\n\t\t\t\tTRA_release_transaction(tdbb, transaction, &amp;trace);\n\t\t\t}\n\t\t\telse if (force_flag)\n\t\t\t\tTRA_rollback(tdbb, transaction, false, true);\n\t\t\telse\n\t\t\t\t++count;\n\t\t}\n\t}\n\n\tif (count)\n\t{\n\t\tERR_post(Arg::Gds(isc_open_trans) &lt;&lt; Arg::Num(count));\n\t}\n\n\t// If there&#x27;s a side transaction for db-key scope, get rid of it\n\tif (trans_dbk)\n\t{\n\t\tattachment-&gt;att_dbkey_trans = NULL;\n\t\tTRA_commit(tdbb, trans_dbk, false);\n\t}\n}\n\n\nstatic void purge_attachment(thread_db* tdbb, StableAttachmentPart* sAtt, unsigned flags)\n{\n/**************************************\n *\n *\tp u r g e _ a t t a c h m e n t\n *\n **************************************\n *\n * Functional description\n *\tZap an attachment, shutting down the database\n *\tif it is the last one.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tStableAttachmentPart::Sync* const attSync = sAtt-&gt;getSync();\n\tfb_assert(attSync-&gt;locked());\n\n\tJrd::Attachment* attachment = sAtt-&gt;getHandle();\n\n\tif (attachment &amp;&amp; attachment-&gt;att_purge
