n\t{\n\t\tva_list params;\n\t\tva_start(params, format);\n\n\t\tFirebird::string s;\n\t\ts.vprintf(format, params);\n\n\t\tva_end(params);\n\n\t\tcsb_dump += s;\n\t}\n\n\tFirebird::string csb_dump;\n#endif\n\n\tCompilerScratch* mainCsb;\n\tFirebird::BlrReader\tcsb_blr_reader;\n\tDmlNode*\t\tcsb_node;\n\tExternalAccessList csb_external;\t\t\t// Access to outside procedures/triggers to be checked\n\tAccessItemList\tcsb_access;\t\t\t\t\t// Access items to be checked\n\tvec&lt;DeclareVariableNode*&gt;*\tcsb_variables;\t// Vector of variables, if any\n\tResourceList\tcsb_resources;\t\t\t\t// Resources (relations and indexes)\n\tFirebird::Array&lt;Dependency&gt;\tcsb_dependencies;\t// objects that this statement depends upon\n\tFirebird::Array&lt;const Select*&gt; csb_fors;\t// select expressions\n\tFirebird::Array&lt;const DeclareLocalTableNode*&gt; csb_localTables;\t// local tables\n\tFirebird::Array&lt;ULONG*&gt; csb_invariants;\t\t// stack of pointer to nodes invariant offsets\n\tFirebird::Array&lt;ExprNode*&gt; csb_current_nodes;\t// RseNode&#x27;s and other invariant\n\t\t\t\t\t\t\t\t\t\t\t\t// candidates within whose scope we are\n\tFirebird::Array&lt;ForNode*&gt; csb_current_for_nodes;\n\tFirebird::RightPooledMap&lt;ForNode*, MetaName&gt; csb_forCursorNames;\n\tFirebird::SortedArray&lt;jrd_fld*&gt; csb_computing_fields;\t// Computed fields being compiled\n\tFirebird::Array&lt;BoolExprNode*&gt; csb_inner_booleans;\t// Inner booleans at the current scope\n\tFirebird::SortedArray&lt;USHORT&gt; csb_variables_used_in_subroutines;\n\tStreamType\t\tcsb_n_stream;\t\t\t\t// Next available stream\n\tUSHORT\t\t\tcsb_msg_number;\t\t\t\t// Highest used message number\n\tULONG\t\t\tcsb_impure;\t\t\t\t\t// Next offset into impure area\n\tUSHORT\t\t\tcsb_g_flags;\n\tMemoryPool&amp;\t\tcsb_pool;\t\t\t\t\t// Memory pool to be used by csb\n\tFirebird::AutoPtr&lt;Firebird::DbgInfo&gt; csb_dbg_info;\t// Debug information\n\tMapFieldInfo\t\tcsb_map_field_info;\t\t// Map field name to field info\n\tMapItemInfo\t\t\tcsb_map_item_info;\t\t// Map item to item info\n\n\t// Map of message number to field number to pad for external routines.\n\tFirebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;USHORT, USHORT&gt; &gt; &gt; csb_message_pad;\n\n\tQualifiedName\tcsb_domain_validation;\t// Parsing domain constraint in PSQL\n\n\t// used in cmp.cpp/pass1\n\tjrd_rel*\tcsb_view;\n\tStreamType\tcsb_view_stream;\n\tjrd_rel*\tcsb_parent_relation;\n\tunsigned\tblrVersion;\n\tUSHORT\t\tcsb_remap_variable;\n\tbool\t\tcsb_validate_expr;\n\tbool\t\tcsb_returning_expr;\n\tbool\t\tcsb_implicit_cursor;\n\n\tFirebird::LeftPooledMap&lt;MetaName, DeclareSubFuncNode*&gt; subFunctions;\n\tFirebird::LeftPooledMap&lt;MetaName, DeclareSubProcNode*&gt; subProcedures;\n\tFirebird::NonPooledMap&lt;USHORT, USHORT&gt; outerMessagesMap;\t// &lt;inner, outer&gt;\n\tFirebird::NonPooledMap&lt;USHORT, USHORT&gt; outerVarsMap;\t\t// &lt;inner, outer&gt;\n\n\tMetaName csb_schema;\n\n\tForNode*\tcsb_currentForNode;\n\tStmtNode*\tcsb_currentDMLNode;\t\t// could be StoreNode or ModifyNode\n\tExprNode*\tcsb_currentAssignTarget;\n\tdsc*\t\tcsb_preferredDesc;\t\t// expected by receiving side data format\n\n\tULONG\t\tcsb_currentCursorId = 0;\n\tULONG\t\tcsb_nextCursorId = 1;\n\tULONG\t\tcsb_nextRecSourceId = 1;\n\n\tstruct csb_repeat\n\t{\n\t\t// We must zero-initialize this one\n\t\tcsb_repeat() noexcept;\n\n\t\tvoid activate() noexcept;\n\t\tvoid deactivate() noexcept;\n\t\tQualifiedName getName(bool allowEmpty = true) const;\n\n\t\tstd::optional&lt;USHORT&gt; csb_cursor_number;\t// Cursor number for this stream\n\t\tStreamType csb_stream;\t\t\t// Map user context to internal stream\n\t\tStreamType csb_view_stream;\t\t// stream number for view relation, below\n\t\tUSHORT csb_flags;\n\n\t\tjrd_rel* csb_relation;\n\t\tFirebird::string* csb_alias;\t// SQL alias name for this instance of relation\n\t\tjrd_prc* csb_procedure;\n\t\tjrd_rel* csb_view;\t\t\t\t// parent view\n\n\t\tIndexDescList* csb_idx;\t\t\t// Packed description of indices\n\t\tMessageNode* csb_message;\t\t// Msg for send/receive\n\t\tconst Format* csb_format;\t\t// Default Format for stream\n\t\tFormat* csb_internal_format;\t// Statement internal format\n\t\tUInt32Bitmap* csb_fields;\t\t// Fields referenced\n\t\tdouble csb_cardinality;\t\t\t// Cardinality of relation\n\t\tPlanNode* csb_plan;\t\t\t\t// user-specified plan for this relation\n\t\tStreamType* csb_map;\t\t\t// Stream map for views\n\t\tRecordSource** csb_rsb_ptr;\t\t// point to rsb for nod_stream\n\t\tjrd_table_value_fun* csb_table_value_fun;  // Table value function\n\t};\n\n\ttypedef csb_repeat* rpt_itr;\n\ttypedef const csb_repeat* rpt_const_itr;\n\tFirebird::HalfStaticArray&lt;csb_repeat, 5&gt; csb_rpt;\n};\n\n\t// We must zero-initialize this one\ninline CompilerScratch::csb_repeat::csb_repeat() noexcept\n\t: csb_stream(0),\n\t  csb_view_stream(0),\n\t  csb_flags(0),\n\t  csb_relation(0),\n\t  csb_alias(0),\n\t  csb_procedure(0),\n\t  csb_view(0),\n\t  csb_idx(0),\n\t  csb_message(0),\n\t  csb_format(0),\n\t  csb_internal_format(0),\n\t  csb_fields(0),\n\t  csb_cardinality(0.0),\t// TMN: Non-natural cardinality?!\n\t  csb_plan(0),\n\t  csb_map(0),\n\t  csb_rsb_ptr(0),\n\t  csb_table_value_fun(0)\n{\n}\n\ninline void CompilerScratch::csb_repeat::activate() noexcept\n{\n\tcsb_flags |= csb_active;\n}\n\ninline void CompilerScratch::csb_repeat::deactivate() noexcept\n{\n\tcsb_flags &amp;= ~csb_active;\n}\n\ninline QualifiedName CompilerScratch::csb_repeat::getName(bool allowEmpty) const\n{\n\tif (csb_relation)\n\t\treturn csb_relation-&gt;rel_name;\n\telse if (csb_procedure)\n\t\treturn csb_procedure-&gt;getName();\n\telse if (csb_table_value_fun)\n\t\treturn QualifiedName(csb_table_value_fun-&gt;name);\n\t//// TODO: LocalTableSourceNode\n\t//// TODO: JsonTableSourceNode\n\telse\n\t{\n\t\tfb_assert(allowEmpty);\n\t\treturn {};\n\t}\n}\n\n\nclass AutoSetCurrentCursorId : private Firebird::AutoSetRestore&lt;ULONG&gt;\n{\npublic:\n\texplicit AutoSetCurrentCursorId(CompilerScratch* csb)\n\t\t: AutoSetRestore(&amp;csb-&gt;csb_currentCursorId,\n\t\t\t(csb-&gt;csb_currentCursorId == 0 ? csb-&gt;csb_nextCursorId++ : csb-&gt;csb_currentCursorId))\n\t{\n\t}\n};\n\n\nclass StatusXcp\n{\n\tFirebird::FbLocalStatus status;\n\npublic:\n\tStatusXcp();\n\n\tvoid clear();\n\tvoid init(const Jrd::FbStatusVector*) noexcept;\n\tvoid copyTo(Jrd::FbStatusVector*) const noexcept;\n\tbool success() const;\n\tSLONG as_gdscode() const;\n\tSLONG as_sqlcode() const;\n\tvoid as_sqlstate(char*) const;\n\tSLONG as_xcpcode() const;\n\tFirebird::string as_text() const;\n};\n\n// must correspond to the declared size of RDB$EXCEPTIONS.RDB$MESSAGE\ninline constexpr unsigned XCP_MESSAGE_LENGTH = 1023;\n\n// Array which stores relative pointers to impure areas of invariant nodes\ntypedef Firebird::SortedArray&lt;ULONG&gt; VarInvariantArray;\n\n} // namespace Jrd\n\n#endif // JRD_EXE_H\n"}, "/build/src/common/StatusArg.cpp": {"id": "/build/src/common/StatusArg.cpp", "filePath": "src/common/StatusArg.cpp", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusArg.cpp\n *\tDESCRIPTION:\tBuild status vector with variable number of elements\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n\n#include &quot;../common/classes/MetaString.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;fb_exception.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/msg_encode.h&quot;\n\n#ifdef WIN_NT\n#include &lt;windows.h&gt;\n#else\n#include &lt;errno.h&gt;\n#endif\n\nnamespace {\n\t// Didn&#x27;t want to bring dyn.h and friends here.\n\tconstexpr int DYN_MSG_FAC = FB_IMPL_MSG_FACILITY_DYN;\n}\n\nnamespace Firebird {\n\nnamespace Arg {\n\nBase::Base(ISC_STATUS k, ISC_STATUS c) :\n\timplementation(FB_NEW_POOL(*getDefaultMemoryPool()) ImplBase(k, c))\n{\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const ISC_STATUS* s) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tfb_assert(s);\n\n\tclear();\n\n\t// special case - empty initialized status vector, no warnings\n\tif (s[0] != isc_arg_gds || s[1] != 0 || s[2] != 0)\n\t\tappend(s);\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const IStatus* s) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tfb_assert(s);\n\n\tclear();\n\n\tif (s-&gt;getState() &amp; IStatus::STATE_ERRORS)\n\t\tappend(s-&gt;getErrors());\n\tif (s-&gt;getState() &amp; IStatus::STATE_WARNINGS)\n\t\tappend(s-&gt;getWarnings());\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const Exception&amp; ex) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tclear();\n\n\tassign(ex);\n}\n\nStatusVector::StatusVector(ISC_STATUS k, ISC_STATUS c) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(k, c))\n{\n\toperator&lt;&lt;(*(static_cast&lt;Base*&gt;(this)));\n}\n\nStatusVector::StatusVector(const ISC_STATUS* s) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(s))\n{\n}\n\nStatusVector::StatusVector(const IStatus* s) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(s))\n{\n}\n\nStatusVector::StatusVector(const Exception&amp; ex) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(ex))\n{\n}\n\nStatusVector::StatusVector() :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(0, 0))\n{\n}\n\nvoid StatusVector::ImplStatusVector::clear() noexcept\n{\n\tm_warning = 0;\n\tm_status_vector.clear();\n\tm_status_vector.push(isc_arg_end);\n\tm_strings.erase();\n}\n\nbool StatusVector::ImplStatusVector::compare(const StatusVector&amp; v) const noexcept\n{\n\treturn length() == v.length() &amp;&amp; fb_utils::cmpStatus(length(), value(), v.value());\n}\n\nvoid StatusVector::ImplStatusVector::assign(const StatusVector&amp; v) noexcept\n{\n\tclear();\n\tappend(v);\n}\n\nvoid StatusVector::ImplStatusVector::assign(const Exception&amp; ex) noexcept\n{\n\tclear();\n\tex.stuffException(m_status_vector);\n\tputStrArg(0);\n}\n\nvoid StatusVector::ImplStatusVector::putStrArg(unsigned startWith)\n{\n\tfor (ISC_STATUS* arg = m_status_vector.begin() + startWith; *arg != isc_arg_end; arg += fb_utils::nextArg(*arg))\n\t{\n\t\tif (!fb_utils::isStr(*arg))\n\t\t\tcontinue;\n\n\t\tconst char** ptr = reinterpret_cast&lt;const char**&gt;(&amp;arg[fb_utils::nextArg(*arg) - 1]);\n\t\tunsigned pos = m_strings.length();\n\t\tconst char* oldBase = m_strings.c_str();\n\n\t\tif (*arg == isc_arg_cstring)\n\t\t{\n\t\t\tm_strings.reserve(m_strings.length() + arg[1] + 1);\n\t\t\tm_strings.append(*ptr, arg[1]);\n\t\t\tm_strings.append(1, &#x27;\\0&#x27;);\n\t\t}\n\t\telse\n\t\t\t m_strings.append(*ptr, fb_strlen(*ptr) + 1);\n\n\t\t*ptr = &amp;m_strings[pos];\n\t\tsetStrPointers(oldBase);\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::setStrPointers(const char* oldBase)\n{\n\tconst char* const newBase = m_strings.c_str();\n\tif (newBase == oldBase)\n\t\treturn;\n\n\tconst char* const newEnd = m_strings.end();\n\n\tfor (ISC_STATUS* arg = m_status_vector.begin(); *arg != isc_arg_end; arg += fb_utils::nextArg(*arg))\n\t{\n\t\tif (!fb_utils::isStr(*arg))\n\t\t\tcontinue;\n\n\t\tconst char** ptr = reinterpret_cast&lt;const char**&gt;(&amp;arg[fb_utils::nextArg(*arg) - 1]);\n\t\tif (*ptr &gt;= newBase &amp;&amp; *ptr &lt; newEnd)\n\t\t\tbreak;\n\n\t\t*ptr = &amp;newBase[*ptr - oldBase];\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::append(const StatusVector&amp; v) noexcept\n{\n\tImplStatusVector newVector(getKind(), getCode());\n\n\tif (newVector.appendErrors(this))\n\t{\n\t\tif (newVector.appendErrors(v.implementation))\n\t\t{\n\t\t\tif (newVector.appendWarnings(this))\n\t\t\t\tnewVector.appendWarnings(v.implementation);\n\t\t}\n\t}\n\n\t*this = newVector;\n}\n\nvoid StatusVector::ImplStatusVector::prepend(const StatusVector&amp; v) noexcept\n{\n\tauto errFrom = v.implementation-&gt;value();\n\tauto lenFrom = v.implementation-&gt;firstWarning() ? v.implementation-&gt;firstWarning() : v.implementation-&gt;length();\n\tauto errTo = value();\n\tauto lenTo = firstWarning() ? firstWarning() : length();\n\n\tif (lenFrom &lt; lenTo &amp;&amp; fb_utils::cmpStatus(lenFrom, errFrom, errTo))\n\t\treturn;\t\t\t// already here - ToDo: check warnings\n\n\tImplStatusVector newVector(getKind(), getCode());\n\n\tif (newVector.appendErrors(v.implementation))\n\t{\n\t\tif (newVector.appendErrors(this))\n\t\t{\n\t\t\tif (newVector.appendWarnings(v.implementation))\n\t\t\t\tnewVector.appendWarnings(this);\n\t\t}\n\t}\n\n\t*this = newVector;\n}\n\nStatusVector::ImplStatusVector&amp; StatusVector::ImplStatusVector::operator=(const StatusVector::ImplStatusVector&amp; src)\n{\n\tm_status_vector = src.m_status_vector;\n\tm_warning = src.m_warning;\n\tm_strings = src.m_strings;\n\tsetStrPointers(src.m_strings.c_str());\n\n\treturn *this;\n}\n\nbool StatusVector::ImplStatusVector::appendErrors(const ImplBase* const v) noexcept\n{\n\treturn append(v-&gt;value(), v-&gt;firstWarning() ? v-&gt;firstWarning() : v-&gt;length());\n}\n\nbool StatusVector::ImplStatusVector::appendWarnings(const ImplBase* const v) noexcept\n{\n\tif (! v-&gt;firstWarning())\n\t\treturn true;\n\treturn append(v-&gt;value() + v-&gt;firstWarning(), v-&gt;length() - v-&gt;firstWarning());\n}\n\nbool StatusVector::ImplStatusVector::append(const ISC_STATUS* const from, const unsigned int count) noexcept\n{\n\t// CVC: I didn&#x27;t expect count to be zero but it&#x27;s, in some calls\n\tfb_assert(count &gt;= 0);\n\tif (!count)\n\t\treturn true; // not sure it&#x27;s the best option here\n\n\tunsigned lenBefore = length();\n\tISC_STATUS* s = m_status_vector.getBuffer(lenBefore + count + 1);\n\tunsigned int copied =\n\t\tfb_utils::copyStatus(&amp;s[lenBefore], count + 1, from, count);\n\tif (copied &lt; count)\n\t\tm_status_vector.shrink(lenBefore + copied + 1);\n\tputStrArg(lenBefore);\n\n\tif (!m_warning)\n\t{\n\t\tfor (unsigned n = 0; n &lt; length(); )\n\t\t{\n\t\t\tif (m_status_vector[n] == isc_arg_warning)\n\t\t\t{\n\t\t\t\tm_warning = n;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tn += (m_status_vector[n] == isc_arg_cstring) ? 3 : 2;\n\t\t}\n\t}\n\n\treturn copied == count;\n}\n\nvoid StatusVector::ImplStatusVector::append(const ISC_STATUS* const from) noexcept\n{\n\tunsigned l = fb_utils::statusLength(from);\n\tappend(from, l + 1);\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const Base&amp; arg) noexcept\n{\n\tm_status_vector[length()] = arg.getKind();\n\tm_status_vector.push(arg.getCode());\n\tm_status_vector.push(isc_arg_end);\n\n\tputStrArg(length() - 2);\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const Warning&amp; arg) noexcept\n{\n\tconst int cur = m_warning ? 0 : length();\n\tshiftLeft(*static_cast&lt;const Base*&gt;(&amp;arg));\n\tif (cur &amp;&amp; m_status_vector[cur] == isc_arg_warning)\n\t\tm_warning = cur;\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const char* text) noexcept\n{\n\tshiftLeft(Str(text));\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const AbstractString&amp; text) noexcept\n{\n\tshiftLeft(Str(text));\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const MetaString&amp; text) noexcept\n{\n\tshiftLeft(Str(text));\n}\n\n[[noreturn]] void StatusVector::raise() const\n{\n\tif (hasData())\n\t{\n\t\tstatus_exception::raise(*this);\n\t}\n\tstatus_exception::raise(Gds(isc_random) &lt;&lt; Str(&quot;Attempt to raise empty exception&quot;));\n}\n\nISC_STATUS StatusVector::ImplStatusVector::copyTo(ISC_STATUS* dest) const noexcept\n{\n\tif (hasData())\n\t{\n\t\tfb_utils::copyStatus(dest, ISC_STATUS_LENGTH, value(), length() + 1u);\n\t}\n\telse\n\t{\n\t\tdest[0] = isc_arg_gds;\n\t\tdest[1] = FB_SUCCESS;\n\t\tdest[2] = isc_arg_end;\n\t}\n\treturn dest[1];\n}\n\nvoid StatusVector::ImplStatusVector::copyTo(IStatus* dest) const noexcept\n{\n\tdest-&gt;init();\n\tif (hasData())\n\t{\n\t\tconst ISC_STATUS* v = m_status_vector.begin();\n\t\tunsigned int len = length();\n\t\tunsigned int warning = m_warning;\n\n\t\tif (v[warning] == isc_arg_warning)\n\t\t{\n\t\t\t dest-&gt;setWarnings2(len - warning, &amp;v[warning]);\n\t\t\t if (warning)\n\t\t\t\tdest-&gt;setErrors2(warning, v);\n\t\t}\n\t\telse\n\t\t\tdest-&gt;setErrors2(len, v);\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::appendTo(IStatus* dest) const noexcept\n{\n\tif (hasData())\n\t{\n\t\tImplStatusVector tmpVector(dest);\n\t\tImplStatusVector newVector(getKind(), getCode());\n\n\t\tif (newVector.appendErrors(&amp;tmpVector))\n\t\t{\n\t\t\tif (newVector.appendErrors(this))\n\t\t\t{\n\t\t\t\tif (newVector.appendWarnings(&amp;tmpVector))\n\t\t\t\t\tnewVector.appendWarnings(this);\n\t\t\t}\n\t\t}\n\n\t\t// take special care about strings safety\n\t\t// that&#x27;s why tmpStatus is needed here\n\t\tAutoPtr&lt;IStatus, SimpleDispose&gt; tmpStatus(dest-&gt;clone());\n\t\tnewVector.copyTo(tmpStatus);\n\n\t\tdest-&gt;setErrors(tmpStatus-&gt;getErrors());\n\t\tdest-&gt;setWarnings(tmpStatus-&gt;getWarnings());\n\t}\n}\n\nGds::Gds(ISC_STATUS s) noexcept :\n\tStatusVector(isc_arg_gds, s) { }\n\nPrivateDyn::PrivateDyn(ISC_STATUS codeWithoutFacility) noexcept :\n\tGds(ENCODE_ISC_MSG(codeWithoutFacility, DYN_MSG_FAC)) { }\n\nNum::Num(ISC_STATUS s) noexcept :\n\tBase(isc_arg_number, s) { }\n\nInt64::Int64(SINT64 val) noexcept :\n\tStr(text)\n{\n\tsnprintf(text, sizeof(text), &quot;%&quot; SQUADFORMAT, val);\n}\n\nInt64::Int64(FB_UINT64 val) noexcept :\n\tStr(text)\n{\n\tsnprintf(text, sizeof(text), &quot;%&quot; UQUADFORMAT, val);\n}\n\nQuad::Quad(const ISC_QUAD* quad) noexcept :\n\tStr(text)\n{\n\tsnprintf(text, sizeof(text), &quot;%x:%x&quot;, quad-&gt;gds_quad_high, quad-&gt;gds_quad_low);\n}\n\nInterpreted::Interpreted(const char* text) noexcept :\n\tStatusVector(isc_arg_interpreted, (ISC_STATUS)(IPTR) text) { }\n\nInterpreted::Interpreted(const AbstractString&amp; text) noexcept :\n\tStatusVector(isc_arg_interpreted, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nUnix::Unix(ISC_STATUS s) noexcept :\n\tBase(isc_arg_unix, s) { }\n\nMach::Mach(ISC_STATUS s) noexcept :\n\tBase(isc_arg_next_mach, s) { }\n\nWindows::Windows(ISC_STATUS s) noexcept :\n\tBase(isc_arg_win32, s) { }\n\nWarning::Warning(ISC_STATUS s) noexcept :\n\tStatusVector(isc_arg_warning, s) { }\n\n// Str overloading.\nStr::Str(const char* text) noexcept :\n\tBase(isc_arg_string, (ISC_STATUS)(IPTR) text) { }\n\nStr::Str(const AbstractString&amp; text) noexcept :\n\tBase(isc_arg_string, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nStr::Str(const MetaString&amp; text) noexcept :\n\tBase(isc_arg_string, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nSqlState::SqlState(const char* text) noexcept :\n\tBase(isc_arg_sql_state, (ISC_STATUS)(IPTR) text) { }\n\nSqlState::SqlState(const AbstractString&amp; text) noexcept :\n\tBase(isc_arg_sql_state, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nOsError::OsError() noexcept :\n#ifdef WIN_NT\n\tBase(isc_arg_win32, GetLastError()) { }\n#else\n\tBase(isc_arg_unix, errno) { }\n#endif\n\nOsError::OsError(ISC_STATUS s) noexcept :\n#ifdef WIN_NT\n\tBase(isc_arg_win32, s) { }\n#else\n\tBase(isc_arg_unix, s) { }\n#endif\n} // namespace Arg\n\n} // namespace Firebird\n"}, "/build/src/common/classes/alloc.h": {"id": "/build/src/common/classes/alloc.h", "filePath": "src/common/classes/alloc.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.h\n *\tDESCRIPTION:\tMemory Pool Manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  STL allocator is based on one by Mike Nordell and John Bellardo\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#ifndef CLASSES_ALLOC_H\n#define CLASSES_ALLOC_H\n\n#include &quot;firebird.h&quot;\n#include &quot;fb_types.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n\n#include &lt;stdio.h&gt;\n\n#if defined(MVS) || defined(DARWIN) || defined(__clang__)\n#include &lt;stdlib.h&gt;\n#else\n#include &lt;malloc.h&gt;\n#endif\n\n#include &lt;memory.h&gt;\n#include &lt;memory&gt;\n\n#ifdef DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool(), __FILE__, __LINE__)\n#define FB_NEW_POOL(pool) new(pool, __FILE__, __LINE__)\n#define FB_NEW_RPT(pool, count) new(pool, count, __FILE__, __LINE__)\n#else // DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool())\n#define FB_NEW_POOL(pool) new(pool)\n#define FB_NEW_RPT(pool, count) new(pool, count)\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird {\n\n// Alignment for all memory blocks\n#define ALLOC_ALIGNMENT 16\n\nstatic inline constexpr size_t MEM_ALIGN(size_t value)\n{\n\treturn FB_ALIGN(value, ALLOC_ALIGNMENT);\n}\n\n\nclass MemPool;\n\nclass MemoryStats\n{\npublic:\n\texplicit MemoryStats(MemoryStats* parent = NULL) noexcept\n\t\t: mst_parent(parent), mst_usage(0), mst_mapped(0), mst_max_usage(0), mst_max_mapped(0)\n\t{}\n\n\t~MemoryStats()\n\t{}\n\n\t// Forbid copying/assignment\n\tMemoryStats(const MemoryStats&amp;) = delete;\n\tMemoryStats&amp; operator=(const MemoryStats&amp;) = delete;\n\n\tsize_t getCurrentUsage() const noexcept { return mst_usage.value(); }\n\tsize_t getMaximumUsage() const noexcept { return mst_max_usage; }\n\tsize_t getCurrentMapping() const noexcept { return mst_mapped.value(); }\n\tsize_t getMaximumMapping() const noexcept { return mst_max_mapped; }\n\nprivate:\n\tMemoryStats* mst_parent;\n\n\t// Currently allocated memory (without allocator overhead)\n\t// Useful for monitoring engine memory leaks\n\tAtomicCounter mst_usage;\n\t// Amount of memory mapped (including all overheads)\n\t// Useful for monitoring OS memory consumption\n\tAtomicCounter mst_mapped;\n\n\t// We don&#x27;t particularily care about extreme precision of these max values,\n\t// this is why we don&#x27;t synchronize them\n\tsize_t mst_max_usage;\n\tsize_t mst_max_mapped;\n\n\t// These methods are thread-safe due to usage of atomic counters only\n\tvoid increment_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_usage.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_usage)\n\t\t\t\tstatistics-&gt;mst_max_usage = temp;\n\t\t}\n\t}\n\n\tvoid decrement_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_usage -= size;\n\t\t}\n\t}\n\n\tvoid increment_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_mapped.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_mapped)\n\t\t\t\tstatistics-&gt;mst_max_mapped = temp;\n\t\t}\n\t}\n\n\tvoid decrement_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_mapped -= size;\n\t\t}\n\t}\n\n\tfriend class MemPool;\n};\n\n\nclass MemoryPool\n{\nfriend class ExternalMemoryHandler;\n\nprivate:\n\tMemPool* pool;\n\n\tMemoryPool(MemPool* p) noexcept\n\t\t: pool(p)\n\t{ }\n\n\t// Default statistics group for process\n\tstatic MemoryStats* default_stats_group;\n\npublic:\n\t// This is maximum block size which is cached (not allocated directly from OS)\n\tenum RecommendedBufferSize { MAX_MEDIUM_BLOCK_SIZE = 64384 };\t// MediumLimits::TOP_LIMIT - 128\n\n\tstatic MemoryPool* defaultMemoryManager;\n\tstatic MemoryPool* externalMemoryManager;\n\npublic:\n\t// Create memory pool instance\n\tstatic MemoryPool* createPool(MemoryPool* parent = NULL, MemoryStats&amp; stats = *default_stats_group);\n\t// Delete memory pool instance\n\tstatic void deletePool(MemoryPool* pool);\n\n#ifdef DEBUG_GDS_ALLOC\n#define ALLOC_ARGS , __FILE__, __LINE__\n#define ALLOC_PARAMS , const char* file, int line\n#define ALLOC_PASS_ARGS , file, line\n#else\n#define ALLOC_ARGS\n#define ALLOC_PARAMS\n#define ALLOC_PASS_ARGS\n#endif // DEBUG_GDS_ALLOC\n\n\tvoid* calloc(size_t size ALLOC_PARAMS);\n\n\tstatic void* globalAlloc(size_t s ALLOC_PARAMS)\n\t{\n\t\treturn defaultMemoryManager-&gt;allocate(s ALLOC_PASS_ARGS);\n\t}\n\n\tvoid* allocate(size_t size ALLOC_PARAMS);\n\n\tstatic void globalFree(void* mem) noexcept;\n\tvoid deallocate(void* mem) noexcept;\n\n\t// Set context pool for current thread of execution\n\tstatic MemoryPool* setContextPool(MemoryPool* newPool);\n\n\t// Get context pool for current thread of execution\n\tstatic MemoryPool* getContextPool();\n\n\tMemoryStats&amp; getStatsGroup() noexcept;\n\n\t// Set statistics group for pool. Usage counters will be decremented from\n\t// previously set group and added to new\n\tvoid setStatsGroup(MemoryStats&amp; stats) noexcept;\n\n\t// Initialize and finalize global memory pool\n\tstatic void initDefaultPool();\n\tstatic void cleanupDefaultPool();\n\n\t// Initialize context pool\n\tstatic void contextPoolInit();\n\n\t// Print out pool contents. This is debugging routine\n\tstatic constexpr unsigned PRINT_USED_ONLY = 0x01;\n\tstatic constexpr unsigned PRINT_RECURSIVE = 0x02;\n\tvoid print_contents(FILE*, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\t// The same routine, but more easily callable from the debugger\n\tvoid print_contents(const char* filename, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\n\tinline bool operator==(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn pool == rhs.pool;\n\t}\n\n\tinline bool operator!=(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn !operator==(rhs);\n\t}\n\npublic:\n\tstruct Finalizer\n\t{\n\t\tvirtual ~Finalizer()\n\t\t{\n\t\t}\n\n\t\tvirtual void finalize() = 0;\n\n\t\tFinalizer* prev = nullptr;\n\t\tFinalizer* next = nullptr;\n\t};\n\n\ttemplate &lt;typename T&gt; Finalizer* registerFinalizer(void (*func)(T*), T* object)\n\t{\n\t\tstruct FinalizerImpl : Finalizer\n\t\t{\n\t\t\tFinalizerImpl(void (*aFunc)(T*), T* aObject)\n\t\t\t\t: func(aFunc),\n\t\t\t\t  object(aObject)\n\t\t\t{\n\t\t\t}\n\n\t\t\tvoid finalize() override\n\t\t\t{\n\t\t\t\tfunc(object);\n\t\t\t}\n\n\t\t\tvoid (*func)(T*);\n\t\t\tT* object;\n\t\t};\n\n\t\tfb_assert(func);\n\t\tFinalizerImpl* finalizer = FB_NEW_POOL(*this) FinalizerImpl(func, object);\n\n\t\tinternalRegisterFinalizer(finalizer);\n\n\t\treturn finalizer;\n\t}\n\n\tvoid unregisterFinalizer(Finalizer*&amp; finalizer);\n\nprivate:\n\tvoid internalRegisterFinalizer(Finalizer* entry);\n\nprivate:\n\tFinalizer* finalizers = nullptr;\n\n\tfriend class MemPool;\n};\n\nvoid initExternalMemoryPool();\n\n} // namespace Firebird\n\nstatic inline Firebird::MemoryPool* getDefaultMemoryPool() noexcept\n{\n\tfb_assert(Firebird::MemoryPool::defaultMemoryManager);\n\treturn Firebird::MemoryPool::defaultMemoryManager;\n}\n\nstatic inline Firebird::MemoryPool* getExternalMemoryPool() noexcept\n{\n\tusing namespace Firebird;\n\n\tif (!MemoryPool::externalMemoryManager)\n\t\tinitExternalMemoryPool();\n\n\treturn MemoryPool::externalMemoryManager;\n}\n\nnamespace Firebird {\n\n// Class intended to manage execution context pool stack\n// Declare instance of this class when you need to set new context pool and it\n// will be restored automatically as soon holder variable gets out of scope\nclass ContextPoolHolder\n{\npublic:\n\texplicit ContextPoolHolder(MemoryPool* newPool)\n\t{\n\t\tsavedPool = MemoryPool::setContextPool(newPool);\n\t}\n\t~ContextPoolHolder()\n\t{\n\t\tMemoryPool::setContextPool(savedPool);\n\t}\nprivate:\n\tMemoryPool* savedPool;\n};\n\n// template enabling common use of old and new pools control code\n// to be dropped when old-style code goes away\ntemplate &lt;typename SubsystemThreadData, typename SubsystemPool&gt;\nclass SubsystemContextPoolHolder : public ContextPoolHolder\n{\npublic:\n\tSubsystemContextPoolHolder\n\t(\n\t\tSubsystemThreadData* subThreadData,\n\t\tSubsystemPool* newPool\n\t)\n\t\t: ContextPoolHolder(newPool),\n\t\tsavedThreadData(subThreadData),\n\t\tsavedPool(savedThreadData-&gt;getDefaultPool())\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(newPool);\n\t}\n\n\t~SubsystemContextPoolHolder()\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(savedPool);\n\t}\n\nprivate:\n\tSubsystemThreadData* savedThreadData;\n\tSubsystemPool* savedPool;\n};\n\n} // namespace Firebird\n\nusing Firebird::MemoryPool;\n\n// operators new and delete\n\ninline void* operator new(size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void* operator new[](size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void operator delete(void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\ninline void operator delete[](void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#ifdef DEBUG_GDS_ALLOC\n\nextern void operator delete(void* mem) noexcept;\nextern void operator delete[](void* mem) noexcept;\n\n#if __cplusplus &gt;= 201402L\nextern void operator delete(void* mem, std::size_t s) noexcept;\nextern void operator delete[](void* mem, std::size_t s) noexcept;\n#endif\n\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird\n{\n\t// Global storage makes it possible to use new and delete for classes,\n\t// based on it, to behave traditionally, i.e. get memory from permanent pool.\n\tclass GlobalStorage\n\t{\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept\n\t\t{\n\t\t\treturn *getDefaultMemoryPool();\n\t\t}\n\t};\n\n\n\t// Permanent storage is used as base class for all objects,\n\t// performing memory allocation in methods other than\n\t// constructors of this objects. Permanent means that pool,\n\t// which will be later used for such allocations, must\n\t// be explicitly passed in all constructors of such object.\n\tclass PermanentStorage\n\t{\n\tprotected:\n\t\texplicit PermanentStorage(MemoryPool&amp; p) noexcept : pool(p) { }\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept { return pool; }\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n\n\t// Automatic storage is used as base class for objects,\n\t// that may have constructors without explicit MemoryPool\n\t// parameter. In this case AutoStorage sends AutoMemoryPool\n\t// to PermanentStorage. To ensure this operation to be safe\n\t// such trick possible only for local (on stack) variables.\n\tclass AutoStorage : public PermanentStorage\n\t{\n\tprivate:\n#if defined(DEV_BUILD)\n\t\tvoid ProbeStack() const noexcept;\n#endif\n\tpublic:\n\t\tstatic MemoryPool&amp; getAutoMemoryPool();\n\tprotected:\n\t\tAutoStorage()\n\t\t\t: PermanentStorage(getAutoMemoryPool())\n\t\t{\n#if defined(DEV_BUILD)\n\t\t\tProbeStack();\n#endif\n\t\t}\n\t\texplicit AutoStorage(MemoryPool&amp; p) noexcept : PermanentStorage(p) { }\n\t};\n\n\ttemplate &lt;&gt;\n\tinline void SimpleDelete&lt;MemoryPool&gt;::clear(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t\tMemoryPool::deletePool(pool);\n\t}\n\n\ttypedef AutoPtr&lt;MemoryPool&gt; AutoMemoryPool;\n\n\ttemplate &lt;typename T&gt;\n\tclass PoolAllocator\n\t{\n\ttemplate &lt;typename&gt; friend class PoolAllocator;\n\n\tpublic:\n\t\tusing value_type = T;\n\t\tusing size_type = size_t;\n\t\tusing pointer = T*;\n\t\tusing const_pointer = const T*;\n\t\tusing reference = T&amp;;\n\t\tusing const_reference = const T&amp;;\n\t\tusing void_pointer = void* ;\n\t\tusing const_void_pointer = const void*;\n\t\tusing difference_type = std::ptrdiff_t;\n\t\tusing is_always_equal = std::true_type;\n\n\t\ttemplate &lt;typename U&gt;\n\t\tstruct rebind\n\t\t{\n\t\t\ttypedef PoolAllocator&lt;U&gt; other;\n\t\t};\n\n\tpublic:\n\t\tPoolAllocator(MemoryPool&amp; aPool) noexcept\n\t\t\t: pool(aPool)\n\t\t{}\n\n\t\tPoolAllocator(const PoolAllocator&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\ttemplate &lt;class U&gt;\n\t\tPoolAllocator(const PoolAllocator&lt;U&gt;&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\t~PoolAllocator() noexcept\n\t\t{}\n\n\tpublic:\n\t\tconstexpr pointer allocate(size_type n, const void* hint = nullptr)\n\t\t{\n\t\t\treturn static_cast&lt;T*&gt;(pool.allocate(n * sizeof(T) ALLOC_ARGS));\n\t\t}\n\n\t\tconstexpr void deallocate(pointer p, size_type n)\n\t\t{\n\t\t\tpool.deallocate(p);\n\t\t}\n\n\t\tconstexpr size_type max_size() const noexcept\n\t\t{\n\t\t\treturn size_t(-1) / sizeof(T);\n\t\t}\n\n\t\ttemplate &lt;typename U, typename... Args&gt;\n\t\tconstexpr void construct(U* ptr, Args&amp;&amp;... args)\n\t\t{\n\t\t\tif constexpr (std::is_constructible&lt;U, MemoryPool&amp;, Args...&gt;::value)\n\t\t\t\tnew ((void*) ptr) U(pool, std::forward&lt;Args&gt;(args)...);\n\t\t\telse\n\t\t\t\tnew ((void*) ptr) U(std::forward&lt;Args&gt;(args)...);\n\t\t}\n\n\t\ttemplate &lt;typename U&gt;\n\t\tconstexpr void destroy(U* ptr)\n\t\t{\n\t\t\tptr-&gt;~U();\n\t\t}\n\n\t\tconstexpr bool operator==(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool == &amp;o.pool;\n\t\t}\n\n\t\tconstexpr bool operator!=(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool != &amp;o.pool;\n\t\t}\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n} // namespace Firebird\n\n\ntemplate &lt;typename TAlloc&gt;\nstruct std::allocator_traits&lt;Firebird::PoolAllocator&lt;TAlloc&gt;&gt;\n{\n\tusing Alloc = Firebird::PoolAllocator&lt;TAlloc&gt;;\n\n\tusing allocator_type = Alloc;\n\tusing value_type = typename Alloc::value_type;\n\tusing pointer = typename Alloc::pointer;\n\tusing const_pointer = typename Alloc::const_pointer;\n\tusing void_pointer = typename Alloc::void_pointer;\n\tusing const_void_pointer = typename Alloc::const_void_pointer;\n\tusing size_type = typename Alloc::size_type;\n\tusing difference_type = typename Alloc::difference_type;\n\tusing reference = value_type&amp;;\n\tusing const_reference = const value_type&amp;;\n\n\tusing is_always_equal = typename Alloc::is_always_equal;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_alloc = typename Alloc::template rebind&lt;T&gt;::other;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_traits = allocator_traits&lt;rebind_alloc&lt;T&gt;&gt;;\n\n\tstatic constexpr pointer allocate(Alloc&amp; alloc, size_type size)\n\t{\n\t\treturn alloc.allocate(size);\n\t}\n\n\tstatic constexpr void deallocate(Alloc&amp; alloc, pointer ptr, size_type size)\n\t{\n\t\talloc.deallocate(ptr, size);\n\t}\n\n\ttemplate &lt;typename T, typename... Args&gt;\n\tstatic constexpr void construct(Alloc&amp; alloc, T* ptr, Args&amp;&amp;... args)\n\t{\n\t\talloc.construct(ptr, std::forward&lt;Args&gt;(args)...);\n\t}\n\n\ttemplate &lt;typename T&gt;\n\tstatic constexpr void destroy(Alloc&amp; alloc, T* ptr)\n\t{\n\t\talloc.destroy(ptr);\n\t}\n\n\tstatic constexpr size_type max_size(const Alloc&amp; alloc) noexcept\n\t{\n\t\treturn alloc.max_size();\n\t}\n};\n\n\n#endif // CLASSES_ALLOC_H\n"}, "/build/src/common/DynamicStrings.cpp": {"id": "/build/src/common/DynamicStrings.cpp", "filePath": "src/common/DynamicStrings.cpp", "content": "/*\n *\tPROGRAM:\t\tFirebird status vector support.\n *\tMODULE:\t\t\tDynamicStrings.cpp\n *\tDESCRIPTION:\tDynamically store strings in status vector.\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2015 Alex Peshkov &lt;peshkoff at mail dot ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#include &quot;firebird.h&quot;\n\n#include &quot;DynamicStrings.h&quot;\n#include &quot;utils_proto.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;classes/alloc.h&quot;\n\n#include &lt;string.h&gt;\n\nnamespace Firebird {\n\nunsigned makeDynamicStrings(unsigned length, ISC_STATUS* const dst, const ISC_STATUS* const src)\n{\n\tconst ISC_STATUS* end = &amp;src[length];\n\n\t// allocate space for strings\n\tsize_t len = 0;\n\tfor (const ISC_STATUS* from = src; from &lt; end; ++from)\n\t{\n\t\tconst ISC_STATUS type = *from++;\n\t\tif (from == end || type == isc_arg_end)\n\t\t{\n\t\t\tend = from - 1;\n\t\t\tbreak;\n\t\t}\n\n\t\tswitch (type)\n\t\t{\n\t\tcase isc_arg_cstring:\n\t\t\tif (from + 1 &gt;= end)\n\t\t\t{\n\t\t\t\tend = from - 1;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tlen += *from++;\n\t\t\tlen++;\n\t\t\tbreak;\n\n\t\tcase isc_arg_string:\n\t\tcase isc_arg_interpreted:\n\t\tcase isc_arg_sql_state:\n\t\t\tlen += strlen(reinterpret_cast&lt;const char*&gt;(*from));\n\t\t\tlen++;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\tchar* string = len ? FB_NEW_POOL(*getDefaultMemoryPool()) char[len] : NULL;\n\tISC_STATUS* to = dst;\n\n\t// copy status vector saving strings in local buffer\n\tfor (const ISC_STATUS* from = src; from &lt; end; ++from)\n\t{\n\t\tconst ISC_STATUS type = *from++;\n\t\t*to++ = type == isc_arg_cstring ? isc_arg_string : type;\n\n\t\tswitch (type)\n\t\t{\n\t\tcase isc_arg_cstring:\n\t\t\tfb_assert(string);\n\t\t\t*to++ = (ISC_STATUS)(IPTR) string;\n\t\t\tmemcpy(string, reinterpret_cast&lt;const char*&gt;(from[1]), from[0]);\n\t\t\tstring += *from++;\n\t\t\t*string++ = &#x27;\\0&#x27;;\n\t\t\tbreak;\n\n\t\tcase isc_arg_string:\n\t\tcase isc_arg_interpreted:\n\t\tcase isc_arg_sql_state:\n\t\t\tfb_assert(string);\n\t\t\t*to++ = (ISC_STATUS)(IPTR) string;\n\t\t\tstrcpy(string, reinterpret_cast&lt;const char*&gt;(*from));\n\t\t\tstring += strlen(string);\n\t\t\tstring++;\n\t\t\tbreak;\n\n\t\tdefault:\n\t\t\t*to++ = *from;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\t*to++ = isc_arg_end;\n\n\treturn (to - dst) - 1;\n}\n\nchar* findDynamicStrings(unsigned length, ISC_STATUS* ptr) noexcept\n{\n\twhile (length--)\n\t{\n\t\tconst ISC_STATUS type = *ptr++;\n\t\tif (type == isc_arg_end)\n\t\t\tbreak;\n\n\t\tswitch (type)\n\t\t{\n\t\tcase isc_arg_cstring:\n\t\t\tfb_assert(false); // CVC: according to the new logic, this case cannot happen\n\t\t\tptr++;\n\n\t\tcase isc_arg_string:\n\t\tcase isc_arg_interpreted:\n\t\tcase isc_arg_sql_state:\n\t\t\treturn reinterpret_cast&lt;char*&gt;(*ptr);\n\n\t\tdefault:\n\t\t\tptr++;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\treturn NULL;\n}\n\n\n} // namespace Firebird\n"}, "/build/src/jrd/jrd.h": {"id": "/build/src/jrd/jrd.h", "filePath": "src/jrd/jrd.h", "content": "/*\n *      PROGRAM:        JRD access method\n *      MODULE:         jrd.h\n *      DESCRIPTION:    Common descriptions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;DecOSF&quot; port\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n * Claudio Valderrama C.\n * Adriano dos Santos Fernandes\n *\n */\n\n#ifndef JRD_JRD_H\n#define JRD_JRD_H\n\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../common/dsc.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/obj.h&quot;\n#include &quot;../jrd/val.h&quot;\n#include &quot;../jrd/status.h&quot;\n\n#include &quot;../common/classes/fb_atomic.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../jrd/MetaName.h&quot;\n#include &quot;../common/classes/NestConst.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/objects_array.h&quot;\n#include &quot;../common/classes/stack.h&quot;\n#include &quot;../common/classes/timestamp.h&quot;\n#include &quot;../common/classes/GenericMap.h&quot;\n#include &quot;../common/classes/Synchronize.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/StatusHolder.h&quot;\n#include &quot;../jrd/RandomGenerator.h&quot;\n#include &quot;../common/os/guid.h&quot;\n#include &quot;../jrd/sbm.h&quot;\n#include &quot;../jrd/scl.h&quot;\n#include &quot;../jrd/Routine.h&quot;\n#include &quot;../jrd/ExtEngineManager.h&quot;\n#include &quot;../jrd/Attachment.h&quot;\n#include &quot;firebird/Interface.h&quot;\n\n#ifndef CDS_UNAVAILABLE\n#include &lt;cds/threading/model.h&gt;\t// cds::threading::Manager\n#endif\n\n#define BUGCHECK(number)\t\tERR_bugcheck(number, __FILE__, __LINE__)\n#define SOFT_BUGCHECK(number)\tERR_soft_bugcheck(number, __FILE__, __LINE__)\n#define CORRUPT(number)\t\t\tERR_corrupt(number)\n#define IBERROR(number)\t\t\tERR_error(number)\n\n\n#define BLKCHK(blk, type)       if (!blk-&gt;checkHandle()) BUGCHECK(147)\n\n#define DEV_BLKCHK(blk, type)\tdo { } while (false)\t// nothing\n\n\n// Thread data block / IPC related data blocks\n#include &quot;../common/ThreadData.h&quot;\n\n// Definition of block types for data allocation in JRD\n#include &quot;../include/fb_blk.h&quot;\n\n#include &quot;../jrd/blb.h&quot;\n\n// Definition of DatabasePlugins\n#include &quot;../jrd/flu.h&quot;\n\n#include &quot;../jrd/pag.h&quot;\n\n#include &quot;../jrd/RuntimeStatistics.h&quot;\n#include &quot;../jrd/Database.h&quot;\n#include &quot;../jrd/lck.h&quot;\n\n// Error codes\n#include &quot;iberror.h&quot;\n\nstruct dsc;\n\nnamespace EDS {\n\tclass Connection;\n}\n\nnamespace Firebird {\n\tclass TextType;\n}\n\nnamespace Jrd {\n\ninline constexpr unsigned MAX_CALLBACKS = 50;\n\n// fwd. decl.\nclass thread_db;\nclass Attachment;\nclass jrd_tra;\nclass Request;\nclass Statement;\nclass jrd_file;\nclass Format;\nclass BufferDesc;\nclass SparseBitmap;\nclass jrd_rel;\nclass ExternalFile;\nclass ViewContext;\nclass IndexBlock;\nclass IndexLock;\nclass ArrayField;\nstruct sort_context;\nclass vcl;\nclass Parameter;\nclass jrd_fld;\nclass dsql_dbb;\nclass PreparedStatement;\nclass TraceManager;\nclass MessageNode;\n\n\n// Relation trigger definition\n\nclass Trigger\n{\npublic:\n\tFirebird::HalfStaticArray&lt;UCHAR, 128&gt; blr;\t\t\t// BLR code\n\tFirebird::HalfStaticArray&lt;UCHAR, 128&gt; debugInfo;\t// Debug info\n\tStatement* statement = nullptr;\t\t\t\t\t\t// Compiled statement\n\tbool releaseInProgress = false;\n\tSSHORT sysTrigger = 0;\t\t\t\t// See fb_sysflag in constants.h\n\tFB_UINT64 type = 0;\t\t\t\t\t// Trigger type\n\tUSHORT flags = 0;\t\t\t\t\t// Flags as they are in RDB$TRIGGERS table\n\tjrd_rel* relation = nullptr;\t\t// Trigger parent relation\n\tQualifiedName name;\t\t\t\t\t// Trigger name\n\tMetaName engine;\t\t\t\t\t// External engine name\n\tMetaName owner;\t\t\t\t\t\t// Owner for SQL SECURITY\n\tFirebird::string entryPoint;\t\t// External trigger entrypoint\n\tFirebird::string extBody;\t\t\t// External trigger body\n\tFirebird::TriState ssDefiner;\t\t// SQL SECURITY\n\tstd::unique_ptr&lt;ExtEngineManager::Trigger&gt; extTrigger;\t// External trigger\n\n\tbool isActive() const;\n\n\tvoid compile(thread_db*);\t\t\t\t// Ensure that trigger is compiled\n\tvoid release(thread_db*);\t\t\t\t// Try to free trigger request\n\n\texplicit Trigger(MemoryPool&amp; p)\n\t\t: blr(p), debugInfo(p), entryPoint(p), extBody(p)\n\t{}\n};\n\n\n// Array of triggers (suppose separate arrays for triggers of different types)\n\nclass TrigVector : public Firebird::ObjectsArray&lt;Trigger&gt;\n{\npublic:\n\texplicit TrigVector(Firebird::MemoryPool&amp; pool)\n\t\t: Firebird::ObjectsArray&lt;Trigger&gt;(pool),\n\t\t  useCount(0)\n\t{ }\n\n\tTrigVector()\n\t\t: Firebird::ObjectsArray&lt;Trigger&gt;(),\n\t\t  useCount(0)\n\t{ }\n\n\tvoid addRef()\n\t{\n\t\t++useCount;\n\t}\n\n\tbool hasActive() const;\n\n\tvoid decompile(thread_db* tdbb);\n\n\tvoid release();\n\tvoid release(thread_db* tdbb);\n\n\t~TrigVector()\n\t{\n\t\tfb_assert(useCount.value() == 0);\n\t}\n\nprivate:\n\tFirebird::AtomicCounter useCount;\n};\n\n\n//\n// Flags to indicate normal internal requests vs. dyn internal requests\n//\n// IRQ_REQUESTS and DYN_REQUESTS are deprecated\ninline constexpr int IRQ_REQUESTS\t\t= 1;\ninline constexpr int DYN_REQUESTS\t\t= 2;\ninline constexpr int CACHED_REQUESTS\t= 3;\n\n\n// Procedure block\n\nclass jrd_prc final : public Routine\n{\npublic:\n\tconst Format*\tprc_record_format = nullptr;\n\tprc_t\t\t\tprc_type = prc_legacy;\t\t\t// procedure type\n\n\tconst ExtEngineManager::Procedure* getExternal() const noexcept { return prc_external; }\n\tvoid setExternal(const ExtEngineManager::Procedure* value) noexcept { prc_external = value; }\n\nprivate:\n\tconst ExtEngineManager::Procedure* prc_external = nullptr;\n\npublic:\n\texplicit jrd_prc(MemoryPool&amp; p)\n\t\t: Routine(p)\n\t{\n\t}\n\npublic:\n\tint getObjectType() const override\n\t{\n\t\treturn obj_procedure;\n\t}\n\n\tSLONG getSclType() const override\n\t{\n\t\treturn obj_procedures;\n\t}\n\n\tvoid releaseFormat() override\n\t{\n\t\tdelete prc_record_format;\n\t\tprc_record_format = NULL;\n\t}\n\n\t~jrd_prc() override\n\t{\n\t\tdelete prc_external;\n\t}\n\n\tbool checkCache(thread_db* tdbb) const override;\n\tvoid clearCache(thread_db* tdbb) override;\n\n\tvoid releaseExternal() override\n\t{\n\t\tdelete prc_external;\n\t\tprc_external = NULL;\n\t}\n\nprotected:\n\tbool reload(thread_db* tdbb) override;\t// impl is in met.epp\n};\n\n\n// Parameter block\n\nclass Parameter final : public pool_alloc&lt;type_prm&gt;\n{\npublic:\n\tUSHORT\t\tprm_number;\n\tdsc\t\t\tprm_desc;\n\tNestConst&lt;ValueExprNode&gt;\tprm_default_value;\n\tbool\t\tprm_nullable;\n\tprm_mech_t\tprm_mechanism;\n\tMetaName prm_name;\n\tQualifiedName prm_field_source;\n\tMetaName prm_type_of_column;\n\tQualifiedName prm_type_of_table;\n\tstd::optional&lt;USHORT&gt; prm_text_type;\n\tFUN_T\t\tprm_fun_mechanism;\n\npublic:\n\texplicit Parameter(MemoryPool&amp; p)\n\t\t: prm_name(p),\n\t\t  prm_field_source(p),\n\t\t  prm_type_of_column(p),\n\t\t  prm_type_of_table(p)\n\t{\n\t}\n};\n\n// Index block to cache index information\n\nclass IndexBlock final : public pool_alloc&lt;type_idb&gt;\n{\npublic:\n\tIndexBlock*\tidb_next;\n\tValueExprNode* idb_expression;\t\t\t// node tree for index expression\n\tStatement* idb_expression_statement;\t// statement for index expression evaluation\n\tdsc\t\t\tidb_expression_desc;\t\t// descriptor for expression result\n\tBoolExprNode* idb_condition;\t\t\t// node tree for index condition\n\tStatement* idb_condition_statement;\t\t// statement for index condition evaluation\n\tLock*\t\tidb_lock;\t\t\t\t\t// lock to synchronize changes to index\n\tUSHORT\t\tidb_id;\n};\n\n\n//\n// Transaction element block\n//\nstruct teb\n{\n\tAttachment* teb_database;\n\tint teb_tpb_length;\n\tconst UCHAR* teb_tpb;\n};\n\ntypedef teb TEB;\n\n// Window block for loading cached pages into\n// CVC: Apparently, the only possible values are HEADER_PAGE==0 and LOG_PAGE==2\n// and reside in ods.h, although I watched a place with 1 and others with members\n// of a struct.\n\nstruct win\n{\n\tPageNumber win_page;\n\tOds::pag* win_buffer;\n\tclass BufferDesc* win_bdb;\n\tSSHORT win_scans;\n\tUSHORT win_flags;\n\texplicit win(const PageNumber&amp; wp) noexcept\n\t\t: win_page(wp),\n\t\twin_buffer(nullptr),\n\t       \twin_bdb(nullptr), \n\t\twin_flags(0),\n\t\twin_scans(0)\n\n\t{}\n\twin(const USHORT pageSpaceID, const ULONG pageNum) noexcept\n\t\t: win_page(pageSpaceID, pageNum),\n\t       \twin_bdb(nullptr),\n\t\twin_buffer(nullptr),\n\t       \twin_flags(0),\n\t\twin_scans(0)\n\t{}\n};\n\ntypedef win WIN;\n\n// This is a compilation artifact: I wanted to be sure I would pick all old &quot;win&quot;\n// declarations at the top, so &quot;win&quot; was built with a mandatory argument in\n// the constructor. This struct satisfies a single place with an array. The\n// alternative would be to initialize 16 elements of the array with 16 calls\n// to the constructor: win my_array[n] = {win(-1), ... (win-1)};\n// When all places are changed, this class can disappear and win&#x27;s constructor\n// may get the default value of ~0 to &quot;wp&quot;.\nstruct win_for_array : public win\n{\n\twin_for_array() noexcept\n\t\t: win(DB_PAGE_SPACE, ~0)\n\t{}\n};\n\n// win_flags\n\ninline constexpr USHORT WIN_large_scan\t\t\t= 1;\t// large sequential scan\ninline constexpr USHORT WIN_secondary\t\t\t= 2;\t// secondary stream\ninline constexpr USHORT WIN_garbage_collector\t= 4;\t// garbage collector&#x27;s window\ninline constexpr USHORT WIN_garbage_collect\t\t= 8;\t// scan left a page for garbage collector\n\n\n#ifdef USE_ITIMER\nclass TimeoutTimer final :\n\tpublic Firebird::RefCntIface&lt;Firebird::ITimerImpl&lt;TimeoutTimer, Firebird::CheckStatusWrapper&gt; &gt;\n{\npublic:\n\texplicit TimeoutTimer() noexcept\n\t\t: m_started(0),\n\t\t  m_expired(false),\n\t\t  m_value(0),\n\t\t  m_error(0)\n\t{ }\n\n\t// ITimer implementation\n\tvoid handler() override;\n\n\tbool expired() const noexcept\n\t{\n\t\treturn m_expired;\n\t}\n\n\tunsigned int getValue() const noexcept\n\t{\n\t\treturn m_value;\n\t}\n\n\tunsigned int getErrCode() const noexcept\n\t{\n\t\treturn m_error;\n\t}\n\n\t// milliseconds left before timer expiration\n\tunsigned int timeToExpire() const;\n\n\t// evaluate expire timestamp using start timestamp\n\tbool getExpireTimestamp(const ISC_TIMESTAMP_TZ start, ISC_TIMESTAMP_TZ&amp; exp) const;\n\n\t// set timeout value in milliseconds and secondary error code\n\tvoid setup(unsigned int value, ISC_STATUS error) noexcept\n\t{\n\t\tm_value = value;\n\t\tm_error = error;\n\t}\n\n\tvoid start();\n\tvoid stop();\n\nprivate:\n\tSINT64 m_started;\n\tbool m_expired;\n\tunsigned int m_value;\t// milliseconds\n\tISC_STATUS m_error;\n};\n#else\nclass TimeoutTimer final : public Firebird::RefCounted\n{\npublic:\n\texplicit TimeoutTimer() noexcept\n\t\t: m_start(0),\n\t\t  m_value(0),\n\t\t  m_error(0)\n\t{ }\n\n\tbool expired() const;\n\n\tunsigned int getValue() const noexcept\n\t{\n\t\treturn m_value;\n\t}\n\n\tunsigned int getErrCode() const noexcept\n\t{\n\t\treturn m_error;\n\t}\n\n\t// milliseconds left before timer expiration\n\tunsigned int timeToExpire() const;\n\n\t// clock value when timer will expire\n\tbool getExpireClock(SINT64&amp; clock) const noexcept;\n\n\t// set timeout value in milliseconds and secondary error code\n\tvoid setup(unsigned int value, ISC_STATUS error) noexcept\n\t{\n\t\tm_start = 0;\n\t\tm_value = value;\n\t\tm_error = error;\n\t}\n\n\tvoid start();\n\tvoid stop() noexcept;\n\nprivate:\n\tSINT64 currTime() const\n\t{\n\t\treturn fb_utils::query_performance_counter() * 1000 / fb_utils::query_performance_frequency();\n\t}\n\n\tSINT64 m_start;\n\tunsigned int m_value;\t// milliseconds\n\tISC_STATUS m_error;\n};\n#endif // USE_ITIMER\n\n// Thread specific database block\n\n// tdbb_flags\n\ninline constexpr ULONG TDBB_sweeper\t\t\t\t= 1;\t\t// Thread sweeper or garbage collector\ninline constexpr ULONG TDBB_no_cache_unwind\t\t= 2;\t\t// Don&#x27;t unwind page buffer cache\ninline constexpr ULONG TDBB_backup_write_locked\t= 4;    \t// BackupManager has write lock on LCK_backup_database\ninline constexpr ULONG TDBB_stack_trace_done\t= 8;\t\t// PSQL stack trace is added into status-vector\ninline constexpr ULONG TDBB_dont_post_dfw\t\t= 16;\t\t// dont post DFW tasks as deferred work is performed now\ninline constexpr ULONG TDBB_sys_error\t\t\t= 32;\t\t// error shouldn&#x27;t be handled by the looper\ninline constexpr ULONG TDBB_verb_cleanup\t\t= 64;\t\t// verb cleanup is in progress\ninline constexpr ULONG TDBB_use_db_page_space\t= 128;\t\t// use database (not temporary) page space in GTT operations\ninline constexpr ULONG TDBB_detaching\t\t\t= 256;\t\t// detach is in progress\ninline constexpr ULONG TDBB_wait_cancel_disable\t= 512;\t\t// don&#x27;t cancel current waiting operation\ninline constexpr ULONG TDBB_cache_unwound\t\t= 1024;\t\t// page cache was unwound\ninline constexpr ULONG TDBB_reset_stack\t\t\t= 2048;\t\t// stack should be reset after stack overflow exception\ninline constexpr ULONG TDBB_dfw_cleanup\t\t\t= 4096;\t\t// DFW cleanup phase is active\ninline constexpr ULONG TDBB_repl_in_progress\t= 8192;\t\t// Prevent recursion in replication\ninline constexpr ULONG TDBB_replicator\t\t\t= 16384;\t// Replicator\ninline constexpr ULONG TDBB_async\t\t\t\t= 32768;\t// Async context (set in AST)\n\nclass thread_db final : public Firebird::ThreadData\n{\n\tstatic constexpr int QUANTUM\t\t= 100;\t// Default quantum\n\tstatic constexpr int SWEEP_QUANTUM\t= 10;\t// Make sweeps less disruptive\n\nprivate:\n\tMemoryPool*\tdefaultPool;\n\tvoid setDefaultPool(MemoryPool* p) noexcept\n\t{\n\t\tdefaultPool = p;\n\t}\n\tfriend class Firebird::SubsystemContextPoolHolder &lt;Jrd::thread_db, MemoryPool&gt;;\n\tDatabase*\tdatabase;\n\tAttachment*\tattachment;\n\tjrd_tra*\ttransaction;\n\tRequest*\trequest;\n\tRuntimeStatistics *reqStat, *traStat, *attStat, *dbbStat;\n\npublic:\n\texplicit thread_db(FbStatusVector* status)\n\t\t: ThreadData(ThreadData::tddDBB),\n\t\t  defaultPool(NULL),\n\t\t  database(NULL),\n\t\t  attachment(NULL),\n\t\t  transaction(NULL),\n\t\t  request(NULL),\n\t\t  tdbb_status_vector(status),\n\t\t  tdbb_quantum(QUANTUM),\n\t\t  tdbb_flags(0),\n\t\t  tdbb_temp_traid(0),\n\t\t  tdbb_bdbs(*getDefaultMemoryPool()),\n\t\t  tdbb_thread(Firebird::ThreadSync::getThread(&quot;thread_db&quot;))\n\t{\n\t\treqStat = traStat = attStat = dbbStat = RuntimeStatistics::getDummy();\n\t\tfb_utils::init_status(tdbb_status_vector);\n\t}\n\n\t~thread_db()\n\t{\n\t\tresetStack();\n\n#ifdef DEV_BUILD\n\t\tfor (FB_SIZE_T n = 0; n &lt; tdbb_bdbs.getCount(); ++n)\n\t\t{\n\t\t\tfb_assert(tdbb_bdbs[n] == NULL);\n\t\t}\n#endif\n\t}\n\n\tFbStatusVector*\ttdbb_status_vector;\n\tSLONG\t\ttdbb_quantum;\t\t// Cycles remaining until voluntary schedule\n\tULONG\t\ttdbb_flags;\n\n\tTraNumber\ttdbb_temp_traid;\t// current temporary table scope\n\n\t// BDB&#x27;s held by thread\n\tFirebird::HalfStaticArray&lt;BufferDesc*, 16&gt; tdbb_bdbs;\n\tFirebird::ThreadSync* tdbb_thread;\n\n\tMemoryPool* getDefaultPool() noexcept\n\t{\n\t\treturn defaultPool;\n\t}\n\n\tDatabase* getDatabase() noexcept\n\t{\n\t\treturn database;\n\t}\n\n\tconst Database* getDatabase() const noexcept\n\t{\n\t\treturn database;\n\t}\n\n\tvoid setDatabase(Database* val);\n\n\tAttachment* getAttachment() noexcept\n\t{\n\t\treturn attachment;\n\t}\n\n\tconst Attachment* getAttachment() const noexcept\n\t{\n\t\treturn attachment;\n\t}\n\n\tvoid setAttachment(Attachment* val);\n\n\tjrd_tra* getTransaction() noexcept\n\t{\n\t\treturn transaction;\n\t}\n\n\tconst jrd_tra* getTransaction() const noexcept\n\t{\n\t\treturn transaction;\n\t}\n\n\tvoid setTransaction(jrd_tra* val);\n\n\tRequest* getRequest() noexcept\n\t{\n\t\treturn request;\n\t}\n\n\tconst Request* getRequest() const noexcept\n\t{\n\t\treturn request; tPart&gt; m_ref;\n\t\tconst char* m_from;\n\t};\n\n\tclass CheckoutLockGuard\n\t{\n\tpublic:\n\t\tCheckoutLockGuard(thread_db* tdbb, Firebird::Mutex&amp; mutex,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_mutex(mutex)\n\t\t{\n\t\t\tif (!m_mutex.tryEnter(from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_mutex.enter(from);\n\t\t\t}\n\t\t}\n\n\t\t~CheckoutLockGuard()\n\t\t{\n\t\t\tm_mutex.leave();\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutLockGuard(const CheckoutLockGuard&amp;) = delete;\n\t\tCheckoutLockGuard&amp; operator=(const CheckoutLockGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Mutex&amp; m_mutex;\n\t};\n\n\tclass CheckoutSyncGuard\n\t{\n\tpublic:\n\t\tCheckoutSyncGuard(thread_db* tdbb, Firebird::SyncObject&amp; sync,\n\t\t\t\t\t\t  Firebird::SyncType type,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_sync(&amp;sync, from)\n\t\t{\n\t\t\tif (!m_sync.lockConditional(type, from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_sync.lock(type);\n\t\t\t}\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutSyncGuard(const CheckoutSyncGuard&amp;) = delete;\n\t\tCheckoutSyncGuard&amp; operator=(const CheckoutSyncGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Sync m_sync;\n\t};\n}\n\n#endif // JRD_JRD_H\n"}, "/build/src/common/fb_exception.cpp": {"id": "/build/src/common/fb_exception.cpp", "filePath": "src/common/fb_exception.cpp", "content": "#include &quot;firebird.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &lt;string.h&gt;\n#include &lt;errno.h&gt;\n#include &lt;stdarg.h&gt;\n#include &quot;iberror.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/StatusHolder.h&quot;\n\nnamespace Firebird {\n\n// ********************************* Exception *******************************\n\nException::~Exception() noexcept { }\n\nvoid Exception::stuffException(DynamicStatusVector&amp; status_vector) const noexcept\n{\n\tStaticStatusVector status;\n\tstuffException(status);\n\ttry\n\t{\n\t\tstatus_vector.save(status.begin());\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tISC_STATUS tmp[3];\n\t\tprocessUnexpectedException(tmp);\n\t\tstatus_vector.save(tmp);\n\t}\n}\n\nvoid Exception::stuffException(IStatus* status_vector) const noexcept\n{\n\tStaticStatusVector status;\n\tstuffException(status);\n\tfb_utils::setIStatus(status_vector, status.begin());\n}\n\nvoid Exception::processUnexpectedException(ISC_STATUS* vector) noexcept\n{\n\t// do not use stuffException() here to avoid endless loop\n\ttry\n\t{\n\t\tthrow;\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tfb_utils::statusBadAlloc(vector);\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tfb_assert(false);\n\n\t\tfb_utils::statusUnknown(vector);\n\t}\n}\n\n// ********************************* status_exception *******************************\n\nstatus_exception::status_exception() noexcept\n\t: m_status_vector(m_buffer)\n{\n\tfb_utils::init_status(m_status_vector);\n}\n\nstatus_exception::status_exception(const ISC_STATUS *status_vector) noexcept\n\t: m_status_vector(m_buffer)\n{\n\tfb_utils::init_status(m_status_vector);\n\n\tif (status_vector)\n\t{\n\t\tset_status(status_vector);\n\t}\n}\n\nstatus_exception::status_exception(const status_exception&amp; from) noexcept\n\t: m_status_vector(m_buffer)\n{\n\tfb_utils::init_status(m_status_vector);\n\n\tset_status(from.m_status_vector);\n}\n\nvoid status_exception::set_status(const ISC_STATUS *new_vector) noexcept\n{\n\tfb_assert(new_vector != 0);\n\tunsigned len = fb_utils::statusLength(new_vector);\n\n\ttry\n\t{\n\t\tif (len &gt;= FB_NELEM(m_buffer))\n\t\t{\n\t\t\tm_status_vector = FB_NEW_POOL(*getDefaultMemoryPool()) ISC_STATUS[len + 1];\n\t\t}\n\t\tlen = makeDynamicStrings(len, m_status_vector, new_vector);\n\t\tm_status_vector[len] = isc_arg_end;\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tif (m_status_vector != m_buffer)\n\t\t{\n\t\t\tdelete[] m_status_vector;\n\t\t\tm_status_vector = m_buffer;\n\t\t}\n\t\tprocessUnexpectedException(m_buffer);\n\t}\n}\n\nstatus_exception::~status_exception() noexcept\n{\n\tdelete[] findDynamicStrings(fb_utils::statusLength(m_status_vector), m_status_vector);\n\tif (m_status_vector != m_buffer)\n\t{\n\t\tdelete[] m_status_vector;\n\t}\n}\n\nconst char* status_exception::what() const noexcept\n{\n\treturn &quot;Firebird::status_exception&quot;;\n}\n\n[[noreturn]] void status_exception::raise(const ISC_STATUS *status_vector)\n{\n\tthrow status_exception(status_vector);\n}\n\n[[noreturn]] void status_exception::raise(const IStatus* status)\n{\n\tStaticStatusVector status_vector;\n\tstatus_vector.mergeStatus(status);\n\tthrow status_exception(status_vector.begin());\n}\n\n[[noreturn]] void status_exception::raise(const Arg::StatusVector&amp; statusVector)\n{\n\tthrow status_exception(statusVector.value());\n}\n\nvoid status_exception::stuffByException(StaticStatusVector&amp; status) const noexcept\n{\n\ttry\n\t{\n\t\tstatus.assign(m_status_vector, fb_utils::statusLength(m_status_vector) + 1);\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tprocessUnexpectedException(status.makeEmergencyStatus());\n\t}\n}\n\n// ********************************* BadAlloc ****************************\n\n[[noreturn]] void BadAlloc::raise()\n{\n\tthrow BadAlloc();\n}\n\nvoid BadAlloc::stuffByException(StaticStatusVector&amp; status) const noexcept\n{\n\tfb_utils::statusBadAlloc(status.makeEmergencyStatus());\n}\n\nconst char* BadAlloc::what() const noexcept\n{\n\treturn &quot;Firebird::BadAlloc&quot;;\n}\n\n// ********************************* LongJump ***************************\n\n[[noreturn]] void LongJump::raise()\n{\n\tthrow LongJump();\n}\n\nvoid LongJump::stuffByException(StaticStatusVector&amp; status) const noexcept\n{\n\tconst ISC_STATUS sv[] = {isc_arg_gds, isc_random, isc_arg_string,\n\t\t(ISC_STATUS)(IPTR) &quot;Unexpected call to Firebird::LongJump::stuffException()&quot;, isc_arg_end};\n\n\ttry\n\t{\n\t\tstatus.assign(sv, FB_NELEM(sv));\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tprocessUnexpectedException(status.makeEmergencyStatus());\n\t}\n}\n\nconst char* LongJump::what() const noexcept\n{\n\treturn &quot;Firebird::LongJump&quot;;\n}\n\n\n// ********************************* system_error ***************************\n\nsystem_error::system_error(const char* syscall, const char* arg, int error_code) noexcept :\n\tstatus_exception(), errorCode(error_code)\n{\n\tArg::Gds temp(isc_sys_request);\n\ttemp &lt;&lt; Arg::Str(syscall);\n\ttemp &lt;&lt; SYS_ERR(errorCode);\n\tif (arg)\n\t\ttemp &lt;&lt; Arg::Gds(isc_random) &lt;&lt; arg;\n\tset_status(temp.value());\n}\n\n[[noreturn]] void system_error::raise(const char* syscall, int error_code)\n{\n\tthrow system_error(syscall, nullptr, error_code);\n}\n\n[[noreturn]] void system_error::raise(const char* syscall)\n{\n\tthrow system_error(syscall, nullptr, getSystemError());\n}\n\nint system_error::getSystemError() noexcept\n{\n#ifdef WIN_NT\n\treturn GetLastError();\n#else\n\treturn errno;\n#endif\n}\n\n// ********************************* system_call_failed ***************************\n\nsystem_call_failed::system_call_failed(const char* syscall, const char* arg, int error_code) :\n\tsystem_error(syscall, arg, error_code)\n{\n\t// NS: something unexpected has happened. Log the error to log file\n\t// In the future we may consider terminating the process even in PROD_BUILD\n\tgds__log(&quot;Operating system call %s failed. Error code %d&quot;, syscall, error_code);\n#ifdef DEV_BUILD\n\t// raised failed system call exception in DEV_BUILD in 99.99% means\n\t// problems with the code - let
