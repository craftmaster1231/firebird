arks[] = { op_byte, op_literal, op_line, op_verb, 0},\n\terase[] = { op_erase, 0},\n\terase2[] = { op_erase, op_verb, 0},\n\tlocal_table[] = { op_word, op_byte, op_literal, op_byte, op_line, 0},\n\touter_map[] = { op_outer_map, 0 },\n\tin_list[] = { op_line, op_verb, op_indent, op_word, op_line, op_args, 0},\n\tinvoke_function[] = { op_invoke_function, 0 },\n\tinvsel_procedure[] = { op_invsel_procedure, 0 },\n\tcast_format[] = { op_line, op_indent, op_byte, op_literal, op_line, op_indent, op_dtype, op_line, op_verb, 0 },\n\ttable_value_fun[] = { op_table_value_fun, 0 },\n\tfor_range[] = { op_for_range, 0 },\n\tdefault2[] = { op_line, op_indent, op_byte, op_literal,\n\t\t\t\t   op_line, op_indent, op_byte, op_literal,\n\t\t\t\t   op_line, op_indent, op_byte, op_literal,\n\t\t\t\t   op_pad, op_line, 0};\n\n\n#include &quot;../jrd/blp.h&quot;\n\nconstexpr const char* FB_LOCK_ENV\t= &quot;FIREBIRD_LOCK&quot;;\nconstexpr const char* FB_MSG_ENV\t= &quot;FIREBIRD_MSG&quot;;\nconstexpr const char* FB_TMP_ENV\t= &quot;FIREBIRD_TMP&quot;;\n\n#ifdef WIN_NT\n#define EXPAND_PATH(relative, absolute)\t\t_fullpath(absolute, relative, MAXPATHLEN)\n#define COMPARE_PATH(a, b)\t\t\t_stricmp(a, b)\n#else\n#define EXPAND_PATH(relative, absolute)\t\trealpath(relative, absolute)\n#define COMPARE_PATH(a, b)\t\t\tstrcmp(a, b)\n#endif\n\n\n// This function is very crude, but signal-safe.\n// CVC: This function converts a FB_UINT64 into a string. I renamed the param\n// maxlen to minlen because it represents the minimum length the number will\n// be printed in. However, this means buffer should be large enough to contain\n// any ULONG (11 bytes) and thus prevent a buffer overflow. If minlen &gt;= 11,\n// then buffer should have be of size = (minlen + 1).\nvoid gds__ulstr(char* buffer, FB_UINT64 value, const int minlen, const char filler)\n{\n\tFB_UINT64 n = value;\n\n\tint c = 0;\n\tdo {\n\t\tn = n / 10;\n\t\tc++;\n\t} while (n);\n\n\tif (minlen &gt; c)\n\t\tc = minlen;\n\n\tchar* p = buffer + c;\n\n\tdo {\n\t\t*--p = &#x27;0&#x27; + (value % 10);\n\t\tvalue = value / 10;\n\t} while (value);\n\n\tfb_assert(p &gt;= buffer); // did we overflow?\n\n\twhile (p != buffer) {\n\t\t*--p = filler;\n\t}\n\tbuffer[c] = 0;\n}\n\n\nISC_STATUS API_ROUTINE gds__decode(ISC_STATUS code, USHORT* fac, USHORT* code_class)\n{\n/**************************************\n *\n *\tg d s _ $ d e c o d e\n *\n **************************************\n *\n * Functional description\n *\tTranslate a status codes from system dependent form to\n *\tnetwork form.\n *\n **************************************/\n\n\tif (!code)\n\t\treturn FB_SUCCESS;\n\n\t// not an ISC error message\n\tif ((code &amp; ISC_MASK) != ISC_MASK)\n\t\treturn code;\n\n\t*fac = GET_FACILITY(code);\n\t*code_class = GET_CLASS(code);\n\treturn GET_CODE(code);\n\n}\n\n\nvoid API_ROUTINE isc_decode_date(const ISC_QUAD* date, void* times_arg)\n{\n/**************************************\n *\n *\ti s c _ d e c o d e _ d a t e\n *\n **************************************\n *\n * Functional description\n *\tConvert from internal timestamp format to UNIX time structure.\n *\n *\tNote: this API is historical - the preferred entrypoint is\n *\tisc_decode_timestamp\n *\n **************************************/\n\tisc_decode_timestamp((const GDS_TIMESTAMP*) date, times_arg);\n}\n\n\nvoid API_ROUTINE isc_decode_sql_date(const GDS_DATE* date, void* times_arg)\n{\n/**************************************\n *\n *\ti s c _ d e c o d e _ s q l _ d a t e\n *\n **************************************\n *\n * Functional description\n *\tConvert from internal DATE format to UNIX time structure.\n *\n **************************************/\n\ttm* const times = static_cast&lt;struct tm*&gt;(times_arg);\n\tTimeStamp::decode_date(*date, times);\n}\n\n\nvoid API_ROUTINE isc_decode_sql_time(const GDS_TIME* sql_time, void* times_arg)\n{\n/**************************************\n *\n *\ti s c _ d e c o d e _ s q l _ t i m e\n *\n **************************************\n *\n * Functional description\n *\tConvert from internal TIME format to UNIX time structure.\n *\n **************************************/\n\ttm* const times = static_cast&lt;struct tm*&gt;(times_arg);\n\tmemset(times, 0, sizeof(*times));\n\tFirebird::TimeStamp::decode_time(*sql_time, &amp;times-&gt;tm_hour, &amp;times-&gt;tm_min, &amp;times-&gt;tm_sec);\n}\n\n\nvoid API_ROUTINE isc_decode_timestamp(const GDS_TIMESTAMP* date, void* times_arg)\n{\n/**************************************\n *\n *\ti s c _ d e c o d e _ t i m e s t a m p\n *\n **************************************\n *\n * Functional description\n *\tConvert from internal timestamp format to UNIX time structure.\n *\n *\tNote: This routine is intended only for public API use. Engine itself and\n *  utilities should be using TimeStamp class directly in type-safe manner.\n *\n **************************************/\n\ttm* const times = static_cast&lt;struct tm*&gt;(times_arg);\n\tFirebird::TimeStamp::decode_timestamp(*date, times);\n}\n\n\nISC_STATUS API_ROUTINE gds__encode(ISC_STATUS code, USHORT facility)\n{\n/**************************************\n *\n *\tg d s _ $ e n c o d e\n *\n **************************************\n *\n * Functional description\n *\tTranslate a status codes from network format to system\n *\tdependent form.\n *\n **************************************/\n\treturn (code ? ENCODE_ISC_MSG(code, facility) : FB_SUCCESS);\n}\n\n\nvoid API_ROUTINE isc_encode_date(const void* times_arg, ISC_QUAD* date)\n{\n/**************************************\n *\n *\ti s c _ e n c o d e _ d a t e\n *\n **************************************\n *\n * Functional description\n *\tConvert from UNIX time structure to internal timestamp format.\n *\n *\tNote: This API is historical -- the preferred entrypoint is\n *\tisc_encode_timestamp\n *\n **************************************/\n\tisc_encode_timestamp(times_arg, (ISC_TIMESTAMP*) date);\n}\n\n\nvoid API_ROUTINE isc_encode_sql_date(const void* times_arg, GDS_DATE* date)\n{\n/**************************************\n *\n *\ti s c _ e n c o d e _ s q l _ d a t e\n *\n **************************************\n *\n * Functional description\n *\tConvert from UNIX time structure to internal date format.\n *\n **************************************/\n\tconst tm* const times = static_cast&lt;const struct tm*&gt;(times_arg);\n\t*date = TimeStamp::encode_date(times);\n}\n\n\nvoid API_ROUTINE isc_encode_sql_time(const void* times_arg, GDS_TIME* isc_time)\n{\n/**************************************\n *\n *\ti s c _ e n c o d e _ s q l _ t i m e\n *\n **************************************\n *\n * Functional description\n *\tConvert from UNIX time structure to internal TIME format.\n *\n **************************************/\n\tconst tm* const times = static_cast&lt;const struct tm*&gt;(times_arg);\n\t*isc_time = Firebird::TimeStamp::encode_time(times-&gt;tm_hour, times-&gt;tm_min, times-&gt;tm_sec);\n}\n\n\nvoid API_ROUTINE isc_encode_timestamp(const void* times_arg, GDS_TIMESTAMP* date)\n{\n/**************************************\n *\n *\ti s c _ e n c o d e _ t i m e s t a m p\n *\n **************************************\n *\n * Functional description\n *\tConvert from UNIX time structure to internal timestamp format.\n *\n *\tNote: This routine is intended only for public API use. Engine itself and\n *  utilities should be using TimeStamp class directly in type-safe manner.\n *\n **************************************/\n\tconst tm* const times = static_cast&lt;const struct tm*&gt;(times_arg);\n\t*date = Firebird::TimeStamp::encode_timestamp(times);\n}\n\n\n#ifdef DEV_BUILD\n\nvoid GDS_breakpoint(int /*parameter*/)\n{\n/**************************************\n *\n *\tG D S _ b r e a k p o i n t\n *\n **************************************\n *\n * Functional description\n *\tJust a handy place to put a debugger breakpoint\n *\tCalls to this can then be embedded for DEV_BUILD\n *\tusing the BREAKPOINT(x) macro.\n *\n **************************************/\n\t// Put a breakpoint here via the debugger\n}\n#endif\n\n\nSINT64 API_ROUTINE isc_portable_integer(const UCHAR* ptr, SSHORT length)\n{\n/**************************************\n *\n *\ti s c _ p o r t a b l e _ i n t e g e r\n *\n **************************************\n *\n * Functional description\n *\tPick up (and convert) a Little Endian (VAX) style integer\n *      of variable length to local system&#x27;s Endian format.\n *\n *   various parameter blocks (i.e., dpb, tpb, spb) flatten out multibyte\n *   values into little endian byte ordering before network transmission.\n *   programs need to use this function in order to get the correct value\n *   of the integer in the correct Endian format.\n *\n * **Note**\n *\n *   This function is similar to gds__vax_integer() in functionality.\n *   The difference is in the return type. Changed from SLONG to SINT64\n *   Since gds__vax_integer() is a public API routine, it could not be\n *   changed. This function has been made public so gbak can use it.\n *\n **************************************/\n\tif (!ptr || length &lt;= 0 || length &gt; 8)\n\t\treturn 0;\n\n\tSINT64 value = 0;\n\tint shift = 0;\n\n\twhile (--length &gt; 0)\n\t{\n\t\tvalue += ((SINT64) *ptr++) &lt;&lt; shift;\n\t\tshift += 8;\n\t}\n\n\tvalue += ((SINT64)(SCHAR) *ptr) &lt;&lt; shift;\n\n\treturn value;\n}\n\nvoid API_ROUTINE gds_alloc_flag_unfreed(void* /*blk*/)\n{\n/**************************************\n *\n *\tg d s _ a l l o c _ f l a g _ u n f r e e d\n *\n **************************************\n *\n * Functional description\n *\tFlag a buffer as &quot;known to be unfreed&quot; so we\n *\tdon&#x27;t report it in gds_alloc_report\n *\n **************************************/\n\t// JMB: need to rework this for the new pools\n\t// Skidder: Not sure we need to rework this routine.\n\t// What we really need is to fix all memory leaks including very old.\n}\n\n\nvoid API_ROUTINE gds_alloc_report(ULONG flags, const char* filter_filename, int /*lineno*/)\n{\n/**************************************\n *\n *\tg d s _ a l l o c _ r e p o r t\n *\n **************************************\n *\n * Functional description\n *\tPrint buffers that might be memory leaks.\n *\tOr that might have been clobbered.\n *\n **************************************/\n// Skidder: Calls to this function must be replaced with MemoryPool::print_contents\n\tFirebird::PathName report_name = fb_utils::getPrefix(Firebird::IConfigManager::DIR_LOG, &quot;fbsrvreport.txt&quot;);\n\t// Our new facilities don&#x27;t expose flags for reporting.\n\tconst bool used_only = !(flags &amp; ALLOC_verbose);\n\tgetDefaultMemoryPool()-&gt;print_contents(report_name.c_str(),\n\t\tused_only ? MemoryPool::PRINT_USED_ONLY : 0, filter_filename);\n}\n\n\n/**\nfb_interpret\n\n\t@brief Buffer overrun-aware version of the old gds__interprete\n\twithout the double underscore and without the misspelling.\n\tTranslate a status code with arguments to a string.  Return the\n\tlength of the string while updating the vector address.  If the\n\tmessage is null (end of messages) or invalid, return 0;\n\n\t@param s the output buffer where a human readable version of the error is put\n\t@param bufsize the size of the output buffer\n\t@param vector the input, the address of const pointer to the status vector\n\t    that was filled by an API call that reported an error. The function\n\t    positions the pointer on the next element of the vector.\n**/\nSLONG API_ROUTINE fb_interpret(char* s, unsigned int bufsize, const ISC_STATUS** vector)\n{\n\treturn safe_interpret(s, bufsize, vector);\n}\n\n\n/* CVC: This non-const signature is needed for compatibility. The reason is\nthat, unlike int* that can be assigned to const int* transparently to the caller,\nint** CANNOT be assigned to const int**, so applications would have to be\nfixed to provide such const int**; while it may be more correct from the\nsemantic POV, we can&#x27;t estimate how much work it&#x27;s for app developers.\nTherefore, we go back to the old signature and provide fb_interpret\nfor compliance, to be used inside the engine, too. September, 2003.\nNovember, 2004: We agree that fb_interpret is the new, safe interface.\nBoth gds__interprete and isc_interprete are deprecated. */\n\nSLONG API_ROUTINE gds__interprete(char* s, ISC_STATUS** vector)\n{\n/**************************************\n *\n *\tg d s _ $ i n t e r p r e t e\n *\n **************************************\n *\n * Functional description\n * See safe_interpret for details. Now this is a wrapper for that function.\n * CVC: Since this routine doesn&#x27;t get the size of the input buffer,\n * it&#x27;s DEPRECATED and we&#x27;ll assume the buffer size was 1024 as in Borland examples.\n *\n **************************************/\n\treturn safe_interpret(s, 1024, const_cast&lt;const ISC_STATUS**&gt;(vector), true);\n}\n\n\n/**\nsafe_interpret\n\n\t@brief Translate a status code with arguments to a string.  Return the\n\tlength of the string while updating the vector address.  If the\n\tmessage is null (end of messages) or invalid, return 0;\n\n\t@param s the output buffer where a human readable version of the error is put\n\t@param bufsize the size of the output buffer\n\t@param vector the input, the address of const pointer to the status vector\n\t    that was filled by an API call that reported an error. The function\n\t    positions the pointer on the next element of the vector.\n\n**/\nstatic SLONG safe_interpret(char* const s, const FB_SIZE_T bufsize,\n\tconst ISC_STATUS** const vector, bool legacy)\n{\n\t// CVC: It doesn&#x27;t make sense to provide a buffer smaller than 50 bytes.\n\t// Return error otherwise.\n\tif (bufsize &lt; 50)\n\t\treturn 0;\n\n\t// Skip the SQLSTATE\n\tif ((*vector)[0] == isc_arg_sql_state)\n\t\t*vector += 2;\n\n\t// If the first element of the vector doesn&#x27;t signal an error, return.\n\tif (!**vector)\n\t\treturn 0;\n\n\tconst ISC_STATUS* v;\n\tISC_STATUS code;\n\t// Handle a case: &quot;no errors, some warning(s)&quot;\n\tif ((*vector)[1] == 0 &amp;&amp; (*vector)[2] == isc_arg_warning)\n\t{\n\t\tv = *vector + 4;\n\t\tcode = (*vector)[3];\n\t}\n\telse\n\t{\n\t\tv = *vector + 2;\n\t\tcode = (*vector)[1];\n\t}\n\n\tconst TEXT* args[10];\n\tconst TEXT** arg = args;\n\tconst char* const* const argend = arg + FB_NELEM(args);\n\n\tMsgFormat::SafeArg safe;\n\n\t// Parse and collect any arguments that may be present\n\n\tTEXT* p = 0;\n\tconst TEXT* q;\n\tint temp_len = BUFFER_SMALL;\n\tTEXT* temp = NULL;\n\n\tfor (;;)\n\t{\n\t\t// CVC: Close overflow in &quot;args&quot;.\n\t\tif (arg &gt;= argend)\n\t\t\tbreak;\n\n\t\tint len;\n\t\tconst UCHAR x = (UCHAR) *v++;\n\t\tswitch (x)\n\t\t{\n\t\tcase isc_arg_string:\n\t\t\t*arg++ = (TEXT*) *v;\n\t\t\tsafe &lt;&lt; (TEXT*) *v;\n\t\t\t++v;\n\t\t\tcontinue;\n\n\t\tcase isc_arg_number:\n\t\t\t*arg++ = (TEXT*) *v;\n\t\t\tsafe &lt;&lt; *v;\n\t\t\t++v;\n\t\t\tcontinue;\n\n\t\tcase isc_arg_cstring:\n\t\t\tif (!temp)\n\t\t\t{\n\t\t\t\t// We need a temporary buffer when cstrings are involved.\n\t\t\t\t// Give up if we can&#x27;t get one.\n\n\t\t\t\tp = temp = (TEXT*) gds__alloc((SLONG) temp_len);\n\t\t\t\t// FREE: at procedure exit\n\t\t\t\tif (!temp)\t\t// NOMEM:\n\t\t\t\t\treturn 0;\n\t\t\t}\n\t\t\tlen = 1 + (int) *v++; // CVC: Add one for the needed terminator.\n\t\t\tq = (const TEXT*) *v++;\n\n\t\t\t// Ensure that we do not overflow the buffer allocated\n\t\t\tlen = (temp_len &lt; len) ? temp_len : len;\n\t\t\tif (len)\n\t\t\t{\n\t\t\t\t// CVC: On the next iteration, we don&#x27;t have the full buffer\n\t\t\t\t// but only the remainer of the buffer. We decrement here before\n\t\t\t\t// the loop changes &quot;len&quot;.\n\t\t\t\ttemp_len -= len;\n\t\t\t\t*arg++ = p;\n\t\t\t\tsafe &lt;&lt; p;\n\t\t\t\t// We&#x27;ll silently truncate the parameter to our available space.\n\t\t\t\twhile (--len) // CVC: Decrement first to make room for the null terminator.\n\t\t\ :\n\t\tsnprintf(s, bufsize, &quot;unknown dos error %&quot; SLONGFORMAT, (SLONG) code);\t// TXNN\n\t\tbreak;\n\n\tcase isc_arg_next_mach:\n\t\tsnprintf(s, bufsize, &quot;next/mach error %&quot; SLONGFORMAT, (SLONG) code);\t// AP\n\t\tbreak;\n\n\tcase isc_arg_win32:\n#ifdef WIN_NT\n\t\tif (!FormatMessage(FORMAT_MESSAGE_FROM_SYSTEM | FORMAT_MESSAGE_MAX_WIDTH_MASK, NULL, code,\n\t\t\t\t\t\t   GetUserDefaultLangID(), s, bufsize, NULL) &amp;&amp;\n\t\t\t!FormatMessage(FORMAT_MESSAGE_FROM_SYSTEM | FORMAT_MESSAGE_MAX_WIDTH_MASK, NULL, code,\n\t\t\t\t\t\t   0, // TMN: Fallback to system known language\n\t\t\t\t\t\t   s, bufsize, NULL))\n#endif\n\t\t{\n\t\t\tsnprintf(s, bufsize, &quot;unknown Win32 error %&quot; SLONGFORMAT, (SLONG) code);\t// TXNN\n\t\t}\n\t\tbreak;\n\n\tdefault:\n\t\tif (temp)\n\t\t\tgds__free(temp);\n\t\treturn 0;\n\t}\n\n\n\tif (temp)\n\t\tgds__free(temp);\n\n\t*vector = v;\n\tconst TEXT* end = s;\n\twhile (*end)\n\t\tend++;\n\n\treturn static_cast&lt;SLONG&gt;(end - s);\n}\n\n\n// ***********************\n// s a f e _ s t r n c p y\n// ***********************\n// Done exclusively because in legacy mode, safe_interpret cannot fill the\n// string up to the end by calling strncpy.\nstatic void safe_strncpy(char* target, const char* source, size_t bs) noexcept\n{\n\tif (!bs)\n\t\treturn;\n\n\tfor (--bs; bs &gt; 0 &amp;&amp; *source; --bs)\n\t\t*target++ = *source++;\n\n\t*target = 0;\n}\n\n\n// CVC: This special function for ADA has been restored to non-const vector,\n// too, in case its usage was broken.\nvoid API_ROUTINE gds__interprete_a(SCHAR* s, SSHORT* length, ISC_STATUS* vector, SSHORT* offset)\n{\n/**************************************\n *\n *\tg d s _ $ i n t e r p r e t e _ a\n *\n **************************************\n *\n * Functional description\n *\tTranslate a status code with arguments to a string.  Return the\n *\tlength of the string while updating the vector address.  If the\n *\tmessage is null (end of messages) or invalid, return 0;\ andle, 0, NULL, FILE_END);\n\n\t\tDWORD bytesWritten;\n\t\tWriteFile(file_handle, text, length, &amp;bytesWritten, NULL);\n\n\t\tif (bytesWritten != length)\n\t\t{\n\t\t\t// Handle the case when file was deleted by another process on Win9x\n\t\t\t// On WinNT we are not going to notice that fact :(\n\t\t\tCloseHandle(file_handle);\n\t\t\tfile_handle = INVALID_HANDLE_VALUE;\n\t\t\tcontinue;\n\t\t}\n\t\tbreak;\n\t}\n}\n\nFirebird::InitInstance&lt;LogFileHandles&gt; logFileHandles;\n\nHANDLE LogFileHandles::mutex_handle = INVALID_HANDLE_VALUE;\nHANDLE LogFileHandles::file_handle = INVALID_HANDLE_VALUE;\n\n\nclass LogGuard\n{\npublic:\n\tLogGuard()\n\t{\n\t\tWaitForSingleObject(logFileHandles().mutex_handle, INFINITE);\n\t}\n\n\t~LogGuard()\n\t{\n\t\tReleaseMutex(logFileHandles().mutex_handle);\n\t}\n};\n\n} // namespace\n\n#endif\n\nvoid API_ROUTINE gds__trace_raw(const char* text, unsigned int length)\n{\n/**************************************\n *\n *\tg d s _ t r a c e _ r a w\n *\n **************************************\n *\n * Functional description\n *\tWrite trace event to a log file\n *\n **************************************/\n\tif (!length)\n\t\tlength = static_cast&lt;unsigned&gt;(strlen(text));\n#ifdef WIN_NT\n\t// Note: thread-safe code\n\n\tLogGuard guard;\n\tlogFileHandles().trace_raw(text, length);\n#else\n\tFirebird::PathName name = fb_utils::getPrefix(Firebird::IConfigManager::DIR_LOG, LOGFILE);\n\tint file = os_utils::open(name.c_str(), O_CREAT | O_APPEND | O_WRONLY, 0660);\n\tif (file == -1)\n\t\treturn;\n\n\tFB_UNUSED(write(file, text, length));\n\tclose(file);\n#endif\n}\n\nvoid API_ROUTINE gds__trace(const TEXT* text)\n{\n/**************************************\n *\n *\tg d s _ t r a c e\n *\n **************************************\n *\n * Functional description\n *\tPost trace event to a log file. Function records date and time\n *  This function tries to be async-signal safe\n *\n **************************************/\n\tconst time_t now = time(NULL); // is specified in POSIX to be signal-safe\n\n\t// 07 Sept 2003, Nickolay Samofatov.\n\t// Since we cannot call ctime/localtime_r or anything else like this from\n\t// signal hanlders we need to decode time by hand.\n\n\tconst int days = static_cast&lt;int&gt;(now / SECS_PER_DAY);\n\tint rem = static_cast&lt;int&gt;(now % SECS_PER_DAY);\n\n\ttm today;\n\tTimeStamp::decode_date(days + TimeStamp::GDS_EPOCH_START, &amp;today);\n    today.tm_hour = rem / SECS_PER_HOUR;\n    rem %= SECS_PER_HOUR;\n    today.tm_min = rem / 60;\n    today.tm_sec = rem % 60;\n\n\tchar buffer[BUFFER_MEDIUM];\n\tchar* p = buffer;\n\n\tgds__ulstr(p, today.tm_year + 1900, 4, &#x27;0&#x27;);\n\tp += 4;\n\t*p++ = &#x27;-&#x27;;\n\tgds__ulstr(p, today.tm_mon, 2, &#x27;0&#x27;);\n\tp += 2;\n\t*p++ = &#x27;-&#x27;;\n\tgds__ulstr(p, today.tm_mday, 2, &#x27;0&#x27;);\n\tp += 2;\n\t*p++ = &#x27;T&#x27;;\n\tgds__ulstr(p, today.tm_hour, 2, &#x27;0&#x27;);\n\tp += 2;\n\t*p++ = &#x27;:&#x27;;\n\tgds__ulstr(p, today.tm_min, 2, &#x27;0&#x27;);\n\tp += 2;\n\t*p++ = &#x27;:&#x27;;\n\tgds__ulstr(p, today.tm_sec, 2, &#x27;0&#x27;);\n\tp += 2;\n\t*p++ = &#x27; &#x27;;\n\tULONG apid =\n#ifdef WIN_NT\n\t\t\t\t GetCurrentProcessId();\n#else\n\t\t\t\t getpid();\n#endif\n\tgds__ulstr(p, apid, 5, &#x27; &#x27;);\n\tp += 5;\n\t*p++ = &#x27; &#x27;;\n\tgds__ulstr(p, (IPTR) getThreadId(), 5, &#x27; &#x27;);\n\tp += 5;\n\t*p++ = &#x27; &#x27;;\n\t*p = &#x27;\\0&#x27;;\n\n\tFirebird::string s(buffer);\n\ts += text;\n\ts += &quot;\\n&quot;;\n\n\tgds__trace_raw(s.c_str(), s.length());\n}\n\n\nvoid API_ROUTINE gds__log(const TEXT* text, ...)\n{\n/**************************************\n *\n *\tg d s _ l o g\n *\n **************************************\n *\n * Functional description\n *\tPost an event to a log file.\n *\n **************************************/\n\tva_list ptr;\n\ttime_t now;\n\n#ifdef HAVE_GETTIMEOFDAY\n\tstruct timeval tv;\n\tGETTIMEOFDAY(&amp;tv);\n\tnow = tv.tv_sec;\n#else\n\tnow = time((time_t *)0 x_integer(p, length);\n\t\t\tif (target_type_specified)\n\t\t\t\t*target_type_specified = true;\n\t\t\tbreak;\n\n\t\tcase isc_bpb_type:\n\t\tcase isc_bpb_storage:\n\t\t\ttype |= (USHORT) gds__vax_integer(p, length);\n\t\t\tbreak;\n\n\t\tcase isc_bpb_source_interp:\n\t\t\tif (source_interp)\n\t\t\t\t*source_interp = (USHORT) gds__vax_integer(p, length);\n\t\t\tif (source_interp_specified)\n\t\t\t\t*source_interp_specified = true;\n\t\t\tbreak;\n\n\t\tcase isc_bpb_target_interp:\n\t\t\tif (target_interp)\n\t\t\t\t*target_interp = (USHORT) gds__vax_integer(p, length);\n\t\t\tif (target_interp_specified)\n\t\t\t\t*target_interp_specified = true;\n\t\t\tbreak;\n\n\t\tdefault:\n\t\t\tbreak;\n\t\t}\n\t\tp += length;\n\t}\n\n\treturn type;\n}\n\n\nSLONG API_ROUTINE gds__ftof(const SCHAR* string,\n\t\t\t\t\t\t\tconst USHORT length1,\n\t\t\t\t\t\t\tSCHAR* fieldL,\n\t\t\t\t\t\t\tconst USHORT length2)\n{\n/**************************************\n *\n *\tg d s _ f t o f\n *\n **************************************\n *\n * Functional description\n *\tMove a fixed length string to a fixed length string.\n *\tThis is typically generated by the preprocessor to\n *\tmove strings around.\n *\n **************************************/\n\tUSHORT fill = 0;\n\t// CVC: a logic bug rendered the fill &gt; 0 test useless\n\tif (length2 &gt; length1)\n\t\tfill = length2 - length1;\n\n\tUSHORT l = MIN(length1, length2);\n\tif (l &gt; 0)\n\t\tmemcpy(fieldL, string, l);\n\n\tfieldL += l;\n\n\tif (fill &gt; 0)\n\t\tmemset(fieldL, &#x27; &#x27;, fill);\n\n\treturn 0;\n}\n\n\nint API_ROUTINE fb_print_blr(const UCHAR* blr, ULONG blr_length,\n\tFPTR_PRINT_CALLBACK routine, void* user_arg, SSHORT language)\n{\n/**************************************\n *\n *\tf b _ p r i n t _ b l r\n *\n **************************************\n *\n * Functional description\n *\tPretty print blr thru callback routine.\n *\n **************************************/\n\ttry\n\t{\n\t\tgds_ctl ctl;\n\t\tgds_ctl* control = &amp orted.  Make note of the first error in the status vector who&#x27;s\n\t// SQLCODE is NOT -999, that will be the return code if there is no specific\n\t// sqlerr reported.\n\n\tconst ISC_STATUS* s = status_vector;\n\twhile (*s != isc_arg_end)\n\t{\n\t\tif (*s == isc_arg_gds)\n\t\t{\n\t\t\ts++;\n\t\t\tif (*s == isc_sqlerr)\n\t\t\t{\n\t\t\t\treturn *(s + 2);\n\t\t\t}\n\n\t\t\tif (!have_sqlcode)\n\t\t\t{\n\t\t\t\t// Now check the hard-coded mapping table of gds_codes to\n\t\t\t\t// sql_codes\n\t\t\t\tconst SLONG gdscode = status_vector[1];\n\n\t\t\t\tif (gdscode)\n\t\t\t\t{\n\t\t\t\t\tfor (int i = 0; sql_codes[i].gds_code; ++i)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (gdscode == sql_codes[i].gds_code)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tif (sql_codes[i].sql_code != GENERIC_SQLCODE)\n\t\t\t\t\t\t\t{\n\t\t\t\t\t\t\t\tsqlcode = sql_codes[i].sql_code;\n\t\t\t\t\t\t\t\thave_sqlcode = true;\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tsqlcode = 0;\n\t\t\t\t\thave_sqlcode = true;\n\t\t\t\t}\n\t\t\t}\n\t\t\ts++;\n\t\t}\n\t\telse if (*s == isc_arg_cstring)\n\t\t\ts += 3;\t\t\t\t// skip: isc_arg_cstring &lt;len&gt; &lt;ptr&gt;\n\t\telse\n\t\t\ts += 2;\t\t\t\t// skip: isc_arg_* &lt;item&gt;\n\t}\n\n\treturn sqlcode;\n}\n\n\nvoid API_ROUTINE gds__sqlcode_s(const ISC_STATUS* status_vector, ULONG* sqlcode)\n{\n/**************************************\n *\n *\tg d s _ s q l c o d e _ s\n *\n **************************************\n *\n * Functional description\n *\tTranslate GDS error code to SQL error code.  This is a little\n *\timprecise (to say the least) because we don&#x27;t know the proper\n *\tSQL codes.  One must do what what can; stiff upper lip, and all\n *\tthat.  THIS IS THE COBOL VERSION.  (Some cobols don&#x27;t have\n *\treturn values for calls...\n *\n **************************************/\n\n\t*sqlcode = gds__sqlcode(status_vector);\n}\n\n\nvoid API_ROUTINE fb_sqlstate(char* sqlstate, const ISC_STATUS* status_vector)\n{\n/**************************************\n *\n *\tf b _ s q l s t a t e\n *\n **************************************\n *\n * Functional description\n *\tTranslate GDS error code to SQL State. We&#x27;ll check to see if\n *  we have an exact match, and if so that&#x27;s great. Maybe we&#x27;ll\n *  get lucky and the caller already put a SQLSTATE in the\n *  status vector. It could happen.\n *\n **************************************/\n\tif (!status_vector)\n\t{\n\t\tDEV_REPORT(&quot;fb_sqlstate: NULL status vector&quot;);\n\t\treturn;\n\t}\n\n\tif (status_vector[1] == 0)\n\t{\n\t\t// status_vector[1] == 0 is no error, by definition\n\t\tstrcpy(sqlstate, &quot;00000&quot;);\n\t\treturn;\n\t}\n\n\tconst ISC_STATUS* s = status_vector;\n\tconst ISC_STATUS* const last_status = status_vector + ISC_STATUS_LENGTH - 1;\n\tbool have_sqlstate = false;\n\n\tstrcpy(sqlstate, &quot;HY000&quot;); // error of last resort\n\n\t// step #1, maybe we already have a SQLSTATE stuffed in the status vector\n\twhile ((*s != isc_arg_end) &amp;&amp; !have_sqlstate)\n\t{\n\t\tif (*s == isc_arg_sql_state)\n\t\t{\n\t\t\t++s;\n\t\t\tif (s &gt;= last_status)\n\t\t\t\tbreak;\n\n\t\t\tconst char* state = (char*) *s; // easy, next argument points to sqlstate string\n\t\t\tfb_utils::copy_terminate(sqlstate, state, FB_SQLSTATE_SIZE);\n\t\t\thave_sqlstate = true;\n\t\t}\n\t\telse if (*s == isc_arg_cstring)\n\t\t{\n\t\t\ts += 3; // skip: isc_arg_cstring &lt;len&gt; &lt;ptr&gt;\n\t\t}\n\t\telse\n\t\t{\n\t\t\ts += 2; // skip: isc_arg_* &lt;item&gt;\n\t\t}\n\t\tif (s &gt;= last_status)\n\t\t\tbreak;\n\t}\n\n\tif (have_sqlstate)\n\t\treturn;\n\n\t// step #2, see if we can find a mapping.\n\ts = status_vector;\n\n\twhile ((*s != isc_arg_end) &amp;&amp; (!have_sqlstate))\n\t{\n\t\tif (*s == isc_arg_gds)\n\t\t{\n\t\t\t++s;\n\t\t\tif (s &gt;= last_status)\n\t\t\t\tbreak;\n\n\t\t\tconst SLONG gdscode = (SLONG) *s;\n\t\t\tif (gdscode != 0)\n\t\t\t{\n\t\t\t\tif (gdscode != isc_random &amp;&amp; gdscode != isc_sqlerr)\n\t\t\t\t{\n\t\t\t\t\t// random is useless - it&#x27;s just &quot;%s&quot;. skip it\n\t\t\t\t\t// sqlerr (sqlcode) is useless for determining sqlstate. skip it\n\n\t\t\t\t\t// implement a binary search for array gds__sql_state[]\n\t\t\t\t\tint first = 0;\n\t\t\t\t\tint last = FB_NELEM(sql_states) - 1;\n\t\t\t\t\twhile (first &lt;= last)\n\t\t\t\t\t{\n\t\t\t\t\t\tconst int mid = (first + last) / 2;\n\t\t\t\t\t\tconst SLONG new_code = sql_states[mid].gds_code;\n\t\t\t\t\t\tif (gdscode &gt; new_code)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tfirst = mid + 1;\n\t\t\t\t\t\t}\n\t\t\t\t\t\telse if (gdscode &lt; new_code)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tlast = mid - 1;\n\t\t\t\t\t\t}\n\t\t\t\t\t\telse\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\t// found it!!!\n\n\t\t\t\t\t\t\t// we get 00000 for info messages like &quot;Table %&quot;\n\t\t\t\t\t\t\t// these are completely ignored\n\t\t\t\t\t\t\tconst char* new_state = sql_states[mid].sql_state;\n\t\t\t\t\t\t\tif (strcmp(&quot;00000&quot;, new_state) != 0)\n\t\t\t\t\t\t\t{\n\t\t\t\t\t\t\t\tfb_utils::copy_terminate(sqlstate, new_state, FB_SQLSTATE_SIZE);\n\n\t\t\t\t\t\t\t\t// 22000, 42000 and HY000 are general errors.\n\t\t\t\t\t\t\t\t// We may be able to find something more precise if we keep scanning.\n\t\t\t\t\t\t\t\tif (strcmp(&quot;22000&quot;, sqlstate) != 0 &amp;&amp;\n\t\t\t\t\t\t\t\t\tstrcmp(&quot;42000&quot;, sqlstate) != 0 &amp;&amp;\n\t\t\t\t\t\t\t\t\tstrcmp(&quot;HY000&quot;, sqlstate) != 0)\n\t\t\t\t\t\t\t\t{\n\t\t\t\t\t\t\t\t\thave_sqlstate = true;\n\t\t\t\t\t\t\t\t}\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t\tbreak;\n\t\t\t\t\t\t}\n\t\t\t\t\t} // while\n\t\t\t\t}\n\n\t\t\t\t++s;\n\t\t\t}\n\t\t}\n\t\telse if (*s == isc_arg_cstring)\n\t\t{\n\t\t\ts += 3; // skip: isc_arg_cstring &lt;len&gt; &lt;ptr&gt;\n\t\t}\n\t\telse\n\t\t{\n\t\t\ts += 2; // skip: isc_arg_* &lt;item&gt;\n\t\t}\n\t\tif (s &gt;= last_status)\n\t\t\tbreak;\n\t} // while\n\n\t// sqlstate will be exact match, or\n\t// 42000 for no_meta_update, or\n\t// HY000 if we didn&#x27;t find a match\n\treturn;\n}\n\n\nVoidPtr API_ROUTINE gds__temp_file(BOOLEAN stdio_flag, const TEXT* string, TEXT* expanded_string,\n\t\t\t\t\t\t\t\t TEXT* dir, BOOLEAN unlink_flag)\n{\n/**************************************\n *\n *      g d s _ _ t e m p _ f i l e\n *\n **************************************\n *\n * Functional description\n *      Create and open a temp file with a given location.\n *      Unless the address of a buffer for the expanded file name string is\n *      given, make up the file &quot;pre-deleted&quot;. Return -1 on failure.\n *      If unlink_flag is TRUE than file is marked as pre-deleted even if\n *      expanded_string is not NULL.\n * NOTE\n *      Function returns untyped handle that needs to be casted to either FILE\n *      or used as file descriptor. This is ugly and needs to be fixed probably\n *      via introducing two functions with different return types.\n *\n **************************************/\n\ttry {\n\t\t// This legacy wrapper cannot process these parameters.\n\t\t// Fortunately, utilities never pass non-default values.\n\t\tfb_assert(!dir &amp;&amp; !unlink_flag);\n\n\t\tFirebird::PathName filename = Firebird::TempFile::create(string);\n\n\t\tif (expanded_string)\n\t\t{\n\t\t\tstrcpy(expanded_string, filename.c_str());\n\t\t}\n\n\t\tif (stdio_flag)\n\t\t{\n\t\t\tFILE* result = os_utils::fopen(filename.c_str(), &quot;w+b&quot;);\n\t\t\treturn result ? result : (void*) (IPTR) (-1);\n\t\t}\n\n\t\treturn (void*) (IPTR) os_utils::open(filename.c_str(), O_RDWR | O_EXCL | O_TRUNC);\n\t}\n\tcatch (const Firebird::Exception&amp;)\n\t{\n\t\treturn (void*) (IPTR) (-1);\n\t}\n}\n\n\nvoid API_ROUTINE gds__unregister_cleanup(FPTR_VOID_PTR routine, void *arg)\n{\n/**************************************\n *\n *\tg d s _ u n r e g i s t e r _ c l e a n u p\n *\n **************************************\n *\n * Functional description\n *\tUnregister a cleanup handler.\n *\n **************************************/\n\tFirebird::MutexLockGuard guard(cleanup_handlers_mutex, &quot;gds__unregister_cleanup&quot;);\n\n\tclean_t* clean;\n\tfor (clean_t** clean_ptr = &amp;cleanup_handlers; (clean = *clean_ptr); clean_ptr = &amp;clean-&gt;clean_next)\n\t{\n        if (clean-&gt;clean_routine == routine &amp;&amp; clean-&gt;clean_arg == arg)\n\t\t{\n\t\t\t*clean_ptr = clean-&gt;clean_next;\n\t\t\tgds__free(clean);\n\t\t\tbreak;\n\t\t}\n    }\n}\n\n\nBOOLEAN API_ROUTINE gds__validate_lib_path(const TEXT* module,\n\t\t\t\t\t\t\t\t\t\t   const TEXT* ib_env_var,\n\t\t\t\t\t\t\t\t\t\t   TEXT* resolved_module,\n\t\t\t\t\t\t\t\t\t\t   SLONG length)\n{\n/**************************************\n *\n *\tg d s _ $ v a l i d a t e _ l i b _ p a t h\t( n o n - V M S )\n *\n **************************************\n *\n * Functional description\n *\tFind the external library path variable.\n *\tValidate that the path to the library module name\n *\tin the path specified.  If the external lib path\n *\tis not defined then accept any path, and return\n *\tTRUE. If the module is in the path then return TRUE\n * \telse, if the module is not in the path return FALSE.\n *\n **************************************/\n\tFirebird::string ib_ext_lib_path;\n\tif (!fb_utils::readenv(ib_env_var, ib_ext_lib_path))\n\t{\n\t\tfb_utils::copy_terminate(resolved_module, module, length);\n\t\treturn TRUE;\t\t// The variable is not defined. Return TRUE\n\t}\n\n\tTEXT abs_module[MAXPATHLEN];\n\tif (EXPAND_PATH(module, abs_module))\n\t{\n\t\t// Extract the path from the absolute module name\n\t\tconst TEXT* q = NULL;\n\t\tfor (const TEXT* mp = abs_module; *mp; mp++)\n\t\t{\n\t\t\tif ((*mp == &#x27;\\\\&#x27;) || (*mp == &#x27;/&#x27;))\n\t\t\t\tq = mp;\n\t\t}\n\n\t\tTEXT abs_module_path[MAXPATHLEN];\n\t\tmemset(abs_module_path, 0, MAXPATHLEN);\n\t\tstrncpy(abs_module_path, abs_module, q - abs_module);\n\n\t\t// Check to see if the module path is in the lib path\n\t\t// if it is return TRUE.  If it does not find it, then\n\t\t// the module path is not valid so return FALSE\n\n\t\tTEXT abs_path[MAXPATHLEN];\n\t\tTEXT path[MAXPATHLEN];\n\n\t\t// Warning: ib_ext_lib_path.length() is not coherent since strtok is applied to it.\n\t\tconst TEXT* token = strtok(ib_ext_lib_path.begin(), &quot;;&quot;);\n\t\twhile (token != NULL)\n\t\t{\n\t\t\tfb_utils::copy_terminate(path, token, sizeof(path));\n\t\t\t// make sure that there is no traing slash on the path\n\t\t\tTEXT* p = path + strlen(path);\n\t\t\tif ((p != path) &amp;&amp; ((p[-1] == &#x27;/&#x27;) || (p[-1] == &#x27;\\\\&#x27;)))\n\t\t\t\tp[-1] = 0;\n\t\t\tif ((EXPAND_PATH(path, abs_path)) &amp;&amp; (!COMPARE_PATH(abs_path, abs_module_path)))\n\t\t\t{\n\t\t\t\tfb_utils::copy_terminate(resolved_module, abs_module, length);\n\t\t\t\treturn TRUE;\n\t\t\t}\n\t\t\ttoken = strtok(NULL, &quot;;&quot;);\n\t\t}\n\t}\n\treturn FALSE;\n}\n\n\nSLONG API_ROUTINE gds__vax_integer(const UCHAR* ptr, SSHORT length)\n{\n/**************************************\n *\n *\tg d s _ $ v a x _ i n t e g e r\n *\n **************************************\n *\n * Functional description\n *\tPick up (and convert) a VAX style integer of variable length.\n *\n **************************************/\n\tif (!ptr || length &lt;= 0 || length &gt; 4)\n\t\treturn 0;\n\n\tSLONG value = 0;\n\tint shift = 0;\n\n\twhile (--length &gt; 0)\n\t{\n\t\tvalue += ((SLONG) *ptr++) &lt;&lt; shift;\n\t\tshift += 8;\n\t}\n\n\tvalue += ((SLONG)(SCHAR) *ptr) &lt;&lt; shift;\n\n\treturn value;\n}\n\n\nvoid API_ROUTINE gds__vtof(const SCHAR* string, SCHAR* fieldL, USHORT length)\n{\n/**************************************\n *\n *\tg d s _ v t o f\n *\n **************************************\n *\n * Functional description\n *\tMove a null terminated string to a fixed length\n *\tfield.  The call is primarily generated  by the\n *\tpreprocessor.\n *\n **************************************/\n\n\tif (!length)\n\t\treturn;\n\n\twhile (*string)\n\t{\n\t\t*fieldL++ = *string++;\n\t\tif (--length == 0)\n\t\t\treturn;\n\t}\n\n\tif (length &gt; 0)\n\t\tmemset(fieldL, &#x27; &#x27;, length);\n}\n\n\nvoid API_ROUTINE gds__vtov(const SCHAR* string, char* fieldL, SSHORT length)\n{\n/**************************************\n *\n *\tg d s _ v t o v\n *\n **************************************\n *\n * Functional description\n *\tMove a null terminated string to a fixed length\n *\tfield.  The call is primarily generated  by the\n *\tpreprocessor.  Unless gds__vtof, the target string\n *\tis null terminated.\n *\n **************************************/\n\n\t--length;\n\n\twhile ((*fieldL++ = *string++) != 0)\n\t{\n\t\tif (--length &lt;= 0)\n\t\t{\n\t\t\t*fieldL = 0;\n\t\t\treturn;\n\t\t}\n\t}\n}\n\n\nvoid API_ROUTINE isc_print_sqlerror(SSHORT sqlcode, const ISC_STATUS* status)\n{\n/**************************************\n *\n *\ti s c _ p r i n t _ s q l e r r o r\n *\n **************************************\n *\n * Functional description\n *\tGiven an sqlcode, give as much info as possible.\n *      Decide whether status is worth mentioning.\n *\n **************************************/\n\tTEXT error_buffer[192];\n\n\tsnprintf(error_buffer, sizeof(error_buffer), &quot;SQLCODE: %d\\nSQL ERROR:\\n&quot;, sqlcode);\n\tTEXT* p = error_buffer;\n\twhile (*p)\n\t\tp++;\n\n\tisc_sql_interprete(sqlcode, p, (SSHORT) (sizeof(error_buffer) - (p - error_buffer) - 2));\n\twhile (*p)\n\t\tp++;\n\n\t*p++ = &#x27;\\n&#x27;;\n\t*p = 0;\n\tgds__put_error(error_buffer);\n\n\tif (status &amp;&amp; status[1])\n\t{\n\t\tgds__put_error(&quot;ISC STATUS: &quot;);\n\t\tgds__print_status(status);\n\t}\n}\n\n\nvoid API_ROUTINE isc_sql_interprete(SSHORT sqlcode, TEXT* buffer, SSHORT length)\n{\n/**************************************\n *\n *\ti s c _ s q l _ i n t e r p r e t e\n *\n **************************************\n *\n * Functional description\n *\tGiven an sqlcode, return a buffer full of message\n *\tThis is very simple because all we have is the\n *      message number, and the sqlmessages have as yet no\n *\targuments\n *\n *\tNOTE: As of 21-APR-1999, sqlmessages HAVE arguments hence use\n *\t      an empty string instead of NULLs.\n *\n **************************************/\n\tstatic const MsgFormat::SafeArg arg = MsgFormat::SafeArg() &lt;&lt; &quot;&quot; &lt;&lt; &quot;&quot; &lt;&lt; &quot;&quot; &lt;&lt; &quot;&quot; &lt;&lt; &quot;&quot;;\n\n\tif (sqlcode &lt; 0)\n\t\tfb_msg_format(0, 13, (USHORT) (1000 + sqlcode), length, buffer, arg);\n\telse\n\t\tfb_msg_format(0, 14, sqlcode, length, buffer, arg);\n}\n\n\nstatic void blr_error(gds_ctl* control, const TEXT* string, ...)\n{\n/**************************************\n *\n *\tb l r _ e r r o r\n *\n **************************************\n *\n * Functional description\n *\tReport back an error message and unwind.\n *\n **************************************/\n\tUSHORT offset;\n\tva_list args;\n\n\tva_start(args, string);\n\tblr_format(control, string, args);\n\tva_end(args);\n\toffset = 0;\n\tblr_print_line(control, (SSHORT) offset);\n\tFirebird::LongJump::raise();\n}\n\n\nstatic void blr_format(gds_ctl* control, const char* string, va_list args)\n{\n/**************************************\n *\n *\tb l r _ f o r m a t\n *\n **************************************\n *\n * Functional description\n *\tFormat args passed as va_list.\n *\n **************************************/\n\tFirebird::string temp;\n\ttemp.vprintf(string, args);\n\tcontrol-&gt;ctl_string += temp;\n}\n\nstatic void blr_format(gds_ctl* control, const char* string, ...)\n{\n/**************************************\n *\n *\tb l r _ f o r m a t\n *\n **************************************\n *\n * Functional description\n *\tFormat an utterance.\n *\n **************************************/\n\tva_list args;\n\tva_start(args, string);\n\tblr_format(control, string, args);\n\tva_end(args);\n}\n\n\nstatic void blr_indent(gds_ctl* control, SSHORT level)\n{\n/**************************************\n *\n *\tb l r _ i n d e n t\n *\n ***************************** ;*** invalid blr_table_value_fun sub code ***&quot;);\n\n\t\t\tblr_format(control, &quot;blr_table_value_fun_%s, &quot;, subCodes[blr_operator]);\n\n\t\t\tswitch (blr_operator)\n\t\t\t{\n\t\t\t\tcase blr_table_value_fun_unlist:\n\n\t\t\t\t\tblr_print_byte(control);\n\n\t\t\t\t\tblr_print_name(control);\n\n\t\t\t\t\tn = blr_print_word(control);\n\t\t\t\t\toffset = blr_print_line(control, static_cast&lt;SSHORT&gt;(offset));\n\n\t\t\t\t\t++level;\n\t\t\t\t\twhile (n-- &gt; 0)\n\t\t\t\t\t\tblr_print_verb(control, level);\n\n\t\t\t\t\tblr_indent(control, level);\n\t\t\t\t\tn = blr_print_word(control);\n\n\t\t\t\t\twhile (n-- &gt; 0)\n\t\t\t\t\t{\n\t\t\t\t\t\toffset = blr_print_line(control, static_cast&lt;SSHORT&gt;(offset));\n\t\t\t\t\t\tblr_indent(control, level);\n\t\t\t\t\t\tblr_print_dtype(control);\n\t\t\t\t\t\tblr_print_name(control);\n\t\t\t\t\t}\n\t\t\t\t\t--level;\n\n\t\t\t\t\toffset = blr_print_line(control, static_cast&lt;SSHORT&gt;(offset));\n\t\t\t\t\tbreak;\n\n\t\t\t\tdefault:\n\t\t\t\t\tfb_assert(false);\n\t\t\t}\n\n\t\t\tbreak;\n\t\t}\n\n\t\tcase op_for_range:\n\t\t{\n\t\t\toffset = blr_print_line(control, offset);\n\n\t\t\tstatic const char* subCodes[] =\n\t\t\t{\n\t\t\t\tnullptr,\n\t\t\t\t&quot;variable&quot;,\n\t\t\t\t&quot;initial_value&quot;,\n\t\t\t\t&quot;final_value&quot;,\n\t\t\t\t&quot;by_value&quot;,\n\t\t\t\t&quot;statement&quot;,\n\t\t\t\t&quot;direction&quot;\n\t\t\t};\n\n\t\t\tstatic const char* directionSubCodes[] =\n\t\t\t{\n\t\t\t\tnullptr,\n\t\t\t\t&quot;to&quot;,\n\t\t\t\t&quot;downto&quot;\n\t\t\t};\n\n\t\t\twhile ((blr_operator = control-&gt;ctl_blr_reader.getByte()) != blr_end)\n\t\t\t{\n\t\t\t\tblr_indent(control, level);\n\n\t\t\t\tif (blr_operator == 0 || blr_operator &gt;= FB_NELEM(subCodes))\n\t\t\t\t\tblr_error(control, &quot;*** invalid blr_for_range sub code ***&quot;);\n\n\t\t\t\tblr_format(control, &quot;blr_for_range_%s, &quot;, subCodes[blr_operator]);\n\n\t\t\t\tswitch (blr_operator)\n\t\t\t\t{\n\t\t\t\t\tcase blr_for_range_variable:\n\t\t\t\t\tcase blr_for_range_initial_value:\n\t\t\t\t\tcase blr_for_range_final_value:\n\t\t\t\t\tcase blr_for_range_by_value:\n\t\t\t\t\tcase blr_for_range_statement:\n\t\t\t\t\t\toffset = blr_print_line(control, offset);\n\t\t\t\t\t\tblr_print_verb(control, level + 1);\n\t\t\t\t\t\tbreak;\n\n\t\t\t\t\tcase blr_for_range_direction:\n\t\t\t\t\t\tn = control-&gt;ctl_blr_reader.getByte();\n\n\t\t\t\t\t\tif (n == 0 || n &gt;= static_cast&lt;FB_SSIZE_T&gt;(FB_NELEM(directionSubCodes)))\n\t\t\t\t\t\t\tblr_error(control, &quot;*** invalid blr_for_range_direction sub code ***&quot;);\n\n\t\t\t\t\t\tblr_format(control, &quot;blr_for_range_direction_%s,&quot;, directionSubCodes[n]);\n\t\t\t\t\t\toffset = blr_print_line(control, (SSHORT) offset);\n\t\t\t\t\t\tbreak;\n\n\t\t\t\t\tdefault:\n\t\t\t\t\t\tfb_assert(false);\n\t\t\t\t}\n\t\t\t}\n\n\t\t\t// print blr_end\n\t\t\tcontrol-&gt;ctl_blr_reader.seekBackward(1);\n\t\t\tblr_print_verb(control, level);\n\t\t\tbreak;\n\t\t}\n\n\t\tdefault:\n\t\t\tfb_assert(false);\n\t\t\tbreak;\n\t\t}\n\t}\n}\n\n\nstatic int blr_print_word(gds_ctl* control)\n{\n/**************************************\n *\n *\tb l r _ p r i n t _ w o r d\n *\n **************************************\n *\n * Functional description\n *\tPrint a VAX word as a numeric value an return same.\n *\n **************************************/\n\tconst UCHAR v1 = control-&gt;ctl_blr_reader.getByte();\n\tconst UCHAR v2 = control-&gt;ctl_blr_reader.getByte();\n\tblr_format(control, (control-&gt;ctl_language) ? &quot;chr(%d),chr(%d), &quot; : &quot;%d,%d, &quot;, (int) v1, (int) v2);\n\n\treturn (v2 &lt;&lt; 8) | v1;\n}\n\n\nvoid gds__cleanup()\n{\n/**************************************\n *\n *\tc l e a n u p\n *\n **************************************\n *\n * Functional description\n *\tExit handler for image exit.\n *\n **************************************/\n#ifdef UNIX\n\tif (gds_pid != getpid())\n\t\treturn;\n#endif\n\n\tgds__msg_close(NULL);\n\n\tFirebird::MutexLockGuard guard(cleanup_handlers_mutex, &quot;gds__cleanup&quot;);\n\n\tFirebird::InstanceControl::registerGdsCleanup(0);\n\n\tclean_t* clean;\n\twhile ( (clean = cleanup_handlers) )\n\t{\n\t\tcleanup_handlers = clean-&gt;clean_next;\n\t\tFPTR_VOID_PTR routine = clean-&gt;clean_routine;\n\t\tvoid* arg = clean-&gt;clean_arg;\n\n\t\t// We must free the handler before calling it because there\n\t\t// may be a handler (and is) that frees all memory that has been allocated.\n\n\t\tgds__free(clean);\n\n\t\t(*routine)(arg);\n\t}\n\tcleanup_handlers = NULL;\n}\n\n\nstatic void sanitize(Firebird::string&amp; locale)\n{\n/**************************************\n *\n *\ts a n i t i z e\n *\n **************************************\n *\n * Functional description\n *\tClean up a locale to make it acceptable for use in file names\n *      for Windows NT, PC.\n *\treplace any period with &#x27;_&#x27; for NT or PC.\n *\n **************************************/\n\n\tfor (Firebird::string::pointer p = locale.begin(); *p; ++p)\n\t{\n\t\tif (*p == &#x27;.&#x27;)\n\t\t\t*p = &#x27;_&#x27;;\n\t}\n}\n\n\nvoid API_ROUTINE_VARARG gds__default_printer(void* /*arg*/, SSHORT offset, const TEXT* line)\n{\n\tprintf(&quot;%4d %s\\n&quot;, offset, line);\n}\n\n\nvoid API_ROUTINE_VARARG gds__trace_printer(void* /*arg*/, SSHORT offset, const TEXT* line)\n{\n\t// Assume that line is not too long\n\tchar buffer[PRETTY_BUFFER_SIZE + 10];\n\tchar* p = buffer;\n\tgds__ulstr(p, offset, 4, &#x27; &#x27;);\n\tp += strlen(p);\n\t*p++ = &#x27; &#x27;;\n\tfb_utils::copy_terminate(p, line, PRETTY_BUFFER_SIZE + 1);\n\tp += strlen(p);\n\t*p++ = &#x27;\\n&#x27;;\n\t*p = 0;\n\tgds__trace_raw(buffer);\n}\n\n#undef gds__alloc\n\nVoidPtr API_ROUTINE gds__alloc(SLONG size_request)\n{\n\ttry\n\t{\n\t\treturn getDefaultMemoryPool()-&gt;allocate(size_request ALLOC_ARGS);\n\t}\n\tcatch (const Firebird::Exception&amp;)\n\t{\n\t\treturn NULL;\n\t}\n}\n\nclass InitPrefix\n{\npublic:\n\tstatic void init()\n\t{\n\t\t// Get fb_prefix value from config file\n\t\t// CVC: I put this protection block because we can&#x27;t raise exceptions\n\t\t// if exceptions are already raised due to the same reason:\n\t\t// config file not found.\n\t\tFirebird::PathName prefix;\n\t\ttry\n\t\t{\n\t\t\tprefix = Firebird::Config::getRootDirectory();\n\t\t\tif (prefix.isEmpty() &amp;&amp; !GetProgramFilesDir(prefix))\n\t\t\t\tprefix = FB_CONFDIR[0] ? FB_CONFDIR : FB_PREFIX;\n\t\t}\n\t\tcatch (const Firebird::Exception&amp;)\n\t\t{\n\t\t\t// CVC: Presumably here we failed because the config file can&#x27;t be located.\n\t\t\tif (!GetProgramFilesDir(prefix))\n\t\t\t\tprefix = FB_CONFDIR[0] ? FB_CONFDIR : FB_PREFIX;\n\t\t}\n\t\tprefix.copyTo(fb_prefix_val, sizeof(fb_prefix_val));\n\t\tfb_prefix = fb_prefix_val;\n\n\t\t// Find appropriate temp directory\n\t\tFirebird::PathName tempDir;\n\t\tif (!fb_utils::readenv(FB_TMP_ENV, tempDir))\n\t\t{\n#ifdef WIN_NT\n\t\t\tconst DWORD len = GetTempPath(sizeof(fbTempDir), fbTempDir);\n\t\t\t// This checks &quot;TEMP&quot; and &quot;TMP&quot; environment variables\n\t\t\tif (len &amp;&amp; len &lt; sizeof(fbTempDir))\n\t\t\t{\n\t\t\t\ttempDir = fbTempDir;\n\t\t\t}\n#else\n\t\t\tfb_utils::readenv(&quot;TMP&quot;, tempDir);\n#endif\n\t\t}\n\t\tif (!tempDir.length() || tempDir.length() &gt;= MAXPATHLEN)\n\t\t{\n\t\t\tconst char* tmp = getTemporaryFolder();\n\t\t\tif (tmp)\n\t\t\t\ttempDir = tmp;\n\t\t\telse\n\t\t\t\ttempDir = WORKFILE;\n\t\t}\n\t\ttempDir.copyTo(fbTempDir, sizeof(fbTempDir));\n\n\t\t// Find appropriate Firebird lock file prefix\n\t\t// Override conditional defines with the enviroment\n\t\t// variable FIREBIRD_LOCK if it is set.\n\t\tFirebird::PathName lockPrefix;\n\t\tif (!fb_utils::readenv(FB_LOCK_ENV, lockPrefix))\n\t\t{\n#if !defined(WIN_NT)\n\t\t\tconst char* tmp = getTemporaryFolder();\n\t\t\tif (!tmp)\n\t\t\t\ttmp = WORKFILE;\n\t\t\tPathUtils::concatPath(lockPrefix, tmp, LOCKDIR);\n#else\n\t\t\tchar cmnData[MAXPATHLEN];\n\t\t\tif (SHGetSpecialFolderPath(NULL, cmnData, CSIDL_COMMON_APPDATA, TRUE))\n\t\t\t{\n\t\t\t\tPathUtils::concatPath(lockPrefix, cmnData, LOCKDIR);\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tlockPrefix = prefix;\t// emergency default\n\t\t\t}\n#endif  // WIN_NT\n\t\t}\n\t\tlockPrefix.copyTo(fb_prefix_lock_val, sizeof(fb_prefix_lock_val));\n\t\tfb_prefix_lock = fb_prefix_lock_val;\n\n\t\t// Find appropriate Firebird message file prefix.\n\t\tFirebird::PathName msgPrefix;\n\t\tif (!fb_utils::readenv(FB_MSG_ENV, msgPrefix))\n\t\t{\n\t\t\tif (FB_MSGDIR[0] &amp;&amp; PathUtils::isRelative(FB_MSGDIR))\n\t\t\t\tPathUtils::concatPath(msgPrefix, prefix, FB_MSGDIR);\n\t\t\telse\n\t\t\t\tmsgPrefix = FB_MSGDIR[0] ? FB_MSGDIR : prefix;\n\t\t}\n\t\tmsgPrefix.copyTo(fb_prefix_msg_val, sizeof(fb_prefix_msg_val));\n\t\tfb_prefix_msg = fb_prefix_msg_val;\n\n\t\tTimeZoneUtil::initTimeZoneEnv();\n\t}\n\tstatic void cleanup()\n\t{\n\t}\n};\n\nstatic Firebird::InitMutex&lt;InitPrefix&gt; initPrefix(&quot;InitPrefix&quot;);\n\nvoid GDS_init_prefix()\n{\n/**************************************\n *\n *\tG D S _ i n i t _ p r e f i x\n *\n **************************************\n *\n * Functional description\n *\tInitialize all data in various fb_prefixes.\n *\tCalling it before any signal can be caught (from init())\n *\tmakes gds__prefix* family of functions signal-safe.\n *\tIn order not to break external API, call to GDS_init_prefix\n *\tmust be present in all gds__prefix functions. Due to correct\n *\tinit this doesn&#x27;t make them unsafe.\n *\n **************************************/\n\tinitPrefix.init();\n}\n\n\n// We try to see if the registry has the information for the Program Files\n// directory, that follows the boot partition and is localized.\nstatic bool GetProgramFilesDir(Firebird::PathName&amp; output)\n{\n#ifdef WIN_NT\n\tconst char* pdir = &quot;SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion&quot;;\n\tconst char* pvalue = &quot;ProgramFilesDir&quot;;\n\n\tHKEY hkey;\n\tLONG rc = RegOpenKeyEx(HKEY_LOCAL_MACHINE, pdir, 0, KEY_READ, &amp;hkey);\n\tif (rc != ERROR_SUCCESS)\n\t\treturn false;\n\n\tDWORD type, size = 0;\n\trc = RegQueryValueEx(hkey, pvalue, NULL, &amp;type, NULL, &amp;size);\n\tif (rc != ERROR_SUCCESS || type != REG_SZ || !size)\n\t{\n\t\tRegCloseKey(hkey);\n\t\treturn false;\n\t}\n\n\toutput.reserve(size);\n\tBYTE* answer = reinterpret_cast&lt;BYTE*&gt;(output.begin());\n\trc = RegQueryValueEx(hkey, pvalue, NULL, &amp;type, answer, &amp;size);\n\tRegCloseKey(hkey);\n\tif (rc != ERROR_SUCCESS)\n\t\treturn false;\n\n\toutput.recalculate_length();\n\toutput += &quot;\\\\Firebird\\\\&quot;;\n\treturn true;\n#else\n\treturn false;\n#endif\n}\n\n\n// Deprecated private API functions\n\nextern &quot;C&quot;\n{\n\tint API_ROUTINE gds__thread_enable(int)\n\t{\n\t\treturn true;\n\t}\n\n\n\tvoid API_ROUTINE gds__thread_enter()\n\t{\n\t}\n\n\n\tvoid API_ROUTINE gds__thread_exit()\n\t{\n\t}\n} // extern &quot;C&quot;\n"}, "/build/src/common/classes/alloc.cpp": {"id": "/build/src/common/classes/alloc.cpp", "filePath": "src/common/classes/alloc.cpp", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.cpp\n *\tDESCRIPTION:\tMemory Pool Manager (based on B+ tree)\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n\n#ifdef WIN_NT\n\n#include &lt;windows.h&gt;\n\n#ifndef PATH_MAX\n#define PATH_MAX MAX_PATH\n#endif\n\n#else\n\n#include &lt;unistd.h&gt;\n#include &lt;sys/types.h&gt;\n#include &lt;sys/stat.h&gt;\n#include &lt;fcntl.h&gt;\n#include &lt;sys/mman.h&gt;\n\n#endif\n\n#include &quot;../common/classes/fb_tls.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/vector.h&quot;\n#include &quot;../common/classes/RefMutex.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/os/os_utils.h&quot;\n#include &quot;../common/os/fbsyslog.h&quot;\n#include &quot;iberror.h&quot;\n\n#ifdef USE_VALGRIND\n#include &lt;valgrind/memcheck.h&gt;\n\n//#define VALGRIND_FIX_IT\t\t// overrides suspicious valgrind behavior\n#endif\t// USE_VALGRIND\n\nnamespace {\n\n///#define MEM_DEBUG_EXTERNAL\n\n/*** emergency debugging stuff\nstatic const char* lastFileName;\nstatic int lastLine;\nstatic void* lastBlock;\nstatic void* stopAddress = (void*) 0x2254938;\n***/\n\n#undef MEM_DEBUG\n#if defined(DEBUG_GDS_ALLOC) &amp;&amp; !defined(USE_VALGRIND)\n#define MEM_DEBUG\n#endif\n\n#ifdef MEM_DEBUG\nstatic constexpr int GUARD_BYTES\t= ALLOC_ALIGNMENT; // * 2048;\nstatic constexpr UCHAR INIT_BYTE\t= 0xCC;\nstatic constexpr UCHAR GUARD_BYTE\t= 0xDD;\nstatic constexpr UCHAR DEL_BYTE\t\t= 0xEE;\n#else\nstatic constexpr int GUARD_BYTES = 0;\n#endif\n\ntemplate &lt;typename T&gt;\nT absVal(T n) noexcept\n{\n\treturn n &lt; 0 ? -n : n;\n}\n\n#undef DELAYED_FREE\n#if defined(USE_VALGRIND) || defined(MEM_DEBUG)\n#define DELAYED_FREE\n#endif\n\n#ifdef DELAYED_FREE\n// When memory block is deallocated by user from the pool it must pass queue of this\n// length before it is actually deallocated and access protection from it removed.\n#define DELAYED_FREE_COUNT 1024\n\n// When memory extent is deallocated when pool is destroying it must pass through\n// queue of this length before it is actually returned to system\n#define DELAYED_EXTENT_COUNT 32\n\n// Circular FIFO buffer of read/write protected extents pending free operation\n// Race protected via cache_mutex.\nstruct DelayedExtent\n{\n\tvoid* memory; // Extent pointer\n\tsize_t size;  // Size of extent\n};\n\nDelayedExtent delayedExtents[DELAYED_EXTENT_COUNT];\nsize_t delayedExtentCount = 0;\nsize_t delayedExtentsPos = 0;\n#endif\n\n// Uncomment to validate pool on every alloc\\release operation.\n// Could slowdown pool significantly !\n//#define VALIDATE_POOL\n\ntypedef Firebird::AtomicCounter::counter_type StatInt;\n\n// We cache this amount of extents to avoid memory mapping overhead\nconstexpr int MAP_CACHE_SIZE = 16; // == 1 MB\nconstexpr size_t DEFAULT_ALLOCATION = 65536;\n\nstruct ExtentsCache\t// C++ aggregate - members are statically initialized to zeros\n{\n\tunsigned count;\n\tvoid* data[MAP_CACHE_SIZE];\n};\n\nExtentsCache defaultExtentsCache;\nExtentsCache externalExtentsCache;\n\n#ifndef WIN_NT\nstruct FailedBlock\n{\n\tsize_t blockSize;\n\tFailedBlock* next;\n\tFailedBlock** prev;\n};\n\nFailedBlock* failedList = NULL;\n#endif\n\nvoid corrupt(const char* text) noexcept\n{\n\tconst bool bcAbort = Firebird::Config::getBugcheckAbort();\n\tFirebird::Syslog::Record(bcAbort ? Firebird::Syslog::Error : Firebird::Syslog::Warning, text);\n\tif (bcAbort)\n\t\tabort();\n}\n\nFirebird::Mutex* cache_mutex = NULL;\nint dev_zero_fd = 0;\n\n#if defined(WIN_NT)\nsize_t get_page_size()\n{\n\tSYSTEM_INFO info;\n\tGetSystemInfo(&amp;info);\n\treturn info.dwPageSize;\n}\n#else\nsize_t get_page_size()\n{\n\treturn sysconf(_SC_PAGESIZE);\n}\n#endif\n\n\ninline size_t get_map_page_size()\n{\n\tstatic volatile size_t map_page_size = 0;\n\tif (!map_page_size)\n\t{\n\t\tFirebird::MutexLockGuard guard(cache_mutex, &quot;get_map_page_size&quot;);\n\t\tif (!map_page_size)\n\t\t\tmap_page_size = get_page_size();\n\t}\n\treturn map_page_size;\n}\n\n} // anonymous namespace\n\nnamespace Firebird {\n\nnamespace SemiDoubleLink\n{\n\t// SemiDoubleLink makes it possible to walk list one direction,\n\t// push/pop/remove members with very efficient back-link to the head pointer somewhere\n\n\ttemplate &lt;class T&gt;\n\tvoid push(T** where, T* e) noexcept\n\t{\n\t\t// set element `e&#x27; pointers\n\t\te-&gt;prev = where;\n\t\te-&gt;next = *where;\n\n\t\t// make next after `e&#x27; element (if present) point to it\n\t\tif (e-&gt;next)\n\t\t\te-&gt;next-&gt;prev = &amp;(e-&gt;next);\n\n\t\t// make previous element point to `e&#x27;\n\t\t*(e-&gt;prev) = e;\n\t}\n\n\ttemplate &lt;class T&gt;\n\tvoid remove(T* e) noexcept\n\t{\n\t\tfb_assert(e);\n\t\tfb_assert(e-&gt;prev);\n\n\t\t// adjust previous pointer in next element ...\n\t\tif (e-&gt;next)\n\t\t\te-&gt;next-&gt;prev = e-&gt;prev;\n\n\t\t// ... and next pointer in previous element\n\t\t*(e-&gt;prev) = e-&gt;next;\n\t}\n\n\ttemplate &lt;class T&gt;\n\tT* pop(T* e) noexcept\n\t{\n\t\tif (e)\n\t\t\tremove(e);\n\n\t\treturn e;\n\t}\n\n\ttemplate &lt;class T&gt;\n\tvoid validate(T* e)\n\t{\n\t\tif (e-&gt;next &amp;&amp; e-&gt;next-&gt;prev != &amp;(e-&gt;next))\n\t\t\tfatal_exception::raise(&quot;bad back link in SemiDoubleLink&quot;);\n\t}\n}\n\n#ifdef USE_VALGRIND\n// Size of Valgrind red zone applied before and after memory block allocated for user\n#define VALGRIND_REDZONE ALLOC_ALIGNMENT\n#undef MEM_DEBUG\t// valgrind works instead\n#else\n#define VALGRIND_REDZONE 0\n#endif\n\ntypedef SLONG INT32;\n\nclass MemBlock;\nclass MemMediumHunk;\n\nclass MemHeader\n{\npublic:\n\tstatic constexpr size_t SIZE_MASK = 0xFFF0;\n\tstatic constexpr size_t MEM_MASK = 0xF;\n\tstatic constexpr size_t MEM_HUGE = 0x1;\n\tstatic constexpr size_t MEM_REDIRECT = 0x2;\n\tstatic constexpr size_t MEM_EXTENT = 0x4;\n#ifdef DELAYED_FREE\n\tstatic constexpr size_t MEM_ACTIVE = 0x8;\n#endif\n\tstatic constexpr unsigned OFFSET_SHIFT = 16;\n\n\tenum HugeBlock {HUGE_BLOCK};\n\n\tunion\n\t{\n\t\tMemPool*\tpool = nullptr;\n\t\tMemBlock*\tnext;\n\t};\n\nprivate:\n\tsize_t\thdrLength;\n\npublic:\n#ifdef DEBUG_GDS_ALLOC\n\tINT32\t\tlineNumber = -1;\n\tconst char\t*fileName = nullptr;\n#elif (SIZEOF_VOID_P == 4)\n\tFB_UINT64 dummyAlign;\n#endif\n#if defined(USE_VALGRIND) &amp;&amp; (VALGRIND_REDZONE != 0)\n\tchar mbk_valgrind_redzone[VALGRIND_REDZONE];\n#endif\n\n\tMemHeader(size_t size) noexcept\n\t\t: hdrLength(size)\n\t{\n\t\tfb_assert(size &lt; MAX_USHORT);\n\t\tfb_assert(!(size &amp; MEM_MASK));\n\t}\n\n\tMemHeader(size_t size, MemMediumHunk* hunk) noexcept\n\t\t: hdrLength(size | ((((UCHAR*)this) - ((UCHAR*)hunk)) &lt;&lt; OFFSET_SHIFT))\n\t{\n\t\tconst off_t fromTheHunk = ((UCHAR*)this) - ((UCHAR*)hunk);\t// dup !!!\n\n\t\tfb_assert(size &lt; MAX_USHORT);\n\t\tfb_assert(fromTheHunk &lt; MAX_USHORT);\n\t\tfb_assert(fromTheHunk &gt; 0);\n\t\tfb_assert(!(size &amp; MEM_MASK));\n\t}\n\n\tMemHeader(HugeBlock, size_t size) noexcept\n\t\t: hdrLength(size | MEM_HUGE)\n\t{\n\t\tfb_assert(!(size &amp; MEM_MASK));\n\t}\n\n\tsize_t getSize() noexcept\n\t{\n\t\treturn hdrLength &amp; MEM_HUGE ? hdrLength &amp; (~MEM_MASK) : hdrLength &amp; SIZE_MASK;\n\t}\n\n\tMemMediumHunk* getHunk() noexcept\n\t{\n\t\tfb_assert(!(hdrLength &amp; MEM_HUGE));\n\t\toff_t offset = static_cast&lt;off_t&gt;(hdrLength &gt;&gt; OFFSET_SHIFT);\n\t\tfb_assert(offset &gt; 0);\n\t\treturn (MemMediumHunk*)(((UCHAR*)this) - offset);\n\t}\n\n\tvoid setRedirect() noexcept\n\t{\n\t\tfb_assert(!redirected());\n\t\thdrLength |= MEM_REDIRECT;\n\t}\n\n\tvoid resetRedirect(MemPool* parent) noexcept\n\t{\n\t\tvalgrindInternal();\n\n\t\tfb_assert(redirected());\n\t\thdrLength &amp;= ~MEM_REDIRECT;\n\t\tpool = parent;\n\t}\n\n\tbool redirected() const noexcept\n\t{\n\t\treturn hdrLength &amp; MEM_REDIRECT;\n\t}\n\n\tvoid setExtent() noexcept\n\t{\n\t\tfb_assert(!isExtent());\n\t\thdrLength |= MEM_EXTENT;\n\t}\n\n\tvoid resetExtent() noexcept\n\t{\n\t\thdrLength &amp;= ~MEM_EXTENT;\n\t}\n\n\tbool isExtent() const noexcept\n\t{\n\t\treturn hdrLength &amp; MEM_EXTENT;\n\t}\n\n#ifdef DELAYED_FREE\n\tvoid setActive() noexcept\n\t{\n\t\tfb_assert(!isActive());\n\t\thdrLength |= MEM_ACTIVE;\n\t}\n\n\tvoid resetActive() noexcept\n\t{\n\t\tfb_assert(isActive());\n\t\thdrLength &amp;= ~MEM_ACTIVE;\n\t}\n\n\tbool isActive() const noexcept\n\t{\n\t\treturn hdrLength &amp; MEM_ACTIVE;\n\t}\n#else\n\tbool isActive() const noexcept\n\t{\n\t\treturn true;\n\t}\n#endif\n\n\tvoid assertBig() noexcept\n\t{\n\t\tfb_assert(hdrLength &amp; MEM_HUGE);\n\t}\n\n#ifdef MEM_DEBUG\n\tvoid print_contents(FILE* file, bool used_only,\n\t\tconst char* filter_path, const size_t filter_len) noexcept\n\t{\n\t\tif (isActive() || !used_only)\n\t\t{\n\t\t\tbool filter = filter_path != NULL;\n\n\t\t\tif (isActive() &amp;&amp; filter &amp;&amp; fileName)\n\t\t\t\tfilter = strncmp(filter_path, fileName, filter_len) != 0;\n\n\t\t\tif (!filter)\n\t\t\t{\n\t\t\t\tif (isActive() || redirected())\n\t\t\t\t{\n\t\t\t\t\tfprintf(file, &quot;%s %p: size=%&quot; SIZEFORMAT &quot; allocated at %s:%d&quot;,\n\t\t\t\t\t\tisExtent() ? &quot;EXTN&quot; : redirected() ? &quot;RDIR&quot; : &quot;USED&quot;,\n\t\t\t\t\t\tthis, getSize(), fileName, lineNumber);\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t\tfprintf(file, &quot;FREE %p: size=%&quot; SIZEFORMAT, this, getSize());\n\n\t\t\t\tif (hdrLength &amp; MEM_HUGE)\n\t\t\t\t\tfprintf(file, &quot; HUGE&quot;);\n\n\t\t\t\tfprintf(file, &quot;\\n&quot;);\n\t\t\t}\n\t\t}\n\t}\n#endif\n\n\tvoid validate(const MemPool* p, StatInt&amp; vUse) noexcept\n\t{\n\t\tif (p == pool &amp;&amp; !isExtent())\n\t\t\tvUse += getSize();\n\t}\n\n\tvoid valgrindInternal() noexcept;\n};\n\nclass MemBlock : public MemHeader\n{\npublic:\n\tunion\n\t{\n\t\tUCHAR\t\tbody;\n\t\tMemBlock**\tprev = nullptr;\n\t};\n\n\tMemBlock(size_t size, MemMediumHunk* hunk) noexcept\n\t\t: MemHeader(size, hunk)\n\t{ }\n\n\tMemBlock(HugeBlock, size_t size) noexcept\n\t\t: MemHeader(HUGE_BLOCK, size)\n\t{ }\n\n\tMemBlock(size_t size) noexcept\n\t\t: MemHeader(size)\n\t{ }\n};\n\ninline void MemHeader::valgrindInternal() noexcept\n{\n#ifdef USE_VALGRIND\n\tVALGRIND_MAKE_MEM_DEFINED(this, sizeof(MemBlock));\n\tVALGRIND_MAKE_MEM_UNDEFINED(((UCHAR*)this) + sizeof(MemBlock), getSize() - sizeof(MemBlock));\n#endif\n}\n\ntemplate &lt;typename H&gt;\nclass MemBaseHunk\n{\npublic:\n\tH*\t\t\t\tnext = nullptr;\n\tUCHAR*\t\t\tmemory;\n\tsize_t\t\t\tlength;\n\tsize_t\t\t\tspaceRemaining;\n\nprotected:\n\tMemBaseHunk(size_t spaceAllocated, size_t hunkSize) noexcept\n\t\t: length(spaceAllocated)\n\t{\n\t\tinit(spaceAllocated, hunkSize);\n\t}\n\n\tvoid newBlock(size_t size) noexcept\n\t{\n\t\tfb_assert(size &lt;= spaceRemaining);\n\n\t\tmemory += size;\n\t\tspaceRemaining -= size;\n\t}\n\npublic:\n\tvoid validate(const MemPool* pool, size_t hdr, StatInt&amp; vMap, StatInt&amp; vUse) noexcept\n\t{\n\t\tif (length &gt;= DEFAULT_ALLOCATION)\n\t\t{\n\t\t\tfb_assert(length == DEFAULT_ALLOCATION);\n\t\t\tvMap += length;\n\t\t}\n\n\t\tUCHAR* m = ((UCHAR*) this) + hdr;\n\t\twhile (m &lt; memory)\n\t\t{\n\t\t\tMemBlock* block = (MemBlock*)m;\n\t\t\tblock-&gt;validate(pool, vUse);\n\t\t\tm += block-&gt;getSize();\n\t\t}\n\t}\n\n#ifdef MEM_DEBUG\n\tvoid print_memory(UCHAR* m, FILE* file, MemPool* pool, bool used_only,\n\t\tconst char* filter_path, const size_t filter_len) noexcept\n\t{\n\t\twhile (m &lt; memory)\n\t\t{\n\t\t\tMemBlock* block = (MemBlock*)m;\n\t\t\tblock-&gt;print_contents(file, use lusplus &gt;= 201402L\nvoid operator delete(void* mem, std::size_t s) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\nvoid operator delete[](void* mem, std::size_t s) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n#endif\n"}, "/build/src/common/StatusHolder.h": {"id": "/build/src/common/StatusHolder.h", "filePath": "src/common/StatusHolder.h", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusHolder.h\n *\tDESCRIPTION:\tFirebird&#x27;s exception classes\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Vlad Khorsun\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2007 Vlad Khorsun &lt;hvlad at users.sourceforge.net&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_STATUS_HOLDER\n#define FB_STATUS_HOLDER\n\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/DynamicStrings.h&quot;\n\nnamespace Firebird {\n\n// DynamicVector owns strings, contained in it\ntemplate &lt;unsigned S&gt;\nclass DynamicVector : private SimpleStatusVector&lt;S&gt;\n{\npublic:\n\texplicit DynamicVector(MemoryPool&amp; p)\n\t\t: SimpleStatusVector&lt;S&gt;(p)\n\t{\n\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t}\n\n\t~DynamicVector()\n\t{\n\t\tdelete[] findDynamicStrings(this-&gt;getCount(), this-&gt;begin());\n\t}\n\nprivate:\n\tchar* prepareForNewValue()\n\t{\n\t\t// Do not delete old strings buffer because strings from it\n\t\t// may be used in status vector passed to current save() call.\n\t\t// I.e. strings should be first saved in new dynamic buffer and only afterwards\n\t\t// old buffer may be released.\n\t\tchar* oldBuffer = findDynamicStrings(this-&gt;getCount(), this-&gt;begin());\n\t\tthis-&gt;resize(0);\n\t\treturn oldBuffer;\n\t}\n\npublic:\n\tvoid clear()\n\t{\n\t\tdelete[] this-&gt;prepareForNewValue();\n\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t}\n\n\tvoid save(unsigned int length, const ISC_STATUS* status, bool warningMode) noexcept\n\t{\n\t\ttry\n\t\t{\n\t\t\tchar* oldBuffer = this-&gt;prepareForNewValue();\n\t\t\tISC_STATUS* b = this-&gt;getBuffer(length + 1);\n\t\t\tunsigned newLen = makeDynamicStrings(length, b, status);\n\t\t\tdelete[] oldBuffer;\n\n\t\t\tfb_assert(newLen &lt;= length);\n\n\t\t\t// Sanity check\n\t\t\tif (newLen &lt; 2)\n\t\t\t\tfb_utils::init_status(this-&gt;getBuffer(3));\n\t\t\telse\n\t\t\t\tthis-&gt;resize(newLen + 1);\n\t\t}\n\t\tcatch (const BadAlloc&amp;)\n\t\t{\n\t\t\tif (!warningMode)\n\t\t\t{\n\t\t\t\t// do not use stuff here to avoid endless cycle\n\t\t\t\tthis-&gt;shrink(3);\n\t\t\t\tISC_STATUS* s = this-&gt;getBuffer(3);\t// Should not throw - see assert() in ctor\n\t\t\t\tfb_utils::statusBadAlloc(s);\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tthis-&gt;clear();\n\t\t\t}\n\t\t}\n\t\tcatch (const Exception&amp;)\n\t\t{\n\t\t\tfb_assert(false);\n\n\t\t\tthis-&gt;shrink(3);\n\t\t\tISC_STATUS* s = this-&gt;getBuffer(3);\t// Should not throw - see assert() in ctor\n\t\t\tfb_utils::statusUnknown(s);\n\t\t}\n\t}\n\n\tISC_STATUS save(const ISC_STATUS* status, bool warningMode = false) noexcept\n\t{\n\t\tsave(fb_utils::statusLength(status), status, warningMode);\n\t\treturn status[1];\n\t}\n\n\tconst ISC_STATUS* value() const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::begin();\n\t}\n\n\tunsigned length() const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::getCount();\n\t}\n\n\tISC_STATUS operator[](unsigned int index) const\n\t{\n\t\treturn SimpleStatusVector&lt;S&gt;::operator[](index);\n\t}\n};\n\n\n// DynamicStatusVector performs error/success checks and load from IStatus\nclass DynamicStatusVector : public DynamicVector&lt;ISC_STATUS_LENGTH&gt;\n{\npublic:\n\tDynamicStatusVector()\n\t\t: DynamicVector(*getDefaultMemoryPool())\n\t{ }\n\n\tISC_STATUS load(const IStatus* status);\n\n\tISC_STATUS getError() const\n\t{\n\t\treturn value()[1];\n\t}\n\n\tbool isSuccess() const\n\t{\n\t\treturn getError() == 0;\n\t}\n};\n\n\n// Implements IStatus using 2 DynamicVectors\ntemplate &lt;class Final&gt;\nclass BaseStatus : public IStatusImpl&lt;Final, CheckStatusWrapper&gt;\n{\npublic:\n\t// IStatus implementation\n\tvoid init()\n\t{\n\t\terrors.clear();\n\t\twarnings.clear();\n\t}\n\n\tvoid setErrors(const ISC_STATUS* value)\n\t{\n\t\terrors.save(fb_utils::statusLength(value), value, false);\n\t}\n\n\tvoid setErrors2(unsigned int length, const ISC_STATUS* value)\n\t{\n\t\terrors.save(length, value, false);\n\t}\n\n\tvoid setWarnings(const ISC_STATUS* value)\n\t{\n\t\twarnings.save(fb_utils::statusLength(value), value, true);\n\t}\n\n\tvoid setWarnings2(unsigned int length, const ISC_STATUS* value)\n\t{\n\t\twarnings.save(length, value, true);\n\t}\n\n\tconst ISC_STATUS* getErrors() const\n\t{\n\t\treturn errors.value();\n\t}\n\n\tconst ISC_STATUS* getWarnings() const\n\t{\n\t\treturn warnings.value();\n\t}\n\n\tunsigned getState() const\n\t{\n\t\treturn (errors.value()[1] ? IStatus::STATE_ERRORS : 0) |\n\t\t\t   (warnings.value()[1] ? IStatus::STATE_WARNINGS  : 0);\n\t}\n\n\tIStatus* clone() const\n\t{\n\t\tIStatus* ret = MasterInterfacePtr()-&gt;getStatus();\n\n\t\tret-&gt;setWarnings(getWarnings());\n\t\tret-&gt;setErrors(getErrors());\n\n\t\treturn ret;\n\t}\n\npublic:\n\texplicit BaseStatus(MemoryPool&amp; p)\n\t\t: errors(p), warnings(p)\n\t{\n\t\tinit();\n\t}\n\n\tBaseStatus()\n\t\t: errors(*getDefaultMemoryPool()), warnings(*getDefaultMemoryPool())\n\t{\n\t\tinit();\n\t}\n\n\tvoid check()\n\t{\n\t\tconst ISC_STATUS* s = errors.value();\n\t\tif (s[0] == isc_arg_gds &amp;&amp; s[1] != isc_arg_end)\n\t\t\tstatus_exception::raise(s);\n\t}\n\nprotected:\n\tvoid clear()\n\t{\n\t\terrors.clear();\n\t\twarnings.clear();\n\t}\n\nprivate:\n\tDynamicVector&lt;11&gt; errors;\t\t// gds-code (2) + 3 args (6) + stack trace (2) + end (1)\n\tDynamicVector&lt;3&gt; warnings;\t\t// no warnings (empty vector)\n};\n\n\n// Hold status vector and raise error on request\nclass StatusHolder : public BaseStatus&lt;StatusHolder&gt;\n{\npublic:\n\tStatusHolder()\n\t\t: BaseStatus(*getDefaultMemoryPool()), m_raised(false)\n\t{ }\n\n\tISC_STATUS save(IStatus* status);\n\tvoid clear();\n\tvoid raise();\n\n\tISC_STATUS getError()\n\t{\n\t\treturn value()-&gt;getErrors()[1];\n\t}\n\n\tconst IStatus* value()\n\t{\n\t\tif (m_raised)\n\t\t\tclear();\n\n\t\treturn this;\n\t}\n\n\tbool isSuccess()\n\t{\n\t\treturn getError() == 0;\n\t}\n\n\tconst StatusHolder&amp; operator=(const StatusHolder&amp; val)\n\t{\n\t\tsetErrors(val.getErrors());\n\t\tsetWarnings(val.getWarnings());\n\t\tm_raised = val.m_raised;\n\t\treturn *this;\n\t}\n\npublic:\n\tvoid dispose() override\n\t{\n\t}\n\nprivate:\n\tbool m_raised;\n};\n\n\n// Status interface to be used on stack when entering engine\nclass LocalStatus : public AutoStorage, public BaseStatus&lt;LocalStatus&gt;\n{\npublic:\n\tLocalStatus()\n\t\t: AutoStorage(), BaseStatus&lt;LocalStatus&gt;(getPool())\n\t{ }\n\n\texplicit LocalStatus(MemoryPool&amp; p)\n\t\t: AutoStorage(p), BaseStatus&lt;LocalStatus&gt;(getPool())\n\t{ }\n\npublic:\n\tvoid dispose() override\n\t{\n\t}\n\npublic:\n\tstatic void checkException(LocalStatus* status)\n\t{\n\t}\n\n\tstatic void catchException(LocalStatus* status)\n\t{\n\t\tBaseStatusWrapper&lt;LocalStatus&gt;::catchException(status);\n\t}\n\n\tstatic void setVersionError(IStatus* status, const char* interfaceName,\n\t\tunsigned currentVersion, unsigned expectedVersion)\n\t{\n\t\tBaseStatusWrapper&lt;LocalStatus&gt;::setVersionError(\n\t\t\tstatus, interfaceName,currentVersion, expectedVersion);\n\t}\n};\n\n} // namespace Firebird\n\n\n#endif // FB_STATUS_HOLDER\n"}}, "reports": [{"fileId": "/build/src/common/utils.cpp", "reportHash": "676e21ce0d9a907b750e3473737a277c", "checker": {"name": "core.NonNullParamChecker", "url": "https://clang.llvm.org/docs/analyzer/checkers.html#core-nonnullparamchecker-c-c-objc"}, "analyzerName": "clangsa", "line": 110, "column": 2, "message": "Null pointer passed to 2nd parameter expecting 'nonnull'", "events": [{"message": "Assuming 'database' is not equal to NULL", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2223, "column": 6}, {"message": "Assuming field 'dbb_handle' is not equal to 0", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2226, "column": 6}, {"message": "Assuming field 'dbb_field_request' is not equal to 0", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2248, "column": 6}, {"message": "Entering loop body", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2255, "column": 9}, {"message": "Calling 'isc_receive'", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2257, "column": 5}, {"message": "Entered call from 'MET_get_column_default'", "fileId": "/build/src/yvalve/why.cpp", "line": 3215, "column": 1}, {"message": "Value assigned to 'isc_222.isc_225', which participates in a condition later", "fileId": "/build/src/yvalve/why.cpp", "line": 3224, "column": 3}, {"message": "Returning from 'isc_receive'", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2257, "column": 5}, {"message": "Assuming field 'isc_225' is not equal to 0", "fileId": "/build/temp/Release/gpre/std/gpre_meta.cpp", "line": 2258, "column": 9}, {"message": "Assuming
