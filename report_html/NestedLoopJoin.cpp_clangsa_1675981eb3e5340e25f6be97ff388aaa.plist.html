project.\n *\n *  Copyright (c) 2008 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n\n#include &quot;../common/classes/MetaString.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;fb_exception.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/msg_encode.h&quot;\n\n#ifdef WIN_NT\n#include &lt;windows.h&gt;\n#else\n#include &lt;errno.h&gt;\n#endif\n\nnamespace {\n\t// Didn&#x27;t want to bring dyn.h and friends here.\n\tconstexpr int DYN_MSG_FAC = FB_IMPL_MSG_FACILITY_DYN;\n}\n\nnamespace Firebird {\n\nnamespace Arg {\n\nBase::Base(ISC_STATUS k, ISC_STATUS c) :\n\timplementation(FB_NEW_POOL(*getDefaultMemoryPool()) ImplBase(k, c))\n{\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const ISC_STATUS* s) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tfb_assert(s);\n\n\tclear();\n\n\t// special case - empty initialized status vector, no warnings\n\tif (s[0] != isc_arg_gds || s[1] != 0 || s[2] != 0)\n\t\tappend(s);\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const IStatus* s) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tfb_assert(s);\n\n\tclear();\n\n\tif (s-&gt;getState() &amp; IStatus::STATE_ERRORS)\n\t\tappend(s-&gt;getErrors());\n\tif (s-&gt;getState() &amp; IStatus::STATE_WARNINGS)\n\t\tappend(s-&gt;getWarnings());\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const Exception&amp; ex) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tclear();\n\n\tassign(ex);\n}\n\nStatusVector::StatusVector(ISC_STATUS k, ISC_STATUS c) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(k, c))\n{\n\toperator&lt;&lt;(*(static_cast&lt;Base*&gt;(this)));\n}\n\nStatusVector::StatusVector(const ISC_STATUS* s) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(s))\n{\n}\n\nStatusVector::StatusVector(const IStatus* s) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(s))\n{\n}\n\nStatusVector::StatusVector(const Exception&amp; ex) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(ex))\n{\n}\n\nStatusVector::StatusVector() :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(0, 0))\n{\n}\n\nvoid StatusVector::ImplStatusVector::clear() noexcept\n{\n\tm_warning = 0;\n\tm_status_vector.clear();\n\tm_status_vector.push(isc_arg_end);\n\tm_strings.erase();\n}\n\nbool StatusVector::ImplStatusVector::compare(const StatusVector&amp; v) const noexcept\n{\n\treturn length() == v.length() &amp;&amp; fb_utils::cmpStatus(length(), value(), v.value());\n}\n\nvoid StatusVector::ImplStatusVector::assign(const StatusVector&amp; v) noexcept\n{\n\tclear();\n\tappend(v);\n}\n\nvoid StatusVector::ImplStatusVector::assign(const Exception&amp; ex) noexcept\n{\n\tclear();\n\tex.stuffException(m_status_vector);\n\tputStrArg(0);\n}\n\nvoid StatusVector::ImplStatusVector::putStrArg(unsigned startWith)\n{\n\tfor (ISC_STATUS* arg = m_status_vector.begin() + startWith; *arg != isc_arg_end; arg += fb_utils::nextArg(*arg))\n\t{\n\t\tif (!fb_utils::isStr(*arg))\n\t\t\tcontinue;\n\n\t\tconst char** ptr = reinterpret_cast&lt;const char**&gt;(&amp;arg[fb_utils::nextArg(*arg) - 1]);\n\t\tunsigned pos = m_strings.length();\n\t\tconst char* oldBase = m_strings.c_str();\n\n\t\tif (*arg == isc_arg_cstring)\n\t\t{\n\t\t\tm_strings.reserve(m_strings.length() + arg[1] + 1);\n\t\t\tm_strings.append(*ptr, arg[1]);\n\t\t\tm_strings.append(1, &#x27;\\0&#x27;);\n\t\t}\n\t\telse\n\t\t\t m_strings.append(*ptr, fb_strlen(*ptr) + 1);\n\n\t\t*ptr = &amp;m_strings[pos];\n\t\tsetStrPointers(oldBase);\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::setStrPointers(const char* oldBase)\n{\n\tconst char* const newBase = m_strings.c_str();\n\tif (newBase == oldBase)\n\t\treturn;\n\n\tconst char* const newEnd = m_strings.end();\n\n\tfor (ISC_STATUS* arg = m_status_vector.begin(); *arg != isc_arg_end; arg += fb_utils::nextArg(*arg))\n\t{\n\t\tif (!fb_utils::isStr(*arg))\n\t\t\tcontinue;\n\n\t\tconst char** ptr = reinterpret_cast&lt;const char**&gt;(&amp;arg[fb_utils::nextArg(*arg) - 1]);\n\t\tif (*ptr &gt;= newBase &amp;&amp; *ptr &lt; newEnd)\n\t\t\tbreak;\n\n\t\t*ptr = &amp;newBase[*ptr - oldBase];\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::append(const StatusVector&amp; v) noexcept\n{\n\tImplStatusVector newVector(getKind(), getCode());\n\n\tif (newVector.appendErrors(this))\n\t{\n\t\tif (newVector.appendErrors(v.implementation))\n\t\t{\n\t\t\tif (newVector.appendWarnings(this))\n\t\t\t\tnewVector.appendWarnings(v.implementation);\n\t\t}\n\t}\n\n\t*this = newVector;\n}\n\nvoid StatusVector::ImplStatusVector::prepend(const StatusVector&amp; v) noexcept\n{\n\tauto errFrom = v.implementation-&gt;value();\n\tauto lenFrom = v.implementation-&gt;firstWarning() ? v.implementation-&gt;firstWarning() : v.implementation-&gt;length();\n\tauto errTo = value();\n\tauto lenTo = firstWarning() ? firstWarning() : length();\n\n\tif (lenFrom &lt; lenTo &amp;&amp; fb_utils::cmpStatus(lenFrom, errFrom, errTo))\n\t\treturn;\t\t\t// already here - ToDo: check warnings\n\n\tImplStatusVector newVector(getKind(), getCode());\n\n\tif (newVector.appendErrors(v.implementation))\n\t{\n\t\tif (newVector.appendErrors(this))\n\t\t{\n\t\t\tif (newVector.appendWarnings(v.implementation))\n\t\t\t\tnewVector.appendWarnings(this);\n\t\t}\n\t}\n\n\t*this = newVector;\n}\n\nStatusVector::ImplStatusVector&amp; StatusVector::ImplStatusVector::operator=(const StatusVector::ImplStatusVector&amp; src)\n{\n\tm_status_vector = src.m_status_vector;\n\tm_warning = src.m_warning;\n\tm_strings = src.m_strings;\n\tsetStrPointers(src.m_strings.c_str());\n\n\treturn *this;\n}\n\nbool StatusVector::ImplStatusVector::appendErrors(const ImplBase* const v) noexcept\n{\n\treturn append(v-&gt;value(), v-&gt;firstWarning() ? v-&gt;firstWarning() : v-&gt;length());\n}\n\nbool StatusVector::ImplStatusVector::appendWarnings(const ImplBase* const v) noexcept\n{\n\tif (! v-&gt;firstWarning())\n\t\treturn true;\n\treturn append(v-&gt;value() + v-&gt;firstWarning(), v-&gt;length() - v-&gt;firstWarning());\n}\n\nbool StatusVector::ImplStatusVector::append(const ISC_STATUS* const from, const unsigned int count) noexcept\n{\n\t// CVC: I didn&#x27;t expect count to be zero but it&#x27;s, in some calls\n\tfb_assert(count &gt;= 0);\n\tif (!count)\n\t\treturn true; // not sure it&#x27;s the best option here\n\n\tunsigned lenBefore = length();\n\tISC_STATUS* s = m_status_vector.getBuffer(lenBefore + count + 1);\n\tunsigned int copied =\n\t\tfb_utils::copyStatus(&amp;s[lenBefore], count + 1, from, count);\n\tif (copied &lt; count)\n\t\tm_status_vector.shrink(lenBefore + copied + 1);\n\tputStrArg(lenBefore);\n\n\tif (!m_warning)\n\t{\n\t\tfor (unsigned n = 0; n &lt; length(); )\n\t\t{\n\t\t\tif (m_status_vector[n] == isc_arg_warning)\n\t\t\t{\n\t\t\t\tm_warning = n;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tn += (m_status_vector[n] == isc_arg_cstring) ? 3 : 2;\n\t\t}\n\t}\n\n\treturn copied == count;\n}\n\nvoid StatusVector::ImplStatusVector::append(const ISC_STATUS* const from) noexcept\n{\n\tunsigned l = fb_utils::statusLength(from);\n\tappend(from, l + 1);\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const Base&amp; arg) noexcept\n{\n\tm_status_vector[length()] = arg.getKind();\n\tm_status_vector.push(arg.getCode());\n\tm_status_vector.push(isc_arg_end);\n\n\tputStrArg(length() - 2);\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const Warning&amp; arg) noexcept\n{\n\tconst int cur = m_warning ? 0 : length();\n\tshiftLeft(*static_cast&lt;const Base*&gt;(&amp;arg));\n\tif (cur &amp;&amp; m_status_vector[cur] == isc_arg_warning)\n\t\tm_warning = cur;\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const char* text) noexcept\n{\n\tshiftLeft(Str(text));\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const AbstractString&amp; text) noexcept\n{\n\tshiftLeft(Str(text));\n}\n\nvoid StatusVector::ImplStatusVector::shiftLeft(const MetaString&amp; text) noexcept\n{\n\tshiftLeft(Str(text));\n}\n\n[[noreturn]] void StatusVector::raise() const\n{\n\tif (hasData())\n\t{\n\t\tstatus_exception::raise(*this);\n\t}\n\tstatus_exception::raise(Gds(isc_random) &lt;&lt; Str(&quot;Attempt to raise empty exception&quot;));\n}\n\nISC_STATUS StatusVector::ImplStatusVector::copyTo(ISC_STATUS* dest) const noexcept\n{\n\tif (hasData())\n\t{\n\t\tfb_utils::copyStatus(dest, ISC_STATUS_LENGTH, value(), length() + 1u);\n\t}\n\telse\n\t{\n\t\tdest[0] = isc_arg_gds;\n\t\tdest[1] = FB_SUCCESS;\n\t\tdest[2] = isc_arg_end;\n\t}\n\treturn dest[1];\n}\n\nvoid StatusVector::ImplStatusVector::copyTo(IStatus* dest) const noexcept\n{\n\tdest-&gt;init();\n\tif (hasData())\n\t{\n\t\tconst ISC_STATUS* v = m_status_vector.begin();\n\t\tunsigned int len = length();\n\t\tunsigned int warning = m_warning;\n\n\t\tif (v[warning] == isc_arg_warning)\n\t\t{\n\t\t\t dest-&gt;setWarnings2(len - warning, &amp;v[warning]);\n\t\t\t if (warning)\n\t\t\t\tdest-&gt;setErrors2(warning, v);\n\t\t}\n\t\telse\n\t\t\tdest-&gt;setErrors2(len, v);\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::appendTo(IStatus* dest) const noexcept\n{\n\tif (hasData())\n\t{\n\t\tImplStatusVector tmpVector(dest);\n\t\tImplStatusVector newVector(getKind(), getCode());\n\n\t\tif (newVector.appendErrors(&amp;tmpVector))\n\t\t{\n\t\t\tif (newVector.appendErrors(this))\n\t\t\t{\n\t\t\t\tif (newVector.appendWarnings(&amp;tmpVector))\n\t\t\t\t\tnewVector.appendWarnings(this);\n\t\t\t}\n\t\t}\n\n\t\t// take special care about strings safety\n\t\t// that&#x27;s why tmpStatus is needed here\n\t\tAutoPtr&lt;IStatus, SimpleDispose&gt; tmpStatus(dest-&gt;clone());\n\t\tnewVector.copyTo(tmpStatus);\n\n\t\tdest-&gt;setErrors(tmpStatus-&gt;getErrors());\n\t\tdest-&gt;setWarnings(tmpStatus-&gt;getWarnings());\n\t}\n}\n\nGds::Gds(ISC_STATUS s) noexcept :\n\tStatusVector(isc_arg_gds, s) { }\n\nPrivateDyn::PrivateDyn(ISC_STATUS codeWithoutFacility) noexcept :\n\tGds(ENCODE_ISC_MSG(codeWithoutFacility, DYN_MSG_FAC)) { }\n\nNum::Num(ISC_STATUS s) noexcept :\n\tBase(isc_arg_number, s) { }\n\nInt64::Int64(SINT64 val) noexcept :\n\tStr(text)\n{\n\tsnprintf(text, sizeof(text), &quot;%&quot; SQUADFORMAT, val);\n}\n\nInt64::Int64(FB_UINT64 val) noexcept :\n\tStr(text)\n{\n\tsnprintf(text, sizeof(text), &quot;%&quot; UQUADFORMAT, val);\n}\n\nQuad::Quad(const ISC_QUAD* quad) noexcept :\n\tStr(text)\n{\n\tsnprintf(text, sizeof(text), &quot;%x:%x&quot;, quad-&gt;gds_quad_high, quad-&gt;gds_quad_low);\n}\n\nInterpreted::Interpreted(const char* text) noexcept :\n\tStatusVector(isc_arg_interpreted, (ISC_STATUS)(IPTR) text) { }\n\nInterpreted::Interpreted(const AbstractString&amp; text) noexcept :\n\tStatusVector(isc_arg_interpreted, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nUnix::Unix(ISC_STATUS s) noexcept :\n\tBase(isc_arg_unix, s) { }\n\nMach::Mach(ISC_STATUS s) noexcept :\n\tBase(isc_arg_next_mach, s) { }\n\nWindows::Windows(ISC_STATUS s) noexcept :\n\tBase(isc_arg_win32, s) { }\n\nWarning::Warning(ISC_STATUS s) noexcept :\n\tStatusVector(isc_arg_warning, s) { }\n\n// Str overloading.\nStr::Str(const char* text) noexcept :\n\tBase(isc_arg_string, (ISC_STATUS)(IPTR) text) { }\n\nStr::Str(const AbstractString&amp; text) noexcept :\n\tBase(isc_arg_string, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nStr::Str(const MetaString&amp; text) noexcept :\n\tBase(isc_arg_string, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nSqlState::SqlState(const char* text) noexcept :\n\tBase(isc_arg_sql_state, (ISC_STATUS)(IPTR) text) { }\n\nSqlState::SqlState(const AbstractString&amp; text) noexcept :\n\tBase(isc_arg_sql_state, (ISC_STATUS)(IPTR) text.c_str()) { }\n\nOsError::OsError() noexcept :\n#ifdef WIN_NT\n\tBase(isc_arg_win32, GetLastError()) { }\n#else\n\tBase(isc_arg_unix, errno) { }\n#endif\n\nOsError::OsError(ISC_STATUS s) noexcept :\n#ifdef WIN_NT\n\tBase(isc_arg_win32, s) { }\n#else\n\tBase(isc_arg_unix, s) { }\n#endif\n} // namespace Arg\n\n} // namespace Firebird\n"}, "/build/src/common/classes/alloc.h": {"id": "/build/src/common/classes/alloc.h", "filePath": "src/common/classes/alloc.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.h\n *\tDESCRIPTION:\tMemory Pool Manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  STL allocator is based on one by Mike Nordell and John Bellardo\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#ifndef CLASSES_ALLOC_H\n#define CLASSES_ALLOC_H\n\n#include &quot;firebird.h&quot;\n#include &quot;fb_types.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n\n#include &lt;stdio.h&gt;\n\n#if defined(MVS) || defined(DARWIN) || defined(__clang__)\n#include &lt;stdlib.h&gt;\n#else\n#include &lt;malloc.h&gt;\n#endif\n\n#include &lt;memory.h&gt;\n#include &lt;memory&gt;\n\n#ifdef DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool(), __FILE__, __LINE__)\n#define FB_NEW_POOL(pool) new(pool, __FILE__, __LINE__)\n#define FB_NEW_RPT(pool, count) new(pool, count, __FILE__, __LINE__)\n#else // DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool())\n#define FB_NEW_POOL(pool) new(pool)\n#define FB_NEW_RPT(pool, count) new(pool, count)\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird {\n\n// Alignment for all memory blocks\n#define ALLOC_ALIGNMENT 16\n\nstatic inline constexpr size_t MEM_ALIGN(size_t value)\n{\n\treturn FB_ALIGN(value, ALLOC_ALIGNMENT);\n}\n\n\nclass MemPool;\n\nclass MemoryStats\n{\npublic:\n\texplicit MemoryStats(MemoryStats* parent = NULL) noexcept\n\t\t: mst_parent(parent), mst_usage(0), mst_mapped(0), mst_max_usage(0), mst_max_mapped(0)\n\t{}\n\n\t~MemoryStats()\n\t{}\n\n\t// Forbid copying/assignment\n\tMemoryStats(const MemoryStats&amp;) = delete;\n\tMemoryStats&amp; operator=(const MemoryStats&amp;) = delete;\n\n\tsize_t getCurrentUsage() const noexcept { return mst_usage.value(); }\n\tsize_t getMaximumUsage() const noexcept { return mst_max_usage; }\n\tsize_t getCurrentMapping() const noexcept { return mst_mapped.value(); }\n\tsize_t getMaximumMapping() const noexcept { return mst_max_mapped; }\n\nprivate:\n\tMemoryStats* mst_parent;\n\n\t// Currently allocated memory (without allocator overhead)\n\t// Useful for monitoring engine memory leaks\n\tAtomicCounter mst_usage;\n\t// Amount of memory mapped (including all overheads)\n\t// Useful for monitoring OS memory consumption\n\tAtomicCounter mst_mapped;\n\n\t// We don&#x27;t particularily care about extreme precision of these max values,\n\t// this is why we don&#x27;t synchronize them\n\tsize_t mst_max_usage;\n\tsize_t mst_max_mapped;\n\n\t// These methods are thread-safe due to usage of atomic counters only\n\tvoid increment_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_usage.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_usage)\n\t\t\t\tstatistics-&gt;mst_max_usage = temp;\n\t\t}\n\t}\n\n\tvoid decrement_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_usage -= size;\n\t\t}\n\t}\n\n\tvoid increment_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_mapped.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_mapped)\n\t\t\t\tstatistics-&gt;mst_max_mapped = temp;\n\t\t}\n\t}\n\n\tvoid decrement_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_mapped -= size;\n\t\t}\n\t}\n\n\tfriend class MemPool;\n};\n\n\nclass MemoryPool\n{\nfriend class ExternalMemoryHandler;\n\nprivate:\n\tMemPool* pool;\n\n\tMemoryPool(MemPool* p) noexcept\n\t\t: pool(p)\n\t{ }\n\n\t// Default statistics group for process\n\tstatic MemoryStats* default_stats_group;\n\npublic:\n\t// This is maximum block size which is cached (not allocated directly from OS)\n\tenum RecommendedBufferSize { MAX_MEDIUM_BLOCK_SIZE = 64384 };\t// MediumLimits::TOP_LIMIT - 128\n\n\tstatic MemoryPool* defaultMemoryManager;\n\tstatic MemoryPool* externalMemoryManager;\n\npublic:\n\t// Create memory pool instance\n\tstatic MemoryPool* createPool(MemoryPool* parent = NULL, MemoryStats&amp; stats = *default_stats_group);\n\t// Delete memory pool instance\n\tstatic void deletePool(MemoryPool* pool);\n\n#ifdef DEBUG_GDS_ALLOC\n#define ALLOC_ARGS , __FILE__, __LINE__\n#define ALLOC_PARAMS , const char* file, int line\n#define ALLOC_PASS_ARGS , file, line\n#else\n#define ALLOC_ARGS\n#define ALLOC_PARAMS\n#define ALLOC_PASS_ARGS\n#endif // DEBUG_GDS_ALLOC\n\n\tvoid* calloc(size_t size ALLOC_PARAMS);\n\n\tstatic void* globalAlloc(size_t s ALLOC_PARAMS)\n\t{\n\t\treturn defaultMemoryManager-&gt;allocate(s ALLOC_PASS_ARGS);\n\t}\n\n\tvoid* allocate(size_t size ALLOC_PARAMS);\n\n\tstatic void globalFree(void* mem) noexcept;\n\tvoid deallocate(void* mem) noexcept;\n\n\t// Set context pool for current thread of execution\n\tstatic MemoryPool* setContextPool(MemoryPool* newPool);\n\n\t// Get context pool for current thread of execution\n\tstatic MemoryPool* getContextPool();\n\n\tMemoryStats&amp; getStatsGroup() noexcept;\n\n\t// Set statistics group for pool. Usage counters will be decremented from\n\t// previously set group and added to new\n\tvoid setStatsGroup(MemoryStats&amp; stats) noexcept;\n\n\t// Initialize and finalize global memory pool\n\tstatic void initDefaultPool();\n\tstatic void cleanupDefaultPool();\n\n\t// Initialize context pool\n\tstatic void contextPoolInit();\n\n\t// Print out pool contents. This is debugging routine\n\tstatic constexpr unsigned PRINT_USED_ONLY = 0x01;\n\tstatic constexpr unsigned PRINT_RECURSIVE = 0x02;\n\tvoid print_contents(FILE*, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\t// The same routine, but more easily callable from the debugger\n\tvoid print_contents(const char* filename, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\n\tinline bool operator==(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn pool == rhs.pool;\n\t}\n\n\tinline bool operator!=(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn !operator==(rhs);\n\t}\n\npublic:\n\tstruct Finalizer\n\t{\n\t\tvirtual ~Finalizer()\n\t\t{\n\t\t}\n\n\t\tvirtual void finalize() = 0;\n\n\t\tFinalizer* prev = nullptr;\n\t\tFinalizer* next = nullptr;\n\t};\n\n\ttemplate &lt;typename T&gt; Finalizer* registerFinalizer(void (*func)(T*), T* object)\n\t{\n\t\tstruct FinalizerImpl : Finalizer\n\t\t{\n\t\t\tFinalizerImpl(void (*aFunc)(T*), T* aObject)\n\t\t\t\t: func(aFunc),\n\t\t\t\t  object(aObject)\n\t\t\t{\n\t\t\t}\n\n\t\t\tvoid finalize() override\n\t\t\t{\n\t\t\t\tfunc(object);\n\t\t\t}\n\n\t\t\tvoid (*func)(T*);\n\t\t\tT* object;\n\t\t};\n\n\t\tfb_assert(func);\n\t\tFinalizerImpl* finalizer = FB_NEW_POOL(*this) FinalizerImpl(func, object);\n\n\t\tinternalRegisterFinalizer(finalizer);\n\n\t\treturn finalizer;\n\t}\n\n\tvoid unregisterFinalizer(Finalizer*&amp; finalizer);\n\nprivate:\n\tvoid internalRegisterFinalizer(Finalizer* entry);\n\nprivate:\n\tFinalizer* finalizers = nullptr;\n\n\tfriend class MemPool;\n};\n\nvoid initExternalMemoryPool();\n\n} // namespace Firebird\n\nstatic inline Firebird::MemoryPool* getDefaultMemoryPool() noexcept\n{\n\tfb_assert(Firebird::MemoryPool::defaultMemoryManager);\n\treturn Firebird::MemoryPool::defaultMemoryManager;\n}\n\nstatic inline Firebird::MemoryPool* getExternalMemoryPool() noexcept\n{\n\tusing namespace Firebird;\n\n\tif (!MemoryPool::externalMemoryManager)\n\t\tinitExternalMemoryPool();\n\n\treturn MemoryPool::externalMemoryManager;\n}\n\nnamespace Firebird {\n\n// Class intended to manage execution context pool stack\n// Declare instance of this class when you need to set new context pool and it\n// will be restored automatically as soon holder variable gets out of scope\nclass ContextPoolHolder\n{\npublic:\n\texplicit ContextPoolHolder(MemoryPool* newPool)\n\t{\n\t\tsavedPool = MemoryPool::setContextPool(newPool);\n\t}\n\t~ContextPoolHolder()\n\t{\n\t\tMemoryPool::setContextPool(savedPool);\n\t}\nprivate:\n\tMemoryPool* savedPool;\n};\n\n// template enabling common use of old and new pools control code\n// to be dropped when old-style code goes away\ntemplate &lt;typename SubsystemThreadData, typename SubsystemPool&gt;\nclass SubsystemContextPoolHolder : public ContextPoolHolder\n{\npublic:\n\tSubsystemContextPoolHolder\n\t(\n\t\tSubsystemThreadData* subThreadData,\n\t\tSubsystemPool* newPool\n\t)\n\t\t: ContextPoolHolder(newPool),\n\t\tsavedThreadData(subThreadData),\n\t\tsavedPool(savedThreadData-&gt;getDefaultPool())\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(newPool);\n\t}\n\n\t~SubsystemContextPoolHolder()\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(savedPool);\n\t}\n\nprivate:\n\tSubsystemThreadData* savedThreadData;\n\tSubsystemPool* savedPool;\n};\n\n} // namespace Firebird\n\nusing Firebird::MemoryPool;\n\n// operators new and delete\n\ninline void* operator new(size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void* operator new[](size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void operator delete(void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\ninline void operator delete[](void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#ifdef DEBUG_GDS_ALLOC\n\nextern void operator delete(void* mem) noexcept;\nextern void operator delete[](void* mem) noexcept;\n\n#if __cplusplus &gt;= 201402L\nextern void operator delete(void* mem, std::size_t s) noexcept;\nextern void operator delete[](void* mem, std::size_t s) noexcept;\n#endif\n\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird\n{\n\t// Global storage makes it possible to use new and delete for classes,\n\t// based on it, to behave traditionally, i.e. get memory from permanent pool.\n\tclass GlobalStorage\n\t{\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept\n\t\t{\n\t\t\treturn *getDefaultMemoryPool();\n\t\t}\n\t};\n\n\n\t// Permanent storage is used as base class for all objects,\n\t// performing memory allocation in methods other than\n\t// constructors of this objects. Permanent means that pool,\n\t// which will be later used for such allocations, must\n\t// be explicitly passed in all constructors of such object.\n\tclass PermanentStorage\n\t{\n\tprotected:\n\t\texplicit PermanentStorage(MemoryPool&amp; p) noexcept : pool(p) { }\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept { return pool; }\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n\n\t// Automatic storage is used as base class for objects,\n\t// that may have constructors without explicit MemoryPool\n\t// parameter. In this case AutoStorage sends AutoMemoryPool\n\t// to PermanentStorage. To ensure this operation to be safe\n\t// such trick possible only for local (on stack) variables.\n\tclass AutoStorage : public PermanentStorage\n\t{\n\tprivate:\n#if defined(DEV_BUILD)\n\t\tvoid ProbeStack() const noexcept;\n#endif\n\tpublic:\n\t\tstatic MemoryPool&amp; getAutoMemoryPool();\n\tprotected:\n\t\tAutoStorage()\n\t\t\t: PermanentStorage(getAutoMemoryPool())\n\t\t{\n#if defined(DEV_BUILD)\n\t\t\tProbeStack();\n#endif\n\t\t}\n\t\texplicit AutoStorage(MemoryPool&amp; p) noexcept : PermanentStorage(p) { }\n\t};\n\n\ttemplate &lt;&gt;\n\tinline void SimpleDelete&lt;MemoryPool&gt;::clear(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t\tMemoryPool::deletePool(pool);\n\t}\n\n\ttypedef AutoPtr&lt;MemoryPool&gt; AutoMemoryPool;\n\n\ttemplate &lt;typename T&gt;\n\tclass PoolAllocator\n\t{\n\ttemplate &lt;typename&gt; friend class PoolAllocator;\n\n\tpublic:\n\t\tusing value_type = T;\n\t\tusing size_type = size_t;\n\t\tusing pointer = T*;\n\t\tusing const_pointer = const T*;\n\t\tusing reference = T&amp;;\n\t\tusing const_reference = const T&amp;;\n\t\tusing void_pointer = void* ;\n\t\tusing const_void_pointer = const void*;\n\t\tusing difference_type = std::ptrdiff_t;\n\t\tusing is_always_equal = std::true_type;\n\n\t\ttemplate &lt;typename U&gt;\n\t\tstruct rebind\n\t\t{\n\t\t\ttypedef PoolAllocator&lt;U&gt; other;\n\t\t};\n\n\tpublic:\n\t\tPoolAllocator(MemoryPool&amp; aPool) noexcept\n\t\t\t: pool(aPool)\n\t\t{}\n\n\t\tPoolAllocator(const PoolAllocator&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\ttemplate &lt;class U&gt;\n\t\tPoolAllocator(const PoolAllocator&lt;U&gt;&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\t~PoolAllocator() noexcept\n\t\t{}\n\n\tpublic:\n\t\tconstexpr pointer allocate(size_type n, const void* hint = nullptr)\n\t\t{\n\t\t\treturn static_cast&lt;T*&gt;(pool.allocate(n * sizeof(T) ALLOC_ARGS));\n\t\t}\n\n\t\tconstexpr void deallocate(pointer p, size_type n)\n\t\t{\n\t\t\tpool.deallocate(p);\n\t\t}\n\n\t\tconstexpr size_type max_size() const noexcept\n\t\t{\n\t\t\treturn size_t(-1) / sizeof(T);\n\t\t}\n\n\t\ttemplate &lt;typename U, typename... Args&gt;\n\t\tconstexpr void construct(U* ptr, Args&amp;&amp;... args)\n\t\t{\n\t\t\tif constexpr (std::is_constructible&lt;U, MemoryPool&amp;, Args...&gt;::value)\n\t\t\t\tnew ((void*) ptr) U(pool, std::forward&lt;Args&gt;(args)...);\n\t\t\telse\n\t\t\t\tnew ((void*) ptr) U(std::forward&lt;Args&gt;(args)...);\n\t\t}\n\n\t\ttemplate &lt;typename U&gt;\n\t\tconstexpr void destroy(U* ptr)\n\t\t{\n\t\t\tptr-&gt;~U();\n\t\t}\n\n\t\tconstexpr bool operator==(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool == &amp;o.pool;\n\t\t}\n\n\t\tconstexpr bool operator!=(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool != &amp;o.pool;\n\t\t}\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n} // namespace Firebird\n\n\ntemplate &lt;typename TAlloc&gt;\nstruct std::allocator_traits&lt;Firebird::PoolAllocator&lt;TAlloc&gt;&gt;\n{\n\tusing Alloc = Firebird::PoolAllocator&lt;TAlloc&gt;;\n\n\tusing allocator_type = Alloc;\n\tusing value_type = typename Alloc::value_type;\n\tusing pointer = typename Alloc::pointer;\n\tusing const_pointer = typename Alloc::const_pointer;\n\tusing void_pointer = typename Alloc::void_pointer;\n\tusing const_void_pointer = typename Alloc::const_void_pointer;\n\tusing size_type = typename Alloc::size_type;\n\tusing difference_type = typename Alloc::difference_type;\n\tusing reference = value_type&amp;;\n\tusing const_reference = const value_type&amp;;\n\n\tusing is_always_equal = typename Alloc::is_always_equal;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_alloc = typename Alloc::template rebind&lt;T&gt;::other;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_traits = allocator_traits&lt;rebind_alloc&lt;T&gt;&gt;;\n\n\tstatic constexpr pointer allocate(Alloc&amp; alloc, size_type size)\n\t{\n\t\treturn alloc.allocate(size);\n\t}\n\n\tstatic constexpr void deallocate(Alloc&amp; alloc, pointer ptr, size_type size)\n\t{\n\t\talloc.deallocate(ptr, size);\n\t}\n\n\ttemplate &lt;typename T, typename... Args&gt;\n\tstatic constexpr void construct(Alloc&amp; alloc, T* ptr, Args&amp;&amp;... args)\n\t{\n\t\talloc.construct(ptr, std::forward&lt;Args&gt;(args)...);\n\t}\n\n\ttemplate &lt;typename T&gt;\n\tstatic constexpr void destroy(Alloc&amp; alloc, T* ptr)\n\t{\n\t\talloc.destroy(ptr);\n\t}\n\n\tstatic constexpr size_type max_size(const Alloc&amp; alloc) noexcept\n\t{\n\t\treturn alloc.max_size();\n\t}\n};\n\n\n#endif // CLASSES_ALLOC_H\n"}, "/build/src/dsql/Nodes.h": {"id": "/build/src/dsql/Nodes.h", "filePath": "src/dsql/Nodes.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Adriano dos Santos Fernandes\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Adriano dos Santos Fernandes &lt;adrianosf@uol.com.br&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef DSQL_NODES_H\n#define DSQL_NODES_H\n\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../dsql/DsqlCompilerScratch.h&quot;\n#include &quot;../dsql/Visitors.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/NestConst.h&quot;\n#include &lt;functional&gt;\n#include &lt;initializer_list&gt;\n#include &lt;type_traits&gt;\n\nnamespace Jrd {\n\nclass AggregateSort;\nclass CompilerScratch;\nclass SubQuery;\nclass Cursor;\nclass Node;\nclass NodePrinter;\nclass ExprNode;\nclass NodeRefsHolder;\nclass Optimizer;\nclass OptimizerRetrieval;\nclass RecordSource;\nclass RseNode;\nclass SlidingWindow;\nclass TypeClause;\nclass ValueExprNode;\n\n\n// Must be less then MAX_SSHORT. Not used for static arrays.\ninline constexpr unsigned MAX_CONJUNCTS = 32000;\n\n// New: MAX_STREAMS should be a multiple of BITS_PER_LONG (32 and hard to believe it will change)\n\ninline constexpr StreamType INVALID_STREAM = ~StreamType(0);\ninline constexpr StreamType MAX_STREAMS = 4096;\n\ninline constexpr StreamType STREAM_MAP_LENGTH = MAX_STREAMS + 2;\n\n// New formula is simply MAX_STREAMS / BITS_PER_LONG\ninline constexpr int OPT_STREAM_BITS = MAX_STREAMS / BITS_PER_LONG; // 128 with 4096 streams\n\ntypedef Firebird::HalfStaticArray&lt;StreamType, OPT_STATIC_STREAMS&gt; StreamList;\ntypedef Firebird::SortedArray&lt;StreamType&gt; SortedStreamList;\n\ntypedef Firebird::Array&lt;NestConst&lt;ValueExprNode&gt; &gt; NestValueArray;\n\n\nclass Printable\n{\npublic:\n\tvirtual ~Printable()\n\t{\n\t}\n\npublic:\n\tvoid print(NodePrinter&amp; printer) const;\n\n\tvirtual Firebird::string internalPrint(NodePrinter&amp; printer) const = 0;\n};\n\n\ntemplate &lt;typename T&gt;\nclass RegisterNode\n{\npublic:\n\texplicit RegisterNode(std::initializer_list&lt;UCHAR&gt; blrList)\n\t{\n\t\tfor (const auto blr : blrList)\n\t\t\tPAR_register(blr, T::parse);\n\t}\n};\n\ntemplate &lt;typename T&gt;\nclass RegisterBoolNode\n{\npublic:\n\texplicit RegisterBoolNode(std::initializer_list&lt;UCHAR&gt; blrList)\n\t{\n\t\tfor (const auto blr : blrList)\n\t\t\tPAR_register(blr, T::parse);\n\t}\n};\n\n\nclass Node : public Printable\n{\npublic:\n\texplicit Node(MemoryPool&amp; pool)\n\t\t: line(0),\n\t\t  column(0)\n\t{\n\t}\n\n\tvirtual ~Node()\n\t{\n\t}\n\n\t// Compile a parsed statement into something more interesting.\n\ttemplate &lt;typename T&gt;\n\tstatic T* doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T&gt;&amp; node)\n\t{\n\t\tif (!node)\n\t\t\treturn NULL;\n\n\t\treturn node-&gt;dsqlPass(dsqlScratch);\n\t}\n\n\t// Compile a parsed statement into something more interesting and assign it to target.\n\ttemplate &lt;typename T1, typename T2&gt;\n\tstatic void doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T1&gt;&amp; target, NestConst&lt;T2&gt;&amp; node)\n\t{\n\t\tif (!node)\n\t\t\ttarget = NULL;\n\t\telse\n\t\t\ttarget = node-&gt;dsqlPass(dsqlScratch);\n\t}\n\n\t// Changes dsqlScratch-&gt;isPsql() value, calls doDsqlPass and restore dsqlScratch-&gt;isPsql().\n\ttemplate &lt;typename T&gt;\n\tstatic T* doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T&gt;&amp; node, bool psql)\n\t{\n\t\tPsqlChanger changer(dsqlScratch, psql);\n\t\treturn doDsqlPass(dsqlScratch, node);\n\t}\n\n\t// Changes dsqlScratch-&gt;isPsql() value, calls doDsqlPass and restore dsqlScratch-&gt;isPsql().\n\ttemplate &lt;typename T1, typename T2&gt;\n\tstatic void doDsqlPass(DsqlCompilerScratch* dsqlScratch, NestConst&lt;T1&gt;&amp; target, NestConst&lt;T2&gt;&amp; node, bool psql)\n\t{\n\t\tPsqlChanger changer(dsqlScratch, psql);\n\t\tdoDsqlPass(dsqlScratch, target, node);\n\t}\n\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override = 0;\n\n\tvirtual void getChildren(NodeRefsHolder&amp; holder, bool dsql) const\n\t{\n\t}\n\n\tvirtual Node* dsqlPass(DsqlCompilerScratch* /*dsqlScratch*/)\n\t{\n\t\treturn this;\n\t}\n\npublic:\n\tULONG line;\n\tULONG column;\n};\n\n\nclass DdlNode : public Node\n{\npublic:\n\texplicit DdlNode(MemoryPool&amp; pool)\n\t\t: Node(pool)\n\t{\n\t}\n\n\tstatic void protectSystemSchema(const MetaName&amp; name, ObjectType objType)\n\t{\n\t\tif (name == SYSTEM_SCHEMA)\n\t\t{\n\t\t\tFirebird::status_exception::raise(\n\t\t\t\tFirebird::Arg::Gds(isc_dyn_cannot_mod_obj_sys_schema) &lt;&lt;\n\t\t\t\tgetObjectName(objType));\n\t\t}\n\t}\n\n\tstatic bool deleteSecurityClass(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst MetaName&amp; secClass);\n\n\tstatic void storePrivileges(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst QualifiedName&amp; name, int type, const char* privileges);\n\n\tstatic void deletePrivilegesByRelName(thread_db* tdbb, jrd_tra* transaction,\n\t\tconst QualifiedName&amp; name, int type);\n\npublic:\n\t// Check permission on DDL operation. Return true if everything is OK.\n\t// Raise an exception for bad permission.\n\t// If returns false permissions will be check in old style at vio level as well as while direct RDB$ tables modify.\n\tvirtual void checkPermission(thread_db* tdbb, jrd_tra* transaction) = 0;\n\n\t// Set the scratch&#x27;s transaction when executing a node. Fact of accessing the scratch during\n\t// execution is a hack.\n\tvoid executeDdl(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction, bool trusted = false)\n\t{\n\t\t// dsqlScratch should be NULL with CREATE DATABASE.\n\t\tif (dsqlScratch)\n\t\t\tdsqlScratch-&gt;setTransaction(transaction);\n\n\t\tif (!trusted)\n\t\t\tcheckPermission(tdbb, transaction);\n\t\texecute(tdbb, dsqlScratch, transaction);\n\t}\n\n\tDdlNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tdsqlScratch-&gt;getDsqlStatement()-&gt;setType(DsqlStatement::TYPE_DDL);\n\t\treturn this;\n\t}\n\npublic:\n\tenum DdlTriggerWhen { DTW_BEFORE, DTW_AFTER };\n\n\tstatic void executeDdlTrigger(thread_db* tdbb, jrd_tra* transaction,\n\t\tDdlTriggerWhen when, int action, const QualifiedName&amp; objectName,\n\t\tconst QualifiedName&amp; oldNewObjectName, const Firebird::string&amp; sqlText);\n\nprotected:\n\ttypedef Firebird::Pair&lt;Firebird::Left&lt;MetaName, bid&gt; &gt; MetaNameBidPair;\n\ttypedef Firebird::GenericMap&lt;MetaNameBidPair&gt; MetaNameBidMap;\n\n\t// Return exception code based on combination of create and alter clauses.\n\tstatic ISC_STATUS createAlterCode(bool create, bool alter, ISC_STATUS createCode,\n\t\tISC_STATUS alterCode, ISC_STATUS createOrAlterCode)\n\t{\n\t\tif (create &amp;&amp; alter)\n\t\t\treturn createOrAlterCode;\n\n\t\tif (create)\n\t\t\treturn createCode;\n\n\t\tif (alter)\n\t\t\treturn alterCode;\n\n\t\tfb_assert(false);\n\t\treturn 0;\n\t}\n\n\tvoid executeDdlTrigger(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction,\n\t\tDdlTriggerWhen when, int action, const QualifiedName&amp; objectName,\n\t\tconst QualifiedName&amp; oldNewObjectName);\n\tvoid storeGlobalField(thread_db* tdbb, jrd_tra* transaction, QualifiedName&amp; name,\n\t\tconst TypeClause* field,\n\t\tconst Firebird::string&amp; computedSource = &quot;&quot;,\n\t\tconst BlrDebugWriter::BlrData&amp; computedValue = BlrDebugWriter::BlrData());\n\npublic:\n\t// Prefix DDL exceptions. To be implemented in each command.\n\t// Attention: do not store temp strings in Arg::StatusVector,\n\t// when needed keep them permanently in command&#x27;s node.\n\tvirtual void putErrorPrefix(Firebird::Arg::StatusVector&amp; statusVector) = 0;\n\n\tvirtual void execute(thread_db* tdbb, DsqlCompilerScratch* dsqlScratch, jrd_tra* transaction) = 0;\n\n\tvirtual bool mustBeReplicated() const\n\t{\n\t\treturn true;\n\t}\n};\n\n\nclass Request(tdbb-&gt;getRequest()),\n\t\t\t  oldTransaction(tdbb-&gt;getTransaction())\n\t\t{\n\t\t\tsavedTdbb-&gt;setTransaction(transaction);\n\t\t\tsavedTdbb-&gt;setRequest(request);\n\t\t}\n\n\t\t~ExeState()\n\t\t{\n\t\t\tsavedTdbb-&gt;setTransaction(oldTransaction);\n\t\t\tsavedTdbb-&gt;setRequest(oldRequest);\n\t\t}\n\n\t\tthread_db* savedTdbb;\n\t\tMemoryPool* oldPool;\t\t// Save the old pool to restore on exit.\n\t\tRequest* oldRequest;\t\t// Save the old request to restore on exit.\n\t\tjrd_tra* oldTransaction;\t// Save the old transaction to restore on exit.\n\t\tconst StmtNode* topNode = nullptr;\n\t\tconst StmtNode* prevNode = nullptr;\n\t\tWhichTrigger whichEraseTrig = ALL_TRIGS;\n\t\tWhichTrigger whichStoTrig = ALL_TRIGS;\n\t\tWhichTrigger whichModTrig = ALL_TRIGS;\n\t\tbool errorPending = false;\t\t// Is there an error pending to be handled?\n\t\tbool catchDisabled = false;\t\t// Catch errors so we can unwind cleanly.\n\t\tbool exit = false;\t\t\t\t// Exit the looper when true.\n\t\tbool forceProfileNextEvaluate = false;\n\t};\n\npublic:\n\texplicit StmtNode(Type aType, MemoryPool&amp; pool)\n\t\t: DmlNode(pool),\n\t\t  parentStmt(NULL),\n\t\t  impureOffset(0),\n\t\t  hasLineColumn(false)\n\t{\n\t}\n\n\tvirtual Type getType() const = 0;\n\n\t// Allocate and assign impure space for various nodes.\n\ttemplate &lt;typename T&gt; static void doPass2(thread_db* tdbb, CompilerScratch* csb, T** node,\n\t\tStmtNode* parentStmt)\n\t{\n\t\tif (!*node)\n\t\t\treturn;\n\n\t\tif (parentStmt)\n\t\t\t(*node)-&gt;parentStmt = parentStmt;\n\n\t\t*node = (*node)-&gt;pass2(tdbb, csb);\n\t}\n\n\tKind getKind() override\n\t{\n\t\treturn KIND_STATEMENT;\n\t}\n\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override;\n\n\tStmtNode* dsqlPass(DsqlCompilerScratch* dsqlScratch) override\n\t{\n\t\tDmlNode::dsqlPass(dsqlScratch);\n\t\treturn this;\n\t}\n\n\tStmtNode* pass1(thread_db* tdbb, CompilerScratch* csb) override = 0;\n\tStmtNode* pass2(thread_db* tdbb, CompilerScratch* csb) override = 0;\n\n\tStmtNode* copy(thread_db* /*tdbb*/, NodeCopier&amp; /*copier*/) const override\n\t{\n\t\tfb_assert(false);\n\t\tFirebird::status_exception::raise(\n\t\t\tFirebird::Arg::Gds(isc_cannot_copy_stmt) &lt;&lt;\n\t\t\tFirebird::Arg::Num(int(getType())));\n\n\t\treturn NULL;\n\t}\n\n\tvirtual bool isProfileAware() const\n\t{\n\t\treturn true;\n\t}\n\n\tvirtual const StmtNode* execute(thread_db* tdbb, Request* request, ExeState* exeState) const = 0;\n\npublic:\n\tNestConst&lt;StmtNode&gt; parentStmt;\n\tULONG impureOffset;\t// Inpure offset from request block.\n\tbool hasLineColumn;\n};\n\n\n// Used to represent nodes that don&#x27;t have a specific BLR verb, i.e.,\n// do not use RegisterNode.\nclass DsqlOnlyStmtNode : public StmtNode\n{\npublic:\n\texplicit DsqlOnlyStmtNode(Type aType, MemoryPool&amp; pool)\n\t\t: StmtNode(aType, pool)\n\t{\n\t}\n\npublic:\n\tDsqlOnlyStmtNode* pass1(thread_db* /*tdbb*/, CompilerScratch* /*csb*/) override\n\t{\n\t\tfb_assert(false);\n\t\treturn this;\n\t}\n\n\tDsqlOnlyStmtNode* pass2(thread_db* /*tdbb*/, CompilerScratch* /*csb*/) override\n\t{\n\t\tfb_assert(false);\n\t\treturn this;\n\t}\n\n\tDsqlOnlyStmtNode* copy(thread_db* /*tdbb*/, NodeCopier&amp; /*copier*/) const override\n\t{\n\t\tfb_assert(false);\n\t\treturn NULL;\n\t}\n\n\tconst StmtNode* execute(thread_db* /*tdbb*/, Request* /*request*/, ExeState* /*exeState*/) const override\n\t{\n\t\tfb_assert(false);\n\t\treturn NULL;\n\t}\n};\n\n\nstruct ScaledNumber\n{\n\tFB_UINT64 number;\n\tSCHAR scale;\n\tbool hex;\n};\n\n\nclass RowsClause : public Printable\n{\npublic:\n\texplicit RowsClause(MemoryPool&amp; pool)\n\t\t: length(NULL),\n\t\t  skip(NULL)\n\t{\n\t}\n\npublic:\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override;\n\npublic:\n\tNestConst&lt;ValueExprNode&gt; length;\n\tNestConst&lt;ValueExprNode&gt; skip;\n};\n\n\nclass GeneratorItem : public Printable\n{\npublic:\n\tGeneratorItem(Firebird::MemoryPool&amp; pool, const QualifiedName&amp; name)\n\t\t: id(0), name(pool, name), secName(pool)\n\t{}\n\n\tGeneratorItem&amp; operator=(const GeneratorItem&amp; other)\n\t{\n\t\tid = other.id;\n\t\tname = other.name;\n\t\tsecName = other.secName;\n\t\treturn *this;\n\t}\n\npublic:\n\tFirebird::string internalPrint(NodePrinter&amp; printer) const override;\n\npublic:\n\tSLONG id;\n\tQualifiedName name;\n\tQualifiedName secName;\n};\n\ntypedef Firebird::Array&lt;StreamType&gt; StreamMap;\n\n// Copy sub expressions (including subqueries).\nclass SubExprNodeCopier : private StreamMap, public NodeCopier\n{\npublic:\n\tSubExprNodeCopier(Firebird::MemoryPool&amp; pool, CompilerScratch* aCsb)\n\t\t: NodeCopier(pool, aCsb, getBuffer(STREAM_MAP_LENGTH))\n\t{\n\t\t// Initialize the map so all streams initially resolve to the original number.\n\t\t// As soon as copy creates new streams, the map is being overwritten.\n\t\tfor (unsigned i = 0; i &lt; STREAM_MAP_LENGTH; ++i)\n\t\t\tremap[i] = i;\n\t}\n};\n\n\n} // namespace\n\n#endif // DSQL_NODES_H\n"}, "/build/src/common/StatusArg.h": {"id": "/build/src/common/StatusArg.h", "filePath": "src/common/StatusArg.h", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusArg.h\n *\tDESCRIPTION:\tBuild status vector with variable number of elements\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_STATUS_ARG\n#define FB_STATUS_ARG\n\n#include &quot;fb_exception.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n\nnamespace Firebird {\n\nclass AbstractString;\nclass MetaString;\nclass Exception;\n\nnamespace Arg {\n\n// forward\nclass Warning;\nclass StatusVector;\n\nclass Base\n{\n#ifdef __HP_aCC\n// aCC gives error, cannot access protected member class ImplBase\npublic:\n#else\nprotected:\n#endif\n\tclass ImplBase\n\t{\n\tprivate:\n\t\tISC_STATUS kind, code;\n\n\tpublic:\n\t\tISC_STATUS getKind() const noexcept { return kind; }\n\t\tISC_STATUS getCode() const noexcept { return code; }\n\n\t\tvirtual const ISC_STATUS* value() const noexcept { return NULL; }\n\t\tvirtual unsigned int length() const noexcept { return 0; }\n\t\tvirtual unsigned int firstWarning() const noexcept { return 0; }\n\t\tvirtual bool hasData() const noexcept { return false; }\n\t\tvirtual void clear() noexcept { }\n\t\tvirtual void append(const StatusVector&amp;) noexcept { }\n\t\tvirtual void prepend(const StatusVector&amp;) noexcept { }\n\t\tvirtual void assign(const StatusVector&amp; ex) noexcept { }\n\t\tvirtual void assign(const Exception&amp; ex) noexcept { }\n\t\tvirtual ISC_STATUS copyTo(ISC_STATUS*) const noexcept { return 0; }\n\t\tvirtual void copyTo(IStatus*) const noexcept { }\n\t\tvirtual void appendTo(IStatus*) const noexcept { }\n\n\t\tvirtual void shiftLeft(const Base&amp;) noexcept { }\n\t\tvirtual void shiftLeft(const Warning&amp;) noexcept { }\n\t\tvirtual void shiftLeft(const char*) noexcept { }\n\t\tvirtual void shiftLeft(const AbstractString&amp;) noexcept { }\n\t\tvirtual void shiftLeft(const MetaString&amp;) noexcept { }\n\n\t\tvirtual bool compare(const StatusVector&amp; /*v*/) const noexcept { return false; }\n\n\t\tImplBase(ISC_STATUS k, ISC_STATUS c) noexcept : kind(k), code(c) { }\n\t\tvirtual ~ImplBase() { }\n\t};\n\n\tBase(ISC_STATUS k, ISC_STATUS c);\n\texplicit Base(ImplBase* i) noexcept : implementation(i) { }\n\t~Base() noexcept { delete implementation; }\n\n\tImplBase* const implementation;\n\npublic:\n\tISC_STATUS getKind() const noexcept { return implementation-&gt;getKind(); }\n\tISC_STATUS getCode() const noexcept { return implementation-&gt;getCode(); }\n};\n\nclass StatusVector : public Base\n{\nprotected:\n\tclass ImplStatusVector : public ImplBase\n\t{\n\tprivate:\n\t\tStaticStatusVector m_status_vector;\n\t\tunsigned int m_warning;\n\n\t\tstring m_strings;\n\n\t\tvoid putStrArg(unsigned startWith);\n\t\tvoid setStrPointers(const char* oldBase);\n\n\t\tbool appendErrors(const ImplBase* const v) noexcept;\n\t\tbool appendWarnings(const ImplBase* const v) noexcept;\n\t\tbool append(const ISC_STATUS* const from, const unsigned int count) noexcept;\n\t\tvoid append(const ISC_STATUS* const from) noexcept;\n\n\t\tImplStatusVector&amp; operator=(const ImplStatusVector&amp; src);\n\n\tpublic:\n\t\tvirtual const ISC_STATUS* value() const noexcept { return m_status_vector.begin(); }\n\t\tvirtual unsigned int length() const noexcept { return m_status_vector.getCount() - 1u; }\n\t\tvirtual unsigned int firstWarning() const noexcept { return m_warning; }\n\t\tvirtual bool hasData() const noexcept { return length() &gt; 0u; }\n\t\tvirtual void clear() noexcept;\n\t\tvirtual void append(const StatusVector&amp; v) noexcept;\n\t\tvirtual void prepend(const StatusVector&amp; v) noexcept;\n\t\tvirtual void assign(const StatusVector&amp; v) noexcept;\n\t\tvirtual void assign(const Exception&amp; ex) noexcept;\n\t\tvirtual ISC_STATUS copyTo(ISC_STATUS* dest) const noexcept;\n\t\tvirtual void copyTo(IStatus* dest) const noexcept;\n\t\tvirtual void appendTo(IStatus* dest) const noexcept;\n\t\tvirtual void shiftLeft(const Base&amp; arg) noexcept;\n\t\tvirtual void shiftLeft(const Warning&amp; arg) noexcept;\n\t\tvirtual void shiftLeft(const char* text) noexcept;\n\t\tvirtual void shiftLeft(const AbstractString&amp; text) noexcept;\n\t\tvirtual void shiftLeft(const MetaString&amp; text) noexcept;\n\t\tvirtual bool compare(const StatusVector&amp; v) const noexcept;\n\n\t\tImplStatusVector(ISC_STATUS k, ISC_STATUS c) noexcept\n\t\t\t: ImplBase(k, c),\n\t\t\t  m_status_vector(*getDefaultMemoryPool()),\n\t\t\t  m_strings(*getDefaultMemoryPool())\n\t\t{\n\t\t\tclear();\n\t\t}\n\n\t\texplicit ImplStatusVector(const ISC_STATUS* s) noexcept;\n\t\texplicit ImplStatusVector(const IStatus* s) noexcept;\n\t\texplicit ImplStatusVector(const Exception&amp; ex) noexcept;\n\t};\n\n\tStatusVector(ISC_STATUS k, ISC_STATUS v);\n\npublic:\n\texplicit StatusVector(const ISC_STATUS* s);\n\texplicit StatusVector(const IStatus* s);\n\texplicit StatusVector(const Exception&amp; ex);\n\tStatusVector();\n\t~StatusVector() { }\n\n\t// copying is prohibited\n\tStatusVector(const StatusVector&amp;) = delete;\n\tvoid operator=(const StatusVector&amp;) = delete;\n\n\tconst ISC_STATUS* value() const noexcept { return implementation-&gt;value(); }\n\tunsigned int length() const noexcept { return implementation-&gt;length(); }\n\tbool hasData() const noexcept { return implementation-&gt;hasData(); }\n\tbool isEmpty() const noexcept { return !implementation-&gt;hasData(); }\n\n\tvoid clear() noexcept { implementation-&gt;clear(); }\n\tvoid append(const StatusVector&amp; v) noexcept { implementation-&gt;append(v); }\n\tvoid prepend(const StatusVector&amp; v) noexcept { implementation-&gt;prepend(v); }\n\tvoid assign(const StatusVector&amp; v) noexcept { implementation-&gt;assign(v); }\n\tvoid assign(const Exception&amp; ex) noexcept { implementation-&gt;assign(ex); }\n\t[[noreturn]] void raise() const;\n\tISC_STATUS copyTo(ISC_STATUS* dest) const noexcept { return implementation-&gt;copyTo(dest); }\n\tvoid copyTo(IStatus* dest) const noexcept { implementation-&gt;copyTo(dest); }\n\tvoid appendTo(IStatus* dest) const noexcept { implementation-&gt;appendTo(dest); }\n\n\t// generic argument insert\n\tStatusVector&amp; operator&lt;&lt;(const Base&amp; arg) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(arg);\n\t\treturn *this;\n\t}\n\n\t// StatusVector case - append multiple args\n\tStatusVector&amp; operator&lt;&lt;(const StatusVector&amp; arg) noexcept\n\t{\n\t\timplementation-&gt;append(arg);\n\t\treturn *this;\n\t}\n\n\t// warning special case - to setup first warning location\n\tStatusVector&amp; operator&lt;&lt;(const Warning&amp; arg) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(arg);\n\t\treturn *this;\n\t}\n\n\t// Str special case - make the code simpler &amp; better readable\n\tStatusVector&amp; operator&lt;&lt;(const char* text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(text);\n\t\treturn *this;\n\t}\n\n\tStatusVector&amp; operator&lt;&lt;(const AbstractString&amp; text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(text);\n\t\treturn *this;\n\t}\n\n\tStatusVector&amp; operator&lt;&lt;(const MetaString&amp; text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(text);\n\t\treturn *this;\n\t}\n\n\tStatusVector&amp; operator&lt;&lt;(std::string_view text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(string(text.data(), static_cast&lt;string::size_type&gt;(text.length())));\n\t\treturn *this;\n\t}\n\n\tbool operator==(const StatusVector&amp; arg) const noexcept\n\t{\n\t\treturn implementation-&gt;compare(arg);\n\t}\n\n\tbool operator!=(const StatusVector&amp; arg) const noexcept\n\t{\n\t\treturn !(*this == arg);\n\t}\n};\n\n\nclass Gds : public StatusVector\n{\npublic:\n\texplicit Gds(ISC_STATUS s) noexcept;\n};\n\n// To simplify calls to DYN messages from DSQL, only for private DYN messages\n// that do not have presence in system_errors2.sql, when you have to call ENCODE_ISC_MSG.\nclass PrivateDyn : public Gds\n{\npublic:\n\texplicit PrivateDyn(ISC_STATUS codeWithoutFacility) noexcept;\n};\n\nclass Str : public Base\n{\npublic:\n\texplicit Str(const char* text) noexcept;\n\texplicit Str(const AbstractString&amp; text) noexcept;\n\texplicit Str(const MetaString&amp; text) noexcept;\n};\n\nclass Num : public Base\n{\npublic:\n\texplicit Num(ISC_STATUS s) noexcept;\n};\n\n// On 32-bit architecture ISC_STATUS can&#x27;t fit 64-bit integer therefore\n// convert such a numbers into text and put string into status-vector.\n// Make sure that temporary instance of this class is not going out of scope\n// before exception is raised !\nclass Int64 : public Str\n{\npublic:\n\texplicit Int64(SINT64 val) noexcept;\n\texplicit Int64(FB_UINT64 val) noexcept;\nprivate:\n\tchar text[24];\n};\n\nclass Quad : public Str\n{\npublic:\n\texplicit Quad(const ISC_QUAD* quad) noexcept;\nprivate:\n\t//\t\thigh  :  low  \\0\n\tchar text[8 + 1 + 8 + 1];\n};\n\nclass Interpreted : public StatusVector\n{\npublic:\n\texplicit Interpreted(const char* text) noexcept;\n\texplicit Interpreted(const AbstractString&amp; text) noexcept;\n};\n\nclass Unix : public Base\n{\npublic:\n\texplicit Unix(ISC_STATUS s) noexcept;\n};\n\nclass Mach : public Base\n{\npublic:\n\texplicit Mach(ISC_STATUS s) noexcept;\n};\n\nclass Windows : public Base\n{\npublic:\n\texplicit Windows(ISC_STATUS s) noexcept;\n};\n\nclass Warning : public StatusVector\n{\npublic:\n\texplicit Warning(ISC_STATUS s) noexcept;\n};\n\nclass SqlState : public Base\n{\npublic:\n\texplicit SqlState(const char* text) noexcept;\n\texplicit SqlState(const AbstractString&amp; text) noexcept;\n};\n\nclass OsError : public Base\n{\npublic:\n\tOsError() noexcept;\n\texplicit OsError(ISC_STATUS s) noexcept;\n};\n\n} // namespace Arg\n\n} // namespace Firebird\n\n\n#endif // FB_STATUS_ARG\n"}, "/build/src/jrd/btr.h": {"id": "/build/src/jrd/btr.h", "filePath": "src/jrd/btr.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tbtr.h\n *\tDESCRIPTION:\tIndex walking data structures\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.28 Sean Leyne - Code cleanup, removed obsolete &quot;DecOSF&quot; port\n *\n */\n\n#ifndef JRD_BTR_H\n#define JRD_BTR_H\n\n#include &quot;../jrd/constants.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../include/fb_blk.h&quot;\n\n#include &quot;../jrd/err_proto.h&quot;    // Index error types\n#include &quot;../jrd/RecordNumber.h&quot;\n#include &quot;../jrd/sbm.h&quot;\n#include &quot;../jrd/lck.h&quot;\n\nstruct dsc;\n\nnamespace Jrd {\n\nclass jrd_rel;\nclass jrd_tra;\ntemplate &lt;typename T&gt; class vec;\nclass Statement;\nstruct temporary_key;\nclass thread_db;\nclass BtrPageGCLock;\nclass Sort;\nclass PartitionedSort;\nstruct sort_key_def;\n\n// Index descriptor block -- used to hold info from index root page\n\nstruct index_desc\n{\n\tULONG\tidx_root;\t\t\t\t\t\t// Index root\n\tfloat\tidx_selectivity;\t\t\t\t// selectivity of index\n\tUSHORT\tidx_id;\n\tUSHORT\tidx_flags;\n\tUCHAR\tidx_runtime_flags;\t\t\t\t// flags used at runtime, not stored on disk\n\tUSHORT\tidx_primary_index;\t\t\t\t// id for primary key partner index\n\tUSHORT\tidx_primary_relation;\t\t\t// id for primary key partner relation\n\tUSHORT\tidx_count;\t\t\t\t\t\t// number of keys\n\tvec&lt;int&gt;*\tidx_foreign_primaries;\t\t// ids for primary/unique indexes with partners\n\tvec&lt;int&gt;*\tidx_foreign_relations;\t\t// ids for foreign key partner relations\n\tvec&lt;int&gt;*\tidx_foreign_indexes;\t\t// ids for foreign key partner indexes\n\tValueExprNode* idx_expression;\t\t\t// node tree for indexed expression\n\tdsc\t\tidx_expression_desc;\t\t\t// descriptor for expression result\n\tStatement* idx_expression_statement;\t// stored statement for expression evaluation\n\tBoolExprNode* idx_condition;\t\t\t// node tree for index condition\n\tStatement* idx_condition_statement;\t\t// stored statement for index condition\n\tfloat idx_fraction;\t\t\t\t\t\t// fraction of keys included in the index\n\t// This structure should exactly match IRTD structure for current ODS\n\tstruct idx_repeat\n\t{\n\t\tUSHORT idx_field;\t\t\t\t\t// field id\n\t\tUSHORT idx_itype;\t\t\t\t\t// data of field in index\n\t\tfloat idx_selectivity;\t\t\t\t// segment selectivity\n\t} idx_rpt[MAX_INDEX_SEGMENTS];\n};\n\ntypedef Firebird::HalfStaticArray&lt;index_desc, 16&gt; IndexDescList;\n\ninline constexpr USHORT idx_invalid = USHORT(~0);\t\t// Applies to idx_id as special value\n\n// index types and flags\n\n// See jrd/intl.h for notes on idx_itype and dsc_sub_type considerations\n// idx_numeric .. idx_byte_array values are compatible with VMS values\n\ninline constexpr int idx_numeric\t\t= 0;\ninline constexpr int idx_string\t\t\t= 1;\n// value of 2 was used in ODS &lt; 10\ninline constexpr int idx_byte_array\t\t= 3;\ninline constexpr int idx_metadata\t\t= 4;\ninline constexpr int idx_sql_date\t\t= 5;\ninline constexpr int idx_sql_time\t\t= 6;\ninline constexpr int idx_timestamp\t\t= 7;\ninline constexpr int idx_numeric2\t\t= 8;\t// Introduced for 64-bit Integer support\ninline constexpr int idx_boolean\t\t= 9;\ninline constexpr int idx_decimal\t\t= 10;\ninline constexpr int idx_sql_time_tz\t= 11;\ninline constexpr int idx_timestamp_tz\t= 12;\ninline constexpr int idx_bcd\t\t\t= 13;\t// 128-bit Integer support\n\n// idx_itype space for future expansion\ninline constexpr int idx_first_intl_string\t= 64;\t// .. MAX (short) Range of computed key strings\n\ninline constexpr int idx_offset_intl_range\t= (0x7FFF + idx_first_intl_string);\n\n// these flags must match the irt_flags (see ods.h)\n\ninline constexpr int idx_unique\t\t\t= 1;\ninline constexpr int idx_descending\t\t= 2;\ninline constexpr int idx_in_progress\t= 4;\ninline constexpr int idx_foreign\t\t= 8;\ninline constexpr int idx_primary\t\t= 16;\ninline constexpr int idx_expression\t\t= 32;\ninline constexpr int idx_condition\t\t= 64;\n\n// these flags are for idx_runtime_flags\n\ninline constexpr int idx_plan_dont_use\t= 1;\t// index is not mentioned in user-specified access plan\ninline constexpr int idx_plan_navigate\t= 2;\t// plan specifies index to be used for ordering\ninline constexpr int idx_used \t\t\t= 4;\t// index was in fact selected for retrieval\ninline constexpr int idx_navigate\t\t= 8;\t// index was in fact selected for navigation\ninline constexpr int idx_marker\t\t\t= 16;\t// marker used in procedure sort_indices\n\n// Index insertion block -- parameter block for index insertions\n\nstruct index_insertion\n{\n\tRecordNumber iib_number;\t\t// record number (or lower level page)\n\tULONG iib_sibling;\t\t\t\t// right sibling page\n\tindex_desc*\tiib_descriptor;\t\t// index descriptor\n\tjrd_rel*\tiib_relation;\t\t// relation block\n\ttemporary_key*\tiib_key;\t\t// varying string for insertion\n\tRecordBitmap* iib_duplicates;\t// spare bit map of duplicates\n\tjrd_tra*\tiib_transaction;\t// insertion transaction\n\tBtrPageGCLock*\tiib_dont_gc_lock;\t// lock to prevent removal of splitted page\n\tUCHAR\tiib_btr_level;\t\t\t// target level to propagate split page to\n};\n\n\n// these flags are for the key_flags\n\ninline constexpr int key_empty\t\t= 1;\t// Key contains empty data / empty string\n\n// Temporary key block\n\nstruct temporary_key\n{\n\tUSHORT key_length;\n\tUCHAR key_data[MAX_KEY + 1];\n\tUCHAR key_flags;\n\tUSHORT key_nulls;\t// bitmap of encountered null segments,\n\t\t\t\t\t\t// USHORT is enough to store MAX_INDEX_SEGMENTS bits\n\tFirebird::AutoPtr&lt;temporary_key&gt; key_next;\t// next key (INTL_KEY_MULTI_STARTING)\n};\n\n\n// Index Sort Record -- fix part of sort record for index fast load\n\n// hvlad: index_sort_record structure is stored in sort scratch file so we\n// don&#x27;t want to grow sort file with padding added by compiler to please\n// alignment rules.\n#pragma pack(1)\nstruct index_sort_record\n{\n\t// RecordNumber should be at the first place, because it&#x27;s used\n\t// for determing sort by creating index (see idx.cpp)\n\tSINT64 isr_record_number;\n\tUSHORT isr_key_length;\n\tUSHORT isr_flags;\n};\n#pragma pack()\n\ninline constexpr int ISR_secondary\t= 1;\t// Record is secondary version\ninline constexpr int ISR_null\t\t= 2;\t// Record consists of NULL values only\n\n\n\n// Index retrieval block -- hold stuff for index retrieval\n\nclass IndexRetrieval final\n{\npublic:\n\tIndexRetrieval(jrd_rel* relation, const index_desc* idx, USHORT count, temporary_key* key)\n\t\t: irb_relation(relation), irb_index(idx-&gt;idx_id),\n\t\t  irb_generic(0), irb_lower_count(count), irb_upper_count(count), irb_key(key),\n\t\t  irb_name(nullptr), irb_value(nullptr), irb_list(nullptr), irb_scale(nullptr)\n\t{\n\t\tmemcpy(&amp;irb_desc, idx, sizeof(irb_desc));\n\t}\n\n\tIndexRetrieval(MemoryPool&amp; pool, jrd_rel* relation, const index_desc* idx,\n\t\t\t\t   const QualifiedName&amp; name)\n\t\t: irb_relation(relation), irb_index(idx-&gt;idx_id),\n\t\t  irb_generic(0), irb_lower_count(0), irb_upper_count(0), irb_key(NULL),\n\t\t  irb_name(FB_NEW_POOL(pool) QualifiedName(name)),\n\t\t  irb_value(FB_NEW_POOL(pool) ValueExprNode*[idx-&gt;idx_count * 2]),\n\t\t  irb_list(nullptr), irb_scale(nullptr)\n\t{\n\t\tmemcpy(&amp;irb_desc, idx, sizeof(irb_desc));\n\t}\n\n\t~IndexRetrieval()\n\t{\n\t\tdelete irb_name;\n\t\tdelete[] irb_value;\n\t\tdelete[] irb_scale;\n\t}\n\n\tindex_desc irb_desc;\t\t\t// Index descriptor\n\tjrd_rel* irb_relation;\t\t\t// Relation for retrieval\n\tUSHORT irb_index;\t\t\t\t// Index id\n\tUSHORT irb_generic;\t\t\t\t// Flags for generic search\n\tUSHORT irb_lower_count;\t\t\t// Number of segments for retrieval\n\tUSHORT irb_upper_count;\t\t\t// Number of segments for retrieval\n\ttemporary_key* irb_key;\t\t\t// Key for equality retrieval\n\tQualifiedName* irb_name;\t\t// Index name\n\tValueExprNode** irb_value;\t\t// Matching value (for equality search)\n\tLookupValueList* irb_list;\t\t// Matching values list (for IN &lt;list&gt;)\n\tSSHORT* irb_scale;\t\t\t\t// Scale for int64/int128 key\n};\n\n// Flag values for irb_generic\ninline constexpr int irb_partial\t= 1;\t\t\t\t// Partial match: not all segments or starting of key only\ninline constexpr int irb_starting\t= 2;\t\t\t\t// Only compute &quot;starting with&quot; key for index segment\ninline constexpr int irb_equality\t= 4;\t\t\t\t// Probing index for equality match\ninline constexpr int irb_ignore_null_value_key  = 8;\t// if lower bound is specified and upper bound unspecified,\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t// ignore looking at null value keys\ninline constexpr int irb_descending\t= 16;\t\t\t\t// Base index uses descending order\ninline constexpr int irb_exclude_lower\t= 32;\t\t\t// exclude lower bound keys while scanning index\ninline constexpr int irb_exclude_upper\t= 64;\t\t\t// exclude upper bound keys while scanning index\ninline constexpr int irb_multi_starting\t= 128;\t\t\t// Use INTL_KEY_MULTI_STARTING\ninline constexpr int irb_root_list_scan\t= 256;\t\t\t// Locate list items from the root\ninline constexpr int irb_unique\t\t= 512;\t\t\t\t// Unique match (currently used only for plan output)\n\n// Force include flags - always include appropriate key while scanning index\ninline constexpr int irb_force_lower\t= irb_exclude_lower;\ninline constexpr int irb_force_upper\t= irb_exclude_upper;\n\ntypedef Firebird::HalfStaticArray&lt;float, 4&gt; SelectivityList;\n\nclass BtrPageGCLock : public Lock\n{\n\t// This class assumes that the static part of the lock key (Lock::lck_key)\n\t// is at least 64 bits in size\n\npublic:\n\texplicit BtrPageGCLock(thread_db* tdbb);\n\t~BtrPageGCLock();\n\n\tvoid disablePageGC(thread_db* tdbb, const PageNumber &amp;page);\n\tvoid enablePageGC(thread_db* tdbb);\n\n\t// return true if lock is active\n\tbool isActive() const\n\t{\n\t\treturn lck_id != 0;\n\t}\n\n\tstatic bool isPageGCAllowed(thread_db* tdbb, const PageNumber&amp; page);\n\n#ifdef DEBUG_LCK_LIST\n\tBtrPageGCLock(thread_db* tdbb, Firebird::MemoryPool* pool)\n\t\t: Lock(tdbb, PageNumber::getLockLen(), LCK_btr_dont_gc), m_pool(pool)\n\t{\n\t}\n\n\tstatic bool checkPool(const Lock* lock, Firebird::MemoryPool* pool)\n\t{\n\t\tif (!pool || !lock)\n\t\t\treturn false;\n\n\t\tconst Firebird::MemoryPool* pool2 = NULL;\n\n\t\tif (lock &amp;&amp; (lock-&gt;lck_type == LCK_btr_dont_gc))\n\t\t\tpool2 = reinterpret_cast&lt;const BtrPageGCLock*&gt;(lock)-&gt;m_pool;\n\n\t\treturn (pool == pool2);\n\t}\n\nprivate:\n\tconst Firebird::MemoryPool* m_pool;\n#endif\n};\n\n// Struct used for index creation\n\nstruct IndexCreation\n{\n\tjrd_rel* relation;\n\tindex_desc* index;\n\tQualifiedName index_name;\n\tjrd_tra* transaction;\n\tPartitionedSort* sort;\n\tsort_key_def* key_desc;\n\tUSHORT key_length;\n\tUSHORT nullIndLen;\n\tSINT64 dup_recno;\n\tFirebird::AtomicCounter duplicates;\n};\n\n// Class used to report any index related errors\n\nclass IndexErrorContext\n{\n\tstruct Location\n\t{\n\t\tjrd_rel* relation;\n\t\tUSHORT indexId;\n\t};\n\npublic:\n\tIndexErrorContext(jrd_rel* relation, index_desc* index, const QualifiedName&amp; indexName = {})\n\t\t: m_relation(relation), m_index(index), m_indexName(indexName)\n\t{}\n\n\tvoid setErrorLocation(jrd_rel* relation, USHORT indexId)\n\t{\n\t\tisLocationDefined = true;\n\t\tm_location.relation = relation;\n\t\tm_location.indexId = indexId;\n\t}\n\n\tvoid raise(thread_db*, idx_e, Record* = nullptr);\n\nprivate:\n\tjrd_rel* const m_relation;\n\tindex_desc* const m_index;\n\tconst QualifiedName m_indexName;\n\tLocation m_location;\n\tbool isLocationDefined = false;\n};\n\n// Helper classes to allow efficient evaluation of index conditions/expressions\n\nclass IndexCondition\n{\npublic:\n\tIndexCondition(thread_db* tdbb, index_desc* idx);\n\n\tIndexCondition(const IndexCondition&amp; other)\n\t\t: m_tdbb(other.m_tdbb), m_condition(other.m_condition), m_request(other.m_request)\n\t{}\n\n\t~IndexCondition();\n\n\tFirebird::TriState check(Record* record, idx_e* errCode = nullptr);\n\nprivate:\n\tthread_db* const m_tdbb;\n\tBoolExprNode* m_condition = nullptr;\n\tRequest* m_request = nullptr;\n\n\tbool evaluate(Record* record) const;\n};\n\nclass IndexExpression\n{\npublic:\n\tIndexExpression(thread_db* tdbb, index_desc* idx);\n\n\tIndexExpression(const IndexExpression&amp; other)\n\t\t: m_tdbb(other.m_tdbb), m_expression(other.m_expression), m_request(other.m_request)\n\t{}\n\n\t~IndexExpression();\n\n\tdsc* evaluate(Record* record) const;\n\nprivate:\n\tthread_db* const m_tdbb;\n\tValueExprNode* m_expression = nullptr;\n\tRequest* m_request = nullptr;\n};\n\ntypedef Firebird::AutoPtr&lt;IndexExpression&gt; AutoIndexExpression;\n\n// Index key wrapper\n\nclass IndexKey\n{\npublic:\n\tIndexKey(thread_db* tdbb, jrd_rel* relation, index_desc* idx)\n\t\t: m_tdbb(tdbb), m_relation(relation), m_index(idx),\n\t\t  m_keyType((idx-&gt;idx_flags &amp; idx_unique) ? INTL_KEY_UNIQUE : INTL_KEY_SORT),\n\t\t  m_segments(idx-&gt;idx_count), m_expression(m_localExpression)\n\t{\n\t\tfb_assert(m_index-&gt;idx_count);\n\t}\n\n\tIndexKey(thread_db* tdbb, jrd_rel* relation, index_desc* idx, AutoIndexExpression&amp; expr)\n\t\t: m_tdbb(tdbb), m_relation(relation), m_index(idx),\n\t\t  m_keyType((idx-&gt;idx_flags &amp; idx_unique) ? INTL_KEY_UNIQUE : INTL_KEY_SORT),\n\t\t  m_segments(idx-&gt;idx_count), m_expression(expr)\n\t{\n\t\tfb_assert(m_index-&gt;idx_count);\n\t}\n\n\tIndexKey(thread_db* tdbb, jrd_rel* relation, index_desc* idx,\n\t\t\t USHORT keyType, USHORT segments)\n\t\t: m_tdbb(tdbb), m_relation(relation), m_index(idx),\n\t\t  m_keyType(keyType), m_segments(segments), m_expression(m_localExpression)\n\t{\n\t\tfb_assert(m_index-&gt;idx_count &amp;&amp; m_segments &amp;&amp; m_segments &lt;= m_index-&gt;idx_count);\n\t}\n\n\tIndexKey(thread_db* tdbb, jrd_rel* relation, index_desc* idx,\n\t\t\t USHORT keyType, USHORT segments, AutoIndexExpression&amp; expr)\n\t\t: m_tdbb(tdbb), m_relation(relation), m_index(idx),\n\t\t  m_keyType(keyType), m_segments(segments), m_expression(expr)\n\t{\n\t\tfb_assert(m_index-&gt;idx_count &amp;&amp; m_segments &amp;&amp; m_segments &lt;= m_index-&gt;idx_count);\n\t}\n\n\tIndexKey(const IndexKey&amp; other)\n\t\t: m_tdbb(other.m_tdbb), m_relation(other.m_relation), m_index(other.m_index),\n\t\t  m_keyType(other.m_keyType), m_segments(other.m_segments), m_expression(other.m_expression)\n\t{\n\t}\n\n\tidx_e compose(Record* record);\n\n\toperator temporary_key*()\n\t{\n\t\treturn &amp;m_key;\n\t}\n\n\ttemporary_key* operator-&gt;()\n\t{\n\t\treturn &amp;m_key;\n\t}\n\n\tbool operator==(const IndexKey&amp; other) const\n\t{\n\t\tif (m_key.key_length != other.m_key.key_length)\n\t\t\treturn false;\n\n\t\treturn !memcmp(m_key.key_data, other.m_key.key_data, m_key.key_length);\n\t}\n\n\tbool operator!=(const IndexKey&amp; other) const\n\t{\n\t\tif (m_key.key_length != other.m_key.key_length)\n\t\t\treturn true;\n\n\t\treturn memcmp(m_key.key_data, other.m_key.key_data, m_key.key_length);\n\t}\n\n\t// Return ordinal number of the first NULL segment\n\tUSHORT getNullSegment() const\n\t{\n\t\tUSHORT nulls = m_key.key_nulls;\n\n\t\tfor (USHORT i = 0; nulls; i++)\n\t\t{\n\t\t\tif (nulls &amp; 1)\n\t\t\t\treturn i;\n\n\t\t\tnulls &gt;&gt;= 1;\n\t\t}\n\n\t\treturn MAX_USHORT;\n\t}\n\nprivate:\n\tthread_db* const m_tdbb;\n\tjrd_rel* const m_relation;\n\tindex_desc* const m_index;\n\tc
