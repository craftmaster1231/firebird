cordSourceStopWatcher(thread_db* tdbb, const RecordSource* recordSource, Event aEvent)\n\t\t\t: RecordSourceStopWatcher(tdbb, tdbb-&gt;getAttachment()-&gt;getActiveProfilerManagerForNonInternalStatement(tdbb),\n\t\t\t\trecordSource, aEvent)\n\t\t{\n\t\t}\n\n\t\tRecordSourceStopWatcher(thread_db* tdbb, ProfilerManager* aProfilerManager,\n\t\t\t\t\tconst AccessPath* recordSource, Event aEvent)\n\t\t\t: request(tdbb-&gt;getRequest()),\n\t\t\t  profilerManager(aProfilerManager),\n\t\t\t  recordSource(recordSource),\n\t\t\t  event(aEvent)\n\t\t{\n\t\t\tif (profilerManager)\n\t\t\t{\n\t\t\t\tlastTicks = profilerManager-&gt;queryTicks();\n\n\t\t\t\tif (profilerManager-&gt;currentSession-&gt;flags &amp; Firebird::IProfilerSession::FLAG_BEFORE_EVENTS)\n\t\t\t\t{\n\t\t\t\t\tif (event == Event::OPEN)\n\t\t\t\t\t\tprofilerManager-&gt;beforeRecordSourceOpen(request, recordSource);\n\t\t\t\t\telse\n\t\t\t\t\t\tprofilerManager-&gt;beforeRecordSourceGetRecord(request, recordSource);\n\t\t\t\t}\n\n\t\t\t\tlastAccumulatedOverhead = profilerManager-&gt;getAccumulatedOverhead();\n\t\t\t}\n\t\t}\n\n\t\t~RecordSourceStopWatcher()\n\t\t{\n\t\t\tif (profilerManager)\n\t\t\t{\n\t\t\t\tconst SINT64 currentTicks = profilerManager-&gt;queryTicks();\n\t\t\t\tconst SINT64 elapsedTicks = profilerManager-&gt;getElapsedTicksAndAdjustOverhead(\n\t\t\t\t\tcurrentTicks, lastTicks, lastAccumulatedOverhead);\n\t\t\t\tStats stats(elapsedTicks);\n\n\t\t\t\tif (event == Event::OPEN)\n\t\t\t\t\tprofilerManager-&gt;afterRecordSourceOpen(request, recordSource, stats);\n\t\t\t\telse\n\t\t\t\t\tprofilerManager-&gt;afterRecordSourceGetRecord(request, recordSource, stats);\n\t\t\t}\n\t\t}\n\n\tprivate:\n\t\tRequest* request;\n\t\tProfilerManager* profilerManager;\n\t\tconst AccessPath* recordSource;\n\t\tSINT64 lastTicks;\n\t\tSINT64 lastAccumulatedOverhead;\n\t\tEvent event;\n\t};\n\nprivate:\n\tclass Statement final\n\t{\n\tpublic:\n\t\tStatement(MemoryPool&amp; pool)\n\t\t\t: cursorNextSequence(pool),\n\t\t\t  definedCursors(pool),\n\t\t\t  recSourceSequence(pool)\n\t\t{\n\t\t}\n\n\t\tStatement(const Statement&amp;) = delete;\n\t\tvoid operator=(const Statement&amp;) = delete;\n\n\t\tSINT64 id = 0;\n\t\tFirebird::NonPooledMap&lt;ULONG, ULONG&gt; cursorNextSequence;\n\t\tFirebird::SortedArray&lt;ULONG&gt; definedCursors;\n\t\tFirebird::NonPooledMap&lt;ULONG, ULONG&gt; recSourceSequence;\n\t};\n\n\tclass Session final\n\t{\n\tpublic:\n\t\tSession(MemoryPool&amp; pool)\n\t\t\t: statements(pool),\n\t\t\t  requests(pool)\n\t\t{\n\t\t}\n\n\t\tSession(const Session&amp;) = delete;\n\t\tvoid operator=(const Session&amp;) = delete;\n\n\t\tFirebird::AutoPlugin&lt;Firebird::IProfilerPlugin&gt; plugin;\n\t\tFirebird::AutoDispose&lt;Firebird::IProfilerSession&gt; pluginSession;\n\t\tFirebird::RightPooledMap&lt;StmtNumber, Statement&gt; statements;\n\t\tFirebird::SortedArray&lt;StmtNumber&gt; requests;\n\t\tunsigned flags = 0;\n\t};\n\nprivate:\n\tProfilerManager(thread_db* tdbb);\n\npublic:\n\t~ProfilerManager();\n\npublic:\n\tstatic ProfilerManager* create(thread_db* tdbb);\n\n\tstatic int blockingAst(void* astObject);\n\n\tProfilerManager(const ProfilerManager&amp;) = delete;\n\tvoid operator=(const ProfilerManager&amp;) = delete;\n\npublic:\n\tSINT64 startSession(thread_db* tdbb, std::optional&lt;SLONG&gt; flushInterval,\n\t\tconst Firebird::PathName&amp; pluginName, const Firebird::string&amp; description, const Firebird::string&amp; options);\n\n\tvoid prepareCursor(thread_db* tdbb, Request* request, const Select* select);\n\tvoid onRequestFinish(Request* request, Stats&amp; stats);\n\n\tvoid beforePsqlLineColumn(Request* request, ULONG line, ULONG column)\n\t{\n\t\tif (const auto profileRequestId = getRequest(request, Firebird::IProfilerSession::FLAG_BEFORE_EVENTS))\n\t\t{\n\t\t\tconst auto profileStatement = getStatement(request);\n\t\t\tcurrentSession-&gt;pluginSession-&gt;beforePsqlLineColumn(profileStatement-&gt;id, profileRequestId, line, column);\n\t\t}\n\t}\n\n\tvoid afterPsqlLineColumn(Request* request, ULONG line, ULONG column, Stats&amp; stats)\n\t{\n\t\tif (const auto profileRequestId = getRequest(request, Firebird::IProfilerSession::FLAG_AFTER_EVENTS))\n\t\t{\n\t\t\tconst auto profileStatement = getStatement(request);\n\t\t\tcurrentSession-&gt;pluginSession-&gt;afterPsqlLineColumn(profileStatement-&gt;id, profileRequestId,\n\t\t\t\tline, column, &amp;stats);\n\t\t}\n\t}\n\n\tvoid beforeRecordSourceOpen(Request* request, const AccessPath* recordSource)\n\t{\n\t\tif (const auto profileRequestId = getRequest(request, Firebird::IProfilerSession::FLAG_BEFORE_EVENTS))\n\t\t{\n\t\t\tconst auto profileStatement = getStatement(request);\n\n\t\t\tif (const auto sequencePtr = profileStatement-&gt;recSourceSequence.get(recordSource-&gt;getRecSourceId()))\n\t\t\t{\n\t\t\t\tcurrentSession-&gt;pluginSession-&gt;beforeRecordSourceOpen(\n\t\t\t\t\tprofileStatement-&gt;id, profileRequestId, recordSource-&gt;getCursorId(), *sequencePtr);\n\t\t\t}\n\t\t}\n\t}\n\n\tvoid afterRecordSourceOpen(Request* request, const AccessPath* recordSource, Stats&amp; stats)\n\t{\n\t\tif (const auto profileRequestId = getRequest(request, Firebird::IProfilerSession::FLAG_AFTER_EVENTS))\n\t\t{\n\t\t\tconst auto profileStatement = getStatement(request);\n\n\t\t\tif (const auto sequencePtr = profileStatement-&gt;recSourceSequence.get(recordSource-&gt;getRecSourceId()))\n\t\t\t{\n\t\t\t\tcurrentSession-&gt;pluginSession-&gt;afterRecordSourceOpen(\n\t\t\t\t\tprofileStatement-&gt;id, profileRequestId, recordSource-&gt;getCursorId(), *sequencePtr, &amp;stats);\n\t\t\t}\n\t\t}\n\t}\n\n\tvoid beforeRecordSourceGetRecord(Request* request, const AccessPath* recordSource)\n\t{\n\t\tif (const auto profileRequestId = getRequest(request, Firebird::IProfilerSession::FLAG_BEFORE_EVENTS))\n\t\t{\n\t\t\tconst auto profileStatement = getStatement(request);\n\n\t\t\tif (const auto sequencePtr = profileStatement-&gt;recSourceSequence.get(recordSource-&gt;getRecSourceId()))\n\t\t\t{\n\t\t\t\tcurrentSession-&gt;pluginSession-&gt;beforeRecordSourceGetRecord(\n\t\t\t\t\tprofileStatement-&gt;id, profileRequestId, recordSource-&gt;getCursorId(), *sequencePtr);\n\t\t\t}\n\t\t}\n\t}\n\n\tvoid afterRecordSourceGetRecord(Request* request, const AccessPath* recordSource, Stats&amp; stats)\n\t{\n\t\tif (const auto profileRequestId = getRequest(request, Firebird::IProfilerSession::FLAG_AFTER_EVENTS))\n\t\t{\n\t\t\tconst auto profileStatement = getStatement(request);\n\n\t\t\tif (const auto sequencePtr = profileStatement-&gt;recSourceSequence.get(recordSource-&gt;getRecSourceId()))\n\t\t\t{\n\t\t\t\tcurrentSession-&gt;pluginSession-&gt;afterRecordSourceGetRecord(\n\t\t\t\t\tprofileStatement-&gt;id, profileRequestId, recordSource-&gt;getCursorId(), *sequencePtr, &amp;stats);\n\t\t\t}\n\t\t}\n\t}\n\n\tbool isActive() const\n\t{\n\t\treturn currentSession &amp;&amp; !paused;\n\t}\n\n\tbool haveListener() const\n\t{\n\t\treturn listener.hasData();\n\t}\n\n\tstatic void checkFlushInterval(SLONG interval)\n\t{\n\t\tif (interval &lt; 0)\n\t\t{\n\t\t\tFirebird::status_exception::raise(\n\t\t\t\tFirebird::Arg::Gds(isc_not_valid_for_var) &lt;&lt;\n\t\t\t\t&quot;\\&quot;FLUSH_INTERVAL\\&quot;&quot; &lt;&lt;\n\t\t\t\tFirebird::Arg::Num(interval));\n\t\t}\n\t}\n\nprivate:\n\tvoid prepareRecSource(thread_db* tdbb, Request* request, const AccessPath* recordSource);\n\n\tvoid cancelSession();\n\tvoid finishSession(thread_db* tdbb, bool flushData);\n\tvoid pauseSession(bool flushData);\n\tvoid resumeSession();\n\tvoid setFlushInterval(SLONG interval);\n\tvoid discard();\n\tvoid flush(bool updateTimer = true);\n\n\tvoid updateFlushTimer(bool canStopTimer = true);\n\n\tStatement* getStatement(Request* request);\n\n\tSINT64 getRequest(Request* request, unsigned flags)\n\t{\n\t\tusing namespace Firebird;\n\n\t\tif (!isActive() || (flags &amp;&amp; !(currentSession-&gt;flags &amp; flags)))\n\t\t\treturn 0;\n\n\t\tconst auto mainRequestId = request-&gt;getRequestId();\n\n\t\tif (!currentSession-&gt;requests.exist(mainRequestId))\n\t\t{\n\t\t\tconst auto timestamp = TimeZoneUtil::getCurrentTimeStamp(request-&gt;req_attachment-&gt;att_current_timezone);\n\n\t\t\tdo\n\t\t\t{\n\t\t\t\tgetStatement(request);  // define the statement and ignore the result\n\n\t\t\t\tconst StmtNumber callerStatementId = request-&gt;req_caller ?\n\t\t\t\t\trequest-&gt;req_caller-&gt;getStatement()-&gt;getStatementId() : 0;\n\t\t\t\tconst StmtNumber callerRequestId = request-&gt;req_caller ? request-&gt;req_caller-&gt;getRequestId() : 0;\n\n\t\t\t\tLogLocalStatus status(&quot;Profiler onRequestStart&quot;);\n\t\t\t\tcurrentSession-&gt;pluginSession-&gt;onRequestStart(&amp;status,\n\t\t\t\t\t(SINT64) request-&gt;getStatement()-&gt;getStatementId(), (SINT64) request-&gt;getRequestId(),\n\t\t\t\t\t(SINT64) callerStatementId, (SINT64) callerRequestId, timestamp);\n\n\t\t\t\tcurrentSession-&gt;requests.add(request-&gt;getRequestId());\n\n\t\t\t\trequest = request-&gt;req_caller;\n\t\t\t} while (request &amp;&amp; !currentSession-&gt;requests.exist(request-&gt;getRequestId()));\n\t\t}\n\n\t\treturn mainRequestId;\n\t}\n\nprivate:\n\tFirebird::AutoPtr&lt;ProfilerListener&gt; listener;\n\tFirebird::LeftPooledMap&lt;Firebird::PathName, Firebird::AutoPlugin&lt;Firebird::IProfilerPlugin&gt;&gt; activePlugins;\n\tFirebird::AutoPtr&lt;Session&gt; currentSession;\n\tFirebird::RefPtr&lt;Firebird::TimerImpl&gt; flushTimer;\n\tunsigned currentFlushInterval = 0;\n\tbool paused = false;\n};\n\n\nclass ProfilerPackage final : public SystemPackage\n{\n\tfriend class ProfilerListener;\n\tfriend class ProfilerManager;\n\npublic:\n\tProfilerPackage(Firebird::MemoryPool&amp; pool);\n\n\tProfilerPackage(const ProfilerPackage&amp;) = delete;\n\tProfilerPackage&amp; operator=(const ProfilerPackage&amp;) = delete;\n\nprivate:\n\tFB_MESSAGE(AttachmentIdMessage, Firebird::ThrowStatusExceptionWrapper,\n\t\t(FB_BIGINT, attachmentId)\n\t);\n\n\t//----------\n\n\tusing DiscardInput = AttachmentIdMessage;\n\n\tstatic Firebird::IExternalResultSet* discardProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const DiscardInput::Type* in, void* out);\n\n\t//----------\n\n\tusing FlushInput = AttachmentIdMessage;\n\n\tstatic Firebird::IExternalResultSet* flushProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const FlushInput::Type* in, void* out);\n\n\t//----------\n\n\tusing CancelSessionInput = AttachmentIdMessage;\n\n\tstatic Firebird::IExternalResultSet* cancelSessionProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const CancelSessionInput::Type* in, void* out);\n\n\t//----------\n\n\tFB_MESSAGE(FinishSessionInput, Firebird::ThrowStatusExceptionWrapper,\n\t\t(FB_BOOLEAN, flush)\n\t\t(FB_BIGINT, attachmentId)\n\t);\n\n\tstatic Firebird::IExternalResultSet* finishSessionProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const FinishSessionInput::Type* in, void* out);\n\n\t//----------\n\n\tFB_MESSAGE(PauseSessionInput, Firebird::ThrowStatusExceptionWrapper,\n\t\t(FB_BOOLEAN, flush)\n\t\t(FB_BIGINT, attachmentId)\n\t);\n\n\tstatic Firebird::IExternalResultSet* pauseSessionProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const PauseSessionInput::Type* in, void* out);\n\n\t//----------\n\n\tusing ResumeSessionInput = AttachmentIdMessage;\n\n\tstatic Firebird::IExternalResultSet* resumeSessionProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const ResumeSessionInput::Type* in, void* out);\n\n\t//----------\n\n\tFB_MESSAGE(SetFlushIntervalInput, Firebird::ThrowStatusExceptionWrapper,\n\t\t(FB_INTEGER, flushInterval)\n\t\t(FB_BIGINT, attachmentId)\n\t);\n\n\tstatic Firebird::IExternalResultSet* setFlushIntervalProcedure(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const SetFlushIntervalInput::Type* in, void* out);\n\n\t//----------\n\n\tFB_MESSAGE(StartSessionInput, Firebird::ThrowStatusExceptionWrapper,\n\t\t(FB_INTL_VARCHAR(255 * METADATA_BYTES_PER_CHAR, CS_METADATA), description)\n\t\t(FB_INTEGER, flushInterval)\n\t\t(FB_BIGINT, attachmentId)\n\t\t(FB_INTL_VARCHAR(255 * METADATA_BYTES_PER_CHAR, CS_METADATA), pluginName)\n\t\t(FB_INTL_VARCHAR(255 * METADATA_BYTES_PER_CHAR, CS_METADATA), pluginOptions)\n\t);\n\n\tFB_MESSAGE(StartSessionOutput, Firebird::ThrowStatusExceptionWrapper,\n\t\t(FB_BIGINT, sessionId)\n\t);\n\n\tstatic void startSessionFunction(Firebird::ThrowStatusExceptionWrapper* status,\n\t\tFirebird::IExternalContext* context, const StartSessionInput::Type* in, StartSessionOutput::Type* out);\n};\n\n\n}\t// namespace\n\n#endif\t// JRD_PROFILER_MANAGER_H\n"}, "/build/src/jrd/recsrc/NestedLoopJoin.cpp": {"id": "/build/src/jrd/recsrc/NestedLoopJoin.cpp", "filePath": "src/jrd/recsrc/NestedLoopJoin.cpp", "content": "/*\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/req.h&quot;\n#include &quot;../jrd/cmp_proto.h&quot;\n#include &quot;../jrd/evl_proto.h&quot;\n#include &quot;../jrd/met_proto.h&quot;\n#include &quot;../jrd/vio_proto.h&quot;\n#include &quot;../jrd/optimizer/Optimizer.h&quot;\n\n#include &quot;RecordSource.h&quot;\n\nusing namespace Firebird;\nusing namespace Jrd;\n\n// ------------------------------\n// Data access: nested loops join\n// ------------------------------\n\nNestedLoopJoin::NestedLoopJoin(CompilerScratch* csb, JoinType joinType,\n\t\t\t\t\t\t\t   FB_SIZE_T count, RecordSource* const* args)\n\t: Join(csb, count, joinType)\n{\n\tm_impure = csb-&gt;allocImpure&lt;Impure&gt;();\n\tm_cardinality = MINIMUM_CARDINALITY;\n\n\tfor (FB_SIZE_T i = 0; i &lt; count; i++)\n\t{\n\t\tm_args.add(args[i]);\n\t\tm_cardinality *= args[i]-&gt;getCardinality();\n\t}\n}\n\nNestedLoopJoin::NestedLoopJoin(CompilerScratch* csb,\n\t\t\t\t\t\t\t   RecordSource* outer, RecordSource* inner,\n\t\t\t\t\t\t\t   BoolExprNode* boolean)\n\t: Join(csb, 2, JoinType::OUTER, boolean)\n{\n\tfb_assert(outer &amp;&amp; inner);\n\n\tm_impure = csb-&gt;allocImpure&lt;Impure&gt;();\n\tm_cardinality = outer-&gt;getCardinality() * inner-&gt;getCardinality();\n\n\tm_args.add(outer);\n\tm_args.add(inner);\n}\n\nvoid NestedLoopJoin::internalOpen(thread_db* tdbb) const\n{\n\tRequest* const request = tdbb-&gt;getRequest();\n\tImpure* const impure = request-&gt;getImpure&lt;Impure&gt;(m_impure);\n\n\timpure-&gt;irsb_flags = irsb_open | irsb_first | irsb_mustread;\n}\n\nvoid NestedLoopJoin::close(thread_db* tdbb) const\n{\n\tRequest* const request = tdbb-&gt;getRequest();\n\n\tinvalidateRecords(request);\n\n\tImpure* const impure = request-&gt;getImpure&lt;Impure&gt;(m_impure);\n\n\tif (impure-&gt;irsb_flags &amp; irsb_open)\n\t{\n\t\timpure-&gt;irsb_flags &amp;= ~irsb_open;\n\n\t\tJoin::close(tdbb);\n\t}\n}\n\nbool NestedLoopJoin::internalGetRecord(thread_db* tdbb) const\n{\n\tJRD_reschedule(tdbb);\n\n\tRequest* const request = tdbb-&gt;getRequest();\n\tImpure* const impure = request-&gt;getImpure&lt;Impure&gt;(m_impure);\n\n\tif (!(impure-&gt;irsb_flags &amp; irsb_open))\n\t\treturn false;\n\n\tif (m_joinType == JoinType::INNER)\n\t{\n\t\tif (impure-&gt;irsb_flags &amp; irsb_first)\n\t\t{\n\t\t\tfor (FB_SIZE_T i = 0; i &lt; m_args.getCount(); i++)\n\t\t\t{\n\t\t\t\tm_args[i]-&gt;open(tdbb);\n\n\t\t\t\tif (!fetchRecord(tdbb, i))\n\t\t\t\t\treturn false;\n\t\t\t}\n\n\t\t\timpure-&gt;irsb_flags &amp;= ~irsb_first;\n\t\t}\n\t\t// hvlad: self referenced members are removed from recursive SELECT&#x27;s\n\t\t// in recursive CTE (it is done in dsql\\pass1.cpp). If there are no other\n\t\t// members in such SELECT then rsb_count will be zero. Handle it.\n\t\telse if (m_args.isEmpty())\n\t\t\treturn false;\n\t\telse if (!fetchRecord(tdbb, m_args.getCount() - 1))\n\t\t\treturn false;\n\t}\n\telse if (m_joinType == JoinType::SEMI || m_joinType == JoinType::ANTI)\n\t{\n\t\tconst auto outer = m_args[0];\n\n\t\tif (impure-&gt;irsb_flags &amp; irsb_first)\n\t\t{\n\t\t\touter-&gt;open(tdbb);\n\n\t\t\timpure-&gt;irsb_flags &amp;= ~irsb_first;\n\t\t}\n\n\t\twhile (true)\n\t\t{\n\t\t\tif (impure-&gt;irsb_flags &amp; irsb_joined)\n\t\t\t{\n\t\t\t\tfor (FB_SIZE_T i = 1; i &lt; m_args.getCount(); i++)\n\t\t\t\t\tm_args[i]-&gt;close(tdbb);\n\n\t\t\t\timpure-&gt;irsb_flags &amp;= ~irsb_joined;\n\t\t\t}\n\n\t\t\tif (!outer-&gt;getRecord(tdbb))\n\t\t\t\treturn false;\n\n\t\t\tFB_SIZE_T stopArg = 0;\n\n\t\t\tfor (FB_SIZE_T i = 1; i &lt; m_args.getCount(); i++)\n\t\t\t{\n\t\t\t\tm_args[i]-&gt;open(tdbb);\n\n\t\t\t\tif (m_args[i]-&gt;getRecord(tdbb))\n\t\t\t\t{\n\t\t\t\t\tif (m_joinType == JoinType::ANTI)\n\t\t\t\t\t{\n\t\t\t\t\t\tstopArg = i;\n\t\t\t\t\t\tbreak;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tif (m_joinType == JoinType::SEMI)\n\t\t\t\t\t{\n\t\t\t\t\t\tstopArg = i;\n\t\t\t\t\t\tbreak;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (!stopArg)\n\t\t\t\tbreak;\n\n\t\t\tfor (FB_SIZE_T i = 1; i &lt;= stopArg; i++)\n\t\t\t\tm_args[i]-&gt;close(tdbb);\n\t\t}\n\n\t\timpure-&gt;irsb_flags |= irsb_joined;\n\t}\n\telse\n\t{\n\t\tfb_assert(m_joinType == JoinType::OUTER);\n\t\tfb_assert(m_args.getCount() == 2);\n\n\t\tconst auto outer = m_args[0];\n\t\tconst auto inner = m_args[1];\n\n\t\tif (impure-&gt;irsb_flags &amp; irsb_first)\n\t\t{\n\t\t\touter-&gt;open(tdbb);\n\t\t\timpure-&gt;irsb_flags &amp;= ~irsb_first;\n\t\t}\n\n\t\twhile (true)\n\t\t{\n\t\t\tif (impure-&gt;irsb_flags &amp; irsb_mustread)\n\t\t\t{\n\t\t\t\tif (!outer-&gt;getRecord(tdbb))\n\t\t\t\t\treturn false;\n\n\t\t\t\tif (m_boolean &amp;&amp; !m_boolean-&gt;execute(tdbb, request))\n\t\t\t\t{\n\t\t\t\t\t// The boolean pertaining to the left sub-stream is false\n\t\t\t\t\t// so just join sub-stream to a null valued right sub-stream\n\t\t\t\t\tinner-&gt;nullRecords(tdbb);\n\t\t\t\t\treturn true;\n\t\t\t\t}\n\n\t\t\t\timpure-&gt;irsb_flags &amp;= ~(irsb_mustread | irsb_joined);\n\t\t\t\tinner-&gt;open(tdbb);\n\t\t\t}\n\n\t\t\tif (inner-&gt;getRecord(tdbb))\n\t\t\t{\n\t\t\t\timpure-&gt;irsb_flags |= irsb_joined;\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\tinner-&gt;close(tdbb);\n\t\t\timpure-&gt;irsb_flags |= irsb_mustread;\n\n\t\t\tif (!(impure-&gt;irsb_flags &amp; irsb_joined))\n\t\t\t{\n\t\t\t\t// The current left sub-stream record has not been joined to anything.\n\t\t\t\t// Join it to a null valued right sub-stream.\n\t\t\t\tinner-&gt;nullRecords(tdbb);\n\t\t\t\treturn true;\n\t\t\t}\n\t\t}\n\t}\n\n\treturn true;\n}\n\nvoid NestedLoopJoin::getLegacyPlan(thread_db* tdbb, string&amp; plan, unsigned level) const\n{\n\tif (m_args.hasData())\n\t{\n\t\tlevel++;\n\t\tplan += &quot;JOIN (&quot;;\n\t\tJoin::getLegacyPlan(tdbb, plan, level);\n\t\tplan += &quot;)&quot;;\n\t}\n}\n\nvoid NestedLoopJoin::internalGetPlan(thread_db* tdbb, PlanEntry&amp; planEntry, unsigned level, bool recurse) const\n{\n\tplanEntry.className = &quot;NestedLoopJoin&quot;;\n\n\tplanEntry.lines.add().text = &quot;Nested Loop Join &quot; + printType();\n\tprintOptInfo(planEntry.lines);\n\n\tJoin::internalGetPlan(tdbb, planEntry, level, recurse);\n}\n\nbool NestedLoopJoin::fetchRecord(thread_db* tdbb, FB_SIZE_T n) const\n{\n\tfb_assert(m_joinType == JoinType::INNER);\n\n\tconst RecordSource* const arg = m_args[n];\n\n\tif (arg-&gt;getRecord(tdbb))\n\t\treturn true;\n\n\t// We have exhausted this stream, so close it; if there is\n\t// another candidate record from the n-1 streams to the left,\n\t// then reopen the stream and start again from the beginning.\n\n\twhile (true)\n\t{\n\t\targ-&gt;close(tdbb);\n\n\t\tif (n == 0 || !fetchRecord(tdbb, n - 1))\n\t\t\treturn false;\n\n\t\targ-&gt;open(tdbb);\n\n\t\tif (arg-&gt;getRecord(tdbb))\n\t\t\treturn true;\n\t}\n}\n"}, "/build/src/jrd/recsrc/RecordSource.cpp": {"id": "/build/src/jrd/recsrc/RecordSource.cpp", "filePath": "src/jrd/recsrc/RecordSource.cpp", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Dmitry Yemanov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2009 Dmitry Yemanov &lt;dimitr@firebirdsql.org&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/btr.h&quot;\n#include &quot;../jrd/intl.h&quot;\n#include &quot;../jrd/req.h&quot;\n#include &quot;../jrd/ProfilerManager.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/cmp_proto.h&quot;\n#include &quot;../jrd/dpm_proto.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/intl_proto.h&quot;\n#include &quot;../jrd/met_proto.h&quot;\n#include &quot;../jrd/rlck_proto.h&quot;\n#include &quot;../jrd/vio_proto.h&quot;\n#include &quot;../jrd/DataTypeUtil.h&quot;\n\n#include &quot;RecordSource.h&quot;\n\nusing namespace Firebird;\nusing namespace Jrd;\n\n// Disabled so far, should be uncommented for debugging/testing\n//#define PRINT_OPT_INFO\t// print optimizer info (cardinality, cost) in plans\n\n\n// AccessPath class\n// -------------------\n\nAccessPath::AccessPath(CompilerScratch* csb)\n\t: m_cursorId(csb-&gt;csb_currentCursorId),\n\t  m_recSourceId(csb-&gt;csb_nextRecSourceId++)\n{\n}\n\nvoid AccessPath::getPlan(thread_db* tdbb, PlanEntry&amp; planEntry, unsigned level, bool recurse) const\n{\n\tplanEntry.accessPath = this;\n\tplanEntry.level = level;\n\n\tinternalGetPlan(tdbb, planEntry, level, recurse);\n}\n\n\n// PlanEntry class\n// -------------------\n\nvoid PlanEntry::getDescriptionAsString(string&amp; str, bool initialIndentation) const\n{\n\tconst auto indentLevel = initialIndentation ? level : 0;\n\tbool firstLine = true;\n\n\tfor (const auto&amp; line : lines)\n\t{\n\t\tconst string indent((indentLevel + line.level) * 4, &#x27; &#x27;);\n\n\t\tif (initialIndentation || !firstLine)\n\t\t\tstr += &quot;\\n&quot; + indent;\n\n\t\tif (level)\n\t\t\tstr += &quot;-&gt; &quot;;\n\n\t\tstr += line.text;\n\n\t\tfirstLine = false;\n\t}\n}\n\nvoid PlanEntry::asFlatList(Array&lt;NonPooledPair&lt;const PlanEntry*, const PlanEntry*&gt;&gt;&amp; list) const\n{\n\tlist.clear();\n\tlist.add({this, nullptr});\n\n\tfor (unsigned pos = 0; pos &lt; list.getCount(); ++pos)\n\t{\n\t\tconst auto thisEntry = list[pos].first;\n\t\tunsigned childPos = pos;\n\n\t\tfor (const auto&amp; child : thisEntry-&gt;children)\n\t\t\tlist.insert(++childPos, {&amp;child, thisEntry});\n\t}\n}\n\nvoid PlanEntry::asString(string&amp; str) const\n{\n\tArray&lt;NonPooledPair&lt;const PlanEntry*, const PlanEntry*&gt;&gt; list;\n\tasFlatList(list);\n\n\tfor (const auto&amp; pair : list)\n\t\tpair.first-&gt;getDescriptionAsString(str, true);\n}\n\n\n// Record source class\n// -------------------\n\nRecordSource::RecordSource(CompilerScratch* csb)\n\t: AccessPath(csb)\n{\n}\n\nvoid RecordSource::open(thread_db* tdbb) const\n{\n\tProfilerManager::RecordSourceStopWatcher profilerRecordSourceStopWatcher(tdbb, this,\n\t\tProfilerManager::RecordSourceStopWatcher::Event::OPEN);\n\n\tinternalOpen(tdbb);\n}\n\nbool RecordSource::getRecord(thread_db* tdbb) const\n{\n\tProfilerManager::RecordSourceStopWatcher profilerRecordSourceStopWatcher(tdbb, this,\n\t\tProfilerManager::RecordSourceStopWatcher::Event::GET_RECORD);\n\n\treturn internalGetRecord(tdbb);\n}\n\nstring RecordSource::printName(thread_db* tdbb, const string&amp; name, const string&amp; alias)\n{\n\tif (alias.isEmpty() || name == alias)\n\t\treturn name;\n\n\tstring result;\n\tresult.printf(&quot;%s as %s&quot;, name.c_str(), alias.c_str());\n\treturn result;\n}\n\nvoid RecordSource::printInversion(thread_db* tdbb, const InversionNode* inversion,\n\tObjectsArray&lt;PlanEntry::Line&gt;&amp; planLines, bool detailed, unsigned level, bool navigation)\n{\n\tauto plan = &amp;planLines.add();\n\tplan-&gt;level = level;\n\n\tswitch (inversion-&gt;type)\n\t{\n\tcase InversionNode::TYPE_AND:\n\t\tif (detailed)\n\t\t\tplan-&gt;text = &quot;Bitmap And&quot;;\n\t\tprintInversion(tdbb, inversion-&gt;node1, planLines, detailed, level + 1, false);\n\t\tprintInversion(tdbb, inversion-&gt;node2, planLines, detailed, level + 1, false);\n\t\tbreak;\n\n\tcase InversionNode::TYPE_OR:\n\tcase InversionNode::TYPE_IN:\n\t\tif (detailed)\n\t\t\tplan-&gt;text = &quot;Bitmap Or&quot;;\n\t\tprintInversion(tdbb, inversion-&gt;node1, planLines, detailed, level + 1, false);\n\t\tprintInversion(tdbb, inversion-&gt;node2, planLines, detailed, level + 1, false);\n\t\tbreak;\n\n\tcase InversionNode::TYPE_DBKEY:\n\t\tif (detailed)\n\t\t\tplan-&gt;text = &quot;DBKEY&quot;;\n\t\tbreak;\n\n\tcase InversionNode::TYPE_INDEX:\n\t\t{\n\t\t\tconst IndexRetrieval* const retrieval = inversion-&gt;retrieval;\n\n\t\t\tQualifiedName indexName;\n\t\t\tif (retrieval-&gt;irb_name &amp;&amp; retrieval-&gt;irb_name-&gt;object.hasData())\n\t\t\t\tindexName = *retrieval-&gt;irb_name;\n\t\t\telse\n\t\t\t\tindexName.object.printf(&quot;&lt;index id %d&gt;&quot;, retrieval-&gt;irb_index + 1);\n\n\t\t\tif (detailed)\n\t\t\t{\n\t\t\t\tif (!navigation)\n\t\t\t\t{\n\t\t\t\t\tplan-&gt;text = &quot;Bitmap&quot;;\n\t\t\t\t\tplan = &amp;planLines.add();\n\t\t\t\t\tplan-&gt;level = level + 1;\n\t\t\t\t}\n\n\t\t\t\tconst index_desc&amp; idx = retrieval-&gt;irb_desc;\n\t\t\t\tconst USHORT segCount = idx.idx_count;\n\n\t\t\t\tconst USHORT minSegs = MIN(retrieval-&gt;irb_lower_count, retrieval-&gt;irb_upper_count);\n\t\t\t\tconst USHORT maxSegs = MAX(retrieval-&gt;irb_lower_count, retrieval-&gt;irb_upper_count);\n\n\t\t\t\tconst bool equality = (retrieval-&gt;irb_generic &amp; irb_equality);\n\t\t\t\tconst bool unique = (retrieval-&gt;irb_generic &amp; irb_unique);\n\t\t\t\tconst bool partial = (retrieval-&gt;irb_generic &amp; irb_partial);\n\n\t\t\t\tconst bool fullscan = (maxSegs == 0);\n\t\t\t\tconst bool list = (retrieval-&gt;irb_list != nullptr);\n\n\t\t\t\tstring bounds;\n\t\t\t\tif (!unique &amp;&amp; !fullscan)\n\t\t\t\t{\n\t\t\t\t\tif (retrieval-&gt;irb_lower_count &amp;&amp; retrieval-&gt;irb_upper_count)\n\t\t\t\t\t{\n\t\t\t\t\t\tif (equality)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tif (partial)\n\t\t\t\t\t\t\t\tbounds.printf(&quot; (partial match: %d/%d)&quot;, maxSegs, segCount);\n\t\t\t\t\t\t\telse\n\t\t\t\t\t\t\t\tbounds.printf(&quot; (full match)&quot;);\n\t\t\t\t\t\t}\n\t\t\t\t\t\telse\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tbounds.printf(&quot; (lower bound: %d/%d, upper bound: %d/%d)&quot;,\n\t\t\t\t\t\t\t\t\t\t  retrieval-&gt;irb_lower_count, segCount,\n\t\t\t\t\t\t\t\t\t\t  retrieval-&gt;irb_upper_count, segCount);\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t\telse if (retrieval-&gt;irb_lower_count)\n\t\t\t\t\t{\n\t\t\t\t\t\tbounds.printf(&quot; (lower bound: %d/%d)&quot;,\n\t\t\t\t\t\t\t\t\t  retrieval-&gt;irb_lower_count, segCount);\n\t\t\t\t\t}\n\t\t\t\t\telse if (retrieval-&gt;irb_upper_count)\n\t\t\t\t\t{\n\t\t\t\t\t\tbounds.printf(&quot; (upper bound: %d/%d)&quot;,\n\t\t\t\t\t\t\t\t\t  retrieval-&gt;irb_upper_count, segCount);\n\t\t\t\t\t}\n\t\t\t\t}\n\n\t\t\t\tplan-&gt;text = &quot;Index &quot; + printName(tdbb, indexName.toQuotedString()) +\n\t\t\t\t\t(fullscan ? &quot; Full&quot; : unique ? &quot; Unique&quot; : list ? &quot; List&quot; : &quot; Range&quot;) + &quot; Scan&quot; + bounds;\n\t\t\t}\n\t\t\telse\n\t\t\t\tplan-&gt;text = printName(tdbb, indexName.toQuotedString());\n\t\t}\n\t\tbreak;\n\n\tdefault:\n\t\tfb_assert(false);\n\t}\n}\n\nvoid RecordSource::printLegacyInversion(thread_db* tdbb, const InversionNode* inversion, string&amp; plan)\n{\n\tObjectsArray&lt;PlanEntry::Line&gt; planLines;\n\tprintInversion(tdbb, inversion, planLines, false, 0, false);\n\n\tfor (const auto&amp; line : planLines)\n\t{\n\t\tif (plan.hasData())\n\t\t\tplan += &quot;, &quot;;\n\n\t\tplan += line.text;\n\t}\n}\n\nvoid RecordSource::printOptInfo(ObjectsArray&lt;PlanEntry::Line&gt;&amp; planLines) const\n{\n#ifdef PRINT_OPT_INFO\n\tfb_assert(planLines.hasData());\n\tstring info;\n\t// Add 0.5 to convert double-&gt;int truncation into rounding\n\tinfo.printf(&quot; [rows: %&quot; UQUADFORMAT &quot;]&quot;, (FB_UINT64) (m_cardinality + 0.5));\n\tplanLines.back().text += info;\n#endif\n}\n\n\n// RecordStream class\n// ------------------\n\nRecordStream::RecordStream(CompilerScratch* csb, StreamType stream, const Format* format)\n\t: RecordSource(csb),\n\t  m_stream(stream),\n\t  m_format(format ? format : csb-&gt;csb_rpt[stream].csb_format)\n{\n\tfb_assert(m_format);\n}\n\nbool RecordStream::refetchRecord(thread_db* tdbb) const\n{\n\tRequest* const request = tdbb-&gt;getRequest();\n\tjrd_tra* const transaction = request-&gt;req_transaction;\n\n\trecord_param* const rpb = &amp;request-&gt;req_rpb[m_stream];\n\n\tif (rpb-&gt;rpb_runtime_flags &amp; RPB_refetch)\n\t{\n\t\tif (VIO_refetch_record(tdbb, rpb, transaction, true, false))\n\t\t{\n\t\t\trpb-&gt;rpb_runtime_flags &amp;= ~RPB_refetch;\n\t\t\treturn true;\n\t\t}\n\t}\n\n\treturn false;\n}\n\nWriteLockResult RecordStream::lockRecord(thread_db* tdbb) const\n{\n\tRequest* const request = tdbb-&gt;getRequest();\n\tjrd_tra* const transaction = request-&gt;req_transaction;\n\n\trecord_param* const rpb = &amp;request-&gt;req_rpb[m_stream];\n\tjrd_rel* const relation = rpb-&gt;rpb_relation;\n\n\tfb_assert(relation &amp;&amp; !relation-&gt;rel_view_rse);\n\n\tRLCK_reserve_relation(tdbb, transaction, relation, true);\n\n\treturn VIO_writelock(tdbb, rpb, transaction);\n}\n\nvoid RecordStream::markRecursive()\n{\n\tm_recursive = true;\n}\n\nvoid RecordStream::findUsedStreams(StreamList&amp; streams, bool /*expandAll*/) const\n{\n\tif (!streams.exist(m_stream))\n\t\tstreams.add(m_stream);\n}\n\nvoid RecordStream::invalidateRecords(Request* request) const\n{\n\trecord_param* const rpb = &amp;request-&gt;req_rpb[m_stream];\n\trpb-&gt;rpb_number.setValid(false);\n}\n\nvoid RecordStream::nullRecords(thread_db* tdbb) const\n{\n\tRequest* const request = tdbb-&gt;getRequest();\n\trecord_param* const rpb = &amp;request-&gt;req_rpb[m_stream];\n\n\trpb-&gt;rpb_number.setValid(false);\n\n\t// Make sure a record block has been allocated\n\n\tRecord* const record = VIO_record(tdbb, rpb, m_format, tdbb-&gt;getDefaultPool());\n\n\t// Mark the record to look like NULL\n\n\trecord-&gt;fakeNulls();\n}\n"}, "/build/src/common/classes/alloc.cpp": {"id": "/build/src/common/classes/alloc.cpp", "filePath": "src/common/classes/alloc.cpp", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.cpp\n *\tDESCRIPTION:\tMemory Pool Manager (based on B+ tree)\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n\n#ifdef WIN_NT\n\n#include &lt;windows.h&gt;\n\n#ifndef PATH_MAX\n#define PATH_MAX MAX_PATH\n#endif\n\n#else\n\n#include &lt;unistd.h&gt;\n#include &lt;sys/types.h&gt;\n#include &lt;sys/stat.h&gt;\n#include &lt;fcntl.h&gt;\n#include &lt;sys/mman.h&gt;\n\n#endif\n\n#include &quot;../common/classes/fb_tls.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/vector.h&quot;\n#include &quot;../common/classes/RefMutex.h&quot;\n#include &quot;../common/config/config.h&quot;\n#include &quot;../common/os/os_utils.h&quot;\n#include &quot;../common/os/fbsyslog.h&quot;\n#include &quot;iberror.h&quot;\n\n#ifdef USE_VALGRIND\n#include &lt;valgrind/memcheck.h&gt;\n\n//#define VALGRIND_FIX_IT\t\t// overrides suspicious valgrind behavior\n#endif\t// USE_VALGRIND\n\nnamespace {\n\n///#define MEM_DEBUG_EXTERNAL\n\n/*** emergency debugging stuff\nstatic const char* lastFileName;\nstatic int lastLine;\nstatic void* lastBlock;\nstatic void* stopAddress = (void*) 0x2254938;\n***/\n\n#undef MEM_DEBUG\n#if defined(DEBUG_GDS_ALLOC) &amp;&amp; !defined(USE_VALGRIND)\n#define MEM_DEBUG\n#endif\n\n#ifdef MEM_DEBUG\nstatic constexpr int GUARD_BYTES\t= ALLOC_ALIGNMENT; // * 2048;\nstatic constexpr UCHAR INIT_BYTE\t= 0xCC;\nstatic constexpr UCHAR GUARD_BYTE\t= 0xDD;\nstatic constexpr UCHAR DEL_BYTE\t\t= 0xEE;\n#else\nstatic constexpr int GUARD_BYTES = 0;\n#endif\n\ntemplate &lt;typename T&gt;\nT absVal(T n) noexcept\n{\n\treturn n &lt; 0 ? -n : n;\n}\n\n#undef DELAYED_FREE\n#if defined(USE_VALGRIND) || defined(MEM_DEBUG)\n#define DELAYED_FREE\n#endif\n\n#ifdef DELAYED_FREE\n// When memory block is deallocated by user from the pool it must pass queue of this\n// length before it is actually deallocated and access protection from it removed.\n#define DELAYED_FREE_COUNT 1024\n\n// When memory extent is deallocated when pool is destroying it must pass through\n// queue of this length before it is actually returned to system\n#define DELAYED_EXTENT_COUNT 32\n\n// Circular FIFO buffer of read/write protected extents pending free operation\n// Race protected via cache_mutex.\nstruct DelayedExtent\n{\n\tvoid* memory; // Extent pointer\n\tsize_t size;  // Size of extent\n};\n\nDelayedExtent delayedExtents[DELAYED_EXTENT_COUNT];\nsize_t delayedExtentCount = 0;\nsize_t delayedExtentsPos = 0;\n#endif\n\n// Uncomment to validate pool on every alloc\\release operation.\n// Could slowdown pool significantly !\n//#define VALIDATE_POOL\n\ntypedef Firebird::AtomicCounter::counter_type StatInt;\n\n// We cache this amount of extents to avoid memory mapping overhead\nconstexpr int MAP_CACHE_SIZE = 16; // == 1 MB\nconstexpr size_t DEFAULT_ALLOCATION = 65536;\n\nstruct ExtentsCache\t// C++ aggregate - members are statically initialized to zeros\n{\n\tunsigned count;\n\tvoid* data[MAP_CACHE_SIZE];\n};\n\nExtentsCache defaultExtentsCache;\nExtentsCache externalExtentsCache;\n\n#ifndef WIN_NT\nstruct FailedBlock\n{\n\tsize_t blockSize;\n\tFailedBlock* next;\n\tFailedBlock** prev;\n};\n\nFailedBlock* failedList = NULL;\n#endif\n\nvoid corrupt(const char* text) noexcept\n{\n\tconst bool bcAbort = Firebird::Config::getBugcheckAbort();\n\tFirebird::Syslog::Record(bcAbort ? Firebird::Syslog::Error : Firebird::Syslog::Warning, text);\n\tif (bcAbort)\n\t\tabort();\n}\n\nFirebird::Mutex* cache_mutex = NULL;\nint dev_zero_fd = 0;\n\n#if defined(WIN_NT)\nsize_t get_page_size()\n{\n\tSYSTEM_INFO info;\n\tGetSystemInfo(&amp;info);\n\treturn info.dwPageSize;\n}\n#else\nsize_t get_page_size()\n{\n\treturn sysconf(_SC_PAGESIZE);\n}\n#endif\n\n\ninline size_t get_map_page_size()\n{\n\tstatic volatile size_t map_page_size = 0;\n\tif (!map_page_size)\n\t{\n\t\tFirebird::MutexLockGuard guard(cache_mutex, &quot;get_map_page_size&quot;);\n\t\tif (!map_page_size)\n\t\t\tmap_page_size = get_page_size();\n\t}\n\treturn map_page_size;\n}\n\n} // anonymous namespace\n\nnamespace Firebird {\n\nnamespace SemiDoubleLink\n{\n\t// SemiDoubleLink makes it possible to walk list one direction,\n\t// push/pop/remove members with very efficient back-link to the head pointer somewhere\n\n\ttemplate &lt;class T&gt;\n\tvoid push(T** where, T* e) noexcept\n\t{\n\t\t// set element `e&#x27; pointers\n\t\te-&gt;prev = where;\n\t\te-&gt;next = *where;\n\n\t\t// make next after `e&#x27; element (if present) point to it\n\t\tif (e-&gt;next)\n\t\t\te-&gt;next-&gt;prev = &amp;(e-&gt;next);\n\n\t\t// make previous element point to `e&#x27;\n\t\t*(e-&gt;prev) = e;\n\t}\n\n\ttemplate &lt;class T&gt;\n\tvoid remove(T* e) noexcept\n\t{\n\t\tfb_assert(e);\n\t\tfb_assert(e-&gt;prev);\n\n\t\t// adjust previous pointer in next element ...\n\t\tif (e-&gt;next)\n\t\t\te-&gt;next-&gt;prev = e-&gt;prev;\n\n\t\t// ... and next pointer in previous element\n\t\t*(e-&gt;prev) = e-&gt;next;\n\t}\n\n\ttemplate &lt;class T&gt;\n\tT* pop(T* e) noexcept\n\t{\n\t\tif (e)\n\t\t\tremove(e);\n\n\t\treturn e;\n\t}\n\n\ttemplate &lt;class T&gt;\n\tvoid validate(T* e)\n\t{\n\t\tif (e-&gt;next &amp;&amp; e-&gt;next-&gt;prev != &amp;(e-&gt;next))\n\t\t\tfatal_exception::raise(&quot;bad back link in SemiDoubleLink&quot;);\n\t}\n}\n\n#ifdef USE_VALGRIND\n// Size of Valgrind red zone applied before and after memory block allocated for user\n#define VALGRIND_REDZONE ALLOC_ALIGNMENT\n#undef MEM_DEBUG\t// valgrind works instead\n#else\n#define VALGRIND_REDZONE 0\n#endif\n\ntypedef SLONG INT32;\n\nclass MemBlock;\nclass MemMediumHunk;\n\nclass MemHeader\n{\npublic:\n\tstatic constexpr size_t SIZE_MASK = 0xFFF0;\n\tstatic constexpr size_t MEM_MASK = 0xF;\n\tstatic constexpr size_t MEM_HUGE = 0x1;\n\tstatic constexpr size_t MEM_REDIRECT = 0x2;\n\tstatic constexpr size_t MEM_EXTENT = 0x4;\n#ifdef DELAYED_FREE\n\tstatic constexpr size_t MEM_ACTIVE = 0x8;\n#endif\n\tstatic constexpr unsigned OFFSET_SHIFT = 16;\n\n\tenum HugeBlock {HUGE_BLOCK};\n\n\tunion\n\t{\n\t\tMemPool*\tpool = nullptr;\n\t\tMemBlock*\tnext;\n\t};\n\nprivate:\n\tsize_t\thdrLength;\n\npublic:\n#ifdef DEBUG_GDS_ALLOC\n\tINT32\t\tlineNumber = -1;\n\tconst char\t*fileName = nullptr;\n#elif (SIZEOF_VOID_P == 4)\n\tFB_UINT64 dummyAlign;\n#endif\n#if defined(USE_VALGRIND) &amp;&amp; (VALGRIND_REDZONE != 0)\n\tchar mbk_valgrind_redzone[VALGRIND_REDZONE];\n#endif\n\n\tMemHeader(size_t size) noexcept\n\t\t: hdrLength(size)\n\t{\n\t\tfb_assert(size &lt; MAX_USHORT);\n\t\tfb_assert(!(size &amp; MEM_MASK));\n\t}\n\n\tMemHeader(size_t size, MemMediumHunk* hunk) noexcept\n\t\t: hdrLength(size | ((((UCHAR*)this) - ((UCHAR*)hunk)) &lt;&lt; OFFSET_SHIFT))\n\t{\n\t\tconst off_t fromTheHunk = ((UCHAR*)this) - ((UCHAR*)hunk);\t// dup !!!\n\n\t\tfb_assert(size &lt; MAX_USHORT);\n\t\tfb_assert(fromTheHunk &lt; MAX_USHORT ;\n\tSemiDoubleLink::remove(hunk);\n\tdecrement_mapping(FB_ALIGN(hunk-&gt;length, get_map_page_size()));\n\treleaseRaw(pool_destroying, hunk, hunk-&gt;length, nullptr);\n}\n\nvoid MemPool::memoryIsExhausted(void)\n{\n\tFirebird::BadAlloc::raise();\n}\n\nvoid* MemPool::allocRaw(size_t size)\n{\n#ifndef USE_VALGRIND\n\tif (size == DEFAULT_ALLOCATION)\n\t{\n\t\tMutexLockGuard guard(cache_mutex, &quot;MemPool::allocRaw&quot;);\n\t\tif (extentsCache-&gt;count)\n\t\t{\n\t\t\t// Use most recently used object to encourage caching\n\t\t\tincrement_mapping(size);\n\t\t\treturn extentsCache-&gt;data[--extentsCache-&gt;count];\n\t\t}\n\t}\n#endif\n\n\tsize = FB_ALIGN(size, get_map_page_size());\n\n#ifdef WIN_NT\n\n\tvoid* result = VirtualAlloc(NULL, size, MEM_COMMIT, PAGE_READWRITE);\n\tif (!result)\n\t{\n\n#else // WIN_NT\n\n\tvoid* result = NULL;\n\tif (failedList)\n\t{\n\t\tMutexLockGuard guard(cache_mutex, &quot;MemPool::allocRaw&quot;);\n\t\tfor (FailedBlock* fb = failedList; fb; fb = fb-&gt;next)\n\t\t{\n\t\t\tif (fb-&gt;blockSize == size)\n\t\t\t{\n\t\t\t\tresult = fb;\n\t\t\t\tSemiDoubleLink::pop(fb);\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\n\tif (!result)\n\t{\n\n#if defined(MAP_ANON) &amp;&amp; !defined(MAP_ANONYMOUS)\n#define MAP_ANONYMOUS MAP_ANON\n#endif\n\n#ifdef MAP_ANONYMOUS\n\n\t\tresult = os_utils::mmap(NULL, size, PROT_READ | PROT_WRITE, MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);\n\n#else // MAP_ANONYMOUS\n\n\t\tif (dev_zero_fd &lt; 0)\n\t\t\tdev_zero_fd = os_utils::open(&quot;/dev/zero&quot;, O_RDWR);\n\t\tresult = os_utils::mmap(NULL, size, PROT_READ | PROT_WRITE, MAP_PRIVATE, dev_zero_fd, 0);\n\n#endif // MAP_ANONYMOUS\n\n\t\tif (result == MAP_FAILED)\n\n#endif // WIN_NT\n\n\t\t{\n\t\t\t// failure happens!\n\t\t\tmemoryIsExhausted();\n\t\t\treturn NULL;\n\t\t}\n\t}\n\n#ifdef USE_VALGRIND\n\t// Let Valgrind forget that block was zero-initialized\n\tVALGRIND_MAKE_MEM_UNDEFINED(result, size);\n#endif\n\n\tincrement_mapping(size);\n\treturn result;\n}\n\n\nvoid* MemPool::getExtent(size_t from, size_t&amp; to)\t\t// pass desired minimum size, return actual extent size\n{\n#ifdef VALIDATE_POOL\n\tMutexLockGuard guard(mutex, &quot;MemPool::getExtent&quot;);\n#endif\n\tMemBlock* extent = allocateRange(from, to ALLOC_ARGS);\n\textent-&gt;setExtent();\n\treturn &amp;extent-&gt;body;\n}\n\n\nvoid MemPool::releaseExtent(bool destroying, void* block, size_t size, MemPool* pool) noexcept\n{\n\tif (size &lt; DEFAULT_ALLOCATION)\n\t\treleaseMemory(block, true);\n\telse\n\t{\n\t\tif (pool)\n\t\t\tpool-&gt;decrement_mapping(size);\n\t\treleaseRaw(true, block, size, (pool ? pool-&gt;extentsCache : nullptr));\n\t}\n}\n\n\nvoid MemPool::releaseRaw(bool destroying, void* block, size_t size, ExtentsCache* extentsCache) noexcept\n{\n#ifndef DELAYED_FREE\n\tif (extentsCache &amp;&amp; (size == DEFAULT_ALLOCATION))\n\t{\n\t\tMutexLockGuard guard(cache_mutex, &quot;MemPool::releaseRaw&quot;);\n\t\tif (extentsCache-&gt;count &lt; MAP_CACHE_SIZE)\n\t\t{\n\t\t\textentsCache-&gt;data[extentsCache-&gt;count++] = block;\n\t\t\treturn;\n\t\t}\n\t}\n\n#define unmapBlockPtr block\n#define unmapBlockSize size\n\n#else\n#ifdef VALGRIND\n\t// Set access protection for block to prevent memory from deleted pool being accessed\n\tVALGRIND_MAKE_MEM_NOACCESS(block, size);\n#endif\n\n\tsize = FB_ALIGN(size, get_map_page_size());\n\n\tvoid* unmapBlockPtr = block;\n\tsize_t unmapBlockSize = size;\n\n\t// Employ extents delayed free logic only when pool is destroying.\n\t// In normal case all blocks pass through queue of sufficent length by themselves\n\tif (destroying)\n\t{\n\t\t// Synchronize delayed free queue using extents mutex\n\t\tMutexLockGuard guard(cache_mutex, &quot;MemPool::releaseRaw&quot;);\n\n\t\t// Extend circular buffer if possible\n\t\tif (delayedExtentCount &lt; FB_NELEM(delayedExtents))\n\t\t{\n\t\t\tDelayedExtent* item = &amp;delayedExtents[delayedExtentCount];\n\t\t\titem-&gt;memory = block;\n\t\t\titem-&gt;size = size;\n\t\t\tdelayedExtentCount++;\n\t\t\treturn;\n\t\t}\n\n\t\tDelayedExtent* item = &amp;delayedExtents[delayedExtentsPos];\n\n\t\t// Set up the block we are going to unmap\n\t\tunmapBlockPtr = item-&gt;memory;\n\t\tunmapBlockSize = item-&gt;size;\n\n\t\t// Replace element in circular buffer\n\t\titem-&gt;memory = block;\n\t\titem-&gt;size = size;\n\n\t\t// Move queue pointer to next element and cycle if needed\n\t\tdelayedExtentsPos++;\n\t\tif (delayedExtentsPos &gt;= FB_NELEM(delayedExtents))\n\t\t\tdelayedExtentsPos = 0;\n\t}\n#endif\n\n\tsize = FB_ALIGN(size, get_map_page_size());\n#ifdef WIN_NT\n\tif (!VirtualFree(block, 0, MEM_RELEASE))\n\t{\n#else // WIN_NT\n\n#if (defined SOLARIS) &amp;&amp; (defined HAVE_CADDR_T)\n\tint rc = munmap((caddr_t) unmapBlockPtr, unmapBlockSize);\n#else\n\tint rc = munmap(unmapBlockPtr, unmapBlockSize);\n#endif\n\tif (rc)\n\t{\n\t\tif (errno == ENOMEM)\n\t\t{\n\t\t\tFailedBlock* failed = (FailedBlock*) unmapBlockPtr;\n#ifdef USE_VALGRIND\n\t\t\tVALGRIND_MAKE_MEM_UNDEFINED(failed, sizeof(FailedBlock));\n#endif\n\t\t\tfailed-&gt;blockSize = unmapBlockSize;\n\n\t\t\tMutexLockGuard guard(cache_mutex, &quot;MemPool::releaseRaw&quot;);\n\t\t\tSemiDoubleLink::push(&amp;failedList, failed);\n\n\t\t\treturn;\n\t\t}\n#endif // WIN_NT\n\t\tcorrupt(&quot;OS memory deallocation error&quot;);\n\t}\n}\n\nvoid MemPool::globalFree(void* block) noexcept\n{\n\tdeallocate(block);\n}\n\nvoid* MemoryPool::calloc(size_t size ALLOC_PARAMS)\n{\n\tvoid* block = allocate(size ALLOC_PASS_ARGS);\n\tmemset(block, 0, size);\n\treturn block;\n}\n\nvoid MemPool::deallocate(void* block) noexcept\n{\n\treleaseMemory(block, false);\n}\n\nvoid MemPool::deletePool(MemPool* pool) noexcept\n{\n\tdelete pool;\n}\n\nbool MemPool::validate(char* buf, FB_SIZE_T size)\n{\n\tStatInt vMap = 0, vUse = 0;\n\n\tsmallObjects.validate(this, vMap, vUse);\n\tmediumObjects.validate(this, vMap, vUse);\n\n\t// validate big objects\n\tfor (MemBigHunk* h = bigHunks; h; h = h-&gt;next)\n\t\th-&gt;validate(this, vMap, vUse);\n\n\t// validate blocks redirected to parent\n\tfor (FB_SIZE_T n = 0; n &lt; parentRedirected.getCount(); ++n)\n\t{\n\t\tconst MemBlock* b = parentRedirected[n];\n\t\tif (!b-&gt;isExtent())\n\t\t\tvUse += parentRedirected[n]-&gt;getSize();\n\t}\n\n\tif (vMap != mapped_memory.value() || vUse != used_memory.value())\n\t{\n\t\tchar buf[256];\n\t\tsnprintf(buf, sizeof(buf), &quot;Memory statistics does not match pool: &quot;\n\t\t\t&quot;mapped=%&quot; SQUADFORMAT &quot;(%&quot; SQUADFORMAT &quot; st), used=%&quot; SQUADFORMAT &quot;(%&quot; SQUADFORMAT &quot; st)&quot;,\n\t\t\tSINT64(vMap), SINT64(mapped_memory.value()), SINT64(vUse), SINT64(used_memory.value()));\n\t\treturn false;\n\t}\n\n\treturn true;\n}\n\n#ifdef MEM_DEBUG\nvoid MemPool::print_contents(const char* filename, unsigned flags, const char* filter_path) noexcept\n{\n\tFILE* out = os_utils::fopen(filename, &quot;w&quot;);\n\tif (!out)\n\t\treturn;\n\n\tprint_contents(out, flags, filter_path);\n\tfclose(out);\n}\n\n// This member function can&#x27;t be const because there are calls to the mutex.\nvoid MemPool::print_contents(FILE* file, unsigned flags, const char* filter_path) noexcept\n{\n\tconst bool used_only = flags &amp; MemoryPool::PRINT_USED_ONLY;\n\n\tMutexLockGuard guard(mutex, &quot;MemPool::print_contents&quot;);\n\n\tfprintf(file, &quot;********* Printing contents of pool %p (parent %p) used=%&quot; SQUADFORMAT &quot; mapped=%&quot; SQUADFORMAT &quot;\\n&quot;,\n\t\tthis, parent, SINT64(used_memory.value()), SINT64(mapped_memory.value()));\n\n\tchar buf[256];\n\tif (!validate(buf, sizeof(buf)))\n\t{\n\t\tfprintf(file, &quot;%s\\n&quot;, buf);\n\t}\n\n\tif (!used_only)\n\t{\n\t\tfilter_path = NULL;\n\t}\n\tconst size_t filter_len = filter_path ? strlen(filter_path) : 0;\n\n\t// small &amp; medium hunks\n\tsmallObjects.print_contents(file, this, used_only, filter_path, filter_len);\n\tmediumObjects.print_contents(file, this, used_only, filter_path, filter_len);\n\n\t// big hunks\n\tfor (MemBigHunk* hunk = bigHunks; hunk; hunk = hunk-&gt;next)\n\t\thunk-&gt;print_contents(file, this, used_only, filter_path, filter_len);\n\n\tif (flags &amp; MemoryPool::PRINT_RECURSIVE)\n\t{\n\t\tfor (MemPool* p = child; p; p = p-&gt;next)\n\t\t\tp-&gt;print_contents(file, flags, filter_path);\n\t}\n}\n#endif\n\n// Declare thread-specific variable for context memory pool\n#ifndef TLS_CLASS\nTLS_DECLARE(MemoryPool*, contextPool);\n#else\nTLS_DECLARE(MemoryPool*, *contextPoolPtr);\n#endif\t// TLS_CLASS\n\nMemoryPool* MemoryPool::setContextPool(MemoryPool* newPool)\n{\n#ifndef TLS_CLASS\n\tMemoryPool* const old = TLS_GET(contextPool);\n\tTLS_SET(contextPool, newPool);\n#else\n\tMemoryPool* const old = TLS_GET(*contextPoolPtr);\n\tTLS_SET(*contextPoolPtr, newPool);\n#endif\t// TLS_CLASS\n\treturn old;\n}\n\nMemoryPool* MemoryPool::getContextPool()\n{\n#ifndef TLS_CLASS\n\treturn TLS_GET(contextPool);\n#else\n\treturn TLS_GET(*contextPoolPtr);\n#endif\t// TLS_CLASS\n}\n\nvoid MemoryPool::contextPoolInit()\n{\n#ifdef TLS_CLASS\n\t// Allocate TLS entry for context pool\n\tcontextPoolPtr = FB_NEW_POOL(*getDefaultMemoryPool()) TLS_CLASS&lt;MemoryPool*&gt;;\n\t// To be deleted by InstanceControl::InstanceList::destructors() at TLS priority\n#endif\t// TLS_CLASS\n}\n\nMemoryPool&amp; AutoStorage::getAutoMemoryPool()\n{\n\tMemoryPool* p = MemoryPool::getContextPool();\n\tif (!p)\n\t{\n\t\tp = getDefaultMemoryPool();\n\t\tfb_assert(p);\n\t}\n\n\treturn *p;\n}\n\nvoid* MemoryPool::allocate(size_t size ALLOC_PARAMS)\n{\n\treturn pool-&gt;allocate(size ALLOC_PASS_ARGS);\n}\n\nvoid MemoryPool::deallocate(void* block) noexcept\n{\n\tpool-&gt;deallocate(block);\n}\n\nvoid MemoryPool::deletePool(MemoryPool* pool)\n{\n\twhile (pool-&gt;finalizers)\n\t{\n\t\tauto finalizer = pool-&gt;finalizers;\n\t\tfb_assert(!finalizer-&gt;prev);\n\n\t\tpool-&gt;finalizers = finalizer-&gt;next;\n\n\t\tif (pool-&gt;finalizers)\n\t\t{\n\t\t\tfb_assert(pool-&gt;finalizers-&gt;prev == finalizer);\n\t\t\tpool-&gt;finalizers-&gt;prev = nullptr;\n\t\t}\n\n\t\tfinalizer-&gt;next = nullptr;\n\t\tfinalizer-&gt;finalize();\n\t}\n\n\tMemPool::deletePool(pool-&gt;pool);\n\tpool-&gt;pool = NULL;\n\tdelete pool;\n}\n\nvoid MemoryPool::print_contents(FILE* file, unsigned flags, const char* filter_path) noexcept\n{\n#ifdef MEM_DEBUG\n\tpool-&gt;print_contents(file, flags, filter_path);\n#endif\n}\n\nvoid MemoryPool::print_contents(const char* filename, unsigned flags, const char* filter_path) noexcept\n{\n#ifdef MEM_DEBUG\n\tpool-&gt;print_contents(filename, flags, filter_path);\n#endif\n}\n\nvoid MemoryPool::internalRegisterFinalizer(Finalizer* finalizer)\n{\n\tfb_assert(finalizer);\n\n\tMutexLockGuard guard(pool-&gt;mutex, &quot;MemoryPool::internalRegisterFinalizer&quot;);\n\n\tfinalizer-&gt;prev = nullptr;\n\tfinalizer-&gt;next = finalizers;\n\n\tif (finalizers)\n\t{\n\t\tfb_assert(!finalizers-&gt;prev);\n\t\tfinalizers-&gt;prev = finalizer;\n\t}\n\n\tfinalizers = finalizer;\n}\n\nvoid MemoryPool::unregisterFinalizer(Finalizer*&amp; finalizer)\n{\n\t{\t// scope\n\t\tMutexLockGuard guard(pool-&gt;mutex, &quot;MemoryPool::unregisterFinalizer&quot;);\n\n\t\tif (finalizer-&gt;prev)\n\t\t{\n\t\t\tfb_assert(finalizer-&gt;prev-&gt;next == finalizer);\n\t\t\tfinalizer-&gt;prev-&gt;next = finalizer-&gt;next;\n\t\t}\n\t\telse\n\t\t\tfinalizers = finalizer-&gt;next;\n\n\t\tif (finalizer-&gt;next)\n\t\t\tfinalizer-&gt;next-&gt;prev = finalizer-&gt;prev;\n\t}\n\n\tdelete finalizer;\n\tfinalizer = nullptr;\n}\n\n\nclass ExternalMemoryHandler\n{\nfriend class MemoryPool;\n\nprivate:\n\tstruct Objects\n\t{\n\t\tMemoryStats memoryStats;\n\t\tMemPool memPool{memoryStats, &amp;externalExtentsCache};\n\t\tMemoryPool memoryPool{&amp;memPool};\n\t};\n\n\tstatic ExternalMemoryHandler* instance;\n\npublic:\n\tenum class State : UCHAR\n\t{\n\t\tALIVE,\n\t\tDEAD,\n\t\tDYING\n\t};\n\npublic:\n\tExternalMemoryHandler()\n\t{\n\t\tMutex::initMutexes();\n\n#ifdef MEM_DEBUG_EXTERNAL\n\t\tprintf(&quot;ExternalMemoryHandler::ExternalMemoryHandler()\\n&quot;);\n#endif\n\n\t\tinstance = this;\n\n\t\tnew(objectsBuffer) Objects();\n\n\t\tMemoryPool::externalMemoryManager = &amp;objects().memoryPool;\n\n\t\tatexit([] {\n\t\t\tconst auto currentUsage = instance-&gt;objects().memoryStats.getCurrentUsage();\n\n#ifdef MEM_DEBUG_EXTERNAL\n\t\t\tprintf(&quot;ExternalMemoryHandler atexit: %&quot; SIZEFORMAT &quot;\\n&quot;, currentUsage);\n#endif\n\n\t\t\tExternalMemoryHandler::printContents(&quot;atexit&quot;);\n\n\t\t\tif (currentUsage == 0)\n\t\t\t\tExternalMemoryHandler::free();\n\t\t\telse\n\t\t\t\tinstance-&gt;state = State::DYING;\n\t\t});\n\t}\n\n\tvoid revive()\n\t{\n#ifdef MEM_DEBUG_EXTERNAL\n\t\tprintf(&quot;ExternalMemoryHandler::revive()\\n&quot;);\n#endif\n\t\tnew(this) ExternalMemoryHandler();\n\t}\n\n\tstatic void printContents(const char* moment)\n\t{\n#if defined(MEM_DEBUG) &amp;&amp; defined(DEBUG_GDS_ALLOC)\n\t\tif (!MemoryPool::externalMemoryManager)\n\t\t\treturn;\n\n\t\tstatic bool alreadyPrinted = false;\n\t\tFirebird::AutoPtr&lt;FILE&gt; file;\n\n\t\t{\t// scope\n\t\t\tchar name[PATH_MAX];\n\n\t\t\tif (os_utils::getCurrentModulePath(name, sizeof(name)))\n\t\t\t\tstrncat(name, &quot;.memdebug.external.log&quot;, sizeof(name) - 1);\n\t\t\telse\n\t\t\t\tstrcpy(name, &quot;memdebug.external.log&quot;);\n\n\t\t\tfile = os_utils::fopen(name, alreadyPrinted ? &quot;at&quot; : &quot;w+t&quot;);\n\t\t}\n\n\t\tif (file)\n\t\t{\n\t\t\tfprintf(file, &quot;********* Moment: %s\\n&quot;, moment);\n\n\t\t\tMemoryPool::externalMemoryManager-&gt;print_contents(file,\n\t\t\t\tFirebird::MemoryPool::PRINT_USED_ONLY | Firebird::MemoryPool::PRINT_RECURSIVE);\n\t\t\tfile = NULL;\n\t\t\talreadyPrinted = true;\n\t\t}\n#endif\n\t}\n\n\tstatic void free()\n\t{\n\t\tif (instance-&gt;state != State::DEAD)\n\t\t{\n\t\t\tinstance-&gt;state = State::DEAD;\n\t\t\tinstance-&gt;objects().~Objects();\n\t\t\tinstance-&gt;~ExternalMemoryHandler();\n\t\t\tinstance = nullptr;\n\n\t\t\tMemPool::cleanupExternalPool();\n\t\t}\n\n\t\tMemoryPool::externalMemoryManager = nullptr;\n\t}\n\n\tinline Objects&amp; objects() noexcept\n\t{\n\t\treturn *(Objects*) objectsBuffer;\n\t}\n\n\talignas(alignof(Objects)) char objectsBuffer[sizeof(Objects)];\n\tState state = State::ALIVE;\n};\n\nExternalMemoryHandler* ExternalMemoryHandler::instance = nullptr;\n\nvoid initExternalMemoryPool()\n{\n\tstatic ExternalMemoryHandler handler;\n\n\tif (handler.state == ExternalMemoryHandler::State::DEAD)\n\t\thandler.revive();\n}\n\n\nvoid MemoryPool::globalFree(void* block) noexcept\n{\n\tconst auto* pool = MemPool::getPoolFromPointer(block);\n\n\tMemPool::globalFree(block);\n\n\tif (auto externalMemoryHandler = ExternalMemoryHandler::instance;\n\t\texternalMemoryHandler &amp;&amp;\n\t\texternalMemoryHandler-&gt;state == ExternalMemoryHandler::State::DYING &amp;&amp;\n\t\tpool == &amp;externalMemoryHandler-&gt;objects().memPool)\n\t{\n\t\tconst auto currentUsage = externalMemoryHandler-&gt;objects().memoryStats.getCurrentUsage();\n\n#ifdef MEM_DEBUG_EXTERNAL\n\t\tprintf(&quot;MemoryPool::globalFree() - dying ExternalMemoryHandler: %&quot; SIZEFORMAT &quot;\\n&quot;, currentUsage);\n#endif\n\n\t\tExternalMemoryHandler::printContents(&quot;globalFree&quot;);\n\n\t\tif (currentUsage == 0)\n\t\t\tExternalMemoryHandler::free();\n\t}\n}\n\n\n#if defined(DEV_BUILD)\nvoid AutoStorage::ProbeStack() const noexcept\n{\n\t//\n\t// AutoStorage() default constructor can be used only\n\t// for objects on the stack. ProbeStack() uses the\n\t// following assumptions to check it:\n\t//\t1. One and only one stack is used for all kind of variables.\n\t//\t2. Objects don&#x27;t grow &gt; 128K.\n\t//\n\tconst char probeVar = &#x27;\\0&#x27;;\n\tconst char* myStack = &amp;probeVar;\n\tconst char* thisLocation = (const char*) this;\n\tconst ptrdiff_t distance = thisLocation - myStack;\n\tfb_assert(absVal(distance) &lt; 128 * 1024);\n}\n#endif\n\n} // namespace Firebird\n\n\n// These operators are needed for foreign libraries which use redefined new/delete.\n// Global operator &quot;delete&quot; is always redefined by firebird,\n// in a case when we actually need &quot;new&quot; only with file/line information\n// this version should be also present as a pair for &quot;delete&quot;.\n\nvoid* operator new(size_t s)\n{\n\treturn getExternalMemoryPool()-&gt;allocate(s ALLOC_ARGS);\n}\n\nvoid* operator new[](size_t s)\n{\n\treturn getExternalMemoryPool()-&gt;allocate(s ALLOC_ARGS);\n}\n\nvoid operator delete(void* mem) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\nvoid operator delete[](void* mem) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#if __cplusplus &gt;= 201402L\nvoid operator delete(void* mem, std::size_t s) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\nvoid operator delete[](void* mem, std::size_t s) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n#endif\n"}, "/build/src/jrd/recsrc/RecordSource.h": {"id": "/build/src/jrd/recsrc/RecordSource.h", "filePath": "src/jrd/recsrc/RecordSource.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Dmitry Yemanov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2009 Dmitry Yemanov &lt;dimitr@firebirdsql.org&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef JRD_RECORD_SOURCE_H\n#define JRD_RECORD_SOURCE_H\n\n#include &lt;optional&gt;\n#include &q ublic RecordSource::Impure\n\t\t{\n\t\t\tconst RecordSource* irsb_next;\n\t\t};\n\n\tpublic:\n\t\tConditionalStream(CompilerScratch* csb, RecordSource* first, RecordSource* second,\n\t\t\t\t\t\t  BoolExprNode* boolean);\n\n\t\tvoid close(thread_db* tdbb) const override;\n\n\t\tbool refetchRecord(thread_db* tdbb) const override;\n\t\tWriteLockResult lockRecord(thread_db* tdbb) const override;\n\n\t\tvoid getLegacyPlan(thread_db* tdbb, Firebird::string&amp; plan, unsigned level) const override;\n\n\t\tvoid markRecursive() override;\n\t\tvoid invalidateRecords(Request* request) const override;\n\n\t\tvoid findUsedStreams(StreamList&amp; streams, bool expandAll = false) const override;\n\t\tbool isDependent(const StreamList&amp; streams) const override;\n\t\tvoid nullRecords(thread_db* tdbb) const override;\n\n\tprotected:\n\t\tvoid internalGetPlan(thread_db* tdbb, PlanEntry&amp; planEntry, unsigned level, bool recurse) const override;\n\t\tvoid internalOpen(thread_db* tdbb) const override;\n\t\tbool internalGetRecord(thread_db* tdbb) const override;\n\n\tprivate:\n\t\tNestConst&lt;RecordSource&gt; m_first;\n\t\tNestConst&lt;RecordSource&gt; m_second;\n\t\tNestConst&lt;BoolExprNode&gt; const m_boolean;\n\t};\n\n\tclass TableValueFunctionScan : public RecordStream\n\t{\n\tprotected:\n\t\tstruct Impure : public RecordSource::Impure\n\t\t{\n\t\t\tRecordBuffer* m_recordBuffer;\n\t\t};\n\n\tpublic:\n\t\tTableValueFunctionScan(CompilerScratch* csb, StreamType stream,\n\t\t\t\t\t\t\t   const Firebird::string&amp; alias);\n\n\t\tbool refetchRecord(thread_db* tdbb) const override;\n\t\tWriteLockResult lockRecord(thread_db* tdbb) const override;\n\t\tvoid getLegacyPlan(thread_db* tdbb, Firebird::string&amp; plan, unsigned level) const override;\n\n\tprotected:\n\t\tbool internalGetRecord(thread_db* tdbb) const override;\n\t\tvoid assignParameter(thread_db* tdbb, dsc* fromDesc, const dsc* toDesc, SSHORT toId,\n\t\t\t\t\t\t\t Record* record) const;\n\n\t\tvirtual bool nextBuffer(th
