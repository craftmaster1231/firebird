      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

          var event = currentEvents[nextBugEvent];

      }

        event.line - 1, element));
    });
  },

  jumpTo : function (line, column) {
    var that = this;

        height : that._editor.clientHeight

        bottom : selPosPixel.top + editorSize.height - 150,
        left   : selPosPixel.left < editorSize.width - 100

               : selPosPixel.left - 50,
        right  : selPosPixel.left < editorSize.width - 100
               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }
}

tdbb-&gt;getType() == Firebird::ThreadData::tddDBB) &amp;&amp;\n\t\t(!tdbb-&gt;getDatabase() || tdbb-&gt;getDatabase()-&gt;checkHandle()));\n}\n\ninline void CHECK_DBB(const Jrd::Database* dbb)\n{\n\tfb_assert(dbb &amp;&amp; dbb-&gt;checkHandle());\n}\n\n#else // PROD_BUILD\n\ninline Jrd::thread_db* JRD_get_thread_data()\n{\n\treturn (Jrd::thread_db*) Firebird::ThreadData::getSpecific();\n}\n\ninline void CHECK_DBB(const Jrd::Database*)\n{\n}\n\ninline void CHECK_TDBB(const Jrd::thread_db*)\n{\n}\n\n#endif\n\ninline Jrd::Database* GET_DBB()\n{\n\treturn JRD_get_thread_data()-&gt;getDatabase();\n}\n\n/*-------------------------------------------------------------------------*\n * macros used to set thread_db and Database pointers when there are not set already *\n *-------------------------------------------------------------------------*/\ninline void SET_TDBB(Jrd::thread_db*&amp; tdbb)\n{\n\tif (tdbb == NULL) {\n\t\ttdbb = JRD_get_thread_data();\n\t}\n\tCHECK_TDBB(tdbb);\n}\n\ninline void SET_DBB(Jrd::Database*&amp; dbb)\n{\n\tif (dbb == NULL) {\n\t\tdbb = GET_DBB();\n\t}\n\tCHECK_DBB(dbb);\n}\n\n\n// global variables for engine\n\nnamespace Jrd {\n\ttypedef Firebird::SubsystemContextPoolHolder &lt;Jrd::thread_db, MemoryPool&gt; ContextPoolHolder;\n\n\tclass DatabaseContextHolder : public Jrd::ContextPoolHolder\n\t{\n\tpublic:\n\t\texplicit DatabaseContextHolder(thread_db* tdbb)\n\t\t\t: Jrd::ContextPoolHolder(tdbb, tdbb-&gt;getDatabase()-&gt;dbb_permanent)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tDatabaseContextHolder(const DatabaseContextHolder&amp;) = delete;\n\t\tDatabaseContextHolder&amp; operator=(const DatabaseContextHolder&amp;) = delete;\n\t};\n\n\tclass BackgroundContextHolder : public ThreadContextHolder, public DatabaseContextHolder,\n\t\tpublic Jrd::Attachment::SyncGuard\n\t{\n\tpublic:\n\t\tBackgroundContextHolder(Database* dbb, Jrd::Attachment* att, FbStatusVector* status, const char* f)\n\t\t\t: ThreadContextHolder(dbb, att, status),\n\t\t\t  DatabaseContextHolder(operator thread_db*()),\n\t\t\t  Jrd::Attachment::SyncGuard(att, f)\n\t\t{}\n\n\t\t// copying is prohibited\n\t\tBackgroundContextHolder(const BackgroundContextHolder&amp;) = delete;\n\t\tBackgroundContextHolder&amp; operator=(const BackgroundContextHolder&amp;) = delete;\n\t};\n\n\tclass AttachmentHolder\n\t{\n\tpublic:\n\t\tstatic constexpr unsigned ATT_LOCK_ASYNC\t\t= 1;\n\t\tstatic constexpr unsigned ATT_DONT_LOCK\t\t\t= 2;\n\t\tstatic constexpr unsigned ATT_NO_SHUTDOWN_CHECK\t= 4;\n\t\tstatic constexpr unsigned ATT_NON_BLOCKING\t\t= 8;\n\n\t\tAttachmentHolder(thread_db* tdbb, StableAttachmentPart* sa, unsigned lockFlags, const char* from);\n\t\t~AttachmentHolder();\n\n\t\t// copying is prohibited\n\t\tAttachmentHolder(const AttachmentHolder&amp;) = delete;\n\t\tAttachmentHolder&amp; operator =(const AttachmentHolder&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::RefPtr&lt;StableAttachmentPart&gt; sAtt;\n\t\tbool async;\t\t\t// async mutex should be locked instead normal\n\t\tbool nolock; \t\t// if locked manually, no need to take lock recursively\n\t\tbool blocking;\t\t// holder instance is blocking other instances\n\t};\n\n\tclass EngineContextHolder final : public ThreadContextHolder, private AttachmentHolder, private DatabaseContextHolder\n\t{\n\tpublic:\n\t\ttemplate &lt;typename I&gt;\n\t\tEngineContextHolder(Firebird::CheckStatusWrapper* status, I* interfacePtr, const char* from,\n\t\t\t\t\t\t\tunsigned lockFlags = 0);\n\t};\n\n\tclass AstLockHolder : public Firebird::ReadLockGuard\n\t{\n\tpublic:\n\t\tAstLockHolder(Database* dbb, const char* f)\n\t\t\t: Firebird::ReadLockGuard(dbb-&gt;dbb_ast_lock, f)\n\t\t{\n\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_no_ast)\n\t\t\t{\n\t\t\t\t// usually to be swallowed by the AST, but it allows to skip its execution\n\t\t\t\tFirebird::status_exception::raise(Firebird::Arg::Gds(isc_unavailable));\n\t\t\t}\n\t\t}\n\t};\n\n\tclass AsyncContextHolder : public AstLockHolder, public Jrd::Attachment::SyncGuard,\n\t\tpublic ThreadContextHolder, public DatabaseContextHolder\n\t{\n\tpublic:\n\t\tAsyncContextHolder(Database* dbb, const char* f, Lock* lck = NULL)\n\t\t\t: AstLockHolder(dbb, f),\n\t\t\t  Jrd::Attachment::SyncGuard(lck ?\n\t\t\t\tlck-&gt;getLockStable() : Firebird::RefPtr&lt;StableAttachmentPart&gt;(), f, true),\n\t\t\t  ThreadContextHolder(dbb, lck ? lck-&gt;getLockAttachment() : NULL),\n\t\t\t  DatabaseContextHolder(operator thread_db*())\n\t\t{\n\t\t\tif (lck)\n\t\t\t{\n\t\t\t\t// The lock could be released while we were waiting on the attachment mutex.\n\t\t\t\t// This may cause a segfault due to lck_attachment == NULL stored in tdbb.\n\n\t\t\t\tif (!lck-&gt;lck_id)\n\t\t\t\t{\n\t\t\t\t\t// usually to be swallowed by the AST, but it allows to skip its execution\n\t\t\t\t\tFirebird::status_exception::raise(Firebird::Arg::Gds(isc_unavailable));\n\t\t\t\t}\n\n\t\t\t\tfb_assert((operator thread_db*())-&gt;getAttachment());\n\t\t\t}\n\n\t\t\t(*this)-&gt;tdbb_flags |= TDBB_async;\n\t\t}\n\n\t\t// copying is prohibited\n\t\tAsyncContextHolder(const AsyncContextHolder&amp;) = delete;\n\t\tAsyncContextHolder&amp; operator=(const AsyncContextHolder&amp;) = delete;\n\t};\n\n\tclass EngineCheckout\n\t{\n\tpublic:\n\t\tenum Type\n\t\t{\n\t\t\tREQUIRED,\n\t\t\tUNNECESSARY,\n\t\t\tAVOID\n\t\t};\n\n\t\tEngineCheckout(thread_db* tdbb, const char* from, Type type = REQUIRED)\n\t\t\t: m_tdbb(tdbb), m_from(from)\n\t\t{\n\t\t\tif (type != AVOID)\n\t\t\t{\n\t\t\t\tAttachment* const att = tdbb ? tdbb-&gt;getAttachment() : NULL;\n\n\t\t\t\tif (att)\n\t\t\t\t\tm_ref = att-&gt;getStable();\n\n\t\t\t\tfb_assert(type == UNNECESSARY || m_ref.hasData());\n\n\t\t\t\tif (m_ref.hasData())\n\t\t\t\t\tm_ref-&gt;getSync()-&gt;leave();\n\t\t\t}\n\t\t}\n\n\t\tEngineCheckout(Attachment* att, const char* from, Type type = REQUIRED)\n\t\t\t: m_tdbb(nullptr), m_from(from)\n\t\t{\n\t\t\tif (type != AVOID)\n\t\t\t{\n\t\t\t\tfb_assert(type == UNNECESSARY || att);\n\n\t\t\t\tif (att &amp;&amp; att-&gt;att_use_count)\n\t\t\t\t{\n\t\t\t\t\tm_ref = att-&gt;getStable();\n\t\t\t\t\tm_ref-&gt;getSync()-&gt;leave();\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\n\t\t~EngineCheckout()\n\t\t{\n\t\t\tif (m_ref.hasData())\n\t\t\t\tm_ref-&gt;getSync()-&gt;enter(m_from);\n\n\t\t\t// If we were signalled to cancel/shutdown, react as soon as possible.\n\t\t\t// We cannot throw immediately, but we can reschedule ourselves.\n\n\t\t\tif (m_tdbb &amp;&amp; m_tdbb-&gt;tdbb_quantum &gt; 0 &amp;&amp; m_tdbb-&gt;getCancelState() != FB_SUCCESS)\n\t\t\t\tm_tdbb-&gt;tdbb_quantum = 0;\n\t\t}\n\n\t\t// copying is prohibited\n\t\tEngineCheckout(const EngineCheckout&amp;) = delete;\n\t\tEngineCheckout&amp; operator=(const EngineCheckout&amp;) = delete;\n\n\tprivate:\n\t\tthread_db* const m_tdbb;\n\t\tFirebird::RefPtr&lt;StableAttachmentPart&gt; m_ref;\n\t\tconst char* m_from;\n\t};\n\n\tclass CheckoutLockGuard\n\t{\n\tpublic:\n\t\tCheckoutLockGuard(thread_db* tdbb, Firebird::Mutex&amp; mutex,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_mutex(mutex)\n\t\t{\n\t\t\tif (!m_mutex.tryEnter(from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_mutex.enter(from);\n\t\t\t}\n\t\t}\n\n\t\t~CheckoutLockGuard()\n\t\t{\n\t\t\tm_mutex.leave();\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutLockGuard(const CheckoutLockGuard&amp;) = delete;\n\t\tCheckoutLockGuard&amp; operator=(const CheckoutLockGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Mutex&amp; m_mutex;\n\t};\n\n\tclass CheckoutSyncGuard\n\t{\n\tpublic:\n\t\tCheckoutSyncGuard(thread_db* tdbb, Firebird::SyncObject&amp; sync,\n\t\t\t\t\t\t  Firebird::SyncType type,\n\t\t\t\t\t\t  const char* from, bool optional = false)\n\t\t\t: m_sync(&amp;sync, from)\n\t\t{\n\t\t\tif (!m_sync.lockConditional(type, from))\n\t\t\t{\n\t\t\t\tEngineCheckout cout(tdbb, from, optional ? EngineCheckout::UNNECESSARY : EngineCheckout::REQUIRED);\n\t\t\t\tm_sync.lock(type);\n\t\t\t}\n\t\t}\n\n\t\t// copying is prohibited\n\t\tCheckoutSyncGuard(const CheckoutSyncGuard&amp;) = delete;\n\t\tCheckoutSyncGuard&amp; operator=(const CheckoutSyncGuard&amp;) = delete;\n\n\tprivate:\n\t\tFirebird::Sync m_sync;\n\t};\n}\n\n#endif // JRD_JRD_H\n"}, "/build/src/jrd/tpc.cpp": {"id": "/build/src/jrd/tpc.cpp", "filePath": "src/jrd/tpc.cpp", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\ttpc.cpp\n *\tDESCRIPTION:\tTIP Cache for Database\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/pag.h&quot;\n#include &quot;../jrd/cch_proto.h&quot;\n#include &quot;../jrd/lck_proto.h&quot;\n#include &quot;../jrd/ods_proto.h&quot;\n#include &quot;../jrd/tpc_proto.h&quot;\n#include &quot;../jrd/tra_proto.h&quot;\n#include &quot;../jrd/replication/Publisher.h&quot;\n#include &quot;../common/isc_proto.h&quot;\n\n#include &lt;sys/stat.h&gt;\n\nusing namespace Firebird;\n\nnamespace Jrd {\n\nvoid TipCache::MemoryInitializer::mutexBug(int osErrorCode, const char* text)\n{\n\tstring msg;\n\tmsg.printf(&quot;TPC: mutex %s error, status = %d&quot;, text, osErrorCode);\n\tfb_utils::logAndDie(msg.c_str());\n}\n\nbool TipCache::GlobalTpcInitializer::initialize(SharedMemoryBase* sm, bool initFlag)\n{\n\tGlobalTpcHeader* header = static_cast&lt;GlobalTpcHeader*&gt;(sm-&gt;sh_mem_header);\n\n\tif (!initFlag)\n\t{\n\t\tif (!checkHeader(header, false))\n\t\t\treturn false;\n\n\t\tm_cache-&gt;initTransactionsPerBlock(header-&gt;tpc_block_size);\n\t\tm_cache-&gt;mapInventoryPages(header);\n\t\treturn true;\n\t}\n\n\tthread_db* tdbb = JRD_get_thread_data();\n\tconst Database* dbb = tdbb-&gt;getDatabase();\n\n\t// Initialize the shared data header\n\tinitHeader(header);\n\n\theader-&gt;latest_commit_number.store(CN_PREHISTORIC, std::memory_order_relaxed);\n\theader-&gt;latest_statement_id.store(0, std::memory_order_relaxed);\n\theader-&gt;monitor_generation.store(0, std::memory_order_relaxed);\n\theader-&gt;tpc_block_size = dbb-&gt;dbb_config-&gt;getTipCacheBlockSize();\n\n\tm_cache-&gt;initTransactionsPerBlock(header-&gt;tpc_block_size);\n\tm_cache-&gt;loadInventoryPages(tdbb, header);\n\n\treturn true;\n}\n\nbool TipCache::SnapshotsInitializer::initialize(SharedMemoryBase* sm, bool initFlag)\n{\n\tif (!initFlag)\n\t\treturn true;\n\n\tSnapshotList* header = static_cast&lt;SnapshotList*&gt;(sm-&gt;sh_mem_header);\n\n\t// Initialize the shared data header\n\tinitHeader(header);\n\n\theader-&gt;slots_used.store(0, std::memory_order_relaxed);\n\theader-&gt;min_free_slot = 0;\n\tconst ULONG dataSize = sm-&gt;sh_mem_length_mapped - offsetof(SnapshotList, slots[0]);\n\theader-&gt;slots_allocated.store(dataSize / sizeof(SnapshotData), std::memory_order_relaxed);\n\n\treturn true;\n}\n\nbool TipCache::MemBlockInitializer::initialize(SharedMemoryBase* sm, bool initFlag)\n{\n\tif (!initFlag)\n\t\treturn true;\n\n\tTransactionStatusBlock* header = static_cast&lt;TransactionStatusBlock*&gt;(sm-&gt;sh_mem_header);\n\n\t// Initialize the shared data header\n\tinitHeader(header);\n\n\tmemset(header-&gt;data, 0, sm-&gt;sh_mem_length_mapped - offsetof(TransactionStatusBlock, data[0]));\n\n\tfb_assert(header-&gt;data-&gt;is_lock_free());\n\n\treturn true;\n}\n\nTipCache::TipCache(Database* dbb)\n\t: m_tpcHeader(NULL), m_snapshots(NULL), m_transactionsPerBlock(0), m_lock(nullptr),\n\t  globalTpcInitializer(this), snapshotsInitializer(this), memBlockInitializer(this),\n\t  m_blocks_memory(*dbb-&gt;dbb_permanent)\n{\n}\n\nTipCache::~TipCache()\n{\n\t// Make sure that object is finalized before being deleted\n\tfb_assert(!m_blocks_memory.getFirst());\n\tfb_assert(!m_snapshots);\n\tfb_assert(!m_tpcHeader);\n\tfb_assert(m_transactionsPerBlock == 0);\n\tfb_assert((!m_lock.hasData()) || m_lock-&gt;lck_logical == LCK_none);\n\n\t// Avoid worse case\n\tif (m_lock.hasData() &amp;&amp; (m_lock-&gt;lck_logical != LCK_none))\n\t\tLCK_release(JRD_get_thread_data(), m_lock);\n}\n\nvoid TipCache::finalizeTpc(thread_db* tdbb)\n{\n\t// check for finalizeTpc() called more than once\n\tif (!m_lock.hasData())\n\t\treturn;\n\n\t// To avoid race conditions, this function might only\n\t// be called during database shutdown when AST delivery is already disabled\n\n\t// wait for all initializing processes (PR)\n\tif (!LCK_convert(tdbb, m_lock, LCK_SW, LCK_WAIT))\n\t\tERR_bugcheck_msg(&quot;Unable to convert TPC lock (SW)&quot;);\n\n\t// Release locks and deallocate all shared memory structures\n\tif (m_blocks_memory.getFirst())\n\t{\n\t\tdo\n\t\t{\n\t\t\tStatusBlockData* cur = m_blocks_memory.current();\n\t\t\tdelete cur;\n\t\t} while (m_blocks_memory.getNext());\n\t}\n\n\tPathName nmSnap, nmHdr;\n\tif (m_snapshots)\n\t{\n\t\tnmSnap = m_snapshots-&gt;getMapFileName();\n\t\tdelete m_snapshots;\n\t\tm_snapshots = NULL;\n\t}\n\n\tif (m_tpcHeader)\n\t{\n\t\tnmHdr = m_tpcHeader-&gt;getMapFileName();\n\t\tdelete m_tpcHeader;\n\t\tm_tpcHeader = NULL;\n\t}\n\n\tm_blocks_memory.clear();\n\tm_transactionsPerBlock = 0;\n\n    if (nmSnap.hasData() || nmHdr.hasData())\n    {\n    \tif (LCK_lock(tdbb, m_lock, LCK_EX, LCK_NO_WAIT))\n\t\t{\n\t\t\tif (nmSnap.hasData())\n\t\t\t\tSharedMemoryBase::unlinkFile(nmSnap.c_str());\n\t\t\tif (nmHdr.hasData())\n\t\t\t\tSharedMemoryBase::unlinkFile(nmHdr.c_str());\n\n\t\t\tLCK_release(tdbb, m_lock);\n\t\t}\n\t\telse\n\t\t\ttdbb-&gt;tdbb_status_vector-&gt;init();\n\t}\n\telse\n\t\tLCK_release(tdbb, m_lock);\n\n\tm_lock.reset();\n}\n\nCommitNumber TipCache::cacheState(TraNumber number)\n{\n\tfb_assert(m_tpcHeader);\n\tconst GlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\tconst TraNumber oldest = header-&gt;oldest_transaction.load(std::memory_order_relaxed);\n\n\tif (number &lt; oldest)\n\t\treturn CN_PREHISTORIC;\n\n\tconst TpcBlockNumber blockNumber = number / m_transactionsPerBlock;\n\tconst ULONG offset = number % m_transactionsPerBlock;\n\n\tSync sync(&amp;m_sync_status, FB_FUNCTION);\n\tconst TransactionStatusBlock* block = getTransactionStatusBlock(header, blockNumber, sync);\n\n\t// This should not really happen ever\n\tfb_assert(block);\n\n\tif (!block)\n\t\treturn CN_PREHISTORIC;\n\n\t// Barrier is not needed here when we are reading state from cache\n\t// because all callers of this function are prepared to handle\n\t// slightly out-dated information and will take slow path if necessary\n\tCommitNumber state = block-&gt;data[offset];\n\n\treturn state;\n}\n\nvoid TipCache::initializeTpc(thread_db *tdbb)\n{\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\t// Initialization can only be called on a TipCache that is not initialized\n\tfb_assert(!m_transactionsPerBlock);\n\n\tm_lock = FB_NEW_RPT(*dbb-&gt;dbb_permanent, 0) Lock(tdbb, 0, LCK_tpc_init);\n\n\t// wait for finalizers (SW) locks\n\tif (!LCK_lock(tdbb, m_lock, LCK_PR, LCK_WAIT))\n\t\tERR_bugcheck_msg(&quot;Unable to obtain TPC lock (PR)&quot;);\n\n\tstring fileName;\n\tfileName.printf(TPC_HDR_FILE, dbb-&gt;getUniqueFileId().c_str());\n\n\ttry\n\t{\n\t\tm_tpcHeader = FB_NEW_POOL(*dbb-&gt;dbb_permanent) SharedMemory&lt;GlobalTpcHeader&gt;(\n\t\t\tfileName.c_str(), sizeof(GlobalTpcHeader), &amp;globalTpcInitializer);\n\n\t\tconst auto* header = m_tpcHeader-&gt;getHeader();\n\t\tglobalTpcInitializer.checkHeader(header);\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\tiscLogException(&quot;TPC: Cannot initialize the shared memory region (header)&quot;, ex);\n\n\t\tLCK_convert(tdbb, m_lock, LCK_SR, LCK_WAIT);\t// never fails\n\t\tfinalizeTpc(tdbb);\n\t\tthrow;\n\t}\n\n\ttry\n\t{\n\t\tfileName.printf(SNAPSHOTS_FILE, dbb-&gt;getUniqueFileId().c_str());\n\t\tm_snapshots = FB_NEW_POOL(*dbb-&gt;dbb_permanent) SharedMemory&lt;SnapshotList&gt;(\n\t\t\tfileName.c_str(), dbb-&gt;dbb_config-&gt;getSnapshotsMemSize(), &amp;snapshotsInitializer);\n\n\t\tconst auto* header = m_snapshots-&gt;getHeader();\n\t\tsnapshotsInitializer.checkHeader(header);\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\tiscLogException(&quot;TPC: Cannot initialize the shared memory region (snapshots)&quot;, ex);\n\n\t\tLCK_convert(tdbb, m_lock, LCK_SR, LCK_WAIT);\t// never fails\n\t\tfinalizeTpc(tdbb);\n\t\tthrow;\n\t}\n\n\tfb_assert(m_snapshots-&gt;getHeader()-&gt;mhb_version == TPC_VERSION);\n\n\tLCK_convert(tdbb, m_lock, LCK_SR, LCK_WAIT);\t// never fails\n}\n\nvoid TipCache::initTransactionsPerBlock(ULONG blockSize) noexcept\n{\n\tif (m_transactionsPerBlock)\n\t\treturn;\n\n\tconstexpr ULONG dataOffset = static_cast&lt;ULONG&gt;(offsetof(TransactionStatusBlock, data[0]));\n\tm_transactionsPerBlock = (blockSize - dataOffset) / sizeof(CommitNumber);\n}\n\nvoid TipCache::loadInventoryPages(thread_db* tdbb, GlobalTpcHeader* header)\n{\n\t// check the header page for the oldest and newest transaction numbers\n\n#ifdef SUPERSERVER_V2\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tconst TraNumber top = dbb-&gt;dbb_next_transaction;\n\tconst TraNumber hdr_oldest = dbb-&gt;dbb_oldest_transaction;\n#else\n\tWIN window(HEADER_PAGE_NUMBER);\n\tconst auto* header_page = (Ods::header_page*) CCH_FETCH(tdbb, &amp;window, LCK_read, pag_header);\n\tconst TraNumber hdr_next_transaction = header_page-&gt;hdr_next_transaction;\n\tconst TraNumber hdr_oldest_transaction = header_page-&gt;hdr_oldest_transaction;\n\tconst AttNumber hdr_attachment_id = header_page-&gt;hdr_attachment_id;\n\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\n\theader-&gt;latest_transaction_id.store(hdr_next_transaction, std::memory_order_relaxed);\n\theader-&gt;oldest_transaction.store(hdr_oldest_transaction, std::memory_order_relaxed);\n\theader-&gt;latest_attachment_id.store(hdr_attachment_id, std::memory_order_relaxed);\n\n\t// Check if TIP has any interesting transactions.\n\t// At database creation time, it doesn&#x27;t and the code below breaks\n\t// if there isn&#x27;t a single one transaction to care about.\n\tif (hdr_oldest_transaction &gt;= hdr_next_transaction)\n\t\treturn;\n\n\t// Round down the oldest to a multiple of four, which puts the\n\t// transaction in temporary buffer on a byte boundary\n\tconst TraNumber base = hdr_oldest_transaction &amp; ~TRA_MASK;\n\n\tconst FB_SIZE_T buffer_length = (hdr_next_transaction + 1 - base + TRA_MASK) / 4;\n\tArray&lt;UCHAR&gt; transactions(buffer_length);\n\n\tUCHAR* buffer = transactions.begin();\n\tTRA_get_inventory(tdbb, buffer, base, hdr_next_transaction);\n\n\tstatic const CommitNumber init_state_mapping[4] = {CN_ACTIVE, CN_LIMBO, CN_DEAD, CN_PREHISTORIC};\n\n\tTpcBlockNumber blockNumber = hdr_oldest_transaction / m_transactionsPerBlock;\n\tULONG transOffset = hdr_oldest_transaction % m_transactionsPerBlock;\n\n\tSyncLockGuard sync(&amp;m_sync_status, SYNC_EXCLUSIVE, FB_FUNCTION);\n\tTransactionStatusBlock* statusBlock = createTransactionStatusBlock(header-&gt;tpc_block_size, blockNumber);\n\n\tfor (TraNumber t = hdr_oldest_transaction; ; )\n\t{\n\t\tconst int state = TRA_state(buffer, base, t);\n\t\tconst CommitNumber cn = init_state_mapping[state];\n\n\t\t// Barrier is not needed as our thread is the only one here.\n\t\t// At the same time, simple write to a volatile variable is not good\n\t\t// as it is not deterministic. Some compilers generate barriers and some do not.\n\t\t(statusBlock-&gt;data + transOffset)-&gt;store(cn, std::memory_order_relaxed);\n\n\t\tif (++t &gt; hdr_next_transaction)\n\t\t\tbreak;\n\n\t\tif (++transOffset == m_transactionsPerBlock)\n\t\t{\n\t\t\tblockNumber++;\n\t\t\ttransOffset = 0;\n\t\t\tstatusBlock = createTransactionStatusBlock(header-&gt;tpc_block_size, blockNumber);\n\t\t}\n\t}\n}\n\nvoid TipCache::mapInventoryPages(const GlobalTpcHeader* header)\n{\n\tTpcBlockNumber blockNumber = header-&gt;oldest_transaction / m_transactionsPerBlock;\n\tconst TpcBlockNumber lastNumber = header-&gt;latest_transaction_id / m_transactionsPerBlock;\n\n\tfor (; blockNumber &lt;= lastNumber; blockNumber++)\n\t{\n\t\tSync sync(&amp;m_sync_status, FB_FUNCTION);\n\t\tgetTransactionStatusBlock(header, blockNumber, sync);\n\t}\n}\n\nTipCache::StatusBlockData::StatusBlockData(thread_db* tdbb, TipCache* tipCache, ULONG blockSize, TpcBlockNumber blkNumber)\n\t: blockNumber(blkNumber),\n\t  memory(NULL),\n\t  existenceLock(tdbb, sizeof(TpcBlockNumber), LCK_tpc_block, this, tpc_block_blocking_ast),\n\t  cache(tipCache),\n\t  acceptAst(false)\n{\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\texistenceLock.setKey(blockNumber);\n\n\tif (!LCK_lock(tdbb, &amp;existenceLock, LCK_PR, LCK_WAIT))\n\t\tERR_bugcheck_msg(&quot;Unable to obtain memory block lock&quot;);\n\n\tPathName fileName = makeSharedMemoryFileName(dbb, blockNumber, false);\n\n\ttry\n\t{\n\t\t// Here SharedMemory constructor is called with skipLock parameter set to true.\n\t\t// Appropriate locking is performed by existenceLock using LM.\n\t\t// This should be in sync with SharedMemoryBase::unlinkFile() call\n\t\t// in TipCache::StatusBlockData::clear().\n\t\tmemory = FB_NEW_POOL(*dbb-&gt;dbb_permanent) SharedMemory&lt;TransactionStatusBlock&gt;(\n\t\t\tfileName.c_str(), blockSize,\n\t\t\t&amp;cache-&gt;memBlockInitializer, true);\n\n\t\tconst auto* header = memory-&gt;getHeader();\n\t\tcache-&gt;memBlockInitializer.checkHeader(header);\n\n\t\tLCK_convert(tdbb, &amp;existenceLock, LCK_SR, LCK_WAIT);\t// never fails\n\t\tacceptAst = true;\n\t}\n\tcatch (const Exception&amp; ex)\n\t{\n\t\tiscLogException(&quot;TPC: Cannot initialize the shared memory region (transactions status block)&quot;, ex);\n\t\tLCK_release(tdbb, &amp;existenceLock);\n\t\tthrow;\n\t}\n\n\tfb_assert(memory-&gt;getHeader()-&gt;mhb_version == TPC_VERSION);\n}\n\nPathName TipCache::StatusBlockData::makeSharedMemoryFileName(Database* dbb, TpcBlockNumber n, bool fullPath)\n{\n\tPathName fileName;\n\tfileName.printf(TPC_BLOCK_FILE, dbb-&gt;getUniqueFileId().c_str(), n);\n\tif (!fullPath)\n\t\treturn fileName;\n\n\tTEXT expanded_filename[MAXPATHLEN];\n\tiscPrefixLock(expanded_filename, fileName.c_str(), false);\n\treturn PathName(expanded_filename);\n}\n\nTipCache::StatusBlockData::~StatusBlockData()\n{\n\tthread_db* tdbb = JRD_get_thread_data();\n\tclear(tdbb);\n}\n\nvoid TipCache::StatusBlockData::clear(thread_db* tdbb)\n{\n\t// memory could be already released at tpc_block_blocking_ast\n\tPathName fName;\n\tif (memory)\n\t{\n\t\t// wait for all initializing processes (PR)\n\t\tacceptAst = false;\n\n\t\tTraNumber oldest;\n\t\tif (cache-&gt;m_tpcHeader)\n\t\t\toldest = cache-&gt;m_tpcHeader-&gt;getHeader()-&gt;oldest_transaction.load(std::memory_order_relaxed);\n\t\telse\n\t\t{\n\t\t\tconst Database* dbb = tdbb-&gt;getDatabase();\n\t\t\tif (dbb-&gt;dbb_flags &amp; DBB_shared)\n\t\t\t\toldest = dbb-&gt;dbb_oldest_transaction;\n\t\t\telse\n\t\t\t{\n\t\t\t\tWIN window(HEADER_PAGE_NUMBER);\n\t\t\t\tconst auto* header_page = (Ods::header_page*) CCH_FETCH(tdbb, &amp;window, LCK_read, pag_header);\n\t\t\t\toldest = header_page-&gt;hdr_oldest_transaction;\n\t\t\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\t\t}\n\t\t}\n\n\t\tif (blockNumber &lt; oldest / cache-&gt;m_transactionsPerBlock &amp;&amp;\t\t\t// old block =&gt; send AST\n\t\t\t!LCK_convert(tdbb, &amp;existenceLock, LCK_SW, LCK_WAIT))\n\t\t{\n\t\t\tERR_bugcheck_msg(&quot;Unable to convert TPC lock (SW)&quot;);\n\t\t}\n\n\t\tfName = memory-&gt;getMapFileName();\n\t\tdelete memory;\n\t\tmemory = NULL;\n\t}\n\n\tif (fName.hasData())\n\t{\n\t\t// Here file is removed from SharedMemory created with skipLock parameter\n\t\t// set to true. That means internal file lock is turned off.\n\t\t// Appropriate locking is performed by existenceLock using LM.\n\t\t// This should be in sync with SharedMemory constructor called\n\t\t// in TipCache::StatusBlockData constructor.\n\t\tif (LCK_lock(tdbb, &amp;existenceLock, LCK_EX, LCK_NO_WAIT))\n\t\t\tSharedMemoryBase::unlinkFile(fName.c_str());\n\t\telse\n\t\t{\n\t\t\ttdbb-&gt;tdbb_status_vector-&gt;init();\n\t\t\treturn;\n\t\t}\n\t}\n\n\tLCK_release(tdbb, &amp;existenceLock);\n}\n\nTipCache::TransactionStatusBlock* TipCache::createTransactionStatusBlock(ULONG blockSize, TpcBlockNumber blockNumber)\n{\n\tfb_assert(m_sync_status.ourExclusiveLock());\n\n\tthread_db* tdbb = JRD_get_thread_data();\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\tStatusBlockData* blockData = FB_NEW_POOL(*dbb-&gt;dbb_permanent)\n\t\tStatusBlockData(tdbb, this, blockSize, blockNumber);\n\n\tm_blocks_memory.add(blockData);\n\n\treturn blockData-&gt;memory-&gt;getHeader();\n}\n\nTipCache::TransactionStatusBlock* TipCache::getTransactionStatusBlock(const GlobalTpcHeader* header, TpcBlockNumber blockNumber, Sync&amp; sync)\n{\n\tfb_assert(sync.getState() == SYNC_NONE);\n\n\t// This is a double-checked locking pattern. SyncLockGuard uses atomic ops internally and should be cheap\n\tTransactionStatusBlock* block = NULL;\n\t{\n\t\tsync.lock(SYNC_SHARED);\n\t\tBlocksMemoryMap::ConstAccessor acc(&amp;m_blocks_memory);\n\t\tif (acc.locate(blockNumber))\n\t\t\tblock = acc.current()-&gt;memory-&gt;getHeader();\n\t\telse\n\t\t\tsync.unlock();\n\t}\n\n\tif (!block)\n\t{\n\t\tsync.lock(SYNC_EXCLUSIVE);\n\t\tBlocksMemoryMap::ConstAccessor acc(&amp;m_blocks_memory);\n\t\tif (acc.locate(blockNumber))\n\t\t\tblock = acc.current()-&gt;memory-&gt;getHeader();\n\t\telse\n\t\t{\n\t\t\t// Check if block might be too old to be created.\n\t\t\tconst TraNumber oldest = header-&gt;oldest_transaction.load(std::memory_order_relaxed);\n\t\t\tif (blockNumber &gt;= oldest / m_transactionsPerBlock)\n\t\t\t\tblock = createTransactionStatusBlock(header-&gt;tpc_block_size, blockNumber);\n\t\t\telse\n\t\t\t\tsync.unlock();\n\t\t}\n\t}\n\treturn block;\n}\n\nTraNumber TipCache::findStates(TraNumber minNumber, TraNumber maxNumber, ULONG mask, int&amp; state)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tconst GlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\tTransactionStatusBlock* statusBlock = nullptr;\n\tULONG transOffset = 0;\n\n\tSync sync(&amp;m_sync_status, FB_FUNCTION);\n\tfor (TraNumber tran = minNumber; ; tran++, transOffset++)\n\t{\n\t\tif (transOffset == m_transactionsPerBlock)\n\t\t{\n\t\t\tsync.unlock();\n\t\t\tstatusBlock = nullptr;\n\t\t}\n\n\t\twhile (!statusBlock)\n\t\t{\n\t\t\tconst TraNumber oldest = header-&gt;oldest_transaction.load(std::memory_order_relaxed);\n\n\t\t\tif (tran &lt; oldest)\n\t\t\t\ttran = oldest;\n\n\t\t\tconst TpcBlockNumber blockNumber = tran / m_transactionsPerBlock;\n\t\t\ttransOffset = tran % m_transactionsPerBlock;\n\t\t\tstatusBlock = getTransactionStatusBlock(header, blockNumber, sync);\n\n\t\t\tif (sync.getState() == SYNC_EXCLUSIVE)\n\t\t\t\tsync.downgrade(SYNC_SHARED);\n\t\t}\n\n\t\tif (tran &gt;= maxNumber)\n\t\t\tbreak;\n\n\t\t// Barrier is not needed here. Slightly out-dated information shall be ok here.\n\t\t// Such transaction shall already be considered active by our caller.\n\t\t// TODO: check if this assumption is indeed correct.\n\n\t\tconst CommitNumber cn = (statusBlock-&gt;data + transOffset)-&gt;load(std::memory_order_relaxed);\n\t\tswitch (cn)\n\t\t{\n\t\tcase CN_ACTIVE:\n\t\t\tstate = tra_active;\n\t\t\tbreak;\n\n\t\tcase CN_LIMBO:\n\t\t\tstate = tra_limbo;\n\t\t\tbreak;\n\n\t\tcase CN_DEAD:\n\t\t\tstate = tra_dead;\n\t\t\tbreak;\n\n\t\tcase CN_MAX_NUMBER:\n\t\t\tfb_assert(false);\n\t\t\t[[fallthrough]];\n\n\t\tdefault:\n\t\t\tstate = tra_committed;\n\t\t\tbreak;\n\t\t}\n\n\t\tif (((1UL &lt;&lt; state) &amp; mask) != 0)\n\t\t\treturn tran;\n\t}\n\n\treturn 0;\n}\n\nCommitNumber TipCache::setState(TraNumber number, int state)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\tconst TpcBlockNumber blockNumber = number / m_transactionsPerBlock;\n\tULONG offset = number % m_transactionsPerBlock;\n\n\tSync sync(&amp;m_sync_status, FB_FUNCTION);\n\tTransactionStatusBlock* block = getTransactionStatusBlock(header, blockNumber, sync);\n\n\t// This should not really happen\n\tif (!block)\n\t\tERR_bugcheck_msg(&quot;TPC: Attempt to change state of old transaction&quot;);\n\n\tstd::atomic&lt;CommitNumber&gt;* statePtr = block-&gt;data + offset;\n\tconst CommitNumber oldStateCn = statePtr-&gt;load(std::memory_order_relaxed);\n\tswitch (state)\n\t{\n\t\tcase tra_committed:\n\t\t{\n\t\t\tif (oldStateCn == CN_DEAD)\n\t\t\t\tERR_bugcheck_msg(&quot;TPC: Attempt to commit dead transaction&quot;);\n\n\t\t\t// If transaction is already committed - do nothing\n\t\t\tif (oldStateCn &gt;= CN_PREHISTORIC &amp;&amp; oldStateCn &lt;= CN_MAX_NUMBER)\n\t\t\t\treturn oldStateCn;\n\n\t\t\t// We verified for all other cases, transaction must either be Active or in Limbo\n\t\t\tfb_assert(oldStateCn == CN_ACTIVE || oldStateCn == CN_LIMBO);\n\n\t\t\t// Generate new commit number\n\t\t\tCommitNumber newCommitNumber = header-&gt;latest_commit_number++ + 1;\n\n\t\t\tstatePtr-&gt;store(newCommitNumber, std::memory_order_relaxed);\n\t\t\treturn newCommitNumber;\n\t\t}\n\n\t\tcase tra_limbo:\n\t\t\tif (oldStateCn == CN_LIMBO)\n\t\t\t\treturn CN_LIMBO;\n\n\t\t\tif (oldStateCn != CN_ACTIVE)\n\t\t\t\tERR_bugcheck_msg(&quot;TPC: Attempt to mark inactive transaction to be in limbo&quot;);\n\n\t\t\tstatePtr-&gt;store(CN_LIMBO, std::memory_order_relaxed);\n\n\t\t\treturn CN_LIMBO;\n\n\t\tcase tra_dead:\n\t\t\tif (oldStateCn == CN_DEAD)\n\t\t\t\treturn CN_DEAD;\n\n\t\t\tif (oldStateCn != CN_ACTIVE &amp;&amp; oldStateCn != CN_LIMBO)\n\t\t\t\tERR_bugcheck_msg(&quot;TPC: Attempt to mark inactive transaction to be dead&quot;);\n\n\t\t\tstatePtr-&gt;store(CN_DEAD, std::memory_order_relaxed);\n\n\t\t\treturn CN_DEAD;\n\n\t\tdefault:\n\t\t\tERR_bugcheck_msg(&quot;TPC: Attempt to mark invalid transaction state&quot;);\n\t\t\treturn CN_ACTIVE; // silence the compiler\n\t}\n}\n\nCommitNumber TipCache::snapshotState(thread_db* tdbb, TraNumber number)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\n\t// Get data from cache\n\tCommitNumber stateCn = cacheState(number);\n\n\t// Transaction is committed or dead?\n\tif (stateCn == CN_DEAD || (stateCn &gt;= CN_PREHISTORIC &amp;&amp; stateCn &lt;= CN_MAX_NUMBER))\n\t\treturn stateCn;\n\n\t// We excluded all other cases above\n\tfb_assert(stateCn == CN_ACTIVE || stateCn == CN_LIMBO);\n\n\t// Query lock data for a transaction; if we can then we know it is still active.\n\t//\n\t// This logic differs from original TPC implementation as follows:\n\t// 1. We use read_data instead of taking a lock, to avoid possible race conditions\n\t//    (they were probably not causing much harm, but consistency is a good thing)\n\t// 2. Old TPC returned tra_active for transactions in limbo, which was not correct\n\t//\n\t// hvlad: tra_active is correct here as it allows caller to wait for prepared but\n\t// still active transaction\n\tLock temp_lock(tdbb, sizeof(TraNumber), LCK_tra);\n\ttemp_lock.setKey(number);\n\n\tif (LCK_read_data(tdbb, &amp;temp_lock))\n\t\treturn CN_ACTIVE;\n\n\t// Go to disk, and obtain state of our transaction from TIP\n\tconst int state = TRA_fetch_state(tdbb, number);\n\n\t// We already know for sure that this transaction cannot be active, so mark it dead now\n\t// to avoid more work in the future\n\tif (state == tra_active)\n\t{\n\t\tREPL_trans_cleanup(tdbb, number);\n\t\tTRA_set_state(tdbb, 0, number, tra_dead); // This will update TIP cache\n\t\treturn CN_DEAD;\n\t}\n\n\t// Update cache and return new state\n\tstateCn = setState(number, state);\n\treturn stateCn;\n}\n\nvoid TipCache::updateOldestTransaction(thread_db *tdbb, TraNumber oldest, TraNumber oldestSnapshot)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\tconst TraNumber oldestNew = MIN(oldest, oldestSnapshot);\n\tconst TraNumber oldestNow = header-&gt;oldest_transaction.load(std::memory_order_relaxed);\n\tif (oldestNew &gt; oldestNow)\n\t{\n\t\theader-&gt;oldest_transaction.store(oldestNew, std::memory_order_relaxed);\n\t\treleaseSharedMemory(tdbb, oldestNow, oldestNew);\n\t}\n}\n\nint TipCache::tpc_block_blocking_ast(void* arg)\n{\n\tStatusBlockData* data = static_cast&lt;StatusBlockData*&gt;(arg);\n\n\ttry\n\t{\n\t\tDatabase* dbb = data-&gt;existenceLock.lck_dbb;\n\t\tAsyncContextHolder tdbb(dbb, FB_FUNCTION);\n\n\t\t// Should we try to process AST?\n\t\tif (!data-&gt;acceptAst)\n\t\t\treturn 0;\n\n\t\tTipCache* cache = data-&gt;cache;\n\t\tconst TraNumber oldest =\n\t\t\tcache-&gt;m_tpcHeader-&gt;getHeader()-&gt;oldest_transaction.load(std::memory_order_relaxed);\n\n\t\t// Is data block really old?\n\t\tif (data-&gt;blockNumber &gt;= oldest / cache-&gt;m_transactionsPerBlock)\n\t\t\treturn 0;\n\n\t\t// Release shared memory\n\t\tif (data-&gt;memory)\n\t\t{\n\t\t\tdelete data-&gt;memory;\n\t\t\tdata-&gt;memory = NULL;\n\t\t}\n\t\tLCK_release(tdbb, &amp;data-&gt;existenceLock);\n\t}\n\tcatch (const Exception&amp;)\n\t{ }\n\n\treturn 0;\n}\n\n\n\n\nvoid TipCache::releaseSharedMemory(thread_db* tdbb, TraNumber oldest_old, TraNumber oldest_new)\n{\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\n\tconst TpcBlockNumber lastInterestingBlockNumber = oldest_new / m_transactionsPerBlock;\n\n\t// If we didn&#x27;t cross block boundary - there is nothing to do.\n\t// Note that due to the fuzziness of our caller&#x27;s memory access to variables\n\t// there is an unlikely possibility that we might lose one such event.\n\t// This is not too bad, and next such event will clean things up.\n\tif (oldest_old / m_transactionsPerBlock == lastInterestingBlockNumber)\n\t\treturn;\n\n\t// Populate array of blocks that might be unmapped and deleted.\n\t// We scan for blocks to clean up in descending order, but delete them in\n\t// ascending order to ensure for robust operation.\n\tHalfStaticArray&lt;TpcBlockNumber, 16&gt; blocksToCleanup;\n\n\tfor (TpcBlockNumber cleanupCounter = lastInterestingBlockNumber - SAFETY_GAP_BLOCKS;\n\t\tcleanupCounter; cleanupCounter--)\n\t{\n\t\tconst TpcBlockNumber blockNumber = cleanupCounter - 1;\n\t\tPathName fileName = StatusBlockData::makeSharedMemoryFileName(dbb, blockNumber, true);\n\n\t\tstruct stat st;\n\t\t// If file is not found -- look no further\n\t\tif (stat(fileName.c_str(), &amp;st) != 0)\n\t\t\tbreak;\n\n\t\tblocksToCleanup.add(blockNumber);\n\t}\n\n\tif (blocksToCleanup.isEmpty())\n\t\treturn;\n\n\tSyncLockGuard sync(&amp;m_sync_status, SYNC_EXCLUSIVE, FB_FUNCTION);\n\twhile (blocksToCleanup.hasData())\n\t{\n\t\tconst TpcBlockNumber blockNumber = blocksToCleanup.pop();\n\n\t\tif (m_blocks_memory.locate(blockNumber))\n\t\t{\n\t\t\tStatusBlockData* block = m_blocks_memory.current();\n\t\t\tm_blocks_memory.fastRemove();\n\t\t\tdelete block;\n\t\t}\n\n\t\t// Signal other processes to release resources\n\t\tLock temp(tdbb, sizeof(TpcBlockNumber), LCK_tpc_block);\n\t\ttemp.setKey(blockNumber);\n\t\tif (!LCK_lock(tdbb, &amp;temp, LCK_EX, LCK_WAIT))\n\t\t{\n\t\t\tgds__log(&quot;TPC BUG: Unable to obtain cleanup lock for block %&quot; UQUADFORMAT, blockNumber);\n\t\t\tfb_assert(false);\n\t\t\tbreak;\n\t\t}\n\n\t\t// Always delete file when EX lock is taken\n\t\tPathName fileName = StatusBlockData::makeSharedMemoryFileName(dbb, blockNumber, true);\n\t\tunlink(fileName.c_str());\n\n\t\tLCK_release(tdbb, &amp;temp);\n\t}\n}\n\nSnapshotHandle TipCache::allocateSnapshotSlot()\n{\n\t// Try finding available slot\n\tSnapshotList* snapshots = m_snapshots-&gt;getHeader();\n\n\t// Scan previously used slots first\n\tSnapshotHandle slotNumber;\n\n\tconst ULONG slots_used = snapshots-&gt;slots_used.load(std::memory_order_relaxed);\n\tfor (slotNumber = snapshots-&gt;min_free_slot; slotNumber &lt; slots_used; slotNumber++)\n\t{\n\t\tif (!snapshots-&gt;slots[slotNumber].attachment_id.load(std::memory_order_relaxed))\n\t\t\treturn slotNumber;\n\t}\n\n\t// See if we have some space left in the snapshots block\n\tif (slotNumber &lt; snapshots-&gt;slots_allocated.load(std::memory_order_relaxed))\n\t{\n\t\tsnapshots-&gt;slots_used.store(slotNumber + 1, std::memory_order_release);\n\t\treturn slotNumber;\n\t}\n\n#ifdef HAVE_OBJECT_MAP\n\tLocalStatus ls;\n\tCheckStatusWrapper localStatus(&amp;ls);\n\tif (!m_snapshots-&gt;remapFile(&amp;localStatus, m_snapshots-&gt;sh_mem_length_mapped * 2, true))\n\t{\n\t\tstatus_exception::raise(&amp;localStatus);\n\t}\n\n\tsnapshots = m_snapshots-&gt;getHeader();\n\tsnapshots-&gt;slots_allocated.store(\n\t\tstatic_cast&lt;ULONG&gt;((m_snapshots-&gt;sh_mem_length_mapped - offsetof(SnapshotList, slots[0])) / sizeof(SnapshotData)),\n\t\tstd::memory_order_release);\n#else\n\t// NS: I do not intend to assign a code to this condition, because I think that we do not\n\t// support platforms without HAVE_OBJECT_MAP capability, and the code below needs to be cleaned out\n\t// sooner or later. And even if need to support such a platform suddenly appears we shall make it\n\t// fail in remapFile code and not here.\n\t(Arg::Gds(isc_random) &lt;&lt;\n\t\t&quot;Snapshots shared memory block is full on a platform that does not support shared memory remapping&quot;).raise();\n#endif\n\n\tfb_assert(slotNumber &lt; snapshots-&gt;slots_allocated.load(std::memory_order_relaxed));\n\tsnapshots-&gt;slots_used.store(slotNumber + 1, std::memory_order_release);\n\treturn slotNumber;\n}\n\nvoid TipCache::remapSnapshots(bool sync)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\n\tconst SnapshotList* snapshots = m_snapshots-&gt;getHeader();\n\n\tif (snapshots-&gt;slots_allocated.load(std::memory_order_acquire) !=\n\t\t(m_snapshots-&gt;sh_mem_length_mapped - offsetof(SnapshotList, slots[0])) / sizeof(SnapshotData))\n\t{\n\t\tSharedMutexGuard guard(m_snapshots, false);\n\t\tif (sync)\n\t\t\tguard.lock();\n\n\t\tLocalStatus ls;\n\t\tCheckStatusWrapper localStatus(&amp;ls);\n\t\tif (!m_snapshots-&gt;remapFile(&amp;localStatus,\n\t\t\tstatic_cast&lt;ULONG&gt;(\n\t\t\t\tsnapshots-&gt;slots_allocated.load(std::memory_order_relaxed) * sizeof(SnapshotData) +\n\t\t\t\t\toffsetof(SnapshotList, slots[0])), false))\n\t\t{\n\t\t\tstatus_exception::raise(&amp;localStatus);\n\t\t}\n\t}\n}\n\n\nSnapshotHandle TipCache::beginSnapshot(thread_db* tdbb, AttNumber attachmentId, CommitNumber&amp; commitNumber)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tconst GlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\tfb_assert(attachmentId);\n\n\t// Lock mutex\n\tSharedMutexGuard guard(m_snapshots);\n\n\t// Remap snapshot list if it has been grown by someone else\n\tremapSnapshots(false);\n\n\tSnapshotList* snapshots = m_snapshots-&gt;getHeader();\n\n\tif (commitNumber != 0)\n\t{\n\t\tconst ULONG slotsUsed = snapshots-&gt;slots_used.load(std::memory_order_relaxed);\n\t\tbool found = false;\n\n\t\tfor (SnapshotHandle slotNumber = 0; slotNumber &lt; slotsUsed; ++slotNumber)\n\t\t{\n\t\t\tif (snapshots-&gt;slots[slotNumber].attachment_id.load(std::memory_order_relaxed) != 0 &amp;&amp;\n\t\t\t\tsnapshots-&gt;slots[slotNumber].snapshot.load(std::memory_order_relaxed) == commitNumber)\n\t\t\t{\n\t\t\t\tfound = true;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\tif (!found)\n\t\t\tERR_post(Arg::Gds(isc_tra_snapshot_does_not_exist));\n\t}\n\n\tSnapshotHandle slotNumber = allocateSnapshotSlot();\n\n\t// Note, that allocateSnapshotSlot might remap memory and thus invalidate pointers\n\tsnapshots = m_snapshots-&gt;getHeader();\n\n\t// Store snapshot commit number and return handle\n\tSnapshotData* slot = snapshots-&gt;slots + slotNumber;\n\n\tif (commitNumber == 0)\n\t\tcommitNumber = header-&gt;latest_commit_number.load(std::memory_order_acquire);\n\n\tslot-&gt;snapshot.store(commitNumber, std::memory_order_release);\n\n\t// Only assign attachment_id after we completed all other work\n\tslot-&gt;attachment_id.store(attachmentId, std::memory_order_release);\n\n\t// And now move allocator watermark position after we used slot for sure\n\tsnapshots-&gt;min_free_slot = slotNumber + 1;\n\n\treturn slotNumber;\n}\n\nvoid TipCache::deallocateSnapshotSlot(SnapshotHandle slotNumber)\n{\n\t// Note: callers of this function assume that it cannot remap\n\t// shared memory (as they keep shared memory pointers).\n\n\tSnapshotList* snapshots = m_snapshots-&gt;getHeader();\n\n\t// At first, make slot available for allocator (this is always safe)\n\tif (snapshots-&gt;min_free_slot &gt; slotNumber)\n\t\tsnapshots-&gt;min_free_slot = slotNumber;\n\n\tSnapshotData* slot = snapshots-&gt;slots + slotNumber;\n\n\tslot-&gt;snapshot.store(0, std::memory_order_release);\n\tslot-&gt;attachment_id.store(0, std::memory_order_release);\n\n\t// After we completed deallocation, update used slots count, if necessary\n\tif (slotNumber == snapshots-&gt;slots_used.load(std::memory_order_relaxed) - 1)\n\t{\n\t\tdo {\n\t\t\tslot--;\n\t\t} while (slot &gt;= snapshots-&gt;slots &amp;&amp; slot-&gt;attachment_id.load(std::memory_order_relaxed) == 0);\n\n\t\tsnapshots-&gt;slots_used.store(static_cast&lt;ULONG&gt;(slot - snapshots-&gt;slots + 1), std::memory_order_release);\n\t}\n}\n\nvoid TipCache::endSnapshot(thread_db* tdbb, SnapshotHandle handle, AttNumber attachmentId)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\t// Lock mutex\n\tSharedMutexGuard guard(m_snapshots);\n\n\t// We don&#x27;t care to perform remap here, because we release a slot that was\n\t// allocated by this process and we do not access any data past it during\n\t// deallocation.\n\n\t// Perform some sanity checks on a handle\n\tconst SnapshotList* snapshots = m_snapshots-&gt;getHeader();\n\tconst SnapshotData* slot = snapshots-&gt;slots + handle;\n\n\tif (handle &gt;= snapshots-&gt;slots_used.load(std::memory_order_relaxed))\n\t\tERR_bugcheck_msg(&quot;Incorrect snapshot deallocation - too few slots&quot;);\n\n\tif (slot-&gt;attachment_id.load(std::memory_order_relaxed) != attachmentId)\n\t\tERR_bugcheck_msg(&quot;Incorrect snapshot deallocation - attachment mismatch&quot;);\n\n\t// Deallocate slot\n\tdeallocateSnapshotSlot(handle);\n\n\t// Increment release event count\n\theader-&gt;snapshot_release_count++;\n}\n\nvoid TipCache::updateActiveSnapshots(thread_db* tdbb, ActiveSnapshots* activeSnapshots)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tconst GlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\tfb_assert(activeSnapshots);\n\n\t// This function is quite tricky as it reads snapshots list without locks (using atomics)\n\n\tSnapshotList* snapshots = m_snapshots-&gt;getHeader();\n\n\tif (activeSnapshots-&gt;m_lastCommit == CN_ACTIVE)\n\t{\n\t\t// Slow path. Initialization.\n\n\t\tactiveSnapshots-&gt;m_lastCommit = header-&gt;latest_commit_number.load(std::memory_order_acquire);\n\t\tactiveSnapshots-&gt;m_releaseCount = header-&gt;snapshot_release_count.load(std::memory_order_relaxed);\n\n\t\t// If new slots are allocated past this value - we don&#x27;t care as we preserved\n\t\t// lastCommit and new snapshots will have numbers &gt;= lastCommit and we don&#x27;t\n\t\t// GC them anyways\n\t\tconst ULONG slots_used_org = snapshots-&gt;slots_used.load(std::memory_order_acquire);\n\n\t\t// Remap snapshot list if it has been grown by someone else\n\t\tremapSnapshots(true);\n\n\t\tsnapshots = m_snapshots-&gt;getHeader();\n\n\t\tGenericMap&lt;Pair&lt;NonPooled&lt;AttNumber, bool&gt; &gt; &gt; att_states;\n\n\t\t// We modify snapshots list only while holding a mutex\n\t\tSharedMutexGuard guard(m_snapshots, false);\n\n\t\tactiveSnapshots-&gt;m_snapshots.clear();\n\t\tfor (ULONG slotNumber = 0; slotNumber &lt; slots_used_org; slotNumber++)\n\t\t{\n\t\t\tconst SnapshotData* slot = snapshots-&gt;slots + slotNumber;\n\t\t\tconst AttNumber slot_attachment_id = slot-&gt;attachment_id.load(std::memory_order_acquire);\n\t\t\tif (slot_attachment_id)\n\t\t\t{\n\t\t\t\tbool isAttachmentDead;\n\t\t\t\tif (!att_states.get(slot_attachment_id, isAttachmentDead))\n\t\t\t\t{\n\t\t\t\t\tThreadStatusGuard temp_status(tdbb);\n\t\t\t\t\tLock temp_lock(tdbb, sizeof(AttNumber), LCK_attachment);\n\t\t\t\t\ttemp_lock.setKey(slot_attachment_id);\n\t\t\t\t\tif ((isAttachmentDead = LCK_lock(tdbb, &amp;temp_lock, LCK_EX, LCK_NO_WAIT)))\n\t\t\t\t\t\tLCK_release(tdbb, &amp;temp_lock);\n\t\t\t\t\tatt_states.put(slot_attachment_id, isAttachmentDead);\n\t\t\t\t}\n\n\t\t\t\tif (isAttachmentDead)\n\t\t\t\t{\n\t\t\t\t\tif (!guard.isLocked())\n\t\t\t\t\t{\n\t\t\t\t\t\tguard.lock();\n\n\t\t\t\t\t\t// Check if slot was reused while we waited for the mutex\n\t\t\t\t\t\tconst AttNumber slot_attachment_id2 = slot-&gt;attachment_id.load(std::memory_order_acquire);\n\t\t\t\t\t\tif (slot_attachment_id != slot_attachment_id2)\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tslotNumber--;\n\t\t\t\t\t\t\tcontinue;\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\n\t\t\t\t\tdeallocateSnapshotSlot(slotNumber);\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tconst CommitNumber slot_snapshot = slot-&gt;snapshot.load(std::memory_order_acquire);\n\t\t\t\t\tif (slot_snapshot)\n\t\t\t\t\t\tactiveSnapshots-&gt;m_snapshots.set(slot_snapshot);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\telse\n\t{\n\t\t// Fast path. Quick update.\n\n\t\t// Update m_lastCommit unconditionally, to prevent active snapshots list from\n\t\t// stalling when there is no snapshots created\\released since last update.\n\t\t// Stalled list of active snapshots could stop intermediate garbage collection\n\t\t// by current list owner (attachment).\n\t\t// It is important to ensure that no snapshot with CN less than m_lastCommit\n\t\t// could be missed at activeSnapshots, therefore we read slots_used after\n\t\t// latest_commit_number using appropriate memory barriers.\n\n\t\tactiveSnapshots-&gt;m_lastCommit = header-&gt;latest_commit_number.load(std::memory_order_acquire);\n\t\tULONG slots_used_org = snapshots-&gt;slots_used.load(std::memory_order_acquire);\n\t\tconst ULONG release_count = header-&gt;snapshot_release_count.load(std::memory_order_relaxed);\n\n\t\t// If no snapshots were released since we were last called - do nothing\n\t\t// Do not care about race issues here, because worst-case consequences are benign\n\t\tif (activeSnapshots-&gt;m_releaseCount == release_count &amp;&amp;\n\t\t\tactiveSnapshots-&gt;m_slots_used == slots_used_org)\n\t\t{\n\t\t\treturn;\n\t\t}\n\n\t\tactiveSnapshots-&gt;m_slots_used = slots_used_org;\n\t\tactiveSnapshots-&gt;m_releaseCount = release_count;\n\n\t\t// Remap snapshot list if it has been grown by someone else\n\t\tremapSnapshots(true);\n\n\t\tsnapshots = m_snapshots-&gt;getHeader();\n\n\t\tactiveSnapshots-&gt;m_snapshots.clear();\n\t\tfor (SnapshotData* slot = snapshots-&gt;slots,\n\t\t\t\t*end = snapshots-&gt;slots + slots_used_org;\n\t\t\t slot &lt; end;\n\t\t\t slot++)\n\t\t{\n\t\t\tif (slot-&gt;attachment_id.load(std::memory_order_acquire))\n\t\t\t{\n\t\t\t\tconst CommitNumber slot_snapshot = slot-&gt;snapshot.load(std::memory_order_acquire);\n\t\t\t\tif (slot_snapshot)\n\t\t\t\t\tactiveSnapshots-&gt;m_snapshots.set(slot_snapshot);\n\t\t\t}\n\t\t}\n\t}\n}\n\nTraNumber TipCache::generateTransactionId()\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\t// No barrier here, because inconsistency in transaction number order does not matter\n\t// for read-only databases where this function is used.\n\tTraNumber transaction_id = header-&gt;latest_transaction_id++ + 1;\n\treturn transaction_id;\n}\n\nAttNumber TipCache::generateAttachmentId()\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\t// No barrier here, because attachment id order does not generally matter\n\t// especially for read-only databases where this function is used.\n\tAttNumber attachment_id = header-&gt;latest_attachment_id++ + 1;\n\treturn attachment_id;\n}\n\nStmtNumber TipCache::generateStatementId()\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\t// No barrier here, because statement id order does not generally matter\n\tStmtNumber statement_id = header-&gt;latest_statement_id++ + 1;\n\treturn statement_id;\n}\n\n//void TipCache::assignLatestTransactionId(TraNumber number) {\n//\t// XXX: there is no paired acquire because value assigned here is not really used for now\n//\tatomic_int_store_release(&amp;m_tpcHeader-&gt;getHeader()-&gt;latest_transaction_id, number);\n//}\n\nvoid TipCache::assignLatestAttachmentId(AttNumber number)\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tGlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\t// XXX: there is no paired acquire because value assigned here is not really used for now\n\theader-&gt;latest_attachment_id.store(number, std::memory_order_release);\n}\n\nAttNumber TipCache::getLatestAttachmentId() const\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tconst GlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\treturn header-&gt;latest_attachment_id;\n}\n\nStmtNumber TipCache::getLatestStatementId() const\n{\n\t// Can only be called on initialized TipCache\n\tfb_assert(m_tpcHeader);\n\tconst GlobalTpcHeader* header = m_tpcHeader-&gt;getHeader();\n\n\treturn header-&gt;latest_statement_id;\n}\n\nint TPC_snapshot_state(thread_db* tdbb, TraNumber number)\n{\n\tTipCache* cache = tdbb-&gt;getDatabase()-&gt;dbb_tip_cache;\n\n\t// This function might be called early during database initialization when\n\t// TIP cache does not exist yet.\n\tif (!cache)\n\t\treturn TRA_fetch_state(tdbb, number);\n\n\tconst CommitNumber stateCn = cache-&gt;snapshotState(tdbb, number);\n\tswitch (stateCn)\n\t{\n\tcase CN_ACTIVE:\n\t\treturn tra_active;\n\n\tcase CN_LIMBO:\n\t\treturn tra_limbo;\n\n\tcase CN_DEAD:\n\t\treturn tra_dead;\n\n\tdefault:\n\t\treturn tra_committed;\n\t}\n}\n\n\n} // namespace Jrd\n"}, "/build/src/jrd/tra.cpp": {"id": "/build/src/jrd/tra.cpp", "filePath": "src/jrd/tra.cpp", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\ttra.cpp\n *\tDESCRIPTION:\tTransaction manager\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n * 2001.07.06 Sean Leyne - Code Cleanup, removed &quot;#ifdef READONLY_DATABASE&quot;\n *                         conditionals, as the engine now fully supports\n *                         readonly databases.\n * 2002.10.29 Nickolay Samofatov: Added support for savepoints\n */\n\n#include &quot;firebird.h&quot;\n#include &lt;string.h&gt;\n#include &quot;../jrd/jrd.h&quot;\n#include &quot;../jrd/tra.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../jrd/pag.h&quot;\n#include &quot;../jrd/lck.h&quot;\n#include &quot;../jrd/lls.h&quot;\n#include &quot;../jrd/btr.h&quot;\n#include &quot;../jrd/req.h&quot;\n#include &quot;../jrd/exe.h&quot;\n#include &quot;../jrd/extds/ExtDS.h&quot;\n#include &quot;../jrd/intl_classes.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../jrd/TimeZone.h&quot;\n#include &quot;../jrd/UserManagement.h&quot;\n#include &quot;../jrd/blb_proto.h&quot;\n#include &quot;../jrd/cch_proto.h&quot;\n#include &quot;../jrd/cmp_proto.h&quot;\n#include &quot;../jrd/dfw_proto.h&quot;\n#include &quot;../jrd/dpm_proto.h&quot;\n#include &quot;../jrd/err_proto.h&quot;\n#include &quot;../jrd/exe_proto.h&quot;\n#include &quot;../jrd/ext_proto.h&quot;\n#include &quot;../jrd/idx_proto.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/isc_proto.h&quot;\n#include &quot;../jrd/lck_proto.h&quot;\n#include &quot;../jrd/met_proto.h&quot;\n#include &quot;../jrd/mov_proto.h&quot;\n#include &quot;../jrd/pag_proto.h&quot;\n#include &quot;../jrd/rlck_proto.h&quot;\n#include &quot;../jrd/tpc_proto.h&quot;\n#include &quot;../jrd/tra_proto.h&quot;\n#include &quot;../jrd/vio_proto.h&quot;\n#include &quot;../jrd/jrd_proto.h&quot;\n#include &quot;../jrd/scl_proto.h&quot;\n#include &quot;../common/classes/ClumpletWriter.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../lock/lock_proto.h&quot;\n#include &quot;../dsql/dsql.h&quot;\n#include &quot;../dsql/dsql_proto.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../jrd/replication/Publisher.h&quot;\n#include &quot;../jrd/trace/TraceManager.h&quot;\n#include &quot;../jrd/trace/TraceJrdHelpers.h&quot;\n#include &quot;../jrd/Function.h&quot;\n#include &quot;../jrd/Collation.h&quot;\n#include &quot;../jrd/Mapping.h&quot;\n#include &quot;../jrd/DbCreators.h&quot;\n#include &quot;../common/os/fbsyslog.h&quot;\n#include &quot;firebird/impl/msg_helper.h&quot;\n\n\nconst int DYN_MSG_FAC\t= 8;\n\nusing namespace Jrd;\nusing namespace Ods;\nusing namespace Firebird;\n\ntypedef Firebird::GenericMap&lt;Firebird::Pair&lt;Firebird::NonPooled&lt;USHORT, UCHAR&gt; &gt; &gt; RelationLockTypeMap;\n\n\n#ifdef SUPERSERVER_V2\nstatic TraNumber bump_transaction_id(thread_db*, WIN*);\n#else\nstatic header_page* bump_transaction_id(thread_db*, WIN*, bool);\n#endif\nstatic void retain_context(thread_db* tdbb, jrd_tra* transaction, bool commit, int state);\nstatic void expand_view_lock(thread_db* tdbb, jrd_tra*, jrd_rel*, UCHAR lock_type,\n\tconst char* option_name, RelationLockTypeMap&amp; lockmap, const int level);\nstatic tx_inv_page* fetch_inventory_page(thread_db*, WIN* window, ULONG sequence, USHORT lock_level);\nstatic const char* get_lockname_v3(const UCHAR lock);\nstatic ULONG inventory_page(thread_db*, ULONG);\nstatic int limbo_transaction(thread_db*, TraNumber id);\nstatic void release_temp_tables(thread_db*, jrd_tra*);\nstatic void retain_temp_tables(thread_db*, jrd_tra*, TraNumber);\nstatic void restart_requests(thread_db*, jrd_tra*);\nstatic void start_sweeper(thread_db*);\n//static THREAD_ENTRY_DECLARE sweep_database(THREAD_ENTRY_PARAM);\nstatic void transaction_flush(thread_db* tdbb, USHORT flush_flag, TraNumber tra_number);\nstatic void transaction_options(thread_db*, jrd_tra*, const UCHAR*, USHORT);\nstatic void transaction_start(thread_db* tdbb, jrd_tra* temp);\n\nstatic const UCHAR sweep_tpb[] =\n{\n\tisc_tpb_version1, isc_tpb_read,\n\tisc_tpb_read_committed, isc_tpb_rec_version\n};\n\n\nRequest* TRA_get_prior_request(thread_db* tdbb)\n{\n\t// See if there is any request right above us in the call stack\n\tRequest* org_request;\n\tthread_db* jrd_ctx = tdbb;\n\tdo\n\t{\n\t\t// Check regular request call stack\n\t\torg_request = jrd_ctx-&gt;getRequest();\n\t\tif (org_request)\n\t\t\tbreak;\n\n\t\t// Check for engine context switch (EXECUTE STATEMENT, etc)\n\t\tThreadData* ctx = jrd_ctx;\n\t\tjrd_ctx = NULL;\n\t\twhile( (ctx = ctx-&gt;getPriorContext()) )\n\t\t{\n\t\t\tif (ctx-&gt;getType() == ThreadData::tddDBB)\n\t\t\t{\n\t\t\t\tjrd_ctx = static_cast&lt;thread_db*&gt;(ctx);\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t} while (jrd_ctx);\n\n\treturn org_request;\n}\n\nvoid TRA_setup_request_snapshot(Jrd::thread_db* tdbb, Jrd::Request* request)\n{\n\t// This function is called whenever request is started in a transaction.\n\t// Setup context to preserve read consistency in READ COMMITTED transactions.\n\n\tJrd::jrd_tra* transaction = request-&gt;req_transaction;\n\n\t// We assume that request is already attached to a transaction\n\tfb_assert(transaction);\n\n\t// If we are not READ COMMITTED or read consistency is not needed then nothing to do here\n\tif (!(transaction-&gt;tra_flags &amp; TRA_read_committed) || !(transaction-&gt;tra_flags &amp; TRA_read_consistency))\n\t\treturn;\n\n\t// See if there is any request right above us in the call stack\n\tRequest* org_request = TRA_get_prior_request(tdbb);\n\n\tif (org_request &amp;&amp; org_request-&gt;req_transaction == transaction)\n\t{\n\t\tfb_assert(org_request-&gt;req_snapshot.m_owner);\n\t\trequest-&gt;req_snapshot.m_owner = org_request-&gt;req_snapshot.m_owner;\n\t\treturn;\n\t}\n\n\t// If we are a top-level request or caller is executed in a different transaction,\n\t// we need to set up statement snapshot for read consistency and own it\n\n\trequest-&gt;req_snapshot.m_owner = request;\n\trequest-&gt;req_snapshot.m_number = 0;\n\n\trequest-&gt;req_snapshot.m_handle =\n\t\ttdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;beginSnapshot(tdbb,\n\t\t\ttdbb-&gt;getAttachment()-&gt;att_attachment_id, request-&gt;req_snapshot.m_number);\n}\n\n\nvoid TRA_release_request_snapshot(Jrd::thread_db* tdbb, Jrd::Request* request)\n{\n\t// This function is called whenever request has completed processing\n\t// in a transaction (normally or abnormally)\n\n\tif (!request-&gt;req_snapshot.m_owner)\n\t\treturn;\n\n\tif (request-&gt;req_snapshot.m_number)\n\t{\n\t\ttdbb-&gt;getDatabase()-&gt;dbb_tip_cache-&gt;endSnapshot(tdbb, request-&gt;req_snapshot.m_handle,\n\t\t\trequest-&gt;req_attachment-&gt;att_attachment_id);\n\t\trequest-&gt;req_snapshot.m_handle = 0;\n\t\trequest-&gt;req_snapshot.m_number = 0;\n\t}\n\n\trequest-&gt;req_snapshot.m_owner = nullptr;\n}\n\n\nvoid TRA_attach_request(Jrd::jrd_tra* transaction, Jrd::Request* request)\n{\n\t// When request finishes normally transaction reference is not cleared.\n\t// Then if afterwards request is restarted TRA_attach_request is called again.\n\tif (request-&gt;req_transaction)\n\t{\n\t\tif (request-&gt;req_transaction == transaction)\n\t\t\treturn;\n\t\tTRA_detach_request(request);\n\t}\n\n\tfb_assert(request-&gt;req_transaction == NULL);\n\tfb_assert(request-&gt;req_tra_next == NULL);\n\tfb_assert(request-&gt;req_tra_prev == NULL);\n\n\t// Assign transaction reference\n\trequest-&gt;req_transaction = transaction;\n\n\t// Add request to the doubly linked list\n\tif (transaction-&gt;tra_requests)\n\t{\n\t\tfb_assert(transaction-&gt;tra_requests-&gt;req_tra_prev == NULL);\n\t\ttransaction-&gt;tra_requests-&gt;req_tra_prev = request;\n\t\trequest-&gt;req_tra_next = transaction-&gt;tra_requests;\n\t}\n\ttransaction-&gt;tra_requests = request;\n}\n\nvoid TRA_detach_request(Jrd::Request* request)\n{\n\tif (!request-&gt;req_transaction)\n\t{\n\t\tfb_assert(!request-&gt;req_savepoints);\n\t\treturn;\n\t}\n\n\t// Release stored looper savepoints\n\tSavepoint::destroy(request-&gt;req_savepoints);\n\tfb_assert(!request-&gt;req_savepoints);\n\n\t// Release procedure savepoints used by this request\n\tif (request-&gt;req_proc_sav_point)\n\t{\n\t\tfb_assert(request-&gt;req_flags &amp; req_proc_fetch);\n\t\tSavepoint::destroy(request-&gt;req_proc_sav_point);\n\t\tfb_assert(!request-&gt;req_proc_sav_point);\n\t}\n\n\t// Remove request from the doubly linked list\n\tif (request-&gt;req_tra_next)\n\t{\n\t\tfb_assert(request-&gt;req_tra_next-&gt;req_tra_prev == request);\n\t\trequest-&gt;req_tra_next-&gt;req_tra_prev = request-&gt;req_tra_prev;\n\t}\n\n\tif (request-&gt;req_tra_prev)\n\t{\n\t\tfb_assert(request-&gt;req_tra_prev-&gt;req_tra_next == request);\n\t\trequest-&gt;req_tra_prev-&gt;req_tra_next = request-&gt;req_tra_next;\n\t}\n\telse\n\t{\n\t\tfb_assert(request-&gt;req_transaction-&gt;tra_requests == request);\n\t\trequest-&gt;req_transaction-&gt;tra_requests = request-&gt;req_tra_next;\n\t}\n\n\t// Clear references\n\trequest-&gt;req_transaction = NULL;\n\trequest-&gt;req_tra_next = NULL;\n\trequest-&gt;req_tra_prev = NULL;\n}\n\nbool TRA_active_transactions(thread_db* tdbb, Database* dbb)\n{\n/**************************************\n *\n *\tT R A _ a c t i v e _ t r a n s a c t i o n s\n *\n **************************************\n *\n * Functional description\n *\tDetermine if any transactions are active.\n *\tReturn true is active transactions; otherwise\n *\treturn false if no active transactions.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\treturn LCK_query_data(tdbb, LCK_tra, LCK_ANY) ? true : false;\n}\n\nbool TRA_cleanup(thread_db* tdbb)\n{\n/**************************************\n *\n *\tT R A _ c l e a n u p\n *\n **************************************\n *\n * Functional description\n *\tTRA_cleanup is called at startup while an exclusive lock is\n *\theld on the database.  Because we haven&#x27;t started a transaction,\n *\tand we have an exclusive lock on the db, any transactions marked\n *\tas active on the transaction inventory pages are indeed dead.\n *\tMark them so.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// Return without cleaning up the TIP&#x27;s for a ReadOnly database\n\tif (dbb-&gt;readOnly())\n\t\treturn false;\n\n\t// First, make damn sure there are no outstanding transactions\n\n\tfor (Jrd::Attachment* attachment = dbb-&gt;dbb_attachments; attachment;\n\t\t attachment = attachment-&gt;att_next)\n\t{\n\t\tif (attachment-&gt;att_transactions)\n\t\t\treturn false;\n\t}\n\n\tconst ULONG trans_per_tip = dbb-&gt;dbb_page_manager.transPerTIP;\n\n\t// Read header page and allocate transaction number.  Since\n\t// the transaction inventory page was initialized to zero, it\n\t// transaction is automatically marked active.\n\n\tWIN window(HEADER_PAGE_NUMBER);\n\tconst header_page* header = (header_page*) CCH_FETCH(tdbb, &amp;window, LCK_read, pag_header);\n\tconst TraNumber ceiling = header-&gt;hdr_next_transaction;\n\tconst TraNumber active = header-&gt;hdr_oldest_active;\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\tif (ceiling == 0)\n\t\treturn false;\n\n\t// Zip thru transactions from the &quot;oldest active&quot; to the next looking for\n\t// active transactions.  When one is found, declare it dead.\n\n\tconst ULONG last = ceiling / trans_per_tip;\n\tULONG number = active % trans_per_tip;\n\tTraNumber limbo = 0;\n\tbool found = false;\n\n\tfor (ULONG sequence = active / trans_per_tip; sequence &lt;= last; sequence++, number = 0)\n\t{\n\t\twindow.win_page = inventory_page(tdbb, sequence);\n\t\ttx_inv_page* tip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_transactions);\n\t\tTraNumber max = ceiling - (TraNumber) sequence * trans_per_tip;\n\t\tif (max &gt;= trans_per_tip)\n\t\t\tmax = trans_per_tip - 1;\n\t\tfor (; number &lt;= max; number++)\n\t\t{\n\t\t\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\t\t\tUCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\t\t\tconst USHORT shift = TRANS_SHIFT(number);\n\t\t\tconst int state = (*byte &gt;&gt; shift) &amp; TRA_MASK;\n\t\t\tif (state == tra_limbo &amp;&amp; limbo == 0)\n\t\t\t\tlimbo = (TraNumber) sequence * trans_per_tip + number;\n\t\t\telse if (state == tra_active)\n\t\t\t{\n\t\t\t\tfound = true;\n\t\t\t\tCCH_MARK(tdbb, &amp;window);\n\t\t\t\t*byte &amp;= ~(TRA_MASK &lt;&lt; shift);\n\n\t\t\t\t// hvlad: mark system transaction as committed\n\t\t\t\tif (sequence == 0 &amp;&amp; number == 0) {\n\t\t\t\t\t*byte |= tra_committed &lt;&lt; shift;\n\t\t\t\t}\n\t\t\t\telse {\n\t\t\t\t\t*byte |= tra_dead &lt;&lt; shift;\n\t\t\t\t}\n\t\t\t}\n\t\t}\n#ifdef SUPERSERVER_V2\n\t\tif (sequence == last)\n\t\t{\n\t\t\tCCH_MARK(tdbb, &amp;window);\n\t\t\tfor (; number &lt; trans_per_tip; number++)\n\t\t\t{\n\t\t\t\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\t\t\t\tUCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\t\t\t\tconst USHORT shift = TRANS_SHIFT(number);\n\t\t\t\t*byte &amp;= ~(TRA_MASK &lt;&lt; shift);\n\t\t\t\tif (tip-&gt;tip_next)\n\t\t\t\t\t*byte |= tra_committed &lt;&lt; shift;\n\t\t\t\telse\n\t\t\t\t\t*byte |= tra_active &lt;&lt; shift;\n\t\t\t}\n\t\t}\n#endif\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t}\n\n#ifdef SUPERSERVER_V2\n\twindow.win_page = inventory_page(tdbb, last);\n\ttx_inv_page* tip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_transactions);\n\n\twhile (tip-&gt;tip_next)\n\t{\n\t\tCCH_RELEASE(tdbb, &amp;window);\n\t\twindow.win_page = inventory_page(tdbb, ++last);\n\t\ttip = (tx_inv_page*) CCH_FETCH(tdbb, &amp;window, LCK_write, pag_transactions);\n\t\tCCH_MARK(tdbb, &amp;window);\n\t\tfor (number = 0; number &lt; trans_per_tip; number++)\n\t\t{\n\t\t\tconst ULONG trans_offset = TRANS_OFFSET(number);\n\t\t\tUCHAR* byte = tip-&gt;tip_transactions + trans_offset;\n\t\t\tconst USHORT shift = TRANS_SHIFT(number);\n\t\t\t*byte &amp;= ~(TRA_MASK &lt;&lt; shift);\n\t\t\tif (tip-&gt;tip_next || !number)\n\t\t\t\t*byte |= tra_committed &lt;&lt; shift;\n\t\t\telse\n\t\t\t\t*byte |= tra_active &lt;&lt; shift;\n\t\t}\n\n\t\tif (!tip-&gt;tip_next)\n\t\t\tdbb-&gt;dbb_next_transaction = (TraNumber) last * trans_per_tip;\n\t}\n\n\tCCH_RELEASE(tdbb, &amp;window);\n#endif\n\n\treturn found;\n}\n\n\nvoid TRA_commit(thread_db* tdbb, jrd_tra* transaction, const bool retaining_flag)\n{\n/**************************************\n *\n *\tT R A _ c o m m i t\n *\n **************************************\n *\n * Functional description\n *\tCommit a transaction.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\n\tTraceTransactionEnd trace(transaction, true, retaining_flag);\n\n\tEDS::Transaction::jrdTransactionEnd(tdbb, transaction, true, retaining_flag, false);\n\n\tjrd_tra* const sysTran = tdbb-&gt;getAttachment()-&gt;getSysTransaction();\n\n\t// If this is a commit retaining, and no updates have been performed,\n\t// and no events have been posted (via stored procedures etc)\n\t// no-op the operation.\n\n\tif (retaining_flag &amp;&amp; !((transaction-&gt;tra_flags &amp; TRA_write) || transaction-&gt;tra_deferred_job))\n\t{\n\t\tif (sysTran-&gt;tra_flags &amp; TRA_write)\n\t\t\ttransaction_flush(tdbb, FLUSH_SYSTEM, 0);\n\n\t\ttransaction-&gt;tra_flags &amp;= ~TRA_prepared;\n\n\t\t// Get rid of all user savepoints\n\t\twhile (transaction-&gt;tra_save_point &amp;&amp; !transaction-&gt;tra_save_point-&gt;isRoot())\n\t\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\n\t\ttrace.finish(ITracePlugin::RESULT_SUCCESS);\n\t\treturn;\n\t}\n\n\tif (transaction-&gt;tra_flags &amp; TRA_invalidated)\n\t\tERR_post(Arg::Gds(isc_trans_invalid));\n\n\tJrd::ContextPoolHolder context(tdbb, transaction-&gt;tra_pool);\n\n\t// Get rid of all user savepoints\n\twhile (transaction-&gt;tra_save_point &amp;&amp; !transaction-&gt;tra_save_point-&gt;isRoot())\n\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\n\t// Let replicator perform heavy and error-prone part of work\n\n\tREPL_trans_prepare(tdbb, transaction);\n\n\t// Perform any meta data work deferred\n\n\tif (!(transaction-&gt;tra_flags &amp; TRA_prepared))\n\t\tDFW_perform_work(tdbb, transaction);\n\n\t// Commit associated transaction in security DB\n\n\tSecDbContext* secContext = transaction-&gt;getSecDbContext();\n\tif (secContext &amp;&amp; secContext-&gt;tra)\n\t{\n\t\tLocalStatus ls;\n\t\tCheckStatusWrapper st(&amp;ls);\n\t\tsecContext-&gt;tra-&gt;commit(&amp;st);\n\n\t\tif (st.getState() &amp; IStatus::STATE_ERRORS)\n\t\t\tstatus_exception::raise(&amp;st);\n\n\t\tsecContext-&gt;tra = NULL;\n\t\tMapping::clearCache(tdbb-&gt;getDatabase()-&gt;dbb_config-&gt;getSecurityDatabase(), Mapping::MAPPING_CACHE);\n\n\t\ttransaction-&gt;eraseSecDbContext();\n\t}\n\n\tif (transaction-&gt;tra_flags &amp; (TRA_prepare2 | TRA_reconnected))\n\t\tMET_update_transaction(tdbb, transaction, true);\n\n\t// Get rid of the rest of savepoints to allow intermediate garbage collection\n\t// in indices and BLOBs after in-place updates\n\n\twhile (transaction-&gt;tra_save_point)\n\t\ttransaction-&gt;releaseSavepoint(tdbb);\n\n\t// Flush pages if transaction logically modified data\n\n\tif (transaction-&gt;tra_flags &amp; TRA_write)\n\t{\n\t\ttransaction_flush(tdbb, FLUSH_TRAN, transaction-&gt;tra_number);\n\t}\n\telse if ((transaction-&gt;tra_flags &amp; (TRA_prepare2 | TRA_reconnected)) ||\n\t\t(sysTran-&gt;tra_flags &amp; TRA_write))\n\t{\n\t\t// If the transaction only read data but is a member of a\n\t\t// multi-database transaction with a transaction description\n\t\t// message then flush RDB$TRANSACTIONS.\n\n\t\ttransaction_flush(tdbb, FLUSH_SYSTEM, 0);\n\t}\n\n\tif (retaining_flag)\n\t{\n\t\tretain_context(tdbb, transaction, true, tra_committed);\n\t\ttrace.finish(ITracePlugin::RESULT_SUCCESS);\n\t\treturn;\n\t}\n\n\t// Set the state on the inventory page to be committed\n\n\tREPL_trans_commit(tdbb, transaction);\n\tTRA_set_state(tdbb, transaction, transaction-&gt;tra_number, tra_committed);\n\n\t// Perform any post commit work\n\n\tDFW_perform_post_commit_work(transaction);\n\n\t// notify any waiting locks that this transaction is committing;\n\t// there could be no lock if this transaction is being reconnected\n\n\t++transaction-&gt;tra_use_count;\n\tLock* lock = transaction-&gt;tra_lock;\n\tif (lock &amp;&amp; (lock-&gt;lck_logical &lt; LCK_write))\n\t\tLCK_convert(tdbb, lock, LCK_write, LCK_WAIT);\n\t--transaction-&gt;tra_use_count;\n\n\tTRA_release_transaction(tdbb, transaction, &amp;trace);\n}\n\n\nvoid TRA_extend_tip(thread_db* tdbb, ULONG sequence) //, WIN* precedence_window)\n{\n/**************************************\n *\n *\tT R A _ e x t e n d _ t i p\n *\n **************************************\n *\n * Functional description\n *\tAllocate and link in new TIP (transaction inventory page).\n *\tThis is called from TRA_start and from validate/repair.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// Start by fetching prior transaction page, if any\n\ttx_inv_page* prior_tip = NULL;\n\tWIN prior_window(DB_PAGE_SPACE, -1);\n\tif (sequence)\n\t\tprior_tip = fetch_inventory_page(tdbb, &amp;prior_window, (sequence - 1), LCK_write);\n\n\t// Allocate and format new page\n\tWIN window(DB_PAGE_SPACE, -1);\n\ttx_inv_page* tip = (tx_inv_page*) DPM_allocate(tdbb, &amp;window);\n\ttip-&gt;tip_header.pag_type = pag_transactions;\n\n\tCCH_must_write(tdbb, &amp;window);\n\tCCH_RELEASE(tdbb, &amp;window);\n\n\tconst ULONG pageNumber = window.win_page.getPageNum();\n\n\t// Release prior page\n\n\tif (sequence)\n\t{\n\t\tCCH_MARK_MUST_WRITE(tdbb, &amp;prior_window);\n\t\tprior_tip-&gt;tip_next = pageNumber;\n\t\tCCH_RELEASE(tdbb, &amp;prior_window);\n\t}\n\n\t// Link into internal data structures\n\n\tdbb-&gt;setKnownPage(pag_transactions, sequence, pageNumber);\n\n\t// Write into pages relation\n\n\tDPM_pages(tdbb, 0, pag_transactions, sequence, pageNumber);\n}\n\n\nint TRA_fetch_state(thread_db* tdbb, TraNumber number)\n{\n/**************************************\n *\n *\tT R A _ f e t c h _ s t a t e\n *\n **************************************\n *\n * Functional description\n *\tPhysically fetch the state of a given\n *\ttransaction on the transaction inventory\n *\tpage.\n *\n **************************************/\n\tSET_TDBB(tdbb);\n\tDatabase* dbb = tdbb-&gt;getDatabase();\n\tCHECK_DBB(dbb);\n\n\t// locate and fetch the proper TIP p
