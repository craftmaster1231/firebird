      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

               ? 10
               : selPosPixel.left + editorSize.width - 100
      });
    }, 0);
  }

 = offset;\n\t\tfield-&gt;fld_parameter = count++;\n\t\toffset += length;\n\t}\n\n\t// Next, build fields for null flags\n\n\tfor (field = relation-&gt;rel_fields; field; field = field-&gt;fld_next)\n\t{\n\t\tif (field-&gt;fld_flags &amp; FLD_computed)\n\t\t\tcontinue;\n\t\tadd_byte(blr, blr_short);\n\t\tadd_byte(blr, 0);\n\t\toffset = FB_ALIGN(offset, sizeof(SSHORT));\n\t\tfield-&gt;fld_missing_parameter = count++;\n\t\toffset += sizeof(SSHORT);\n\t}\n\n\t// Finally, make up an EOF field\n\n\tadd_byte(blr, blr_short);\t\t\t// eof field\n\tadd_byte(blr, 0);\t\t\t\t\t// scale for eof field\n\tconst SSHORT eof_parameter = count++;\n\tm_outRecLen = offset;\n\tm_outEofOffset = FB_ALIGN(offset, sizeof(SSHORT));\n\t// To be used later for the buffer size to receive data\n\tm_outMsgLen = m_outEofOffset + sizeof(SSHORT);\n\n\tif (partition)\n\t{\n\t\tadd_byte(blr, blr_receive);\n\t\tadd_byte(blr, m_inMgsNum);\n\t}\n\n\t// Build FOR loop, body, and eof handler\n\n\tadd_byte(blr, blr_for);\n\tadd_byte(blr, blr_rse);\n\tadd_byte(blr, 1);\t\t\t\t\t// count of relations\n\tadd_byte(blr, blr_rid);\n\tadd_word(blr, relation-&gt;rel_id);\n\tadd_byte(blr, 0);\t\t\t\t\t// context variable\n\n\tif (partition)\n\t{\n\t\t// add boolean condition\n\t\tadd_byte(blr, blr_boolean);\n\t\tadd_byte(blr, blr_and);\n\t\tadd_byte(blr, blr_geq);\n\t\tadd_byte(blr, blr_dbkey);\n\t\tadd_byte(blr, 0);\n\t\tadd_byte(blr, blr_sys_function);\n\t\tadd_string(blr, &quot;MAKE_DBKEY&quot;);\n\t\tadd_byte(blr, 4);\n\t\tadd_byte(blr, blr_literal);\t\t// relID\n\t\tadd_byte(blr, blr_long);\n\t\tadd_byte(blr, 0);\n\t\tadd_long(blr, relation-&gt;rel_id);\n\t\tadd_byte(blr, blr_literal);\t\t// recNo\n\t\tadd_byte(blr, blr_long);\n\t\tadd_byte(blr, 0);\n\t\tadd_long(blr, 0);\n\t\tadd_byte(blr, blr_literal);\t\t// DP\n\t\tadd_byte(blr, blr_long);\n\t\tadd_byte(blr, 0);\n\t\tadd_long(blr, 0);\n\t\tadd_byte(blr, blr_parameter);\t// PP\n\t\tadd_byte(blr, m_inMgsNum);\n\t\tadd_word(blr, 0);\n\t\tadd_byte(blr, blr_lss);\n\t\tadd_byte(blr, blr_dbkey);\n\t\tadd_byte(blr, 0);\n\t\tadd_byte(blr, blr_sys_function);\n\t\tadd_string(blr, &quot;MAKE_DBKEY&quot;);\n\t\tadd_byte(blr, 4);\n\t\tadd_byte(blr, blr_literal);\t\t// relID\n\t\tadd_byte(blr, blr_long);\n\t\tadd_byte(blr, 0);\n\t\tadd_long(blr, relation-&gt;rel_id);\n\t\tadd_byte(blr, blr_literal);\t\t// recNo\n\t\tadd_byte(blr, blr_long);\n\t\tadd_byte(blr, 0);\n\t\tadd_long(blr, 0);\n\t\tadd_byte(blr, blr_literal);\t\t// DP\n\t\tadd_byte(blr, blr_long);\n\t\tadd_byte(blr, 0);\n\t\tadd_long(blr, 0);\n\t\tadd_byte(blr, blr_parameter);\t// PP\n\t\tadd_byte(blr, m_inMgsNum);\n\t\tadd_word(blr, 1);\n\t}\n\n\t// rse end\n\tadd_byte(blr, blr_end);\n\n\tadd_byte(blr, blr_send);\n\tadd_byte(blr, m_outMgsNum);\n\tadd_byte(blr, blr_begin);\n\tadd_byte(blr, blr_assignment);\n\tadd_byte(blr, blr_literal);\n\tadd_byte(blr, blr_short);\n\tadd_byte(blr, 0);\n\tadd_word(blr, 1);\n\tadd_byte(blr, blr_parameter);\n\tadd_byte(blr, m_outMgsNum);\n\tadd_word(blr, eof_parameter);\n\n\tfor (field = relation-&gt;rel_fields; field; field = field-&gt;fld_next)\n\t{\n\t\tif (field-&gt;fld_flags &amp; FLD_computed)\n\t\t\tcontinue;\n\t\tadd_byte(blr, blr_assignment);\n\t\tadd_byte(blr, blr_fid);\n\t\tadd_byte(blr, 0);\t\t\t\t\t\t// context\n\t\tadd_word(blr, field-&gt;fld_id);\n\t\tadd_byte(blr, blr_parameter2);\n\t\tadd_byte(blr, m_outMgsNum);\t\t\t\t// message number\n\t\tadd_word(blr, field-&gt;fld_parameter);\n\t\tadd_word(blr, field-&gt;fld_missing_parameter);\n\t}\n\n\tadd_byte(blr, blr_end);\n\n\tadd_byte(blr, blr_send);\n\tadd_byte(blr, m_outMgsNum);\n\tadd_byte(blr, blr_assignment);\n\tadd_byte(blr, blr_literal);\n\tadd_byte(blr, blr_short);\n\tadd_byte(blr, 0);\n\tadd_word(blr, 0);\n\tadd_byte(blr, blr_parameter);\n\tadd_byte(blr, m_outMgsNum);\n\tadd_word(blr, eof_parameter);\n\n\tadd_byte(blr, blr_end);\n\tadd_byte(blr, blr_eoc);\n\n\tconst FB_SIZE_T blr_length = blr - blr_buffer;\n\tm_blr.shrink(blr_length);\n\n#ifdef DEBUG\n\tif (debug_on)\n\t\tfb_print_blr(blr_buffer, blr_length, NULL, NULL, 0);\n#endif\n}\n\nvoid ReadRelationMeta::clear()\n{\n\tm_relation = NULL;\n\tm_fldCount = 0;\n\tm_blr.clear();\n\tm_inMgsNum = m_outMgsNum = 0;\n\tm_outMsgLen = m_outRecLen = m_outEofOffset = 0;\n}\n\n\n/// class ReadRelationReq\n\nvoid ReadRelationReq::reset(const ReadRelationMeta* meta)\n{\n\tif (m_meta == meta &amp;&amp; meta != NULL &amp;&amp; m_relation == meta-&gt;m_relation)\n\t\treturn;\n\n\tif (m_meta)\n\t\tclear();\n\n\tm_meta = meta;\n\tif (m_meta)\n\t{\n\t\tm_relation = m_meta-&gt;m_relation;\n\n\t\tBurpGlobals* tdgbl = BurpGlobals::getSpecific();\n\t\tFbLocalStatus status;\n\t\tcompile(&amp;status, DB);\n\t\tif (status-&gt;getState() &amp; IStatus::STATE_ERRORS)\n\t\t{\n\t\t\tBURP_error_redirect(&amp;status, 27);\n\t\t\t// msg 27 isc_compile_request failed\n\t\t\tfb_print_blr(m_meta-&gt;m_blr.begin(), m_meta-&gt;m_blr.getCount(), NULL, NULL, 0);\n\t\t}\n\n\t\tUCHAR* data = m_outMsg.getBuffer(m_meta-&gt;m_outMsgLen);\n\t\tm_eof = reinterpret_cast&lt;SSHORT*&gt; (data + m_meta-&gt;m_outEofOffset);\n\t}\n\telse\n\t{\n\t\tm_relation = NULL;\n\t\tm_request = 0;\n\t\tm_eof = NULL;\n\t}\n\n\tmemset(&amp;m_inMgs, 0, sizeof(m_inMgs));\n}\n\nvoid ReadRelationReq::clear()\n{\n\tm_relation = NULL;\n\tm_meta = NULL;\n\tm_eof = NULL;\n\tm_outMsg.clear();\n\n\tif (m_request)\n\t{\n\t\tFbLocalStatus status;\n\t\trelease(&amp;status);\n\t}\n}\n\nvoid ReadRelationReq::compile(CheckStatusWrapper* status, IAttachment* att)\n{\n\tm_request = att-&gt;compileRequest(status, m_meta-&gt;m_blr.getCount(), m_meta-&gt;m_blr.begin());\n}\n\nvoid ReadRelationReq::release(CheckStatusWrapper* status)\n{\n\tif (m_request)\n\t{\n\t\tm_request-&gt;free(status);\n\n\t\tif (!(status-&gt;getState() &amp; IStatus::STATE_ERRORS))\n\t\t{\n\t\t\tm_request = nullptr;\n\t\t\tclear();\n\t\t}\n\t}\n}\n\nvoid ReadRelationReq::setParams(ULONG loPP, ULONG hiPP)\n{\n\tm_inMgs.loPP = loPP;\n\tm_inMgs.hiPP = hiPP;\n}\n\nvoid ReadRelationReq::start(CheckStatusWrapper* status, ITransaction* tran)\n{\n\tif (m_meta-&gt;haveInputs())\n\t\tm_request-&gt;startAndSend(status, tran, 0, m_meta-&gt;m_inMgsNum, sizeof(m_inMgs), &amp;m_inMgs);\n\telse\n\t\tm_request-&gt;start(status, tran, 0);\n}\n\nvoid ReadRelationReq::receive(CheckStatusWrapper* status)\n{\n\tm_request-&gt;receive(status, 0, m_meta-&gt;m_outMgsNum, m_meta-&gt;m_outMsgLen, m_outMsg.begin());\n}\n\n\n/// class BackupRelationTask\n\nbool BackupRelationTask::tableReader(Item&amp; item)\n{\n\titem.m_request.reset(&amp;m_metadata);\n\titem.m_request.setParams(item.m_ppSequence, item.m_ppSequence + 1);\n\n\tput_data(item.m_relation, &amp;item.m_request);\n\n\titem.getBackupTask()-&gt;releaseBuffer(item);\n\treturn true;\n}\n\n} // namespace Burp\n"}, "/build/src/burp/burp.h": {"id": "/build/src/burp/burp.h", "filePath": "src/burp/burp.h", "content": "/*\n *\tPROGRAM:\tJRD Backup and Restore Program\n *\tMODULE:\t\tburp.h\n *\tDESCRIPTION:\tBurp file format\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n// 2002.10.30 Sean Leyne - Removed support for obsolete &quot;PC_PLATFORM&quot; define\n//\n */\n\n#ifndef BURP_BURP_H\n#define BURP_BURP_H\n\n#include &lt;optional&gt;\n#include &lt;stdio.h&gt;\n#include &quot;ibase.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;firebird/Message.h&quot;\n#include &quot;../common/dsc.h&quot;\n#include &quot;../burp/misc_proto.h&quot;\n#include &quot;../burp/mvol_proto.h&quot;\n#include &quot;../yvalve/gds_proto.h&quot;\n#include &quot;../common/ThreadData.h&quot;\n#include &quot;../common/UtilSvc.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/classes/fb_pair.h&quot;\n#include &quot;../common/classes/GenericMap.h&quot;\n#include &quot;../common/classes/MetaString.h&quot;\n#include &quot;../common/classes/QualifiedMetaString.h&quot;\n#include &quot;../common/SimilarToRegex.h&quot;\n#include &quot;../common/status.h&quot;\n#include &quot;../common/sha.h&quot;\n#include &quot;../common/classes/ImplementHelper.h&quot;\n\n#ifdef HAVE_UNISTD_H\n#include &lt;unistd.h&gt;\n#endif\n\n#ifdef HAVE_FCNTL_H\n#include &lt;fcntl.h&gt;\n#endif\n\n#if defined(HAVE_ZLIB_H)\n#define WIRE_COMPRESS_SUPPORT 1\n#endif\n\n#ifdef WIRE_COMPRESS_SUPPORT\n#include &lt;zlib.h&gt;\n//#define COMPRESS_DEBUG 1\n#endif // WIRE_COMPRESS_SUPPORT\n\ninline constexpr int GDS_NAME_LEN = METADATA_IDENTIFIER_CHAR_LEN * 4 /* max bytes per char */ + 1;\ntypedef TEXT GDS_NAME[GDS_NAME_LEN];\n\nenum redirect_vals {\n\tNOREDIRECT = 0,\n\tREDIRECT = 1,\n\tNOOUTPUT = 2\n};\n\nstatic inline constexpr int burp_msg_fac = FB_IMPL_MSG_FACILITY_GBAK;\n\n// Record types in backup file\n\nenum rec_type {\n\trec_burp,\t\t\t\t// Restore program attributes\n\trec_database,\t\t\t// Logical database parameters\n\trec_global_field,\t\t// Global field description\n\trec_relation,\t\t\t// Relation description\n\trec_field,\t\t\t\t// Local field description\n\trec_index,\t\t\t\t// Index description\n\trec_data,\t\t\t\t// Data for relation\n\trec_blob,\t\t\t\t// Blob\n\trec_relation_data,\t\t// Standalone data header\n\trec_relation_end,\t\t// End of data for relation\n\trec_end,\t\t\t\t// End of file\n\trec_view,\t\t\t\t// View attributes\n\trec_security_class,\t\t// Security class acl\n\trec_trigger,\t\t\t// Trigger definition\n\trec_physical_db,\t\t// Physical database parameters\n\trec_function,\t\t\t// Function description\n\trec_function_arg,\t\t// Function arguement description\n\trec_function_end,\t\t// End of function and its args\n\trec_gen_id,\t\t\t\t// From blr_gen_id\n\trec_system_type,\t\t// Type of field\n\trec_filter,\t\t\t\t// Filter\n\trec_trigger_message,\t// Trigger message texts\n\trec_user_privilege,\t\t// User privilege\n\trec_array,\t\t\t\t// Array blob (23)\n\trec_field_dimensions,\t// Array field dimensions\n\trec_files,\t\t\t\t// files for shadowing\n\trec_generator,\t\t\t// another format for gen-ids\n\trec_procedure,\t\t\t// Stored procedure\n\trec_procedure_prm,\t\t// Stored procedure parameters\n\trec_procedure_end,\t\t// End of procedure and its args\n\trec_exception,\t\t\t// Exception\n\trec_rel_constraint,\t\t// Relation constraints\n\trec_ref_constraint,\t\t// Referential constraints\n\trec_chk_constraint,\t\t// Check constraints\n\trec_charset,\t\t\t// Character sets\n\trec_collation,\t\t\t// Collations\n\trec_sql_roles,\t\t\t// SQL roles\n\trec_mapping,\t\t\t// Mapping of security names\n\trec_package,\t\t\t// Package\n\trec_db_creator,\t\t\t// Database creator\n\trec_publication,\t\t// Publication\n\trec_pub_table,\t\t\t// Publication table\n\trec_schema\t\t\t\t// Schema\n};\n\n\n/* The order of battle for major records is:\n\n\t[&lt;rec_physical_database&gt;] &lt;rec_database&gt; &lt;global fields&gt; &lt;field dimensions&gt; &lt;relation&gt; &lt;function&gt;\n\t &lt;types&gt; &lt;filters&gt; &lt;relation data&gt; &lt;trigger-new&gt; &lt;trigger messages&gt; &lt;user privileges&gt; &lt;security&gt; rec_end\n\nwhere each relation is:\n\n\t&lt;rec_relation&gt; &lt;rel name&gt; &lt;att_end&gt; &lt;local fields&gt; &lt;view&gt; &lt;rec_relation_end&gt;\n\nwhere local fields is:\n\t&lt;rec_field&gt; &lt;att_field_... att_field_dimensions, att_field_range_low, att_field_range_high...&gt; &lt;att_end&gt;\n\nwhere each relation data is:\n\n\t&lt;rec_relation_data&gt; &lt;rel attributes&gt; &lt;gen id&gt; &lt;indices&gt; &lt;data&gt; &lt;trigger-old&gt; &lt;rec_relation_end&gt;\n\nwhere data is:\n\t&lt;rec_data&gt; &lt;rec length&gt; [&lt;xdr_length&gt;]  &lt;data attr&gt;  [ &lt;blob&gt;, &lt;array&gt;...]\n\nand &lt;blob&gt; is\n\n\t&lt;rec_blob&gt; &lt;blob_field_number&gt; &lt;max_sigment&gt; &lt;blob_type&gt; &lt;number_segments&gt; &lt;blob_data&gt;\n\nand &lt;array&gt; is\n\n\t&lt;rec_array&gt; &lt;blob_field_number&gt; &lt;att_array_dimensions&gt; &lt;att_array_range_low&gt;\n\t&lt;att_array_range_high&gt; &lt;blob_data&gt; [&lt;att_xdr_array&gt;]\n\n\nwhere each function is:\n\n\t&lt;rec_function&gt; &lt;function attributes&gt; &lt;att_end&gt; [&lt;function_arguments&gt;] &lt;rec_function_end&gt;\n\nand &lt;function_arguments&gt; is\n\n\t&lt;rec_function_arg&gt; &lt;function argument attributes&gt; &lt;att_end&gt;\n\nwhere trigger-old is:\n\t&lt;rec_trigger&gt; &lt;trig_type&gt; &lt;trig_blr&gt; &lt;trig_source&gt; &lt;att_end&gt;\n\nand trigger-new is:\n\t&lt;rec_trigger&gt; &lt;trig_type&gt; &lt;trig_blr&gt; &lt;trig_source&gt; &lt;trigger name&gt; &lt;relation name&gt; &lt;trig_seqence&gt;\n\t\t\t\t  &lt;description&gt; &lt;system flag&gt; &lt;att_end&gt;\n\n\n*/\n\n// Attributes within major record\n\n/*\n   CAREFUL not to pull the lastest version into maint version without\n   modifying the att_backup_format to be one version back\n\n\nVersion 6: IB6, FB1, FB1.5.\n\t\t\tSupports SQL Time &amp; Date columns.\n\t\t\t  RDB$FIELD_PRECISION\n\t\t\t  SQL Dialect from database header\n\t\t\t  SQL_INT64 columns and generator values\n\nVersion 7: FB2.0.\n\t\t\tRDB$DESCRIPTION in roles and generators.\n\t\t\tRDB$BASE_COLLATION_NAME and RDB$SPECIFIC_ATTRIBUTES in collations\n\nVersion 8: FB2.1.\n\t\t\tRDB$RELATION_TYPE in relations\n\t\t\tRDB$PROCEDURE_TYPE and RDB$VALID_BLR in procedures\n\t\t\tRDB$VALID_BLR in triggers\n\t\t\tRDB$DEFAULT_VALUE, RDB$DEFAULT_SOURCE and RDB$COLLATION_ID in procedure_parameters\n\nVersion 9: FB2.5.\n\t\t\tRDB$MESSAGE domain was enlarged from 78 to 1021 in FB2.0 and to 1023 in FB2.5,\n\t\t\tbut gbak wasn&#x27;t adjusted accordingly and thus it cannot store reliably text that&#x27;s\n\t\t\tlonger than 255 bytes.\n\t\t\tWe anyway tried a recovery routine in v2.5 that may be backported.\n\nVersion 10: FB3.0.\n\t\t\tSee backup_capabilities in OdsDetection.h.\n\nVersion 11: FB4.0.\n\t\t\tSQL SECURITY feature, tables RDB$PUBLICATIONS/RDB$PUBLICATION_TABLES.\n\nVersion 12: FB6.0.\n\t\t\tSchemas.\n*/\n\ninline constexpr int ATT_BACKUP_FORMAT = 12;\n\n// max array dimension\n\ninline constexpr int MAX_DIMENSION = 16;\n\ninline constexpr int SERIES = 1;\n\ninline constexpr USHORT MAX_UPDATE_DBKEY_RECURSION_DEPTH = 16;\n\n\nenum att_type {\n\tatt_end = 0,\t\t// end of major record\n\n\t// Backup program attributes\n\n\tatt_backup_date = SERIES,\t// date of backup\n\tatt_backup_format,\t\t// backup format version\n\tatt_backup_os,\t\t// backup operating system\n\tatt_backup_compress,\n\tatt_backup_transportable,\t// XDR datatypes for user data\n\tatt_backup_blksize,\t\t// backup block size\n\tatt_backup_file,\t\t// database file name\n\tatt_backup_volume,\t\t// backup volume number\n\tatt_backup_keyname,\t\t// name of crypt key\n\tatt_backup_zip,\t\t\t// zipped backup file\n\tatt_backup_hash,\t\t// hash of crypt key\n\tatt_backup_crypt,\t\t// name of crypt plugin\n\n\t// Database attributes\n\n\tatt_file_name = SERIES,\t// database file name (physical)\n\tatt_file_size,\t\t// size of original database (physical)\n\tatt_jrd_version,\t\t// jrd version (physical)\n\tatt_creation_date,\t\t// database creation date (physical)\n\tatt_page_size,\t\t// page size of original database (physical)\n\tatt_database_description,\t// description from RDB$DATABASE (logical)\n\tatt_database_security_class,\t// database level security (logical)\n\tatt_sweep_in
