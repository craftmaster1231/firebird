re accounted for globally, and corruption fences are    */\n/* added before and after the &#x27;actual&#x27; storage.                       */\n/* ------------------------------------------------------------------ */\n/* This routine allocates storage with an extra twelve bytes; 8 are   */\n/* at the start and hold:                                             */\n/*   0-3 the original length requested                                */\n/*   4-7 buffer corruption detection fence (DECFENCE, x4)             */\n/* The 4 bytes at the end also hold a corruption fence (DECFENCE, x4) */\n/* ------------------------------------------------------------------ */\nstatic void *decMalloc(size_t n) {\n  uInt  size=n+12;                 // true size\n  void  *alloc;                    // -&gt; allocated storage\n  uByte *b, *b0;                   // work\n  uInt  uiwork;                    // for macros\n\n  alloc=malloc(size);              // -&gt; allocated storage\n  if (alloc==NULL) return NULL;    // out of strorage\n  b0=(uByte *)alloc;               // as bytes\n  decAllocBytes+=n;                // account for storage\n  UBFROMUI(alloc, n);              // save n\n  // printf(&quot; alloc ++ dAB: %ld (%ld)\\n&quot;, (LI)decAllocBytes, (LI)n);\n  for (b=b0+4; b&lt;b0+8; b++) *b=DECFENCE;\n  for (b=b0+n+8; b&lt;b0+n+12; b++) *b=DECFENCE;\n  return b0+8;                     // -&gt; play area\n  } // decMalloc\n\n/* ------------------------------------------------------------------ */\n/* decFree -- accountable free routine                                */\n/*   alloc is the storage to free                                     */\n/*                                                                    */\n/* Semantics is the same as the stdlib malloc routine, except that    */\n/* the global storage accounting is updated and the fences are        */\n/* checked to ensure that no routine has written &#x27;out of bounds&#x27;.     */\n/* ------------------------------------------------------------------ */\n/* This routine first checks that the fences have not been corrupted. */\n/* It then frees the storage using the &#x27;truw&#x27; storage address (that   */\n/* is, offset by 8).                                                  */\n/* ------------------------------------------------------------------ */\nstatic void decFree(void *alloc) {\n  uInt  n;                         // original length\n  uByte *b, *b0;                   // work\n  uInt  uiwork;                    // for macros\n\n  if (alloc==NULL) return;         // allowed; it&#x27;s a nop\n  b0=(uByte *)alloc;               // as bytes\n  b0-=8;                           // -&gt; true start of storage\n  n=UBTOUI(b0);                    // lift length\n  for (b=b0+4; b&lt;b0+8; b++) if (*b!=DECFENCE)\n    printf(&quot;=== Corrupt byte [%02x] at offset %d from %ld ===\\n&quot;, *b,\n           b-b0-8, (LI)b0);\n  for (b=b0+n+8; b&lt;b0+n+12; b++) if (*b!=DECFENCE)\n    printf(&quot;=== Corrupt byte [%02x] at offset +%d from %ld, n=%ld ===\\n&quot;, *b,\n           b-b0-8, (LI)b0, (LI)n);\n  free(b0);                        // drop the storage\n  decAllocBytes-=n;                // account for storage\n  // printf(&quot; free -- dAB: %d (%d)\\n&quot;, decAllocBytes, -n);\n  } // decFree\n#define malloc(a) decMalloc(a)\n#define free(a) decFree(a)\n#endif\n"}}, "reports": [{"fileId": "/build/extern/decNumber/decNumber.c", "reportHash": "cd936199305fdd8337df9449de9a98af", "checker": {"name": "clang-diagnostic-implicit-int-conversion", "url": "https://clang.llvm.org/docs/DiagnosticsReference.html#wimplicit-int-conversion"}, "analyzerName": "clang-tidy", "line": 3500, "column": 46, "message": "implicit conversion loses integer precision: 'int' to 'uint16_t' (aka 'unsigned short')", "events": [{"message": "implicit conversion loses integer precision: 'int' to 'uint16_t' (aka 'unsigned short')", "fileId": "/build/extern/decNumber/decNumber.c", "line": 3500, "column": 46}], "macros": [
