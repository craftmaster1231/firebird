      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,
      foldGutter : true,
      extraKeys : {},

                                                  */\n/*                                                                    */\n/* 1. This code is ANSI C89 except:                                   */\n/*                                                                    */\n/*    a) C99 line comments (double forward slash) are used.  (Most C  */\n/*       compilers accept these.  If yours does not, a simple script  */\n/*       can be used to convert them to ANSI C comments.)             */\n/*                                                                    */\n/*    b) Types from C99 stdint.h are used.  If you do not have this   */\n/*       header file, see the User&#x27;s Guide section of the decNumber   */\n/*       documentation; this lists the necessary definitions.         */\n/*                                                                    */\n/*    c) If DECDPUN&gt;4 or DECUSE64=1, the C99 64-bit int64_t and       */\n/*       uint64_t types may be used.  To avoid these, set DECUSE64=0  */\n/*       and DECDPUN&lt;=4 (see documentation).                          */\n/*                                                                    */\n/*    The code also conforms to C99 restrictions; in particular,      */\n/*    strict aliasing rules are observed.                             */\n/*                                                                    */\n/* 2. The decNumber format which this library uses is optimized for   */\n/*    efficient processing of relatively short numbers; in particular */\n/*    it allows the use of fixed sized structures and minimizes copy  */\n/*    and move operations.  It does, however, support arbitrary       */\n/*    precision (up to 999,999,999 digits) and arbitrary exponent     */\n/*    range (Emax in the range 0 through 999,999,999 and Emin in the  */\n/*    range -999,999,999 through 0).  Mathematical functions (for     */\n/*    example decNumberExp) as identified below are restricted more   */\n/*    tightly: digits, emax, and -emin in the context must be &lt;=      */\n/*    DEC_MAX_MATH (999999), and their operand(s) must be within      */\n/*    these bounds.                                                   */\n/*                                                                    */\n/* 3. Logical functions are further restricted; their operands must   */\n/*    be finite, positive, have an exponent of zero, and all digits   */\n/*    must be either 0 or 1.  The result will only contain digits     */\n/*    which are 0 or 1 (and will have exponent=0 and a sign of 0).    */\n/*                                                                    */\n/* 4. Operands to operator functions are never modified unless they   */\n/*    are also specified to be the result number (which is always     */\n/*    permitted).  Other than that case, operands must not overlap.   */\n/*                                                                    */\n/* 5. Error handling: the type of the error is ORed into the status   */\n/*    flags in the current context (decContext structure).  The       */\n/*    SIGFPE signal is then raised if the corresponding trap-enabler  */\n/*    flag in the decContext is set (is 1).                           */\n/*                                                                    */\n/*    It is the responsibility of the caller to clear the status      */\n/*    flags as required.                                              */\n/*                                                                    */\n/*    The result of any routine which returns a number will always    */\n/*    be a valid number (which may be a special value, such as an     */\n/*    Infinity or NaN).                                               */\n/*                                                                    */\n/* 6. The decNumber format is not an exchangeable concrete            */\n/*    representation as it comprises fields which may be machine-     */\n/*    dependent (packed or unpacked, or special length, for example). */\n/*    Canonical conversions to and from strings are provided; other   */\n/*    conversions are available in separate modules.                  */\n/*                                                                    */\n/* 7. Normally, input operands are assumed to be valid.  Set DECCHECK */\n/*    to 1 for extended operand checking (including NULL operands).   */\n/*    Results are undefined if a badly-formed structure (or a NULL    */\n/*    pointer to a structure) is provided, though with DECCHECK       */\n/*    enabled the operator routines are protected against exceptions. */\n/*    (Except if the result pointer is NULL, which is unrecoverable.) */\n/*                                                                    */\n/*    However, the routines will never cause exceptions if they are   */\n/*    given well-formed operands, even if the value of the operands   */\n/*    is inappropriate for the operation and DECCHECK is not set.     */\n/*    (Except for SIGFPE, as and where documented.)                   */\n/*                                                                    */\n/* 8. Subset arithmetic is available only if DECSUBSET is set to 1.   */\n/* ------------------------------------------------------------------ */\n/* Implementation notes for maintenance of this module:               */\n/*                                                                    */\n/* 1. Storage leak protection:  Routines which use malloc are not     */\n/*    permitted to use return for fastpath or error exits (i.e.,      */\n/*    they follow strict structured programming conventions).         */\n/*    Instead they have a do{}while(0); construct surrounding the     */\n/*    code which is protected -- break may be used to exit this.      */\n/*    Other routines can safely use the return statement inline.      */\n/*                                                                    */\n/*    Storage leak accounting can be enabled using DECALLOC.          */\n/*                                                                    */\n/* 2. All loops use the for(;;) construct.  Any do construct does     */\n/*    not loop; it is for allocation protection as just described.    */\n/*                                                                    */\n/* 3. Setting status in the context must always be the very last      */\n/*    action in a routine, as non-0 status may raise a trap and hence */\n/*    the call to set status may not return (if the handler uses long */\n/*    jump).  Therefore all cleanup must be done first.  In general,  */\n/*    to achieve this status is accumulated and is only applied just  */\n/*    before return by calling decContextSetStatus (via decStatus).   */\n/*                                                                    */\n/*    Routines which allocate storage cannot, in general, use the     */\n/*    &#x27;top level&#x27; routines which could cause a non-returning          */\n/*    transfer of control.  The decXxxxOp routines are safe (do not   */\n/*    call decStatus even if traps are set in the context) and should */\n/*    be used instead (they are also a little faster).                */\n/*                                                                    */\n/* 4. Exponent checking is minimized by allowing the exponent to      */\n/*    grow outside its limits during calculations, provided that      */\n/*    the decFinalize function is called later.  Multiplication and   */\n/*    division, and intermediate calculations in exponentiation,      */\n/*    require more careful checks because of the risk of 31-bit       */\n/*    overflow (the most negative valid exponent is -1999999997, for  */\n/*    a 999999999-digit number with adjusted exponent of -999999999). */\n/*                                                                    */\n/* 5. Rounding is deferred until finalization of results, with any    */\n/*           */\n/*      +ve -- positive                                               */\n/*      -ve -- negative                                               */\n/*      **  -- raise to the power                                     */\n/* ------------------------------------------------------------------ */\n\n#include &lt;stdlib.h&gt;                // for malloc, free, etc.\n#include &lt;stdio.h&gt;                 // for printf [if needed]\n#include &lt;string.h&gt;                // for strcpy\n#include &lt;ctype.h&gt;                 // for lower\n#include &quot;decNumber.h&quot;             // base number library\n#include &quot;decNumberLocal.h&quot;        // decNumber local types, etc.\n\n/* Constants */\n// Public lookup table used by the D2U macro\nconst uByte d2utable[DECMAXD2U+1]=D2UTABLE;\n\n#define DECVERB     1              // set to 1 for verbose DECCHECK\n#define powers      DECPOWERS      // old internal name\n\n// Local constants\n#define DIVIDE      0x80           // Divide operators\n#define REMAINDER   0x40           // ..\n#define DIVIDEINT   0x20           // ..\n#define REMNEAR     0x10           // ..\n#define COMPARE     0x01           // Compare operators\n#define COMPMAX     0x02           // ..\n#define COMPMIN     0x03           // ..\n#define COMPTOTAL   0x04           // ..\n#define COMPNAN     0x05           // .. [NaN processing]\n#define COMPSIG     0x06           // .. [signaling COMPARE]\n#define COMPMAXMAG  0x07           // ..\n#define COMPMINMAG  0x08           // ..\n\n#define DEC_sNaN     0x40000000    // local status: sNaN signal\n#define BADINT  (Int)0x80000000    // most-negative Int; error indicator\n// Next two indicate an integer &gt;= 10**6, and its parity (bottom bit)\n#define BIGEVEN (Int)0x80000002\n#define BIGODD  (Int)0x80000003\n\nstatic Unit uarrone[1]={1};   // Unit array of 1, used for incrementing\n\n/* Granularity-dependent code */\n#if DECDPUN&lt;=4\n  #define eInt  Int           // extended integer\n  # free accounting.  If enabled, our accountable routines\n// are used; otherwise the code just goes straight to the system malloc\n// and free routines.\n#define malloc(a) decMalloc(a)\n#define free(a) decFree(a)\n#define DECFENCE 0x5a              // corruption detector\n// &#x27;Our&#x27; malloc and free:\nstatic void *decMalloc(size_t);\nstatic void  decFree(void *);\nuInt decAllocBytes=0;              // count of bytes allocated\n// Note that DECALLOC code only checks for storage buffer overflow.\n// To check for memory leaks, the decAllocBytes variable must be\n// checked to be 0 at appropriate times (e.g., after the test\n// harness completes a set of tests).  This checking may be unreliable\n// if the testing is done in a multi-thread environment.\n#endif\n\n#if DECCHECK\n// Optional checking routines.  Enabling these means that decNumber\n// and decContext operands to operator routines are checked for\n// correctness.  This roughly doubles the execution time of the\n// fastest routines (and adds 600+ bytes), so should not normally be\n// used in &#x27;production&#x27;.\n// decCheckInexact is used to check that inexact results have a full\n// complement of digits (where appropriate -- this is not the case\n// for Quantize, for example)\n#define DECUNRESU ((decNumber *)(void *)0xffffffff)\n#define DECUNUSED ((const decNumber *)(void *)0xffffffff)\n#define DECUNCONT ((decContext *)(void *)(0xffffffff))\nstatic Flag decCheckOperands(decNumber *, const decNumber *,\n                             const decNumber *, decContext *);\nstatic Flag decCheckNumber(const decNumber *);\nstatic void decCheckInexact(const decNumber *, decContext *);\n#endif\n\n#if DECTRACE || DECCHECK\n// Optional trace/debugging routines (may or may not be used)\nvoid decNumberShow(const decNumber *);  // displays the components of a number\nstatic void decDumpAr(char, const Unit *, Int);\n#endif\n\n/* ================================================================== */\n/* Conversions                                                        */\n/* ================================================================== */\n\n/* ------------------------------------------------------------------ */\n/* from-int32 -- conversion from Int or uInt                          */\n/*                                                                    */\n/*  dn is the decNumber to receive the integer                        */\n/*  in or uin is the integer to be converted                          */\n/*  returns dn                                                        */\n/*                                                                    */\n/* No error is possible.                                              */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberFromInt32(decNumber *dn, Int in) {\n  uInt unsig;\n  if (in&gt;=0) unsig=in;\n   else {                               // negative (possibly BADINT)\n    if (in==BADINT) unsig=(uInt)1073741824*2; // special case\n     else unsig=-in;                    // invert\n    }\n  // in is now positive\n  decNumberFromUInt32(dn, unsig);\n  if (in&lt;0) dn-&gt;bits=DECNEG;            // sign needed\n  return dn;\n  } // decNumberFromInt32\n\ndecNumber * decNumberFromUInt32(decNumber *dn, uInt uin) {\n  Unit *up;                             // work pointer\n  decNumberZero(dn);                    // clean\n  if (uin==0) return dn;                // [or decGetDigits bad call]\n  for (up=dn-&gt;lsu; uin&gt;0; up++) {\n    *up=(Unit)(uin%(DECDPUNMAX+1));\n    uin=uin/(DECDPUNMAX+1);\n    }\n  dn-&gt;digits=decGetDigits(dn-&gt;lsu, up-dn-&gt;lsu);\n  return dn;\n  } // decNumberFromUInt32\n\n/* ------------------------------------------------------------------ */\n/* to-int32 -- conversion to Int or uInt                              */\n/*                                                                    */\n/*  dn is the decNumber to convert                                    */\n/*  set is the context for reporting errors                           */\n/*  returns the converted decNumber, or 0 if Invalid is set           */\n/*                                                                    */\n/* Invalid is set if the decNumber does not have exponent==0 or if    */\n/* it is a NaN, Infinite, or out-of-range.                            */\n/* ------------------------------------------------------------------ */\nInt decNumberToInt32(const decNumber *dn, decContext *set) {\n  #if DECCHECK\n  if (decCheckOperands(DECUNRESU, DECUNUSED, dn, set)) return 0;\n  #endif\n\n  // special or too many digits, or bad exponent\n  if (dn-&gt;bits&amp;DECSPECIAL || dn-&gt;digits&gt;10 || dn-&gt;exponent!=0) ; // bad\n   else { // is a finite integer with 10 or fewer digits\n    Int d;                         // work\n    const Unit *up;                // ..\n    uInt hi=0, lo;                 // ..\n    up=dn-&gt;lsu;                    // -&gt; lsu\n    lo=*up;                        // get 1 to 9 digits\n    #if DECDPUN&gt;1                  // split to higher\n      hi=lo/10;\n      lo=lo%10;\n    #endif\n    up++;\n    // collect remaining Units, if any, into hi\n    for (d=DECDPUN; d&lt;dn-&gt;digits; up++, d+=DECDPUN) hi+=*up*powers[d-1];\n    // now low has the lsd, hi the remainder\n    if (hi&gt;214748364 || (hi==214748364 &amp;&amp; lo&gt;7)) { // out of range?\n      // most-negative is a reprieve\n      if (dn-&gt;bits&amp;DECNEG &amp;&amp; hi==214748364 &amp;&amp; lo==8) return 0x80000000;\n      // bad -- drop through\n      }\n     else { // in-range always\n      Int i=X10(hi)+lo;\n      if (dn-&gt;bits&amp;DECNEG) return -i;\n      return i;\n      }\n    } // integer\n  decContextSetStatus(set, DEC_Invalid_operation); // [may not return]\n  return 0;\n  } // decNumberToInt32\n\nuInt decNumberToUInt32(const decNumber *dn, decContext *set) {\n  #if DECCHECK\n  if (decCheckOperands(DECUNRESU, DECUNUSED, dn, set)) return 0;\n  #endif\n  // special or too many digits, or bad exponent, or negative (&lt;0)\n  if (dn-&gt;bits&amp;DECSPECIAL || dn-&gt;digits&gt;10 || dn-&gt;exponent!=0\n    || (dn-&gt;bits&amp;DECNEG &amp;&amp; !ISZERO(dn)));                   // bad\n   else { // is a finite integer with 10 or fewer digits\n    Int d;                         // work\n    const Unit *up;                // ..\n    uInt hi=0, lo;                 // ..\n    up=dn-&gt;lsu;                    // -&gt; lsu\n    lo=*up;                        // get 1 to 9 digits\n    #if DECDPUN&gt;1                  // split to higher\n      hi=lo/10;\n      lo=lo%10;\n    #endif\n    up++;\n    // collect remaining Units, if any, into hi\n    for (d=DECDPUN; d&lt;dn-&gt;digits; up++, d+=DECDPUN) hi+=*up*powers[d-1];\n\n    // now low has the lsd, hi the remainder\n    if (hi&gt;429496729 || (hi==429496729 &amp;&amp; lo&gt;5)) ; // no reprieve possible\n     else return X10(hi)+lo;\n    } // integer\n  decContextSetStatus(set, DEC_Invalid_operation); // [may not return]\n  return 0;\n  } // decNumberToUInt32\n\n/* ------------------------------------------------------------------ */\n/* to-scientific-string -- conversion to numeric string               */\n/* to-engineering-string -- conversion to numeric string              */\n/*                                                                    */\n/*   decNumberToString(dn, string);                                   */\n/*   decNumberToEngString(dn, string);                                */\n/*                                                                    */\n/*  dn is the decNumber to convert                                    */\n/*  string is the string where the result will be laid out            */\n/*                                                                    */\n/*  string must be at least dn-&gt;digits+14 characters long             */\n/*                                                                    */\n/*  No error is possible, and no status can be set.                   */\n/* ------------------------------------------------------------------ */\nchar * decNumberToString(const decNumber *dn, char *string){\n  decToString(dn, string, 0);\n  return string;\n  } // DecNumberToString\n\nchar * decNumberToEngString(const decNumber *dn, char *string){\n  decToString(dn, string, 1);\n  return string;\n  } // DecNumberToEngString\n\n/* ------------------------------------------------------------------ */\n/* to-number -- conversion from numeric string                        */\n/*                                                                    */\n/* decNumberFromString -- convert string to decNumber                 */\n/*   dn        -- the number structure to fill                        */\n/*   chars[]   -- the string to convert (&#x27;\\0&#x27; terminated)             */\n/*   set       -- the context used for processing any error,          */\n/*                determining the maximum precision available         */\n/*                (set.digits), determining the maximum and minimum   */\n/*                exponent (set.emax and set.emin), determining if    */\n/*                extended values are allowed, and checking the       */\n/*                rounding mode if overflow occurs or rounding is     */\n/*                needed.                                             */\n/*                                                                    */\n/* The length of the coefficient and the size of the exponent are     */\n/* checked by this routine, so the correct error (Underflow or        */\n/* Overflow) can be reported or rounding applied, as necessary.       */\n/*                                                                    */\n/* If bad syntax is detected, the result will be a quiet NaN.         */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberFromString(decNumber *dn, const char chars[],\n                                decContext *set) {\n  Int   exponent=0;                // working exponent [assume 0]\n  uByte bits=0;                    // working flags [assume +ve]\n  Unit  *res;                      // where result will be built\n  Unit  resbuff[SD2U(DECBUFFER+9)];// local buffer in case need temporary\n                                   // [+9 allows for ln() constants]\n  Unit  *allocres=NULL;            // -&gt; allocated result, iff allocated\n  Int   d=0;                       // count of digits found in decimal part\n  const char *dotchar=NULL;        // where dot was found\n  const char *cfirst=chars;        // -&gt; first character of decimal part\n  const char *last=NULL;           // -&gt; last digit of decimal part\n  const char *c;                   // work\n  Unit  *up;                       // ..\n  #if DECDPUN&gt;1\n  Int   cut, out;                  // ..\n  #endif\n  Int   residue;                   // rounding residue\n  uInt  status=0;                  // error code\n\n  #if DECCHECK\n  if (decCheckOperands(DECUNRESU, DECUNUSED, DECUNUSED, set))\n    return decNumberZero(dn);\n  #endif\n\n  do {                             // status &amp; malloc protection\n    for (c=chars;; c++) {          // -&gt; input character\n      if (*c&gt;=&#x27;0&#x27; &amp;&amp; *c&lt;=&#x27;9&#x27;) {    // test for Arabic digit\n        last=c;\n        d++;                       // count of real digits\n        continue;                  // still in decimal part\n        }\n      if (*c==&#x27;.&#x27; &amp;&amp; dotchar==NULL) { // first &#x27;.&#x27;\n        dotchar=c;                 // record offset into decimal part\n        if (c==cfirst) cfirst++;   // first digit must follow\n        continue;}\n      if (c==chars) {              // first in string...\n        if (*c==&#x27;-&#x27;) {             // valid - sign\n          cfirst++;\n          bits=DECNEG;\n          continue;}\n        if (*c==&#x27;+&#x27;) {             // valid + sign\n          cfirst++;\n          continue;}\n        }\n      // *c is not a digit, or a valid +, -, or &#x27;.&#x27;\n      break;\n      } // c\n\n    if (last==NULL) {              // no digits yet\n      status=DEC_Conversion_syntax;// assume the worst\n      if (*c==&#x27;\\0&#x27;) break;         // and no more to come...\n      #if DECSUBSET\n      // if subset then infinities and NaNs are not allowed\n      if (!set-&gt;extended) break;   // hopeless\n      #endif\n      // Infinities and NaNs are possible, here\n      if (dotchar!=NULL) break;    // .. unless had a dot\n      decNumberZero(dn);           // be optimistic\n      if (decBiStr(c, &quot;infinity&quot;, &quot;INFINITY&quot;)\n       || decBiStr(c, &quot;inf&quot;, &quot;INF&quot;)) {\n        dn-&gt;bits=bits | DECINF;\n        status=0;                  // is OK\n        break; // all done\n        }\n      // a NaN expected\n      // 2003.09.10 NaNs are now permitted to have a sign\n      dn-&gt;bits=bits | DECNAN;      // assume simple NaN\n      if (*c==&#x27;s&#x27; || *c==&#x27;S&#x27;) {    // looks like an sNaN\n        c++;\n        dn-&gt;bits=bits | DECSNAN;\n        }\n      if (*c!=&#x27;n&#x27; &amp;&amp; *c!=&#x27;N&#x27;) break;    // check caseless &quot;NaN&quot;\n      c++;\n      if (*c!=&#x27;a&#x27; &amp;&amp; *c!=&#x27;A&#x27;) break;    // ..\n      c++;\n      if (*c!=&#x27;n&#x27; &amp;&amp; *c!=&#x27;N&#x27;) break;    // ..\n      c++;\n      // now either nothing, or nnnn payload, expected\n      // -&gt; start of integer and skip leading 0s [including plain 0]\n      for (cfirst=c; *cfirst==&#x27;0&#x27;;) cfirst++;\n      if (*cfirst==&#x27;\\0&#x27;) {         // &quot;NaN&quot; or &quot;sNaN&quot;, maybe with all 0s\n        status=0;                  // it&#x27;s good\n        break;                     // ..\n        }\n      // something other than 0s; setup last and d as usual [no dots]\n      for (c=cfirst;; c++, d++) {\n        if (*c&lt;&#x27;0&#x27; || *c&gt;&#x27;9&#x27;) break; // test for Arabic digit\n        last=c;\n        }\n      if (*c!=&#x27;\\0&#x27;) break;         // not all digits\n      if (d&gt;set-&gt;digits-1) {\n        // [NB: payload in a decNumber can be full length unless\n        // clamped, in which case can only be digits-1]\n        if (set-&gt;clamp) break;\n        if (d&gt;set-&gt;digits) break;\n        } // too many digits?\n      // good; drop through to convert the integer to coefficient\n      status=0;                    // syntax is OK\n      bits=dn-&gt;bits;               // for copy-back\n      } // last==NULL\n\n     else if (*c!=&#x27;\\0&#x27;) {          // more to process...\n      // had some digits; exponent is only valid sequence now\n      Flag nege;                   // 1=negative exponent\n      const char *firstexp;        // -&gt; first significant exponent digit\n      status=DEC_Conversion_syntax;// assume the worst\n      if (*c!=&#x27;e&#x27; &amp;&amp; *c!=&#x27;E&#x27;) break;\n      /* Found &#x27;e&#x27; or &#x27;E&#x27; -- now process explicit exponent */\n      // 1998.07.11: sign no longer required\n      nege=0;\n      c++;                         // to (possible) sign\n      if (*c==&#x27;-&#x27;) {nege=1; c++;}\n       else if (*c==&#x27;+&#x27;) c++;\n      if (*c==&#x27;\\0&#x27;) break;\n\n      for (; *c==&#x27;0&#x27; &amp;&amp; *(c+1)!=&#x27;\\0&#x27;;) c++;  // strip insignificant zeros\n      firstexp=c;                            // save exponent digit place\n      for (; ;c++) {\n        if (*c&lt;&#x27;0&#x27; || *c&gt;&#x27;9&#x27;) break;         // not a digit\n        exponent=X10(exponent)+(Int)*c-(Int)&#x27;0&#x27;;\n        } // c\n      // if not now on a &#x27;\\0&#x27;, *c must not be a digit\n      if (*c!=&#x27;\\0&#x27;) break;\n\n      // (this next test must be after the syntax checks)\n      // if it was too long the exponent may have wrapped, so check\n      // carefully and set it to a certain overflow if wrap possible\n      if (c&gt;=firstexp+9+1) {\n        if (c&gt;firstexp+9+1 || *firstexp&gt;&#x27;1&#x27;) exponent=DECNUMMAXE*2;\n        // [up to 1999999999 is OK, for example 1E-1000000998]\n        }\n      if (nege) exponent=-exponent;     // was negative\n      status=0;                         // is OK\n      } // stuff after digits\n\n    // Here when whole string has been inspected; syntax is good\n    // cfirst-&gt;first digit (never dot), last-&gt;last digit (ditto)\n\n    // strip leading zeros/dot [leave final 0 if all 0&#x27;s]\n    if (*cfirst==&#x27;0&#x27;) {                 // [cfirst has stepped over .]\n      for (c=cfirst; c&lt;last; c++, cfirst++) {\n        if (*c==&#x27;.&#x27;) continue;          // ignore dots\n        if (*c!=&#x27;0&#x27;) break;             // non-zero found\n        d--;                            // 0 stripped\n        } // c\n      #if DECSUBSET\n      // make a rapid exit for easy zeros if !extended\n      if (*cfirst==&#x27;0&#x27; &amp;&amp; !set-&gt;extended) {\n        decNumberZero(dn);              // clean result\n        break;                          // [could be return]\n        }\n      #endif\n      } // at least one leading 0\n\n    // Handle decimal point...\n    if (dotchar!=NULL &amp;&amp; dotchar&lt;last)  // non-trailing &#x27;.&#x27; found?\n      exponent-=(last-dotchar);         // adjust exponent\n    // [we can now ignore the .]\n\n    // OK, the digits string is good.  Assemble in the decNumber, or in\n    // a temporary units array if rounding is needed\n    if (d&lt;=set-&gt;digits) res=dn-&gt;lsu;    // fits into supplied decNumber\n     else {                             // rounding needed\n      Int needbytes=D2U(d)*sizeof(Unit);// bytes needed\n      res=resbuff;                      // assume use local buffer\n      if (needbytes&gt;(Int)sizeof(resbuff)) { // too big for local\n        allocres=(Unit *)malloc(needbytes);\n        if (allocres==NULL) {status|=DEC_Insufficient_storage; break;}\n        res=allocres;\n        }\n      }\n    // res now -&gt; number lsu, buffer, or allocated storage for Unit array\n\n    // Place the coefficient into the selected Unit array\n    // [this is often 70% of the cost of this function when DECDPUN&gt;1]\n    #if DECDPUN&gt;1\n    out=0;                         // accumulator\n    up=res+D2U(d)-1;               // -&gt; msu\n    cut=d-(up-res)*DECDPUN;        // digits in top unit\n    for (c=cfirst;; c++) {         // along the digits\n      if (*c==&#x27;.&#x27;) continue;       // ignore &#x27;.&#x27; [don&#x27;t decrement cut]\n      out=X10(out)+(Int)*c-(Int)&#x27;0&#x27;;\n      if (c==last) break;          // done [never get to trailing &#x27;.&#x27;]\n      cut--;\n      if (cut&gt;0) continue;         // more for this unit\n      *up=(Unit)out;               // write unit\n      up--;                        // prepare for unit below..\n      cut=DECDPUN;                 // ..\n      out=0;                       // ..\n      } // c\n    *up=(Unit)out;                 // write lsu\n\n    #else\n    // DECDPUN==1\n    up=res;                        // -&gt; lsu\n    for (c=last; c&gt;=cfirst; c--) { // over each character, from least\n      if (*c==&#x27;.&#x27;) continue;       // ignore . [don&#x27;t step up]\n      *up=(Unit)((Int)*c-(Int)&#x27;0&#x27;);\n      up++;\n      } // c\n    #endif\n\n    dn-&gt;bits=bits;\n    dn-&gt;exponent=exponent;\n    dn-&gt;digits=d;\n\n    // if not in number (too long) shorten into the number\n    if (d&gt;set-&gt;digits) {\n      residue=0;\n      decSetCoeff(dn, set, res, d, &amp;residue, &amp;status);\n      // always check for overflow or subnormal and round as needed\n      decFinalize(dn, set, &amp;residue, &amp;status);\n      }\n     else { // no rounding, but may still have overflow or subnormal\n      // [these tests are just for performance; finalize repeats them]\n      if ((dn-&gt;exponent-1&lt;set-&gt;emin-dn-&gt;digits)\n       || (dn-&gt;exponent-1&gt;set-&gt;emax-set-&gt;digits)) {\n        residue=0;\n        decFinalize(dn, set, &amp;residue, &amp;status);\n        }\n      }\n    // decNumberShow(dn);\n    } while(0);                         // [for break]\n\n  if (allocres!=NULL) free(allocres);   // drop any storage used\n  if (status!=0) decStatus(dn, status, set);\n  return dn;\n  } /* decNumberFromString */\n\n/* ================================================================== */\n/* Operators                                                          */\n/* ================================================================== */\n\n/* ------------------------------------------------------------------ */\n/* decNumberAbs -- absolute value operator                            */\n/*                                                                    */\n/*   This computes C = abs(A)                                         */\n/*                                                                    */\n/*   res is C, the result.  C may be A                                */\n/*   rhs is A                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* See also decNumberCopyAbs for a quiet bitwise version of this.     */\n/* C must have space for set-&gt;digits digits.                          */\n/* ------------------------------------------------------------------ */\n/* This has the same effect as decNumberPlus unless A is negative,    */\n/* in which case it has the same effect as decNumberMinus.            */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberAbs(decNumber *res, const decNumber *rhs,\n                         decContext *set) {\n  decNumber dzero;                      // for 0\n  uInt status=0;                        // accumulator\n\n  #if DECCHECK\n  if (decCheckOperands(res, DECUNUSED, rhs, set)) return res;\n  #endif\n\n  decNumberZero(&amp;dzero);                // set 0\n  dzero.exponent=rhs-&gt;exponent;         // [no coefficient expansion]\n  decAddOp(res, &amp;dzero, rhs, set, (uByte)(rhs-&gt;bits &amp; DECNEG), &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  #if DECCHECK\n  decCheckInexact(res, set);\n  #endif\n  return res;\n  } // decNumberAbs\n\n/* ------------------------------------------------------------------ */\n/* decNumberAdd -- add two Numbers                                    */\n/*                                                                    */\n/*   This computes C = A + B                                          */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X+X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/* ------------------------------------------------------------------ */\n/* This just calls the routine shared with Subtract                   */\ndecNumber * decNumberAdd(decNumber *res, const decNumber *lhs,\n                         const decNumber *rhs, decContext *set) {\n  uInt status=0;                        // accumulator\n  decAddOp(res, lhs, rhs, set, 0, &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  #if DECCHECK\n  decCheckInexact(res, set);\n  #endif\n  return res;\n  } // decNumberAdd\n\n/* ------------------------------------------------------------------ */\n/* decNumberAnd -- AND two Numbers, digitwise                         */\n/*                                                                    */\n/*   This computes C = A &amp; B                                          */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X&amp;X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context (used for result length and error report)     */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/*                                                                    */\n/* Logical function restrictions apply (see above); a NaN is          */\n/* returned with Invalid_operation if a restriction is violated.      */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberAnd(decNumber *res, const decNumber *lhs,\n                         const decNumber *rhs, decContext *set) {\n  const Unit *ua, *ub;                  // -&gt; operands\n  const Unit *msua, *msub;              // -&gt; operand msus\n  Unit *uc,  *msuc;                     // -&gt; result and its msu\n  Int   msudigs;                        // digits in res msu\n  #if DECCHECK\n  if (decCheckOperands(res, lhs, rhs, set)) return res;\n  #endif\n\n  if (lhs-&gt;exponent!=0 || decNumberIsSpecial(lhs) || decNumberIsNegative(lhs)\n   || rhs-&gt;exponent!=0 || decNumberIsSpecial(rhs) || decNumberIsNegative(rhs)) {\n    decStatus(res, DEC_Invalid_operation, set);\n    return res;\n    }\n\n  // operands are valid\n  ua=lhs-&gt;lsu;                          // bottom-up\n  ub=rhs-&gt;lsu;                          // ..\n  uc=res-&gt;lsu;                          // ..\n  msua=ua+D2U(lhs-&gt;digits)-1;           // -&gt; msu of lhs\n  msub=ub+D2U(rhs-&gt;digits)-1;           // -&gt; msu of rhs\n  msuc=uc+D2U(set-&gt;digits)-1;           // -&gt; msu of result\n  msudigs=MSUDIGITS(set-&gt;digits);       // [faster than remainder]\n  for (; uc&lt;=msuc; ua++, ub++, uc++) {  // Unit loop\n    Unit a, b;                          // extract units\n    if (ua&gt;msua) a=0;\n     else a=*ua;\n    if (ub&gt;msub) b=0;\n     else b=*ub;\n    *uc=0;                              // can now write back\n    if (a|b) {                          // maybe 1 bits to examine\n      Int i, j;\n      *uc=0;                            // can now write back\n      // This loop could be unrolled and/or use BIN2BCD tables\n      for (i=0; i&lt;DECDPUN; i++) {\n        if (a&amp;b&amp;1) *uc=*uc+(Unit)powers[i];  // effect AND\n        j=a%10;\n        a=a/10;\n        j|=b%10;\n        b=b/10;\n        if (j&gt;1) {\n          decStatus(res, DEC_Invalid_operation, set);\n          return res;\n          }\n        if (uc==msuc &amp;&amp; i==msudigs-1) break; // just did final digit\n        } // each digit\n      } // both OK\n    } // each unit\n  // [here uc-1 is the msu of the result]\n  res-&gt;digits=decGetDigits(res-&gt;lsu, uc-res-&gt;lsu);\n  res-&gt;exponent=0;                      // integer\n  res-&gt;bits=0;                          // sign=0\n  return res;  // [no status to set]\n  } // decNumberAnd\n\n/* ------------------------------------------------------------------ */\n/* decNumberCompare -- compare two Numbers                            */\n/*                                                                    */\n/*   This computes C = A ? B                                          */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X?X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for one digit (or NaN).                          */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberCompare(decNumber *res, const decNumber *lhs,\n                             const decNumber *rhs, decContext *set) {\n  uInt status=0;                        // accumulator\n  decCompareOp(res, lhs, rhs, set, COMPARE, &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  return res;\n  } // decNumberCompare\n\n/* ------------------------------------------------------------------ */\n/* decNumberCompareSignal -- compare, signalling on all NaNs          */\n/*                                                                    */\n/*   This computes C = A ? B                                          */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X?X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for one digit (or NaN).                          */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberCompareSignal(decNumber *res, const decNumber *lhs,\n                                   const decNumber *rhs, decContext *set) {\n  uInt status=0;                        // accumulator\n  decCompareOp(res, lhs, rhs, set, COMPSIG, &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  return res;\n  } // decNumberCompareSignal\n\n/* ------------------------------------------------------------------ */\n/* decNumberCompareTotal -- compare two Numbers, using total ordering */\n/*                                                                    */\n/*   This computes C = A ? B, under total ordering                    */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X?X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for one digit; the result will always be one of  */\n/* -1, 0, or 1.                                                       */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberCompareTotal(decNumber *res, const decNumber *lhs,\n                                  const decNumber *rhs, decContext *set) {\n  uInt status=0;                        // accumulator\n  decCompareOp(res, lhs, rhs, set, COMPTOTAL, &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  return res;\n  } // decNumberCompareTotal\n\n/* ------------------------------------------------------------------ */\n/* decNumberCompareTotalMag -- compare, total ordering of magnitudes  */\n/*                                                                    */\n/*   This computes C = |A| ? |B|, under total ordering                */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X?X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for one digit; the result will always be one of  */\n/* -1, 0, or 1.                                                       */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberCompareTotalMag(decNumber *res, const decNumber *lhs,\n                                     const decNumber *rhs, decContext *set) {\n  uInt status=0;                   // accumulator\n  uInt needbytes;                  // for space calculations\n  decNumber bufa[D2N(DECBUFFER+1)];// +1 in case DECBUFFER=0\n  decNumber *allocbufa=NULL;       // -&gt; allocated bufa, iff allocated\n  decNumber bufb[D2N(DECBUFFER+1)];\n  decNumber *allocbufb=NULL;       // -&gt; allocated bufb, iff allocated\n  decNumber *a, *b;                // temporary pointers\n\n  #if DECCHECK\n  if (decCheckOperands(res, lhs, rhs, set)) return res;\n  #endif\n\n  do {                                  // protect allocated storage\n    // if either is negative, take a copy and absolute\n    if (decNumberIsNegative(lhs)) {     // lhs&lt;0\n      a=bufa;\n      needbytes=sizeof(decNumber)+(D2U(lhs-&gt;digits)-1)*sizeof(Unit);\n      if (needbytes&gt;sizeof(bufa)) {     // need malloc space\n        allocbufa=(decNumber *)malloc(needbytes);\n        if (allocbufa==NULL) {          // hopeless -- abandon\n          status|=DEC_Insufficient_storage;\n          break;}\n        a=allocbufa;                    // use the allocated space\n        }\n      decNumberCopy(a, lhs);            // copy content\n      a-&gt;bits&amp;=~DECNEG;                 // .. and clear the sign\n      lhs=a;                            // use copy from here on\n      }\n    if (decNumberIsNegative(rhs)) {     // rhs&lt;0\n      b=bufb;\n      needbytes=sizeof(decNumber)+(D2U(rhs-&gt;digits)-1)*sizeof(Unit);\n      if (needbytes&gt;sizeof(bufb)) {     // need malloc space\n        allocbufb=(decNumber *)malloc(needbytes);\n        if (allocbufb==NULL) {          // hopeless -- abandon\n          status|=DEC_Insufficient_storage;\n          break;}\n        b=allocbufb;                    // use the allocated space\n        }\n      decNumberCopy(b, rhs);            // copy content\n      b-&gt;bits&amp;=~DECNEG;                 // .. and clear the sign\n      rhs=b;                            // use copy from here on\n      }\n    decCompareOp(res, lhs, rhs, set, COMPTOTAL, &amp;status);\n    } while(0);                         // end protected\n\n  if (allocbufa!=NULL) free(allocbufa); // drop any storage used\n  if (allocbufb!=NULL) free(allocbufb); // ..\n  if (status!=0) decStatus(res, status, set);\n  return res;\n  } // decNumberCompareTotalMag\n\n/* ------------------------------------------------------------------ */\n/* decNumberDivide -- divide one number by another                    */\n/*                                                                    */\n/*   This computes C = A / B                                          */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X/X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberDivide(decNumber *res, const decNumber *lhs,\n                            const decNumber *rhs, decContext *set) {\n  uInt status=0;                        // accumulator\n  decDivideOp(res, lhs, rhs, set, DIVIDE, &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  #if DECCHECK\n  decCheckInexact(res, set);\n  #endif\n  return res;\n  } // decNumberDivide\n\n/* ------------------------------------------------------------------ */\n/* decNumberDivideInteger -- divide and return integer quotient       */\n/*                                                                    */\n/*   This computes C = A # B, where # is the integer divide operator  */\n/*                                                                    */\n/*   res is C, the result.  C may be A and/or B (e.g., X=X#X)         */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberDivideInteger(decNumber *res, const decNumber *lhs,\n                                   const decNumber *rhs, decContext *set) {\n  uInt status=0;                        // accumulator\n  decDivideOp(res, lhs, rhs, set, DIVIDEINT, &amp;status);\n  if (status!=0) decStatus(res, status, set);\n  return res;\n  } // decNumberDivideInteger\n\n/* ------------------------------------------------------------------ */\n/* decNumberExp -- exponentiation                                     */\n/*                                                                    */\n/*   This computes C = exp(A)                                         */\n/*                                                                    */\n/*   res is C, the result.  C may be A                                */\n/*   rhs is A                                                         */\n/*   set is the context; note that rounding mode has no effect        */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/*                                                                    */\n/* Mathematical function restrictions apply (see above); a NaN is     */\n/* returned with Invalid_operation if a restriction is violated.      */\n/*                                                                    */\n/* Finite results will always be full precision and Inexact, except   */\n/* when A is a zero or -Infinity (giving 1 or 0 respectively).        */\n/*                                                                    */\n/* An Inexact result is rounded using DEC_ROUND_HALF_EVEN; it will    */\n/* almost always be correctly rounded, but may be up to 1 ulp in      */\n/* error in rare cases.                                               */\n/* ------------------------------------------------------------------ */\n/* This is a wrapper for decExpOp which can handle the slightly wider */\n/* (double) range needed by Ln (which has to be able to calculate     */\n/* exp(-a) where a can be the tiniest number (Ntiny).                 */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberExp(decNumber *res, const decNumber *rhs,\n                         decContext *set) {\n  uInt status=0;                        // accumulator\n  #if DECSUBSET\n  decNumber *allocrhs=NULL;        // non-NULL if rounded rhs allocated\n  #endif\n\n  #if DECCHECK\n  if (decCheckOperands(res, DECUNUSED, rhs, set)) return res;\n  #endif\n\n  // Check restrictions; these restrictions ensure that if h=8 (see\n  // decExpOp) then the result will either overflow or underflow to 0.\n  // Other math functions restrict the input range, too, for inverses.\n  // If not violated then carry out the operation.\n  if (!decCheckMath(rhs, set, &amp;status)) do { // protect allocation\n    #if DECSUBSET\n    if (!set-&gt;extended) {\n      // reduce operand and set lostDigits status, as needed\n      if (rhs-&gt;digits&gt;set-&gt;digits) {\n        allocrhs=decRoundOperand(rhs, set, &amp;status);\n        if (allocrhs==NULL) break;\n        rhs=allocrhs;\n        }\n      }\n    #endif\n    decExpOp(res, rhs, set, &amp;status);\n    } while(0);                         // end protected\n\n  #if DECSUBSET\n  if (allocrhs !=NULL) free(allocrhs);  // drop any storage used\n  #endif\n  // apply significant status\n  if (status!=0) decStatus(res, status, set);\n  #if DECCHECK\n  decCheckInexact(res, set);\n  #endif\n  return res;\n  } // decNumberExp\n\n/* ------------------------------------------------------------------ */\n/* decNumberFMA -- fused multiply add                                 */\n/*                                                                    */\n/*   This computes D = (A * B) + C with only one rounding             */\n/*                                                                    */\n/*   res is D, the result.  D may be A or B or C (e.g., X=FMA(X,X,X)) */\n/*   lhs is A                                                         */\n/*   rhs is B                                                         */\n/*   fhs is C [far hand side]                                         */\n/*   set is the context                                               */\n/*                                                                    */\n/* Mathematical function restrictions apply (see above); a NaN is     */\n/* returned with Invalid_operation if a restriction is violated.      */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberFMA(decNumber *res, const decNumber *lhs,\n                         const decNumber *rhs, const decNumber *fhs,\n                         decContext *set) {\n  uInt status=0;                   // accumulator\n  decContext dcmul;                // context for the multiplication\n  uInt needbytes;                  // for space calculations\n  decNumber bufa[D2N(DECBUFFER*2+1)];\n  decNumber *allocbufa=NULL;       // -&gt; allocated bufa, iff allocated\n  decNumber *acc;                  // accumulator pointer\n  decNumber dzero;                 // work\n\n  #if DECCHECK\n  if (decCheckOperands(res, lhs, rhs, set)) return res;\n  if (decCheckOperands(res, fhs, DECUNUSED, set)) return res;\n  #endif\n\n  do {                                  // protect allocated storage\n    #if DECSUBSET\n    if (!set-&gt;extended) {               // [undefined if subset]\n      status|=DEC_Invalid_operation;\n      break;}\n    #endif\n    // Check math restrictions [these ensure no overflow or underflow]\n    if ((!decNumberIsSpecial(lhs) &amp;&amp; decCheckMath(lhs, set, &amp;status))\n     || (!decNumberIsSpecial(rhs) &amp;&amp; decCheckMath(rhs, set, &amp;status))\n     || (!decNumberIsSpecial(fhs) &amp;&amp; decCheckMath(fhs, set, &amp;status))) break;\n    // set up context for multiply\n    dcmul=*set;\n    dcmul.digits=lhs-&gt;digits+rhs-&gt;digits; // just enough\n    // [The above may be an over-estimate for subset arithmetic, but that&#x27;s OK]\n    dcmul.emax=DEC_MAX_EMAX;            // effectively unbounded ..\n    dcmul.emin=DEC_MIN_EMIN;            // [thanks to Math restrictions]\n    // set up decNumber space to receive the result of the multiply\n    acc=bufa;                           // may fit\n    needbytes=sizeof(decNumber)+(D2U(dcmul.digits)-1)*sizeof(Unit);\n    if (needbytes&gt;sizeof(bufa)) {       // need malloc space\n      allocbufa=(decNumber *)malloc(needbytes);\n      if (allocbufa==NULL) {            // hopeless -- abandon\n        status|=DEC_Insufficient_storage;\n        break;}\n      acc=allocbufa;                    // use the allocated space\n      }\n    // multiply with extended range and necessary precision\n    //printf(&quot;emin=%ld\\n&quot;, dcmul.emin);\n    decMultiplyOp(acc, lhs, rhs, &amp;dcmul, &amp;status);\n    // Only Invalid operation (from sNaN or Inf * 0) is possible in\n    // status; if either is seen than ignore fhs (in case it is\n    // another sNaN) and set acc to NaN unless we had an sNaN\n    // [decMultiplyOp leaves that to caller]\n    // Note sNaN has to go through addOp to shorten payload if\n    // necessary\n    if ((status&amp;DEC_Invalid_operation)!=0) {\n      if (!(status&amp;DEC_sNaN)) {         // but be true invalid\n        decNumberZero(res);             // acc not yet set\n        res-&gt;bits=DECNAN;\n        break;\n        }\n      decNumberZero(&amp;dzero);            // make 0 (any non-NaN would do)\n      fhs=&amp;dzero;                       // use that\n      }\n    #if DECCHECK\n     else { // multiply was OK\n      if (status!=0) printf(&quot;Status=%08lx after FMA multiply\\n&quot;, (LI)status);\n      }\n    #endif\n    // add the third operand and result -&gt; res, and all is done\n    decAddOp(res, acc, fhs, set, 0, &amp;status);\n    } while(0);                         // end protected\n\n  if (allocbufa!=NULL) free(allocbufa); // drop any storage used\n  if (status!=0) decStatus(res, status, set);\n  #if DECCHECK\n  decCheckInexact(res, set);\n  #endif\n  return res;\n  } // decNumberFMA\n\n/* ------------------------------------------------------------------ */\n/* decNumberInvert -- invert a Number, digitwise                      */\n/*                                                                    */\n/*   This computes C = ~A                                             */\n/*                                                                    */\n/*   res is C, the result.  C may be A (e.g., X=~X)                   */\n/*   rhs is A                                                         */\n/*   set is the context (used for result length and error report)     */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/*                                                                    */\n/* Logical function restrictions apply (see above); a NaN is          */\n/* returned with Invalid_operation if a restriction is violated.      */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberInvert(decNumber *res, const decNumber *rhs,\n                            decContext *set) {\n  const Unit *ua, *msua;                // -&gt; operand and its msu\n  Unit  *uc, *msuc;                     // -&gt; result and its msu\n  Int   msudigs;                        // digits in res msu\n  #if DECCHECK\n  if (decCheckOperands(res, DECUNUSED, rhs, set)) return res;\n  #endif\n\n  if (rhs-&gt;exponent!=0 || decNumberIsSpecial(rhs) || decNumberIsNegative(rhs)) {\n    decStatus(res, DEC_Invalid_operation, set);\n    return res;\n    }\n  // operand is valid\n  ua=rhs-&gt;lsu;                          // bottom-up\n  uc=res-&gt;lsu;                          // ..\n  msua=ua+D2U(rhs-&gt;digits)-1;           // -&gt; msu of rhs\n  msuc=uc+D2U(set-&gt;digits)-1;           // -&gt; msu of result\n  msudigs=MSUDIGITS(set-&gt;digits);       // [faster than remainder]\n  for (; uc&lt;=msuc; ua++, uc++) {        // Unit loop\n    Unit a;                             // extract unit\n    Int  i, j;                          // work\n    if (ua&gt;msua) a=0;\n     else a=*ua;\n    *uc=0;                              // can now write back\n    // always need to examine all bits in rhs\n    // This loop could be unrolled and/or use BIN2BCD tables\n    for (i=0; i&lt;DECDPUN; i++) {\n      if ((~a)&amp;1) *uc=*uc+(Unit)powers[i];   // effect INVERT\n      j=a%10;\n      a=a/10;\n      if (j&gt;1) {\n        decStatus(res, DEC_Invalid_operation, set);\n        return res;\n        }\n      if (uc==msuc &amp;&amp; i==msudigs-1) break;   // just did final digit\n      } // each digit\n    } // each unit\n  // [here uc-1 is the msu of the result]\n  res-&gt;digits=decGetDigits(res-&gt;lsu, uc-res-&gt;lsu);\n  res-&gt;exponent=0;                      // integer\n  res-&gt;bits=0;                          // sign=0\n  return res;  // [no status to set]\n  } // decNumberInvert\n\n/* ------------------------------------------------------------------ */\n/* decNumberLn -- natural logarithm                                   */\n/*                                                                    */\n/*   This computes C = ln(A)                                          */\n/*                                                                    */\n/*   res is C, the result.  C may be A                                */\n/*   rhs is A                                                         */\n/*   set is the context; note that rounding mode has no effect        */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/*                                                                    */\n/* Notable cases:                                                     */\n/*   A&lt;0 -&gt; Invalid                                                   */\n/*   A=0 -&gt; -Infinity (Exact)                                         */\n/*   A=+Infinity -&gt; +Infinity (Exact)                                 */\n/*   A=1 exactly -&gt; 0 (Exact)                                         */\n/*                                                                    */\n/* Mathematical function restrictions apply (see above); a NaN is     */\n/* returned with Invalid_operation if a restriction is violated.      */\n/*                                                                    */\n/* An Inexact result is rounded using DEC_ROUND_HALF_EVEN; it will    */\n/* almost always be correctly rounded, but may be up to 1 ulp in      */\n/* error in rare cases.                                               */\n/* ------------------------------------------------------------------ */\n/* This is a wrapper for decLnOp which can handle the slightly wider  */\n/* (+11) range needed by Ln, Log10, etc. (which may have to be able   */\n/* to calculate at p+e+2).                                            */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberLn(decNumber *res, const decNumber *rhs,\n                        decContext *set) {\n  uInt status=0;                   // accumulator\n  #if DECSUBSET\n  decNumber *allocrhs=NULL;        // non-NULL if rounded rhs allocated\n  #endif\n\n  #if DECCHECK\n  if (decCheckOperands(res, DECUNUSED, rhs, set)) return res;\n  #endif\n\n  // Check restrictions; this is a math function; if not violated\n  // then carry out the operation.\n  if (!decCheckMath(rhs, set, &amp;status)) do { // protect allocation\n    #if DECSUBSET\n    if (!set-&gt;extended) {\n      // reduce operand and set lostDigits status, as needed\n      if (rhs-&gt;digits&gt;set-&gt;digits) {\n        allocrhs=decRoundOperand(rhs, set, &amp;status);\n        if (allocrhs==NULL) break;\n        rhs=allocrhs;\n        }\n      // special check in subset for rhs=0\n      if (ISZERO(rhs)) {                // +/- zeros -&gt; error\n        status|=DEC_Invalid_operation;\n        break;}\n      } // extended=0\n    #endif\n    decLnOp(res, rhs, set, &amp;status);\n    } while(0);                         // end protected\n\n  #if DECSUBSET\n  if (allocrhs !=NULL) free(allocrhs);  // drop any storage used\n  #endif\n  // apply significant status\n  if (status!=0) decStatus(res, status, set);\n  #if DECCHECK\n  decCheckInexact(res, set);\n  #endif\n  return res;\n  } // decNumberLn\n\n/* ------------------------------------------------------------------ */\n/* decNumberLogB - get adjusted exponent, by 754 rules                */\n/*                                                                    */\n/*   This computes C = adjustedexponent(A)                            */\n/*                                                                    */\n/*   res is C, the result.  C may be A                                */\n/*   rhs is A                                                         */\n/*   set is the context, used only for digits and status              */\n/*                                                                    */\n/* For an unrounded result, digits may need to be 10 (A might have    */\n/* 10**9 digits and an exponent of +999999999, or one digit and an    */\n/* exponent of -1999999999).                                          */\n/*                                                                    */\n/* This returns the adjusted exponent of A after (in theory) padding  */\n/* with zeros on the right to set-&gt;digits digits while keeping the    */\n/* same value.  The exponent is not limited by emin/emax.             */\n/*                                                                    */\n/* Notable cases:                                                     */\n/*   A&lt;0 -&gt; Use |A|                                                   */\n/*   A=0 -&gt; -Infinity (Division by zero)                              */\n/*   A=Infinite -&gt; +Infinity (Exact)                                  */\n/*   A=1 exactly -&gt; 0 (Exact)                                         */\n/*   NaNs are propagated as usual                                     */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberLogB(decNumber *res, const decNumber *rhs,\n                          decContext *set) {\n  uInt status=0;                   // accumulator\n\n  #if DECCHECK\n  if (decCheckOperands(res, DECUNUSED, rhs, set)) return res;\n  #endif\n\n  // NaNs as usual; Infinities return +Infinity; 0-&gt;oops\n  if (decNumberIsNaN(rhs)) decNaNs(res, rhs, NULL, set, &amp;status);\n   else if (decNumberIsInfinite(rhs)) decNumberCopyAbs(res, rhs);\n   else if (decNumberIsZero(rhs)) {\n    decNumberZero(res);                 // prepare for Infinity\n    res-&gt;bits=DECNEG|DECINF;            // -Infinity\n    status|=DEC_Division_by_zero;       // as per 754\n    }\n   else { // finite non-zero\n    Int ae=rhs-&gt;exponent+rhs-&gt;digits-1; // adjusted exponent\n    if (set-&gt;digits&gt;=10) decNumberFromInt32(res, ae);  // lay it out\n     else {\n      decNumber buft[D2N(10)];          // temporary number\n      decNumber *t=buft;                // ..\n      decNumberFromInt32(t, ae);        // lay it out\n      decNumberPlus(res, t, set);       // round as necessary\n      }\n    }\n\n  if (status!=0) decStatus(res, status, set);\n  return res;\n  } // decNumberLogB\n\n/* ------------------------------------------------------------------ */\n/* decNumberLog10 -- logarithm in base 10                             */\n/*                                                                    */\n/*   This computes C = log10(A)                                       */\n/*                                                                    */\n/*   res is C, the result.  C may be A                                */\n/*   rhs is A                                                         */\n/*   set is the context; note that rounding mode has no effect        */\n/*                                                                    */\n/* C must have space for set-&gt;digits digits.                          */\n/*                                                                    */\n/* Notable cases:                                                     */\n/*   A&lt;0 -&gt; Invalid                                                   */\n/*   A=0 -&gt; -Infinity (Exact)                                         */\n/*   A=+Infinity -&gt; +Infinity (Exact)                                 */\n/*   A=10**n (if n is an integer) -&gt; n (Exact)                        */\n/*                                                                    */\n/* Mathematical function restrictions apply (see above); a NaN is     */\n/* returned with Invalid_operation if a restriction is violated.      */\n/*                                                                    */\n/* An Inexact result is rounded using DEC_ROUND_HALF_EVEN; it will    */\n/* almost always be correctly rounded, but may be up to 1 ulp in      */\n/* error in rare cases.                                               */\n/* ------------------------------------------------------------------ */\n/* This calculates ln(A)/ln(10) using appropriate precision.  For     */\n/* ln(A) this is the max(p, rhs-&gt;digits + t) + 3, where p is the      */\n/* requested digits and t is the number of digits in the exponent     */\n/* (maximum 6).  For ln(10) it is p + 3; this is often handled by the */\n/* fastpath in decLnOp.  The final division is done to the requested  */\n/* precision.                                                         */\n/* ------------------------------------------------------------------ */\ndecNumber * decNumberLog10(decNumber *res, const decNumber *rhs,\n                          decContext *set) {\n  uInt status=0, ignore=0;         // status accumulators\n  uInt needbytes;                  // for space calculations\n  Int p;                           // working precision\n  Int t;                           // digits in exponent of A\n\n  // buffers for a and b working decimals\n  // (adjustment calculator, same size)\n  decNumber bufa[D2N(DECBUFFER+2)];\n  decNumber *allocbufa=NULL;       // -&gt; allocated bufa, iff allocated\n  decNumber *a=bufa;               // temporary a\n  decNumber bufb[D2N(DECBUFFER+2)];\n  decNumber *allocbufb=NULL;       // -&gt; allocated bufb, iff allocated\n  decNumber *b=bufb;               // temporary b\n  decNumber bufw[D2N(10)];         // working 2-10 digit number\n  decNumber *w=bufw;               // ..\n  #if DECSUBSET\n  decNumber *allocrhs=NULL;        // non-NULL if rounded rhs allocated\n  #endif\n\n  decContext aset;                 // working context\n\n  #if DECCHECK\n  if (decCheckOperands(res, DECUNUSED, rhs, set)) return res;\n  #endif\n\n  // Check restrictions; this is a math function; if not violated\n  // then carry out the operation.\n  if (!decCheckMath(rhs, set, &amp;status)) do { // protect malloc\n    #if DECSUBSET\n    if (!set-&gt;extended) {\n      // reduce operand and set lostDigits status, as needed\n      if (rhs-&gt;digits&gt;set-&gt;digits) {\n        allocrhs=decRoundOperand(rhs, set, &amp;status);\n        if (allocrhs==NULL) break;\n        rhs=allocrhs;\n        }\n      // special check in subset for rhs=0\n      if (ISZERO(rhs)) {                // +/- zeros -&gt; error\n        status|=DEC_Invalid_operation;\n        break;}\n      } // extended=0\n    #endif\n\n    decContextDefault(&amp;aset, DEC_INIT_DECIMAL64); // clean context\n\n    // handle exact powers of 10; only check if +ve finite\n    if (!(rhs-&gt;bits&amp;(DECNEG|DECSPECIAL)) &amp;&amp; !ISZERO(rhs)) {\n      Int residue=0;               // (no residue)\n      uInt copystat=0;             // clean status\n\n      // round to a single digit...\n      aset.digits=1;\n      decCopyFit(w, rhs, &amp;aset, &amp;residue, &amp;copystat); // copy &amp; shorten\n      // if exact and the digit is 1, rhs is a power of 10\n      if (!(copystat&amp;DEC_Inexact) &amp;&amp; w-&gt;lsu[0]==1) {\n        // the exponent, conveniently, is the power of 10; making\n        // this the result needs a little care as it might not fit,\n        // so first convert it into the working number, and then move\n        // to res\n        decNumberFromInt32(w, w-&gt;exponent);\n        residue=0;\n        decCopyFit(res, w, set, &amp;residue, &amp;status); // copy &amp; round\n        decFinish(res, set, &amp;residue, &amp;status);     // cleanup/set flags\n        break;\n        } // not a power of 10\n      } // not a candidate for exact\n\n    // simplify the information-content calculation to use &#x27;total\n    // number of digits in a, including exponent&#x27; as compared to the\n    // requested digits, as increasing this will only rarely cost an\n    // iteration in ln(a) anyway\n    t=6;                                // it can never be &gt;6\n\n    // allocate space when needed...\n    p=(rhs-&gt;digits+t&gt;set-&gt;digits?rhs-&gt;digits+t:set-&gt;digits)+3;\n    needbytes=sizeof(decNumber)+(D2U(p)-1)*sizeof(Unit);\n    if (needbytes&gt;sizeof(bufa)) {       // need malloc space\n      allocbufa=(decNumber *)malloc(needbytes);\n      if (allocbufa==NULL) {            // hopeless -- abandon\n        status|=DEC_Insufficient_storage;\n        break;}\n      a=allocbufa;                      // use the allocated space\n      }\n    aset.digits=p;                      // as calculated\n    aset.emax=DEC_MAX_MATH;             // usual bounds\n    aset.emin=-DEC_MAX_MATH;            // ..\n    aset.clamp=0;                       // and no concrete format\n    decLnOp(a, rhs, &amp;aset, &amp;status);    // a=ln(rhs)\n\n    // skip the division if the result so far is infinite, NaN, or\n    // zero, or there was an error; note NaN from sNaN needs copy\n    if (status&amp;DEC_NaNs &amp;&amp; !(status&amp;DEC_sNaN)) break;\n    if (a-&gt;bits&amp;DECSPECIAL || ISZERO(a)) {\n      decNumberCopy(res, a);            // [will fit]\n      break;}\n\n    // for ln(10) an extra 3 digits of precision are needed\n    p=set-&gt;digits+3;\n    needbytes=sizeof(decNumber)+(D2U(p)-1)*sizeof(Unit);\n    if (needbytes&gt;sizeof(bufb)) {       // need malloc space\n      allocbufb=(decNumber *)malloc(needbytes);\n      if (allocbufb==NULL) {            // hopeless -- abandon\n        status|=DEC_Insufficient_storage;\n        break;}\n      b=allocbufb;                      // use the allocated space\n      }\n    decNumberZero(w);                   // set up 10...\n    #if DECDPUN==1\n    w-&gt;lsu[1]=1; w-&gt;lsu[0]=0;           // ..\n    #else\n    w-&gt;lsu[0]=10;                       // ..\n    #endif\n    w-&gt;digits=2;                        // ..\n\n    aset.digits=p;\n    decLnOp(b, w, &amp;aset, &amp;ignore);      // b=ln(10)\n\n    aset.digits=set-&gt;digits;            // for final divide\n    decDivideOp(res, a, b, &amp;aset, DIVIDE, &amp;status); // into result\n    } while(0);                         // [for break]\n\n  if (allocbufa!=NULL) free(allocbufa); // drop any storage used\n  if (a
