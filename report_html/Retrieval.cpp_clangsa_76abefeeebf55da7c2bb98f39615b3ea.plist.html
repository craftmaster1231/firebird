 || keyNode-&gt;blrOp != blr_dbkey || keyNode-&gt;recStream != stream)\n\t\treturn nullptr;\n\n\t// If this is a dbkey for the appropriate stream, it&#x27;s invertable\n\n\tconst double cardinality = csb-&gt;csb_rpt[stream].csb_cardinality;\n\n\tbool unique = false;\n\tdouble selectivity = 0;\n\n\tValueExprNode* lower = nullptr;\n\tValueExprNode* upper = nullptr;\n\tValueListNode* list = listNode ? listNode-&gt;list : nullptr;\n\n\tif (cmpNode)\n\t{\n\t\tswitch (cmpNode-&gt;blrOp)\n\t\t{\n\t\tcase blr_eql:\n\t\tcase blr_equiv:\n\t\t\tunique = true;\n\t\t\tselectivity = 1 / cardinality;\n\t\t\tlower = upper = (dbkeyArg == 1) ? cmpNode-&gt;arg2 : cmpNode-&gt;arg1;\n\t\t\tbreak;\n\n\t\tcase blr_gtr:\n\t\tcase blr_geq:\n\t\t\tselectivity = REDUCE_SELECTIVITY_FACTOR_GREATER;\n\t\t\tif (dbkeyArg == 1)\n\t\t\t\tlower = cmpNode-&gt;arg2;\t// dbkey &gt; arg2\n\t\t\telse\n\t\t\t\tupper = cmpNode-&gt;arg1;\t// arg1 &lt; dbkey\n\t\t\tbreak;\n\n\t\tcase blr_lss:\n\t\tcase blr_leq:\n\t\t\tselectivity = REDUCE_SELECTIVITY_FACTOR_LESS;\n\t\t\tif (dbkeyArg == 1)\n\t\t\t\tupper = cmpNode-&gt;arg2;\t// dbkey &lt; arg2\n\t\t\telse\n\t\t\t\tlower = cmpNode-&gt;arg1;\t// arg1 &lt; dbkey\n\t\t\tbreak;\n\n\t\tcase blr_between:\n\t\t\tif (dbkeyArg == 1)\t\t\t// dbkey between arg2 and arg3\n\t\t\t{\n\t\t\t\tselectivity = REDUCE_SELECTIVITY_FACTOR_BETWEEN;\n\t\t\t\tlower = cmpNode-&gt;arg2;\n\t\t\t\tupper = cmpNode-&gt;arg3;\n\t\t\t}\n\t\t\telse if (dbkeyArg == 2)\t\t// arg1 between dbkey and arg3, or dbkey &lt;= arg1 and arg1 &lt;= arg3\n\t\t\t{\n\t\t\t\tselectivity = REDUCE_SELECTIVITY_FACTOR_LESS;\n\t\t\t\tupper = cmpNode-&gt;arg1;\n\t\t\t}\n\t\t\telse if (dbkeyArg == 3)\t\t// arg1 between arg2 and dbkey, or arg2 &lt;= arg1 and arg1 &lt;= dbkey\n\t\t\t{\n\t\t\t\tselectivity = REDUCE_SELECTIVITY_FACTOR_GREATER;\n\t\t\t\tlower = cmpNode-&gt;arg1;\n\t\t\t}\n\t\t\tbreak;\n\n\t\tdefault:\n\t\t\tfb_assert(false);\n\t\t}\n\t}\n\telse\n\t{\n\t\tselectivity = list-&gt;items.getCount() / cardinality;\n\t}\n\n\tif (lower &amp;&amp; !lower-&gt;computable(csb, stream, false))\n\t\treturn nullptr;\n\n\tif (upper &amp;&amp; !upper-&gt;computable(csb, stream, false))\n\t\treturn nullptr;\n\n\tif (list &amp;&amp; !list-&gt;computable(csb, stream, false))\n\t\treturn nullptr;\n\n\tconst auto invCandidate = FB_NEW_POOL(getPool()) InversionCandidate(getPool());\n\tinvCandidate-&gt;unique = unique;\n\tinvCandidate-&gt;selectivity = selectivity;\n\tinvCandidate-&gt;cost = 0;\n\tinvCandidate-&gt;matches.add(boolean);\n\tboolean-&gt;findDependentFromStreams(csb, stream, &amp;invCandidate-&gt;dependentFromStreams);\n\tinvCandidate-&gt;dependencies = invCandidate-&gt;dependentFromStreams.getCount();\n\n\tif (createIndexScanNodes)\n\t{\n\t\tif (list)\n\t\t{\n\t\t\tInversionNode* listInversion = nullptr;\n\n\t\t\tfor (auto value : list-&gt;items)\n\t\t\t{\n\t\t\t\tconst auto inversion = FB_NEW_POOL(getPool()) InversionNode(value, n);\n\t\t\t\tinversion-&gt;impure = csb-&gt;allocImpure&lt;impure_inversion&gt;();\n\t\t\t\tlistInversion = composeInversion(listInversion, inversion, InversionNode::TYPE_OR);\n\t\t\t}\n\n\t\t\tinvCandidate-&gt;inversion = listInversion;\n\t\t}\n\t\telse if (unique)\n\t\t{\n\t\t\tfb_assert(lower == upper);\n\n\t\t\tconst auto inversion = FB_NEW_POOL(getPool()) InversionNode(lower, n);\n\t\t\tinversion-&gt;impure = csb-&gt;allocImpure&lt;impure_inversion&gt;();\n\t\t\tinvCandidate-&gt;inversion = inversion;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tfb_assert(n == 0);\n\t\t\tfb_assert(lower || upper);\n\n\t\t\tconst auto dbkeyRange = FB_NEW_POOL(getPool()) DbKeyRangeNode(lower, upper);\n\t\t\tinvCandidate-&gt;dbkeyRanges.add(dbkeyRange);\n\t\t}\n\t}\n\n\treturn invCandidate;\n}\n\n//\n// Try to match boolean on every index.\n// If the boolean is an &quot;OR&quot; node then a inversion candidate could be returned.\n//\n\nInversionCandidate* Retrieval::matchOnIndexes(IndexScratchList&amp; inputIndexScratches,\n\t\t\t\t\t\t\t\t\t\t\t  BoolExprNode* boolean,\n\t\t\t\t\t\t\t\t\t\t\t  unsigned scope) const\n{\n\tconst auto binaryNode = nodeAs&lt;BinaryBoolNode&gt;(boolean);\n\n\t// Handle the &quot;OR&quot; case up front\n\tif (binaryNode &amp;&amp; binaryNode-&gt;blrOp == blr_or)\n\t{\n\t\tInversionCandidateList inversions;\n\n\t\t// Make list for index matches\n\n\t\t// Copy information from caller\n\t\tIndexScratchList indexOrScratches(inputIndexScratches);\n\n\t\t// We use a scope variable to see on how\n\t\t// deep we are in a nested or conjunction.\n\t\tscope++;\n\n\t\tauto invCandidate1 = matchOnIndexes(indexOrScratches, binaryNode-&gt;arg1, scope);\n\n\t\tif (invCandidate1)\n\t\t\tinversions.add(invCandidate1);\n\n\t\tauto childBoolNode = nodeAs&lt;BinaryBoolNode&gt;(binaryNode-&gt;arg1);\n\n\t\t// Get usable inversions based on indexOrScratches and scope\n\t\tif (!childBoolNode || childBoolNode-&gt;blrOp != blr_or)\n\t\t\tgetInversionCandidates(inversions, indexOrScratches, scope);\n\n\t\tinvCandidate1 = makeInversion(inversions);\n\n\t\t// Copy information from caller\n\t\tindexOrScratches = inputIndexScratches;\n\n\t\t// Clear inversion list\n\t\tinversions.clear();\n\n\t\tauto invCandidate2 = matchOnIndexes(indexOrScratches, binaryNode-&gt;arg2, scope);\n\n\t\tif (invCandidate2)\n\t\t\tinversions.add(invCandidate2);\n\n\t\tchildBoolNode = nodeAs&lt;BinaryBoolNode&gt;(binaryNode-&gt;arg2);\n\n\t\t// Make inversion based on indexOrScratches and scope\n\t\tif (!childBoolNode || childBoolNode-&gt;blrOp != blr_or)\n\t\t\tgetInversionCandidates(inversions, indexOrScratches, scope);\n\n\t\tinvCandidate2 = makeInversion(inversions);\n\n\t\tif (invCandidate1 &amp;&amp; invCandidate2 &amp;&amp;\n\t\t\t(invCandidate1-&gt;indexes || invCandidate1-&gt;unique) &amp;&amp;\n\t\t\t(invCandidate2-&gt;indexes || invCandidate2-&gt;unique))\n\t\t{\n\t\t\tconst auto invCandidate = FB_NEW_POOL(getPool()) InversionCandidate(getPool());\n\t\t\tinvCandidate-&gt;inversion = composeInversion(invCandidate1-&gt;inversion,\n\t\t\t\tinvCandidate2-&gt;inversion, InversionNode::TYPE_OR);\n\t\t\tinvCandidate-&gt;selectivity = invCandidate1-&gt;selectivity + invCandidate2-&gt;selectivity -\n\t\t\t\tinvCandidate1-&gt;selectivity * invCandidate2-&gt;selectivity;\n\t\t\tinvCandidate-&gt;cost = invCandidate1-&gt;cost + invCandidate2-&gt;cost;\n\t\t\tinvCandidate-&gt;indexes = invCandidate1-&gt;indexes + invCandidate2-&gt;indexes;\n\t\t\tinvCandidate-&gt;nonFullMatchedSegments = 0;\n\t\t\tinvCandidate-&gt;matchedSegments =\n\t\t\t\tMIN(invCandidate1-&gt;matchedSegments, invCandidate2-&gt;matchedSegments);\n\t\t\tinvCandidate-&gt;dependencies = invCandidate1-&gt;dependencies + invCandidate2-&gt;dependencies;\n\n\t\t\tif (invCandidate1-&gt;condition &amp;&amp; invCandidate2-&gt;condition)\n\t\t\t{\n\t\t\t\tconst auto newNode = FB_NEW_POOL(getPool()) BinaryBoolNode(getPool(), blr_or);\n\t\t\t\tnewNode-&gt;arg1 = invCandidate1-&gt;condition;\n\t\t\t\tnewNode-&gt;arg2 = invCandidate2-&gt;condition;\n\t\t\t\tinvCandidate-&gt;condition = newNode;\n\t\t\t}\n\t\t\telse if (invCandidate1-&gt;condition)\n\t\t\t{\n\t\t\t\tinvCandidate-&gt;condition = invCandidate1-&gt;condition;\n\t\t\t}\n\t\t\telse if (invCandidate2-&gt;condition)\n\t\t\t{\n\t\t\t\tinvCandidate-&gt;condition = invCandidate2-&gt;condition;\n\t\t\t}\n\n\t\t\t// Add matches conjunctions that exists in both left and right inversion\n\t\t\tif (invCandidate1-&gt;matches.hasData() &amp;&amp; invCandidate2-&gt;matches.hasData())\n\t\t\t{\n\t\t\t\tSortedArray&lt;BoolExprNode*&gt; matches;\n\n\t\t\t\tfor (const auto match : invCandidate1-&gt;matches)\n\t\t\t\t\tmatches.add(match);\n\n\t\t\t\tfor (const auto match : invCandidate2-&gt;matches)\n\t\t\t\t{\n\t\t\t\t\tif (matches.exist(match))\n\t\t\t\t\t\tinvCandidate-&gt;matches.add(match);\n\t\t\t\t}\n\t\t\t}\n\n\t\t\treturn invCandidate;\n\t\t}\n\n\t\tif (invCandidate1)\n\t\t{\n\t\t\tBoolExprNode* condition = binaryNode-&gt;arg2;\n\n\t\t\tif (condition-&gt;computable(csb, stream, false))\n\t\t\t{\n\t\t\t\tif (invCandidate1-&gt;condition)\n\t\t\t\t{\n\t\t\t\t\tconst auto newNode = FB_NEW_POOL(getPool()) BinaryBoolNode(getPool(), blr_or);\n\t\t\t\t\tnewNode-&gt;arg1 = invCandidate1-&gt;condition;\n\t\t\t\t\tnewNode-&gt;arg2 = condition;\n\t\t\t\t\tcondition = newNode;\n\t\t\t\t}\n\n\t\t\t\tinvCandidate1-&gt;condition = condition;\n\t\t\t\treturn invCandidate1;\n\t\t\t}\n\t\t}\n\n\t\tif (invCandidate2)\n\t\t{\n\t\t\tBoolExprNode* condition = binaryNode-&gt;arg1;\n\n\t\t\tif (condition-&gt;computable(csb, stream, false))\n\t\t\t{\n\t\t\t\tif (invCandidate2-&gt;condition)\n\t\t\t\t{\n\t\t\t\t\tconst auto newNode = FB_NEW_POOL(getPool()) BinaryBoolNode(getPool(), blr_or);\n\t\t\t\t\tnewNode-&gt;arg1 = invCandidate2-&gt;condition;\n\t\t\t\t\tnewNode-&gt;arg2 = condition;\n\t\t\t\t\tcondition = newNode;\n\t\t\t\t}\n\n\t\t\t\tinvCandidate2-&gt;condition = condition;\n\t\t\t\treturn invCandidate2;\n\t\t\t}\n\t\t}\n\n\t\treturn nullptr;\n\t}\n\n\tif (binaryNode &amp;&amp; binaryNode-&gt;blrOp == blr_and)\n\t{\n\t\t// Recursively call this procedure for every boolean\n\t\t// and finally get candidate inversions.\n\t\t// Normally we come here from within a OR conjunction.\n\t\tInversionCandidateList inversions;\n\n\t\tInversionCandidate* invCandidate = matchOnIndexes(\n\t\t\tinputIndexScratches, binaryNode-&gt;arg1, scope);\n\n\t\tif (invCandidate)\n\t\t\tinversions.add(invCandidate);\n\n\t\tinvCandidate = matchOnIndexes(inputIndexScratches, binaryNode-&gt;arg2, scope);\n\n\t\tif (invCandidate)\n\t\t\tinversions.add(invCandidate);\n\n\t\treturn makeInversion(inversions);\n\t}\n\n\t// Check for DB_KEY comparison\n\tInversionCandidate* const invCandidate = matchDbKey(boolean);\n\n\t// Walk through indexes\n\tfor (auto&amp; indexScratch : inputIndexScratches)\n\t{\n\t\t// Try to match the boolean against a index.\n\t\tif (!(indexScratch.index-&gt;idx_runtime_flags &amp; idx_plan_dont_use) ||\n\t\t\t(indexScratch.index-&gt;idx_runtime_flags &amp; idx_plan_navigate))\n\t\t{\n\t\t\tmatchBoolean(&amp;indexScratch, boolean, scope);\n\t\t}\n\t}\n\n\treturn invCandidate;\n}\n\n\n//\n// Check if the boolean is valid for using it against the given index segment\n//\n\nbool Retrieval::validateStarts(IndexScratch* indexScratch,\n\t\t\t\t\t\t\t   ComparativeBoolNode* cmpNode,\n\t\t\t\t\t\t\t   unsigned segment) const\n{\n\tfb_assert(cmpNode &amp;&amp; cmpNode-&gt;blrOp == blr_starting);\n\tif (!cmpNode || cmpNode-&gt;blrOp != blr_starting)\n\t\treturn false;\n\n\tValueExprNode* field = cmpNode-&gt;arg1;\n\tValueExprNode* value = cmpNode-&gt;arg2;\n\n\tconst auto idx = indexScratch-&gt;index;\n\n\tif (idx-&gt;idx_flags &amp; idx_expression)\n\t{\n\t\t// AB: What if the expression contains a number/float etc.. and\n\t\t// we use starting with against it? Is that allowed?\n\n\t\tif (!(checkIndexExpression(idx, field) ||\n\t\t\t(value &amp;&amp; !value-&gt;computable(csb, stream, false))))\n\t\t{\n\t\t\t// AB: Can we swap de left and right sides by a starting with?\n\t\t\t// X STARTING WITH &#x27;a&#x27; that is never the same as &#x27;a&#x27; STARTING WITH X\n\t\t\tif (value &amp;&amp;\n\t\t\t\tcheckIndexExpression(idx, value) &amp;&amp;\n\t\t\t\tfield-&gt;computable(csb, stream, false))\n\t\t\t{\n\t\t\t\tfield = value;\n\t\t\t\tvalue = cmpNode-&gt;arg1;\n\t\t\t}\n\t\t\telse\n\t\t\t\treturn false;\n\t\t}\n\t}\n\telse\n\t{\n\t\tconst auto fieldNode = nodeAs&lt;FieldNode&gt;(field);\n\n\t\tif (!fieldNode)\n\t\t{\n\t\t\t// dimitr:\tany idea how we can use an index in this case?\n\t\t\t//\t\t\tThe code below produced wrong results.\n\t\t\t// AB: I don&#x27;t think that it would be effective, because\n\t\t\t// this must include many matches (think about empty string)\n\t\t\treturn false;\n\t\t\t/*\n\t\t\tif (!nodeIs&lt;FieldNode&gt;(value))\n\t\t\t\treturn nullptr;\n\t\t\tfield = value;\n\t\t\tvalue = cmpNode-&gt;arg1;\n\t\t\t*/\n\t\t}\n\n\t\t// Every string starts with an empty string so don&#x27;t bother using an index in that case.\n\t\tif (const auto literal = nodeAs&lt;LiteralNode&gt;(value))\n\t\t{\n\t\t\tif ((literal-&gt;litDesc.dsc_dtype == dtype_text &amp;&amp; literal-&gt;litDesc.dsc_length == 0) ||\n\t\t\t\t(literal-&gt;litDesc.dsc_dtype == dtype_varying &amp;&amp;\n\t\t\t\t\tliteral-&gt;litDesc.dsc_length == sizeof(USHORT)))\n\t\t\t{\n\t\t\t\treturn false;\n\t\t\t}\n\t\t}\n\n\t\t// AB: Check if the index-segment is usable for using starts.\n\t\t// Thus it should be of type string, etc...\n\t\tif (fieldNode-&gt;fieldStream != stream ||\n\t\t\tfieldNode-&gt;fieldId != idx-&gt;idx_rpt[segment].idx_field ||\n\t\t\t!(idx-&gt;idx_rpt[segment].idx_itype == idx_string ||\n\t\t\t\tidx-&gt;idx_rpt[segment].idx_itype == idx_byte_array ||\n\t\t\t\tidx-&gt;idx_rpt[segment].idx_itype == idx_metadata ||\n\t\t\t\tidx-&gt;idx_rpt[segment].idx_itype &gt;= idx_first_intl_string) ||\n\t\t\t!value-&gt;computable(csb, stream, false))\n\t\t{\n\t\t\treturn false;\n\t\t}\n\t}\n\n\treturn true;\n}\n\n\n#ifdef OPT_DEBUG_RETRIEVAL\nvoid Retrieval::printCandidate(const InversionCandidate* candidate) const\n{\n\toptimizer-&gt;printf(&quot;    cost (%1.2f), selectivity (%1.10f), indexes (%d), matched (%d, %d)&quot;,\n\t\tcandidate-&gt;cost, candidate-&gt;selectivity, candidate-&gt;indexes, candidate-&gt;matchedSegments,\n\t\tcandidate-&gt;nonFullMatchedSegments);\n\n\tif (candidate-&gt;unique)\n\t\toptimizer-&gt;printf(&quot;, unique&quot;);\n\n\tif (candidate-&gt;dependentFromStreams.hasData())\n\t{\n\t\toptimizer-&gt;printf(&quot;, dependent from streams:&quot;);\n\n\t\tconst auto end = candidate-&gt;dependentFromStreams.end();\n\t\tfor (auto iter = candidate-&gt;dependentFromStreams.begin(); iter != end; iter++)\n\t\t{\n\t\t\tconst auto name = optimizer-&gt;getStreamName(*iter);\n\n\t\t\tif (name.hasData())\n\t\t\t\toptimizer-&gt;printf(&quot; %u (%s)&quot;, *iter, name.c_str());\n\t\t\telse\n\t\t\t\toptimizer-&gt;printf(&quot; %u&quot;, *iter);\n\n\t\t\tif (iter != end - 1)\n\t\t\t\toptimizer-&gt;printf(&quot;,&quot;);\n\t\t}\n\t}\n\n\toptimizer-&gt;printf(&quot;\\n&quot;);\n}\n\nvoid Retrieval::printCandidates(const InversionCandidateList&amp; inversions) const\n{\n\tif (inversions.getCount() &lt; 2)\n\t\treturn;\n\n\tconst auto name = optimizer-&gt;getStreamName(stream);\n\toptimizer-&gt;printf(&quot;  retrieval candidates for stream %u (%s):\\n&quot;,\n\t\t\t\t\t  stream, name.c_str());\n\n\tfor (const auto candidate : inversions)\n\t\tprintCandidate(candidate);\n}\n\nvoid Retrieval::printFinalCandidate(const InversionCandidate* candidate) const\n{\n\tif (!candidate)\n\t\treturn;\n\n\tconst auto name = optimizer-&gt;getStreamName(stream);\n\toptimizer-&gt;printf(&quot;  final candidate for stream %u (%s):\\n&quot;,\n\t\t\t\t\t  stream, name.c_str());\n\n\tprintCandidate(candidate);\n}\n#endif\n"}, "/build/src/common/classes/alloc.h": {"id": "/build/src/common/classes/alloc.h", "filePath": "src/common/classes/alloc.h", "content": "/*\n *\tPROGRAM:\tClient/Server Common Code\n *\tMODULE:\t\talloc.h\n *\tDESCRIPTION:\tMemory Pool Manager\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Nickolay Samofatov\n *  for the Firebird Open Source RDBMS project.\n *\n *  STL allocator is based on one by Mike Nordell and John Bellardo\n *\n *  Copyright (c) 2004 Nickolay Samofatov &lt;nickolay@broadviewsoftware.com&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *\n *  The Original Code was created by James A. Starkey for IBPhoenix.\n *\n *  Copyright (c) 2004 James A. Starkey\n *  All Rights Reserved.\n *\n *  Contributor(s):\n *\n *\t\tAlex Peshkoff &lt;peshkoff@mail.ru&gt;\n *\t\t\t\t1. added PermanentStorage and AutoStorage classes.\n *\t\t\t\t2. merged parts of Nickolay and Jim code to be used together\n *\t\t\t\t3. reworked code to avoid slow behavior for medium-size blocks\n *\t\t\t\t   and high memory usage for just created pool\n *\n */\n\n#ifndef CLASSES_ALLOC_H\n#define CLASSES_ALLOC_H\n\n#include &quot;firebird.h&quot;\n#include &quot;fb_types.h&quot;\n#include &quot;../common/classes/locks.h&quot;\n#include &quot;../common/classes/auto.h&quot;\n#include &quot;../common/classes/fb_atomic.h&quot;\n\n#include &lt;stdio.h&gt;\n\n#if defined(MVS) || defined(DARWIN) || defined(__clang__)\n#include &lt;stdlib.h&gt;\n#else\n#include &lt;malloc.h&gt;\n#endif\n\n#include &lt;memory.h&gt;\n#include &lt;memory&gt;\n\n#ifdef DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool(), __FILE__, __LINE__)\n#define FB_NEW_POOL(pool) new(pool, __FILE__, __LINE__)\n#define FB_NEW_RPT(pool, count) new(pool, count, __FILE__, __LINE__)\n#else // DEBUG_GDS_ALLOC\n#define FB_NEW new(*getDefaultMemoryPool())\n#define FB_NEW_POOL(pool) new(pool)\n#define FB_NEW_RPT(pool, count) new(pool, count)\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird {\n\n// Alignment for all memory blocks\n#define ALLOC_ALIGNMENT 16\n\nstatic inline constexpr size_t MEM_ALIGN(size_t value)\n{\n\treturn FB_ALIGN(value, ALLOC_ALIGNMENT);\n}\n\n\nclass MemPool;\n\nclass MemoryStats\n{\npublic:\n\texplicit MemoryStats(MemoryStats* parent = NULL) noexcept\n\t\t: mst_parent(parent), mst_usage(0), mst_mapped(0), mst_max_usage(0), mst_max_mapped(0)\n\t{}\n\n\t~MemoryStats()\n\t{}\n\n\t// Forbid copying/assignment\n\tMemoryStats(const MemoryStats&amp;) = delete;\n\tMemoryStats&amp; operator=(const MemoryStats&amp;) = delete;\n\n\tsize_t getCurrentUsage() const noexcept { return mst_usage.value(); }\n\tsize_t getMaximumUsage() const noexcept { return mst_max_usage; }\n\tsize_t getCurrentMapping() const noexcept { return mst_mapped.value(); }\n\tsize_t getMaximumMapping() const noexcept { return mst_max_mapped; }\n\nprivate:\n\tMemoryStats* mst_parent;\n\n\t// Currently allocated memory (without allocator overhead)\n\t// Useful for monitoring engine memory leaks\n\tAtomicCounter mst_usage;\n\t// Amount of memory mapped (including all overheads)\n\t// Useful for monitoring OS memory consumption\n\tAtomicCounter mst_mapped;\n\n\t// We don&#x27;t particularily care about extreme precision of these max values,\n\t// this is why we don&#x27;t synchronize them\n\tsize_t mst_max_usage;\n\tsize_t mst_max_mapped;\n\n\t// These methods are thread-safe due to usage of atomic counters only\n\tvoid increment_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_usage.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_usage)\n\t\t\t\tstatistics-&gt;mst_max_usage = temp;\n\t\t}\n\t}\n\n\tvoid decrement_usage(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_usage -= size;\n\t\t}\n\t}\n\n\tvoid increment_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tconst size_t temp = statistics-&gt;mst_mapped.exchangeAdd(size) + size;\n\t\t\tif (temp &gt; statistics-&gt;mst_max_mapped)\n\t\t\t\tstatistics-&gt;mst_max_mapped = temp;\n\t\t}\n\t}\n\n\tvoid decrement_mapping(size_t size) noexcept\n\t{\n\t\tfor (MemoryStats* statistics = this; statistics; statistics = statistics-&gt;mst_parent)\n\t\t{\n\t\t\tstatistics-&gt;mst_mapped -= size;\n\t\t}\n\t}\n\n\tfriend class MemPool;\n};\n\n\nclass MemoryPool\n{\nfriend class ExternalMemoryHandler;\n\nprivate:\n\tMemPool* pool;\n\n\tMemoryPool(MemPool* p) noexcept\n\t\t: pool(p)\n\t{ }\n\n\t// Default statistics group for process\n\tstatic MemoryStats* default_stats_group;\n\npublic:\n\t// This is maximum block size which is cached (not allocated directly from OS)\n\tenum RecommendedBufferSize { MAX_MEDIUM_BLOCK_SIZE = 64384 };\t// MediumLimits::TOP_LIMIT - 128\n\n\tstatic MemoryPool* defaultMemoryManager;\n\tstatic MemoryPool* externalMemoryManager;\n\npublic:\n\t// Create memory pool instance\n\tstatic MemoryPool* createPool(MemoryPool* parent = NULL, MemoryStats&amp; stats = *default_stats_group);\n\t// Delete memory pool instance\n\tstatic void deletePool(MemoryPool* pool);\n\n#ifdef DEBUG_GDS_ALLOC\n#define ALLOC_ARGS , __FILE__, __LINE__\n#define ALLOC_PARAMS , const char* file, int line\n#define ALLOC_PASS_ARGS , file, line\n#else\n#define ALLOC_ARGS\n#define ALLOC_PARAMS\n#define ALLOC_PASS_ARGS\n#endif // DEBUG_GDS_ALLOC\n\n\tvoid* calloc(size_t size ALLOC_PARAMS);\n\n\tstatic void* globalAlloc(size_t s ALLOC_PARAMS)\n\t{\n\t\treturn defaultMemoryManager-&gt;allocate(s ALLOC_PASS_ARGS);\n\t}\n\n\tvoid* allocate(size_t size ALLOC_PARAMS);\n\n\tstatic void globalFree(void* mem) noexcept;\n\tvoid deallocate(void* mem) noexcept;\n\n\t// Set context pool for current thread of execution\n\tstatic MemoryPool* setContextPool(MemoryPool* newPool);\n\n\t// Get context pool for current thread of execution\n\tstatic MemoryPool* getContextPool();\n\n\tMemoryStats&amp; getStatsGroup() noexcept;\n\n\t// Set statistics group for pool. Usage counters will be decremented from\n\t// previously set group and added to new\n\tvoid setStatsGroup(MemoryStats&amp; stats) noexcept;\n\n\t// Initialize and finalize global memory pool\n\tstatic void initDefaultPool();\n\tstatic void cleanupDefaultPool();\n\n\t// Initialize context pool\n\tstatic void contextPoolInit();\n\n\t// Print out pool contents. This is debugging routine\n\tstatic constexpr unsigned PRINT_USED_ONLY = 0x01;\n\tstatic constexpr unsigned PRINT_RECURSIVE = 0x02;\n\tvoid print_contents(FILE*, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\t// The same routine, but more easily callable from the debugger\n\tvoid print_contents(const char* filename, unsigned flags = 0, const char* filter_path = 0) noexcept;\n\n\tinline bool operator==(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn pool == rhs.pool;\n\t}\n\n\tinline bool operator!=(const MemoryPool&amp; rhs) const noexcept\n\t{\n\t\treturn !operator==(rhs);\n\t}\n\npublic:\n\tstruct Finalizer\n\t{\n\t\tvirtual ~Finalizer()\n\t\t{\n\t\t}\n\n\t\tvirtual void finalize() = 0;\n\n\t\tFinalizer* prev = nullptr;\n\t\tFinalizer* next = nullptr;\n\t};\n\n\ttemplate &lt;typename T&gt; Finalizer* registerFinalizer(void (*func)(T*), T* object)\n\t{\n\t\tstruct FinalizerImpl : Finalizer\n\t\t{\n\t\t\tFinalizerImpl(void (*aFunc)(T*), T* aObject)\n\t\t\t\t: func(aFunc),\n\t\t\t\t  object(aObject)\n\t\t\t{\n\t\t\t}\n\n\t\t\tvoid finalize() override\n\t\t\t{\n\t\t\t\tfunc(object);\n\t\t\t}\n\n\t\t\tvoid (*func)(T*);\n\t\t\tT* object;\n\t\t};\n\n\t\tfb_assert(func);\n\t\tFinalizerImpl* finalizer = FB_NEW_POOL(*this) FinalizerImpl(func, object);\n\n\t\tinternalRegisterFinalizer(finalizer);\n\n\t\treturn finalizer;\n\t}\n\n\tvoid unregisterFinalizer(Finalizer*&amp; finalizer);\n\nprivate:\n\tvoid internalRegisterFinalizer(Finalizer* entry);\n\nprivate:\n\tFinalizer* finalizers = nullptr;\n\n\tfriend class MemPool;\n};\n\nvoid initExternalMemoryPool();\n\n} // namespace Firebird\n\nstatic inline Firebird::MemoryPool* getDefaultMemoryPool() noexcept\n{\n\tfb_assert(Firebird::MemoryPool::defaultMemoryManager);\n\treturn Firebird::MemoryPool::defaultMemoryManager;\n}\n\nstatic inline Firebird::MemoryPool* getExternalMemoryPool() noexcept\n{\n\tusing namespace Firebird;\n\n\tif (!MemoryPool::externalMemoryManager)\n\t\tinitExternalMemoryPool();\n\n\treturn MemoryPool::externalMemoryManager;\n}\n\nnamespace Firebird {\n\n// Class intended to manage execution context pool stack\n// Declare instance of this class when you need to set new context pool and it\n// will be restored automatically as soon holder variable gets out of scope\nclass ContextPoolHolder\n{\npublic:\n\texplicit ContextPoolHolder(MemoryPool* newPool)\n\t{\n\t\tsavedPool = MemoryPool::setContextPool(newPool);\n\t}\n\t~ContextPoolHolder()\n\t{\n\t\tMemoryPool::setContextPool(savedPool);\n\t}\nprivate:\n\tMemoryPool* savedPool;\n};\n\n// template enabling common use of old and new pools control code\n// to be dropped when old-style code goes away\ntemplate &lt;typename SubsystemThreadData, typename SubsystemPool&gt;\nclass SubsystemContextPoolHolder : public ContextPoolHolder\n{\npublic:\n\tSubsystemContextPoolHolder\n\t(\n\t\tSubsystemThreadData* subThreadData,\n\t\tSubsystemPool* newPool\n\t)\n\t\t: ContextPoolHolder(newPool),\n\t\tsavedThreadData(subThreadData),\n\t\tsavedPool(savedThreadData-&gt;getDefaultPool())\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(newPool);\n\t}\n\n\t~SubsystemContextPoolHolder()\n\t{\n\t\tsavedThreadData-&gt;setDefaultPool(savedPool);\n\t}\n\nprivate:\n\tSubsystemThreadData* savedThreadData;\n\tSubsystemPool* savedPool;\n};\n\n} // namespace Firebird\n\nusing Firebird::MemoryPool;\n\n// operators new and delete\n\ninline void* operator new(size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void* operator new[](size_t s, Firebird::MemoryPool&amp; pool ALLOC_PARAMS)\n{\n\treturn pool.allocate(s ALLOC_PASS_ARGS);\n}\n\ninline void operator delete(void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\ninline void operator delete[](void* mem, Firebird::MemoryPool&amp; pool ALLOC_PARAMS) noexcept\n{\n\tMemoryPool::globalFree(mem);\n}\n\n#ifdef DEBUG_GDS_ALLOC\n\nextern void operator delete(void* mem) noexcept;\nextern void operator delete[](void* mem) noexcept;\n\n#if __cplusplus &gt;= 201402L\nextern void operator delete(void* mem, std::size_t s) noexcept;\nextern void operator delete[](void* mem, std::size_t s) noexcept;\n#endif\n\n#endif // DEBUG_GDS_ALLOC\n\nnamespace Firebird\n{\n\t// Global storage makes it possible to use new and delete for classes,\n\t// based on it, to behave traditionally, i.e. get memory from permanent pool.\n\tclass GlobalStorage\n\t{\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept\n\t\t{\n\t\t\treturn *getDefaultMemoryPool();\n\t\t}\n\t};\n\n\n\t// Permanent storage is used as base class for all objects,\n\t// performing memory allocation in methods other than\n\t// constructors of this objects. Permanent means that pool,\n\t// which will be later used for such allocations, must\n\t// be explicitly passed in all constructors of such object.\n\tclass PermanentStorage\n\t{\n\tprotected:\n\t\texplicit PermanentStorage(MemoryPool&amp; p) noexcept : pool(p) { }\n\n\tpublic:\n\t\tMemoryPool&amp; getPool() const noexcept { return pool; }\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n\n\t// Automatic storage is used as base class for objects,\n\t// that may have constructors without explicit MemoryPool\n\t// parameter. In this case AutoStorage sends AutoMemoryPool\n\t// to PermanentStorage. To ensure this operation to be safe\n\t// such trick possible only for local (on stack) variables.\n\tclass AutoStorage : public PermanentStorage\n\t{\n\tprivate:\n#if defined(DEV_BUILD)\n\t\tvoid ProbeStack() const noexcept;\n#endif\n\tpublic:\n\t\tstatic MemoryPool&amp; getAutoMemoryPool();\n\tprotected:\n\t\tAutoStorage()\n\t\t\t: PermanentStorage(getAutoMemoryPool())\n\t\t{\n#if defined(DEV_BUILD)\n\t\t\tProbeStack();\n#endif\n\t\t}\n\t\texplicit AutoStorage(MemoryPool&amp; p) noexcept : PermanentStorage(p) { }\n\t};\n\n\ttemplate &lt;&gt;\n\tinline void SimpleDelete&lt;MemoryPool&gt;::clear(MemoryPool* pool)\n\t{\n\t\tif (pool)\n\t\t\tMemoryPool::deletePool(pool);\n\t}\n\n\ttypedef AutoPtr&lt;MemoryPool&gt; AutoMemoryPool;\n\n\ttemplate &lt;typename T&gt;\n\tclass PoolAllocator\n\t{\n\ttemplate &lt;typename&gt; friend class PoolAllocator;\n\n\tpublic:\n\t\tusing value_type = T;\n\t\tusing size_type = size_t;\n\t\tusing pointer = T*;\n\t\tusing const_pointer = const T*;\n\t\tusing reference = T&amp;;\n\t\tusing const_reference = const T&amp;;\n\t\tusing void_pointer = void* ;\n\t\tusing const_void_pointer = const void*;\n\t\tusing difference_type = std::ptrdiff_t;\n\t\tusing is_always_equal = std::true_type;\n\n\t\ttemplate &lt;typename U&gt;\n\t\tstruct rebind\n\t\t{\n\t\t\ttypedef PoolAllocator&lt;U&gt; other;\n\t\t};\n\n\tpublic:\n\t\tPoolAllocator(MemoryPool&amp; aPool) noexcept\n\t\t\t: pool(aPool)\n\t\t{}\n\n\t\tPoolAllocator(const PoolAllocator&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\ttemplate &lt;class U&gt;\n\t\tPoolAllocator(const PoolAllocator&lt;U&gt;&amp; o) noexcept\n\t\t\t: pool(o.pool)\n\t\t{}\n\n\t\t~PoolAllocator() noexcept\n\t\t{}\n\n\tpublic:\n\t\tconstexpr pointer allocate(size_type n, const void* hint = nullptr)\n\t\t{\n\t\t\treturn static_cast&lt;T*&gt;(pool.allocate(n * sizeof(T) ALLOC_ARGS));\n\t\t}\n\n\t\tconstexpr void deallocate(pointer p, size_type n)\n\t\t{\n\t\t\tpool.deallocate(p);\n\t\t}\n\n\t\tconstexpr size_type max_size() const noexcept\n\t\t{\n\t\t\treturn size_t(-1) / sizeof(T);\n\t\t}\n\n\t\ttemplate &lt;typename U, typename... Args&gt;\n\t\tconstexpr void construct(U* ptr, Args&amp;&amp;... args)\n\t\t{\n\t\t\tif constexpr (std::is_constructible&lt;U, MemoryPool&amp;, Args...&gt;::value)\n\t\t\t\tnew ((void*) ptr) U(pool, std::forward&lt;Args&gt;(args)...);\n\t\t\telse\n\t\t\t\tnew ((void*) ptr) U(std::forward&lt;Args&gt;(args)...);\n\t\t}\n\n\t\ttemplate &lt;typename U&gt;\n\t\tconstexpr void destroy(U* ptr)\n\t\t{\n\t\t\tptr-&gt;~U();\n\t\t}\n\n\t\tconstexpr bool operator==(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool == &amp;o.pool;\n\t\t}\n\n\t\tconstexpr bool operator!=(const PoolAllocator&lt;T&gt;&amp; o) const noexcept\n\t\t{\n\t\t\treturn &amp;pool != &amp;o.pool;\n\t\t}\n\n\tprivate:\n\t\tMemoryPool&amp; pool;\n\t};\n} // namespace Firebird\n\n\ntemplate &lt;typename TAlloc&gt;\nstruct std::allocator_traits&lt;Firebird::PoolAllocator&lt;TAlloc&gt;&gt;\n{\n\tusing Alloc = Firebird::PoolAllocator&lt;TAlloc&gt;;\n\n\tusing allocator_type = Alloc;\n\tusing value_type = typename Alloc::value_type;\n\tusing pointer = typename Alloc::pointer;\n\tusing const_pointer = typename Alloc::const_pointer;\n\tusing void_pointer = typename Alloc::void_pointer;\n\tusing const_void_pointer = typename Alloc::const_void_pointer;\n\tusing size_type = typename Alloc::size_type;\n\tusing difference_type = typename Alloc::difference_type;\n\tusing reference = value_type&amp;;\n\tusing const_reference = const value_type&amp;;\n\n\tusing is_always_equal = typename Alloc::is_always_equal;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_alloc = typename Alloc::template rebind&lt;T&gt;::other;\n\n\ttemplate &lt;typename T&gt;\n\tusing rebind_traits = allocator_traits&lt;rebind_alloc&lt;T&gt;&gt;;\n\n\tstatic constexpr pointer allocate(Alloc&amp; alloc, size_type size)\n\t{\n\t\treturn alloc.allocate(size);\n\t}\n\n\tstatic constexpr void deallocate(Alloc&amp; alloc, pointer ptr, size_type size)\n\t{\n\t\talloc.deallocate(ptr, size);\n\t}\n\n\ttemplate &lt;typename T, typename... Args&gt;\n\tstatic constexpr void construct(Alloc&amp; alloc, T* ptr, Args&amp;&amp;... args)\n\t{\n\t\talloc.construct(ptr, std::forward&lt;Args&gt;(args)...);\n\t}\n\n\ttemplate &lt;typename T&gt;\n\tstatic constexpr void destroy(Alloc&amp; alloc, T* ptr)\n\t{\n\t\talloc.destroy(ptr);\n\t}\n\n\tstatic constexpr size_type max_size(const Alloc&amp; alloc) noexcept\n\t{\n\t\treturn alloc.max_size();\n\t}\n};\n\n\n#endif // CLASSES_ALLOC_H\n"}}, "reports": [{"fileId": "/build/src/common/classes/alloc.cpp", "reportHash": "ec904c7c87f985168f2cba1010ec8ad0", "checker": {"name": "cplusplus.PlacementNew", "url": "https://clang.llvm.org/docs/analyzer/checkers.html#cplusplus-placementnew
