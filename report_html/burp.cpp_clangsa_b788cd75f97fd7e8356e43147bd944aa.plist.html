      .severity-low {
  background-color: #669603;
}

.severity-low:after {
  content : 'L';
}

.severity-unspecified {
  background-color: #666666;
}

.severity-unspecified:after {
  content : 'U';
}

.severity-style {
  background-color: #9932cc;
}

.severity-style:after {
  content : 'S';
}

.severity-medium {
  background-color: #a9d323;
  color: black;
}

.severity-medium:after {
  content : 'M';
}

.severity-high {
  background-color: #ffa800;
}

.severity-high:after {
  content : 'H';
}

.severity-critical {
  background-color: #e92625;
}

.severity-critical:after {
  content : 'C';
}

i[class*="severity-"] {
  line-height: normal;
  text-transform: capitalize;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
  display: inline-block;
  width: 16px;
  height: 16px;
  text-align: center;
  font-family: sans-serif;
}

      html, body {
  width: 100%;
  height: 100%;
  padding: 0px;
  margin: 0px;
}

div.container {
  padding: 10px;
}

#content {
  height: 100%;
  display: block;
  overflow: hidden;
}

#content > div {
  margin: 10px;
  border: 1px solid #ddd;
  border-radius: 3px;
  height: 97%;
}

#side-bar {
  overflow: auto;
}

#editor-wrapper {
  overflow: hidden;
}

.button {
  background-color: #f1f1f1;
  text-decoration: none;
  display: inline-block;
  padding: 8px 16px;
  color: black;
  cursor: pointer;
}

.button:hover {
  background-color: #ddd;
  color: black;
}

.review-status {
  color: white;
  text-align: center;
}

.review-status-confirmed {
  background-color: #e92625;
}

.review-status-false-positive {
  background-color: grey;
}

.review-status-intentional {
  background-color: #669603;
}

      div.container {
  width: 100%;
  height: 100%;
  padding: 0px;
}

#editor-wrapper {
  margin: 10px;
}

#side-bar {
  float: left;
  width: 260px;
  margin: 0px;
}

#report-nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  height: 100%;
}

#report-nav ul > li {
  padding: .4em;
  background-color: #fff;
  border-bottom: 1px solid rgba(0,0,0,.125);
  text-align: left;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#report-nav ul > li.active {
  background-color: #427ea9;
  color: white;
}

#report-nav ul > li:hover {
  background-color: #427ea9;
  color: white;
  cursor: pointer;
}

#report-nav ul a {
  text-decoration: none;
}

#report-nav i[class*="severity-"] {
  margin-right: 5px;
}

.header {
  border-bottom: 1px solid lightgrey;
  font-family: monospace;
  padding: 10px;
  background-color: #fafbfc;
  border-bottom: 1px solid #e1e4e8;
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}

#report-nav .header {
  font-weight: bold;
}

#editor-wrapper .header > div {
  padding-top: 2px;
}

#file-path,
#checker-name {
  color: #195ea2;
}

#review-status {
  padding: 0px 5px;
}

#file-path {
  font-family: monospace;
}

.check-msg {
  display: inline-block;
  padding: 3px 6px;
  margin: 1px;
  -webkit-border-radius: 5px;
  -moz-border-radius: 5px;
  border-radius: 5px;
}

.check-msg.info {
  color: #00546f;
  background-color: #bfdfe9;
  border: 1px solid #87a8b3;
}

.check-msg.error {
  background-color: #f2dede;
  color: #a94442;
  border: 1px solid #ebcccc;
}

.check-msg.macro {
  background-color: #d7dac2;
  color: #4f5c6d;
  border: 1px solid #d7dac2;
}

.check-msg.note {
  background-color: #d7d7d7;
  color: #4f5c6d;
  border: 1px solid #bfbfbf;
}

.check-msg.current {
  border: 2px dashed #3692ff;
}

.check-msg .tag {
  padding: 1px 5px;
  text-align: center;
  border-radius: 2px;
  margin-right: 5px;
  text-decoration: inherit;
}

.check-msg .tag.macro {
  background-color: #83876a;
  color: white;
  text-transform: capitalize;
}

.check-msg .tag.note {
  background-color: #9299a1;
  color: white;
  text-transform: capitalize;
}

.checker-enum {
  color: white;
  padding: 1px 5px;
  text-align: center;
  border-radius: 25px;
  margin-right: 5px;
  text-decoration: inherit;
}

.checker-enum.info {
  background-color: #427ea9;
}

.checker-enum.error {
  background-color: #a94442;
}

.arrow {
  border: solid black;
  border-width: 0 3px 3px 0;
  display: inline-block;
  padding: 3px;
  cursor: pointer;
  margin: 0px 5px;
}

.arrow:hover {
  border: solid #437ea8;
  border-width: 0 3px 3px 0;
}

.left-arrow {
  transform: rotate(135deg);
  -webkit-transform: rotate(135deg);
}

.right-arrow {
  transform: rotate(-45deg);
  -webkit-transform: rotate(-45deg);
}

var BugViewer = {
  _files : [],
  _reports : [],
  _lineWidgets : [],
  _navigationMenuItems : [],
  _sourceFileData : null,
  _currentReport : null,
  _lastBugEvent  : null,

  init : function (files, reports) {
    this._files = files;
    this._reports = reports;

    this.initEscapeChars();
  },

  initEscapeChars : function () {
    this.escapeChars = {
      ' ' : 'nbsp',
      '<' : 'lt',
      '>' : 'gt',
      '"' : 'quot',
      '&' : 'amp'
    };

    var regexString = '[';
    for (var key in this.escapeChars) {
      regexString += key;
    }
    regexString += ']';

    this.escapeRegExp = new RegExp( regexString, 'g');
  },

  escapeHTML : function (str) {
    var that = this;

    return str.replace(this.escapeRegExp, function (m) {
      return '&' + that.escapeChars[m] + ';';
    });
  },

  initByUrl : function () {
    if (!this._reports) return;

    var state = {};
    window.location.hash.substr(1).split('&').forEach(function (s) {
      var parts = s.split('=');
      state[parts[0]] = parts[1];
    });

    for (var key in this._reports) {
      var report = this._reports[key];
      if (report.reportHash === state['reportHash']) {
        this.navigate(report);
        return;
      }
    }

    this.navigate(this._reports[0]);
  },

  create : function () {
    this._content = document.getElementById('editor-wrapper');
    this._filepath = document.getElementById('file-path');
    this._checkerName = document.getElementById('checker-name');
    this._reviewStatusWrapper =
      document.getElementById('review-status-wrapper');
    this._reviewStatus = document.getElementById('review-status');
    this._editor = document.getElementById('editor');

    this._codeMirror = CodeMirror(this._editor, {
      mode: 'text/x-c++src',
      matchBrackets : true,
      lineNumbers : true,
      readOnly : true,

n)\n *\twill accept.\n *\n **************************************/\n\n\tburp_output(false, format, text);\n}\n\nvoid BURP_print(bool err, USHORT number, const SafeArg&amp; arg)\n{\n/**************************************\n *\n *\tB U R P _ p r i n t\n *\n **************************************\n *\n * Functional description\n *\tDisplay a formatted error message\n *\tin a way that civilized systems\n *\twill accept.\n *\n **************************************/\n\tBurpMaster master;\n\n\tBURP_msg_partial(err, 169);\t// msg 169: gbak:\n\tBURP_msg_put(err, number, arg);\n}\n\n\nvoid BURP_print(bool err, USHORT number, const char* str)\n{\n/**************************************\n *\n *\tB U R P _ p r i n t\n *\n **************************************\n *\n * Functional description\n *\tDisplay a formatted error message\n *\tin a way that civilized systems\n *\twill accept.\n *\n **************************************/\n\tBurpMaster master;\n\n\tstatic const SafeArg dummy;\n\tBURP_msg_partial(err, 169, dummy);\t// msg 169: gbak:\n\tBURP_msg_put(err, number, SafeArg() &lt;&lt; str);\n}\n\n\nvoid BURP_print_status(bool err, const Firebird::IStatus* status_vector, USHORT secondNumber)\n{\n/**************************************\n *\n *\tB U R P _ p r i n t _ s t a t u s\n *\n **************************************\n *\n * Functional description\n *\tPrint error message. Use fb_interpret\n *\tto allow redirecting output.\n *\n **************************************/\n\tif (status_vector)\n\t{\n\t\tBurpMaster master;\n\t\tBurpGlobals* tdgbl = master.get();\n\n\t\tconst ISC_STATUS* vector = status_vector-&gt;getErrors();\n\t\tif (err)\n\t\t{\n\t\t\tUtilSvc::StatusAccessor sa = tdgbl-&gt;uSvc-&gt;getStatusAccessor();\n\t\t\tsa.setServiceStatus(vector);\n\t\t\tif (secondNumber)\n\t\t\t\tsa.setServiceStatus(burp_msg_fac, secondNumber, SafeArg());\n\t\t\ttdgbl-&gt;uSvc-&gt;started();\n\n\t\t\tif (tdgbl-&gt;uSvc-&gt;isService())\n\t\t\t{\n\t\t\t\treturn;\n\t\t\t}\n\t\t}\n\n        SCHAR s[1024];\n\t\tif (fb_interpret(s, sizeof(s), &amp;vector))\n\t\t{\n\t\t\tBURP_msg_partial(err, 256); // msg 256: gbak: ERROR:\n\t\t\tburp_output(err, &quot;%s\\n&quot;, s);\n\n\t\t\twhile (fb_interpret(s, sizeof(s), &amp;vector))\n\t\t\t{\n\t\t\t\tBURP_msg_partial(err, 256); // msg 256: gbak: ERROR:\n\t\t\t\tburp_output(err, &quot;    %s\\n&quot;, s);\n\t\t\t}\n\t\t}\n\n\t\tif (secondNumber)\n\t\t{\n\t\t\tBURP_msg_partial(err, 169);\t// msg 169: gbak:\n\t\t\tBURP_msg_put(true, secondNumber, SafeArg());\n\t\t}\n\t}\n}\n\n\nvoid BURP_print_warning(const Firebird::IStatus* status, bool printErrorAsWarning)\n{\n/**************************************\n *\n *\tB U R P _ p r i n t _ w a r n i n g\n *\n **************************************\n *\n * Functional description\n *\tPrint warning message. Use fb_interpret\n *\tto allow redirecting output.\n *\n **************************************/\n\tif (!status || !(status-&gt;getState() &amp; (IStatus::STATE_WARNINGS | IStatus::STATE_ERRORS)))\n\t\treturn;\n\n\tconst ISC_STATUS* vector;\n\n\tif (const auto state = status-&gt;getState();\n\t\tprintErrorAsWarning &amp;&amp; (state &amp; IStatus::STATE_ERRORS))\n\t{\n\t\tvector = status-&gt;getErrors();\n\t}\n\telse if (state &amp; IStatus::STATE_WARNINGS)\n\t\tvector = status-&gt;getWarnings();\n\telse\n\t\treturn;\n\n\tBurpMaster master;\n\tBurpGlobals* tdgbl = master.get();\n\n\t// print the warning message\n\tSCHAR s[1024];\n\n\tif (fb_interpret(s, sizeof(s), &amp;vector))\n\t{\n\t\tBURP_msg_partial(false, 255); // msg 255: gbak: WARNING:\n\t\tburp_output(false, &quot;%s\\n&quot;, s);\n\n\t\twhile (fb_interpret(s, sizeof(s), &amp;vector))\n\t\t{\n\t\t\tBURP_msg_partial(false, 255); // msg 255: gbak: WARNING:\n\t\t\tburp_output(false, &quot;    %s\\n&quot;, s);\n\t\t}\n\t}\n}\n\n\nvoid BURP_verbose(USHORT number, const SafeArg&amp; arg)\n{\n/**************************************\n *\n *\tB U R P _ v e r b o s e\n *\n **************************************\n *\n * Functional description\n *\tCalls BURP_message for displaying a message for verbose output.\n *\tIf not verbose then calls yielding function.\n *\n **************************************/\n\tBurpMaster master;\n\tBurpGlobals* tdgbl = master.get();\n\n\tif (tdgbl-&gt;gbl_sw_verbose)\n\t\tBURP_message(number, arg, true);\n\telse\n\t\tburp_output(false, &quot;%s&quot;, &quot;&quot;);\n}\n\n\nvoid BURP_message(USHORT number, const MsgFormat::SafeArg&amp; arg, bool totals)\n{\n/**************************************\n *\n *\tB U R P _ m e s s a g e\n *\n **************************************\n *\n * Functional description\n *\tCalls BURP_msg for formatting &amp; displaying a message.\n *\n **************************************/\n\tBurpMaster master;\n\tBurpGlobals* tdgbl = master.get();\n\n\tif (totals)\n\t\ttdgbl-&gt;print_stats_header();\n\tBURP_msg_partial(false, 169);\t// msg 169: gbak:\n\tif (totals)\n\t\ttdgbl-&gt;print_stats(number);\n\tBURP_msg_put(false, number, arg);\n}\n\n\nvoid BURP_verbose(USHORT number, const string&amp; str)\n{\n/**************************************\n *\n *\tB U R P _ v e r b o s e\n *\n **************************************\n *\n * Functional description\n *\tShortcut for text argument\n *\n **************************************/\n\tBURP_verbose(number, SafeArg() &lt;&lt; str.c_str());\n}\n\n\nstatic void close_out_transaction(gbak_action action, Firebird::ITransaction** tPtr)\n{\n/**************************************\n *\n *\tc l o s e _ o u t _ t r a n s a c t i o n\n *\n **************************************\n *\n * Functional description\n *\tMake a transaction go away.  This is\n *\timportant as we need to detach from the\n *\tdatabase so all engine allocated memory is\n *\treturned to the system.\n *\n **************************************/\n\tif (*tPtr)\n\t{\n\t\tFbLocalStatus status_vector;\n\t\tif (action == RESTORE)\n\t\t{\n\t\t\t// Even if the restore failed, commit the transaction so that\n\t\t\t// a partial database is at least recovered.\n\t\t\t(*tPtr)-&gt;commit(&amp;status_vector);\n\t\t\tif (!status_vector.isSuccess())\n\t\t\t{\n\t\t\t\t// If we can&#x27;t commit - have to roll it back, as\n\t\t\t\t// we need to close all outstanding transactions before\n\t\t\t\t// we can detach from the database.\n\t\t\t\t(*tPtr)-&gt;rollback(&amp;status_vector);\n\t\t\t\tif (!status_vector.isSuccess())\n\t\t\t\t\tBURP_print_status(false, &amp;status_vector);\n\t\t\t\telse\n\t\t\t\t\t*tPtr = nullptr;\n\t\t\t}\n\t\t\telse\n\t\t\t\t*tPtr = nullptr;\n\t\t}\n\t\telse\n\t\t{\n\t\t\t// A backup shouldn&#x27;t touch any data - we ensure that\n\t\t\t// by never writing data during a backup, but let&#x27;s double\n\t\t\t// ensure it by doing a rollback\n\t\t\t(*tPtr)-&gt;rollback(&amp;status_vector);\n\t\t\tif (!status_vector.isSuccess())\n\t\t\t\tBURP_print_status(false, &amp;status_vector);\n\t\t\telse\n\t\t\t\t*tPtr = nullptr;\n\t\t}\n\t}\n}\n\n\nstatic SLONG get_number(const SCHAR* string) noexcept\n{\n/**************************************\n *\n *\tg e t _ n u m b e r\n *\n **************************************\n *\n * Functional description\n *\tConvert a string to binary\n **************************************/\n\tSCHAR c;\n\tSLONG value = 0;\n\n\tfor (const SCHAR* p = string; (c = *p++);)\n\t{\n\t\tif (c &lt; &#x27;0&#x27; || c &gt; &#x27;9&#x27;)\n\t\t\treturn 0;\n\t\tvalue *= 10;\n\t\tvalue += c - &#x27;0&#x27;;\n\t}\n\n\treturn value;\n}\n\n\nstatic gbak_action open_files(const TEXT* file1,\n\t\t\t\t\t\t\t  const TEXT** file2,\n\t\t\t\t\t\t\t  USHORT sw_replace,\n\t\t\t\t\t\t\t  const Firebird::ClumpletWriter&amp; dpb)\n{\n/**************************************\n *\n *\to p e n _ f i l e s\n *\n **************************************\n *\n * Functional description\n *\tfrom the input file names and\n *\tpositions, guess what the users\n *\tintention was.  Return the type\n *\tof the first file, plus open file\n *\tand db handle.\n *\n **************************************/\n\tBurpGlobals* tdgbl = BurpGlobals::getSpecific();\n\tFbLocalStatus status_vector;\n\n\t// try to attach the database using the first file_name\n\n\tif (sw_replace != IN_SW_BURP_C &amp;&amp; sw_replace != IN_SW_BURP_R)\n\t{\n\t\tFirebird::DispatcherPtr provider;\n\n\t\t// provide crypt key(s) for engine\n\n\t\tif (tdgbl-&gt;gbl_sw_keyholder)\n\t\t{\n\t\t\ttdgbl-&gt;gbl_database_file_name = file1;\n\t\t\tprovider-&gt;setDbCryptCallback(&amp;status_vector, MVOL_get_crypt(tdgbl));\n\n\t\t\tif (!status_vector.isSuccess())\n\t\t\t{\n\t\t\t\tBURP_print_status(true, &amp;status_vector);\n\t\t\t\treturn QUIT;\n\t\t\t}\n\t\t}\n\n\t\ttdgbl-&gt;db_handle = provider-&gt;attachDatabase(&amp;status_vector, file1,\n\t\t\tdpb.getBufferLength(), dpb.getBuffer());\n\n\t\tif (!(status_vector-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS))\n\t\t{\n\t\t\tif (sw_replace != IN_SW_BURP_B)\n\t\t\t{\n\t\t\t\t// msg 13 REPLACE specified, but the first file %s is a database\n\t\t\t\tBURP_error(13, true, file1);\n\t\t\t\ttdgbl-&gt;db_handle-&gt;detach(&amp;status_vector);\n\n\t\t\t\tif (status_vector-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t\t\t\tBURP_print_status(true, &amp;status_vector);\n\t\t\t\telse\n\t\t\t\t\ttdgbl-&gt;db_handle = NULL;\n\n\t\t\t\treturn QUIT;\n\t\t\t}\n\t\t\tif (tdgbl-&gt;gbl_sw_version)\n\t\t\t{\n\t\t\t\t// msg 139 Version(s) for database &quot;%s&quot;\n\t\t\t\tBURP_print(false, 139, file1);\n\t\t\t\tOutputVersion outputVersion(&quot;\\t%s\\n&quot;);\n\t\t\t\tFirebird::UtilInterfacePtr()-&gt;getFbVersion(&amp;status_vector, tdgbl-&gt;db_handle, &amp;outputVersion);\n\t\t\t}\n\t\t\tBURP_verbose(166, file1); // msg 166: readied database %s for backup\n\n\t\t\tif (tdgbl-&gt;gbl_sw_keyholder)\n\t\t\t{\n\t\t\t\tconstexpr unsigned char info[] = {fb_info_crypt_key, fb_info_crypt_plugin};\n\t\t\t\tunsigned char buffer[(1 + 2 + MAX_SQL_IDENTIFIER_SIZE) * 2 + 2];\n\t\t\t\tunsigned int len;\n\n\t\t\t\ttdgbl-&gt;db_handle-&gt;getInfo(&amp;status_vector, sizeof(info), info, sizeof(buffer), buffer);\n\n\t\t\t\tUCHAR* p = buffer;\n\n\t\t\t\twhile (p)\n\t\t\t\t{\n\t\t\t\t\tswitch (*p++)\n\t\t\t\t\t{\n\t\t\t\t\tcase fb_info_crypt_key:\n\t\t\t\t\t\tlen = gds__vax_integer(p, 2);\n\t\t\t\t\t\tif (len &lt; sizeof(tdgbl-&gt;gbl_hdr_keybuffer))\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tmemcpy(tdgbl-&gt;gbl_hdr_keybuffer, p + 2, len);\n\t\t\t\t\t\t\ttdgbl-&gt;gbl_hdr_keybuffer[len] = 0;\n\t\t\t\t\t\t\tif (!tdgbl-&gt;gbl_sw_keyname)\n\t\t\t\t\t\t\t\ttdgbl-&gt;gbl_sw_keyname = tdgbl-&gt;gbl_hdr_keybuffer;\n\t\t\t\t\t\t}\n\t\t\t\t\t\tbreak;\n\n\t\t\t\t\tcase fb_info_crypt_plugin:\n\t\t\t\t\t\tlen = gds__vax_integer(p, 2);\n\t\t\t\t\t\tif (len &lt; sizeof(tdgbl-&gt;gbl_hdr_cryptbuffer))\n\t\t\t\t\t\t{\n\t\t\t\t\t\t\tmemcpy(tdgbl-&gt;gbl_hdr_cryptbuffer, p + 2, len);\n\t\t\t\t\t\t\ttdgbl-&gt;gbl_hdr_cryptbuffer[len] = 0;\n\t\t\t\t\t\t\tif (!tdgbl-&gt;gbl_sw_crypt)\n\t\t\t\t\t\t\t\ttdgbl-&gt;gbl_sw_crypt = tdgbl-&gt;gbl_hdr_cryptbuffer;\n\t\t\t\t\t\t}\n\t\t\t\t\t\tbreak;\n\n\t\t\t\t\tdefault:\n\t\t\t\t\t\tp = NULL;\n\t\t\t\t\t\tcontinue;\n\t\t\t\t\t}\n\n\t\t\t\t\tp += (2 + len);\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t\telse if (sw_replace == IN_SW_BURP_B ||\n\t\t\t(status_vector-&gt;getErrors()[1] != isc_io_error &amp;&amp; status_vector-&gt;getErrors()[1] != isc_bad_db_format))\n\t\t{\n\t\t\tBURP_print_status(true, &amp;status_vector);\n\t\t\treturn QUIT;\n\t\t}\n\t}\n\n\tburp_fil* fil = NULL;\n\n\tif (sw_replace == IN_SW_BURP_B)\n\t{\n\t\t// Now it is safe to skip a db file\n\t\ttdgbl-&gt;gbl_sw_backup_files = tdgbl-&gt;gbl_sw_files-&gt;fil_next;\n\t\ttdgbl-&gt;gbl_sw_files = tdgbl-&gt;gbl_sw_files-&gt;fil_next;\n\t\tfb_assert(tdgbl-&gt;gbl_sw_files-&gt;fil_name == *file2);\n\n\t\tgbak_action flag = BACKUP;\n\t\ttdgbl-&gt;action-&gt;act_action = ACT_backup;\n\n\t\tfor (fil = tdgbl-&gt;gbl_sw_files; fil; fil = fil-&gt;fil_next)\n\t\t{\n\t\t\t// adjust the file size first\n\t\t\tFB_UINT64 fsize = fil-&gt;fil_length;\n\t\t\tswitch (fil-&gt;fil_size_code)\n\t\t\t{\n\t\t\tcase size_n:\n\t\t\t\tbreak;\n\t\t\tcase size_k:\n\t\t\t\tfsize *= KBYTE;\n\t\t\t\tbreak;\n\t\t\tcase size_m:\n\t\t\t\tfsize *= MBYTE;\n\t\t\t\tbreak;\n\t\t\tcase size_g:\n\t\t\t\tfsize *= GBYTE;\n\t\t\t\tbreak;\n\t\t\tcase size_e:\n\t\t\t\tBURP_error(262, true, fil-&gt;fil_name.c_str());\n\t\t\t\t// msg 262 size specification either missing or incorrect for file %s\n\t\t\t\tbreak;\n\t\t\tdefault:\n\t\t\t\tfb_assert(FALSE);\n\t\t\t\tbreak;\n\t\t\t}\n\n\t\t\tfil-&gt;fil_length = fsize;\n\n\t\t\tif ((fil-&gt;fil_seq = ++tdgbl-&gt;action-&gt;act_total) &gt;= 2)\n\t\t\t{\n\t\t\t\ttdgbl-&gt;action-&gt;act_action = ACT_backup_split;\n\t\t\t}\n\n\t\t\tBURP_verbose(75, fil-&gt;fil_name.c_str());\t// msg 75  creating file %s\n\n\t\t\tif (fil-&gt;fil_name == &quot;stdout&quot;)\n\t\t\t{\n\t\t\t\tif (tdgbl-&gt;action-&gt;act_total &gt;= 2 || fil-&gt;fil_next ||\n\t\t\t\t\t(tdgbl-&gt;gbl_sw_verbose &amp;&amp; tdgbl-&gt;sw_redirect == NOREDIRECT &amp;&amp; tdgbl-&gt;uSvc-&gt;isService()))\n\t\t\t\t{\n\t\t\t\t\tBURP_error(266, true);\n\t\t\t\t\t// msg 266 standard output is not supported when using split operation or in verbose mode\n\t\t\t\t\tflag = QUIT;\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\n\t\t\t\t// We ignore SIGPIPE so that we can report an IO error when we\n\t\t\t\t// try to write to the broken pipe.\n#ifndef WIN_NT\n\t\t\t\tsignal(SIGPIPE, SIG_IGN);\n#endif\n\t\t\t\ttdgbl-&gt;uSvc-&gt;setDataMode(true);\n\t\t\t\tfil-&gt;fil_fd = GBAK_STDOUT_DESC();\n\t\t\t\ttdgbl-&gt;stdIoMode = true;\n\t\t\t\ttdgbl-&gt;gbl_sw_direct_io = false;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\tFirebird::string nm = tdgbl-&gt;toSystem(fil-&gt;fil_name);\n#ifdef WIN_NT\n\t\t\t\tif ((fil-&gt;fil_fd = NT_tape_open(nm.c_str(), MODE_WRITE, CREATE_ALWAYS)) == INVALID_HANDLE_VALUE)\n#else\n\t\t\t\tconst int wmode = MODE_WRITE | (tdgbl-&gt;gbl_sw_direct_io ? O_DIRECT : 0);\n\t\t\t\tif ((fil-&gt;fil_fd = open(fil-&gt;fil_name.c_str(), wmode, open_mask)) == -1)\n#endif // WIN_NT\n\t\t\t\t{\n\n\t\t\t\t\tBURP_error(65, false, fil-&gt;fil_name.c_str());\n\t\t\t\t\t// msg 65 can&#x27;t open backup file %s\n\t\t\t\t\tflag = QUIT;\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (fil-&gt;fil_length == 0)\n\t\t\t{\n\t\t\t\tif (fil-&gt;fil_next)\n\t\t\t\t{\n\t\t\t\t\tBURP_error(262, true, fil-&gt;fil_name.c_str());\n\t\t\t\t\t// msg 262 size specification either missing or incorrect for file %s\n\t\t\t\t\tflag = QUIT;\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tfil-&gt;fil_length = MAX_LENGTH;\n\t\t\t\t\t// Write as much as possible to the last file\n\t\t\t\t}\n\t\t\t}\n\t\t\tif (fil-&gt;fil_length &lt; MIN_SPLIT_SIZE)\n\t\t\t{\n\t\t\t\tBURP_error(271, true, SafeArg() &lt;&lt; fil-&gt;fil_length &lt;&lt; MIN_SPLIT_SIZE);\n\t\t\t\t// msg file size given (%d) is less than minimum allowed (%d)\n\t\t\t\tflag = QUIT;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\n\t\tif (flag == BACKUP)\n\t\t{\n\t\t\ttdgbl-&gt;action-&gt;act_file = tdgbl-&gt;gbl_sw_files;\n\t\t\ttdgbl-&gt;file_desc = tdgbl-&gt;gbl_sw_files-&gt;fil_fd;\n\t\t}\n\t\telse\n\t\t{\n\t\t\ttdgbl-&gt;db_handle-&gt;detach(&amp;status_vector);\n\n\t\t\tif (status_vector-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t\t\tBURP_print_status(true, &amp;status_vector);\n\t\t\telse\n\t\t\t\ttdgbl-&gt;db_handle = NULL;\n\t\t}\n\n\t\treturn flag;\n\t}\n\n\n\t// If we got to here, then we&#x27;re really not backing up a database,\n\t// so open a backup file.\n\n\t// There are four possible cases such as:\n\t//\n\t//   1. restore single backup file to single db file\n\t//   2. restore single backup file to multiple db files\n\t//   3. restore multiple backup files (join operation) to single db file\n\t//   4. restore multiple backup files (join operation) to multiple db files\n\t//\n\t// Just looking at the command line, we can&#x27;t say for sure whether it is a\n\t// specification of the last file to be join or it is a specification of the\n\t// primary db file (case 4), for example:\n\t//\n\t//     gbak -c gbk1 gbk2 gbk3 db1 200 db2 500 db3 -v\n\t//                            ^^^\n\t//     db1 could be either the last file to be join or primary db file\n\t//\n\t// Since &#x27;gbk&#x27; and &#x27;gsplit&#x27; formats are different (gsplit file has its own\n\t// header record) hence we can use it as follows:\n\t//\n\t//     - open first file\n\t//     - read &amp; check a header record\n\t//\n\t// If a header is identified as a &#x27;gsplit&#x27; one then we know exactly how\n\t// many files need to be join and in which order. We keep opening a file by\n\t// file till we reach the last one to be join. During this step we check\n\t// that the files are accessible and are in proper order. It gives us\n\t// possibility to let silly customer know about an error as soon as possible.\n\t// Besides we have to find out which file is going to be a db file.\n\t//\n\t// If header is not identified as a &#x27;gsplit&#x27; record then we assume that\n\t// we got a single backup file.\n\n\tfil = tdgbl-&gt;gbl_sw_files;\n\ttdgbl-&gt;gbl_sw_backup_files = tdgbl-&gt;gbl_sw_files;\n\n\ttdgbl-&gt;action-&gt;act_action = ACT_restore;\n\tif (fil-&gt;fil_name == &quot;stdin&quot;)\n\t{\n\t\tfil-&gt;fil_fd = GBAK_STDIN_DESC();\n\t\ttdgbl-&gt;file_desc = fil-&gt;fil_fd;\n\t\ttdgbl-&gt;stdIoMode = true;\n\t\ttdgbl-&gt;gbl_sw_direct_io = false;\n\t\ttdgbl-&gt;gbl_sw_files = fil-&gt;fil_next;\n\t}\n\telse\n\t{\n\t\ttdgbl-&gt;stdIoMode = false;\n\n\t\t// open first file\n\t\tFirebird::string nm = tdgbl-&gt;toSystem(fil-&gt;fil_name);\n#ifdef WIN_NT\n\t\tif ((fil-&gt;fil_fd = NT_tape_open(nm.c_str(), MODE_READ, OPEN_EXISTING)) == INVALID_HANDLE_VALUE)\n#else\n\t\tconst int rmode = MODE_READ | (tdgbl-&gt;gbl_sw_direct_io ? O_DIRECT : 0);\n\t\tif ((fil-&gt;fil_fd = os_utils::open(nm.c_str(), rmode)) == INVALID_HANDLE_VALUE)\n#endif\n\t\t{\n\t\t\tBURP_error(65, true, fil-&gt;fil_name.c_str());\n\t\t\t// msg 65 can&#x27;t open backup file %s\n\t\t\treturn QUIT;\n\t\t}\n\n\t\tBURP_verbose(100, fil-&gt;fil_name.c_str());\n\t\t// msg 100 opened file %s\n\n\t\t// read and check a header record\n\t\ttdgbl-&gt;action-&gt;act_file = fil;\n\t\tint seq = 1;\n\t\tif (MVOL_split_hdr_read())\n\t\t{\n\t\t\ttdgbl-&gt;action-&gt;act_action = ACT_restore_join;\n\t\t\t// number of files to be join\n\t\t\tconst int total = tdgbl-&gt;action-&gt;act_total;\n\t\t\tif (fil-&gt;fil_seq != seq || seq &gt; total)\n\t\t\t{\n\t\t\t\tBURP_error(263, true, fil-&gt;fil_name.c_str());\n\t\t\t\t// msg 263 file %s out of sequence\n\t\t\t\treturn QUIT;\n\t\t\t}\n\n\t\t\tfor (++seq, fil = fil-&gt;fil_next; seq &lt;= total; fil = fil-&gt;fil_next, seq++)\n\t\t\t{\n\t\t\t\tif (!fil)\n\t\t\t\t{\n\t\t\t\t\tBURP_error(264, true);\n\t\t\t\t\t// msg 264 can&#x27;t join -- one of the files missing\n\t\t\t\t\treturn QUIT;\n\t\t\t\t}\n\t\t\t\tif (fil-&gt;fil_name == &quot;stdin&quot;)\n\t\t\t\t{\n\t\t\t\t\tBURP_error(265, true);\n\t\t\t\t\t// msg 265 standard input is not supported when using join operation\n\t\t\t\t\treturn QUIT;\n\t\t\t\t}\n\t\t\t\ttdgbl-&gt;action-&gt;act_file = fil;\n\t\t\t\tFirebird::string nm = tdgbl-&gt;toSystem(fil-&gt;fil_name);\n#ifdef WIN_NT\n\t\t\t\tif ((fil-&gt;fil_fd = NT_tape_open(nm.c_str(), MODE_READ, OPEN_EXISTING)) == INVALID_HANDLE_VALUE)\n#else\n\t\t\t\tif ((fil-&gt;fil_fd = os_utils::open(nm.c_str(), rmode)) == INVALID_HANDLE_VALUE)\n#endif\n\t\t\t\t{\n\t\t\t\t\tBURP_error(65, false, fil-&gt;fil_name.c_str());\n\t\t\t\t\t// msg 65 can&#x27;t open backup file %s\n\t\t\t\t\treturn QUIT;\n\t\t\t\t}\n\n\t\t\t\tBURP_verbose(100, fil-&gt;fil_name.c_str());\n\t\t\t\t// msg 100 opened file %s\n\n\t\t\t\tif (MVOL_split_hdr_read())\n\t\t\t\t{\n\t\t\t\t\tif ((total != tdgbl-&gt;action-&gt;act_total) || (seq != fil-&gt;fil_seq) || (seq &gt; total))\n\t\t\t\t\t{\n\t\t\t\t\t\tBURP_error(263, true, fil-&gt;fil_name.c_str());\n\t\t\t\t\t\t// msg 263 file %s out of sequence\n\t\t\t\t\t\treturn QUIT;\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t{\n\t\t\t\t\tBURP_error(267, true, fil-&gt;fil_name.c_str());\n\t\t\t\t\t// msg 267 backup file %s might be corrupt\n\t\t\t\t\treturn QUIT;\n\t\t\t\t}\n\t\t\t}\n\t\t\ttdgbl-&gt;action-&gt;act_file = tdgbl-&gt;gbl_sw_files;\n\t\t\ttdgbl-&gt;file_desc = tdgbl-&gt;action-&gt;act_file-&gt;fil_fd;\n\t\t\tif ((tdgbl-&gt;gbl_sw_files = fil) == NULL)\n\t\t\t{\n\t\t\t\tBURP_error(268, true);\n\t\t\t\t// msg 268 database file specification missing\n\t\t\t\treturn QUIT;\n\t\t\t}\n\t\t}\n\t\telse\n\t\t{\n\t\t\t// Move pointer to the begining of the file. At this point we\n\t\t\t// assume -- this is a single backup file because we were\n\t\t\t// not able to read a split header record.\n#ifdef WIN_NT\n\t\t\tif (strnicmp(fil-&gt;fil_name.c_str(), &quot;\\\\\\\\.\\\\tape&quot;, 8))\n\t\t\t\tSetFilePointer(fil-&gt;fil_fd, 0, NULL, FILE_BEGIN);\n\t\t\telse\n\t\t\t\tSetTapePosition(fil-&gt;fil_fd, TAPE_REWIND, 0, 0, 0, FALSE);\n#else\n\t\t\tos_utils::lseek(fil-&gt;fil_fd, 0, SEEK_SET);\n#endif\n\t\t\ttdgbl-&gt;file_desc = fil-&gt;fil_fd;\n\t\t\ttdgbl-&gt;gbl_sw_files = fil-&gt;fil_next;\n\t\t}\n\t}\n\n\n\t// If we got here, we&#x27;ve opened a backup file, and we&#x27;re\n\t// thinking about creating or replacing a database.\n\n\t*file2 = tdgbl-&gt;gbl_sw_files-&gt;fil_name.c_str();\n\tif (tdgbl-&gt;gbl_sw_files-&gt;fil_size_code != size_n)\n\t\tBURP_error(262, true, *file2);\n\t\t// msg 262 size specification either missing or incorrect for file %s\n\n\tif (sw_replace == IN_SW_BURP_C || sw_replace == IN_SW_BURP_R)\n\t{\n\t\tFirebird::DispatcherPtr provider;\n\n\t\t// provide crypt key(s) for engine\n\n\t\tif (tdgbl-&gt;gbl_sw_keyholder)\n\t\t{\n\t\t\ttdgbl-&gt;gbl_database_file_name = *file2;\n\t\t\tprovider-&gt;setDbCryptCallback(&amp;status_vector, MVOL_get_crypt(tdgbl));\n\t\t\tif (!status_vector.isSuccess())\n\t\t\t{\n\t\t\t\tBURP_print_status(true, &amp;status_vector);\n\t\t\t\treturn QUIT;\n\t\t\t}\n\t\t}\n\n\t\ttdgbl-&gt;db_handle = provider-&gt;attachDatabase(&amp;status_vector, *file2,\n\t\t\tdpb.getBufferLength(), dpb.getBuffer());\n\n\t\tif (!(status_vector-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS))\n\t\t{\n\t\t\tif (sw_replace == IN_SW_BURP_C)\n\t\t\t{\n\t\t\t\ttdgbl-&gt;db_handle-&gt;detach(&amp;status_vector);\n\n\t\t\t\tif (status_vector-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t\t\t\tBURP_print_status(true, &amp;status_vector);\n\t\t\t\telse\n\t\t\t\t\ttdgbl-&gt;db_handle = NULL;\n\n\t\t\t\tBURP_error(14, true, *file2);\n\t\t\t\t// msg 14 database %s already exists.  To replace it, use the -R switch\n\t\t\t}\n\t\t\telse\n\t\t\t{\n\t\t\t\ttdgbl-&gt;db_handle-&gt;dropDatabase(&amp;status_vector);\n\n\t\t\t\tif (status_vector-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t\t\t{\n\t\t\t\t\tFirebird::FbLocalStatus status2;\n\t\t\t\t\ttdgbl-&gt;db_handle-&gt;detach(&amp;status2);\n\n\t\t\t\t\tif (status2-&gt;getState() &amp; Firebird::IStatus::STATE_ERRORS)\n\t\t\t\t\t\tBURP_print_status(true, &amp;status2);\n\t\t\t\t\telse\n\t\t\t\t\t\ttdgbl-&gt;db_handle = NULL;\n\n\t\t\t\t\tBURP_error(233, true, *file2);\n\t\t\t\t\t// msg 233 Cannot drop database %s, might be in use\n\t\t\t\t}\n\t\t\t\telse\n\t\t\t\t\ttdgbl-&gt;db_handle = NULL;\n\t\t\t}\n\t\t}\n\t\telse if (sw_replace == IN_SW_BURP_R &amp;&amp; status_vector-&gt;getErrors()[1] == isc_adm_task_denied)\n\t\t{\n\t\t\t// if we got an error from attach database and we have replace switch set\n\t\t\t// then look for error from attach returned due to not owner, if we are\n\t\t\t// not owner then return the error status back up\n\n\t\t\tBURP_error(274, true);\n\t\t\t// msg # 274 : Cannot restore over current database, must be sysdba\n\t\t\t// or owner of the existing database.\n\t\t}\n\t}\n\n\t// check the file size specification\n\tfor (fil = tdgbl-&gt;gbl_sw_files; fil; fil = fil-&gt;fil_next)\n\t{\n\t\tif (fil-&gt;fil_size_code != size_n)\n\t\t{\n\t\t\tBURP_error(262, true, fil-&gt;fil_name.c_str());\n\t\t\t// msg 262 size specification either missing or incorrect for file %s\n\t\t}\n\t}\n\n\treturn RESTORE;\n}\n\n\nstatic void burp_output(bool err, const SCHAR* format, ...)\n{\n/**************************************\n *\n *\tb u r p _ o u t p u t\n *\n **************************************\n *\n * Functional description\n *\tPlatform independent output routine.\n *\n **************************************/\n\tva_list arglist;\n\n\tBurpMaster master;\n\tBurpGlobals* tdgbl = master.get();\n\n\tif (tdgbl-&gt;sw_redirect != NOOUTPUT &amp;&amp; format[0] != &#x27;\\0&#x27;)\n\t{\n\t\tva_start(arglist, format);\n\t\tif (tdgbl-&gt;sw_redirect == REDIRECT &amp;&amp; tdgbl-&gt;output_file != NULL)\n\t\t{\n\t\t\tvfprintf(tdgbl-&gt;output_file, format, arglist);\n\t\t}\n\t\telse\n\t\t{\n\t\t\tFirebird::string buf;\n\t\t\tbuf.vprintf(format, arglist);\n\t\t\tif (err)\n\t\t\t\ttdgbl-&gt;uSvc-&gt;outputError(buf.c_str());\n\t\t\telse\n\t\t\t\ttdgbl-&gt;uSvc-&gt;outputVerbose(buf.c_str());\n\t\t}\n\t\tva_end(arglist);\n\t}\n}\n\n\nstatic void burp_usage(const Switches&amp; switches)\n{\n/**********************************************\n *\n *      b u r p _ u s a g e\n *\n **********************************************\n *\n * Functional description\n *\tprint usage information\n *\n **********************************************/\n\tconst SafeArg sa(SafeArg() &lt;&lt; switch_char);\n\tconst SafeArg dummy;\n\n\tBURP_print(true, 317); // usage\n\tfor (int i = 318; i &lt; 323; ++i)\n\t\tBURP_msg_put(true, i, dummy); // usage\n\n\tBURP_print(true, 95); // msg 95  legal switches are\n\tconst Switches::in_sw_tab_t* const base = switches.getTable();\n\tfor (const Switches::in_sw_tab_t* p = base; p-&gt;in_sw; ++p)\n\t{\n\t\tif (p-&gt;in_sw_msg &amp;&amp; p-&gt;in_sw_optype == boMain)\n\t\t\tBURP_msg_put(true, p-&gt;in_sw_msg, sa);\n\t}\n\n\tBURP_print(true, 323); // backup options are\n\tfor (const Switches::in_sw_tab_t* p = base; p-&gt;in_sw; ++p)\n\t{\n\t\tif (p-&gt;in_sw_msg &amp;&amp; p-&gt;in_sw_optype == boBackup)\n\t\t\tBURP_msg_put(true, p-&gt;in_sw_msg, sa);\n\t}\n\n\tBURP_print(true, 324); // restore options are\n\tfor (const Switches::in_sw_tab_t* p = base; p-&gt;in_sw; ++p)\n\t{\n\t\tif (p-&gt;in_sw_msg &amp;&amp; p-&gt;in_sw_optype == boRestore)\n\t\t\tBURP_msg_put(true, p-&gt;in_sw_msg, sa);\n\t}\n\n\tBURP_print(true, 325); // general options are\n\tfor (const Switches::in_sw_tab_t* p = base; p-&gt;in_sw; ++p)\n\t{\n\t\tif (p-&gt;in_sw_msg &amp;&amp; p-&gt;in_sw_optype == boGeneral)\n\t\t\tBURP_msg_put(true, p-&gt;in_sw_msg, sa);\n\t}\n\n\tBURP_print(true, 132); // msg 132 switches can be abbreviated to the unparenthesized characters\n}\n\n\nstatic ULONG get_size(const SCHAR* string, burp_fil* file)\n{\n/**********************************************\n *\n *      g e t _ s i z e\n *\n **********************************************\n *\n * Functional description\n *\tGet size specification for either splitting or\n *\trestoring to multiple files\n *\n **********************************************/\n\tconstexpr FB_UINT64 overflow = MAX_UINT64 / 10 - 1;\n\tUCHAR c;\n\tFB_UINT64 size = 0;\n\tbool digit = false;\n\n\tfile-&gt;fil_size_code = size_n;\n\tfor (const SCHAR *num = string; (c = *num++);)\n\t{\n\t\tif (isdigit(c))\n\t\t{\n\t\t\tconst int val = c - &#x27;0&#x27;;\n\t\t\tif (size &gt;= overflow)\n\t\t\t{\n\t\t\t\tfile-&gt;fil_size_code = size_e;\n\t\t\t\tsize = 0;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t\tsize = size * 10 + val;\n\t\t\tdigit = true;\n\t\t}\n\t\telse\n\t\t{\n\t\t\tif (isalpha(c))\n\t\t\t{\n\t\t\t\tif (!digit)\n\t\t\t\t{\n\t\t\t\t\tfile-&gt;fil_size_code = size_e;\n\t\t\t\t\tsize = 0;\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\n\t\t\t\tswitch (UPPER(c))\n\t\t\t\t{\n\t\t\t\tcase &#x27;K&#x27;:\n\t\t\t\t\tfile-&gt;fil_size_code = size_k;\n\t\t\t\t\tbreak;\n\t\t\t\tcase &#x27;M&#x27;:\n\t\t\t\t\tfile-&gt;fil_size_code = size_m;\n\t\t\t\t\tbreak;\n\t\t\t\tcase &#x27;G&#x27;:\n\t\t\t\t\tfile-&gt;fil_size_code = size_g;\n\t\t\t\t\tbreak;\n\t\t\t\tdefault:\n\t\t\t\t\tfile-&gt;fil_size_code = size_e;\n\t\t\t\t\tsize = 0;\n\t\t\t\t\tbreak;\n\t\t\t\t}\n\t\t\t\tif (*num)\n\t\t\t\t{\n\t\t\t\t\tfile-&gt;fil_size_code = size_e;\n\t\t\t\t\tsize = 0;\n\t\t\t\t}\n\t\t\t\tbreak;\n\t\t\t}\n\t\t}\n\t}\n\n\tfile-&gt;fil_length = size;\n\treturn size;\n}\n\n\n#ifndef WIN_NT\nvoid close_platf(DESC file)\n{\n/**********************************************\n *\n *      c l o s e _ p l a t f\n *\n **********************************************\n *\n * Functional description\n *\tTruncate and close file - posix version\n *\n **********************************************/\n\tif (sizeof(off_t) &gt; 4)\t\t// 64 bit or b4-bit IO in 32 bit OS\n\t{\n#ifndef\tO_ACCMODE\n// Suppose compatibility with KR where 0, 1, 2 were documented for RO, WO and RW in open() still exists\n#define O_ACCMODE 3\n#endif\n\n\t\toff_t fileSize = os_utils::lseek(file, 0, SEEK_CUR);\n\t\tif (fileSize != (off_t)(-1))\n\t\t{\n\t\t\tFB_UNUSED(os_utils::ftruncate(file, fileSize));\n\t\t}\n\t}\n\n\tclose(file);\n}\n#endif // WIN_NT\n\n\nvoid BurpGlobals::setupSkipIncludePattern(const string&amp; regexp, USHORT alreadySetErrorCode,\n\tAutoPtr&lt;SimilarToRegex&gt;&amp; matcher)\n{\n\tif (matcher)\n\t\tBURP_error(alreadySetErrorCode, true);\n\n\t// Compile expressions\n\ttry\n\t{\n\t\tif (regexp.hasData())\n\t\t{\n\t\t\tstring filter(regexp);\n\t\t\tif (!uSvc-&gt;utf8FileNames())\n\t\t\t\tISC_systemToUtf8(filter);\n\n\t\t\tBurpGlobals* tdgbl = BurpGlobals::getSpecific();\n\n\t\t\tmatcher.reset(FB_NEW_POOL(tdgbl-&gt;getPool()) SimilarToRegex(\n\t\t\t\ttdgbl-&gt;getPool(), SimilarToFlag::CASE_INSENSITIVE,\n\t\t\t\tfilter.c_str(), filter.length(),\n\t\t\t\t&quot;\\\\&quot;, 1));\n\t\t}\n\t}\n\tcatch (const Firebird::Exception&amp;)\n\t{\n\t\tFirebird::fatal_exception::raiseFmt(\n\t\t\t&quot;error while compiling regular expression \\&quot;%s\\&quot;&quot;, regexp.c_str());\n\t}\n}\n\nFirebird::string BurpGlobals::toSystem(const Firebird::PathName&amp; from)\n{\n\tFirebird::string to = from.ToString();\n\tif (uSvc-&gt;utf8FileNames())\n\t\tISC_utf8ToSystem(to);\n\treturn to;\n}\n\nnamespace // for local symbols\n{\n\tenum Pattern { NOT_SET = 0, MATCH = 1, NOT_MATCH = 2 };\n\n\tPattern checkPattern(Firebird::AutoPtr&lt;Firebird::SimilarToRegex&gt;&amp; matcher,\n\t\t\t\t\tconst char* name)\n\t{\n\t\tif (!matcher)\n\t\t\treturn NOT_SET;\n\n\t\treturn matcher-&gt;matches(name, fb_strlen(name)) ? MATCH : NOT_MATCH;\n\t}\n}\n\nbool BurpGlobals::skipRelation(const QualifiedMetaString&amp; name)\n{\n\tif (gbl_sw_meta)\n\t\treturn true;\n\n\t// Fine-grained table controlling cases when data must be skipped for a table\n\tstatic const bool result[3][3] = {\n\t\t// Include filter\n\t\t//\tNS    M      NM           S\n\t\t{ false, false, true}, // NS  k\n\t\t{ true,  true,  true}, // M   i\n\t\t{ false, false, true}  // NM  p\n\t};\n\n\tconst enum Pattern res1sch = checkPattern(skipSchemaDataMatcher, name.schema.c_str());\n\tconst enum Pattern res1obj = checkPattern(skipDataMatcher, name.object.c_str());\n\tconst enum Pattern res2sch = checkPattern(includeSchemaDataMatcher, name.schema.c_str());\n\tconst enum Pattern res2obj = checkPattern(includeDataMatcher, name.object.c_str());\n\n\treturn result[res1sch][res2sch] || result[res1obj][res2obj];\n}\n\nvoid BurpGlobals::read_stats(SINT64* stats)\n{\n\tif (!db_handle)\n\t\treturn;\n\n\tconst UCHAR info[] =\n\t{\n\t\tisc_info_reads,\n\t\tisc_info_writes\n\t};\n\n\tFbLocalStatus status;\n\tUCHAR buffer[sizeof(info) * (1 + 2 + 8) + 2];\n\n\tdb_handle-&gt;getInfo(&amp;status, sizeof(info), info, sizeof(buffer), buffer);\n\n\tUCHAR* p = buffer, *const e = buffer + sizeof(buffer);\n\twhile (p &lt; e)\n\t{\n\t\tint flag = -1;\n\t\tswitch (*p)\n\t\t{\n\t\tcase isc_info_reads:\n\t\t\tflag = READS;\n\t\t\tbreak;\n\n\t\tcase isc_info_writes:\n\t\t\tflag = WRITES;\n\t\t\tbreak;\n\n\t\tcase isc_info_end:\n\t\tdefault:\n\t\t\tp = e;\n\t\t}\n\n\t\tif (flag != -1)\n\t\t{\n\t\t\tconst int len = gds__vax_integer(p + 1, 2);\n\t\t\tstats[flag] = isc_portable_integer((ISC_UCHAR*) p + 1 + 2, len);\n\t\t\tp += len + 3;\n\t\t}\n\t}\n}\n\nvoid BurpGlobals::print_stats(USHORT number)\n{\n\tif (!gbl_stat_flags || gbl_stat_done)\n\t\treturn;\n\n\tconst bool total = (number == 369);\n\t// msg 369 total statistics\n\n\tburp_output(false, &quot; &quot;);\n\n\tconstexpr int time_mask = (1 &lt;&lt; TIME_TOTAL) | (1 &lt;&lt; TIME_DELTA);\n\tif (gbl_stat_flags &amp; time_mask)\n\t{\n\t\tconst SINT64 t0 = fb_utils::query_performance_counter();\n\t\tconst SINT64 freq_ms = fb_utils::query_performance_frequency() / 1000;\n\n\t\tif (gbl_stat_flags &amp; (1 &lt;&lt; TIME_TOTAL))\n\t\t{\n\t\t\tconst SINT64 t1 = (t0 - gbl_stats[TIME_TOTAL]) / freq_ms;\n\t\t\tburp_output(false, STAT_FORMATS[TIME_TOTAL].format, (int)(t1 / 1000), (int)(t1 % 1000));\n\t\t}\n\n\t\tif (gbl_stat_flags &amp; (1 &lt;&lt; TIME_DELTA))\n\t\t{\n\t\t\tconst SINT64 t2 = (t0 - gbl_stats[TIME_DELTA]) / freq_ms;\n\t\t\tburp_output(false, STAT_FORMATS[TIME_DELTA].format, (int)(t2 / 1000), (int)(t2 % 1000));\n\n\t\t\tgbl_stats[TIME_DELTA] = t0;\n\t\t}\n\t}\n\n\tSINT64 cur_stats[LAST_COUNTER] = {0};\n\tif ((gbl_stat_flags &amp; ~time_mask) &amp;&amp; !gbl_stat_done)\n\t\tread_stats(cur_stats);\n\n\tfor (int i = READS; i &lt; LAST_COUNTER; i++)\n\t{\n\t\tif (gbl_stat_flags &amp; (1 &lt;&lt; i))\n\t\t{\n\t\t\tSINT64 val = 0;\n\t\t\tif (total || gbl_stat_done)\n\t\t\t\tval = cur_stats[i];\n\t\t\telse\n\t\t\t\tval = cur_stats[i] - gbl_stats[i];\n\n\t\t\tgbl_stats[i] = cur_stats[i];\n\n\t\t\tburp_output(false, STAT_FORMATS[i].format, val);\n\t\t}\n\t}\n\n\tif (total)\n\t\tgbl_stat_done = true;\n}\n\nvoid BurpGlobals::print_stats_header()\n{\n\tif (gbl_stat_header || !gbl_stat_flags)\n\t\treturn;\n\n\tgbl_stat_header = true;\n\n\tBURP_msg_partial(false, 169);\t// msg 169: gbak:\n\tburp_output(false, &quot; &quot;);\n\n\tfor (int i = 0; i &lt; LAST_COUNTER; i++)\n\t{\n\t\tif (gbl_stat_flags &amp; (1 &lt;&lt; i))\n\t\t\tburp_output(false, &quot;%-*s&quot;, STAT_FORMATS[i].width, STAT_FORMATS[i].header);\n\t}\n\n\tburp_output(false, &quot;\\n&quot;);\n}\n\nstatic void processFetchPass(const SCHAR*&amp; password, int&amp; itr, const int argc, Firebird::UtilSvc::ArgvType&amp; argv)\n{\n\tif (++itr &gt;= argc)\n\t{\n\t\tBURP_error(189, true);\n\t\t// password parameter missing\n\t}\n\tif (password)\n\t{\n\t\tBURP_error(307, true);\n\t\t// too many passwords provided\n\t}\n\n\tswitch (fb_utils::fetchPassword(argv[itr], password))\n\t{\n\tcase fb_utils::FETCH_PASS_OK:\n\t\tbreak;\n\tcase fb_utils::FETCH_PASS_FILE_OPEN_ERROR:\n\t\tBURP_error(308, true, MsgFormat::SafeArg() &lt;&lt; argv[itr] &lt;&lt; errno);\n\t\t// error @2 opening password file @1\n\t\tbreak;\n\tcase fb_utils::FETCH_PASS_FILE_READ_ERROR:\n\t\tBURP_error(309, true, MsgFormat::SafeArg() &lt;&lt; argv[itr] &lt;&lt; errno);\n\t\t// error @2 reading password file @1\n\t\tbreak;\n\tcase fb_utils::FETCH_PASS_FILE_EMPTY:\n\t\tBURP_error(310, true, MsgFormat::SafeArg() &lt;&lt; argv[itr]);\n\t\t// password file @1 is empty\n\t\tbreak;\n\t}\n}\n"}, "/build/src/common/StatusArg.h": {"id": "/build/src/common/StatusArg.h", "filePath": "src/common/StatusArg.h", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusArg.h\n *\tDESCRIPTION:\tBuild status vector with variable number of elements\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#ifndef FB_STATUS_ARG\n#define FB_STATUS_ARG\n\n#include &quot;fb_exception.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n\nnamespace Firebird {\n\nclass AbstractString;\nclass MetaString;\nclass Exception;\n\nnamespace Arg {\n\n// forward\nclass Warning;\nclass StatusVector;\n\nclass Base\n{\n#ifdef __HP_aCC\n// aCC gives error, cannot access protected member class ImplBase\npublic:\n#else\nprotected:\n#endif\n\tclass ImplBase\n\t{\n\tprivate:\n\t\tISC_STATUS kind, code;\n\n\tpublic:\n\t\tISC_STATUS getKind() const noexcept { return kind; }\n\t\tISC_STATUS getCode() const noexcept { return code; }\n\n\t\tvirtual const ISC_STATUS* value() const noexcept { return NULL; }\n\t\tvirtual unsigned int length() const noexcept { return 0; }\n\t\tvirtual unsigned int firstWarning() const noexcept { return 0; }\n\t\tvirtual bool hasData() const noexcept { return false; }\n\t\tvirtual void clear() noexcept { }\n\t\tvirtual void append(const StatusVector&amp;) noexcept { }\n\t\tvirtual void prepend(const StatusVector&amp;) noexcept { }\n\t\tvirtual void assign(const StatusVector&amp; ex) noexcept { }\n\t\tvirtual void assign(const Exception&amp; ex) noexcept { }\n\t\tvirtual ISC_STATUS copyTo(ISC_STATUS*) const noexcept { return 0; }\n\t\tvirtual void copyTo(IStatus*) const noexcept { }\n\t\tvirtual void appendTo(IStatus*) const noexcept { }\n\n\t\tvirtual void shiftLeft(const Base&amp;) noexcept { }\n\t\tvirtual void shiftLeft(const Warning&amp;) noexcept { }\n\t\tvirtual void shiftLeft(const char*) noexcept { }\n\t\tvirtual void shiftLeft(const AbstractString&amp;) noexcept { }\n\t\tvirtual void shiftLeft(const MetaString&amp;) noexcept { }\n\n\t\tvirtual bool compare(const StatusVector&amp; /*v*/) const noexcept { return false; }\n\n\t\tImplBase(ISC_STATUS k, ISC_STATUS c) noexcept : kind(k), code(c) { }\n\t\tvirtual ~ImplBase() { }\n\t};\n\n\tBase(ISC_STATUS k, ISC_STATUS c);\n\texplicit Base(ImplBase* i) noexcept : implementation(i) { }\n\t~Base() noexcept { delete implementation; }\n\n\tImplBase* const implementation;\n\npublic:\n\tISC_STATUS getKind() const noexcept { return implementation-&gt;getKind(); }\n\tISC_STATUS getCode() const noexcept { return implementation-&gt;getCode(); }\n};\n\nclass StatusVector : public Base\n{\nprotected:\n\tclass ImplStatusVector : public ImplBase\n\t{\n\tprivate:\n\t\tStaticStatusVector m_status_vector;\n\t\tunsigned int m_warning;\n\n\t\tstring m_strings;\n\n\t\tvoid putStrArg(unsigned startWith);\n\t\tvoid setStrPointers(const char* oldBase);\n\n\t\tbool appendErrors(const ImplBase* const v) noexcept;\n\t\tbool appendWarnings(const ImplBase* const v) noexcept;\n\t\tbool append(const ISC_STATUS* const from, const unsigned int count) noexcept;\n\t\tvoid append(const ISC_STATUS* const from) noexcept;\n\n\t\tImplStatusVector&amp; operator=(const ImplStatusVector&amp; src);\n\n\tpublic:\n\t\tvirtual const ISC_STATUS* value() const noexcept { return m_status_vector.begin(); }\n\t\tvirtual unsigned int length() const noexcept { return m_status_vector.getCount() - 1u; }\n\t\tvirtual unsigned int firstWarning() const noexcept { return m_warning; }\n\t\tvirtual bool hasData() const noexcept { return length() &gt; 0u; }\n\t\tvirtual void clear() noexcept;\n\t\tvirtual void append(const StatusVector&amp; v) noexcept;\n\t\tvirtual void prepend(const StatusVector&amp; v) noexcept;\n\t\tvirtual void assign(const StatusVector&amp; v) noexcept;\n\t\tvirtual void assign(const Exception&amp; ex) noexcept;\n\t\tvirtual ISC_STATUS copyTo(ISC_STATUS* dest) const noexcept;\n\t\tvirtual void copyTo(IStatus* dest) const noexcept;\n\t\tvirtual void appendTo(IStatus* dest) const noexcept;\n\t\tvirtual void shiftLeft(const Base&amp; arg) noexcept;\n\t\tvirtual void shiftLeft(const Warning&amp; arg) noexcept;\n\t\tvirtual void shiftLeft(const char* text) noexcept;\n\t\tvirtual void shiftLeft(const AbstractString&amp; text) noexcept;\n\t\tvirtual void shiftLeft(const MetaString&amp; text) noexcept;\n\t\tvirtual bool compare(const StatusVector&amp; v) const noexcept;\n\n\t\tImplStatusVector(ISC_STATUS k, ISC_STATUS c) noexcept\n\t\t\t: ImplBase(k, c),\n\t\t\t  m_status_vector(*getDefaultMemoryPool()),\n\t\t\t  m_strings(*getDefaultMemoryPool())\n\t\t{\n\t\t\tclear();\n\t\t}\n\n\t\texplicit ImplStatusVector(const ISC_STATUS* s) noexcept;\n\t\texplicit ImplStatusVector(const IStatus* s) noexcept;\n\t\texplicit ImplStatusVector(const Exception&amp; ex) noexcept;\n\t};\n\n\tStatusVector(ISC_STATUS k, ISC_STATUS v);\n\npublic:\n\texplicit StatusVector(const ISC_STATUS* s);\n\texplicit StatusVector(const IStatus* s);\n\texplicit StatusVector(const Exception&amp; ex);\n\tStatusVector();\n\t~StatusVector() { }\n\n\t// copying is prohibited\n\tStatusVector(const StatusVector&amp;) = delete;\n\tvoid operator=(const StatusVector&amp;) = delete;\n\n\tconst ISC_STATUS* value() const noexcept { return implementation-&gt;value(); }\n\tunsigned int length() const noexcept { return implementation-&gt;length(); }\n\tbool hasData() const noexcept { return implementation-&gt;hasData(); }\n\tbool isEmpty() const noexcept { return !implementation-&gt;hasData(); }\n\n\tvoid clear() noexcept { implementation-&gt;clear(); }\n\tvoid append(const StatusVector&amp; v) noexcept { implementation-&gt;append(v); }\n\tvoid prepend(const StatusVector&amp; v) noexcept { implementation-&gt;prepend(v); }\n\tvoid assign(const StatusVector&amp; v) noexcept { implementation-&gt;assign(v); }\n\tvoid assign(const Exception&amp; ex) noexcept { implementation-&gt;assign(ex); }\n\t[[noreturn]] void raise() const;\n\tISC_STATUS copyTo(ISC_STATUS* dest) const noexcept { return implementation-&gt;copyTo(dest); }\n\tvoid copyTo(IStatus* dest) const noexcept { implementation-&gt;copyTo(dest); }\n\tvoid appendTo(IStatus* dest) const noexcept { implementation-&gt;appendTo(dest); }\n\n\t// generic argument insert\n\tStatusVector&amp; operator&lt;&lt;(const Base&amp; arg) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(arg);\n\t\treturn *this;\n\t}\n\n\t// StatusVector case - append multiple args\n\tStatusVector&amp; operator&lt;&lt;(const StatusVector&amp; arg) noexcept\n\t{\n\t\timplementation-&gt;append(arg);\n\t\treturn *this;\n\t}\n\n\t// warning special case - to setup first warning location\n\tStatusVector&amp; operator&lt;&lt;(const Warning&amp; arg) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(arg);\n\t\treturn *this;\n\t}\n\n\t// Str special case - make the code simpler &amp; better readable\n\tStatusVector&amp; operator&lt;&lt;(const char* text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(text);\n\t\treturn *this;\n\t}\n\n\tStatusVector&amp; operator&lt;&lt;(const AbstractString&amp; text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(text);\n\t\treturn *this;\n\t}\n\n\tStatusVector&amp; operator&lt;&lt;(const MetaString&amp; text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(text);\n\t\treturn *this;\n\t}\n\n\tStatusVector&amp; operator&lt;&lt;(std::string_view text) noexcept\n\t{\n\t\timplementation-&gt;shiftLeft(string(text.data(), static_cast&lt;string::size_type&gt;(text.length())));\n\t\treturn *this;\n\t}\n\n\tbool operator==(const StatusVector&amp; arg) const noexcept\n\t{\n\t\treturn implementation-&gt;compare(arg);\n\t}\n\n\tbool operator!=(const StatusVector&amp; arg) const noexcept\n\t{\n\t\treturn !(*this == arg);\n\t}\n};\n\n\nclass Gds : public StatusVector\n{\npublic:\n\texplicit Gds(ISC_STATUS s) noexcept;\n};\n\n// To simplify calls to DYN messages from DSQL, only for private DYN messages\n// that do not have presence in system_errors2.sql, when you have to call ENCODE_ISC_MSG.\nclass PrivateDyn : public Gds\n{\npublic:\n\texplicit PrivateDyn(ISC_STATUS codeWithoutFacility) noexcept;\n};\n\nclass Str : public Base\n{\npublic:\n\texplicit Str(const char* text) noexcept;\n\texplicit Str(const AbstractString&amp; text) noexcept;\n\texplicit Str(const MetaString&amp; text) noexcept;\n};\n\nclass Num : public Base\n{\npublic:\n\texplicit Num(ISC_STATUS s) noexcept;\n};\n\n// On 32-bit architecture ISC_STATUS can&#x27;t fit 64-bit integer therefore\n// convert such a numbers into text and put string into status-vector.\n// Make sure that temporary instance of this class is not going out of scope\n// before exception is raised !\nclass Int64 : public Str\n{\npublic:\n\texplicit Int64(SINT64 val) noexcept;\n\texplicit Int64(FB_UINT64 val) noexcept;\nprivate:\n\tchar text[24];\n};\n\nclass Quad : public Str\n{\npublic:\n\texplicit Quad(const ISC_QUAD* quad) noexcept;\nprivate:\n\t//\t\thigh  :  low  \\0\n\tchar text[8 + 1 + 8 + 1];\n};\n\nclass Interpreted : public StatusVector\n{\npublic:\n\texplicit Interpreted(const char* text) noexcept;\n\texplicit Interpreted(const AbstractString&amp; text) noexcept;\n};\n\nclass Unix : public Base\n{\npublic:\n\texplicit Unix(ISC_STATUS s) noexcept;\n};\n\nclass Mach : public Base\n{\npublic:\n\texplicit Mach(ISC_STATUS s) noexcept;\n};\n\nclass Windows : public Base\n{\npublic:\n\texplicit Windows(ISC_STATUS s) noexcept;\n};\n\nclass Warning : public StatusVector\n{\npublic:\n\texplicit Warning(ISC_STATUS s) noexcept;\n};\n\nclass SqlState : public Base\n{\npublic:\n\texplicit SqlState(const char* text) noexcept;\n\texplicit SqlState(const AbstractString&amp; text) noexcept;\n};\n\nclass OsError : public Base\n{\npublic:\n\tOsError() noexcept;\n\texplicit OsError(ISC_STATUS s) noexcept;\n};\n\n} // namespace Arg\n\n} // namespace Firebird\n\n\n#endif // FB_STATUS_ARG\n"}, "/build/src/common/fb_exception.cpp": {"id": "/build/src/common/fb_exception.cpp", "filePath": "src/common/fb_exception.cpp", "content": "#include &quot;firebird.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &lt;string.h&gt;\n#include &lt;errno.h&gt;\n#include &lt;stdarg.h&gt;\n#include &quot;iberror.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;../common/classes/init.h&quot;\n#include &quot;../common/classes/array.h&quot;\n#include &quot;../common/ThreadStart.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n#include &quot;../common/SimpleStatusVector.h&quot;\n#include &quot;../common/StatusHolder.h&quot;\n\nnamespace Firebird {\n\n// ********************************* Exception *******************************\n\nException::~Exception() noexcept { }\n\nvoid Exception::stuffException(DynamicStatusVector&amp; status_vector) const noexcept\n{\n\tStaticStatusVector status;\n\tstuffException(status);\n\ttry\n\t{\n\t\tstatus_vector.save(status.begin());\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tISC_STATUS tmp[3];\n\t\tprocessUnexpectedException(tmp);\n\t\tstatus_vector.save(tmp);\n\t}\n}\n\nvoid Exception::stuffException(IStatus* status_vector) const noexcept\n{\n\tStaticStatusVector status;\n\tstuffException(status);\n\tfb_utils::setIStatus(status_vector, status.begin());\n}\n\nvoid Exception::processUnexpectedException(ISC_STATUS* vector) noexcept\n{\n\t// do not use stuffException() here to avoid endless loop\n\ttry\n\t{\n\t\tthrow;\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tfb_utils::statusBadAlloc(vector);\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tfb_assert(false);\n\n\t\tfb_utils::statusUnknown(vector);\n\t}\n}\n\n// ********************************* status_exception *******************************\n\nstatus_exception::status_exception() noexcept\n\t: m_status_vector(m_buffer)\n{\n\tfb_utils::init_status(m_status_vector);\n}\n\nstatus_exception::status_exception(const ISC_STATUS *status_vector) noexcept\n\t: m_status_vector(m_buffer)\n{\n\tfb_utils::init_status(m_status_vector);\n\n\tif (status_vector)\n\t{\n\t\tset_status(status_vector);\n\t}\n}\n\nstatus_exception::status_exception(const status_exception&amp; from) noexcept\n\t: m_status_vector(m_buffer)\n{\n\tfb_utils::init_status(m_status_vector);\n\n\tset_status(from.m_status_vector);\n}\n\nvoid status_exception::set_status(const ISC_STATUS *new_vector) noexcept\n{\n\tfb_assert(new_vector != 0);\n\tunsigned len = fb_utils::statusLength(new_vector);\n\n\ttry\n\t{\n\t\tif (len &gt;= FB_NELEM(m_buffer))\n\t\t{\n\t\t\tm_status_vector = FB_NEW_POOL(*getDefaultMemoryPool()) ISC_STATUS[len + 1];\n\t\t}\n\t\tlen = makeDynamicStrings(len, m_status_vector, new_vector);\n\t\tm_status_vector[len] = isc_arg_end;\n\t}\n\tcatch (const Exception&amp;)\n\t{\n\t\tif (m_status_vector != m_buffer)\n\t\t{\n\t\t\tdelete[] m_status_vector;\n\t\t\tm_status_vector = m_buffer;\n\t\t}\n\t\tprocessUnexpectedException(m_buffer);\n\t}\n}\n\nstatus_exception::~status_exception() noexcept\n{\n\tdelete[] findDynamicStrings(fb_utils::statusLength(m_status_vector), m_status_vector);\n\tif (m_status_vector != m_buffer)\n\t{\n\t\tdelete[] m_status_vector;\n\t}\n}\n\nconst char* status_exception::what() const noexcept\n{\n\treturn &quot;Firebird::status_exception&quot;;\n}\n\n[[noreturn]] void status_exception::raise(const ISC_STATUS *status_vector)\n{\n\tthrow status_exception(status_vector);\n}\n\n[[noreturn]] void status_exception::raise(const IStatus* status)\n{\n\tStaticStatusVector status_vector;\n\tstatus_vector.mergeStatus(status);\n\tthrow status_exception(status_vector.begin());\n}\n\n[[noreturn]] void status_exception::raise(const Arg::StatusVector&amp; statusVector)\n{\n\tthrow status_exception(statusVector.value());\n}\n\nvoid status_exception::stuffByException(StaticStatusVector&amp; status) const noexcept\n{\n\ttry\n\t{\n\t\tstatus.assign(m_status_vector, fb_utils::statusLength(m_status_vector) + 1);\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tprocessUnexpectedException(status.makeEmergencyStatus());\n\t}\n}\n\n// ********************************* BadAlloc ****************************\n\n[[noreturn]] void BadAlloc::raise()\n{\n\tthrow BadAlloc();\n}\n\nvoid BadAlloc::stuffByException(StaticStatusVector&amp; status) const noexcept\n{\n\tfb_utils::statusBadAlloc(status.makeEmergencyStatus());\n}\n\nconst char* BadAlloc::what() const noexcept\n{\n\treturn &quot;Firebird::BadAlloc&quot;;\n}\n\n// ********************************* LongJump ***************************\n\n[[noreturn]] void LongJump::raise()\n{\n\tthrow LongJump();\n}\n\nvoid LongJump::stuffByException(StaticStatusVector&amp; status) const noexcept\n{\n\tconst ISC_STATUS sv[] = {isc_arg_gds, isc_random, isc_arg_string,\n\t\t(ISC_STATUS)(IPTR) &quot;Unexpected call to Firebird::LongJump::stuffException()&quot;, isc_arg_end};\n\n\ttry\n\t{\n\t\tstatus.assign(sv, FB_NELEM(sv));\n\t}\n\tcatch (const BadAlloc&amp;)\n\t{\n\t\tprocessUnexpectedException(status.makeEmergencyStatus());\n\t}\n}\n\nconst char* LongJump::what() const noexcept\n{\n\treturn &quot;Firebird::LongJump&quot;;\n}\n\n\n// ********************************* system_error ***************************\n\nsystem_error::system_error(const char* syscall, const char* arg, int error_code) noexcept :\n\tstatus_exception(), errorCode(error_code)\n{\n\tArg::Gds temp(isc_sys_request);\n\ttemp &lt;&lt; Arg::Str(syscall);\n\ttemp &lt;&lt; SYS_ERR(errorCode);\n\tif (arg)\n\t\ttemp &lt;&lt; Arg::Gds(isc_random) &lt;&lt; arg;\n\tset_status(temp.value());\n}\n\n[[noreturn]] void system_error::raise(const char* syscall, int error_code)\n{\n\tthrow system_error(syscall, nullptr, error_code);\n}\n\n[[noreturn]] void system_error::raise(const char* syscall)\n{\n\tthrow system_error(syscall, nullptr, getSystemError());\n}\n\nint system_error::getSystemError() noexcept\n{\n#ifdef WIN_NT\n\treturn GetLastError();\n#else\n\treturn errno;\n#endif\n}\n\n// ********************************* system_call_failed ***************************\n\nsystem_call_failed::system_call_failed(const char* syscall, const char* arg, int error_code) :\n\tsystem_error(syscall, arg, error_code)\n{\n\t// NS: something unexpected has happened. Log the error to log file\n\t// In the future we may consider terminating the process even in PROD_BUILD\n\tgds__log(&quot;Operating system call %s failed. Error code %d&quot;, syscall, error_code);\n#ifdef DEV_BUILD\n\t// raised failed system call exception in DEV_BUILD in 99.99% means\n\t// problems with the code - let&#x27;s create memory dump now\n\tabort();\n#endif\n}\n\n[[noreturn]] void system_call_failed::raise(const char* syscall, int error_code)\n{\n\tthrow system_call_failed(syscall, nullptr, error_code);\n}\n\n[[noreturn]] void system_call_failed::raise(const char* syscall)\n{\n\tthrow system_call_failed(syscall, nullptr, getSystemError());\n}\n\n[[noreturn]] void system_call_failed::raise(const char* syscall, const char* arg, int error_code)\n{\n\tthrow system_call_failed(syscall, arg, error_code);\n}\n\n[[noreturn]] void system_call_failed::raise(const char* syscall, const char* arg)\n{\n\traise(syscall, arg, getSystemError());\n}\n\n// ********************************* fatal_exception *******************************\n\nfatal_exception::fatal_exception(const char* message) noexcept :\n\tstatus_exception()\n{\n\tconst ISC_STATUS temp[] =\n\t{\n\t\tisc_arg_gds,\n\t\tisc_random,\n\t\tisc_arg_string,\n\t\t(ISC_STATUS)(IPTR) message,\n\t\tisc_arg_end\n\t};\n\tset_status(temp);\n}\n\n// Keep in sync with the constructor above, please; &quot;message&quot; becomes 4th element\n// after initialization of status vector in constructor.\nconst char* fatal_exception::what() const noexcept\n{\n\treturn reinterpret_cast&lt;const char*&gt;(value()[3]);\n}\n\n[[noreturn]] void fatal_exception::raise(const char* message)\n{\n\tthrow fatal_exception(message);\n}\n\n[[noreturn]] void fatal_exception::raiseFmt(const char* format, ...)\n{\n\tva_list args;\n\tva_start(args, format);\n\tchar buffer[1024];\n\tvsnprintf(buffer, sizeof(buffer), format, args);\n\tbuffer[sizeof(buffer) - 1] = 0;\n\tva_end(args);\n\tthrow fatal_exception(buffer);\n}\n\n}\t// namespace Firebird\n"}, "/build/src/common/StatusArg.cpp": {"id": "/build/src/common/StatusArg.cpp", "filePath": "src/common/StatusArg.cpp", "content": "/*\n *\tPROGRAM:\t\tFirebird exceptions classes\n *\tMODULE:\t\t\tStatusArg.cpp\n *\tDESCRIPTION:\tBuild status vector with variable number of elements\n *\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Alex Peshkov\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2008 Alex Peshkov &lt;peshkoff at mail.ru&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n *\n *\n */\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/StatusArg.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n\n#include &quot;../common/classes/MetaString.h&quot;\n#include &quot;../common/classes/alloc.h&quot;\n#include &quot;fb_exception.h&quot;\n#include &quot;iberror.h&quot;\n#include &quot;firebird/Interface.h&quot;\n#include &quot;../common/msg_encode.h&quot;\n\n#ifdef WIN_NT\n#include &lt;windows.h&gt;\n#else\n#include &lt;errno.h&gt;\n#endif\n\nnamespace {\n\t// Didn&#x27;t want to bring dyn.h and friends here.\n\tconstexpr int DYN_MSG_FAC = FB_IMPL_MSG_FACILITY_DYN;\n}\n\nnamespace Firebird {\n\nnamespace Arg {\n\nBase::Base(ISC_STATUS k, ISC_STATUS c) :\n\timplementation(FB_NEW_POOL(*getDefaultMemoryPool()) ImplBase(k, c))\n{\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const ISC_STATUS* s) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tfb_assert(s);\n\n\tclear();\n\n\t// special case - empty initialized status vector, no warnings\n\tif (s[0] != isc_arg_gds || s[1] != 0 || s[2] != 0)\n\t\tappend(s);\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const IStatus* s) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tfb_assert(s);\n\n\tclear();\n\n\tif (s-&gt;getState() &amp; IStatus::STATE_ERRORS)\n\t\tappend(s-&gt;getErrors());\n\tif (s-&gt;getState() &amp; IStatus::STATE_WARNINGS)\n\t\tappend(s-&gt;getWarnings());\n}\n\nStatusVector::ImplStatusVector::ImplStatusVector(const Exception&amp; ex) noexcept\n\t: Base::ImplBase(0, 0),\n\t  m_status_vector(*getDefaultMemoryPool()),\n\t  m_strings(*getDefaultMemoryPool())\n{\n\tclear();\n\n\tassign(ex);\n}\n\nStatusVector::StatusVector(ISC_STATUS k, ISC_STATUS c) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(k, c))\n{\n\toperator&lt;&lt;(*(static_cast&lt;Base*&gt;(this)));\n}\n\nStatusVector::StatusVector(const ISC_STATUS* s) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(s))\n{\n}\n\nStatusVector::StatusVector(const IStatus* s) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(s))\n{\n}\n\nStatusVector::StatusVector(const Exception&amp; ex) :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(ex))\n{\n}\n\nStatusVector::StatusVector() :\n\tBase(FB_NEW_POOL(*getDefaultMemoryPool()) ImplStatusVector(0, 0))\n{\n}\n\nvoid StatusVector::ImplStatusVector::clear() noexcept\n{\n\tm_warning = 0;\n\tm_status_vector.clear();\n\tm_status_vector.push(isc_arg_end);\n\tm_strings.erase();\n}\n\nbool StatusVector::ImplStatusVector::compare(const StatusVector&amp; v) const noexcept\n{\n\treturn length() == v.length() &amp;&amp; fb_utils::cmpStatus(length(), value(), v.value());\n}\n\nvoid StatusVector::ImplStatusVector::assign(const StatusVector&amp; v) noexcept\n{\n\tclear();\n\tappend(v);\n}\n\nvoid StatusVector::ImplStatusVector::assign(const Exception&amp; ex) noexcept\n{\n\tclear();\n\tex.stuffException(m_status_vector);\n\tputStrArg(0);\n}\n\nvoid StatusVector::ImplStatusVector::putStrArg(unsigned startWith)\n{\n\tfor (ISC_STATUS* arg = m_status_vector.begin() + startWith; *arg != isc_arg_end; arg += fb_utils::nextArg(*arg))\n\t{\n\t\tif (!fb_utils::isStr(*arg))\n\t\t\tcontinue;\n\n\t\tconst char** ptr = reinterpret_cast&lt;const char**&gt;(&amp;arg[fb_utils::nextArg(*arg) - 1]);\n\t\tunsigned pos = m_strings.length();\n\t\tconst char* oldBase = m_strings.c_str();\n\n\t\tif (*arg == isc_arg_cstring)\n\t\t{\n\t\t\tm_strings.reserve(m_strings.length() + arg[1] + 1);\n\t\t\tm_strings.append(*ptr, arg[1]);\n\t\t\tm_strings.append(1, &#x27;\\0&#x27;);\n\t\t}\n\t\telse\n\t\t\t m_strings.append(*ptr, fb_strlen(*ptr) + 1);\n\n\t\t*ptr = &amp;m_strings[pos];\n\t\tsetStrPointers(oldBase);\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::setStrPointers(const char* oldBase)\n{\n\tconst char* const newBase = m_strings.c_str();\n\tif (newBase == oldBase)\n\t\treturn;\n\n\tconst char* const newEnd = m_strings.end();\n\n\tfor (ISC_STATUS* arg = m_status_vector.begin(); *arg != isc_arg_end; arg += fb_utils::nextArg(*arg))\n\t{\n\t\tif (!fb_utils::isStr(*arg))\n\t\t\tcontinue;\n\n\t\tconst char** ptr = reinterpret_cast&lt;const char**&gt;(&amp;arg[fb_utils::nextArg(*arg) - 1]);\n\t\tif (*ptr &gt;= newBase &amp;&amp; *ptr &lt; newEnd)\n\t\t\tbreak;\n\n\t\t*ptr = &amp;newBase[*ptr - oldBase];\n\t}\n}\n\nvoid StatusVector::ImplStatusVector::append(const StatusVector&amp; v) noexcept\n{\n\tImplStatusVector newVector(getKind(), getCode());\n\n\tif (newVector.appendErrors(this))\n\t{\n\t\tif (newVector.appendErrors(v.implementation))\n\t\t{\n\t\t\tif (newVector.appendWarnings(this))\n\t\t\t\tnewVector.appendWarnings(v.implementation);\n\t\t}\n\t}\n\n\t*this = newVector;\n}\n\nvoid StatusVector::ImplStatusVector::prepend(const StatusVector&amp; v) noexcept\n{\n\tauto errFrom = v.implementation-&gt;value();\n\tauto lenFrom = v.implementation-&gt;firstWarning() ? v.implementation-&gt;firstWarning() : v.implementation-&gt;length();\n\tauto errTo = value();\n\tauto lenTo = firstWarning() ? firstWarning() : length();\n\n\tif (lenFrom &lt; lenTo &amp;&amp; fb_utils::cmpStatus(lenFrom, errFrom, errTo))\n\t\treturn;\t\t\t// already here - ToDo: check warnings\n\n\tImplStatusVector newVector(getKind(), getCode());\n\n\tif (newVector.appendErrors(v.implementation))\n\t{\n\t\tif (newVector.appendErrors(this))\n\t\t{\n\t\t\tif (newVector.appendWarnings(v.implementation))\n\t\t\t\tnewVector.appendWarnings(this);\n\t\t}\n\t}\n\n\t*this = newVector;\n}\n\nStatusVector::ImplStatusVector&amp; StatusVector::ImplStatusVector::operator=(const StatusVector::ImplStatusVector&amp; src)\n{\n\tm_status_vector = src.m_status_vector;\n\tm_warning = src.m_warning;\n\tm_strings = src.m_strings;\n\tsetStrPointers(src.m_strings.c_str());\n\n\treturn *this;\n}\n\nbool StatusVector::ImplStatusVector::appendErrors(const ImplBase* const v) noexcept\n{\n\treturn append(v-&gt;value(), v-&gt;firstWarning() ? v-&gt;firstWarning() : v-&gt;length());\n}\n\nbool StatusVector::ImplStatusVector::appendWarnings(const ImplBase* const v) noexcept\n{\n\tif (! v-&gt;firstWarning())\n\t\treturn true;\n\treturn append(v-&gt;value() + v-&gt;firstWarning(), v-&gt;length() - v-&gt;firstWarning());\n}\n\nbool StatusVector::ImplStatusVector::append(const ISC_STATUS* const from, const unsigned int count) noexcept\n{\n\t// CVC: I didn&#x27;t expect count to be zero but it&#x27;s, in some calls\n\tfb_assert(count &gt;= 0);\n\tif (!count)\n\t\treturn true; // not sure it&#x27;s the best option here\n\n\tunsigned lenBefore = length();\n\tISC_STATUS* s = m_status_vector.getBuffer(lenBefore + count + 1);\n\tunsigned int copied =\n\t\tfb_utils::copyStatus(&amp;s[lenBefore], count + 1, from, count);\n\tif (copied &lt; count)\n\t\tm_st
