xcept\n\t\t: decExtFlag(exc),\n\t\t  roundingMode(DEC_ROUND_HALF_UP)\n\t{}\n\n\tstatic const DecimalStatus DEFAULT;\n\n\tUSHORT decExtFlag, roundingMode;\n\n\tstring getTxtRound();\n\tstring getTxtTraps();\n};\n\nstruct NumericBinding\n{\n\tenum Bind\n\t{\n\t\tNUM_NATIVE,\n\t\tNUM_TEXT,\n\t\tNUM_DOUBLE,\n\t\tNUM_INT64\n\t};\n\n\tNumericBinding() noexcept\n\t\t: bind(NUM_NATIVE),\n\t\t  numScale(0)\n\t{}\n\n\tNumericBinding(Bind aBind, SCHAR aNumScale = 0) noexcept\n\t\t: bind(aBind),\n\t\t  numScale(aNumScale)\n\t{}\n\n\tstatic const NumericBinding DEFAULT;\n\tstatic inline constexpr SCHAR MAX_SCALE = 18;\n\n\tBind bind;\n\tSCHAR numScale;\n};\n\n\nclass Int128;\n\nclass Decimal64\n{\n\tfriend class Decimal128;\n\npublic:\n#if SIZEOF_LONG &lt; 8\n\tDecimal64 set(int value, DecimalStatus decSt, int scale);\n#endif\n\tDecimal64 set(SLONG value, DecimalStatus decSt, int scale);\n\tDecimal64 set(SINT64 value, DecimalStatus decSt, int scale);\n\tDecimal64 set(const char* value, DecimalStatus decSt);\n\tDecimal64 set(double value, DecimalStatus decSt);\n\tDecimal64 set(Int128 value, DecimalStatus decSt, int scale);\n\n\tUCHAR* getBytes();\n\tDecimal64 abs() const;\n\tDecimal64 ceil(DecimalStatus decSt) const;\n\tDecimal64 floor(DecimalStatus decSt) const;\n\tDecimal64 neg() const;\n\n\tvoid toString(DecimalStatus decSt, unsigned length, char* to) const;\n\tvoid toString(string&amp; to) const;\n\n\tint compare(DecimalStatus decSt, Decimal64 tgt) const;\n\tbool isInf() const;\n\tbool isNan() const;\n\tint sign() const;\n\n\tstatic constexpr ULONG getKeyLength() noexcept\n\t{\n\t\treturn sizeof(Decimal64) + sizeof(ULONG);\n\t}\n\n\tvoid makeKey(ULONG* key) const;\n\tvoid grabKey(ULONG* key);\n\n\tDecimal64 quantize(DecimalStatus decSt, Decimal64 op2) const;\n\tDecimal64 normalize(DecimalStatus decSt) const;\n\tshort totalOrder(Decimal64 op2) const;\n\tshort decCompare(Decimal64 op2) const;\n\n#ifdef DEV_BUILD\n\tint show();\n#endif\n\nprivate:\n\tvoid setScale(DecimalStatus decSt, int scale);\n\n\tdecDouble dec;\n};\n\nclass Decimal128\n{\n\tfriend class Decimal64;\n\npublic:\n\tDecimal128 set(Decimal64 d64);\n#if SIZEOF_LONG &lt; 8\n\tDecimal128 set(int value, DecimalStatus decSt, int scale);\n#endif\n\tDecimal128 set(SLONG value, DecimalStatus decSt, int scale);\n\tDecimal128 set(SINT64 value, DecimalStatus decSt, int scale);\n\tDecimal128 set(const char* value, DecimalStatus decSt);\n\tDecimal128 set(double value, DecimalStatus decSt);\n\tDecimal128 set(Int128 value, DecimalStatus decSt, int scale);\n\n\tDecimal128 operator=(Decimal64 d64);\n\n\tvoid toString(DecimalStatus decSt, unsigned length, char* to) const;\n\tvoid toString(string&amp; to) const;\n\tint toInteger(DecimalStatus decSt, int scale) const;\n\tSINT64 toInt64(DecimalStatus decSt, int scale) const;\n\tDecimal128 ceil(DecimalStatus decSt) const;\n\tDecimal128 floor(DecimalStatus decSt) const;\n\tDecimal128 abs() const;\n\tDecimal128 neg() const;\n\tDecimal128 add(DecimalStatus decSt, Decimal128 op2) const;\n\tDecimal128 sub(DecimalStatus decSt, Decimal128 op2) const;\n\tDecimal128 mul(DecimalStatus decSt, Decimal128 op2) const;\n\tDecimal128 div(DecimalStatus decSt, Decimal128 op2) const;\n\tDecimal128 fma(DecimalStatus decSt, Decimal128 op2, Decimal128 op3) const;\n\n\tDecimal128 sqrt(DecimalStatus decSt) const;\n\tDecimal128 pow(DecimalStatus decSt, Decimal128 op2) const;\n\tDecimal128 ln(DecimalStatus decSt) const;\n\tDecimal128 log10(DecimalStatus decSt) const;\n\n\tDecimal128 quantize(DecimalStatus decSt, Decimal128 op2) const;\n\tDecimal128 normalize(DecimalStatus decSt) const;\n\tshort totalOrder(Decimal128 op2) const;\n\tshort decCompare(Decimal128 op2) const;\n\n\tdouble toDouble(DecimalStatus decSt) const;\n\tDecimal64 toDecimal64(DecimalStatus decSt) const;\n\n\tUCHAR* getBytes();\n\tint compare(DecimalStatus decSt, Decimal128 tgt) const;\n\n\tvoid setScale(DecimalStatus decSt, int scale);\n\n\tbool isInf() const;\n\tbool isNan() const;\n\tint sign() const;\n\n\tstatic constexpr ULONG getKeyLength() noexcept\n\t{\n\t\treturn sizeof(Decimal128) + sizeof(ULONG);\n\t}\n\n\tvoid makeKey(ULONG* key) const;\n\tvoid grabKey(ULONG* key);\n\n\tstatic constexpr ULONG getIndexKeyLength() noexcept\n\t{\n\t\treturn 17;\n\t}\n\n\tULONG makeIndexKey(vary* buf);\n\n\tDecimal128 modf(DecimalStatus decSt, Decimal128* ipart) const;\n\n#ifdef DEV_BUILD\n\tint show();\n#endif\n\n\tstruct BCD\n\t{\n\t\tint sign, exp;\n\t\tunsigned char bcd[DECQUAD_Pmax];\n\t};\n\n\tvoid getBcd(BCD* bcd) const;\n\n\tstatic ULONG makeBcdKey(vary* buf, unsigned char *coeff, int sign, int exp, const int bias, const unsigned pMax);\n\nprivate:\n\tdecQuad dec;\n};\n\nclass CDecimal128 : public Decimal128\n{\npublic:\n\tCDecimal128(double value, DecimalStatus decSt)\n\t{\n\t\tset(value, decSt);\n\t}\n\n\tCDecimal128(SINT64 value, DecimalStatus decSt)\n\t{\n\t\tset(value, decSt, 0);\n\t}\n\n\tCDecimal128(int value)\n\t{\n\t\tset(value, DecimalStatus(0), 0);\n\t}\n\n\tCDecimal128(const char* value, DecimalStatus decSt)\n\t{\n\t\tset(value, decSt);\n\t}\n};\n\nstatic_assert(sizeof(Decimal64) % sizeof(ULONG) == 0, &quot;Decimal64 size mismatch&quot;);\nstatic_assert(sizeof(Decimal128) % sizeof(ULONG) == 0, &quot;Decimal128 size mismatch&quot;);\n\nstatic inline constexpr size_t MAX_DEC_LONGS = MAX(sizeof(Decimal64), sizeof(Decimal128)) &gt;&gt; SHIFTLONG;\nstatic inline constexpr size_t MAX_DEC_KEY_LONGS = MAX_DEC_LONGS + 1; // key is one longword bigger\n\n} // namespace Firebird\n\n\n#endif // FB_DECIMAL_FLOAT\n"}, "/build/src/common/classes/Uuid.h": {"id": "/build/src/common/classes/Uuid.h", "filePath": "src/common/classes/Uuid.h", "content": "/*\n *  The contents of this file are subject to the Initial\n *  Developer&#x27;s Public License Version 1.0 (the &quot;License&quot;);\n *  you may not use this file except in compliance with the\n *  License. You may obtain a copy of the License at\n *  http://www.ibphoenix.com/main.nfs?a=ibphoenix&amp;page=ibp_idpl.\n *\n *  Software distributed under the License is distributed AS IS,\n *  WITHOUT WARRANTY OF ANY KIND, either express or implied.\n *  See the License for the specific language governing rights\n *  and limitations under the License.\n *\n *  The Original Code was created by Adriano dos Santos Fernandes\n *  for the Firebird Open Source RDBMS project.\n *\n *  Copyright (c) 2024 Adriano dos Santos Fernandes &lt;adrianosf@uol.com.br&gt;\n *  and all contributors signed below.\n *\n *  All Rights Reserved.\n *  Contributor(s): ______________________________________.\n */\n\n#ifndef CLASSES_UUID_H\n#define CLASSES_UUID_H\n\n#include &quot;firebird.h&quot;\n#include &quot;../common/gdsassert.h&quot;\n#include &quot;../common/os/guid.h&quot;\n#include &lt;algorithm&gt;\n#include &lt;array&gt;\n#include &lt;chrono&gt;\n#include &lt;cstddef&gt;\n#include &lt;cstdint&gt;\n#include &lt;cstdio&gt;\n#include &lt;random&gt;\n\nnamespace Firebird\n{\n\nclass Uuid\n{\nprivate:\n\texplicit Uuid(unsigned version)\n\t{\n\t\tswitch (version)\n\t\t{\n\t\t\tcase 4:\n\t\t\t\tgenerateV4();\n\t\t\t\tbreak;\n\n\t\t\tcase 7:\n\t\t\t\tgenerateV7();\n\t\t\t\tbreak;\n\n\t\t\tdefault:\n\t\t\t\tfb_assert(false);\n\t\t}\n\t}\n\npublic:\n\tstatic Uuid generate(unsigned version)\n\t{\n\t\treturn Uuid(version);\n\t}\n\npublic:\n\tstd::size_t extractBytes(std::uint8_t* buffer, std::size_t bufferSize) const\n\t{\n\t\tfb_assert(bufferSize &gt;= bytes.size());\n\t\tstd::copy(bytes.begin(), bytes.end(), buffer);\n\t\treturn bytes.size();\n\t}\n\n\tstd::size_t toString(char* buffer, std::size_t bufferSize) const\n\t{\n\t\tfb_assert(bufferSize &gt;= STR_LEN);\n\n\t\treturn snprintf(buffer, bufferSize, STR_FORMAT,\n\t\t\tbytes[0], bytes[1], bytes[2], bytes[3],\n\t\t\tbytes[4], bytes[5],\n\t\t\tbytes[6], bytes[7],\n\t\t\tbytes[8], bytes[9],\n\t\t\tbytes[10], bytes[11], bytes[12], bytes[13], bytes[14], bytes[15]);\n\t}\n\nprivate:\n\tvoid generateV4()\n\t{\n\t\tGenerateRandomBytes(bytes.data(), static_cast&lt;FB_SIZE_T&gt;(bytes.size()));\n\n\t\t// version and variant\n\t\tbytes[6] = (bytes[6] &amp; 0x0F) | 0x40;\n\t\tbytes[8] = (bytes[8] &amp; 0x3F) | 0x80;\n\t}\n\n\tvoid generateV7()\n\t{\n\t\tGenerateRandomBytes(bytes.data() + 6, static_cast&lt;FB_SIZE_T&gt;(bytes.size()) - 6);\n\n\t\t// current timestamp in ms\n\t\tconst auto now = std::chrono::system_clock::now();\n\t\tconst auto millis = std::chrono::duration_cast&lt;std::chrono::milliseconds&gt;(now.time_since_epoch()).count();\n\n\t\t// timestamp\n\t\tbytes[0] = (millis &gt;&gt; 40) &amp; 0xFF;\n\t\tbytes[1] = (millis &gt;&gt; 32) &amp; 0xFF;\n\t\tbytes[2] = (millis &gt;&gt; 24) &amp; 0xFF;\n\t\tbytes[3] = (millis &gt;&gt; 16) &amp; 0xFF;\n\t\tbytes[4] = (millis &gt;&gt; 8) &amp; 0xFF;\n\t\tbytes[5] = millis &amp; 0xFF;\n\n\t\t// version and variant\n\t\tbytes[6] = (bytes[6] &amp; 0x0F) | 0x70;\n\t\tbytes[8] = (bytes[8] &amp; 0x3F) | 0x80;\n\t}\n\npublic:\n\tstatic constexpr std::size_t BYTE_LEN = 16;\n\tstatic constexpr std::size_t STR_LEN = 36;\n\tstatic constexpr const char* STR_FORMAT =\n\t\t&quot;%02hhX%02hhX%02hhX%02hhX-%02hhX%02hhX-%02hhX%02hhX-%02hhX%02hhX-%02hhX%02hhX%02hhX%02hhX%02hhX%02hhX&quot;;\n\nprivate:\n\tstd::array&lt;uint8_t, BYTE_LEN&gt; bytes;\n};\n\n}\t// namespace Firebird\n\n#endif\t// CLASSES_UUID_H\n"}, "/build/src/jrd/ods.h": {"id": "/build/src/jrd/ods.h", "filePath": "src/jrd/ods.h", "content": "/*\n *\tPROGRAM:\tJRD Access Method\n *\tMODULE:\t\tods.h\n *\tDESCRIPTION:\tOn disk structure definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * 2000.11.29 Patrick J. P. Griffin: fixed bug SF #116733\n *\tAdd typedef struct gpg to properly document the layout of the generator page\n * 2002.08.26 Dmitry Yemanov: minor ODS change (new indices on system tables)\n *\n * 2002.10.29 Sean Leyne - Removed obsolete &quot;Netware&quot; port\n *\n * 2002.10.30 Sean Leyne - Removed support for obsolete &quot;PC_PLATFORM&quot; define\n *\n */\n\n#ifndef JRD_ODS_H\n#define JRD_ODS_H\n\n#include &quot;../jrd/RecordNumber.h&quot;\n#include &quot;../common/classes/fb_string.h&quot;\n#include &quot;../common/classes/Uuid.h&quot;\n\n// This macro enables the ability of the engine to connect to databases\n// from ODS 8 up to the latest.  If this macro is undefined, the engine\n// only opens a database of the current ODS major version.\n\n//#define ODS_8_TO_CURRENT\n\n/**********************************************************************\n**\n** NOTE:\n**\n**   ODS 5 was shipped with version 3.3 but no longer supported\n**   ODS 6 and ODS 7 never went out the door\n**   ODS 8 was shipped with version 4.0\n**   ODS 9 was going to be shipped with version 4.5 but never was released,\n**         thus it became v5.0&#x27;s ODS.\n**   ODS 10 was shipped with IB version 6.0\n**   Here the Firebird history begins:\n**   ODS 10.0 is for FB1.0 and ODS 10.1 is for FB1.5.\n**   ODS 11.0 is for FB2.0, ODS 11.1 is for FB2.1 and ODS 11.2 is for FB2.5.\n**   ODS 12.0 is for FB3.\n**   ODS 13.0 is for FB4, ODS 13.1 is for FB5.\n**   ODS 14.0 is for FB6.\n**\n***********************************************************************/\n\n// ODS major version -- major versions are not compatible\n\n//const USHORT ODS_VERSION6\t= 6;\t\t// on-disk structure as of v3.0\n//const USHORT ODS_VERSION7\t= 7;\t\t// new on disk structure for fixing index bug\ninline constexpr USHORT ODS_VERSION8\t= 8;\t\t// new btree structure to support pc semantics\ninline constexpr USHORT ODS_VERSION9\t= 9;\t\t// btree leaf pages are always propagated up\ninline constexpr USHORT ODS_VERSION10\t= 10;\t\t// V6.0 features. SQL delimited idetifier,\n\t\t\t\t\t\t\t\t\t\t\t\t\t// SQLDATE, and 64-bit exact numeric type\ninline constexpr USHORT ODS_VERSION11\t= 11;\t\t// Firebird 2.x features\ninline constexpr USHORT ODS_VERSION12\t= 12;\t\t// Firebird 3.x features\ninline constexpr USHORT ODS_VERSION13\t= 13;\t\t// Firebird 4.x features\ninline constexpr USHORT ODS_VERSION14\t= 14;\t\t// Firebird 6.x features\n\n// ODS minor version -- minor versions ARE compatible, but may be\n// increasingly functional.  Add new minor versions, but leave previous\n// names intact\n\n// Minor versions for ODS 6\n\n//const USHORT ODS_GRANT6\t\t= 1;\t// adds fields for field level grant\n//const USHORT ODS_INTEGRITY6\t= 2;\t// adds fields for referential integrity\n//const USHORT ODS_FUNCTIONS6\t= 3;\t// modifies type of RDB$MODULE_NAME field\n//const USHORT ODS_SQLNAMES6\t= 4;\t// permits SQL security on &gt; 27 SCHAR names\n//const USHORT ODS_CURRENT6\t\t= 4;\n\n// Minor versions for ODS 7\n\n//const USHORT ODS_FUNCTIONS7\t= 1;\t// modifies type of RDB$MODULE_NAME field\n//const USHORT ODS_SQLNAMES7\t= 2;\t// permits SQL security on &gt; 27 SCHAR names\n//const USHORT ODS_CURRENT7\t\t= 2;\n\n// Minor versions for ODS 8\n\n//const USHORT ODS_CASCADE_RI8\t= 1;\t// permits cascading referential integrity\n\t\t\t\t\t\t\t\t\t\t// ODS 8.2 is the same as ODS 8.1\n//const USHORT ODS_CURRENT8\t\t= 2;\n\n// Minor versions for ODS 9\n\n//const USHORT ODS_CURRENT_9_0\t= 0;\t// SQL roles &amp; Index garbage collection\n//const USHORT ODS_SYSINDEX9\t= 1;\t// Index on RDB$CHECK_CONSTRAINTS (RDB$TRIGGER_NAME)\n//const USHORT ODS_CURRENT9\t\t= 1;\n\n// Minor versions for ODS 10\n\n//const USHORT ODS_CURRENT10_0\t= 0;\t// V6.0 features. SQL delimited identifier,\n\t\t\t\t\t\t\t\t\t\t// SQLDATE, and 64-bit exact numeric type\n//const USHORT ODS_SYSINDEX10\t= 1;\t// New system indices\n//const USHORT ODS_CURRENT10\t= 1;\n\n// Minor versions for ODS 11\n\n//const USHORT ODS_CURRENT11_0\t= 0;\t// Firebird 2.0 features\n//const USHORT ODS_CURRENT11_1\t= 1;\t// Firebird 2.1 features\n//const USHORT ODS_CURRENT11_2\t= 2;\t// Firebird 2.5 features\n//const USHORT ODS_CURRENT11\t= 2;\n\n// Minor versions for ODS 12\n\ninline constexpr USHORT ODS_CURRENT12_0\t= 0;\t// Firebird 3.0 features\ninline constexpr USHORT ODS_CURRENT12\t= 0;\n\n// Minor versions for ODS 13\n\ninline constexpr USHORT ODS_CURRENT13_0\t= 0;\t// Firebird 4.0 features\ninline constexpr USHORT ODS_CURRENT13_1\t= 1;\t// Firebird 5.0 features\ninline constexpr USHORT ODS_CURRENT13\t= 1;\n\n// Minor versions for ODS 14\n\ninline constexpr USHORT ODS_CURRENT14_0\t= 0;\t// Firebird 6.0 features\ninline constexpr USHORT ODS_CURRENT14\t= 0;\n\n// useful ODS macros. These are currently used to flag the version of the\n// system triggers and system indices in ini.e\n\ninline constexpr USHORT ENCODE_ODS(USHORT major, USHORT minor)\n{\n\treturn ((major &lt;&lt; 4) | minor);\n}\n\ninline constexpr USHORT ODS_8_0\t\t= ENCODE_ODS(ODS_VERSION8, 0);\ninline constexpr USHORT ODS_8_1\t\t= ENCODE_ODS(ODS_VERSION8, 1);\ninline constexpr USHORT ODS_9_0\t\t= ENCODE_ODS(ODS_VERSION9, 0);\ninline constexpr USHORT ODS_9_1\t\t= ENCODE_ODS(ODS_VERSION9, 1);\ninline constexpr USHORT ODS_10_0\t= ENCODE_ODS(ODS_VERSION10, 0);\ninline constexpr USHORT ODS_10_1\t= ENCODE_ODS(ODS_VERSION10, 1);\ninline constexpr USHORT ODS_11_0\t= ENCODE_ODS(ODS_VERSION11, 0);\ninline constexpr USHORT ODS_11_1\t= ENCODE_ODS(ODS_VERSION11, 1);\ninline constexpr USHORT ODS_11_2\t= ENCODE_ODS(ODS_VERSION11, 2);\ninline constexpr USHORT ODS_12_0\t= ENCODE_ODS(ODS_VERSION12, 0);\ninline constexpr USHORT ODS_13_0\t= ENCODE_ODS(ODS_VERSION13, 0);\ninline constexpr USHORT ODS_13_1\t= ENCODE_ODS(ODS_VERSION13, 1);\ninline constexpr USHORT ODS_14_0\t= ENCODE_ODS(ODS_VERSION14, 0);\n\ninline constexpr USHORT ODS_FIREBIRD_FLAG = 0x8000;\n\n// Decode ODS version to Major and Minor parts. The 4 LSB&#x27;s are minor and\n// the next 11 bits are major version number. The highest significant bit\n// is the Firebird database flag.\ninline constexpr USHORT DECODE_ODS_MAJOR(USHORT ods_version)\n{\n\treturn ((ods_version &amp; 0x7FF0) &gt;&gt; 4);\n}\n\ninline constexpr USHORT DECODE_ODS_MINOR(USHORT ods_version)\n{\n\treturn (ods_version &amp; 0x000F);\n}\n\n// Set current ODS major and minor version\n\ninline constexpr USHORT ODS_VERSION = ODS_VERSION14;\t\t// Current ODS major version -- always\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// the highest.\n\ninline constexpr USHORT ODS_RELEASED = ODS_CURRENT14_0;\t\t// The lowest stable minor version\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// number for this ODS_VERSION!\n\ninline constexpr USHORT ODS_CURRENT = ODS_CURRENT14;\t\t// The highest defined minor version\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// number for this ODS_VERSION!\n\ninline constexpr USHORT ODS_CURRENT_VERSION = ODS_14_0;\t\t// Current ODS version in use which includes\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t// both major and minor ODS versions!\n\n\n//const USHORT USER_REL_INIT_ID_ODS8\t= 31;\t// ODS &lt; 9 ( &lt;= 8.2)\ninline constexpr USHORT USER_DEF_REL_INIT_ID = 128;\t// ODS &gt;= 9\n\n\n// Page types\n\ninline constexpr SCHAR pag_undefined\t\t= 0;\ninline constexpr SCHAR pag_header\t\t\t= 1;\t\t// Database header page\ninline constexpr SCHAR pag_pages\t\t\t= 2;\t\t// Page inventory page\ninline constexpr SCHAR pag_transactions\t\t= 3;\t\t// Transaction inventory page\ninline constexpr SCHAR pag_pointer\t\t\t= 4;\t\t// Pointer page\ninline constexpr SCHAR pag_data\t\t\t\t= 5;\t\t// Data page\ninline constexpr SCHAR pag_root\t\t\t\t= 6;\t\t// Index root page\ninline constexpr SCHAR pag_index\t\t\t= 7;\t\t// Index (B-tree) page\ninline constexpr SCHAR pag_blob\t\t\t\t= 8;\t\t// Blob data page\ninline constexpr SCHAR pag_ids\t\t\t\t= 9;\t\t// Gen-ids\ninline constexpr SCHAR pag_scns\t\t\t\t= 10;\t\t// SCN&#x27;s inventory page\ninline constexpr SCHAR pag_max\t\t\t\t= 10;\t\t// Max page type\n\n// Pre-defined page numbers\n\ninline constexpr ULONG HEADER_PAGE\t\t= 0;\ninline constexpr ULONG FIRST_PIP_PAGE\t= 1;\ninline constexpr ULONG FIRST_SCN_PAGE\t= 2;\n\n// Page size limits\n\ninline constexpr USHORT PAGE_SIZE_BASE\t\t= 1024;\t\t// Minimal page size ever supported,\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t// common divisor for valid page sizes\n\ninline constexpr USHORT MIN_PAGE_SIZE\t\t= 8192;\ninline constexpr USHORT MAX_PAGE_SIZE\t\t= 32768;\n\ninline constexpr USHORT DEFAULT_PAGE_SIZE\t= 8192;\n\nnamespace Ods {\n\n// Crypt page by type\n\ninline constexpr bool pag_crypt_page[pag_max + 1] = {false, false, false,\n\t\t\t\t\t\t\t\t\t\t\t\t\t false, false, true,\t// data\n\t\t\t\t\t\t\t\t\t\t\t\t\t false, true, true,\t\t// index, blob\n\t\t\t\t\t\t\t\t\t\t\t\t\t true, false};\t\t\t// generators\n\n// pag_flags for any page type\n\ninline constexpr UCHAR crypted_page\t= 0x80;\t\t// Page on disk is encrypted (in memory cache it always isn&#x27;t)\n\n// Basic page header\n\nstruct pag\n{\n\tUCHAR pag_type;\n\tUCHAR pag_flags;\n\tUSHORT pag_reserved;\t\t// not used but anyway present because of alignment rules\n\tULONG pag_generation;\n\tULONG pag_scn;\n\tULONG pag_pageno;\t\t\t// for validation\n};\n\nstatic_assert(sizeof(struct pag) == 16, &quot;struct pag size mismatch&quot;);\nstatic_assert(offsetof(struct pag, pag_type) == 0, &quot;pag_type offset mismatch&quot;);\nstatic_assert(offsetof(struct pag, pag_flags) == 1, &quot;pag_flags offset mismatch&quot;);\nstatic_assert(offsetof(struct pag, pag_reserved) == 2, &quot;pag_reserved offset mismatch&quot;);\nstatic_assert(offsetof(struct pag, pag_generation) == 4, &quot;pag_generation offset mismatch&quot;);\nstatic_assert(offsetof(struct pag, pag_scn) == 8, &quot;pag_scn offset mismatch&quot;);\nstatic_assert(offsetof(struct pag, pag_pageno) == 12, &quot;pag_pageno offset mismatch&quot;);\n\ntypedef pag* PAG;\n\n\n// Blob page\n\nstruct blob_page\n{\n\tpag blp_header;\n\tULONG blp_lead_page;\t\t// First page of blob (for redundancy only)\n\tULONG blp_sequence;\t\t\t// Sequence within blob\n\tUSHORT blp_length;\t\t\t// Bytes on page\n\tUSHORT blp_pad;\t\t\t\t// Unused\n\tULONG blp_page[1];\t\t\t// Page number if level 1\n};\n\nstatic_assert(sizeof(struct blob_page) == 32, &quot;struct blob_page size mismatch&quot;);\nstatic_assert(offsetof(struct blob_page, blp_header) == 0, &quot;blp_header offset mismatch&quot;);\nstatic_assert(offsetof(struct blob_page, blp_lead_page) == 16, &quot;blp_lead_page offset mismatch&quot;);\nstatic_assert(offsetof(struct blob_page, blp_sequence) == 20, &quot;blp_sequence offset mismatch&quot;);\nstatic_assert(offsetof(struct blob_page, blp_length) == 24, &quot;blp_length offset mismatch&quot;);\nstatic_assert(offsetof(struct blob_page, blp_pad) == 26, &quot;blp_pag offset mismatch&quot;);\nstatic_assert(offsetof(struct blob_page, blp_page) == 28, &quot;blp_page offset mismatch&quot;);\n\n#define BLP_SIZE static_cast&lt;FB_SIZE_T&gt;(offsetof(Ods::blob_page, blp_page[0]))\n\n// pag_flags\ninline constexpr UCHAR blp_pointers\t= 0x01;\t\t// Blob pointer page, not data page\n\n\n// B-tree page (&quot;bucket&quot;)\nstruct btree_page\n{\n\tpag btr_header;\n\tULONG btr_sibling;\t\t\t// right sibling page\n\tULONG btr_left_sibling;\t\t// left sibling page\n\tSLONG btr_prefix_total;\t\t// sum of all prefixes on page\n\tUSHORT btr_relation;\t\t// relation id for consistency\n\tUSHORT btr_length;\t\t\t// length of data in bucket\n\tUCHAR btr_id;\t\t\t\t// index id for consistency\n\tUCHAR btr_level;\t\t\t// index level (0 = leaf)\n\tUSHORT btr_jump_interval;\t// interval between jump nodes\n\tUSHORT btr_jump_size;\t\t// size of the jump table\n\tUCHAR btr_jump_count;\t\t// number of jump nodes\n\tUCHAR btr_nodes[1];\n};\n\nstatic_assert(sizeof(struct btree_page) == 40, &quot;struct btree_page size mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_header) == 0, &quot;btr_header offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_sibling) == 16, &quot;btr_sibling offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_left_sibling) == 20, &quot;btr_left_sibling offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_prefix_total) == 24, &quot;btr_prefix_total offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_relation) == 28, &quot;btr_relation offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_length) == 30, &quot;btr_length offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_id) == 32, &quot;btr_id offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_level) == 33, &quot;btr_level offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_jump_interval) == 34, &quot;btr_jump_interval offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_jump_size) == 36, &quot;btr_jump_size offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_jump_count) == 38, &quot;btr_jump_count offset mismatch&quot;);\nstatic_assert(offsetof(struct btree_page, btr_nodes) == 39, &quot;btr_nodes offset mismatch&quot;);\n\n// NS 2014-07-17: You can define this thing as &quot;const FB_SIZE_t ...&quot;, and it works\n// for standards-conforming compilers (recent GCC and MSVC will do)\n// But older versions might have a problem, so I leave #define in place for now\n#define BTR_SIZE static_cast&lt;FB_SIZE_T&gt;(offsetof(Ods::btree_page, btr_nodes[0]))\n\n// pag_flags\n//const UCHAR btr_dont_gc\t\t\t= 1;\t// Don&#x27;t garbage-collect this page\n//const UCHAR btr_descending\t\t= 2;\t// Page/bucket is part of a descending index\n//const UCHAR btr_jump_info\t\t\t= 16;\t// AB: 2003-index-structure enhancement\ninline constexpr UCHAR btr_released\t\t\t= 32;\t// Page was released from b-tree\n\n// Data Page\n\nstruct data_page\n{\n\tpag dpg_header;\n\tULONG dpg_sequence;\t\t\t// Sequence number in relation\n\tUSHORT dpg_relation;\t\t// Relation id\n\tUSHORT dpg_count;\t\t\t// Number of record segments on page\n\tstruct dpg_repeat\n\t{\n\t\tUSHORT dpg_offset;\t\t// Offset of record fragment\n\t\tUSHORT dpg_length;\t\t// Length of record fragment\n\t} dpg_rpt[1];\n};\n\nstatic_assert(sizeof(struct data_page) == 28, &quot;struct data_page size mismatch&quot;);\nstatic_assert(offsetof(struct data_page, dpg_header) == 0, &quot;dpg_header offset mismatch&quot;);\nstatic_assert(offsetof(struct data_page, dpg_sequence) == 16, &quot;gpg_sequence offset mismatch&quot;);\nstatic_assert(offsetof(struct data_page, dpg_relation) == 20, &quot;dpg_relation offset mismatch&quot;);\nstatic_assert(offsetof(struct data_page, dpg_count) == 22, &quot;dpg_count offset mismatch&quot;);\nstatic_assert(offsetof(struct data_page, dpg_rpt) == 24, &quot;dpg_rpt offset mismatch&quot;);\n\nstatic_assert(sizeof(struct data_page::dpg_repeat) == 4, &quot;struct dpg_repeat size mismatch&quot;);\nstatic_assert(offsetof(struct data_page::dpg_repeat, dpg_offset) == 0, &quot;dpg_offset offset mismatch&quot;);\nstatic_assert(offsetof(struct data_page::dpg_repeat, dpg_length) == 2, &quot;dpg_length offset mismatch&quot;);\n\n#define DPG_SIZE\t(sizeof (Ods::data_page) - sizeof (Ods::data_page::dpg_repeat))\n\n// pag_flags\ninline constexpr UCHAR dpg_orphan\t\t= 0x01;\t\t// Data page is NOT in pointer page\ninline constexpr UCHAR dpg_full\t\t\t= 0x02;\t\t// Pointer page is marked FULL\ninline constexpr UCHAR dpg_large\t\t= 0x04;\t\t// Large object is on page\ninline constexpr UCHAR dpg_swept\t\t= 0x08;\t\t// Sweep has nothing to do on this page\ninline constexpr UCHAR dpg_secondary\t= 0x10;\t\t// Primary record versions not stored on this page\n\t\t\t\t\t\t\t\t\t\t\t\t\t// Set in dpm.epp&#x27;s extend_relation() but never tested.\n\n\n// Index root page\n\nstruct index_root_page\n{\n\tpag irt_header;\n\tUSHORT irt_relation;\t\t\t// relation id (for consistency)\n\tUSHORT irt_count;\t\t\t\t// number of indices\n\tULONG irt_dummy;\t\t\t\t// so far used as a padding to ensure the same\n\t\t\t\t\t\t\t\t\t// alignment between 32-bit and 64-bit builds\n\tstruct irt_repeat\n\t{\n\t\tfriend struct index_root_page;\t// to allow offset check for private members\n\n\tprivate:\n\t\tFB_UINT64 irt_transaction;\t\t// transaction in progress\n\t\tULONG irt_page_num;\t\t\t\t// page number\n\t\tULONG irt_page_space_id;\t\t// page space\n\tpublic:\n\t\tUSHORT irt_desc;\t\t\t\t// offset to key descriptions\n\t\tUSHORT irt_flags;\t\t\t\t// index flags\n\t\tUCHAR irt_state;\t\t\t\t// index state\n\t\tUCHAR irt_keys;\t\t\t\t\t// number of keys in index\n\tpublic:\n\t\tUSHORT irt_dummy;\t\t\t\t// alignment to 8-byte boundary\n\n\tpublic:\n\t\tTraNumber inProgress() const;\n\t\tvoid setInProgress(TraNumber traNumber);\n\n\t\tULONG getRoot() const;\n\t\tvoid setRoot(ULONG rootPage);\n\n\t\tbool isUsed() const;\n\t\tvoid setEmpty();\n\t} irt_rpt[1];\n\n\tstatic_assert(sizeof(struct irt_repeat) == 24, &quot;struct irt_repeat size mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_transaction) == 0, &quot;irt_transaction offset mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_page_num) == 8, &quot;irt_root offset mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_page_space_id) == 12, &quot;irt_root offset mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_desc) == 16, &quot;irt_desc offset mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_flags) == 18, &quot;irt_flags offset mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_state) == 20, &quot;irt_state offset mismatch&quot;);\n\tstatic_assert(offsetof(struct irt_repeat, irt_keys) == 21, &quot;irt_keys offset mismatch&quot;);\n};\n\nstatic_assert(sizeof(struct inde ence) == 16, &quot;scn_sequence offset mismatch&quot;);\nstatic_assert(offsetof(struct scns_page, scn_pages) == 20, &quot;scn_pages offset mismatch&quot;);\n\n\n// Important note !\n// pagesPerPIP value must be multiply of pagesPerSCN value !\n//\n// Nth PIP page number is : pagesPerPIP * N - 1\n// Nth SCN page number is : pagesPerSCN * N\n// Numbers of first PIP and SCN pages (N = 0) is fixed and not interesting here.\n//\n// Generally speaking it is possible that exists N and M that\n//   pagesPerSCN * N == pagesPerPIP * M - 1,\n// i.e. we can&#x27;t guarantee that some SCN page will not have the same number as\n// some PIP page. We can implement checks for this case and put corresponding\n// SCN page at the next position but it will complicate code a lot.\n//\n// The much more easy solution is to make pagesPerPIP multiply of pagesPerSCN.\n// The fact that page_inv_page::pip_bits array is LONG aligned and occupy less\n// size (in bytes) than scns_page::scn_pages array allow us to use very simple\n// formula for pagesPerSCN : pagesPerSCN = pagesPerPIP / BITS_PER_LONG.\n// Please, consider above when changing page_inv_page or scns_page definition.\n//\n// Table below show numbers for different page sizes using current (ODS12)\n// definitions of page_inv_page and scns_page\n//\n// PageSize  pagesPerPIP  maxPagesPerSCN    pagesPerSCN\n//     4096        32544            1019           1017\n//     8192        65312            2043           2041\n//    16384       130848            4091           4089\n//    32768       261920            8187           8185\n//    65536       524064           16379          16377\n\n// Pointer Page\n\nstruct pointer_page\n{\n\tpag ppg_header;\n\tULONG ppg_sequence;\t\t\t// Sequence number in relation\n\tULONG ppg_next;\t\t\t\t// Next pointer page in relation\n\tUSHORT ppg_count;\t\t\t// Number of slots active\n\tUSHORT ppg_relation;\t\t// Relation id\n\tUSHORT ppg_min_space;\t\t// Lowest slot with space available\n\tULONG ppg_page[1];\t\t\t// Data page vector\n};\n\nstatic_assert(sizeof(struct pointer_page) == 36, &quot;struct pointer_page size mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_header) == 0, &quot;ppg_header offset mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_sequence) == 16, &quot;ppg_sequence offset mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_next) == 20, &quot;ppg_next offset mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_count) == 24, &quot;ppg_count offset mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_relation) == 26, &quot;ppg_relation offset mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_min_space) == 28, &quot;ppg_min_space offset mismatch&quot;);\nstatic_assert(offsetof(struct pointer_page, ppg_page) == 32, &quot;ppg_page offset mismatch&quot;);\n\n\n// pag_flags\ninline constexpr UCHAR ppg_eof\t\t= 1;\t// Last pointer page in relation\n\n// After array of physical page numbers (ppg_page) there is also array of bit\n// flags per every data page. These flags describes state of corresponding data\n// page. Definitions below used to deal with these bits.\ninline constexpr int PPG_DP_BITS_NUM\t\t= 8;\t\t// Number of additional flag bits per data page\n\ninline constexpr UCHAR ppg_dp_full\t\t\t= 0x01;\t\t// Data page is FULL\ninline constexpr UCHAR ppg_dp_large\t\t\t= 0x02;\t\t// Large object is on data page\ninline constexpr UCHAR ppg_dp_swept\t\t\t= 0x04;\t\t// Sweep has nothing to do on data page\ninline constexpr UCHAR ppg_dp_secondary\t\t= 0x08;\t\t// Primary record versions not stored on data page\ninline constexpr UCHAR ppg_dp_empty\t\t\t= 0x10;\t\t// Data page is empty\n\ninline constexpr UCHAR PPG_DP_ALL_BITS\t= (1 &lt;&lt; PPG_DP_BITS_NUM) - 1;\n\n#define PPG_DP_BIT_MASK(slot, bit)\t\t(bit)\n#define PPG_DP_BITS_BYTE(bits, slot)\t((bits)[(slot)])\n\n#define PPG_DP_BIT_TEST(flags, slot, bit)\t(PPG_DP_BITS_BYTE((flags), (slot)) &amp; PPG_DP_BIT_MASK((slot), (bit)))\n#define PPG_DP_BIT_SET(flags, slot, bit)\t(PPG_DP_BITS_BYTE((flags), (slot)) |= PPG_DP_BIT_MASK((slot), (bit)))\n#define PPG_DP_BIT_CLEAR(flags, slot, bit)\t(PPG_DP_BITS_BYTE((flags), (slot)) &amp;= ~PPG_DP_BIT_MASK((slot), (bit)))\n\n\n// Transaction Inventory Page\n\nstruct tx_inv_page\n{\n\tpag tip_header;\n\tULONG tip_next;\t\t\t\t// Next transaction inventory page\n\tUCHAR tip_transactions[1];\n};\n\nstatic_assert(sizeof(struct tx_inv_page) == 24, &quot;struct tx_inv_page size mismatch&quot;);\nstatic_assert(offsetof(struct tx_inv_page, tip_header) == 0, &quot;tip_header offset mismatch&quot;);\nstatic_assert(offsetof(struct tx_inv_page, tip_next) == 16, &quot;tip_next offset mismatch&quot;);\nstatic_assert(offsetof(struct tx_inv_page, tip_transactions) == 20, &quot;tip_transactions offset mismatch&quot;);\n\n\n// Generator Page\n\nstruct generator_page\n{\n\tpag gpg_header;\n\tULONG gpg_sequence;\t\t\t// Sequence number\n\tULONG gpg_dummy1;\t\t\t// Alignment enforced\n\tSINT64 gpg_values[1];\t\t// Generator vector\n};\n\nstatic_assert(sizeof(struct generator_page) == 32, &quot;struct generator_page size mismatch&quot;);\nstatic_assert(offsetof(struct generator_page, gpg_header) == 0, &quot;gpg_header offset mismatch&quot;);\nstatic_assert(offsetof(struct generator_page, gpg_sequence) == 16, &quot;gpg_sequence offset mismatch&quot;);\nstatic_assert(offsetof(struct generator_page, gpg_dummy1) == 20, &quot;gpg_dummy1 offset mismatch&quot;);\nstatic_assert(offsetof(struct generator_page, gpg_values) == 24, &quot;gpg_values offset mismatch&quot;);\n\n\n// Record header\n\nstruct rhd\n{\n\tULONG rhd_transaction;\t\t// transaction id (lowest 32 bits)\n\tULONG rhd_b_page;\t\t\t// back pointer\n\tUSHORT rhd_b_line;\t\t\t// back line\n\tUSHORT rhd_flags;\t\t\t// flags, etc\n\tUCHAR rhd_format;\t\t\t// format version\n\tUCHAR rhd_data[1];\t\t\t// record data\n};\n\nstatic_assert(sizeof(struct rhd) == 16, &quot;struct rhd size mismatch&quot;);\nstatic_assert(offsetof(struct rhd, rhd_transaction) == 0, &quot;rhd_transaction offset mismatch&quot;);\nstatic_assert(offsetof(struct rhd, rhd_b_page) == 4, &quot;rhd_b_page offset mismatch&quot;);\nstatic_assert(offsetof(struct rhd, rhd_b_line) == 8, &quot;rhd_b_line offset mismatch&quot;);\nstatic_assert(offsetof(struct rhd, rhd_flags) == 10, &quot;rhd_flags offset mismatch&quot;);\nstatic_assert(offsetof(struct rhd, rhd_format) == 12, &quot;rhd_format offset mismatch&quot;);\nstatic_assert(offsetof(struct rhd, rhd_data) == 13, &quot;rhd_data offset mismatch&quot;);\n\n#define RHD_SIZE static_cast&lt;FB_SIZE_T&gt;(offsetof(Ods::rhd, rhd_data[0]))\n\n// Record header extended to hold long transaction id\n\nstruct rhde\n{\n\tULONG rhde_transaction;\t\t// transaction id (lowest 32 bits)\n\tULONG rhde_b_page;\t\t\t// back pointer\n\tUSHORT rhde_b_line;\t\t\t// back line\n\tUSHORT rhde_flags;\t\t\t// flags, etc\n\tUCHAR rhde_format;\t\t\t// format version\t// until here, same as rhd\n\tUSHORT rhde_tra_high;\t\t// higher bits of transaction id\n\tUCHAR rhde_data[1];\t\t\t// record data\n};\n\nstatic_assert(sizeof(struct rhde) == 20, &quot;struct rhde size mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_transaction) == 0, &quot;rhde_transaction offset mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_b_page) == 4, &quot;rhde_b_page offset mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_b_line) == 8, &quot;rhde_b_line offset mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_flags) == 10, &quot;rhde_flags offset mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_format) == 12, &quot;rhde_formats offset mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_tra_high) == 14, &quot;rhde_tra_high offset mismatch&quot;);\nstatic_assert(offsetof(struct rhde, rhde_data) == 16, &quot;rhde_data offset mismatch&quot;);\n\n#define RHDE_SIZE static_cast&lt;FB_SIZE_T&gt;(offsetof(Ods::rhde, rhde_data[0]))\n\n// Record header for fragmented record\n\nstruct rhdf\n{\n\tULONG rhdf_transaction;\t\t// transaction id (lowest 32 bits)\n\tULONG rhdf_b_page;\t\t\t// back pointer\n\tUSHORT rhdf_b_line;\t\t\t// back line\n\tUSHORT rhdf_flags;\t\t\t// flags, etc\n\tUCHAR rhdf_format;\t\t\t// format version    // until here, same as rhd\n\tUSHORT rhdf_tra_high;\t\t// higher bits of transaction id\n\tULONG rhdf_f_page;\t\t\t// next fragment page\n\tUSHORT rhdf_f_line;\t\t\t// next fragment line\n\tUCHAR rhdf_data[1];\t\t\t// record data\n};\n\nstatic_assert(sizeof(struct rhdf) == 24, &quot;struct rhdf size mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_transaction) == 0, &quot;rhdf_transaction offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_b_page) == 4, &quot;rhdf_b_page offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_b_line) == 8, &quot;rhdf_b_line offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_flags) == 10, &quot;rhdf_flags offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_format) == 12, &quot;rhdf_format offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_tra_high) == 14, &quot;rhdf_tra_high offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_f_page) == 16, &quot;rhdf_f_page offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_f_line) == 20, &quot;rhdf_f_line offset mismatch&quot;);\nstatic_assert(offsetof(struct rhdf, rhdf_data) == 22, &quot;rhdf_data offset mismatch&quot;);\n\n#define RHDF_SIZE static_cast&lt;FB_SIZE_T&gt;(offsetof(Ods::rhdf, rhdf_data[0]))\n\n\n// Record header for blob header\n\nstruct blh\n{\n\tULONG blh_lead_page;\t\t// First data page number\n\tULONG blh_max_sequence;\t\t// Number of data pages\n\tUSHORT blh_max_segment;\t\t// Longest segment\n\tUSHORT blh_flags;\t\t\t// flags, etc\n\tULONG blh_count;\t\t\t// Total number of segments\n\tFB_UINT64 blh_length;\t\t// Total length of data\n\tUSHORT blh_sub_type;\t\t// Blob sub-type\n\tUCHAR blh_charset;\t\t\t// Blob charset\n\tUCHAR blh_level;\t\t\t// Number of address levels, see blb_level in blb.h\n// Macro CHECK_BLOB_FIELD_ACCESS_FOR_SELECT is never defined, code under it was left for a case\n// we would like to have that check in a future.\n#ifdef CHECK_BLOB_FIELD_ACCESS_FOR_SELECT\n\tUSHORT blh_fld_id;\t\t\t// Field ID\n#endif\n\tULONG blh_page[1];\t\t\t// Page vector for blob pages\n};\n\nstatic_assert(sizeof(struct blh) == 32, &quot;struct blh size mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_lead_page) == 0, &quot;blh_lead_page offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_max_sequence) == 4, &quot;blh_max_sequence offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_max_segment) == 8, &quot;blh_max_segment offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_flags) == 10, &quot;blh_flags offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_count) == 12, &quot;blh_count offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_length) == 16, &quot;blh_length offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_sub_type) == 24, &quot;blh_sub_type offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_charset) == 26, &quot;blh_charset offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_level) == 27, &quot;blh_level offset mismatch&quot;);\nstatic_assert(offsetof(struct blh, blh_page) == 28, &quot;blh_page offset mismatch&quot;);\n\n#define BLH_SIZE static_cast&lt;FB_SIZE_T&gt;(offsetof(Ods::blh, blh_page[0]))\n\n// rhd_flags, rhdf_flags and blh_flags\n\n// record_param flags in req.h must be an exact replica of ODS record header flags\n\ninline constexpr USHORT rhd_deleted\t\t\t= 1;\t\t// record is logically deleted\ninline constexpr USHORT rhd_chain\t\t\t= 2;\t\t// record is an old version\ninline constexpr USHORT rhd_fragment\t\t= 4;\t\t// record is a fragment\ninline constexpr USHORT rhd_incomplete\t\t= 8;\t\t// record is incomplete\ninline constexpr USHORT rhd_blob\t\t\t= 16;\t\t// isn&#x27;t a record but a blob\ninline constexpr USHORT rhd_stream_blob\t\t= 32;\t\t// blob is a stream mode blob\ninline constexpr USHORT rhd_delta\t\t\t= 32;\t\t// prior version is differences only\ninline constexpr USHORT rhd_large\t\t\t= 64;\t\t// object is large\ninline constexpr USHORT rhd_damaged\t\t\t= 128;\t\t// object is known to be damaged\ninline constexpr USHORT rhd_gc_active\t\t= 256;\t\t// garbage collecting dead record version\ninline constexpr USHORT rhd_uk_modified\t\t= 512;\t\t// record key field values are changed\ninline constexpr USHORT rhd_long_tranum\t\t= 1024;\t\t// transaction number is 64-bit\ninline constexpr USHORT rhd_not_packed\t\t= 2048;\t\t// record (or delta) is stored &quot;as is&quot;\n\n\n// This (not exact) copy of class DSC is used to store descriptors on disk.\n// Hopefully its binary layout is common for 32/64 bit CPUs.\nstruct Descriptor\n{\n\tUCHAR\tdsc_dtype;\n\tSCHAR\tdsc_scale;\n\tUSHORT\tdsc_length;\n\tSSHORT\tdsc_sub_type;\n\tUSHORT\tdsc_flags;\n\tULONG\tdsc_offset;\n};\n\nstatic_assert(sizeof(struct Descriptor) == 12, &quot;struct Descriptor size mismatch&quot;);\nstatic_assert(offsetof(struct Descriptor, dsc_dtype) == 0, &quot;dsc_dtype offset mismatch&quot;);\nstatic_assert(offsetof(struct Descriptor, dsc_scale) == 1, &quot;dsc_scale offset mismatch&quot;);\nstatic_assert(offsetof(struct Descriptor, dsc_length) == 2, &quot;dsc_length offset mismatch&quot;);\nstatic_assert(offsetof(struct Descriptor, dsc_sub_type) == 4, &quot;dsc_sub_type offset mismatch&quot;);\nstatic_assert(offsetof(struct Descriptor, dsc_flags) == 6, &quot;dsc_flags offset mismatch&quot;);\nstatic_assert(offsetof(struct Descriptor, dsc_offset) == 8, &quot;dsc_offset offset mismatch&quot;);\n\n// Array description, &quot;internal side&quot; used by the engine.\n// And stored on the disk, in the relation summary blob.\n\nstruct InternalArrayDesc\n{\n\tUCHAR iad_version;\t\t\t// Array descriptor version number\n\tUCHAR iad_dimensions;\t\t// Dimensions of array\n\tUSHORT iad_struct_count;\t// Number of struct elements\n\tUSHORT iad_element_length;\t// Length of array element\n\tUSHORT iad_length;\t\t\t// Length of array descriptor\n\tULONG iad_count;\t\t\t// Total number of elements\n\tULONG iad_total_length;\t\t// Total length of array\n\tstruct iad_repeat\n\t{\n\t\tDescriptor iad_desc;\t// Element descriptor\n\t\tULONG iad_length;\t\t// Length of &quot;vector&quot; element\n\t\tSLONG iad_lower;\t\t// Lower bound\n\t\tSLONG iad_upper;\t\t// Upper bound\n\t};\n\tiad_repeat iad_rpt[1];\n\n\tstatic_assert(sizeof(struct iad_repeat) == 24, &quot;struct iad_repeat size mismatch&quot;);\n\tstatic_assert(offsetof(struct iad_repeat, iad_desc) == 0, &quot;iad_desc offset mismatch&quot;);\n\tstatic_assert(offsetof(struct iad_repeat, iad_length) == 12, &quot;iad_length offset mismatch&quot;);\n\tstatic_assert(offsetof(struct iad_repeat, iad_lower) == 16, &quot;iad_lower offset mismatch&quot;);\n\tstatic_assert(offsetof(struct iad_repeat, iad_upper) == 20, &quot;iad_upper offset mismatch&quot;);\n};\n\nstatic_assert(sizeof(struct InternalArrayDesc) == 40, &quot;struct InternalArrayDesc size mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_version) == 0, &quot;iad_version offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_dimensions) == 1, &quot;iad_dimension offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_struct_count) == 2, &quot;iad_struct_count offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_element_length) == 4, &quot;iad_element_length offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_length) == 6, &quot;iad_length offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_count) == 8, &quot;iad_count offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_total_length) == 12, &quot;iad_total_length offset mismatch&quot;);\nstatic_assert(offsetof(struct InternalArrayDesc, iad_rpt) == 16, &quot;iad_rpt offset mismatch&quot;);\n\ninline constexpr UCHAR IAD_VERSION_1\t\t= 1;\n\n/*\ninline int IAD_LEN(int count)\n{\n\tif (!count)\n\t\tcount = 1;\n\treturn sizeof (InternalArrayDesc) +\n\t\t(count - 1) * sizeof (InternalArrayDesc::iad_repeat);\n}\n*/\n#define IAD_LEN(count)\t(sizeof (Ods::InternalArrayDesc) + \\\n\t(count ? count - 1: count) * sizeof (Ods::InternalArrayDesc::iad_repeat))\n\nFirebird::string pagtype(UCHAR type);\n\n} //namespace Ods\n\n// alignment for raw page access\ninline constexpr USHORT PAGE_ALIGNMENT = 1024;\n\n// alignment and IO block size/offset multiplier for non-buffered file access\ninline constexpr ULONG DIRECT_IO_BLOCK_SIZE = 4096;\n\nstatic_assert(MIN_PAGE_SIZE &gt;= DIRECT_IO_BLOCK_SIZE, &quot;check DIRECT_IO_BLOCK_SIZE&quot;);\n\n// size of raw I/O operation for header page\ninline constexpr USHORT RAW_HEADER_SIZE = 1024;\t// ROUNDUP(HDR_SIZE, PAGE_ALIGNMENT);\n//static_assert(RAW_HEADER_SIZE &gt;= HDR_SIZE, &quot;RAW_HEADER_SIZE is less than HDR_SIZE&quot;);\n\n// max number of table formats (aka versions), limited by &quot;UCHAR rhd_format&quot;\ninline constexpr int MAX_TABLE_VERSIONS = 255;\n\n// max number of view formats (aka versions), limited by &quot;SSHORT RDB$FORMAT&quot;\ninline constexpr int MAX_VIEW_VERSIONS = MAX_SSHORT;\n\n#endif // JRD_ODS_H\n"}, "/build/src/common/dsc.h": {"id": "/build/src/common/dsc.h", "filePath": "src/common/dsc.h", "content": "/*\n *\tPROGRAM:\tJRD access method\n *\tMODULE:\t\tdsc.h\n *\tDESCRIPTION:\tDefinitions associated with descriptors\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n * 2002.04.16  Paul Beach - HP10 Define changed from -4 to (-4) to make it\n *             compatible with the HP Compiler\n * Adriano dos Santos Fernandes\n */\n\n#ifndef COMMON_DSC_H\n#define COMMON_DSC_H\n\n#include &quot;firebird/impl/dsc_pub.h&quot;\n#include &quot;firebird/impl/consts_pub.h&quot;\n#include &quot;../jrd/ods.h&quot;\n#include &quot;../intl/charsets.h&quot;\n#include &quot;../common/DecFloat.h&quot;\n#include &quot;../common/Int128.h&quot;\n\n// Data type information\n\ninline constexpr bool DTYPE_IS_TEXT(UCHAR d) noexcept\n{\n\treturn d &gt;= dtype_text &amp;&amp; d &lt;= dtype_varying;\n}\n\ninline constexpr bool DTYPE_IS_DATE(UCHAR t) noexcept\n{\n\treturn (t &gt;= dtype_sql_date &amp;&amp; t &lt;= dtype_timestamp) || (t &gt;= dtype_sql_time_tz &amp;&amp; t &lt;= dtype_ex_timestamp_tz);\n}\n\n// DTYPE_IS_BLOB includes both BLOB and ARRAY since array&#x27;s are implemented over blobs.\ninline constexpr bool DTYPE_IS_BLOB(UCHAR d) noexcept\n{\n\treturn d == dtype_blob || d == dtype_array;\n}\n\n// DTYPE_IS_BLOB_OR_QUAD includes both BLOB, QUAD and ARRAY since array&#x27;s are implemented over blobs.\ninline constexpr bool DTYPE_IS_BLOB_OR_QUAD(UCHAR d) noexcept\n{\n\treturn d == dtype_blob || d == dtype_quad || d == dtype_array;\n}\n\n// Exact numeric?\ninline constexpr bool DTYPE_IS_EXACT(UCHAR d) noexcept\n{\n\treturn d == dtype_int64 || d == dtype_long || d == dtype_short || d == dtype_int128;\n}\n\ninline constexpr bool DTYPE_IS_APPROX(UCHAR d) noexcept\n{\n\treturn d == dtype_double || d == dtype_real;\n}\n\ninline constexpr bool DTYPE_IS_DECFLOAT(UCHAR d) noexcept\n{\n\treturn d == dtype_dec128 || d == dtype_dec64;\n}\n\ninline constexpr bool DTYPE_IS_NUMERIC(UCHAR d) noexcept\n{\n\treturn (d &gt;= dtype_byte &amp;&amp; d &lt;= dtype_d_float) || d == dtype_int64 ||\n\t\t\td == dtype_int128 || DTYPE_IS_DECFLOAT(d);\n}\n\n// Descriptor format\n\ntypedef struct dsc\n{\n\tdsc() = default;\n\n\t// These Ods::Descriptor constructor and operator were added to have\n\t// interoperability between Ods::Descriptor and struct dsc\n\tdsc(const Ods::Descriptor&amp; od) noexcept\n\t\t: dsc_dtype(od.dsc_dtype),\n\t\t  dsc_scale(od.dsc_scale),\n\t\t  dsc_length(od.dsc_length),\n\t\t  dsc_sub_type(od.dsc_sub_type),\n\t\t  dsc_flags(od.dsc_flags),\n\t\t  dsc_address((UCHAR*)(IPTR)(od.dsc_offset))\n\t{}\n\n\tUCHAR\tdsc_dtype = 0;\n\tSCHAR\tdsc_scale = 0;\n\tUSHORT\tdsc_length = 0;\n\tSSHORT\tdsc_sub_type = 0;\n\tUSHORT\tdsc_flags = 0;\n\tUCHAR*\tdsc_address = nullptr; // Used either as offset in a message or as a pointer\n\n#ifdef __cplusplus\n\tSSHORT dsc_blob_ttype() const noexcept { return dsc_scale | (dsc_flags &amp; 0xFF00);}\n\tSSHORT&amp; dsc_ttype() noexcept { return dsc_sub_type;}\n\tSSHORT dsc_ttype() const noexcept { return dsc_sub_type;}\n\n\tbool isNullable() const noexcept\n\t{\n\t\treturn dsc_flags &amp; DSC_nullable;\n\t}\n\n\tvoid setNullable(bool nullable) noexcept\n\t{\n\t\tif (nullable)\n\t\t\tdsc_flags |= DSC_nullable;\n\t\telse\n\t\t\tdsc_flags &amp;= ~(DSC_nullable | DSC_null);\n\t}\n\n\tbool isNull() const noexcept\n\t{\n\t\treturn dsc_flags &amp; DSC_null;\n\t}\n\n\tvoid setNull() noexcept\n\t{\n\t\tdsc_flags |= DSC_null | DSC_nullable;\n\t}\n\n\tvoid clearNull() noexcept\n\t{\n\t\tdsc_flags &amp;= ~DSC_null;\n\t}\n\n\tbool isBlob() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_blob || dsc_dtype == dtype_quad;\n\t}\n\n\tbool isBoolean() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_boolean;\n\t}\n\n\tbool isExact() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_int128 || dsc_dtype == dtype_int64 ||\n\t\t\t   dsc_dtype == dtype_long || dsc_dtype == dtype_short;\n\t}\n\n\tbool isNumeric() const noexcept\n\t{\n\t\treturn DTYPE_IS_NUMERIC(dsc_dtype);\n\t}\n\n\tbool isText() const noexcept\n\t{\n\t\treturn DTYPE_IS_TEXT(dsc_dtype);\n\t}\n\n\tbool isDbKey() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_dbkey;\n\t}\n\n\tbool isDateTime() const noexcept\n\t{\n\t\treturn DTYPE_IS_DATE(dsc_dtype);\n\t}\n\n\tbool isDateTimeTz() const noexcept\n\t{\n\t\treturn dsc_dtype &gt;= dtype_sql_time_tz &amp;&amp; dsc_dtype &lt;= dtype_ex_timestamp_tz;\n\t}\n\n\tbool isDate() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_sql_date;\n\t}\n\n\tbool isTime() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_sql_time || dsc_dtype == dtype_sql_time_tz || dsc_dtype == dtype_ex_time_tz;\n\t}\n\n\tbool isTimeStamp() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_timestamp || dsc_dtype == dtype_timestamp_tz || dsc_dtype == dtype_ex_timestamp_tz;\n\t}\n\n\tbool isDecFloat() const noexcept\n\t{\n\t\treturn DTYPE_IS_DECFLOAT(dsc_dtype);\n\t}\n\n\tbool isInt128() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_int128;\n\t}\n\n\tbool isDecOrInt() const noexcept\n\t{\n\t\treturn isDecFloat() || isExact();\n\t}\n\n\tbool isDecOrInt128() const noexcept\n\t{\n\t\treturn isDecFloat() || isInt128();\n\t}\n\n\tbool is128() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_dec128 || dsc_dtype == dtype_int128;\n\t}\n\n\tbool isApprox() const noexcept\n\t{\n\t\treturn DTYPE_IS_APPROX(dsc_dtype);\n\t}\n\n\tbool isUnknown() const noexcept\n\t{\n\t\treturn dsc_dtype == dtype_unknown;\n\t}\n\n\tSSHORT getBlobSubType() const noexcept\n\t{\n\t\tif (isBlob())\n\t\t\treturn dsc_sub_type;\n\n\t\treturn isc_blob_text;\n\t}\n\n\tSSHORT getSubType() const noexcept\n\t{\n\t\tif (isBlob() || isExact())\n\t\t\treturn dsc_sub_type;\n\n\t\treturn 0;\n\t}\n\n\tvoid setBlobSubType(SSHORT subType) noexcept\n\t{\n\t\tif (isBlob())\n\t\t\tdsc_sub_type = subType;\n\t}\n\n\tUCHAR getCharSet() const noexcept\n\t{\n\t\tif (isText())\n\t\t\treturn dsc_sub_type &amp; 0xFF;\n\n\t\tif (isBlob())\n\t\t{\n\t\t\tif (dsc_sub_type == isc_blob_text)\n\t\t\t\treturn dsc_scale;\n\n\t\t\treturn CS_BINARY;\n\t\t}\n\n\t\tif (isDbKey())\n\t\t\treturn CS_BINARY;\n\n\t\treturn CS_NONE;\n\t}\n\n\tUSHORT getTextType() const noexcept\n\t{\n\t\tif (isText())\n\t\t\treturn dsc_sub_type;\n\n\t\tif (isBlob())\n\t\t{\n\t\t\tif (dsc_sub_type == isc_blob_text)\n\t\t\t\treturn dsc_scale | (dsc_flags &amp; 0xFF00);\n\n\t\t\treturn CS_BINARY;\n\t\t}\n\n\t\tif (isDbKey())\n\t\t\treturn CS_BINARY;\n\n\t\treturn CS_NONE;\n\t}\n\n\tvoid setTextType(USHORT ttype) noexcept\n\t{\n\t\tif (isText())\n\t\t\tdsc_sub_type = ttype;\n\t\telse if (isBlob() &amp;&amp; dsc_sub_type == isc_blob_text)\n\t\t{\n\t\t\tdsc_scale = ttype &amp; 0xFF;\n\t\t\tdsc_flags = (dsc_flags &amp; 0xFF) | (ttype &amp; 0xFF00);\n\t\t}\n\t}\n\n\tUSHORT getCollation() const noexcept\n\t{\n\t\treturn getTextType() &gt;&gt; 8;\n\t}\n\n\tvoid clear() noexcept\n\t{\n\t\tmemset(this, 0, sizeof(*this));\n\t}\n\n\tvoid clearFlags() noexcept\n\t{\n\t\tif (isBlob() &amp;&amp; dsc_sub_type == isc_blob_text)\n\t\t\tdsc_flags &amp;= 0xFF00;\n\t\telse\n\t\t\tdsc_flags = 0;\n\t}\n\n\tvoid makeBlob(SSHORT subType, USHORT ttype, ISC_QUAD* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_blob;\n\t\tdsc_length = sizeof(ISC_QUAD);\n\t\tsetBlobSubType(subType);\n\t\tsetTextType(ttype);\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeDate(GDS_DATE* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_sql_date;\n\t\tdsc_length = sizeof(GDS_DATE);\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeDbkey(void* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_dbkey;\n\t\tdsc_length = sizeof(ISC_QUAD);\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeDouble(double* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_double;\n\t\tdsc_length = sizeof(double);\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeDecimal64(Firebird::Decimal64* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_dec64;\n\t\tdsc_length = sizeof(Firebird::Decimal64);\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeDecimal128(Firebird::Decimal128* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_dec128;\n\t\tdsc_length = sizeof(Firebird::Decimal128);\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeInt64(SCHAR scale, SINT64* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_int64;\n\t\tdsc_length = sizeof(SINT64);\n\t\tdsc_scale = scale;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeInt128(SCHAR scale, Firebird::Int128* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_int128;\n\t\tdsc_length = sizeof(Firebird::Int128);\n\t\tdsc_scale = scale;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeLong(SCHAR scale, SLONG* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_long;\n\t\tdsc_length = sizeof(SLONG);\n\t\tdsc_scale = scale;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeBoolean(UCHAR* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_boolean;\n\t\tdsc_length = sizeof(UCHAR);\n\t\tdsc_address = address;\n\t}\n\n\tvoid makeNullString() noexcept\n\t{\n\t\tclear();\n\n\t\t// CHAR(1) CHARACTER SET NONE\n\t\tdsc_dtype = dtype_text;\n\t\tsetTextType(CS_NONE);\n\t\tdsc_length = 1;\n\t\tdsc_flags = DSC_nullable | DSC_null;\n\t}\n\n\tvoid makeShort(SCHAR scale, SSHORT* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_short;\n\t\tdsc_length = sizeof(SSHORT);\n\t\tdsc_scale = scale;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeText(USHORT length, USHORT ttype, UCHAR* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_text;\n\t\tdsc_length = length;\n\t\tsetTextType(ttype);\n\t\tdsc_address = address;\n\t}\n\n\tvoid makeTime(GDS_TIME* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_sql_time;\n\t\tdsc_length = sizeof(GDS_TIME);\n\t\tdsc_scale = 0;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeTimeTz(ISC_TIME_TZ* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_sql_time_tz;\n\t\tdsc_length = sizeof(ISC_TIME_TZ);\n\t\tdsc_scale = 0;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeTimeTzEx(ISC_TIME_TZ_EX* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_ex_time_tz;\n\t\tdsc_length = sizeof(ISC_TIME_TZ_EX);\n\t\tdsc_scale = 0;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeTimestamp(GDS_TIMESTAMP* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_timestamp;\n\t\tdsc_length = sizeof(GDS_TIMESTAMP);\n\t\tdsc_scale = 0;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeTimestampTz(ISC_TIMESTAMP_TZ* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_timestamp_tz;\n\t\tdsc_length = sizeof(ISC_TIMESTAMP_TZ);\n\t\tdsc_scale = 0;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeTimestampTzEx(ISC_TIMESTAMP_TZ_EX* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_ex_timestamp_tz;\n\t\tdsc_length = sizeof(ISC_TIMESTAMP_TZ_EX);\n\t\tdsc_scale = 0;\n\t\tdsc_address = (UCHAR*) address;\n\t}\n\n\tvoid makeVarying(USHORT length, USHORT ttype, UCHAR* address = NULL) noexcept\n\t{\n\t\tclear();\n\t\tdsc_dtype = dtype_varying;\n\t\tdsc_length = sizeof(USHORT) + length;\n\t\tif (dsc_length &lt; length)\n\t\t{\n\t\t\t// overflow - avoid segfault\n\t\t\tdsc_length = MAX_USHORT;\n\t\t}\n\t\tsetTextType(ttype);\n\t\tdsc_address = address;\n\t}\n\n\tUSHORT getStringLength() const noexcept;\n\n\toperator Ods::Descriptor() const\n\t{\n#ifdef DEV_BUILD\n\t\taddress32bit();\n#endif\n\t\tOds::Descriptor d;\n\t\td.dsc_dtype = dsc_dtype;\n\t\td.dsc_scale = dsc_scale;\n\t\td.dsc_length = dsc_length;\n\t\td.dsc_sub_type = dsc_sub_type;\n\t\td.dsc_flags = dsc_flags;\n\t\td.dsc_offset = (ULONG)(IPTR) dsc_address;\n\t\treturn d;\n\t}\n\n\toperator paramdsc() const noexcept\n\t{\n\t\tparamdsc d;\n\t\td.dsc_dtype = dsc_dtype;\n\t\td.dsc_scale = dsc_scale;\n\t\td.dsc_length = dsc_length;\n\t\td.dsc_sub_type = dsc_sub_type;\n\t\td.dsc_flags = dsc_flags;\n\t\td.dsc_address = dsc_address;\n\t\treturn d;\n\t}\n\n#ifdef DEV_BUILD\n\tvoid address32bit() const;\n#endif\n\n\tconst char* typeToText() const noexcept;\n\tvoid getSqlInfo(SLONG* sqlLength, SLONG* sqlSubType, SLONG* sqlScale, SLONG* sqlType) const;\n#endif\t// __cpluplus\n} DSC;\n\ninline SSHORT DSC_GET_CHARSET(const dsc* desc) noexcept\n{\n\treturn (desc-&gt;dsc_sub_type &amp; 0x00FF);\n}\n\ninline SSHORT DSC_GET_COLLATE(const dsc* desc) noexcept\n{\n\treturn (desc-&gt;dsc_sub_type &gt;&gt; 8);\n}\n\nstruct alt_dsc\n{\n\tSLONG dsc_combined_type;\n\tSSHORT dsc_sub_type;\n\tUSHORT dsc_flags;\t\t\t// Not currently used\n};\n\ninline bool DSC_EQUIV(const dsc* d1, const dsc* d2, bool check_collate) noexcept\n{\n\tif (((alt_dsc*) d1)-&gt;dsc_combined_type == ((alt_dsc*) d2)-&gt;dsc_combined_type)\n\t{\n\t\tif ((d1-&gt;dsc_dtype &gt;= dtype_text &amp;&amp; d1-&gt;dsc_dtype &lt;= dtype_varying) ||\n\t\t\td1-&gt;dsc_dtype == dtype_blob)\n\t\t{\n\t\t\tif (d1-&gt;getCharSet() == d2-&gt;getCharSet())\n\t\t\t{\n\t\t\t\tif (check_collate)\n\t\t\t\t\treturn d1-&gt;getCollation() == d2-&gt;getCollation();\n\n\t\t\t\treturn true;\n\t\t\t}\n\n\t\t\treturn false;\n\t\t}\n\n\t\treturn true;\n\t}\n\n\treturn false;\n}\n\n// In DSC_*_result tables, DTYPE_CANNOT means that the two operands\n// cannot participate together in the requested operation.\n\ninline constexpr UCHAR DTYPE_CANNOT\t= 127;\n\n// Historical alias definition\ninline constexpr UCHAR dtype_date\t\t= dtype_timestamp;\n\ninline constexpr UCHAR dtype_aligned\t= dtype_varying;\ninline constexpr UCHAR dtype_any_text\t= dtype_varying;\ninline constexpr UCHAR dtype_min_comp\t= dtype_packed;\ninline constexpr UCHAR dtype_max_comp\t= dtype_d_float;\n\n// NOTE: For types &lt;= dtype_any_text the dsc_sub_type field defines the text type\n\ninline USHORT TEXT_LEN(const dsc* desc) noexcept\n{\n\treturn ((desc-&gt;dsc_dtype == dtype_text) ?\n\t\tdesc-&gt;dsc_length :\n\t\t(desc-&gt;dsc_dtype == dtype_cstring) ?\n\t\t\tdesc-&gt;dsc_length - 1u : desc-&gt;dsc_length - sizeof(USHORT));\n}\n\n\n// Text Sub types, distinct from character sets &amp; collations\n\ninline constexpr SSHORT dsc_text_type_none\t\t= 0;\t// Normal text\ninline constexpr SSHORT dsc_text_type_fixed\t\t= 1;\t// strings can contain null bytes\ninline constexpr SSHORT dsc_text_type_ascii\t\t= 2;\t// string contains only ASCII characters\ninline constexpr SSHORT dsc_text_type_metadata\t= 3;\t// string represents system metadata\n\n\n// Exact numeric subtypes: with ODS &gt;= 10, these apply when dtype\n// is short, long, or quad.\n\ninline constexpr SSHORT dsc_num_type_none\t\t= 0;\t// defined as SMALLINT or INTEGER\ninline constexpr SSHORT dsc_num_type_numeric\t= 1;\t// defined as NUMERIC(n,m)\ninline constexpr SSHORT dsc_num_type_decimal\t= 2;\t// defined as DECIMAL(n,m)\n\n// Date type information\n\ninline constexpr SCHAR NUMERIC_SCALE(const dsc desc) noexcept\n{\n\treturn ((DTYPE_IS_TEXT(desc.dsc_dtype)) ? 0 : desc.dsc_scale);\n}\n\ninline constexpr UCHAR DEFAULT_DOUBLE  = dtype_double;\n\n#endif // COMMON_DSC_H\n"}, "/build/src/gpre/parse.h": {"id": "/build/src/gpre/parse.h", "filePath": "src/gpre/parse.h", "content": "/*\n *\tPROGRAM:\tLanguage Preprocessor\n *\tMODULE:\t\tparse.h\n *\tDESCRIPTION:\tCommon parser definitions\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n */\n\n#ifndef GPRE_PARSE_H\n#define GPRE_PARSE_H\n\n#include &quot;../gpre/words.h&quot;\n#include &quot;../gpre/gpre.h&quot;\n\n// Token block, used to hold a lexical token.\n\nenum tok_t {\n\ttok_ident,\n\ttok_number,\n\ttok_sglquoted,\n\ttok_punct,\n\ttok_introducer,\n\ttok_dblquoted\n};\n\nstruct tok\n{\n\ttok_t tok_type;\t\t\t\t// type of token\n\tgpre_sym* tok_symbol;\t\t// hash block if recognized\n\tkwwords_t tok_keyword;\t\t// keyword number, if recognized\n\tSLONG tok_position;\t\t\t// byte number in input stream\n\tUSHORT tok_length;\n\tUSHORT tok_white_space;\n\tSCHAR tok_string[MAX_SYM_SIZE];\n\tbool tok_first;\t\t\t\t// is it the first token in a statement?\n\tgpre_sym* tok_charset;\t\t// Character set of token\n};\n\ninline constexpr size_t TOK_LEN = sizeof(tok);\n\n// CVC: This function doesn&#x27;t unescape embedded quotes.\ninline void strip_quotes(tok&amp; tkn) noexcept\n{\n\tint ij;\n\tfor (ij = 1; ij &lt; tkn.tok_length - 1; ij++)\n\t\ttkn.tok_string[ij - 1] = tkn.tok_string[ij];\n\t--ij;\n\ttkn.tok_string[ij] = 0;\n\ttkn.tok_length = ij;\n}\n\ninline bool isQuoted(const int typ) noexcept\n{\n\treturn (typ == tok_sglquoted || typ == tok_dblquoted);\n}\n\n#endif // GPRE_PARSE_H\n\n"}, "/build/src/gpre/gpre.h": {"id": "/build/src/gpre/gpre.h", "filePath": "src/gpre/gpre.h", "content": "/*\n *\tPROGRAM:\tLanguage Preprocessor\n *\tMODULE:\t\tgpre.h\n *\tDESCRIPTION:\tCommon header modules\n *\n * The contents of this file are subject to the Interbase Public\n * License Version 1.0 (the &quot;License&quot;); you may not use this file\n * except in compliance with the License. You may obtain a copy\n * of the License at http://www.Inprise.com/IPL.html\n *\n * Software distributed under the License is distributed on an\n * &quot;AS IS&quot; basis, WITHOUT WARRANTY OF ANY KIND, either express\n * or implied. See the License for the specific language governing\n * rights and limitations under the License.\n *\n * The Original Code was created by Inprise Corporation\n * and its predecessors. Portions created by Inprise Corporation are\n * Copyright (C) Inprise Corporation.\n *\n * All Rights Reserved.\n * Contributor(s): ______________________________________.\n *\n * Revision 1.3  2000/11/27 09:26:13  fsg\n * Fixed bugs in gpre to handle PYXIS forms\n * and allow edit.e and fred.e to go through\n * gpre without errors (and correct result).\n *\n * This is a partial fix until all\n * PYXIS datatypes are adjusted in frm_trn.c\n *\n * removed some compiler warnings too\n *\n * Revision 1.2  2000/11/16 15:54:29  fsg\n * Added new switch -verbose to gpre that will dump\n * parsed lines to stderr\n *\n * Fixed gpre bug in handling row names in WHERE clauses\n * that are reserved words now (DATE etc)\n * (this caused gpre to dump core when parsing tan.e)\n *\n * Fixed gpre bug in handling lower case table aliases\n * in WHERE clauses for sql dialect 2 and 3.\n * (cause a core dump in a test case from C.R. Zamana)\n *\n * 2002.02.15 Sean Leyne - Code Cleanup, removed obsolete ports:\n *                         - &quot;IMP&quot; and &quot;HP9000 s300&quot;\n *\n * 2002.10.27 Sean Leyne - Code Cleanup, removed obsolete &quot;UNIXWARE&quot; port\n * 2002.10.27 Sean Leyne - Code Cleanup, removed obsolete &quot;Ultrix&quot; port\n *\n * 2002.10.28 Sean Leyne - Completed removal of obsolete &quot;DGUX&quot; port\n * 2002.10.28 Sean Leyne - Completed removal of obsolete &quot;SGI&quot; port\n * 2002.10.28 Sean Leyne - Completed removal of obsolete &quot;HP700&quot; port\n *\n * 2002.10.30 Sean Leyne - Removed support for obsolete &quot;PC_PLATFORM&quot; define\n *\n * Stephen W. Boyd       - Added support for new features.\n*/\n\n#ifndef GPRE_GPRE_H\n#define GPRE_GPRE_H\n\n#include &lt;stddef.h&gt;\t\t\t\t// offsetof\n\n#include &lt;stdio.h&gt;\n#include &quot;dyn_consts.h&quot;\n#include &quot;ibase.h&quot;\n#include &quot;../jrd/constants.h&quot;\n#include &quot;../common/utils_proto.h&quot;\n\n#ifdef GPRE_FORTRAN\n#if defined AIX || defined AIX_PPC || defined __sun\n#define FTN_BLK_DATA\n#endif\n#endif\n\n\nstatic inline constexpr const char* CONST_STR = &quot;const &quot;;\n\n\ninline constexpr int MAX_SYM_SIZE = 512; // max length of symbol + terminator\ninline constexpr int NAME_SIZE  = 32;\ninline constexpr int MAX_CURSOR_SIZE = 64;\ninline constexpr int MAX_REF_SIZE = 32; // references are generated by gpre\ninline constexpr int ERROR_LENGTH = 256;\ninline constexpr int MAX_DATABASES = 32;\ninline constexpr int MAX_EVENT_SIZE = 16; // event names use 15 chars from old docs.\n\n// Values for SQL dialects.\n#include &quot;firebird/impl/sqlda_pub.h&quot;\n\n// Language options\n\nenum lang_t\n{\n\tlang_undef,\n\tlang_internal,\n\tlang_pascal,\n\tlang_fortran,\n\tlang_cobol,\n\tlang_c,\n\tlang_ada,\n\tlang_cxx,\n\tlang_scxx,\n\tlang_cplusplus,\n\tlang_cpp,\n\tlang_internal_cxx\n};\n\n#ifdef GPRE_COBOL\n// Cobol dialect options\nenum cob_t\n{\n\tcob_vms,\t\t\t\t\t// VMS\n\tcob_ansi,\t\t\t\t\t// ANSI-85\n\tcob_rmc\t\t\t\t\t\t// RM/Cobol\n};\n#endif\n\n\n//___________________________________________________________________\n// Test if input language is cpp based.\n//\n// The lang_internal is used to compile some internal stuff without\n// reference to a database.  Previously it was based on lang_c (but even then\n// if you look carefully there are some areas where lang_c is specifically\n// treated and lang_internal would be ignored).\n// Now the base language used for lang_internal is cpp, so we have this\n// inline function to tell if language is cpp.\n// Internally the sw_language variable is set to lang_cxx for the\n// c++ source files, cxx, cpp, cplusplus, so we only need to test lang_cxx\n// and lang_internal.\n//\n\nbool isLangCpp(lang_t lang) noexcept;\n\n#ifdef GPRE_COBOL\nbool isAnsiCobol(cob_t dialect) noexcept;\n#endif\n\n\n// Structure used by Fortran to determine whether or not\n// an array has been declared in a subroutine.\n\n#ifdef GPRE_FORTRAN\nstruct adl\n{\n\tULONG adl_gds_ident;\t\t// Identifier of array for which Gpre has\n\t\t\t\t\t\t\t\t// generated a declaration in main or a subroutine\n\tadl* adl_next;\t\t\t\t// Next declared array identifier\n};\n\ninline constexpr size_t ADL_LEN = sizeof(adl);\n\n\n// database block data, for generating block data section in fussy fortran\n\nstruct dbd\n{\n\tenum {dbd_size = 128};\n\tTEXT dbd_name[dbd_size];\t\t\t// database name\n};\n#endif\n\n\n// Dimension block, used for arrays\n// Note: this structure is being phased out.  Please use the\n// repeating tail on the ARY structure instead\n\nstruct dim\n{\n\tint dim_number;\t\t\t\t// Dimension number i (i=1 to n)\n\tSLONG dim_lower;\t\t\t// Lower bound\n\tSLONG dim_upper;\t\t\t// Upper bound\n\tdim* dim_next;\t\t\t\t// Information for dimension i+1\n\tdim* dim_previous;\t\t\t// Information for dimension i-1\n};\n\ninline constexpr size_t DIM_LEN = sizeof(dim);\n\n\nstruct gpre_file\n{\n\tSLONG fil_length;\t\t\t// File length in pages\n\tSLONG fil_start;\t\t\t// Starting page\n\tTEXT *fil_name;\t\t\t\t// File name\n\tgpre_file* fil_next;\t\t// next file\n\tUSHORT fil_shadow_number;\t// shadow number if part of shadow\n\tUSHORT fil_flags;\n};\n\nenum fil_flags_vals {\n\tFIL_manual\t= 1,\t// Manual shadow\n\t//FIL_raw\t\t= 2,\t// On raw device; unused\n\tFIL_conditional\t= 4\t// Conditional shadow\n};\n\ninline constexpr size_t FIL_LEN = sizeof(gpre_file);\n\n\n// filter block\n\nstruct gpre_filter\n{\n\tTEXT *fltr_name;\n\tconst TEXT *fltr_entry_point;\n\tconst TEXT *fltr_module_name;\n\tSSHORT fltr_input_type;\n\tSSHORT fltr_output_type;\n};\n\ninline constexpr size_t FLTR_LEN = sizeof(gpre_filter);\n\n\n// General Syntax node, produced by parser\n// CVC: several node types are unused!!!\n\nenum nod_t {\n\tnod_nothing = 0,\n\tnod_field = 1, nod_literal, nod_value,\n\tnod_and, nod_or, nod_not,\n\tnod_eq, nod_equiv, nod_ne, nod_ge,\n\tnod_le, nod_gt, nod_lt,\n\tnod_containing, nod_matches, nod_any,\n\tnod_unique, nod_plus, nod_times,\n\tnod_divide, nod_minus, nod_negate,\n\t//nod_msg,\n\t//nod_for,\n\t//nod_send,\n\t//nod_receive,\n\t//nod_block,\n\t//nod_select,\n\t//nod_boolean,\n\tnod_projection,\n\tnod_sort,\n\tnod_store, nod_modify, nod_erase,\n\t//nod_if,\n\tnod_assignment,\n\t//nod_rse,\n\t//nod_first,\n\t//nod_relation,\n\t//nod_end,\n\t//nod_label,\n\t//nod_leave,\n\t//nod_loop,\n\tnod_max, nod_min, nod_count,\n\tnod_total, nod_average, nod_list,\n\tnod_deferred, nod_missing, nod_between,\n\tnod_union,\n\t//nod_map,\n\tnod_starting,\n\tnod_like, nod_agg_count, nod_agg_max,\n\tnod_agg_min, nod_agg_total, nod_agg_average,\n\tnod_aggregate, nod_from, nod_null,\n\tnod_asterisk, nod_map_ref, nod_user_name,\n\tnod_upcase, nod_sleuth, nod_event_init,\n\tnod_udf, nod_array, nod_index,\n\tnod_via, nod_join_inner, nod_join_left,\n\tnod_join_right, nod_join_full, nod_join,\n\tnod_concatenate, nod_cast, nod_dom_value,\n\tnod_ansi_any, nod_gen_id,\n\t//nod_set_generator,\n\tnod_merge, nod_plan_expr, nod_plan_item,\n\tnod_natural, nod_index_order, nod_ansi_all,\n\tnod_extract, nod_current_date,\n\tnod_current_time, nod_current_timestamp,\n\tnod_lowcase, nod_nullif, nod_current_connection,\n\tnod_current_role, nod_current_transaction,\n\tnod_coalesce, nod_case, nod_case1,\n\tnod_substring,\n\tnod_LASTNOD\t\t\t\t\t// Leave this debugging gpre_nod last\n};\n\nstruct gpre_nod\n{\n\tnod_t nod_type;\t\t\t\t// node type\n\tUSHORT nod_count;\t\t\t// number of sub-items\n\tgpre_nod* nod_arg[1];\t\t// argument\n};\n\ninline constexpr FB_SIZE_T NOD_LEN(const FB_SIZE_T cnt) noexcept\n{\n\treturn sizeof(gpre_nod) + (cnt ? cnt - 1 : 0) * sizeof(gpre_nod*);\n}\n\n\nstruct set_dialect\n{\n\tUSHORT sdt_dialect;\t\t\t// Dialect  value as specified by SET stmt\n};\n\ninline constexpr size_t SDT_LEN = sizeof(set_dialect);\n\n\n// Set generator block\n\nstruct set_gen\n{\n\tTEXT* sgen_name;\n\tUSHORT sgen_dialect;\n\tSLONG sgen_value;\n\tSINT64 sgen_int64value;\n};\n\ninline constexpr size_t SGEN_LEN = sizeof(set_gen);\n\n\n// STRing block - holds a null terminated string\n\ntypedef struct str {\n\tTEXT str_string[1];\t\t\t// pretty simple, no?\n} *STR;\n\ninline constexpr size_t STR_LEN(const size_t size) noexcept\n{\n\treturn sizeof(str) + size;\n}\n\n\n// SQL WHENEVER BLOCK\n\nenum swe_condition_vals {\n\tSWE_error,\n\tSWE_warning,\n\tSWE_not_found,\n\tSWE_max\n};\n\nstruct swe\n{\n\tswe*\t\t\t\tswe_next;\t\t\t// Next in chain\n\tswe_condition_vals\tswe_condition;\t\t// Condition\n\tUSHORT\t\t\t\tswe_length;\t\t\t// Length of label\n\tTEXT\t\t\t\tswe_label[1];\t\t// Label\n};\n\n\n// Text block\n\nstruct gpre_txt\n{\n\tULONG txt_position;\n\tUSHORT txt_length;\n};\n\ninline constexpr size_t TXT_LEN = sizeof(gpre_txt);\n\n\n// User name -- used for SQL GRANT/REVOKE\n\nstruct gpre_usn\n{\n\tgpre_usn*\t\tusn_next;\n\tconst SCHAR*\tusn_name;\n\tUSHORT\t\t\tusn_dyn;\t// describes the type of user via a dyn-verb,\n\t\t\t\t\t\t\t\t// i.e. gds__dyn_grant_user/view/proc/trig\n};\n\ninline constexpr size_t USN_LEN = sizeof(gpre_usn);\n\n\n// value block, used to store a set of values\n\nstruct gpre_value\n{\n\tgpre_value* val_next;\t\t\t// next value in list\n\tconst TEXT* val_value;\t\t\t// value\n};\n\ninline constexpr size_t VAL_LEN = sizeof(gpre_value);\n\n\n// Array information block.  Used to hold info about an array field.\n// Note: the dimension (dim) block used to hold dimension information.\n// The preferred mechanism is the repeating tail on the array block.\n\nstruct ary\n{\n\tUSHORT ary_dtype;\t\t\t// data type of array\n\tint ary_dimension_count;\t// Number of dimensions in this array\n\tdim* ary_dimension;\t\t\t// Linked list of range info for each dimension\n\tSLONG ary_size;\t\t\t\t// Size of the array\n\tULONG ary_ident;\t\t\t// Array identifier\n\tbool ary_declared;\t\t\t// True if a declaration already was generated\n\tstruct ary_repeat\n\t{\n\t\tSLONG ary_lower;\n\t\tSLONG ary_upper;\n\t} ary_rpt[MAX_ARRAY_DIMENSIONS];\n};\n\n// CVC: The count is ignored, the array is hardcoded at 16.\ninline constexpr size_t ARY_LEN = sizeof(ary);\n\n\n\n// Trigger block\n// Note: This structure will need expansion later.  Currently its\n// use is to create a trigger for CHECK constraints which always\n// abort on error\n\nstruct gpre_trg\n{\n\t//str* trg_name;\t\t\t// unused\n\tUSHORT trg_type;\t\t\t// Type of trigger\n\tstr* trg_source;\t\t\t// source for trigger\n\tgpre_nod* trg_boolean;\t\t// boolean expression, for trigger\n\tstr* trg_message;\t\t\t// Message the trigger prints\n};\n\ninline constexpr size_t TRG_LEN = sizeof(gpre_trg);\n\n\n// Linked list stack stuff\n\nstruct gpre_lls {\n\tgpre_nod* lls_object;\t\t// object on stack\n\tgpre_lls* lls_next;\t\t\t// next item on stack\n};\n\ninline constexpr size_t LLS_LEN = sizeof(gpre_lls);\n\n\n// Constraint block, used to hold information about integrity constraints\n\nstruct cnstrt\n{\n\tstr* cnstrt_name;\t\t\t\t\t// Name of constraint\n\tUSHORT cnstrt_type;\t\t\t\t\t// Type of constraint\n\tgpre_lls* cnstrt_fields;\t\t\t// list of fields\n\tUSHORT cnstrt_fkey_def_type;\t\t// extended foreign key definition\n\tstr* cnstrt_referred_rel;\t\t\t// referred relation, if foreign key\n\tgpre_lls* cnstrt_referred_fields;\t// optional list of fields from referred relation\n\tcnstrt* cnstrt_next;\t\t\t\t// next contraint for field or relation\n\tgpre_txt* cnstrt_text;\t\t\t\t// source for CHECK constraints\n\tgpre_nod* cnstrt_boolean;\t\t\t// boolean expression, for CHECK constraints\n\tUSHORT cnstrt_flags;\t\t\t\t// see below\n};\n\ninline constexpr size_t CNSTRT_LEN = sizeof(cnstrt);\n\n// Values for cnstrt_fkey_def_type\n\nenum cnstrt_fkey_def_type_vals {\n\tREF_UPDATE_ACTION\t= 0x0001,\n\tREF_UPD_CASCADE\t\t= 0x0002,\n\tREF_UPD_SET_DEFAULT\t= 0x0004,\n\tREF_UPD_SET_NULL\t= 0x0008,\n\tREF_UPD_NONE\t\t= 0x0010,\n\tREF_UPDATE_MASK\t\t= 0x001E,\n\n\tREF_DELETE_ACTION\t= 0x0020,\n\tREF_DEL_CASCADE\t\t= 0x0040,\n\tREF_DEL_SET_DEFAULT\t= 0x0080,\n\tREF_DEL_SET_NULL\t= 0x0100,\n\tREF_DEL_NONE\t\t= 0x0200,\n\tREF_DELETE_MASK\t\t= 0x03C0\n};\n\n// Values for cnstrt_type\n\nenum cnstrt_type_vals {\n\tCNSTRT_NOT_NULL = 1,\n\tCNSTRT_PRIMARY_KEY,\n\tCNSTRT_UNIQUE,\n\tCNSTRT_FOREIGN_KEY,\n\tCNSTRT_CHECK\n};\n\n// Values for cnstrt_flags\n\nenum cnstrt_flags_vals {\n\t//CNSTRT_DEFERRABLE\t\t\t= 1,\n\t//CNSTRT_INITIALLY_DEFERRED\t= 2,\n\tCNSTRT_delete\t\t\t\t= 4\n};\n\n\n// Grant/revoke block\n\ntypedef struct prv\n{\n\tUSHORT prv_privileges;\t\t// holds privileges being granted or revoked\n\tconst SCHAR* prv_username;\t// user having privileges granted or revoked\n\tUSHORT prv_user_dyn;\t\t// the dyn-verb to be used with prv_username\n\t\t\t\t\t\t\t\t// i.e. gds__dyn_grant_user/proc/trig/view\n\tstr* prv_relation;\t\t\t// relation on which we&#x27;re doing grant/revoke\n\tUSHORT prv_object_dyn;\t\t// the dyn-verb to be used with prv_relation\n\t\t\t\t\t\t\t\t// i.e. gds__dyn_rel/proc_name\n\tgpre_lls* prv_fields;\t\t// fields on which we&#x27;re doing grant/revoke\n\tprv* prv_next;\t\t\t\t// next grant/revoke block (with different user)\n} *PRV;\n\ninline constexpr size_t PRV_LEN = sizeof(prv);\n\nenum priv_types\n{\n\tPRV_no_privs\t= 0,\t\t// no privileges being granted or revoked\n\tPRV_select\t\t= 1,\t\t// select privilege being granted or revoked\n\tPRV_insert\t\t= 2,\t\t// insert privilege being granted or revoked\n\tPRV_delete\t\t= 4,\t\t// delete privilege being granted or revoked\n\tPRV_update\t\t= 8,\t\t// update privilege being granted or revoked\n\tPRV_execute\t\t= 16,\t\t// execute privilege being granted or revoked\n\tPRV_references\t= 32,\t\t// reference privilege\n\tPRV_grant_option= 64,\t\t// privilege to grant privileges being granted\n\tPRV_all\t\t\t= 128\t\t// all privileges being granted/revoked\n};\n\n\n// statistic block. Used for all statistics commands\n\ntypedef struct sts\n{\n\tstr* sts_name;\t\t\t\t// object name\n\tUSHORT sts_flags;\t\t\t// Miscellaneous flags\n} *STS;\n\ninline constexpr size_t STS_LEN = sizeof(sts);\nenum sts_flags_vals {\n\tSTS_index = 1\t\t// Object is an index\n};\n\n\n// Computed field block\n\ntypedef struct cmpf {\n\tgpre_txt* cmpf_text;\t\t// source for computed field\n\tgpre_nod* cmpf_boolean;\t\t// expression, for computed field\n} *CMPF;\n\ninline constexpr size_t CMPF_LEN = sizeof(cmpf);\n\n// ***************** end of tree top **********************\n\n\n// Forward declarations\n\nstruct gpre_ctx;\nstruct gpre_fld;\nstruct gpre_rel;\nclass gpre_req;\nclass ref;\n\nenum act_t {\n\tACT_any,\n\tACT_alter_database,\n\tACT_alter_domain,\n\tACT_alter_index,\n\tACT_alter_table,\n\tACT_at_end,\n\t//ACT_average,\n\tACT_b_declare,\n\tACT_basedon,\n\tACT_blob_cancel,\n\tACT_blob_close,\n\tACT_blob_create,\n\tACT_blob_for,\n\tACT_blob_handle,\n\tACT_blob_open,\n\t//ACT_block_data,\n\tACT_close,\n\tACT_commit,\n\tACT_commit_retain_context,\n\tACT_create_database,\n\tACT_create_domain,\n\tACT_create_generator,\n\tACT_create_index,\n\tACT_create_shadow,\n\tACT_create_table,\n\tACT_create_view,\n\tACT_cursor,\n\tACT_database,\n\tACT_declare_filter,\n\tACT_declare_udf,\n\t//ACT_delete,\n\tACT_disconnect,\n\tACT_drop_database,\n\tACT_drop_domain,\n\tACT_drop_filter,\n\tACT_drop_index,\n\tACT_drop_shadow,\n\tACT_drop_table,\n\tACT_drop_udf,\n\tACT_drop_view,\n\n\tACT_dyn_close,\n\tACT_dyn_cursor,\n\t//ACT_dyn_declare,\n\tACT_dyn_describe,\n\tACT_dyn_describe_input,\n\tACT_dyn_execute,\n\tACT_dyn_fetch,\n\tACT_dyn_grant,\n\tACT_dyn_immediate,\n\tACT_dyn_insert,\n\tACT_dyn_open,\n\tACT_dyn_prepare,\n\tACT_dyn_revoke,\n\tACT_dyn_statement,\n\n\tACT_endblob,\n\tACT_e_declare,\n\tACT_enderror,\n\tACT_endfor,\n\tACT_endmodify,\n\tACT_endstore,\n\tACT_endstore_special,\n\tACT_erase,\n\tACT_event_init,\n\tACT_event_wait,\n\tACT_fetch,\n\tACT
